body:
  text: 禮部㑹同四譯館表禮部㑹同四譯館國朝官制提督㑹同四譯館禮部郎中兼鴻臚寺少卿銜一人掌四夷朝貢之國設廣厦以待貢使之至置象譯以通言語習畨夷書凡貢使就館率大使庀治屋宇稽其出入互市之事視其脯資餼牽毋有不給若朝見及賜燕頒賞皆館卿率使臣以行禮焉初制㑹同四譯分設兩館㑹同館自順治初置即𨽻禮部以主客司滿洲漢人主事各一人提督館事十四年設員外郎品級通事一人掌㑹同館印尋省雍正十年改定㑹同館監督由部掄選引見簡用一人四譯館則國初沿明制置𨽻於翰林院設太常寺漢少卿一人提督館事立回回緬甸百夷西畨髙昌西天八百暹羅八館以譯逺方朝貢文字乾隆十三年以四譯館閒冗無事詔下大學士禮部定議省提督館事太常寺少卿員額併入禮部為㑹同四譯館改八館為二曰西域館百夷館以禮部郎中一人兼鴻臚寺少卿銜兼攝之於滿漢郎中內掄選引見請㫖簡任三年而代㑹同四譯館大使漢人一人正九品序班漢人二人從九品朝鮮通事官滿洲十有二人六品六人七品四人八品二人掌治館舍委積以接待人使通外國語言翻習文字大使員額順治元年定序班初設二十人順治十五年定設正教序班八人協教序班八人康熙三十八年五十二年又先後省至九人仍以一員管典務廳典務事乾隆十三年省典務一人序班六人定設序班二人朝鮮通事官初置六人後增至十六人凡六品十人七品六人乾隆二十三年省六品四人七品二人增設八品二人朝鮮譯學置譯生二十人於下五旗朝鮮子弟內選充西域館置譯生四人百夷館置譯生四人均於順天府屬儒童內選充凡太使員闕咨吏部以序班序補通事官及序班員闕均以譯生選補咨吏部注冊厯代建置三代周禮秋官象胥每翟上士一人中士二人下士八人徒二十人掌蠻夷閩貉戎狄之國使掌傳王之言而諭說焉以和親之若以時入賓則協其禮與其辭言傳之凡其出入送逆之禮節幣帛詞令而賓相之鄭康成注鄭司農云象胥譯官也胥讀為諝王制曰五方之民言語不通嗜欲不同逹其志通其欲東方曰寄南方曰象西方曰狄鞮北方曰譯此官正為象者周始冇越裳重譯而來獻是因謂通言語之官為象胥云諝謂象之有才知者也掌客上士二人下士四人府二人史二人胥二人徒二十人掌四方賓客之牢禮餼獻飲食之等數與其政治國語周語使舌人體委與之韋昭注舌人能達異方之志象胥之官也謹案周禮秋官自大行人以下九職皆掌四方賔客之禮秦漢而降封建既廢邦交之事不行惟蠻夷朝貢猶典領於大鴻臚秦漢鴻臚即周大行人之職後世以賓禮所關雖於禮部置主客一曹參掌其事而實以鴻臚為専職自金元二代皆不設鴻臚寺始於禮部置㑹同館明代復設鴻臚而所掌僅朝廟禮儀其四夷館别以太常少卿領之於是諸蕃朝見之禮館餼之事遂不屬於鴻臚凖之前典頗不相合我朝合㑹同四譯兩館為一而以禮部郎兼鴻臚寺少卿銜専司經理循名核實洵與古制相符矣至其沿革所自則㑹同館即魏晉之客館令典客令當為周掌客之職四譯館即漢之譯官令九譯令當為周象胥之職而今之館卿實兼此二職者也秦册府元龜秦置典客掌歸義蠻夷有丞以屬焉漢漢書百官公卿表典客秦官景帝十六年更名大行令武帝太初元年更名大鴻臚屬官有譯官令丞典屬國屬官九譯令成帝河平元年省併大鴻臚儒林傳周堪為譯官令漢書地理志自扶甘都盧國船行可二月餘有黃支國自武帝以來皆獻見有譯長屬黃門漢書西域傳凡國五十自譯長皆佩漢印綬漢書金日磾傳金岑拜為郎使主客服䖍注官名屬鴻臚主蕃客也謹案典客既改為鴻臚其厯代沿革俱已别詳於鴻臚寺表惟譯官九譯二令丞及魏晉以後鴻臚所屬之典客一署皆與今㑹同四譯館職掌相承今並著之於此至地理志西域傳所稱譯長皆佩印綬其有祿秩可知而百官表並無此名以今制凖之當即通事官之類又主客一官服䖍謂屬鴻臚而百官表亦闕而不載疑即後代典客令之所自出也三國冊府元龜魏改鴻臚之大行令為客館令晉晉書職官志大鴻臚統典客令唐六典魏客館令晉改曰典客宋齊梁陳冊府元龜宋永初中大鴻臚分置南北客館令丞南齊書百官志客館令掌四方賓客唐六典梁有典客館令丞在七班之下為三品勳位陳因之北魏魏書官氏志太和十五年十二月置主客官冊府元龜後魏典客監從五品上又置主客令北齊隋書百官志後齊鴻臚寺統典客置令丞後周杜佑通典後周官品正五命秋官蕃部中大夫正四命秋官小蕃部下大夫正三命秋官小蕃部上士正二命秋官象諝中士正一命秋官象諝下士謹案唐六典以後周所置東南西北四掌客當典客令之職今考掌客之名雖襲周官而其制實本於晉之南北左右主客郎自應入於主客司沿革內惟蕃部大夫專掌蕃國朝覲之叙其職實如今之館卿若賓部大夫掌賓客之禮則與今鴻臚相仿通典乃以蕃部與賓部並入鴻臚沿革亦非也隋隋書百官志髙祖受命置鴻臚寺統典客署置令二人又有掌客十人煬帝改典客署為典蕃署置四方館於建國門外以待四方使者後罷之有事則置名𨽻鴻臚寺量事繁簡臨時損益東方曰東夷使者南方曰南蠻使者西方曰西戎使者北方曰北狄使者各一人掌其方國及互市事每使者署典護録事叙職叙儀監府監置互市監及副參事各一人録事主綱紀叙職掌其貴賤立功合叙者叙儀掌大小次序監府掌其貢獻財貨監置掌安置其駝馬船車並紏察匪違互市監及副掌互市參軍掌出入交易唐唐六典典客署令一人從七品丞二人從八品下掌客十五人正九品上典客十三人府四人史八人賓僕十八人掌固二人典客令掌東夷西戎南蠻北狄歸化在番者之名數丞為之二凡朝貢宴享送迎預焉皆辨其等位而供其職事凡酋渠首領朝見者則館而以禮供之若疾病所司遣醫人給以湯藥若身亡使主副及第三等以上官奏聞其喪事所須所司量給欲還蕃者則給輿遞至境諸蕃使主副五品以上給帳氊席六品已下給幕及食料丞一人判厨事季終則㑹之若還蕃其賜各有差給於朝堂典客佐其受領教其拜謝之節焉舊唐書職官志武德初改通事謁者為通事舍人𨽻四方館屬中書省謹按自隋置四方館唐代改為中書省以通事舍人判之其所掌者不獨蕃國朝覲之事與隋制不同厥後五季則以卿監判四方館宋亦有客省使引進使四方館使以武臣為之雖兼主四夷朝貢而內外臣僚牧伯朝辭進見悉其職掌亦非隋四方館專領蕃國者可比惟金代不置鴻臚其司外方人使者專屬之客省引進二使建置所承權輿有自故仍互載於此以備沿革焉五季馬端臨文獻通考石晉始有為卿監專掌判四方館者謹按冊府元龜載唐莊宗時詔諸寺監官屬權停則典客令丞亦當在省罷之列惟四方館職事尚存而以卿寺專判則必别為一署與唐之𨽻中書省者又不同矣宋宋史職官志鴻臚寺官屬都亭西驛及管幹所掌河西蕃部貢奉之事禮賓院掌回鶻吐蕃黨項等國朝貢館設及互市譯語之事懷逺驛掌南蕃交州西蕃龜兹大食於闐甘沙宗哥等國貢奉之事同文館及管勾所掌髙麗使命客省使副使掌四夷朝覲貢獻之儀受其幣而賓禮之掌其饔餼飲食還則頒詔書授以賜豫引進司使副掌蕃國進奉禮物之事四方館使凡郊祀大朝㑹則定外國使命之版文獻通考都亭驛監官一人西驛管勾官二人以諸司使副以下至三班使臣充禮賓院監官二人以閣門祗候以上及三班使臣充懷逺驛監官二人以監外物料庫官兼謹案宋都亭西驛禮賓院懷逺驛諸監官即今㑹同四驛館之職其客省引進四方館諸使則均非其專司然詳核史志監官所掌僅館餼支供之事而一切朝見賞勞乃以客省使總其成則監官當如今之大使而客省使實兼有今館卿職事也遼遼史百官志客省太宗㑹同元年置都客省興宗重熙十年見都客省回鶻仲格原作重哥今依字面改正客省使㑹同五年見客省使耶律華格原作化哥今依字面改正左客省使蕭和斯䝉古語雙也原作護思今改正應厯初為左客省使右客省使客省副使四方館四方館使高勳太宗入汴為四方館使四方館副使道宗咸雍五年詔四方館副使止以契丹人充謹案遼客省使四方館使二官其職掌不見於史以宋金之制凖之當亦主諸國人使者故並著於此金金史百官志客省使正五品副使從六品掌接伴人使見辭之事引進使五品正副使從六品掌進外方人使貢獻禮物之事典客署令從六品丞從七品直長後罷書表十八人右屬宣徽院謹案金不設鴻臚寺官故朝儀屬之宣徽院而客省引進使亦𨽻焉蓋亦如客館令之屬大鴻臚也元元史百官志㑹同館秩從四品掌接伴引見諸蕃蠻夷峒官之來朝貢者至元十三年始置二十五年罷之二十九年復置元貞元年以禮部尚書領館事遂為定制禮部尚書領㑹同館事一員正三品大使二員正四品副使二員從六品提控案牘一員掌書四人䝉古筆且齊解見吏部篇一人典給官八人其屬有收支諸物庫秩從九品大使一員副使一員至元二十九年以四賓庫改置謹案元代亦不設鴻臚寺别置㑹同館以主諸蕃朝貢元貞初遂領之禮部尚書以重其事今㑹同館之屬禮部蓋自此始也明明史職官志𢎞治五年禮部增設主客司主事一人提督㑹同館太常寺提督四夷館少卿一人正四品掌驛書之事自永樂五年外國朝貢特設八館置譯字生通事通事初𨽻通政使司通譯語言文字正德中增設八百館八百國蘭者哥進貢萬厯中又增設暹羅館初設四夷館𨽻翰林院選國子監生習譯宣德元年兼選官民子弟委官教肄學士稽考程課𢎞治七年始增設太常寺卿少卿各一員為提督遂改𨽻太常嘉靖中裁卿止少卿一人譯字生明初甚重與考者與鄉㑹試額科甲一體出身後止為雜流其在館者升轉皆在鴻臚寺孫承澤春明夢餘録四夷館在東華門外設太常寺少卿提督之聽於翰林院所𨽻凡八館初以舉人監生年少者入翰林院習夷字以通事為教師科舉時任其應試卷尾識譯字數十字三場畢送翰林定去取仍送入場填榜中榜後改庶吉士仍習譯天順中革令擇俊民俾専其業藝成㑹六部大臣試之通者冠帶又三年授以官尹直瑣綴録永樂間常選舉人監生習四夷譯書憫其妨曠本業乃命㑹試卷尾識譯書數十字三場畢送出翰林定去取仍送入場填榜蓋優典也然既登第仍官館中習譯書如許道中是也至景泰初吳禎以民人充譯字始援此例中鄉試及登第又以與修寰宇通志成從衆庶吉士出授御史成化間俞瓉又因此例授主事於户部蓋資稍可進輒習舉業而譯書不復精徒藉為科第之捷徑故爭趨者衆天順八年彭可齊始建白如制去取於內不復送出院謹案前代客館典客諸令丞皆以接待人使為重而譯官之職則自西漢以後槩未之見至明始重其事以翰林官領之然當時所定譯語大抵影響附㑹舛繆滋多其譯字諸生亦徒糜廪祿而已不足以為典要我國家聲教遠訖八方㑹同䝉古諸藩咸備宿衛凡前代相傳譯音之訛舛者無不審核精詳特加釐正而托忒回部諸事亦皆考稽重舌勒有成書握槧提鉛共知遵守其序班通事之𨽻四譯館者乃以相循舊制取備官聫初不藉為象鞮之用同文盛軌洵三代以來所莫及也欽定歷代職官表卷十一
