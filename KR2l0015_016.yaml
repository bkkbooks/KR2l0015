body:
  text: 樂部表樂部國朝官制總理樂部事務禮部滿洲尚書一人各部院内務府大臣無定員乾隆七年始置樂部凡郊廟祠祭之樂神樂署司之殿廷朝㑹燕饗之樂和聲署司之宫中慶賀燕饗之樂掌儀司司之鐃歌鼔吹前部大樂即大罕波鑾儀衛司之均𨽻於樂部特簡典樂大臣以治樂政考五音六律以合隂陽之聲應天地之和凡大祭祀大朝㑹則立於宫懸之次嵗春秋仲月大合樂於掌儀司則率所屬莅視以稽其節奏而正其律吕焉神樂署署正漢人一人正六品署丞漢人二人從八品協律郎漢人五人正八品司樂漢人二十有三人從九品掌祠祭樂章佾舞之數習其聲容辨其條理以詔樂工凡樂生一百八十人舞生三百人咸𨽻焉順治元年設太常寺協律郎五人司樂二十六人神樂觀提㸃一人左右知觀各一人康熙三十八年省協律郎一人司樂二人雍正二年復置如初額乾隆二年増設司樂三人八年改神樂觀為神樂所知觀改為知所九年省司樂六人二十年改神樂所為神樂署提㸃改為署正知觀改為署丞和聲署署正滿洲漢人各一人署丞滿洲漢人各一人以禮部内務府司官充供奉供用無定員以太常寺鴻臚寺内務府官充掌朝會樂律及諸隊舞儀節初順治元年沿明制設教坊司以掌官懸大樂置奉鑾一人左右韶舞各一人左右司樂各一人協同官十五人俳長二十人色長十七人歌工九十八人㝷省協同官五人俳長無定員雍正元年始除樂戸籍更選精通音樂之人充教坊樂工七年改教坊司為和聲署除奉鑾韶舞等官名乾隆七年定設署正署丞侍從待詔供奉供用官均以禮部内務府大常寺鴻臚寺官兼攝其侍從待詔無正員以為署正署丞之加銜所屬署史百二十人謹案神樂署官其遷除雖屬太常寺而職掌實𨽻於樂部今故與和聲署同入樂部表内至掌儀司樂及鑾儀衛馴象所之前部大樂旗手衛之鐃歌大樂皆以司官兼掌自有本職未可析載惟鑾儀衛所掌之鐃歌鼓吹乃周禮鼔人及厯代鼔吹令丞之職源委所承亦不容闕畧今於表内别立鑾儀衛掌樂官一條以著其沿革而官制之詳則仍載入鑾儀衛篇内云厯代建置三代尚書舜典帝曰夔命汝典樂教胄子直而温寛而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和謹案朱子謂大司樂之教即是夔典樂事今故録舜典繫之周官大司樂之前以明三代相承實本虞廷舊制也周禮春官大司樂中大夫二人以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武以六律六同五聲八音六舞大合樂以致鬼神示以和邦國以諧萬民以安賔客以說逺人以作動物乃分樂而序之以祭以享以祀鄭康成註大司樂樂官之長樂師下大夫四人上士八人下士十有六人凡樂掌其序事治其樂政大胥中士四人以六樂之會正舞位比樂官展樂器小胥下士八人正樂縣之位太師下大夫二人掌六律六同以合隂陽之聲皆文之以五聲播之以八音大祭祀帥瞽登歌令奏擊拊下管播樂器令奏鼓􅉧大饗亦如之小師上士四人掌教鼓鼗柷敔塤簫管弦歌鄭康成註凡樂之歌必使瞽矇為焉命其賢知者以為太師小師賈公彦疏太師是瞽人之中樂官之長故瞽矇屬焉瞽矇上瞽四十人中瞽百人下瞽百有六十人掌播鼗柷敔塤簫管弦歌諷誦詩世奠繫鼓琴瑟眡瞭三百人掌凡樂事播鼗撃頌磬笙磬賈公彦疏眡瞭皆所以扶工兼使作樂典同中士二人掌六律六同之和以辨天地四方隂陽之聲以為樂器磬師中士四人下士八人掌教擊磬擊編磬鍾師中士四人下士八人掌金奏笙師中士二人下士四人掌教龡竽笙塤籥簫篪篴管舂牘應雅以教祴樂鏄師中士二人下士四人掌金奏之鼓韎師下士二人掌韎樂祭祀則率其屬而舞之大饗亦如之旄人下士四人掌教舞散樂舞夷樂籥師中士四人祭祀則鼓羽籥之舞賔客饗食則亦如之籥章中士二人下士四人掌土鼓豳籥鞮鞻氏下士四人掌四夷之樂與其聲歌典庸器下士四人掌藏樂器司干下士二人掌舞器高氏愈曰大司樂學官之長太師教樂之官之長小師其副也自典同至司干十二職皆太師之屬而總𨽻於大司樂周禮地官鼔人中士六人掌教六鼓四金之音聲以節聲樂以和軍旅以正田役教為鼓而辨其聲用舞師下士二人掌教兵舞帗舞羽舞皇舞禮記月令仲春之月上丁命樂正習舞釋菜仲丁命樂正入學習樂季冬之月命樂師大合吹禮記文王世子春夏學干戈秋冬學羽籥皆在東序小學正學干大胥賛之籥師學戈籥師丞賛之春誦夏弦大師詔之孔穎達疏諸侯謂之小學正天子謂之樂師周禮惟有籥師此云籥師丞者或諸侯之禮或異代之法春秋左氏傳楚鍾建為樂尹杜預註司樂大夫謹案虞廷以伯夷典禮后夔典樂分為二職然禮理樂和本相輔而行故周官以大司樂以下二十職屬之大宗伯也詳稽厥制盖大司樂綜領樂事故又稱樂正樂正子春即樂正之後以官為氏而樂師在諸侯為小樂正則即其副貳皆當為今典樂大臣之職盧植禮記註謂漢太予令如古大胥太樂丞如古小胥皆大樂正屬官則大胥當為今署正之職小胥當為今署丞之職其典同以下十二官及地官之舞師一官分掌八音六舞當為今協律郎司樂供奉供用官之職若地官之鼓人専司金鼔節奏為後世鼓吹署所自出當為今鑾儀衛鐃歌大樂之職觀月令所載仲春樂正習樂季秋樂師合吹其教肄之法綦詳今定制樂舞生毎月肄樂於神樂署春秋季月則大合樂於掌儀司典樂率所屬咸莅視之職守相承固於樂正樂師所掌適相脗合也至太師小師為瞽工之長秦漢以後工師皆非矇曠摯之職久已無存今故不列於表又楚之樂尹及論語所載亞飯三飯四飯鼓播鼗擊磬諸官大抵多侯國之制今亦並從附著焉秦杜佑通典秦奉常屬官有太樂令及丞漢漢書百官公卿表奉常屬官有太樂令丞漢書律厯志宫商角徵羽職在太樂漢書禮樂志制氏以雅樂聲律世世在太樂官河間獻王獻所集雅樂天子下太樂官常存肄之謹案漢書百官公卿表載武帝元鼎五年杜相為太常坐擅繇太樂令論師古曰謂擅役使之也而後漢書桓譚傅亦載譚父在成帝時為太樂令則太樂一官終西漢之世無所改革又通典載盧植禮記註有引太樂律卑者之子不得舞宗廟之酎云云所稱太樂律盖如今之則例也司馬光資治通鑑武帝元狩二年上方立樂府使司馬相如等造為詩賦以宦者李延年為協律都尉佩二千石印弦次初詩以合八音之調顔師古曰立樂府始置之也樂府之名盖起於此案漢書禮樂志恵帝二年已有樂府令夏侯寛改房中樂為安世樂而師古乃謂樂府之名起於武帝頗爽事實未足為據漢書百官公卿表少府屬官有樂府令丞漢書宣帝本紀元始四年正月詔樂府减樂人元初元年六月减樂府員漢書禮樂志哀帝即位下詔罷樂府官郊祭樂及古兵法武樂在經非鄭衞之聲者條奏别屬他官丞相孔光大司空何武奏大凡八百二十九人其三百八十八人不可罷可領屬太常奏可謹案西漢司樂者分為二官太樂令丞屬太常盖如今之神樂署樂府令丞屬少府盖如今之和聲署其古兵法武樂即孔光奏内之嘉至鼓員邯郸鼔員騎吹鼓員等百二十八人見禮樂志當如今鑾儀衞所掌之鐃歌鼔吹樂而其初與郊祭樂俱屬於樂府則自哀帝以前太樂並不領朝廟樂章其存肄者惟制氏所傳河間所獻之雅樂僅於鄉射一用之而已禮樂志載平當議謂河間雅樂立之太樂春秋鄉射作於學官希濶不講公卿大夫不曉其意是也又案樂府有剛别柎員顔師古曰剛及别柎皆鼓名主調篪員鐘工磬工簫工員俱見禮樂志今和聲署署史以所司樂器分别其名曰司鐘司磬司琴司瑟笙簫壎篪亦如之盖即其例又樂府有僕射二人主領諸樂人亦見禮樂志是當為今供奉供用之比又張放傳有樂府音監景武孟康曰音監監主樂人也則當如今之司樂矣後漢書明帝本紀永平三年八月改太樂為太予樂以尚書緯有作樂名予之語故據改之後漢書百官志太予樂令一人六百石掌伎樂凡國祭祀掌諸奏樂及大饗用樂掌其陳序丞一人唐六典後漢少府屬官有承華令典黄門鼓吹百三十五人百戯師二十七人後漢書獻帝本紀建安八年總章始復備八佾舞章懐太子註總章樂官名古之安世樂晉書樂志魏武平荆州獲漢雅樂郎杜夔謹案後漢志惟有太子樂令而無承華令及總章樂官然考承華令典鼓吹當如今之鑾儀衛樂總章即安世樂乃前漢樂府令舊職當如今之和聲署樂以規制凖之必三官各有職掌未可偏廢疑史文脱漏也觀晉志之雅樂郎一官史亦不載則其闕畧者固不少耳三國宋書百官志魏復為太樂令唐六典魏太樂令黄初中以杜夔為之使正雅樂時散騎侍郎鄧靜善詠雅樂歌師尹胡能習宗祀之典舞師馮肅曉知前代諸儛夔與剏定遷協律都尉晉晉書職官志太常有協律校尉員又統太樂鼔吹等令協律校尉漢協律都尉之職也魏杜夔為之及晉改為協律校尉册府元龜晉荀朂以魏氏歌詩或二言或三言以問司律中郎将陳頎曰被之金石未必皆當故朂造晉詩皆為四言朂以杜夔所制律吕較太樂總章鼓吹八音與律吕乖錯乃作新律吕以調聲韻頒下太常使太樂總章鼓吹清商施用朂遂典知樂事謹案晉代但置太樂鼓吹令而據册府元龜所載則尚有總章清商二樂而未見其官當是以太樂兼總章鼓吹兼清商而仍令樂工分𨽻之各司其事不相凌雜故有此四名也至司律中郎将史亦無其制疑當以中郎将之官典司樂律殆如今各部院堂官之兼管樂部者歟宋齊梁陳宋書百官志太樂令一人丞一人掌凡諸樂事通典太樂令丞齊銅印墨綬進賢一梁冠絳朝服梁陳因之隋書百官志梁太常統太樂鼓吹令丞又置協律校尉總章校尉監掌故樂正之屬以掌樂事又有清商署丞謹案宋書樂志宋文帝元嘉十三年有總章工馮大列給諸王舞伎事是宋齊亦有總章樂而不言所屬至梁設校尉而總章始置専官又别立清商署丞於是太樂總章鼓吹清商四樂遂各有分掌校之今制則神樂署當如太樂令之職和聲署當如總章校尉清商丞之職而鑾儀衞馴象所旗手衛司官則如鼓吹令之職其司樂供奉供用則監掌故樂正之職也北魏魏書官氏志協律中郎從第四品下方舞郎庶長協律郎從第五品上太樂祭酒從第五品中太樂博士第六品下方舞郎從第六品中唐六典後魏太和十五年置太樂官魏書樂志正始元年太樂令公孫崇普泰元年太樂令張乾龜謹案魏収樂志載魏太祖天興六年詔太樂總章鼓吹増修雜技是三樂並建與前代相同而太和中惟置太樂官盖當兼領總章鼓吹也北齊隋書百官志後齊太常寺屬官有協律郎二人掌監調律吕音樂統太樂署令丞掌諸樂及行禮節奏等事鼔吹署令丞掌百戯鼔吹樂人等事太樂兼領清商部丞掌清商音樂等事鼓吹兼領黄户局丞掌供樂人衣服謹案北齊以中書侍郎司進御之音樂而所領者不過西凉龜兹四部伶官淫哇競進雅樂無聞與今典樂大臣之職不同故不列於表後周通典後周官品正五命春官大司樂中大夫正四命春官小司樂下大夫正三命春官小司樂上士正二命春官樂師樂胥司歌司鐘磬司鼓司吹司舞籥章掌散樂典夷樂典庸器中士正一命春官樂胥司歌司鍾磬司鼓司吹司舞籥章掌散樂典夷樂典庸器下士隋隋書百官志太常寺有協律郎二人統太樂清商鼓吹等署各置令一人太樂加至二人丞一人太樂鼓吹則各至二人太樂署清商署各有樂師員太樂八人清商二人鼓吹署有哄師二人煬帝改樂師為樂正置十人罷清商署唐唐六典太樂署令一人從七品下丞一人從八品下樂正八人從九品下典事八人文武二舞郎一百四十人令掌教樂人調合鍾律以供邦國之祭祀饗燕丞為之貳凡用樂則辨其曲度章服而分終始之次凡樂人及音聲人應教習皆著簿籍覈其名數而分畨上下皆教習檢察以供其事鼓吹署令一人從七品下丞一人從八品下樂正四人從九品下令掌鼓吹施用調習之節以備鹵簿之儀丞為之貳凡大駕行幸鹵簿則分前後二部以統之協律郎二人正八品掌和六律六吕以辨四時之氣八風五音之節凡太樂鼔吹教樂則監試為之課限若大祭祀饗燕奏樂於庭則升堂執麾以為之節制謹案隋志載隋罷清商而唐六典註又稱唐朝省清商并於鼓吹二書皆唐代官撰而彼此矛盾必有一誤也五季舊五代史樂志周顯徳二年正月命太樂令賈峻奏王朴新法黄鍾調謹案五季樂官之制史文不詳據薛居正舊史所載則太樂之職亦同唐代也宋馬端臨文獻通考宋協律郎朝宴親郊則遣官攝事太樂局令一人丞一人樂正二人副使正二人掌車駕郊祀及御殿御樓大祠登歌鼓吹局令一人丞一人崇寧後𨽻大晟府宋史職官志大晟府以大司樂為長典樂為貳次曰太樂令秩比丞次曰主簿協律郎又有按協聲律製撰文字運譜等官以京朝官選人或白衣士人通樂律者為之又以武臣監府門及大樂法物庫以侍從内省近侍官提舉所典六案曰太樂曰鼓吹曰宴安樂曰法物曰知雜曰掌法宋朝禮樂掌於奉常崇寧初置局議大樂樂成置府建官以司之禮樂始分為二五年二月因省冗員併之禮官九月復舊大觀四年以官徒廩給繁厚省樂令一員監官二員宣和二年詔以大晟府近嵗添置冗濫徼幸並罷不復再置遼遼史百官志南面朝官有協律郎太樂署鼓吹署金金史百官志太常寺協律郎從八品掌以麾節樂調和律吕監視音調太樂署兼鼓吹署樂工百人令一員從六品丞從七品掌調和律吕教習音聲并施用之法樂工部籍直長一員正八品太樂正從九品掌祠祀及行禮陳設樂縣太樂副正從九品教坊提㸃正五品使從五品副使從六品判官從八品掌殿廷音樂總判院事諧音郎從九品不限資考員數金史樂志金初得宋始有金石之樂及大定明昌粲然大備其𨽻太常者即郊廟祀享大宴大朝㑹宫縣二舞是也𨽻教坊者則有鐃歌鼓吹天子行幸鹵簿導引之樂也鼓吹樂前部鼓吹令二人後部鼔吹丞二人元元史百官志儀鳳司秩正四品掌樂正供奉祭饗之事至元八年立玉宸院置樂長一員樂副一員樂判一員二十年改置儀鳳司𨽻宣徽院置大使副使各一員判官三員二十五年歸𨽻禮部省判官三員三十一年置達嚕噶齊解見户部倉場衙門篇一員副使一員大徳十一年改陞玉宸樂院秩從二品置院使副使僉事同僉院判至大四年復為儀鳳司秩正三品延祐七年降從三品定置大使五員從三品副使四員從四品首領官經厯一員從七品知事一員從八品吏屬令史二人譯史通事知印各一人其屬五雲和署秩正七品掌樂工調音律及部籍更畨之事至元十二年始置至大二年撥𨽻玉宸樂院皇慶元年陞正六品二年陞從五品署令二員署丞二員管勾二員協音一員協律一員書史二人書吏四人教師二人提控四人安和署秩正七品職掌與雲和同至元十三年始置皇慶二年陞從五品署令二員署丞二員管勾二員協音一員協律一員書史二人書吏四人教師二人提控四人常和署初名管勾司秩正九品管領回回樂人皇慶元年初置延祐三年陞從六品署令一員署丞二員管勾二員教師二人提控二人天徳署初名昭和署秩從六品管領河西樂人至元十七年始置大徳十一年陞正六品至大四年改為天樂署皇慶元年陞從五品署令二員署丞二員協音一員協律一員書史二人書吏四人教師二人提控四人廣樂庫秩從九品掌樂器等物大使一員副使一員皇慶元年始置教坊司秩從五品掌承應樂人及管領興和等署五百户中統二年始置至元十二年陞正五品十七年改提㸃教坊司𨽻宣徽院秩正四品二十五年𨽻禮部大徳八年陞正三品延祐七年復正四年達嚕噶齊一員正四品大使三員正四品副使四員正五品知事一員從八品令史四人譯史知印奏差各二人通事一人其屬三興和署秩從六品署令二員署丞二員管勾二員祥和署秩從六品署令二員署承二員管勾二員廣樂庫秩從九品大使一員副使一員右儀鳳司教坊司俱屬中書禮部大樂署秩從六品中統五年始置令二員從六品丞一員從七品掌管禮生樂工四百七十九户右太樂署屬太常寺明明史職官志太常寺協律郎二人正八品嘉靖中増至五人司樂二十人從九品嘉靖中増至三十九人後革五人樂四等曰九奏用祀天地曰八奏神祗太嵗曰七奏大明太社太稷帝王曰六奏夜明帝社帝稷宗廟先師舞二曰文舞曰武舞初吴元年置設協律郎洪武十三年更定協律郎等官品秩世宗又増設協律郎等員隆慶三年革協律郎等官四十八員萬厯六年復設如嘉靖間制教坊司奉鑾一員正九品左右韶舞各一人左右司樂各一人並從九品掌樂舞承應以樂户充之𨽻禮部謹案自漢以後典雅樂者不出太樂總章鼓吹清啇四署其總章清商樂官間置即罷惟太樂鼓吹二署厯代相沿迄唐宋猶並設不廢至教坊之名始自唐明皇時唐書禮樂志所謂置内教坊於蓬萊宫側居新聲散樂倡優之技者是也當時崔令欽有教坊記所述皆鄙俗之事大抵繁音䙝調不可以施於宗廟朝廷故終唐世未嘗𨽻之樂官至宋徽宗既製新樂令大晟府同教坊按習始以雅樂播之教坊金代復并鼓吹入太樂而别置教坊提㸃以司鼓吹引導於是教坊遂得列於樂官厯元明皆因其制以俳優名目厠諸咸英韶夏之間於制度殊為乖舛本朝特加釐正改教坊司為和聲署以典朝㑹燕饗之樂而鐃歌鼓吹則别掌之鑾儀衛官前代太樂總章鼓吹之司存秩然咸得其條理我皇上審音考律重定樂章金石均諧神人允格同和盛軌洵與唐虞三代比隆矣欽定歴代職官表卷十
