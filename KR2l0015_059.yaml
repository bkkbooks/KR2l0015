body:
  text: 知府直隸州知州等官表知府直隸州知州等官國朝官制各府知府從四品奉天一人直隸山東福建湖北廣東各十人陜西七人江蘇安徽各八人山西河南甘肅湖南各九人浙江廣西四川各十一人江西貴州各十三人雲南十四人掌一府之政統轄屬縣宣理風化平其賦役聽其獄訟以教飬百姓凡闔府屬吏皆總領而稽核之國初定制每府設知府一人順治十八年江南分省康熙二年陜西分省三年湖廣分省各以其府分隸之嗣後各府互有建置裁併員額亦因之增減焉又初制知府正四品乾隆十八年改從四品同知正五品奉天一人直隸二十四人江蘇二十三人浙江十五人安徽貴州各七人山東十二人陜西六人山西江西各十一人河南甘肅廣西各八人福建湖北廣東四川各十人湖南九人雲南十三人通判正六品奉天一人直隸安徽湖北各八人江蘇十六人山東河南各十一人山西浙江江西湖南各十人陜西三人甘肅廣西雲南貴州各六人福建廣東各七人四川九人同知分掌督糧捕盜海防江防清軍理事撫苗水利諸務通判分掌糧運督捕水利理事諸務各量地置員以佐知府之政治其有兼理民事直隸于各省者其職如各府各直隸州之制而品級則同國初每府置同知通判或一二人或三四人不等嗣後酌量繁簡因時裁設又初各府設有推官專掌讞獄之事康熙六年裁各府經厯正八品同知經厯品級同奉天一人直隸湖北湖南廣西各十人江蘇六人安徽河南廣東各八人山東山西甘肅福建各九人陜西四人浙江雲南各十一人江西四川貴州各十一人各府知事正九品江蘇三人浙江一人廣西二人雲南五人各府照磨從九品同知照磨品級同江蘇五人安徽河南各一人陜西浙江各四人甘肅貴州各二人江西十二人四川十人各府司獄從九品同知通判司獄品級同直隸四人江蘇安徽河南陜西四川貴州各一人山東十人山西廣西各三人浙江湖北各六人福建廣東各八人湖南二人雲南五人各府宣課司大使從九品江蘇三人各府稅課司大使從九品浙江四人廣東一人各府倉大使從九品直隸二人山西陜西各一人各府檢校未入流江蘇三人各府庫大使未入流山西一人各府茶引批驗所大使未入流江蘇一人各府長官司吏目未入流貴州三人各府經厯照磨掌受發文移磨勘卷宗司獄掌察理繫囚宣課司大使以下各守其職以分理府屬之事國初每府設經厯以下各官因事繁簡無定員嗣後因時裁設並如今制各直隸州知州正五品直隸甘肅各六人江蘇廣東各三人安徽陜西各五人山東福建各二人山西十人四川九人河南湖南雲南各四人江西廣西各一人掌直隸州一州之政令其規制與知府同惟無倚郭縣其所治州即以知州行知縣之事國初各直隸州俱置知州一人嗣後或以府改設析置或以府屬州升或省併入各府其員額亦因之增減焉各直隸州州同從六品直隸安徽四川各三人江蘇山東陜西甘肅福建各一人河南廣東各一人州判從七品直隸五人江蘇安徽山東陜西廣東廣西各二人山西湖南各四人河南甘肅各三人江西雲南各一人四川七人直隸州州同州判所掌如府同知通判之職以二各州而佐其政治其員額因事之繁簡並隨各州升改之制而建置焉各直隸州吏目從九品直隸六人江蘇廣東各三人安徽陜西甘肅各五人山東廣西各二人山西四川各九人江西一人湖南雲南各四人各直隸州巡檢從九品直隸山東甘肅江西廣西各一人江蘇七人安徽山西廣東四川各五人福建二人湖南雲南各三人各直隸州驛丞未入流直隸山西四川各一人各直隸州閘官未入流山東八人稅課司大使未入流江蘇山東各一人直隸州吏目掌禁戢姦宄防護獄囚典司簿籍巡檢驛丞稅課使等屬各掌其職與各縣所屬同員額隨州建設復因地裁減如今制焉厯代建置謹案守令為親民之官而以守統令其職益繁則其任益重三代分土建侯今牧守之地古之侯國也惟畿內之地百里內有州四百里內有縣而州則屬于鄉大夫縣則屬于遂大夫蓋地不置侯而治土治民必有統率與今之府州職差相近漢郡守秩二千石置丞尉别駕長史侯國則以內史相治民實為守土専官故州牧刺史迭有變更而郡守之職由漢迄六朝不改自南北分裂置郡曰多州之所統無以大異于郡隋唐之世或去郡或去州蓋亦因時制宜之法然欲去郡而郡卒不可得而去欲去州而總管府採訪使之設則仍州制也于是州名始降而與郡無異矣若夫京都稱府始于唐代每府置尹及少尹以治之諸郡不得儕焉宋代又以潛藩建節之地皆升為府元明因之置府浸廣而天下諸郡盡以府名郡守則盡以知府名然知府之稱實起于宋之以京朝官出蒞府事因其猶帶本銜故曰以某官知某府耳若不由京朝官出者曰守曰尹原不相混元代散府尚存府尹之目至明而一概皆稱為知府無所區别矣直隸州知府之設不見于古時惟後漢屬國都尉以縣之離郡逺者置之稍有屬縣與郡守分土而治略見權輿隋唐罷郡之後州無不直隸者雖名為州其實郡也渤海國大氏規倣唐制于隸府諸州之外有獨奏州之稱于是州始異于郡而惟獨奏州則可以視郡至明代諸府之外領縣而視府差小者以直隸州稱之若府州僚佐列代相仍名制少異而大率相近恭惟我國家體國經野設官分職各直省並設各府各直隸州以為牧民之統率其同知州同以下分猷佐理規制精詳洵非前代之所得比擬而沿革所因得失尚可考見謹序其崖略列于左方三代周禮天官大宰以九兩繫邦國之民一曰牧以地得民二曰長以貴得民三曰師以賢得民四曰儒以道得民六曰主以利得民七曰吏以治得民鄭康成注長諸侯也一邦之貴民所仰也師諸侯師氏儒諸侯保民主謂公卿大夫吏小吏在鄉邑者賈公彥疏此一經皆據諸侯謹案周禮大宰九兩之法専指侯國言之其所謂牧如今之督撫監司曰長則府州縣之職曰師曰儒則猶各府州縣之有教授學正教諭訓導也曰主曰吏亦如府縣之僚佐及六房科吏也周禮地官鄉大夫每鄉卿一人各掌其鄉之政教禁令以歲時登其夫家之衆寡辨其可任者以歲時入其書以鄉射之禮五物詢衆庶使民興賢出使長之使民興能入使治之遂大夫每遂中大夫一人各掌其遂之政令以歲時稽其夫家之衆寡六畜田野辨其可任者與其可施舍者以教稼穡以稽功事掌其政令戒禁聽其治訟令為邑者歲終則會政致事謹案周制畿外為諸侯列服之地其官不詳于周禮畿內之治地者則分六鄉六遂領鄉者為卿自鄉大夫以下則有州長黨正族師閭胥比長領遂者為中大夫自遂大夫以下則有縣正鄙師酇長里宰鄰長大小相維皆所以分地而治民也以今制考之六鄉切近王居其有州有黨亦如順天府之有各屬州縣六遂在二百里外其有縣有鄙亦如直隸省之有府州縣則鄉遂大夫並如今各府各直隸州之知府知州而遂大夫所掌政令戒禁聽其治訟令為邑者歲終致事與今知府之職尤為相近也畿內之治地者既如此其畿外統于諸侯亦復有三郊三遂之制立官之法亦必有與王畿相同者特典籍不備不可厯數耳鄉遂出軍與今八旗之制最合今已别繫之八旗都統篇而復著鄉遂大夫于此表以明治地之官之所自始云秦杜佑通典郡守秦官秦滅諸侯以其地為郡置守丞尉各一人守治民丞佐之尉典兵鄭樵通志秦置郡丞其郡當邊戍者丞為長史掌兵馬又秦官有郡尉掌佐守典武職甲卒謹案秦罷諸侯分置郡縣為後世府州縣之所自始然郡之為名實不始于秦時考釋名云郡聚也人所羣聚也説文云周制天子地方千里分為四縣縣有四郡周書作雒篇千里百縣縣有四郡郡小縣大故春秋傳曰上大夫受縣下大夫受郡秦并天下置三十六郡以監天下之縣則郡大縣小秦紀魏納上郡十五縣是也是則自古即有列郡之名特秦改置之在諸縣之上而魏納上郡又在秦未置郡之前蓋秦亦第因列國遷移之舊而為之制耳史記秦本紀惠王十三年置漢中郡此為秦置郡之始其後分為三十六郡而史記漢書所紀又有楚郡郯郡東陽河間等郡蓋天下既定制為三十六郡而其初暫置及後所增設當亦不為定制也守丞以下諸官則自漢以來多相承不改云漢漢書百官公卿表諸侯王內史治國民中尉掌武職成帝綏和元年省內史更令相治民如郡太守郡守掌治其郡秩二千石有丞邊郡又有長史掌兵馬秩皆六百石景帝中元二年更名太守漢書髙帝本紀懷王以沛公為碭郡長韋昭注秦名曰守漢初改曰長晉書地理志漢祖分內史為三部更置郡國二十有三文增厥九景加其四武帝開越攘胡初置十七拓土分疆又增十四昭帝又增其一至平帝元始二年凡新置郡國七十有一與秦四十合一百一十有一馬端臨文獻通考漢景帝中元二年更名郡守為太守凡在郡國皆掌治民進賢勸功決訟檢姦常以春行所主縣秋冬遣無害吏按訊諸囚平其罪法論課殿最按律有無害都吏如今言公平吏漢書蕭何以文無害為沛主吏掾并舉孝亷漢制歲盡遣上計掾史各一人條上郡內衆事謂之計偕簿郡為諸侯王國者置內史以掌太守之任宣帝以為太守吏民之本數變易則下不安民知其將久不可欺罔乃服從其教化每拜刺史守相輒親見問觀其所繇退而考察以質其言常稱曰與我共治者惟良二千石乎是以漢世良吏于是為盛稱中興焉謹案漢因秦制置郡守以秦郡過大漸為分析其諸侯所封則謂之國國以內史治民其後以相治民是內史與相亦郡守之職也然漢分郡雖衆而郡地之大者亦數千里宋馬永卿云漢時郡極大即以會稽郡考之吳即蘇州也烏傷即婺州也毗陵即常州也山陰即越州也由拳古之檇李即秀州也太末衢州也烏程湖州也餘杭杭州也鄞明州也以此考之即今浙東西之地乃漢一郡耳蓋因時制宜以户口之多寡為郡地之大小初不以里數計也漢初有郡長之名其後為郡守後又改為太守其義則一而已通典元帝建昭二年益三河大郡太守秩凡户十二萬為大郡謹案明制以糧石分天下知府為三等有上府中府下府之稱即本此意通典兩漢有功曹史主選署功勞有倉曹史掌倉庫有決曹賊曹掾主刑法有督郵掌監屬縣有東西南北中部謂之五部督郵故督郵功曹之極位謹案西漢郡佐漢書所載者曰丞曰長史而已通典備敘羣職足以補漢史之缺故並著于篇後漢書百官志郡國凡九十八其二十七王國相其七十一郡太守其屬國都尉屬國分郡離逺縣置之如郡差小置本郡名世祖并省郡縣四百餘所後世稍復增之每郡置太守一人二千石丞一人郡當邊戍者丞為長史王國之相亦如之每屬國置都尉一人比二千石丞一人中華古今注建武六年三月令郡太守諸侯相病丞長史行事十四年罷邊郡太守丞長史領丞職三國通志三國時有郡守國相內史又魏置中正宋書百官志漢末及三國多以諸部都尉為郡謹案三國郡制並如漢代惟郡都尉既併省于後漢而三國則仍置之既以主兵亦與郡守分土而治而諸部都尉遂與郡不異然見于漢書表志者秦之都尉典武職甲卒漢之都尉典兵禁備盜賊譏出入而邊郡置農都尉主屯田殖穀又置屬國都尉主蠻夷降者核其職掌究以主兵為重而兼及守土其制實于明之各都司及今城守尉等官相近故宋百官志雖有漢末及三國多以諸部郡尉為郡之文而無取旁引焉晉晉書職官志郡皆置太守諸王國以內史掌太守之任又置主簿主記室門下賊曹議生門下史記室史録事史書佐循行幹小史五官掾功曹史功曹書佐循行小史五官掾等員文獻通考晉郡守皆加將軍無者為恥謹案晉以太守治郡以內史治諸王國制與漢同惟郡佐諸官視漢加倍晉史職官志所載是也郡守皆加將軍則合軍民而兼治之與漢制不同蓋漢刺史郡守皆専治民後漢末始兼理兵事晉所承者皆後漢末季之制也宋齊梁陳文獻通考晉宋守相內史並銀章青綬進賢兩梁冠宋書百官志宋太祖元嘉四年復置郡官屬略如公府無東西曹有功曹史主選舉五官掾主諸曹事部縣有都郵門亭長又有主記史催督期會漢制也今略如之諸郡各有舊俗諸曹名號往往不同太守二千石丞六百石南齊書百官志郡太守內史郡縣為國者置內史相隋書百官志梁郡置太守置丞國曰內史郡丞三萬户以上置佐一人郡縣置吏各凖州法以大小而制員陳承梁皆循其制官會稽太守品第五加督進在第四品加都督進在第三品諸郡若督若都督皆以此差次為例萬户以上太史內史相品第六不滿萬户太守內史相品第七謹案晉太守皆加將軍梁陳太守則加督加都督一如刺史之制蓋郡守之權既重軍民無不兼理也自晉省郡丞宋則復置官屬與漢同制齊梁陳以下亦皆因之不改第史志闕文無可臚列謹考見其大略如此北魏魏書官氏志初郡制三太守用七品者世宗班行職令上郡太守內史相第四品中郡第五品下郡第六品正始元年罷郡中正通志後魏初郡置三太守孝文初二千石能靜二郡至三郡者遷為刺史太和中次職令太守內史相並以六年為限北齊隋書百官志北齊上上郡太守屬官有丞中正光迎功曹光迎主簿功曹主簿五官省事録事及西曹户曹金曹租曹兵曹集曹等掾佐太學博士助教太學生市長倉督等員合屬官佐吏二百一十二人上中郡減上上郡五人上下郡減上中郡五人中上郡減上下郡四十五人中中郡減中上郡五人中下郡減中中郡五人下上郡減中下郡四十人下中郡減下上郡二人下下郡減下中郡二人文獻通考北齊制郡為上中下三等每等又有上中下之差自上上郡至下下郡凡九等又北齊上郡太守屬官合三百一十人以下郡遞減之又北齊諸州有功曹𠫭軍又司倉𠫭軍司户𠫭軍司兵𠫭軍司士𠫭軍北齊以下並同功曹謹案北齊郡官之制隋書及通考互有不同今並存之以備𠫭考後周周書盧辨傳户一萬五千以上郡守七命户一萬以上正七命户五千以上六命户一千以上正五命户不滿千以下五命七命郡丞四命正六命郡丞正三命六命郡丞三命正五命郡丞正二命五命郡丞二命隋隋書百官志郡置太守丞尉正光初功曹光初主簿縣正功曹主簿西曹金户兵法士等曹市令等員并佐史合一百四十六人上中郡減上上郡吏屬五人上下郡減上中郡四人中上郡減上下郡十九人中中郡減中上郡六人中下郡減中中郡五人下上郡減中下郡十九人下中郡減下上郡五人下下郡減下中郡六人開皇六年罷郡以州統縣改别駕贊務以為長史司馬佐官以曹為名者並改為司煬帝即位罷州置郡郡置太守上郡從三品中郡正四品下郡從四品罷長史司馬置贊務一人以二之上郡正五品中郡從五品下郡正六品次置東西曹掾上郡正六品中郡從六品下郡正七品主簿司功倉户兵法士曹等書佐各因郡之大小而為增減改行𠫭軍為行書佐其後諸郡各加置通守一人位次太守又改郡贊務為丞位在通守下縣尉為縣正尋改正為户曹法曹分司以丞通典隋郡太守如北齊九等之制至開皇三年罷天下諸郡以州統縣大業三年又改州為郡郡置太守本志宋齊以降天下分裂州郡漸衆及隋開皇初有州三百一十郡五百八以官煩人弊遂廢郡便以州親人則刺史如太守之職自後雖官名屢改而職事不易謹案隋開皇罷天下諸郡以州統縣以刺史為太守蓋因當時刺史之職别有行臺總管府以統理之而州郡紛煩其大小又適相等故舉諸郡而並廢之其後煬帝旋罷州置郡則刺史太守遂為郡守互名而漢刺史之職遂無復有存焉者至郡佐史之稱改易不一其于職掌則無異也唐唐六典上州刺史一人從三品下别駕一人從四品下長史一人從五品上司馬一人從五品下録事𠫭軍事一人從七品上録事二人從九品上史三人司功𠫭軍事一人從七品下司倉𠫭軍事一人從七品下佐三人史六人司户𠫭軍事二人從七品下佐三人史七人帳史一人司兵𠫭軍事一人從七品下佐三人史六人司法𠫭軍事二人從七品下佐四人史八人司士𠫭軍事一人從七品下佐四人史六人𠫭軍事四人執刀十五人典獄十四人問事八人白直二十人市令一人從九品上丞一人佐一人史二人倉督二人史四人中州刺史一人正四品上别駕一人正五品下長史一人正六品上司馬一人正六品下録事𠫭軍事一人正八品上録事一人從九品下史二人司功𠫭軍事一人正八品下佐二人史四人司倉𠫭軍事一人正八品下佐二人史四人司户𠫭軍事一人正八品下佐三人史五人帳史一人司兵𠫭軍事一人正八品下佐三人史四人司法𠫭軍事一人正八品下兼掌司士事佐三人史六人𠫭軍事三人正九品下執刀十人典獄十二人問事六人白直十六人市令一人丞一人佐二人史二人帥二人倉督二人史三人下州刺史一人正四品下别駕一人從五品上司馬一人從六品上録事𠫭軍事一人從八品上録事一人從九品下史二人司曹𠫭軍事一人從八品下兼掌司功事佐二人史四人司户𠫭軍事一人從八品下兼掌司兵事佐三人史五人帳史一人司法𠫭軍事一人從八品上兼掌司士事佐二人史四人𠫭軍事二人從九品下執刀十人典獄八人問事四人白直十六人市令一人佐一人史一人帥二人倉督一人史二人都督刺史掌宣布德化撫和齊人勸課農桑教諭五教每歲一巡屬縣觀風俗問百姓録囚徒恤鰥寡閲丁口務知百姓之疾苦內有篤學異能聞于鄉閭者舉而進之有不孝悌悖禮亂常不率法令者糾而繩之其吏在官公亷正已清直守節者必察之其貪穢諂諛求名徇私者亦謹而察之皆附于考課以為褒貶若善惡殊尤者隨即奏聞若獄訟之枉疑甲兵之徵遣興造之便宜符瑞之尤異亦以上聞其常則申于尚書省而已若孝子順孫義夫節婦志行聞于鄉閭者亦隨實申奏表其門閭若精誠感通則加優賞其孝悌力田者考使集日具以名聞其所部有須改更得以便宜從事若親王典州及邊郡都督刺史不可離州局者應巡屬縣皆委上佐行焉别駕長史司馬掌二府州之事以紀綱衆務通判列曹歲終則入奏記司録録事𠫭軍掌付事勾稽省署抄目糾正非違監守符印若列曹事有異同得以奏聞功曹司功𠫭軍掌官吏考課假使選舉祭祀嘉祥道佛學校表疏書啓醫藥陳設之事凡差使先差州官不充取縣官率一半已上不充取前資官其上佐録事𠫭軍縣令不得充使出境凡州縣及鎮倉督縣博士助教中下州市令及縣市令嶽瀆祝史並州選各四周而代州鎮倉督州縣市令取勳官五品已上及職資九品者若無通取勳官六品已下倉督取家世重大者為之州市令不得用本市內人縣市令不得用當縣人博士助教部內無者得于旁州通取縣録事通取部內勳官五品已上若無堪任者并佐史通取六品已下子及白丁充之倉曹司倉𠫭軍掌公廨度量庖厨倉庫租賦徴收田園市肆之事每歲據青苗徵稅畝别二升以為義倉以備凶年將為賑貸先申尚書待報然後分給又歲豐則出錢加時價而糴之不熟則出粟減時價而糶之謂之常平倉常與正義倉帳具本利申尚書省户曹司户𠫭軍掌户籍計帳道路逆旅田疇六畜過取蠲符之事而剖斷人之訴競凡男女婚姻之合必辨其族姓以舉其違凡井田利害之宜必止其爭訟以從其順凡官人不得于部內請射田地及造碾磑與人爭利兵曹司兵𠫭軍掌武官選舉兵甲器仗門户管鑰烽候傳驛之事法曹司法𠫭軍掌律令格式鞫獄定刑督捕盜賊糾逖姦非之事以究其情偽而制其文法赦從重而罰從輕使人知所避而遷善逺罪士曹司士𠫭軍掌津梁舟車舍宅百工衆藝之事啓塞必從其時役使不奪其力通山澤之利以贍貧人九州界內有出銅鐵處官不採者使百姓私採鑄得銅及白蠟官為市取如欲折充課役亦聼之其四邊無問公私不得治鐵冶及採銅自餘山川藪澤之利公私共之致瓌異之物以備國用是以官無禁利人無稽市凡知山澤有異寶異木及金玉銅鐵彩色雜物處堪供國用者奏聞𠫭軍事掌出使市令丞掌市廛交易禁斥非違之事下有執刀白直典獄佐史各有其職州縣之任備焉通典唐武德元年改郡為州改太守為刺史加號持節後如號為使持節諸軍事而實無節但頒銅魚符而已天寶元年加州為郡刺史為太守自是州郡史守更相為名其實則一太宗初理天下重親民之任疏督守之名于屏其人善惡必書其下是以州郡無不率理逮貞觀之末升平既久羣士多慕省閣不樂外任其折衝果毅有才力者先入為中郎將次補郡守其輕也如是武后垂拱二年詔諸州都督刺史宜準京官帶魚長安四年納言李嶠同平章事唐休璟奏曰竊以物議重內官而輕外職凡所出守多因貶纍非所以澄風俗安萬民臣請擇材于臺閣省寺之中分典大州共康庶政臣等請輟近侍率先具寮太后乃令書名探之中者當行于是鳯閣侍郎韋嗣立御史大夫楊再思二十人中之皆以本官撿校刺史後二十人中政績可稱者獨常州刺史薛光謙徐州刺史司馬鍾二人而已當時復有為員外刺史者不領州務開元中定天下州府自京都都督及都護府之外以近畿之州同華岐蒲為四輔鄭陜汴絳懷魏為六雄宋毫􅉸許汝晉洺虢衛相十州為十望又有十緊州後入緊者甚多不復具列及有上中下之差都督刺史品卑者借緋魚按武德令三萬户以上為上州永徽令二萬户以上為上州開元十八年三月敕太平時久户口日盛宜以四萬户以上為上州二萬五千户為中州不滿二萬户為下州亦有不滿户口以别敕為上州者天寶中通計天下凡上州一百九州中州二十九州下州一百八十九州總三百二十七州是也自至德之後州縣凋弊刺史之任大為精選諸州始各有兵鎮者刺史皆加團練使故其所責任重矣謹案唐自武德承隋代之制改郡為州凡天下之為郡守者皆以刺史名之天寶初加州為郡而刺史仍為太守自此以後刺史太守不常厥稱其以郡著者則稱太守以州著者則稱刺史名殊而實則一耳考舊唐書地理志所載諸縣以上皆稱為州蓋據武德初年之制而新唐書地理志則併而稱之曰某州某郡其無郡名者皆注郡缺二字于其下蓋據開元元年之制要其以之領縣而上屬于諸道採訪使則無異也又考二志所載州郡而外有都有府有都督府都護府及節度使觀察使團練使諸稱其曰都者東都西都北都以京邑所在而言之也其曰府者舊書則曰京兆河南太原新書則曰鳯翔成都河中江陵興元興德亦以京邑首府故從而尊稱之其散州郡則未有以府稱者然即此為後世以府稱郡之所由始至于都督節度等稱又以府使所治因以著其地域猶今之稱某布政使也唐自京邑稱府而諸州名目又各為列郡總號則如今之各府各直隸州固盡在列郡之中無他區别不容執其所稱為州者而即擬之以直隸州之名惟考渤海大氏建國之制有十五府以統領諸州其府如今之各府其州如今之各縣而别有郢銅涑三獨奏州不隸于府而直逹於其京國則獨奏州者實直隸州之所由昉歟自漢以州刺史領郡縣至隋而易為總管府至唐而改為諸道採訪使自是而州與郡同塗既而郡名漸易為府而州又漸為諸府之屬惟不屬于府者始有直隸之稱其沿革相仍總由唐代而漸變也五季文獻通考五代仍刺史之號五代會要後唐長興三年四月中書門下奏案十道圖以關內道為上遂以鳯翔為首河中成都江陵興元為次中興初升魏州為興唐府鎮州為真定府皆是創業興王之地請升二府于五府之上合為七府仍以興唐為首真定鳯翔河中成都江陵興元為次從之謹案唐以藩鎮創業之地升郡為府五代因之而興唐真定二府復為後唐之特設蓋以興王之區特異其制將以殊别于諸郡耳郡曰守府曰尹體制雖殊職掌則一也宋文獻通考宋太祖革五季之患分命朝臣出守列郡號權知軍州事軍謂兵州謂民政焉其後文武官𠫭為知州軍事二品以上及帶中書樞密院宣徽使職事稱判太守掌總理郡政宣布條教導民以善而糾其姦慝歲時勸課農桑旌别孝悌其賦役錢穀獄訟之事兵民之政皆總焉凡法令條制悉意奉行以率所屬有赦宥則以時宣讀而頒告于治境舉行祀典察郡吏德義材能而保任之若疲軟不任事或姦貪冒法則按劾以聞遇水旱以法賑濟安集流亡無使失所若河南應天大名府則兼留守司公事太原府延安府慶州渭州熙州秦州則兼經略安撫使馬步軍都總管定州真定府瀛州大名府京兆府則兼安撫使馬步軍都總管瀘州潭州廣州桂州雒州則兼安撫使兵馬鈐轄潁昌府青州鄆州許州鄧州則兼安撫使兵馬巡檢其餘大蕃府或沿邊州郡或當一道衝要者並兼兵馬鈐轄巡檢都監或帶沿邊安撫提轄兵甲沿邊溪洞都巡檢餘州軍則否其屬官有無及員數多寡皆視其地望之髙下與職務之繁簡而置之建炎元年詔河北京東西路除帥臣外舊差文臣知州去處許通差武臣一次後詔要郡帶本路兵馬鈐轄次要郡帶本路兵馬都監紹興三年罷元年七月䛇要郡文臣帶本路兵馬鈐轄武臣副之次要郡文臣帶本路兵馬都監武臣副之令逐州改正稱呼至紹興三年臣僚言既與異時沿邊事體不同又于今日諸州統制無補徒著名位以成虛文䛇並罷之五年令郡守除授罷並令上殿凡從官出知郡者特許不避本貫詔應守臣以三年為任六年詔控扼去處守臣並以三年為任九年罷宋史職官志次府牧尹少尹司録户曹法曹士曹司理文學助教牧尹以下所掌並同開封尹闕則知府事一人以朝官及刺史以上或諸司使充通判一人以京朝官充乾德初諸州置通判統治軍州之政事得専達與長史均禮大藩或置兩員户少事簡有不置者正刺史以上州知州雖小亦特置謹案隋以前未有府之名其以京郡名府者自唐始五代復因而增之至宋則潛藩之地皆升為府而府之名遂衆南北朝以前未有以州稱郡者改郡為州自隋唐始其後州郡迭稱至宋而有有郡之州有無郡之州而州之名遂判于郡自古未有以軍及監名其地自唐中葉藩鎮自専各立軍號至宋而遂有軍監之目古者州郡之長皆稱曰牧守刺史其以知府知州知軍監稱者實自宋始其初分命朝臣出守列郡謂之權知軍州事開封諸府牧尹不常置置權知府事蓋非其本任特假朝官以知其事而已其後以文武官𠫭為知州軍事二品以上則稱判某府州軍監而諸府皆置知府事州軍監亦如之自此以後刺史特以為虛階而郡守之稱皆曰知府州牧之稱皆曰知州矣考宋代之所謂知州者皆以州領縣無有為郡所屬之散州而府名雖衆要以為尊崇之特稱則其所謂府尹所謂知州乃正今之知府也但州分上中下之差或以縣升州或以州改縣而軍監之設多與下州相等則今之直隸州未嘗不統括于諸州之中特未有以殊其名耳文獻通考宋藝祖懲五代藩鎮之弊乾德初下湖南始置諸州通判命刑部郎中賈玭等充建隆四年詔知府公事並須長史通判簽議連書方許行下時大郡置兩員西京南京天雄成德益杭并晉荆南潭廣秦定等州餘置一員州不及萬户不置廣南小州有試秩充通判兼知州者正刺史以上及諸司使副知州者雖小郡亦特置天聖三年中書門下言新授虢州團練使田敏知隰州自來防刺史赴本任及知州無同判處權置同判候差朝官及內職知州即行省罷掌倅二郡政與長史均禮凡兵民錢穀户口賦役獄訟聽斷之事可否裁決與守通簽所部官有善否及職事修廢得刺舉以聞至景德間宋興三十四年户口寖息解州以滿萬户置通判自是諸郡多滿萬户矣宣和二年詔諸州茶鹽香􅈨並委通判建炎初諸州通判二員減一員紹興五年以後旋行申請添置帥府通判並以兩員為額謹案洪邁容齋隨筆淳化中趙安易官宗正少卿已知州就徙定州通判羅延吉既知彭祁絳三州而除通判廣州滕中正知興元府而通判河南袁郭知楚鄆二州而通判房州范正辭既知戎淄二州而通判棣深又陳若拙厯知單州殿中侍御史西川轉運使召歸會李至守洛乃表為通判久之柴禹錫鎮涇州復表為通判連下遷而皆非貶降此皆宋初權宜位置無例可拘後則不復有也又通考云宋祖設通判以儒臣臨制之號稱監州官雖郡佐而其人間有出于朝廷之特命不以官資之崇卑論者其與後來之汛泛以半刺稱者不侔矣據此以見通判一官後之所謂間職者其在宋時則為州郡最要之任蓋因削藩鎮而重知州之權因重軍州而嚴通判之選其事勢有相因者也文獻通考宋沿唐制州有録事𠫭軍然不盡置也諸府為司録諸州為録事乾興元年丁度申請諸州始各置録事𠫭軍慶厯二年河西河東陜西諸州權令京官知録事𠫭軍熙寧三年詔繁難去處録事𠫭軍並差職官知縣及奏舉縣令人充政和三年尚書省言州建六曹𠫭軍𠫭軍之稱起于行軍之際恐不當襲録事參軍欲改為司録奉旨𠫭軍改為掾建炎初復舊名録事掌州縣庶務糾諸曹稽違乾道中汪大猷申請依司理例不兼他職從之遼遼史百官志南面大藩府官黃龍府知黃龍府事興宗重熙十三年見知黃龍府事耶律烏魯斯蒙古語國也原作甌里斯今改正同知黃龍府事黃龍府判官興中府知興中府事咸雍元年知興中府事楊績同知興中府事興中府判官南面方州官某州刺史某州同知州事耶律圖丹唐古特語全力也原作獨攧今改正重熙中同知金肅軍事某州録事𠫭軍世宗天祿五年詔州録事𠫭軍委政事省差注謹案遼五京列峙悉為畿甸其方州諸官有府有州而知州亦稱刺史至刺史外尚設有團練防禦等使其職守所在止于一州比于今之直隸州知州蓋相近矣金金史百官志諸刺史州刺史一員正五品掌同府尹兼治州事同知一員正七品通判州事判官一員從八品簽判州事専掌通檢推排簿籍司軍從九品知法一員軍轄兼巡捕使從九品司吏女直韓慶信灤薊通登復貴德涿利建州來逺軍各三人餘各二人抄事一人公使上州五十中四十五下四十惟來逺軍同下州省同知凡諸州以上知印並于孔目官內輪差運司押司官並同無孔目官以上各司吏充司縣同此諸防刺州司候司司候一員正九品司判一員從九品司吏公使七人然亦驗户口置諸司獄司司獄一員正九品提控獄囚司吏一人公使二人典獄二人防守獄囚門禁啓閉之事獄子防守罪囚者諸倉使正八品副使正九品掌倉廪畜積受納租稅支給祿廩之事攢典掌收支文厯行署案牘歲收一萬石以上設二人倉子掌斛斗盤量出納看守之事元元史百官志總管府司獄司司獄一員丞一員府倉大使一員副使一員稅務提領一員大使副使各一員録事司秩正八品凡路府所治置一司以掌城中户民之事中統二年詔驗民户定為員數二千户以上設録事司候判官各一員二千户以下省判官不置至元二十年置達嚕噶齊解見户部篇一員省司候以判官兼捕盜之事典史一員若城市民少則不置司歸之倚郭縣在兩京則為警巡院獨杭州置四司後省為左右兩司散府秩正四品達嚕噶齊一員知府或府尹一員領勸農奧魯與路同同知一員判官一員推官一員知事一員提控案牘一員所在有隸諸路及宣慰司行省者有直隸省部者有統州縣者有不統縣者其制各有差等諸州中統五年併立州縣未有差等至元三年定一萬五千户之上者為上州六千户之上者為中州六千户之下者為下州江南既平二十年又定其地五萬户之上者為上州三萬户之上者為中州不及三萬户者為下州于是升縣為州者四十有四縣户雖多附路府者不改上州達嚕噶齊州尹秩從四品同知秩正六品判官秩正七品中州達嚕噶齊知州並正五品同知從六品判官正八品兼捕盜之事𠫭佐官上州知事提控案牘各一員中州吏目提控案牘各一員下州吏目一員或二員謹案元制總管府之下有録事司如今各直省之首府有散府與今各府相近而所隸各異其隸各路行省者制與今同其直隸省部者則不與今同也元諸州亦有領縣不領縣之分然地理志所載即不領縣之州亦得與諸散府並列以直達于各路惟腹裏諸路則以路領府以府領州而州又自領縣其制與今各府所領之州又不甚相合也明明史職官志府知府一人正四品同知正五品通判無定員正六品推官一人正七品其屬經厯司經厯一人正八品知事一人正九品照磨所照磨一人從九品撿校一人司獄司司獄一人知府掌一府之政宣風化平獄訟均賦役以教養百姓每三歲察屬吏之賢否上下其考以達于省上吏部凡朝賀弔祭視布政使司直隸府得専達凡詔赦例令勘劄至謹受之下所屬奉行所屬之政皆受約束于府劑量輕重而令之大者白于撫按布按議允乃行凡賓興科貢提調學校修明祀典之事咸掌之若籍帳軍匠驛遞馬牧盜賊倉庫河渠溝防道路之事雖有専官皆總領而稽核之同知通判分掌清軍巡捕管糧治農水利屯田牧馬等事無常職各府所掌不同如延安延綏同知又兼牧民餘不盡載無定員邊府同知有增至六七員者推官理刑名計典各府推官洪武三年始設經厯照磨撿校受發上下文移磨勘六房卷宗明初改諸路為府洪武六年分天下府三等糧二十萬石以上為上府知府秩從三品二十萬石以下為中府知府正四品十萬石以下為下府知府從四品已並為正四品七年減北方府州縣官三百八人十三年選國子學生二十四人為府州縣官六月罷各府照磨二十七年復置自宣德三年棄交址布政司計天下府凡一百五十有九茶馬司大使一人正九品副使一人從九品掌市馬之事洪武中置洮州秦州河州三茶馬使設司令司丞十五年改設大使副使各一人尋罷洮州茶馬司以河州茶馬司兼領之三十年改秦州茶馬司為西寧茶馬司又洪武中置四川永寧茶馬司後革復置雅州碉門茶馬司又于廣西置慶逺裕民司洪武七年置設大使一人從八品副使一人正九品市八番溪洞之馬後亦革稅庫司府曰司大使一人從九品典稅事凡商賈儈屠雜市皆有常征以時榷而輸其直于府凡民貿田宅必操契劵請印乃得收户則征其直百之三明初改在京官店為宣課司府州官店為通課司後改通課司為稅課司局倉大使一人府從九品副使一人批驗所大使一人副使一人掌驗茶鹽引又直隸州知州一人從五品同知從六品判官無定員從七品里不及三十而無屬縣裁同知判官有屬縣裁同知其屬吏目一人凡州有直隸州視府而品秩則同同知判官俱視其州事之繁簡以供厥職謹案知府直隸州知州之職至明代而始定其僚佐首領各因事之繁簡而置員所以總領各州縣之政治以聽于兩司及督撫實為方面要職厯稽往代郡國之政績兩漢循吏多見稱于史傳其職郡守之職重監司之秩輕為二千石者得以便宜展布而璽書慰勞增秩賜金其優異者或入為公卿所以奬厲之者甚至此治郡之所以多著聞也魏晉以後郡守多帶將軍持節不専以化導齊民為職而州牧刺史都督之權益重故郡職多不克以自效唐初重親民之官書名屏風記其善惡而郡政無不就理其後內職重外任輕凡在郡守多以京僚貶黜者為之後此更用武人大都不諳治理州郡失職而藩鎮得以専恣矣宋代用朝臣知府州軍監以削黜列鎮之權其出知州軍者多有名臣重望著效卓然為一代偉績而其後文武兼差兵馬鈐轄安撫提轄諸職率兼領之則亦未遑専心于民政也明初甚重府州之治天下州縣官廉能正直者必遣行人齎敕勞賜以示勸勵逮中葉以後督撫巡按藩臬指揮之臨其上者既不免于朘剝之日繁而銓選率由資格庸懦無能者轉視為持祿養拙之藪而良二千石之風遂不可復問矣我朝澄清吏治首重親民之任以府州為諸縣統率尤隆其選視缺之繁簡劇易或請旨除授或由督撫奏調或由部銓選內則由部員簡放外則由州縣著績最優者記名擢用條格極其周備諸府授任之初得蒙召對訓示周詳俾守土者得以稟承而宣布之又特命書名殿扆以時省覽而察其殿最所以淬厲之者靡所不至是以吏績官方逺軼前古夫豈漢唐之所得幾及萬一哉又按設官分職詳於周禮周禮醫師巫祝馮相保章等官皆王朝之官而侯國之制無聞傳曰天子有日官諸侯有日御而魯之卜士晉之卜人秦之太醫令亦往往見於傳記則當時列國之官當亦視王朝而舉其職矣漢紀代王有卜人史記濟北有太醫齊有侍醫知漢諸侯王國皆擇習醫術長於陰陽者分授以官而當時郡縣錯在諸國間故太守令長之屬不更設陰陽醫學若後世建侯已異漢制而此諸官者復不設諸郡縣則衛民之道殊為有闕考府州設醫學博士至唐始備其制而後世因之魏書始有釋老之志而北齊之昭元寺置大統諸員以官諸州縣沙門曹則州縣之僧官實始於此後周置司寂司元掌法門道門之政隨改諸郡縣佛寺為道場道觀為元壇而各置監丞即今僧綱道紀之職所由昉矣陰陽立學始於元時蓋諸路總官府設陰陽教授明則陰陽正術典術各設其官亦相因也我朝斟酌往制府州縣醫學僧道俱沿明之舊隂陽學則易縣典術為訓術勤民任職纖悉盡制夫醫術為民生所最切而陰陽領之於官則有以絶妖妄之術至釋道二教由來已久徒類既繁尤當設官為之檢束伏讀乾隆元年上諭有云僧道竊二氏之名無修持之實但原天地好生之意不忍一物不得其所此庸愚無知之僧道亦天下之一物耳大哉皇言視周官物為之制而官失其守者實能推廣以神眀其法所謂盡人物之性與天地𠫭焉者也第此類流品猥雜俱由所轄有司擇其明習術數及格守規律者上諸巡撫咨部給與劄牒蓋即庶人在官之類與品官不同故即附諸府州縣官之後不著於表而論之如此欽定厯代職官表卷五十三
