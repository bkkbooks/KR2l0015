  text: 上諭
  hash: sha256:d9681de8422ec2bda611dd935d5788fed6871fd97a121105a6aedc029b67eccf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0015_WYG_001-1a, image: WYG0601/WYG0601-0001a.png}
body:
  text: 乾隆四十五年九月十七日奉上諭國初設官分職不殊周官法制及定鼎中原參稽前代不繁不簡最為詳備其間因革損益名異實同稽古唐虞建官惟百內有百揆四嶽外有州牧侯伯奮庸熙載亮采惠疇周則監于二代立三公三孤秦漢以後為丞相為中書門下平章知政事眀洪武因胡惟庸之故改丞相為大學士其實官名雖異職守無殊惟在人主太阿不移簡用得人則雖名丞相不過承命奉行即改稱大學士而所任非人竊㺯威福嚴嵩之流非仍名大學士者乎蓋有是君方有是臣惟后克艱厥后庶臣克艱厥臣昔人言天下之安危係乎宰相其言實似是而非也至六官即今之六部周禮典制綦詳要亦本于唐虞司徒秩宗諸職外而督撫自秦漢以來所稱守牧節度行省即唐虞十二牧之遺厯朝改革建置紛如難以勝數我國家文武內外官職品級載在大清會典本自秩然至于援古證今今之某官即前某代某官又或古有今無或古無今有允宜勒定成書昭垂永久俾覽者一目了然現在編列四庫全書遺文畢集著即𣲖總纂總校之紀昀陸錫熊陸費墀孫士毅等悉心校核將本朝文武內外官職階級與厯代沿襲異同之處詳稽正史博參羣籍分晰序説簡明精審毋冗毋遺其議政大臣領侍衛內大臣八旗都統護軍統領健鋭火器營內務府並駐防將軍及新疆增置各官亦一體詳晰考證分門别類纂成厯代職官表一書由總裁覆核陸續進呈候朕閲定書成後即以此旨冠于卷首不必請序列入四庫全書刋布頒行以昭中外一統古今美備之盛因首論丞相一官餘可類推覽是編者其各顧名思義凜然于天工人代兢兢業業夙夜靖共以庶幾克艱無曠之義欽哉特諭欽此乾隆四十八年十月初二日奉上諭朕閲館臣所進職官表志詹事府一門其按語內稱詹事為東宫官屬我國家萬年垂統家法相承不事建儲册立詹事府各員留以備詞臣遷轉之階等語是書館臣因朕前降諭旨子建儲一事之斷不可行明切訓示故據按語內特為揭出其實書生拘迂之見豈能深計及此且使是書留傳後世安知不又訾議館臣為無奈迎合諭旨非其本懷耶用是不得不再為明白宣諭夫堯授舜舜授禹唐虞固公天下即禹之傳啓亦非于在位時有建立太子之事三代以後人心不古秦漢預立太子其後爭奪廢立禍亂相尋不可枚舉逺而唐髙祖立建成為太子至於兄弟相殘建成被害近而明神宗朝羣臣奏請預立國本紛紜擾亂大率皆為後來希榮固寵之地甚至宵小乘間伺釁釀為亂階如挺擊等案神宗召見太子泣為慰藉父子之間至於如此閲之真可寒心可知建儲册立非國家之福召亂起釁多由于此即以我朝而論皇祖時理密親王亦嘗立為皇太子且特選公正大臣如湯斌者為之輔導乃既立之後情性乖張即湯斌亦不能有所匡救羣小復從而蠱惑遂至屢生事端上煩皇祖聖慮終至廢黜且即理密親王幸而無過竟承大統亦不過享國二年其長子𢎞晳縱欲敗度不克幹蠱年亦不永使相繼嗣立不數年間連遭變故豈我大清宗社臣民之福乎是以皇祖有鑒于兹自理密親王既廢不復建儲逮我皇祖龍馭上賓傳位皇考紹登大寶十三年勵精圗治中外肅清皇考敬法前徽雖不預立儲位而于宗袥大計實早為籌定雍正元年即親書朕名緘藏於乾清宫正大光明匾內又另書密封一匣常以隨身至雍正十三年八月皇考升遐朕同爾時大臣等敬謹啓視傳位于朕之御筆復取出內府緘合密記合對吻合人心翕然此天下臣民所共知者也朕登極之初恪遵家法以皇次子乃孝賢皇后所生嫡子為人端重醇良依皇考之例曽書其名藏於乾清宫正大光明匾額後乃稟命不融未幾薨逝遂命大學士鄂爾泰張廷玉將其名撤出追諡為端慧皇太子是未嘗不立嫡也但不以明告衆耳嗣後皇七子亦孝賢皇后所出秉質純粹深愜朕心惜不久亦即悼傷其時朕視皇五子於諸子中覺貴重且漢文滿洲蒙古語馬步射及算法等事並皆嫻習頗屬意於彼而未明言乃復因病旋逝設依書生之見規仿古制繼建元良則朕三十餘年之內國儲凡三易尚復成何事體是以前於癸巳年復書所立皇子之名藏於匣內常以自隨是年南郊大祀令諸皇子在壇襄事曽以所定皇子默禱於上帝若所定之子克承堂構則祈昊蒼眷佑俾得年命延長倘非天意所屬則速奪其算朕亦可另為選擇毋悮我國家宗社生民重寄本年恭詣盛京祇謁祖陵亦如告天之言默祝於太祖太宗之前仰祈靈爽式憑永垂昭鑒朕非不愛子也朕以宗社為重若朕之子孫皆以朕此心為心實大清國億萬斯年之福也今日召對諸皇子及軍機大臣面降此旨即朕前所默告上帝祖宗之言豈容有絲毫虛飾耶朕於天下一切庶務無不宵旴勤求悉心籌畫寧于繼體托付之重轉不早為定計乎秋間朕於避暑山莊河岸御鎗打鵁鶄失足落水濕衣其時不特御前王公大臣等聞知俱即趨至問安即漢軍機大臣亦接踵前赴該處朕仍率伊等談笑而行並未有因內廷禁地太監等敢于阻止設朕起居偶有違和大臣等俱可直詣寢所此皆由朕平日君臣一體無日不接見諸臣面承諭旨何至有若前代夜半禁中出片紙之語為杞人之憂乎總之建儲一事即如井田封建之必不可行朕雖未有明詔立儲而於天祖之前既先為齋心默告實與立儲無異但不似往代覆轍之務虛名而受實禍耳故現在詹事官屬雖沿舊制而其實一無職掌祇以備員為翰林升轉之資耳因再明切宣諭我子孫其各敬承勿替庶幾億萬年無疆之休其在斯乎總之此事朕亦不敢必以為是其有欲遵古禮為建立之事者朕亦不禁俟至於父子兄弟之間猜疑漸生釀成大禍時當思朕言耳並諭館臣將此旨冠於是編之首俾天下萬世咸知朕意欽此
