  - {type: page-break, offset: 0, content: '', id: KR2l0015_WYG_021-1a, image: WYG0601/WYG0601-0287c.png}
body:
  text: 工部下歷代建置下唐新唐書百官志工部尚書一人正三品侍郎一人正四品下掌山澤屯田工匠諸司公廨紙筆墨之事其屬有四一曰工部二曰屯田三曰虞部四曰水部工部郎中員外郎各一人掌城池土木之工役程式為尚書侍郎之二凡京都營繕皆下少府將作共其用役千功者先奏凡工匠以州縣為團五人為火五火置掌一人四月至七月為長功二月三月八月九月為中功十月至正月為短功雇者日為絹三尺凡津梁道路治以九月工部主事三人屯田主事二人虞部主事二人水部主事二人武德三年改起部曰工部龍朔二年曰司平屯田曰司田虞部曰司虞水部曰司川光宅元年改工部曰冬官天寶十一載改虞部曰司虞水部曰司水工部有令史十二人書令史二十一人計史一人亭長六人掌固八人屯田令史七人書令史十一人計史一人掌固四人虞部令史四人書令史九人掌固四人水部令史四人書令史九人掌固四人屯田郎中員外郎各一人掌天下屯田及京文武職田諸司公廨田以品給焉虞部郎中員外郎各一人掌京都衢閧苑囿山澤草木及百官蕃客時蔬薪炭供頓畋獵之事每嵗春以户小兒户婢仗內蒔種溉灌冬則謹其䝉覆凡郊祠神壇五嶽名山樵採芻牧皆有禁距壝三十步外得耕種春夏不伐木京兆河南府三百里內正月五月九月禁弋獵山澤有寶可供用者以聞水部郎中員外郎各一人掌津濟船艫渠梁堤堰溝洫漁捕運漕碾磑之事凡坑陷井穴皆有標京畿有渠長斗門長諸州堤堰刺史縣令以時檢行而蒞其决築有埭則以下户分牽禁爭利者舊唐書職官志將作監龍朔改為繕工監光宅改為營繕監神龍復為將作監也大匠一員從三品少匠一員從四品下掌供邦國修建土木工匠之政令總四署三監百工之官屬以供其職事凡兩京宫殿宗廟城郭諸臺省監寺廨宇樓臺橋道謂之內外作皆委焉丞四人主簿二人録事二人府十四人史二十八人計史三人亭長四人掌固六人左校署令二人從八品下丞四人府六人史十二人監作十人掌供營搆梓匠凡宫室樂懸簨簴兵仗器械喪葬所須皆供之右校署令二人從八品下丞三人府五人史十人監作十人典事十四人掌供版築泥塗丹艧之事中校署令一人從八品下丞三人府三人史六人監事四人典事八人掌固二人掌供舟車兵仗厩牧雜作器用之事凡行幸陳設供三梁竿柱間厩供銼碓行槽祭祀供葛竹塹等甄官署令一人從八品下丞二人府五人史十人監作四人典事十八人掌供琢石陶土之事凡石磬碑碣石人獸馬碾磑磚瓦瓶缶之器喪葬明器皆供之百工就谷庫谷斜谷太隂伊陽等監皆在出材之所監各一人從七品下丞一人府各一人史三人典事各二十一人録事各一人監事四人掌採伐材木謹按唐制凡興建修築材木工匠俱工部下少府將作以供其事與隋代相同蓋將作未併入工部以前工部所掌惟程式制度其繕造之物固専屬之將作也唐六典都水監使者二人正五品上掌川澤津梁之政令凡漁捕之禁衡虞之守皆由其屬而總制之凡京畿之內渠堰陂池之壞决則下於所由而後修之丞二人從七品上主簿一人舟楫署令一人正八品下丞二人正九品下掌公私舟船及運漕之事河渠署令一人正八品下丞一人正九品下掌供川澤魚醢之事諸津令一人正九品上丞一人從九品下各掌其津濟渡舟梁之事謹案都水之職至唐已全歸於水部故舟楫署在開元末已廢見新唐書百官志而河渠署所掌不過供祭祀及尚食之魚鮮亦僅存空名而已五季五代史本紀梁開平四年工部侍郎杜曉唐同光元年工部郎中李塗天成元年工部尚書任圜四年趙鳯為門下侍郎兼工部尚書周顯德元年工部侍郎景範五年水部員外郎韓彥卿五代史列傳張憲拜工部侍郎租庸使憲本傳范延光拜檢校工部尚書延光本傳崔協除工部郎中于鄴盧文紀傳中書舍人盧價為工部侍郎馮玉傳賈緯為太常博士改屯田員外郎緯本傳張允鎮纍遷水部員外郎知制誥允鎮夲傳王延拜補闕兼水部員外郎延本傳謹案五季工部官制並依唐制而史文不詳今採見於紀傳者以著其略宋宋史職官志工部掌天下城郭宫室舟車器械符印錢幣山澤苑囿河渠之政凡營繕嵗計所用財物關度支和市其工料則飭少府將作監檢計其所用多寡之數凡百工其役有程而善否則有賞罰兵匠有闕則隨以緩急招募籍坑冶嵗入之數若改用錢寶先具模製進御請書造度量權衡則關金部印記則關禮部凡道路津梁以時修治舊制判部事一人以兩制以上充元豐並歸工部其屬三曰屯田曰虞部曰水部設官十尚書侍郎各一人工部屯田虞部水部郎中員外郎各一人元祐元年省水部郎官一員紹聖元年詔屯田虞部互置郎官一員兼領尚書掌百工水土之政令稽其功緒以詔賞罰總四司之事侍郎為之二若制作營繕計置採伐所用財物案其程式以授有司郎中員外郎參掌之應官吏兵民緣本曹事有功賞罪罰則審實以上尚書省若諸監鼓鑄錢寶按年額而課其數因其登耗以詔賞罰凡車輦飭器印記之造則少府監文思院𨽻焉甲兵器械之制則軍器所𨽻焉有合支物料工價則申於朝以屬户部建炎併將作少府軍器監並歸工部是時營繕未遑惟戎器方急紹興二年詔於行在别置作院造器甲令工部長二提㸃郎官逐旬㸃檢少府監既歸工部文思院上下界監官並從本部辟差又詔御前軍器所𨽻工部隆興以後宫室器甲之造寖稀且各分職掌部務益簡特提其綱要焉分案六曰工作曰營造曰材料曰兵匠曰檢法曰知雜又専立一案以御前軍器案為名裁減吏額共置四十二人侍郎掌二尚書之事南渡初長二互置隆興詔各置一員郎中員外郎舊制凡制作營繕計置採伐材物按程式以授有司則參掌之建炎三年詔工部郎官兼虞部屯田郎官兼水部隆興元年詔工部屯田共一員兼領自此四司合為一矣淳熙九年以趙公廙為屯田員外郎自是不復省屯田郎中員外郎掌屯田營田職田學田官莊之政令及其租入種刈興修給納之事凡塘濼以時增減堤堰以時修葺并有司修葺種植之事以賞罰詔其長二而行之分案三置吏八虞部郎中員外郎掌山澤苑囿場冶之事辨其地産而為之厲禁凡金銀銅鐵鉛錫鹽礬皆計其所入登耗以詔賞罰分案四置吏七水部郎中員外郎掌溝洫津梁舟楫漕運之事凡堤防决溢疏導壅底以時約束而計度其嵗用之物修治不如法者罰之規畫措置為民利者賞之分案六置吏十有三紹興纍减吏額四司通置三十三人文獻通考文思院宋太平興國三年置掌造金銀犀玉工巧之物金彩繪素裝鈿之飾以供輿輦冊寶法物及凡器服之用𨽻少府監紹興三年詔少府監併歸文思院其監官從工部辟差工部言所轄文思院舊分上下界監官三員內一員文臣係京朝官上界造作金銀珠玉下界造作銅鐵竹木雜料欲依舊分為上下界從之隆興二年詔併禮物局入文思院李心傳建炎以來朝野雜記四提轄文思院其一也監官分上下兩界而轄官兼綜之先是轄官外補為州內遷則寺監丞簿近嵗望稍輕往往更遷六院官或出為添倅謹案文思院為宋四轄官之一初屬少府監後乃併𨽻工部蓋即如今之製造庫其以文思為名則取考工記量銘時文思索允臻其極之義也宋史職官志將作監舊制判監事一人以朝官以上充元豐官制行始正職掌置監少監各一人丞主簿各二人監掌宫室城郭橋梁舟車營繕之事少監為之二丞參領之凡土木工匠板築造作之政令總焉辨其才幹器物之所須乘時儲積以待給用庀其工徒而授以法式凡營造有計帳則委官覆視定其名數驗實以給之嵗以二月治溝渠通壅塞乘輿行幸則預戒有司潔除均布黃道凡出納籍帳嵗受而㑹之上於工部熙寧初以嘉慶院為監其官屬職事稽用舊典已而盡追復之元祐七年詔頒將作監修成營造法式八年又詔本監營造檢計畢長二隨事給限丞簿覆檢崇寧五年詔將作監應承受前後特㫖應副外路并府監修造差撥人工物料遵執元豐條格不得應副宣和五年詔罷營繕所歸將作監分案五置吏二十有七所𨽻官屬十修內司掌宫城太廟繕修之事東西八作司掌京畿內外繕修之事竹木務掌收諸路水運材植及抽算諸河商販竹木以給內外營造之用事材場掌計度材物前期朴斫以給內外營造之用麥場掌受京畿諸縣夏租䴰以給圬墁之用窰務掌陶為磚瓦以給營繕及瓶缶之器丹粉所掌燒變丹粉以供繪飾作坊物料庫第三界掌儲積財物以備給用退材場掌受京畿內外退棄財物掄其長短有差其曲直中度者以給營造餘備薪爨簾箔場掌抽算竹木蒲葦以供簾箔內外之用建炎三年詔將作監併歸工部紹興三年復置丞仍兼總少府之事十年置主簿一員十一年詔依司農太府寺置長二一員隆興初宫室無所營繕百工器用屬之文思院以𨽻工部本監惟置丞一員餘官虛而不除乾道以後人材甚多監少丞簿無闕凡臺省之久次與郡邑之有聲者悉寄徑於此自是號為儲才之地而營繕之事多俾府尹畿漕分任其職焉文獻通考修內司監官二人以朝官及內侍充東西八作司勾當官各三人以京朝官諸司使副充竹木務勾當官一人以京朝官充事材場監官二人以京朝官三班使臣充麥場監官一人以三班使臣充窰物監官三人諸司使副充丹粉所監官一人內侍充作坊物料庫監官三人以京朝官及內侍三班使臣充退材場監官一人以京朝官充簾箔場監官二人以京朝官充謹案宋將作監官屬據史所載職掌以今制凖之修內司八作司當為今營繕司之事竹木務事材場當為今皇木厰木倉二監督之事窰務當為今窰厰監督之事簾箔場當為今製造庫所屬門簾庫之事然考曹士冕法帖譜系載有修內司帖為淳熙十二年修內司奉㫖模勒上石又陶宗儀輟耕録載渡江後有邵成章置窰於修內司造青器名內窰則是修內司又兼司鐫刻陶冶之事不止宫城太廟之工作矣今故互見內務府表內云李壽續資治通鑑長編嘉祐三年十一月己丑詔曰天下利害繫於水為深自禹制橫潰功施三代漢用平當領河堤劉向護都水皆當時名儒風迹可觀近世以來水官失職宜修舊制庶以利民其置在京都水監凡內外河渠之事悉以委之應官屬及本司合行條制中書門下裁處以聞以御史知雜吕景初判監鹽鐵判官領河渠司事楊佐同判河渠司勾當公事孫琳王叔夏知監丞事宋史職官志都水監判監事一人以員外以上充通判監事一人以朝官以上充丞二人主簿一人並以京朝官充輪遣丞一人出外治河掃之事或一嵗再嵗而罷其有諳知水政或至三年置局於澶州號曰外監元豐正名置使者一人丞二人主簿一人使者掌中外川澤河渠津梁堤堰疏鑿浚治之事丞參領之凡治水之法以防止水以溝蕩水以澮寫水以陂池瀦水凡江淮海所經都邑皆頒其政令視汴洛水勢漲涸增損而調節之凡河防謹其法禁嵗計茭楗之數前期儲積以時頒用各隨其所治地而任其責興役至十月止民功則隨其先後毋過一月若導水溉田及疏治壅積為民利者定其賞罰凡修堤岸植榆栁則視其勤惰多寡以為殿最南北外都水丞各一人分職蒞事即干機速非外丞所能治則使者行視河渠事元祐四年復置外都水使者五年詔南北外都水丞並以三年為任祥符二年詔罷北外都水丞以河事委之漕臣三年復置宣和元年工部尚書王詔言乞選差曽任水官諳練者為南北兩外丞從之宣和三年詔罷南北外都水丞司依元豐法通差文武官一員分案七置吏二十有七所𨽻有街道司掌轄治道路人兵若車駕行幸則前期修治有積水則疏導之建炎三年詔都水監置使者一員紹興九年復置南北外都水丞各一員南丞於應天府北丞於東京置司十年詔都水事歸於工部不復置官續資治通鑑長編嘉祐二年置街道司指揮兵士以五百人為定額謹案宋史河渠志凡修濬防築皆領於都水監當時在外者别無専領河務之官故都水監雖立署京師而實綜司措置有事或親往相度蓋兼有今河道總督之職與都水司但掌河工程式者不同至南北外都水丞則置司外郡當如今各省管河道員之職尤與京局有殊今故别詳於河道各官表內至街道司為都水監屬而嘉祐二年都水監尚未設官已有置街道司指揮兵士之文見於通鑑長編是必先有此職後始來屬特史文不詳其初𨽻何署耳章俊卿山堂考索嘉祐中京師大水始取三司之河渠案置都水監元豐官制復以三司胄曹案歸之軍器監修造案之事歸之將作監三監皆𨽻工部陸遊老學庵筆記元祐初蘇子由為户部侍郎建言都水監本三司之河渠案將作監本三司之修造案軍器監本三司之胄案三司今户部而三監乃屬工部請三監皆兼𨽻户部凡有所為户部定其事之可否裁其費之多寡而工部任其工之良楛程其作之遲速朝廷從其言為立法及紹聖中以為害元豐官制罷之建中靖國中或欲復從元祐已施行矣時豐相之為工部尚書獨持不可曰設如都水監塞河軍器監造軍器而户部以為不可則已矣若以為可則併任其事可也今若户部吝其費裁損之乃令工部任河之决塞器之利鈍為工部者不亦難乎議遂寢謹案據章俊卿陸游所紀則宋之將作都水二監雖各置長二實為工部所統屬故都水後遂併入工部將作雖復置而嵗㑹籍帳亦必上於工部也至軍器一監其職亦今虞衡司所有事而當時御前軍器皆歸其造作與今武備院所掌尤近故列入內務府表內焉遼遼史百官志宣徽北院太宗㑹同元年置掌北院御前祗應之事北院宣徽使知北院宣徽事北院宣徽副使同知北院宣徽事宣徽南院㑹同元年置掌南院御前祗應之事南院宣徽使知南院宣徽事南院宣徽副使同知南院宣徽事遼史本紀聖宗統和元年虞部員外郎崔祐分决滯獄開泰二年户部侍郎劉涇加工部尚書興宗景福元年十月工部尚書髙德順使宋重熙十七年將作少監王全使夏遼史文學傳李浣授翰林學士穆宗即位纍遷工部侍郎遼史百官志諸監職名有將作監都水監謹案遼北面官僚以宣徽視工部而所司乃御前祗應之事則當兼有漢唐少府職事也至南面官僚史志不詳今參考紀傳所載職名略著一二以見當時工部及將作都水二監設官之大概焉金金史百官志工部尚書一員正三品侍郎一員正四品郎中一員從五品掌修造營建法式諸作工匠屯田山林川澤之禁江河堤岸道路橋梁之事員外郎一員從六品貞祐五年兼覆實司官天德三年增二員主事二員從七品令史十八人內女直四人譯史二人通事一人覆實司管勾一員從七品𨽻户工部掌覆實營造材物工匠價值等事太安元年𨽻三司工部罷同管勾貞祐五年併罷之以工部主事兼興定四年復設從省擬不令户工部舉文思署令從六品丞從七品掌造內外局分印􅏛浮圖金銀等尚輦儀鸞局車具亭帳之物屬少府監都水監正四品掌川澤津梁舟楫河渠之事少監從五品丞正七品街道司管勾正九品掌灑掃街道修治溝渠都城所提舉從六品同提舉從七品掌修完廟社及城隍門鑰百司公廨係官舍屋并栽植樹木工役等事左右廂官各二員正八品掌監督工役受給官二員正八品掌支納諸物及􅓨埴等事甄官署令從六品丞從七品直長正八品掌劖石及埏埴之事右皆屬尚書工部八作左右院掌收軍須軍器中都木場使一員從八品副使一員判官一員皆正九品掌拘收材木諸物及出給之事司吏一人庫子四人花料一人木匠一人謹案金工部覆實司管勾當即今料估所之職故亦多以員外郎主事兼之其都城提舉司専掌工役則如今營繕司之職八作院専主兵器則又如今虞衡司之職而中都木場使拘收材木則今木倉木厰之職也至都水監之制與宋略同其别置外監蓋即宋之外都水丞今故列入河道諸官篇內云元元史百官志工部尚書三員正三品侍郎二員正四品郎中二員從五品員外郎二員從六品掌天下營造百工之政令凡城池之修濬土木之繕葺材物之給受工匠之程式銓注局院司匠之官悉以任之世祖中統元年右三部置尚書二員侍郎二員郎中五員員外郎五員內二員専署工部事至元元年始分立工部尚書四員侍郎三員郎中四員員外郎五員三年復合為右三部七年仍自為工部尚書二員侍郎仍二員郎中三員員外郎如舊二十三年定尚書侍郎郎中員外郎各以二員為額明年以曹務繁冗增尚書二員二十八年省尚書一員首領官主事五員蒙古筆且齊解見吏部篇六人令史四十二人回回令史四人克埓穆爾齊解見吏部篇一人知印一人奏差三十人蒙古書寫一人典吏七人又司程官四員右三部照磨一員典吏七人其屬諸色人匠總管府秩正三品掌百工之技藝置達嚕噶齊解見户部倉場衙門篇一員總管一員同知二員副總管二員經歷一員知事一員提控案牘一員令史五人譯史一人奏差四人提舉都城所秩從五品提舉二員同提舉二員副提舉二員吏目一員照磨一員掌修繕都城內外倉庫等事至元三年置受給庫秩正八品提領一員大使一員副使一員掌京城內外營造木石等事至元十三年置光熙門窰場提領一員大使一員副使一員給從八品印至元二十五年置陶宗儀南村輟耕録工部有覆實司富大用事文類聚大元工部置令史分掌名頭以