body:
  text: 内務府奉宸苑表内務府奉宸苑國朝官制奉宸苑兼管事務内大臣無定員卿二人正三品由侍衛補授一人内務府司官補授一人掌總理苑囿事務及本苑職官遷授陞除之事初景山瀛臺事務屬尚膳監康熈十年以内務府總管管理十六年歸併都虞司二十三年設立奉宸苑仍以内務府總管管理印信雍正六年設奉宸苑堂官定為三品卿職乾隆十四年定為卿二人所𨽻有景山瀛臺長河玉泉山稻田厰南苑圓明園暢春園清漪園等處事務郎中二人員外郎四人主事一人委署主事一人苑丞十三人初正八品乾隆三十六年定為六品職銜食八品俸筆帖式十五人玉泉山稻田厰庫掌一人正六品筆帖式三人郎中主事掌本苑題奏咨行補授職員之事員外郎掌分管各處園囿河道事務苑丞掌看守直宿陳設器皿之事稻田厰庫掌掌辦理稻田蒔種儲藏之事郎中康熈三十三年設一人乾隆十六年設一人員外郎主事康熈二十三年設委署主事四十年設雍正十二年裁乾隆二十二年仍設初設催總二人雍正二年以後陸續增設乾隆十七年改名總領二十四年改為苑丞筆帖式國初以來先後增置南苑郎中一人員外郎二人主事一人委署主事一人苑丞三人苑副六人正八品筆帖式五人郎中員外郎主事掌本苑官職陞除及分管九門草甸圍牆樹木牲獸之事苑丞苑副掌看守直宿陳設器皿諸事初屬内監管理順治十八年屬採捕衙門康熈二十三年歸併奉宸苑員額順治十八年以來先後增設圓明園管理事務大臣無定員郎中一人恊理事務郎中一人主事一人委署主事一人苑丞六人六品苑副十七人七品五人八品六人九品六人筆帖式九人掌庫二人六品一人七品一人長春園熈春園綺春園春熈院管理事務員外郎一人苑丞三人六品二人七品一人苑副九人七品八品九品各三人筆帖式四人暢春園管理事務郎中一人苑丞四人六品一人七品三人苑副六人署苑副十六人筆帖式六人清漪園靜明園靜宜園管理事務員外郎各一人苑丞九人正六品苑副十人七品八人八品二人筆帖式四人學習筆帖式二人催長二人八品一人未入流一人郎中員外郎等官分掌園庭事務職守與本苑司官同圓明園額雍正三年以來先後置設暢春園額康熈年間定清漪園額乾隆十六年以來陸續增定織染局員外郎無定員由總管大臣奏委司庫一人筆帖式三人庫使六人司匠二人領催二人掌織造上用緞紗染綵繡繪之事順治十八年設康熈三年歸内務府管理乾隆十六年移織染局於萬壽山初設員外郎一人乾隆十六年裁以萬壽山總理大臣兼管其辦事員外郎由該大臣奏委司庫以下員額康熈三年以後陸續增定厯代建置三代周禮地官囿人中士四人下士八人府二人胥八人徒八十人掌囿游之獸禁鄭康成注囿游囿之離宫小苑觀處也養獸以宴樂視之禁者其蕃衛也牧百獸注備養衆物也今掖庭有鳥獸自熊虎孔雀至於狐狸鳬鶴備焉賈公彦疏古謂之囿漢家謂之苑周禮天官閽人王宫毎門四人囿游亦如之注囿御苑也游離宫也詩大雅靈臺王在靈囿麀鹿攸伏麀鹿濯濯白鳥翯翯王在靈沼於牣魚躍毛萇傳囿所以域養禽獸靈囿言靈道行於囿也晉語文王詢於八虞注周八士皆在虞官伯達伯适仲突仲忽叔夜叔夏季隨季騧賈誼新書騶者文王之囿虞者囿之司獸謹按天文志言天苑十六星在昴畢南為天子之苑囿劉向說苑有黄帝即位鳳集東囿之文淮南子泰族訓云湯初作囿以奉宗廟簡士卒習射御戒不虞葢苑囿之由來乆矣苑囿既設則必立官以司之此周禮囿人之所為制也囿游之禁屬地官而閽人每門四人仍屬於天官葢牧養禽獸之苑皆必有離宫禁宇以為游息之所故嚴其門禁而特置閽人所以重其職掌也考周囿莫著於靈臺而騶虞之詩漢初諸儒或以為園騶之虞官是司獸而非即獸也然則文王司囿之官實名為虞晉語文王詢於八虞是其證也考詩正義引詩譜堯時有伯翳者實臯陶之子佐禹治水土既平舜命作虞官掌上下草木鳥獸然則堯時已有虞官不始於文王矣文王仍襲虞官舊名至成王時而始名為囿人其說葢可並存之以備叅考焉周禮天官染人下士二人府二人史二人徒二十人掌染絲帛凡染春暴練夏纁𤣥秋染夏冬獻功掌凡染事典絲下士二人府二人史二人賈四人徒二十人掌絲入而辨其物以其賈楬之周禮地官掌染草下士二人府一人史二人徒八人掌以春秋斂染草之物以權量受之以待時而頒之謹案列代皆有織染之官而實始於成周之典絲染人葢黼黻絺繡元纁纎縞自禹夏時已重其章采而設官則始見于周時我朝内府廣儲司之六庫已有衣段織造等官而内織造局特移設於萬壽山設員外郎等職而總轄於園苑大臣葢因地設宜實為聖朝之剙制故詳序列代織染之官於篇中而仍以成周之染人為始焉秦韓非子秦應侯請曰五苑之草著蔬菜橡果棗栗足以活民請發之左傳鄭有原圃猶秦之有具囿三輔黄圖漢上林苑即秦之舊苑也長安志上林苑本秦舊苑也雍録東方朔傳曰武帝東游宜春師古曰宜春宫也在長安城東南上林賦曰息宜春師古曰宫名在杜縣東即唐曲江也揚雄傳武帝東游宜春師古曰宜春近下杜也史記秦記曰子嬰葬二世杜南宜春苑司馬相如從武帝至長楊獵還過宜春奏賦以哀二世其賦曰臨曲江之隑州望南山之參差師古曰曲岸之洲曲江也故賦末云弔二世持身之不謹兮墓蕪穢而不修也參數者言之則二世之所葬相如之所賦漢之曲洲唐之曲江皆此下杜之宜春也下杜即杜縣曲江宜春去杜縣近去下杜逺此凡及曲江宜春宫皆云下杜當是地屬下杜不屬杜陵耶其苑若宫皆秦創而漢唐因之也杜佑通典秦置平凖令掌知物價及主練染作彩色謹案秦苑囿之官史傳未見韓非子載秦有五苑亦未詳其何名惟左傳載秦之具囿三輔黄圖長安志載秦之上林苑雍録載秦之宜春苑今摭録以存其大槩秦平凖令兼主練染為後世染令之所由昉故首列之漢漢書百官公卿表少府屬官上林中十池監又鈎盾令丞謹案三輔黄圖上林苑有初池麋池牛首池蒯池積草池東陂池西陂池當路池太臺池郎池即百官公卿表所云上林中十池也而初學記又云漢上林有池十五所承靈昆靈天泉龍魚蒯菌鶴西陂當路東陂太一牛首積草含利百子三輔黄圖不載承靈昆靈天泉龍魚菌鶴太一含利百子初學記不載初池太臺池各有異同至漢表但載十池監其十五所或以十監統之歟漢書張釋之列傳從上登虎圈問上林尉禽獸簿不能對虎圈嗇夫從旁代尉對甚悉文帝詔釋之拜嗇夫為上林令釋之以為不可乃止不拜漢書百官公卿表水衡都尉應劭曰古山林之官曰衡掌諸池苑故稱水衡張晏曰主都水及上林苑故曰水衡主諸官故曰都有卒徒武事故曰尉師古曰衡平也主平其税入武帝元鼎二年初置掌上林苑有五丞屬官有上林均輸御羞禁圃輯濯鍾官技巧六廏辨銅九官令丞如淳曰御羞地名也在藍田其土肥沃多出御物可進者揚雄傳謂之御宿三輔黄圖御羞宜春皆苑名也輯濯船官也鍾官主鑄錢官也辨銅主分别銅之種類也師古曰御羞在今長安城南御宿川羞宿聲相近故或曰御羞或曰御宿羞者羞珍所出宿者止宿之義輯濯皆所以行船也六廏說見上駟院篇又衡官水司空都水農倉又甘泉上林都水七官長丞皆屬焉上林有八丞十二尉均輸四丞御羞兩丞都水三丞禁圃兩尉甘泉上林四丞成帝建始二年省技巧六廏官王莽改水衡都尉曰予虞步兵校尉掌上林苑門屯兵謹案三輔黄圖御宿苑在長安城南御宿川中漢武為離宫别館禁禦不得人往來游觀上宿其中故曰御宿御羞之當作御宿黄圖疏義甚明故漢書元后傳夏游御宿鄠杜之間亦作御宿可証羞宿之以音相誤也史記平凖書初大農筦鹽鐵官布多置水衡欲以主鹽鐵及楊可告緡錢上林財物衆乃令水衡主上林三輔黄圖舊儀曰上林有令有尉禽獸簿記其名數又有上林詔獄主治苑中禽獸宫館之事屬水衡謹案漢制少府有上林十池監文帝時有上林尉虎圈嗇夫至武帝别設水衡都尉専主上林苑設官遂以漸廣考水衡所掌不獨園苑自禁錢農倉珍羞廏牧鼓鑄皆其職守而統係之以上林苑苑職有水衡卿諸令丞而又有步兵校尉掌苑門之屯兵至少府之鈎盾令主近苑囿則以近在宫門左右故不𨽻水衡我朝定制内外苑囿皆設司官専理而統之以奉宸苑卿葢合漢少府水衡所屬而歸于一職也王應麟玉海織染署漢織室掌供冠冕組綬謹案自隋代合織室染署為一官在漢則東西織屬少府平凖屬大農其職不相兼理葢亦沿秦之舊制也後漢書百官志少府屬官鈎盾令一人六百石本注曰宦者典諸近池苑囿游觀之處丞永安丞各一人三百石本注曰宦者永安北宫東北别小宫名有園觀苑中丞果丞鴻池丞南園丞各一人二百石本注曰苑中丞主苑中離宫果丞主果園鴻池池名在洛陽東二十里南園在雒水南濯龍監直里監各一人四百石本注曰濯龍亦園名近北宫直里亦園名也在雒陽城西南角通典鈎盾令宦者典諸近園苑游觀之事屬少府後漢亦有之張衡東京賦竒木珍果鈎盾所積謹案昭帝紀耕鈎盾弄田弄田屬之鈎盾則以鈎盾主苑囿故也成帝紀云未央宫鈎盾中則鈎盾在未央宫矣故五行志謂鈎盾禁中也陳咸傳咸為少府少府多寳物咸皆鈎校官屬及諸中宫黄門鈎盾掖庭官吏舉奏按論畏咸皆失氣鈎盾與黄門諸官並舉則以其在未央宫切近之地也後漢志鈎盾令其所屬有鴻池丞鴻池在雒陽東二十里南園丞南園在洛水南有直里監直里園在洛陽城西南角鈎盾之兼轄諸地葢令居禁中統逺近也後漢書百官志上林苑令一人六百石本注曰主苑中禽獸頗有民居皆主之捕得其獸送太官丞尉各一人通典後漢平凖令丞𨽻大司農熹平四年改平凖為中凖使宦者為之列于内署自是諸署悉以閹人為令丞謹案後漢罷水衡都尉之官置上林苑令屬之司農為厯代上林令之所自昉而少府鈎盾令之所統轄視西漢為頗廣葢水衡雖廢而其職掌則未嘗不存至平凖之改為中凖以宦者為之則又少變前漢之法度也三國通典魏官第四品都水使者第七品都水叅軍靈芝園監第八品都水使者令史第九品都水使者書令史唐六典上林苑令主苑中禽獸魏因之通典漢之水衡都尉本主上林苑魏氏主天下水軍舟師器械魏少府屬官有平凖令謹案魏苑囿置官承漢之舊亦名之為上林苑令至漢之水衡都尉始改為都水使者主水軍舟船器械不専以苑囿為職自是而後都水一官始别為河渠水利而設矣鈎盾令於魏無聞其平凖之屬少府則猶漢制也又考魏都賦苑以元武陪以幽林注云元武苑在鄴城西又魏志文帝黄初四年冬甘露降芳林園臣松之案芳林園即華林園齊王芳即位改為華林故晉書百官志有華林苑令鄴元武苑丞皆承魏苑囿之名而設令丞豈魏本自有華林元武令丞而晉因之乎抑魏之華林元武亦統攝于上林苑令乎又考吳都賦數軍實乎桂林之苑注吳有桂林苑南朝宫苑記桂林苑在落星山之陽南苑在臺城南鳳臺山然則吳又有桂林苑南苑之名當時必有苑官今不可考矣晉晉書百官志光禄勲統華林園等令大鴻臚統華林園鈎盾等令又有鄴元武苑丞少府統平凖等令通典上林苑丞晉因之江左無聞謹案晉志園苑之職光禄鴻臚皆有華林園令鴻臚又有鄴元武苑丞而瓊圃靈芝等園不與焉葢皆統轄于華林令也通與又稱上林苑令晉與漢同而史志無之意即華林之誤稱歟宋齊梁陳宋書百官志上林令一人丞一人漢西京上林中有八丞十二尉十池監丞尉屬水衡都尉池監𨽻少府漢東京曰上林苑令及丞各一人𨽻少府晉江左闕宋世祖大明三年復置𨽻尚書殿中曹及少府平凖令一人丞一人掌染漢𨽻司農不知何世𨽻少府宋順帝即位避帝諱改曰染署通典上林苑令丞宋初復置齊因之平凖令宋惟掌染改曰染署齊又曰平凖隋書百官志梁制司農卿視散騎常侍主上林令又管樂游北苑丞光禄卿統華林等令通典上林苑令丞梁陳屬司農平凖署梁陳則曰平水令丞晉大鴻臚有鈎盾令自後無聞謹案晉江左無上林苑令丞至宋初復設而齊梁陳因之唯宋齊則統于殿中監及少府梁陳則屬于司農斯為小異諸代皆有華林苑令梁屬光禄與晉制同以梁制推之知齊陳之皆屬光禄矣宋改平凖為染署梁陳則復其舊要皆司農之屬官也北魏洛陽伽藍記建春門内御道南有鈎盾典農藉田三署謹案後魏官氏志有光禄鴻臚司農少府等官而不詳其所領之屬鈎盾署僅見於洛陽伽藍記而苑令織染諸署皆不見于史考隋書百官志言北齊制官多循後魏則齊之所有當亦魏之所有今以史無明文故並缺之北齊隋書百官志後齊光禄寺統清漳華林等署諸令丞司農寺掌園地果實統平凖太倉等署諸令丞太府寺統司染等署諸令丞通典北齊官正六品平凖署令從九品華林署令唐六典上林苑令梁陳屬司農北齊亦然通典鈎盾令北齊如晉制謹案北齊上林華林鈎盾等署與晉制皆同自魏廢少府立太府而少府屬官分在司農太府之屬齊葢因之而不改也後周通典後周正四命冬官司色司織等下大夫正三命天官染工上士冬官小司色小司織等上士正二命天官染工中士地官掌禽掌囿掌圃等中士冬官織綵織組等中士正一命地官掌囿掌圃等下士冬官織綵織組等下士謹案後周設官用周制故掌囿掌圃屬于地官染工屬于天官其以司色司織屬冬官者則以考工記有攻皮之工設色之工故從而𨽻之今以其與織染相近故並採録焉隋隋書百官志司農寺統平凖鈎盾華林上林等署令丞後罷華林署以平凖𨽻太府太府寺統司染署令丞後分入少府少府監統司織司染等署後併司織司染為織染署唐六典鈎盾令隋如北齊通典苑總監自隋而置東西南北各有監及副監掌苑内宫館園池之事謹案隋于上林華林諸署外又設苑總監副監分東西南北四靣監此因事增設前代所未有也隋又有都水臺承漢之水衡都尉而設其所掌舟檝河渠不主園苑之務故不復録少府之司織司染併為織染署自是而平凖令専主管市易不復掌染故隋以後亦不更列焉唐唐書百官志司農寺上林署令二人從七品下丞四人從八品下掌苑囿園池植果蔬以供朝㑹祭祀及尙食諸司常料季冬藏冰千段先立春三日納之冰井以黑牡秬黍祭司寒仲春啓冰亦如之監事十人有府七人史十四人典事二十四人掌固五人鈎盾署令二人正八品上丞四人正九品上監事十人掌供薪炭鵝鴨蒲藺陂池藪澤之物以給祭祀朝㑹饗燕賓客有府七人史十四人典事十七人掌固五人慶善石門温泉湯池等監毎監監一人從六品下丞一人正七品下掌湯池宫禁防堰及偫粟芻修調度以備供奉王公以下湯館視貴賤為差凡近湯所潤𤓰蔬先時而熟者以薦陵廟有録事一人府一人史二人掌固四人京都諸宫苑總監監各一人從五品下副監各一人從六品下丞各二人從七品下主簿各二人從九品下掌苑内宫館園池禽魚果木凡官属人畜出入皆有籍有録事各二人府各八人史各十六人亭長各四人掌固各六人獸醫各五人京都諸園苑監苑四靣監監各一人從六品下副監各一人從七品下丞各二人正八品下掌完葺苑靣宫館園池與種蒔蕃養六畜之事顯慶二年改青城宫監曰東都苑北面監明徳宫監曰東都苑南面監洛陽宫農圃監曰東都苑東靣監倉貨監曰東都苑西靣監有録事各一人府各三人史各六人典事各六人掌固各六人九成宫總監監一人從五品下副監一人從六品下丞一人從七品下主簿一人從九品上掌修完宫苑供進鍊餌之事有録事一人府三人自監以下品同宫苑武徳初改隋仁壽宫監曰九成宫監長安志禁苑在宫城之北長安故城亦𨽻苑中有四靣監南靣為長樂監北靣有漢故城謂舊故宅監東西靣各以本方為名分掌宫中種植及修葺園苑等又置苑總監都統之皆𨽻司農寺唐書百官志織染署令一人正八品上丞二人正九品上掌供冠冕組綬及織紝色染錦羅紗縠綾紬純絹布皆廣尺有八寸四丈為疋布五丈為端綿六兩為屯絲五兩為鈎麻三斤為綟凡綾錦文織禁示於外髙品一人專莅之嵗奏用度及所織監作六人有府六人史十四人典事十一人掌固五人雍録唐大内有三苑西内苑也東内苑也禁苑也三者皆在兩宫之北而有分别西内苑並西内太極宫之北而東内苑則包大明宫東北兩靣也兩内苑北門之外始為禁苑之南門也禁苑也者隋大興苑也其西則漢之長安四城皆在包并之内苑東距霸而北抵渭廣輪所及自周一百二十里而東西二十七里南北三十二里據所記如此若以漢地約其道里當不啻此數也中置四監監分領一方凡立四官四局以監之北軍營衛盡在三苑四監封畛之内謹案唐承隋制有京都諸宫苑總監副監京都諸園苑監四靣監及副監其曰宫苑者葢指禁近苑務言之園苑則自都城以至東都各園苑皆分主之而上林署令鈎盾署令及織染署則並仍前代之舊焉五季謹案五季官制缺略玉海所載後唐有永芳園周有玉津園既有諸園則其必嘗置令置使以監理之可知也以史無明文故缺之宋宋史職官志司農寺所𨽻官屬園苑四玉津瑞聖宜春瓊林苑使掌種植蔬蒔以待供進修飭亭宇以備游幸宴設謹案宋職官志載園苑四曰玉津曰瑞聖曰宜春曰瓊林而石林燕語載瓊林苑金明池宜春苑玉津園謂之四園獨不及瑞聖職官志亦不載金明池豈金明池在瓊林苑北亦統于瓊林苑使故職官志不復載歟馬端臨文獻通考宋四園苑提舉官以三司判官内侍都知諸司使以上充監官各二人以諸司副或内侍三班使臣充又有西京宫苑司勾當官一人元豐後四園苑屬司農玉海玉津園在南薰門外周顯徳中置之本朝因之三班及内侍監領兵校𨽻及主典二百六十人瓊林苑在順天門外道南乾徳二年置以三班及内侍監領池苑兵校軍𨽻及主典三百三十三人宜春苑在朝陽門外道南本秦王園太平興國七年以迎春苑自通津門外汴水瀕乃遷置改名以其故地為富國倉差三班及内臣監領軍校兵𨽻及主典凡二百九十人瑞聖園在景陽門外道東初為北園太平興國二年詔名含芳以三班及内侍監領軍校兵𨽻及主典凡二百一十二人謹案玉海又載祥符元年三月甲子上已宴羣臣於龍園宗室於瓊林苑帥臣於宜春苑三司副使判官館閣官于玉津園諸司使副於含芳園然則祥符時于四園之外又增龍園史不詳其建置然觀宴近臣於其地則較之瓊林宜春玉津瑞聖為尤重矣疑亦當以三班内侍領之也宋史職官志後苑勾當官無定員以内侍充掌苑囿池沼臺殿種蓺雜飾以備游幸文獻通考少府屬官染院掌染絲枲幣帛監官二人以京朝及内侍充謹案宋有玉津瑞聖宜春瓊林四園置提領其餘皇城東西諸園池入官者咸以四提領分𨽻焉初以三班及内侍充元豐後始改𨽻司農而亦仍間以内侍領之至内侍省則又别有後苑勾當官主近苑囿以備游幸葢漢以來鈎盾令之職也南渡後又有金果玉津聚景等園其設官亦皆領于内侍至染院領于少府亦猶前代之制也遼王圻續文獻通考上林苑署遼北靣有監鳥獸詳衮䝉古語理事官也原作詳穏今改正司官曰監某鳥獸詳衮曰監某鳥獸都監曰監某鳥人曰監某獸人謹案遼南靣官有宣徽司農少府等屬唯司農之上林署有監鳥獸諸官近於苑職餘並未詳其南北靣行宫都部署亦必各有園苑之職而史無明文今已載入内務府都虞司篇中兹不復述金金史百官志工部官屬上林署提㸃從五品泰和八年剙大安二年省令從六品掌諸苑園池沼種植花木果蔬及承奉行幸舟船事丞從七品大定三年增一員分司南京以勾判兼之大定三年復省一員直長二員正八品花木局都監同監舊設接手官四人泰和元年罷復以諸司人内置都監同監二員貞祐三年罷都同監以同樂園管勾兼熈春園都監同監三員泰和四年置貞祐三年省同樂園管勾二員每年額辦課程𨽻南運司宣宗南遷罷課程改為隨朝職正八品宣徽院官屬有宫苑司令丞續文獻通考金上林署屬工部官曰上林署提㸃金史百官志少府監官屬織染署令從六品丞從七品直長正八品掌織紝色染諸供御及宫中錦綺幣帛紗縠謹案金以上林署屬工部而花木局都監同樂園管勾兼𨽻之皆前代司農之所屬也宫苑司令丞屬于宣徽與宋内侍省之後苑勾當官相仿彿金不設内侍省故以為宣徽之屬耳太府寺有典給署史稱即古之鈎盾令唯典給署專以供給宫府用物不與園苑相闗故不著于篇焉元元史百官志大都留守司屬官上林署秩從七品署令署丞各一員直長一員掌宫苑栽植花卉供進蔬果至元二十四年置花園管勾二員掌花卉果木至元二十四年置續文獻通考上林署𨽻大都留守所屬有養種園花園等職元史百官志宣徽院屬官安豐懐逺等處稻田提領所龍慶栽種提舉司謹案元制以上林署養種園花園等職屬之大都留守司與列代之制屬于司農少府者不同至稻田提領栽種提舉屬于宣徽葢即今玉泉山稻田厰之比至諸路織染局織染提舉司則盡屬之工部已見内務廣儲司織染篇兹不具述焉明明史職官志上林苑監左右監正各二人正五品左右監副各一人正六品監正監副後不常設以監丞署職左右監丞各一人正七品其屬典簿㕔典簿一人正九品良牧蕃育林衡嘉蔬四署各典署一人正七品署丞一人正八品録事一人正九品監正掌苑囿園池牧畜樹種之事凡禽獸草木蔬果率其屬督其養户栽户以時經理其養地栽地而畜植之以供祭祀賓客宫府之膳羞凡苑地東至白河西至西山南至武清北至居庸闗西南至渾河並禁圍獵良牧牧牛羊豕蕃育鵝鴨雞皆籍其牝牡之數而課孳卵焉林衡典果實花木嘉蔬典蒔蓺𤓰菜皆計其町畦樹植之數而以時苞進焉洪武二十五年議開上林院度地城南自牛首山接方山西並河涯比圖上太祖謂有妨民業遂止永樂五年始置上林苑監設良牧蕃育嘉蔬林衡川衡冰鑑及典察左右前後十屬署洪熈中併為蕃育嘉蔬二署以良牧川衡併蕃育冰鑑林衡併嘉蔬典察四署分併入宣徳十年始定四署正徳間増設監督内臣共九十九員嘉靖元年裁汰八十員革蕃育嘉蔬二署典署林衡嘉蔬二署録事續文獻通考永樂五年三月辛巳復改上林署為上林苑監秩正五品有左右副丞典簿之屬凡設十署秩正七品俱以内臣及文職相兼為之後革内臣明史職官志司苑局掌印太監一員管理簽書監工無定員掌蔬菜𤓰果内織染局掌印太監一員掌染造御用及宫内應用緞疋城西藍靛厰為此局外署謹案明制大農太府少府等屬官皆裁併于六部不别設官惟上林苑監承漢時舊制而特設為一司初設十署後定為四署而宦官别有司苑局以主在内宫苑初制上林苑監督所署内侍至九十九員之多其後雖旋從裁减而内苑局管理簽書亦無定員葢禁近游觀掌于内侍者居多此立法之所以不古若也考自周禮囿人屬於司徒漢則少府水衡分主其事至上林苑令之設𨽻於司農者自後漢始列代皆因而不改苑總監始於隋而増廣於唐世然仍𨽻司農也宋始以三班及内侍分主四園提領之職而明乃概以宦者領之則益無足稱矣國朝剙立奉宸苑内外禁囿專設卿二人以綜理其事復特簡管理事務内大臣以總其成檢校勾當職掌昭然葢即苑囿之設而聖天子順時對物之義已備著於設官分職之間矣欽定厯代職官表卷四十
