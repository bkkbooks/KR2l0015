body:
  text: 戶工二部錢局表户工二部錢局國朝官制户工二部督理京省錢法右侍郎滿洲漢人各一人凡京師鼓鑄統設二局𨽻户部者曰寶泉局嵗鑄錢六十一卯以萬二千四百八十緡為卯𨽻工部者曰寶源局嵗鑄錢七十一卯以六千二百四十九緡二百七十文為卯遇閏則皆加鑄四卯其局之政令各以其部之右侍郎掌之初止漢人右侍郎一人康熙十八年令滿洲右侍郎一人公同督理十九年以給事中御史稽察錢局雍正二年停遣乾隆二十六年户部錢法堂置掌稿司官滿洲漢人各一人於各司屬中選委工部未置户部寶泉局監督滿洲漢人各一人大使滿洲五人工部寶源局監督滿洲漢人各一人大使滿洲二人掌鑄造緡錢收納銅課以裕國儲以利民用其監督俱無専員由六部滿漢司官遴選保舉引見簡用二年而代大使由本部筆帖式選委咨吏部注冊五年而代稱職者以應升官用寶泉局監督順治元年定設滿洲漢人各一人寶源局監督初置三人康熙十七年改定二人寶泉局大使初設漢人一人雍正四年以寶泉局分設四厰增置漢人大使四人七年改漢大使俱為滿大使寶源局初止設筆帖式一人雍正七年改置大使二人各省錢局監鑄官十有八人凡天下鼓鑄緡錢者十有四省新疆則開爐伊犁如各省之制皆隨其地之宜作之泉布以交易流通前民利用以布政使等總其成而受法式於戶部各置監鑄官以判局事直𨽻寶直局一人以保定府同知充山西寶晉局一人陜西寶陜局一人江蘇寶蘇局二人俱以佐二官選充浙江寶浙局二人以同知通判選充福建寶福局一人亦以佐二官選充江西寶昌局一人以南昌府同知充湖南寶南局一人以長沙府同知充湖北寶武局一人以武昌府同知充廣東寶廣局一人四川寶川局一人俱以同知通判選充廣西寶桂局一人布政使於所屬官內任便選充雲南寶雲局一人以雲南府知府充東川局一人以東川府知府充貴州寶黔局一人以貴陽府知府貴筑縣知縣或通判縣丞選充伊犁寶伊局一人以伊犁同知充厯代建置三代周禮地官泉府鄭司農云故書泉或作錢上士四人中士八人下士十有六人凡國事之財用取具焉嵗終則㑹其出入而納其餘惠士奇禮說太公為周立九府圜法顔師古以太府玉府內府外府泉府天府凡六府當之而又以職內職金職幣三官充其數焉非也爾雅以八方之八財中原之五榖魚鹽為九府王應麟引以當九府圜法失之逺矣所謂圜法者重不廢輕小不妨大子母相權而有九品故曰九府圜法其名見周官者夫布里布辟布絘布總布質布罰布㕓布儳布是為布貨九品其九品在國曰邦布外府掌之在市曰征布泉府掌之載師有里布閭師有夫布皆邦布也出諸民入諸國故曰邦布司市有辟布㕓人有絘布總布質布罰布廛布肆長有儳布皆征布也斂諸市入諸官故曰征布謹案後世錢法之官其源出於地官之泉府而司市職有云辟布者於其地之叙惠士竒謂叙猶監也作布之叙蓋鑄錢之監是司市亦掌冶鑄也漢漢書百官公卿表水衡都尉屬官有上林均輸鍾官辨銅令丞如淳曰鍾官主鑄錢官也辨銅主分辨銅之種類也初上林衡官及鑄錢皆屬少府王應麟曰漢北軍有錢官史記平準書赤側錢賤民巧法用之不便於是悉禁郡國毋鑄錢専令上林三官鑄錢既多而令天下非三官錢不得行諸郡國所前鑄錢皆廢銷之輸其銅三官桓寬鹽鐵論幣數易而民益疑於是廢天下鑄錢而専命水衡三官作水衡三官者均輸鍾官辨銅三令丞也後漢書隗囂檄王莽曰民生挾銅炭沒入鍾官唐章懷太子注主鑄錢之官漢書地理志丹陽郡有銅官王應麟玉海鐵官長丞五十有一而専其官以主丹陽之銅唐六典錢官後漢屬司農東觀漢記鑄錢官姦宄所集無能整齊理之者京兆尹閻興署第五倫督鑄錢掾領長安市謹案漢代鑄錢之官初屬少府後屬水衡後漢以屬司農而第五倫為督鑄錢掾則又屬於京兆尹蓋京兆主長安東西市故兼領錢法以平價直而除姦僞亦如周官泉府司市皆掌征布之出入也三國三國魏志韓暨為監冶謁者舊時冶作馬排每一熟石用馬百匹更作人排又費工力暨乃因長流為水排計其利益三倍於前就加司金都尉班亞九卿謹案唐六典稱魏晉以下錢官或屬少府或屬司農今考史志所載三國六朝少府司農官屬未見有鑄錢之職惟陳夀所載韓暨為監冶謁者一事冊府元龜即引之於錢幣門內則監冶亦主鑄錢可知而自晉以後諸冶署令丞掌鼓鑄金銀銅鐵之屬至北齊而冶署所屬遂有泉部局丞是南北朝鑄錢之事當為冶令所兼司今並著之於表云三國蜀志張裔為司金中郎將謹案蜀漢鑄直百錢吳赤烏中嘗鑄當千大錢並見於史而錢官職掌則史未之詳蜀之司金中郎將典作農戰諸器即後代冶令丞之比疑鑄錢亦其所兼司也晉晉書職官志衛尉統諸冶等令南北東西督冶掾宋齊梁陳宋書百官志南冶令一人丞一人漢有鐵官晉置令掌工徒鼓鑄𨽻衛尉江左以來省衛尉𨽻少府宋世雖置衛尉冶𨽻少府如故江南諸郡縣有者或置冶令或置丞多是吳所置南齊書百官志少府領東冶令一人丞一人南冶令一人丞一人隋書百官志梁少府置東西冶署令丞又有梅根諸冶令陳循其制冊府元龜宋文帝元嘉七年立錢署鑄四銖錢孝武建元元年更立錢署鑄錢謹案宋齊梁陳四代鑄錢之官當亦掌之東西南諸冶令而錢署則如今之錢局也北魏魏書食貨志髙祖始詔天下用錢十九年冶鑄粗備文曰太和五銖在所遣錢工備爐冶民有欲鑄聽就鑄之永安二年詔更改鑄文曰永安五銖官自立爐北史列傳時朝議鑄錢以髙謙之為鑄錢都將長史乃上表求鑄三銖錢謹案馬端臨錢幣考引此事作鑄錢都督而北史及魏書俱作都將疑馬氏有誤蓋都將如今之户工二部管理錢法侍郎而長史則其屬如今之監督也魏書官氏志不載此官殊為闕略北齊隋書百官志後齊太府寺統諸冶東西道署令丞諸冶東道又别領滏口武安白間三局丞諸冶西道又别領晉陽冶泉部大􅣵原仇四局丞後周杜佑通典後周官品正二命地官泉府中士正一命地官泉府下士隋隋書百官志太府寺統掌冶署置令二人丞四人唐唐㑹要開元二十五年二月羅文信為諸道鑄錢使天寶三載九月楊慎矜除御史中丞充鑄錢使六載楊釗上元元年五月劉晏寶應元年劉晏又充廣德二年第五琦李峴永泰元年正月十三日劉晏第五琦分領諸道大厯五年三月二十六日停新唐書百官志諸鑄錢監監各一人以所在州府都督刺史判之副監一人上佐判之丞一人判司判之新唐書地理志商州有洛源監錢官郴州有桂陽監錢官河東蔚州飛狐有三河銅冶有錢官河中府解縣有紫泉監乾元元年置有銅穴十二揚州有丹陽監廣陵監錢官宣州南陵有梅根宛陵二監錢官鄂州有鳳山監錢官饒州有永平監錢官有銅坑三信州有玉山監錢官有銅坑一鉛坑一絳州有銅源翔臯錢坊二梓州銅山縣貞觀二十三年置鑄錢官調露元年罷新唐書食貨志武德四年洛并幽益桂等州皆置監開元二十六年宣潤等州初置監天下爐九十九絳州三十揚潤宣鄂蔚皆十益郴皆五洋州三定州一案諸州爐數僅九十有四以唐六典考之尚有鄧州五爐適足九十九之數蓋新唐書脫誤也每爐嵗鑄錢三千三百緡設丁匠三十費銅二萬一千二百斤蠟三千七百斤錫五百斤每千錢費七百五十天下嵗鑄三十二萬七千緡唐六典皇朝少府置十爐諸州皆屬焉及少府罷鑄錢諸州遂别謹案厯代錢法規制各異立爐鼓鑄亦不一其地有但就京師而不及郡國者漢之上林三官是也有但就諸州而不及京師者唐之少府罷鑄是也故當時鑄錢一使其職專領諸道與今户工二侍郎督理京省錢法者差别然源流有自職掌無殊今並著之於表又考唐書韓洄傳建中元年洄上言山澤之利當歸王者非諸侯方嶽所宜有請以諸道錢冶總𨽻鹽鐵使而冊府元龜所載德宗以後鑄錢事宜多出鹽鐵使陳奏是唐時錢法又屬於鹽鐵使謹并識於此五季冊府元龜晉髙祖天福三年鑄錢以天福元寶為文委鹽鐵使鑄樣頒下諸道漢隱帝乾祐初膳部郎中羅周允請在京置鑄錢監不報周世宗顯德二年九月敕國家之利泉貨為先近朝以來久絶鑄造至於私下不禁銷鎔嵗月漸深奸弊尤甚今採銅興冶立監鑄錢冀便公私宜行條制謹案五季無鑄錢監至周世宗時始置而晉髙祖鑄天福錢令鹽鐵頒樣則錢法亦當掌之鹽鐵矣宋玉海咸平三年五月馮亮以江西運副兼都大提㸃鑄錢景祐二年八月置提㸃坑冶鑄錢官寶元元年八月復置發運使提㸃鑄錢事元豐二年七月三省言鑄錢司舊領五監近嵗江池饒增嵗鑄額及興國睦衡舒蘄惠創置六監宜增提㸃一員乃命錢昌武領淮浙建江東李棻領湖廣江西元祐元年二月合為一司從李深請也崇寧五年詔蘇莊提舉九路銅事大觀四年併入鑄錢司紹興二十七年七月户部侍郎林覺奏復饒永平監贛鑄錢院韶永通監八月户部侍郎榮嶷兼提領鑄錢二十八年命户部侍郎趙令詪提領二十九年七月復置鑄錢司乾道六年四月併於發運司七年復置八年十二月置提㸃官二員分治饒贛淳熙二年併於饒州李心傳建炎以來朝野雜記提㸃坑冶鑄錢公事自咸平初有之渡江後屢罷屢復淳熙五年又加都大二字於提字之上宋史食貨志京師舊有四監後廢之諸路錢嵗輸京師大觀二年復京畿兩監以宋喬年領之用提舉京畿鑄錢司為名馬端臨文獻通考鑄錢監屬少府監官各一人玉海㑹要云元豐諸路鑄錢銅錢一十七監西京阜財監衛州黎陽監永興軍監陜州華州監絳州垣曲監舒州同安監睦州神泉監興國軍富民監衡州熙寧監鄂州寶泉監江州廣寧監池州永豐監饒州永平監建州豐國監韶州永通監惠州阜民監鐵錢九監虢州朱陽兩監商州阜民洛南兩監威逺鎮淹山鎮兩監興州濟衆監嘉州豐逺監卭州惠民監凡銅錢一十三路銅鐵錢兩路鐵錢四路元豐四年二月詔秦州置監六年三月詔徐州置寶豐監五年梧州置監萬州置鐵錢監八月同州置鐵錢監渭州復置博濟監八年詔罷增置監十有四中興鑄錢有饒州永平監池州永豐監江州廣寧監建寧府豐國監韶州永通監贛州鑄錢監嚴州神泉監紹興二年八月令永豐監卒寓役於饒廣寧監卒寓役於䖍移少就多也謹案宋制亦於諸州鑄錢在京錢監中葉始置其監官𨽻於少府蓋猶循唐舊制其實在諸州者皆歸之提㸃提領在京則提舉鑄錢司掌之少府並不司其出納也遼遼史食貨志太宗置五冶太師以總四方錢鐵金金史食貨志正隆三年二月中都置錢監二東曰寶源西曰寶豐京兆置監一曰利用大定十八年代州立監鑄錢命工部郎中張大節吏部員外郎麻圭監鑄二十年十一月名代州監曰阜通設監一員正五品副監一員正六品丞一員正七品勾當官二員從八品二十二年十月以參知政事鈕祜祿額特埒鈕祜祿原作粘割今從八旗姓譜改正額特埒䝉古語享受也原作斡特刺今改正提控代州鑄錢監謹案金中都有錢監而百官志未見其職殆亦以他官兼領故史不載也至以參知政事提控錢監此則一時特重其事而設非經常之制矣元元史百官志諸路寶泉都提舉司至正十年十月置其屬有鼓鑄局正七品永利庫從七品掌鼓鑄錢文印造交鈔各處寶泉提舉司十一年十月置寶泉提舉司于河南行省及濟南冀寧等處凡九所江浙江西湖廣行省各一所十二年二月置銅冶場于饒州路德興縣信州路鉛山州韶州岑水凡三處每所置提領一員正八品大使一員從八品副使一員正九品流內官銓注直隸寶泉提舉司掌浸銅事謹案交鈔之法肇于唐代之飛錢宋張詠始行之益州天聖間置交子務建炎南渡又立㑹子務于臨安先後措置有行在交子川引淮引湖㑹諸目金立鈔引法與錢並行元則專以寶鈔交鈔通行諸路至大中嘗詔用錢未行而罷至正末始置司鑄錢以濟軍興亦仍以交鈔為主明初尚沿其法各設官以掌之宋則有交子務官㑹子監官金則有交鈔庫印造鈔引庫抄紙坊使副判官等官元則有諸路寶鈔提舉司達嚕噶齊都提舉副達嚕噶齊提舉同提舉副提舉寶鈔總庫達嚕噶齊大使副使印造寶鈔庫達嚕噶齊大使副使燒鈔東西二庫達嚕噶齊大使副使等官明亦有寶鈔提舉司提舉副提舉典史抄紙局大使副使印鈔局大使副使寶鈔廣惠庫大使副使等官皆隸屬於户部今楮幣之制久罷不行其職事亦隨之俱廢故不列於表謹附識大凡以備考核云爾明明史食貨志太祖初置寶源局於應天鑄大中通寶錢及平陳友諒命江西行省置貨泉局即位頒洪武通寶錢各行省皆設寶泉局與寶源局並鑄七年設寶鈔提舉司遂罷寶源寶泉局越二年復設寶泉局十三年中書省廢乃以寶鈔屬户部鑄錢屬工部二十五年又罷寶泉局𢎞治元年户部請鼓鑄乃復開局鑄錢嘉靖六年大鑄嘉靖錢且補鑄纍朝未鑄者時盜鑄日滋不能止帝患之問大學士徐階階陳五害請停寶源局鑄錢應支給錢者悉豫銀帝乃停鼓鑄自後稅課徵銀而不徵錢隆慶初錢法不行兵部侍郎談綸請令民得以錢輸官錢法復稍稍通萬厯四年雲南巡撫郭庭梧言國初京師有寶源局各省有寶泉局自嘉靖間省局停廢民用告匱非利也遂開局鑄錢尋命十三布政司皆開局孫承澤春明夢餘録寶源局在城之東石大人胡同蓋石亨舊宅嘉靖間改為鼓鑄公署虞衡司員外郎監督其事所屬有寶源局大使國初鼓鑄之事惟屬工部至天啓二年始增寶泉局其政屬於户部而工部之所鑄者微矣寶泉局在皇城東北以右侍郎督理之名錢法堂加爐製造以濟軍興明史職官志天啓五年户部增設督理錢法侍郎工部寶源局大使一人正九品副使一人從九品嘉靖年間革謹案明代圜法其初専之工部後始添設戶部寶泉局故惟寶源局有監督員外郎及大使等官而戶部無之至錢法侍郎為天啓間創設乃别置額缺不釐部務亦與今之兼管者不同也欽定歷代職官表卷十六
