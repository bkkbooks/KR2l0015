body:
  text: 戸部表謹案帝典舜命卨為司徒周官司徒掌邦教敷五典擾兆民此地官之始漢代尚書郎雖分主户口財帛而司農少府二寺綜治錢穀自魏立度支一曹以理財賦厥後左民右户建置相沿國用始歸南省至隋唐定為六部而户部所掌遂當周理地官之任然司農太府兩卿北魏改少府為太府歴代尚兼置不廢逮明太祖罷司農等官職乃盡歸户部矣惟是自魏晉以来司農但領倉儲太府獨司庫蔵户部雖有金倉二子部而出納給受之事仍以屬之兩寺盖曹司繁劇財計事重一切委輸勾檢不能不别有専司者勢也故明代雖併其事於户部而中葉分設倉塲侍郎専督糧儲不治部事仍無殊前代司農卿太倉令之職守至本朝户部三庫即唐宋之太府左右蔵庫而特簡大臣綜理月要嵗㑹以受其成則又近於唐之度支使宋之三司使雖職事原屬相闗而司存所在不可不詳加條别謹考㕘史傳以户部沿革詮次於篇而戸部三庫倉塲衙門則各為一表系諸户部之後又寳泉局與寳源局雖分𨽻兩部而職司圜法源委無殊今合為一表併附于户部焉户部國朝官制户部尚書滿洲漢人各一人掌天下土田户口財穀之政平準出納以均邦賦所屬有山東山西河南江南江西福建浙江湖廣陜西四川廣東廣西雲南貴州十有四司國初户部設承政二員蒙古承政一員漢承政一員參政八員啟心郎一員崇徳三年改設承政一員左參政二員右參政四員啟心郎滿洲一員漢人二員順治元年改承政參政為尚書侍郎其滿漢尚書無定員五年定滿漢各一員七年増滿洲一員十年裁十五年裁啟心郎康熙六年復増滿洲尚書一員八年裁雍正元年以來親王及大學士奉命兼理部務皆由特簡不常置左右侍郎滿洲漢人各一人順治元年定掌審計國用以貳尚書滿漢右侍郎兼管理錢法堂事務山東清吏司郎中滿洲二人漢人二人員外郎滿洲三人漢人一人主事滿洲漢人各一人掌稽山東省及奉天民賦收支奏册青州徳州駐防盛京吉林黒龍江將軍所屬兵糈出納並參票畜稅之事兼覈長蘆兩淮河東兩浙福建廣東四川雲南等處鹽課請引疏銷初滿洲司員不分曹聴委於其長順治元年定户部滿洲郎中十八人蒙古郎中四人漢軍郎中二人滿洲員外郎三十八人蒙古員外郎五人漢軍員外郎六人滿洲主事十四人蒙古主事一人康熙三十八年裁蒙古漢軍郎中員外郎五十七年復設蒙古郎中一人員外郎一人増設蒙古主事一人漢人司官自順治元年即隨司置額十四司各郎中一人員外郎一人主事三人十一年裁漢人主事各司一人康熙六年又裁江南浙江江西湖廣福建河南陜西廣西四川貴州司各一人三十八年又裁山東山西廣東雲南司各一人今漢人主事各司一人山西清吏司郎中滿洲漢人各一人員外郎滿洲蒙古漢人各一人主事滿洲漢人各一人掌稽山西省民賦收支奏册兼覈游牧察哈爾地畝土黙特地糧喀爾喀四部定邊左副將軍辦事官屬張家口賽爾烏蘇臺站官兵俸餉及烏里雅蘇臺科布多屯田官兵番換之事河南清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌稽河南省民賦收支奏册兼覈河南城守尉游牧察哈爾及圍塲捕盜官兵俸餉勾檢各省採買事彚而奏之江南清吏司郎中滿洲漢人各一人員外郎滿洲三人漢人一人主事滿洲漢人各一人掌稽江蘇安徽二省民賦收支奏冊兼覈江寜蘇州織造支銷奏冊江寜京口駐防官兵俸餉江西清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌稽江西省民賦收支奏冊福建清吏司郎中滿洲漢人各一人員外郎滿洲五人漢人一人主事滿洲䝉古漢人各一人掌稽直𨽻福建二省民賦收支奏冊兼覈東西陵及熱河蜜雲駐防等處官吏兵丁俸餉與其乳牛馬牧之政令文武鄉㑹試支供五城振粟皆属焉浙江清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌稽浙江省民賦收支奏冊兼覈杬州織造支銷奏冊杬州乍浦駐防官兵俸餉湖廣清吏司郎中滿洲二人漢人一人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌稽湖北湖南二省民賦收支奏册兼覈荆州駐防官兵俸餉凡各省耗羨之數合其籍帳以時奏之陜西清吏司郎中滿洲蒙古漢人各一人員外郎滿洲三人漢人一人主事滿洲漢人各一人掌稽西安甘肅二省民賦收支奏册并行銷茶引兼覈伊犂烏魯木齊屯田支銷奏册在京漢官俸廩外藩俸幣及巡捕五營俸餉各衙門經費四川清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌稽四川省民賦收支奏册兼覈兩金川等處新疆屯務本省闗稅在京入官户口贓罰銀錢各部院等衙門紙硃支費察直省郡縣之豐歉水旱嵗具其數而上之廣東清吏司郎中滿洲漢人各一人員外郎滿洲三人漢人一人主事滿洲漢人各一人掌稽廣東省民賦收支奏册兼覈八旗繼嗣歸宗更正户口壽民孝子節婦之受旌者給以坊直諸倉諸局諸闗差之滿歳者則以期請代焉廣西清吏司郎中滿洲漢人各一人員外郎滿洲四人漢人一人主事滿洲漢人各一人掌稽廣西省民賦收支奏册兼覈京省錢局運銅鼓鑄及内倉支放供應芻豆雲南清吏司郎中滿洲二人漢人一人員外郎滿洲三人漢人一人主事滿洲一人漢人一人掌稽雲南省民賦收支奏册兼覈山東河南江南江西浙江湖廣等省歳運漕糈京通倉儲及江寧等處水次六倉收支考覈貴州清吏司郎中滿洲漢人各一人員外郎滿洲三人漢人一人主事滿洲漢人各一人掌稽貴州省民賦收支奏册兼覈太平等二十有四闗徵收稅課堂主事滿洲四人漢軍二人直南檔房者滿洲二人掌八旗編審直北檔房者滿洲二人漢軍二人掌酌撥餉銀校勘章疏俱順治元年定額司務㕔司務滿洲漢人各一人順治元年定額職事見吏部篇筆帖式滿洲百人蒙古四人漢軍十有六人滿洲筆帖式初置九十有九人後増至一百三十有五人續改定員數如今制蒙古筆帖式初置二人續増設二人漢軍筆帖式初置十有六人後増至三十二人續裁定員數如初制分隸各司視事之繁簡以為額職事見吏部篇謹案户部自十四司外其别領者有三曰井田科掌覈八旗土田内府莊户凡入官房宅地畝及歳租斂給之數悉以咨之雍正十二年置曰俸餉處掌覈八旗官兵俸餉庫銀丁册視所由牒請畫一而給受之曰現審處掌治八旗户口田房之訟㑹刑部以聴其成皆鑄給闗防乾隆十三年置堂官遴選司屬分治其政令無定員内倉監督滿洲二人内倉本明内官監倉順治十年改今名専隸本部以供内府奉祭祀待外藩屬國朝貢之饔餼教習官役之廩粟牧馬之豆咸貯焉監督應時而給之初屬之廣西司滿漢司官康熙三十二年定於應除小差之滿洲蒙古漢軍年久司官内次除一人管理雍正元年改定本部滿洲司官内委用二年者而代歴代建置尚書以下諸官沿革互詳吏部篇他部倣此三代杜佑通典舜命卨為司徒元孫之子微為夏司徒禮記曲禮天子之五官曰司徒鄭康成注此殷時制也尚書周官司徒掌邦教敷五典擾兆民周禮地官教官之屬大司徒卿一人小司徒中大夫二人鄉師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人大司徒之職掌建邦之土地之圖與其人民之數以佐王安擾邦國小司徒之職掌建邦之教法以稽國中及四郊都鄙之夫家九比之數鄉師之職各掌其所治鄉之教而聴其治以國比之法以時稽其夫家衆寡鄭康成注師長也司徒掌六鄉鄉師分而治之二人者共三鄉之事相左右也周禮天官司會中大夫二人下大夫四人上士八人中士十有六人府四人史八人胥五人徒五十人以九貢之法致邦國之財用以九賦之法令田野之財用以九功之法令民職之財用以九式之法均節邦之財用掌國之官府郊野縣都之百物財用凡在書契版圖之貳以逆羣吏之為治而聴其㑹計唐六典户部尚書周之地官卿也侍郎周之小司徒中大夫也司徒屬官有下大夫葢郎中之任有上士葢員外郎之任通典按今户部之職與地官之任雖亦頗同若徵其承受考其沿襲則户部合出於度支度支主計算之官也算計之任本出於周禮天官之司㑹云謹案司徒本職在敬敷五教故杜佑以為後世户部之任當出於天官司㑹然考周官司徒所屬皆泉布貨賄之政以及萬民之判百族之市罔不聴其治焉正如今所謂戸婚田土之事其以教為職者不過師氏保氏數官耳至鄉師分治六鄉則今户部之十四清吏司按省分職葢猶其遺意也周禮地官舂人奄二人女舂枕二人奚五人掌共米物祭祀共其齍盛之米賓客共其牢禮之米凡饗食共其食米掌凡米事司市掌市之治教政刑量度禁令質人掌成市之貨賄人民牛馬兵器珍異凡賣儥者質劑焉廛人掌斂市䊻布總布質布罰布廛布而入於泉府胥師各掌其次之政令而平其貨賄賈師各掌其次之貨賄之治辨其物而均平之司虣掌憲市之禁令司稽掌巡市而察其犯禁者鄭康成註司市市官之長自胥師以及司稽皆司市所自辟除也謹案地官舂人當為今内倉之職所自出謹著之於表至司市以下諸官俱掌市肆辨物平價之政令歴代因之置市令丞平準令丞或屬京兆河南尹或屬司農或屬少府今惟户部現審處所掌猶近質人之職說見後而順天府通判典治牙儈亦當為兩漢長安市長丞雒陽市長丞之任説具順天府篇中若其他征稅禁令之事掌於戸部者皆分隸各司並無専官今故考論大畧於此不復系諸表内又案晏子春秋載齊有職計葢亦掌財賦之官已互見吏部篇云漢唐六典漢成帝置尚書五人其三曰民曹主吏人上書事後漢以民曹兼主繕修工作當工官之任宋書百官志漢儀尚書郎四人一主户口墾田一主財帛委輸史記髙祖功臣侯表北平侯張蒼為計相四歳漢書如淳注計相官名但知計㑹杜佑曰計相殆今度支之任王應麟曰周以司㑹質歳成漢以計相經國用漢書百官公卿表大農令武帝更名大司農後漢書百官志大司農卿一人中二千石掌諸錢穀金帛諸貨幣郡國四時上月旦見錢穀簿其逋未畢各具别之邊郡諸官請調度者皆為報給損多益寡取相給足丞一人比千石謹案漢尚書郎之主戸口財帛者即今戸部郎中員外郎之任而民曹尚書則未掌財用故杜佑通典以為非戸部之例説具後然考户部本於民部民部本於民曹官制相承實由此出故唐六典即繫之戸部沿革今亦從之又張蒼以善算為計相雖非常置之官而其職實同户部今並著之於表至司農一寺舊說皆以户部當之然司農本出於秦治粟内史為典司委積之官故以農為名漢桑宏羊領大農盡幹天下鹽鐵雖其職似今户部而自晉以後金帛㑹計已别領之度支司農遂専主倉廩租穀實為今倉塲之職不可以概地官之任今但取漢代建置兼載於此而其餘則専繫諸倉塲篇内焉漢書百官公卿表少府屬官有導官令丞師古曰導官主擇米後漢書百官志導官令一人六百石主舂御米丞一人屬大司農三國晉書列傳魏文帝置度支尚書専掌軍國支計宋書百官志魏世有左民民曹尚書金部度支農部倉部民曹郎謝維新合璧事類魏晉儀注曰魏有農部郎中三國吳志孫休升便殿止東廂戸曹尚書前即階下讀奏謹案通典引此文作戸部尚書而三國志實作户曹疑通典傳刻之訛也三國吳志殷禮本占候召張溫乞將到蜀禮還當親本職而令守尚書户曹郎謹案通典亦引此事稱吴時張温為尚書戸曹郎核之吳志乃溫擅以殷禮守户曹郎故孫權指為溫罪非溫自為此官也葢杜佑徵引之誤晉通典晉有度支主算計太平御覽晉起居注曰咸寧五年詔曰一年不收使公私俱匱不惟天時乃人事有不盡也故總要者正在度支尚書也其以中書令張華為度支尚書唐六典左民尚書晉初省之太康中又置惠帝時有右民尚書宋書百官志晉西朝則金部倉部度支左民右民曹郎後又置運漕江左無民運曹郎康穆以來有倉部度支左民曹郎晉書職官志大司農統導官令宋齊梁陳宋書百官志度支尚書領度支金部倉部起部四曹左民尚書領左民駕部二曹度支主算支派也度量也餘曹所掌各如其名導官令一人丞一人漢東京置導擇也擇米令精也南齊書百官志度支尚書領度支金部倉部起部四曹左民尚書領左民駕部二曹大司曹領導官令一人丞一人隋書百官志梁武受命尚書省置度支左户等尚書度支金部倉部左戸等郎天監九年詔五都令史視奉朝請以太學博士孔䖍孫兼金部都司空法曹參軍蕭軌兼左户都司農卿統導官令唐六典梁陳置左户尚書並掌户籍兼知工官之事民部曹梁陳為左户郎隋書百官志陳承梁皆循其制官北魏魏書官氏志始光元年正月置右民尚書通典後魏度支亦掌支計崔亮為度支尚書經營費用歳減億計册府元龜後魏度支尚書之屬統度支掌計㑹凡軍國損益及軍役糧廩事倉部掌諸倉帳出入事左户掌天下計掾户籍等事右戸掌天下公私田宅租調等事金部掌權衡量度内外諸庫藏文帳等事北齊隋書百官志後齊置度支尚書統度支掌計㑹凡軍國損益軍役糧廩等事倉部掌諸倉帳出入等事左户掌天下計帳户籍等事右户掌天下公私田宅租調等事金部掌權衡量度内外諸庫藏文帳等事郎中並一人左户量置掌故主事員唐六典北齊導官有御細部等倉督後周馬端臨文獻通考後周置大司徒卿一人如周禮之制其屬有民部中大夫二人掌承司徒教以籍帳之法贊計人民之衆寡册府元龜後周又有計部大夫其户部度支金部倉部咸準六官各以其差次屬焉隋隋書百官志髙祖受命尚書省總度支曹度支尚書統户部侍郎各二人金部倉部侍郎各一人開皇三年以度支尚書為戸部尚書煬帝増六曹各侍郎一人以貳尚書諸曹侍郎並改為郎又改户部為人部郎以異侍郎之名導官置令二人導官有御細倉督二人謹案今户部之名肇於唐髙宗時隋世户部尚稱為民部煬帝時韋沖為民部尚書武徳二年隋民部尚書蕭瑀為相府司録隋志修於貞觀之世避太宗御名故改民字為户字其實隋代並無户部尚書侍郎也惟人部當為户部郎隋志既改民部為户部嫌其同名故又别改作人字耳通典漢有民曹主吏民上書後漢光武改主繕修工作鹽池苑囿魏置左民尚書晉又加置右民尚書至於宋齊梁陳皆有左民尚書而後魏有左民右民等尚書多領工役非今户部之例而梁陳兼掌户籍此則畧同自周隋有民部始當今户部之職唐新唐書百官志户部尚書一人正三品侍郎二人正四品下掌天下土地人民錢穀之政貢賦之差其屬有四一曰户部二曰度支三曰金部四曰倉部戸部郎中員外郎掌户口土田賦役貢獻蠲免優復婚姻繼嗣之事以男女之黄小中丁老為之帳籍以永業口分園宅均其土田以租庸調斂其物以九等定天下之户以為尚書侍郎之貳其後以諸行郎官判錢穀而户部度支郎官失其職矣㑹昌二年著令以本行郎官分判錢榖户部巡官二人主事四人度支主事二人金部主事三人倉部主事三人髙宗即位改民部曰户部龍朔二年改户部曰司元度支曰司度金部曰司珍倉部曰司庾光宅元年改戸部曰地官天寳十二載改金部曰司金倉部曰司儲有戸部令史十七人書令史三十四人計史一人亭長六人掌固十人度支令史十六人書令史三十三人計史一人掌固四人金部令史十人書令史二十一人計史一人掌固四人倉部令史十二人書令史二十三人計史一人掌固四人度支郎中員外郎各一人掌天下租賦物產豐約之宜水陸道涂之利歳計所出而支調之以近及逺與中書門下議定乃奏金部郎中員外郎各一人掌天下庫藏出納權衡度量之數兩京市互市和市宫市交易之事百官軍鎮蕃客之賜及給宫人王妃官奴婢衣服倉部郎中員外郎各一人掌天下庫儲出納租稅禄糧倉廩之事以木契百合諸司出給之數以義倉常平倉備凶年平穀價通典大唐永徽初改民部為户部廟諱故也顯慶元年改户部為度支龍朔二年改度支尚書為司元太常伯咸亨元年復為户部尚書初戸部居禮部之後武太后改置天地四時之官以户部為地官由是遂居禮部前户部郎中二人員外郎二人建中三年户部侍郎判度支杜佑奏天寳前户部事繁所以郎中員外各二人判署自兵興以後户部事簡度支事繁惟郎中員外各一人請回輟郎中員外各一人分判度支案待天下兵革已息却歸本曹奉勅依唐㑹要垂拱四年四月加戸部侍郎一員元和六年户部奏請置巡官二人從之舊唐書食貨志髙祖成帝業其後掌財賦者世有人焉開元以前事歸尚書省開元以後權移他官由是有轉運使租庸使鹽鐵使度支鹽鐵轉運使常平鑄錢鹽鐵租庸青苗使水陸運鹽鐵使租庸使兩稅使隨事立名沿革不一謹案唐代錢穀之政其初専屬之户部自中葉以後始令他官主判遂各立使名分掌利權户部本曹浸失其職凡前後所置名目猥多至為繁雜今以食貨志所載考之如轉運使水陸運使専司轉漕當為今漕運總督之職鑄錢使専掌鼔鑄當為今户工二部錢法侍郎之職今已各據職掌别繫於表又度支使鹽鐵使判户部當時謂之三司専主財用出納皆命重臣領使後遂以宰相兼之與今特簡大臣綜理户部三庫者其制頗近今亦析繫三庫表内至若青苗使代宗即位分遣憲官稅天下地青苗錢及稅地錢物使代宗時以御史大夫充之户口色役使元宗時楊慎矜為之諸名乃一時權宜之法租庸寳應間元載為租庸使常平永泰間劉晏第五琦俱帶常平使兩稅徳宗時楊炎作兩稅法置使總之諸使其職掌今悉隸各布政司而以户部總之唐代建置紛紜徒滋冗瑣今并附識於此以著其弊焉唐六典導官署令二人正八品上丞四人正九品上掌供御導擇米麥之事五季舊五代史食貨志天成四年户部奏三京鄴都諸道州府所徵夏秋稅分立限期舊五代史職官志同光元年尚書倉部員外郎趙鳯户部尚書盧質天成元年尚書户部侍郎馮道謹案五季户部官制格式不著於史今畧採薛居正舊史二條以見當時職掌名額大抵多仍唐舊也宋合璧事類宋初户部判部事一人以兩制以上充凡户口田產錢榖食貨之政令皆歸於三司三司謂鹽鐵戸部度支也本曹但受天下之土貢元會陳于庭而已續會要元豐改官制罷三司歸户部左右曹而三司之名始泯矣四朝志初除安燾為户部尚書續會要户部掌天下人民錢穀之政令貢賦征役之事以版籍考户口之登耗以稅賦待軍國之歳計以土貢辨郡縣之物宜以征榷抑兼并而佐調度以孝義婚姻繼嗣之道和人心以田務劵責之理直民訟凡此歸於左曹以常平之法平豐凶時斂散以免役之法通貧富均財力以伍保之法聮比閭察盜賊以義倉賑濟之法救饑饉恤艱阨以農田水利之政治荒廢務稼穡以坊場河渡之課酬勤勞省科率凡此歸於右曹其屬有三曰度支上供俸賜及邦國經度㑹計之事隸焉曰金部貨賄出納之制及權衡度量頒禁之令隸焉曰倉部凡國之倉廩儲積及其給受之事隸焉尚書掌軍國用度財賦出納州縣廢置升降凡四司所治之事侍郎為之貳郎中員外郎參領之獨右曹事弗預専隸所掌侍郎若事屬本曹而歴郡縣監司不能直則受其訟焉舊三司使即今尚書舊三司副使即今侍郎其權發遣副使即今權侍郎舊三司判官推官即今郎中員外郎之任也續會要神宗正史職官志宋史職官志户部凡官十有三尚書一人侍郎二人郎中員外郎左右曹各二人度支金部倉部各二人尚書侍郎掌軍國用度以周知其出入盈虚之數左曹分案五置吏四十右曹分案五置吏五十有六建炎後左曹分案三曰户口曰農田曰檢法設科有三曰二稅曰房地曰課利右曹分案六曰常平曰免役曰坊場曰平準曰檢法曰知雜裁減吏額左曹四十人右曹三十人舊制户部侍郎二人中興初止除長貳各一員或止除尚書若侍郎一員紹興四年七月詔户部侍郎二員通治左右曹自此相承不改郎中左曹右曹員外郎掌分曹治事建炎三年詔省併郎曹惟户部五司以職事繁劇不併仍各置一員初制主管左右曹總稱户部郎官紹興七年閻彥昭兼左曹郎官紹興三十二年徐康正除左曹郎官自是相承不改度支郎中員外郎㕘掌計度軍國之用量貢賦稅租之入以為出分案五曰度支曰發運曰支供曰賞賜曰知雜吏額置五十人淳熙十三年減四人金部郎中員外郎㕘掌天下給納之泉幣計其歳之所輸歸於受藏之府以待邦國之用分案六曰左藏曰右藏曰錢帛曰榷易曰請給曰知雜吏額共六十人淳熙十四年減四人倉部郎中員外郎㕘掌國之倉庾儲積及其給受之事分案六曰㑹塲曰上供曰糶糴曰給納曰知雜曰開拆吏額共置二十五人續又減二人謹案自隋置度支民部金部倉部四司唐惟改民部為户部而户度金倉四司如故宋亦因之金元不分曹以令史分頭掌之明初復以各布政司分隸户部設十三司而其制遂變今户部各司書吏尚區為四科曰民科曰支科曰金科曰倉科分案管理葢猶沿唐宋四司之名目也宋史職官志熙寧三年以三司推勘公事歸大理寺元祐三年三省言大理寺右治獄並罷依三司條例户部置推勘檢法官治在京官司凡錢穀事謹案周禮地官質人掌治質劑者鄭康成注謂賫券契者來訟也葢所以平爭而禁偽故特設官以治之歴代並無専司惟宋元置檢法官於三司户部頗合周禮遺意今户部有現審處主平旗民户口田土之訟亦質人之制也遼遼史百官志初太祖分達喇額爾奇木原本作迭剌夷離堇今改正為北南二大王視户部北院大王知北院大王事南院大王知南院大王事分掌部族軍民之政南面官僚其始漢人尚書省户工有主事中葉彌文於庫部虞部倉部員外出使則知備郎官列宿之員矣金金史百官志户部尚書一員正三品侍郎二員正四品郎中二員從五品員外郎三員從六品郎中而下皆以一員掌户籍物力婚姻繼嗣田宅財業鹽鐵酒麴香茶礬錫丹粉坑冶𣙜塲市易等事一員掌度支國用俸禄恩賜錢帛寳貨貢賦租稅府廩倉廩積貯權衡度量法式給授職田拘收官物并照磨計帳等事主事五員從七品女直司二員通掌户度金倉等事漢人司三員同員外郎分掌曹事兼提控編附條格管勾架閣等事令史七十二人内女直十七人譯史五人通事二人泰和八年増八人架閣庫管勾一員正八品掌户禮兩部架閣大安三年以主事各兼之同管勾從八品檢法從八品勾當官五員各八品貞元二年設幹辦官尋罷之四年更設為勾當官専提控支納管勾勘覆經歴交鈔及香茶鹽引照磨文帳等事金史百官志主廩太倉兼屬衞尉司元元史百官志户部尚書三員正三品侍郎二員正四品郎中二員從五品員外郎三員從六品掌天下户口錢糧田土之政令凡貢賦出納之經金幣轉通之法府藏委積之實物貨貴賤之直斂散准駁之宜悉以任之中統元年以吏户禮為左三部至元元年分立户部尚書三員侍郎郎中四員員外郎三員三年復為左三部五年復分為户部尚書一員侍郎郎中各一員員外郎省為二員七年始列尚書六部尚書二員侍郎二員郎中二員員外郎如故十三年尚書増置一員侍郎郎中員外郎如故十九年郎中員外郎俱増至四員二十三年六部尚書侍郎郎中定以二員為額明年以户部所掌視他部特為繁劇増至二員成宗大徳五年省尚書一員員外郎亦省一員各設三員主事八員蒙古筆且齊原本作必闍赤今改正七人令史六十一人回回令史六人克哷穆爾齊原本作怯里馬赤今改正一人知印二人奏差三十二人䝉古書寫一人典吏二十二人司計官四人富大用事文類聚元户部令史分掌名頭有金科倉科内度科外度科糧草科審計科明明史職官志户部尚書一人正二品左右侍郎各一人正三品其屬司務㕔司務二人従九品浙江江西湖廣陜西廣東山東福建河南山西四川廣西貴州雲南十三清吏司各郎中一人正五品宣徳以後増設山西司郎中三人陜西貴州雲南三司郎中各二人山東司郎中一人員外郎一人從五品宣徳七年増設四川雲南二司員外郎各一人後仍革主事二人正六品宣徳以後増設雲南司主事七人浙江江西湖廣陜西福建河南山西七司主事各二人山東四川貴州三司主事各一人照磨所照磨一人正八品檢校一人正九品尚書掌天下户口田賦之政令侍郎貳之稽版籍歳㑹賦役實徵之數以下所司十年攢黄册差其户上下畸零之等以周知其登耗凡田土之侵占投獻詭寄影射有禁人户之隠漏逃亡朋充花分有禁繼嗣婚姻不如令有禁皆總覈而糾正之天子耕耤則尚書進耒耜以墾荒業貧民以占籍附流民以限田裁異端之民以圖帳抑兼并之民以樹藝課農官以芻地給馬牧以召佃盡地利以銷豁清賠累以撥給廣恩澤以給除差擾復以鈔錠節賞賫以讀法訓利民以權量和市糴以時估平物價以積貯之政恤民困以山澤陂池闗市坑冶之政佐邦國贍軍輸以支兊改兊之規利漕運以蠲減賑貸均糴捕蝗之令憫災荒以輸轉屯種糴買召納之法實邊儲以禄廩之制馭貴賤十三司各掌其分省之事兼領所分兩京直隸貢賦及諸司衞所禄俸邊鎮糧餉并各倉塲鹽課鈔闗初洪武元年置户部六年設尚書二人侍郎二人分為五科一科二科三科四科總科毎科設郎中員外郎各一人主事四人惟總科郎中員外郎各二人主事五人八年中書省奏户刑工三部事繁戸部五科毎科設尚書侍郎各一人郎中員外郎各二人主事五人内㑹總科主事六人外牽照科主事二人十三年陞部秩定設尚書一人侍郎二人分四屬部總部度支部金部倉部毎部郎中員外郎各一人總部主事四人度支部金部主事各三人倉部主事二人二十二年改總部為民部二十三年又分四部為河南北平山東山西陜西浙江江西湖廣廣東廣西四川福建十二部四川部兼領雲南部設郎中員外郎各一人主事二人各領一布政司户口錢糧等事量其繁簡帶管京畿毎一部内仍分四科管理又置照磨檢校各一人稽文書出入之數而程督之二十九年改十二部為十二清吏司建文中仍為四司成祖復舊制永樂元年改北平司為北京司十八年革北京司設雲南貴州交趾三清吏司宣徳十年革交趾司定為十三司其後歸併職掌凡宗室勲戚文武官吏之廩禄陜西司兼領之北直隸府州衞所福建司兼領之南直隸府州衞所四川司兼領之天下鹽課山東司兼領之闗稅貴州司兼領之漕運及臨徳諸倉雲南司兼領之御馬象房諸倉廣西司兼領之明官制户部御馬倉大使從九品副使未入流長安門倉副使東西北安門倉副使俱未入流欽定歴代職官表卷六
