front:
  text: 御製詩
  hash: sha256:1c11c773b4cbc7636e2985c94b3511489b99f608c20c777c6ada277822cbd392
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0015_WYG_002-1a, image: WYG0601/WYG0601-0005c.png}
body:
  text: 職官表聫句有序惟王建國綜六典以正萬民咨汝亮功撫五辰而凝庶績越二十二朝之損益遐哉鳥火雲龍溯三百六十之源流備矣工虞禮樂昨者書成祕閣因四庫以考職官今當慶洽初韶宴重華而賡喜起自漢沿秦制更張三統規模宋仿唐階參錯六朝建置元興草創畧踵遼金明季淪胥漸渝洪永惟治人斯有治法而守道不如守官我國家祗叙天工肇修人紀龍興締造首詳三院之名虎旅奮揚爰建八旗之號定鼎而折衷百代因時有增設之員勅幾而澄叙九流接覲無貸權之事以至祗膺列爵札薩克世奉屏藩底定新疆衛拉特勢聨侯尉武成文守大法小亷品秩所以釐然班聨於斯肅矣乃欲循名而責實必先援古以證今申命儒臣博徴往蹟立表而體兼乎志𣙜商遷固之遺文緯史而義準諸經斟酌虞周之舊典旁行直上勤乙覽以披函列署分曺勵寅清而示鑑四千載目張綱舉徧攬前聞廿八人環轉珠聨合形新詠庶幾歌風解阜我君臣相悦以同聲更期思日賛襄爾寮采協恭以將事御製股肱元首朂明良表撰職官勅慎詳乾隆庚子九月諭四庫館臣以國家設官分職制度詳備不殊周官其間因革損益名異實同今之某官即前代某官又或古有今無古無今有允宜勒定成書因命將本朝文武内外官職階級與厯代沿襲異同之處詳稽博考纂成職官表録入四庫全書刋布頒行以昭中外一統古今美備之盛親族猶先重堯典宗人府即厯代之宗正寺掌皇族屬籍以時修輯令左玉牒辨㡰昭穆爵祿均其恵養教令焉設官有宗右宗正左右宗人府丞左右理事等官分掌其事乾隆戊戌年諭復睿親王多爾衮等封號追謚襲封配享太廟壬寅九月諭將宗室王公子弟均照䝉古王公台吉塔布囊等子嗣之例恩給官頂其餘閒散一概給予四品頂戴並於今嵗新正賜宴乾清宫錫賚有差展親睦族以昭渥典肆筵具邇邁姬章綸言直下中書省阿柄寧移政事堂内閣職司票本大學士以下有學士侍讀學士侍讀典籍中書等官自明太祖罷丞相以大學士専司票擬不過如知制誥之翰林其後職任漸崇閣權遂重伏讀乎官聖諭事權輕重原視乎人主之委任而不繫職之崇卑我朝乾綱獨攬官府肅清閣臣惟知恪奉官常威柄不移洵從古所未有也六典總持歸簡要臣阿桂三銓成法協平康六部尚書侍郎以下有郎中員外郎主事筆帖式司務等官吏部主銓叙升降凡職官有缺依例銓選候引見欽定其大缺開列請㫖盡除明代廷推之弊至内外各官議處降革均按例題奏請㫖遵行度支計裕用恒節蠲賑恩頻富倍藏户部平準出納以均邦賦出入有經我部朝宫府歳支撙節帑藏充盈乾隆初年庫存銀三千萬兩今且幾八千萬兩並無加增賦税且䝉恩普免天下地丁錢糧三次蠲免漕糧二次其餘縣貸不下萬萬而國用饒裕實史冊所未覯云府庫籍收山積廣臣三寶泉源義取水流長三庫主財用出入掌國朝皆専派親信大臣之寶泉寳源二錢局主鼓鑄户工二部右侍郎掌之其三庫司官及錢局監督由各衙門保送引見恭候用簡時哉損益皇為極懋爾寅清國有慶禮部掌五禮凡祭祀燕饗朝㑹諸大典皆掌之本朝制度修明視漢唐為詳備其職尢重裁國家慶典頻蕃隆儀備舉無一不仰禀之治睿準今酌古繁簡得中洵足昭郅隆依律䕫韶諧搏拊樂部即周官大司樂之職我更皇上審音合律訂正樂章製鎛鐘特磬釐定樂舞之製悉歸雅正嵇璜占風象譯㑹梯航㑹同四譯館乾隆年間改𨽻禮部以司員攝鴻臚少卿領其事葢如周官象胥掌客之職中樞莫贊星鈐宻右選欣增嵗禄穰明代以兵部為中樞機宜進退悉以委之事多掣肘我朝命將征行皆仰禀赫濯睿畧兵部惟掌兵數及武選之事武功良由措置得宜也邇年復奉各省恩㫖添給武職養亷將原扣名糧改補實缺共添兵六萬六千餘名棊布星羅營制益昭整肅止辟祥刑䘏圜土刑部綜司邦禁内外問刑衙門一切讞斷皆核覆題奏務期平允秋讞大典集九卿㑹議届期復集大學士廷臣㑹同刑部面承㫖訓詳審再三寛嚴協中其緩決人犯間三四年復䝉徳實恩命減等發落矜恤之心好生之為超軼前古安臣福隆御製好生大徳體穹蒼共工熙績一人足掌土居民九牧倡今之工部掌營造修防兼有前代都水監將作大匠之二職至内外𦂳要工程如壇廟城垣等工百務具舉均派親信大臣督辦物給價工給直並無絲毫派累且窮民得以工代賑無不踴躍子来典屬今繁蘇武職理藩全統衛拉平聲疆我薩朝威徳逺被䝉古王公扎克等及新疆衛拉特囘部均𨽻理藩院嵗時朝覲内入宿衛扈從行圍與内地臣僕無異是理藩院職任雖亦如周禮之大小行人漢之典屬國而内外聨屬統馭之制逺勝前代所設堂司各員亦與六部相等剔除秘政清烏府採聴芻言簡皁囊都察院本前代御史臺以察覈官常整飭綱紀為職我朝庶政肅清凡言官亦奏事糾彈片言可採者無不立予准行科道等不敢挟私樹黨互相攻訐前代積習為之一清給事舊仍常侍署六科給事中本古門下省官明代自為一署本朝雍正初改𨽻都察院體統益昭嚴肅臣和珅警巡分𨽻太平坊五城御史如唐之左右街廵使司坊官如漢之長安雒陽部尉也封投閣祕懲闗白緘進郵遄核貼黄通政使司掌進各省省題本如漢之公車令宋之銀臺司各題疏由驛齎到封送内閣皆有定期按期查核無敢如前代之稽延抑滯髙下其手者讞集三司平庶獄臣永責品儕九寺肅羣綱大理寺本出前代廷尉職在平反與刑部都察院稱三法司祠官董領歸宗伯毁禮精䖍飭奉常太常寺掌典守祭祀所壇壝少卿寺廟讀祝贊社以嵗時序其設卿丞禮諸官例以禮部滿尚書領之如周官宗伯典禮之制我皇上精禋専恪恭遇郊執廟大典躬親將事備極誠敬凡駿奔事無不仰瞻晬穆益凛䖍恭禋恪豆籩供廟壝臣梁國治地嚴弓劒備丞郎各祀丞諸壇各祀員廟設尉及祠祭署奉陵寢自總理事務大臣以下有掌闗防官及禮部内務府工部諸員以䖍奉明禋恪供灑掃詞曹華選颺鸞藻吉士英培翽鳯岡翰林院典為國史圖籍制誥文章自古稱清華選我皇上親幸翰林院養樂御製詩章臣榮恩加宴賚並增葺庶常館教育尤極儒遇至經筵講官及毎科教習庶吉士均由翰林院奏請簡充儤直螭坳垂筆槖古左日講官如唐侍講宋説書日侍起居注官即右史凡恭遇大典分直以翰林官兼充保徳御製新銜芸館檢緹緗文淵閣於乾隆丙申肇建藏弆四庫全書設領閣事提舉閣事直閣事校理檢閲等官以大學士以下館閣諸臣充之規制周詳名實益為相副居今亦備參入掌出列鑒古惟懐鄭重方詹事在厯代俱為宫官元史鄂勒晳署詹事長入叅謀議出掌環衛云云至我朝惟存為翰林陞轉之階葢自古書生拘迂之見動以建儲為國本其實皆自為日後身家之計無禆國是試觀漢唐建儲如漢武帝唐太宗之英明猶有戾太子及承乾之變其他難以遍舉誠以立儲之後宵小乗間伺隙醸為亂階其弊有不可勝言者我國家三朝嗣服均未明言冊立而宫府肅清中外晏如儲之皇祖時宻理親王之事仰煩熟籌聖慮亦可知建斷斷不可行也朕於此往復知之甚審我子孫當敬凜此訓奉為萬年法守也光禄減明十之九犬官視漢半而强明代各省額解光禄寺銀米甚多令中官提督寺事片紙傳取如數供億莫知真偽嘉靖以後嵗用逾四十萬厨役至四千餘名糜費無節諸弊叢生我朝自康熙年間定制錢糧皆歸户部光禄以時支取厯加撙節今毎嵗祇支銀二萬兩月要其數以奏較之明代經費尚不及十分之一所設有卿少卿丞簿等官别以大臣領之非若漢時之光祿勲兼為宿衛之長以故官不冗而事易集品式有定出入有經信足永昭儉徳云牧垌秋獮驪黄比蹕路天行幄幔張太僕寺掌張家口外左右翼牧場均齊賞罰之政乃諸牧場之一也凡扈従卿及少卿網奏請一人隨等一蹕豫備幔城城駝載槖駝切事宜帝澤巽申崇赤縣臣曹秀先農祥吉亥捧青箱順天府即厯代京尹近年凡特命大臣兼管以重其職耕耤率僚屬從耕襄事臚音𫝊陛鳴鞭應儐賛催班佩玉鏘鴻臚寺本出漢大鴻臚其所掌引相朝儀與漢謁者臺唐宋閤門宣賛相近宵雅肄官優廪餼臣周煌大昕鼓衆幸膠庠國子監為成圴重地屢䝉興所聖駕臨雍釋奠圜橋觀聴者無不感激奮屬滿漢䝉古學算學各助教等官分掌教士優給膏火廪餼肄業期滿分别錄用規制最為周備算精勾股弧三角術驗歐羅斗六匡欽天監兼有周太史馮相保章三職漢以來為太史令専主算術天文藴本朝時憲兼用西洋算法御製數理精欽定儀象考成萬年書協紀辨方等書天體地平諸儀推算精宻考據詳審法實可垂永久懸肘底須求大藥臣劉墉折肱應許遇長桑周有醫師秦漢有太醫令太醫監分屬於少府太常今則自為一署置院使院判率其屬以供醫事焉重臣參筦釐供簿尚御鉤稽撤侍璫周官玉府内府等職統之冡宰漢以後有少府寺殿中監皆掌乗輿服御諸物自宋以後其職漸移於奄宦至明而流弊益甚國初罷十三監特置内務府分設七司以經理大内府諸政其總管無定員以王公及滿洲文武臣為之葢即周官統於冡宰之意而規制尤為詳備云皁服雄姿逢伯樂臣王杰御製僕縁精義析䝉莊上駟院掌馬匹駝隻以供御用當即國語所謂王馬如漢之太廐未央家馬諸令丞唐之左右仗廐飛龍使及尚乗等官凡遇時廵於御馬内簡其尤良者以從又毎歲秋獮行圍預於春月驅馬至喀喇河屯牧養備用向曾有詩於卿郎職司調習御馬諸法臚舉詳賅昨嵗山莊有上駟詩辨及莊子僕縁詞義詳見按語上林兼飭農蠶務内府分司苑囿場奉宸苑掌苑囿政職任亦如周官之掌舍掌次漢之水衡都尉上林令丞之類其所屬有稻田場溉水四千畦供上方玉粒凡京城内外河道橋牐均由苑經理董率蓄洩又織染局供織絹匹所司農蠶水利衣食之原非僅古之林丞比也劼毖戎裝卿武備簡儲御械衛龍驤武備院掌供矢橐御用武備凡修整御幄帳殿甲冑弓鞬槍刀成造皆其職掌如漢尚方考工諸令之職舳艫漕轉来通潞秷秸陳因實太倉倉場駐劄通州専管天下漕運輸納神倉實漢以來大司農之職國家慎重天庾設滿漢侍郎總督其事承以坐糧㕔監督等官嵗派御史廵查間復差大臣稽核諸務釐剔漕政肅清五部分曹員畧具臣謝墉二京建尹秩相當陪盛京為都重地綜以五部侍郎董以京尹頗準於神京之制而吏部則専統於京師學政則兼掌府丞視明代留京官制尤為斟酌盡善義符集賽排辰直轄總勾陳列曜芒以國初以八旗將士平定海内選備隨侍宿衛統領侍衛内大臣以先後宸御左右翊衛輪直勲宫禁職最親近若周官之宫正宫伯漢光祿領三署唐之十六衛元之四集賽諸職立仗瑶閶開詄蕩臣阿肅鳴鑾葩瑵導飛翔鑾儀衛若周中車大馭漢奉車都尉之職我朝設滿漢鑾儀使冠軍使雲麾使治儀正整儀尉等官統以掌衛事内大臣一人職任尤重専旗統率連㕘佐偏甲驍騰别正鑲良國家神武開基建旗辨色法制善居則環衛周防出則折衝禦侮毎旗設都統一員副都統二員所屬有叅領佐領驍騎校等官我皇上教養八旗恩意周渥所由磐石奠安臂指相使誠超越百代垂治萬年者矣兩翼啟行先罕畢臣董誥前茅選勁耀戈鋩前鋒統領掌督率前鋒警蹕宿衛凡行幸則於王大御營外安設卡倫左右翼統領各一人或以臣兼領葢如前代衛尉御營使之職所屬有㕘領侍衛校長等官以時訓練定其黜陟營制最為詳善紫垣鈴柝周廬禁黄褶櫜鞬宿禦防䕶軍統領掌督率䕶軍宿衛諸門掌其禁令亦前代衛尉之職毎旗統領一人督率訓練以時考驗所屬有㕘領䕶軍校等官凡専行在宿衛扈頓營蹕以㕘領營總掌之司綱城堆舖守衛諸政尤為整肅重鑰九門樞特綰步軍統領提督京營掌管門禁廵捕郊畿葢兼有前代司𨽻校尉城門校尉執金吾之職得國家整飭綱維委任尤重惟親信重臣䝉簡授臣福長安御製五營萬旅備毋忘步軍向設廵捕三營上年増為五營添設兵四千餘名所屬文職有員外郎主事司務筆帖式等官武職有八旗翼尉協尉城門領副尉步軍尉等官五營各分設副將㕘將游擊守備外委干把總各官並募民充當畨捕人役以伺察旗民法制益為周備習勤火器河稱玉火器營掌教演火器之政令以時訓練乾隆三十八年移建西頂後之玉河岸邊别為一營以去城市逺俾得専心講習其演放進步連環鎗法有童而習之者技藝精熟為前代所無登練雲梯山號香健鋭營習雲梯馬步射鳥鎗水戰駕船駛風之技乾隆十四年於香山實勝寺傍列營聚處隨時教演從前平定西陲及兩金川屢經調派出征最為勇敢圴著勞績御苑八旗惟守衛雍正元年設圓明園八旗䕶軍營掌圓明園翊衛之政令周圍駐劄守衛以時訓練然不派兵隨圍獵圍三面詎披猖三旗虎槍營總統一人總領六人毎旗虎槍二百人茶遇聖駕時廵佩虎槍於侍衛前導若虎人行圍遇大獸則列槍從之凡殺虎以首先刺名奏開疇咨慎簡封坼寄控制雄膺節鉞光總督統轄文武其職如魏晉之大都督隋唐之大行臺廵國家慎重封圻例加兵部尚書及右都御史銜撫提督皆受其節制所轄兩省惟直𨽻四川以總督兼廵撫事我皇上整飭吏治督撫大吏簡用尤慎各省奏牘毎至即䝉製久批答並諭廷寄諭㫖隨事訓示伏讀御任詩誡諄詳葢重其職任而尤嚴其考核云七省調供資發運臣曹文埴五年輪免緩輸將漕運總督専司七省漕務所轄各省糧道及漕標將備衛所各官體制優隆不僅如前代水陸發運使之職我方歉皇上恵愷覃敷普免天下漕糧二次間遇一收毎截漕以濟他省並毎嵗分漕務命廵漕御史稽查催督肅清經理實為盡善牐排濟兖疏宣暢壩屹淮徐啟閉臧河道總督二員分司南河東河運道隄防諸政葢即前代河隄使者之職而委任過之親加皇上軫念河防凡五次所南廵閲視指授修防宣洩各事宜屬道員諳習河務者毎邀選也恩破格簡署總督葢重其開府望聨卿士月臣達椿中丞銜帶内臺霜廵撫總理通省文武刑名錢穀諸政其名起於唐髙宗特遣大臣分道廵撫葢即古監長連帥之任我朝委任特隆例加兵部侍郎及右副都御史銜職任與總督相垨承宣徳意風行草屏翰方隅䕃在棠布政使掌各直省財賦出納其職與宋諸道轉運使提舉司為近凡屬員陞調督題補皆掌之有事例得専摺奏聞雖統於撫實為方面大員領袖律準平反親蔀屋臣錢載臬陳欽慎達巖廊按察使為刑名總匯宋之諸道提刑是也凡屬員糾効革審皆掌之其職級次于布政使而體制則同㑹垣駐為監司重列郡廵看直指襄糧儲鹽法兵備河庫茶馬屯田及守廵道各司其職以佐藩臬而布其教令葢即前代所謂監司也我皇上慎簡人材凡道員奏署兩司者得具摺奏事藉以觀其才識亦重其倚任也守出一麾稱自宋知府督率所屬課農桑礪風俗平獄訟各有同知通判等官以佐之皇上澄叙官方尤重牧守特命書知府以上名於簡任即䝉召對御屏凡知府初膺訓誨周詳葢知府親臨屬縣賢否易知故重其選莊存與御製制沿獨奏溯諸唐直𨽻州之職畧如知府毎於州縣中記名特簡考唐渤海國郢銅涑三州為獨奏州不𨽻于府猶今直𨽻州也州云牧以幅員廣縣曰令同師率知州知縣各治其土田户口賦税詞訟佐以丞簿等官國家首重親民牧令凡知州知縣由部選者均帶領引見職任繁簡量缺酌調其由大計卓異及稍有勞績奉㫖引見者每予記名擢用佐貳孰無長民責各省司府首領等官各司職業分任差委其才具出衆著有勤勞者毎䝉恩破格超擢亦任官惟材之意雜流亦取衆才量州縣雜職有吏目典史驛丞廵檢等官外又有牐官倉庫税課大使或司一事或任差委他若各府州縣僧録道録等司及隂陽官醫官等亦掄選劄充俾各率其徒以備一職白山黑水留都壯豳邑豐原寶運昌翼盛京自順治初即以内大臣為總管統轄兩官兵後吉林黑龍江各置將軍與副都統等分地鎮守大陪京重寄屏翰攸隆非親信臣莫克膺斯任也江左専轅及閩粤臣紀昀荆南巨閫逮秦涼江寜福州廣州荆州西安寧夏各設駐防將軍一員副都統一二員所屬有協領㕘領城守尉防守尉防禦等官統率滿兵各資保障軍臺控馭柔藩部佛藏綏懐䕶法王荒國家威徳逺被遐絶徼咸置官鎮守如喀爾喀軍營烏里雅蘇臺庫倫西寧等處設定邊左副將軍㕘賛大臣駐劄大臣等員董其事西藏亦撫綏命大臣駐守用以控馭示無外之盛軌二萬里胥環户闥臣汪廷璵十千耦遍闢亭障我域拓皇上聖武逺揚平定西地二萬餘里其準回二部各設官置吏自伊犁將軍烏魯木齊都統以下或以大臣或侍衛官員輪畨莅治視漢之都䕶校尉規模益宏逺矣腹邊掄將聲聨絡水陸蒐兵陣頡頑提督總統緑旂明號令閲軍實以整飭營伍其山東山西河南江西等省以廵撫兼之總鎮指麾趨列弁臣金士松協戎訓練勵同裳聰兵統轄鎮標有専之寄副將分統協標咸率其屬而訓練之陸路水師各資表率遇有缺出請㫖簡放以重職守遞分勇爵援枹振並奮偏禆拔㦸趪㕘將游擊都司守備千總把總各按營汛分防水陸互應形勢相資視前代規制更為周宻都司守備以上由督撫預保註冊兵部照例擬陞其㕘逰等官多䝉善也記名簡用慎重營伍立法詳藻泮莪阿文治盛臣陸費墀御製松州榆塞教思彰學政掌各省學校之政率教授學正教諭訓導等官訓迪諸生即元提舉學校之職國初設立各省學道雍正年間改為京差邇年於鎮西府承徳府各建考棚設學額郷試另編字號取中以彰文教之盛固稱煮海佐國計應念朘膏致政傷鹽政即廵鹽御史浙江山西廣東福建等省皆督撫兼攝長蘆兩淮多以内務府司員選充所屬有鹽運使運同運判大使之屬惕鑒前明司内監江寜蘇州杭州織造各一人以内務府司員選用所屬有司庫庫使筆帖式等官各司本職不得預干地方事前明内監滋擾之弊為之肅清織文異昔貢維揚三處織造供尚衣回部御用及賞賚綺帛並新疆交易綢縀皆發辦帑造貨通山澤兼防宄税薄闗津總恵商我朝各省闗税輕减多交將軍督撫委大員監收其張家口等處用各部保送司員龍江滸墅南北新闗交織造兼管淮闗粤海闗之弊簡用京員盡洗前明閹寺司權十四等封繁玉牒臣陸錫熊二旬嵗襲普銀潢凡宗室封爵和碩親王世子多羅郡王長子多羅貝勒固山貝子鎮國公輔國公不入八分鎮國公不入八分輔國公鎮國將軍輔國將軍奉國將軍奉恩將軍共十四等其子俱以次降襲惟功封親王郡王之子仍其父爵又親王至將軍除承襲父爵外其餘應授封者俟年及二十試馬步射分别給予封爵恩意備極周詳前勲世賞延殊渥後嗣家傳保令望公侯伯子男輕車都尉俱分三等及騎都尉雲騎尉承襲次數均有差其授爵在順治九年詔前恩詔前及承恩公均世襲罔替又得封襲罔替詔後復以軍功加封至一等男以上亦世其因陣亡授爵襲次已完者復䝉騎皇上特恩仍令世襲恩尉洵極酬庸渥典八命上公承禮器臣倪承寛五經博士奉蕭薌國家重道隆儒超軼往代我皇上釋奠臨雍展謁闕里禮意有加定制二先師孔子後裔衍聖公外有博士學正學錄共人孔顏曾孟四氏有教授學錄各一人周公以下後裔授博士者二十五人又孔廟執事官三品至九品四十一人優禮聖賢後裔備至寵加保傅寧輕授力効涓埃愧久敡保傅加銜前代為公孤之職本朝慎重名器不以輕授至宫衘之設以昭殊榮優眷惟一二品大臣欽奉特恩者得邀其敡厯中外宣力勤勞者身後亦多䝉加賞鴻誥叨榮階秩秩臣童鳯三龍章錫類語煌煌文職自光祿大夫至登仕佐郎凡十八階武職自榮禄大夫至奮武郎凡十三階皆明備誥勅所授即唐宋之文武散官而立制更為恭遇國家慶典錫類推恩其曽祖父母以下皆視本任階銜封贈有差凡誥勅制詞皆掌於内閣鐵牌訓勒嚴閽禁金鏡明操戒竈煬周官以閽人寺人内䜿屬之冢宰聖人立制用意深逺自漢置中常侍唐置内寺省厚加爵禄馴致亂階明代設立司禮太監假以秉筆之權太阿倒授凌轢政府若王振汪直曹吉祥劉瑾魏忠賢輩流弊接踵遂以亡明我世祖章皇帝定鼎以来力懲前鑒於順治十二年犯法干命立鐵牌嚴切勅諭裁定内監員數但有政竊權納賄囑託内外衙門交結滿漢官員越分奏事及言官員賢否者立寘重典伏讀聖訓凛然永昭炯戒所置宫殿總管首領諸職賞給頂戴不過至四品而止但執門禁灑掃之役而皆統於内務府與周官之法實相脗合制綦嚴我皇上祗奉前累朝奉守禁謨防㣲杜漸於足昭御製全韻詩内諄諄垂訓洵萬年家法也長史徵名循護從臣王懿修御製具寮執事效趨蹌親郡王以下置長史㪚騎郎䕶衛典儀等官有差葢即前代所稱國官也舊新札薩官魚貫内外回畨職雁行䝉古部落内屬者設官毎旗扎薩克一人以汗王貝勒貝子公台吉等為之所屬都統副都統叅領佐領驍騎校等官回部久經内屬者一如䝉古設札薩克其餘各回城皆設伯克其秩以三品至七品為差皆即以其部人為之至直省土官文則有土通判知州知縣州判廵檢知事等官武則有指揮使宣慰使安撫使宣撫使土守備千户百户千總把總等官並許其承襲罔不震讋奉化恪守約束近年平定兩金川命將軍携帶各土司分年入覲與朝正外藩及年班四部等同與朝賀宴賚俾見我國家中外一家云撫此羣臣贊予治一心惟勵敬無遑職官表古無成編兹因辦理四庫全書俾館臣等綜核考鏡自經史及説部博採旁稽上下四千餘年因沿改革一覽瞭然内外大小臣工思日贊襄予治其共凛然於天禄天職之艱庶幾靖共爾位無負敬事後食之誼
