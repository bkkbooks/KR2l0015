body:
  text: 內務府表謹案內務府為聖朝特創超越萬古之經制前代職事有散在各官者謹詳考而著之于表至官由特設無可比例如寧夀宫中正殿雍和宫御書處武英殿修書處諸職以及咸安宫景山官學納銀莊官房租庫諸事務皆前古所未有今並於表中闕之以見我聖朝創制設官非前代所可企及至如三旗護軍營統領參領護軍校等職設官與八旗護軍營同歷代建置已見八旗護軍營表兹亦不重著焉內務府上國朝官制內務府總管大臣無定員以侍衛府屬郎中內三院卿簡用或以王公內大臣尚書侍郎兼攝初品級無定乾隆十四年定為正二品掌理內府之政令凡職員選除財用出入宴饗祭祀膳羞服御賞賚賜豫刑罰工作教習訓導之事皆綜理而受其成凡直宿日𣲖總管一人如因事不能入直以郎中代之所屬廣儲會計掌儀都虞慎刑營造慶豐七司及諸衙門上駟院奉宸苑武備院並𨽻焉國初置內務府順治十一年改置十三衙門曰司禮監尚方司御用監御馬監內官監尚衣監尚膳監尚寶監司設監兵仗局惜薪司鐘鼓司織染局十八年並裁仍設內務府以大臣總管堂郎中一人正五品堂主事二人正六品堂筆帖式三十八人內一人委署主事兼司缺筆帖式四人堂郎中主事掌治堂事凡府屬文職升補武職𨽻都虞司及章奏文移皆𨽻焉康熙四十二年設郎中一員後省雍正十三年復設堂主事康熙十六年設委署主事雍正元年設後省乾隆二十二年復設即以筆帖式補放給與六品虛銜不出缺各司主事委署主事裁設皆同筆帖式掌理文案順治十八年設十六員以後陸續增設至十十八員各司筆帖式因其事之繁簡以定額皆先後裁設兼司缺筆帖式雍正四年設廣儲司總管六庫郎中二人部員兼管六庫郎中二人郎中四人員外郎十二人部員兼庫員外郎六人從五品主事一人委署主事一人司庫十二人正六品無品級司庫十二人筆帖式二十六人總管六庫郎中掌總核六庫出納事務郎中員外郎主事掌分理各庫部員兼庫郎中員外郎掌兼綜庫事以資糾查司庫掌儲藏出納初名御用監順治十八年分為銀庫皮庫縀庫衣庫康熙十六年改定為廣儲司四庫二十八年分設磁庫茶庫共為六庫郎中初設三人雍正十三年增設總管郎中二人員外郎初設八人康熙二十八年增四人部員兼庫郎中員外郎乾隆三十三年設司庫康熙九年設八人二十八年增四人無品級司庫康熙四十四年設自後陸續增設寧夀宫管理事務郎中二人員外郎二人主事一人委署主事一人筆帖式四人學習筆帖式四人內管領二人正六品郎中員外郎主事掌稽查看守寧夀宫陳設輪流直宿及造具檔册之事內管領掌分地掃除乾隆四十年以寧夀宫地方緊要派內務府大臣二人専管並設立郎中員外郎主事筆帖式內管領等員以專司其事其檔籍清册鈐用廣儲司印四十四年增設委署主事一人學習筆帖式四人織造監督江寧府蘇州府杭州府各一人於內務府司官內奏簡帶原銜管理司庫各一人筆帖式各二人庫使各二人掌分司所駐劄地方供奉上用縀匹及應用官用縀匹皆監視而督理之歲終奏銷造册呈內務府以副册送廣儲司察核順治初年設三處織造官監督筆帖式庫使各一人三年一代十八年定一年更代康熙元年各增庫使一人二年奏定三處織造不限年更代各增筆帖式一人六年各增庫使一人會計司郎中二人員外郎六人主事一人委署主事一人筆帖式二十六人催長五人掌核理內務帑項出納之數及莊園地畝戶口徭役定為籍而受其要焉初名內官監順治十七年改為宣徽院康熙十六年改定為會計司初設郎中三人康熙三十八年裁一人雍正元年復設一人乾隆四十年裁一人員外郎額順治十七年定初設催總八人後裁尋復設五人後改為催長內管領掌關防一人於各司院郎中內揀選兼管協理關防事務二人於各司院員外郎內揀選兼管內管領三十人正五品副內管領三十人正六品筆帖式八人內管領副內管領掌承應內廷灑掃糊飾管三倉出納酒菜器皿皆司之並管理該管領下戶口田産官員俸餉兵丁錢糧之收發出入國初設內管領四員順治間增十六員康熙二十三年每管領下增設副內管領一員嗣後陸續增置有官三倉酒醋房青菜庫外餑餑房車輛庫家伙倉蠟備倉氷窖蠟票蘇拉處諸專司之事雍正元年以一員管理關防二員協理關防事務乾隆十五年以各司院郎中揀選一員掌理關防員外郎二員協理關防事務其掌關防之內管領仍專司本管領之事管理三旗納銀莊郎中一人員外郎六人委署主事一人筆帖式十有二人掌三旗各莊之糧稅徴收治其賞罰與其優恤之事初由三旗各佐領管理康熙三年設員外郎六人專管十六年𨽻會計司雍正元年另設衙門置郎中一員乾隆元年設主事一人後裁掌儀司郎中二人員外郎八人主事一人委署主事一人筆帖式二十一人司俎官五人正六品贊禮郎十有七人六品頂帶食七品俸掌內府祭祀筵宴禮儀樂舞之事初名禮儀監順治十七年改為禮儀院康熙十六年改定為掌儀司初設郎中三人員外郎八人康熙三十八年裁郎中一人司俎官初為司胙官設四人後增設一人並改為司俎贊禮郎初設十二人雍正十年增五人又有樂部郎中員外郎等官别見樂部篇御茶膳房總管大臣無定員尚膳正尚茶正頭等侍衛各一人二等侍衛各二人尚膳副尚茶副三等侍衛各二人尚膳三等侍衛四人藍翎侍衛七人尚茶三等侍衛三人藍翎侍衛四人主事一人委署主事一人筆帖式十有二人掌敬設上用茶品供奉御饌及供應賜茶筵宴之事初設飯房總領茶房總領各三人飯上人三十五人茶上人十七人康熙二十八年定飯上人委署總領一人雍正元年定飯房茶房總領俱授為二等侍衛飯上人授三等侍衛六人藍翎侍衛七人茶上人授三等侍衛三人藍翎侍衛四人又定茶房侍衛內委署總領一人乾隆八年定飯房茶房二等侍衛內各授一等侍衛一人十五年改飯房為外膳房二十四年改飯房總領為尚膳正副總領為尚膳副茶房總領為尚茶正副總領為尚茶副雍正二年設主事一人中正殿管理事務員外郎二人筆帖式四人內務府三人外旗蒙古一人雍和宫管理事務郎中一人員外郎一人筆帖式三人掌造辦佛像供應念經事務中正殿員外郎康熙三十六年設雍和宫郎中等員乾隆九年以司官兼管十六年定為額設咸安宫官學管理事務大臣一人協理事務大臣一人以內大臣充簡派兼滿漢總裁六人以翰林院官充滿二人漢四人管理事務郎中二人員外郎二人筆帖式一人滿洲教習十三人翻譯六人清語三人弓箭四人漢人教習九人官學生一百十八人蒙古學總裁二人管理事務司官二人教習二人官學生二十四人景山官學兼管事務司官五人以郎中員外郎沠充滿洲教習九人漢人教習十二人官學生三百八十八人景山官學掌訓迪內府三旗之俊秀教之書射以作興人材康熙二十四年立咸安宫官學凡內府三旗八旗滿洲蒙古之優頴者皆與焉雍正七年立乾隆元年定咸安宫官學生內務府留三十人增設八旗滿洲各十人十三年增設蒙古官學員額皆陸續增定御藥房兼管司官二人內管領一人主事一人委署主事一人副內管領二人庫掌二人七品職銜食八品俸委署庫掌二人筆帖式十二人掌詳慎供用藥料和合丸散之事順治十年設以總管首領太監管理康熙三十年改歸府屬員額陸續增置都虞司郎中二人員外郎五人主事一人委署主事一人筆帖式二十六人催長八人掌府屬武職升補及三旗禁旅訓練遣調供應畋漁之禁令初名尚膳監順治十八年改為採捕衙門康熙十六年改定為都虞司初設郎中三人員外郎五人後各裁一人內務府鑲黃正黃正白三旗護軍營護軍統領各一人正三品護軍參領各五人三品職銜食五品俸副護軍參領各五人四品職銜食五品俸孔雀翎委署參領各三人五品職銜食護軍校錢糧前鋒委署參領各二人五品職銜食護軍校錢糧鳥鎗護軍校各二十人正六品六品翊長從六品舊營護軍校各十三人前鋒護軍校各二人前鋒戴藍翎委署護軍校各二人正七品舊營戴藍翎委署護軍校各五人筆帖式各十人圓明園內務府三旗護軍營夸蘭大一人三品職銜食四品俸護軍參領各一人副護軍參領各一人委署參領各一人護軍校各三人副護軍校各一人筆帖式四人護軍營統領參領等官掌率其屬以宿衛宫禁導引扈從及訓練察班之事國初每旗編為五甲喇設參領一人順治九年立鳥鎗營每旗添設參領委署參領護軍校等員十三年鳥鎗護軍撥回舊營以委署參領為副參領乾隆十三年立前鋒營設前鋒委署參領護軍校等員圓明園內三旗護軍營夸蘭大及參領等官掌率其屬以翊衛園苑及訓練稽察之事雍正三年以京城內護軍營分駐設參領護軍校等員九年設執掌關防夸蘭大一員熱河行宫總管二人初制正五品乾隆三十五年定為正四品其由尚書都統內務府簡放者仍各帶原品職銜苑副四人正五品千總十一人正六品副千總二十二人喀喇河屯長山谷兩間房巴克什營中關波洛河屯吉爾哈朗圖阿穆呼朗圖張三營等處行宫千總各一人副千總各一人王家營釣魚臺黃土坎十八里台等處行宫副千總各一人溥仁寺普樂寺安逺廟普陀宗乘廟殊像寺千總各一人副千總各一人普寧寺須彌福夀廟千總各一人副千總各二人廣安寺羅漢堂把總各二人行宫總管苑副掌總理翊衛各處行宫及陳設稽察之政令千總副千總把總掌典守陳設稽查內圍董率掃除之事熱河總管康熙四十二年設苑副乾隆三十五年設各處千總康熙四十一年以來陸續增設養鷹鷂處管理事務三人以王公等官御前大臣侍衛管理協辦事務兼鷹上統領二人副都統一人二等侍衛一人藍翎侍衛頭領五人六品職銜副頭領五人筆帖式三人內養狗處頭目二人兼三等侍衛一人兼藍翎侍衛一人副頭目二人外養狗處頭目六人副頭目六人筆帖式三人掌飼養鷹狗隨圍進哨以供搜畋之事國初設立鷹房鴉鶻房乾隆十一年改為養鷹處養鴉鶻處三十七年裁養鴉鶻處其員額轉補鷹上養狗處員額國初定慎刑司郎中二人員外郎四人主事一人委署主事一人筆帖式二十人掌府屬刑名審讞定擬之事凡審擬罪案皆依刑部律例其有情罪重大者移咨三法司會審題結初名尚方司順治十二年改為尚方院康熙十六年改定為慎刑司員額順治以來前後增定營造司郎中二人員外郎八人主事一人委署主事一人筆帖式二十六人掌膳修工作及薪炭陶冶之事所屬有六庫三作曰木庫司物材曰鐵庫司鑄造鐵器曰器皿庫司藤竹木器曰柴庫司薪柴曰炭庫司煤炭石灰曰房庫司涼棚席篷麻曰鐵作司打造鐵器曰花爆作司造煙火花爆曰油漆作司繪堊六庫各設庫掌庫守三作皆設司匠領催皆未入流惟鐵作司匠給八品虛銜初名惜薪司順治十八年改為內工部康熙十六年改定為營造司初設郎中三人後裁一人員外郎六人後增二人官房租庫值年總管內務府大臣一人郎中一人員外郎三人以各司兼管筆帖式七人庫掌一人掌內外城官房之租課按月證收以供營造司之用初屬營造司管理康熙六十二年立租庫各員額乾隆三十六年以內府大臣值年管理御書處管理事務大臣一人兼管郎中員外郎無定員監造一人六品職銜食七品俸署監造一人庫掌三人七品職銜食八品俸署庫掌六人筆帖式二人掌敬刋御筆裱榻之事員額康熙四十九年定監造庫掌品級乾隆四十三年定武英殿修書處管理事務王大臣一人監造二人庫掌四人署庫掌六人筆帖式四人掌膳刻裝潢各館書籍及宫殿陳設書籍之事員額康熙十九年定監造庫掌品級乾隆四十三年定設有總裁二人提調二人由總裁於纂修內奏充纂修十二人由總裁以翰林院編修檢計庶吉士等官揀派充奏養心殿造辦處郎中三人員外郎二人主事一人委署主事一人庫掌六人六品司匠十三人正八品筆帖式十五人掌造辦供御物件監督工作管理儲藏之事初設造辦活計處管理事務無定員乾隆二十四年定設員額慶豐司郎中一人員外郎八人主事一人委署主事一人筆帖式十五人廄長十人廄副十九人掌蕃息牛羊羣牧供用考成之事順治初年設內牛圈三於西華門外設外牛圈三供乳餅圈一於南苑設羊圈六於豐臺管理牛隻羊隻各設員外郎三人及廏長筆帖式等員康熙十六年歸併掌儀司管理二十三年設慶豐司置郎中二人增置員外郎四人主事一人不𨽻內務府雍正元年歸併內務府管理四十年裁郎中一人員外郎二人謹案內務府之制以七司各掌府事其餘分建衙門並鑄給關防印信統轄于總管大臣而不與七司相𨽻屬唯是事類相近允宜依次分求如寧夀宫事務檔册用廣儲司鈐印監督織造由縀庫郎中察核內管領之錢糧納銀庒之奏銷皆由會計司辦理御茶膳房中正殿雍和宫管理事務皆掌習禮儀之事而官學藥房附焉官房租庫本由營造司分設御書處武英殿修書處養心殿造辦處均掌內廷書籍典册修造之事兹並遵大清會典成例以類序次唯內三旗護軍營圓明園護軍營暨各行宫千總會典序官别著于武職篇而奉行則例仍載于都虞司卷中以府屬武職升遷諸事均𨽻都虞司也兹並從類敘于七司之後至府屬之三院則别自為篇焉厯代建置謹案曲禮載殷制先五官次六府此府名之所由起周官冡宰之屬有內府內宰此內務之名之所由起詳考冡宰之屬以宫禁親近之職為首重故宫正宫伯以掌宿衛膳夫至冪人以掌飲食宫人幕人以掌寢處大府至外府以掌蓄藏司會至職幣以掌會計而內宰以下則皆綜理內職閹豎閽寺婦職女功無不司之于是自王及后世子之飲食服用以至宫闈內外親近人主左右者一舉而歸之冢宰所以肅正紀綱而無逢迎靡濫之弊自西漢時猶遵成周遺意中書宦者盡屬少府凡服御之職必選經明行修者為之而統攝之以丞相御史至東漢時始多用宦官分主飲膳服飾而古意漸失隋唐以後立內侍省人主起居飲食之重不咨之大臣任之士人而悉委之於奄豎其弊乃益滋矣至供御之官列代變更分合之故猶可詳考蓋漢立少府水衡專主天子之奉養東漢則并水衡於少府而三國晉宋以後因之自曺魏始立殿中監以後代有其職蕭梁始立太府卿以掌庫藏而陳因之少府始專主工作之事北魏又廢少府專立太府而殿中監則仍其舊北齊以殿中監之六局改𨽻于門下省後周倣成周以制官奉御諸職多在天官冬官中隋初立門下省太府卿煬帝改設殿內省復分立少府而內侍省之統轄漸廣唐之殿中內侍二省太府少府二卿與隋制不大相殊而宦官任重至侵將相之權矣宋立宣徽院為親近之職而漢少府之事仍領于二省二卿遼北面有御帳著帳諸官南面則仍唐制金有太府少府無殿中監而有殿前都點檢司其內侍不别立省盡𨽻之宣徽院中法意最為近古至明代而諸職盡去唯立宦官二十四衙門禁近要務唯有奄豎得專制之而古意于是盡失不獨成周良法無可追溯即漢唐少府之制亦無復存焉者矣恭惟聖朝龍興之始創立內務府以鑲黃正黃正白三旗親近之臣專司其事定鼎以來初亦設十三衙門以內監供職順治十二年六月監於前代內豎擅權之弊命立鐵牌嚴切申諭永逺禁革仍立內務府特簡內大臣為總管七司三院綱紀肅而職掌昭內侍職制則為使之供給灑掃之役毋得任事而亦皆統攝于總管大臣蓋至聖朝而周漢之制盡復法度之精詳規模之宏逺尤為超越萬古今詳考列代職官之近于內務府者分繫篇中而總括其沿革之大概於此其內監職制執掌亦附著卷後不復别為一篇焉三代禮記曲禮天子之六府曰司土司木司水司草司器司貨典司六職鄭康成注府主藏六物之稅此亦殷時制也周則皆屬司徒謹案六府之制見于殷時以主六物之儲藏鄭注謂周屬司徒蓋如今戶部之三庫但殷五官既有司徒而復别設六府則在殷時固不為司徒之掌而與今之內務府相近矣故與戶部三庫篇互見焉尚書立政虎賁綴衣趣馬小尹左右攜僕百司庶府孔安國傳綴衣掌衣服左右攜持器物之僕百官有司主劵契藏吏蔡沈集傳此侍御之官也小尹小官之長攜僕攜持僕御之人百司若司裘司服庶府若內府大府之屬謹案尚書立政有百司庶府又有表臣百司蓋表者對裏之稱內百司為裏臣外百司為表臣也立政稱文武克俊有德三事而外必首及于綴衣趣馬之屬其後周公制禮以宫禁之職首屬冢宰有由來已國朝創定內務府與成周百司庶府之義千載合揆今列尚書立政文于卷首而周禮諸職則以次分列于後周禮天官宫正上士二人中士四人下士八人府二人史四人胥四人徒四十人掌王宫之戒令糾禁以時比宫中之官府次舍之衆寡為之版以待夕擊柝而比之國有故則令宿其比亦如之辨內外而時禁稽其官序糾其德行幾其出入均其稍食去其淫怠與其竒邪之民會其什伍而教之道藝月終則會其稍食嵗終則會其行事凡邦之大事令于王宫之官府次舍無去守而聽政令春秋以木鐸修火禁凡邦之事蹕宫中廟中則執燭鄭康成注宫正主宫中官之長宫伯中士二人下士四人府一人史二人胥二人徒二十人掌王宫之士庶子凡在版者掌其政令行其秩敘作其徒役之事授八次八舍之職事若邦有大事作宫衆則令之月終則均秩嵗終則均敘以時頒其衣裘掌其誅賞謹案成周官制凡王之服御飲食燕好賜豫皆分設官職而統屬于太宰所以合宫府為一體也宫正為王宫官之長掌比宫中之官府宫伯掌王宫之士庶子此在今時為內務府大臣及領侍衛大臣之職其所以秩止於上士中士下士者則以冢宰統臨於上而諸官為專司故不疑其秩之輕也內務府大臣職任優重實為周冢宰之所統而宫正宫伯則職掌專焉故與領侍衛篇互見而備著其説於此周禮天官太府下大夫二人上士四人下士八人掌九貢九賦九功之二以受其貨賄之人頒其貨於受藏之府頒其賄於受用之府凡式貢之餘財以共玩好之用玉府上士二人中士四人掌王之金玉玩好兵器凡良貨賄之藏共王之服玉佩玉珠玉王齊則共食玉掌王之燕衣服衽席牀第凡褻器若合諸侯則共珠槃玉敦凡王之獻金玉兵器文織良貨賄之物受而藏之凡王之好賜共其貨賄內府中士二人掌受九貢九賦九功之貨賄良兵良器以待邦之大用凡四方之幣獻之金玉齒革兵器凡良貨賄入焉凡適四方使者共其所受之物而奉之凡王及冢宰之好賜豫則共之司裘中士二人下士四人掌為大裘以共王祀天之服掌皮下士四人掌秋斂皮冬斂革春獻之遂以式法頒皮革于百工共其毳毛為氈以待邦事嵗終則會其財齎典婦功中士二人下士四人掌婦式之法以共王及后之用頒之于內府典絲掌絲入而辨其物以其賈楬之典枲下士二人掌布緦縷紵之麻草之物以待時頒功而授齎周禮春官天官上士一人中士二人掌祖廟之守藏與其政令凡國之玉鎮大寶器藏焉若有大祭則出陳之既事藏之荀子大略篇不知而問堯舜無有而求天府先王之道則堯舜矣六二之博則天府矣注求財于六二之博得之不窮故曰天府天府天之府藏謹案太府掌貢賦貨賄為今戶部三庫之職其式貢餘財以共玩好則內府之廣儲實兼其任至玉府受藏金玉兵器文織良貨賄以共王之好賜內府共王及冢宰之好賜豫天府藏國之玉鎮大寶器則正為今廣儲司之職而司裘掌皮典絲典枲亦如六庫之各分其事也周禮天官職內上士二人中士四人掌邦之賦入辨其財用之物而執其總凡受財者受其二令而書之職嵗上士四人中士八人掌邦之賦出凡上之賜豫以敘與職幣而受之職幣上士二人中士四人振掌事者之餘財皆辨其物而奠其録以書楬之以詔上之小用賜豫司會中大夫二人下大夫四人上士八人中士十有六人司書上士二人中士四人凡上之用財用必考于司會宫人中士四人下士八人掌王之六寢之修共王之沐浴凡寢中之事掃除執燭共爐炭凡勞事謹案天官司會司書不專為內府之職而上之用財用必考于司會則宫中會計實兼理之職內掌受財之政令職幣詔用之小用賜豫而職嵗掌其賦出今內府儲藏出入皆由會計司稽核而總受其要其職固相等也宫人有中士下士寢處沐浴掃除皆其職掌則與今之內管領副內管領之任尤相合矣周禮天官內宰下大夫二人上士四人中士八人掌書版圖之法以治王內之政令均其稍食分其人民以居之注版謂宫中寺之屬及其子弟録籍也團王及后世子之宫中吏官府之形象也政令謂施間寺者稍食吏祿稟也人民吏子弟分之使衆者就寡均宿衙嵗終則會內之人稍食稽其功事比其小大與其粗良而賞罰之會內宫之財用周禮夏官小臣上士四人掌王之小命詔相王之小法儀正王之燕服位王之燕出入則前驅周禮天官膳夫上士二人中士四人下士八人掌王之食飲膳羞以養王及后世子庖人中士四人下士八人賈八人注賈主市買知事價掌共六畜六獸六禽辨其名物凡其死生鮮薧之物以共王之膳與其薦羞之物及后世子之膳羞內饔中士四人下士八人掌王及后世子膳羞之割烹煎和之事亨人下士四人掌共鼎鑊以給水火之齊謹案宫中禮儀掌于內宰而詔相王之小法儀則夏官小臣主之今內務府掌儀司専掌宫中之儀法正其職也內宰詔相禮儀之外又掌書宫中版圖之法以治王內之政令嵗終會內人之稍食稽其功事會內官之財用蓋兼有總管大臣及會計司之職故秩為下大夫其任較重唯以服位禮事贊相専司與掌儀司尤為相合故附證其説于此天官之膳夫庖人內饔亨人皆掌王及后世子之膳羞亦與今御茶膳房之職為相合故與光祿寺篇互見焉周禮天官甸師下士二人共野果蓏之獻帥其徒以薪蒸役外饔內之事臘人下士四人掌乾肉凡田獸之脯臘膴胖之事周禮地官廛人中士二人下士四人凡屠者斂其皮角筋骨入于王府凡珍異之有滯者斂而入于膳府澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入之于王府頒其餘于萬民迹人中士四人下士八人掌邦田之地政而為之厲禁以守之角人下士二人掌以時徵皮角凡骨物于山澤之農羽人下士二人掌以時徵羽翮之政于山澤之農掌炭下士二人掌炭物灰物之徵令以時入之謹案都虞司職司採捕供應畋漁天官之甸師臘人正其職掌地官山林川澤皆有虞衡而分主各處山川不歸統理惟澤虞掌國澤之禁令入財物于王府與都虞司相近其自廛人以至掌炭亦皆都虞司之所有事也周禮天官小宰之職掌建邦之宫刑以治王宫之政令凡宫之禁謹案周刑法掌于秋官而內府之刑未聞有别置之官惟小宰掌建邦之宫刑宫禁鄭康成以為在王宫中者之刑則今內務府慎刑司之所由始也周禮考工記凡攻木之工七攻金之工六攻皮之工五設色之工五刮摩之工五搏埴之工二匠人營國王宫門阿之制五雉宫隅之制七雉城隅之制九雉謹案周禮缺冬官考工記之所載者未盡為營造之職今採録匠人營繕王宫之法式及諸工總名以著其概餘並見工部篇不具録焉周禮地官牧人下士六人掌牧六牲而阜蕃其物以共祭祀之牲牷注六牲謂牛馬羊豕犬雞牛人中士二人下士四人掌養國之公牛以待國之政令周禮夏官羊人下士一人掌羊牲若牧人無牲則受布于司馬使其賈買牲而共之謹案孳畜之政自古重之故宣王考牧著於小雅牲牷肥腯見于春秋周禮之牧人牛人羊人實為慶豐司之所由始其分屬地官夏官者蓋一以牧地為屬一以受布于司馬為屬不必如孔疏所云牛為土畜羊為金畜穿鑿而為之説也秦漢書百官公卿表少府秦官册府元龜秦少府掌山海地澤之稅少府之立自此始也杜佑通典秦置六尚謂尚冠尚衣尚食尚沐尚席尚書若今殿中之任秦有御府令丞掌供御服而屬少府掖庭局令秦置永巷秦置尚方令秦有將作少府秦犧廪令丞掌犧牲雁鶩王應麟玉海少府秦官章邯為之謹案秦立少府之官凡供御諸職多為所領故六尚如今內管領之職御府令如今廣儲司掖庭局令如今慎刑司尚方令則兼有廣儲及武備院之任將作少府如今營造司惟犧廪令丞屬內史及左馮翊而犧牲雁鶩則又兼有都虞慶豐二司之掌秦法疏略史志不詳以漢後所承襲者推之其大概亦可考見今托録通典所載以著其崖略焉漢漢書百官公卿表少府掌山海地澤之稅以給共養應劭曰名曰禁錢以給私養自别為藏少者小也故稱少府師古曰大司農供軍國之用少府以養天有子也六丞屬官有尚書符節太醫太官湯官導官藥府若盧考工室左弋居室甘泉居室左右司空東織西織東園匠十六官令丞服虔曰若盧詔獄也鄧展曰舊洛陽兩獄一名若盧主受親戚婦女如淳曰若盧官名也藏兵器品令曰若盧郎中二十人主弩射漢儀注有若盧獄令主治庫兵將相大臣臣瓚曰冬官為考工主作器械也師古曰太官主膳食湯官主餅餌導官主擇米若盧如説是也左弋地名東園匠主作陵內器物者也又胞人都水均官三長丞師古曰胞人主掌宰割者也胞與庖同又中書謁者黃門鈎盾尚方御府永巷內者宦者八官令丞師古曰鈎盾主近苑囿尚方主作禁器物御府主天子衣服也諸僕射署長中黃門皆屬焉師古曰中黃門謂奄人居禁中在黃門之內給事者也武帝太初元年更名考工室為考工左弋為佽飛居室為保宫甘泉居室為昆臺永巷為掖庭佽飛掌弋射有九丞兩尉太官七丞昆臺五丞樂府三丞掖庭八丞宦者七丞鈎盾五丞兩尉成帝河平元年省東織更名西織為織室謹案漢承秦制立少府以供養宫禁位列九卿凡諸奉御之職無所不統今以漢百官表所載詳繹之今內府七司諸官蓋皆有其職焉如御府尚方東織西織是廣儲司之掌尚書內者諸僕射署是會計司及內管領之掌中書謁者與掌儀相近而太官胞人則如今之內茶膳房也左弋佽飛掌弋射都水鈎盾主苑囿近於都虞司之職也服虔鄧展以若盧為詔獄如淳以為藏兵器而漢儀注則云有若盧獄令主治庫兵是一官而兼兩職蓋如慎刑司及武備院之兼職也考工室左右司空東園匠如今之營造司而尚方令又如今之造辦處也惟慶豐所掌未見于少府之屬蓋太官所兼掌耳漢代少府之官多以髙儒舊德為之而宦者黃門亦皆歸于統屬其法意最為近古今載漢表原文而為之疏證如此其他可為佐證著並分載于後史記平凖書山海天地之藏也皆宜屬少府索隱韋昭云少府天子私所給賜經用也公用屬大司農急就篇司農少府國之淵顔師古注司農領天下錢榖以供國之常用少府管池澤之稅及關市之資以供天子少者小也府者聚也財物所聚也非郊廟兵戎大用故謂之少府司此二者百物在焉故以深泉為喻也應劭風俗通少府水衡為天子內藏荀悅漢紀孝成帝紀罷少府技巧官王應麟漢制考職內注職內主入也若今之泉所入謂之少內疏漢之少內亦主泉所入案王氏漢官解云小官嗇夫各擅其職謂倉庫少內嗇夫之屬各自擅其條理所職主由此言之少內藏聚似今之少府但官卑職碎以少為名丙吉傳少內嗇夫白吉曰食皇孫亡詔令注云少內掖庭主府藏之官也謹案少內當為今會計司之職玉海周玉府內府猶秦漢少府也謹案後漢紀正月朔旦驃騎將軍蒼應奉璧入賀故事少府給璧隂就驕貴吏傲不奉法求璧不可得蒼坐朝堂漏且盡而璧不至不知所為顧謂掾屬曰若之何朱暉望少府主簿持璧即往紿之曰我聞璧而未曾見試觀之主簿以璧授暉暉顧召令史奉之主簿驚曰少府當以朝暉叱之曰將歸暉獨不朝也據此則漢之少府乃兼內府玉府之職古今考九曰少府掌山海地澤之稅以給共養東萊謂治粟內史所掌榖貨供軍國之用少府名曰禁錢以給天子私自别為藏少者小也屬官最多有六丞當皆稱少府丞而尚書侍郎以下十二官令丞屬焉而尚書之名後世以為王之一省六部從官之長東萊又謂少府吏四人在殿中主發書謂之尚書其後遂以為官置令丞屬焉然漢之尚書令尚書丞微官耳少府之屬吏也後世尚書令尚書左右丞六部尚書乃宰相侍從也又胞人三長丞又上林中十池監又中書謁者黃門鈎盾而下內省官者七官令丞諸僕射署長中黃門皆屬焉而中書令中書丞亦少府之微官而後世中書令為一品之極郭子儀書二十四考至有奪我鳳凰池之恨前代小官後世用以為大官世故之變豈有極哉表書小官吏因革不一不足書王莽改曰共工謹案洪適𨽻釋魯相史晨祠孔廟奏銘題後謂上尚書者郡國異于朝廷不敢直達于帝所因尚書以聞故樊毅復華氏下民租田口算碑以太守奏事均云上尚書也然無極山碑以太常卿丞奏事亦云上尚書又蔡質漢官典儀列司𨽻城門校尉上尚書式及謁者上尚書式則內而九卿謁者凡奏亦皆上尚書以達于帝不獨國相太守也惟孔子廟置卒史碑云魯相奏記司徒司空府不云上尚書然司徒司空府亦必由尚書以達于帝無極山碑載常山相馮巡以三公山請雨事聞于太常太常為馮巡上其事亦必由尚書是其例蓋漢丞相御史謂之外朝不可至內廷故置尚書掌四方章奏報告之事少府屬官首列尚書特重其職也漢書霍光傳尚書令讀奏黃霸傳尚書令受丞相對是雖丞相九卿必由尚書入奏也又考漢紀張湯子安世少為郎給事中尚書上方幸河東亡書三篋詔問莫能知惟安世知之具作其事後購得本書以校無所遺失通典謂掌圖書祕記章奏之事即謂此也且不特主章奏即凡徵召詰對之事亦無不詣尚書漢書光武紀時太原王霸北海逢萌亦隱居養志霸到尚書拜不稱臣章帝紀胸奴新降召太尉鮑昱謁尚書使封降胡檄桓帝紀太常楊秉奏中常侍侯賢等請免官理罪奏入尚書詰秉秉對尚書不能詰靈帝紀陳蕃起兵將官屬諸生八十人至承明門使不內蕃曰云云使者出開門蕃到尚書門正色曰云云蓋尚書初主受奏御而已其後遂専出納之命故其權浸重至章帝時太傅太尉録尚書事和帝時太傅録尚書事位在三公上與少府所屬之尚書逈相懸絶矣馬永卿懶真子前漢百官公卿表少府之屬官凡五十餘人有導官掌米榖以奉至尊然學者多疑導字之義僕考唐百官志導官令掌導擇米麥凡九榖皆隨精粗考其耗損而供然漢導字下從寸唐䆃字下從禾今按韻略瑞禾一莖六穗謂之䆃恐唐以瑞禾名官也僕嘗以此問舅氏笑云此蓋讀司馬長卿封禪書誤耳書云導一莖六穗于庖注云導擇也一莖六穗謂加禾之米也後人誤以瑞禾為䆃遂併官名失之可一笑也謹案導官主擇米榖以供至尊則今尚膳正之職也又互見户部篇內倉條顔師古漢書注李斐曰齊國舊有三服之官春獻冠幘縰為首服紈素為冬服輕綃為夏服凡三急就篇齊國給獻素繒帛注齊有三服官貢禹言故時齊三服官輸物不過十笥謹案漢官既有東織西織供天子服御而又有三服官主作首服冬服夏服以給衮龍之用於齊設之今內務府所轄有江寧蘇州杭州三織造官正漢三服官之遺制也漢書注水衡都尉應劭曰古山林之官曰衡掌諸池苑故曰水衡張晏曰主都水及上林苑故曰水衡主諸官故曰都有卒徒武事故曰尉師古曰衡平也主平其稅入玉海楊得意為狗監李延年給事狗監中謹案漢水衡都尉之職掌上林苑與今之奉宸苑相合惟所領之官自卒徒武事又兼主漁畋之政今都虞司辦理內府武職升遷兼供應漁獵之事其職亦為相近故既入於奉宸苑篇而節録注文于此至漢有狗監則與今之養鷹狗處事務亦相等也風俗通掖庭有獄令丞又暴室丞宫人獄也一作薄室三輔黃圖永巷永長也宫中之長巷幽閉宫女之有罪者武帝時改為掖庭置獄焉謹案成帝紀上使御史收劉輔繫掖庭祕獄後以辛慶忌廉褒師丹谷永上書乃徙繫考工獄考工獄亦近中禁然比之掖庭獄則又有中外之殊矣移獄考工其按治或稍輕歟史記景帝本紀中六年四月置左右內官屬大內漢書東方朔傳內官有獄漢書王商傳左將軍請召王商詣若盧詔獄注孟康曰黃門北寺也謹案宫中慎刑之職自掖庭而內列代不詳惟漢書若盧獄令黃門北寺詔獄皆屬少府內府有獄其初亦屬少府最為近之又考後漢紀桓帝紀白馬令李雲上書移副三府云云上得雲書大怒送雲黃門北寺使中常侍管霸與御史廷尉雜考之然則漢時外庭庶官亦間繫黃門北寺蓋黃門北寺獄之近中禁者桓帝怒雲欲加嚴讞故特於祕獄治之非常例也史記平凖書卜式不願為郎上曰吾有羊上林中欲令子牧之式乃拜為郎布衣屩而牧羊嵗餘羊肥息謹案史記言卜式拜為郎牧羊上林苑中是漢時慶豐之職亦上林苑之所有事也今故採録之以見其概周禮囿人牧百獸鄭康成注備養衆物也今掖庭有鳥獸自熊虎孔雀至于狐狸鳬鶴備焉三輔黃圖少府佽飛外池漢儀注佽飛具繒繳以射鳬雁給祭祀故有池後漢書百官志少府卿一人中二千石本注曰掌中服御諸物衣服寶貨珍膳之屬丞一人比千石太醫令一人六百石本注曰掌諸醫藥丞方丞各一人本注曰藥丞主藥方丞主藥方太官令一人六百石本注曰掌御飲食左丞甘丞湯官丞果丞各一人本注曰左丞主飲食甘丞主膳具湯官丞主酒果丞主果守宫令一人六百石本注曰主御紙筆墨及尚書財用諸物封泥丞一人掖庭令一人六百石本注曰宦者掌後宫貴人采女事左右丞暴室丞各一人本注曰宦者暴室丞主中婦人疾病者就此室治其皇后貴人有罪亦就此室御府令一人六百石本注曰宦者典宫婢作中衣服及補浣之屬丞織室丞各一人本注曰宦者祠祀令一人典中諸小祠祀丞一人本注曰宦者中藏府令一人六百石本注曰掌中幣帛金銀諸貨物丞一人尚方令一人六百石本注曰掌上手工作御刀劒諸好器物丞一人劉昭後漢書志注武帝初置水衡都尉秩比二千石别立上林苑世祖省之并其職于少府每立秋貙之日輒暫置水衡都尉事訖乃罷之南都賦水衡虞人修其營表後漢書桓帝本紀建和元年芝草生中黃藏府注漢官儀曰中黃藏府掌中幣帛金銀諸貨物後漢書和帝本紀永元九年十二月復置若盧獄官謹案東漢光武併省少府禁錢一以歸之司農故少府官屬裁省過半至水衡都尉則廢去不設唯貙劉之日暫置旋罷然其季世乃轉有開邸鬻爵斂而入私藏者蓋宫掖之費必不能去而欲盡黜少府之儲藏勢不可久行也至前漢侍御皆用士人東漢始多以宦者為之古意亦漸失矣東漢之祠祀令典中諸小祠祀與今掌儀司之職相近故並著之三國册府元龜魏之九卿並與漢同又有殿中監一人品第七殿中之名自此始也掌張設監護之事有殿中奉乘郎從五品下三國魏志王觀傳王觀為少府統三尚方御府內藏玩弄之物魏文帝集讓禪表謹拜章陳情使行相國永夀少府糞土臣毛宗奏並上璽綬玉海少府魏王觀楊阜常林管輅為丞通典魏官第三品九卿第六品水衡典虞第七品殿中監諸卿尹丞尚藥監尚食監大農監第九品殿中監掌事通典後漢少府有中藏府令丞魏氏因之漢末分尚方為左中右三尚方魏晉因之魏文帝集張登為大官令詔登忠義彰著在職功勤名位雖卑直亮宜顯饔膳近在當得此吏今以登為大官令謹案三國魏少府列于九卿其所統屬並同後漢而始定為第三品之級及設有殿中監以司親近供御之職其品頗微其官則為後代殿中之所自始矣至漢有水衡都尉主上林苑並主禁錢魏仍其名而所主者天下舟船河渠之政其後遂易為都水使者與漢職不同今不復載焉晉晉書職官志少府統材官校尉中左右三尚方中黃左右藏左校甄官平凖奚官等令在校坊鄴中黃左右藏油官等丞及渡江哀帝省并丹陽尹孝武復置自渡江唯置一尚方又省御府通典晉冶令掌工徒鼓鑄𨽻衛尉江左以來省衛尉始𨽻少府晉有左右藏令屬少府謹案晉傳中丞集劾夏侯承奏少府夏侯承取官田立私屋近小人委以家計令工匠竊盜官物附益於私其謂令工匠竊盜官物即通典所云掌令工徒鼓鑄之類是也謂取官田立私屋則晉之少府所掌亦當如漢表所云兼地澤之稅矣晉書職官志光祿勳統東園匠太官御府守宫黃門掖庭清商華林園暴室等令哀帝興平二年省光祿勳并司徒孝武寧康元年復立通典守宫令丞晉屬光祿勳魏置殿中監晉因之謹案晉承魏制立少府以統諸署而太官御府諸職又分𨽻於光祿勳考光祿勳在秦為郎中令漢始易為光祿勳所掌宿衛諸郎如今領侍衛大臣之比而晉分少府屬官以𨽻之者以其官居禁中職守相近故也至哀帝省少府而併於丹陽尹省光祿勳而併於司徒其後復仍立之蓋裁省不一而職掌所在大槩則固相同也宋齊梁陳宋書百官志少府一人丞一人掌市服御之物左尚方令丞各一人右尚方令丞各一人并掌造軍器晉江右有中尚方左尚方右尚方江左以來惟一尚方宋髙祖踐祚以相府部配臺謂之左尚方而本署謂之右尚方焉又以相府細作配臺即其名置令一人丞二人𨽻門下世祖大明中改曰御府置令一人丞一人御府二漢世典官婢作褻衣服補浣之事後廢帝初省御府置中署𨽻右尚方漢東京太僕屬官有考工令主兵器尚方令唯主作御刀綬劍諸玩好器物而已然則考工令如今尚方尚方令如今中署矣通典殿中監晉宋並同宋少府領左右尚方御府東冶南冶平凖等令丞謹案宋少府殿中監之制視魏晉多從簡省其尚方令主作兵器而御府及中署之以細作配臺特置者亦𨽻右尚方則宫中工作固其兼職非専以武器為任故列代尚方官既見于此而武備院篇亦從互見焉南齊書百官志少府府置丞一人領官如左左右尚方令各一人丞一人煆署丞一人永明三年省四年復置御府令一人丞一人東冶令一人丞一人南冶令一人丞一人平凖令一人丞一人尚書令內外殿中監一人謹案齊制與宋多同惟尚書令之殿中有內外監之名為宋所未有宋置御府後改中署而齊則仍曰左右尚方為此少異耳隋書百官志梁初猶依宋齊皆無卿名天監七年加置太府卿以少府為少府卿是謂夏卿太府卿位視宗正掌金帛府帑統左右藏令上庫少府卿位視尚書左丞置材官將軍左右中尚方甄官平水署置南塘邱稅庫東西冶中黃細作炭庫紙官柴署等令丞光祿卿統守宫黃門華林園暴室等令通典太府卿厯代不置然其職在司農少府至梁天監七年始置梁官三品曹位殿中外監上庫令細作令作堂金銀局丞三品勳位殿中內監左尚方五丞右尚方四丞玉海梁始置太府卿掌府庫少府専為供服御之官隋書百官志陳太府卿少府卿品並第三謹案梁置太府卿掌金帛府帑蓋分少府所掌而别為置官此後代太府之所由起也左右尚方諸令屬于少府猶與古同而名之為卿亦自梁始守宫暴室諸令屬于光祿制與晉同皆為漢少府之職至殿中監有內外之分而以三品曹位勳位分𨽻之不入諸班之次亦與列代為少異陳官並用梁制其史文之脫略者不復詳焉後魏魏書官氏志初置左右近侍之職無常員或至百數侍直禁中傳宣詔命皆取諸部大人及豪族良家子弟儀貌端嚴機辨才幹者應選又置內侍長四人主顧問拾遺應對若今之侍中散騎常侍也置都統長又置幢將及外朝大人官其都統長領殿內之兵直王宫幢將員六人王三郎衛士直宿禁中者自侍中已下中散已上皆統之外朝大人無常員主受詔命外使出入禁中國有大喪大禮皆與參知隨所典焉少府第三品上中黃門令內署令第四品中掖庭監從第五品上諸局監水衡都尉從第五品中嘗藥監殿中監從第五品下諸宫門僕從六品中世宗班行職令大府卿第三品太府少卿第四品諸署令千石以上者從第八品諸署令六百石以上者第九品諸署令不滿六百石者從第九品册府元龜後魏殿中監從五品下又有掌服郎從六品上又分太官令尚食中尚食掌知御膳尚食門下省領之中尚食集書省領之通典後魏太和中改少府為太府卿兼有少卿掌財物庫藏洛陽伽藍記建春門內御道南有鈎盾典農籍田三署謹案後魏初官制未備其後有少府殿中監之職而殿中品秩視晉宋為較隆太和中改少府為太府置卿及少卿其所屬之官有諸署令千石以上六百石上下之分而史志統言諸署其所掌之為何署亦莫得而詳也魏又有水衡都尉與河隄使者並列蓋亦主水之官與漢之兼掌禁錢者又不同矣北齊隋書百官志後齊制太府寺掌金帛府庫營造器物統左中右三尚方左藏司染諸冶東西道署黃藏右藏細作左校甄官等署令丞左尚方又别領别局樂器器作三局丞中尚方又别領别局涇州絲局雍州絲局定州紬綾局四局丞右尚方又别領别局丞司染署又别領京坊河東信都三局丞諸冶東道又别領滏口武安白間三局丞諸冶西道又别領晉陽冶泉郡大􅣵原仇四局丞甄官署又别領石窟丞門下省掌獻納諫正及司進御之職侍中給事黃門侍郎各六人録事四人通事令史主事令史八人統局六領左右局領左右各二人掌知朱華閣內諸事宣傳已下白衣齋子巳上皆主之左右直長四人尚食局典御二人總知御膳事丞監各四人尚藥局典御及丞各二人總知御藥事侍御師尚藥監各四人主衣局都統子統各二人掌御衣服玩等事齋帥局齋帥四人掌鋪設灑掃事殿中局殿中監四人掌駕前奏引行事制請修補東耕則進耒耜中侍中省掌出入門閣中侍中二人中常侍中給事中各四人又有中尚藥典御及丞并中謁者僕射各二人中尚食局典御丞各二人監四人內謁者局統丞各二人通典北齊官第三品太府卿第四品太府少卿第五品主衣都統尚食尚藥典御從五品中尚食中尚藥典御從六品中尚食中尚藥等丞從八品鈎盾左右尚方左藏掖庭東西牛羊司諸署令正九品細作署令謹案北齊官氶魏制不設少府而以太府寺及門下省分統其職其殿中監為門下省之所統屬六局中尚藥尚食典御又為中侍中省之所分𨽻與前代之制作異而職守固有在也至所設涇州雍州定州諸絲綾局即漢三服官之遺意與今之織造監督為相近焉後周通典後周官正五命天官左宫伯主膳太府計部等中大夫冬官司木司土司金司水等中大夫正四命天官小左宫伯小膳部小計部等下大夫冬官小司木小司土小司金小司水司玉司皮司織司卉等下大夫正三命天官小右宫伯掌式小膳部內膳太府玉府內府縫工小計部等上士夏官典牝典牡等上士冬官內匠掌材小司木小司土小司金小司水小司玉小司皮小司織小司卉等上士正二命天官司服掌式內膳典庖玉府內府縫工等中士夏官典牝典牡典駝典羊等中士冬官內匠掌材等中士正一命夏官典駝典羊等下士謹案後周倣成周之典以制官漢晉以來諸官名皆廢而不用至其職掌則固無犬殊者今托録通典天官冬官各條以存其概其後此改更之制則不可復考焉隋隋書百官志門下省統城門尚食尚藥符璽御府殿內等六局尚食局典御二人直長四人食醫四人尚藥局典御二人侍御醫直長各四人醫師四十人符璽御府殿內局監各二人直長各四人內侍省領內尚食掖庭宫闈奚官內僕內府等局太府寺統左藏左尚方內尚方右尚方司染右藏黃藏掌冶甄官等署各置令丞等員煬帝即位多所改革分門下太僕二司取殿內監名以為殿內省分太府寺為少府監殿內省置監少監丞各一人掌諸供奉統尚食尚藥尚衣尚舍尚乘尚輦等六局各置奉御二人皆置直長以二之尚衣即舊御府也改名之少府監置監少監各一人丞二人統左尚右尚內尚司織司染鐡甲弓弩掌冶等署復改監少監為令少令通典宫闈局令隋置令掌宫內門閣之禁及出納神主并內給使名帳糧廪事謹案隋髙祖改周之六官仍以門下省太府寺分統供御之職而掖庭內府等局則屬之內侍省蓋與齊之制相為仿佛至煬帝更官制分門下省以為殿內省所統六局仍由殿內以𨽻于門下蓋徒見更革之繁而法制亦無大異耳殿中之為殿內以避武元皇帝嫌名而改也自梁立太府而少府之所掌遂分至魏齊専立太府而少府之官遂廢隋初所設猶承其制逮煬帝立少府置監置令于是太府所掌遂止于諸市平凖左右藏諸署而不與供御之職相關矣宫闈局令始置于隋所掌宫內門閣并內使名帳廩膳蓋與今之內管領亦為相近也欽定厯代職官表卷三十七
