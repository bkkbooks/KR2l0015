body:
  text: 多羅質郡王臣永瑢等奉勅修纂厯代職官表全書告成謹奉表恭進者㐲以天祐命而樹之君式布亮工之典聖建邦而分之職聿昭熈績之經自雲紀龍紀鳥紀火紀以來代多因革惟汝翼汝為汝明汝聴之訓人奉憲章葢責實者必循其名而證今者貴求諸古欽惟我皇上道偹君師治臻巍煥綜萬㡬以兢業咨百爾以弼諧慎乃憲省乃成一心正朝廷之本疇若工咨若采六事秉綱紀之原緬我朝剏制顯庸監往古而立極繄列聖建官位事垂永世以重光八旗列而大告乎武成三院興而肇敷乎文治爰逮彌綸於六合實先澄叙夫九流凢貽諸奕世而丕為承皆鑒於前代之所以失時庸惇叙而宗藩鈐束之迹除奉揚絲綸而中書票擬之弊革用人由特簡而法不撓於廷推封事盡昌言而習不流於私訐著㑹讞覆奏為定制而一洗厰衛之灼薫領七司三院以重臣而悉屏奄寺之竊弄至於典因時制事不前承伯克宰桑合舊藩新部而儋爵祿火器健鋭並列營超隊以著旂常駐防則布在雄疆肅如禁旅領直則置因延閣典重祕書其他内綱外維率以遵王之道遵王之路小亷大法俾之罔有不欽㒺有不臧斯則凛聖神之作述以勵庶官亶惟仰睿智之照臨以迪允徳治既光於往古訓實示乎周行乃者因畧錄之蒐羅即班聫而尋沂猥以鉅製命及諸臣采表體於遷固之編考命官自唐虞之冊累代則相銜而下異同損益之畢陳分曹則就列以班詳畧是非之互見或稱名惟舊而考聴多殊或班爵由今而尋源不别或臚諸往牒而功令從芟或徴自新銓而史策未偹莫不衷諸典要觀其㑹通上本六經旁叅􅔣氏繁則連牘簡或片言期於凖我朝之羙偹以等百王足使昭有位之箴規以詔後世發凢起例早欽體要之親宣正舛訂譌復荷精㣲之頻示迭更寒燠載蕆簡編粤稽書載官儀剏由應劭迨六典百司之作遞有鋪張越具員分紀之編非無纂述集賢承㫖每偏舉其頭銜官制職林或拘限於時代惟樂安任戩氏頗及沿革之大凡而官品纂要書未致古今之詳偹方斯秘帙譬若椎輪葢惟聖人著作之大成永為萬古臣鄰之極則豈徒誇其博綜軼彼類林而已哉臣等忝預編摩竊慚蕪陋稽古即所以奉職恒虞鉛槧多踈顧名因藉以誦箴敢不氷淵共凛樹三宅三俊之範敷文命以裕無疆宏五服五章之謨際昌期而曕有耀臣等無任瞻天仰聖踴躍欣抃之至謹奉表恭進以聞
