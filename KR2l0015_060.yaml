body:
  text: 知州知縣等官表知州知縣等官國朝官制知州從五品順天府五人奉天府四人直𨽻十二人江蘇安徽湖南各三人山東九人山西陜西各五人河南六人甘肅湖北廣東各七人浙江江西各一人廣西二十六人四川十一人雲南二十七人貴州十四人掌一州之政治以縣之地大而事繁者升而置之所統轄一如縣制國初每州置知州一人嗣後隨地制宜或由特設或由縣升或以屬州升為直𨽻州其員亦因時而增減焉州同從六品順天府一人江蘇安徽各三人山東六人河南甘肅江西湖南四川雲南各一人陜西貴州各二人湖北四人廣西十人州判從七品順天府三人直𨽻七人江蘇甘肅湖南四川各二人山東河南廣西各五人陜西浙江江西各一人湖北廣東雲南各四人貴州三人州吏目從九品順天府五人奉天府四人直𨽻十三人江蘇安徽湖南各三人山東九人山西陜西各五人河南六人甘肅七人浙江江西各一人湖北廣東各七人廣西二十一人四川十一人雲南二十七人貴州十四人各州巡檢從九品順天府一人奉天府一人直𨽻四川各五人江蘇廣西雲南各七人安徽六人山東四人山西江西各二人河南浙江各一人湖北廣東各十三人湖南貴州各三人各州驛丞未入流順天府一人河南陜西貴州各一人四川一人各州庫大使未入流順天府一人各州閘官未入流順天府一人江蘇二人山東三人州同州判分掌各州糧馬巡捕之事吏目掌輔理各州之刑禁巡檢以下各因所屬分地而掌其職事國初每州置州同州判各官因事之繁簡無定員惟吏目每州一人嗣後因時裁設凡縣之升為州者並置各屬員如今制焉各縣知縣正七品順天府十九人奉天府八人直𨽻一百五人江蘇六十二人安徽五十人山東九十五人山西八十八人河南九十四人陜西七十三人甘肅五十二人浙江七十六人福建六十二人江西七十五人湖北六十人湖南六十四人廣東八十一人廣西四十九人四川一百十一人雲南三十九人貴州三十四人掌一縣之政令平賦役聽治訟興教化厲風俗凡養老祀神貢士讀法皆躬親厥職而勤理之國初每縣置知縣一人嗣後因地增設或屬於府或屬於直𨽻州繁要則升為州其州之簡者亦改為縣各因時裁置而定其員額焉各縣縣丞正八品順天府三人直𨽻十八人江蘇五十九人安徽十七人山東三十五人山西五人河南三十三人陜西十五人甘肅廣西各六人浙江四十六人福建二十九人江西五十五人湖北二十二人湖南十三人廣東二十人四川二十一人雲南四人貴州七人各縣主簿正九品順天府二人直𨽻五人江蘇三十七人安徽陜西甘肅各三人山東河南各十三人山西福建湖北湖南廣東廣西各一人浙江十一人江西二人各縣巡檢從九品順天府四人奉天府三人直𨽻四十一人江蘇八十五人安徽五十三人山東二十人山西三十三人河南十五人陜西十三人甘肅七人浙江四十人福建六十六人江西八十八人湖北六十八人湖南六十五人廣東一百二十九人廣西六十人四川九十五人雲南十六人貴州四人典史未入流順天府十五人各直省員數與知縣同各縣驛丞未入流順天府一人直𨽻九人山西河南陜西各六人甘肅江西二人四川一人浙江四人各縣閘官未入流江蘇十一人山東十四人各縣稅課大使未入流江蘇二人浙江三人各縣河泊所官未入流廣東二人縣丞主簿分掌糧馬征稅户籍巡捕之事以佐其縣典史掌監察獄囚如無丞簿則兼領之巡檢掌緝捕盜賊盤詰姦宄凡州縣關津要害並設之驛丞典郵傳迎送閘官掌瀦泄啓閉事稅課大使典商稅之事河泊所官掌收魚稅國初每縣置縣丞各官因事多寡無定員惟典史每縣一人嗣後因時裁設並因各縣之升改分併而定其員額焉厯代建置謹案今之州縣三代為州長邑宰秦漢以來為令長其職重矣稽厥稱名之始惟諸州之制于古無聞唐虞之十二州夏周之九州漢以後之州刺史皆以州統國與郡與今之州不同即隋唐之罷郡置州宋之以朝臣權知州事皆以州領縣如今之各直𨽻州與屬府之州亦不同惟金代始有以府統州者其州多不領縣則遂與諸縣同列元代始升縣為州下州不及三萬户而上縣有在三萬户以上則直𨽻州與各州以漸而分明遂因之以州𨽻府而州與縣並稱矣溯之于古惟成周六鄉之州正與今職頗同但止在王畿百里之內蓋亦稱名之偶合耳知州之名由宋始其分職則自金元明以來故前代州牧州刺史諸稱不容混列于表也縣令之制自古不易周官之縣正春秋時之邑宰大夫既肇其職秦漢以後大者曰令小者曰長其封為侯國者則置相以治事州郡之名時有變革而縣則數千年未之有易也唯是知縣之名起于宋其初本非縣令而以他官知其縣事其後沿襲不改至明則自府州縣皆以知稱要其為令長之職則一也州屬以同判稱者初制州本如郡故雖屬下散州而仍同郡佐之名縣之丞簿尉自漢晉以來有之至明始罷尉而置典史其餘如巡檢驛丞諸職分列于州縣之屬境者則亦州縣之屬也我朝監古定制環海之內悉建州縣吏職所治迥非前代可及謹厯考自古州縣之所由名者撮敘大略以明建置沿革之故而其詳則具著於後云三代周禮地官州長每州中大夫一人各掌其州之教治政令之法正月之吉各屬其州之民而讀法以考其德行道藝而勸之以糾其過惡而戒之若以嵗時祭祀州社則屬其民而讀法亦如之春秋以禮會民而射于州序凡州之大祭祀大喪皆涖其事若國作民而師田行役之事則帥而致之掌其戒令與其賞罰歲終則會其州之政令正嵗則讀教法如初三年大比則大考州里以贊鄉大夫廢興謹案今州縣之地皆三代侯國而其長吏實為邑宰之職其列國郡侯牧長師儒與夫分地五百里至一百里之制已見知府篇兹不具述惟成周州長為六鄉之吏上有鄉師鄉大夫下有黨正族師閭胥比長所謂五黨為州五州為鄉也州為鄉之屬别而州長以下亦皆舉里中之賢者而出使長之與今之知州頗不相類苐三代興賢之典其入官者半出鄉舉里選故士之有才守者皆得效職顯能于本土即兩漢三互法行而二千石長吏尚皆自辟曹掾多取諸管屬之賢亦猶周家之遺意也州長在王畿百里之內為治地親民之官是固今日知州之所自始矣至于虞有十二州牧夏周有九州牧則皆總領諸侯之國與今督撫相類後世州牧雖仍其名而迥非其職故不復次列云周禮地官縣正每縣下大夫一人各掌其縣之政令徴比以頒田里以分職事掌其治訟趨其稼事而賞罰之若將用野民師田行役移執事則帥而至治其政令既役則稽功會事而誅賞謹案縣正為六遂之官猶鄉之州長如作民而師田行役掌其政令與其賞罰職守皆同至月吉與春秋社祭之讀法考行及春秋州序之禮射為縣正所無當亦詳略互見其為治地之官則均也周制諸侯之國各有治都治邑之宰而侯國之小者僅如今之一縣唯畿內不以分國而鄉遂大夫所涖之屬皆有為邑之名在邦甸則謂之公邑在家稍則謂之家邑在都則謂之都邑是固今日縣令之所從始也至縣師主土地人民之數以徴野之賦貢則為王朝統領之官與分地者不同縣士掌野之戒令獄訟則專以治獄為主合之而縣令之職始備矣鄭司農謂四百里曰縣者蓋以甸稍縣都遞而析之謂縣在王畿四百里之內非謂一縣輒有地四百里也周禮小司徒四甸為縣遂人五鄙為縣而左氏春秋外傳又有三鄉為縣之文蓋周時縣制略見于此左氏宣十一年傳楚子入陳因縣陳申叔時諫乃復封陳鄉取一人焉以歸謂之夏州是則後日州縣之多皆因時增置是又秦制郡縣之所由始也又周官有修閭氏候人倉人澤虞等官蓋即後世巡檢驛丞倉庫大使河泊所諸官之託始惟成周時諸官𨽻屬六卿不盡領於州縣故不復詳著云杜佑通典春秋時列國相滅多以其地為縣則縣大而郡小故傳云上大夫受縣下大夫受郡周書作雒篇曰千里百縣縣有四郡縣邑之長曰宰曰尹曰公曰大夫晉謂之大夫魯衛謂之宰楚謂之公尹其職一也孔子為中都宰一年四方則之由中都宰為司空至於戰國則郡大而縣小矣故甘茂謂秦武王曰宜陽大縣名曰縣其實郡也秦漢書地理志秦兼并四海不立尺土之封分天下以為郡縣漢書百官公卿表縣令長皆秦官皆有丞尉漢漢書百官公卿表縣令長掌治其縣萬户以上為令秩千石至六百石減萬户為長秩五百石至三百石皆有丞尉秩四百石至二百石是為長吏百石以下有斗食佐史之秩是為小吏大率十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫遊徼三老掌教化嗇夫職聽訟收賦稅遊徼徼循禁賊盜縣大率方百里其民稠則減稀則曠鄉亭亦如之皆秦制也列侯所食縣曰國皇太后皇后公主所食曰邑有蠻夷曰道凡吏秩比六百石以上皆銅印墨綬謹案後漢書注胡廣云秋冬嵗盡各計縣户口墾田錢榖入出盜賊多少上集簿丞尉以下嵗詣郡課校其功功多尤為最者于庭慰勞勉之以勸其後負多尤為殿者於後曹對責以糾怠慢據此可見漢縣令以下殿最之法而其官制亦可考見云後漢書百官志每縣邑道大者置令一人千石其次置長四百石小者置長三百石侯國之相秩次亦如之本注曰皆掌治民顯善勸義禁姦罰惡理訟平賊恤民時務秋冬集課上計於所屬郡國丞各一人尉大縣二人小縣一人本注曰丞署文書典知倉獄尉主盜賊凡有賊發主名不立則推索行尋案察姦宄以起端緒各署諸曹掾史本注曰諸曹略如郡員五官為廷掾監鄉部春夏為勸農掾秋冬為制度掾謹案應劭漢官儀曰前漢書百官表云萬户以上為令萬户以下為長三邊始孝武所開縣户數百而或為令荆揚江南七郡惟有臨湘南昌吳三令爾及南陽穰中土沃民稠四五萬户而為長桓帝時以江南陽安為女公主邑改號為令主薨復其故此令長大小之殊又未可以表為斷也蓋表因初制綜其大概言之其因時變遷固非一定耳馬端臨文獻通考後漢凡郡縣出鹽多者置鹽官有工多者置工官主稅物有水池及漁利多者置水官主平水收漁稅所在諸縣均差吏更給之署吏隨事不具縣員按此為後世稅課河泊置官之始謹案各縣之制成周時已有之至諸侯相滅其縣漸多秦因其舊制郡以統之漢代相因而不改惟諸州之設則唐宋以後以縣之大者升而置之其制盡如縣而皆領于府漢代所未有也考兩漢地理郡國志皆以郡統縣無統州者即如前漢益州巴郡之有江州并州鴈門郡之有武州幽州漁陽郡之有泉州後漢益州廣漢郡之有雒州涼州漢陽郡之有隴州北地郡之有靈州似為以州並縣之始然考其所領則皆稱曰縣蓋第云江州縣武州縣而不單以州名其長亦第曰令而不以牧名也其時州刺史州牧為分部統領之重任後世雖假承其名而漢代則未有相假者唯縣令丞尉為自古以來不易之官制耳三國謹案三國志無百官地理之志縣令佐之興廢不可考然大略盡因漢制考魏志鄭渾傳太祖召為掾遷下蔡長邵陵令據此則三國令長之稱猶沿漢制而未嘗改也其由長而令則以縣之有小大故增秩而迭遷耳晉晉書職官志縣大者置令小者置長有主簿録事史主記室史門下書佐幹遊徼議生循行功曹史小史廷掾功曹史小史書佐幹户曹掾史幹法曹門幹金倉賊曹掾史兵曹史吏曹史獄小史獄門亭長都亭長賊捕掾等員户不滿三百以下職吏十八人散吏四人三百以上職吏二十八人散吏六人五百以上職吏四十人散吏八人千以上職吏五十三人散吏十二人千五百以上職吏六十八人散吏一十八人三千以上職吏八十八人散吏二十六人縣皆置方略吏四人洛陽縣置六部尉江左以後建康亦置六部尉餘大縣置二人次縣小縣各一人文獻通考晉制大縣令有治績官報以大郡不經宰縣不得入為臺郎謹案晉制縣有令長與漢代不異惟縣之屬吏則增設益衆其所謂職吏散吏方略吏蓋如今之諸科房吏典以庶人在官者充之而額數衆多逾于前代矣令有治績報以大郡則如今日由簡調繁之制也宋齊梁陳宋書百官志縣令千石至六百石長五百石南齊書百官志縣令相郡縣為國者為內史相謹案晉宋以後令長國相皆如漢制其所謂內史者以郡之為國而置其所謂相者以縣之為國而置之也縣既封為侯伯子男之國别置相以治民其佐屬諸員與縣異稱而職守則一故齊書總以縣令相稱之也隋書百官志梁制縣為國曰相大縣為令小縣為長皆置丞尉郡縣置吏亦各凖州法以大小而制員郡縣吏有書僮有武吏有迎新送故等員亦各因其大小而置焉陳承梁皆因其制官五千户以上縣令相品第八不滿五千户以下縣令相品第九謹案五代之制以縣之大小分令長之品秩蓋規倣漢法也至同一為令而有千石至六百石之分同一令長而有五千户上下之别其差等較漢代為尤析矣固亦因地制宜之法也北魏魏書官氏志皇始元年令長以下有未備者隨而置之縣置三令長用八品者世宗班行職令上縣令相第六品中縣令相第七品下縣令相第八品北齊文獻通考北齊制縣為上中下三等每等又有上中下之差自上上縣至下下縣凡九等然猶因循後魏用人濫雜至於士流恥居之元文遙遂奏於武成帝請革之乃密令搜揚世胄子弟恐其辭欣總召集神武門宣旨慰諭而遣自此縣令始以士人為之謹案自古重令長之選者莫如漢故郎官出宰百里天子不輕以授人至晉而有不經宰縣不得入為臺郎之制亦以示矜重也齊承後魏濫雜之餘召集世胄子弟宣旨勞遣而縣職始重然概云世胄未察賢能亦非任官之良法也後周通典牧守令長非通六條及計帳者不得居官按蘇綽六條之制其略已見司道卷中兹不具録周書盧辨傳户七千以上縣令五命户四千以上縣令正四命户二千以上縣令四命户五百以上縣令正三命户不滿五百以下縣令二命謹案漢制縣方百里萬户以上曰令萬户以下曰長又有四五萬户而亦名為長者至後周則七千户以上令長即為七命其二命之令户不滿五百以下是縣令所治僅如一鄉一亭之比矣蓋周齊戰爭之餘境土促狹户口凋弊而致然也隋通典隋刺史縣令三年一遷開皇十四年改九等州縣為上中下凡三等隋書百官志上上縣令屬官有丞中正光迎功曹光迎主簿功曹主簿録事及西曹户曹金曹租曹兵曹等掾市長等員合屬官佐史五十四人上中縣減上上縣五人上下縣減上中縣五人中上縣減上下縣六人中中縣減中上縣五人中下縣減中中縣一人下上縣減中下縣一人下中縣減下上縣一人下下縣減下中縣一人謹案縣佐之多寡視縣之繁簡而遞設之自晉代已然矣隋志稱上上縣至下下縣凡九等而通典云改為三等蓋志之所稱固其未定之制然也唐舊唐書職官志諸州上縣令一人從六品上丞一人從八品下主簿一人正九品下尉一人從九品上録事二人司户司法倉督二人典獄十人中縣令一人正七品上丞一人從八品下主簿一人從九品上尉一人從九品下録事一人司户司法倉督一人典獄八人中下縣令一人從七品上丞一人正九品上主簿一人從九品尉一人從九品下録事一人司户司法各一人典獄六人下縣令一人從七品下丞一人正九品下主簿一人從九品上尉一人從九品下録事一人司户司法各一人典獄六人諸縣令之職掌𨗳揚風化撫字黎氓敦四人之業崇五土之利養鰥寡恤孤窮審察冤屈躬親獄訟務知百姓之疾苦唐書百官志上關令一人從八品下丞二人正九品下中關令一人正九品下丞一人從九品下下關令一人亦從九品下掌禁未遊察姦慝凡行人車馬出入據過所為往來之節凡關有驛道者為上關無驛道者為中關餘為下關丞掌付事句稽監印省署鈔目通判關事上津置尉一人掌舟梁之事下津尉一人永徽中廢津尉上關置津吏八人永泰初中關置津吏六人下關四人無津者不置謹案唐縣有赤畿望緊上中下七等之差京縣為赤京之旁邑為畿其餘則以户口多少資地美惡為差而職官志所載則僅分上縣中縣中下縣下縣四等而已至三十里置一驛其非通途大道則曰館驛各有將以州里富強之家主之以待行李自至德之後民不堪命遂以官司掌焉凡天下水陸驛一千五百八十七處此實縣置驛丞之始也又唐雖改郡為州而未有以郡領州者今知州之職在唐時則皆為縣令也五季五代會要後唐同光二年中書門下奏刺史縣令有政績尤異為衆所知者即仰本處聞奏當議奬擢其州縣官任滿三考即具關申送吏部候敇除銓注周廣順二年八月敕今後刺史縣令顯有政能觀察使審詳事狀聞奏朝廷當議奬擢謹案五代任官凡齷齪無能者始注為縣令故天下之邑率皆不治然觀唐周奬勵州縣之敕亦未嘗不以縣事為惓惓特其時戎馬倥􅘓于吏治有所不暇雖欲整率之而不能耳其設官之制蓋盡循唐代無甚變改也宋宋史職官志建隆元年令天下諸縣除赤畿外有望緊上中下文獻通考四千户為望三千户以上為緊二千户以上為上千户以上為中不滿千户為中下五百户以下為下也掌總治民政勸課農桑平決獄訟凡户口賦役錢榖賑濟給納之事皆掌之有孝悌行義聞於鄉閭者申州激勸以勵風俗若京朝幕官則為知縣事有戎兵則兼兵馬都監或監押謹案縣令之職自古至今相仍不改而知縣之名實始於宋時知縣者非縣令而使之知縣中之事杜氏通典所謂檢校試攝判知之官是也唐貞元以來已有權知縣令之稱白居易集有裴克諒權知華隂縣令制至宋初欲重縣令之任始以朝官為知縣其間或參用京官及幕職官為之于慎行筆麈云宋時大縣四千户以上以朝官知小縣三千户以下選京官知故知縣與縣令不同以京朝官之銜知某縣事非縣令也逮後罷令專設知縣而知縣乃為縣令之專名故謹考其設名之所由昉者以志沿革至宋時初即有知州之名其義與知縣同而所知之州則盡如今之直𨽻州與明代之以州縣並列者不同故宋以前知州及其僚屬皆並缺之不列于表焉文獻通考天聖間天下多缺官而今選尤猥下久不得調乃為縣令人數言其病民乃詔為舉法以重令選凡知州轉運使嵗舉堪為令者一人或二人自是人重為令令選稍清慶厯間詔天下知縣非鞫獄毋得差政和二年詔縣令以十二事勸課農桑一曰敦本業二曰興地利三曰戒遊手四曰謹時候五曰戒茍簡六曰厚蓄積七曰備水旱八曰戒宰牛九曰置農器十曰廣栽植十一曰恤苗户十二曰無妄訟自政和以來人皆重內輕外士大夫皆輕縣令之選吏部兩選不注者甚多然後議所以增重激勸之法宣和五年縣令止差六十以下人靖康初詔初改官必為縣紹興七年詔將寺監丞簿等任滿已改官人未厯民事者各與堂除知縣一次並借緋章服九年詔吏部自後縣令差文臣乾道元年詔京官知縣以二年為任雖屢有更革卒以三年為任二年御筆今後非兩任縣令不除監察御史初改官人必作令謂之須入紹興初數申嚴之後或廢孝宗在位持之甚嚴慶元初復詔除殿試上三名省元外並作邑五年又令試大理評事官已改官未厯縣人並親民一次著為令舊捕盜改官人並試邑自後雖宰相子殿試科甲人無不宰邑者矣宋史職官志縣丞初不置天聖中開封兩縣始各置丞一員在簿尉之上熙寧四年繁劇縣令户二萬已上增置縣丞一員崇寧二年宰臣請縣並置丞一員以掌其事建炎元年詔縣丞係嘉祐以前員闕并萬户處存留一員餘並罷紹興三年以淮東纍經兵火權罷縣丞十八年置海陵丞一員嘉定後小邑不置丞以簿兼主簿開寶三年詔諸縣千户以上置令簿尉四百户以上置令尉令知主簿事四百户以下置簿尉主簿兼知縣事咸平四年川峽縣五千户以上並置簿自後川蜀及江南諸縣多置主簿尉建隆三年每縣始復置尉一員在主簿下俸賜並同掌閲習弓手戢姦禁暴凡縣不置簿則尉兼之謹案縣佐之設在漢曰丞簿尉自晉至唐其名實繁皆所以分理一縣之事也至宋而仍復丞簿尉之職其建置分併詳見於職官志蓋佐二雖微皆有親民之責故悉著之以志其職掌焉遼遼史百官志遼五京列峙二百餘年城郭相望田野益闢冠以節度分以刺史縣令大略採用唐制不能州者謂之軍不能縣者謂之城不能城者謂之堡其設官則未詳云王圻續文獻通考遼五京諸州屬縣各有縣令縣丞主簿尉謹案遼制令丞簿尉與宋同其諸縣之外别有城堡之屬考唐書地理志諸邊縣之外多有城鎮寨堡諸名或為鎮將或為守捉不𨽻屬于縣令遼之所建蓋猶唐制其官名則無可考耳金續文獻通考金州名不同設防禦者謂之防禦州設刺史者謂之刺史州金史百官志諸縣令一員從七品丞一員正九品主簿一員正九品尉一員正九品凡縣二萬五千户以上為次赤為劇二萬以上為次劇在諸京倚郭者曰京縣自京縣而下以萬户以上為上三千户以上為中不滿三千為下中縣而下置丞以主簿與尉通領巡捕事下縣則不置尉以主簿兼之西南都巡檢一員正七品良鄉縣置司分管良鄉宛平安次永清縣并涿易州界盜賊事諸州都巡檢使各一員正七品副都巡檢使各一員正八品散巡檢正九品內泗州以管勾排岸兼之皆設副巡檢一員為之佐謹案金以刺史治州猶今之直𨽻州知州也史稱州刺史掌同府尹與今之屬州顯然不同故不復著縣令之設與唐宋不異而巡檢一職視前代為尤詳矣金縣有置穆昆解見理藩院篇者𨽻於明安解見理藩院篇之下職從五品掌撫輯軍户訓練武藝惟不管常平倉餘同縣令是縣令之外又别有穆昆之官蓋如今之八旗佐領已别著於八旗都統表內又世宗大定間詔年老之人毋注縣令其佐亦擇壯者參用二十年更定銓注縣令丞簿格又命應部除官嘗以罪罷而再敘者遣使按其治迹如有善政方許授以縣令無治狀者不論任數多少並不得授此可以見金代慎重縣令之制云元元史百官志諸州中統五年併立州縣未有差等至元三年定一萬五千户之上者為上州六千户之上者為中州六千户之下者為下州江南既平二十年又定其地五萬户之上者為上州三萬户之上者為中州不及三萬户者為下州於是升縣為州者四十有四上州達嚕噶齊解見户部篇州尹秩從四品同知秩正六品判官秩正七品中州達嚕噶齊知州並正五品同知從六品判官從七品下州逹嚕噶齊知州並從五品同知正七品判官正八品兼捕盜之事諸縣至元三年合併江北州縣六千户之上者為上縣二千户之上者為中縣不及二千户者為下縣二十年又定江淮以南三萬户之上者為上縣一萬户之上者為中縣一萬户之下者為下縣上縣秩從六品達嚕噶齊一員尹一員丞一員簿一員尉一員典史二員中縣秩正七品不置丞餘悉如上縣之制下縣秩從七品置官如中縣民少事簡之地則以簿兼尉後又别置尉尉主捕盜之事别有印典史一員巡檢司秩九品巡檢一員謹案元州縣之制分路府州縣四等以路領州以州領縣而腹裏則以路領府以府領州以州領縣是諸州之設皆在縣上然考元史地理志諸路州之領縣者既與録事司之諸縣並列其號為州而不領縣者考其地域即後日之一縣而亦與府州並列蓋直𨽻州與諸州參雜而不分與明代府州縣之制雖不盡相同而屬州之制固自元始也至元中以縣升州者四十有四既為明代諸州定制之所由始而州縣並以尹名兼設達嚕噶齊一員元明同異之制可以參考焉明續文獻通考明不設州刺史而州附于府置知州同知判官等員里不及三十而無屬縣者裁同知判官或由事添設無定員其屬吏目一人知州掌教養州民之事凡諸州務上視府下視縣以月計上府嵗計上省以三嵗之計上吏部同知清軍匠或兼巡捕判官督糧官馬捕盜治農管河分職任事而領於知州吏目典出納文移或分領州事諸所屬衙門如府者職亦如之明太祖初定縣三等賦十萬石以下為上縣知縣從六品六萬石以下為中縣正七品三萬石以下為下縣從七品已而並改正七品京縣正六品所屬衙門有巡檢司稅課局驛遞河泊所倉草場者設官如州知縣掌教養縣民之事凡嵗貢學生三嵗貢士嵗攢實徴十嵗造黃册民之賦役視丁與産必調劑而均節之獄訟必詢其情理考諸律例而決之有不伏請陳於上為雪理焉凡養老祀神表善賑飢恤窮通貨之事時省而敦行之凡山海澤藪之産資國用者按籍而登焉諸所屬衙門如州者職亦如之庶人在官者縣亦如州明史職官志洪武元年徴天下賢才為州縣職敇命厚賜以勵其廉恥又敇諭之至於再三十七年定州縣條例八事頒示天下永為遵守是時天下州縣官廉能正直者必遣行人齎敇往勞增秩賜金仁宣之際猶然英憲而下日罕自後益重內輕外此風絶矣洪武二年以廣西地接猺獞始于關隘衝要之處設巡檢司以警姦盜後遂增置各處十三年二月特賜敇諭之尋改為雜職稅課局大使明初改在京官店為宣課司州縣官店為通課司後改為稅課局河泊所官洪武十五年定天下河泊所凡二百五十二嵗課糧五千石以上至萬石者設官三人千石以上設二人三百石以上設一人謹案牧民之官其與百姓最親者莫過於州縣自涖政理財勸農興學均土田簡夫役平獄訟興教化諸大政所關無不自州縣始者考漢書循吏傳言守而不及令蓋舉其大者稱之然其時如魏相之令茂陵焦延夀之令小黃卓茂之令密王渙之令洛陽治績最為著聞而郎官出宰百里刺史不得輕辱黃綬所以重其選者亦為甚至此漢室循良所由獨盛也令長之制厯代不改至南北朝時用人濫雜搢紳之流恥居其任五代任官凡齷齪無能者始任為縣令天下之邑率皆不治而其弊甚矣唐明皇納張九齡之言非厯縣令不得入為臺郎宋初慎選朝官出知州縣之事孝宗時定制縣令以三年為任非經兩任不得除監察御史説者謂開元乾道之吏治所以獨高於近代者以此也明初定天下縣為三等其有巡檢司稅課局驛遞閘􅄵等職事者設官如州廣徴天下賢才為州縣之職敇命厚賜以勵其廉恥意非不善也中葉而後重內輕外益不以州縣為意銓選之法弊而吏職多不得其人考課之政弛而浮濫闒冗皆得以冒居其列字人之職益輕而簿書錢榖之寄遂盡歸于胥吏之手其僚佐各官有虛名而無實效甚至骳法營私無所顧忌而吏治益不可問矣我朝整飭官方首重吏職州縣授任之初必先由部引見以簡其才否其在任者閲俸五年以上始許題升三年以上始許題調涖任三年政績卓著者保題注册又閲三年始加銜注册即用間有因事引對書名存記特用為同知知府以示鼓勵而才猷卓越者或用至督撫所以激揚之者備至其有曠職者督撫劾奏立從黜退以收鋤莠扶良之效洵乎慎重民牧永垂萬世之良法矣欽定厯代職官表卷五十四
