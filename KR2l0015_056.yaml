body:
  text: 總督巡撫表總督巡撫國朝官制總督正二品加尚書銜從一品直𨽻一人駐保定府江南江西一人駐江寧府福建浙江一人駐福州府湖北湖南一人駐武昌府四川一人駐成都府陜西甘肅一人駐蘭州府廣東廣西一人駐肇慶府雲南貴州一人駐雲南府掌綜治軍民統轄文武考核官吏修飭封疆直𨽻初設巡撫後加總督銜後又改為直𨽻總督仍管巡撫事又有三省總督駐大名府兼轄山東河南又有宣大總督駐山西大同府以宣化府屬之後俱省兩江總督初兼轄河南後定為兩江總督轄江蘇安徽江西湖廣總督初為川湖總督後定為湖廣總督轄湖北湖南四川初設巡撫後裁設總督兼管巡撫事陜甘總督初兼轄四川改轄山西後定為陜甘總督轄陜西甘肅雲貴總督初兼轄廣西後定為雲貴總督轄雲南貴州又河南初設河東總督轄河南山東後省凡總督例兼都察院右都御史銜其應否兼兵部尚書銜由吏部請㫖定奪巡撫從二品加侍郎銜正二品直𨽻一人總督兼山東一人駐濟南府山西一人駐太原府河南一人駐開封府江蘇一人駐蘇州府安徽一人駐安慶府江西一人駐南昌府福建一人駐福州府浙江一人駐杭州府湖北一人駐武昌府湖南一人駐長沙府陜西一人駐西安府甘肅一人總督兼廣東一人駐廣州府廣西一人駐桂林府雲南一人駐雲南府貴州一人駐貴陽府掌宣布德意撫安齊民修明政刑興革利弊考羣吏之治㑹總督以詔廢置三年大比獻賢能之書則監臨之其武科則主考試直𨽻初設順天巡撫正保巡撫宣府巡撫後併定為直𨽻巡撫江南初設廬鳳巡撫後定為安徽巡撫江西初設南贑巡撫湖北初設鄖陽巡撫後俱省湖南初設偏沅巡撫後改為湖南巡撫陜西初設延綏巡撫寧夏巡撫後俱省凡巡撫例兼都察院右副都御史銜其應否兼兵部侍郎銜由吏部請㫖定奪歷代建置謹案總督巡撫其官俱肇置於明代明初命京官巡撫地方有軍事則命總督軍務因事而設事已旋罷原非為一定官稱其後各省俱有之且因事增置遂為定員然總督巡撫之名已見於南北朝晉書前秦載記王猛表曰總督戎機胡三省通鑑注曰總督戎機猶都督中外諸軍事也魏書李崇傳北齊書斛律全傳周書文帝紀俱有總督字陳書蕭摩訶傳吳明徹曰吾為總督必須身居其後亦謂為大都督後周書武帝紀建德二年詔皇太子贇撫巡西土五年復遣巡撫西土此倣於左傳所謂從曰撫軍者也左傳宣十三年王巡三軍拊而勉之杜預訓拊為撫此巡撫二字所出也至唐髙祖儀鳳元年遣大臣分道巡撫以宰相來恆為河南道大使許元超為河北道大使左丞崔知悌司業鄭祖元為江南道大使後又謂之存撫于慎行穀城山房筆麈以為巡撫之名實起於此但其事任所屬由來已久蓋嘗由明而溯之自黃帝立左右大監宋書百官志作立四監監於萬國嗣是而四嶽九牧八伯十二師俱為統率之職至周而二伯九采益為明備漢分天下為十三州後各置牧蓋郡縣之歸管轄自此而始魏晉而後刺史特重類以將軍持節總統諸郡非僅曩時刺舉之任逮隋開皇中廢郡為州刺史専理一郡名存職廢而總管都督節度使之號由斯著矣宋懲藩鎮之弊節度諸使之除授特以優禮勛賢或為武臣序進之階其州牧之任則自有閫帥漕憲等官而制又一變元立行中書省明初因之後改為十三布政司後於布政司上又設巡撫總督則督撫者實當行中書省之任而與古之牧伯侔矣又元於在京中書省之外分立行省以控治諸路天下郡縣有直𨽻中書省者有𨽻諸行省者故諸路亦號為省明既改布政司則當稱某司若總督巡撫職同奉使帶部院堂上官銜又當稱行部或行院而案牘相沿概稱為省蓋亦沿元之舊至本朝以督撫専制地方以布政按察二司為之屬以佐其政治大小相維名實始為允稱明又有巡按御史原於秦之御史監郡後以與巡撫不相統屬文移亦多窒礙定巡撫為都御史而所用巡按御史多新進喜事之人倚勢作威受賕不法或强與州縣之事舉錯任意為弊尤甚我朝定制裁去以都御史副都御史為督撫兼銜而事權始一矣至若唐之節度使官級崇重其勳績較著者率加平章事以寵之久則進兼侍中中書今而平章事之罷政出鎮者亦多帶舊銜以行宋以宰相出判大藩均謂之使相此則皆由一時特授而不為常制我朝督臣之擢任大學士者間令仍管舊任以隆委寄其督撫所帶尚書侍郎銜之應加與否悉由部請㫖遵行規制周詳視前代之舛錯棼雜者綱維倍為整肅謹以歷朝異同之故先為撮叙於此以明綱領而建置沿革之本末則次第列具左方以資考核焉三代羅泌路史夏后氏紀十國而有長長有師五長而一師師五十國州十有二師州有牧牧禀命於上京孔氏謂州十有二師為三萬人非也此不過所謂承以大夫師長者商周之連率卒正也春秋左氏傳昔夏之方有德也貢金九牧謹案史記黃帝立左右大監監於萬國此正如殷周時天子之老所謂分天下以為二伯者沈約謂刺史之職即黃帝之四監非矣堯立八伯以典諸侯立四嶽以稽八伯八伯即九牧也禮記疏堯時有四伯堯之末分置八伯周禮疏按書傳云元祀巡守四嶽八伯注云堯時以羲和為六卿并掌方嶽之事是為四嶽出則為伯其後乃置八伯據此則四嶽亦當賦政於外如召伯之巡行南國者歟州十二師即十二牧此有虞之制而羅氏屬之夏后氏者蓋弼成五服禹所手定且當受命之初猶仍十二州之制其後乃制為九牧爾詩商頌相土烈烈鄭康成箋相土居夏后之世承契之業入為王官之伯出長諸侯孔頴達疏王肅云相土在夏為司馬之職掌征伐謹案相土以諸侯之長入為王官伯此與四嶽之出主諸侯者亦復不同其云相土為司馬蓋文子淮南子俱有契為堯司馬之文此云相土烈烈而箋云承契之業故本以為說然相土以司馬而長諸侯則正如今之總督兼兵部尚書之比也尚書盤庚邦伯師長孔安國傳國伯二伯及州牧也衆長公卿也謹案益稷篇州十有二師鄭云師長也孔氏則云三萬人故此師亦訓衆疏順傳為義因云衆官之長然開始即云邦伯邦國之伯諸侯師長故為東西二伯及九州之牧則亦不覺以師長屬邦國言之可知邦伯猶言邦君而師長則猶是虞夏時之十二師五長也禮記王制千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯謹案王制殷制也鄭康成謂殷之州長曰伯虞夏及周皆曰牧孔頴達則謂孔安國之意不然故於盤庚之邦伯云州牧也竊疑左右之二伯伯為定名而州長之伯例得通稱為牧故唐有九州則為八伯虞置十二州即為十二牧楚辭亦云伯昌作牧若然則竹書紀年所云王季為殷牧師者恐亦方伯之别名而非如周禮夏官之牧師僅掌牧地者矣周禮天官牧以地為名鄭康成注牧州長也春官宗伯八命作牧注一州之牧九命作伯注長諸侯為方伯禮記曲禮九州之長曰牧明堂位九采之國鄭康成注九州之牧典貢職者謹案虞有八伯殷制八州八伯故康成據周禮邦國建牧之文以為畿內不置伯有鄉遂之吏主之此當如後世畿輔府州直𨽻京師之比然今周禮鄉遂之職略不見有長畿內諸侯之事而秋官掌交則云九牧之維書之周官則云以倡九牧史記亦云武王徵九牧之君即鄭於左傳之五侯九伯固以為九州當有九牧則所謂畿內不置伯者疑亦就八伯言之爾尚書康誥孟侯孔頴達疏孟長也五侯之長謂方伯使康叔為之長者即州牧也詩序旄丘責衛伯也鄭康成箋衛康叔之封爵稱侯今曰伯者時為州伯也周之制使伯佐牧春秋傳曰五侯九伯侯為牧也謹案周制一州一牧二伯佐之此康成據左傳為說也牧於外曰侯傳云五侯知是五牧鄭謂太公分陜而治當四侯半一侯不可分故言五侯說頗迂曲則服䖍所云五侯公侯伯子男九伯九州之長者斯為當矣然二伯佐一牧則正如今各省設有巡撫而總督或兼轄數省之例也秦謹案秦廢侯國為郡縣而漢因之當時郡守皆即今之知府其上雖有監御史而秩甚卑且無專治所與今督撫不同故郡事皆直達於天子然漢郡百餘而秦止四十郡專制尤廣且如㑹稽一郡幾當今之為省者三是雖為郡守而且與今兼轄數省之總督侔矣故附識於此以見古今事勢之所由變革焉漢漢書百官志武帝元封五年置部刺史成帝綏和元年更名牧哀帝建平二年復為刺史元夀二年復為牧漢書朱博列傳初何武為大司空與丞相方進共奏言古選諸侯賢者以為州伯書曰咨十有二牧所以廣聰明燭幽隱也今部刺史居牧伯之位秉一州之統位下大夫而臨二千石失位次之序臣請罷刺史更置州牧以應古制奏可及博又奏請罷州牧置刺史如故奏可謹案漢官典儀云刺史周行郡國以六條問事非條所問即不省故刺史稱傳車其吏言從事居無常治吏不成臣而何武以為居牧伯之位秉一州之統且謂刺史古之方伯一州表率蓋上所委任亦權勢所積至此然秩卑寵渥今之督撫固非其例故不著於表若夫州牧既設其時乃略無可紀之人蓋二千石位任尚重而其為牧者亦僅循資自全者爾後漢書光武帝本紀建武十八年罷州牧置刺史謹案漢武帝初置部刺史成帝時改為牧哀帝時復為刺史後又為牧經王莽變革建武元年復置牧至此改為刺史而後漢書百官志第云成帝更為牧建武十八年復為刺史則徑似成帝改牧以後直至建武十八年而始復為刺史者疏矣後漢書劉焉列傳焉遷太常時四方兵寇焉以為刺史威輕不能禁建議改置牧伯鎮安方夏請選重臣以居其任焉議得用出為監軍使者領益州牧太僕黃琬為豫州牧宗正劉虞為幽州牧皆以本秩居職州任之重自此而始謹案後漢州牧以本秩居職此正如明之總督巡撫不定為品秩各以京官繫銜之例也三國三國蜀志諸葛亮列傳領益州牧馬超傳章武元年遷驃騎將軍領涼州牧謹案馬超領涼州牧此當為州牧遙領之始然馬超先據涼州時已自稱征西將軍領并州牧矣三國魏志文帝本紀黃初三年以荆揚江表八郡為荆州孫權領牧故也南齊書州郡志吳置持節督州牧八人三國吳志陸抗列傳孫皓即位加鎮軍大將軍領益州牧鳳凰二年拜大司馬荆州牧謹案三國州牧一如漢末之制故著此數條以存其概南齊書百官志魏晉世州牧隆重刺史任重者為使持節都督輕者為持節督起漢順帝時御史中丞馮赦討九江賊督揚徐二州軍事而何徐宋志云起魏武遣諸州將督軍王圭之職儀云起光武並非也杜佑通典後漢光武建武初征伐四方始權置督軍御史事竟罷建安中魏武為相始遣大將軍督軍而袁紹分統諸軍為三都督魏武征孫權還又使夏侯惇督二十六軍文帝黃初三年始置都督諸州軍事或領刺史明帝太和四年司馬懿征蜀加號大都督髙貴鄉公正元二年司馬昭都督中外諸軍事尋加大都督謹案總督之名昉於古之都督南齊書以為起漢順帝時杜佑通典以為起光武及魏武為相時然皆總理戎事為用兵而設其都督諸州或兼領刺史實起於黃初三年蓋都督以治軍刺史以治民二者兼領而職任始重亦如今之督撫其理軍事也則有各標營咸禀節制其理民事也則府州縣胥歸統轄制頗相近但魏晉都督兼領刺史者止治其所駐之一州其餘則仍别置刺史所謂單車刺史俾専治民之責是兼理之中仍有分理之制故宋出廬陵王義真都督南豫豫雍司秦并六州諸軍事而所制者仍南豫州也後魏以杜超都督冀定相三州諸軍事叔孫建都督冀青等州諸軍事並見通鑑其制亦同此耳至後周改為總管而三都督之名亦相沿不廢隋始以為散官都督之名遂微至唐復設都督後漸易為節度使亦兼領刺史而其任益専矣蓋都督之始末如此今撮叙其概以便省覽焉晉司馬光資治通鑑太康元年以司𨽻所統郡置司州凡州十九詔曰漢末刺史內親民事外領兵馬今天下為一刺史分職皆如漢氏故事胡三省注察舉郡縣長吏而已悉去州郡兵大郡置吏百人小郡五十人交州牧陶璜言州兵未宜約損僕射山濤亦言不宜去州郡武備然其後刺史復兼兵民之任州鎮愈重矣謹案漢司隸校尉統三輔三河宏農七郡亦止専司察舉初以司𨽻官屬制置如州儀故俗稱司州至晉乃以京輔所部定名置司州司隸校尉統之而司𨽻校尉即為州牧之任渡江以後以揚州刺史主京畿遂罷司𨽻不設而社佑以為晉罷司隸校尉置司州者誤也通典晉都督諸軍為上監諸軍次之督諸軍為下使持節為上持節次之假節為下伐吳之役以賈充為使持節假黃鉞大都督總統六師太康中都督知軍事刺史理人各用人也惠帝末乃并任非要州則單為刺史江左以來都督諸軍尤重惟王導等權重者乃居之謹案晉氏南遷以揚州為京畿穀帛所資皆出焉以荆江為重鎮甲兵所聚盡在焉三州户口居江南之半自非親賢重望不居是職故荆州亦稱陜西而襄陽江夏彭城廣陵厯陽京口各置名州為藩鎮重寄當時所謂要州蓋謂此也太康時分釐治軍治民之職不旋踵而仍併為一蓋有不治軍之刺史而無不治民之都督江左尤重其任惟權位最隆者乃始居之亦時㑹使然也通典自魏晉以後刺史多帶將軍開府州與府各置僚屬州官理民别駕治中以下是府官理戎長史司馬等官是謹案魏晉以下幕府各有僚屬自别駕治中以下名號不一皆本州之佐官各有職掌自唐以郡守稱刺史而治中别駕遂為郡僚其節度使屬官則有判官推官書記支使之類至宋而閫帥漕憲又各有其屬官而唐節度之幕職反為列郡之佐僚矣今總督巡撫既不設掾屬而治中判官等員又各從其長以散見於他表兹並不復著而揭其大略於此後歷代不復叙列焉宋齊梁陳宋書百官志刺史每州各一人通典宋有都督諸州諸軍事舊曰監某州諸軍文帝即位改監為都督刺史任重者為使持節都督輕者為持節皆銅印墨綬進賢兩梁冠絳朝服而領兵者武冠自魏以來庶姓為州而無將軍者謂之單車刺史凡單車刺史加督進一品都督進二品不論持節假節宋與魏同隋書百官志梁官多同宋齊之舊州刺史二千石受拜之明日辭宫廟而行北魏魏書官氏志髙祖詔羣僚議定百官著於令都督府州諸軍事從第一品上都督三州諸軍事第二品上司州刺史第二品中都督一州諸軍事從第二品下髙祖復次職令司州牧從第二品上州刺史第三品中州刺史從第三品下州刺史第四品謹案北魏刺史固即魏晉以來州牧之任然唯都督軍事兼領者權寄特重而單州刺史秩亦稍替故即南朝官制刺史亦有在第五品者至隋而刺史僅為理一郡之官蓋積輕之勢然也通典行臺省魏晉有之昔魏末晉文帝討諸葛誕散騎常侍裴秀尚書僕射陳泰黃門侍郎鍾㑹等以行臺從至晉永嘉四年東海王越帥衆許昌以行臺自隨是也越請討石勒表以行臺自隨及後魏謂之尚書大行臺别置官屬後魏道武帝置中正行臺以秦王儀為尚書令以鎮之孝文帝永熙三年以宇文泰為大行臺以蘇綽為行臺度支尚書謹案魏晉以後稱尚書省為中臺見異諸葛恪𫝊亦稱為內臺見宋書百官志其隨所管之道置於外州以行尚書事者則號之為行臺肇端於魏晉為專征討而設不為常制至後魏始開府置屬號為尚書大行臺於一路府州無所不統然亦以専主軍事也至後齊始理民事隋則設官尤衆謂之行臺省則兵農刑政盡歸統轄矣行臺専制一方實為今制府之職其官屬必以尚書僕射侍郎為職亦猶今督撫之兼兵部尚書及侍郎也至隋以省稱遂為元行中書省之所自始焉北齊通典北齊司州曰牧制州為上中下三等每等又有上中下之差自上上州至下下州凡九等隋書百官志後齊制官多循後魏行臺在今無之其官制令僕射其尚書丞郎皆隨權制而置員焉通典北齊行臺兼統民事自辛術始焉武定八年辛術為東南道行臺東徐州刺史郭志殺郡守文宣聞之敕術曰江淮初附百姓難向京師留卿為行臺亦欲理邊民寃枉監理牧守自今以後所統十餘州地諸有犯法者刺史先啓聽報以下先理後表齊代行臺兼總民事則自術始也謹案行臺之制後魏志無文隋志僅存其大略考齊文宣帝敕辛術之文則其統轄職掌均可概見矣通典又言江左無行臺惟梁末以侯景為河南王大行臺承制如鄧禹故事蓋梁特循襲北魏暫設此制不為常典也後周北周書盧辨列傳雍州牧九命户三萬以上州刺史正八命户二萬以上刺史八命户一萬以上刺史正七命户一萬以下刺史七命總管刺史加使持節諸軍事通典後周改都督諸軍事為總管又有大都督帥都督都督馬端臨文獻通考後周改都督諸軍事為總管武帝時以王謙為益州總管總管之名始此謹案周明帝紀武成元年正月改都督諸州軍事為總管自是為總管者安成公憲天水公廣尉遲綱尉遲迥即見明帝紀蔡國公廣即天水公尉遲綱邵國公㑹趙國公招杞國公亮衛國公直見於武帝紀俱在王謙為總管之前馬氏云王謙為總管總管之名始此非也隋通典隋雍州置牧餘州並置刺史亦同北齊九等之制總管刺史加使持節至開皇三年罷郡以州統縣自是刺史之名存而職廢通典隋代三都督並以為散官煬帝改大都督為校尉帥都督為旅帥都督為隊正至此則都督之名微矣文獻通考隋文帝以并益荆揚四州置大總管其餘總管府置於諸州列為上中下三等加使持節煬帝悉罷之通典大行臺隋謂之行臺省有尚書令僕射左右任置各一人主事四人有考功兼吏部主爵司勳禮部兼祠部主客膳部兵部兼職方駕部庫部刑部兼都官司門度支兼倉部金部工部屯田兼水部虞部侍郎各一人每臺置食貨農圃武器百工監副各置丞録事等員蓋隨其所管之道置於外州以行尚書事唐新唐書百官志西都東都北都牧各一人從二品通典唐諸州復有總管亦加號使持節武德五年以洛荆并幽交五州為大總管府七年改大總管府為大都督府總管府為都督府新唐書百官志注武德初有行臺有大行臺其官有尚書省令掌管內軍民總判省事有僕射二人自左右丞以下諸司郎中略如京省通典唐初亦置行臺貞觀以後廢唐六典大都督府都督一人從二品長史一人從三品中都督府都督一人正三品長史一人正五品上下都督府都督一人從三品長史一人從五品上謹案唐武德初邊要之地置總管以統軍加號使持節蓋漢刺史之任其後改曰都督總十州者為大都督後去大字凡都督府有刺史以下如故然大都督又兼刺史而不檢校州事其後都督加使持節則為將諸將亦通以都督稱惟朔方猶稱大總管大都督皆親王遙領都督府之政以長史主之而節度使所治州有都督府者則領長史焉謝維新合璧事類唐自武德至天寶以前邊防之制其軍城鎮守皆有使而道有大將一人曰大總管已而又曰大都督至太宗時行軍征討曰大總管在其本道曰大都督高宗永徽以後都督帶使持節者謂之節度使然猶未以名官景雲二年以賀拔延嗣充河西節度使自此接乎開元天寶之間朔方隴右河東河西諸鎮皆置節度使緣邊之地凡八節度外任之重無比焉至德以後中原刺史亦循其例受節度使之號若諸州在節度使內者皆節度焉唐六典天下之節度使有八曰關中朔方節度使曰河東節度使曰河北幽州節度使曰河西節度使曰隴右節度使曰劒南節度使曰磧西節度使曰嶺南節度使舊唐書地理志至德之後刺史皆治軍戎遂有防禦團練制置之名要衝大郡皆有節度之類或易以觀察之號東都畿汝防禦觀察使領汝州東都留守兼之河陽三城節度使宣武軍節度使義成軍節度使忠武軍節度使天平軍節度使兖海節度使武寧軍節度使平盧軍節度使陜州節度使潼關防禦鎮國軍使同州防禦長春宫使鳳翔隴節度使邠寧節度使涇原節度使朔方節度使河中節度使昭義軍節度使河東節度使大同軍防禦使魏博節度使義昌軍節度使成德軍節度使義武軍節度使幽州節度使山南西道節度使山南東道節度使荆南節度使劒南西川節度使東川節度使武昌軍節度使淮南節度使浙江西道節度使浙江東道節度使福建觀察使宣州觀察使江南西道觀察使湖南觀察使黔中觀察使嶺南東道節度使嶺南西道桂管經略觀察使雍管經略使容管經略使安南都護節度使大中咸通之間隴右歸國又析置秦州節度使涼州節度使瓜沙節度使謹案舊志所列蓋據唐中葉言之至其後節度屢有增設或多賜軍號而觀察防禦亦多改為節度使或并或析不可備書矣新唐書百官志節度使副大使知節度事行軍司馬副使各一人同節度副使十人節度使掌總軍旅顓威賞初授具帑抹兵杖詣兵部辭見觀察使亦如之辭日賜雙旌雙節行則建節樹六纛視事之日設禮案髙尺有二寸方八尺判三案節度使判宰相觀察使判節度使團練使判觀察使罷秩則交㕔以節度使印自隨留觀察使營田等印以郎官主之鎖節樓節堂以節院使主之其後有持節為節度副大使知節事者正節度也諸王拜節度大使者皆留京師謹案唐初遣大使十三人巡省天下諸州水旱則遣使有巡察安撫存撫之名後又置十道按察使各道一人後改曰十道按察採訪處置使後又曰採訪處置使後又兼黜陟使後定改曰觀察處置使考唐之巡察使察舉州縣再周而代乃後世巡按之比其安撫存撫宣撫諸使則固今巡撫之官所由昉也若觀察使類為節度使兼職無節度之州亦特設之所司道俗宣風綱理郡縣正即今巡撫兩司之職蓋觀察初為按察雖非即明之按察使然職分相近故唐書稱其豐稔為上考省刑為中考辦稅為下考而王圻續通考亦謂明設按察司即觀察之職後遂以觀察為今守巡道之稱則指其副二言之唐地理志雖與節度並列要不得即指為巡撫也又建中後行臺亦置節度諸使大率節度觀察皆兼所治州刺史云唐㑹要貞觀二年邊州别置經略使至德二載賀蘭進明除五府經略兼節度使建中元年除元琇始不帶五府經略謹案經略二字見於左傳至唐始以名官其以節度兼者則有副使永淳元年婁師德為河源軍經略副使是也蓋唐制一道兵政屬之節度使民事屬之觀察使然節度多兼觀察兵甲財賦民俗之事無所不領謂之都府又各道雖有度支營田招討經略等使然亦多以節度使兼之蓋使名雖多而主其事者每道一人而已五季五代史王處直列傳此中之法自將校為刺史升團練防禦而至節度使謹案節度使之専橫至五季而極冗濫又為特甚然遷進亦自有其序也故著之於此宋柯維騏宋史新編開封府牧從二品諸府牧九州牧同宋史職官志節度使無所掌其事務悉歸本州亦無定員恩數與執政同以待宗室近屬外戚國壻年老久次者若外任除殿帥始授此官亦止於一員或有功勛顯著任帥守於外及前宰執拜者尤不輕授王明清揮麈餘話節度州有三印節度印隨本使在闕則納於有司觀察印則長吏用之州印則晝付録事掌用至暮歸於長吏凡節度在鎮兵仗之屬則觀察屬官用本使印判狀田賦之屬則觀察屬官用本使印簽狀刺史屬縣則用州印本使判狀故命帥必曰某軍節度某州管內觀察等使某州刺史必具此三者言軍則専制兵旅言管內則専總察風俗言刺史則治其州軍此祖宗損益唐制軍兵之務職守之分俾各歸其實也謹案唐節度觀察使俱帶本州刺史是以都府而兼治州事宋則以知州綜諸使務而節度觀察特為兼判遙領之官則雖節度初除領院降麻禮數尤異已非復唐州鎮之任而此下如承宣觀察團練防禦刺史俱無職任特以為武臣遷轉之次序而已宋史職官志經略安撫司經略安撫使一人以直祕閣以上充掌一路兵民之事皆帥其屬而聽其獄訟頒其禁令定其賞罰稽其錢穀甲械出納之名籍沈括夢溪筆談豫為鄜延經略使日新一㕔謂之五司㕔延州正㕔乃都督㕔治延州事五司㕔治鄜延路軍事如唐之使院也五司者經略安撫總管節度觀察也唐制方鎮皆帶節度觀察處置三使今節度之職觀察歸安撫司處置歸經略司謹案宋制帥臣任河東陜西嶺南路職在綏御外藩則為經略安撫使兼都總管以統制軍旅河北及近地則止為安撫使蓋經略安撫使正如今總督兼巡撫之比而止為安撫使者則如今巡撫之比也又宋有制置使或兼經略使或以安撫大使兼掌經畫邊鄙軍旅之事宣撫使掌宣布威靈撫綏邊境及統護將帥督視軍旅之事亦即今總督巡撫之任然俱不常置故不著於表而附見於此又轉運使宋時稱為漕帥凡一路邊防盜賊刑訟金穀按廉之任無所不總然其初所職止催科徵賦出納綱運數事而已兹故析入布政司表內而此亦不著云遼遼史百官志南面方州官某州某軍節度使王圻續文獻通考遼北面著帳郎君有節度使所掌非軍民事南面節度使設官甚衆遼二百餘年城郭相望田疇益闢冠以節度承以觀察防禦團練等使分以刺史縣令大略采用唐制其間宗室外戚大臣之家築城賜額謂之頭下州軍惟節度使朝廷命之後往往皆歸王府金金史百官志諸總管府謂府尹兼領者都總管一員正三品掌統諸城隍兵馬甲仗總判府事同知都總管一員從四品掌通判府事諸鎮節度使一員從三品掌鎮撫諸軍防刺總判本鎮兵馬之事兼本州管內觀察使事其觀察使所掌並同府尹本志府尹掌宣風導俗肅清所部謹案金制州有三等其一曰節鎮州然特節制當州别無支屬蓋自宋太平興國初詔廢各鎮支郡後遂相循不改則所謂節鎮州者名沿唐舊而實與一道置使之制異矣元元史百官志行中書省凡十秩從一品掌國庶務統郡縣鎮邊鄙與都督為表裏國初有征伐之役分任軍民之事皆稱行省未有定制中統至元間始分立行中書省因事設官官不必備皆以省官出領其事其丞相皆以宰執行某處省事繫銜其後改為某處行中書省凡錢糧兵甲屯種漕運軍國重事無不領之每省丞相一員從一品平章二員從一品右丞一員左丞一員正二品參知政事二員從二品甘肅嶺北各減一員丞相或置或不置尤慎於擇人故往往缺焉河南江北等處行中書省江浙等處行中書省江西等處行中書省湖廣等處行中書省陜西等處行中書省四川等處行中書省遼陽等處行中書省甘肅等處行中書省嶺北等處行中書省雲南等處行中書省征東等處行中書省謹案魏晉有行臺後魏謂之尚書大行臺别置官屬唐貞觀以後廢元設行中書省中或改行尚書省所承固有自也征東行省屢置屢廢故云行中書省凡十實十一也又元至正時增置淮南江北等處行中書省後又續增福建山東廣西膠東諸處行中書省而各行省長二亦多所添設俱一時之制故不備著元史百官志諸路總管府上路達嚕噶齊解見户部篇總管各一員並正三品下路秩從三品續文獻通考元都總管之職蓋節度使也所掌事各不同謹案元亦有經略使至正十八年命經略使問民疾苦招諭寇盜蓋即前代宣諭招撫等使之比其與宋之經略使節制諸使者異矣明明史職官志總督漕運兼提督軍務巡撫鳳陽等處兼管河道一員總督薊遼保定等處軍務兼理糧餉一員總管宣大山西等處軍務兼理糧餉一員總督陜西三邊軍務一員總督兩廣軍務兼理糧餉帶管鹽法兼巡撫廣東地方一員總督四川陜西河南湖廣等處軍務一員總督浙江福建江南兼制江西軍務一員總督陜西山西河南湖廣四川五省軍務一員總督鳳陽地方兼制河南湖廣軍務一員總督保定地方軍務一員總督河南湖廣軍務兼巡撫河南一員總督九江地方兼制江西湖廣軍務一員總督南直𨽻河南山東湖廣四川軍務一員總督河漕兼提督軍務一員謹案總督漕運總理河漕二職今已析入漕運總督河道總督表內然明之總督漕運兼巡撫之職而總理河漕者實亦一總督也故並著之雷禮列卿記景泰三年命左都御史王翺總督兩廣事務自總兵以下悉聽節制然事平即歸非常設成化元年命韓雍總理軍務兼理巡撫久之雍請得文武大臣分理其事于是以陳濂撫廣東張鵬撫廣西而雍専理軍務五年御史龔成等言兩廣宜設總督兼巡撫乃起雍總督兼巡撫於梧州設總府巡撫復不設仍總於總督永為定制謹案韓雍總督兩廣此為専設總督之始若正統六年征麓川以兵部尚書王驥總督軍務景泰元年討叛苗以巡撫河南副都御史王來總督湖廣貴州軍務俱在王翺為總督之先然皆因事而設非定制也明又有經略使不専設有兵事則暫敕行事嘉靖中以易州通州昌平州為三輔各置經略使一員以文臣領之尋罷其後主邊事者多稱經略約如總督之職兹不復著明史職官志總理糧儲提督軍務兼巡撫應天等府一員巡撫浙江等處地方兼提督軍務一員巡撫福建地方兼提督軍務一員巡撫順天等府地方兼整飭薊州等處邊備一員巡撫保定等府提督紫荆等關兼管河道一員巡撫河南等處地方兼管河道提督軍務一員巡撫遼東地方贊理軍務一員巡撫宣府地方贊理軍務一員巡撫大同地方贊理軍務一員巡撫延綏等處贊理軍務一員巡撫寧夏地方贊理軍務一員巡撫甘肅等處贊理軍務一員巡撫陜西地方贊理軍務一員巡撫四川等處地方兼提督軍務一員巡撫湖廣等處地方兼贊理軍務一員巡撫江西地方兼理軍務一員巡撫南贑汀韶等處地方提督軍務一員巡撫廣東地方兼贊理軍務一員巡撫廣西地方一員巡撫雲南兼建昌畢節等處地方贊理軍務兼督川貴糧餉一員巡撫貴州兼督理湖北川東等處地方提督軍務一員巡撫天津地方贊理軍務一員巡撫登萊地方贊理軍務一員巡撫安廬地方贊理軍務一員巡撫淮揚地方贊理軍務一員巡撫承天贊理軍務一員撫治鄖陽等處地方兼提督軍務一員贊理松潘地方軍務一員徐學聚國朝典彚永樂十九年命右都御史王彰巡撫河南時有告周府將為不軌者上欲及其未發討之彰曰以臣之愚可不煩兵但得御史三四人隨臣以往足矣然須奉敕以臣巡撫其地乃可於是彰奉敕往巡撫謹案王彰奉敕為有明設巡撫之始先是洪武二十四年遣皇太子巡撫陜西蓋暫一行之非定制也宣德中以關中江南等處地大而要特命官更代巡撫不復罷去後遂與總督同為方面大臣當時巡撫兼軍務者加提督有總兵地方加贊理管糧餉者加總督兼理他如整飭邊關提督邊關及撫治流民總理河道等號皆因事特設並無定制觀明史所載其初所置巡撫如周忱于謙等亦未嘗不得其人自中葉以後督撫多用廷推率以營求得之又往往交結閹人為其私黨以致擅作威福朘尅民膏即名掛彈章者亦多置之不問甚者反加遷擢益無所顧忌惟事貪暴殃民而於國是邊防一切全不為意浸成厲階積弛已甚我國家損益前制大小綱維措置得宜封疆大吏職任崇而掄擇慎我皇上勵精圖治宵旰勤求無時不以吏治民生為念各督撫仰膺寵寄祇奉德音宣力分猷小廉大法其有勤恪夙著者則考績優叙或特賜官銜以示寵勵如奉職不稱自蹈愆咎則或削其冠帶或貶其品秩仍留原官以責後效甚或至營私骩法則立正憲典以示懲警慶讓豫奪咸禀睿裁無不凛肅朝章交相感勵洵為郅隆之極軌矣欽定厯代職官表卷五十
