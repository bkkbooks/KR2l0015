body:
  text: 前鋒䕶軍統領表前鋒䕶軍統領國朝官制前鋒統領左右翼各一人正二品或以王公大臣兼領掌本翼四旂前鋒之政令鑲黄正白鑲白正藍四旂為左翼正黄正紅鑲紅鑲藍四旂為右翼初天聰八年定巴牙喇營前哨兵為噶布什賢超哈順治十七年定噶布什賢噶喇衣昻邦漢字稱為前鋒統領毎翼各設一人以總其事焉前鋒㕘領前鋒侍衛左右翼各八人㕘領正三品侍衛正四品凢前鋒營各官皆滿洲䝉古兼用委署前鋒侍衛左右翼各四人以前鋒校或親軍校選委給五品冠帶前鋒校左右翼各四十八人從六品掌督率前鋒警蹕宿衞凡行幸止頓於御營一二里外安設卡倫立前鋒旂以為門户列帳守衛以前鋒㕘領前鋒侍衞共四人前鋒校前鋒共百二十人董其役焉國初設噶布什賢章京順治十七年定為前鋒㕘領並置前鋒侍衞前鋒校等員額乾隆十七年増置委署前鋒侍衞旂各一人前鋒軍八旗滿洲蒙古每佐領各二人分其半以兼習鳥鎗設之什長隊長以時訓練而黜陟之隨印恊理事務前鋒㕘領侍衛左右翼各一人隨印前鋒校左右翼各二人隨印筆帖式左右翼各二人掌案牘文移隨印㕘領侍衛及前鋒校俱雍正三年定筆帖式初制每翼各一人康熈四十六年省雍正三年復増置䕶軍統領每旂各一人正二品掌䕶軍之政令國初設巴牙喇營統以巴牙喇纛章京順治十七年定漢字稱為䕶軍統領設員額如今制䕶軍㕘領毎旂滿洲十人蒙古四人正三品内司鑰長署司鑰長毎旂各一人以前鋒𠫭領䕶軍𠫭領鳥鎗䕶軍𠫭領遴選除授副䕶軍㕘領毎旂滿洲十人䝉古四人初制五品雍正十二年定為正四品委署䕶軍㕘領每旂各七人以䕶軍校選委給五品冠帶䕶軍校滿洲䝉古每佐領各一人從六品掌董率䕶軍守䘙宫殿門户及紫禁城外環列周廬畨上宿直傳籌巡警凡禁門扃鑰啟閉以時置籍以驗出入車駕行幸則宿衞御營専司網城堆舗及清道警蹕之禁令國初設巴牙喇營甲喇章京順治十七年定漢字稱為䕶軍㕘領又設署䕶軍㕘領雍正元年改為副䕶軍㕘領乾隆十七年復設委署䕶軍㕘領員額䕶軍八旂滿洲䝉古毎佐領各十七人初制以上三旂䕶軍㕘領䕶軍校䕶軍等守衞禁門下五旂各守王公府門遇行圍出征則八旂一律分撥雍正七年始定八旂䕶軍均司禁衞焉隨印恊理事務䕶軍㕘領副䕶軍㕘領毎旂各一人隨印䕶軍校每旂各二人隨印筆帖式每旂各二人門筆帖式鑲黄正黄正白三旂各十人掌案牘文移隨印㕘領副㕘領及䕶軍校俱雍正三年定筆帖式初制每旂各一人康熈四十六年省雍正三年復増置門筆帖式初制未設後増置圓明園八旂䕶軍營縂統無定員以王公大臣兼任掌圓明園翊衞之政令雍正二年始置于禁苑周圍建營方八所選京中八旂官軍分地駐劄専司宿直以王公大臣統轄營務焉營總䕶軍㕘領每旂各一人均正三品副䕶軍㕘領毎旂各二人初制五品雍正十年升為正四品署副䕶軍㕘領每旂各四人初制六品雍正十年升為正五品䕶軍校每旂各八人正六品副䕶軍校毎旂各八人給冠帶仍食月餉掌守衞御園番直巡警凡車駕出入則率其徒以司清蹕之事營總副㕘領署副㕘領俱雍正三年置㕘領雍正十年増置䕶軍校初置八十人雍正十年増置三十二人乾隆十二年又増十六人副䕶軍校雍正七年置初定七十二人十年増置四十人乾隆十二年又増十六人䕶軍三千六百七十二人教養兵四百八十人隨印協理事務營總䕶軍㕘領各二人隨印䕶軍校四人隨印筆帖式八人掌案牘文移乾隆十六年置御營嚮導總統無定員以前鋒統領䕶軍統領八旂副都統兼任嚮導處㕘領侍衞各四人前鋒校䕶軍校各六人皆于前鋒䕶軍營内選用嚮導之職凡遇時巡省方以總統一人先期率官校詣車駕經行之地周覽山川通橋梁夷險隘計程入告駕行佩櫜鞬前𨗳毎日駐蹕後以次日程途及駐蹕之所奏聞交兵部曉諭闔營回鑾亦如之凡御營及頓營看營均由嚮𨗳總統先期指示飭所在有司敬謹修治焉謹案嚮𨗳雖無専設之員非定有常額者可比然翊衞蹕途責任綦重今以其隨時簡任者皆在前鋒䕶軍營官内謹附載于此篇歴代建置三代周禮天官宫伯掌王宫之士庻子凡在版者授八次八舍之職事鄭康成注衞王宫者必居四角四中於徼候便也鄭司農云庻子衞王宫在内為次在外為舎元謂次其宿衞所在舍其休沐之處周禮天官掌舍下士四人府二人史四人徒四十人掌王之㑹同之舍設梐枑再重設車宫轅門為壇壝宫棘門為帷宫設旌門凡舍事則掌之周禮秋官司隸中士二人下士十有二人府五人史十人胥二十人徒二百人掌帥四翟之隸使之各服其邦之服執其邦之兵守王宫與野舍之厲禁周禮地官師氏使其屬帥四夷之隸各以其兵服守王之門外且蹕朝在野外則守内列謹案周之宫伯掌王宫士庻子實近今領侍衞内大臣而所授八次八舎分置八隅以衞王宫則又兼有今䕶軍統領之職至掌舎于王行所止舍設梐枑再重鄭康成謂行馬再重以周衞有内外列正如今前鋒統領于御營安設卡倫之職也若師氏所掌使其屬帥四夷之隸守王之門外司隸所掌帥四翟之隸以守王宫葉時禮經㑹元謂為周防守禦之衞則與今䕶軍統領之職尤為相合矣秦徐堅初學記案齊職儀云衞尉秦官也掌宫門衞屯兵蓋周禮宫伯之職尉者罻也言以羅罻令主奸非史記秦始皇本紀閻樂將吏卒至望夷宫殿門縛衞令僕射曰賊入此何不止衞令曰周廬設卒甚謹安得賊敢入宫謹案衞尉官始置于秦即今䕶軍之職所自昉衞令蓋其所屬而衞令僕射為衞令之長則如今之䕶軍㕘領也漢漢書百官公卿表衞尉掌宫門衞屯兵顔師古注漢舊儀云衞尉寺在宫内胡廣云主宫闕之門内衞士于周垣下為區廬區廬者若今之仗宿屋矣有丞景帝初更名中大夫令後元年復為衞尉屬官有衞士令丞衞士三丞又諸屯衞候司馬二十二官皆屬焉漢書顔師古注司馬門者宫之外門也衞尉有八屯衞候司馬主衞士徼巡宿衞毎面各二司馬故謂宫之外門為司馬門王應麟玉海西京賦衞尉八屯警夜巡晝注引八校尉非也校尉北軍衞尉南軍宫門四面毎門各有二司馬凡八司馬故曰八屯太平御覽漢官觧詁曰衞尉主宫闕之内衞士于周垣下為廬各有員部凡居宫中者皆施籍于掖門案其姓名若有醫巫僦人當入者本官長吏為之封啟傳審其印信然後内之有籍者皆復有符符用木長二寸以所屬宫兩字為銕印亦太府卿炙符當出入者案籍畢復齒符識其物色乃引内之也其有官位得出入者令執御之官傳呼前後以相通從昏至晨分部行夜夜有行者輒前曰誰誰若此不懈終嵗更始所以重慎宿衞也謹案漢以南軍為宫衞屯兵而衞尉主之雖與光禄勲同掌宿直而有郎衞兵衞之分其八屯司馬専率衞士守衞宫門譏察門籍晨昏巡警與今前鋒䕶軍統領之職實相脗合蓋衞尉如今之統領而屯衞司馬則如今之㕘領也漢書百官公卿表長樂建章甘泉衞尉皆掌其宫職略同不常置漢書宣帝本紀元康元年置建章衞尉元帝本紀初元三年罷甘泉建章宫衞漢書蕭望之列傳署小苑東門候顔師古注門候主侯時而啟閉也謹案漢時天子御未央宫屯衞皆在焉而長樂建章甘泉皆置衞尉以備臨幸守衞正如今圓明園䕶軍營之比其小苑東門候不見於史當亦甘泉建章衞尉所屬耳馬端臨文獻通考秦有䕶軍都尉漢因之髙帝以陳平為䕶軍中尉盡䕶諸將然則復以都尉為中尉武帝元狩四年以䕶軍都尉屬大司馬于時復為都尉矣哀帝元夀元年更名司冦平帝元始元年更名䕶軍謹案此即䕶軍之名所由始然其所謂䕶軍乃調䕶諸將之義非䕶衞之䕶漢書韓安國為䕶軍將軍䕶四將軍以伏單于者是也今䕶軍之稱名雖同而實不相襲故不著於表而謹識其異同於此後漢書百官志衞尉卿一人中二千石掌宫門衞士宫中徼循事丞一人比千石公車司馬令一人六百石丞尉各一人丞選曉諱掌知非法尉主闕門兵禁戒非常胡廣曰諸門部各陳屯夾道其旁當兵以示威武交㦸以遮妄出入者南宫衞士令一人六百石掌南宫衞士丞一人北宫衞士令一人六百石掌北宫衞士丞一人左右都候各一人六百石主劍㦸士徼循宫及天子有所収考丞各一人宫掖門每門司馬一人比千石南宫南屯司馬主平城門北宫門蒼龍司馬主東門元武司馬主元武門北屯司馬主北門北宫朱爵司馬主南掖門東明司馬主東門朔平司馬主北門凡七門凡居宫中者皆有口籍于門之所屬宫名兩字為銕印文符案省符乃内之若外人以事當入本宫長吏為封啟傳其有官位出入令御者言其官東觀漢記建武二十三年太尉鮑顯兼衞尉永元三年司徒丁鴻兼衞尉後漢書朱暉列傳帝當幸長安欲嚴宿衞以暉為衞士令文選東京賦注衞士千人在端門外五營千騎在衞士外後漢書趙謙列傳帝遷都長安以謙行車騎將軍事為前置謹案後漢以衞尉典掌衞兵一如西京之舊觀鮑顯丁鴻等皆以三公兼領則其職較重而元武司馬班固亦嘗為之則宿衞之官亦不専用武臣矣至趙謙以車騎將軍為前置則正如今嚮道大臣之職也三國三國蜀志陳震列傳建興以震為衞尉三國魏志辛毗列傳毗為衞尉稱平三國吳志嚴畯列傳畯嘗為衞尉使蜀三國吳志三嗣主列傳太元二年使衞尉馮朝城廣陵謹案三國皆有衞尉官見于諸傳史雖失載其職掌當亦尚沿漢舊也冊府元龜魏武置中領軍與䕶軍皆領禁兵魏志文帝本紀黄初二年以許定都督徼道虎賁謹案此為䕶軍將軍領禁兵之始蓋已與漢制不同矣至都督徼道虎賁為宫門徼巡之職亦如今之䕶軍統領也晉晉書百官志衞尉統衞士令左右都候渡江省䕶軍將軍魏初隸領軍晉世不隸元帝永昌元年省併䕶軍明帝太寜二年復置各領營兵資重為䕶軍資輕者為中䕶軍屬官有長史司馬功曹主簿五官晉書應詹列傳王敦作逆帝以詹為都督前鋒軍事䕶軍將軍謹案晉以䕶軍與領軍同領禁衞别設營兵故晉書淮南王允傳稱允領中䕶軍宿衞將士皆畏服之蓋與今䕶軍營制頗為相仿至應詹為前鋒都督其官雖因行軍而設然前鋒之名實昉見于此且詹以前鋒兼領䕶軍亦可知本以禁旅出征故並綰二職也宋齊梁陳宋書百官志衞尉一人丞二人掌宫門屯兵晉江左不置宋世祖孝建元年復置舊一丞世祖増置一丞南齊書百官志衞尉府置丞一人掌宫城管鑰張衞西京賦曰衞尉八屯警夜巡書宫城諸却敵樓上本施鼓持夜者以應更唱太祖以鼓多驚眠改以銕磬云隋書百官志梁衞尉卿置丞及功曹主簿位視侍中掌宫門屯兵卿毎月丞毎旬行宫徼糾察不法又有宏訓衞尉亦置屬官陳承梁皆循其制官唐六典衞尉主簿宋齊並有梁天監七年置主簿位三班陳因之謹案南朝衞尉職掌史文雖不詳具然攷南史載梁鄱陽嗣王範為衞尉夜中行城常因風便鞭箠宿衞欲令帝知其勤而梁書亦稱其毎夜自巡警則職在督率警衞與今前鋒䕶軍統領正無殊也杜佑通典宋䕶軍將軍一人掌外軍資重者為䕶軍將軍資輕者為中䕶軍齊梁陳並有之謹案宋齊梁陳皆有䕶軍將軍分掌外軍與領軍對職葢亦司宫門屯衞之事又考南史袁粲傳稱桂陽王休範為逆已至南掖門諸將意沮粲慷慨謂之曰今日當與諸䕶軍同死社稷于是陳顯達等感激出戰案當時諸將陳顯達為羽林監王敬則為直閣將軍髙道慶為寜朔將軍而粲皆呼為䕶軍是南朝宿衞官得通稱為䕶軍也南史薛安都列傳孝武踐阼除右軍將軍率所領騎為前鋒入直殿廷其年以憚直免官謹案薛安都以右軍將軍率前鋒騎入直雖非設有専官然亦前鋒宿衞之始也北魏魏書官氏志衞尉卿第一品下䕶軍將軍第二品上司衛監第三品上魏書酷吏傳胡泥歴官司衞監率勒禁中不憚豪貴殿中尚書叔孫侯頭應内直而闕于一時泥以法繩之胡三省通鑑注司衞監葢魏所置以掌宿衞謹案魏之衞尉卿第一品而司衞監第三品則司衞當為衞尉之屬葢衞尉如今之統領而司衞則如㕘領也北齊隋書百官志北齊衞尉寺置卿少卿丞各一人掌禁衞甲兵統城門寺置校尉二人掌宫殿城門并諸倉庫管鑰等事又領衞士署令掌諸門兵士領軍府直盪屬官有勲武前鋒正副都督勲武前鋒五藏等員直衞屬官有前鋒正副都督等員直突屬官有勲武前鋒㪚都督等員䕶軍府將軍一人掌輿駕出則䕶駕中䕶軍亦同有長史司馬功曹五官主簿録事釐其府事謹案北齊宫衞之事皆領于衞尉故䕶軍將軍惟主扈從出入然史文明言䕶駕則所謂䕶駕者已為䕶衞之義矣至前鋒諸都督雖皆領軍府屬未嘗别為一隊而以前鋒入銜實始于是時也後周胡三省通鑑注周置左右武伯掌内外衞之禁令兼六率之士左右小武伯各二人貳之隋書長孫晟列傳周室尚虎賁貴遊子弟咸以相矜晟年十八為司衞上士人未之識也司馬光資治通鑑周門正上士崔彭胡三省注門正掌門闗啟閉之節及出入門者謹案周之左右武伯周書又稱為司武武帝本紀載建徳三年衞王直反突入肅章門司武尉遲運等拒守直乃敗走是司武掌守衞諸門正今䕶軍統領之職也至司衞上士與虎賁各為一職則與今侍衞不同葢亦䕶軍㕘領之比而門正上士則如今之司鑰長矣隋隋書百官志左右武衞左右武候各大將軍一人將軍二人並有長史司馬録事功倉兵騎等曹參軍法曹鎧曹行參軍各一人行㕘軍左右武候六人左右武衞八人左右武衞領外軍宿衞左右武候掌車駕出先驅後殿晝夜巡察執捕姦非烽候道路水草所置巡狩師田則掌其營禁左右監門衞各將軍一人掌宫殿門禁及守衞事各置郎將二人校尉直長各三十人長史司馬録事及倉兵曹㕘軍鎧曹行㕘軍各一人行㕘軍四人煬帝改左右武候為左右候衛其軍士總號衞士毎䘙置䕶軍四人掌副貳將軍將軍無則一人攝尋改䕶軍為虎賁郎將正四品而置虎牙郎將六人副焉從四品諸衞皆置長史從五品又有録事㕘軍等員左右監門改將軍為郎將各置一人正四品直閤各六人正五品又増置左右門尉員一百二十人正六品置門候員二百四十人正七品並分掌門禁守衞鄭樵通志隋文帝開皇三年廢衞尉等寺入太常及尚書省十三年復置掌軍器儀仗帳幕之事而以監門衞掌宫門屯兵謹案衞尉自秦漢以後皆掌宫門屯衞至隋廢而復置始改典軍器帳幕全非舊職今據其所掌已分繫于鑾儀衞武偹院表至隋之左右武衞掌外軍宿衞葢即前代䕶軍左右監門掌宫殿門禁葢即前代衞尉皆當為今䕶軍統領之職左右武候掌先驅後殿巡狩營禁則當為今前鋒統領之職而所司烽候道路水草所置則又兼有今嚮𨗳大臣之職至毎衞置䕶軍後改虎賁郎將與今之䕶軍㕘領亦頗相仿其門尉候尉屬于監門衞則又如今之䕶軍校也唐唐六典左右監門衞大將軍各一人將軍各二人掌諸門禁衞門籍之法凡京司應以籍入宫殿門者皆本司具其官爵姓名以移牒其宫門司送于監門勘同然後聴入凡財物器用應入宫者所由以籍榜取左監門將軍判門司檢以入之應出宫者所由亦以籍榜取右監門將軍判門司檢以出之其籍月一換若大駕行幸則依鹵簿之法率其屬於牙門之下以為監守中郎將各四人掌諸監門及巡警之法凡宫殿門及城門皆左入右出其監門官司檢校者聴從便門出入長史一人掌判諸曺及諸禁門之事録事㕘軍一人掌勾檢稽失諸司籍榜押於監門者印署而遣之兵曺㕘軍一人胄曺㕘軍一人監門校尉二百二十人直長六百八十人長人長上二十人直長長上二十人新唐書百官志門下省城門郎四人掌京城皇城宫殿諸門開闔之節奉管鑰而出納之開則先外後内闔則先内後外啟閉有時不以時則詣閤覆奏有令史二人書令史二人武徳五年置門僕八百人番上送管鑰謹案唐之監門衞即今䕶軍統領之職而城門郎専司管鑰則即今司鑰長之任以百官志考之左右領軍衞大將軍掌分兵主守苑城諸門則今圓明園䕶軍營之職又當為領軍衞所兼攝也資治通鑑唐元宗開元五年行幸東都過崤谷道隘不治上欲免知頓使官胡三省注車駕行幸有知頓使舊唐書元宗本紀韋諤為御史中丞充置頓使謹案唐之知頓使即今御營嚮道大臣之職而舊唐書又作置頓使葢本非常職故隨時置名無一定之例也通典唐採前代舊名置上䕶軍䕶軍謹案唐之上䕶軍䕶軍皆勲官虚號並無職守其後又置神策軍䕶軍中尉以寵宦官並乖典制今並不著于表五季謝維新合璧事類五代梁乾化六年詔曰端闈正門也宜以時開敞用達陽氣委皇城使謹案據此則五季宫門啟閉之節實皇城使掌之當即今䕶軍統領之職然考合璧事類又稱宋之皇城使其初本號武徳司而五代史所載後唐有武徳使史彦瓊為内諸司之一是當時實有此官豈梁之皇城使後唐又改為武徳使歟資治通鑑後唐明宗天成二年帝如汴州朱守殷反遣御營使石敬瑭將兵討之謹案後唐始置御營使掌行營守衞之事正近今之前鋒統領也宋宋史職官志皇城司幹當官七人以武功大夫以上及内侍都知押班充掌宫城出入之禁令凡周廬宿衞之事宫門啟閉之節皆隸焉毎門給銅符二銕牌一左符留門右符請鑰銕牌則請鑰者自隨以時參驗而啟閉之總親從親事官名籍辨其宿衞之地以均其番直人物偽冒不應法則譏察以聞凡臣僚朝覲上下馬有定所自宰臣親王以下所帶人從有定數揭榜以止其喧閧元符元年詔應宫城出入請納官物呈禀公事傳送文書并御㕑翰林儀鸞司非次祗應聴于便門出入即不由所定門者論如闌入律政和五年詔皇城司可剏置親從第五指揮以七百人為額使為將軍副使為中郎將使臣以下為左右郎將通以十員為額六年詔嘉王楷差提舉皇城司整肅隨駕禁衞中興初為行營禁衞所差主管官掌出入皇城宫殿門等敕號察其假冐車駕行幸則糾察𨗳從紹興元年改稱行在皇城司提舉官一員提㸃官二員幹當官五員以諸司副使内侍都知押班充掌皇城宫殿門稽驗出入凡諸門必謹所守潔蠲齋肅郊祀大禮則差撥隨從守衞有宴設則守門約闌嘉定間臣僚言皇城一司總率親從嚴䕶周廬㕘錯禁旅權亞殿巖乞専以知閣御帶並領從之合璧事類紹興三年詔皇城司係専掌禁廷出入依祖宗法不隸臺察謹案宋代雖有監門將軍之名然係虚銜並無職掌其門禁守衞之事専屬之皇城一司至以諸王領之葢即今之䕶軍統領也李心𫝊建炎以來朝野雜記御營使者建炎元年始命宰相李伯紀為之御營使一員副使一員其將佐有都統制一員及五軍統制以下官四年罷紹興三十一年上臨江視師以和義郡王楊存中為御營宿衞使明年孝宗即位又以御營使命之方以智通雅建炎元年置都統制以王淵為之其下分為五軍紹興稱神武五軍俄又改為行營五䕶軍謹案宋之御營使以宿衞入銜則行幸所至巡警防䕶乃其専職正今前鋒統領之比而五軍統制嘗以五䕶軍命名葢亦以其職隸御營而有是稱也李燾續資治通鑑長編真宗大中祥符元年詔以十月有事於泰山命引進使曹利用宣政使李神福相度行營道路以㕘知政事趙安仁為橋道頓遞使謹案宋真宗以曹利用等相度行營道路即今嚮𨗳大臣所有事而橋道頓遞使為大禮五使之一宋時凡遇郊禋必命執政充之以重其事葢亦如唐之知頓使也遼遼史百官志北面御帳官北䕶衞府掌北院䕶衞之事北䕶衞太師北䕶衞太保北䕶衞司徒總領左右䕶衞司總領左右䕶衞左䕶衞司右䕶衞太保左䕶衞右䕶衞司右䕶衞太保右䕶䘙南䕶衞府掌南院䕶衞之事南䕶衞太師南䕶衞太保南䕶衞司徒總領左右䕶衞司總領左右䕶衞左䕶衞司左䕶衞太保左䕶衞右䕶衞司右䕶衞太保右䕶衞北面軍官䕶軍司䕶軍司徒北面行軍官先鋒使司先鋒都統所御營都統所謹案遼御帳諸官以出於貴戚者為侍䘙出于北南部族者為䕶衞均典司宿直則䕶衞即今䕶軍之比若北面軍官之䕶軍司當亦領宿衞之兵者而其制不詳至先鋒使先鋒都統雖因行軍而設而職在御營實即如今之前鋒統領也金金史百官志左右宿直將軍從五品掌總領親軍凡宫城諸門衞禁并行從宿衞之事八員大定二十九年作十員復作十一員金史兵志設䕶衛二百人取五品至七品子孫及宗室并親軍諸局分承應人身長五尺六寸者選試補之謹案金宿衞之士統號親軍而統于殿前都㸃檢司惟宿直將軍専司宫門禁衞實兼有今䕶軍統領之職今故互著于此至兵志所載又有䕶衞之名在親軍以外當即如今之䕶軍也元元史百官志右阿蘇䝉古語住守之意原作阿速今改正衞親軍都指揮使秩正三品掌宿衞城禁達嚕噶齊解見户部篇一員都指揮使三員副都指揮使二員僉事二員經歴二員知事二員承發架閣照磨一員令史七人譯史通事知印各一人鎮撫二員其屬把門千户二員百户五員門尉一員左阿蘇衞親軍都指揮使司品秩職掌同右阿蘇衞達嚕噶齊一員都指揮使三員副都指揮使二員僉事一員經歴二員知事二員照磨一員鎮撫二員其屬圍宿把門千户所一十三翼千户二十六員百户一百三十員彈壓一十三員右屬樞宻院哈喇婁䝉古語哈喇黒色也婁龍也原作哈剌魯今改正萬户府掌守禁門等處應直宿衞達嚕噶齊一員萬户一員經歴知事各一員提控案牘一員鎮撫一員吏目一員千户所三翼千户三員百户九員彈壓三員右屬大都督府元史兵志至元十四年以蒙古軍與漢軍相㕘備都城内外及萬夀山宿衞仍以伊蘇布哈䝉古語伊蘇九數也布哈牝牛也原作也速不花今改正領圍宿事皇慶元年樞宻院臣言皇太后有㫖禁掖門可嚴守衞臣等議增置百户一員及于欽察回語額欽察各自之意桂齊䝉古語善走人也原作貴赤今改正西域唐古原作唐兀今從八旗氏族通譜改正阿蘇等衞調軍士九十人增守諸掖門復命千户一員帥領百户一員備巡邏從之謹案元以左右阿蘇衞及哈喇婁萬户府宿衞禁門皆如今䕶軍之職然考之兵志則圍宿諸軍皆從各衛調撥故百官志所載唐古衞有門尉二員西域親軍都指揮使司有把門千户二員百户八員門尉一員皆有守衞之司或以其職事兼屬于左右阿蘇衞也明明史職官志金吾羽林等十九衞掌守衞巡警統所凡一百有二明史兵志初太祖改都鎮撫司為留守設左右前後中五衞闗領内府銅符日遣二人㸃閲夜亦如之所謂皇城守衞官軍也二十七年申定皇城禁約凡朝㕘門始啟直日都督將軍入後百官始以次入上直軍三日一更番内臣出入必合符嚴索以金幣出者驗視勘合以兵器雜藥入門者禽治失察者罪之民有事陳奏不許固遏二十八年復於四門置舍使恩軍為衞士執㸑永樂中定諸衞各有分地自午門達承天門左右逮長安左右門至皇城東西屬旗手濟陽濟川府軍前及虎賁右金吾前燕山前羽林前八衞東華門左右至東安門左右屬金吾羽林府軍燕山四左衞西華門左右至西安門左右屬四右衞元武門左右至北安門左右屬金吾府軍後及通州大興四衞衞有銅符頌自太祖曰承曰東曰西曰北各以其門名也巡者左半守者右半守官遇巡官至合契而從事各門守衞官夜各領銅令申字牌巡警自一至十六内皇城衞舍四十外皇城衞舍七十二俱設銅鐸次第循環内皇城左右坐更將軍百毎更二十人四門支更官八交互往來鈐印于籍以為驗都督及帶刀千百户各一人領申字牌直宿及㸃各門軍士後更定都督府改命侯伯僉書焉正徳初嚴皇城紅舖巡徼日令留守衞指揮五員督内外巡軍而兵部郎中主事各一人同御史錦衣衞稽閲毋攝他務萬厯十一年於皇城内外設把總二員分東西管理謹案自周之宫伯掌八次八舍以宿衞王宫漢代以衞尉領南軍主宫門衞士及宫城徼巡之事於是兵衞之設實與郎衞而並重後世官稱雖互有同異而職任無殊然史稱漢之南軍無常在之兵以郡國民始傅者為之如淳曰民年二十三傅之疇官傅著也立傅名籍以給公家之繇役也故毎嵗衞士轉置送迎常二萬人科調踐更俱不免於勞費唐之監門衞即十六衞之一其府兵亦以番上執役乆之而亡匿耗散宿衞不給遂改為長募之軍而所募多出市人富者販繒綵食粱肉壯者為角觝㧞河翹木扛鐡之戲及有事皆不能受甲中葉以後浸為弊藪明代以二十二衞卒守衞皇城其初未嘗不具存規制乃以狃于晏安不加訓練以致軍多隐占尺籍常虚其甚者諸門管鑰皆付諸寺人之手禁兵將吏至曠數日不至直廬而禁衞之事益不可問矣我朝建旂分職碁布星羅以前鋒統領所轄之前鋒䕶軍統領所轄之䕶軍専掌宿衞清蹕宫禁傳籌内禁門啟閉及御營守衞之事葢即歴代兵衞之職而制度詳明規條嚴宻復以時訓習操肄黜陟懲勸無不奮興感勵簡練精純其圓明園䕶軍營則所司屯衞禁苑不復派出兵隨圍以専官守臂指相使内外相維環衞之制倍昭整肅固非歴朝衞尉監門諸職所能企及于萬一也欽定厯代職官表卷四十五
