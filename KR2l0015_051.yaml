body:
  text: 前鋒護軍統領表前鋒護軍統領國朝官制前鋒統領左右翼各一人正二品或以王公大臣兼領掌本翼四旗前鋒之政令鑲黃正白鑲白正藍四旗為左翼正黃正紅鑲紅鑲藍四旗為右翼初天聰八年定巴牙喇營前哨兵為噶布什賢超哈順治十七年定噶布什賢噶喇衣昻邦漢字稱為前鋒統領每翼各設一人以總其事焉前鋒參領前鋒侍衛左右翼各八人參領正三品侍衛正四品凡前鋒營各官皆滿洲蒙古兼用委署前鋒侍衛左右翼各四人以前鋒校或親軍校選委給五品冠帶前鋒校左右翼各四十八人從六品掌督率前鋒警蹕宿衛凡行幸止頓於御營一二里外安設卡倫立前鋒旗以為門户列帳守衛以前鋒參領前鋒侍衛共四人前鋒校前鋒共百二十人董其役焉國初設噶布什賢章京順治十七年定為前鋒參領並置前鋒侍衛前鋒校等員額乾隆十七年增置委署前鋒侍衛旗各一人前鋒軍八旗滿洲蒙古每佐領各二人分其半以兼習鳥鎗設之什長隊長以時訓練而黜陟之隨印協理事務前鋒參領侍衛左右翼各一人隨印前鋒校左右翼各二人隨印筆帖式左右翼各二人掌案牘文移隨印參領侍衛及前鋒校俱雍正三年定筆帖式初制每翼各一人康熙四十六年省雍正三年復增置護軍統領每旗各一人正二品掌護軍之政令國初設巴牙喇營統以巴牙喇纛章京順治十七年定漢字稱為護軍統領設員額如今制護軍參領每旗滿洲十人蒙古四人正三品內司鑰長署司鑰長每旗各一人以前鋒𠫭領護軍𠫭領鳥鎗護軍𠫭領遴選除授副護軍參領每旗滿洲十人蒙古四人初制五品雍正十二年定為正四品委署護軍參領每旗各七人以護軍校選委給五品冠帶護軍校滿洲蒙古每佐領各一人從六品掌董率護軍守衛宫殿門户及紫禁城外環列周廬畨上宿直傳籌巡警凡禁門扃鑰啓閉以時置籍以驗出入車駕行幸則宿衛御營専司網城堆鋪及清道警蹕之禁令國初設巴牙喇營甲喇章京順治十七年定漢字稱為護軍參領又設署護軍參領雍正元年改為副護軍參領乾隆十七年復設委署護軍參領員額護軍八旗滿洲蒙古每佐領各十七人初制以上三旗護軍參領護軍校護軍等守衛禁門下五旗各守王公府門遇行圍出征則八旗一律分撥雍正七年始定八旗護軍均司禁衛焉隨印協理事務護軍參領副護軍參領每旗各一人隨印護軍校每旗各二人隨印筆帖式每旗各二人門筆帖式鑲黃正黃正白三旗各十人掌案牘文移隨印參領副參領及護軍校俱雍正三年定筆帖式初制每旗各一人康熙四十六年省雍正三年復增置門筆帖式初制未設後增置圓明園八旗護軍營總統無定員以王公大臣兼任掌圓明園翊衛之政令雍正二年始置于禁苑周圍建營方八所選京中八旗官軍分地駐劄専司宿直以王公大臣統轄營務焉營總護軍參領每旗各一人均正三品副護軍參領每旗各二人初制五品雍正十年升為正四品署副護軍參領每旗各四人初制六品雍正十年升為正五品護軍校每旗各八人正六品副護軍校每旗各八人給冠帶仍食月餉掌守衛御園番直巡警凡車駕出入則率其徒以司清蹕之事營總副參領署副參領俱雍正三年置參領雍正十年增置護軍校初置八十人雍正十年增置三十二人乾隆十二年又增十六人副護軍校雍正七年置初定七十二人十年增置四十人乾隆十二年又增十六人護軍三千六百七十二人教養兵四百八十人隨印協理事務營總護軍參領各二人隨印護軍校四人隨印筆帖式八人掌案牘文移乾隆十六年置御營嚮導總統無定員以前鋒統領護軍統領八旗副都統兼任嚮導處參領侍衛各四人前鋒校護軍校各六人皆于前鋒護軍營內選用嚮導之職凡遇時巡省方以總統一人先期率官校詣車駕經行之地周覽山川通橋梁夷險隘計程入告駕行佩櫜鞬前𨗳每日駐蹕後以次日程途及駐蹕之所奏聞交兵部曉諭闔營回鑾亦如之凡御營及頓營看營均由嚮𨗳總統先期指示飭所在有司敬謹修治焉謹案嚮𨗳雖無専設之員非定有常額者可比然翊衛蹕途責任綦重今以其隨時簡任者皆在前鋒護軍營官內謹附載于此篇歷代建置三代周禮天官宫伯掌王宫之士庶子凡在版者授八次八舍之職事鄭康成注衛王宫者必居四角四中於徼候便也鄭司農云庶子衛王宫在內為次在外為舍元謂次其宿衛所在舍其休沐之處周禮天官掌舍下士四人府二人史四人徒四十人掌王之會同之舍設梐枑再重設車宫轅門為壇壝宫棘門為帷宫設旌門凡舍事則掌之周禮秋官司隸中士二人下士十有二人府五人史十人胥二十人徒二百人掌帥四翟之隸使之各服其邦之服執其邦之兵守王宫與野舍之厲禁周禮地官師氏使其屬帥四夷之隸各以其兵服守王之門外且蹕朝在野外則守內列謹案周之宫伯掌王宫士庶子實近今領侍衛內大臣而所授八次八舍分置八隅以衛王宫則又兼有今護軍統領之職至掌舍于王行所止舍設梐枑再重鄭康成謂行馬再重以周衛有內外列正如今前鋒統領于御營安設卡倫之職也若師氏所掌使其屬帥四夷之隸守王之門外司隸所掌帥四翟之隸以守王宫葉時禮經會元謂為周防守禦之衛則與今護軍統領之職尤為相合矣秦徐堅初學記案齊職儀云衛尉秦官也掌宫門衛屯兵蓋周禮宫伯之職尉者罻也言以羅罻令主姦非史記秦始皇本紀閻樂將吏卒至望夷宫殿門縛衛令僕射曰賊入此何不止衛令曰周廬設卒甚謹安得賊敢入宫謹案衛尉官始置于秦即今護軍之職所自昉衛令蓋其所屬而衛令僕射為衛令之長則如今之護軍參領也漢漢書百官公卿表衛尉掌宫門衛屯兵顔師古注漢舊儀云衛尉寺在宫內胡廣云主宫闕之門內衛士于周垣下為區廬區廬者若今之仗宿屋矣有丞景帝初更名中大夫令後元年復為衛尉屬官有衛士令丞衛士三丞又諸屯衛候司馬二十二官皆屬焉漢書顔師古注司馬門者宫之外門也衛尉有八屯衛候司馬主衛士徼巡宿衛每面各二司馬故謂宫之外門為司馬門王應麟玉海西京賦衛尉八屯警夜巡晝注引八校尉非也校尉北軍衛尉南軍宫門四面每門各有二司馬凡八司馬故曰八屯太平御覽漢官解詁曰衛尉主宫闕之內衛士于周垣下為廬各有員部凡居宫中者皆施籍于掖門案其姓名若有醫巫僦人當入者本官長吏為之封啓傳審其印信然後內之有籍者皆復有符符用木長二寸以所屬宫兩字為鐵印亦太府卿炙符當出入者案籍畢復齒符識其物色乃引內之也其有官位得出入者令執御之官傳呼前後以相通從昏至晨分部行夜夜有行者輒前曰誰誰若此不懈終嵗更始所以重慎宿衛也謹案漢以南軍為宫衛屯兵而衛尉主之雖與光祿勳同掌宿直而有郎衛兵衛之分其八屯司馬専率衛士守衛宫門譏察門籍晨昏巡警與今前鋒護軍統領之職實相吻合蓋衛尉如今之統領而屯衛司馬則如今之參領也漢書百官公卿表長樂建章甘泉衛尉皆掌其宫職略同不常置漢書宣帝本紀元康元年置建章衛尉元帝本紀初元三年罷甘泉建章宫衛漢書蕭望之列傳署小苑東門候顔師古注門候主侯時而啓閉也謹案漢時天子御未央宫屯衛皆在焉而長樂建章甘泉皆置衛尉以備臨幸守衛正如今圓明園護軍營之比其小苑東門候不見於史當亦甘泉建章衛尉所屬耳馬端臨文獻通考秦有護軍都尉漢因之髙帝以陳平為護軍中尉盡護諸將然則復以都尉為中尉武帝元狩四年以護軍都尉屬大司馬于時復為都尉矣哀帝元夀元年更名司冦平帝元始元年更名護軍謹案此即護軍之名所由始然其所謂護軍乃調護諸將之義非護衛之護漢書韓安國為護軍將軍護四將軍以伏單于者是也今護軍之稱名雖同而實不相襲故不著於表而謹識其異同於此後漢書百官志衛尉卿一人中二千石掌宫門衛士宫中徼循事丞一人比千石公車司馬令一人六百石丞尉各一人丞選曉諱掌知非法尉主闕門兵禁戒非常胡廣曰諸門部各陳屯夾道其旁當兵以示威武交戟以遮妄出入者南宫衛士令一人六百石掌南宫衛士丞一人北宫衛士令一人六百石掌北宫衛士丞一人左右都候各一人六百石主劍戟士徼循宫及天子有所收考丞各一人宫掖門每門司馬一人比千石南宫南屯司馬主平城門北宫門蒼龍司馬主東門元武司馬主元武門北屯司馬主北門北宫朱爵司馬主南掖門東明司馬主東門朔平司馬主北門凡七門凡居宫中者皆有口籍于門之所屬宫名兩字為鐵印文符案省符乃內之若外人以事當入本宫長吏為封啓傳其有官位出入令御者言其官東觀漢記建武二十三年太尉鮑顯兼衛尉永元三年司徒丁鴻兼衛尉後漢書朱暉列傳帝當幸長安欲嚴宿衛以暉為衛士令文選東京賦注衛士千人在端門外五營千騎在衛士外後漢書趙謙列傳帝遷都長安以謙行車騎將軍事為前置謹案後漢以衛尉典掌衛兵一如西京之舊觀鮑顯丁鴻等皆以三公兼領則其職較重而元武司馬班固亦嘗為之則宿衛之官亦不専用武臣矣至趙謙以車騎將軍為前置則正如今嚮道大臣之職也三國三國蜀志陳震列傳建興以震為衛尉三國魏志辛毗列傳毗為衛尉稱平三國吳志嚴畯列傳畯嘗為衛尉使蜀三國吳志三嗣主列傳太元二年使衛尉馮朝城廣陵謹案三國皆有衛尉官見于諸傳史雖失載其職掌當亦尚沿漢舊也册府元龜魏武置中領軍與護軍皆領禁兵魏志文帝本紀黃初二年以許定都督徼道虎賁謹案此為護軍將軍領禁兵之始蓋已與漢制不同矣至都督徼道虎賁為宫門徼巡之職亦如今之護軍統領也晉晉書百官志衛尉統衛士令左右都候渡江省護軍將軍魏初隸領軍晉世不隸元帝永昌元年省併護軍明帝太寧二年復置各領營兵資重為護軍資輕者為中護軍屬官有長史司馬功曹主簿五官晉書應詹列傳王敦作逆帝以詹為都督前鋒軍事護軍將軍謹案晉以護軍與領軍同領禁衛别設營兵故晉書淮南王允傳稱允領中護軍宿衛將士皆畏服之蓋與今護軍營制頗為相仿至應詹為前鋒都督其官雖因行軍而設然前鋒之名實昉見于此且詹以前鋒兼領護軍亦可知本以禁旅出征故並綰二職也宋齊梁陳宋書百官志衛尉一人丞二人掌宫門屯兵晉江左不置宋世祖孝建元年復置舊一丞世祖增置一丞南齊書百官志衛尉府置丞一人掌宫城管鑰張衛西京賦曰衛尉八屯警夜巡書宫城諸却敵樓上本施鼓持夜者以應更唱太祖以鼓多驚眠改以鐵磬云隋書百官志梁衛尉卿置丞及功曹主簿位視侍中掌宫門屯兵卿每月丞每旬行宫徼糾察不法又有宏訓衛尉亦置屬官陳承梁皆循其制官唐六典衛尉主簿宋齊並有梁天監七年置主簿位三班陳因之謹案南朝衛尉職掌史文雖不詳具然考南史載梁鄱陽嗣王範為衛尉夜中行城常因風便鞭箠宿衛欲令帝知其勤而梁書亦稱其每夜自巡警則職在督率警衛與今前鋒護軍統領正無殊也杜佑通典宋護軍將軍一人掌外軍資重者為護軍將軍資輕者為中護軍齊梁陳並有之謹案宋齊梁陳皆有護軍將軍分掌外軍與領軍對職蓋亦司宫門屯衛之事又考南史袁粲傳稱桂陽王休範為逆已至南掖門諸將意沮粲慷慨謂之曰今日當與諸護軍同死社稷于是陳顯達等感激出戰案當時諸將陳顯達為羽林監王敬則為直閣將軍髙道慶為寧朔將軍而粲皆呼為護軍是南朝宿衛官得通稱為護軍也南史薛安都列傳孝武踐阼除右軍將軍率所領騎為前鋒入直殿廷其年以憚直免官謹案薛安都以右軍將軍率前鋒騎入直雖非設有専官然亦前鋒宿衛之始也北魏魏書官氏志衛尉卿第一品下護軍將軍第二品上司衛監第三品上魏書酷吏傳胡泥歷官司衛監率勒禁中不憚豪貴殿中尚書叔孫侯頭應內直而闕于一時泥以法繩之胡三省通鑑注司衛監蓋魏所置以掌宿衛謹案魏之衛尉卿第一品而司衛監第三品則司衛當為衛尉之屬蓋衛尉如今之統領而司衛則如參領也北齊隋書百官志北齊衛尉寺置卿少卿丞各一人掌禁衛甲兵統城門寺置校尉二人掌宫殿城門并諸倉庫管鑰等事又領衛士署令掌諸門兵士領軍府直蕩屬官有勳武前鋒正副都督勳武前鋒五藏等員直衛屬官有前鋒正副都督等員直突屬官有勳武前鋒散都督等員護軍府將軍一人掌輿駕出則護駕中護軍亦同有長史司馬功曹五官主簿録事釐其府事謹案北齊宫衛之事皆領于衛尉故護軍將軍惟主扈從出入然史文明言護駕則所謂護駕者已為護衛之義矣至前鋒諸都督雖皆領軍府屬未嘗别為一隊而以前鋒入銜實始于是時也後周胡三省通鑑注周置左右武伯掌內外衛之禁令兼六率之士左右小武伯各二人二之隋書長孫晟列傳周室尚虎賁貴遊子弟咸以相矜晟年十八為司衛上士人未之識也司馬光資治通鑑周門正上士崔彭胡三省注門正掌門關啓閉之節及出入門者謹案周之左右武伯周書又稱為司武武帝本紀載建德三年衛王直反突入肅章門司武尉遲運等拒守直乃敗走是司武掌守衛諸門正今護軍統領之職也至司衛上士與虎賁各為一職則與今侍衛不同蓋亦護軍參領之比而門正上士則如今之司鑰長矣隋隋書百官志左右武衛左右武候各大將軍一人將軍二人並有長史司馬録事功倉兵騎等曹參軍法曹鎧曹行參軍各一人行參軍左右武候六人左右武衛八人左右武衛領外軍宿衛左右武候掌車駕出先驅後殿晝夜巡察執捕姦非烽候道路水草所置巡狩師田則掌其營禁左右監門衛各將軍一人掌宫殿門禁及守衛事各置郎將二人校尉直長各三十人長史司馬録事及倉兵曹參軍鎧曹行參軍各一人行參軍四人煬帝改左右武候為左右候衛其軍士總號衛士每衛置護軍四人掌副二將軍將軍無則一人攝尋改護軍為虎賁郎將正四品而置虎牙郎將六人副焉從四品諸衛皆置長史從五品又有録事參軍等員左右監門改將軍為郎將各置一人正四品直閣各六人正五品又增置左右門尉員一百二十人正六品置門候員二百四十人正七品並分掌門禁守衛鄭樵通志隋文帝開皇三年廢衛尉等寺入太常及尚書省十三年復置掌軍器儀仗帳幕之事而以監門衛掌宫門屯兵謹案衛尉自秦漢以後皆掌宫門屯衛至隋廢而復置始改典軍器帳幕全非舊職今據其所掌已分繫于鑾儀衛武偹院表至隋之左右武衛掌外軍宿衛蓋即前代護軍左右監門掌宫殿門禁蓋即前代衛尉皆當為今護軍統領之職左右武候掌先驅後殿巡狩營禁則當為今前鋒統領之職而所司烽候道路水草所置則又兼有今嚮𨗳大臣之職至每衛置護軍後改虎賁郎將與今之護軍參領亦頗相仿其門尉候尉屬于監門衛則又如今之護軍校也唐唐六典左右監門衛大將軍各一人將軍各二人掌諸門禁衛門籍之法凡京司應以籍入宫殿門者皆本司具其官爵姓名以移牒其宫門司送于監門勘同然後聽入凡財物器用應入宫者所由以籍榜取左監門將軍判門司檢以入之應出宫者所由亦以籍榜取右監門將軍判門司檢以出之其籍月一換若大駕行幸則依鹵簿之法率其屬於牙門之下以為監守中郎將各四人掌諸監門及巡警之法凡宫殿門及城門皆左入右出其監門官司檢校者聽從便門出入長史一人掌判諸曺及諸禁門之事録事參軍一人掌勾檢稽失諸司籍榜押於監門者印署而遣之兵曺參軍一人胄曺參軍一人監門校尉二百二十人直長六百八十人長人長上二十人直長長上二十人新唐書百官志門下省城門郎四人掌京城皇城宫殿諸門開闔之節奉管鑰而出納之開則先外後內闔則先內後外啓閉有時不以時則詣閣覆奏有令史二人書令史二人武德五年置門僕八百人番上送管鑰謹案唐之監門衛即今護軍統領之職而城門郎専司管鑰則即今司鑰長之任以百官志考之左右領軍衛大將軍掌分兵主守苑城諸門則今圓明園護軍營之職又當為領軍衛所兼攝也資治通鑑唐元宗開元五年行幸東都過崤谷道隘不治上欲免知頓使官胡三省注車駕行幸有知頓使舊唐書元宗本紀韋諤為御史中丞充置頓使謹案唐之知頓使即今御營嚮道大臣之職而舊唐書又作置頓使蓋本非常職故隨時置名無一定之例也通典唐採前代舊名置上護軍護軍謹案唐之上護軍護軍皆勳官虛號並無職守其後又置神策軍護軍中尉以寵宦官並乖典制今並不著于表五季謝維新合璧事類五代梁乾化六年詔曰端闈正門也宜以時開敞用達陽氣委皇城使謹案據此則五季宫門啓閉之節實皇城使掌之當即今護軍統領之職然考合璧事類又稱宋之皇城使其初本號武德司而五代史所載後唐有武德使史彥瓊為內諸司之一是當時實有此官豈梁之皇城使後唐又改為武德使歟資治通鑑後唐明宗天成二年帝如汴州朱守殷反遣御營使石敬瑭將兵討之謹案後唐始置御營使掌行營守衛之事正近今之前鋒統領也宋宋史職官志皇城司幹當官七人以武功大夫以上及內侍都知押班充掌宫城出入之禁令凡周廬宿衛之事宫門啓閉之節皆隸焉每門給銅符二鐵牌一左符留門右符請鑰鐵牌則請鑰者自隨以時參驗而啓閉之總親從親事官名籍辨其宿衛之地以均其番直人物偽冒不應法則譏察以聞凡臣僚朝覲上下馬有定所自宰臣親王以下所帶人從有定數揭榜以止其喧閧元符元年詔應宫城出入請納官物呈稟公事傳送文書并御厨翰林儀鸞司非次祗應聽于便門出入即不由所定門者論如闌入律政和五年詔皇城司可創置親從第五指揮以七百人為額使為將軍副使為中郎將使臣以下為左右郎將通以十員為額六年詔嘉王楷差提舉皇城司整肅隨駕禁衛中興初為行營禁衛所差主管官掌出入皇城宫殿門等敕號察其假冒車駕行幸則糾察𨗳從紹興元年改稱行在皇城司提舉官一員提點官二員幹當官五員以諸司副使內侍都知押班充掌皇城宫殿門稽驗出入凡諸門必謹所守潔蠲齋肅郊祀大禮則差撥隨從守衛有宴設則守門約闌嘉定間臣僚言皇城一司總率親從嚴護周廬參錯禁旅權亞殿巖乞専以知閣御帶並領從之合璧事類紹興三年詔皇城司係専掌禁廷出入依祖宗法不隸臺察謹案宋代雖有監門將軍之名然係虛銜並無職掌其門禁守衛之事専屬之皇城一司至以諸王領之蓋即今之護軍統領也李心傳建炎以來朝野雜記御營使者建炎元年始命宰相李伯紀為之御營使一員副使一員其將佐有都統制一員及五軍統制以下官四年罷紹興三十一年上臨江視師以和義郡王楊存中為御營宿衛使明年孝宗即位又以御營使命之方以智通雅建炎元年置都統制以王淵為之其下分為五軍紹興稱神武五軍俄又改為行營五護軍謹案宋之御營使以宿衛入銜則行幸所至巡警防護乃其専職正今前鋒統領之比而五軍統制嘗以五護軍命名蓋亦以其職隸御營而有是稱也李燾續資治通鑑長編真宗大中祥符元年詔以十月有事於泰山命引進使曹利用宣政使李神福相度行營道路以參知政事趙安仁為橋道頓遞使謹案宋真宗以曹利用等相度行營道路即今嚮𨗳大臣所有事而橋道頓遞使為大禮五使之一宋時凡遇郊禋必命執政充之以重其事蓋亦如唐之知頓使也遼遼史百官志北面御帳官北護衛府掌北院護衛之事北護衛太師北護衛太保北護衛司徒總領左右護衛司總領左右護衛左護衛司右護衛太保左護衛右護衛司右護衛太保右護衛南護衛府掌南院護衛之事南護衛太師南護衛太保南護衛司徒總領左右護衛司總領左右護衛左護衛司左護衛太保左護衛右護衛司右護衛太保右護衛北面軍官護軍司護軍司徒北面行軍官先鋒使司先鋒都統所御營都統所謹案遼御帳諸官以出於貴戚者為侍衛出于北南部族者為護衛均典司宿直則護衛即今護軍之比若北面軍官之護軍司當亦領宿衛之兵者而其制不詳至先鋒使先鋒都統雖因行軍而設而職在御營實即如今之前鋒統領也金金史百官志左右宿直將軍從五品掌總領親軍凡宫城諸門衛禁并行從宿衛之事八員大定二十九年作十員復作十一員金史兵志設護衛二百人取五品至七品子孫及宗室并親軍諸局分承應人身長五尺六寸者選試補之謹案金宿衛之士統號親軍而統于殿前都點檢司惟宿直將軍専司宫門禁衛實兼有今護軍統領之職今故互著于此至兵志所載又有護衛之名在親軍以外當即如今之護軍也元元史百官志右阿蘇蒙古語住守之意原作阿速今改正衛親軍都指揮使秩正三品掌宿衛城禁達嚕噶齊解見户部篇一員都指揮使三員副都指揮使二員僉事二員經歷二員知事二員承發架閣照磨一員令史七人譯史通事知印各一人鎮撫二員其屬把門千户二員百户五員門尉一員左阿蘇衛親軍都指揮使司品秩職掌同右阿蘇衛達嚕噶齊一員都指揮使三員副都指揮使二員僉事一員經歷二員知事二員照磨一員鎮撫二員其屬圍宿把門千户所一十三翼千户二十六員百户一百三十員彈壓一十三員右屬樞密院哈喇婁蒙古語哈喇黑色也婁龍也原作哈剌魯今改正萬户府掌守禁門等處應直宿衛達嚕噶齊一員萬户一員經歷知事各一員提控案牘一員鎮撫一員吏目一員千户所三翼千户三員百户九員彈壓三員右屬大都督府元史兵志至元十四年以蒙古軍與漢軍相參備都城內外及萬夀山宿衛仍以伊蘇布哈蒙古語伊蘇九數也布哈牝牛也原作也速不花今改正領圍宿事皇慶元年樞密院臣言皇太后有旨禁掖門可嚴守衛臣等議增置百户一員及于欽察回語額欽察各自之意桂齊蒙古語善走人也原作貴赤今改正西域唐古原作唐兀今從八旗氏族通譜改正阿蘇等衛調軍士九十人增守諸掖門復命千户一員帥領百户一員備巡邏從之謹案元以左右阿蘇衛及哈喇婁萬户府宿衛禁門皆如今護軍之職然考之兵志則圍宿諸軍皆從各衛調撥故百官志所載唐古衛有門尉二員西域親軍都指揮使司有把門千户二員百户八員門尉一員皆有守衛之司或以其職事兼屬于左右阿蘇衛也明明史職官志金吾羽林等十九衛掌守衛巡警統所凡一百有二明史兵志初太祖改都鎮撫司為留守設左右前後中五衛關領內府銅符日遣二人點閲夜亦如之所謂皇城守衛官軍也二十七年申定皇城禁約凡朝參門始啓直日都督將軍入後百官始以次入上直軍三日一更番內臣出入必合符嚴索以金幣出者驗視勘合以兵器雜藥入門者禽治失察者罪之民有事陳奏不許固遏二十八年復於四門置舍使恩軍為衛士執㸑永樂中定諸衛各有分地自午門達承天門左右逮長安左右門至皇城東西屬旗手濟陽濟川府軍前及虎賁右金吾前燕山前羽林前八衛東華門左右至東安門左右屬金吾羽林府軍燕山四左衛西華門左右至西安門左右屬四右衛元武門左右至北安門左右屬金吾府軍後及通州大興四衛衛有銅符頌自太祖曰承曰東曰西曰北各以其門名也巡者左半守者右半守官遇巡官至合契而從事各門守衛官夜各領銅令申字牌巡警自一至十六內皇城衛舍四十外皇城衛舍七十二俱設銅鐸次第循環內皇城左右坐更將軍百每更二十人四門支更官八交互往來鈐印于籍以為驗都督及帶刀千百户各一人領申字牌直宿及點各門軍士後更定都督府改命侯伯僉書焉正德初嚴皇城紅鋪巡徼日令留守衛指揮五員督內外巡軍而兵部郎中主事各一人同御史錦衣衛稽閲毋攝他務萬厯十一年於皇城內外設把總二員分東西管理謹案自周之宫伯掌八次八舍以宿衛王宫漢代以衛尉領南軍主宫門衛士及宫城徼巡之事於是兵衛之設實與郎衛而並重後世官稱雖互有同異而職任無殊然史稱漢之南軍無常在之兵以郡國民始傅者為之如淳曰民年二十三傅之疇官傅著也立傅名籍以給公家之繇役也故每嵗衛士轉置送迎常二萬人科調踐更俱不免於勞費唐之監門衛即十六衛之一其府兵亦以番上執役久之而亡匿耗散宿衛不給遂改為長募之軍而所募多出市人富者販繒綵食粱肉壯者為角抵拔河翹木扛鐡之戲及有事皆不能受甲中葉以後浸為弊藪明代以二十二衛卒守衛皇城其初未嘗不具存規制乃以狃于晏安不加訓練以致軍多隱占尺籍常虛其甚者諸門管鑰皆付諸寺人之手禁兵將吏至曠數日不至直廬而禁衛之事益不可問矣我朝建旗分職碁布星羅以前鋒統領所轄之前鋒護軍統領所轄之護軍専掌宿衛清蹕宫禁傳籌內禁門啓閉及御營守衛之事蓋即歷代兵衛之職而制度詳明規條嚴密復以時訓習操肄黜陟懲勸無不奮興感勵簡練精純其圓明園護軍營則所司屯衛禁苑不復派出兵隨圍以専官守臂指相使內外相維環衛之制倍昭整肅固非歷朝衛尉監門諸職所能企及于萬一也欽定厯代職官表卷四十五
