body:
  text: 國子監表國子監國朝官制國子監祭酒滿洲漢人各一人初制滿洲三品漢人四品順治十六年定均為從四品司業滿洲䝉古漢人各一人正六品掌成均之法以教國子及俊選之士八旗官學亦𨽻屬焉分經義治事以課諸生月有試季有考以辨其詣力之勤惰學業之優劣而董勸之國初設祭酒滿洲䝉古漢人各一人司業滿洲二人䝉古漢人各一人順治十七年省䝉古祭酒司業員額雍正五年復置䝉古司業一人乾隆十三年省滿洲司業一人其總理監事大臣自雍正三年以來始置皆由特簡無定員監丞滿洲漢人各一人初制正八品後升為正七品掌學規以督教課察勤惰均廩餼核攴銷有不如規者糾治之員額順治元年定博士滿洲漢人各一人初制從八品後升為從七品掌闡明經説以助教廸與六堂助教學正學録並司南學經理事宜初置滿洲博士一人漢人博士三人順治十五年省漢人一人康熙五十二年又省一人典簿㕔典簿滿洲漢人各一人從八品掌簿書以稽文移之出入員額順治元年定典籍㕔典籍漢人一人從九品掌藏弆經史以偹諸生誦習凡書籍之刻板於監者則主其摹印之事以廣流傳員額順治元年定率性堂漢人助教一人學正一人修道堂漢人助教一人學正一人誠心堂漢人助教一人學正一人正義堂漢人助教一人學正一人崇志堂漢人助教一人學録一人廣業堂漢人助教一人學録一人八旗官學助教滿洲十有六人䝉古八人助教初制從八品後升從七品學正初制正九品學録初制從九品後均升為正八品六堂助教掌教八旗直省俊選之士學正學録為之貳凡諸生之學於黌舍者百五十六人在外講肄而以時赴學考核者百二十人其持州縣牒赴監考到分堂學習者無員數每旬以制藝䇿論試所習業三年期滿視其等第移吏部註籍而録用之八旗官學助教掌分教八旗子弟旗各有學選滿洲六十人䝉古漢軍各二十人以充學生清文國語助教詔之䝉古語言文字及騎射䝉古助教教習詔之經書文藝漢人教習詔之三年學成升其尤者於太學漢人助教初設十有二人順治十五年省六人學正初設十有二人康熙三十八年省六人五十二年又省二人學録初設六人順治十五年省四人滿洲助教順治元年始設二人於太學尋立八旗官學令六堂分教十五年八旗各建學舎乃省太學員額而别置官學助教十有六人康熈五十七年省四人雍正三年復置䝉古助教六人亦順治元年置十八年省四人雍正二年復置算法館助教一人不分滿洲漢人補授掌分教算學諸生初康熙九年始選八旗官學生習算法雍正十二年增置教習十有六人乾隆三年罷八旗官學算法教習别立算學設肄業生滿洲漢人各十有二人䝉古漢軍各六人附學生二十四人以漢人教習二人佐訓課助教綜司之凡線面體三部各限一年業成七政共限二年滿五嵗乃甄録之視出身有差以欽天監博士天文生叙用鄂羅斯館助教滿洲漢人各一人掌教鄂羅斯所遣入學子弟於官學及六堂助教内掄選二員兼司之不為額闕又琉球等國有遣子弟入學者選貢生一人教習而以博士一人董率之筆帖式滿洲四人䝉古二人漢軍二人滿洲漢軍員額順治元年置䝉古員額順治十八年置職事具吏部篇厯代建置三代尚書舜典帝曰䕫命汝典樂教胄子孔安國傳胄長也謂元子以下至卿大夫子弟陸徳明釋文王云胄子國子也謹案太學之制昉於五帝鄭康成引董仲舒説謂五帝名太學曰成均者是也而教胄子之官則肇於舜之命䕫葢五帝三王之學政皆由樂始故以樂官兼之漢魏而後博士官𨽻屬太常其意實本於此今故引冠厯代建置之首以明原起焉周禮地官師氏中大夫一人上士二人府二人史二人胥十有二人徒百有二十人掌以媺詔王以三徳教國子一曰至徳以為道本二曰敏徳以為行本三曰孝徳以知逆惡教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長掌國中失之事以教國子弟凡國之貴逰子弟學焉鄭康成注師教人以道者之稱也國子公卿大夫之子弟賈公彦疏以教國子故使中大夫為之國子衆使役處衆故其徒多保氏下大夫一人中士二人府二人史二人胥六人徒六十人掌諫王惡而養國子以道乃教之六藝一曰五禮二曰六樂三曰五射四曰五馭五曰六書六曰九數乃教之六儀一曰祭祀之容二曰賔容之容三曰朝廷之容四曰喪紀之容五曰軍旅之容六曰車馬之容鄭康成注保安也以道安人者也賈公彦疏既與師氏同教國子官與府史别者以其教國子雖同館舎别所故置官有異周禮春官大司樂中大夫二人掌成均之法以治建國之學政而合國之子弟焉凡有道有徳者使教焉死則以為樂祖祭于瞽宗以樂徳教國子中和祇庸孝友以樂語教國子興道諷誦言語以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武樂師下大夫四人掌國學之政以教國子小舞大胥中士四人掌學士之版以待致諸子小胥下士八人掌學士之徴令而比之籥師中士四人掌教國子舞羽龡籥禮記王制樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書王大子王子羣后之大子卿大夫元士之適子國之俊選皆造焉凡入學以齒鄭康成注樂正樂官之長掌國子之教禮記文王世子凡學世子及學士必時春夏學干戈秋冬學羽籥皆於東序小樂正學干大胥贊之籥師學戈籥師丞贊之胥鼓南春誦夏弦大師詔之瞽宗秋學禮執禮者詔之冬讀書典書者詔之禮在瞽宗書在上庠凡祭與養老乞言合語之禮皆小樂正詔之於東序大樂正學舞干戚語說命乞言皆大樂正授數大司成論說在東序鄭康成注大司成司徒之屬師氏也謹案古者建國君民教學為先而後儒聚訟紛紜亦莫甚於三代學校之制其異同得失難以槩論而要其大端不過立學之地入學之人教學之官三者而已謹以經傳所載㕘合諸家折衷而考論之葢自五帝建學名為成均其後虞曰庠夏曰序殷曰瞽宗周人立辟廱於中而以四代之學環建於外南為成均北為上庠東為東序西為瞽宗是為五學辟廱為天子承師問道及養老更獻戎㨗之地雖世子齒學不得就而四學則令國子肄業焉此外又有門闈之學蔡邕明堂論云周官有門闈之學師氏教以三徳守王門保氏教以六藝守王闈四郊之學即禮記所謂虞庠在國之西郊者皇侃謂四郊皆有之是為小學故以四學對辟廱則辟廱為太學而以小學對四學則四學皆為太學矣此立學之地也大胥掌學士之版文王世子學世子及學士必時鄭司農曰學士謂卿大夫諸子學舞者鄭康成曰學士謂司徒論俊選所升於學者葢以其教於學故總名之曰學士而其途各異掄選亦有區分如公卿大夫元士之適子以其父兄皆有爵列於國則謂之國子皆當入太學與王子齒其卿大夫之庶子為國子之倅者則謂之諸子皆統於諸子之官而時亦升於太學以教之若鄉遂都鄙所賔興及侯國嵗貢者曰選士俊士亦咸造焉此入學之人也至教之之官立法尤為詳偹其虎門之學則選國子中秀異者使師氏教之與王子共學不在太學之數而四學之中於成均學樂徳樂舞樂語則以大司樂教之於上庠學書則以典書者教之於東序學干戈羽籥則以樂師籥師教之於瞽宗學禮及誦弦則以執禮者及大師教之而師氏亦兼在東序為國子論説其義理淺深才能優劣謂之大司成此教學之官也後世以祭酒為出於師氏之職因以大司成當之不知師氏王舉則從惟在虎門之左必不能常入太學其朝夕授業者固當屬之大小樂正耳富大用事文類聚成王時彤伯入為祭酒杜佑通典孫卿在齊為三老稱祭酒太平御覽韋昭辨釋名曰祭酒者謂祭六神以酒醊之也辨云凡㑹同饗讌必尊長先用酒以祭故曰祭酒漢時呉王年長以為劉氏祭酒是也胡廣曰凡官名祭酒皆一位之元長古者賔得主人饌則老者一人舉酒以祭地故以祭酒為稱漢之侍中魏之散騎常侍功髙者並為祭酒用其義也禮記文王世子樂正司業父師司成賈公彦疏司是職司故訓為主謂樂正主太子詩書之業父師主太子成就其徳行也謹案祭酒名官始於漢之博士祭酒而如諸書所載則成周已有此稱葢取舉酒祭地為義乃同列中以齒徳相推之辭故胡廣以為一位之元長其曰博士祭酒者謂博士中之最長者耳與三老祭酒侍中祭酒常侍祭酒同義並非官號也後世去博士二字而專以祭酒繋銜非其本意矣至司業之官本隋代取禮記樂正司業之文以為名而鄭康成原註未及業字之義據賈公彦疏則業當為學業之業而唐書歸崇敬傳又載崇敬為國子司業上言司業在禮記樂正司業正長也言樂官之長司主此業爾爾雅云大版謂之業按詩周頌設業設虡崇牙樹羽則業是懸鐘磬之簨虡也今太學既不教樂於義無取請改國子監為辟雍省祭酒為太師氏司業一為左師一為右師詔下尚書集百僚定議以聞議者重難改作其事不行云云是業字又當為虡業之業顧炎武日知録云詩傳業大版也所以餙栒為縣也捷業如鋸齒或白畫之爾左氏昭九年傳辰在子夘謂之疾日君徹宴樂學人舎業禮記檀弓大功廢業竝謂此也懸者常防其墜故借為敬謹之義書之兢兢業業詩之赫赫業業有震且業是也凡人所執之事亦當敬謹故借為事業之義易傳之進徳修業盛徳大業禮記之敬業樂羣是也然三代詩書之文並無此義以上皆炎武說是業字古無學業之訓樂正司業自當作虡業解為長特其名相沿既久學者或習其稱而昧所由來謹先掲其義於此焉秦册府元龜秦置博士掌通古今太平御覽應劭漢官儀曰博士秦官博者通博古今士者辨於然否謹案班固稱六國時往往有博士則其官不始於秦而秦時令博士預朝廷大議偹左右顧問則所職尤重秦始皇本紀二十六年議帝號丞相綰等奏謹與博士議上尊號為秦皇又二十八年始皇浮江至湘山祠上問博士曰湘君何神博士對曰聞之堯女舜之妻而𦵏此雖經始皇焚書坑儒之禍而二世時叔孫通猶待詔博士山東兵起二世尚召博士諸儒生而問之見叔孫通傳是其官仍舊不廢觀李斯所奏稱非博士官所職天下敢有藏詩書百家語者悉詣守尉雜燒之可知博士官所職者尚存葢猶令其典司經籍也且既以博士為官必有生徒轉相傳授秦本紀載盧生言博士七十人偹員弗用而諸生在咸陽者使御史案問至殺四百六十餘人諸生在驪山為伏機所殺者又七百餘人其數如此之多葢七十人乃博士員額而所謂數百人者皆諸生之𨽻於博士官如漢世博士弟子之類耳漢漢書百官公卿表博士秩比六百石員多至數十人漢書武帝本紀建元五年置五經博士元朔五年詔曰太常其議予博士弟子崇鄉黨之化以厲賢才焉丞相宏請為博士置弟子員學者益廣漢書宣帝本紀立梁邱易大小夏侯尚書糓梁春秋博士册府元龜漢興武帝初置五經博士掌教弟子國有疑事掌承問對本四百石升比六百石初文帝欲廣遊學之路論語孝經孟子爾雅皆置博士至是遂罷𫝊記博士太平御覽漢舊儀曰孝文皇帝時博士七十餘人朝服元端章甫冠武帝置博士取學通有修博識多藝曉古文爾雅能屬文章者為之朝賀位次中都官吏稱先生不得言君其弟子稱門人也通典平帝元始四年改博士為博士師漢書藝文志注段嘉東海人為博士師後漢書蘇竟傳平帝世竟以明易為博士講書祭酒章懷太子李賢注王莽置六經祭酒秩上卿毎經各一人竟為講尚書祭酒漢書儒林傳武帝為博士官置弟子五十人昭帝増滿百人宣帝増倍之成帝末増三千人謹案西漢博士𨽻太常馬廷鸞謂有周成均𨽻宗伯之意然博士雖云太常之屬而毎令丞相御史中二千石二千石雜舉以任之故特重其職稱為學官史記儒林傳公孫宏為學官是也又稱為儒官漢書師丹傳尚書劾博士申咸炔欽幸得以儒官選擢偹腹心是也又稱為禮官王式傳式除為博士衣博士衣而不冠曰刑餘之人何宜復充禮官是也據史傳所載當時朝廷大事下公卿議者皆令博士預議霍光傳廢昌邑王奏臣敞等謹與博士臣覇臣雋舎臣徳臣虞舎臣射臣倉議云云此類甚多而出使四方入侍禁近亦多以博士充其選武帝本紀元狩六年遣博士大等分循行天下元鼎二年遣博士中等分循行諭告成帝本紀河平三年遣博士嘉等行舉瀕河之郡陽朔二年闗東大水遣博士分行視薛宣傳博士申咸給事中平當傳以明經為博士使行流民幽州孔光傳光為博士數使録冤獄行風俗薛廣徳傳蕭望之薦廣徳宜充本朝為博士論石渠不但教授生徒而已葢漢世崇尚經術博士多擇名流以偹顧問其髙第者往往列為九卿薛宣傳載宣奏故大司空何武師丹故丞相孔光故左將軍彭宣經皆更博士位厯三公可與建教化圖安危云云夫以厯位三公之人而猶必引其曽官博士以為重亦可知其為一代之清選矣後漢書百官志博士祭酒一人六百石本僕射中興轉為祭酒博士十四人比六百石易四施孟梁邱京氏尚書三歐陽大小夏侯氏詩三魯齊韓氏禮二大小戴氏春秋二公羊嚴顔氏掌教弟子承問對本四百石宣帝増秩馬端臨文獻通考光武中興立五經博士各以其法教授凡十四博士太常差次總領焉章懷太子李賢後漢書注漢官儀曰博士十四人太常差選有聰明威重一人為祭酒總領綱紀其舉狀曰生事愛敬喪没如禮通易尚書孝經論語兼綜載籍窮微闡奥隠居樂道不求聞達身無金痍痼疾三十六屬不與妖惡交通王侯賞賜行應四科經任博士下言某官某甲保舉後漢書翟酺傳酺為大匠上言光武起太學博士舎内外講堂諸生横巷為海内所集袁宏後漢紀永平中崇尚儒學自皇太子諸王候及功臣子弟莫不受經又為外戚樊氏郭氏隂氏馬氏諸子弟立學號四姓小侯置五經師謹案漢東京但有太學之名未聞别建國子學而魏書劉芳傳引洛陽記謂國子學宫與天子宫對太學在開陽門外又以國子學與太學岐為兩地考酈道元水經注洛水東經國子太學石經北漢魏以來置太學於國子堂云云是東漢太學講堂本名國子堂故又號為國子太學即博士講肄之地並無兩學其洛陽記所云國子學殆指為四姓小侯所建之學也又案漢武帝立三雍宫説者謂明堂辟廱靈臺也然祇以祠祀上帝並非養士之所故晉灼漢書注謂西京無太學而攷之於史如何武傳稱學長安歌太學下鮑宣傳稱博士弟子濟南王咸等舉幡太學下又似西京已立太學馬端臨亦但稱當考而不能定其是非謹以紀傳之文㕘稽互證疑西漢雖無太學而博士實有官舎為聚講行禮之所如王式傳徴為博士既至止舎中此即博士官舎可知而成帝紀鴻嘉二年三月博士行飲酒禮有雉蜚集于庭厯階升堂而雊後集諸府又集承明殿是其地應與諸公府相近凡鄉飲大射皆就以行事焉故當時即謂之為太學也自平帝時王莾為宰衡起國學於郭門之西南為博士之宫中央為射宫見太平御覽所引三輔黄圖之文而光武亦起太學博士舎内外講堂諸生黌巷於是學官居息諸生講肄之地始與學合矣三國三國蜀志許慈傳慈與胡潜並為博士子勛傳其業復為博士尹黙傳子宗傳其業為博士三國魏志文帝紀黄初五年夏四月立太學制五經課試之法置春秋穀梁博士通典魏置博士十九人裴松之三國志注樂詳黄初中徴拜博士於時太學初立有博士十餘人學多褊狹惟詳五業並授以是獨擅名三國吳志三嗣主傳孫休永安元年十二月詔曰其案古置學官立五經博士核取應選加其寵禄科見吏之中及将吏子弟有志好者各令就業一嵗課試差其品第加以位賞晉宋書禮志晉武帝咸寜二年起國子學葢周禮國之貴游子弟所謂受教於師氏者也册府元龜晉承魏制置博士十九人武帝初立國子學以教生徒而𨽻屬太學定置國子祭酒博士各一人助教十五人博士皆取履行清淳通明典義者若散騎常侍中書侍郎太子中庶子以上皆得召試元帝初減國子祭酒博士助教為九人大興中又置周易儀禮公羊博士末年増國子儀禮春秋公羊博士各一人合為十一人後又増為十六人不復分掌五經而謂之太學博士秩六百石孝武太元中損國子助教為十員南齊書禮志晉初太學生三千人既多猥雜欲辨其涇渭始立國子學官品第五以上得入國學太學之與國學斯是晉世殊其士庶異其貴賤耳然貴賤士庶皆須教成故國學太學兩存之也太平御覽齊職儀曰晉令博士祭酒掌國學而國子生師事之祭酒執經葛巾單衣終身致敬謹案周成均之法本以教國子而俊選咸得造焉故其時講業之所惟稱太學未嘗獨取國子為學名也其國子之置學實始於晉代而猶與太學並建稱為兩學潘岳閑居賦兩學齊列雙宇如一右延國胄左納良逸李善文選注引郭縁生述征記云國學在辟雍東北五里太學在國學東二百步是也葢國學以教胄子太學以選賢良乃即生徒肄習之地以為别而師儒之職則固無所區分其稱國子祭酒特舉其所重者以名官耳宋齊梁陳通典宋文帝元嘉二十年立國子學二十七年廢宋書百官志國子祭酒一人國子博士二人國子助教十人分教國子若不置學則助教惟置一人而祭酒博士常置也南齊書百官志國子祭酒一人博士二人助教十人建元四年有司奏置國學祭酒准諸曹尚書博士准中書郎助教准南臺御史選經學為先若其人難偹給事中以還明經者以本位領其下典學二人户曹儀曹各二人治禮吏八人保學醫二人威儀二人其夏國諱廢學有司奏省助教以下永明三年立學尚書令王儉領祭酒八年國子博士何允單為祭酒疑所服陸澄等皆不能據遂以元服臨試月餘日博議定乃服朱衣謹案宋齊祭酒正除者少史傳所載如竟陵王子良以司徒張緒以太常卿王儉以侍中尚書令並領國子祭酒葢如今之總理監事大臣又宋齊惟置國子學而史載范泰為太學博士則二名亦可互稱葢已合國學太學為一矣册府元龜梁國子祭酒一人班第十三比列曹尚書又置國子博士二人為九班助教十人班第二又置太學博士八人班第三又置五經博士各一人司馬光資治通鑑梁武帝天監四年春正月詔置五經博士廣開館宇招内後進於是以賀㻛及平原明山賔吳興沈峻建平嚴植之補博士各主一館館有數百生給其餼廩其射䇿通明者即除為吏隋書百官志梁國學又有限外博士員舊國子學生限以貴賤帝欲招來後進五館生皆引寒門儁才不限人數大同七年國子祭酒到溉等又表立正言博士一人位視國子博士置助教二人謹案梁代國子太學復分為二博士然實止一學南史到洽傳洽遷國子博士奉勅撰太學碑可知國子學即太學並非有兩地也册府元龜陳國子祭酒秩中二千石品第三博士品第四秩千石國子助教太學博士並品第八秩六百石北魏魏書儒林傳太祖初定中原立太學置五經博士生員千有餘人天興二年増國子太學生員至三千太宗世改國子為中書學立教授博士世祖始光三年别起太學於城東太和中改中書學為國子學又開皇宗之學及遷都洛邑詔立國子太學四門小學世宗時復詔營國學樹小學於四門大選儒生以為小學博士員四十人神龜中将立國學詔以三品已上及五品清官之子以充生選未及簡置仍復停寢正光二年乃釋奠於國學始置國子生四十六人册府元龜後魏國子祭酒本第四品上後増為從三品國子博士從第五品上後増為第五品國子助教五人從七品太學博士第六品後降為第七品太學助教第八品中四門博士第九品魏書李訢傳詔崔浩選中書學生學業優者為助教浩阿其親戚恭宗聞之世祖世祖意在於訢遂除中書助教博士魏書李彪傳初為中書教學博士魏書劉芳傳太和中芳表曰洛陽記國子學與天子宫對太學在開陽門外今徙縣嵩瀍皇居伊洛宫闕府寺僉復故趾國學應在宫門之左至如太學基所炳在仍舊營搆又太和二十年發勅於四門置學臣案自周已上太學在國四小在郊今太學故坊基趾寛廣四郊别置相去遼濶檢督難周計太學坊并作四門猶為太廣以臣愚量同處無嫌從之魏書術藝傳殷紹世祖時為算生博士給事東宫西曹魏書髙祖本紀太和十六年幸皇宗學親問博士經義魏書孫惠蔚傳為中書博士轉皇宗博士謹案北魏置國子學於宫門之左太學於城東四門學於四郊各有博士助教官而以國子祭酒總統之三學並立實自魏始據劉芳傳所載太學當即置於開陽門外東漢舊址又以四郊太逺而併四門學附之其規制如此然考楊衒之洛陽伽藍記載閶闔門前御道東有司徒府府南有國子學堂内有孔子像顔淵問仁子路問政在側葢即所謂國子學而於開陽門外之太學則但云開陽門御道東有漢國子學堂堂前有石經碑髙祖題為勸學里而已並未言魏朝别有營搆是三學分建雖有其文而未行其生徒講肄者實止國子一學也至四門為小學葢仿三代郊外小學以教國人之法剏於魏而隋唐以後皆因之今制分設八旗官學以訓廸其子弟與四門學之在四郊者頗為相近其算生博士亦與今算學館助教相同又魏置皇宗學别立博士魏書任城王澄傳載澄於世宗時上表以宗人有闕四時之業請修復皇宗之學詔尚書量宜修立葢遷洛以後其事漸廢故澄請復之今制左右翼各設宗學一覺羅學四𨽻屬宗人府擇宗室覺羅子弟聰秀者入學以王公總其事而置總管副管教習等員以時課習勸學興行葢即如魏之皇宗學而法制益加詳偹焉北齊隋書百官志後齊國子寺掌訓教胄子祭酒一人亦置功曹五官主簿録事員領博士五人助教十人學生七十二人太學博士十人助教二十人太學生二百人四門學博士二十人助教二十人學生三百人北齊書儒林傳齊氏太學博士徒有虚名惟國子一學生徒數十人耳胄子以通經進仕者惟崔子發宋游卿而已後周通典後周官品正三命地官師氏中大夫正四命地官小師氏春官太學博士下大夫正三命春官太學助教小學博士上士正二命春官小學助教中士王應麟玉海後周武帝天和二年立露門學置生七十二人後周書沈重傳天和六年授露門博士仍於露門館為皇太子講論後周書熊安生傳拜露門學博士下大夫後周書樂遜傳治太學博士轉治小師氏下大夫謹案册府元龜稱後周有博士助教而祭酒無聞焉今考後周設官全仿周禮其師氏小師氏即漢魏以來祭酒之職故樂遜以博士轉為此官不得謂之無聞册府元龜葢考之未審也至周置露門學葢本周門闈小學之遺意故别置露門學博士與太學博士命數相同其師氏小師氏殆即兼領此二學者歟隋隋書百官志髙祖受命置國子寺祭酒一人屬官有主簿録事各一人統國子太學四門書算學各置博士國子太學四門各五人書算各二人助教國子太學四門各五人書算各二人學生國子一百四十人太學四門各三百六十人書四十人算八十人仁壽元年罷國子學惟立太學一所置博士五人學生七十二人焬帝即位改為國子監依舊置祭酒加置司業一人丞三人國子學置博士助教各一人學生無常員太學博士助教各二人學生五百人謹案自漢以降博士皆𨽻於太常至隋而國子寺始别為一署無所統屬尋又改名國子監并剏置司業之官遂至今沿為定式焉唐新唐書百官志國子監祭酒一人司業二人掌儒學訓導之政總國子太學廣文四門律書算七學天子視學皇太子齒胄則講義釋奠丞一人掌判監事主簿一人掌印局督監事七學生不率教者舉而免之録事一人國子博士五人掌教三品以上及國公子孫從二品以上曽孫為生者五分其經以為業周禮儀禮禮記毛詩春秋左氏傳各六十人暇則習𨽻書國語説文字林三蒼爾雅每嵗通兩經求仕者上於監秀才進士亦如之學生以長幼為序習正業之外教吉凶二禮公私有事則相儀助教五人掌佐博士分經教授直講四人掌佐博士助教以經術講授五經博士各二人掌以其經之學教國子周易尚書毛詩左氏春秋禮記為五經論語孝經爾雅不立學官附中經而已太學博士六人助教六人掌教五品以上及郡縣公子孫從三品曾孫為生者五分其經以為業每經百人廣文館博士四人助教二人掌領國子學生業進士者四門館博士六人助教六人直講四人掌教七品以上侯伯子男子為生者及庶人子為俊士生者律學博士三人助教一人掌教八品以下及庶人子為生者律令為顓業兼習格式法例書學博士二人助教一人掌教八品以下及庶人子為生者石經説文字林為顓業兼習餘書算學博士二人助教一人掌教八品以下及庶人子為生者二分其經以為業九章海島孫子五曺張邱建夏侯陽周髀五經算綴術緝古為顓業兼習記遺三等數凡六學束脩之禮督課試舉皆如國子助教以下所掌亦如之册府元龜唐貞觀初改國子寺為監六年復置國子司業一人龍朔二年改國子監為司成館祭酒為大司成司業為少司成博士為司成宣業咸亨初改司成館復為國子監大司成少司成復為祭酒司業光宅初改國子監為成均監祭酒為成均祭酒神龍初改成均監復為國子監唐書選舉志唐制凡學六皆𨽻於國子監博士助教分經授諸生未終經者無易業諸學生通二經俊士通三經已及第而願留者四門學生補太學太學生補國子學三班畨下日願入學者聴附國子學太學及律館習業蕃王及可汗子孫願入學者附國子學讀書謹案自北齊立國子寺隋改為監嗣後建國學者皆以國子為名其實當時諸學並建其品官及庶人之子為生徒者各以差等分𨽻國子乃專教三品以上子孫之學以此名監葢特取其居首者以槩其餘耳元代以後博士助教總為一學無分教之法諸生亦不復以貴賤為區别而學校猶獨䝉國子之名葢亦沿用隋唐之舊也又案唐國子監所𨽻凡七學韓愈昌黎集請上尊號表稱臣所管國子太學廣文四門及書算律等七館學生此自是當時定制唐六典祗稱國子監掌六學者葢書成於開元之時廣文學尚未置也然考中葉以後他書所載如何蕃傳稱六館之士百餘人言於司業陽城李觀書稱學有六館生有三千亦皆不數廣文在内據鄭䖍傳元宗置廣文館以䖍為博士久之雨壞廡舎有司不復修完寓泊國子館自是遂廢當時殆因廣文國子併在一館故言學制者仍通稱為六館歟五季册府元龜唐置國子監祭酒司業博士助教五代因之五代㑹要後唐天成三年正月中書門下奏伏以祭酒之資厯朝所貴爰從近代不重此官况屬聖朝方勤庶政須宏雅道以振時風望令宰臣一員兼判國子祭酒勅宜令宰臣崔協兼判謹案唐書鄭覃傳文宗以覃名儒故令以宰相領祭酒葢如今之總理監事大臣後唐以崔協兼判祭酒當亦沿唐朝舊例也宋宋史職官志國子監置祭酒司業丞主簿各一人太學博士十人正録各五人武學博士二人律學博士正各一人祭酒掌國子太學武學律學小學之政令司業為之貳丞㕘領監事博士掌分經講授考校程文以徳行道藝訓導學者正録掌舉行學規凡諸生之戾規矩者待以五等之罰考校訓導如博士之職職事學録五人掌與正録通掌學規學諭二十人掌以所授經傳諭諸生直學四人掌諸生之籍及稽察出入凡八十齋齋置長諭各一人掌表率齋生凡戾規矩者糾以齋規五等之罰仍月考齋生行藝著於籍武學博士學諭各二人掌以兵書弓馬武藝訓誘學者律學博士二人掌傳授法律及校試之事小學置職事教諭二人掌訓導及考校責罰學長二人掌序齒位糾不如儀者集正二人掌籍諸生名氏糾程課不逮章俊卿山堂考索國子監祭酒宋初有判監事有管勾監事待制以上則為判餘為管勾元豐正官名置國子監祭酒掌三學之教法政令崇寜立辟雍置大司成一員為師儒之首位在諸曺侍郎上政和罷辟雍官屬建炎三年併國子監歸禮部紹興三年復置十二年始置祭酒司業宋有同判監事同管勾監事或帶職朝官充元豐置司業建炎三年省紹興十二年復置隆興併省司業不與祭酒並除乾道七年欲除劉焞孝宗曰司業乃祭酒之貳並置何妨於是始並置監丞宋景祐二年孫祖徳請於直講京官内差一員充監丞詔學官兼領掌錢榖出納之事元豐置祭酒司業而監之事則丞與焉國子博士宋國子監初無博士有直講八人熙寜改為太學博士元豐定制亦無國子博士大觀元年薛昻乞置國子博士四員與太學官分掌教導從之主簿以京官或選人充掌文簿或勾考其出入焉元豐元年詔省主簿三年罷書庫官復置主簿國子正録元豐定制未置大觀元年薛昻乞置國子正録凡二員書庫官以京朝官充掌印經史羣書以偹朝廷宣索賜予之用及出鬻而收其直以上於官建炎三年省紹興十三年復置一員後省三十二年詔學官兼書庫乾道七年復置太學博士毎經二人掌分經講授考校程文以徳行道藝訓導學者建炎南渡廢紹興十三年始復建太學置博士二員太學正録仁宗朝胡瑗掌太學其正録第補諸生熙寜末興三舎始選官為正録如學官之例學正五人學録五人元祐三年罷命官正録以上舎内舍生充後復置命官學正二員紹聖改元復元豐學制命官學職悉仍舊焉武學博士武學諭各二人慶厯三年置學未㡬省熙寜五年復置選文武官知兵者充教授元豐官制行改為武學博士建炎兵興廢紹興二十六年詔武學博士學諭各置一員謹案宋國子監所掌仿唐制以國子太學為二學分置博士正録學諭等官而肄習者實祇有太學一所雖元豐初編修學制所言監以國子為名而無國子教養之實乞令清要官親戚並入監聽讀然所置國子生額不過二百人而太學生至四千餘人可知國子太學分教已徒有虚名究之入學者皆俊選之士葢當時品官子弟多以䕃叙入仕不藉國學為出身之途故雖國子名存而實則與古異矣玉海元豐七年吏部請於四選補算學博士闕從之詔通算學者就試上等除博士中下等除學諭元祐元年罷崇寜三年復建五年四月罷十一月復置算學𨽻秘省大觀四年併入太史局謹案宋算學不𨽻國子監與唐制不同又唐四門學宋於慶厯中暫置即廢書學則崇寜中與畫學並設有博士學諭正録各一人初𨽻國子監後併入翰林書藝局廣文館則元祐初以四方㳺士冐畿縣户應試者多因置廣文館生許其執牒騐試亦一時權宜之法今並附見於此遼遼史百官志上京國子監太祖置有祭酒司業監丞主簿國子學有博士助教又有東京學中京學中京别有國子監與朝官同南京學亦曰南京太學太宗置聖宗統和十三年賜水磑莊一區又有西京學金金史百官志國子監國子學太學𨽻焉祭酒正四品司業正五品掌學校丞二員從六品明昌二年増一員兼提控女直學國子學博士二員正七品分掌教授生員考藝業助教二員正八品教授四員正八品分掌教誨諸生國子校勘從八品掌校勘文字國子書寫官從八品掌書寫實録太學博士四員正七品助教四員正八品元元史百官志䝉古國子監秩從三品至元十四年始立置司業一人二十九年准漢人國學例置祭酒司業監丞祭酒一員從三品司業二員正五品監丞一員正六品令史一人筆且齊解見吏部篇一人知印一人䝉古國子學秩正七品博士二員助教二員教授二員學正學録各二員掌教習諸生後增學正二員學録二員三十一年增助教一員典給一人後定置博士二員正七品助教二員教授二員並正八品學正學録各二員典書一人典給一人國子監至元初以許衡為集賢館大學士國子祭酒教國子與䝉古大姓四集賽解見内閣篇人員選七品以上朝官子孫為國子生隨朝三品以上官得舉凡民之俊秀者入學為陪堂生伴讀至元二十四年始置監祭酒一員從三品司業二員正五品掌國之教令皆徳尊望重者為之監丞一員正六品專領監務典簿一員令史二人譯史知印典吏各一人國子學秩正七品置博士二員掌教授生徒考校儒人著述教官所業文字助教四員分教各齋生員大徳八年為分職上都増置助教二員學正二員學録二員督習課業典給一員掌生員膳食興文署秩從六品署令一員以翰林修撰兼之署丞一員以翰林應奉兼之至治二年罷置典簿一員從七品掌提調諸生飲膳與凡文牘簿書之事仍置典吏一人元史選舉志至元二十四年立國子學而定其制設博士通掌學事分教三齋生員講授經㫖究正音訓復設助教同掌學事而專守一齋正録申助規矩督習課業元文類世祖即位内設胄監外設提舉官以領學校至元八年頒行國字又設䝉古字學視儒學而加重焉謹案元以䝉古國子監屬翰林院國子監屬集賢院别置興文署以教授生徒其制興唐宋稍異又厯代皆以品官子弟為國子生士民子弟為太學生分學教肄自元以七品以上朝官子孫為國子生而取庶民之俊秀者為陪堂伴讀始合太學生於國子至今遂沿為定法其置游藝依仁據徳志道時習日新六齋令博士分教以次遞陞見選舉志亦今國子監六堂之制所由昉也明明史職官志國子監祭酒一人從四品司業一人正六品其屬繩愆㕔監丞一人正八品博士㕔五經博士五人從八品率性修道誠心正義崇志廣業六堂助教十五人從八品學正十人正九品學録七人從九品典簿㕔典簿一人從八品典籍㕔典籍一人從九品掌饌㕔掌饌二人未入流祭酒司業掌國學諸生訓導之政令監丞掌繩愆㕔之事以㕘領監務堅明其約束諸師生有過及廪膳不潔竝糾懲之而書之於集愆册博士掌分經教授而時其考課典簿典文移金錢出納支受典籍典書籍掌饌掌飲饌明初即置國子學設博士助教學正學録典樂典書典膳等官吳元年定國子學官制増設祭酒司業典簿洪武八年又置中都國子學秩正四品命國子學分官領之十三年改典膳為典饌十五年改為國子監秩從四品設祭酒一人司業一人監丞典簿各一人博士三人助教十六人學正學録各三人掌饌一人中都國子監制亦如之二十四年更定國子監品秩員數中都國子監設祭酒司業監丞典簿博士學正學録掌饌各一人助教二人品秩與在京同二十六年罷中都國子監永樂元年置國子監於北京設祭酒司業監丞典簿博士學正學録掌饌各一人助教二人宣徳九年省司業𢎞治十五年復設明初祭酒司業擇有學行者任之後皆由翰林院官遷轉明史選舉志明初改應天府學為國子學後改建於雞鳴山下既而改學為監設祭酒司業等官分六堂以館諸生厚給廩餼其教之之法毎旦祭酒司業坐堂上屬官自監丞以下首領則典簿以次序立諸生揖畢質問經史拱立聽命惟朔望給假餘日升堂㑹饌乃㑹講復講背書輪課以為常永樂元年始設北京國子監十八年遷都乃以京師國子監為南京國子監而太學生有南北監之分矣謹案三代成均之法如師氏大司樂等其職皆主於教國子吕祖謙謂國子是世禄之家鮮克由禮不可不設官以教養之而鄉遂州黨所興賢能之士不更見有掌教之官當由學校事重非有司簿書期㑹所領不𨽻於六官故周禮未之及也秦漢而後建學者雖以國子為名其實世官之法久廢所教皆民間之俊選故自西漢時博士弟子已多至數千人厯代相沿員額浸廣設官分課損益非一於人材固多所造就而教之無法流弊亦往往潜滋如東漢太學諸生三萬餘人各立部黨自相標榜史稱其嘘枯吹生三府辟召常出其口公卿以下莫不畏其貶議致醸成黨錮之禍流毒無窮逮宋而太學生恣横尤甚靖康之季以請用李綱至於聚衆數千伏闕槌鼓擊殺中使宋廷無可如何比南渡而太學尤皆闒茸之流大扺以獻頌拜表希望恩澤一有不及謗議喧然甚且三學諸生動稱捲堂大散挾制朝廷目無法紀迄於明世遺習尚存及其末造而請以魏忠賢配享孔子者即出於太學諸生儒風掃地洵由法制不立教化不明無以整齊約束之所致也國家學校風行教思廣被皇上崇儒重道屢䝉聖駕臨雍釋奠懋舉隆儀太學文廟發帑重葺易覆黄瓦規制有加兹復特命増建辟雍典章美偹橋門璧水益煥新模槐市生徒沐浴聖人之化澤無不奮興觀感以共㳺於蕩平正直之途訓厲漸摩士風丕變譽髦興咏信為逺軼周京矣欽定厯代職官表卷三十四
