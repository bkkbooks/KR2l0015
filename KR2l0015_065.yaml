body:
  text: 河道各官表河道各官國朝官制河道總督江南一人駐淮安清江浦山東河南一人駐濟寧州並正二品直𨽻一人以總督兼管江南河道總督掌黃淮會流入海洪澤湖汕黃濟運南北運河泄水行漕及瓜洲江工支河湖港疏濬隄防之事山東河南河道總督掌黃河南下汶水分流運河蓄泄及支河湖港疏濬隄防之事順治初止設總河一人總理黃運兩河事務駐劄濟寧州康熙十六年以後江南河工緊要移駐清江浦雍正二年以河南武陟中牟等縣隄工緊要設副總河一人駐劄濟寧州總河兼理南北兩河副總河專理北河七年改總河為總督江南河道副總河為總督河南山東河道分管南北兩河初南北兩總河並兼兵部尚書右都御史銜乾隆四十八年奉旨以總河無地方之責况又有由道員升署及簡擢初任之員嗣後但給與兵部侍郎右副都御史銜著為令直𨽻河道總督掌漳衛入運歸海永定河疏濬隄防之事雍正八年置以直𨽻總督兼管河庫道一人河道十一人河庫道駐劄清江浦掌出納河帑而嵗要其成于總督江南淮徐河道駐徐州淮揚河道駐淮安山東運河道駐濟寧直𨽻永定河道駐固安皆掌專理河務山東兖沂曹兼管黃河道駐兖州河南開歸陳道駐開封彰衛懷道駐武陟直𨽻通永河道駐通州天津河道駐天津清河道駐保定大廣順河道駐大名皆掌分巡所屬而兼理河務其山東運河道河南二道直𨽻五道又兼掌河帑之出納管河同知二十七人通判二十五人州同十人州判二十人縣丞七十三人主簿六十九人巡檢二十五人吏目二人典史四人兼管河務知縣十八人江南淮徐河道轄銅沛邳睢宿虹桃源同知四人豐蕭碭宿遷運河通判二人二十四汛州同州判各一人縣丞五人巡檢七人內大壩運河二汛各巡檢二人主簿十有二人淮揚河道轄山清裏河山清外河山安海防江防同知五人髙堰山盱桃源安清中河揚河揚糧水利通判六人三十八汛州同州判各三人縣丞十有四人主簿十人巡檢八人又西溪司安豐司管河巡檢各一人山東運河道轄運河郯沂海贑同知二人泇河捕河上河下河泉河通判五人二十八汛州同州判各三人縣丞九人內一丞管二汛主簿十有二人分理泉河州同二人府經厯三人縣丞六人巡檢一人兖沂曹道轄曹單黃河同知一人四汛縣丞一人主簿二人巡檢一人河南開歸道轄上南河下南河同知二人儀考商虞通判二人十二汛州判一人縣丞七人主簿四人彰衛懷道轄懷慶黃河開封上北河下北河同知三人彰德河務衛輝鹽河懷慶河務曹儀河務通判四人二十汛縣丞八人主簿十人巡檢二人又林縣管河典史一人直𨽻永定河道轄石景山永定河南岸北岸同知三人三角淀通判一人十五汛州判三人縣丞主簿各五人吏目二人通永河道轄北運河務關同知一人北運河楊村薊運糧河通判二人十三汛州同一人州判四人縣丞三人主簿五人天津河道轄南運河津軍河間河捕同知二人泊河子牙河通判二人西汛清河故城吳橋管河縣丞各一人東汛景州滄州管河州判各一人天津管河縣丞一人東光交河南皮青靜海獻管河主簿各一人青縣管河巡檢一人清河道轄保定河捕同知一人正定糧馬河通判一人分汛冀州祁州安州管河州判各一人武強隆平寧晉兼管河務知縣各一人清苑蠡髙陽新安雄安肅新城管河縣丞各一人保定任唐管河主簿各一人滿完方順橋管河巡檢各一人深澤管河典史一人大廣順河道轄廣大漳廣平河務漳河同知三人分汛永年邢臺沙河南河平鄉廣宗巨鹿唐山內邱任元城大名魏東明長垣兼管河務知縣十有五人元城大名魏長垣管河縣丞各一人永年成安管河典史各一人凡河務自管河同知以下為專司知縣為兼職各掌汛河隄堰壩閘嵗修搶修及挑濬淤淺導引泉流并江防海防各工程同知通判總理督率州同州判以下分汛防守閘官四十三人未入流掌司閘之啓閉以時蓄泄江南十四閘閘官十有一人內一官管四閘山東四十八閘閘官三十一人內一官管二閘者九一官管三閘者四直𨽻一人江南河標副將二人遊擊一人都司三人守偹二人管理塘務一人千總八人把總十有六人管理塘務二人河東河標副將一人遊擊二人都司一人守備二人管理塘務一人千總六人把總十有二人掌催護工程江南河標中軍副將一人其屬中軍都司一人管理塘務一人左右哨千總二人把總五人河標左營副將一人其屬中軍都司一人千總二人把總三人右營守備一人千總一人把總二人蕭營都司一人把總二人河標右營遊擊一人其屬中軍守備一人左右哨千總三人把總四人河東河標中軍副將一人其屬都司一人管理塘務一人千總二人把總四人河標左營遊擊一人其屬守偹一人千總二人把總四人河標右營遊擊一人其屬守偹一人千總二人把總四人江南河營參將一人遊擊二人守備二十人千總十有七人把總三十人葦蕩營參將一人守備二人千總二人把總二人山東黃運河營守備一人千總五人把總二人東昌德州二衛管河守備各一人德州運河南北兩岸管河千總各一人河南豫河懷河二營守偹各一人協辦守偹各一人千總四人把總三人直𨽻永定河河營守偹一人千總九人把總十有三人凡河營參將以下皆掌河工調遣及守汛防險之事葦蕩營參將以下掌採葦蘆以供修築隄掃之用江南河營參將轄淮徐營遊擊一人九營守備九人二十一汛千總八人把總十有三人淮揚營遊擊一人十一營守備十有一人二十六汛千總九人把總十有七人葦蕩營參將轄左右營守備千總把總各二人山東黃運河營守備轄七汛千總五人把總二人河南豫河懷河二營守偹轄七汛千總四人把總三人直𨽻永定河營守偹轄南北岸淀河三汛千總把總各一人石景山汛千總一人北運河汛千總把總各三人南運河汛千總一人把總八人東淀垈船千總一人西淀垈船把總一人厯代建置謹案河自周定王時徙流之後至漢復決屢遣使者塞治嗣後河患罕見未嘗特設官以治之至五代及宋潰溢時聞為患始大於是宋有外都水使者外都水丞金有都水分監元有行都水監河防使等官明則河道總督與漕臣屢為分合此即今總河之沿革特宋金元河患多在兖豫故置監於澶衛滑鄭等州明則全河大勢南趨又會通河既成與大河實相表裏當事者惟以利漕護陵為急故總河之官置於濟寧所治多在淮徐此又其情形之小異者綜其因革之略漢以後所置都水河隄等官皆在京師所司者乃天下水利凡川澤津梁渠堰陂池之屬無不𨽻焉並非專事河防今其職已併入工部都水司與河道總督之職較殊但自宋以前防河並無專官而宋金元之都水外監都水行監實今日總河之職掌自漢以來之都水使者都水監又宋金元都水外監都水行監之權輿規制雖屬不同而源流未可概略今故仍互見於此表焉三代周禮考工記匠人為溝洫尼溝必因水勢防必因地理善溝者水潄之善防者水淫之謹案通典敘都水之官始於舜之命益作虞周禮之林衡川衝然虞衡掌山澤之厲禁而貢其物屬於地官非河渠之職而舜時禹以司空平水土周禮冬官雖亡而考工記匠人掌為宫室溝洫實冬官之屬是河渠之事實匠人之所兼管也秦杜佑通典秦漢有都水長丞主陂池灌溉保守河渠謹案秦漢之都水長丞東漢時改屬郡國是其所官設於郡國若今河工同知以下等官也漢漢書溝洫志河決於館陶及東郡金隄泛溢兖豫河隄使者王延世使塞師古曰命其為使而塞河也漢書平當列傳當以經明禹貢使行河為騎都尉領河隄闞駰十三州志成帝時以校尉王延世為河隄謁者秩千石或名其官為護都水使者漢書百官公卿表太常屬官有均官都水兩長丞大司農屬官有郡國諸倉農監都水六十五官長丞少府屬官有胞人都水均官三長丞水衡都尉屬官有衡官水司空都水農倉又甘泉上林都水七官長丞京兆尹屬官有都水鐵官兩長丞左馮翊屬官有左都水鐵官雲壘長安四市四長丞右扶風屬官有都水鐵官廏雍厨四長丞通典武帝以都水官多乃置左右使者以領之劉向為左都水使者是也又續漢百官志曰劉向領三輔都水謹案漢百官表太常大司農少府水衡都尉三輔皆有都水長丞蓋太常掌陵邑其都水主陵邑之水利也大司農掌穀貨其都水主郡國農田之水利也少府掌山海池澤之稅其都水主郡國山海池澤之水利也水衡都尉掌上林苑其都水主苑內之水利也三輔之都水各主其所治邑之水利也而都水使者居京師以領之有河防重事則出而治之即今總河之任也後漢書循吏列傳顯宗詔王景與將作謁者王吳共修作浚儀渠吳用景墕流法水乃不復為害永平十二年議修汴渠遣景與王吳修渠築隄明年渠成王吳及諸從事掾史皆增秩一等景三遷為侍御史十五年拜河隄謁者通典東京凡都水皆罷之併置河隄謁者謹案漢侍御史秩六百石王吳由侍御史遷河隄謁者則其秩當千石是東漢之河隄謁者即西漢之都水使者矣後漢書百官志少府世祖改都水屬郡國其郡有鹽官鐵官都水官者隨其廣狹置令長及丞秩次皆如縣道官無分土謹案後漢書百官志大司農亦無都水官蓋與少府皆改屬郡國也又後漢水衡都尉官省而上林苑本三輔地太常陵邑罷屬三輔而三輔亦列郡也是不獨大司農少府屬官之都水改屬郡國即太常水衡三輔之都水官亦皆分屬於其郡矣後漢書循吏列傳汴渠成詔濵河郡國置河隄員吏如西京舊制謹案兩漢之河隄員吏唐之渠長斗門長即後世之閘官也三國晉書職官志漢東京省都水置河隄謁者魏因之酈道元水經注魏景初二年遣都督沙兵部監運諌議大夫冦兹帥五千人嵗常修治平河岨謹案此為將辨催督河工之始晉晉書職官志都水使者漢水衡之職漢又有都水長丞東京省都水置河隄謁者及武帝省水衡置都水使者一人以河隄使者為都水官屬及江左省河隄謁者置謁者六人通典晉武帝省水衡置都水臺有使者一人謹案漢之水衡都尉掌上林苑蓋周禮林衡川衡之職其屬官雖有都水而水衡實不掌治水猶太常少府之屬有都水而二官初不掌治水也魏始以水衡都尉主天下水軍舟船至晉改水衡為都水使者晉諸公贊云陳協有巧思為都水使者洛陽記云千金堰協所造則都水掌河渠明矣宋書百官志云晉懷帝永嘉六年都水使者爰濬出督運則晉都水又掌漕運兼今總漕之職蓋治河治漕事本相資又晉時其務尚簡故併以一官掌之梁之大舟卿主舟航河隄隋唐之都水監領舟楫河渠二署舟楫掌公私轉漕河渠掌修補隄堰皆兼主河漕二務實與晉時職掌不殊至先天置發運使開元置轉運使而漕務始有專司於是舟楫署廢都水官始專掌水利於漕務無預矣通典後漢晉初都水使者有參軍二人蓋亦丞之職任水經注晉泰始三年遣監運太中大夫都匠中郎將樂世帥衆五千餘人修治河灘謹案晉以中即將治河此將辨司河工調遣之始宋齊梁陳宋書百官志都水使者一人册府元龜齊置都水臺使者一人隋書百官志大舟卿梁初為都水臺使者天監七年改焉位視中書郎主舟航河隄通典梁改都水使者為大舟卿陳因之謹案都水臺使者為晉及宋齊之舊官梁改為大舟卿而兼掌舟航河隄則宋齊之都水使者亦兼掌河務明矣隋書百官志梁都水臺使者一人參軍事二人河隄謁者八人謹案東漢之河隄謁者即西京之都水使者也至晉而河隄為都水之屬至梁又列於參軍之下則其秩轉卑矣通典梁大舟卿有丞陳因之北魏魏書官氏志都水使者第四品中河隄謁者第六品下髙祖復次職令都水使者從第五品通典後魏初有水衡都校及河隄謁者都水使者官至永平二年都水臺依舊置二使者梁大舟卿有丞後魏北齊又曰參軍謹案魏都水參軍不載於官氏志蓋其品秩當在河隄謁者之下北齊隋書百官志齊都水臺管諸津橋使者二人參事十人册府元龜北齊有都水臺使者從第五品有丞及參事河隄謁者録事船局都津尉丞典作津長等員後周唐六典周司水中大夫一人隋隋書百官志都水臺使者及丞二人參軍三十人河隄謁者六十人通典隋開皇二年廢都水臺入司農十三年復置仁夀元年改臺為監更名使為監煬帝又改為使者尋又為監加置少監又改監及少監並為令領舟楫河渠二署河渠署煬帝置令丞各一人謹案漢之都水丞其後亦曰參軍至隋丞與參軍並置而丞與使者並二人是其品秩相亞煬帝所置之少監即丞之更名也參軍及河隄謁者為都水之屬而丞及少監則都水之二也唐新唐書百官志都水監使者二人掌川澤津梁渠堰陂池之政總河渠諸津監署丞二人掌判監事河渠署令一人丞二人掌河渠陂池隄堰魚鹽之事河隄謁者六人掌完隄堰利溝瀆漁捕之事諸津令各一人丞二人掌天下津濟舟梁壩橋凡舟渠之備皆先擬其半袽竹塞􅦜所在供焉州士曹司士參軍事掌津梁舟車通典唐武德八年置都水臺後復為都水署置令𨽻將作貞觀中復為都水監置使者龍朔二年改為司津監丞咸亨元年復舊光宅元年改都水監為水衡置都尉神龍元年復為都水監置使者二人分總其事不屬將作領舟楫河渠二署謹案唐都水之屬有河渠令丞河隄謁者諸津令而州又有司士參軍掌津梁此即宋時州縣長吏主河隄之所由起也新唐書百官志每渠及斗門有長一人五季册府元龜後唐莊宗同光中諸寺監各只置大卿監宋史河渠志河自周顯德初大決東平之楊劉宰相李穀監治自楊劉迄張秋以沮遏之水患少息司馬光資治通鑑河自楊劉至于博州連年東潰朝廷屢遣使者不能塞顯德元年十一月帝遣李穀詣澶鄆齊按視隄塞役徒六萬三十日而畢謹案此為後世河患之始亦為後世特遣大臣治河之始宋宋史職官志都水監舊𨽻三司河渠案嘉祐三年始專置監以領之判監事一人以員外郎以上充同判監事一人以朝官以上充丞二人主簿一人並以京朝官充輪遣丞一人出外治河掃之事或一嵗再嵗而罷其有諳知水政或至三年置局于澶州號曰外監元豐正名置使者一人丞二人主簿一人使者掌中外川澤河渠津梁隄堰疏鑿浚治之事丞參領之南北外都水丞各一人都提舉官八人監掃官百三十有五人皆分職涖事元祐四年復置外都水使者五年詔南北外都水丞並以三年為任宋史河渠志至和二年詔以知澶州事李璋為總管轉運使周沆權同知澶州內侍都知鄧保吉為鈐轄殿中丞李仲昌提舉河渠內殿承制張懷恩為都監而保吉不行以內侍押班王從善代之以龍圖閣直學士施昌言總領其事提點開封府界縣鎮事蔡挺勾當河渠事楊緯同修河決熙寧六年始置修濬黃河司將自衛州濬至海口差范子淵都大提舉官吏奉給視都水監丞司行移與監司敵體謹案自東漢以後至唐末卒鮮河患都水之官皆置司京師遙領河渠之務而已五代河患萌芽周顯德初大決楊劉至宋而為患益甚於是始有都水外監是為治河之官在外置司之始外監分置南北是為治河之官分任南北之始然宋時治河六塔二股工役妄興東流北流議論紛起因事置官其名不一故都水監之外又有提舉河渠司都大提舉修河司皆總河之任也宋史職官志元祐七年議回河東流乃詔河北東西漕臣及開封府界提點各兼南北外都水事宋史河渠志元祐七年詔南北外兩丞司管下河掃今後令河北京西轉運使副判官府界提點分認界至內河北仍於銜內帶兼管南北外都水公事謹案宋都水監之屬有都提舉八人元祐時又令轉運使副皆兼都水事此即今日河道之職都提舉專司河務熙寧四年程昉都大提舉黃御等河八年都大提舉大名府界金隄范子淵元豐二年董用臣都大提舉導洛通汴元祐五年提舉東流故道李偉此即今日淮徐淮揚永定河道之比漕臣兼理河務此即今日兖沂曹等河道之比宋史河渠志塘濼諸水所聚因以限遼河北屯田司緣邉安撫司皆掌之而以河北轉運司兼都大制置謹案河北轉運使制置塘濼若今直𨽻總督兼總河之職而緣邉屯田安撫司掌塘濼若今直𨽻通永清河大名大廣順四道兼河務之事也宋史河渠志乾道五年詔開封大名府鄆澶滑孟濮齊淄滄棣濵德博懷衛鄭等州長吏並兼本州河隄使開寶五年詔自今開封等十七州府各置河隄判官一員即以本州通判充如通判闕員即以本州官充咸平五年詔緣河官吏雖秩滿須水落受代知州通判兩月一巡隄縣令佐迭巡隄防轉運使勿委以他職謹案宋之河隄判官即今河工同知以下等專理河務者也開封大名府鄆澶等州長吏各兼本州河隄使即今知縣之兼理河務者也馬端臨文獻通考天下堰二十一監官各一人渡總六十五處監官各一人皆以京朝官三班使臣充亦有以本處監當兼掌者宋史河渠志乾道八年滑州河決壞靈河縣大堤詔殿前都指揮使韓重贇馬步軍都軍頭王廷義等督士卒丁夫數萬人治之太平興國七年滑州復言房村河決發卒五萬以侍衛步軍都指揮使田重進董其役謹案此宋以將辨司河務但暫出董役役罷則還與今河營等官常置者不同耳宋史河渠志舊制嵗虞河決有司常以孟秋預調塞治之物梢芟薪柴楗橛竹石茭索竹索凡千餘萬謂之春料詔下瀕河諸州所産之地仍遣使會河渠官吏乘農隙率丁夫水工收採