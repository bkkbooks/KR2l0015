部侍郎奉敕總理河道總河侍郎之設自恕始也𢎞治二年命白昻為戶部侍郎修治河道賜以敇嘉靖四十四年命朱衡為工部尚書兼理河漕又以潘季馴為僉都御史總理河道萬厯五年命吳桂芳為工部尚書兼理河漕而裁總河都御史官桂芳甫受命而卒六年夏潘季馴代自桂芳季馴時罷總河不設其後但以督漕兼理河道十五年命工科都給事中常居敬行河居敬及御史喬璧星皆請復專設總理大臣乃復命潘季馴為右都御史總督河道二十三年總河工部尚書楊一魁議欲分殺黃流以縱淮别疏海口以導黃而督運尚書禇鈇則以江北嵗祲民不堪大役欲先泄淮而徐議分黃二十六年撤鈇命一魁兼管漕運三十年帝以楊一魁不塞黃缸口致衝祖陵斥為民分設河漕二臣命曽如春為工部侍郎總理河道明史潘季馴列傳萬厯十六年起季馴為右都御史總督河道自吳桂芳後河漕皆總理自是始設專官謹案漕務河務事本相資然自元以前河之潰決未遽有妨於漕也自明時會通河既成二洪以下黃運兩河實相表裡故策河者必及漕策漕者必及河明初治運河者有陳瑄宋禮等治黃河者有王永和石璞徐有貞等而總理河道之設則自成化七年王恕始然終明之世河漕之任分合不常自王恕之後至萬厯五年吳桂芳以工部尚書兼理河漕而河漕之務合至十六年潘季馴以右都御史總督河道而河漕之事又分至二十六年又撤總漕而楊一魁兼理河漕至三十年又分設河漕二臣而曽如春總理河道自是以訖明終河漕之務不復合矣明會典成於明萬厯十五年故於總理河漕云萬厯八年革明史河渠志為萬厯十六年以後書河漕二職之分合頗詳而職官志但襲會典之原文於萬厯時總河之復設不復書須以河渠志參考之乃偹也明會典運河錢糧通惠河郎中所屬通州東安等七州縣樁草銀五百三兩六錢五分通州左右神武等九衛樁草銀六百十六兩北河郎中所屬兖州府屬州縣并衛所石灰十三萬八千斤􅐨麻九十六斤樁草􅐨麻銀五千五百三十五兩六錢八分副甎銀二百五十七兩七錢六分安山南旺等湖租銀三千三百三十五兩二錢四釐八毫各州縣裁革折徴撈淺淺鋪等夫二千二百八十名每名嵗徴銀十一兩渡夫二名每名嵗徴八兩共該銀二萬七千三百七十六兩萬厯四年議定每名連樁草嵗徴銀六兩著為例每嵗共該銀一萬三千六百九十二兩東昌府屬州縣并帶管德州德州左二衛及清河縣副甎一萬六千九百九十三箇石灰九千二百斤樁草􅐨麻甎灰銀二千四百八十兩六錢四分各州縣裁革折徴撈淺淺鋪夫八百六十二名萬厯四年議定每名連樁草嵗徴銀六兩每嵗共該銀五千一百七十八兩河間府屬州縣并衛所樁草銀二百五十八兩五錢六分葦草銀二百三十五兩三錢六分􅐨麻副甎銀各五十三兩四分石灰銀二十六兩五錢二分南河郎中所屬淮安府屬天妃閘以北邳州清桃睢宿五州縣并邳州衛樁草甎灰銀四百六十九兩八分廬鳳二府并滁和二州徴解邳州河隄防守夫銀一萬二千九十六兩徐州并屬縣樁草甎灰銀八百七十九兩八分廬鳳二府并揚州府屬州縣徴解徐州停役夫協助河工銀一千三百九十九兩二錢徐州庫收支徐州洪稅協濟河工錢糧嵗徴無定額約萬餘兩不等管泉主事所屬濟兖二府有泉州縣額徴泉壩錢糧樁草銀四百五十三兩一錢二分壩夫銀二百十一兩二錢裁革泉夫折徴銀九千二十四兩裁革壩夫折徴銀一千五百四十四兩裁革洸濟河淺夫折徴銀二百八十八兩萬厯四年議定每名連樁草嵗徴銀六兩黃河錢糧山東管河道副使所屬兖州府屬州縣堤鋪夫銀九千八百六十兩河南管河道副使所屬開封等八府并汝州河堡夫銀三萬二千八百五十三兩謹案明制河帑直𨽻江南掌以管河郎中河南掌以副使山東以郎中主事副使分掌今並以道員主之明史職官志按察使副使僉事分司諸道河南有管河道明會典濟寧兵偹一員專管河鹽臨清兵偹一員帶管分巡馬政河道𢎞治三年令山東勸農二參政兼理山東河道嘉靖八年令徐州兵偹副使兼理曹沛徐淮一帶黃河隆慶六年添設河南副使一員給敇專管黃河修築隄岸明史河渠志𢎞治七年分漕河沛縣以南德州以北及山東為三道各委曹郎及監司分理𢎞治十一年河南管河副使張鼐請於武陟木欒店别鑿一渠下接荆隆口謹案𢎞治時已有河南管河副使而隆慶六年又添設一員則管河副使有二員矣山東勸農參政及濟寧臨清二兵偹兼理河務而河南二副使則專理河務者也續文獻通考知州同知通判或兼管河分職任事明會典景泰三年設山東府州縣管河官𢎞治八年革淮陽二府山陽等縣管河通判主簿正德二年革河南新鄉獲嘉武陟等縣管河主簿八年設大名府通判一員東明長垣武城曹縣主簿各一員專管河道嘉靖十四年復設直𨽻景州滄州管河通判十五年設兖州府同知一員疏濬泉源二十四年添設歸德府通判一員商邱縣主簿一員專管河道二十五年改兖州府管泉同知為管河同知駐劄曹縣添設單縣管河主簿一員萬厯三年革兖州府南旺管河通判令本府管河同知帶管仍兼管泉四年添設山東督濬官東平濟寧二州各判官一員泰安州吏目一員汶上曲阜鄒滕四縣各縣丞一員泗水魚臺二縣各主簿一員新泰萊蕪肥城平隂寧陽滋陽嶧七縣各典史一員巨野嘉祥共典史一員又添設淮安府管河同知一員十三年令山東濟青登萊四府管糧同知及所屬州縣管糧官俱帶管水利明史職官志壩官閘官掌啓閉蓄泄續文獻通考閘官掌啓閉蓄泄壩官掌典守隄防各率其役以通舟楫之利明會典嘉靖十三年復設沽頭閘主事并新興黃家湖陵等七閘官吏人夫二十年置境山鎮閘及官吏人夫隆慶六年又題復夏津魚臺二縣各主簿一員專管新河石隄閘壩萬厯十一年設梁境古洪各閘官一員謹案明時尚有管閘主事會典所載有濟寧管閘主事沽頭管閘主事南旺管閘主事今無此官明會典永樂十九年遣侯伯各二員分理濟寧等閘及徐州吕梁二洪通州等處河道濟寧衛管河指揮一員謹案河自三代以後至宋時漸徙而南為患始甚然其時河淮猶未合也至明而全河併注於淮故為患視前代為尤亟而二洪以下運道所資鳳陽又祖陵所在故治河之任視前代為尤重其後河患不已論者多欲别開運道或欲如元時行海運或欲開膠萊由馬家濠通海道或欲復老黃河故道類皆虗言不可施用惟潘季馴專主保髙堰束淮水以刷黃流實為不易之論又明時綱紀漸隳官方不肅任事之臣無不利於河決者侵剋金錢則自總河以至於閘官無所不利支領工食則自執事以至於遊間無食之人無所不利而獨朝廷受其害上多茍且之政下鮮實心之臣是以河務日壞我國家六府孔修百川順軌聖祖仁皇帝軫念河防屢舉南巡之典閲視河隄定以清敵黃之法浚張福口引河築歸仁隄疏人字芒稻諸河改中河運道而移仲莊閘於楊家莊凡所指畫悉為治河典則世宗憲皇帝命發帑金數百萬增築髙家堰利賴貽諸奕世我皇上法祖勤民於河工重務尤深廑念親臨相度條畫周詳如堅閉髙郵三壩髙堰五壩定清口水志以時拆築開陶莊引河導黃使北加甃髙堰磚工接築徐州石堤諸大興作並為自來河臣所不能知不敢議者備蒙睿裁指授即平時間有施工之處繪圖入告者仰承丹毫點定洞悉形勢不爽毫釐河臣等祗稟宸謨得所遵守是以利興弊革永慶安瀾自古河渠溝洫志所載議論雖繁施行無當平成之績固未有盛於今日者也欽定厯代職官表卷五十九
