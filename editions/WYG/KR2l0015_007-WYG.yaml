body:
  text: 宗人府表宗人府國朝官制宗令一人左右宗正各一人左右宗人各一人並順治九年置掌皇族之屬籍以時修輯玉牒辨昭穆序爵祿均其惠養而布之教令凡親疎之屬胥受治焉初制宗令以親王郡王統理宗正以貝勒貝子兼攝宗人以鎮國輔國公及將軍兼攝後擇賢任使不復以封爵為限府丞漢人一人正三品順治九年置掌校理漢文冊籍初制有覺羅啟心郎二員漢軍啟心郎二員與府丞均為正官康熈十二年裁啟心郎惟設府丞一員左右司理事官宗室各二人初制三品後改為四品康熈二十二年定為正五品副理事官宗室各二人初制從四品康熈二十二年定為從五品分掌左右翼覺羅之籍並書其子女適庶生卒婚嫁官爵名諡以備玉牒紀載凡承襲次序秩俸等差及養給貧幼優恤婚喪之事時為稽核綜理焉初設郎中六員員外郎四員主事四員康熈十二年始分𨽻左右兩司三十八年兩司各裁郎中一員雍正二年改郎中為理事官改員外郎為副理事官惟主事仍舊名初制皆以覺羅為之後以覺羅滿洲㕘用雍正二年定以宗室滿洲􅄁用乾隆二十九年准府丞儲麟趾奏定理事官以下筆帖式以上悉以宗室為之經厯宗室二人正六品順治九年置掌出納文書初制經厯三員其二員㕘用宗室滿洲一員用漢人康熈三十八年裁漢經厯一員乾隆二十九年定制以宗室為之堂主事宗室二人初制四品康熈九年定為正六品漢人二人正六品堂主事順治九年置二人掌奏疏稿案初制以宗室滿洲㕘用乾隆二十九年定制以宗室為之漢人主事雍正元年增置掌漢文冊籍筆帖式宗室二十四人並支七品俸順治九年置掌譒譯文書初制以宗室滿洲㕘用乾隆二十九年定制以宗室為之厯代建置三代周禮春官小宗伯掌三族之别以辨親疎其正室皆謂之門子掌其政令鄭康成注三族謂父子孫人屬之正記曰親親以三為五以五為九正室適子將代父當門者也政令謂役守之事謹案漢書百官表宗正注應劭曰周成王時肜伯入為宗正師古註云肜伯為宗伯不謂之宗正但考初學記玉海引宋百官春秋曰周受命封建宗盟始選其宗室之長而董正之謂之宗正成王時肜伯入為宗正掌王親屬是也據此諸書皆以為周有宗正師古雖謂肜伯不為宗正而未嘗謂周無宗正也玉海引逸周書嘗麥篇太祝以王命作筴筴告宗正則周有宗正其證又在漢百官表注及宋百官春秋之前惟不見經典正文故不列於表至周禮小宗伯掌三族之别實與今宗正職掌相符故玉海於宗正一官引此為証考魏風殊異乎公族鄭箋云公族主君同姓昭穆又考魯語曰宗室之謀不過宗人韋昭注謂此宗人則上宗官也亦用同姓若漢宗正用諸劉矣夫侯國尚有公族之官况天子乎王應麟謂燕義周天子有庶子官即今之宗正恵士竒謂周禮諸子即春秋之公族大夫然儀禮燕禮注云庶子世子之官而夏官諸子掌國子之倅亦不専掌公族之子弟與今宗正職未為盡合今姑取小宗伯所掌列之於表而玉海所引嘗麥篇宗正之名亦附著於此焉秦杜佑通典秦置宗正掌親屬王應麟玉海秦始以宗正列九卿掌親屬而宗廟之事屬之奉常漢漢書百官公卿表宗正秦官掌親屬有丞平帝元始四年更名宗伯屬官有都司空令丞如淳曰律司空主水及罪人内官長丞又諸公主家令門尉皆屬焉王莾并其官於秩宗初内官屬少府中屬主爵後屬宗正漢書髙帝紀七年置宗正官以序九族荀悦漢紀宗正掌視親屬官唐六典漢宗正之官不以他族楚元王子郢客辟疆徳等逓為之謹案都司空令丞如淳註稱主罪人蓋治獄之官今宗室覺羅有犯雖宗人府主其罰然無専官故都司空等不列於表至内官長丞兼治掖庭公主家令門尉兼治戚里皆以事相關渉故使兼𨽻非宗正所屬之正官故亦不列於表又通典載元始元年於郡國置宗師以糾皇室親族世氏致教訓焉選有徳義者為之有寃失職者宗師得應郵亭上書宗伯請以聞註曰為書付郵亭令送至宗伯蓋其時諸王各就國故各設官以統之其制亦今之所無謹附載其名於此古今攷東萊大事紀高帝七年書置宗正官以序九族高帝表無其人高帝紀七年二月書自櫟陽徙都長安置宗正官以叙九族表髙后二年始見除劉郢客當是史失初姓謹案高帝七年雖置宗正而未命其人故表不載表既詳於高后二年安得於髙帝七年遂失姓名乎玉海高后二年上邳侯郢客景元二年平陸侯禮三年徳侯通元狩四年沈猷侯受為宗正坐聼請不具宗室論始元二年光禄大夫辟疆元鳯元年大中大夫徳初元元年諌大夫更生竟寧元年陽城侯慶忌元始元年宗正容更為宗伯永平三年劉平建初二年般永元十三年愷為宗正建初中劉軼為宗正遂世掌焉矩寵佑謹案玉海此條蓋統括百官表而間有脱遺如百官表載元朔四年劉棄元鼎四年劉安國五鳯二年劉丁承光四年劉臨始元三年劉通河平三年劉順陽朔元年劉武成鴻嘉元年劉慶忌永始三年劉它人建平四年劉容皆表具而玉海失載者也玉海周諸子掌戒令教法至於辨世繫辨昭穆則掌之小史漢宗正徒掌屬籍而教養之法未聞謹案玉海謂漢宗正徒掌屬籍而教養之法未聞然攷楊雄宗正箴曰巍巍帝堯欽親九族禮有攸訓屬有攸籍既云禮有攸訓則兼教養之法矣後漢書劉般為宗正在位數言政事其收恤九族行義尤著收恤九族即宗正之教養也前漢紀公卿議遣宗正治衡山王又遣宗正問江都王則宗正所綜理者多矣王應麟謂漢宗正即周之諸子諸子既為政於公族宗正安得不掌教養之政乎如以為徒掌屬籍則非也唐六典光武復置宗正後漢書百官志宗正卿一人中二千石掌序録王國嫡庶之次及諸宗室親屬逺近郡國嵗因計上宗室名籍若有犯法當髠以上先上諸宗正宗正以聞乃報决胡廣曰又嵗一治諸王世譜差序秩第漢官儀曰官吏四十一人其六人四科一人二百石四人百石三人佐六人騎吏二人法家十八人學事一人官醫丞一人比千石諸公主每主家令一人六百石丞一人三百石其餘屬吏增减無常漢書曰主簿一人秩六百石僕一人秩六百石私府長一人秩六百石家丞一人三百石直吏三人從官一人東觀書曰其主薨無子置𫝊一人守其家中興省都司空令丞通典宗正兩漢皆以皇族為之不以他族謝維新合璧事類通鑑分紀曰漢宗正丞用皇族魏三國魏志建安二十一年始置宗正之官唐六典宗正卿魏亦以宗正居之晉徐堅初學記晉曰大宗正晉書職官志宗正統皇族宗人譜牒又統太醫令史又有司牧掾員及渡江哀帝省并太常太醫以給門下省謹案太醫司牧蓋皆所兼𨽻之雜流今各有所𨽻故不列於表通典晉兼以庶姓山公啟事曰羊祜忠篤寛厚然不長理劇宗正卿缺不審可轉作否咸寧三年又置宗師以扶風王亮為之使皇室戚屬奉率徳義所有施行必令誥之謹案宗師之名同於漢制而職位尊卑則迥殊晉書百官志不載但考晉書扶風王亮為宗師梁王肜亦為宗師彭城王領太宗師晉之為宗師者不一其人則有經制之額可知通典明云咸寧三年置宗師玉海謂東晉始省而百官志不載亦史氏之闕也宋齊梁陳唐六典宋齊並不置梁天監七年乃置焉宗正春卿位視列曺尚書皆以宗室為之班第十二陳因之隋書百官志梁置宗正卿位視列曺尚書主皇室外戚之籍以宗室為之初學記梁加卿字除大字曰宗正卿謹案𨽻續載漢中山相薛君成平侯劉君斷碑有云巴郡太守宗正卿下闕釋云百官志太傅上公一人太尉公一人太常卿一人蓋史氏用周官之法紀傳所書居三九之官皆不書以公卿字惟孔廟碑稱吳雄為司徒公趙戒為司空公衡方碑題云衛尉卿與此碑所題宗正卿乃遣詞揮翰者益之後世以卿名其官則自蕭梁始今考初學記引五代史百官志云至梁加卿字除大字曰宗正卿與洪氏之説可以相證北魏北魏書官氏志有宗正太和中初置少卿洛陽伽藍記國子南有宗正寺唐六典後魏亦曰宗正卿通典後魏有宗正卿少卿太平御覽後魏職令曰宗正卿第四品上第三北齊隋書百官志後齊有大宗正寺掌宗室屬籍統皇子王國諸王國諸長公主家後周通典後周有宗師中大夫掌皇族定世系辨昭穆訓以孝悌屬大冡宰隋隋書百官志隋置宗正卿少卿各一人丞二人主簿二人錄事二人初學記北齊又加大字隋又徐之唐舊唐書職官志宗正寺卿一員從三品上少卿二員從四品上丞二人從六品上主簿一人從七品上錄事一人從九品上府五人史九人亭長四人掌固四人卿之職掌九族六親之屬籍以别昭穆之序并領崇元署少卿為之貳九廟之子孫繼統為宗餘曰族凡大祭祀及冊命朝㑹之禮皇親諸親應陪位預㑹者則為之簿書以申司封若皇親為三公子孫應襲封者亦如之丞掌判寺事主簿掌印勾檢稽失錄事掌受事發辰新唐書百官志宗正寺卿一人少卿二人丞二人掌天子族親屬籍以别昭穆領陵臺崇元二署凡親有五等先定於司封主簿二人知圗譜官二人修玉牒官一人知宗子表疏官一人錄事一人謹案宗正卿所屬新舊唐書所載㣲有不同志不詳建置年月其孰為舊制孰為改制巳不可知今並存以資考核又新唐志稱宗正寺領陵臺崇元二署其陵臺署諸陵臺令各一人丞各一人建初啟運興寧永康陵令各一人丞各一人掌守衛山陵諸太子廟令各一人丞各一人錄事各一人掌灑掃開闔之節四時享祭事諸太子陵令各一人丞各一人錄事各一人舊唐志不載蓋後又改𨽻今其職並𨽻禮部太常寺故不列於宗人府建置之中其崇元署令一人丞一人府二人史三人典事六人掌固二人掌京都諸觀名數與道士帳籍齋醮之事新羅日本僧入朝學問九年不還者編諸籍道士女冠僧尼見天子必拜每三嵗州縣為籍一以留縣一以留州僧尼一以上祠部道士女冠一以上宗正一以上司封其制尤為謬戾馬端臨文獻通考曰崇元署一官唐創之以司道教而必屬之宗正司者蓋唐以老氏為始祖則崇其教者亦以為尊祖宗之事也云云今考唐景龍三年法琬法師碑稱法琬為中宗之三從姑開元十七年興唐寺主居法澄塔銘稱彭王嗣􅌔女宻多羅案宻多羅原石刻誤作彌多羅今改正出家為法澄弟子資治通鑑稱景雲元年十二月上以二女西城隆昌二公主為女冠以資天皇太后之福其他見於史傳者不一則崇元署所謂掌諸觀名數者常即指入道之宗屬因而連及所統寺觀之道士因而連及於天下道士亦𨽻宗正寺耳此一時之粃政前無師承後無沿襲殊非官制之正今削之不錄而附載其名於此焉唐六典宗正卿掌皇九族六族之屬籍以别昭穆之序紀親疎之列并領崇元署少卿為之貳謹案唐㑹要永徽二年九月二十一日問宗正卿李博乂曰諸親有除屬者曰屬疎故除縂三百餘人上曰服屬雖疎理不可降宜依舊編入屬籍天寳元年七月二十三日詔凉武昭王四公子孫並編入屬籍唐㑹要此條可為宗正屬籍規式惟是李勣賜姓亦附宗正屬籍則唐宗正所掌遂及異姓未足為法也太平御覽唐書官品志曰按太平御覽所引唐書官品志甚多與新書百官志互異乃别一書宗正卿位視列曹尚書以宗室為之合璧事類職林曰開元三十五年制宗正寺官屬皆以皇族為之謹案職林又載唐武徳置宗師龍朔改曰司宗光宅為司屬後復故掌皇族外戚簿籍及邑司名帳領諸陵太廟其名沿漢晉宗師之舊而職掌又異今無此官故不列於表五季舊五代史梁有宗正卿孫逢吉職官分紀後唐同光元年置宗正大卿五代㑹要周顯徳五年閏七月宗正寺准奉勅節文刪集現行公事送中書門下謹案王溥此文知周亦名宗正寺然所列現行公事稱見管齋郎室長逐季候大饗捧饌行禮及出給每年行事厯子見管禮料庫收貯諸司納到諸壇廟祠祭禮料逐月給付逐季太廟并别廟祠祭祝版當寺於少府監請領送秘書省書寫畢却將應奉祠祭候年滿則將齋郎堂室長於每年八月印發文字觧送赴南曹云云蓋其時兼領祭祀也宋宋史職官志宗正寺卿少卿丞主簿各一人卿掌叙宗派屬籍以别昭穆而定其親疎少卿為之貳丞㕘領之宋初舊制置判寺事二人以宗姓兩制以上充闕則以宗姓朝官以上知丞事掌奉諸廟諸陵薦享之事司皇族之籍主簿一員以京官充元豐官制行詔宗正長貳不尃用國姓蓋自有大宗正司以統皇族也渡江後卿不常置少卿一人以太常兼紹興三年復置少卿一人五年復置丞十年置主簿嘉定九年詔以宗學改𨽻宗正司自此寺官又與校試之事大宗正司景祐三年始置司以皇兄寧江軍節度使濮王知大宗正司事皇姪彰化軍節度使觀察留後守節同知大宗正事元豐正名仍置知及同知官各一人選宗室團練觀察使以上有徳望者充丞二人以文臣京朝官以上充掌糾合族藩而訓之以徳行道藝受其詞訟而糾正其愆違有罪則先劾以聞法例不能决者同上殿取裁嵗錄存亡之數報宗正寺凡宗室服屬逺近之數及其賞罰規式皆總之官屬有記室一人掌牋奏講書教授十有二人分位講授兼領小學之事舊制擇宗室賢者為知大宗正事次一人為同知其後位髙屬尊者為判熈寧三年始以異姓朝臣二員知丞事置局為睦親廣賢宅崇寧三年置南外宗正司於南京西外宗正司於西京各置敦宗院仍詔各擇宗室之賢者一人為知宗掌外居宗室詔復定宗學博士正錄員數玉牒所淳化六年始設局置官詔以皇宋玉牒為名建玉牒殿以知制誥劉筠夏竦為修玉牒官自後置一員或二員元豐官制行分𨽻宗正寺官寺丞王鞏奏玉牒十年一進並以學士典領南渡後紹興十二年始進玉牒所提舉一人或二人以宰相執政為之以侍從官一人兼修宗正卿少卿而下同修纂李心傳建炎以來朝野雜記知大宗正事仁宗始置用太祖太宗之後屬近行尊者各一人職官分紀玉牒所熈寧三年於三班院置局後徙編修院謹案宋制掌皇族之政者有宗正寺有大宗正司有宗學有玉牒所有外宗正司宗正寺掌别屬籍之親疎大宗正司掌訓導宗子而司其賞罰觀其嵗錄存亡之數報宗正寺則截然分掌可知今制併而一之故表中二職並列其宗學之制與今畧同然今制稽察宗學為王公大臣所兼攝其教習亦不載於官制故不列於表至玉牒所古有常職今則十年恭修一次其總裁纂修諸官由他職兼領事竣則撤其館法例迥異故亦不列於表若其外宗正司則與漢時宗師之制同故併不錄焉陸游老學菴筆記宗正卿少卿祖宗因唐故事必以國姓為之然不必宗室也元豐中始兼用庶姓而知大宗正事始於濮安懿王始權任甚重後頗鐫損云葉夢得石林燕語唐宗正卿皆以皇族為之本朝踵唐故事而止命同姓慶厯初始置大宗正司以北海郡王允弼為知大宗正事其後相承皆以宗室領治平元年英宗以宗數倍多於前乃命增置同知大宗正司一員亦以懷州團練使宗恵為之迄今以為故事熈寧三年復置丞二員以命外官玉海開寳六年正月以千牛衛將軍趙崇濟為宗正寺少卿景徳二年命趙湘趙稹同判宗正寺祥符九年趙安仁兼卿世長知寺事二月王旦請命丞郎以上兼卿給舍以下兼少卿郎中以上兼丞京官兼主簿以為永制天禧元年趙鼎為主簿慶厯四年七月辛巳趙槩判宗正寺元豐六年九月十一日詔除長貳外自今不専用國姓志大宗正司統皇族故寺長貳不專以國姓分案二設吏六建炎三年四月省以常少兼紹興二年十二月復置少卿四年以命范冲景祐三年丙子七月十九日乙未初置大宗正司以寧江節度濮王知大宗正事彰化軍留後守節同知大宗正事時諸王子孫衆多聚居大第故於祖宗後各擇一人使司訓導糾違失凡宗族政令皆掌之奏事毋得先達先委詳酌而後聞八月庚戌知大宗正事請宗室每朝罷各就聴讀從之寳元二年七月二十一日允弼同知大宗正事至和二年六月戊子朔增允良同知未㡬罷九月以知大宗正濮王為判同知允弼為同判治平元年六月丁未十三日增置同知大宗正事一員以宗惠為之熈寧三年二月丙寅詔大宗正司置丞二人以張稚圭李徳芻為之上曰或言丞不用庶姓王安石錄春秋公族大夫等事以進元豐之制以宗室團練以上有徳望者為長而一人貳之若位髙屬尊則為判志元豐五年二月十五日宗惠封江夏郡王知大宗正徽宗時仲忽判大宗正嘉定以嗣秀王兼總大宗正謹案玉海此條可與宋職官志詳畧互證考石林燕語謂慶厯初始置大宗正司玉海謂景祐三年七月十九日乙未初置大宗正司確有月日可證石林燕語之誤宋職官志與玉海同遼契丹國志特哩衮原本作惕隱今改正宗正寺也遼史百官志大特哩衮司太祖置掌皇族之政教興宗重熈二十二年耶律義先拜特哩衮戒族人曰國家三父房最屬貴族凡天下風化之所自出不孝不義雖小不可為其妻晉國長公主之女每見中表必具禮服義先以身率先國俗化之遼國設官之實於此可見太祖有國首設此官其後百官擇人必先宗姓特哩衮亦曰徳爾吉原本作梯里已今改正知特哩衮司事特哩衮司事南面官宗正司職在大特哩衮司金金史百官志大宗正府㤗和六年避睿宗諱改為大睦親府判大宗正事一員從一品皇族中屬親者充掌敦睦糾率宗屬欽奉王命㤗和六年改為判大睦親事同判大宗正事一員從二品㤗和六年改為同判大睦親事同簽大宗正一員正三品以宗室充大定元年置㤗和六年改為同簽大睦親事大宗正丞二員從四品一員於宗室中選能幹者充一員不限親疎分司上京長貳兼管治臨潢以東六司屬㤗和六年改為大睦親丞知事一員從七品檢法從八品諸宗室將軍正七品上京東烏塔原本作温忒今改正二處皆有之世宗時始命遷官其户凡百二十明昌二年更名四司局設令丞承安二年以令同隨朝司令正七品丞正八品中都上京哲爾衮原本作扎里𤓰今改正合右西南梅望寨扶餘原本作蒲與今改正臨潢㤗州金山等處置屬大宗正府大金國志天㑹十三年大宗正府置判同簽書事謹案金大宗正府史但載明昌六年之更名而未著置於何年宇文懋昭大金國志書雖偽託然亦雜採諸家記載而成必有所據觀其稱置判同簽書事在太宗十三年乙夘是年熈宗即位乃稱天㑹十三年則自金初有之矣故並存其説以補史之闕焉元元史百官志大宗正府秩從一品國初未有官制首置斷事官曰扎爾呼齊原本作扎魯忽赤今改正㑹决庶務凡諸王駙馬投下䝉古色目人等應犯一切公事及漢人姦盗詐偽蠱毒厭魅誘掠逃驅輕罪重囚及邉逺出征官吏每嵗從駕分司上都存留住冬諸事悉掌之至元二年置十員三年置八員九年降從一品銀印至理䝉古公事以諸王為府長餘悉御位下及諸王之有國者又有集賽原本作怯薛今改正人員奉㫖署事别無頒受宣命十四年置十四員十五年置十三員二十一年置二十一員二十二年增至三十四員二十八年増至四十六員大徳四年省五員十一年省十一員皇慶元年省二員以漢人刑名歸刑部㤗定元年復命兼理置扎爾呼齊四十二員令史改為掾史致和元年以上都大都所屬䝉古人并集賽軍站色目與漢人相犯者歸宗正府處斷其餘路府州縣漢人䝉古色目詞訟悉歸有司刑部掌管正官扎爾呼齊四十二員從一品郎中一員從五品員外郎二員從六品都事二員從七品承發架閣庫管勾一員從八品掾史十人䝉古筆且齊原本作必閣赤今改正十三人通事知印各三人宣使十人䝉古書寫一人典吏三人庫子一人醫人一人司獄一人謹案元大宗正府扎爾呼齊兼治一切刑政非掌皇族之專官續文獻通考至元二十二年哈喇哈斯原作哈喇哈孫今改正由掌宿衛拜大宗正用法平允時欲以江南獄𨽻宗正哈喇哈斯曰江南新附教令未孚且相去數千里欲遙制其刑獄得無寃乎遂止則元初宗正寺且遙領諸路刑政矣蓋其時分農土統部帳者大抵皆皇族國戚故獄訟案牘率關渉於宗正府而治其事者從一品之大臣多至三四十人也迨後天下大定乃以内事還之刑部外事還之路府州縣耳其官雖與宗正有殊其所秩亦與宗正稍異然其名則沿宗正之舊故併列於表以存一代之制至四十二員秩皆從一品雜然治事勢必不行意其必區以長貳或分以曹司但史文簡畧不可復詳以皆大宗正府之長故列表於宗令之下而附著其變例之由焉明明史職官志宗人府宗人令一人左右宗正各一人左右宗人各一人並正一品掌皇九族之屬籍以時修其玉牒書宗室子之適庶名封嗣襲生卒婚嫁諡葬之事凡宗室陳請為聞於上選材能錄罪過初洪武三年置大宗正院二十二年改為宗人府並以親王領之秦王樉為令晉王棡燕王棣為左右宗正周王橚楚王楨為左右宗人其後以勲戚大臣攝府事不備官而所領亦盡移之禮部其屬經厯司經厯一人正五品典出納文移謹案明史職官志尚載有南京宗人府經厯司經厯一員而無宗令等官考明㑹典永樂十八年改洪武中所置宗人府為南京宗人府不復降印惟改降經厯司印與南京各衙門行移蓋姑以備陪京之制與元之上京分司名為别署實即正員者迥殊故今削之不錄僅附存於此欽定厯代職官表卷一
