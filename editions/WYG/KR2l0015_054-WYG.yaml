烏爾古徳哷勒統軍司為招討司以博索路統軍司為總管府大定五年又設兩招討司與前凡三以鎮邊陲東北路者初置烏爾古徳哷勒部後置於泰州泰和間以去邊尚三百里宗浩乃奏分司於金山以重臣知兵者為使列城堡濠牆戍守為永制金史白彦敬列傳正隆六年調諸路兵使彥敬主㑹寜夫餘呼爾哈三路事及降世宗以為哈斯罕節度使完顔福夀列傳從博索路兵馬都總管完顔黙音滿洲語隊也原作謀衍今改正通吉義列傳通吉義原作獨吉義今依八旗氏族通譜改正遷逹喇滿洲語腰也原作迭刺今改正部族節度使貞元元年改唐古部族節度使烏雅扎拉列傳烏雅原作烏延今依八旗氏族通譜改正扎拉滿洲語媒人也原作查剌今改正改博索路總管髙麗憚其威名凡以事至博索路者望見而跪之尼瑪哈楚呼列傳尼瑪哈原作尼厖古今依八旗氏族通譜改正楚呼䝉古語純色也原作鈔兀今改正遷東北路招討使與完顔思敬有隙思敬為東京留守奉詔至招討使楚呼不出餞實圖美列傳䝉古語頂戴也原作仁土懣今改正改哈斯罕節度使博索路兵馬都總管伊喇諳逹列傳伊喇原作移刺今依八旗氏族通譜改正諳逹滿洲語夥伴也原作按答今改正以招徠邊部功遷東北路招討使圖克坦克寧列傳圖克坦原作徒單今依八旗氏族通譜改正厯呼爾哈路節度使海蘭路兵馬都總管承裕列傳改東北路招討副使完顏安國列傳為東北路副招討丞相襄列傳出為東北路招討都監遷率賔路節度使移海蘭路兵馬都總管𤓰爾佳衡列傳𤓰爾佳原作夾谷今依八旗氏族通譜改正出為上京留守尋改樞宻行院規畫邊事以修完封界賜詔褒諭謹案金代肇迹上京其疆域袤延與本朝剏業之地廣輪最為相合核之史傳㑹寧府當在今寧古塔西六百三十里吉林城東北二百餘里之色齊窩集左右夫餘路在上京之北率賔路在上京之南海蘭路又在率賔東南呼爾哈路則在寧古塔之境哈斯罕路在遼陽之南咸平路在開原鐡嶺間博索府路與髙麗毗連當在鳳凰城東去鴨緑江海口不逺而㑹寧府實居其中當時備設官職率兵鎮守其分地以治者有兵馬都總管兵馬副總管節度使節度副使其専制方面者有東南路都統司東北路兩招討使副招討使烏爾古徳哷勒招討使東北路招討都監建置不一要其大畧葢上京如今之奉天府而夫餘海蘭率賔哈斯罕呼爾哈烏爾古徳哷勒博索府諸路則如今吉林寧古塔各置帥臣之比其分為東南東北二路者東南都統司即東京留守所治専轄遼東以控馭髙麗東北招討司則自今寧古塔吉林以及科爾沁喀爾喀諸地無不統屬封界極為廣逺而𤓰爾佳衡傳又有樞宻行院之職則隨時建設以治邊事事訖即罷非常制也元元史地理志遼陽等處行中書省至元二十四年始立二十五年改東京為遼陽路安撫髙麗軍民總管府治遼陽故城開元南京二萬户府治黄龍府至元四年更遼東路總管府海蘭府碩逹勒逹滿洲語碩直也逹勒逹遮蔽也原作水逹逹今改正等路土地曠濶人民散居元初設軍民萬户府五撫鎮北邊一曰屯寧古塔境内河名原作桃溫今改正一曰呼爾哈一曰鄂多理即鄂多理城為我朝最初長白山發祥之地在朶興京東一千五百里之東原作斡憐今改正一曰托果琳䝉古語周圍也原作脱斡憐今改正一曰布呼滿洲語鹿也原作索苦今改正江各有司存分領混同江南北之地其居民皆碩逹勒逹女真之人設官牧民隨俗而治元史兵志夫餘原作蒲峪今並改正路屯田萬户府世祖至元二十九年以蠻軍三百户女直一百九十户於咸平府屯種命本府萬户領其事三十一年罷萬户府屯田仁宗大徳二年撥蠻軍三百户屬肇州䝉古萬户府依舊立屯肇州䝉古屯田萬户府成宗元貞元年以納延䝉古語八十數也原作乃顔今改正布拉噶齊䝉古語捕貂人也原作不魯古赤今改正及打魚碩逹勒逹女直等户於肇州旁近地開耕為户元史世祖本紀至元二十五年増軍戍咸平府以察罕伊埓薩哈勒䝉古語察罕白色也伊埒明顯也薩哈勒鬚也原作察忽亦兒思合今改正言其地舊邊徼請益兵以備不虞故也謹案今東三省地在遼為東京在金為上京東京元代始罷其制而改設行中書省以鎮之與本朝之建立陪京者制度頗為不合然當時所置總管府萬户府與今之駐防總管城守尉等其沿革亦有相近者故仍繫之此表以著其畧云元史成宗本紀大徳二年四月置和林宣慰司都元帥府以呼喇珠䝉古語集聚也原作忽剌出今改正耶律希周納琳哈喇䝉古語納琳細也哈喇黑色也原作納鄰合刺今改正並為宣慰使都元帥佩虎符四年六月以和林都元帥府兼行宣慰司事五年四月遣推勒特穆爾䝉古語推勒極也特穆爾鐵也原作秃剌鉄木而今改正等犒和林軍八月推勒特穆爾等自和林還言和林屯田宜令軍官廣其墾闢量給農具倉官宜任選人可革侵盗之弊從之七年七月立和林兵馬司武宗本紀大徳十一年七月罷和林宣慰司置行中書省及稱海等處宣慰司都元帥府和林總管府以太師伊徹察喇滿洲語伊徹新也察喇注酒器也原作月赤察兒今改正為和林行省右丞相中書右丞相哈喇哈斯逹爾罕哈喇解見上哈斯䝉古語玉也逹爾罕滿洲語凡有勤勞者免其差役之謂原作哈刺哈孫荅剌罕今並改正為和林行省左丞相仁宗本紀皇慶元年二月改和林省為嶺北省英宗本紀至治三年二月罷稱海宣慰司及萬户府改立屯田總管府文宗本紀至順二年二月以上都留守柰瑪台䝉古語柰瑪八數也台有也原作乃馬台今改正行嶺北行樞宻院事太禧宗禋使錦濟勒唐古特語送布拖之謂原作謹只兒今改正逹朗䝉古語河堤也原作荅鄰今改正逹賚䝉古語海也原作荅里今改正等並知院事順帝本紀後至元三年二月以滿濟勒噶台䝉古語瓔珞也原作馬扎兒台今改正為太保分樞宻院鎮北邊謹案和林為元太祖肇基之地太祖四大鄂爾多䝉古語官也原作斡耳朶今改正世留朔方常以親王鎮守其地統領軍馬捍禦外冦如顯宗為晉王世守北邊者是也自世祖時諸王納延等背叛屢擾和林至車駕親征冦亂始以稍息而其黨尚出沒邊境故嶺北特為重鎮雖當時未建都號而職守甚鉅行省丞相綜治文武當兼有今盛京五部及將軍之職其行樞宻院事及知院事鎮治北邊則即如今之各將軍副都統也又考明宗本紀載帝發北邊沿邊元帥圖埒訥䝉古語燒也原作朶烈揑今改正萬户瑪魯滿洲語瓶也原作買驢今改正等率兵扈行是當時沿邊必各有分鎮之官如今之駐防副都統協領等職而史文闕畧其制不可復考矣明明史職官志南京守備一人協同守備一人南京以守備及叅贊機務為要職守備以公侯伯充之兼領中軍都督府協同守備以侯伯都督充之領五府事叅贊機務以南京兵部尚書領之其治所在中府掌南都一切留守防䕶之事永樂十九年遷都北京命中府掌府事官守備南京節制南京諸衛所洪熈元年始以内臣同守備景泰三年増設協同守備一人南京衛指揮使設官詳京衛凡四十有九分𨽻五都督府者三十有二又親軍衛指揮使司十有七與左府所屬十衛右府所屬五衛前府所屬七衛後府所屬五衛並聽中府節制各衛領所一百一十有八明官制南京中軍都督府留守中衛神䇿衛應天衛和陽衛廣陽衛左軍都督府留守左衛驍騎右衛鎮南衛水軍左衛龍虎衛龍虎左衛瀋陽左衛瀋陽右衛龍江右衛英武衛右軍都督府留守右衛水軍右衛虎賁左衛武徳衛廣武衛前軍都督府留守前衛龍驤衛豹韜衛豹韜左衛龍江左衛飛熊衛天策衛後軍都督府興武衛鷹揚衛江隂衛横海衛每衛有鎮撫司左右中前後千户所謹案明初以鳳陽為中都世宗由興王入繼又以安陸為興都各置留守司官屬而鳳陽承天即安陸均設知府其制仍如列郡與陪京不同惟南京守備以勲臣統率専管江防實即唐東都留守之比然厯朝皆以内臣協同守備寄軍政於閹䜿而公侯伯之為是職者又皆紈袴子弟不諳兵務士卒大都出自市井負販占役買閒其時諸臣雖間以為言而茍且因循卒無整飭以致闒茸驕惰不可復用崇禎中流冦侵軼江北南中將吏日夕張皇惟惴惴焉倖賊之不東下而已留都兵勢積弱未有如明代之尤甚者國家神武開基聲靈赫濯而盛京以發祥重地兵防定制倍極精詳設鎮開屯控扼邊徼皇上覲光揚烈每翠華臨莅秋郊獮閲賞賚優加復屢命増置兵弁修繕甲仗慎選親勲俾膺閫寄規模益昭閎逺矣欽定厯代職官表卷四十八
