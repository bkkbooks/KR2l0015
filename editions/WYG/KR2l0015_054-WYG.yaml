body:
  text: 盛京將軍等官表盛京將軍等官國朝官制盛京將軍一人駐城盛京副都統三人一駐府盛京一駐錦州一駐熊岳城將軍掌鎮撫留都安輯旗民董率文武凡軍師卒戍田莊糧糈之籍疆域之廣輪關梁之要隘咸周知其數以時簡稽而修飭之副都統各守分地以賛其治初順治元年世祖章皇帝定都燕京以内大臣一員副都統二員及每旗駐防章京留守盛京三年改駐防大臣為昂邦章京給鎮守總管印康熈元年改為鎮守遼東等處將軍四年改鎮守奉天等處將軍乾隆十二年改奉天將軍為鎮守盛京等處將軍其副都統二員雍正五年以一員移駐錦州府又増置熊岳副都統一員盛京等處駐防城守尉十人協領十人佐領一百二十四人防禦九十有二人驍騎校二百有四人凡盛京駐防之地自將軍所治外其所屬各城曰興京曰撫順曰遼陽曰海城曰葢州曰開原曰鐡嶺曰復州曰寧海曰旅順水師營曰岫巖城曰鳳凰城曰錦州府曰熊岳曰小凌河曰寧逺曰中前所曰中後所曰廣寧曰巨流河曰白旗堡曰小黒山曰閭陽驛曰義州邊門十六曰威逺堡曰英峩門曰鹻厰曰旺清曰靉河曰鳳凰城右俱屬將盛京兵部而軍兼統之曰法庫曰松嶺子曰新臺曰梨樹溝曰白石嘴曰明水塘曰彰武臺曰清河曰白土厰曰九關臺右俱將軍所屬皆設兵駐守置城守尉協領佐領防禦等官各視兵數多寡定額有差以掌巡防譏察之事又有委官一百人皆以七品冠帶食領催前鋒錢糧乾隆二十七年置盛京將軍衙門主事一人筆帖式十有一人各處駐防衙門筆帖式十有三人倉官六人分掌行遣案牘及糧儲出納之事吉林將軍一人駐吉林城副都統五人一駐吉林一駐寜古塔一駐白都訥一駐三姓地方一駐阿勒楚喀將軍掌鎮守吉林烏喇等處地方繕固鎮戍綏和軍民秩祀山川輯寧邊境副都統各守分地以賛其治初順治十年始設昂邦章京於寧古塔以鎮其地康熈元年改昂邦章京為鎮守寧古塔等處將軍十五年以寧古塔將軍移駐吉林乾隆二十二年改為吉林將軍吉林副都統康熈十五年置三十一年移駐白都訥雍正三年復置寧古塔副都統順治十年置白都訥副都統康熈三十一年自吉林移駐三姓副都統雍正十年置阿勒楚喀副都統乾隆二十一年置又初置有拉林副都統一員乾隆三十四年省吉林等處駐防總管一人協領二十有五人参領一人佐領一百十九人防禦八十有一人驍騎校一百十六人管水手四品官二人五品官二人六品官二人凡吉林駐防之地自將軍所治外其所屬各處曰寧古塔曰白都訥曰三姓曰阿勒楚喀曰拉林曰打牲烏喇曰伊屯曰鄂謨和索囉邊門四曰巴延鄂佛囉曰伊屯曰克爾素曰布爾圖庫蘇巴爾漢皆設兵駐守置總管協領参領佐領防禦等員各視兵數多寡定額有差職掌與盛京各駐防同吉林理事同知一人獄官一人吉林將軍衙門主事一人筆帖式十有二人白都訥副都統衙門委署主事一人各處駐防衙門筆帖式二十有八人管臺站筆帖式十有八人管倉筆帖式十有二人倉官七人助敎十人同知掌聼旗民獄訟之事主事等官分掌文案郵傳倉儲敎習之事初雍正四年設永吉州於吉林長寧縣於白都訥置知州知縣吏目典史等官俱屬奉天府乾隆元年省長寧縣併入永吉州十二年罷永吉州改設吉林理事同知𨽻於吉林將軍焉黑龍江將軍一人駐齊齊哈爾城副都統三人一駐齊齊哈爾一駐墨爾根一駐黒龍江將軍掌鎮守黑龍江等處地方均齊政刑修舉武備綏徠部族控制東陲副都統各守分地以賛其治初康熈二十二年始置黒龍江將軍及副都統二十九年移黒龍江將軍駐墨爾根三十八年復移駐齊齊哈爾城齊齊哈爾副都統康熈三十七年自墨爾根移置墨爾根副都統康熈四十九年置黑龍江副都統康熈二十二年置黑龍江等處駐防副都統銜總管一人城守尉一人協領十有六人總管七人参領一人副總管二十有六人佐領二百三十八人防禦二十有四人驍騎校二百三十一人䕶軍校二人管水手四品官四人五品官二人六品官四人管造船四品官一人五品官一人六品官一人凡黑龍江駐防之地自將軍所治齊齊哈爾外其所屬各處曰墨爾根與黒龍江齊齊哈爾各置水師營曰呼倫布雨爾曰呼蘭城曰布特哈曰博爾多皆設兵駐守沿邊卡倫四十有六皆遣官率兵防戍置城守尉總管副總管協領恭領佐領防禦等官各視兵數多寡定額有差職掌與盛京吉林各駐防同黑龍江將軍衙門主事一人理刑主事一人銀庫主事一人筆帖式十有二人各處駐防衙門筆帖式二十人管臺站筆帖式三十有三人六品官二人臺站官二人管倉筆帖式六人管官屯七品官四人分掌刑名賦餉郵驛倉儲之事雍正四年於黑龍江置泰寧縣知縣七年省凡旗民獄訟之事改設理刑主事治之厯代建置謹案我朝定制於各省分設八旗駐防官兵以將軍副都統為之董轄雖所司繁簡略異而職任無殊惟盛京及吉林黑龍江三處將軍俱以肇邦重地俾之作鎮留都統治軍民綏徠邊境其政務較繁而委任亦最為隆鉅核其職掌蓋即前代諸京留守之比與各省將軍之但膺閫寄者不同洪惟我國家肇造大東發祥於鄂多理城相宅於赫圖阿拉丕基思輯遂啟興京洎夫聖武布昭版章式廓經營遼瀋成邑成都天付有家誕受方國爰於盛京等處分置節帥率師鎮守西自呼倫布雨爾北循興安嶺黑龍江而東南跨鴨緑江地方六千里各因形勢險要列屯置戍以控扼之兵防周宻條畫詳明其諸部落舉族内附者久已編甲入户同於氓𨽻而沿邊以外歸化入貢則有若寧古塔東北東南之竒雅喀喇班吉爾漢喀喇赫哲喀喇費雅喀竒勒爾等近者千五六百里逺者四五千里直至於大東海皆歲獻土物以時遣官頒賜逺至邇安廣輪有截豐水詒謀夐軼萬古以前代陪京制度相凖如唐之河南太原宋明之應天皆地當腹裏所謂留守守備者不過少異其名實與他州郡無别若北魏之平城元之和林皆其開國舊都而六鎮外攜諸藩内訌説俱詳後控制殊為無策至遼之東京正在遼陽而東京統軍司所屬幅􅊷僅至長春近今白都訥地亦乏長撫逺馭之畧惟金代上京㑹寧府在今吉林城東寧古塔西色齊窩集左右與本朝剏業之地延袤頗合然當時雖分建諸路府州而生聚未繁海陵遷燕以後命毁㑹寧府舊宫殿及諸大第宅仍夷其址而耕種之頓忘舊本世宗始復行營葺屢移諸明安穆昆以實上京而撫輯失宜逮其末季乣軍潰叛國勢浸弱史所稱東極濟喇敏滿洲語厚也原作吉黑迷今改正烏達噶䝉古語次數也原作兀的改今改正諸野人之境北自夫餘舊作蒲與今改正路之北三千餘里和羅和屯滿洲語和羅山谷也和屯城也原作火魯火疃今改正穆昆為邊者亦徒有虚名其規模狹隘本不足擬議萬一而設官守衛沿革有因難以槩略今具列如左其未建陪京官職不備者則亦闕而不著云三代馬端臨文獻通考成王命君陳分正東郊成周亦留守之始謹案周以周公君陳畢公相繼分正東都後世因尚書有尹兹東郊之文遂以為京尹所自始然洛邑有化導殷頑控置東夏之任故當時皆以同姓懿親逓臨斯土其官守綦鉅非僅京尹之専司民事者所可比擬惟今盛京將軍之職較為近之厯代留京之有留守守備其權輿實本於此今故互著於篇而中間因革得失之由亦緣以附見焉秦未置漢文獻通考光武以扶風都尉部在雍縣將兵䕶衛園陵故俗稱雍營後漢書安帝本紀永初四年二月乙丑初置長安雍二營都尉官百官志安帝以三輔有陵園之守乃復置右扶風都尉京兆虎牙都尉西羌傳永初四年春置京兆虎牙都尉於長安扶風都尉於雍如西京三輔都尉故事謹案三輔黄圖京輔都尉治華隂左輔都尉治髙陵右輔都尉治郿水經注渭水又東逕郿縣故城南引地理志曰右輔都尉治渭水東南逕髙陵縣故城北引地理志曰左輔都尉治蓋三輔都尉在西漢本典畿輔重兵自光武罷郡國都尉并職太守而兵事亦領之京兆尹及左馮翊右扶風蓋如後世以京尹兼留守之比厥後復置郡尉専以䕶衛陵園分地屯守則又如今駐防副都統之職其有京兆扶風而無馮翊者長陵陽陵二縣俱已移屬京兆故也又考南匃奴傳左校尉閻章右校尉張國將黎陽虎牙營士屯五原曼栢馮柱又將虎牙兵留屯五原然則虎牙營本以衛園寢而為居留重兵故又時遣屯戍也三國未置晉未置宋齊梁陳未置北魏顧祖禹史畧初魏都平城於緣邊置六鎮曰武川曰撫㝠曰懷朔正光六年改置朔州曰懷荒正光末改置蔚州曰柔元曰禦夷皆恃為藩衛資給優厚遷洛以後邊任益輕將士失所互相仇怨正光四年懷朔鎮民挾忿殺其鎮將遂反諸鎮響應冀并以北竝為盗區魏書羅斤列傳除柔元鎮都大將荀愷列傳遷冠軍將軍柔元懐荒武川鎮大將宇文福列傳除散騎常侍都督懷朔沃野武川三鎮諸軍事征北將軍懷朔鎮將慕容契列傳轉都督禦夷懷荒二鎮諸軍事平城鎮将又轉都督朔州沃野懷朔武川三鎮三道諸軍事後將軍朔州刺史楊椿列傳除都督朔州撫㝠武川懷朔三鎮三道諸軍事平北將軍朔州刺史楊鈞列傳轉懷朔鎮將陽固列傳懷荒鎮將萬貳北史源懷列傳詔為使持節加侍中行臺巡行北邊六鎮賑給貧乏兼採風謡自京師遷洛邊朔遥逺懷銜命撫導存恤有方懷朔鎮將元尼須貪穢狼籍懷表劾之乃案視諸鎮左右要害之地可以築城置戍及儲糧積仗之宜凡表五十八條宣武並從之謹案北魏自道武帝破蠕蠕列置降人於漠南東至濡原西暨五原隂山竟二千里分為六鎮皆在代京之北及孝文遷洛以後平城故都實藉為屏蔽如今吉林黑龍江之控制東陲以作留都拱衛也當時備置兵戍用資守禦其鎮都大將鎮大將蓋如今各駐防副都統之比鎮將則如今城守尉防禦之比而行臺一官持節巡行彈壓訓練所掌較重則即今將軍之職任規畫本為盡善特太和之季邊任漸輕鎮將多不擇人貪汚聚歛無所不至而六鎮兵卒多見擯抑有同奴𨽻邊人解體武備益弛馴致羣盗並起亦由措置乖方有以釀成亂階耳北齊未置後周未置隋未置唐舊唐書順宗本紀貞元四年十二月以兵部尚書王紹為東都留守憲宗本紀元和元年十一月以吏部侍郎趙宗儒為東都留守東畿汝都防禦使三年五月勅東都畿汝州都防禦使及副使宜停所管將士三千七百三十人隋畿汝界分留守及汝州防禦使分掌之八月復置東都防禦兵七百人九年十月以尚書左丞吕元膺檢校工部尚書東都留守舊例命留守賜旗甲與方鎮同及元膺受命不賜諫官援華汝夀三州例有賜居守之重不宜獨闕上曰此三處亦宜停賜十年十二月東都留守吕元膺請募置三河子弟以衛宫城十二年五月以尚書左丞許孟容為東都留守充都畿防禦使十三年三月以同州刺史鄭絪為東都留守都畿汝防禦使穆宗本紀長慶二年七月以前義武節度使陳楚為東都留守東畿汝防禦使本朝故事東都留守罕用武臣今用楚以李穽擾汴宋故也八月以綘州刺史崔宏禮為河南尹兼東畿汝防禦副使敬宗本紀寳厯二年八月以崔從檢校吏部尚書東都留守東畿汝都防禦使文宗本紀大中十一年六月以特進檢校司空杜悰充東都留守東畿汝都防禦使新唐書地理志開元十一年太原府置尹及少尹以尹為留守少尹為副留守舊唐書元宗本紀開元二十九年以左金吾大將軍裴寛為太原尹北京留守王思禮列傳為太原尹北京留守河東節度使裴遵慶列傳子向為太原少尹兼河東節度副使謹案唐代東京留守掌飭治武