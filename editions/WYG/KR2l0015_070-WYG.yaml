body:
  text: 宗室封爵表宗室封爵國朝宗室封爵十有四等一和碩親王二世子三多羅郡王四長子五多羅貝勒六固山貝子七鎮國公八輔國公九不入八分鎮國公十不入八分輔國公十一鎮國將軍十二輔國將軍十三奉國將軍十四奉恩將軍天演宗派以顯祖宣皇帝本支為宗室伯叔兄弟之支為覺羅宗室東金黄帶覺羅東紅帶諸王授封以素行為封號和碩親王親王世子皆金寶龜紐多羅郡王餙金銀印麒麟紐皇子生十五歳由宗人府請封其爵級出自欽定親王郡王適福晉所生子二十歳後由宗人府請考試親王適子奉特㫖始封世子其未封世子者與餘子同授封爵餘子考授不入八分公天命年間立八和碩貝勒共議國政各置官屬凡朝㑹燕饗皆異其禮准入賜賚必均及是為八分其有功加至貝子八分如有過降至公仍不入八分郡王適子奉特㫖始封長子其未封長子者亦與餘子同授封爵餘子考授一等鎮國將軍貝勒適子降襲貝子餘子考授二等鎮國將軍貝子適子降襲鎮國公餘子考授三等鎮國將軍鎮國公適子降襲輔國公餘子考授一等輔國將軍輔國公適子世襲餘子考授二等輔國將軍不入八分鎮國公適子降襲不入八分輔國公不入八分輔國公適子降襲三等鎮國將軍餘子均考授三等輔國將軍一二三等鎮國將軍適子各降襲一二三等輔國將軍餘子均考授三等輔國將軍一二三等輔國將軍適子各降襲一二三等奉國將軍餘子均考授三等奉國將軍一二三等奉國將軍適子均降襲奉恩將軍餘子均考授奉恩將軍其奉恩將軍既無可降之品級將奉恩將軍適妻所生子但准一子考試承襲奉恩將軍餘子停封為間散宗室酌量人才優者奏請考試准食雲騎尉俸凡王爵由軍功得者世襲罔替由恩封者以次遞降以功加封者自奉恩將軍遞加一等至和碩親王親王有功酌賞金銀其以過降封者自和碩親王遞降一等至奉恩將軍無可降則為閒散宗室康熙二十七年定考試法王貝勒以下至奉恩將軍之子應授封者考試國語及馬步射優者封應得之爵平者降一等劣者降二等封授乾隆八年定親王側福晉子考授二等鎮國將軍郡王側福晉子考授三等鎮國將軍貝勒側室子考授一等輔國將軍貝子側室子考授二等輔國將軍鎮國公側室子考授三等輔國將軍輔國公側室子考授一等奉國將軍親王妾媵子考授三等輔國將軍郡王妾媵子考授三等奉國將軍貝勒貝子妾媵子均考授奉恩將軍其餘妾婢所生子為閒散宗室不授封十一年定考試法其學業平庸者降等封授奉恩將軍無級可降如考試降等仍授奉恩將軍停俸三年又定世子之適子恩封不入八分公如未恩封與餘子同授封爵餘子考授一等鎮國將軍側福晉子考授三等鎮國將軍妾媵子考授三等奉國將軍長子之適子恩封一等鎮國將軍如未恩封亦與餘子同授封爵餘子考授二等鎮國將軍側福晉子考授一等輔國將軍妾媵子考授奉恩將軍三十九年又定親王世爵遞降之法親王遞降至鎮國公郡王遞降至輔國公貝勒遞降至未入八分鎮國公貝子遞降至未入八分輔國公鎮國公遞降至一等鎮國將軍輔國公遞降至一等輔國將軍俱世襲罔替四十七年奉㫖王貝勒貝子公之子嗣及宗室年已及歲者俱照䝉古王公台言塔布囊之例分别給與三四品頂帶厯代建置謹案自三代盛王莫不封建宗室以為藩屏後世分王子弟法制相沿為建國之首務然或泥子古而不知裁制或襲其名而徒事虚文流弊不同而其失均也漢鑒秦孤立之弊封樹子弟裂土分茅諸侯王大者至據名城數十尾大不掉遂啟七國之變晉代懲魏之失分封諸王各予國兵跨州連郡其後八王搆亂骨肉相殘至傾國祚明太祖不鑒前轍封諸子於外皆在沿邊險要之地厚給䕶衛以致燕王生心奪嫡甫一𫝊而變起蕭牆其失在於封植太過漢景帝始謀弱諸侯王減削其官武帝從主父偃之謀令王國分邑以侯子弟作左官之律設附益之條諸侯惟得衣租食税不與政事光武中興無變前制魏文猜防諸弟雖有王侯之號不得比於匹夫南北朝諸王皆在京師其出典方鎮者率受制於籖帥至衣食不得自主唐代諸王有授節度大使兵馬元帥者亦僅屬虛名諸嗣王雖襲舊封授官僅得别駕司馬而中葉以後諸王多不出閣宋氏爵不世襲恩無旁推諸王子孫再傳僅得三班奉職已同凡庶明自永樂以後各王府雖列置諸州禁防至嚴督撫以及府縣官皆得縁事侵刻其失又在于禁約太甚要皆泥於封建之説而無以善處之故于睦族敦本之道皆未有能得其中者我朝緜瓞𤓰之緒篤行葦之仁封爵世及列邸京師而庸勲親親並行不悖仁至義盡實為曠古之所未有考宗室王公封爵雖與官制不同而列代史志及杜氏通典皆系之職官一門今從其體例詳加詮次由今溯古庶于往代展親厚薄之殊得以考鏡得失益以見國家敦敘宗支興仁迪教度越前代所由以廣一世仁讓之風而鞏億載磐石之固也三代史記禹本紀禹為姒姓其後分封用國為姓故有夏后氏有扈氏有男氏斟尋氏彤城氏褒氏費氏杞氏鄫氏辛氏冥氏斟氏戈氏殷本紀殷為子姓其後分封以國為姓有殷氏來氏宋氏空桐氏稚氏北殷氏司馬貞索隱系本作髦氏又有時氏蕭氏黎氏然北􅇻氏葢秦寧公所伐亳王湯之後也目夷氏春秋左氏僖公五年傳宫之竒曰太伯虞仲太王之昭也虢仲虢叔王季之穆也僖公二十四年傳管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也邘晉應韓武之穆也凡蔣邢茅胙祭周公之𦙍也襄公二十九年傳叔侯曰虞虢焦滑霍揚韓魏皆姬姓也昭公二十六年傳王子朝曰武王成康並建母弟以蕃屏周亦曰吾無專享文武之功昭公二十八年傳昔武王克商光有天下其兄弟之國者十有五人姬姓之國者四十人皆舉親也荀子儒效篇周公立七十一國姬姓獨居五十三周之子孫茍不狂惑者莫不為天下之顯諸侯史記漢興以來諸侯年表周封五等公侯伯子男然封伯禽康叔於魯衛地各四百里親親之意褒有徳也太公于齊兼五侯地尊勤勞也武王成康所封數伯而同姓五十五地上不過百里下三十里以輔衛王室謹案周同姓之封最廣左氏云姬姓四十人荀子儒效篇稱周公立七十一國姬姓獨五十三人焉史記謂同姓五十五國殆武王克商其始受國者止四十人而周公成康俱有所増益歟三代之時天子之號為王而子弟之封者為侯秦漢以後天子之號為帝而子弟之封者為王杜佑通典云漢爵二等曰王曰侯王子而封為王者實古之諸侯也故謂之諸侯王然則三代之諸侯與今之王雖爵名不同而實則一也故表於三代首列諸侯以當今之親王云周禮地官載師以家邑之田任稍地以小都之田任縣地以大都之田任畺地鄭康成注家邑大夫之采地小都卿之采地大都公之采地王子弟所食邑也賈公彦疏春秋之義言弟者皆王之同母弟則母弟與王之庶子與公同食百里地在畺稍疏者與卿同食五十里地在縣又疏者與大夫同食二十五里在稍禮記王制孔頴逹疏王之子弟有同母異母有親疏之異親寵者封之與三公同平常者與六卿同疏逺者與大夫同謹案周初分封同姓以為諸侯至後王子弟不得封于畿外而于畿内予之采地其制雖不可詳考而見于先儒之説者如此盖周初諸侯皆佐文武定天下者故封為列國使之傳世相襲此即今日由軍功王者世襲罔替之義後王子弟授采邑於畿内而以三等為隆殺之差此即今日由恩封王者以次遞殺之義也白虎通樂記曰武王克殷反商下車封夏后氏之後於杞殷人之後於宋封王子比干之墓釋箕子之囚天下太平乃封親屬者示不私也即不私封之何普天之下莫非王土率土之濱莫非王臣海内之衆已盡得使之不忍使親屬無短足之居一人使封之親親之義也以尚書封康叔據平安也王者始起諸父昆弟與已共財之義故可與共土一説諸父不得封秦未置史記秦始皇本紀二十六年秦初并天下丞相綰等言諸侯初破燕齊荆地逺不為置王毋以鎮之請立諸子始皇下其議羣臣羣臣皆以為便廷尉李斯議曰周文武所封子弟同姓甚衆然後屬疏逺相攻擊如仇讐周天子弗能禁止今海内賴陛下神靈一統皆為郡縣諸子功臣以公賦税重賞賜之甚足易制天下無異意則安寧之術也置諸侯不便始皇曰廷尉議是分天下以為三十六郡郡置守尉監謹案秦爵二十十九闗内侯二十徹侯但以賞有功而不以封同姓子弟其諸子自太子以外或號為君如安國君是也或但稱公子如公子將閭公子嬰是也漢荀悦漢紀高帝紀六年春正月丙午立劉賈為荆王王五十三縣高帝兄弟四人長曰伯早卒追號曰武哀侯封子信為刮羮侯次兄曰喜字仲立仲為代王弟曰交從上征伐有功立交為楚王長庶子肥為齊王王七十縣武帝紀元朔二年正月令諸侯王得以邑土分子弟于是藩國子弟畢侯矣平帝紀元始元年立故東平王雲太子開明為王孫故桃鄉頃侯子成都為中山王封宣帝元孫信三十六人為列侯自漢初至此王子侯者凡四百八十人令諸侯王闗内侯列侯無子有孫者若同産子皆得為嗣漢書諸侯王表漢興之初懲亡秦孤立之敗于是割裂疆土尊王子弟大啟九國武帝施主父之䇿下推恩之令使諸侯王得分户邑自封子弟不行黜陟而藩國自析自此以來皇子始立者大國不過十餘城蔡邕獨斷漢興以皇子封為王者得茅土其他功臣及鄉亭他姓公侯各以其户數租入為限不受茅土亦不立社也漢制皇子封為王者其實古諸侯也周末諸侯或稱王而漢天子自以皇帝為稱故以王號加之總名諸侯王子弟封為侯者謂之諸侯西京雜記梁孝王入朝與上為家人之讌乃問王諸子王頓首謝曰有五男即拜為列侯賜與衣裳器服王薨又分梁國為五進五侯皆為王三輔黄圖漢儀冊封諸王必於祖廟冊命之示不敢專也王應麟玉海高祖羮頡侯信等三人高后朱虛侯章等三人孝文管共侯罷軍等十四人景帝平陸侯禮等七人武帝一百七十八人元朔元年前十三人兹侯明等至淮陵侯定國元朔二年後一百六十五人梁共王子張梁侯仁一人菑川懿王子龍邱侯代等十三人又諸王子元侯何等四人城陽共王子雷侯豨一人東莞侯吉等十二人又頃王子昌侯麥二十人趙敬肅王子尉文節侯丙等十八人又六人不得封年中山靖王子廣望節侯忠等二十人廣川恵王子蒲領候嘉等四人又又二人不得封年又繆王子井侯甘等二人河間獻王子平城侯禮等十人又一人不得封年濟北正王子安陽侯樂等七人又式王子四人代共王子离石侯綰等九人齊孝王子博陽侯就等十人又一人不得封年魯共王子寧陽節侯恬等五人長沙定王子路陵侯童等十一人衡山王子一人膠東康王子皇虞侯建等三人謹案玉海此條葢約漢書王子侯表云河間獻王子平城侯禮等十人又一人不得封年今考表載河間獻王子自沈陽侯自為不得封年外尚有兹侯明等十一人玉海云十人者誤又玉海云濟北式王子四人今考表載五人四字亦誤後漢書百官志皇子封王其郡為國列侯所食縣為侯國本注曰承秦爵二十等為徹侯金印紫綬以賞有功大者食縣小者食鄉亭得臣其所食吏民後避武帝諱為列侯武帝元朔元年令諸王得推恩分衆子土國家為封亦為列侯謹案漢同姓封爵二等曰王曰侯而侯則有縣侯鄉侯亭侯之别漢書王子侯表凡封侯而非縣名皆鄉亭侯也高帝封植過制遂卒致叛亂其後下推恩之令而支庶畢侯班固作王子侯表稱其建業承序以廣親親考其實則藉以銷其尾大之釁意不在乎展親也當時作左官之律設附益之條抑損减黜科禁日嚴夫始則縱以驕奢繼則多其猜忌豈非立法之未善哉漢書文帝本紀四年五月復諸劉有屬籍家無所與元帝本紀初元元年夏四月賜宗室子有屬籍者馬一匹至二駟成帝本紀建始元年二月賜宗室有屬籍者錢帛各有差謹案漢時宗室疏屬其推恩之令見于史者如此特希闊一時之舉與今宗室月有養贍歲有禄米其恩意之厚薄逈殊矣後漢書光武帝本紀建武十三年二月丙辰詔曰長沙王興真定王得河間王邵中山王茂皆襲爵為王不應經義其以興為臨湘侯得為真定侯邵為樂成侯茂為單父侯其宗室及絶國封侯者凡一百三十七人丁巳降趙王良為趙公太原王章為齊公魯王興為魯公十五年封皇子輔為右翊公英為楚公陽為東海公康為濟南公蒼為東平公為淮陽公荆為山陽公衡為臨淮公焉為左翊公京為琅琊公十七年進右翊公輔為中山王其餘九國公皆即舊封進爵為王謹案兩漢宗室之封有王有侯惟建武十三年降封趙等三國為公光武諸子初封亦為公而同姓子弟無為王者至十七年諸子皆進爵為王趙王良傳建武十三年降為趙公後薨子節王栩嗣至齊魯二王傳又不言降封葢亦皆于十七年進爵矣後漢書孝明八王列傳彭城靖王恭永平九年賜號靈夀王樂成靖王黨永平九年賜號重熹王章懷注取其美名也東觀記曰賜號未有國邑也謹案漢諸王皆以郡為國惟後漢靈夀重熹二王初皆以美名為王號其後乃建為國此後世以美名為王號之始後漢書東平王蒼列傳永平十一年帝遣使手詔賜國中傅曰今送列侯印十九枚諸王子年五歲以上能趨拜者皆令帶之後漢書孝順帝本紀永建元年正月甲寅詔宗室以罪絶者皆復屬籍洪适𨽻續中山相薛君成平侯劉君斷碑趙氏誤以劉君為成平侯相詳其額初無相字此葢王子侯也西京列侯其傳國皆有世次東京枝葉既不繁而史筆又簡畧其書于䇿者不過如東海王傳云王弟二十二人皆為列侯爾三國三國蜀志二主妃子列傳劉永先主子後主庶弟章武元年六月立永為魯王建興八年改封甘陵王劉理亦後主庶弟章武元年六月封為梁王建興八年改為安平王三國魏志文帝本紀黄初三年三月乙丑立齊公叡為平原王帝弟鄢陵公彰等十一人皆為王初制封王之庶子為鄉公嗣王之庶子為亭侯公之庶子為亭伯三國魏志武文世王公列傳魏世王公既徒有國土之名而無社稷之實又禁防壅隔同于囹圄位號靡定大小歲易魏文帝改封諸王為縣主詔先王建國隨時而制漢祖増秦所置郡至光武以天下損耗并省郡縣以今比之益不及焉其改封諸王皆為縣主謹案曹魏猜防宗室裴松之謂公國徒有老兵百餘人以衛其國又設防輔監國之官以伺察之王侯皆思為布衣而不得則凉薄寡恩莫甚於此惟定庶子遞降之制為能監前代而得損益之宜故晉因之而不變焉三國吳志吳主權列傳太和元年正月立故太子和為南陽王居長沙子奮為齊王居武昌子休為琅琊王居武林宗室列傳孫皎子允封丹陽侯孫奐封沙羡侯孫賁封都亭侯子隣進封都鄉侯孫翊子松為都鄉侯孫韶封建徳侯孫楷臨城侯孫桓封丹徒侯晉杜佑通典晉亦有王公侯伯子男六等之封惟安平公孚萬户制度如魏諸王其餘縣公邑一千八百户地方七十五里大國侯邑千六百户地方七十里次國侯邑四千户地方六十五里大國伯邑千二百户地方六十里次國伯邑千户地方五十里大國子邑八百户地方五十里次國子邑六百户地方四十里男邑四百户地方四十里武帝受禪之初封建子弟為王二十餘人以郡為國邑二萬户為大國置上中下三軍兵五千人邑萬户為次國置上軍下軍兵三千人邑五千户為小國置一軍兵千五百人王不之國官於京罷五等之制咸寧三年詔徙諸王公皆歸國更制户邑非皇子不得為王而諸王之支庻皆皇家之近属至親亦各以土推恩受封其大國次國始封王之支子為公承封王之支子為侯繼承封王之支子為伯小國始封王之支子及始封公侯之支子皆為男非此皆不得封大國始封之孫罷下軍曽孫又罷上軍次國始封子孫亦罷下軍其餘皆以一軍為常大國中軍二千人上下軍各千五百人次國上軍二千人下軍千人其未之國者大國置守土百人次國八十人小國六十人郡侯縣公亦如小國冊府元龜西晉諸王皆主兵臨州以威勢相陵干戈並搆墜于屠滅葢有漸爾謹案晉本紀泰始元年封王二十七人六年立皇子為王咸寧三年又立齊王子二人為王葢鑒于魏之朘削宗室而侈廣其制如此當時許其自選官屬而王家人衣食御府别給之其寵異之者甚至不旋踵而諸王操戈相向以至亂亡劉宏傳所謂災難延于宗子自載籍以來骨肉之禍未有若此之甚者非獨惠帝不君威權下移實由封植太過權力相軋以釀其釁葢矯慕封建之虚名未有不受其禍者也宋齊梁陳通典宋氏亦用晉制惟大小國皆有三軍凡王子為侯者食邑皆千户通典梁封爵亦如晉宋之制南史梁武帝諸子列傳昭明太子統長子東中郎將南徐州刺史華容公歡封豫章郡王次子枝江公譽封河東郡王曲江公詧封岳陽郡王謹案通典謂宋封爵如晉制又謂梁如晉宋之制然晉時諸王支庶備有五等之封而宋梁自王以下見於史者惟王子侯而已此外惟梁時昭明太子諸王嘗封公而他未有聞焉冊府元龜陳因梁制有親王嗣王藩王之制親王起家則為侍中皇太子冡嫡封王起家依諸王餘子並封公起家中書郎諸王子并諸侯世子起家給事江左承西晉諸王開國並以户數相差為大小三品陳自永安訖于禎明惟衡陽王昌特加至五千户其餘不過二千小國至千户謹案宋齊二代猜忌骨肉諸王出鎮受制典籖梁武鑒于前政優假諸子事力雄强然或坐視君父之難或自搆蕭牆之兵㡬與西晉八王無異考共立國實多慙徳本實已揺徒欲廣樹屏藩終不足為維城之固而封建之無益亦可睹已北魏通典後魏道武皇始元年始封五等至天賜元年減五等之爵始分為四曰王公侯子除伯男之號皇子及異姓元功上勲者封王皇族及始藩王皆降為公諸公降為侯子亦比為差王封大郡公封小郡侯封大縣子封小縣其後復加伯男焉謹案魏時同姓之封自王侯以外見于史者如紇羅封上谷公悉封襄陽公元英賜爵廣武伯陵封襄邑子弼封廣川子比干封吉陽男之屬班班可見其封王者皆以嫡子繼襲其封公侯者在國初則為疎逺之族其後亦皆藩王之支庶大約與宋齊之制不殊但宋齊王子侯皆出于展親之恩而魏時宗室五等之封多出于酬勲之典也北齊通典北齊有王公侯伯子男六等之爵王位列大司馬上非親王則在三公下封内之調盡以入臺三分食一公以下四分食一謹案北齊同姓之封自王以外見于史者平秦王歸彦以功别封長樂郡公又有建國子伏䕶建國侯乂若趙郡王琛初封南趙郡公清河王岳初封清河郡公及廣平公盛陽州公永樂則受封皆在魏世也後周周書明帝本紀武成元年正月封大將軍章武孝公導子亮為永昌公翼為西陽公九月進封輔成公邕為魯國公安成公憲為齊國公秦郡公直為衛國公正平公招為趙國公封皇弟儉為譙國公純為陳國公盛為越國公逹為代國公通為冀國公􅓉為滕國公進封天水郡公廣為蔡國公武帝本紀保定元年四月封孝閔皇帝子康為紀國公皇子贇為魯國公建徳三年正月冊柱國齊國公憲衛國公直趙國公招譙國公儉陳國公純越國公盛代國公逹滕國公逌並進爵為王二月紀國公康畢國公賢鄷國公貞宋國公實漢國公贊秦國公贄曹國公允並進爵為王謹案後周初無王爵雖皇子止封公至建徳三年而文帝以下諸子皆進爵為王惟疎逺者尚為公爵若同姓侯伯子男之封則未有見于史者宇文導初封饒陽縣伯其受封在魏世也隋通典隋開皇中制國王郡王國公郡公縣公侯伯子男凡九等至煬帝惟留王公侯三等餘並廢之皇伯叔昆弟皇子是為親王謹案隋宗室封爵等差不見于史疑亦畧如晉宋之制也唐通典大唐高祖初受禪廣封宗室從弟及姪年始孩童者數十人皆封為郡王太宗即位問侍臣曰徧封宗子于天下便乎尚書右僕射封徳彛對曰不便厯覽往古封王者今日最多兩漢以降惟封帝子及親兄弟若宗室疎逺者非有大功並不得濫叨名器所以别親疎也先朝敦睦九族一切封王爵命既崇多給力役葢以天下為私殊非至公馭物之道也太宗然之于是率以屬疎降等惟有功者數人得王餘並封縣公貞觀二年十二月始議列土之制特進魏徴議曰自隋氏亂離百殃俱起黎元塗炭十不存一始䝉聖帝敷至仁以流元澤沐春風而沾夏雨一朝棄之為諸侯之𨽻衆心未定或致逃亡其未可一也既立諸侯當建社廟禮樂文物儀衞左右頓闕則理必不安粗修則事有未暇其未可二也大夫卿士咸資禄俸薄賦則官府困窮厚歛則人不堪命其未可三也王畿千里征税不多至于貢賦所資在侯甸之外今並分為國邑京師府藏必虛諸侯朝貢無所取給其未可四也今燕秦趙代俱帶蕃夷黠羌旅拒匈奴未滅追兵内地逺赴邊庭不堪其勞將有他變難安易動悔或不追其未可五也十一年六月詔荆王元景等二十一王為諸州都督刺史咸令子孫代代承襲非有大故無或黜免其後並不願行乃止後定制皇兄弟皇子為王皆封國謂之親王太子男封郡王新唐書荆王元景列傳貞觀十一年詔荆州都督荆王元景梁州都督漢王元昌徐州都督徐王元禮潞州都督韓王元嘉遂州都督彭王元則鄭州刺史鄭王元懿絳州刺史霍王元軌虢州刺史虢王元鳯豫州刺史道王元慶鄧州刺史鄧王元裕夀州刺史舒王元明幽州都督燕王靈䕫蘇州刺史許王元祥安州都督吳王恪相州都督魏王泰齊州都督齊王祐益州都督蜀王愔襄州刺史蔣主惲揚州都督越王正并州都督晉王治泰州都督紀王謹所任刺史并功臣令世襲㑹長孫無忌等固辭遂廢不行劉肅大唐新語武徳中以景命維新宗室猶少至三從弟姪皆封為王及太宗即位問羣臣曰遍封宗子於天下便乎封徳彛曰不便厯觀往古封王者當今最多兩漢以降唯封帝子及兄弟若宗室疎逺者非有大功如周之郇滕漢之賈澤並不得濫居名器所以别親疎也太宗曰朕為百姓理天下不欲勞百姓以養已之親也于是疎屬悉降爵為公謹案唐初議復古封建或可或否人持一説蕭瑀直欲裂土而封李百藥則欲俟刑措之教一行登封之禮云畢然後定疆理之制議山河之賞顔師古欲分置王國不得過大間以州縣錯雜而居馬周謂宜賦以茅土疇其户邑必有行材隨器方授皆屬調停之見惟魏徴議以為非便其言可謂切中故節録其文著于篇以見古法之不可泥也新唐書太宗本紀貞觀十一年六月己未以諸王為世封刺史十三年二月庚子停世封刺史謹案唐太宗以諸王為世封刺史未二年而罷則其事之難行太宗亦自知之矣至代宗時大臣奏議請封諸王分領戎帥以威天下此乃無其實而徒務其名非惟難以為屏翰亦不足鳩厥宗矣冊府元龜唐制皇弟兄皆封國謂之親王王之子承嫡者謂之嗣王皇太子諸子並封郡王王子承恩澤者亦封郡王諸子封郡公其嗣王郡王特進王子孫承襲者降封國公謹案唐時宗室之封為二等曰王曰公而王與公又各為二等曰親王曰嗣王曰國公曰郡公詳見唐書宗室世系表兹不具論玉海太和四年七月賜十六宅諸王綾絹二萬疋以内庫充開成二年五月壬申幸十六宅宴諸王三年四月甲午亦如之頒賜有差四年六月庚申幸十六宅宴樂賜錢新唐書宗室世系表唐有天下三百年子孫蕃衍可謂盛矣其初皆有封爵至其世逺親盡則各隨其人賢愚遂與異姓之臣雜而仕宦至或流落于民間甚可歎也謹案唐宗室疎逺者與異姓之臣雜而仕宦甚至流落民間皆立法未善之所致也我朝宗室員額不與庶姓相雜其未仕者皇上又皆特給品秩展親之典􅗥絶往代矣五季冊府元龜五代之制大抵遵於唐室章如愚山堂考索五代宗室諸王大率不能傳世漢周則多追封謹案五代短祚諸王率鮮傳世故王子侯亦無見于史者宋宋史職官志列爵九等曰王曰郡王曰國公曰郡公曰縣公曰侯曰伯曰子曰男分國三等大國二十次國二十小國二百二十文獻通考諸侯王與列侯皆以嫡子嫡孫世襲其所受之封爵茍非有罪者與無後者則爵不奪而國不除此法漢以來未之改也至唐則臣下之封公侯者始止其身而無子孫襲封者然親王則子孫襲封如故雖所謂茅土食邑多為虚名然始所封之國與爵則父殁子繼世世相承宋皇子之為王者封爵僅其身而子孫無問嫡庶不過承䕃入王宫為環衛官亷車節鉞以序而遷如庶姓貴官䕃子入仕之例必須厯任年深齒徳稍尊方特封以王爵而其祖父所受之爵則不襲也國朝㑹要載慶厯四年七月制封宗室乃以皇叔馮翊郡公徳文為東平郡王皇兄允讓為汝南郡王皇弟允良為華原郡王皇姪從謁為頴國公從煦為安國公宗説為祁國公昭成太子孫宗保為建安郡王華王孫宗逹為恩平郡王邢王孫宗望為清源郡王自燕王薨而祖宗之後無有封王爵者至濮安懿王以英宗之故安定郡王以藝祖之故方令世襲然又不以昭穆相承嫡庶為别每嗣王没則擇本宗直下之行尊者承襲于是濮安懿王有二十七子而得嗣封者七人四十六孫而得嗣封者亦七人葢嗣濮王凡十四人纔更兩代耳嗣安定郡王凡二十七人纔更四代耳此例亦古所無也玉海太平興國七年七月十三日甲午封皇子衛王廣平郡王同日拜平章事八年十月戊戌改皇子名己酉封元佐楚元僖陳真宗韓元份冀元傑益十一月甲寅詔宰相序立在親王上以諸王年㓜欲知謙損之道端拱元年二月二十三日封元偓等國公邑一千户謹案宋爵九等而宗室之封見於通考者有王郡王國公郡公縣公侯六等然爵不世襲恩不旁推其恩誼視前代為尤薄其有予以世襲者則又不以子孫相承而以行尊者序繼乖倫序而亂昭穆為自古未有之繆制也玉海紹興二十七年正月詔侍從各舉宗室京朝官材識行治者二人特與召對宋實録景祐二年十一月乙未祀圓丘三聖並侑制詔宗室並轉官自諸司使以下至殿直並換西班官丙午宗室諸司使領刺史者十二人換諸衛大將軍領團練使諸司使十九人換諸衛大將軍内殿承制宗望已下百三十三人並為將軍率府率副率用乙未赦書也先是宗子無遷官法及郊祀侑三聖上表乞推恩故為此制舊自借職十遷乃至諸司副使今副率四遷即遥領刺史八遷即為節度使熙寧二年十一月甲戌十一日中書宻院議宣祖太祖太宗之子皆擇其後一人為宗世世封公補環衛以奉祭祀祖宗􅃝免親將軍以下願出官者聴應舉者依外官條例非􅃝免親更不賜名授從之五年九月癸丑以令鑠為職方員外郎宗正試換文資自令鑠始宋史職官志宗室敘遷之制太子右内率府副率轉太子右監門率府率太子右監門率府率轉右千牛衛將軍右千牛衛將軍轉右監門衛大將軍右監門衛大將軍轉遥郡刺史遥郡刺史轉遥郡團練使繼諸王後見封國公及特㫖即轉正刺史遥郡團練使轉遥郡防禦使繼諸王後見封國公及特㫖即轉正團練使刺史轉團練使團練使轉防禦史防禦使轉觀察使觀察使轉節度觀察留後節度觀察留後轉節度使特㫖轉左右衛上將軍左右衛上將軍節度使轉節度使同中書門下平章事節度使同中書門下平章事轉節度使兼侍中節度使兼侍中謹案此宋時宗室敘遷之制頗似今宗室奉恩將軍以上以功遞加之法然宋時宗室雖王公皆以官敘遷今奉恩以上四等將軍與王公同為封爵其制又不同也遼遼史皇子表徳祖子安天保初以功王東丹國賜號明王皇族表遼太祖建國諸弟窺覦含容誘掖弗忍致辟古聖人猶難之雖其度量恢廓然經國之慮逺矣終遼之世其出于横帳五院六院之間者大憝固有元勲實多謹案遼時有國王郡王而又有兼封二國者如表所載景宗子隆慶進王秦晉之類亦古所未有後世惟金海陵父宗幹嘗封梁宋國王此外無封二國者矣金金史百官志金自景祖始建官屬統諸部以專征伐其官長皆稱曰貝勒滿洲語管理衆人之稱原作孛極烈今改正故太祖以都貝勒嗣位太宗以安班滿洲語安班大臣也原作諳版今改正貝勒居首安班尊大之稱其次曰固倫滿洲語國也原作國論今改正呼嚕滿洲語手背也原作忽魯今改正貝勒固倫言貴呼嚕言總帥也又有固倫貝勒或左右置所謂國相也其次諸貝勒之上則有英實滿洲語宴也原作乙室今改正呼嚕伊喇滿洲語黍也原作移賚今改正愛滿滿洲語部落也原作阿買今改正愛實滿洲語利也原作阿捨今改正烏逹滿洲語買也原作吳迭今改正之號以為陞拜宗室功臣之序謹案金太祖太宗之世諸子弟未有封王者熙宗天㑹十三年始封宗翰為晉王宗磐為宋王葢宗翰功最高而宗磐為太宗適子太宗舍之而立熙宗故首封之其初親子弟多為貝勒此即今貝勒之號所自昉宗翰由固倫右貝勒為太保領三省事封晉王是王尊于貝勒正與今位次相合而貝勒有安班固倫愛實之號等級不同亦與今貝勒貝子等級相似又金自天眷以後宗室封爵見于表者有國王郡王公三等至奉國上將軍鎮國上將軍輔國上將軍皆從三品武散官與今鎮國輔國奉國三等將軍專為宗室封爵者不同然當時亦以敘遷宗室明時宗室三等將軍其爵號實昉于此云元元史諸王表元興宗室諸王位號無稱惟視印章以為輕重厥後遂有國邑之名而賜印之等猶前日也王圻續文獻通考元制封一字王者按阿穆爾克為魏王之類金印獸鈕兩字王者按托歡為鎮南王之類金印螭鈕次有金印駝鈕金渡銀印駝鈕金渡銀印龜鈕有止用銀印龜鈕等級不同如此又同姓有無爵邑而稱王者但曰宗王謹案元時諸王各有分地歲使人至京師受歲賜其王爵既得傳世相襲而諸王之支庶亦多封為王者但元史疎畧其制度不可詳考耳明明史諸王列傳明制皇子封親王制授金冊金寶禄歲萬石府置官属䕶衛公侯大臣無敢鈞禮親王嫡長子年及十嵗則授金冊金寶立為王世子長孫立為世孫冠服視一品諸子年十嵗則授塗金銀冊銀寶封為郡王嫡長子為郡王世子嫡長孫則授長孫冠服視二品諸子授鎮國將軍孫輔國將軍曽孫奉國將軍四世孫鎮國中尉五世孫輔國中尉六世以下皆奉國中尉其生也請名其長也請婚禄之終身喪葬予費親親之誼篤矣明㑹典親王分封其推恩則有郡王鎮國將軍輔國將軍奉國將軍中尉之差等萬厯七年定例親王之子例封郡王若以支屬嗣者自後長子襲封親王外餘子仍照原封世次授以本等爵級不得冐濫郡王爵郡王無子兄弟及兄弟之子不得請襲違者為冐封謹案明太祖慕古封建之制擇名城大都以王諸子若秦西安晉太原燕北平皆臨要衝之地環邊萬里匝于三陲自以為磐石之安矣然一傳而靖難兵起遂至奪宗自是以後過為防維諸王就國郡邑吏得持其短長至其宗支繁衍歲禄猥多竭天下之賦不足以供過時不給以致宗人聚謀焚署毆官諸宗命名請婚胥吏得以邀索貧者無以應則沈擱不行婚嫁失時愁怨載道又多取隱僻不祥之字為之制名以寓姍笑禮部明知其然而無䇿以除其弊明政之不綱於此可見矣我國家敦睦宗親恩明誼美諸王之銘勲王室者皆延世無窮矣恩澤啟封者則以次降襲用以辨等差而昭奬勸至閒散宗室月有贍養之銀歲有禄米之給婚喪嫁娶特加恩賜我皇上篤念宗親凡貝勒以下之降襲者皆設為定制令得常保世封又念睿忠親王有贊翊之功特命配享廟庭追諡續封而豫親王肅親王鄭親王克勤郡王子孫亦皆復其原封之號以彰舊烈其果親王等之以罪廢者亦並復其屬籍恩意尤為優浹近復定親王之子給以一品章服郡王貝勒以下以次遞推又詔普給宗室冠帶優加職級新正賜宴乾清宫賞賚豐渥又廣宗室御史及陵寢官員額令咸得以才自効立法之周詳盡善有非三代以後所可㡬及者矣欽定厯代職官表卷六十四
