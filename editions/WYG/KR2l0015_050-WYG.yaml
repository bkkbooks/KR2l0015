body:
  text: 八旗都統表八旗都統國朝官制八旗都統滿洲䝉古漢軍旗各一人從一品副都統旗各二人正二品分掌滿洲蒙古漢軍二十四旗之政令以宣布教養整詰戎兵釐治土田稽覈户口凡八旗次序以鑲黄正黄正白為上三旗正紅鑲白鑲紅正藍鑲藍為下五旗行軍蒐狩以鑲黄正白鑲白正藍四旗居左為左翼正黄正紅鑲紅鑲藍四旗居右為右翼我朝自龍興東土諸部以次削平歸附日衆太祖高皇帝辛丑年始編三百人為一牛彔每牛彔設額真一先是我國出兵校獵不論人數多寡各隨族黨屯寨而行每人各取一矢十人設長一領之其長稱為牛彔額真至是遂以名官尋復定户籍分為四旗曰黄旗曰白旗曰紅旗曰藍旗以純色為辨乙邜年以初設四旗為正黄正白正紅正藍增設鑲黄鑲白鑲紅鑲藍四旗黄白藍均鑲以紅紅鑲以白合為八旗每三百人設一牛彔額真五牛彔設一甲喇額真五甲喇設一固山額真每固山額真設左右梅勒額真二人以佐之天聰八年改梅勒額真以下為章京惟固山額真如故其隨固山額真行營馬兵定為阿禮哈超哈此為驍騎營之始九年分設蒙古八旗旗色官制與滿洲八旗同崇徳二年始立漢軍二旗四年以漢軍二旗分為四旗七年定設漢軍八旗旗色官制與滿洲蒙古八旗同順治十六年鑄給八旗都統二十四印十七年定制固山額真漢字稱為都統梅勒章京漢字稱為副都統雍正元年改八旗都統印滿文固山額真字為固山昻邦漢名如舊凡官職除授公差踐更以上下旗為辨朝祭班列旗籍界止以左右翼為辨京城八旗方位左翼自北而東自東而南鑲黄旗在安定門内正白旗在東直門内鑲白旗在朝陽門内正藍旗在崇文門内右翼自北而西自西而南正黄旗在徳勝門内正紅旗在西直門内鑲紅旗在阜成門内鑲藍旗在宣武門内四周星拱以環衛宸居焉八旗驍騎叅領滿洲旗各五人蒙古旗各二人漢軍旗各五人正三品副驍騎叅領各如叅領之數正四品掌受都統副都統之政令以頒于佐領而行之天聰八年制管甲喇者即為甲喇章京順治八年定甲喇章京漢字稱為恭領滿字如舊康熈三十四年每甲喇增置委署恭領各一人於世爵佐領等員内選用雍正元年改為副叅領七年又增置左右司掌關防叅領旗各二人十三年省八旗佐領滿洲六百八十一人䝉古二百有四人漢軍二百六十六人正四品驍騎校每佐領下一人正六品掌稽所治人户田宅兵籍以時頒其職掌初天命元年始編置滿洲牛彔八年增編䝉古牛彔天聰四年增編漢軍牛彔八年制管牛彔者即為牛彔章京順治十七年定牛彔章京漢字稱為佐領分得撥什庫漢字稱為驍騎校滿文如舊佐領所治以三百人為率丁口滋生則遞有增設今以見數計之滿洲佐領鑲黄旗八十六人内二人半個佐領正黄旗九十三人内一人半個佐領一人兼辦畨子事務正白旗八十六人正紅旗七十四人鑲白旗八十四人鑲紅旗八十六人正藍旗八十四人内一人半個佐領鑲藍旗八十八人内一人半個佐領䝉古佐領鑲黄旗二十八人正黄旗二十四人正白旗二十九人正紅旗二十二人鑲白旗二十四人鑲紅旗二十二人正藍旗三十人鑲藍旗二十五人漢軍佐領鑲黄旗四十一人正黄正白二旗各四十人正紅旗二十八人鑲白旗三十人鑲紅正藍鑲藍三旗各二十九人佐領之制有世襲有公中世襲佐領有四等國初各部落長率其屬來歸授之佐領以統其衆爰及苗裔者曰勲舊佐領其率衆歸誠功在旂常得賜户口者曰優異世管佐領其僅同兄弟族里來歸因授之以職奕葉相承者曰世管佐領其户少丁稀合編佐領兩姓三姓迭為是官者曰互管佐領皆以應襲者引見除授公中佐領則因八旗户口蕃衍於康熈十三年以各佐領撥出餘丁增編佐領使旗員統之有缺則以本旗不兼部務之大臣世爵及五品以上文武官内簡選除授焉滿洲蒙古每佐領下領催五人驍騎二十人弓匠一人鞍匠或鐵匠一人漢軍每佐領下亦領催五人鳥鎗驍騎四十一人擡鹿角兵八人每旗籐牌兵一百人礮手四十人印務叅領滿洲旗各二人蒙古旗各一人漢軍旗各二人於本旗恭領内選充印務章京滿洲旗各八人䝉古旗各四人漢軍旗各六人於佐領驍騎校世職内選充印務筆帖式滿洲旗各八人蒙古旗各四人漢軍旗各六人於生監甲兵内選充隨印外郎滿洲漢軍旗各一人䝉古旗各二人於漢軍官學生内考充掌章疏文移案牘及繙譯行遣之事雍正七年每旗設左右司掌關防叅領章京及司務等員十三年俱省改設印務恭領章京筆帖式員額乾隆元年定謹案今制八旗有值年公署嵗列都統副都統銜名奏請簡派掌八旗㑹理之事選左右翼官校之賢能者分治之領催驍騎掌書鈔各舉職以從其長課事考成嵗終則㑹已結未結之事彚疏以聞所屬之稱職者於每嵗更代日咨本旗以應陞註冊立法最為詳備謹附識於此厯代建置謹案厯代兵制因革紛殊而推其建置之由大抵實同名異其有出于特創無所因襲而足為億萬世法程者則我朝八旗之制是也敬惟國家神武開基龍興之初建旗辨色用飭戎行厥後歸附既衆即按行軍旗色以定户籍先立四旗尋增建為八旗然猶統滿洲蒙古漢軍而合于一迨後户口日繁乃次第編置蒙古漢軍八旗合為二十四旗制度詳備及定鼎京師分田授宅辨方正位在内則有親軍前鋒䕶軍驍騎歩軍之分左外則有各直省駐防之制而悉統之以八旗設官分職教養生成蓋以旗統人即以旗統兵凡在𨽻乎旗者皆可以為兵非如前代有僉派召募之煩而後收兵之用故不見異而遷則其心純壹相觀摩而善則其氣果敢居則環衛周防出則折衝禦侮臂指之使磐石之固洵可超越百代垂治億年規制之善實從來所未有非若他官遞相依仿有沿革之可言謹以周官大司馬職及列史兵志所載詳悉参證惟周之鄉遂出軍兵農合一者立法最為相近秦漢而下改用募軍饋餉日以滋繁兵民不復相習非驕即弱職此之由雖其得失亦有不同而以視今八旗定制俱不啻判若天淵並無可比擬於萬一者求其約畧近似則獨唐之折衝果毅府差相仿佛而北魏之八部大人遼之諸部族節度使金之諸明安穆昆亦猶有大輅椎輪之意謹各加採摭著之於篇而其餘諸代之無可比附者則並闕而不載亦以見聖人首出顯庸剏制其精意所在固有度越古今無能嫓美者爾三代周禮夏官凡制軍萬有二千五百人為軍王六軍軍將皆命卿二千五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長一軍則二府六史胥十人徒百人鄭康成注軍師旅卒兩伍皆衆名也伍一比兩一閭卒一族旅一黨師一州軍一鄉家所出一人将帥長司馬者其師吏也凡軍師不特置選於六官六鄉之吏自卿以下徳任者使兼官焉周禮地官大司徒卿一人小司徒中大夫二人鄉師下大夫四人鄉老二鄉則公一人鄉大夫每鄉卿一人州長每州中大夫一人黨正每黨下大夫一人族師每族上士一人閭胥每閭中士一人比長五家下士一人大司徒之職令五家為比使之相保五比為閭使之相受四閭為族使之相𦵏五族為黨使之相救五黨為州使之相賙五州為鄉使之相賔小司徒之職會萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦鄉大夫之職各掌其鄉之政教禁令州長各掌其州之教治政令之法黨正各掌其黨之政令教治族師各掌其族之戒令政事閭胥各掌其閭之徴令比長各掌其比之治遂人中大夫二人遂師下大夫四人上士八人中士十有六人旅下士三十有二人府四人史十有二人胥十有二人徒百有二十人遂大夫每遂中大夫一人縣正每縣下大夫一人鄙師每鄙上士一人酇長每酇中士一人里宰每里下士一人隣長五家則一人遂人掌邦之野造縣鄙形體之法五家為隣五鄰為里四里為酇五酇為鄙五鄙為縣五縣為遂皆有地域溝樹之以嵗時稽其人民而授之田野簡其兵器教之稼穡以嵗時登其夫家之衆寡及其六畜車輦辨其老㓜廢疾與其施舍者以頒職作事以令貢賦以令師田以起政役遂師各掌其遂之政令戒禁遂大夫各掌其遂之政令縣正各掌其縣之政令徴比以頒田里以分職事掌其治訟趨其稼事而賞罰之鄙師各掌其鄙之政令祭祀酇長各掌其酇之政令里宰掌比其邑之衆寡與其六畜兵器治其政令鄰長掌相糾相受凡邑中之政相贊崔靈恩三禮義宗周制天子六鄉六遂諸侯大國三鄉三遂小國一鄉一遂鄉及遂各萬二千五百家鄉内則立比閭族黨州鄉之名遂内則立鄰里酇鄙縣遂之名俱有六等異其屬官之名者别内外也易祓周禮總義先王軍制調兵必五數出兵必百數五家為比則五人之伍五比為閭則五伍之兩以至五黨為州則五旅之師五州為鄉則五師之軍其積數實起于五人之伍不五數不足以調兵也百人之卒成一小陳五百人之旅成一中陳二千五百人之師成一大陳萬二千五百人之軍成五大陳其積數實起于百人之卒不百數不足以出兵也孔頴達春秋正義家出一人故鄉為一軍天子六軍出于六鄉大國三軍出於三鄉古者用兵天子先用六鄉六鄉不足取六遂六遂不足取公卿采邑及諸侯邦國若諸侯出兵先盡三鄉三遂鄉遂不足然後總征境内之兵漢書刑法志殷周以兵定天下天下既定設六軍之衆因井田以制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有税有賦税足以食賦足以兵陳祥道禮書先王之於家也既以五家為比為鄰積之至萬二千五百家為鄉為遂其於人也既以五人為伍為兩積之至萬二千五百人而又十家為聨以聨其居十人為聨以聨其事如此則居作相友戰守相衛有同心而無離徳也管子相齊使居則五家為􅁤十􅁤為里十里為連十連為鄉出則五人為伍十伍為戎十戎為卒十卒為旅蓋先王之遺制然也謹案我朝八旗之設實剏前古所未有而詳繹立法之意以上稽列代則惟成周之鄉遂制軍其規模頗有相似者蓋周人以田定賦以賦出兵征伐𨽻之司馬伍籍屬之司徒居則為比閭族黨州鄉鄰里酇鄙縣遂以定户役出則為伍兩卒旅師軍以敵王愾其兵即六鄉六遂之民其官即鄉大夫遂大夫州長縣正之屬法令簡而心志壹故其恩足相恤義足相救服容相别音聲相識無事則各安其作息之常有事則戰無不克洵一代之良法也特是周制王畿千里為六十四萬井五百一十二萬家家一夫為五百一十二萬夫以此夫衆而供萬乘之賦為七家而賦一兵則亦未必民皆可戰國家八旗分建教育精詳凡在𨽻籍於旗者無不可以膺折衝之選其風俗淳厚有勇知方視周之盛時較為過之至於設官分職則雖不襲古制而自有相合者如今之都統副都統頗近鄉師鄉大夫遂人遂師遂大夫之職恭領副叅領頗近州長縣正黨正鄙師之職佐領頗近族師閭胥酇長里宰之職驍騎校頗近比長鄰長之職而小司徒所謂以起軍旅以作田役以比追胥以令貢賦者其職掌所在亦復約畧相同仰見聖朝制作建諸天地考諸三王洵所謂揆一源同若合符節者矣周禮夏官司常師都建旗周禮地官遂人若起野役則令各帥其所治之民而至以遂之大旗致之劉熈釋名熊虎為旗旗期也軍將所建象其猛如熊虎與衆期其下也謹案史記天官書正義河皷兩旗左旗九星在河皷左右旗九星在河皷右皆天之旗皷以為旌表又九斿九星在玉井西南則天子之兵旗也故自古聖人皆憲天垂象以旗為莅軍徴衆之物本朝始立八旗其取義實本於此謹附識大畧以明昭代剏建隆規有與天地合其徳者也秦未置漢未置三國未置晉司馬光資治通鑑晉孝武帝太元八年秦王堅拜秦州主簿趙盛之為少年都統胡三省注都統官名起於此謹案秦王堅選良家子年二十以下有材勇者拜羽林郎得三萬餘騎故為趙盛之特設是官以領之與八旗之制本不相合然都統官號實肇見於此故附載以著權輿所自焉宋齊梁陳未置北魏魏書官氏志昭成即位諸方雜人來附者總謂之烏丸各以多少稱酋庶長分為南北部復置二部大人以統攝之時帝弟􅒀監北部子實君監南部分民而治若古之二伯焉太祖登國元年因而不改南北猶置大人對治二部是年置都統長領殿内之兵天興元年十二月置八部大人於皇城四方四維靣置一人以擬八座謂之八國天賜元年十一月以八國姓族難分故國立大師小師令辨其宗黨品舉人才四年增置侍官命取八國良家有器望者充之資治通鑑宋高祖永初三年魏典東西部劉絜營陽王景平元年魏世祖以襄城公盧魯元會稽公劉絜司衛監尉眷散騎常侍劉庫仁等八人分典四部胡三省注四部東西南北四部也魏初置四部大人坐王庭决辭訟以言語約束刻契紀事無囹圄考訊之法犯罪者皆臨時决遣後又有八部大人既得中原建平城為代郡分布八部於畿内魏書太祖本紀登國元年以長孫嵩為南部大人叔孫普洛為北部大人天賜三年發八部男丁築灅南宫魏書賀狄干列傳稍遷北部大人登國初與長孫嵩為對謹案魏書稱北魏初安帝統國諸部有九十九姓至獻帝時七分國人使諸兄弟各攝領之乃分其氏七族之興自此始其後又分南北部又分為南北東西四部各置大人尋又改為八部謂之八國亦設大人以領之其制頗與今八旗相近其各部大人即如今之都統而八國各置大師小師即如今之叅領佐領也特當時規制率畧遷洛以後頓忘舊風八部之在平城者無所統率以致六鎮淪胥政歸高氏代都舊姓竟不能共效干城亦可以見其建置之不善矣至魏以都統長領殿内之兵則都統已為常設之職亦與符秦之以行軍暫置者不同也北齊未置後周馬端臨文獻通考周太祖輔西魏時用蘇綽言始仿周典置六軍籍六等之民擇魁健材力之士以為之首盡蠲租調而刺史以農隙教之合為百府每府一郎將主之分為二十四軍開府各領一軍大將軍凡十二人每一將軍統二開府一柱國主二大將軍復加持節都督以統焉凡柱國六員衆不滿五萬人謹案後周始仿三代寓兵於農之意剏設府兵雖其初亦籍民為之與今八旗之制不合然其上下統治之法亦頗有相近者蓋郎將主一府如今之佐領開府領一軍如今之恭領而柱國大將軍則今之都統副都統也隋隋書百官志親衛府置開府一人有長史司馬録事及倉兵等曹参軍法曹行参軍各一人行参軍三人諸府皆領軍坊每坊置坊主一人佐二人每鄉團置團主一人佐二人煬帝即位改諸鷹揚府驃騎為鷹揚郎將車騎為鷹揚副郎將鷹揚每府置越騎校尉一人掌騎士歩兵校尉二人領歩兵又改副郎將並為鷹撃郎將文獻通考隋兵制仍周府兵之舊而加潤色諸府之兵有郎將副將坊主團主以相統治又别置折衝果毅此府兵之大畧也謹案隋仍用府兵之制其郎將以下諸官與後周畧同惟坊主團主則後周所未及蓋使各掌其坊團之事正如周官之有比長鄰長也唐新唐書兵志武徳初始置軍府以驃騎車騎兩将軍府領之析關中為十二道皆置府置將副各一人以督耕戰以車騎府統之六年以天下既定遂廢十二軍改驃騎曰統軍車騎曰别將居嵗餘十二軍復而軍置將軍一人軍有坊置主一人以檢察户口勸課農桑太宗貞觀十年更號統軍為折衝都尉别將為果毅都尉諸府總曰折衝府凡天下十道置府六百三十四皆有名號而關内二百六十有一皆以𨽻諸衛凡府三等兵千二百人為上千人為中八百人為下府置折衝都尉一人左右果毅都尉各一人長史兵曹别將各一人校尉六人士以三百人為團團有校尉五十人為隊隊有正十人為火火有長火備六䭾馬凡火具烏布幕鐵馬盂布槽鍤钁鑿碓筐斧鉗鋸皆一甲牀二䥥二隊具火鑽一胷馬繩一首覊足絆皆三人具弓一矢三十胡禄横刀礪石大觿氊㡌氊裝行縢皆一麥飯九斗米二斗皆自備并其介胄戎具藏於庫有所征行則視其入而出給之其畨上宿衛者惟給弓矢横刀而已凡民年二十而兵六十而免其能騎而射者為越騎其餘為歩兵武騎排䂎手歩射其𨽻於衛也左右衛皆領六十府諸衛領五十至四十其餘以𨽻東宫六率凡發府兵皆下符契州刺史與折衝勘契乃發若全府發則折衝都尉以下皆行不盡則果毅行少則别將行當給馬者官予其直市之刺史折衝果毅嵗閲不任戰事者鬻之以其錢更市不足則一府共足之凡當宿衛者畨上兵部以遠近給畨五百里為五畨千里七畨一千五百里八畨二千里十畨外為十二畨皆一月上若簡留直衛者五百里為七畨千里八畨二千里十畨外為十二畨亦月上元宗開元六年始詔折衝府兵每六嵗一簡自高宗武后時天下久不用兵府兵之法寖壊畨役更代多不以時衛士稍稍亡匿至是益耗散宿衛不能給宰相張説乃請一切募士宿衛天寳以後折衝諸府至無兵可交李林甫遂請停上下魚書其後徒有兵額官吏而戎器馱馬鍋幕糗糧並廢矣初府兵之置居無事時耕於野其畨上者宿衛京師而已若四方有事則命將以出事解輙罷兵散於府將歸於朝故士不失業而將帥無握兵之重所以防微漸絶禍亂之萌也及府兵法壊而方鎮盛武夫悍將雖無事時據要險専方面既有其土地又有其人民又有其甲兵又有其財賦以布列天下然則方鎮不得不强京師不得不弱故曰措置之勢使然者以此也新唐書百官志諸衛折衝都尉府每府折衝都尉一人左右果毅都尉各一人别將各一人長史各一人兵曹参軍事各一人校尉五人旅帥十人隊正二十人副隊正二十人折衝都尉掌領屬備宿衛師役則總戎資糧㸃習以三百人為團一校尉領之左右果毅都尉掌貳都尉每府録事一人府一人史二人謹案唐之府兵一寓於農其居處教養畜材待事動作休息皆有節目説者謂厯代以來最為良法推其所自蓋亦本周官鄉遂出軍之法而變通之而其兵皆𨽻十六衛以畨上宿衛則與今親軍前鋒䕶軍之皆統于八旗其規制亦頗有相似者特十六衛將軍専領禁兵近今領侍衛大臣及前鋒䕶軍統領之職而不可以當八旗都統惟折衝果毅二都尉各領一府雖其秩止四品而以職掌論之實為今都統副都統之比故當時大將如薛仁貴王忠嗣郭知運張守珪哥舒翰邢君牙叚秀實王方翼楊朝晟等皆曾領此職亦可知其選之非輕矣至别將如今叅領每團各一校尉如今佐領而隊正如今之驍騎校其體制大小亦有差相仿彿者謹並著之於表以見唐代府兵散居諸道逺不及我朝之八旗勁旅環拱京城而史稱其畨調有時教閲有法統御有律團伍有籍則其制兵之術固猶為彼善於此也舊唐書百官志都統乾元中始置或總五道或總三道上元末省大中後討徐州以康承訓討黄巢以王鐸皆為都統李涪刋誤辛丑嵗大駕在蜀以巨冦未殄命中書令王鐸仗節鎮滑臺且統關東諸將收復京國時有論曰京西北言統者三四人慮不禀鐸之節制宜立其號曰都都統自秦漢已䧏將相統戎蓋多無有都都統之號所引故事則曰先帝時命李可及為都都知此則故事也然中令急於殄冦不以是為辱曷不曰諸軍四靣行營都統制帥之號莫過於斯資治通鑑僖宗中和二年以王鐸兼中書令充諸道行營都都統通鑑考異舊紀傳新傳鐸為都都統新紀作都統實録初除及罷時皆為都統中間多云都都統又西門思㳟為都都監按此時諸將為都統者甚多疑鐸為都都統是也王應麟玉海唐天寳末置天下兵馬大元帥都統朔方盧龍節度都統之名始於此乾元元年李峘為都統淮南江東西節度使都統之官始於此唐制或總五道或總三道又有行營都統副都統一時兵興稱謂不一葉夢得石林燕語唐乾元中以戸部尚書李峘為都統淮南江東江西節度使始立都統之號其後以節度使充者建中二年李勉以汴州節度使充汴宋滑亳河陽等道都統是也宰相充者中和二年王鐸以司徒中書令為京城四靣諸道行營兵馬都統是也謹案唐時始以都統為軍帥之號惟仗鉞専征者始得授以此職與今八旗都統不同然稱名沿革所由未可槩畧今併附識於此五季未置宋未置遼遼史營衛志部落曰部氏族曰族契丹故俗分地而居合族而處有族而部者五院六院之類是也有部而族者奚王室韋之類是也有部而不族者托里䝉古語鏡也原作特里今改正特黙䝉古語駝也原作特勉今改正刷滿洲語山後叢林也原作稍瓦今改正哈準滿洲語器械之械也原作葛术今改正之類是也有族而不部者約尼滿洲語全也原作遙輦今改正九帳皇族三父房是也契丹之初草居野次靡有定所至聶哷滿洲語單弱也原作湼里今改正始置部族各有分地太祖之興以徳哷勒索論語臉也原作迭剌今改正部强熾析為五院六院奚六部以下多因俘䧏而置勝兵甲者即著軍籍分𨽻諸路詳衮統軍招討司各安舊風狃習勞事不見紛華異物而遷故家給人足戎備整完虎視四方强朝弱附部族實為爪牙云遼内四部族約尼九帳族横帳三父房族國舅帳巴哩伊蘇濟勒䝉古語巴哩執長也伊蘇九數也濟勒年也原作㧞里乙室已今改正族國舅部族太祖二十部二國舅升帳分止十八部五院部𨽻北府􅄳林滿洲語精鋭也原作石烈今改正四六院部𨽻北府錫林四伊實唐古特語智慧也原作乙室今改正部𨽻南府錫林二丕勒滿洲語數衍也原作品今改正部屬西北路招討司錫林二卓特原作楮特今從八旗氏族通譜改正部屬西北路招討司錫林二威唐古特語叢林也原作烏隗今改正部屬東北路招討司錫林二納喇原作剌今從八旗氏族通譜改正部屬西南路招討司錫林二圖魯卜䝉古語形勢也原作突吕不今改正部屬西北路招討司錫林二圖吉滿洲語雲也原作突舉今改正部𨽻南府錫林二奚王六部五帳分𨽻北府聖宗三十四部以舊部族置者十六增置十八遼史百官志部族詳見營衛志設官之制具如左大部族某部大王本名額爾竒木䝉古語貴也原作夷離堇今改正某部左宰相某部右宰相某部太師某部太保某部太尉某部司徒本名特哩衮䝉古語頭也原作惕隱今改正某部節度使司某部節度使某部節度副使某部節度判官某部族詳衮司某部族詳衮某部族都監某部族將軍某部族小將軍某錫林某錫林額爾竒木某錫林瑪爾布唐古特語紅色也原作麻普今改正亦曰馬歩本名錫林達爾罕䝉古語凡有勤勞者免其差役之謂原作達剌干今改正某錫林牙書某密拉滿洲語洞開也原作彌里今改正密拉鄉也某密拉詳衮本曰穆特布滿洲語令其成就也原作馬特本今改正小部族某部族司徒府某部族司徒某部族司空某部族節度使司某部族詳衮司某錫林詳衮原作令稳今改正瑪爾布牙書某密拉詳衮謹案遼部族有大小之分又多分居邉境兼轄於統軍招討各司與今八旗之制較為不同然設官分職其規模亦頗相近如諸部所屬之錫林其數互有多寡蓋即如今之編設佐領而帳分諸部族則如今之有上三旗也遼史百官志遼北靣行軍官有行軍都統所行軍都統行軍副都統謹案都統副都統之名至遼而始備金初之伐遼也以貝勒杲為内外諸軍都統宗翰宗磐副之而伐宋之役以宗望為南京路都統劉彦宗為漢軍都統其餘軍官多用此名蓋亦沿遼之制而加詳者也金金史兵志金之初年諸部之民無它徭役壯者皆兵平居則聴以佃漁射獵習為勞事有警則下令部内及遣使詣諸貝勒滿洲語管理家人之稱原作孛堇今改正徴兵凡歩騎之仗糗皆取備焉其部長曰貝勒行兵則稱曰明安穆昆解俱見理藩院即仿彿今之佐領從其多寡以為號穆昆之副曰富禄伊滿洲語多餘也原作蒲里衍今改正即仿彿今之驍騎校也士卒之副從曰伊勒希滿洲語副也原作阿里喜今改正部卒之數初無定制至太祖即位之二年既以二千五百破耶律色實滿洲語豆麵剪子股也原作謝十今改正始命以三百户為穆昆穆昆十為明安繼而諸部來䧏率用明安穆昆之名以授其首領而部伍其人出河之戰兵始滿萬而遼莫能敵矣及東京既平山西繼定内收遼漢之䧏卒外籍部族之健士嘗用遼人額哩頁蒙古語花紋也原作訛里野今改正以北部百三十户為一穆昆漢人王六兒以諸州漢人六十五户為一穆昆王伯龍及高從祐等並領所部兵為一明安至天會二年宗望恐風俗糅雜民情弗便乃罷是制諸部䧏人但置長吏以下從漢官之號五年伐宋之役調燕山雲中中京上京東京遼東平州遼西長春八路民兵𨽻諸萬户其間萬户亦有專統漢軍者熈宗皇統五年又罷遼東漢人渤海明安穆昆承襲之制浸移兵柄於國人乃分明安穆昆為上中下三等宗室為上餘次之至海陵庻人天徳二年省併中京東京臨潢咸平泰州等路節鎮及明安穆昆削上中下之名但稱為諸明安穆昆循舊制間年一徴發以補老疾死亡之數貞元遷都遂徙上京路太祖遼王宗幹秦王宗翰之明安併為哈濟解具領倖衛篇明安及右諫議沃哩布滿洲語存留也原作烏里布今改正明安太師朂宗正宗敬之族處之中都沃倫滿洲語馬肚帯也原作幹論今改正和尚呼喇蒙古語雨也原作胡剌今改正三國公太保昻詹事烏哩頁蒙古語請也原作烏里野今改正輔國博勒和滿洲語潔净也原作勃魯骨今改正定逺蘇勒庫滿洲語花架也原作許烈故今改正杲國公伯特滿洲語無能為者之稱原作勃迭今改正八明安處之山東阿嚕䝉古語山隂也原作阿魯今改正之族處之北京諳達滿洲語夥伴也原作按達今改正族屬處之河間皆授田牛使之耕食以藩衛京國世宗大定初散契丹𨽻諸明安穆昆十五年遣吏部郎中富察烏琿富察原作蒲察今從八旗氏族通語改正烏琿滿洲語包裏也原作兀虎今改正等十人分行天下再定明安穆昆户每穆昆户不過三百七穆昆至十穆昆置一明安二十年以祖宗平定天下以來所建立明安穆昆因循既久其間有户口繁簡地里逺近不同又自正隆之後所授無度及大定間亦有功多未酬者遂更定以詔天下復命新授者並令就封其穆昆人内有六品以下職及諸局承應人皆為遷之三從以上族人願從行者明安不得過十户穆昆不得過六户二十一年詔遣大興尹完顔托果斯蒙古語孔雀也原作廸古速今改正遷河北東路兩明安上曰朕始令移此欲令與女直户相錯安置久則自相姻親不生異意此長久之利也今者伊瑪蒙古語小羊也原作移馬今改正河相錯以居甚符朕意而約羅蒙古語藏狗也原作遥落今改正河明安不如此可再遣兵部尚書張納延䝉古語八十數也原作那也今改正按視其地以雜居之二十三年遷山東東路八穆昆處之河間其棄地以山東東路特赫滿洲語潦水也原作忒黒今改正河明安下扎哈滿洲語刀船也原作荅今改正穆昆額勒敏滿洲語劣馬也原作移里閔今改正鄂勒歡滿洲語乾燥也原作魯渾今改正明安下錫布滿洲語今塞也原作翕浦今改正穆昆佛們滿洲語唇也原作付母温今改正山穆昆九村人戸徙于瑠僧安和二穆昆之舊地上嘗以率賔呼爾哈解具奉天將軍篇人驍勇可用二十四年以上京地廣而腴遂遷率賔一明安呼爾哈一明安二十四穆昆以實之蓋欲上京兵多它日可為緩急之備也當其時多易置河北山東所屯之舊括民地而為之業户頒牛而使之耕畜甲兵而為之備乃大重其權授諸王以明安之號或新置者特賜之名制其奢靡禁其飲酒習其騎射儲其粮糒其備至嚴也是時宗室户百七十明安二百二穆昆千八百七十八户六十一萬五千六百二十四所謂渤海軍則渤海八明安之軍所謂奚軍者奚人約尼扎古雅䝉古語欲咬之謂原作昭古牙今改正九明安之兵也金史百官志諸明安穆昆𨽻為明安從四品掌修理軍務訓練武藝勸課農桑司吏四人譯一人塔瑪索倫語行圍收合也原作撻馬今改正差役人數並同舊例諸穆昆從五品掌撫輯軍户訓練武藝女直司吏一人譯一人塔瑪諸部族節度使節度使一員從三品統制各部鎮撫諸軍節度副使一員從五品判官一員知法一員諸乣詳衮一員從五品掌守戍邊堡餘同穆昆皇統八年六月設本班左右詳衮定為從五品黙濟格滿洲語傳信之謂也原作麽忽今改正一員從八品掌貳詳衮司吏三人實納昆蒙古語實納新也昆人也原作習尼昆今改正掌本乣差役等事塔瑪隨從也諸額爾竒木解見上司額爾竒木一員從八品分掌部族村寨事司吏女直一人漢人一人實納昆塔瑪諸圖哩滿洲語豆也原作秃里今改正圖哩一員從七品掌部落詞訟訪察違背等事女直司吏一人通事一人謹案金之部伍似近本朝八旗子弟兵以其三百戸為穆昆穆昆十為明安與今之叅領佐領相近其以契丹漢人及渤海軍奚軍俱設明安與今之蒙古漢人並列八旗相近然天㑹以後屢設屢罷又散處中都上京西京河北山東河東陜西諸州縣此疆彼界失所統轄法制未能嚴密稽核未能精詳其視我朝八旗之部伍整肅體制相維盡統領之方效指臂之用不可同日語也遼制有部有族部族所屬有錫林元亦有蒙古軍特黙齊軍於編置部伍規模亦約畧近似顧條制尚多踈畧豈如我朝規制以旗𨽻人即以旗𨽻兵統之以八分之以二十四意精法善備極嚴密可以為億萬世法則乎元元史兵志元初有蒙古軍特黙齊䝉古語牧駝人也原作探馬赤今改正軍蒙古軍皆國人特黙齊軍則諸部族也其法家有男子年十五以上七十以下無衆寡盡僉為兵十人為一牌設牌頭上馬則備戰鬭下馬則屯聚牧養孩㓜稍長又籍之曰漸丁軍既平中原發民為卒是為漢軍或以貧富為甲乙户出一人曰獨户軍合二三而出一人則為正軍户餘為貼軍士卒之家為富商大賈則又取一人曰餘丁軍或取匠為軍曰匠軍或取諸侯將校之子弟充軍曰質子軍又曰圖嚕格蒙古語質物也原作秃魯華今改正軍是皆多事之際一時之制天下既平嘗為軍者定入尺籍伍符不可更易以兵籍係軍機重務漢人不閲其數雖樞密近臣職專軍務者惟長官一二人知故有國百年而内外兵數之多寡人莫有知之者謹案元之軍制本由僉發故隨時調遣並無一定之籍其所謂蒙古軍特黙齊軍者亦但有是名其實征戍之法與漢軍無殊未嘗别為條制也明未置謹案明代京兵三大營曰五軍曰三千曰神機後變為十二團營又變為兩官㕔其兵則紏集市儈全無紀律其提督坐營等官亦多世胄紈袴雖其制亦畧似我朝之歩軍統領管轄五營而軍務盡領於内監腐身熏子掣肘戎行至營中將卒類為中官私人毫不知兵濫耗名糧注名買替溷充冊籍一旦有事相率潰奔將不知兵兵不習將所謂三大營者有其名而失其實京兵之弱莫有如明代之甚者蓋緣明制召募烏合本無部伍子弟可備簡擇之人遼金元有其人而立法未臻詳備豈如我國家八旗勁旅法良制宻平時則守衛巡防征討則折衝禦侮有治人且有治法者乎明之京兵營制雖不可與八旗同言並論要其因仍積弱不能自振可為鍳戒故特附著於此以揭其弊焉欽定厯代職官表卷四十四
