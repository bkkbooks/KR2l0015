body:
  text: 藩屬各官表藩屬各官國朝官制外藩䝉古科爾沁等二十五部五十一旗喀爾喀四部八十五旗青海四部二十九旗阿拉善額魯特一旗烏蘭烏蘇額魯特二旗額濟納土爾古特一旗都爾伯特十六旗每旗札薩克一人協理旗務二人或四人管旗章京一人副章京二人或一人㕘領毎六佐領則一人佐領每百丁或二百丁或二百五十丁則一人驍騎校毎佐領下則一人札薩克掌治一旗之政令或由世襲或由簡任不拘爵秩䝉古科爾沁等部五十一旗及青海四部落二十九旗毎旗札薩克以王貝勒貝子公台吉為之惟喀喇沁添設一旗以一等搭布囊喀爾喀等部八十五旗及都爾伯特十六旗每旗札薩克以汗王貝勒貝子公台吉為之阿拉善額魯特以王及公烏蘭烏蘓額魯特以貝子額濟納土爾古特以貝勒協理旗務掌佐札薩克之政亦以台吉以上為之自管旗章京以下至驍騎校皆掌統其所屬之衆以聴於札薩克惟青海達喇嘛察漢諾們汗所屬䝉古分四佐領不統於各旗給印令達喇嘛管轄每旗按丁數編為佐領設佐領一人驍騎校一人領催六人驍騎五十人六佐領設􅄁領一人佐領多者設管旗章京一人副章京二人十佐領以下設章京副章京各一人並於每旗台吉内遴選以原爵兼任如台吉内無人於􅄁領内遴選􅄁領於佐領内遴選佐領於驍騎校内遴選以次遞升謹案外藩䝉古設官雖同而分地各異其大别有三一為漠南科爾沁等部一為漠北喀爾喀四部一為青海四部若阿拉善額魯特額濟納土爾古特皆在寕夏甘肅邊外亦漠南地都爾伯特在喀爾喀疆理之内烏蘭烏蘇又喀爾喀賽因諾顔部所轄也故於表以漠南漠北𤯝海等部别而為三因以上推厯代建置之異庶彼此各有區别云囘部哈宻一旗札薩克一人協理旗務一人管旗章京一人副章京一人􅄁領二人佐領十三人土爾畨一旗札薩克一人協理旂務二人管旂章京一人副章京二人􅄁領二人佐領十五人伯克十人凡回部之久經内屬者一如䝉古之制編為旗分設札薩克以下等官哈宻札薩克以功晉郡王貝勒土爾畨晉郡王謹案哈宻土爾畨二部雖並膺王封而實佐我駐劄大臣共理庶事故互見於新疆各官篇而其屬則冠以天朝之品秩仍存諸部之舊稱謹具列於此至於徳威遐布西域蕩平二萬餘里安屯置郡土爾扈特復率衆輸忱全部歸順其間量材授職品秩昭然而悉簡大臣往臨其政故専列新疆表中而識其區别如右云厯代建置謹案自古外藩設官羈縻不絶叛服無常弱則稽顙來王强則稱兵擾塞未有能使之畏威懐徳心恱誠服者也我國家誕膺天命中外一統武功戡定文徳懐柔冰天月􅒸悉主悉臣䝉古漠南漠北諸郡以暨回城君長莫不傾心向化獻琛奉摯永為不侵不叛之臣因為之設官分職䝉古各部暨回部之久經内附者皆設札薩克以理旗務又悉置都統以下等官一如八旗之制而回城伯克亦皆被以天朝之品秩此實亘古以來之盛事求之史册罕有倫比今纂集兩漢以來西北裔國之受中國爵號者以備此表云三代書益稷謨外薄四海咸建五長禮記曲禮其在東夷北狄西戎南蠻雖大曰子於内自稱曰不榖於外自稱曰王老鄭康成注謂九州之外長也天子亦選其諸侯之賢者以為之子子猶牧也雖有侯伯之地本爵無過子謹案爾雅九夷八蠻七戎六狄謂之四海曲禮之東夷北狄西戎南蠻即虞書之所謂四海其地在九州之外亦擇其諸侯之賢者以為之長如中國之牧伯此即唐虞咸建五長之法也今漠南哈宻青海之地在唐虞三代時皆為荒服其設官之法見於益稷謨及曲禮者大略如此若其詳則不可考矣秦末置漢漢書趙充國列傳羌若零離留且種兒庫共斬先零大豪猶非楊玉首及諸豪弟澤楊雕良兒靡忘皆帥煎鞏黄羝之屬四千餘人降漢封若零弟澤二人為帥衆王離留且種二人為侯兒庫為君陽雕為言兵侯良兒為君靡忘為獻牛君初置金城屬國以處降羌謹案青海之地漢為西羌自晉至隋為吐谷渾青海古曰西海亦曰鮮水王莽置西海郡漢書趙充國傳䍐开在鮮水上又云治湟陿中道橋令可至鮮水是也羌為充國屯田所困諸豪帥皆降悉封為侯王君長然自安國未屯田之先義渠安國行視諸羌已有歸義侯楊玉則其受漢封爵久矣漢書西域列傳凡國五十自譯長城君監吏大禄百長千長都尉且渠當戸将相至侯王皆佩漢印綬凡三百七十七人而康居大月氏安息罽賓烏弋之屬皆以絶逺不在數中謹案西漢時西域五十國置都䕶以統領之惟康居大月氏安息條支罽賓烏弋山離諸國不屬都䕶餘國之屬於都䕶者其王皆佩漢印綬其强大而親近者又略為署置官吏傳中所言王侯将相且渠當戸以下等官皆漢所加位號也後漢書百官志四夷國王率衆王歸義侯邑君邑長皆有丞比郡縣晉書匈奴列傳後漢建安中魏武帝始分其衆為五部立其中貴者為帥選漢人為司馬以監督之謹案漢自宣帝以後匈奴稱臣入朝然單于自稱其爵號如故未嘗加以漢爵其印文曰匈奴單于璽不冠以漢字盖不以純臣待之也後漢光武立南匈奴亦用前漢呼韓邪故事至建安立五部帥始加以中國官爵矣然漢初匈奴兼有漠南漠北之地武帝命将出征攘郤匈奴而漠南無王庭後漢時南匈奴欵塞處漠南北匈奴在漠北至建安所立五部帥皆在太原郡境非復匈奴之故地矣今故於後漢及魏晉匈奴之置官第附著之而不以列於表云後漢書烏桓列傳建武二十五年遼西烏桓大人郝旦等九百二十二人率衆向化詣闕朝貢於是封其渠帥為侯王君長者八十一人皆居塞内布於縁邊諸郡後漢書鮮卑列傳建武三十年鮮卑大人於仇賁等率種人朝賀慕義内屬帝封於仇賁為王袁宏後漢紀建武三十一年秋九月鮮卑大人於􅄷賁率其種人貢獻封賁為王鮮卑别居鮮卑山因號焉三國魏志烏丸列傳注魏書曰漢安帝時烏丸稍復親附拜其大人戎末廆為都尉至順帝時戎末廆率将王侯咄歸去延等從烏丸校尉耿􅋫出塞擊鮮卑有功還皆拜為率衆王賜束帛陳琳為袁紹拜烏丸三王為單于版文使持節大将軍督幽青并領冀州牧阮鄉侯紹承制詔遼東屬國率衆王頒下烏丸遼西率衆王蹋頓右北平率衆王汗盧維乃祖慕義遷善欵塞内附北捍玁狁東拒􅐮貃世守北陲為百姓保鄣雖時侵犯王畧命将徂征厥罪率不旋時悔愆變改方之外夷最又聰慧者也始有千夫長百夫長以相統領用能悉乃心克有勲力於國家稍受王侯之命自我王室多故公孫瓚作難殘夷厥土之君以侮天慢王是以四海之内並執干戈以衛社稷三王奮氣裔土忿奸憂國控弦與漢兵為表裏誠甚忠孝朝所嘉焉然而虎兕長蛇相隨塞路王官爵命否而無聞夫有勲不賞俾勤者怠今遣行謁者楊林齎單于璽綬車服以對爾勞其各綏靜部落教以謹慎無使作凶作慝世復爾祀位長為百蠻長厥有咎有不臧者泯於爾禄而䘮於乃庸可不免乎謹案漢時鮮卑在遼東塞外烏丸在上谷漁陽右北平遼東遼西五郡塞外即今䝉古科爾沁敖漢奈曼喀爾喀左翼喀喇沁蘓尼特等部落之地也後漢書馬援列傳遣羌豪楊封譬說塞外羌皆來和親後漢書鄧訓列傳燒當羌豪東號稽顙歸死餘皆欵塞納質謹案後漢西羌屢叛為國大患安帝時至僭大號然自光武置䕶羌校尉而馬援鄧訓傳皆言羌豪和親欵塞必有受漢爵者特吏文不具耳後漢書西域列傳建武五年河西大将軍竇融承制立莎車王康為漢莎車建功懐徳王西域大都尉康死弟賢代立十七年賜賢西域都䕶印綬敦煌太守裴遵上言夷狄不可假以大權又令諸國失望詔書収還都䕶印綬更賜賢以漢大将軍印綬和帝永元二年大将軍竇憲破北匈奴車師震慴前後王各遣子奉貢入侍並賜印綬金帛太平寰宇記莎車國後漢光武建武五年西河大將軍竇融承制立其王康為漢莎車建功懐徳王西域大都尉五十五國皆屬扜彌國陽嘉初燉煌太守徐由遣踈勒發兵擊之破于闐遂立拘彌王焉耆國和帝永元六年都䕶班超發諸國兵討之殺其王超乃立焉耆左侯元孟為王謹案後漢復通西域莎車車師二國皆受漢爵號賜印綬見於史傳其餘國之屬於都䕶者其王當亦受漢封爵如西漢時矣又考莎車王康之為漢莎車建功懐徳王與今之扎薩克王同其為西域大都尉其子賢為漢大将軍以藩王加漢爵統領多國實兼今新疆各官之職故于新疆各官卷内互載之三國晉書匈奴列傳後漢建安中始分其衆為五部部立其中貴者為帥魏末復改帥為都尉三國魏志烏丸列傳注魏略曰景初元年右北平烏丸單于冦婁敦遣弟阿羅奨等詣闕朝貢封其渠帥三十餘為王三國魏志鮮卑列傳鮮卑步度根既立建安中遣使獻馬帝拜為王青龍元年步度根将泄歸泥及部衆悉保比能冦鈔并州殺略吏民帝遣驍騎将軍秦朗征之歸泥叛比能将其部衆降拜歸義王軻比能本小種鮮卑衆推以為大人延康初遣使獻馬文帝立比能為附義王素利靡加厥機皆為大人在遼西右北平漁陽塞外建安中因閻柔上貢獻通市太祖皆表寵以為王厥機死又立其子沙末汗為親漢王文帝立素利彌加為歸義王册府元龜魏文帝漢延康元年封鮮卑素利彌加為歸義王黄初元年更授匈奴南單于呼厨泉魏璽綬賜青盖乗輿寶玉玦是年鮮卑步度根拜為王明帝太和三年以大月氐王波調為親魏大月氐景初元年右北平烏丸單于冦婁敦遣弟阿羅奨等詣闕朝貢封其渠帥三十餘人為王謹案魏文帝外國遣使奉獻詔曰西戎即叙氏𦍑來王詩書美之頃者西域並欵塞内附其遣使者撫勞之但云撫勞之則文帝時未嘗封西域諸國如烏桓鮮卑可知其以大月氏王為親魏大月氏則在明帝三年但云大月氏亦非若附義歸義之特加王號也晉司馬光資治通鑑初匈奴劉猛死劉虎代領其衆號鐡弗氏與白部鮮卑皆附於漢劉琨将討之遣使卑辭厚禮說拓跋猗盧以請兵猗盧使其弟弗之子欝律帥騎二萬助之遂破劉虎白部琨與猗盧結為兄弟表為大單于以代郡封之為公建興三年詔進猗盧爵為王置官屬食代常山二郡晉書慕容廆載記曽祖莫䕶䟦魏初從宣帝伐公孫氏有功拜率義王父涉歸以全栁城功進拜鮮卑單于涉歸有恨於宇文鮮卑廆将修先君之怨表請討之武帝弗許廆怒入冦遼西帝遣幽州諸軍討廆廆衆大敗後遣使來降拜為鮮卑都督建興中愍帝遣使拜廆鎮軍将軍昌黎遼東二國公建元初元帝承制拜廆假節散騎常侍都督遼左雜夷流人諸軍事龍驤将軍昌黎公晉書叚匹磾列傳父務弗塵遣兵助東海王越征討有功王浚表為親晉王封遼西公懐帝即位以務弗塵為大單于匹磾為左賢王率衆助國征討假撫軍大将軍宋齊梁陳北史吐谷渾列傳阿豺遣使通宋獻其方物宋少帝封為澆河公未及拜受文帝元嘉三年又加除命㑹暴病死慕璝立又奉表通宋文帝又授隴西公慕璝死弟慕利延立又通宋宋封為河南王慕利延死拾寅立又受宋封爵號河南王册府元龜宋文帝元嘉七年正月以吐谷渾慕璝為征西将軍沙州刺史慕璝遼東鮮卑也兄阿豺晉末譙縱之亂遣使上表獻方物詔為安西将軍沙州刺史澆河公阿豺死慕璝立奉表故有是命九年六月以征西将軍沙州刺史吐谷渾慕璝為征西大将軍西秦河二州刺史十五年二月以平東将軍吐谷渾慕延為征西将軍西秦河二州刺史十六年六月改封隴西王吐谷渾慕延為河南王二十九年九月以平西將軍吐谷渾拾寅為安西將軍西秦河二州刺史孝武即位初安西将軍西秦河二州刺史吐谷渾拾寅進號鎮西大将軍開府儀同三司明帝泰始三年十月鎮西大将軍西秦河二州刺史河南王吐谷渾拾寅進號征西大将軍後廢帝元徽三年九月征西大將軍河南王吐谷渾拾寅進號車騎大将軍南齊太祖建元元年五月詔使持節散騎常侍都督秦河沙三州諸軍開府儀同三司領䕶羗校尉西秦河二州刺史河南王吐谷渾拾寅進號驃騎大将軍武帝永明三年六月以河南王拾寅世子吐谷渾易度侯為使持節都督西秦河沙三州諸軍事鎮西將軍領䕶羌校尉西秦河二州刺史梁髙祖天監三年九月以河南王世子伏連籌為鎮西将軍西秦河二州太守河南王中大通元年三月以河南王伏連籌子阿羅真為寕西将軍䕶羗校尉西秦河二州刺史謹案晉自永嘉擾亂遂失中原迄於梁陳偏安江左聲教不通於北裔惟吐谷渾兼事南北兩朝宋齊梁時皆嘗稱臣奉貢其地在青海之上即今額魯特等部落之所居也北魏北史吐谷渾列傳魏太武時遣使者策拜慕璝為大将軍西秦王太延二年慕璝死弟慕利延立拜鎮西大将軍儀同三司改封西平王慕利延死樹洛干子拾寅立太武遣使拜為鎮西大將軍沙州刺史西平王拾寅死子度易侯立死子伏連籌立孝文拜伏連籌使持節都督西陲諸軍事征西將軍領䕶西戎中郎将西海郡開國公吐谷渾王北史髙車列傳伊匐遣使奉表於是遣使者拜為鎮西将軍西海郡開國公北史髙昌列傳魏熙平二年麴嘉遣使朝貢延昌中以嘉為持節平西将軍􅆶州刺史泰臨縣開國伯私署王如故嘉死子堅立普泰中遣使朝貢除平西将軍􅆶州刺史泰臨縣開國伯王如故又加衛将軍至永熙三年特除儀同三司進為郡公大統十四年詔以其子元嘉為王恭帝二年又以其田地公茂嗣位謹案元魏時蠕蠕强盛統率北方雖遣使朝貢未嘗稱臣而髙車王伊匐明帝時嘗受封爵其地在北海之上即漢之丁零在今為鄂羅斯地尚在喀爾喀諸部之北若其時西域則受朝命者惟高昌一國其餘但通貢使而已北齊未置後周未置謹案魏時北狄之髙車西域之高昌皆嘗受封爵而吐谷渾則世受朝命至正光時不絶周齊之際蠕蠕滅而突厥興與中國抗衡而髙車自東魏之末已為蠕蠕所破自後無聞焉吐谷渾自魏末莫折念生反於秦州河西路絶貢獻不通其王夷吕立自稱可汗後雖於周齊皆嘗通貢而爵命自此絶矣若髙昌則史亦但言武成保定中嘗通貢獻而已盖自魏氏既分東西搆難中國多故故聲教所及逺遜魏氏至周武平齊之後厯年無多亦未暇逺略也隋末置隋書突厥列傳沙鉢略遣第七兒窟舍真奉表拜窟舍真為上柱國封安國公處羅侯立為葉䕶可汗遣其母弟褥但特勒獻于闐玉杖上拜褥但為柱國康國公北史吐谷渾列傳隋開皇初遣上柱國諧率步騎數萬擊之夷吾逺遁其名王十三人各率部落而降上以其髙寕王移兹裒素得衆心拜大将軍封河南王以統降衆册府元龜隋開皇十九年四月突厥利可汗内附以為啟民可汗煬帝大業五年高昌王麴伯雅來朝拜左光禄大夫車師太守封弁國公謹案隋時突厥臣伏啟民可汗乃其所立然亦自稱其爵號與漢之呼韓邪南單于無異惟沙鉢略子窟舍真處羅侯弟褥但特勒常受柱國國公之號乃因其奉使貢獻而嘉寵之非若設官有常職者也吐谷渾自夷吕既叛雖屢被征討終未常受爵命如魏時移兹裒之為河南王特以統其降衆而已亦與舉國稱藩者不同故今並附録於此而不以著於表唐新唐書北狄契丹列傳貞觀二年摩㑹來降明年入朝帝伐高麗悉發酋長與奚酋領從軍帝還過營州以窟哥為左武衛将軍大酋辱紇主曲據又率衆歸即其部為元州拜曲據刺史未機窟哥舉部内屬乃置松漠都督府以窟哥為使持節十州諸軍事松漠都督封無極男奚列傳太宗代高麗太酋蘓支從戰有功不數年其長可度者内附帝為置饒樂都督府拜可度者使持節六州諸軍事饒樂都督封樓煩縣公開元二年奚酋李大酺使奥蘓悔落丐降封饒樂郡王左金吾衛大将軍饒樂都督黒水靺鞨列傳黑水靺鞨居肅慎地貞觀二年臣附以其地為燕州開元十年其長倪屬利稽來朝元宗即拜勃利州刺史於是安東都䕶薛泰請置黒水府以部長為都督刺史朝廷為置長史監之渤海列傳渤海本粟末靺鞨地武后封乞四比羽為許國公乞乞仲象為震國公仲象死其子祚榮建國自號震國王中宗時遣子入侍睿宗先天中遣使拜祚榮為左驍衛大将軍渤海郡王新唐書突厥列傳頡利既敗乃舉衆來漠南地遂空帝度朔方地建為都督府擢酋豪為将軍郎将者五百人奉朝請者且百員乃以突利可汗為順州都督令率其下就部思摩頡利族人也武徳初數以使者來髙祖嘉其誠封和順郡王及諸部納欵思摩獨㽞與頡利俱禽太宗以為忠授右武侯大将軍化州都督統頡利故部居河南徙懐化郡王舊唐書回紇列傳貞觀二十年遣使入貢以破薛延陀功賜宴内殿太宗幸靈武受其降欵因請回鶻以南置郵遞通管北方太宗以回紇為瀚海府拜其俟利發吐迷度為懐化大将軍兼瀚海都督新唐書西域列傳焉耆貞觀六年其王龍突騎支始遣使來朝十二年侯君集討高昌突騎支引兵佐唐西突厥臣屈利咄為弟娶突騎支女遂相約不朝貢安西都䕶郭孝恪討之執突騎支而還立突騎支弟婆伽利為王以其地為焉耆都督府婆伽利死國人請還前王突騎支高宗許之拜左衛大将軍歸國龜兹王訶黎布失畢貞觀二十一年兩遣使朝貢帝怒其助焉耆叛發兵討之執訶黎布失畢獻太廟拜左武衛中郎將始徙安西都䕶于其都統于闐疏勒碎葉號四鎮疏勒國天寳十二載首領裴國良來朝授折衝都尉于闐王伏闍信入見天子授右衛大将軍子葉䕶玷為右驍衛將軍上元初以其地為毗沙都督府康貞觀五年請臣高宗永徽時以其地為康居都督府即授其王拂呼縵為都督安治阿濫謐城東安治喝汗城亦曰籰斤顯慶時以阿濫為安息州即以其王昭武殺為刺史籰斤為木鹿州以其王昭武閉息為刺史石顯慶三年以瞰羯城為大宛都督府授其王噉吐屯攝舍提於屈昭穆都督米顯慶三年以其地為南謐州授其君昭武開拙為刺史何永徽時以其地為貴霜州授其君昭武婆達地刺史史顯慶時以其地為佉沙州授其君昭武失阿喝刺史寕逺顯慶三年以渇塞城為休循州都督授阿了參刺史吐火羅顯慶中以其阿緩城為月氏都督府析小城為二十四州授王阿史那都督帆延顯慶三年以羅爛城為冩鳳都督府縳時城為悉萬州授王蔔冩鳯州都督管内五州諸軍事識匿開元十二年授王布遮波資金吾衛大將軍天寶六載王跌失迦延從討勃律戰死擢其子都督左武衛將軍給禄居蕃䕶密顯慶時以其地為鳥飛州王沙鉢羅頡利發為刺史波斯龍朔初天子遣使者到西域分置州縣以疾陵城為波斯都督府即拜畢路斯為都督咸亨中入朝授右武衛将軍李衛公兵法太宗曰近契丹奚皆内屬置松漠饒樂二都督統于安北都䕶朕用薛萬徹何如靖曰萬徹不如阿史那社爾及執失思力契苾何力此皆畨臣之知兵者也臣嘗與之言松漠饒樂山川道路畨情逆順逺至於西域部落十數種厯厯可信臣教之以陳法無不㸃頭服義望陛下任之勿疑若萬徹則勇而無謀難以獨任程大昌北邊偹對貞觀初突厥已亡惟回紇與薛延陀為最雄强已而回紇攻薛延陀併有其地遣使獻功太宗為幸靈州次涇陽受其功乃以回紇部為瀚海部督多質葛部為燕然部督凡六部督天寳初回紇之臣裴羅襲破㧞密自稱骨咄禄毗伽欵可汗天子以為奉義王居突厥故地樂史太平寰宇記罽賓國唐明慶三年列其城為修鮮都督府龍朔初授其王修鮮等一十一州諸軍事兼修鮮都督康居國顯慶三年高宗遣果毅董寄生列其所居城為康居都䕶府仍以其王拂呼縵為都䕶萬嵗通天元年則天封其大首領篤娑鉢提為王鉢提尋卒又册其子泥濕師師神龍中泥濕卒國人又立突皆開元初累使貢獻鎻子申水精珠越諾及侏儒人胡旋女子兼狗豹之屬開元十九年其王烏勒上表請封其子咄曷為曹國王黙啜為米國王上許之至二十七年烏勒卒遣使册咄曷襲其父位至天寶中又封為欽化王其母可敦封為郡夫人曹國天寶元年其王哥羅僕遣使朝貢三年詔下封其王為懐徳王史國顯慶三年遣果毅董寄生列其所治為佉沙州以其王昭武阿曷為刺史開元二十七年其王延屯卒册其子阿葱鉢為王波斯國龍朔元年其國王卑路斯奏云頻被大食侵擾請兵救援其時詔遣隴南田縣令王名逺充使西域分置州縣因列其地疾陵城為波斯都督府授卑路斯為都督是後累遣使朝貢咸亨中卑路斯自來朝貢高宗厚加恩異授右武衛将軍吐火羅國高宗永徽三年其葉䕶那使烏濕波奉表告立高宗遣置州縣使王名逺到其國以所理阿緩大城為月氏都督府各分其小城為二十四州以烏濕波為都督王名逺請於吐火羅國立碑以記聖徳帝從之五年烏濕波遣子伊室達官弩朝龍朔元年授烏濕波使持節月氐等二十五州諸軍事月氐都督石國顯慶三年列其地噉鞨城為大宛都督府仍以其王噉吐屯攝舍提於屈昭穆為都督開元初其蕃王莫賀咄吐屯有功封石國王加特進尋又册為順義王二十九年其王伊捺吐屯屈勒上表曰奴身千代已來忠赤於國只如突厥騎施可汗赤忠之日部落安貼后背天可汗脚底火起今突厥屬天可汗在於西頭為患唯有大食莫踰突厥伏乞天恩不弃突厥部落打破大食諸國自然安貼天寶初累遣使朝貢至五年封其王子那俱車鼻施為懐化王并賜鐡劵謹案唐自太宗平突厥西北諸番及蠻夷稍稍内屬即其部落建號設官版籍貢賦不上於户部聲教所暨皆邊州都督都䕶所領自漢以來外藩服屬此為最盛西域自魏晉以後頗通貢獻然不過數國蠕蠕盛時則屬於蠕蠕突厥既興多屬於突厥唐自突厥既平北庭帖然西域亦皆平定高昌伊吾等既皆列為郡縣復開四鎮置都䕶而史米何石吐火羅諸國漢時為康居大夏條支及罽賓大秦地不屬都䕶者亦皆通朝貢受爵命故史謂唐之疆域視漢盛時東不及而西則過之也至安史之亂藉回紇以平内難其可汗雖受唐封册寖以驕倨非復藩臣之禮渤海自開元後强大雖通朝貢而私立年號不禀正朔契丹則隂附回紇靺鞨則役屬渤海而吐蕃乗中國多故薦食西鄙安西䧟沒四鎮皆失唐志所列為西北蕃夷覊縻之州大抵有其名而無其實兹故不詳述云五季宋史西域于闐列傳晉天福中其王李聖天自稱唐之宗屬遣使來貢高祖遣供奉官張鄴持節策為大食于闐國王回鶻列傳後唐同光中嘗册其國王仁美為英義可汗仁美卒其弟仁裕立册為為順化可汗晉天福中又改為奉化可汗沙州列傳沙州本漢燉煌故地唐末䧟於西戎大中五年張義潮以州歸順詔建沙州為歸義軍以義潮為節度使朱梁時張氏之後絶州人推長史曹義金為帥義金卒子元忠嗣周顯徳二年來貢授本軍節度檢校太尉同中書門下平章事鑄印賜之馬端臨文獻通考回鶻五代之際有居甘州西州者嘗見中國而甘州回鶻數至梁乾化元年都督周易言等來史不見其長君名號梁拜易言等官爵遣還唐荘宗時王仁美遣使者來貢玉馬自稱權知可汗荘宗遣使册為英義可汗天成二年權知國事王仁裕遣使來朝明宗册為順化可汗晉高祖時又加册命册府元龜後唐荘宗同光元年賜隂山府都督白承福于中山北石門為栅號寕朔奉化兩府以都督為節度使二年四月回鶻權知可汗仁美遣使來貢封為英義可汗明宗天成三年二月命使册回鶻權知可汗仁祕為順化可汗末帝清泰元年七月癸丑檢校刑部尚書􅆶州刺史慕容歸盈轉檢校尚書左僕射晉高祖天福三年十月封于闐國王李聖天為大寶于闐國王四年封回鶻可汗仁美為奉化可汗謹案五代時中國土宇既狹喪亂相尋又契丹既興東北諸國皆役屬之不復與於王㑹然自唐大中時平河湟西陲清宴五代相去未逺承其餘烈故于闐回鶻沙州等國尚能奉貢獻受册封也宋宋史西域于闐列傳嘉祐八年遣使羅撒温獻方物以其國王為特進歸忠保順􅠫鱗黒韓王囘鶻列傳大中祥符元年夜落紇寳物公主及沒孤公主婆温宰相各遣使來貢東封禮成以可汗王進奉使姚進為寕逺将軍寶物公主進奉使曹進為安化郎将天聖元年甘州夜落隔通順遣使阿葛之王文貴來貢方物詔通順特封歸忠保順可汗王大食列傳開寳元年遣使來朝貢四年又貢方物以其使李訶末為懐化將軍熙寕六年都蕃首保順郎将蒲陀婆離慈表令男麻勿奉貢物乞以自代而求為将軍詔但授麻勿郎将沙州列傳沙州曹元忠建隆三年加兼中書令子延恭為􅆶州防禦使元忠卒子延禄遣人來貢授延禄本軍節度弟延晟為􅆶州刺史延瑞為衙門都虞候咸平四年封延禄為譙郡王五年延禄延瑞為從子宗夀所害宗夀權知留後而以其弟宗允權知𤓰州表求旌節乃授宗夀節度使宗允檢校尚書左僕射知𤓰州宗夀賢順為衙内都指揮使大中祥符末宗夀卒授賢順本軍節度使延恵檢校刑部尚書知𤓰州謹案宋承五代之後混一海内而契丹雄峙北方夏人崛强西陲東北諸部既皆服屬於遼而西域亦與中國隔絶其受朝命者惟党項吐蕃于闐囘鶻大食沙州等國而已党項吐蕃别見土司表中囘鶻强盛時盡得古匈奴地至唐武宣後衰亂部落離散五代及宋時通中國者特其諸部之居甘凉西鄙者非復唐時之舊且其受中國册命亦皆仍其可汗之號第如漢匈奴呼韓邪隋突厥啟民之比而大食在宋時亦但爵其使人其國王未嘗受職故今於五代之囘鶻宋時之囘鶻大食但附載其入貢受封之事而不以著於表又宋時西夏嘗受封爵然西夏雖出於党項而在唐末及五代實為中國之藩鎮未可待以純夷而自元昊以後帝制自為又與中國抗衡尤未可以外藩例之今並不載云遼遼史百官志遼制屬國屬部官大者擬王封小者准部使命其酋長與契丹人分别而用㤙威兼制得柔逺之道屬國職名總目某國大王某國裕恱官名原作于越今據字面改正某國左相某國右相某國特哩衮䝉古語頭也原作惕隠今改正亦曰司徒某國太師某國太保某國司空某國某部節度使司某國某部節度使某國某部節度副使某國詳衮官名原作詳穏今據字面改正司某國詳衮某國都監某國将軍某國小将軍大部職名並同屬國諸部職名並同部族金史世紀昭祖稍以法度為治遼以特哩衮官之五國佛寕滿洲語羣也原作蒲聶今改正部節度巴哩美䝉古語執也原作㧞乙門今改正叛遼景祖襲而擒之獻於遼主遼主以為生女直部族節度使遼人呼節度使為太師金人稱太師者自此始謹案遼時屬國大者曰某國授以大王及裕恱以下等官小者曰某部授以節度使以下等官至西夏雖嘗授封遼史厠諸屬國之列然實自帝一方今亦不以列於表云金元聖武親征記金遣丞相完顔襄帥兵追叛者北走上因起兵自鄂諾䝉古語黄羊也原作斡難今改正河迎討金主授帝察罕圖嚕猶華書招討使也䝉古語察罕白色也圗嚕頭目也原作察兀秃魯今改正並册圗烈䝉古語燒柴也原作脫烈今改正部長托和䝉古語半大堪達漢也原作脫黑今改正為王謹案金時外藩設官不見於史觀此則當時漠北諸部皆受封爵矣元未置謹案元起北方有天下以嶺北為和寕路龍岡為上都路而諸王分地亦碁布其間漠南漠北並無他族雜處又自太祖盡平西域悉以封諸王駙馬亦與今之外藩王公逈異而青海之地為貴徳州及土蕃朶甘思等處皆屬於吐蕃宣慰司盖唐時突厥囘紇吐谷渾西域覊縻等州皆為天子宗親之所鎮守國家官司之所統治版籍𨽻於司徒賦稅等於内地不可以外藩例之矣明明史外國韃靼列傳永樂二年阿嚕岱䝉古語阿嚕山隂也岱有也原作阿魯台今改正奏瑪哈穆特䝉古語五行之行也原作馬哈木今改正等弑其主願輸誠内附請為故主復仇天子義之封為和寕王自是嵗一貢或二貢以為常諳達滿洲語伙伴也原作俺答今改正有孫曰巴罕納古爾䝉古語巴罕小也納古爾池也原作把漢那苦今改正率其屬阿爾噶滿洲語術也原作阿力哥今改正等來降大同巡撫方逢時受之以告總督王崇古詔授巴罕指揮使阿爾噶正千户諳達方西掠土蕃聞之亟引還約諸部入犯崇古遣譯者鮑崇徳往言朝廷待巴罕甚厚第能縳送板升諸叛人趙全等旦送至巴罕即夕返矣諳達大喜發使與崇徳來乞封且請輸馬與中國鐡鍋布帛互市隨執趙全李自馨等數人來獻崇古乃以帝命遣巴罕歸諳達得孫大喜上表謝詔封諳達為順義王瓦刺列傳瓦刺在韃靼西元亡其强臣孟克特穆爾䝉古語孟克經常之常也特穆爾也原作猛克帖木兒今改正據之死衆分為三其渠曰瑪哈穆特曰太平曰巴圗博囉䝉古語巴圖堅固也博囉青色也原作把秃孛羅今改正永樂六年瑪哈穆特等遣阿南達達實阿南達䝉古語佛名也達實唐古特語吉祥也原作暖答失今改正等來朝貢馬仍請封明年夏封瑪哈穆特為特進金紫光禄大夫順寕王太平為特進金紫光禄大夫賢義王巴圗博囉為特進金紫光禄大夫安樂王賜印誥額森䝉古語平安也原作也先今改正諸子哈喇哈達䝉古語哈喇黑色也哈達山峯也原作火兒忽答今改正等徙居剛剛滿洲語雁鳴也原作干趕今改正河弟巴圗䝉古語解見前原作伯都今改正王姪烏爾古訥䝉古語滋生也原作几忽納今改正等往依哈宻巴圗王英宗三年哈宻為請封詔授巴圖王都督僉事烏爾古訥指揮僉事謹案明時漠南漠北皆為䝉古之地自成祖時有和寕順寕賢義安樂四王之封然其後屢為邊患雖嘗列置衛所設都督都指揮等官亦徒存其名耳至諳達以孫故納欵始受朝廷封爵於是邊境稍靖而明運亦将季矣我朝徳威懐畏鱗集仰流自興京肇建之前科爾沁貝勒明安即遣使通好自後䝉古諸部落向風内屬朝貢不絶今具載於篇至我皇上綏輯逺人凖部回部以次底定玉闗以西二萬餘里置吏耕屯徧設郡縣其詳具載新疆各官篇兹不複綴由今溯古無外之模逈非前代所可及也欽定厯代職官表卷七十一
