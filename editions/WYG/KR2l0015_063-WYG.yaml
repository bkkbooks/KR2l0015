  text: 總兵副將表總兵副將國朝官制總兵官正二品直𨽻馬蘭鎮泰寧鎮宣化鎮天津鎮正定鎮各一人山東兖州鎮登州鎮各一人山西太原鎮大同鎮各一人河南河北鎮南陽鎮各一人江南崇明鎮狼山鎮夀春鎮各一人江西南昌鎮南贑鎮各一人福建金門鎮海壇鎮南澳鎮臺灣鎮福寧鎮汀州鎮建寧鎮漳州鎮各一人浙江黄巖鎮定海鎮温州鎮處州鎮衢州鎮各一人湖廣㐮陽鎮宜昌鎮鎮筸鎮永州鎮各一人四川川北鎮重慶鎮建昌鎮松潘鎮各一人陜西延綏鎮與漢鎮河州鎮各一人甘肅西寧鎮寧夏鎮凉州鎮巴里坤鎮各一人廣東左翼鎮右翼鎮碣石鎮潮州鎮髙州鎮瓊州鎮各一人廣西左江鎮右江鎮各一人雲南臨元鎮開化鎮騰越鎮鶴麗鎮昭通鎮普洱鎮各一人貴州安籠鎮古州鎮鎮逺鎮威寧鎮各一人各掌其鎮之軍政統轄本標官兵及分防各營協將弁而受成于提督馬蘭鎮駐遵化州之馬蘭闗本標左右二營同城一營分防三營泰寧鎮駐易州之梁各莊本標左右二營分防九營宣化鎮駐宣化府本標中左右三營同城一營分防二協二十有四營天津鎮駐天津府本標左右二營同城一營分防二十有二營正定鎮駐正定府本標左右二營同城一營分防十有一營兖州鎮駐兖州府本標左右二營分防二協十營登州鎮駐登州府本標左右前三營分防二協九營太原鎮駐平陽府本標左右二營同城一營分防一協十有一營大同鎮駐大同府本標中左右前四營分防一協三十有一營河北鎮駐懐慶府本標左右二營分防七營南陽鎮南陽府本標左右二營分防七營崇明鎮駐崇明縣本標中左右竒兵四營狼山鎮駐通州本標中左右三營分防五營夀春鎮駐夀州本標中左右三營分防四營南昌鎮駐南昌府本標前後二營同城二營分防十有一營南贑鎮駐贑州府本標中左右三營同城一營分防十有二營金門鎮駐同安縣本標左右二營海壇鎮駐福清縣之海壇汛本標左右二營南澳鎮駐廣東潮州府之南澳兼屬兩廣總督及廣東提督節制本標左右二營臺灣鎮駐臺灣府本標中左右三營同城一營分防三協三營福寧鎮駐福寧府本標中左右三營分防三營汀州鎮駐汀州府本標中左右三營分防一營建寧鎮駐建寧府本標中左右三營分防一協一營漳州鎮駐漳州府本標中左右三營分防七營同城一營黄巖鎮駐黄巖縣本標中左右三營同城一營分防一協一營定海鎮駐定海縣本標中左右三營同城一營分防一協二營温州鎮駐温州府本標中左右三營同城一營分防三協三營處州鎮駐處州府本標中左右三營分防一協一營衢州鎮駐衢州府本標中左右三營同城一營分防三協三營㐮陽鎮駐榖城縣本標中左右三營同城一營分防一協三營宜昌鎮駐宜昌府本標中左前後四營分防一協三營鎮筸鎮駐辰州府之鎮筸五寨司城本標中左右前四營分防二協二營永州鎮駐永州府本標中左右三營分防三營川北鎮駐保寧府本標中左右三營分防三營重慶鎮駐重慶府本標中左右三營分防一協五營建昌鎮駐寧逺府本標中左右三營分防十營松潘鎮駐松潘衞本標中左右三營分防一協七營延綏鎮駐榆林府本標中左右三營分防三協二十六營同城一營興漢鎮駐興漢州本標中左右三營同城一營分防一協九營河州鎮河州本標左右二營分防一協十有二營西寧鎮駐西寧府本標中左右前後五營同城一營分防一協十有二營寧夏鎮駐寧夏府本標左右前後四營同城一營分防二協十有一營凉州鎮駐凉州府本標中左右前後五營同城一營分防一協十有九營肅州鎮駐肅州府本標中左右三營同城一營分防二協十有六營巴里坤鎮駐巴里坤城本標中左右三營分防一協三營左翼鎮駐東莞縣之虎門寨本標中左右三營分防三協四營右翼鎮駐英徳縣本標中左右三營分防二協二營碣石鎮駐惠州府之碣石衞本標中左右三營分防一營潮州鎮駐㨗勝所本標中左右三營同城一營分防一協四營高州鎮駐高州府本標左右二營分防三協八營瓊州鎮駐瓊州府本標左右二營分防六營廣東又有南澳鎮兼屬浙閩總督及福建水師提督節制本標左右二營分防一協二營左江鎮駐南寧府本標中左右三營同城一營分防三協五營右江鎮駐泗城府本標中左右三營分防一協三營臨元鎮駐臨安府本標中左右三營分防二營開化鎮駐開化府本標中左右三營分防一協一營騰越鎮駐騰越州本標中左右三營分防二協一營鶴鹿鎮駐鶴慶府本標中左右三營分防一協一營昭通鎮駐昭通府本標中左右前四營分防二營普洱鎮駐普洱府本標中左右三營安龍鎮駐南籠府本標中左右三營分防四營古州鎮駐古州本標中左右三營分防二協四營鎮逺鎮駐鎮逺府本標中左右三營分防二協八營威寧鎮駐威寧州本標中左右二營分防二營副將従二品直𨽻督標一人三屯協河屯協山永協河間協通州協大名協張家口協獨石口協各一人山東文登協膠州協臨清協沂州協各一人山西蒲州協殺虎口協各一人江南督標一人江寧城守營京口協安慶協太湖協各一人江西九江協袁州協各一人福建督標一人閩安協臺灣協北路協水師協福州城守營興化城守營延平城守營各一人浙江杭州城守營嘉興協湖州協紹興協象山協台州協樂清協瑞安協平陽協金華協嚴州協各一人湖廣督標一人鄖陽協黄州協施南協長沙協洞庭協永順協辰州協靖州協沅州協永綏協衡州協寳慶協各一人四川督標將軍標各一人阜和協䕫州協維州協各一人陜西將軍標一人靖逺協慶陽協潼闗協波羅協神木協定邊協漢中城守營岷洮協各一人甘肅督標一人永固協永昌協中衞協西大通協金塔寺協西安協瑪納斯協哈宻協各一人廣東督標一人廣州城守營肇慶城守營惠州協順徳協香山協春江協南雄協三江口協龍門水師協羅定協黄岡協澄海協各一人廣西義寧協平樂協廣逺協潯州協梧州城守營新太協鎮安協各一人雲南督標一人曲尋協楚雄協永昌協龍陵協維西協各一人貴州清江協大定協銅仁協都匀協上江協黔西協遵義協平逺協定廣協各一人各掌其分地之軍政以整飭行伍參將以下之在其分内者胥𨽻焉凡副將之為總督統理營務者曰督標中軍副將其為駐防將軍統理營務者曰將軍標中軍副將為河道總督漕運總督統理營務及稽核工汛催䕶漕船者曰河標中軍副將漕標中軍副將兹河標漕標副將已别具河道漕運總督篇内故不贅列厯代建置謹案總兵之官始於明代前此無聞焉副將之名惟見于北魏北齊而自隋以後未有置者今既以古來統軍之將入提督表内因以其副貳者系之此表以誌沿溯之略而厯代異同因革則詳具於左云三代周禮夏官制軍二千五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫謹案州長之職師田行役之事帥而致之則州長于軍即為師帥也黨正之職師田行役以其法治其政事則黨正於軍即為旅帥也然師帥旅帥之制周初已具書之牧誓有千夫長百夫長孔安國以為千夫長即師帥盖師雖二千五百人舉其全數亦得稱千夫長其百夫長孔氏以為卒帥而鄭康成以全數凖之亦即以為旅帥也要之夏官所云周禮之正法若量時制事未必盡同齊語二千人為旅鄉良人帥之呉語百人為行十行一旌十旌一將軍而注引司馬法曰十人之帥執鈴百人之帥執鐸千人之帥執鼔萬人之將執大鼓其計人制將皆以什數固與周禮異矣周之師帥旅帥實統于將軍其與今之總兵副將統於提督者制亦相近焉秦馬端臨文獻通考秦置郡丞以佐守在邊為長史掌兵馬謹案秦制郡守治民丞佐之尉典兵而邊郡長史亦掌兵馬其所以佐守者豈即其所以佐尉者與秦之行軍亦有長史如司馬欣為章邯長史見漢書項籍傳則因事而設不為定制漢漢書百官公卿表郡有丞邊郡又有長史掌兵馬秩皆六百石郡尉典武職甲卒有丞秩六百石謹案錢文子曰漢邊郡太守置長史一人丞一人治兵民當兵行長史知郡長史與丞不並置惟郡尉之丞佐其尉典武職甲卒者乃為一定之官也漢書高帝本紀顔師古注張宴曰材官騎士常以八月太守都尉令長丞㑹都試課殿最謹案漢郡守尉行都試之法而丞亦與焉知丞即不行長史而亦仍佐守典兵馬之事者矣王應麟玉海漢初軍制主閑廐而名廐將主輜重而名重將將如林之師而名林将將築城之兵而名城將弩則有弩將射則有樓煩將騎則有郎騎將謹畏則謂之慎将勇特則謂之特將車司馬騎司馬各效其用長隊將二隊將三隊將各因其才謹案將兵者之稱將自周以前有之而著以為官名則始見於秦漢之際應麟所列其等第者各有差次然俱特將者之専號也他如韓信撃越輔以張耳曺參攻城略地每與淮隂侯俱雖一時所授不為常秩而置帥有副亦即今副將所托始也杜佑通典後漢大將軍驃騎將軍車騎將軍衞將軍其領軍皆有部曲大將軍營五部部校尉一人軍司馬一人其不置校尉部但以軍司馬一人其别營領屬為别部司馬謹案後漢省郡都尉并職太守亦每郡置丞一人其當邊戍者丞為長史王國之相亦如之然則都尉之丞已隨尉俱廢至諸將軍之號雖不為統兵而設然其營部之校尉司馬亦有似今之總兵副將者故並著之三國三國蜀志馬忠列傳丞相亮開府以忠為門下督王平列傳遷後典軍安漢將軍副車騎將軍呉壹住漢中謹案王平以將軍副呉壹鎮漢中此如今總兵受提督節制之比至馬忠之為開府門下督則當如今督標中軍副將之比也三國志甘寧列傳拜折衝將軍為前部督受敕出斫敵營乃酌酒與其都督潘璋列傳拜偏將軍領百校謹案前部督下有都督此猶今總兵下之有副將而偏將軍者則正如今副將之比也晉晉書職官志假節為都督者所置與四征鎮加大將軍不開府為都督者同謹案晉驃騎以下及諸大將軍不開府非持節都督者置司馬一人若陶侃𫝊侃都督江州増置左右長史司馬盖異數也其後侃既遜位以後事付右司馬王愆期加督䕶統領文武知督䕶乃隨時權設之號而司馬亦如後漢大將軍營之軍司馬矣又張實𫝊有太府司馬韓璞胡三省曰張氏保據河西有太府司馬太府少府主簿等官蓋都督府為太府凉州府為少府也晉書職官志武帝置南蠻校尉干㐮陽西戎校尉于長安南夷校尉于寧州元康中䕶羌校尉為凉州刺史西戎校尉為雍州刺史南蠻校尉為荆州刺史江州省南蠻校尉尋又置于江陵改南夷校尉曰鎮蠻校尉安帝時于襄陽置寧蠻校尉武帝又置平越中郎將居廣州謹案晉䕶羗等校尉多領以刺史然其秩較卑司馬太守亦得兼之如朱燾以輔國司馬為南蠻校尉庾翼以西陽太守遷南蠻校尉領南郡太守文處茂以涪陵太守進輔國將軍西夷校尉巴西梓潼二郡太守是也其官頗近今之副將故著之又晉有西蠻校尉當為益州刺史觀毛寳𫝊載其子穆之朱序𫝊載其父燾所厯職皆西蠻校尉益州刺史可見此亦疑即西夷校尉之互名而志俱不及之疎矣晉書王㳟列傳遣牢之率帳下督顔延先據竹里謹案帳下督盖如今之督標中軍副將也宋齊梁陳宋書百官志江右以來諸公領兵者置司馬一人宋書明帝本紀出為使持節都督徐兖二州豫州之梁郡諸軍事鎮北將軍徐州刺史又徙為都督雍梁南北秦四川郢州之竟陵諸軍事寧蠻校尉雍州刺史持節常侍將軍如故謹案宋諸蠻夷校尉大約一如晉制其南蠻校尉孝建中省而䕶羌及西夷校尉皆不見于志至寧蠻校尉志云晉武帝置與晉志所云安帝置者亦稍不同南齊書豫章王嶷列傳為都督荆湘八州諸軍事南蠻校尉荆湘二州刺史晉宋之際刺史多不領南蠻别以重人居之至是有二府謹案齊制凡蠻夷校尉或多領以太守惟䕶三巴校尉後改刺史其餘則猶是晉宋之舊也梁陳無所改作故不偹列北魏魏書穆罷列傳除虎牢鎮將轉吐亰鎮將陸俟列傳拜離石鎮將李恢列傳拜員外散騎常侍安西將軍長安鎮副將李元茂列傳除彭城鎮副將北齊書竇泰列傳神武為晉州請泰為鎮城都督參謀軍事韓軌列傳神武鎮晉州引為鎮城都督仍督中軍庫狄盛列傳為高祖親信都督累加中軍將軍為豫州鎮城都督步大汗薩列傳為秦州鎮城都督劉豐列傳魏永安初除靈州鎮城大都督周書于謹列傳太祖臨夏州以為防城大都督兼夏州長史獨孤信列傳建明初為荆州新野鎮將帶新野郡守尋遷荆州防城大都督帶南鄉守楊寛列傳父鈞北道大行臺恒州刺史懐朔鎮將謹案魏高陽王澄以北邊鎮將選舉彌輕奏求重鎮將之選蓋魏之鎮將下鎮大將一等鎮副將又下鎮將一等蓋正如今之總兵副將其鎮城都督當如今之副將而鎮城大都督則亦總兵之比也又齊書堯雄傳擒梁鎮將茍元亷知南朝亦有鎮將矣北齊書任胄列傳胄解郡為都督高祖以晉州重要留清河公岳為行臺鎮守以胄𨽻之周書賀抜岳列傳爾朱天光為使持節督二雍二岐諸軍事驃騎大將軍雍州刺史以岳為左大都督又以征西將軍侯莫陳恱為右都督並為天光之副謹案任胄為都督𨽻行臺高岳侯莫陳恱為右都督副節將爾朱天光正如今總兵之屬總督也北齊隋書百官志後齊三等諸鎮置鎮將副將謹案齊之鎮將副將蓋悉仍魏制若趙郡王叡領山東兵數萬監築長城其還也部分營伍督帥監領强弱相持則其軍官之差次亦大略可見矣後周通典後周有大都督帥都督都督謹案後周改都督諸軍為總管則總管為都督之任而又有大都督帥都督都督蓋俱為統軍之官而下於總管者正如今總兵副將俱下於提督也隋隋書百官志舊有兵處則刺史帶諸軍事以統之至是别置都尉副都尉都尉正四品領兵與郡不相知副都尉正五品謹案隋煬帝定令改大都督為校尉帥都督為旅師都督為隊正知周時都督之名固已微矣若郡有兵處别置都尉副都尉領之雖品秩較卑亦略與今總兵副將相仿也隋書觀王雄列傳雄弟達拜給事黄門侍郎時吐谷渾冦邊詔上柱國元楷為元帥達為司馬蜀王秀列傳大將軍劉噲之討西㸑也高祖令上開府楊武通將兵繼進秀使嬖人萬智光為武通行軍司馬謹案行軍司馬之官始此至唐而始有員額蓋即漢之軍司馬也唐新唐書百官志節度使行軍司馬副使各一人謹案唐之行軍司馬掌弼戎政居則習蒐狩有役則申戰守之法器械糧糒軍籍賜予皆専焉本軍節使有闕亦以次升授如閻巨源以勝州刺史攝振武行軍司馬屬其帥范希朝入覲遂代為節度陸長源為宣武軍行軍司馬汴州政事皆决斷之後代董晉知留後事則其職正如今之總兵而副使正如今之副將也若節度副大使當時號為儲帥藩鎮之専横者每以授其子其甫除方鎮而未賜旄節者亦或稱副大使則非其例矣又唐制凡元帥都統俱有行軍司馬如鄭畋為京城四面諸軍行營都統以前朔方節度使唐宏夫為行軍司馬然兵罷則省非定制也舊唐書職官志諸鎮上鎮將一人正六品下鎮副一人正七品下中鎮將一人正七品上鎮副一人從七品上下鎮將一人正七品下鎮副一人從七品下謹案唐諸鎮凡上鎮二十中鎮九十下鎮一百三十五皆為防邊而設其將副秩亦較卑然原其設官則本於曺魏四鎮將軍之名而與北魏所稱鎮將者其職守略同又列鎮分等差殆亦如今各鎮各協之别故並著於此五季新五代史盧文進列傳莊宗弟存矩為新州團練使統山後八軍王殷列傳遷靈武馬步軍都指揮使安重榮列傳父全勝州刺史振武馬步軍都指揮使重榮為振武巡邊指揮使謹案五季時之統兵官大率為行軍而設非有定員若新州團練使之統山後軍以及靈武振武之都指揮使則亦有似今之鎮守協鎮者矣宋宋史職官志路分都監掌本路禁旅屯戍邊防訓練之政令以肅清所部謹案宋建炎三年以要郡守臣帶本路兵馬都監武臣一員充副都監紹興三年罷守臣兼兵職而副都監如故則各路分之都監副都監亦如今總兵副將之比也章如愚山堂考索都鈐轄副鈐轄宋以朝官及諸司使以上充或一州或一路或兩路三路亦有無都字者建炎中要郡守臣兼兵馬鈐轄以武臣為副改諸路都監為副鈐轄紹興中守臣罷兼兵職副鈐轄改為路分都監謹案宋統兵之官興罷不常其名號亦糅雜今參考諸書知都鈐轄即守臣之帶兵馬都監者副鈐轄即各路分之副都監而守臣罷兼兵職後之設官專與兵職者葢自副鈐轄改為路分都監始惟各路分之都監止一人而猶仍副都監之名不可解也遼遼史百官志南靣軍官諸軍兵馬都總管府某兵馬副總管同知某兵馬事謹案遼北靣上京路控制諸奚有諸軍都虞侯司官曰都虞侯亦今總兵鎮守邊塞者之比附著於此金金史百官志諸總管府同知都總管一員從四品掌通判府事副都總管一員正五品所掌與同知同統軍司副統軍一員正四品謹案金諸邊將正將常提控部保將輪畨巡守邊境副將部將輪畨巡守邊境其統轄與内地之將副同元元史百官志宣尉使司都元帥府同知二員副使二員都元帥府副元帥二員明明史職官志都指揮使司都指揮同知二人從二品都指揮僉事四人正三品謹案都指揮同知為都指揮使之貳有如今之總兵則其僉事亦副將之比歟明史職官志總兵官副總兵無品級無定員總鎮一方者為鎮守獨鎮一路者為分守又有提督提調巡視備禦領班備倭等名凡總兵副總兵率以公侯伯都督充之其總兵挂印稱將軍者雲南曰征南將軍大同曰征西將軍湖廣曰平蠻將軍兩廣曰征蠻將軍宣府曰鎮朔將軍甘肅曰平羌將軍寧夏曰征西將軍交趾曰副將軍徐學聚國朝典彚作平夷副將軍延綏曰鎮西將軍其在薊鎮貴州湖廣四川及儹運淮安者不得稱將軍挂印宣徳間又設山西陜西二總兵嘉靖間分設廣東廣西貴州湖廣二總兵為四改設福建保定副總兵又添設浙江總兵萬厯間又増設於臨洮山海天啟間増設登萊至崇禎時益紛不可紀而位權亦非復當日鎮守薊州總兵官一人舊設隆慶二年改為總理練兵事務兼鎮守駐三屯營協守副總兵三人鎮守昌平總兵官一人舊設副總兵又有提督武臣嘉靖二十八年裁副總兵以提督改為鎮守總兵駐昌平城聽總督節制鎮守遼東總兵官一人舊設駐廣寧隆慶元年令冬月移駐河東遼適中之地調度防禦應援海州瀋陽協守副總兵一人遼陽副總兵舊為分守嘉靖四十五年改為協守鎮守保定總兵官一人𢎞治十八年初設保定副總兵後改為參將正統九年復為分守副總兵嘉靖二十年改為鎮守三十年改設鎮守總兵官萬厯元年令春秋兩防移駐浮圖峪遇有警移駐紫荆關以備入援鎮守宣府總兵官一人舊設駐宣府鎮城協守副總兵一人鎮守大同總兵官一人舊設駐大同鎮城協守副總兵一人鎮守山西總兵官一人舊為副總兵嘉靖二十年改設駐寧武關防秋移駐陽方口防冬移駐偏關協守副總兵一人鎮守延綏總兵官一人舊設駐鎮城協守副總兵一人鎮守寧夏總兵官一人舊設駐鎮城協守副總兵一人鎮守甘肅總兵官一人舊設駐鎮城協守副總兵一人鎮守陜西總兵官一人舊駐㑹城後移駐固原分守副總兵一人鎮守四川總兵官一人隆慶五年添設駐建武所分守副總兵一人鎮守雲南總兵官一人舊設駐雲南府鎮守貴州總兵官一人舊設嘉靖三十二年加提督麻陽等處地方職銜駐銅仁府鎮守廣西總兵官一人舊為副總兵嘉靖四十五年改設駐桂林府鎮守湖廣總兵官一人舊設嘉靖十年罷十二年復設萬厯八年又罷十二年仍復設駐省城鎮守廣東總兵官一人舊為征蠻將軍兩廣總兵官嘉靖四十五年分設駐潮州府協守副總兵一人提督狼山副總兵一人嘉靖三十七年添設駐通州鎮守江南副總兵一人舊係總兵官駐福山港後移駐鎮江儀真二處嘉靖八年裁革十九年復設二十九年仍革三十二年改設副總兵駐金山衞四十三年移駐呉淞鎮守浙江總兵官一人嘉靖三十四年設總理浙直海防三十五年改鎮守浙直四十二年改鎮守浙江舊駐定海縣移駐省城鎮守福建總兵官一人舊為副總兵嘉靖四十二年改設駐福寧州鎮守山東總兵官一人天啟中増設總督漕運總兵官一人永樂二年設總兵副總兵統領官軍海運後海運罷専督漕運天順元年又令兼理河道謹案明統兵之官専制者曰總兵次曰副總兵其鎮守地方者或遇事増添改革俱本部奏請定奪又如張任學崇禎時巡按河南以諸將不任撃賊上疏請易武階帝壯之下吏兵二部及都察院議諸臣以文吏無改武職者請仍以監軍御史兼總兵事帝不從命授署都督僉事為河南總兵官此一時僅見之事蓋明制凡有事征伐則命總兵佩將印統兵以出既旋即上所佩將印然多充以勲戚其後由行陣出身者或以都督等官擢任兵事其勞效可紀者亦間不乏又迨其季而臨陣縮朒避賊不撃甚有縻餉玩冦以邀封賞者則軍實替而軍政隳亦非盡由初制之未善也我國家軍營之制既設提督以統録旗官兵而總兵副將亦各有専閫之寄協守之責凡有簡授必慎擇其人皇上又以向之記名副將請升總兵者多由侍衞章京滿州人員保送而鑾儀衞之滿州漢軍人員又有應升總兵定額者是以所用於旗員較多乃特命兵部定為限制析其額數以旗員漢人銓次補用俾澄叙一歸大公又命各省總督及兼管提督之巡撫於漢人副將内舉其堪勝總兵者書其考語送部引見於此見立法求才其難其慎而所以飭營伍重保障之盛心萬古為昭矣欽定厯代職官表卷五十七
