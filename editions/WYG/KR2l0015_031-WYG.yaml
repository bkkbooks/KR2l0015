body:
  text: 文淵閣閣職表文淵閣閣職國朝官制文淵閣領閣事滿洲漢人各一人掌總領秘書典司冊府國朝定例大學士有以文淵閣繫銜而閣制未建我皇上右文稽古修明典籍乾隆三十七年特詔直省守吏購訪海内遺書以廣石渠藏弆逸文墜簡竒秘響臻復允廷臣議棌古書之散見永樂大典者釐訂成編爰勅館臣排校繕録彚為四庫全書凡三萬六千冊而贏命於文華殿後鼎建文淵閣以貯之其規制則準寧波范氏天一閣之式依四部門目列架分儲四十一年上以宋程俱麟臺故事所載秘書官品頗詳詔大學士等集議叅仿其制剏置閣職領閣事以大學士恊辦大學士掌院學士兼充直閣以下咸定額有差用資典守蘭臺東觀永昭美備焉文淵閣提舉閣事一人以内務府大臣兼充掌率内務府官屬以綜理閣務焉文淵閣直閣事六人以科甲出身之滿洲漢人内閣學士内班出身之滿洲詹事少詹事讀講學士漢人詹事少詹事讀講學士等官兼充掌典守釐輯之事以時與校理輪畨入直凡春秋曝書則董率而經理之文淵閣校理十有六人以内班出身之滿洲庻子侍讀侍講洗馬中允贊善編修檢討漢人庻子侍讀侍講洗馬中允贊善修撰編修檢討及科甲出身之内閣侍讀等官兼充分掌註冊㸃騐之事文淵閣檢閲八人以科甲出身之内閣中書兼充掌排次清釐之事文淵閣辦理事務内務府司員四人筆帖式四人由提舉閣事大臣掄選奏充掌一切收發啟閉掃除及稽查宿直之事歴代建置三代陸德明莊子釋文世本云彭祖姓籛名鏗在商為守藏史在周為柱下史史記老子列傳周守藏室之史也司馬貞索隠周藏書室之史老子為柱下史即藏室之柱下因以為官名謹案據索隠所云則柱下史即守藏書室之官非有二職李善文選註引列仙傳謂李耳為周柱下史轉為守藏史者非也漢世殿中蘭臺有圖籍秘書而御史屬於蘭臺故後代相沿以柱史為御史通稱其實乃掌書之官並非糾察之任今仍繫之於此表周禮春官外史上士四人中士八人下士十有六人掌三皇五帝之書謹按周官小史掌邦國之志先鄭謂若周志鄭書之類葢志諸侯所出之繫與其廟祧昭穆如今之玉牒及家譜外史掌四方之志後鄭謂若魯之春秋晉之乘楚之檮杌葢志九州列國四海百蠻世系之所自出分封之所由始朝貢之斷續禮樂之更革俗尚之醜好如今之各直省志書皆與歴代秘書所掌不同惟三皇五帝之書則正王者藏書之府所存之舊典實柱下職守所在今故互著於表焉秦史記張蒼列傳秦時為御史主柱下方書謹按如淳注以方書為四方文書然考漢書叙傳稱北平志古司秦柱下張蒼封北平侯故稱北平顔師古曰志記也謂多記古事也司主也是可知柱下實掌古籍不獨天下圖書計簿也秦雖燔滅詩書而博士所存故在則禁中亦必有藏書之所故以張蒼主之歟漢漢書功臣侯表山都正侯王恬啟漢五年為郎中柱下令顔師古注今主柱下書史也謹案漢初沿秦之制則所謂柱下令者當亦主圖籍之官也程俱麟臺故事自漢置未央宫即麒麟天禄閣在其中命劉向揚雄典校皆在禁中即内庫書也漢書藝文志武帝建藏書之䇿置寫書之官下及諸子傳說皆充秘府至成帝時以書頗散亡使謁者陳農求遺書於天下詔光禄大夫劉向校經傳諸子詩賦步兵校尉任宏校兵書太史令尹咸校術數侍醫李柱國校方技每一書已向輙條其篇目撮其指意録而奏之漢書揚雄傳雄為大夫校書天禄閣上謹案漢以麒麟天禄閣為禁中藏書之所即後世秘閣之制所由昉而劉向揚雄等皆以他官典校其間則今文淵閣閣職為内閣翰詹諸臣兼銜正其例也又漢御史中丞居殿中掌蘭臺秘書即古柱下之職與秘書省職掌相通故歴代營都邑置府寺必以秘書省及御史臺為鄰自唐以後御史臺始專掌糾察無復典守圖書之職今已系之都察院篇特附見其本制於此杜佑通典後漢圖書在東觀後漢書馬融𫝊拜為校書郎中詣東觀典校秘書章懐太子李賢注謝承及續漢書並云為校書郎又拜郎中也後漢書蔡邕傳召拜郎中校書東觀通典後漢選他官入東觀典校秘書葢有校書之任而未為官也故以郎居其任則謂之校書郎以郎中居其任則謂之校書郎中當時重其職故學者稱東觀為老氏藏室道家蓬萊山焉後漢書桓帝本紀延熹二年初置秘書監官應劭漢官儀秘書監一人秩六百石馬端臨文獻通考桓帝置秘書監掌典圖書古今文字考合同異屬太常以其掌圖書秘記故曰秘書後省謹案自後漢置秘書監而典司圖籍設有專官歴代相因未嘗改作至明始以其職併入翰林院然翰林官署既不在禁中内府藏書遂無人職掌逮於季世而散佚殆盡其立法之弊亦可見矣今以四庫全書藏庋文淵閣特置閣職以綜領其事與前代秘書省監職制相承源流可以考見謹詳著於表用昭延閣隆規實監古而益彰詳備也三國三國蜀志郤正傳正入為秘書吏轉為令史遷郎至令通典魏武帝又置秘書令典尚書奏事文帝黄初初置中書令典奏事而秘書改令為監掌藝文圖籍之事初屬少府後乃不屬武帝置秘書令及丞一人黄初中有左右二丞劉放為左丞孫資為右丞文獻通考魏始置秘書校書郎太平御覽王肅言秘書不應屬少府表曰魏之秘書即漢之東觀郡國稱敢言之上東觀未有𨽻名於少府者也太和中蘭臺秘書爭儀三府奏議秘書司先王之載籍與中書相亞宜與中書為官聨裴松之三國志注薛夏為秘書丞嘗以公事移蘭臺蘭臺自以臺也而秘書署耳謂夏不得為移推使當有坐者夏報之曰蘭臺為外臺秘書為内閣臺閣一也何不相移之有蘭臺屈無以折自是遂以為常謹案自漢以後皆仿麒麟天禄之制以秘閣為藏書之府故魏薛夏稱秘書為内閣晉永平詔書亦以秘書掌中外三閣圖書此可證秘書省官即如今之閣職也晉章俊卿山堂考索晉武帝以秘書併入中書省惠帝後别置秘書監掌三閣圖書自是秘書之府始居於外唐六典惠帝永平元年詔秘書典綜經籍考校古今中書自有職務逺相統攝於事不專宜令復别置秘書寺掌中外三閣圖書自是秘書寺始外置焉晉書職官志秘書監其屬官有丞有郎通典晉秘書監銅印墨綬進賢兩梁冠絳朝服佩水蒼玉丞銅印墨綬進賢一梁冠絳朝服稽紹司馬彪傅暢王謐等並為此官秘書郎掌三閣圖書校閲脫誤進賢一梁冠絳朝服亦謂之郎中武帝分秘書圖籍為甲乙丙丁四部使秘書郎中四人各掌其一宋齊梁陳宋書百官志秘書監一人丞一人郎四人南齊書百官志秘書監一人丞一人郎不著員數晉秘書閣有令史掌衆書見晉令齊亦置令史正書及弟子皆典教書畫通典宋齊秘書郎皆四員尤為美職皆為甲族起家之選待次入補其居職例十月便遷謹案晉代秘書之府始居於外而南史載宋廢帝時明帝被拘殿内住在秘書省是宋齊以後秘書當仍在禁中矣隋書百官志梁秘書省置監丞各一人郎四人掌國之典籍圖書天監七年定秘書監為十一班秘書丞為八班秘書郎為二班山堂考索秘書郎齊梁末多以貴遊子弟為之無其才實通典陳秘書所掌與梁同謹案自晉武帝分秘書圖籍為四部使秘書郎中掌之嗣後宋則有秘書監謝靈運秘書丞王儉齊有秘書丞王亮秘書監謝朏各造四部目録梁則秘書監任昉以秘閣四部篇卷分雜手自讐校由是篇目定焉是歴代秘書皆有簿録實秘書監丞郎職掌所在也北魏魏書官氏志秘書監第三品秘書丞從第四品秘書郎中第七品魏書鄭道昭傳徙秘書丞兼中書侍郎遷秘書監魏書髙祐傳拜秘書令與丞李彪奏著作郎已下參造國書魏書游肇傳為内秘書侍御中散轉通直郎秘閣令魏書韋朏傳遷秘書郎中江式傳式父紹興髙允奏為秘書郎魏書韋纘傳補中書學生除秘書中散通典後漢有秘書校書郎謹案北魏既有秘書監而髙祐傳又有秘書令游肇傳又有秘閣令當即一官而異名至秘書中散為魏所剏設葢入直秘書省以備使令者無常職也又孫惠蔚傳稱惠蔚遷秘書丞疏請依前丞盧昶所撰甲乙新録禆殘補闕損併有無以為定本次第均寫永為常式並令四門博士及在京儒生四十人在秘書省專精校考參定字義是北魏秘書亦當有簿録矣北齊隋書百官志後齊秘書省典司經籍監丞各一人郎中四人校書郎十二人正字四人北齊書魏收傳轉秘書監仍兼著作郎後周通典後周官品正四命春官外史下大夫正一命春官校書下士謹案後周始以起居著作分為二職故外史專記言動不司圖籍惟校書下士則即歴代之校書郎也通典又稱周秘書監亦領著作監掌國史且引栁虯為秘書丞以証似後周亦有秘書監丞之官然考之虯傳虯為秘書丞在西魏文帝大統中後卒於恭帝元年始終皆在魏世並未入周豈得以宇文氏秉政而遂指為周制乎斯葢杜佑徴引之誤未足為據隋隋書百官志秘書省監丞各一人郎四人校書郎十二人正字四人録事二人秘書監正三品秘書丞正五品秘書郎正七品校書郎正九品煬帝即位秘書省降監為從三品増置少監一人從四品減校書郎為十人又改監少監為令少令増秘書郎為從五品加置佐郎四人從六品以貳郎之職又増校書郎員四十人加置楷書郎員二十人從九品掌抄冩御書王應麟玉海大業十一年増秘書省官百二十員以博士補之謹案隋書李文博傳文博直秘書内省典羣書唐書王珪傳開皇十三年詔入秘書内省讐定羣書是隋世秘書省本在外故别有内省以藏書籍也唐舊唐書百官志秘書省隸中書之下秘書監一員從三品少監二員從四品上丞一員從五品上秘書監之職掌邦國經籍圖書之事少監為之貳丞掌判省事秘書郎四員從九品上校書郎八人正九品上正字四人正九品下主事一人從九品上令史四人書令史八人楷書手八十人亭長六人掌固八人秘書郎掌甲乙丙丁四部之圖籍謂之四庫經庫類十史庫類十三子庫類十四集庫類三新唐書職官志校書郎正字掌讐校典籍刋正文章玉海龍朔二年改秘書省曰蘭臺監曰太史少監曰侍郎丞曰大夫秘書郎曰蘭臺郎咸亨復舊垂拱元年曰麟臺太極元年復曰秘書省謹按唐改秘書省曰蘭臺者取漢殿中蘭臺掌秘書之義其改曰麟臺則又取漢麒麟閣藏書之義至歴代秘書多以四部著録其稱四部為四庫亦昉於唐世唐六典所稱唐平王世充收其圖書八萬餘卷自秘書宏文史館司經崇文皆有之分為四庫毎庫二人知名目次序以備檢討者是也唐六典宏文館學士無員數掌詳正圖籍武徳初置修文館武徳末改為宏文館神龍元年改為昭文館開元七年又改為宏文隸門下省自武徳貞觀以來皆妙簡賢良為學士故事五品以上稱為學士六品以下為直學士又有文學直館並無員數皆以他官兼之儀鳯中以館中多圖籍置詳正學士校理自垂拱以來多大臣兼領館中有四部書貞觀初褚無量為檢校館務學士號為館主因為故事其後有張太素劉禕之范履氷並特敇相次為館主焉常令給事中一人判館事校書郎二人從九品掌校理典籍刋正錯謬本置名讐校開元七年罷讐校置校書四人二十三年減二人典書二人館中有經史子集四部之書使典之也其職同流外搨書手三人筆匠三人熟紙裝潢匠九人新唐書職官志集賢殿書院學士直學士侍讀學士修撰官掌刋緝經籍開元五年乾元殿寫四部書置乾元院使有刋正官四人以一人判事押院中使一人掌出入宣奏監守院門知書官八人分掌四庫書六年乾元院更號麗正修書院置使及檢校官改修書官為麗正殿直學士八年加文學直又加修撰校理刋正校勘官十一年置麗正院修書學士十三年改麗正修書院為集賢殿書院五品以上為學士六品以下為直學士宰相一人為學士知院事常侍一人為副知院事又置判院一人押院中使一人其後又増修撰官校理官待制官留院官檢討官文學直之員募能書者為書直又置畫直至十九年以書直畫直搨書有官者為直院至徳二年置大學士貞元初置編録官四年罷大學士八年罷校理置校書四人正字二人元和二年復置集賢校理罷校書正字四年集賢御書院學士直學士皆用五品如開元故事以學士一人年髙者判院事非登朝官者為校理餘皆罷校書四人正九品上正字二人從九品上有中使一人孔目官一人專知御書檢討八人知書官八人書直寫御書手九十人畫直六人裝書直十四人造筆直四人搨書六人典書四人謹案自漢延熹以至於唐皆以秘書掌圖籍而晉宋以後秘書省建置不盡在内廷故禁中别有地以為藏書之所如唐之宏文館有四部書而集賢所寫為御本是也當時剏置官僚以資典守與秘書省各分職事其所掌實約畧相同惟秘書官皆定額而宏文集賢多以他官兼之為差異耳今以宋世三館其制實本於唐謹取宏文集賢著之於表以詳沿革至史館雖兼司書籍而職專史事故仍入翰林院篇内焉新唐書宰相表天寶十二載十二月戊子左相陳希烈為秘書省圖書使玉海馬懐素奏秘書少監盧俌崔沔為修圖書副使唐會要長慶三年四月少監李隨奏請鑄秘書閣圖書印謹案圖書使雖暫置之官然特用大臣以重其事葢如今之領閣事而修圖書副使以秘書少監為之則當如今之直閣事也五季五代史劉岳傳岳為吏部侍郎徙秘書監五代會要晉天福六年監修國史趙瑩奏請下秘書省自唐以來古今典籍經史子集元撰人名氏四部大數報館以憑述經籍志周顯徳二年詔委中書門下於朝官中選差三十人據現在書各求真本校勘刋正舛誤仍於逐卷後署校勘官姓名宜令館司逐月具功課申中書門下謹案五季既有秘書監則少監丞郎宜皆備官惟周世宗時所置之校勘官則以他官差充非常職也又盧文紀傳稱其嘗為集賢殿學士是宏文集賢當亦如唐制設官特史文簡畧無可考見今故闕而不載云宋江少虞宋朝事實類苑梁都汴庻事草創三館湫隘尤甚太平興國中車駕臨幸顧左右曰若此卑陋何以待天下賢俊即日詔有司規度左昇龍門東北車輅院地為三館下詔賜名崇文院以東廊為昭文館書庫南廊為集賢院書庫西廊為史館書庫昭文館本前世宏文館建隆中改之淳化初以吕祐之趙昻安徳裕勾中正並直昭文館則本朝直昭文館自吕祐之等始也集賢有直院有校理端拱初以李宗諤為集賢校理淳化初以和㠓為直集賢院則本朝直集賢院校理自和㠓李宗諤始也史館有直館太平興國中趙隣幾吕䝉正皆為直史館則本朝直史館自趙隣幾等始也本朝三館之外復有秘閣圖書置直閣又置校理咸平初以杜鎬為秘閣校理則直閣校理皆自杜鎬始也李攸宋朝事實端拱元年詔分三館之書萬餘卷别為書庫目曰秘閣以吏部侍郎李至兼秘書監右司諫直史館宋泌兼直秘閣右贊善大夫史館檢討杜鎬為校理而直秘閣秘閣校理之官始於此謹案李燾續資治通鑑長編載建秘閣及置校理等官在太宗端拱元年五月其真宗咸平初但有寫四部書置龍圖閣及太清樓事與秘閣無涉類苑所載有誤當以李攸宋朝事實為正麟臺故事宋集賢院大學士一人以宰相充學士無定員以給諫卿監以上充直學士不常置掌同昭文案此書原脱昭文館官制判院事一人以兩省五品以上充或差二人三館通為崇文院别置官吏有檢討無定員以京朝官充校勘無定員以京朝幕府州縣官充掌聚三館之圖籍監一人内侍充兼監秘閣圖書天禧五年又置同勾當官一人秘閣端拱二年案二年當作元年於崇文院中建擇三館書籍真本并内出古畫墨跡等藏之淳化元年詔次三館直閣以朝官充校理以京朝官充掌繕寫秘藏供御典籍圖書之事判閣一人舊常以丞郎學士兼秘書監領閣事大中祥符九年後以諸司三品兩省五品以上官判國初又置秘閣校理通掌閣事咸平後皆不領務史館舊寓集賢院有檢閲編修之名不常置玉海昭文集賢有大學士史館有監修國史皆以宰相兼領昭文集賢置學士直學士史館集賢置修撰史館有直館檢討集賢有直院校理崇文有檢討校書皆以他官領之初昭文𨽻門下省史館寓於集賢後合為一宋史職官志秘書省監少監丞各一人監掌古今經籍圖書之事少監為之貳而丞叅領之其屬有秘書郎二人掌集賢院史館昭文館秘閣圖籍以甲乙丙丁為部各分其類校書郎四人正字二人掌校讐典籍刋正訛謬各以其職𨽻於長貳嵗於仲夏曝書則給酒食費尚書侍郎待制两省諫官御史並赴遇庚伏則前期遣中使諭㫖聴以早歸大典禮則長貳預集議所以待遇儒臣非他司比宴設錫予率循故事宋初三館秘閣各置貼職元豐五年職事官貼職悉罷以崇文院為秘書省官屬始立為定員山堂考索宋初秘書省隸京百司雖有監少監丞郎校書正字皆以為寄禄官凡經籍圖書悉歸秘閣秘書所掌祭祀祝版而已元豐正名既罷館職盡以三館職事歸秘書省置秘書職事官自監少至正字不領他局宣和初増為十八員以倣登瀛洲之數建炎三年罷紹興元年復置隆興元年詔監少丞外以七員為額二年詔依祖宗舊法更不立額葉夢得石林燕語國朝以史館昭文館集賢院為三館皆寓崇文院其實别無舎但各以庫藏書列於廊廡間爾直館直院謂之館職以他官兼者謂之貼職官制行廢崇文館為秘書監建秘閣於中自少監至正字列為職事官罷直館直院之名而書庫仍在獨以直秘閣為貼職之首葢特以為恩數而已李心傳建炎以來朝野雜記提舉秘書省者官制以來無之政和中初置紹興末髙宗召信安孟王忠厚為醴泉觀使乃命提舉秘書省以寵之凡過局如宰執例麟臺故事天禧四年箋解御集直館校理二十人充檢閲官謹案宋初雖有秘書監而不司圖籍凡四部書皆藏於昭文史館集賢書庫謂之三館後又増建秘閣與三館為四各置直館直院直閣等官其下則為校理檢討元豐改制始歸入秘書監不置昭文集賢以史館隸著作局而直秘閣只為貼職然三館秘閣之名仍在故陳騤作館閣録所述即秘書典故葢典籍之府雖稱名有殊其實一也至宋代所置閣職本有集賢殿修撰後改右文殿直龍圖閣直秘閣三等後増置修撰為集英右文秘閣三等直閣為龍圖天章寶文顯謨徽猷秘閣六等又自龍圖至寶章凡十閣各置學士直學士待制等官以為省部長貳給舎諫議補外之職及庻僚領在外繁劇任使者帶之皆屬虛銜並不得領閣事非麟臺典守所繫今故不著於表遼遼史百官志昭文館昭文館直學士楊遵朂子晦為昭文館直學士秘書監有秘書郎秘書正字著作局有校書郎謹案遼有史館學士修撰已别見翰林院篇而昭文館亦有直學士是遼亦備三館之制特集賢不見於史耳又遼志有崇文館大學士乾文閣學士俱不詳職掌謹附著於此金金史百官志秘書監監一員從三品少監一員正五品丞一員正六品秘書郎二員正七品泰和元年定為二員通掌經籍圖書校書郎從七品承安五年二員泰和五年以翰林院官兼大安二年省一員專掌校勘在監文籍宏文院知院從五品同知宏文院事從六品校理正八品掌校譯經史集賢院貞祐五年設知集賢院從四品同知集賢院從五品司議官正八品不限員諮議官正九品不限員謹案金之宏文集賢二院葢亦沿宋三館之制特宏文尚有校譯經史之事集賢則史文不詳無由考見其職掌矣元元史職官志秘書監秩正三品掌歴代圖籍并隂陽禁書卿四員正三品太監二員從三品少監二員從四品監丞二員從五品典簿一員從七品令史三人知印奏差各二人譯史通事各一人典書二人典吏一人屬官秘書郎二員正七品校書郎二員正八品辨騐書畫直長一員正八品至元九年置其監丞用大臣奏薦選世家名臣子弟為之大徳九年陞正三品給銀印延祐元年定置卿四員叅用宦者二人謹案秘書監為典冊之府而以宦者叅雜其間殊乖儀制又元有昭文館大學士僅為加銜集賢院則掌提調學校徵求隠逸召集賢良雖有大學士學士侍讀侍講學士等官並不典司圖籍與三館舊制不同且張留孫吳全節輩皆以道流而充集賢大學士尤為非體今故不著於表附見於此明明史職官志秘書監洪武三年置秩正六品除監丞一人直長二人尋定設令一人丞直長各二人掌内府書籍十三年併入翰林院典籍明史藝文志明太祖定元都收圖籍致之南京設秘書監丞尋改翰林典籍以掌之永樂中北京既建詔修撰陳循取文淵閣書運致北京正統間楊士竒等言文淵閣所貯書籍向貯左順門北廊今移於文淵閣東閣臣等逐一㸃勘編成書目請用寶鈐識永久藏弆制曰可正徳十年大學士梁儲等請檢内閣并東閣藏書殘闕者令原管主事李繼先等次第修補謹案周官外史掌三皇五帝之書而列國亦各有典書之官故韓宣子聘魯觀書於太史氏而周景王亦謂籍氏司晉之典籍以為大政葢簡䇿之藏憲章所自司存有在不可不昭嚴重也自秦火之後經籍散亡漢代建麒麟天禄諸閣網羅遺佚使光禄大夫劉向等校定羣書於是儲藏之地典守之官制乃畧具歴朝沿襲漸益修明秘書監起於後漢三館肇於唐時無不簡召儒臣廣置僚屬至宋而三館秘閣咸寓於崇文院後復改為秘書省設官頗為詳備崇文總目所載卷帙亦尚賅博然當時藏書雖富而校勘未能精審沈括夢溪筆談稱校書官多不恤職事但取舊書以墨漫一字復注舊字於其側以為日課幾同兒戲神宗有意釐訂召曽鞏等編校黄本書籍開局累年僅能終昭文一館之書而罷鞏集載所撰目録序止十有一篇則其程課之稽遲亦可以想見明初罷秘書之官併其職入翰林院凡書籍之藏於内閣者其篇目既不及前代而楊士竒等所輯書目亦多舛漏典守之事又僅委之典籍一官不能稽核正徳以後遂多為人盜竊以及蠧侵䑕嚙殘缺不完神宗時張居正令中書張萱等整比而所存已屬無多我皇上崇儒念典惟日孜孜御極之初即詔校刋經史纂輯羣書用以嘉惠來學前者特命儒臣編次四庫全書區為應刋應抄及存目三類各撮大㫖撰述提要彚成總目二百卷又别為簡明目録二十卷㑭本末源流瞭如指掌每一書進御即仰䝉乙覽剖晰瑕瑜間荷宸翰親題考据折𠂻永昭定論其中繕録訛謬之處一經睿鑒無不立時呈露詳切訓勵校勘倍凛精詳當首部告成既藏弆文淵閣錫宴賡吟恩隆賚渥纂校諸臣俱䝉逾格優叙備置閣職以重典司又於圓明園建文源閣避暑山莊建文津閣盛京建文溯閣分部尊藏而全書中採擷精粹别為薈要萬二千冊於御花園之摛藻堂圓明園之味腴書室各貯一部以便省覽復命續繕三部貯揚州大觀堂之文滙閣鎮江金山寺之文宗閣杭州聖因寺行宫之文瀾閣特發帑金募工抄録俾江浙士子得以快讀秘書觀摩謄寫教思廣被日星並朗矣欽定厯代職官表卷二十五
