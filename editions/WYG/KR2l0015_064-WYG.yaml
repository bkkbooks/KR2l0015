body:
  text: 㕘將遊擊等官國朝官制􅄁將正三品直𨽻八人山東九人山西十有四人河南五人江南十有一人江西六人福建十有四人浙江七人湖廣十有三人四川八人陜西九人甘肅十有二人廣東十有六人廣西六人雲南十有二人貴州七人游擊従三品直𨽻二十有三人山東八人山西七人河南三人江南二十有七人江西六人福建四十有一人浙江二十人湖廣三十有二人四川二十有二人陜西二十有八人甘肅四十有三人廣東二十有八人廣西十有一人雲南十有八人貴州二十有五人都司正四品直𨽻五十有八人山東十有二人山西二十有七人河南六人江南二十有三人江西二十有四人福建十有七人浙江二十有五人湖廣二十有一人四川三十人陜西三十有八人甘肅四十有四人廣東三十有五人廣西十有九人雲南十有六人貴州二十有二人守備正五品直𨽻六十有六人山東二十有一人山西二十有七人河南十有七人江南五十有七人江西十有五人福建六十有六人浙江五十有三人湖廣五十有三人四川四十有二人陜西四十人甘肅六十有九人廣東八十人廣西三十人雲南四十有七人貴州五十人營千總六品直𨽻一百三十有六人山東四十有七人山西六十有四人河南二十有八人江南一百四人江西三十有二人福建一百四十有一人浙江一百七人湖廣一百三十有四人四川一百二人陜西六十有三人甘肅一百三十有七人廣東一百七十人廣西六十有七人雲南九十有七人貴州一百十有六人把總正七品直𨽻三百十有四人山東一百人山西一百三十有七人河南六十有一人江南二百十有七人江西九十有四人福建二百八十有三人浙江三百九人湖廣二百七十人四川一百九十有九人陜西一百四十有三人甘肅二百九十有八人廣東三百二十有四人廣西一百八十有一人雲南三百一人貴州二百三十有三人各掌其防汛之軍政練飭營伍以聽於其長凡􅄁將之為提督及巡撫統理營務者稱提標若撫標中軍􅄁將游擊之為總兵統理營務者稱鎮標中軍游擊都司之為副將統理營務者稱協標都司其㕘將以下為河道總督漕運總督所屬并各門衞守禦所官俱散見各表此不贅入又直𨽻設有外委把總三百二十有九人山東一百二十人山西二百十有八人河南六十有七人江南三百三人江西九十有四人福建四百六十有三人浙江三百九人湖廣二百七十人四川二百九十有四人陜西二百六十有二人甘肅四百六十有五人廣東三百九十有四人廣西一百八十有一人雲南三百一人貴州二百六十有一人并著於此厯代建置謹案􅄁將以下等官稱號名秩並自明始定前此惟漢有游擊將軍之稱而統兵專征其職頗重與今制不同􅄁將併無其名惟蜀志諸葛亮以馬謖為􅄁軍當為後世􅄁軍之號所由昉而亦不以將稱至都司守備千總把總之稱創自明初前無所因而今之都司與明都指揮司又不同兹故取厯代以來職任相近者各為比附以見梗概云三代周禮夏官制軍百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長謹案族師之職作民而師田行役則合其卒伍簡其兵器以鼓鐸旗物帥而至則族師於軍固為卒長推此而閭胥之為兩長比長之為伍長可知後世之偏禆牙將分領卒伍者實權輿於此矣國語齊語制國五家為軌故五人為伍軌長帥之十軌為里故五十人為小戎有司之所乘里有司帥之四里為連故二百人為卒連長帥之十連為鄉故二千人為旅鄉良人帥之謹案齊制二百人為卒與周禮之百人為卒不同而因人置帥衆寡以等則正如今千總把總之比矣春秋左氏傳晉蒐於綿上新軍無帥使其什吏率其卒乘官屬以従於下軍孔穎達疏什吏謂十人長使其軍内十人之長率其步卒車士與其新軍官屬軍尉司馬之類以従于下軍謹案周書大聚云五户為伍以首為長十人為什以年為長尉繚子云軍中之制五人為伍十人為什五十人為屬百人為閭而晁錯亦云古之制邊縣以備敵使五家為伍伍有長十家一里里有假士四里一連連有假五百十連一邑邑有假候皆擇其邑之賢材有䕶習地形知民心者居則習民於射法出則教民於應敵凡所云皆以十為數則晉之軍制當亦十人置吏也秦馬端臨文獻通考秦法凡戰獲一首賜爵一級皆以戰功相君長漢書刑法志秦使民以功賞相長五甲首而𨽻五家錢文子補漢兵志更卒曰踐更秦爵不更不為更卒左右不更主領更卒其畨上尉主之謹案秦爵自左庶長以上至大庶長皆卿大夫皆軍將也所將皆庶人更卒故以庶更為名大庶長即大將軍也左右庶長即左右偏禆將軍也若不更主領更卒畨上則尉主之其職當在郡尉之下或即如今守備千總之屬也漢漢書韓信列傳令其禆將𫝊餐彭越列傳令校長顔師古注一校之長也呉王濞列傳諸賓客皆得為校尉行間候司馬注在行間或為候或為司馬也陳平列傳平為亞將屬韓王信軍廣武周勃列傳材官引強注服䖍曰能引強弓弩官也孟康曰如今挽強司馬也灌嬰列傳漢王擇軍中可為騎將者皆推故秦騎士李必駱甲今為校尉可為騎將迺令李必駱甲為左右校尉將郎中騎兵所將卒得右司馬騎將各一人注晉灼曰下所謂左右千人之騎靳歙列傳騎千人將注如淳曰騎將率號為千人漢儀注邊郡置部都尉千人司馬候也所將卒得車司馬候各四人騎長十二人申屠嘉列傳以材官蹶張遷為隊帥陸賈列傳使一偏將將十萬衆臨越霍去病列傳去病騎兵車重與大將軍軍等而亡禆將悉以李敢等為大校當禆將趙充國列傳以假司馬従貳師將軍辛慶忌列傳少以父任為右校丞謹案漢郡國之兵屬都尉中尉而令丞尉亦各統其縣然令丞尉究非主兵之官故摭見於𫝊者以著其概蓋亞將騎將行司馬及車司馬當如今之㕘將遊擊之比隊帥或分統材官者當如今都司守備之比其材官挽強亦當就材官中拔取與校長校丞候俱如千總把總之比而禆將偏將大校校尉則固其渾舉之號爾漢書武帝本紀遊擊將軍韓説步兵三萬人出五原蘇建列傳以衛尉為遊擊將軍謹案遊擊之號始見於此其後厯代有之至唐以為従五品下武階其與今之遊擊設有員額者正復不同後漢書百官志大將軍營五部部下有曲曲有軍候一人比六百石曲下有屯屯長一人比二百石其不置校尉部但軍司馬一人又有軍假司馬假候皆為副貳其餘將軍置以征伐無員職亦有部曲司馬軍候以領兵其職吏部集各一人總知營事兵曹掾史主兵事器械稟假掾史主稟假禁司又置外刺刺姦主罪法謹案春秋時晉有元候候奄候正漢制餘將軍或有候亦有假候不必大將軍始有也候比六百石當如今都司守備之比其屯長則千總把總之比又漢末有梯秋屯帥張宣見裴松之所引英雄記其亦屯長之屬歟後漢書耿弇列傳光武見弇等皆以為偏將軍使還領其兵加況耿弇父大將軍興義候得自置偏禆謹案大將軍得自置偏禆此一時權宜之事然亦見當時上下相承之制也三國三國蜀志馬謖列傳諸葛亮以謖為􅄁軍王平列傳拜牙門將禆將軍屬􅄁軍馬謖先鋒謹案漢制大將軍府有従事中郎二人職􅄁謀議此􅄁軍之名所自昉也然當軍行亦為統兵之官則今之􅄁將其亦本諸此歟裴松之三國志注魏略曰郝昭入軍為部曲督三國魏志三少帝本紀散將王起為部曲將李典列傳太祖以典為禆將軍樂進列傳為軍假司馬于禁列傳太祖使禁别將屯原武遷禆將軍徐晃列傳拜禆將軍又拜偏將軍謹案徐晃以禆將軍進偏將軍則此時之禆將軍當自為官秩或如今都司守備之比其部曲督當亦如都司守備而部曲將則正如千總把總也至若别將乃别為一軍如所謂異軍特起者然其後亦遂為官號則亦如都司守備之比歟三國呉志三嗣主列傳使察戰到交阯裴松之注察戰呉官號謹案察戰之官惟見於此疑亦如監軍之類故附著之晉司馬光資治通鑑西戎校尉司馬閻纉胡三省注武帝置南蠻校尉於襄陽西戎校尉於長安南夷校尉於寧州各有長史司馬謹案晉西戎等校尉太守及督府司馬皆得兼之則其為校尉之司馬者或如今􅄁將遊擊之比也晉書劉宏列傳宏遣南蠻長史陶侃為大都䕶􅄁軍蒯恒為義軍督䕶牙門將皮初為都戰帥謹案督䕶之號蓋創制於此時而牙門將及都戰帥則又略如㕘將或都司之屬也晉書朱伺列傳少為呉牙門將陶丹給使呉平徙江夏為郡將督轉騎部曲督謹案朱伺以郡將督轉騎部曲督則郡將督當亦如今守備千總之屬也宋齊梁陳宋書百官志四夷中郎校尉皆有長史司馬􅄁軍宋書謝晦列傳行至安陸延頭為戍主光順之所執謹案戍主戍副宋齊以下咸有其官當時又有防主城主城大戍將諸號葢俱如今守備千總之屬也北魏魏書穆羆列傳離石都將郭洛頭尉元列傳遣子都將于沓千劉龍駒等歩騎五千將往赴擊太和初出為使持節鎮西大將軍開府統萬鎮都將二年徵為使持節侍中都督南征諸軍事征西大將軍大都將孔伯恭列傳遣子都將侯汾等率騎五百在水南奚昇等五百餘騎在水北沈文秀列傳為南征都將爾朱天光列傳為都將總統肆州兵馬謹案尉元以鎮西大將軍為都將又以征西大將軍為大都將似都將即大帥之任然穆羆為吐京鎮將而離石都將郭洛頭為其所轄至以不能攝下自劾則都將又似較卑周書冦儁傳孝昌中置鹽池都將秩比上郡或亦今􅄁將之比其子都將據太和十九年詔書與太守並列固即今遊擊都司之屬歟資治通鑑梁天監六年魏淮陽鎮都軍主常邕和以城來降謹案三國志張郃傳郃還陽平衆推為軍主諸將皆受節度蓋代夏侯淵總攝諸軍也若南北朝凡一軍之首多稱軍主其下亦有軍副則軍主之名微矣此云都軍主又當在諸軍主之上疑亦今都司守備之比也魏書李元茂列傳除振威將軍南征别將趙遐列傳初為軍主景明初為梁城戍主後假平東將軍為别將延昌中假前將軍為别將防捍西荆又為别將𨽻蕭寶夤東征淮堰劉思祖列傳屢為統軍南征謹案北朝多别將之目故摭此數條以著其概若統軍則行軍之官疑不常置也北齊書神武帝本紀養於鎮獄隊尉景家長得給鎮為隊主鎮將段長常竒神武貎慕容儼列傳魏河間王元琛辟儼左廂軍主梁攻東豫州儼督别將鄭海珍與戰斬其軍主朱僧珍軍副秦太杜弼列傳遷北豫州驃騎大將軍府司馬左遷下灌鎮司馬謹案杜弼以督府司馬遷鎮司馬則鎮司馬當如今􅄁將遊擊之比而隊主或如今千總把總之屬歟周書叱羅協列傳魏末冀州刺史以恊為統軍委以守禦賀拔勝列傳父度拔為武川軍主懐朔鎮將揚鈞召補統軍李檦列傳事爾朱榮以兼别將拜討逆將軍于謹列傳曽祖婆魏懐荒鎮將祖安定平涼郡守髙平郡將謹除積射將軍加别將宇文貴列傳夏州刺史源子雍以貴為統軍後加别將楊忠列傳髙祖元夀魏初為武川鎮司馬李棠列傳髙仲密為北豫州刺史時東魏遣鎮城奚夀興典兵事仲密但知民務而已謹案賀拔度拔以軍主補統軍李檦以兼别將拜將軍于謹以將軍加别將宇文貴以統軍加别將知此時之統軍别將已為一定之號若于安定為平涼郡守又為髙平郡將髙仲密為刺史與鎮城奚夀興分典兵民之事則正如今各府之有知府而或又有恊守分守之比也以上北齊書周書所列其事皆在魏世故仍著於此北齊北齊書祖珽列傳珽乘馬自出令録事􅄁軍王君植率兵馬仍親臨戰陣謹案此錄事􅄁軍乃北徐州刺史屬官也觀此知當時州佐亦間有與統兵之事者矣後周周書齊王憲列傳子貴白獸烽經為商人所燒烽帥納貨不言其罪宇文貴列傳蜀多盜貴召任俠傑健者署為遊軍二十四部令其督捕謹案烽帥之名惟見於此當如今千總把總之比若遊軍捕盜則不過如後世土丁壯丁之校長隨州縣補署者之類爾隋隋書百官志鎮置將副戍置主副其制官屬各立三等之差又置諸防主副官掌同諸鎮隋書楊處綱列傳授開府督武候事謹案開府督武候當即如前代大將軍營之有軍候而非如當時之所謂左右武候者也唐新唐書百官志節度使同節度副使十人館驛巡官四人隨軍四人謹案唐節度使下有副大使有副使又有同節度副使則同節度副使當如今㕘將之比也舊唐書李光弼列傳河西節度使王忠嗣補為兵馬使充赤水軍使王思禮列傳父䖍威為朔方軍將思禮隨節度使王忠嗣至河西與哥舒翰對為押牙及翰為隴右節度使思禮與中郎周佖為翰押牙以功除右金吾衛將軍充闗西兵馬使兼河源軍使哥舒翰為元帥充元帥府馬軍都將辛雲京列傳累官至北京都知兵馬使史憲誠列傳父周洛為魏博軍校至兵馬大使何進滔列傳父黙夏州衙前兵馬使進滔客于魏委質軍門為衙内都知兵馬使王重榮列傳為河中馬步軍都虞侯時溥列傳溥徐之牙將詔徴天下兵武寧節度使支詳遣溥與副將陳璠率師赴難謹案唐節鎮統兵之官名號不一所云副將當即同節度副使之屬其馬步軍都虞侯馬軍都將兵馬大使都知兵馬使當如今􅄁將之比衙内都知兵馬使當即今之中軍􅄁將而衙前兵馬使兵馬使押牙牙將當如今遊擊都司之屬也唐六典上戍主一人正八品下戍副一人従八品下佐一人史二人中戍主一人従八品下史二人下戌主一人正九品下史一人謹案唐之鎮將鎮副掌鎮捍防守總判鎮事其戍主戍副所掌與諸鎮略同蓋亦沿周隋以來之舊制而品秩頗卑當亦如今之千總把總矣五季舊五代史朱珍列傳以踏白騎士入陳亳間李思安列傳副王䖍裕為踏白將新五代史牛存節列傳梁太祖以為小校遷滑州牢城遏後指揮使梁兵攻鄆存節使都將王言藏船鄆西北隅濠中王檀列傳為小校遷踏白副指揮使朱宏昭列傳少事明宗為客將氏叔琮列傳為梁騎兵伍長王峻列傳漢髙祖鎮河東峻為客將謹案踏白將副猶漢之所謂材官蹶張也牢城遏後指揮使當如今都司守備之比若客將當如前代之所謂别將也宋王明清揮麈餘話州郡節察防團刺史召居京師謂之遥授至於一郡則盡行軍制守臣通判名銜必帶軍州其佐曰簽書軍事及節度觀察軍事推官判官之名雖曹掾悉曰􅄁軍著其實於一州官吏使知一州以兵為本咸知所先也謹案宋諸路置總管鈐轄都監監押為將帥官凡州縣有兵馬者其長吏未嘗不兼同管轄蓋知州即一州之將知縣即一縣之將也其後分河北等路諸軍若干人為一將别置將官使之專功訓練而逐州總管以下及諸州知縣皆不得闗預軍旅之事矣宋史職官志諸路將官掌統所𨽻禁旅律以行陣隊伍金鼓旗幟弓矢擊刺之法而教習訓練之其武藝強者待次遷補以激勸士卒凡兵仗器甲之數廩祿犒設賞罰約束之禁令皆掌焉副將為之貳若屯戍防邊則受帥司節制遇寇敵則審其戰守應援之事文獻通考熙寧七年始詔總開封府畿京東西河北路兵分置將副而鄜延環慶涇原秦鳳熙河又自别將四年詔團結東南路諸軍亦如畿京法總天下為九十二將鄜延五路又有漢蕃弓箭手亦各附諸將而統𨽻焉凡諸路將各置副一人東南兵三十人以下惟置禆將凡副將皆選内殿崇班以上嘗厯戰陣者充之亦詔監司奏舉又各以所將兵多寡置部將隊將押隊使臣各有差又置訓練官次諸將佐謹案宋諸路將官専以訓練為職然屯戍防邊亦有戰守應援之事則其將副當如今􅄁將遊擊之比其部將隊將當如今都司守備之比而訓練官者亦如今千總把總之比也司馬光傳家集州郡自置將以來每將下各有部隊將訓練官等一二十人而州又自有總管鈐轄都監監押設官重複虚糜禄廪欲乞盡罷諸路將官其禁軍各委本州長吏與總管鈐轄等如未置將以前謹案宋自司馬光乞罷諸路將官乃稍省諸路鈐轄及都監員仍以將官兼都監職事卒不能盡罷將副其後樞密院復建言往時軍士犯法許將官一面決遣以故事無留滯自州縣官預軍事以來動多牽制今後欲仍舊法及諸軍除轉排補並𨽻將司州縣毋得輒有所預其非屯駐所在當俟將副巡厯決之餘則委訓練官行焉自是縂管等官其于所部士卒有不相統攝殆如路人者而州縣長吏更無論矣宋史職官志諸軍都統制副都統制渡江後大軍又有統制同統制副統制統領同統領副統領其下有正將準備將訓練官部將隊將等名皆偏禆也謹案宋諸軍統制同統制以下正如今總兵副將以下官之比然宋之屯駐諸州軍其實皆御前軍也故都統制既入提督表内而統制以下則第備著于此云遼遼史百官志南面軍官諸軍兵馬都總管府某兵馬判官謹案判官在唐為節度使僚屬至宋轉而為府佐在遼則為總管府行軍之官其與今之􅄁將亦復相近又遼樞密院都統下有監軍行軍時又有監戰又有行軍都監并附著于此金金史百官志諸府鎮都軍司都指揮使一員正七品節鎮軍都指揮使則従七品掌軍率差役巡捕盜賊縂判軍事仍與録事同管城隍軍典二人公使六人凡諸府及節鎮並依此置諸防刺州軍轄一員掌同都軍兼巡捕仍與司候同管城壁軍典二人諸府州兵馬鈐轄一員従六品掌巡捕盜賊若有盜則總押隨處巡尉併力擒捕司吏二人京兆咸平濟南鳳翔萊密懿鞏州並依此置惟京兆咸平府置兵馬都鈐轄餘並省謹案金諸府州指揮使等官所司在巡捕盜賊然各與録事等同管城隍則亦今城守分汛將領官之比也又金元帥府自元帥副元帥而下有左右監左右都監或亦如今左右營之比也元元史兵志國初典兵之官視兵數多寡為爵秩崇卑長萬夫者為萬户千夫者為千户百夫者為百户世祖修官制萬户之下置總管千戸之下置總把百户之下置彈壓至元十五年定軍民異屬之制先是以李璮叛分軍民為二而異其屬後平江南軍官始兼民職凡以千户守一郡則率其麾下従之百戸亦然不便至是令軍民各異屬如初制謹案自宋置諸路將官而軍民各異其屬至元世祖更制而統軍之官與親民之官遂判然不可復合則其由來者漸矣又元以軍官兼民職其與宋之以文臣知軍州者又復不同明明史職官志􅄁將遊擊將軍守備把總無品級無定員獨鎮一路者為分守各守一城一堡者為守備與主將同守一城者為恊守鎮守薊州總兵官分守􅄁將十一人游擊將軍六人統理南兵游擊將軍三人領班游擊將軍七人坐營官八人守備八人把總一人提調官二十六人鎮守昌平總兵官分守􅄁將三人曰居庸闗􅄁將曰黄花鎮􅄁將曰横嶺口􅄁將游擊將軍二人坐營官三人守備十人提調官一人鎮守遼東總兵官分守􅄁將五人曰開原􅄁將曰錦義右􅄁將曰海蓋右􅄁將曰寧逺􅄁將曰寛奠堡􅄁將游擊將軍八人守備五人坐營中軍官一人備禦十九人鎮守保定總兵官分守􅄁將四人曰紫荆闗􅄁將曰龍固二闗􅄁將曰馬水口􅄁將曰倒馬口􅄁將遊擊將軍二人坐營中軍官一人守備七人把總七人忠順官二人鎮守宣府總兵官分守􅄁將七人曰北路獨石馬營􅄁將曰東路懐來永寧􅄁將曰上西路萬全右衛􅄁將曰南路順聖蔚廣􅄁將曰中路葛峪堡􅄁將曰下西路柴溝堡􅄁將曰南山􅄁將游擊將軍三人坐營中軍官二人守備三十一人領班備禦二人鎮守大同總兵官分守􅄁將九人曰東路􅄁將曰北東路􅄁將曰中路􅄁將曰西路􅄁將曰北西路􅄁將曰井坪城􅄁將曰新坪堡􅄁將曰搃督標左掖􅄁將曰威逺城􅄁將游擊將軍二人入衛游擊四人坐營中軍官二人守備三十九人鎮守山西總兵官分守􅄁將六人曰東路代州左􅄁將曰西路偏頭闗右􅄁將曰太原左􅄁將曰中路利民堡右􅄁將曰河曲縣􅄁將曰北樓口􅄁將游擊將軍一人坐營中軍官一人守備十三人操守二人鎮守延綏總兵官分守􅄁將六人曰孤山􅄁將曰東路右􅄁將曰西路左􅄁將曰中路􅄁將曰清平􅄁將曰榆林保寧􅄁將游擊將軍二人入衛游擊四人守備十一人坐營中軍官一人鎮守寧夏總兵官分守􅄁將四人曰東路右􅄁將曰西路左􅄁將曰靈州左􅄁將曰北路􅄁將游擊將軍三人入衛游擊一人守備三人備禦領班二人坐營中軍官二人管理鎮城都司一人領班都司二人管理水利屯田都司一人鎮守甘肅總兵官分守􅄁將四人曰莊浪左􅄁將曰肅州右􅄁將曰西寧􅄁將曰鎮畨􅄁將游擊將軍四人坐營中軍官一人守備十一人領班備禦都司四人鎮守陜西總兵官分守􅄁將五人曰河州􅄁將曰蘭州􅄁將曰靖冦􅄁將曰陜西􅄁將曰階文西固􅄁將游擊將軍四人坐營中軍官二人守備八人鎮守四川總兵官協守􅄁將二人曰松潘東路左􅄁將曰松潘南路右􅄁將㳺擊將軍二人守備六人鎮守雲南總兵官分守􅄁將三人曰臨元􅄁將曰永昌􅄁將曰順䝉􅄁將守備二人巡撫中軍坐營官一人鎮守貴州縂兵官分守􅄁將二人曰提督清浪右􅄁將曰提督川貴迤西左􅄁將守備七人巡撫中軍官一人鎮守廣西總兵官分守􅄁將五人曰潯梧左􅄁將曰栁慶右􅄁將曰永寧􅄁將曰思恩􅄁將曰昭平􅄁將守備三人坐營官一人鎮守湖廣總兵官分守􅄁將三人曰黎平􅄁將曰鎮筸􅄁將曰鄖陽􅄁將守備十一人把總一人鎮守廣東總兵官分守􅄁將七人曰潮州􅄁將曰瓊崖􅄁將曰雷廉􅄁將曰東山􅄁將曰西山􅄁將曰督理廣州海防􅄁將曰惠州􅄁將練兵㳺擊將軍一人守備五人坐營中軍官二人把總四人提督狼山副總兵分守􅄁將二人曰徐州􅄁將曰金山􅄁將游擊將軍一人守備六人鳳陽軍門中軍官一人把總十三人鎮守浙江總兵官分守􅄁將四人曰杭嘉湖􅄁將曰寧紹􅄁將曰溫處􅄁將曰台金嚴􅄁將游擊將軍二人總捕都司一人把總七人分守江西􅄁將一人曰南贑􅄁將守備四人把總六人鎮守福建縂兵官分守􅄁將一人曰南路􅄁將守備三人把總七人坐營官一人鎮守山東總兵官備倭都司一人領薊鎮班都司四人又河南守備三人領薊鎮班都司四人謹案明總督漕運總兵官下有協同督運􅄁將把總等官兹已入漕運總督篇内故不贅列蓋明制自京師達于各府州縣皆立衛所外統之都司内統于五軍都督府凡有征伐則命將統總兵官調衛所軍領之其號令總兵官告都指揮都指揮告指揮指揮告千户千戸告百戸百户告總旗總旗告小旗小旗告軍士其初雖􅄁將㳺擊把總亦多有充以勛戚都督等官者迨其後而軍官屢增軍實益替馴至末造則猛將疲于援勦懦弁虚縻餉糈而國勢遂不可復支蓋法久必敝亦恃制法者之有以善其用也我朝加意軍政凡一營一旅之寄亦必量材除授皇上又諄諭各提鎮大員俾以時考核其屬以飭勵士伍統攝聨絡武備整肅真萬年治安無獘之道而豈漢唐以來所能比絜于萬一者乎欽定厯代職官表卷五十八
