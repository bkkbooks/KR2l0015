  text: 新疆各官表新疆各官國朝官制總統伊犂等處將軍一人㕘賛大臣一人裁設無定領隊大臣五人印房司官二人筆帖式二人糧餉處司官二人筆帖式一人駝馬處司官一人筆帖式一人卡倫侍衛十二人將軍統掌新疆之軍政山北山南皆聽節制㕘賛大臣㕘賛軍務與將軍同駐伊犂領隊大臣分統游牧駐惠寧城者一駐惠逺城者四總管六人副總管七人協領十有二人佐領一百有八人防禦五十有六人驍騎校一百有八人署理營務筆帖式十人總管分理營務錫伯一副一索倫達呼爾一察哈爾二副二額魯特二副三協領分理滿洲蒙古官兵駐惠寧城者四駐惠逺城者八佐領惠寧城十六惠逺城四十錫伯八索倫達呼爾八察哈爾十六額魯特二十防禦惠寧城十六惠逺城四十驍騎校各如其佐領之數署理營務筆帖式滿洲蒙古二錫伯二索倫達呼爾二察哈爾二額魯特二俱經制之缺由伊犂所屬諸旗揀補又有領催委署前鋒校或給七品頂帶或給六品頂帶在卡倫侍衛上行走者舊無定額總理回務頭等台吉三品阿奇木伯克一人四品伊什罕伯克一人五品噶匝納齊伯克二人五品商伯克二人六品哈子伯克一人六品都官伯克一人七品密喇布伯克六人七品明伯克六人七品什和勒伯克一人七品帕察沙布伯克一人七品玉資伯克一人阿竒木伯克總理回務伊什罕伯克副之噶匝納齊伯克掌理田賦商伯克掌征輸哈子伯克掌詞訟都官伯克掌遞送兵馬糧餉文卷一切官物及分攅差務密喇布伯克掌水利明伯克掌千户之徵輸一切雜務什和勒伯克掌驛館薪芻諸務帕察沙布伯克掌巡緝牢獄諸務玉資伯克掌百户之徵輸一切雜務烏魯木齊都統一人副都統一人掌烏魯木齊之軍政滿洲緑旗官兵皆屬焉舊惟設安西提標緑旗五營乾隆三十六年始以滿洲兵駐防設㕘賛大臣一人三十八年又設領隊大臣二人四十二年始定為今制協領六人佐領二十有四人防禦二十有四人驍騎校二十有四人九品筆帖式二人卡倫侍衛三人乾隆三十七年設管理額魯特官兵總管一人副總管一人佐領四人驍騎校四人四十二年移駐塔爾巴哈台又有管理台站屯政厰務各員或由陜西甘肅二省除派或由伊犂調撥無定額庫爾喀喇烏蘇領隊大臣一人舊以侍衛駐劄屬於烏魯木齊不得自奏事其文移亦由烏魯木齊轉行不給印信乾隆三十五年始請給印信仍屬烏魯木齊三十七年始定為今制管理糧餉官一人又有管理臺站屯政文武各員或由陜西甘肅二省除派或由伊犂烏魯木齊調撥無常員塔爾巴哈台㕘賛大臣一人領隊大臣二人一管四營一管額魯特乾隆三十年設初駐雅爾後移駐今治總管一人副總管一人佐領八人驍騎校八人卡倫侍衛十二人印房章京三人筆帖式三人管理糧餉官一人總管舊駐烏魯木齊乾隆四十二年移駐巴里坤領隊大臣一人協領二人佐領八人防禦八人驍騎校八人印房筆帖式一人乾隆三十七年原設㕘賛大臣一人領隊大臣一人協領四人佐領防禦驍騎校各十六人筆帖式二人後改㕘賛大臣為領隊大臣而以領隊大臣一人移駐古城協領以下等官亦分其半隨駐古城領隊大臣一人協領二人佐領八人防禦八人驍騎校八人印房筆帖式一人並乾隆三十九年自巴里坤移駐謹案巴里坤今為鎮西府治已列在郡縣且原𨽻版圖不在新疆之數以其為新疆北路之門户而分置駐防亦與新疆一例故以領隊大臣列新疆表中至其文武諸官則各見本門兹不複載總理烏什等處㕘賛大臣一人協理大臣一人裁設無定阿克蘇領隊大臣一人掌烏什之政令兼統賽喇木拜城其阿克蘇一城舊别設辦事大臣乾隆三十一年亦併𨽻烏什而裁舊設副都統一人改設㕘賛大臣以阿克蘇大臣移駐其領隊大臣則自喀什噶爾移駐印房章京二人筆帖式三人管理糧餉官一人印房章京乾隆三十一年設筆帖式舊設一員乾隆三十一年増二員管理糧餉官舊調用陜甘二省典史一員亦乾隆三十一年改用部員其換防屯田等官由陜甘二省自副將以下除派舊無常員協領一人佐領二人防禦二人驍騎校二人䕶送伯克侍衛一人卡倫侍衛十有一人軍臺委署筆帖式十人佐領防禦驍騎校俱乾隆三十一年由烏魯木齊巴里坤調撥移駐卡倫侍衛則舊所設也管理回民五品阿竒木伯克一人六品哈子伯克一人七品明伯克一人七品密喇布伯克一人分理阿克蘇三品阿竒木伯克一人四品伊什罕伯克一人五品噶匝納齊伯克一人五品商伯克一人六品哈子伯克一人六品巴濟吉爾伯克一人六品伯克二人七品訥克布伯克一人七品都官伯克三人七品莫提色布伯克一人七品木特斡里伯克一人七品明伯克二人七品阿爾巴布伯克一人七品帕察沙布伯克一人七品什和勒伯克二人七品伯克三人分理阿克蘇所屬六品阿竒木伯克一人喀勒喀勒六品阿竒木伯克一人七品哈子伯克一人七品密喇布伯克一人七品明伯克一人雅爾巴什七品密喇布伯克一人七品明伯克一人庫車巴什七品密喇布伯克一人七品明伯克一人阿克雅爾七品密喇布伯克一人七品明伯克一人哈喇塔勒七品密喇布伯克一人七品明伯克一人哈爾噶額密什七品密喇布伯克一人雅爾賽喇木七品明伯克一人愛庫爾七品密喇布伯克一人英額阿里克七品明伯克一人赫色勒七品明伯克一人分理賽哩木三品阿竒木伯克一人四品伊什罕伯克一人五品噶匝納齊伯克一人六品哈子伯克一人七品密喇布伯克一人七品明伯克一人分理拜城四品阿竒木伯克一人五品伊什罕伯克一人六品噶匝納齊伯克一人七品密喇布伯克一人七品哈子伯克一人七品明伯克一人巴濟吉爾伯克掌税務訥克布