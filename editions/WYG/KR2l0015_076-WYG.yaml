都䕶之職矣漢書百官公卿表戊己校尉武帝初元元年置有丞司馬各一人侯五人秩比六百石謹案戊己校尉漢官儀云戊己中央鎮覆四方後漢書西域傳注云開渠播種以為厭勝故稱戊己王彦賔云戊己土也屯田以耕土為事故取為名顔師古則謂甲乙丙丁壬癸皆有正位唯戊己寄治耳今所置校尉亦無常居故取戊己為名馬融傳稱校隊按部前後有屯甲乙相伍戊己為堅注謂戊己居中為中堅諸説不同然其為將兵屯種之職則無異説也漢書西域列傳元帝時復置戊己二校尉屯田車師前王庭謹案顔師古百官表注云有戊校尉己校尉則戊己當是兩官考漢武帝時始置校尉領䕶田卒但以屯田校尉為稱後乃為戊己校尉表初不言戊校己校兩官徧考前書紀傳如徐普刁䕶郭欽皆兼戊己為官稱獨烏孫傳云徙己校屯烏墨是特兵有戊校己校之分即顔師古亦謂戊己兩校為兵而於表云兩尉殆見後漢書西域傳元帝置戊己二校尉遂為此説葢范蔚宗亦以後漢有戊校尉因謂元帝所置為二尉其實兩都設官之制不同後漢有戊己校尉戊校尉而各以校兵為名前漢有戊校己校之兵而尉之官稱則仍兼戊己也考通鑑載竇固奏復置西域都䕶戊己校尉以陳睦為都䕶司馬耿恭為戊己校尉屯後王部金滿城謁者闗寵為戊己校尉屯前王栁中城耿恭闗寵一時並為校尉各屯一處而不分戊己然則後漢雖設二尉尚得通稱戊己又何疑於前漢之制乎漢書西域列傳自貳師將軍伐大宛之後西域震懼多遣使來貢獻漢使西域者益得職於是自敦煌西至鹽澤往往起亭而輪臺渠犂皆有田卒數百人置使者校尉領䕶以給使外國者征和中搜粟都尉與丞相御史奏言故輪臺以東捷枝渠犂皆故國地廣饒水草有溉田五千頃以上處温和田美可益通溝渠種五穀與中國同時熟臣愚以為可遣屯田卒詣故輪臺以東置校尉三人分䕶各舉圖地形通利溝渠務使以時益種五穀謹案漢焉耆國治員渠城去長安七千三百里即今哈喇沙爾之地漢書稱其國近海水多魚北史亦言焉耆土田良沃穀有稻菽粟麥去海千餘里有魚鹽蒲葦之饒今自哈喇沙爾至漢輪臺渠犂屯田處約四百餘里在庫車以東所謂廣饒水草有溉田五千頃以上者也更以水經注考之輪臺最西即所謂龜兹東川水東南流逕於輪臺之東者也連城稍東即所謂有水西南流逕連城别注裂以為田者也渠犂更東即所謂水又屈而南逕渠犂國西又東南流逕渠犂城漢武帝屯渠犂即此處也則其地實毘連相去不過幾百里在今哈喇沙爾之西南庫車之東南其耕墾所及視今日殊為狹隘以其為西域屯田設官之始録之以備縁起而已唐六典漢宣帝置都䕶長史一人謹案都䕶長史葢都䕶官屬之領袖如今印房章京之職又漢書西域傳稱班超遣掾甘英窮臨西海而還則都䕶又有掾亦如今筆帖式之類併附著于此樂史太平寰宇記樓蘭國王數遮殺漢使時帝遣平樂監傳介子往勅其王懸首北闕乃立其弟屠耆為王更名其國為鄯善王自請天子曰身在漢久今歸單弱而前王有子在恐為所殺國中有伊循城其地肥美願漢遣一將屯田積穀令臣得依其威重於是漢遣司馬一人吏士四十人田伊循以鎮撫之其後更置都尉伊循官置始此矣後漢書西域列傳永平十六年明帝乃命將帥北征匈奴取伊吾廬地置宜禾都尉以屯田遂通西域于寘諸國皆遣子入侍西域自絶六十五載乃復通焉李吉甫元和郡縣志納職縣後漢明帝曽於此置宜禾都尉謹案當時未置都䕶則宜禾都尉専制一方如今之辦事大臣矣是亦官制之縁起故附著之袁宏後漢紀永平十七年冬十月竇固耿恭將萬餘騎帥擊車師王請降於是固奏置西域都䕶戊己校尉陳穆為都䕶耿恭為戊己校尉闗寵為戊己校尉恭屯金蒲城寵屯栁中城相去千餘里恭乃移檄烏孫大毘彌宣諭威徳皆遣使獻馬求入侍天子永元四年十二月龜兹姑墨温宿國皆降乃以班超為西域都䕶徐幹為長史復置戊己校尉後漢書西域列傳永平十七年始置都䕶戊己校尉司馬光資治通鑑永元三年復置西域都䕶騎都尉戊己校尉官以班超為通䕶謹案後漢凡兩置都䕶皆如前漢為加官帶騎都尉衘葢如今伊犂將軍之職至永初以後僅置䕶西域副校尉一人則又如今㕘賛大臣之職也後漢書班超列傳拜超為將兵長史假鼓吹幢麾班勇列傳延光三年以勇為西域長史將兵五百人出屯栁中謹案長史本都䕶之屬吏惟班超稱將兵長史班勇為西域長史亦稱將兵則似即今領隊大臣之職葢名同而官異也後漢書西域列傳永建六年置伊吾司馬一人謹案伊吾司馬専制一方亦似今之辦事大臣後漢書西域列傳建武五年河西大將軍竇融承制立莎車王康為建功懐徳王西域大都尉弟賢代立復遣使奉獻請都䕶帝乃因其使賜賢西域都䕶印綬敦煌太守裴遵上言不可更賜以漢大將軍印綬謹案都尉將軍當如今總理回衆扎薩克郡王他如漢書西域列傳稱都䕶韓宣奏烏孫大吏大禄大監賜金印紫綬以尊輔大昆彌當亦如今圖撒拉克齊之比然昆彌既不授漢官則其臣仍各尊其主與圖拉撒克齊為郡王之屬者不同故不列於表三國未置謹案唐書地理志稱魏時涼州刺史領戊己校尉䕶西域如漢故事魏志稱龜兹于闐康居烏孫之屬無嵗不奉朝貢然以涼州刺史領戊己校尉則特繫以虚銜坐鎮邊境與漢之戊己校尉異故今不列於表晉未置謹案唐六典稱魏晉之間有都䕶左右軍都䕶將軍之號遂廢都䕶之名晉書稱晉沿魏制置戊己校尉領䕶西域似即以校尉攝都䕶之職總之虚名無實亦與魏相等矣宋齊梁陳未置北魏未置謹案魏書官氏志䕶羌戎中郎將䕶羌戎校尉從第三品考西域自魏晉以來互相吞併至是時分為四域自蔥嶺以南流沙以西為一域蔥嶺以西海曲以東為一域者舌以南月氐以北為一域兩海之間水澤以南為一域總計一十六國小渠長以百數與漢時出兩道者異太延中遣散騎侍郎董琬髙明等多齎金帛出鄯善招撫諸國則校尉中郎將之設當在是時然諸國雖奉朝貢實未能有其土地人民屯田積穀如漢之校尉都尉故亦不列於表北齊未置後周未置隋未置謹案鄭樵通志稱煬帝時遣侍御史韋節司𨽻從事杜行滿使於西國復令聞喜公裴矩於武威張掖間往來以引致之大業中相率來朝者四十餘國帝因置西戎校尉以應接之則亦但司朝貢之使臣而已非能設官於其地也唐新唐書百官志大都䕶府大都䕶一人從二品副大都䕶二人從三品副都䕶二人正四品上長史一人正五品上司馬一人正五品下録事㕘軍事一人正七品上録事二人從九品上功曹㕘軍事倉曹㕘軍事户曹㕘軍事兵曹㕘軍事法曹㕘軍事各一人正七品下㕘軍事三人正八品下上都䕶一人正三品副都䕶二人從四品上長史一人正五品上司馬一人正五品下録事㕘軍事一人正七品下功曹㕘軍事倉曹㕘軍事户曹㕘軍事兵曹㕘軍事各一人從七品上㕘軍事三人從八品上都䕶掌統諸蕃撫慰征討叙功罰過總判府事李衛公兵法太宗曰朕置瑶池都督以𨽻安西都䕶番漢之兵如何處置靖曰天之生人本無番漢之别然地逺荒漠必以射獵而生由此常習戰鬭若我恩信撫之衣食周之則皆漢人矣陛下置此都䕶臣請收漢戍卒處之内地減省糧饋兵家所謂治力之法也但擇漢吏有熟番情者散守堡障此足以經久或遇有警則漢卒出焉謹案唐大都䕶即漢西域都䕶之制至此不復為加官即以都䕶専稱矣其職如今伊犂將軍但皆以親王遥領不置正員於其地為不同耳然考地理志載建中二年以守北庭李元忠守安西郭昕並為大都䕶龜兹傳載田揚名郭元振張孝嵩杜暹並為安西都䕶以政績稱安西亦大都䕶也權徳輿忠武渾公神道碑以工部尚書為單于大都䕶則大都䕶不盡以親王為之矣葢親王遥領者厥後定制也故著于百官志而用惟其人唐初固常以重臣領之未嘗拘以親王遥領之例也又唐六典大都䕶府功曹倉曹屬有府二人史二人户曹屬有府三人史三人帳史一人兵曹法曹屬有府三人史四人百官志皆不載葢史闕漏也唐㑹要貞觀十四年平髙昌於西州置安西都䕶府謹案髙昌傳貞觀十四年克髙昌更置都䕶府龜兹傳貞觀二十三年滅龜兹始徙安西都䕶於其都則安西都䕶之置當在貞觀年間而唐六典謂永徽中始置四大都䕶府與㑹要及新舊唐書俱不合未詳孰是舊唐書地理志安西節度使撫寧西域統龜兹焉耆于闐疏勒四國册府元龜太宗既破龜兹移置安西都䕶府于其國城以郭孝恪為都䕶兼統于闐疎勒碎葉謂之四鎮謹案新唐書方鎮表先天元年以北庭都䕶領伊西節度等使自是安西有節度之號然尚為兼銜開元十五年伊西北庭分置二節度而節度始為守官不復稱都䕶矣其制略如今辦事大臣也杜佑通典鎮西節度使統龜兹焉耆于闐疏勒國謹案安西節度使自開元十二年後或稱磧西或稱四鎮至肅宗至徳元載更名鎮西故有鎮西節度之號又王應麟玉海乾元三年以葉䕶曜為同四鎮節度副使當如今之㕘賛大臣也自漢以後元以前惟唐於西域設官之地較闊然僅自南山抵蔥嶺亦未能跨越山北兼以通絶不常羈縻著號則所謂設官其地者僅稍勝空名一等耳總未足以方昭代之盛也新唐書吐蕃列傳沙州首領張義潮奉𤓰沙伊肅甘等十一州地圖以獻擢義潮沙州防禦使俄號歸義軍遂為節度使李吉甫元和郡縣志髙昌王文泰漸失臣禮貞觀十四年詔兵部尚書侯君集統薛萬鈞牛進達等總兵討之文泰病死子智盛立八月君集進兵破之下其二十二城獲户八千列其地為西州並置安西都䕶以統之庭州顯慶中重修置以來濟為刺史理完葺焉請州所管諸蕃奉敕皆為置州府以其大首領為都督刺史司馬又置㕘將一人知表疏等事謹案此亦今回部扎薩克之類以非常設之官故不列於表他如資治通鑑載龍朔元年六月癸未以吐火羅嚈噠罽賔波斯等十六國置都督府八並𨽻安西都䕶府考諸新唐書地理志時自于闐以西波斯以東凡十六國各以其王為都督府吐火羅為月氐都督府嚈噠為大汗都督府阿達羅支為條支都督府解蘇為天馬都督府骨咄施為髙附都督府罽賔為修鮮都督府帆延為寫鳳都督府石汗那為悦般州都督府䕶時犍為竒沙州都督府怛沒為姑墨州都督府烏拉喝為旅獒州都督府勒建為崑墟州都督府俱密為至拔州都督府䕶密多為烏飛州都督府久越得犍為王庭州都督府波斯為波斯都督府通鑑言置都督府八者葢謂月支大汗條支天馬髙附修鮮寫鳳波斯八都督府其餘悦般竒沙等府不與也然皆以虚名羈縻仍以其王為都督與臨以王官者逈異故亦不列於表五季未置宋未置遼未置金未置謹案金史地理志金之壤地西厯葭州出臨洮府㑹州積石之外與生羌地相錯而夏人界隔横山盡有武威張掖酒泉諸郡自玉門陽闗而外皆以絶逺不通故金史外國傳祇有西夏而西域則未𨽻版圖焉元元史憲宗本紀諾海蒙古語大也原作訥懷今改達蘭蒙古語七十數也原作塔剌今改哈瑪爾蒙古語鼻也原作海麻今改蘇庫滿洲語皮也原作速忽今改等充巴什伯里回地名原作别失八里今改行尚書省事地理志至元二十年立巴什伯里河州等處宣慰司河源附録至元二十一年徹迪爾原作察帶今改二城置達嚕噶齊二十三年遣侍衛新附兵千人屯田巴什伯里置元帥府即其地以統之謹案元代版圖雖奄有西域然所滅諸國大抵以諸王駙馬為行營統軍専鎮一方各有分地迨中葉以後山川綿邈道路不通與朝廷或不相知聞史氏亦不能舉其世系名字則幅員雖廣亦略與唐之羈縻州等特有其地者尚屬天潢之支派為小異耳其稍近内地者乃有行省尚書有宣慰司行省尚書略如今辦事大臣宣慰司掌一方之政有軍旅之事則兼都元帥其次則止為元帥府略如今領隊大臣而已豈如我國家統馭得宜規模詳偹使天山南北二萬餘里如臂指之相維也歟明未置謹案明洪武初陜西行省員外郎許允徳出使西番繼又命河州衛遣官招諭諸番稍稍内屬然雖受爵中朝而賦稅不上於天子其後哈宻赤斤諸衛為土魯番所侵不能藩蔽中國而河套諸部宻邇邊陲者尤患在肘腋禍廹門庭二百餘年之中議勦議撫迄無成效卒至邊防弛壞㓂鈔相尋計其左支右詘之狀幾㡬乎河隴内外求一安枕之地而不得又烏敢議天山兩道三十六國之舊跡哉蓋統馭之逺近視乎徳澤之厚薄威力之強弱徳威不足以控御則為明代之自救不遑徳無所不育威無所不行則為我朝之因明舊疆日啟版宇至我皇上而拓地二萬餘里使蔥嶺以東納賦供役悉𨽻臣僕建官守土一如郡縣敬觀今所列之職制因回思前史所載有明一代之邊患同一西陲而盛衰治亂之相懸有不可以道里計者然後知聖天子揆文奮武之􅁤超軼前代萬萬也欽定厯代職官表卷七十
