body:
  text: 聖賢後裔世職併衍聖公官屬表衍聖公世封聖賢後裔世職并孔林各官國朝官制衍聖公世襲正一品掌奉至聖孔子闕里廟祀順治元年題准封爵一如前朝階正一品班列尚書上二年改賜三臺銀印十三年依例授光禄大夫十六年依例給清漢文三臺銀印乾隆十四年改給清漢篆文一品三臺銀印有大慶典衍聖公並䝉錫䕃初公階正一品而䕃子則仍依正二品康熙六十一年始視正一品廕一子五品官著為例聖賢後裔翰林院五經博士二十六人正八品俱世襲孔氏北宗一人掌奉中庸書院祀南宗一人掌奉衢州孔子廟祀元聖周公復聖顔子宗聖曽子亞聖孟子先賢仲子閔子冉子伯牛冉子仲弓端木子言子卜子顓孫子有子周子明道程子伊川程子張子邵子後裔各一人朱子後裔二人先儒韓子後裔一人闗氏後裔三人各掌奉其先世之祀孔氏北宗以衍聖公次子承襲餘並以嫡子襲孔氏顔氏曽氏孟氏東野氏仲氏閔氏冉氏端木氏卜氏言氏顓孫氏有氏博士十五人屬於衍聖公餘各就其家除授有闕則督撫核明應襲之人咨部題請承襲聖裔太常寺博士一人正七品世襲掌奉聖澤書院祀以衍聖公第三子承襲聖裔國子監學録二人正八品一奉尼山書院祀一奉洙泗書院祀並由衍聖公於族内選用聖裔國子監學正一人正八品世襲掌奉儀封聖廟祀順治八年衍聖公奏准世襲如故聖裔世襲六品官一人掌分獻崇聖祠國初仍前代曲阜用孔氏世職知縣乾隆六年山東巡撫白鐘山言曲阜知縣向由衍聖公保舉選用每多瞻狥請在外揀選調補不必拘用孔氏奉㫖允行以現任世職知縣授為世襲六品官遇有缺出揀選調補悉照執事官之例四氏學教授一人正七品學録一人正八品教授掌訓課孔顔曽孟四氏生徒以學録文行兼優厯俸六年者陞補學録掌副教授訓廸生徒而教公之子弟於孔氏嵗貢廪生捐貢及廪生内選用初教授學録止由衍聖公保舉咨部除授乾隆二十六年山東布政使奏定令衍聖公將揀選應補人員移送撫臣驗看送部具題聖廟執事官四十人三品二人四品四人五品六人七品八人八品十人九品十人掌凡祭祀分獻及爵帛香祝之執事雍正四年特㫖増設各按品級給章服著衍聖公於孔氏子孫内選擇人品端方威儀嫻雅者報部充補毎年各給俸禄銀二十兩或曽經出仕而退休在籍或身有職銜而未曽出仕以及貢監生童等皆可入選司樂一人奎文閣典籍一人屯田管勾一人並正七品林廟守衛司百户一人秩視衛守備知印一人掌書一人書寫一人奏差一人隨朝伴官六人並正七品司樂掌樂章樂器而教肄樂生典籍掌奎文閣書籍及禮生管勾掌祀田錢􅂖之出入祭祀則供其牲牷粢盛治膳羞醯醢之屬其屬有屯官八員鉅野鄆城平陽各二人東阿獨山二屯各一人分掌五屯以供祀事百户掌陵廟之户籍供其灑掃户役之事主守禮器祭祀則司滌濯掌犧牲之宰割自司樂以下分職治事凡四司知印掌書書寫掌公府文書信印奏差掌齎衍聖公表箋章奏隨朝伴官掌隨從衍聖公朝覲辦事初無常員遇朝覲輙咨部給銜乾隆十五年始額定六員以上官皆由衍聖公保舉咨部補授厯代建置漢山東通志孔子九世孫騰漢高帝過魯封為奉嗣君一云奉聖君謹案奉嗣闕里文獻考作奉祀疑此有傳訛闕里文獻考孔氏世嫡自漢高帝過魯封九世孫騰為奉祀君始創推恩之例漢書孔光列傳元帝即位徴孔霸以師賜爵闗内侯食邑八百户號褒成君霸上書求奉孔子祀元帝下詔曰其令師褒成君闗内侯霸以所食邑八百户祀孔子焉荀恱漢紀元始元年封周公後公孫相如為褒魯侯孔子後孔均為褒成侯追謚孔子為褒成宣尼公漢書平帝本紀元始元年封孔子後孔均為褒成侯奉其祀漢書恩澤侯表褒成侯均以褒成烈侯霸曽孫奉孔子後侯謹案孔騰奉祀之封不見於史通典叙聖裔封爵始於孔霸然霸自以帝師䝉恩非由先聖得封如前此尚有蓼侯聚矣至元始褒成之侯是為尊崇先聖後裔世爵之始袁宏後漢紀建武五年封孔子後孔安為殷紹嘉公十三年殷紹嘉公為宋公周承休公為衛公十四年夏四月辛巳封孔子後孔志為褒成侯後漢書光武帝本紀建武十四年封孔子後志為褒成侯後漢書儒林列傳世祖封均子志為褒成侯志卒後子損嗣永元四年徙為褒亭侯世世相𫝊至獻帝初國絶洪适𨽻釋後漢魯相乙瑛置孔子廟卒史碑司徒臣雄司空臣戒稽首言魯前相瑛言詔書崇聖道勉六藝孔子作春秋制孝經演易繫辭經緯天地幽贊神明故特立廟褒成侯四時來祠事已即去廟有禮器無常人掌領請置百石卒史一人典主守廟春秋饗禮則出王家錢給犬酒直臣愚以為如瑛言可許制曰可永興元年魯相平行長史事卞守長擅言詔書為孔廟百石卒史一人掌主禮器選年􅕊以上經通一藝雜試能奉宏先聖之禮為宗所歸者謹案文書守文學掾魯孔龢師孔憲户曹吏孔覽等雜試龢修春秋嚴氏經通高第事親至孝能奉先聖之禮為宗所歸除龢補名謹案後漢書儒林𫝊永元四年褒成侯損徙封褒亭侯然魯相乙瑛立卒史碑韓勑造孔子廟禮器碑史晨祠孔子廟碑皆稱褒成之封瑛碑立於永興元年􅃯碑立於永夀二年晨碑立於建寧二年皆在永元之後是損未嘗徙封𫝊之誤爾三國三國魏志文帝本紀黄初二年詔以議郎孔羡為宗聖侯邑百户奉孔子祀令魯郡修起舊廟置百户吏卒以守衛之𨽻釋魏魯孔子廟碑黄初元年大魏受命以魯郡百户命孔子二十一世議郎孔羡為宗聖侯令魯郡修起舊廟置百石吏卒以守衛之釋云魏志黄初二年正月詔以議郎孔羡為宗聖侯奉孔子祀令魯郡修起舊廟置吏卒守衛碑云元年而作二年誤也後漢書孔僖𫝊注以羡為崇聖侯亦誤也謹案黄初宗聖之封史以為二年碑以為元年或據碑謂史誤非也文帝受禪在建安二十五年十一月越二月即為二年碑因孔羡之封追本受禪之事而言之爾至百石吏卒即漢之百石卒吏史作百户則其誤無疑但漢卒史乃吏名而魏志及碑皆作吏卒則有不可暁者晉晉書武帝本紀泰始三年徙宗聖侯孔震為奉聖亭侯太元十一年秋八月庚午封孔靖之為奉聖亭侯奉宣尼祀宋齊梁陳宋書禮志奉聖亭侯孔亭五世孫繼之替慢不祀宋文帝元嘉八年有司奏奪爵至十九年又授孔隠之兄子熙先謀逆又失爵二十八年更以孔恵雲為奉聖侯後有重疾失爵孝武大明二年又以孔邁為奉聖侯宋書文帝本紀元嘉十九年詔奉聖之嗣速議繼襲魯郡民孔景等五户居近孔子墓側蠲其課役供給灑掃謹案漢始置孔氏守廟百石卒史至宋時但給灑掃户則百石卒史意晉時亦不復置矣明始以灑掃户有才徳者充林廟守衛百户則灑掃户雖非官而厯代相承實林廟守衛司百户所由始故附載其事以著縁起而表則不列其後來所設之灑掃户亦不𤨏載焉南史梁敬帝本紀太平二年詔求魯國孔氏族為奉聖侯南史陳廢帝本紀光大元年以儀同三司兼從事中郎孔英悊為奉聖亭侯奉孔子祀北魏北史魏孝文帝本紀延興三年詔以孔子二十八世孫魯郡孔乗為崇聖大夫給十户以供灑掃太和十九年幸魯城親祠孔子廟詔拜孔氏四人顔氏二人為官乂詔選孔氏子孫一人封崇聖侯邑百户以奉孔子祀謹案文獻通考後魏封孔子二十七葉孫乗為崇聖大夫孝文太和十九年改封二十八葉孫珍為崇聖侯與北史孝文紀以孔乗為二十八世孫互異又考太和十九年詔拜顔氏二人為官是為褒録顔氏之始北齊北史齊文宣帝本紀天保元年詔改封崇聖侯孔長為恭聖侯邑一百戸以奉孔子祀馬端臨文獻通考北齊改封三十一代孫為恭聖侯後周北史周宣帝本紀大象二年詔進封孔子為鄒國公邑數凖舊立後承襲隋文獻通考隋文帝仍舊封孔子後為鄒國公焬帝改封為紹聖侯隋書煬帝本紀大業四年詔立孔子後為紹聖侯唐唐書禮樂志高祖武徳九年封孔子之後為褒聖侯杜佑通典唐貞觀十一年封孔子裔徳倫為褒聖侯神龍初授褒聖侯崇階朝散大夫仍許子孫𫝊襲新唐書禮志武后天授元年封孔子為隆道公神龍元年以鄒魯百户為隆道公采邑以奉嵗祀子孫世襲褒徳侯舊唐書元宗本紀開元二十七年追贈孔宣父為文宣王褒聖侯改封文宣公闕里文獻考三十五代孫璲之唐元宗開元二十七年詔諡孔子曰文宣王以其嗣為文宣公任長吏代代勿絶三十六代萱襲封文宣公兼兖州泗水令三十七代齊卿唐徳宗建中三年襲封文宣公兼兖州功曹三十八代惟胵憲宗元和十三年襲封文宣公授兖州㕘軍三十九代策明經及第授曲阜縣尉襲封文宣公四十一代昭儉襲封文宣公兼曲阜令劉肅大唐新語自漢魏以來厯代皆封孔子後為褒成侯或號褒聖侯至開元二十七年詔册孔子為文宣王其嗣褒成侯改封文宣公令右丞相裴耀卿攝太尉持節就國子監冊命訖有司奠祭樂用宫懸八佾之舞詔曰宏我王化在乎儒術皆發揮此道啟廸含靈則生人以來未有如夫子也所謂自天攸縱將聖多能徳配乾坤身掲日月故能致天下之太平成天下之大經美政教移風俗君君臣臣父父子子人到于今受其賜不其猗歟文多不盡載山東通志四十一代昭儉襲封文宣公累宰曲阜子光嗣哀帝天祐二年授泗水令林廟主謹案吕兆祥陋巷志載唐徳宗貞元六年南郊赦書節文授四十一代孫頵五品正員官文宗以四十三代孫覽為殿中侍御史宏式為同州㕘軍皆推恩聖裔特加叙録非官制之常今不盡録五季山東通志光嗣為灑掃户孔末所害末自為曲阜令光嗣子仁玉育於外家長訴於朝乃誅末後唐時以仁玉襲封文宣公闕里文獻考孔氏子孫為曲阜縣令昉於唐咸通間續至後唐始以文宣公兼之四十三代仁玉孔末之亂生甫九月匿於外家後唐明宗長興元年魯人訴於朝乃誅末以公主孔子祀授曲阜主簿三年遷龔邱令封文宣公晉高祖天福五年改曲阜令後周太祖廣順二年詔以曲阜令兼監察御史吕兆祥陋巷志後周太祖廣順二年駕幸曲阜詔顔子之後以四十六代孫涉授曲阜縣主簿謹案此事雖於官制無闗然厯代率以世爵崇孔氏而褒録諸賢後裔者明以前不數見故亦存之以著縁起宋文獻通考太祖乾徳四年以文宣王四十四代陵廟主進士孔宣為兖州曲阜縣主簿太宗太平興國三年孔宜可授太子贊善大夫襲封文宣公天禧元年以文宣王四十六代孫光禄寺丞聖佑襲封文宣公宋史祖無擇列傳至和二年上言開元諡孔子為文宣王以其後為文宣公以祖之美諡而加後嗣不經甚矣乞明詔有司詳求古制别定美號於是下近臣議改為衍聖公宋史哲宗本紀元祐元年改封孔子後為奉聖公不預他職謹案聖裔封號前代更易不一而衍聖公之號始於宋至和二年至元祐又改為奉聖旋又復舊自是以後相承不改焉闕里文獻考元張􅓄廟學記孔子舊宅因廟建學昉於魏之黄初其間興廢不常有宋大中祥符三年殿中丞公自牧奏就廟側創學帝曰講學道藝貴近廟庭當許於齋㕔内說書乾興元年孫宣公守兖州於廟建學請以楊光輔為講書奉禮郎始賜學田元祐四年尹復泰以文潞公薦為教授給田二十頃以贍生員選任教導其重如此要必以講六經之道𫝊聖人心法為職而小學之教節目纎悉宜有分任其事者考之碑刻則學正錄皆孔氏子孫為之盖當時乃教授自署毋亦選擇而使以寓激勸與抑因其親愛俾帥㓜而入學者與山東通志宗真宗大中祥符二年就廟建學以訓孔氏子孫哲宗元祐元年置教授一員於舉到文官内差或委本路監司保舉有行義人充令教訓本家子弟尹復泰以文潞公薦為教授本年又置學録一員謹案此條所載教授學録縁起較張􅓄記為詳故互見以備考闕里文獻考明劉健重修三氏學記闕里三氏學建於宣聖廟之東南以教孔顔孟三氏子孫廟之建其來逺矣學則自宋大中祥符間始考厥初止以教孔氏子孫其後益以顔孟二氏盖自元祐間始山東通志宋真宗改曲阜為仙源縣仁宗皇祐三年詔自今仙源縣官復於孔氏子弟中選用徽宗崇寜間又詔文宣王後常聴一人注兖州仙源縣官有丞有簿有尉大抵皆世職也孟子四十五代孫寜宋仁宗景祐四年孔道輔薦於朝授鄒縣主簿奉孟子祀謹案此為褒録孟氏之始又闕里文獻考載宋真宗天禧五年詔於夫子後選差朝官一人監督孔氏廟役時道輔以知仙源縣充徽宗崇寜二年詔文宣王家選親族一人判司簿尉事即以家長承襲元代由省臣擇孔氏中亷幹者一人委充提領監修官依族長授八品冠帶盖沿其制明初猶以翰林檢閱官孔涇為族長其後衍聖公自擇族人為之始無品秩其提領監修官明初改為提領林廟事亦無品秩國朝則族長沿舊名而提領林廟事改稱林廟舉事亦均無品秩且既設聖廟執事官即以執事官兼此二事不復專設故今不載於表中而於剏置之初附載其源流如此遼未置謹案遼史不載孔氏世爵亦無先賢之裔䝉褒録者盖聖裔聚族於山東而諸賢之裔亦皆居宋地故也金金史熙宗本紀天眷三年以孔氏四十九代孫璠襲封衍聖公闕里文獻考金廟學教授章宗明昌元年􅃯於四舉五舉終塲進士出身人内選博學經史衆所推服者充秩正八品元張􅓄廟學記金氏因之廩賜教育有加無替金熙宗皇統間仍改仙源為曲阜章宗承安二年勅衍聖公年及十七許兼曲阜令不許别行差占金党懐英重修至聖文宣王廟碑有層閣以備庋書詔以奎文名之謹案此為奎文閣賜名之始至元乃設官以典之王圻續通考章宗明昌三年四月詔曰衍聖公秩視四品階正八品不稱可超遷中議大夫永著於令元元史太宗本紀五年詔以孔子五十一世孫孔元措襲封衍聖公元史孔思晦列傳孔氏族人相與議思晦嫡長且賢宜襲封爵奉祠事狀上政府事未决仁宗親取孔子譜牒按之曰以嫡應襲封者思晦也復奚疑特授中議大夫襲封衍聖公月俸百緡加至五百緡賜四品印泰定三年山東亷訪副使王鵬南言襲封上公而階止於四品於格弗稱明年升嘉議大夫至順二年改賜三品印闕里文獻考元王思誠子思書院學田記鄒之中庸精舍即沂國公授受故址而為之延祐二年朝廷改為子思書院設山長以司訓導元潘廸子思書院新廟記中庸精舍大徳間宋尹彰擴為書院請額設官朝廷允之許立子思書院置山長一員職視大庠校官山東通志尼山書院在尼山之麓實毓聖之區也元至順二年衍聖公孔思晦請設尼山書院山長本年以彭璠為山長璠卒以益都路馬猶子為山長洙泗書院在孔林之東孔子自衛反魯與弟子講道於洙泗之上魯記所載孔子講堂即此也元時創建請額至順二年衍聖公孔思晦請設山長聴衍聖公保族人之賢者任之闕里文獻考元虞集尼山創建書院記至順三年衍聖公思晦用林廟管勾簡實理言請復尼山祠廟置官師奉祠薦彭璠可用至元二年中書左丞王公􅅷徳率同列執政者白丞相置尼山書院以璠為山長山東通志元世祖中統初詔立曲阜廟學選師儒充教授正録各一闕里文獻考元吕思誠加封啟聖王碑世祖龍飛車馬混一自上都大都及天下郡邑立廟學曲阜林廟尤加修崇於是定襲封之嗣除孔氏一人尹曲阜縣山東通志金元常以衍聖公知縣事故有世襲縣尹武宗至大二年設曲阜廟學典籍一員仁宗延祐七年遣說書王存義赴曲阜以太牢祀孔子是年為聖廟設司樂一員管勾一員闕里文獻考掌書設自元成宗元貞二年明明史儒林列傳洪武元年命孔希學襲封衍聖公置官屬曰掌書曰典籍曰司樂曰知印曰奏差曰書寫各一人立孔顔孟三氏教授司教授學録學正各一人立尼山洙泗二書院各設山長一人又命其族人希大為曲阜世襲知縣明史職官志衍聖公孔氏世襲正二品袍帯誥命朝班一品洪武元年授孔子五十六代孫希學襲封其屬掌書典籍司樂知印奏差書寫各一人皆以流官充之曲阜知縣孔氏世職洪武元年授孔子裔孫希大為曲阜世襲知縣翰林院世襲五經博士正八品孔氏二人正徳元年授孔子五十九世孫彦䋲主衢州廟祀宋孔端友從髙宗南渡家於衢州此孔氏南宗也正徳二年授孔聞禮奉子思廟祀顔氏一人景泰三年授顔子五十九世孫希恵曽氏一人嘉靖十八年授曽子六十代孫質粹仲氏一人萬厯十五年授子路裔孫仲吕孟氏一人景泰三年授孟子裔孫希文周氏一人景泰七年授先儒周敦頤裔孫冕程氏二人景泰七年授先儒程頤裔孫克仁崇禎三年授先儒程顥裔孫接道邵氏一人崇禎邵雍年授先儒孫繼祖張氏一人天啟二年以先儒張載裔孫文運為博士朱氏二人景泰六年授先儒朱熹裔孫梴嘉靖二年又授墅為博士奉婺源廟祀教授司教授從九品學録學司並未入流孔顔曾孟四氏各一人又尼山洙泗二書院各學録一人先是元代封孔子後裔為行聖公賜三品印洪武元年太祖既以孔希學襲封衍聖公因詔禮臣曰孔子萬世帝王之師而其後嗣止三品弗稱褒崇其授希學秩二品賜以銀印闕里文獻考四氏學學録宋元祐始置當時尚有學正一員與學録同以孔氏充而令教授自署金元間間用異姓正録秩皆九品明洪武七年裁學正止設學録一員秩未入流宣徳元年定以聖裔任令衍聖公保舉孔氏年徳俱尊學問優長者咨部除授山東通志聖澤書院孔子宰中都處也明設太常博士一員以主祀事以衍聖公三子承襲闕里文獻考尼山書院洙泗書院元順帝至正二年初設山長以異姓碩儒任後令衍聖公保舉族人之賢者為之明武宗正徳二年改名學録秩從九品山東通志唐褒徳侯孔徳倫在河南寜陵剏建祖廟明正統九年詔遷廟於儀封嘉靖十四年特授聖裔為國子學正専主祀事闕里文獻考唐天寳間文宣公避亂遷居寜陵者數世遂於其地建立聖廟後以子孫流寓寜陵者主其祀事㑹河圯遷居儀封明正統九年詔即於儀封立廟嘉靖十四年始置官以孔繼寅為學正秩正九品令世襲謹案太常博士及國子監學正二官明史職官志及儒林傳皆不載闕里文獻考明劉健重修三氏學記闕里三氏學洪武始定名為孔顔孟三氏教授司教授學録各一員學録即以孔氏子孫為之三氏子孫教授司萬厯年間増入曾氏又改名四氏學元仁宗延祐三年行聖公兼曲阜尹思誠以非嫡罷職専尹曲阜其子克欽孫希大皆世襲縣尹明洪武七年希大坐事罷職因改世襲為世職令衍聖公保舉族人之賢者送部選授領刺赴任漢魯相乙瑛以孔子廟有禮器無人掌領請置百石卒史一人掌之後世以其管轄灑掃百户其官遂為百户又以職司巡徼有武備焉合典籍司樂管勾等三員為兵農禮樂四司始用孔氏後以生員明𢎞治間始以灑掃户才徳兼優者充之止由衍聖公委用不由部銓注山東通志山東巡撫方大猷請崇聖賢以培人才疏衍聖公屬官員後明洪武元年設管勾一員司五屯錢糧司樂一員司樂舞生典籍一員司禮生書籍掌書一名司文移書寫一名司繕寫知印一名司印務奏差一名司差遣以上皆由衍聖公保舉堪用人數咨部銓用闕里文獻考知印書寫並明洪武二年建隨朝伴官洪武十七年設謹案聖裔世爵始自西漢若餘官則後漢始置百户卒史然至晉時已廢後魏孝文嘗官孔氏顔氏而亦未聞世襲也至唐末始以文宣公兼曲阜令宋時又置廟學教授自是厯代相承遞有増設更元及明置官漸備然四時将享主鬯者雖膺上公之封而駿奔者不皆服官之侣至國朝設六等執事官然後牽牲贊采章紱焜煌先聖祀典於是有光真足以補前朝之闕典矣至曲阜世職知縣明隆慶時御史趙可懐已有舉用非人民受其殃之奏而因循不廢者徒以此為報先師之盛意而無術以善處之爾今以曲阜知縣改授世職六品官品秩視舊為崇而無民社之責為職事之所不及尊師重道之意通變宜民之術並行不悖斟酌盡善尤為前代之所不及也欽定厯代職官表卷六十六
