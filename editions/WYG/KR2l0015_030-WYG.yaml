body:
  text: 經筵日講起居注官表經筵日講起居注官國朝官制經筵講官滿洲漢人各八人掌進讀講章敷陳典訓以奉侍經幄敬襄鉅典嵗二月八月两舉經筵講書滿洲漢人各一人講經滿洲漢人各一人由翰林院先期請㫖簡𣲖滿洲講官以大學士内閣學士掌院學士讀講學士詹事少詹事及尚書侍郎左都御史副都御史通政使大理寺卿等官列名漢人講官以大學士内閣學士掌院學士讀講學士詹事少詹事祭酒及尚書侍郎左都御史等官之由翰林升任者列名以原銜兼充員額順治十四年定置日講起居注官滿洲八人漢人十有二人掌侍直起居記言記動均翰林詹事坊局官以原銜兼充引見簡用惟滿漢掌院學士例各兼一缺凡皇帝御門聽政朝㑹宴饗大典禮大祭祀及毎嵗勾决重囚皆以日講官滿洲漢人各二人近前侍班謁陵校獵巡狩方岳則請㫖扈從凡侍直敬聆綸音退而謹書之具年月日及當直官姓名於籍月成滿漢文各二帙至次年按月編排彚為總冊封鐍於匱送内閣尊藏焉初順治十四年始設日講官十人康熙九年置起居注館於太和門西廊設滿洲記注官四人漢人記注官八人俱以日講官兼攝十二年増設滿洲記注官一人漢人記注官二人十六年又増設滿洲記注官一人二十年増漢人記注官至十八人三十一年定設漢人記注官十二人五十七年三月省記注官令翰林官五員於理事日侍班記注之事併歸内閣雍正元年詔復設日講起居注官如康熙五十六年以前故事乾隆元年増設滿洲記注官二人凡滿漢記注官均兼日講繫銜起居注館主事滿洲二人漢人一人掌出納文移校對典籍初置滿洲主事三人漢軍主事一人康熙三十八年省滿洲漢軍主事各一人五十七年俱省雍正元年復置滿洲主事二人十二年増設漢人主事一人筆帖式滿洲十有四人漢軍二人順治初置滿洲八人漢軍四人十一年増設滿洲六人康熙五十七年俱省雍正元年復設如今額職事具吏部篇歴代建置三代大戴禮記武王踐阼三日召師尚父而問焉曰黄帝顓頊之道存乎意亦忽不可得見歟師尚父曰在丹書王欲聞之則齋矣三日王端冕師尙父亦端冕奉書而入負屏而立王下堂南面而立師尚父曰先王之道不北靣王行西折而南東面而立師尚父西面道書之言謹案大戴禮稱帝入太學承師而問道而學記亦云太學之禮詔於天子無北面是三代聖王皆有講學之臣以資啟沃特其官不見於六經章俊卿山堂考索以周官師氏保氏為後世經筵之職然師氏保氏雖云王舉則從其實専為教世子國子而設未可引為原始惟大戴禮武王踐阼篇載師尚父授丹書頗與經筵之儀相近後世舉經筵不於太學而於殿廷事亦相類録著於此以徵縁起焉禮記玉藻動則左史書之言則右史書之鄭康成注其書春秋尚書具存者孔頴逹疏左陽陽主動故記動言則右史所書右隂隂主靜故也周禮五史無左右之名襄二十五年太史書崔氏是太史記動為左史也周禮内史掌䇿命是内史為右史也孔叢子古者人君外朝有國史内朝有女史舉則左史書之言則右史書之謹案左史記動右史記言為後代記注官所由始然其説但見於禮記而周禮則無左右史之名故孔頴逹以太史為左史以内史為右史但考太史掌稽天道以建典則並無記載職任不可以當珥筆之官而内史掌八柄以詔王治所司皆君舉之大者其他策命諸侯卿大夫亦宜籍記以存盟府則内史當為記事之職而外史掌外令及四方之令當為記言之職孔頴逹据酒誥鄭注有太史内史掌記言記行之文遂以二官分配非其實也又考逸周書史記解穆王時有左史戎夫春秋襄十四年左氏傳有左史謂魏莊子又楚有左史倚相左史老則是周自成康以後亦已特置左右史官並不專屬之内史外史矣秦未置漢章俊卿山堂考索漢武帝時兒寛語帝經學宣帝甘露三年詔諸儒講論五經於石渠閣光武平隴蜀後數引公卿郎將講論經理令桓榮敷奏經義顯宗時張酺以尚書數講於御前肅宗建初四年㑹諸儒於白虎觀講五經同異帝親臨決如石渠故事謹案宣帝講石渠章帝議虎觀即講經殿中之始然特令諸儒講議異同稱制平決而已惟桓榮張酺之流講經御前此有似於後世經筵日講之官特未置為定職耳隋書經籍志漢武帝有禁中起居注後漢書明徳馬皇后本紀后自撰顯宗起居注杜佑通典漢起居注似在宫中為女史之任王應麟玉海獻帝及晉代以來起居注皆近侍臣所録謹案隋書稱周穆天子傳體制與今起居注正同葢周時内史所記王命之副則記注之設由來尚矣漢代起居注之名今可考見者漢書兒寛傳臣瓚注宣帝紀黄龍元年師古注俱引漢注文選赭白馬賦李善注引漢明帝起居注章懐太子後漢書註引獻帝起居注而史獨不詳其珥筆之官杜佑疑為女史之任王應麟亦謂獻帝以後乃侍臣所録然考後漢馬嚴傳稱永平中留仁壽與校書郎杜撫班固等雜定建武注記則當時實以史官掌之又楊賜傳載賜初侍講華光殿後為太尉去位帝閲録故事得賜前侍講注籍云云章懐太子注謂所注之籍録據此則亦似今之以日講起居注合為一職也三國三國魏志曹爽傳爽弟彦為散騎常侍侍講謹案自漢以後歴代俱無經筵日講之官而獨有所謂侍講者以他官兼領掌以經義進講御前葢即其職但今侍讀侍講已定為翰林官職名故其沿革之詳已專繫之翰林院篇不入於此表馬端臨文獻通考自魏至晉起居注則著作掌之其後起居皆近侍之臣録記也録其言行與其勲伐歴代有職而無其官晉山堂考索晉起居之職掌於著作其後亦命近臣主掌其事謹案隋志載晉起居注卷帙甚多其見於他書所引者如三國蜀志注引晉泰始起居注魏志注引陸機惠帝起居注文選注引晉起居注太康四年詔世説注引惠帝建興太元起居注而沈約宋書𫝊亮𫝊亦引陸士衡起居注稽之陸機本傳機於惠帝初嘗為著作郎此即當時記注由著作撰述之一證也宋齊梁陳南齊書周顒傳顒兼著作撰起居注梁書裴子野傳武帝以為著作郎掌修起居注南史王思逺傳思逺遷為侍中掌優䇿及起居注謹案江左諸朝承晉制以著作掌起居注而王思逺乃以侍中亦兼其職南史王喜傳又載有喜為領軍府白衣吏領軍將軍沈演之使寫起居注一事考演之時以中領軍兼侍中則當時起居注實兼屬於門下省隋唐起居郎之𨽻門下其源葢本於此也北魏通典後魏始置起居令史每行幸宴㑹則在御左右記録帝言及宴賔客酬答後又别置修起居注二人以他官領之魏書官氏志起居令史從第七品上謹案北魏修起居注雖他官兼之然已設有定額考之於史如崔鴻以司徒長史前將軍兼韋賁以員外散騎侍郎兼許絢以司徒諮議參軍兼隂道方以左民郎中兼封肅以太學博士兼邢昕以太尉記室參軍兼温子昇以南主客郎兼則亦不拘品秩也魏書又有稱監起居者見於裴修盧聿諸傳有稱典起居注者見於裴伯茂魏收鄭伯猷諸傳殆即修起居注之職而變其文者歟北齊隋書百官志後齊集書省又領起居省散騎常侍通直散騎常侍散騎侍郎通直散騎侍郎各一人校書郎二人謹案北齊别置起居省而記言動者始各為一局即如今之設記注館也然考北齊書崔㥄傳天保初㥄除侍中監起居崔瞻傳瞻為中舎人兼中正員郎勅修起居注則其時撰述之事仍以他官兼之所謂散騎常侍等葢特具員而已後周通典後周官品正四命春官外史下大夫唐六典後周春官府置外史掌書言及動作以為國志又有著作掌綴國録葢起居著作自此分也謹案後周既分起居著作為二職則外史當專記言記動之任然考隋書劉行本傳稱周武帝親總萬幾行本轉御正中士兼領起居注是當時亦以他官兼領不盡屬之外史矣隋鄭樵通志隋初以吏部散官及校書正字有叙述之才者掌起居注職以納言統之至煬帝以為古有内史外史今著作如外史矣宜置起居注官以掌其内乃於内史省置起居舎人二員次内史舎人下唐六典漢晉以後起居注皆史官所録自隋置為職員列為侍臣專掌其事每季為卷送付史官唐王圻續文獻通考唐穆宗召韋處厚路隋為侍讀命講書謹案歴代經筵皆無專官至唐始有内殿侍讀講書之制然亦未有經筵之名故侍讀侍講諸官皆别繫諸翰林院篇不列於此通典唐貞觀二年省起居舎人移其職於門下置起居郎二人顯慶中復於中書省置起居舎人遂與起居郎分掌左右龍朔三年改為左右史郎為左史舎人為右史咸亨元年復舊天授元年又為左右史神龍初復舊新唐書百官志門下省起居郎二人從六品上掌録天子起居法度天子御正殿則郎居左舎人居右有命俯陛以聽退而書之季終以授史官貞觀初以給事中諫議大夫兼知起居注或知起居事每仗下議政事起居郎一人執筆記録於前史官隨之其後復置起居舎人分侍左右秉筆隨宰相入殿若仗在紫宸内閣則夾香案分立殿下直第二螭首和墨濡筆皆即㘭處時號螭頭髙宗臨朝不決事有所奏惟辭見而已許敬宗李義府為相奏請多畏人之知也命起居郎舎人對仗承㫖仗下與百官皆出不復聞機務矣長壽中宰相姚璹議仗下後宰相一人録軍國政要為時政記月送史館然率推美讓善事非其實未幾亦罷而起居郎猶因制敕稍稍筆削以廣國史之闕起居舎人本記言之職惟入而位於起居郎之次及李林甫專權又廢太和九年詔入閤日起居郎舎人具紙筆立螭頭下復貞觀故事有令史三人贊者六人中書省起居舎人二人從六品上掌修記言之史録制誥徳音如記事之制季終以授國史有楷書手四人典二人唐㑹要武宗㑹昌二年十月中書奏起居注記比者不逐季撰録請每季初即納前一季所記與史館以遲速為殿最從之謹案唐以起居郎舎人分侍左右執筆記録記注官侍班之制實起於此時其季終以所修録送史館即如今每嵗十二月以起居注送内閣之例而宰相所録又名時政記則如今内閣之有上諭檔及外紀檔也五季薛居正舊五代史周李糓監修國史請命近臣録禁中事付史館乃命樞密院直學士就樞密院録送史館自此始謹案五季兩省設官並沿唐制而起居郎舎人之職皆不見於紀傳觀薛史所載今樞密直學士録時事以送史館則亦未必備官也宋文獻通考元豐官制廢翰林侍讀侍講學士不置但為兼官然必侍從以上乃得兼之其秩卑資淺則為説書嵗春二月至端午日秋八月至長至日遇隻日入侍邇英閣輪班講讀元祐七年復増學士之號建炎元年詔特差侍從官四員充講讀官遇萬幾之暇令三省取㫖就内殿講讀山堂考索宋太祖召趙孚講周易又召王昭素講易乾卦真宗置侍讀侍講學士擇耆舊以充其選設直廬於秘閣侍讀更直仁宗天聖元年上始御崇政殿召侍講孫奭馮元講論語初詔雙日至是隻日亦詔講讀景祐元年以賈昌朝趙希言王宗道楊安國並為崇政殿説書日以二人入侍講崇政説書自此始舊講讀官每見先賜坐暫起講復坐仁宗富於春秋乃令儒臣並就御案遂為故事范鎮東齋紀事宋崇政殿西有延義閣南向迎陽門之北有邇英閣東向皆講書所仁宗初御延義每令講論或講讀終篇則宣二府大臣同聽賜飛白書或賜宴其後專御邇英也吳曽能改齋漫録王荆公所作賈魏公神道碑云景祐元年積官至尚書都官員外郎乃始置崇政殿説書而以公為之然予按傅簡公佳話云太祖少親戎事性好藝文即位未幾召山人郭無為於崇政殿講書至今講官所領階銜猶曰崇政殿説書云據傅簡公所云則崇政殿説書不始於仁宗景祐元年矣豈中嘗罷之而至是再建耶謹案經筵之制起於宋凡侍讀侍講學士侍讀侍講及崇政殿説書皆稱經筵官馬端臨所謂至清要顯美者是也當時以雙隻日入侍講讀早晚進講惟遇假故及大寒大暑權行停罷故經筵即日講並不分設兩官自明於經筵以外有日講午講諸儀於是經筵日講職名始區而為二矣今以讀講已為翰林定職故别載入翰林院篇而崇政殿説書則繫之此表至吳曾以説書之官起自郭無為考之於史郭無為乃抱腹山人北漢主劉承鈞召以為相後為劉繼元所殺其人始終在北漢並未入宋安得有太祖召令講書之事真無稽之談不足信也宋史職官志門下省起居郎一人掌記天子言動御殿則侍立行幸則從大朝㑹則與起居舎人對立於殿下螭首之側凡朝廷命令赦宥禮樂法度損益因革賞罰勸懲羣臣進對文武臣除授及祭祀宴享臨幸引見之事四時氣候四方符瑞户口増損州縣廢置皆書以授著作官國朝舊置起居院命三館校理以上修起居注熙寧四年詔諫官兼修注者因後殿侍立許奏事元豐二年兼修注王存乞復起居郎舎人之職使得盡聞明天子徳音退而書之神宗亦謂人臣奏對有頗僻䜛慝者若左右有史官書之則無所肆其姦矣然未果行故事左右史雖日侍立而欲奏事必禀中書俟㫖存因對及之八月廼詔雖不兼諫職許直前奏事葢存發之也官制行改修注為郎舎人六年詔左右史分記言記動元祐元年仍詔不分七年詔邇英閣講讀罷有留身奏事者許侍立紹聖元年中丞黄履言所奏或干機密難令旁立仍依先朝故事先是御後殿則左右史分日侍立崇寧三年詔如前殿之儀更不分日大觀元年詔事有足以勸善懲惡者雖秩卑亦書之紹興二十八年用起居郎洪遵言起居郎舎人自今後許依講讀官奏事隆興元年用起居郎兼侍講胡銓言前殿依後殿輪左右史侍立中書省起居舎人一人掌同門下省起居郎侍立修注官元豐前以起居郎舎人寄禄而更命他官領其事謂之同修起居注官制行以郎舎人為職任淳熙十五年羅㸃自户部員外郎為起居舎人避其祖諱乃以為太常少卿兼侍立修注官其後兩史或闕而用資淺者則降㫖以某人權侍立修注官玉海淳化五年四月丙戌史官修撰張佖請置起居院修左右史之職記録為起居注每月與時政記同送史館上嘉之乃置院於禁中命梁周翰李宗諤掌郎舍人事修撰體式檢討故事以聞丁酉周翰等言今復應有崇徳殿長春殿皇帝宣諭之言侍臣論列之事依舊中書編為時政記月終送史館其餘百官封拜除改沿革之事並令闗報起居院以備編録每月送史館仍命郎舎人分直崇政殿以記言動别為起居注每月先進御後付史館從之慶厯三年十一月同修注歐陽修請上殿臣僚少留殿門俟修注官出面録聖語又請更不進本從之至和元年八月二十四日知制誥賈黯乞修注官入侍邇英閣事有可書隨即記録二年三月丁夘令立侍諫官兼修注文獻通考宋沿唐制起居郎隸門下起居舎人隸中書號小兩省官費衮梁谿漫志二史立螭頭舊多服緑者謂之一㸃青其職曰記言記動則人主起居之際皆所當侍而遇乘輿行幸未嘗扈從此亦闕文近世始命起居郎起居舎人從駕乃合建官本意謹案宋以起居郎為左史起居舎人為右史專修記注與講筵官原各為一職然考王應麟稱説書賈昌期以經筵議論纂為邇英延義二閣記注孝宗時洪邁等在經筵亦以所得上語及奏對編為祥曦緝熙二殿記注則今記注官之兼日講銜權輿於此矣遼遼史百官志門下省起居舍人院起居舎人聖宗開泰五年見起居舎人程翥知起居注耶律迪里索倫語頭也原作敵烈今改正重熙末知起居注起居郎杜防開泰中為起居郎金宇文懋昭大金國志天㑹十三年改官制記注院置修起居注金史百官志記注院修起居注掌記言記動明昌元年詔毋令諫官兼或以左右衛將軍兼貞祐三年以左右司首領官兼為定制益政院正大三年置於内廷以學問該博議論宏逺者數人兼之日以二人上直備頋問講尚書通鑑貞觀政要名則經筵實内相也金史哀宗本紀正大三年七月詔設益政院於内廷以禮部尚書楊雲翼為益政院説書官謹案遼道宗有令侍臣講論語事則當時亦嘗置進講之官特無經筵之目耳至金初未開講幄正大中始設益政院官令其日侍講讀而説書官以禮部尚書兼之則其職較崇今以尚書侍郎充經筵講官葢即其例也元陶宗儀輟耕録天厯初建奎章閣于西宫興聖殿之西廊文宗復位陞為奎章閣學士院置大學士五員並知經筵事侍書學士二員承制學士二員供奉學士二員並兼經筵官幕職置叅書二員典籖二員並兼經筵叅贊官藝文監太監少監監丞或有兼經筵官者博士兼經筵叅贊官授經郎兼經筵譯文官元史黄溍列傳溍兼經筵官執經進講者三十有二帝嘉其忠數出金織文段賜之元史額琳沁巴勒列傳唐古特語額琳沁寶也巴勤威也原作亦憐真班今改正額琳沁巴勒以御史大夫知經筵事經筵進講必詳必慎故每讀譯文必被嘉納元史百官志至元六年始置起居注左右補闕掌隨朝省臺院諸司凡奏聞之事悉紀録之如古左右史十五年改陞給事中兼修起居注左右補闕改為左右侍議奉御兼修起居注後定置給事中兼修起居注二員右侍儀奉御同修起居注一員左侍儀奉御同修起居注一員孫承澤春明夢餘録元人經筵儀節悉備如以勲舊大臣知其事及定期二八月後累朝皆仍其制謹案元以奎章閣學士院兼經筵官給事中兼起居注官皆設為定職而勲舊大臣亦間令知經筵以重其事如額琳沁巴勒以御史大夫兼領者是也明廖道南殿閣詞林記洪武中令儒臣更番入禁中每日輪一員進講侍直誤者罪之如大學士吳沈嘗坐進講遲誤被劾永樂以後多渥典自設經筵後講官不復入直惟令翰林及春坊經局等官相輪侍班久之選為展書官又自展書乃得充月講官若日講則用年資深而品秩尊者續文獻通考英宗正統元年春二月始開經筵命太師英國公張輔知經筵事少傅兵部尚書兼華葢殿大學士楊士竒少傅工部尚書兼謹身殿大學士楊榮禮部尚書兼學士楊溥同知經筵事詹事府少詹事兼侍讀學士王直少詹事兼侍講學士李時勉錢習禮陳循侍讀苖𠂻侍講髙糓修撰馬愉曹鼐兼經筵官仍賜宴及金幣有差遂為定制續定經筵儀注毎月三日日以逢二為期嵗率以二八月中旬起四十月末旬止用勲臣一人知經筵事内閣大學士二人同知經筵事六部尚書左右都御史通政司使大理寺卿及學士等官侍班翰林院春坊等官及國子監祭酒二員進講二員展書給事中御史各二員侍儀鴻臚寺錦衣衛堂上官各一員供事又鳴贊一員贊禮序班四員舉案侯伯各一人領將軍侍衛春明夢餘録文華殿經筵毎嵗以二八月中旬起四十月末旬止月三㑹講日皆逢二進講每兩人一四書一經講章皆預呈閣臣轉付中書繕録正副各二紙隔日進司禮監官奏知先晩於文華殿内寶座地平之南設金鶴香爐左右各一於左香爐之東稍南設御案講案各一皆西向案上各置所講二書以夾講章各壓以金尺一副至期早進近侍内臣及知經筵官勲臣内閣學士并講官及六部尚書都御史大理寺卿通政司使鴻臚寺卿錦衣指揮使及四品以上寫講章官俱繡金緋袍其展書翰林官與侍儀御史給事中序班鳴贊等官俱青繡服朝畢駕起御文華殿皆隨之大漢將軍凡二十名𨗳駕至左順門退易冠帶便服仍各執金𤓰而領將軍或侯或伯者則易金繡蟒衣追越衆官進左順門皆分班綴行立文華殿外竢傳宣云進來則將軍先入殿内負東西墻立諸臣陞陛鴻臚寺官贊入班行禮畢以次分由殿東西門入重班立指揮則立西一班末稍前御史給事序班六員分於中門左右向北立序班二人舉御案進上二人舉講案置中鳴贊唱進講二官各出班立講案前展書官二員出班對立鳴贊講官並行禮興東展書官進至地平膝行詣御案展四書講章講四書官亦稍前近案展所講書竢展書官復位先説講某書然後申講講畢掩書稍退後原展書官仍如儀進掩書復位西展書官與講經官進退俱如前儀講畢仍並行禮各回班序班各撤案聨置舊所鴻臚卿中跪奏禮畢上諭官人每喫酒飯各官跪承㫖興以次出丹陛仍行禮乃出左順門宴以官序惟學士之坐立則序於鴻臚寺卿及四品以上寫講章官及展書官坐立亦序於四品之下重職事也又日講官凡四員日輪二員先大學衍義次貞觀政要二書皆不用講章惟各以黄票書所起止預進先日内臣設御案於文華殿後穿堂中以二書並起止置案上至日早朝畢四講官同閣臣隨駕入至殿内授内臣以來日起止竢召乃入穿堂内行禮分班北向前後立東班當講者詣御案前内侍授牙籖右手執之且指且講書則向上初展後掩皆屬内侍講畢還籖復位西班當講者乃進講悉如東儀講畢上諭先生喫酒飯皆跪承㫖行禮禮畢前後皆一拜三叩頭出宴於文華門外西廡禁中謂之小經筵亦謂之小講明史職官志起居注甲辰年置吳元年定秩正五品洪武四年改正七品六年陞從六品九年定起居注二人後革十四年復置秩從七品尋罷至萬厯間命翰林院官兼攝之已後罷謹案自魏晉以後歴代皆有起居之任至明初暫置即罷遂不復設翰林職掌雖有記注起居編纂六曹章奏之文僅屬虛名未嘗撰輯神宗時閣臣始議開史局以東西十館密邇朝堂紀述為便乃以東館近上四所令史臣分直其中一起居二吏户三禮兵四刑工日輪日講官一員專記起居兼録聖諭詔勅冊文其六曹章奏則選史官中年深而文學素優者六人分纂因定常朝御門日記注起居官及史官侍班之制日講官繫起居注銜葢自此始然不久仍復停輟故終明之世起居之官不備以致史職曠廢王鏊震澤長語所謂前代左右史皆親見在廷君臣言動而書之成化以來人君不復與臣下接朝事亦無可紀凡修史則但取諸司奏牘分泒諸人以年月編次雜合成之後世將何所取信者是也我朝復設起居注館以翰詹諸臣兼充執簡簮毫敬謹紀載年經月緯嵗有成編視唐宋之時政記日録而更昭核實矣又案經筵之禮始於宋代所以講明正學闡繹聖文歴代相因咸稱鉅典至明而儀節尤為詳備然當時人主習於宴安怠惰往往臨朝傳免即有勤於聽講者亦不過以文具相視未嘗有所辨論發明黄瑜雙槐嵗抄載明景帝每講畢命中官布錢於地令講官拾之以為恩典髙糓年老俯伏不便恒莫能得一他講官拾以遺之是以講學論道之地而恣意媟凟實乖典則逮熹宗之世而顧秉謙等於經筵講畢䄂出市刋遼東傳以搆䧟熊廷弼遂借書幃令典以曲肆其傾害之機謀益非念陳典謨之本意矣國家敦崇實學久道化成皇上稽古尊經嵗莅講幄親製御論發揮精藴無不澈天人之㣲㫖貫理道之真源諸臣肅跽敬聆仰見覺世牖民之至意心悦誠服莫可名言統備君師實三代以後所莫能景企於萬一也欽定厯代職官表卷二十四
