  text: 卷一宗人府卷二内閣卷三内閣中卷四内閣下卷五吏部卷六户部卷七户部三庫卷八戸部倉場衙門卷九禮部卷十樂部卷十一禮部㑹同四譯館卷十二兵部卷十三刑部卷十四工部上卷十五工部下卷十六户工二部錢局卷十七理藩院卷十八都察院上卷十九都察院下卷二十五城卷二十一通政使司卷二十二大理寺卷二十三翰林院卷二十四經筵日講起居注官卷二十五文淵閣閣職卷二十六詹事府卷二十七太常寺卷二十八壇廟各官卷二十九陵寢各官卷三十光禄寺卷三十一太僕寺卷三十二順天府卷三十三鴻臚寺卷三十四國子監卷三十五欽天監卷三十六太醫院卷三十七内務府上卷三十八内務府下太監職制附卷三十九内務府上駟院卷四十内務府奉宸苑卷四十一内務府武備院卷四十二鑾儀衛卷四十三領侍衛内大臣卷四十四八旗都統卷四十五前鋒䕶軍統領卷四十六歩軍統領卷四十七火器健鋭虎鎗各營卷四十八盛京將軍等官卷四十九盛京五部等官卷五十總督巡撫卷五十一學政卷五十二司道卷五十三知府直𨽻州知州等官醫學隂陽學等官附卷五十四知州知縣等官卷五十五各省駐防將軍卷五十六提督卷五十七總兵副將卷五十八叅將逰擊等官卷五十九河道各官卷六十漕運各官卷六十一鹽政卷六十二闗税各差卷六十三各處駐劄大臣卷六十四宗室封爵卷六十五世爵世職卷六十六聖賢後裔卷六十七師傅保加銜卷六十八文武官階卷六十九王府各官公主府官附卷七十新疆各官卷七十一藩屬各官卷七十二土司各官臣等謹按厯代職官表七十二卷乾隆四十五年奉勅撰按卷進呈具經欽定粤自龍鳥水火肇建官名然夏商以前書缺有間遺制不盡可考其可考者唯周禮為最詳迨秦漢内設九卿外置列郡而官制一變東京以後事歸臺閣雖分置尚書六部而政在中書其權獨重漢魏之制至唐宋而又一變明太祖廢中書省罷丞相盡歸其職于六部永樂間復設内閣而參以七卿唐宋之制至是而又一變矣其間名號品數改革紛繁大抵勢足以相維則乾綱不失權有所偏屬則魁柄必移即官政之得失
