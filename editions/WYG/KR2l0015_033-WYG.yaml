body:
  text: 太常寺國朝官制太常寺卿滿洲漢人各一人正三品少卿滿洲漢人各一人正四品掌典守壇壝廟社以嵗時序其祭祀而詔其行禮之節祭日則帥其屬以分司厥事凡牲牢之數籩豆之實咸凖儀式而為之共備焉國初設太常寺以𨽻禮部置卿少卿等官凡祭祀事宜由禮部掌行順治十六年改歸本寺康熙二年復以寺事屬禮部十年仍歸本寺雍正元年始特簡大臣總理寺事乾隆十四年定禮部滿洲尚書以兼管太常寺入銜永為成式焉寺丞滿洲一人漢人二人正六品掌祭祀之儀式辨其職事以詔有司及遴補員吏鈎稽廪餼之事國初設滿洲寺丞一人漢人左右寺丞各一人皆堂上正官乾隆十三年改為屬官博士滿洲一人漢軍一人漢人一人正七品掌繕冩章牘有祀事則具儀以進品物所須咸應時而供其直焉員額順治元年定贊禮郎滿洲二十二人漢人十四人滿洲贊禮郎初制四品順治十六年改為九品康熙四年改為六品六年改為五品九年仍改為正九品尋又定由䕶軍校驍騎校選授者六品職銜由八品筆帖式監生選授者八品職衘由無品筆帖式庫使前鋒䕶軍選授者九品職銜乾隆元年改定俱以六品冠帶食七品俸漢人贊禮郎仍初制為正九品讀祝官滿洲八人初制五品康熙九年改為正九品尋又定品數如贊禮郎視出身為差乾隆元年改定俱以六品冠帶食七品俸學習贊禮郎讀祝官各滿洲二人九品冠帶掌相儀序事偹物絜器凡國之大禋祀則分充典儀典樂通贊引禮傳贊司香司玉帛司爵司祝司饌掌燎掌瘞進爼挈壼司拜牌拜褥等官各共其職無有不恪凡中祀羣祀咸凖式而差次之以奉殷禮焉滿洲贊禮郎初置十六員讀祝官初置四員又有禮部讀祝官二員康熙十年以禮部讀祝官改𨽻太常寺㝷又增置額外讀祝官二員雍正十一年增置贊禮郎八員改額外讀祝官二員為正額乾隆三十七年以贊禮郎二員分𨽻鑾儀衞司贊鳴鞭四十年增置學習贊禮郎讀祝官各二員漢人贊禮郎順治初置十六員康熙三十八年省二員雍正元年復置乾隆二年又增置二員九年復省四員典簿㕔典簿滿洲漢人各一人正七品掌行遣文移凡祭祀則辨籩豆牲牷之位而陳之員額順治元年定司庫滿洲一人庫使滿洲二人掌祭器儀服之屬各以其物而分貯之嵗支銀於户部鈎考出入以供祀事司庫員額順治元年置庫使員額雍正七年置筆帖式滿洲九人漢軍一人滿洲筆帖式初置十八員康熙三十八年省九員漢軍筆帖式初置二員康熙三十八年省一員職事具吏部篇謹案太常寺初設有犧牲所牧滿洲漢人各一人從七品掌繫牲牷而芻牧之以待祭祀乾隆二十六年省以其事改入内務府慶豐司管理厯代建置三代杜佑通典今太常者亦唐虞伯夷為秩宗兼䕫典樂之任也周時曰宗伯掌邦禮周禮鄭康成注唐虞三代以宗宮典國之禮與其祭祀漢之太常是也賈公彦疏上舉唐虞下舉周法則其中夏殷亦宗官掌禮可知故總以三代言之禮記曲禮天子建天官先六太曰太祝太士鄭康成注此盖殷時制也周禮春官大宗伯卿一人掌建邦之天神人鬼地􅅘之禮以佐王建保邦國以吉禮事邦國之鬼神􅅘以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命觀師雨師以血祭祭社稷五祀五嶽以貍沈祭山林川澤以疈辜祭四方百物以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以烝冬享先王小宗伯中大夫二人掌建國之神位右社稷左宗廟兆五帝於四郊四望四類亦如之兆山川丘陵墳衍各因其方辨廟祧之昭穆毛六牲辨其名物而頒之於五官使共奉之辨六彛之名物以待果依注作祼將辨六尊之名物以待祭祀賓客掌四時祭祀之序事與其禮鬱人下士二人府二人史一人徒八人掌祼器詔祼將之儀與其節鬯人下士二人府一人史一人徒八人掌共秬鬯而飾之司尊彛下士二人府四人史二人胥二人徒二十人掌六尊六彛之位詔其酌辨其用與其實司几筵下士二人府二人史一人徒八人掌五几五席之名物辨其用與其位典瑞中士二人府二人史二人胥二人徒十人掌玉瑞玉器之藏辨其名物與其用事設其服餙四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望祼圭有瓚以肆先王以祼賓客圭璧以祀日月星辰璋射邸以祀山川以造贈賓客太祝下大夫二人上士四人小祝中士八人下士十有六人府二人史四人胥四人徒四十人太祝掌六祝之辭以事鬼神􅅘祈福祥求永貞一曰神祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰筴祝小祝掌小祭祀將事侯􅓙禱祠之祝號以祈福祥順豐年逆時雨寧風旱彌烖兵逺辠疾凡事佐太祝謹案唐虞三代皆以宗官主祭祀之禮説者訓宗為尊以其叙次天神地􅅘人鬼之禮事則謂之秩宗以其為治尊禮之長官則謂之宗伯其義一也自六官之制既廢秦漢始改設太常以代宗伯之任自是宗官職掌乃盡移於太常故漢官典職謂太常葢周官宗伯崔駰太常箴亦云翼翼太常實為宗伯晉書華恒傳恒拜太常元帝詔曰恒司宗伯之任後魏禮志劉芳為太常表云臣忝居宗伯權徳輿謝除太常卿表亦有自罷宰司再復宗伯之語其後尚書省雖復置禮部以凖春官而太常亦並建不廢寅清之職遂岐而為二故唐六典於禮部尚書侍郎及太常卿沿革皆以春官宗伯當之未免散而無統今制以禮部滿洲尚書兼管太常寺永為定式於是容臺之任始歸畫一洵與周禮相符矣特以源流所自在三代原無所區分故仍從六典互見於此表焉又案祝之為官所以達誠薦信於鬼神故三代特重之史記周本紀武王立於社南尹佚祝筴張守節正義曰尹佚讀筴書祝文以祭社則如今宣讀祝文之職又逸周書嘗麥解王初祈禱於宗廟少祝導王亞祝迎王則又如今贊引對引之職禮記月令仲秋乃命宰祝循行犧牷鄭康成注太祝主祭祀之官則又如今驗視牲隻之職據春秋左氏莊三十二年傳虢有祝應宗區史嚚則祝官列於宗官之上當亦由祭祀在正辭告神故太祝為之主也至鬱人鬯人司几筵諸職所司在詔儀節而辨用位正如今之贊禮郎而典瑞掌藏玉器鄭康成曰禮神曰器今凡蒼壁黄琮及金編鍾玉編磬等皆㳟貯寺庫設官典守亦其職矣秦册府元龜秦置奉常掌宗廟禮儀有丞史記封禪書秦諸祠太祝常主以嵗時奉祠祝官有祕祝即有菑祥輙祝祠移過於下漢唐六典漢髙祖名曰太常惠帝復曰奉常史記景帝本紀中六年更命奉常為太常王應麟玉海景帝中六年呉利始為之漢書百官公卿表奉常掌宗廟禮儀諸陵縣皆屬焉漢書昭帝本紀元鳯元年三輔太常徒蘓林注時太常主陵縣治民也三年三輔太常郡如淳注太常主諸陵别治其縣爵秩如三輔郡元帝永光五年令各屬在所郡也後漢書百官志太常卿一人中二千石掌禮儀祭祀每祭祀先奏其禮儀及行事常贊天子每選試博士奏其能否大射養老皆奏其禮儀每月前晦察行陵廟通典太常卿漢舊常以列侯忠孝謹慎者居之後漢不必侯也舊制陵縣悉屬嵗舉孝亷後漢則否建安中為奉常歐陽詢藝文類聚漢官解詁曰太常掌社稷郊畤事重職尊故在九卿之首太平御覽劉熙曰漢置十二卿首太常韋昭辨曰漢正卿九首太常自漢以來九卿所居謂之寺顔師古漢書注太常者王之旌也畫日月焉王者有大事則建以行禮官主奉持之故曰奉常後改為太尊大之義也宋書百官志應劭曰欲令國家盛大常存故稱太常謹案秦漢太常即周官宗伯之任故朝廟大禮皆其所掌不獨祭祀之法式然百官表謂掌宗廟禮儀而不言朝會則其職仍以祠祀為重也至百官表謂漢初曰奉常景帝始改太常而唐六典則云漢初已名太常通典亦同皆與百官表互異今考史記叔孫通列傳實稱髙帝拜通為太常不作奉常而太平御覽引漢官典職亦有惠帝改太常為奉常之文是其説當有所據殆百官表徵引未備耳又太常之義應劭顔師古立説各殊未知孰是然周官有司常之職亦以常名官則顔説當為近之唐書楊收傳載收建言太常分務專治所以藏天子旂常宋張耒除太常作詩亦有平生秉周禮垂老奉龍旂之句葢均以顔説為可據矣漢書百官公卿表奉常有丞王應麟玉海漢舊儀太常丞舉廟中非禮者漢書韋元成傳元成兄宏為太常丞職奉宗廟典諸陵邑後漢書百官志太常丞一人比千石掌凡行禮及祭祀小事總署曹事其署曹椽史隨事為員謹案劉昭補後漢志注引盧植禮注云太常卿如大樂正丞如小樂正葢兩漢大樂令及五經博士皆𨽻太常故植有此説今大樂令入樂部表五經博士入國子監表至今之太常博士曹魏始置與此不同説詳後其實丞與卿通判寺事正如今少卿之比故卿秩中二千石而丞亦秩至比千石也自後魏既置少卿則丞為散員故唐六典與主簿同職明代乃以少卿與丞均作正官未免冗贅國朝改寺丞為屬官於體制實為允協矣唐六典漢官儀鹵簿篇太常駕四馬主簿前車八乘有鈴下侍閣奉車騎吏五伯等員謹案太常主簿前後漢志俱不載僅見於此葢即如今典簿之職也劉昭後漢書志注漢舊儀曰贊饗一人秩六百石掌贊天子顔師古急就篇注治禮贊禮儀者也屬太常謹案漢之贊饗即封禪書所云天子揖見太乙其贊饗曰天始以寶鼎神策授皇帝後漢書禮儀志所云帝進拜謁贊饗曰嗣曾孫皇帝敬再拜者是也葢主於祝讚禮儀正如今贊禮郎之職而治禮郎四十七人則惟大鴻臚有之太常官屬並無此名然劉昭注引東觀書稱治禮郎主齋祠則祭祀儐贊之事亦其職司故顔師古以為兼屬太常其言當有所據或兩漢志脱漏也史記封禪書髙祖召秦祝官復置太祝太宰如其故儀禮漢書百官公卿表奉常屬官有太祝令丞景帝中六年更名太祝為祠祀武帝太初元年更曰廟祝後漢書百官志太祝令一人六百石凡國祭祀掌讀祝及迎送神丞一人掌祝小神事太宰令一人六百石凡國祭祀掌陳饌具丞一人劉昭後漢書志注漢舊儀曰廟祭太祝令主席酒後漢書禮儀志郊祀夕牲太祝吏牽牲入到榜太祝令繞牲舉手曰充東觀漢記隂猛好學温良以郎遷為太祝令謹案漢之太祝令丞即如今讀祝官而太宰令丞掌陳饌具則今典簿之司祭前陳設者亦兼有其職又太祝令員吏有宰二百四十二人屠者六十人太宰令員吏有宰二百四十二人屠者七十三人為數甚多今太常寺設有厨役三百九十名以供各祭祀烹宰滌濯及陳設之役即其例也漢書朱博傳博以太常掾察亷為安陵丞劉昭後漢書志注漢官曰太常員吏八十五人其十二人四科十五人佐五人假佐十三人百石十五人騎吏九人學事十六人守學事三國三國蜀志杜􅌦傳後主踐阼拜諫議大夫遷大鴻臚太常孟光傳太常廣漢鐔承三國魏志文帝紀黄初元年改奉常為太常晉書職官志太常博士魏官也魏文帝初置晉書鄭袤傳袤在魏轉太常高貴鄉公議立明堂精選博士袤舉劉毅等後並至公輔謹案兩漢以五經博士𨽻屬太常多至數十人後為博士置弟子員其薦舉選用皆太常主之漢書功臣侯表山陽侯張當居為太常坐擇博士弟子不以實免侯漢之太常所以稱為劇職也自隋唐以後專設國子監五經博士已不𨽻於太常今别著於國子監表至今之太常博士則始於魏文帝時職在導引乘輿與漢之五經博士並非一官唐六典叙太常博士沿革乃與太學國學諸博士混而一之殊為失考矣三國呉志三嗣主傳太元元年會稽太守滕允為太常趙彦衞雲麓漫鈔呉天璽元年遣兼太常周處封禪國山晉晉書職官志太常為列卿置丞功曹主簿五官等員冊府元龜晉承魏制太常有博士員通典太常博士魏初置晉因之掌引導乘輿王公以下應追謚者則博士議定之晉書鄭黙傳黙為太常山濤欲舉一親為博士謂黙曰卿似尹翁歸令我不敢復言唐六典晉有太祝令丞太常諸博士有治禮吏二十四人太祝令史三十人謹案西漢太常卿必以見侯居之葢以職奉宗廟園陵故特隆其任然事闗典禮動輙得咎由元狩以降太常卿因事廢斥者二十人漢書韋元成傳稱太常煩劇多罪過者是也考之漢書表中所載如酇侯蕭壽成坐犧牲痩蓼侯孔臧坐衣冠道橋壊繩侯周平坐不繕園屋睢陵侯張昌坐乏祠廣阿侯任越人坐廟酒酸俞侯欒賁坐雍犧牲不如令牧丘侯石徳坐廟牲痩當塗侯魏不害坐孝文廟風發瓦轑陽侯江徳坐廟郎夜飲失火弋陽侯任宫坐人盜茂陵園物皆以奉祠不謹之故削爵免官是當時於祀事尚為嚴恪故其責任亦重沿及晉初猶循漢舊晉書所載如張華傳華為太常以太廟屋棟折免官刑法志元康四年大風廟闕屋瓦有數枚傾落免太常荀寓五年大風蘭臺主者求索阿棟之間得瓦小邪十五處遂禁止太常復興刑獄陵上荆一枚圍七寸二分者被斫司徒太常奔走道路太常禁止不解葢法制之嚴肅如此自琅邪南渡此任漸輕晉書任愷傳遂以太常為散職而南史張􅅛傳又稱􅉞拜太常自謂閑職至於病免去官則其時茍且立國不復講求典禮亦概可見矣又案晉書職官志太常屬官内不載太祝令丞而刑法志載裴頠奏稱近日太祝署失火燒屋三間半署在廟北隔道在重墻之内云云是晉時實嘗置太祝唐六典亦謂晉有此官疑職官志因傳刻脱去太祝二字耳宋齊梁陳宋書百官志太常一人太祝令一人丞一人掌祭祀讀祝迎送神冊府元龜宋太常府博士南史徐爰傳宋孝武即大位爰兼太常丞撰立儀注南齊書百官志太常府置丞一人五官功曹主簿太祝令一人丞一人唐六典齊職儀太祝令品第七四百石銅印墨綬進賢一梁冠綘朝服用三品勲位隋書百官志梁天監七年以太常為太常卿視金紫光禄大夫統太祝令丞通典太常丞梁舊同員外郎遷尚書郎天監七年改視尚書郎陳因之鄭樵通志梁天監七年十二卿各置主簿惟太常主簿視二衛主簿陳因之隋書百官志陳太常中二千石隋書禮儀志陳天嘉中太中大夫領大著作攝太常卿許亨謹案自晉以後太常雖為列卿之首而職事清簡已非兩漢可比然梁陸倕讓太常表有云宗卿清重厯選所難漢晉已降莫非素範則當時尚以為華選也至梁世太祝令在十八班之末品秩最微而隋書禮儀志載天監十一年太祝牒北郊止有一海及二郊爼案詔下詳議葢職所在故太祝亦許其叅預禮文然史但言牒而不言奏則必先闗白於卿而為之入告者耳北魏魏書官氏志太和中髙祖議定百官太常從第一品下少卿第三品上太常丞第五品下太祝令從第五品下治禮郎從第六品下祝史太常齋郎從第七品中太常曰者從第七品下二十三年復次職令太常第三品太常少卿第四品丞第七品太常博士從第七品太祝令從第八品太常功曹五官治禮郎從第九品魏書禮志太常博士鄭太議文昭皇后改葬服魏書髙遵傳遵為中書侍郎髙祖恭薦宗廟遵形貎莊潔音氣雄暢常兼太祝令跪贊禮事為俯仰之節粗合儀矩由是髙祖識待之謹案北魏太祝令掌跪贊禮事正如今贊禮郎讀祝官之職而髙遵以中書侍郎第四品下兼太祝令從第八品則亦如今太常寺官之諳習儀典者雖陞任以後仍得兼贊禮讀祝行走不另開缺也又魏書禮志載太和十五年設薦於太和廟髙祖薦酌神部尚書王諶讚祝神部尚書一官史不概見殆即太祝之職而臨時特置以重其事者歟北齊隋書百官志後齊太常寺置卿少卿丞各一人有功曹五官主簿録事等員掌陵廟羣祀禮樂儀制天文術數衣冠之屬其屬有博士四人掌禮制統太祝署令丞掌郊廟贊祝祭祀衣服等事通志北齊太常有功曹五官主簿二人後周通典後周官品正七命大宗伯正六命小宗伯上大夫正五命春官大司樂中大夫正四命春官小司樂太祝下大夫正三命春官小祝上士正二命春官司几筵司罇彛掌鬰掌鬯治禮等中士正一命春官司几筵司罇彛掌鬱掌鬯治禮等下士唐六典太常卿後周為宗伯少卿為小宗伯謹案後周仿古制分建六官自唐六典及通典冊府元龜諸書皆以大小宗伯為即太常卿及少卿之職然考周書長孫紹逺傳紹逺初為太常六官建拜大司樂又斛斯徵傳徴累遷太常卿六官建拜司樂中大夫宣帝嗣位始遷大宗伯疑當時實以大司樂當太常卿葢用盧植禮注之説也隋隋書百官志隋太常寺置卿少卿各一人丞二人主簿二人録事二人又有博士四人奉禮郎十六人太祝署令一人丞一人太祝二人焬帝即位罷太祝署而留太祝員八人屬寺後又增為十人奉禮减置六人案奉禮郎隋時實稱治禮郎唐人修隋書因避髙宗名改作奉禮謹附識章俊卿山堂考索太常少卿隋焬帝加置二人唐六典隋太常寺有謁者三十人贊引六十人祝史十六人唐舊唐書職官志武徳七年定令以太常為九寺貞觀二十三年七月改治禮郎為奉禮郎龍朔二年改太常為奉常卿為正卿咸享元年詔依舊光宅元年改太常為司禮神龍元年䑓閣官名並依永淳以前故事增置太常少卿一員新唐書百官志太常寺卿一人正三品少卿二人正四品上掌禮樂郊廟社稷之事凡大禮則贊引有司攝事則為亞獻三公行園陵則為副大祭祀省牲器則謁者為之導小祀及公卿嘉禮命謁者贊相凡藏大享之器服有四院一曰天府院藏瑞應及伐國所獲之寶禘祫則陳於廟廷二曰御衣院藏天子祭服三曰樂縣院藏六樂之器四曰神厨院藏御廩及諸器官奴婢丞二人從五品下掌判寺事主簿二人從七品上博士四人從七品上掌辨五禮按王公三品以上功過善惡為之謚大禮則贊卿導引太祝六人正九品上掌出内神主祭祀則跪讀祝文奉禮郎二人從九品上掌君臣版位以奉朝㑹祭祀之禮凡樽彛勺羃篚坫簠簋登鉶籩豆皆辨其位凡祭祀朝會在位拜跪之節贊導之録事二人從九品上冊府元龜唐太常又有禮直五人乾元初省貞元七年又置禮儀直兩員九年以太常寺禮院置修撰檢討官各一員禮生員三十五人長慶二年又置守闕人唐會要大中九年八月博士李慤引故事以禮院雖係太常博士自專無闗白者太常三卿始莅事博士無叅集之禮封演聞見記太常博士掌謚藏事三品以上薨者故吏録行狀申尚書省考功校勘下太常博士擬議訖申省省司議定然後聞奏唐六典太常謁者十人贊引二十人祝史六人謹案舊唐職官志第一卷總序官制稱神龍元年增太常少卿一員而第二卷太常寺下又稱貞觀加置一員前後自相矛盾以唐六典通典考之則稱貞觀者誤也又唐之禮制皆掌於太常博士故禮院皆以博士自専不必闗白於卿貳然觀陸亘傳稱亘為太常博士寺有禮生孟真乆於其事凡吉凶大儀官不能達率訪焉真亦因是姑息自恣元和七年冊皇太子將撰儀注真亦欲叅預亘笞逐之由是禮儀不專於胥吏亦可知唐自中葉以降朝廷微弱不暇修明典禮太常所掌多屬具文故胥吏得以干預其事博士特備官而已五季冊府元龜後唐同光中諸寺監各只置大卿監其餘官屬並權停惟太常寺及大理寺事闗禮法之重除太常博士更置丞一員五代史馬縞傳縞事梁為太常少卿以知禮見稱於世唐莊宗時累遷刑部侍郎權判太常寺謹案五季諸卿監俱不偹官惟太常寺尚沿唐制未有改革然考之五代史盧文紀劉岳崔居儉崔棁諸傳皆嘗為太常卿而少卿一官自馬縞以外罕所記載疑同光以後亦從併省矣宋江少虞宋事實類苑太常寺宋初以來皆禁林之長主判而禮院自有判院同判院大中祥符中符瑞繁縟别建禮儀院以輔臣主判而兩制為知院天禧末罷知院天聖中省禮儀院而寺與院事舊不相兼康定元年置判寺同判寺並兼禮院事近有置六七人者按唐太常卿一員少卿二員博士四員祥符中博士二員後加至四員今若置判寺一員同判寺二員合唐之卿數矣天聖元年改同判院為同知院即博士也宋史職官志太常寺卿少卿丞各一人博士四人主簿奉禮郎太祝各一人卿掌禮樂郊廟社稷壇壝寢陵之事少卿為之貳丞叅領之禮之名有五皆掌其制度儀式祭祀有大祠有小祠其犧牲幣玉酒醴薦獻器服各辨其等凡親祠掌贊相禮儀升降之節凡祠事差官卜日齋戒皆檢舉以聞若禮樂有所損益及祀典神祗爵號與封爵繼嗣之事當考定者擬上於禮部宋初舊置判寺别置太常禮院元豐正名始專其職分案五吏額贊引使二人正禮直官二人副禮直官二人正名贊者七人守闕贊者七人私名贊者七人胥吏一人胥佐四人貼司一人書表司一人祠祭局供官十二人祭器司供官十人本寺太樂祭器庫專知官一人庫子一人圓壇太樂禮器庫專知官一人庫子一人博士掌講定五禮儀式有改革則據經審議凡於法應謚者考其行狀撰定諡文有祠事則監視儀物掌凡贊導之事主簿掌稽考簿書奉禮郎掌奉掌帛大禮則設親祠版位太祝掌讀冊辭提㸃管幹郊廟祭器所南郊太廟祭器庫提㸃朝服法物庫所朝服法物庫南郊什物庫太廟什物庫掌藏其器服以待祭祀朝會之用凡冠服視其等而頒於執事之臣宋敏求春明退朝録舊傳太常卿不是卿秘書監不是監以其品列清重不與諸卿監侔耳太常卿在六尚書下其資望與吏部尚書同每入朝隨尚書立班與尚書丞郎同幕次故太常卿號為尚書裏行者葢謂此也少卿即寄郎中幕次博士則寄員外郎幕次卿與少卿毎入幕次皆横行獨據一榻向門而坐他卿不得並也山堂考索元祐詔太常寺置長貳餘寺監並長貳互置南渡并省寺監獨存太常又命太常兼宗正隆興元年詔光禄歸并太常寺太常丞建炎三年省紹興三年復置博士紹興止一員以諫議大夫曾統言添置一員主簿皇祐中宋祁乞增置一員後更不置元豐正名初除王子琦建炎三年省紹興十年復置富大用事文類聚元祐初罷太祝太常少卿鮮于侁言神考釐定官制太常設奉禮太祝難廢咸乞復置仍請自朝廷選有學行者授之職詔從之謹案宋自元豐以前太常不置卿貳有事則以他官權攝沈括筆談載有陳彭年攝太常卿誤行黄道之事考之於史彭年本同知太常禮院而猶必攝此職者葢奉引乃太常卿之職故臨時又須暫置也迨神宗正名太常卿貳已各有定額即南渡省併寺監太常得獨存不廢然觀樓鑰攻媿集有重修太常寺記稱嘉定中卿少久闕官舍墮圯則是光寧以後太常仍僅存空名未嘗偹官矣又陸游老學庵筆記有游在孝宗初以禮部郎讀祝事是太祝亦不司祝讚葢當時太祝奉禮皆門䕃之官宜其不嫻儀制耳遼遼史百官志南面官寺官職名有卿少卿耶律儼子處貞為太常少卿丞簿太常寺有博士贊引太祝奉禮郎遼朝雜禮有法物庫所法物庫使法物庫副使金金史百官志太常寺皇統三年正月始置卿一員從三品少卿一員正五品丞一員正六品掌禮樂郊廟社稷祠祀之事博士二員正七品掌檢討典禮檢閲官一員從九品掌同博士泰和元年置四年罷檢討二員從九品明昌元年置以品官子孫及終場舉人同國史院漢人書冩例試補太祝從八品掌奉祀神主奉禮郎從八品掌設版位執儀行事元元史百官志太常禮儀院秩正二品掌大禮樂祭享祖廟社稷封贈諡號等事中統元年中都立太常寺設寺丞一員至元二年翰林兼攝太常寺九年立太常寺設卿一員正三品少卿以下五員品秩有差十三年省併衙門以侍儀司併入太常寺十四年增博士一員十六年又增法物庫子掌公服法服之藏二十年陞正三品别置侍儀司至大元年改陞院設官十二員正二品二年復為太常寺正三品延祐元年復改陞院正二品以大司徒領之七年降從二品天厯六年復陞正二品定置院使二員正二品同知二員正三品屬官博士二員正七品奉禮郎二員太祝十員從八品令史四人通事知印譯史各二人典吏三人謹案唐宋有太常寺别置太常禮院元則併為一署與厯代不同至議諡定禮之事自魏晉而後皆以太常博士掌之迄元猶未改斯制明代以諡典移屬内閣其五禮法式則歸之禮部自是博士之職始與太祝奉禮無異矣明明史職官志太常寺卿一人正三品少卿二人正四品寺丞二人正六品其屬典簿㕔典簿二人正七品贊禮郎九人正九品嘉靖中增至三十三人後革二人太常掌祭祀禮樂之事總其官屬籍其政令以聼於禮部凡天神地祗人鬼嵗祭有常先冬十二月朔奏進明年祭日天子御奉天殿受之乃頒於諸司天子親祭則贊相禮儀大臣攝事亦如之初呉元年置太常司設卿正三品少卿正四品丞正五品典簿博士正七品贊禮郎從八品洪武三十年改司為寺官制仍舊二十五年已定司丞正六品建文中增設贊禮郎二人太祝一人成祖初悉復洪武間制于慎行榖城山房集國家法六典建官既以禮樂神人之政總之春曹又設太常卿佐使率其屬以奉郊廟羣神之祀而掌其器幣壇場儀文樂舞之數以告時於上而請行之孫承澤春明夢餘録太常贊禮郎宋重其官以宰相任子為之明初亦以處文學之士乙科初選毎得之後乃以黄冠充焉失矣謹案國之大事在祀故唐虞三代特設宗官以奉天地宗廟百神之祀其玉帛牲牢尊爼樂舞車旗之屬亦各以象類典式明偹雖一名一物莫不有精意存乎其間葢藉以達其祗事之忱初非過為繁縟也秦漢以降制度廢缺雜以巫祝不合禮意其後累朝相繼講貫太常職守始漸能復古而當時人主或狃於宴安自便之私或惑於瀆亂不經之説大抵非惰則䙝唐宋二代考訂最稱明偹而又徒事彌文不知肅清將事以交神明之義即如郊祀一節唐世每竭府庫以犒賞諸軍而陪祀臣僚皆得以推恩封廕又御樓肆赦廣釋繫囚凡車駕出南門灌其樞至用脂百斛以嵗一舉行之常典動加粉餙侈張遂致所費不貲輙行廢祀唐書崔寧傳載文宗語宰相曰郊廟之禮朕當親之但千乘萬騎國用不給故使有司侍祠唐自肅代以後後親郊罕紀職此之由宋代沿唐故習變本加厲南郊執杖兵士至用一萬七千四百餘人青城齋宫廣為園圃植采木刻鳥獸綿絡其間凡一千七百餘事齋宫幄幔所費縑帛三十餘萬工又倍之玉海載景徳郊費六百萬皇祐至一千二百萬務為紛華縻費無算南渡偏隅蕞爾而周密宫禁典儀所載大祀之夕籸盆蕡燭自太廟置至郊壇泰禋門輝映如畫貴家巨室列幕櫛比珠翠錦繡絢爛於二十里間士女遊遨通宵不絶非特耗蠧物力而侮慢尤甚終以財用不足憚行此禮雖有三年親郊之說曠隔動至數載神不願享國祚用傾良由驕汰怠荒無以感格之所致也元明雖稍革此弊然元自世祖至文宗凡七世始克舉南郊親祀之禮明至神宗而郊廟之禮數十年不一躬親熹宗至以魏忠賢姪良卿代行郊祀嚴㳟寅畏之心蕩然無存矣國家惇崇祀典禮樂明備我皇上敬天尊祖肅奉眀禋禮度所昭質文咸備郊廟大典躬行祼獻精心昭事備極䖍㳟凡駿奔執事之臣莫不仰瞻睟容益深謹凛記曰惟仁人為能享帝惟孝子為能享親仰見大聖人對越之誠感通於穆固非三代以來具文從事者所克髣髴於萬一爾欽定厯代職官表卷二十七
