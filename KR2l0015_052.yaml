body:
  text: 步軍統領表步軍統領國朝官制提督九門巡捕五營步軍統領滿洲一人正二品近制以親信大臣兼任之掌京城內外門禁鎖鑰統帥八旗步軍五營將備以徼巡京師詰禁姦宄平易道塗肅清輦轂初制九門步軍巡捕三營皆領於兵部職方司以漢人主事一員專司政令康熙十三年始改設提督九門步軍統領一員特簡八旗大臣綜理其事三十年以巡捕三營併𨽻於步軍統領乾隆四十六年步軍統領和珅會議奏定以所轄三營地方遼濶增為巡捕五營舊設有協理步軍統領衙門刑名事務部臣一人乾隆四十三年省如步軍統領有以都統副都統任者仍用部臣一人協理左右翼步軍翼尉每翼各一人正三品八旗步軍協尉每旗各三人正四品步軍副尉每旗各三人正五品捕盜步軍校每旗滿洲三人蒙古漢軍各一人步軍校每旗滿洲二十有一人蒙古漢軍各八人正五品委署步軍校每旗滿洲五人蒙古漢軍各二人翼尉協尉副尉掌董率守衛巡警掃除捕盜步軍校掌緝捕盜賊稽察姦宄步軍校掌分汛警夜清道詰姦翼尉本名總尉康熙十三年置協尉本名副尉順治五年置副尉本名恭衛雍正四年置乾隆十九年俱改今名步軍校亦順治中置捕盜步軍校委署步軍校俱康熙三十四年置所屬凡領催二千二十八人步軍一萬八千七百二十六人捕盜步軍三百二十人乾隆四十六年增步軍二千二十六人步軍統領衙門員外郎滿洲二人主事滿洲二人司務滿洲一人筆帖式滿洲十有二人員外郎主事掌句檢旗營簿書司務掌稽察簿籍兼理俸餉筆帖式掌文移翻譯員外郎初置一人康熙六十一年增一人司務雍正十三年增置筆帖式初置四人康熙三十年增四人雍正十三年又增四人城門領滿洲十八人漢軍七人從四品城門吏滿洲十八人漢軍七人正七品門千總漢軍三十二人正六品掌內城九門外城七門晨昏啓閉之節以嚴出入稽詐偽城門領初名城門尉城門吏初名城門校乾隆十九年俱改今名其員額內城每門各二人外城每門各一人門千總初為指揮千户順治四年改置內外城每門各二人所屬凡門甲三百二十人門軍六百四十人又炮手每門各二人信炮總管滿洲一人正四品司信炮官漢軍旗各一人正五品掌守白塔信炮初順治十年以兵部尚書噶洪逹奏始定置信炮五于白塔山及內九門各置信炮五設信炮官漢軍左右翼各二人以司其事雍正二年改定員額如今制乾隆八年定歸于步軍統領管轄又紫禁城內西筒子河舊置步軍校二人步軍四十人以備緊急差傳乾隆四十八年增置協尉一員步軍六十名移駐造辦處外圍地方焉巡捕中營副將一人從二品遊擊一人從三品後同都司一人正四品後同守備四人正五品後同千總十人正六品後同把總二十人正七品後同巡捕南營參將一人正三品後同逰擊一人都司一人守備五人千總十二人把總二十四人巡捕北營參將一人逰擊一人都司一人守備三人千總八人把總十六人巡捕左營參將一人遊擊一人都司一人守備三人千總八人把總十六人巡捕右營參將一人逰擊一人都司一人守備三人千總八人把總十六人掌分汛防守譏察巡邏緝捕姦匪初制巡捕分南中北三營轄十九汛置官七十員馬步兵五千一百名乾隆四十六年增為中南北左右五營分設二十三汛所置各汛名目中營汛五曰汛圓明園暢春園汛汛靜宜園汛樹村樂善園汛南營汛六曰東河沿汛東珠市口汛花兒市汛西河沿汛西珠市口汛菜市口汛北營汛四曰德勝汛安定汛東直汛朝陽汛左營汛四曰河陽汛東便汛廣渠汛左安汛右營汛四曰阜城汛西便汛廣寧汛永寧汛共置官一百七十一員增兵四千九百名合為一萬分馬戰守糧額仍撥兵二千依健鋭營制以時操演訓練武備各置有外委千總把總以司協防差操之事並募民充畨捕人役以伺察旗民牙錯星羅法制益加詳密焉厯代建置三代周禮地官司門下大夫二人上士四人中士八人下士十有六人府二人史四人胥四人徒四十人每門下士二人府一人史二人徒四人掌授管鍵以啓閉國門幾出入不物者鄭康成注司門若今城門校尉主王城十二門賈公彥疏司門總監十二門每門下士二人據在門啓閉者謹案周司門之職每門下士二人而主之以下大夫者蓋以王城管鑰之任非位尊權重則不能當防間禁遏之責故特重其官秩即如今提督九門皆以大臣兼領也周禮秋官司𨽻中士二人下士十有二人府五人史十人胥三十人徒二百人掌五𨽻之法帥其徒而搏盜賊凡囚執人之事鄭康成注𨽻給榮辱之役者漢始置司𨽻亦使將徒治道溝渠之役後稍尊之使主官府及近郡禁殺戮下士二人史一人徒十有二人掌司斬殺戮者凡傷人見血而不以告者攘獄者遏訟者以告而誅之鄭康成注司猶察也察此四者告于司寇罪之也禁暴氏下士六人史三人胥六人徒六十人掌禁庶民之亂暴力正者嬌誣犯禁者作言語而不信者以告而誅之凡國聚衆庶則戮其犯禁者以徇野廬氏下士六人胥十有二人徒百有二十人掌比國郊及野之道路宿息井樹若有賓客則令塗地之人聚柝之有相翔者誅之凡道路之舟車轚互者敘而行之禁野之橫行徑踰者凡國之大事比修除道路者掌凡道禁司寤氏下士二人徒八人掌夜時以星分夜以詔夜士夜禁禦晨行者禁宵行者夜遊者鄭康成注寤覺也主夜覺者夜時謂夜早晚若今甲乙至戍夜士主行夜行徼候者如今都候之屬修閭氏下士二人史一人徒十有二人掌比國中宿互柝者與其國粥而比其追胥者而賞罰之禁徑踰者與以兵革趨行者與馳騁于國中者邦有故則令守其閭互唯執節者不幾謹案周官司𨽻為漢司𨽻校尉所自出即今步軍統領之權輿而秋官所屬自禁殺戮至修閭氏五官皆主幾防盜賊姦宄實亦今步軍統領衙門所有事蓋禁殺戮禁暴氏主禁庶民之斬殺亂暴者以告而誅之正如今步軍統領衙門緝獲違禁犯法之民笞杖者審斷發落徒罪以上送刑部審擬也野廬氏主修除道路正如今乘輿經由內外城統領率所部官兵先時除道設幛衢巷以蹕行人也司寤氏主夜禁修閭氏比國中宿互柝者惟執節者不幾正如今京城內傳更閉柵王公官民皆禁行走惟奉旨差遣及各部院傳事均詢明聽出也謹並繫於表以著法禁所昭實有與成周之制相為表裏者爾春秋左氏傳欒盈過於周辭於行人曰將歸死於尉氏杜預注尉氏討姦之官孔頴逹疏尉氏主刑人故為討姦之官謹案周禮無尉氏之官疑東遷後始置漢書地理志陳留郡有尉氏縣應劭曰古獄官曰尉氏鄭之别獄也是列國後亦仿置此官秦漢中尉之名其源蓋本於此當亦如今之步軍統領矣秦唐六典中尉秦官掌徼巡京師常璩華陽國志中尉田真黃秦中尉漢杜佑通典北軍中尉主之掌京城門內之兵漢書百官公卿表中尉掌徼循京師如淳注所謂遊徼徼循禁備盜賊也顔師古注徼謂遮繞也有兩丞候司馬千人顔師古注候及司馬及千人皆官名也武帝太初元年更名執金吾屬官有中壘寺互武庫都船四令丞中壘兩尉及左右京輔都尉尉丞兵卒皆屬焉王應麟王海應劭曰吾禦也掌執金革禦非常師古曰金吾鳥名主辟不祥天子出行職主先導以禦非常故執此鳥之象因以名官崔豹古今注金吾棒也以銅為之黃金塗兩末馬縞中華古今注棒者崔正熊注車輻也漢朝執金吾亦棒也以銅為之黃金塗兩足以謂之金吾御史大夫司𨽻校尉亦得執焉錢文子補漢兵志三輔之兵中尉主之有大事發兵屯衛事已輒罷其征伐四夷不輕用也漢書百官公卿表中尉丞楊僕三國魏志王朗列傳西京執金吾從騎六百走卒倍焉漢書百官公卿表中壘校尉掌北軍壘門內漢書季布列傳季心為中司馬中尉郅都不敢加如淳注中尉之司馬謹案荀悅漢紀季布弟心立然諾作氣關中方千里士爭為之死心為中尉司馬郅都為中尉未敢加也如淳漢書季布傳注以中司馬為中尉之司馬與漢紀合漢書平帝本紀元始二年九月遣執金吾候陳茂假以鉦鼓募勇敢吏士史記灌夫列傳夫以千人與父俱裴駰集解官主千人如候司馬馬端臨文獻通考北軍徼巡京師屬中尉别有壘垣軍門在京城按胡建傳云監軍御史穿北軍壘垣為賈區軍正丞胡建斬之而中壘校尉實掌北軍壘門內則是北軍自有壘垣軍門漢書張蒼列傳蒼任人為中候王應麟曰北軍中候也漢書如淳注漢儀注有寺互都船獄令漢書顔師古注北軍尉一人主上書者獄謹案漢以執金吾掌北軍其職在徼巡京師而尹賞列傳稱賞遷執金吾督大姦猾則又主于緝匪禁邪實與今步軍統領之職最為相合至北軍别有都尉校尉中候當如今之巡捕五營將備其丞候司馬千人則如今之協尉副尉等官而寺互都船令北軍尉等主治刑獄則如今之員外郎等官也漢書百官公卿表司𨽻校尉武帝征和四年初置持節從中都官徒千二百人捕巫蠱督大姦猾後罷其兵察三輔三河宏農元帝初元四年去節成帝元延四年省綏和二年哀帝復置但為司𨽻冠進賢冠屬大司空比司直漢紀元帝紀諸葛豐為司𨽻劾舉無回避侍中許章不奉法度豐特劾章顯奏其事適逢章私出豐駐車舉節詔章下獄收章窘迫馳車去豐追之章因入宫自歸于上豐亦上奏因收奪豐節司𨽻去節自豐始也哀帝紀諫議大夫鮑宣拜司𨽻校尉丞相光行園陵行馳道中宣出逢之使吏拘止丞相吏沒入其車馬玉海漢儀曰司𨽻校尉職在典京師外部諸郡無所不糾詣臺廷議處九卿上朝賀處公卿下陪卿上謹案漢之司𨽻校尉察三輔三河宏農乃兼有諸州部刺史之任故地理志以京兆等郡為司𨽻所部亦頗近於守土之官然其職得督察公卿委寄甚重故漢書蓋寬饒傳寬饒為司𨽻校尉宣帝豫書曰命君以司察之位鄭昌上書頌寬饒亦云職在司察諸葛豐傳又稱司𨽻刺舉不法善善惡惡則所司全在詰禁姦非正如今之步軍統領也漢書百官公卿表城門校尉掌京師城門屯兵有司馬十二城門候謹案三輔黃圖都城十二門長安城東出南頭第一門曰霸城門東出第二門曰清明門東出北頭第一門曰宣平門南出東頭第一門曰覆盎門南出第二門曰安門南出第三門曰西安門西出南頭第一門曰章城門西出第二門曰直城門西出北頭第一門曰雍門北出東頭第一門曰洛城門北第二門曰厨城門北出西頭第一門曰橫門城門皆有候門候主候時啓閉此條可與百官公卿表互證玉海環濟要略城門校尉高帝置從緹騎百二十人武帝始增屯兵漢書蔡義列傳遷補覆盎城門候顔師古注候主候時而開閉也漢書功臣表芒候耐跖以門尉起碭謹案漢代城門校尉其任至巨如王談王商王立等皆以特進相代領城門兵置幕府得舉吏如將軍而孔光為太師亦兼領城門兵谷永與王談書所謂至戚賢舅執管籥於外蓋因門禁之重故必擇大臣以兼領其事今步軍統領之提督九門正其任也後漢書百官志執金吾一人中二千石掌宫外戒司非常水火之事月三繞行宫外及主兵器丞一人比千石緹騎二百人無秩比吏食奉中興省中壘寺互都船令丞尉及左右京輔都尉北軍中候一人六百石謹案後漢執金吾將兵之事屢見於史袁宏後漢紀所載如光武建武二年執金吾賈復將兵擊郾和帝永元九年執金吾劉尚將兵擊隴西羌順帝永建六年執金吾張喬屯兵三輔蓋執金吾本北軍中尉掌京城門內之兵故常主征伐之事也又和帝永元四年上幸北宫詔公卿百官使執金吾衛南北宫詔收竇憲大將軍印綬則後漢志所云掌宫外戒司非常之事是也章懷太子李賢後漢書注胡廣曰衛尉巡行宫中則金吾徼於外相為表裏以擒姦討猾漢官曰執金吾緹騎五百二十人輿服導從光滿道路羣僚之中斯最壯矣世袓歎曰仕宦當作執金吾東觀漢記馮魴為執金吾將緹騎宿元武門復道上領南宫吏士洪適𨽻釋執金吾丞武榮碑舉孝廉缺二字郎中遷執吾丞山陽太守祝睦碑辟司空府北軍中候北軍中候郭仲竒碑復辟司徒拜軍中候釋云碑書其官無北字郭究碑但稱為軍中若與額殊按祝睦嘗為北軍中候而其後碑書云北軍軍中候則知此亦省文耳後漢書百官志司𨽻校尉一人比二千石持節掌察舉百官以下及京師近郡犯法者成帝省建武中復置并領一州都官從事主察舉百官犯法者功曹從事主州選署及衆事别駕從事校尉行部則奉引録衆事簿曺從事主財穀簿書主簿主録閣下事省文書律令師主平法律簿曹書佐主簿書袁宏後漢紀獻帝紀初平八年大中大夫孔融上書潁川南陽陳留上黨三河近郡不封爵諸侯臣愚以為千里國可略從周官六卿六遂之文分取北郡皆令屬司𨽻校尉帝從之謹案後漢紀光武紀更始以世祖為司𨽻校尉獻帝紀諸葛亮等上言稱左將軍領司𨽻校尉宜城亭侯備世祖先主皆漢中興之君其始均曾為司𨽻校尉可知此官之重又考獻帝紀董卓問司徒王允曰欲得任司𨽻校尉誰可者允曰惟有蓋京兆耳卓曰此人明智有餘然不可假以雄職也遂以勳為越騎校尉卓以司𨽻校尉為雄職誠如百官志所云掌察舉百官以下及京師近郡犯法者是也桓帝紀黃門令瑗將虎賁士千人與司𨽻共捕梁冀宗親洛陽獄河內張成知當大赦使女殺人李膺為司𨽻收成殺之此即所謂察舉京城犯法者也獻帝紀司𨽻校尉鍾繇持節鎮撫關中是其察舉近郡之事也又考後漢司𨽻校尉與河南尹並重凡舉大事必先慎擇此二官靈帝紀蕃武得劉瑜書于是以朱富為司𨽻校尉劉祐為河南尹蓋何武將奏收曹節王甫等故先擢此二人以備京城內外之變故也其後尚方監渠穆既斬何進圭讓偽詔以故太尉樊陵為司𨽻校尉故司空許相為河南尹亦重此二雄職也後漢書世祖本紀司𨽻從事孟異成後漢書百官志城門校尉一人比二千石掌雒陽城門十二所司馬一人千石主城門兵每門候一人六百石雒陽城十二門其正南一門曰平城門北宫門屬衛尉其餘上西門雍門廣陽門津門小苑門開陽門旄門中東門上東門穀門夏門凡十二門李尤正陽城門銘平門督司午位處分外臨僚侍內達帝宫正陽南靣炎暑赫融謹案李尤集載十二城門銘曰正陽城門銘所謂午位處分者也曰中東門銘所謂月值當卯者也曰上西門銘所謂位月惟戌者也曰上東門銘所謂厥位在寅者也曰關陽城門銘所謂位月惟已者也曰津城門銘所謂位月在未者也曰旄城門一作耗誤銘所謂位月在辰者也曰廣陽門銘所謂厥月在申者也曰雍城門銘所謂位月在酉者也曰夏城門銘所謂位月在亥者也曰榖城門銘所謂位當于丑者也惟無小苑門銘或褎集者佚之據後漢百官志此十二門皆有門候尤正陽門銘云平門督司即謂門候主督司也十二門皆有督司獨于正陽門言之者午位正門于十二門為特重故也三輔黃圖長安城南出第三門曰西安門一曰便門即平門也古者平便皆同字取其道易直洛陽正陽之名平門或亦取其易直乎後漢書郅惲列傳惲為上東城門候張奮列傳奮子甫官至津城門候章懷太子注謝承書曰何湯為郎中守開陽門候𨽻釋孫叔敖碑隂伯尉有一子字世伯舉江夏孝廉城門候太尉陳球碑換東城門候釋云漢志洛陽城有中東門後碑亦作中東城門此碑云換東城門候殆省文也司空宗俱碑俱以察孝為城門候方以智通雅周禮司門干寶注每門下士二人如今門候公車誰長之類謹案東漢執金吾掌擒姦討猾及戒司非常水火之事與今步軍統領職掌正同若司𨽻校尉則専主糾察百官而後漢書鮑昱傳載昱為司𨽻校尉坐救火遲免官則其所掌亦有與執金吾無異者至城門校尉職司啓閉其任並重故曹褒馬防竇武朱雋趙典皆嘗為之今之步軍統領則以執金吾司𨽻校尉城門校尉而併為一職者也三國唐六典漢執金吾徼巡宫外魏武執政復為中尉通典魏司𨽻與二漢同漢置城門校尉魏因之王楙野客叢書魏晉以來御史中丞專督行馬內司𨽻專督行馬外崔豹古今注兩漢京兆河南尹及執金吾司𨽻校尉皆使人導引傳呼使行者止坐者起四人各持角弓違者則射之有乘高窺闕者亦射之魏普設角弩而不用也謹案裴松之三國志注載魏校事劉肇出過成臯縣縣令沭並欲收之肇以狀聞有詔肇為牧司爪牙吏云云校事乃司𨽻之屬而詔旨稱為爪牙吏則以其職司糾察故特假以事權蓋即如漢之都官從事也三國吳志吳主權列傳嘉禾三年執金吾許晏晉文獻通考中尉晉初罷太平御覽晉中興書陶回擢拜北軍中候𨽻續晉右軍將軍鄭烈碑遷北軍中候典司禁戎晉書職官志司𨽻校尉漢武置厯魏晉其官不替屬官有功曹都官從事諸曹從事部郡從事主簿録事門下書佐省事記室書佐諸曹書佐守從事武猛從事等員凡吏一百人卒三十二人及渡江乃罷謹案魏晉司𨽻校尉皆兼察列郡如部刺史之職然考太平御覽引臧榮緒晉書稱傅咸以議郎長兼司𨽻校尉時豪右放恣郡縣容縱盜寇於是奏免河南尹京都肅然貴戚憚之則其官亦主糾舉非違督緝姦盜實如今之步軍統領也傅咸明司𨽻職掌書按令御史中丞督司百僚皇太子以下其在行馬內有違法憲者彈糾之雖在行馬外而監司不糾亦得奏之如今之文行馬之內有違法憲謂禁防之事耳宫內禁防外司不得而行故専司中丞今道路橋梁不修鬭訟屠沽不絶如此之比中丞推責州坐即今所謂行馬內語施于禁防既云中丞督司百僚矣何復説行馬之內乎既云百僚而不得復説行馬之內者內外衆官謂之百僚則通內外矣司𨽻所以不復説行馬內外者禁防之事已於中丞説之故也中丞司𨽻俱糾皇太子以下則共對司內外矣不為中丞專司內百僚司𨽻專司外百僚自有中丞司𨽻以來更互奏內外衆官惟所得糾無內外之限也而結一旦橫挫臣前所以不羅縷者冀因結奏得從私願也今既所願不從而勑云但為過耳非所不及也以此見原臣忝司直之任宜當正已率人若有其過不敢受原是以申陳其愚司𨽻與中丞俱共糾皇太子以下則從皇太子以下無所不糾也得糾皇太子而不得糾尚書臣之暗塞既所未譬皇太子為在行馬之內也皇太子在行馬之內而得糾之尚書在行馬之內而不以糾無有此理此理灼然而結以此挫臣臣可無恨耳其於觀聽無乃有怪耶臣識石公前在殿上脫衣為司𨽻荀愷所奏先帝不以為非于時莫謂侵官今臣裁糾尚書而當有罪乎謹案後漢紀光武紀是時有上書言宜令司𨽻校尉督察三公司徒掾陳元上疏謂不宜有司察公輔之明上善其言據傅咸此書則漢晉之制頗異春秋左氏傳楚人以為大閽謂之大伯杜預注若今城門校尉官通典漢魏置城門校尉晉制銀章青綬綘朝服武冠佩水蒼玉謹案通典謂晉亦有城門校尉考杜氏左傳注謂若今城門校尉則晉有此職尤屬確鑿而晉書職官志獨闕而不載殆南渡以後又經省併之故歟宋齊梁陳文獻通考宋齊俱以衛尉掌宫城屯兵及管鑰之事梁陳二代無城門之職隋書百官志梁又有宣陽等諸門候為三品藴位謹案江左諸朝皆不置執金吾及城門校尉其宫門及城門管鑰皆以衛尉一官掌之則兼有今護軍步軍兩統領之職也而東晉以後揚州刺史即漢魏司𨽻校尉之任故當時多以親藩任之然其體制已全同諸州方牧固無復督討豪猾之事矣北魏鄭樵通志職官略後魏置城門校尉魏書職官志城門校尉第四品魏書酷吏列傳時京師盜魁聚為劫害以赦提為逐賊軍將又為遊徼軍將前後擒獲略盡魏書甄琛列傳琛以羽林為遊軍於諸坊司察盜賊於是京邑清靜至今踵焉謹案北魏京城巡徼之法即此二條可以考見大槩蓋逐賊軍將遊徼軍將如今之巡捕五營而羽林遊軍則如今之步軍營也北齊司馬光資治通鑑齊以東平王儼為京畿大都督凡京畿步騎莫不畢從儼被殺罷京畿府入領軍胡三省注京畿大都督總京畿兵因儼以京畿兵弄兵故罷之北齊書顯祖本紀授京畿大都督世祖本紀遷太傅領京畿大都督北齊書慕容儼列傳授儼京畿南靣都督北齊書莫多婁貸文列傳中興初除伏波將軍領虞候大都督位至領軍將軍恆檢校虞候事督兵馬糾察盜賊謹案北齊以京畿大都督領京城諸兵當時多由懿親授任正如今步軍統領之職又有京畿南靣都督分地管轄當如今翼尉之職而虞候大都督掌率兵糾察盜賊則當如今巡捕五營之職又考北齊書崔昻傳稱議曺律令京畿密獄多委之元韶傳稱幽於京畿地牢是京畿府又主刑獄其於今步軍統領衙門職掌尤為相合也隋書百官志北齊城門寺置校尉二人掌宫殿城門管籥謹案北齊城門寺兼掌宫殿城門管籥則亦合今護軍步軍兩統領之職而為一也後周通典後周官品正四命地官司門下大夫正三命地官小司門上士夏官武環率武候率上士正二命地官宫門城門中士正一命地官宫門城門下士文獻通考後周司門上士下士掌皇城十二門之禁令唐六典後周置武環率武候率下大夫各二人後周書齊王憲列傳我虞候大都督也謹案周有門正上士掌門關啓閉為禁衛之職已别著於護軍統領表內至司門大夫以下各官則即漢城門校尉之任實如今之提督九門也其武環率武候率為執金吾遺職故亦並著於表焉隋隋書百官志隋城門局校尉二人直長四人左右武候大將軍一人將軍二人掌晝夜巡察執捕姦匪煬帝改左右候衛所領名佽飛通典隋門下省統城門局校尉二人大業三年又𨽻殿中省十二年又減一人後又改校尉為城門郎置四人又𨽻門下省謹案隋城門局兼掌宫門京城門管鑰而左右武候亦主烽候道路水草所置各有司存今故互見於前鋒護軍統領表以著其實云唐唐六典左右金吾衛大將軍各一人正三品將軍各二人從三品掌宫中及京城晝夜巡警之法以執禦非違舊唐書職官志左右金吾衛大將軍各一員將軍各二員掌京城晝夜巡警之法凡翊府及同軌等五十府皆屬之其屬長史録事參軍倉兵騎胄四曺參軍司階中候司戈執戟翊府中郎將左右郎將兵曺校尉旅帥隊正副隊正新唐書百官志左右金吾衛上將軍各一人大將軍各一人將軍各二人掌京城巡警凡大功役則與御史循行兵曺參軍事掌翊府外府武官騎曹𠫭軍事掌外府雜畜簿帳胄曺𠫭軍事掌兵械公廨長史各一人録事參軍事各一人倉曺𠫭軍事各二人兵曹𠫭軍事各二人騎曺𠫭軍事各二人胄曺𠫭軍事各一人左右司階各二人左右中候各三人左右司戈各五人左右執戟各五人左右街使各一人判官各二人左右翊中郎將府中郎將掌領府屬督京城左右六街鋪巡警以果毅二人助巡探劉肅大唐新語金吾衛佐李元成趙璘因話録栁元公初拜京兆尹將赴府上有神䇿軍小將乘馬不避公于街中杖殺之憲宗詰公専殺狀曰卿何不奏公曰臣只合決不合奏上曰合是何人奏公曰在街中本街使金吾將軍奏若在坊內則左右巡使奏上乃止謹案街坊之别雍録謂其最當城中而南者為朱雀門街朱雀東十坊縱而數之皆有直街北自宫城之安上門而南極乎京城南靣之隂是為朱雀街東之第一街朱雀西十坊之西亦有直街自北徹南是為朱雀街西第二街自餘十坊可隨朱雀東西而命其方又曰坊皆南北相沓每坊之南皆有橫街橫街之北是為諸坊之南諸坊之南皆有門自東西以出橫街坊之若東若西即坊之左畔右畔也據此則坊在一方之內其東西南北皆有街限之蓋坊統于街也金吾將軍統察諸街巡使分察諸坊亦以秩之尊卑為職之大小也胡三省通鑑注金吾左右街使各一人掌分察六街徼巡凡城內坊角有武候鋪衛士彍騎分守大城門百人大鋪三十人小城門二十人小鋪五人日暮鼓八百聲而門閉乙夜街使以騎卒巡行呌呼武官暗探五更二點鼓自內發諸街鼓承振坊市門皆啓鼓三千撾辨色而止大唐新語舊制京城內金吾曉暝傳呼以戒行者馬周獻封章始置街鼓俗號鼕鼕鼓公私便焉宋敏求春明退朝録唐馬周始建議置鼕鼕鼓惟兩京有之是京都之制也二紀以來不聞街鼓之聲金吾之職廢矣孫承澤春明夢餘録畨役在唐稱為不良人有不良帥主之謹案今步軍統領在唐當為金吾上將軍之職而所屬左右翊中郎將左右郎將則如今之協尉副尉果毅則如今之步軍校左右街使則如今之巡捕營而所謂不良帥者則如今之畨役頭目也唐六典城門郎四人門僕八百人掌京城皇城宫殿諸門開闔之節奉其管鑰而出納之謹案唐城門郎兼司京城皇城管鑰併為一職今亦互見于護軍統領篇五季五代史晉本紀天福七年右金吾衛大將軍梁言使于契丹五代會要金吾衛後唐天成三年六月勑金吾每奏左右廂內外平安有類藩方宜改云軍國內外并平安五代史盧導列傳京城巡檢使安從進催百官班迎五代會要城門郎梁開平元年五月改城門郎為門局郎至後唐同光元年十一月却改為城門郎謹案五季金吾衛僅有虛名並無官守而京城巡檢使主率兵巡邏實即唐代金吾將軍之職也宋宋史職官志左右金吾街司左右金吾仗司掌清道徼巡玉海淳化五年八月判左右金吾街仗魏丕以新募千餘人引對崇政殿太宗親選得五百七十人其中取身品優者三人為等分四營營設五都都有員僚節級一如禁兵之制命田守信知右街事帝以京師浩穰街司循警用禁軍非舊制特命左右街各置千人優以廪給使傳呼備盜至是始分營部令魏丕更召募以充其數至道元年八月閻承翰等為金吾都監紹興二年三月二十八日詔街仗司以二百人為額通雅明之錦衣衛為宋金吾街仗淳化置金吾四營魏丕新募太子親選如禁兵之制者是也李燾續資治通鑑長編仁宗嘉祐七年皇城司邏卒吳清奏富人張文政殺人有司鞫問無狀司馬光皇城司巡察親視官表臣等伏聞皇城司親事官奏報有百姓殺人私用錢物休和事下開封府推鞫皆無事實欲乞元初巡察人照勘其皇城司庇護不肯交付臣等切詳祖宗開基之始人心未安恐有大姦隂謀無狀所以躬自選擇左右親信之人使之周流民間密行伺察當是之時萬一有挾私誣枉者則斧鉞隨之是以此屬皆知畏懼莫敢為非今海內承平已踰百年上下安固人無異望世變風移宜有釐革而因循舊貫更成大弊乃至帝室姻親諸司倉庫悉委此屬廉其過失廣作威福公受貨賂所愛則雖有大惡掩而不問所憎則舉動語言皆見掎托臣等常病國家擇天下賢才以為公卿百官而猶不可信顧任此厮役小人以為耳目豈足恃哉今乃妄執平民加之死罪使人幽縶囹圄橫罹楚毒幸而不自誣服僅能辨明若更不聽有司詰問元初巡察之人少加懲戒臣恐此屬無復忌憚愈加恣橫使京師吏民無所措其手足此豈合祖宗之意哉伏望朝廷指揮皇城司令送元初巡察人下開封府推問本情或别有仇嫌或察訪鹵莽各隨其狀依法施行仍自今後永為定制庶可以塞欺罔之源絶侵冤之門以全國家至公之道謹案宋會要皇城司在內最為煩劇掌宫城出入禁令權亞殿巖當如今護軍統領而所轄邏卒得司京城訪緝之政則又兼有步軍統領職事矣宋史職官志左右軍巡司判官各二人分掌京城爭鬭及推鞫之事左右廂公事幹當官四人掌推覆推問凡鬬訟事輕者聽論決元祐二年置左右二廂三年置軍巡院判官一員建炎三年令城外內分南北左右廂各置廂官以聽民之訟分使臣十員以緝捕在城盜賊分六都監界分差兵一百四十八鋪以巡防煙火謹案宋都城緝捕詰禁之事皆専屬之開封尹及臨安安撫使故於開封府置軍巡司判官蓋即今步軍統領衙門員外郎等官之職而臨安府所置左右廂緝捕各官則即如今巡捕五營之職也遼遼史百官志五京都虞候司職名都虞候上京都虞候司東京都虞候司南京都虞候司西京都虞候司中京都虞候司五京警巡院職名某京警巡使某京警巡副使上京警巡院東京警巡院中京警巡院南京警巡院西京警巡院東京軍巡院東京軍巡使中京巡邏使司中京巡邏使耶律昱開泰間為中京巡邏使警巡使巡邏使二職互見五城兵馬司篇金金史百官志武衛軍都指揮使司都指揮使從三品大定二十九年以武衛軍六十人兵馬一員副都二員其職低故設使品正四承安三年升副都指揮使二員從四品副都一員從四品初正五承安三年升判官一員承安三年設掌防衛都城警捕盜賊鈐轄司鈐轄十員正六品初設二員都鈐轄四員從七品興定三年權設巡把兩宅都將二十員從九品大定十六年立名掌管轄軍人防衛警捕之事承安元年設萬人內軍八千九百四十九人忠衛二百人隊正四百人京城開陽宣仁安利平化通逺宜照利川崇德迎秋廣澤順義迎朔順常廣智十四門尉從七品副尉正九品諸京警巡院使一員正六品掌平理獄訟警察别部總判院事副一員從七品掌警巡之事判官二員正九品掌檢稽失簽判院事警巡使互見五城兵馬司篇謹案自北宋以後都城巡徼不復設有専職至金始置武衛都指揮以掌其事蓋即唐代金吾之職而鈐轄司則如今之巡捕各營故亦𨽻屬於武衛司也元元史百官志大都留守司留守秩正二品掌守衛宫闕其屬大都城門尉秩正六品尉二員副尉一員掌門禁啓閉管鑰之事至元二十年置以四集賽解見領侍衛篇為之二十四年復以六衛親軍𠫭掌凡十有一門曰麗正曰文明曰順承曰平則曰和義曰肅清曰安貞曰健德曰光熙曰崇仁曰齊化每門設官如上虎賁親軍都指揮使司秩正三品管領上都路原籍軍人置都指揮使三員副都指揮使二員僉事二員經厯一員知事照磨兼承發各一員令史七人譯史通事知印各一人典吏二人鎮撫二員都目二員大都路兵馬都指揮使司凡二秩正四品掌京城盜賊姦偽鞫捕之事都指揮使二員副指揮使五員知事一員提控案牘一員吏十四人至元九年改千户所為兵馬司𨽻大都路而刑部尚書一員提調司事凡刑名則𨽻宗正且為宗正之屬二十九年置都指揮使等官其後因之一置司於北城一置於南城司獄司凡三秩正八品司獄一員獄丞一員獄典二人掌囚繫獄具之事謹案元史兵志仁宗延祐七年五月詔留守司及虎賁司官親率衆於夜巡邏是元代都城巡徼實屬留守虎賁二司之事蓋大都留守兼有今提督九門之職而虎賁司為上都路原籍軍人則如今之京營也其大都路兵馬司掌鞫捕姦盜亦與今巡捕營之職相合自明代沿其舊名改設文秩遂為五城司坊之稱而溯厥源流實當為金吾街使之比今仍繫之于此表又考元史載皇慶元年丞相奏每嵗幸上都於各宿衛中留衛士三百七十人以備巡邏今嵗多盜賊宜增百人制可仍命樞密與中書分領之據此則元代於各軍司常制之外又别有巡邏軍為隨時所調撥矣明孫承澤春明夢餘録明初置錦衣親軍指揮使司以鎮撫司理衛中刑名如列衛而兼簡軍匠所謂南鎮撫司也北鎮撫司本添設專理詔獄成化十四年始給印分司得直逹上下法司覆提領衛事者恆以都指揮都督或恩功或寄祿凡盜賊姦宄街塗溝渠密緝而時省之凡奉旨鞫獄録囚事與三司從事凡比試監焉明史刑法志東厰之設始於成祖錦衣衛之獄太祖嘗用之後已禁止其復用亦自永樂時厰與衛相倚故言者並稱厰衛初成祖起北平刺探宫中事多以建文帝左右為耳目故即位後專倚宦官立東厰於東安門北令嬖昵者提督之緝訪謀逆妖言大姦惡等與錦衣衛均權勢蓋遷都後事也然衛指揮紀綱等用事厰權不能如至憲宗别設西厰以汪直督之所領緹騎倍東厰勢逺出衛上以萬安言革罷正德元年命邱聚領東厰又設西厰以命谷大用皆劉瑾黨也兩厰爭用事遣邏卒刺事四方天下皆重足立而衛使石文義亦瑾私人厰衛之勢合矣瑾又改惜薪司外薪厰為辦事厰榮府舊倉地為內辦事厰自領之京師謂之內行厰雖東西厰皆在伺察中加酷烈焉瑾誅西厰內行厰俱革獨東厰如故張鋭領之與衛使錢寧並以緝事恣羅織厰衛之稱由此著世宗時厰權不及衛萬厯初馮保兼厰事與張居正興王大臣獄欲族高拱衛使朱希孝力持之拱得無罪衛猶不大附厰也及天啓時魏忠賢以秉筆領厰事用衛使田爾耕鎮撫許顯純之徒專以酷虐鉗中外而厰衛之毒極矣凡中官督東厰者曰督主東厰之屬無専官掌刑千户一理刑百户一亦謂之貼刑皆衛官其𨽻役悉取給于衛錦衣衛獄者世所稱詔獄也太祖悉焚衛刑具詔內外獄太小咸經法司成祖幸紀綱令治錦衣親兵復典詔獄遂用其黨緣借作姦數百千端綱誅其徒稍戢至正統時復張天順末禍益熾朝野相顧不自保鎮撫司職理獄訟初止一司洪武十五年添設北司専理詔獄然大獄經訊即送法司擬罪未嘗具獄詞成化元年始令覆奏用𠫭語法司益掣肘十四年增鑄北司印信一切刑獄毋關白本衛即衛所行下者亦徑自上請可否衛使毋得與聞故鎮撫職卑而其權日重然厰衛未有不相結者獄情輕重厰能得於內而外廷有扞格者衛則東西兩司房訪緝之北司拷問之煆錬周內始送法司即東厰所獲亦必移鎮撫再鞫而後刑部得擬其罪故厰勢強而衛附之厰勢稍弱則衛反氣凌其上及後中官愈重而衛使無不競趨厰門甘為役𨽻矣謹案都城為四方會極民物􅎋繁故董正之司自古特加慎重周官以門大夫譏察門禁以禁殺戮以下諸職防治竒邪法制最為周密漢時執金吾城門校尉分建兩官而又有司𨽻校尉以刺舉不法所率中都官徒金吾緹騎至千有餘人而都官從事亦得糾察京師及近郡威勢甚盛故後漢書魯恭傅稱司𨽻典司京師四方是則三國志程曉傳亦稱司𨽻校尉督察京輦蓋所以杜姦萌而肅治化誠不可不崇其任也自唐迄宋其職漸輕逮明復設錦衣衛寄以緝除姦宄之責其初制原未嘗倚以斷獄而永樂以後委畀益親於是錦衣堂上官與鎮撫司理刑官皆得獨専獄事憑勢作姦浸成弊藪其後又與東厰相為狼狽朋竊威福殘虐忠良逮其末造而飲章告密寃濫相仍慘酷殆無人理舉朝野性命一聽之武夫宦豎之手元氣澌滅害鍾家國蓋至明代為已極矣我朝置步軍統領之職掌管門禁提督京營特簡親信重臣以膺斯任綱維整飭法令謹嚴振鋤姦剪惡之風開通隱逹情之路百官以正萬民以察規條凛肅中外乂安誠千古所無之隆矩也欽定厯代職官表卷四十六
