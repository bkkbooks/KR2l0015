body:
  text: 兵部表兵部國朝官制兵部尚書滿洲漢人各一人掌中外武職銓選簡核軍實以贊邦政其屬有武選車駕職方武庫四清吏司國初兵部設滿洲承政二員蒙古承政一員漢人承政一員參政八員啓心郎一員崇德三年改設承政一員左參政一員右參政三員啓心郎三員順治元年改承政為尚書無定員五年定設滿洲漢人尚書各一人雍正元年以來以大學士及他部尚書兼理部務皆由特簡無常員左右侍郎滿洲漢人各一人掌釐治戎政以二尚書初制增減不一順治元年定設如今額武選清吏司郎中滿洲三人蒙古一人漢人一人員外郎滿洲四人漢人二人主事滿洲漢人各一人掌武職除選封廕及征伐訓誥頒其政令崇德三年設兵部理事官十員副理事官十六員順治元年改定滿洲郎中員外郎各八人蒙古郎中員外郎各四人漢軍郎中二人員外郎六人滿洲主事四人十二年增設滿洲郎中三人員外郎五人康熙三十八年省滿洲員外郎三人蒙古郎中員外郎及漢軍員外郎各四人五十七年復設蒙古郎中一人員外郎三人增設蒙古主事一人雍正五年省漢軍郎中員外郎員額漢人司官初設郎中員外郎各四人主事五人順治十一年裁車駕武庫二司漢人員外郎各一人雍正五年增設職方司漢人郎中一人武選司漢人員外郎一人車駕清吏司郎中滿洲三人漢人一人員外郎滿洲二人蒙古一人主事滿洲漢人各一人掌驛傳郵符及中外牧馬之令職方清吏司郎中滿洲四人漢人二人員外郎滿洲三人蒙古一人漢人一人主事滿洲蒙古各一人漢人二人掌天下輿圗以周知險要敘功核過以待賞罰黜陟武庫清吏司郎中滿洲二人漢人一人員外郎滿洲蒙古各一人主事滿洲漢人各一人掌兵籍戎器鄉會武科及編發戍軍之事堂主事滿洲四人漢軍一人掌文案者滿洲二人掌章奏者滿洲二人漢軍一人俱順治元年定額司務廳司務滿洲漢人各一人順治元年定額職事具吏部篇館所監督滿洲漢人各一人掌驛馬傳車之政令以待使命有急遞之用順治八年設滿洲監督一人乾隆十八年增設漢人監督一人俱於本部司員內遴選引見補充嵗周而代筆帖式滿洲六十有二人蒙古八人漢軍八人俱順治元年定分𨽻各司視事之繁簡以為額職事具吏部篇謹案兵部初設督捕侍郎滿洲漢人各一員以掌旗人逃亡之事其屬有左右理事官滿洲漢人各一員郎中滿洲漢人各一員員外郎滿洲十五員漢軍八員漢人一員主事滿洲三員漢軍一員漢人六員司務滿洲漢人各一員筆帖式滿洲三十四員漢軍十六員司獄漢人二員康熙三十八年俱省其職事併入刑部為督捕清吏司又初設有會同館大使一員亦康熙三十八年省又京城九門步軍及巡捕營初制以兵部職方司主事一人總司之後歸入步軍統領衙門謹識於此歷代建置三代孔頴達禮記疏鄭注大傳夏書所謂六卿有司馬謹案舜典命臯陶作士薛季宣謂禮大刑用甲兵故蠻夷盜賊之事亦領於士師朱子謂禮樂所以成教化而兵刑輔之唐虞之時禮樂之官析為二兵刑之官合為一詳略之意可見是虞廷本以士師兼掌兵事至夏建六卿而司馬始自為一職今故托始於此至賈公彥周禮正義序以堯時有六官而指羲叔為夏官司馬乃臆揣之詞殊不足信也尚書胤征胤侯命掌六師孔安國傳仲康命胤侯掌王六師為大司馬禮記曲禮天子之五官曰司馬鄭康成注此蓋殷時制也禮記王制司馬辨論官材有發則命大司徒教士以車甲孔頴達疏此論司馬之官用其人及發兵之事謹案夏殷司馬之官經傳未見明文孔鄭所云説者多疑其凖度周制約略言之然王制一篇本出二代之制而所列司馬職掌甚詳漢儒授受相承必有所本不可謂其無據也尚書周官司馬掌邦政統六師平邦國孔安國傳夏官卿主戎馬之事掌國征伐統正六軍平治王邦四方國之亂者周禮夏官政官之屬大司馬卿一人中大夫二人軍司馬下大夫四人輿司馬上士八人行司馬中士十有六人旅下士三十有二人府六人史十有六人胥三十有二人徒三百有二十人大司馬之職掌建邦國之九法以佐王平邦國以九伐之法正邦國乃以九畿之籍施邦國之政職凡令賦以地與民制之中春教振旅中夏教茇舍中秋教治兵中冬教大閲及師大合軍以行禁令以救無辜伐有罪若大師則掌其戒令及致建大常比軍衆誅後至者及戰巡陳視事而賞罰若師有功則左執律右秉鉞以先愷樂獻於社大役與慮事屬其植受其要以待考而賞誅小司馬之職掌其事如大司馬之法軍司馬闕輿司馬闕行司馬闕謹案周禮自軍司馬以下三官並闕其職掌無可徴據然考國語晉語云公知鐸遏冦之共敬而信強也使為輿尉知籍偃之惇帥舊職而共儉也使為輿司馬孔頴達云輿尉輿司馬皆上軍官輿衆也又僖公二十八年左傳云晉侯作三行以禦狄荀林父將中行屠擊將右行先蔑將左行杜預注云晉置上中下三軍復增三行以辟天子六軍之名又詩魏風云殊異乎公行鄭康成箋云主君兵車之行列據此則輿司馬乃領軍衆之官行司馬乃主行列之官至軍司馬雖他無可考疑亦當為佐太司馬而行軍法者故以軍為名左傳晉揚干亂行於曲梁魏絳戮其僕晉侯怒對曰使臣斯司馬蓋即其職唐六典誤以輿為車輿之輿而以輿司馬為後世駕部所自出非也尚書孔安國傳司馬第四畢公領之詩毛亨傳程伯休父命為大司馬謹案詩大明篇孔疏引太誓云司馬在前王肅曰司馬太公也考今太誓無此語當出張霸偽書然可見周初已有司馬之官故逸周書世俘解亦有司徒司馬初厥於郊號之文蓋本侯國三卿之一其後既建六卿而司馬乃列在第四也至尚書酒誥毛詩小雅所言祈父毛孔皆以為司馬職掌封圻之兵甲故以其職稱之左傳昭公十二年祈招之詩杜預注謂祈父周司馬世掌甲兵之職而招其名則周之司馬殆亦世嗣其職如蘇公之為司寇歟周禮夏官司甲下大夫二人中士八人府四人史八人胥八人徒八十人周禮原闕司甲職文鄭康成曰司甲兵戈盾官之長司兵中士四人府二人史四人胥二人徒二十人掌五兵五盾各辨其物與其等以待軍事及授兵從司馬之法以頒之及其受兵輸亦如之司戈盾下士二人府一人史二人徒四人掌戈盾之物而頒之司弓矢下大夫二人中士八人府四人史八人胥八人徒八十人掌六弓四弩八矢之法辨其名物而掌其守藏與其出入職方氏中大夫四人下大夫八人中士十有六人府四人史十有六人胥十有六人徒百有六十人鄭康成曰職方氏主四方官之長掌天下之圗以掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九榖六畜之數要周知其利害乃辨九州之國使同貫利唐六典兵部尚書周官夏官卿也侍郎夏官小司馬中大夫也大司馬屬官有軍司馬下大夫蓋郎中之任輿司馬上士蓋員外郎之任職方氏中大夫職方郎中之任也司甲下大夫庫部郎中之任也司兵中士庫部員外郎之任也秦杜佑通典秦兼天下太尉主五兵謹案五兵見於周禮司兵之職鄭司農謂戈殳戟酋矛夷矛也鄭康成謂此車之五兵若步卒之五兵則無夷矛而有弓矢然此特武事之一端在周官僅以中士掌之而秦乃主之太尉者疑當時方盡收天下兵銷以為鍾鐻因籍其數而屬諸太尉以供官用非是則皆在應銷之列故曰太尉主五兵猶李斯奏請焚書而曰非博士所職悉詣守尉雜燒之也魏世不察乃置五兵尚書遂沿以為掌武之通稱殆非其本意矣漢馬端臨文獻通考太尉漢元狩四年更名太司馬後漢建武二十七年復舊名為太尉公掌四方兵事功課太平御覽漢官序曰三公之職司馬主兵漢承秦曰太尉武帝改曰大司馬無印綬世祖改曰太尉後漢書百官志太尉公諸曹掾史屬東曹主軍吏法曹主郵驛科程事兵曹主兵事富大用事文類聚尚書漢置五曹未有主兵之任謹案三代以大司馬掌九伐之法故兵政悉屬焉考其職守如有征伐則鄉師致民於司馬是徵發由司馬也仲春振旅仲冬大閲是教練由司馬也又司馬掌祿士故司士之官屬焉是爵祿黜陟由司馬也其屬又有司右掌勇力之士以充王車右有虎賁氏旅賁氏掌衛守王是宿衛爪牙之士亦𨽻於司馬也當時六軍雖以命卿為將而皆不特置但選六官六鄉之吏德任者使兼其官凡號令賞罰其専職仍在於司馬實當後世大帥之任故胤侯為大司馬而行羲和之誅太公為大司馬而顓牧野之戰程伯休父為大司馬而有徐戎之征三代兵柄不分故其職隆重如此自周衰籍去列國兵爭始各置將軍之官以統甲兵而兵政遂别寄於領兵之人司馬之職由此遂廢逮秦漢設太尉以掌武事列於三公而尚書並無典兵之員即後漢志所謂兵曹者亦僅太尉掾屬之一職魏始於尚書置五兵曹厯代增損不一隋唐遂設兵部尚書以當周之司馬而夏官規制乃稍復其舊然唐宋以來內而軍衛樞管外而節將命帥實各分師旅大柄而兵部所掌自武職銓選以外不過名籍條例之類一切訓練調遣非所専司以視周官司馬名存而實逈不同矣核其所自蓋以三代之時邱甸出甲其兵即六鄉之民其領兵之官即六鄉之大夫入使治之出使長之上下相維臂指互使故有軍旅則能聽政令於司馬若後世専用募兵兵與民既判然為兩途而官之文武亦分為二於是建置節鎮區别營伍其勢不復相統一則其董率訓習指揮調發自不能不各責之於將帥兵部但考法式以受其成而已此亦古今事勢不同所謂因時而制宜者也今以沿革所在軍制攸關謹考論大略附之於此至太尉大司馬在秦漢為三公官非今兵部尚書所自出已别見內閣篇故不復著於表內云三國章俊卿山堂考索魏始置五兵尚書謂中兵外兵騎兵别兵都兵也晉書職官志魏尚書郎有駕部庫部中兵外兵别兵都兵青龍二年尚書陳矯奏置騎兵晉册府元龜晉置駕部尚書咸亨二年省四年又置駕部太康中改置五兵尚書又置駕部車部庫部左右中兵左右外兵别兵都兵騎兵曹郎及江左罷車部别兵都兵騎兵有駕部庫部中兵外兵曹郎杜佑通典魏置五兵尚書晉初無太康中乃有五兵尚書而又分中兵外兵各為左右按晉雖分中兵外兵為左右與舊五兵為七曹然尚書惟置五兵而已無七兵尚書之名至後魏始有七兵尚書耳今諸家著述或謂晉太康中置七兵尚書誤矣謹案漢代太尉有兵曹掾魏世因之大將軍相國亦有兵曹騎兵二曹掾晉之三公皆有戎曹車曹兵曹諸掾晉元帝為琅邪王時開鎮東丞相府掾屬有中兵外兵騎兵諸曹當時尚書郎俱已分曹定職而公府之掾居然襲其名目不以逼上為嫌僭妄殊甚謹附糾其失於此宋齊梁陳宋書百官志宋世祖大明二年省五兵尚書順帝升明元年又置五兵尚書左氏尚書領駕部曹都官尚書領庫部曹五兵尚書領中兵外兵二曹昔有騎兵别兵都兵故謂之五兵也晉有駕部庫部中兵外兵曹郎宋髙祖初加置騎兵太祖元嘉十年又省騎兵十一年又置太宗世省騎兵謹案宋世止中兵外兵二曹郎而尚書仍稱五兵厯代因之名實殊不相稱蓋沿襲之失也至宋志又有武庫令𨽻尚書庫部車府令𨽻尚書駕部南齊亦同其制蓋二令本𨽻於執金吾太僕兩卿因其職省廢故以權宜改𨽻其實並非尚書本屬今按其規制析入武備院鑾儀衛篇中不復列於兵部表云南齊書百官志左民尚書領駕部曹都官尚書領庫部曹五兵尚書領中兵外兵二曹隋書百官志梁武受命置五兵尚書駕部庫部中兵外兵騎兵等郎陳承梁皆循其制官事文類聚梁陳有左右中兵左右外兵騎兵郎曹皆置侍郎亦郎中之任也唐六典駕部宋齊並為郎中梁陳為駕部侍郎宋齊有庫部郎中梁陳為侍郎鄭樵通志梁五都令史職與晉同武帝以宣毅墨曹參軍王顒兼中兵都北魏魏書官氏志興安二年正月置駕部尚書太和十五年十二月置庫部官通典後魏為七兵尚書有駕部郎中有庫部屬度支尚書唐六典後魏有駕部郎中庫部郎中北齊隋書百官志後齊尚書省置五兵尚書六尚書分統列曹殿中統駕部掌車輿牛馬廄牧等事曹度支統庫部掌凡是戎仗器用所須事曹鄭樵通志北齊為五兵統五曹曰左中兵掌諸都督告身諸宿衛官曰右中兵掌畿內丁帳事諸兵力士曰左外兵掌河南及潼關以東諸州丁帳及發召諸兵曰右外兵掌河北及潼關以西諸州所典與左外兵同曰都兵掌鼓吹大樂部小兵等事孫逢吉職官分紀北齊馮子琮為駕部郎中攝庫部後周通典後周官品正七命大司馬正六命小司馬上大夫正五命夏官職方兵部駕部武藏等中大夫正四命夏官小職方小兵部小駕部小武藏等下大夫正三命夏官小職方小兵部小駕部等上士正二命夏官司袍襖司弓矢司甲司矟司刀盾等中士正一命夏官司袍襖司弓矢司矟司甲司刀盾等下士隋隋書百官志髙祖受命置尚書省兵部尚書統兵部職方侍郎各二人駕部庫部侍郎各二人焬帝置六曹侍郎以二尚書諸曹侍郎並改為郎又改兵部為兵曹郎以異侍郎之名通典隋乃有兵部尚書統兵部職方駕部庫部四曹蓋因後周兵部之名兼前代五兵之職謹案自南北朝以後駕部或領於左民或領於殿中庫部或領於都官或領於度支核其所司本輿馬兵仗皆軍事所須乃不屬五兵而轉屬他曹配𨽻殊未允協隋代悉改領於兵部名實始稱故至今仍其制焉至職方之名本出於夏官後周依周制始置職方中大夫隋文帝遂以為兵部之一曹亦厯代所未有也唐唐六典兵部尚書一人正三品侍郎二人正四品下掌天下軍衛武官選授之政令凡軍師卒戍之籍山川要害之圖廄牧甲仗之數悉以咨之其屬有四一曰兵部二曰職方三曰駕部四曰庫部尚書侍郎總其職務而奉行其制命凡中外百司之事由於所屬咸質正焉凡選授之制每嵗孟冬以三旬會其人以三銓領其事一曰尚書銓二曰東銓三曰西銓尚書為中銓兩侍郎分為東西銓以五等閲其人以三竒拔其選其尤異者登而任之否則量以退焉有殊尤者得令宿衛凡大選終於季春之月所以審名實之銓綜備戎仗之物數以戒軍令而振國容焉郎中二人從五品上員外郎二人從六品上主事四人從八品下郎中一人掌考武官之勳祿品命以二十有九階承而敘焉郎中一人掌判簿以總軍戎差遣之名員外郎一人掌貢舉及諸雜請之事其科第之優劣勳獲之等級皆審其實而授敘焉員外郎一人掌選院謂之南曹每嵗選人有解狀簿書資厯考課必由之以核其實乃上三銓進甲則署焉職方郎中一人從五品上員外郎一人從六品上主事二人從九品上職方郎中員外郎掌天下之地圗及城隍鎮戍烽候之數辨其邦國都鄙之逺邇及四夷之歸化者其五方之區域都鄙之廢置疆場之爭訟者舉而正之駕部郎中一人從五品上員外郎一人從六品上主事三人從九品上駕部郎中員外郎掌邦國之輿輦車乘及天下之傳驛廄牧官私馬牛雜畜之簿籍辨其出入闌逸之政令司其名數凡三十里一驛天下凡一千六百三十有九所而監牧六十有五焉皆分使而統之凡諸衛有承直之馬凡諸司有備運之車皆審其制以定數焉庫部郎中一人從五品上員外郎一人從六品上主事一人從九品上庫部郎中員外郎掌邦國軍州之戎器儀仗及冬至元正之陳設并祠祭喪葬之羽儀諸軍州之甲仗皆辨其出入之數量其繕造之功以分給焉謹案鹵簿儀仗唐世掌之庫部宋明則皆掌之駕部至本朝置鑾儀衛其事始不屬於兵部云馬端臨文獻通考唐龍朔二年改兵部尚書為司戎太常伯咸亨元年復舊光宅元年改為夏官神龍元年復舊天寶十一載改為武部至德初復舊兵部侍郎龍朔二年改為司戎少常伯郎中改為司戎大夫職方郎中改為司城大夫駕部郎中改為司輿大夫庫部郎中改為司庫大夫咸亨初復舊舊唐書職官志天寶十一載改駕部為司駕庫部為司庫至德二載並仍舊唐會要總章二年以後兵部侍郎加至三員後又減一員新唐書百官志兵部令史三十人書令史六十人制書令史十三人甲庫令史十二人亭長八人掌固十二人職方令史四人書令史九人掌固四人駕部令史十人書令史二十四人掌固四人庫部令史七人書令史十五人掌固四人右司都事六人主事六人謹案今各部堂主事司務當為唐左右司都事主事之職説已具吏部篇今以𨽻右司者析繫兵部表內刑工二部仿此洪邁容齋隨筆唐吏部兵部分掌銓選兩部各列三銓吏居左兵居右是為前行故兵部班級在户刑禮之上睿宗初政以宋璟為吏部尚書李乂盧從願為侍郎姚元崇為兵部尚書陸象先盧懷慎為侍郎六人皆名臣二選稱治新唐書選舉志武舉起於武后之時長安二年始置其制有長垜馬射步射平射筒射又有馬槍翹關負重身材之選中第亦以鄉飲酒禮送兵部謹案自古舉官之途不分文武三代以命卿帥師而六鄉則有比長閭胥族師黨正州長鄉師六遂則有鄰長里宰鄼長鄙師縣正遂師皆以時率其民課農教戰而聽政令於司馬故涖衆則曰師都涖軍則曰軍吏其職即如今之將辨也漢世良家子以材力入官者或𨽻期門羽林或為三署郎而軍功大者為卿大夫小者亦為郎後漢將帥罷兵大抵內為列卿外為郡守後漢書耿純傳純以前將軍平真定還京師願試一郡光武曰卿既治武復欲修文耶乃拜為東郡太守沿及魏晉而將軍之官多選清望之士居之如裴頠以國子祭酒為右軍將軍王恬以中書郎為後將軍亦皆由文職遷轉以至州鎮方伯無不兼將軍都督之稱其為州而無將軍者則謂之單車刺史當時文武遷授尚不拘資格其後迄南北朝皆然至唐而吏部兵部分為二選文武始各有定闕然考唐六典武選之制如所云選人有自文資入者取少壯六尺已上材藝超絶考試不堪還送吏部是文可以換武又云千牛備身五考隨文武簡試聽選勳官年滿簡送吏部無文聽以武選三衛官考滿兵部校試有文堪時務則送吏部無文則以本色遷授是武可以改文故唐代諸州兵政掌之刺史悉帶使持節某州軍州事銜稱為州將並無専閫武員吏職兵官未嘗判然區别逮宋太祖患五季藩鎮跋扈命文臣出守列郡而别置鈐轄都監以司軍旅屯戍之政令遂分職而治然當時內外官仍文武參用而願換授者亦許改職宋敏求春明退朝録唐文武參用袁滋自尚書右丞出華州刺史召為左金吾衛大將軍宋朝頗循其制三司使尚書左丞李士衡學士承旨刑部尚書李維翰林學士工部侍郎陳堯咨皆換觀察使自元世祖至元十五年定軍民異屬之制以萬户府鎮撫司領戍兵以知府縣尹領民事元吳萊淵頴集書急就章後云國家起自北土經理中原中原豪傑保有鄉里因而降附使據其境土如古諸侯大開幕府辟置官屬錢糧獄訟一皆専制於已而不復有關乎上已而山東猘子地富兵強跳踉負固卒貽誅滅而後天下郡縣一命之官悉歸于吏部兵則自近戍逺尺籍伍符各有統帥但知坐食郡縣之租稅不復繫守令事矣明因其制於是州縣營衛建置攸殊出身既截然不同銓注亦有一定之格自督撫大吏外武官除授乃無一不歸於兵部矣五季五代史本紀乾化二年兵部郎中張俊天成二年兵部侍郎馮道長興四年兵部尚書李麟五代會要長興三年尚書吏部侍郎王權奏請頒下諸州其所送兵部職方地圗令郡縣鎮戍城池水陸道路或新舊移易者並須載之於圗謹案五季兵部官制史志不詳今略採歐史及會要二條以見其概宋文獻通考宋兵部判部事一人凡籍武官軍師卒戎之政令悉歸於樞密院其選授小者又歸三班本曹但掌三駕儀仗鹵簿字圗釋奠武成王廟及武舉事嵗終以義勇兵箭手寨兵之數上於朝元豐更制惟民兵馬政權𨽻樞密院武官銓選并歸吏部五年詔應緣義勇保甲事並𨽻樞密院其餘民兵悉歸兵部以什伍之法教民為兵以選舉之法試武士以鹵簿字圗分布儀衛以郡縣之圗周知地域凡廂軍蕃兵剩員及金吾街仗司人兵稽其數而振飭其藝臣僚之家宣借兵級與夫蕃夷屬户授官封襲之事皆掌之侍郎南渡後長二互置續置侍郎二員隆興常置一員郎中建炎三年詔兵部兼職方駕部兼庫部隆興初詔駕部兵部郎官共一員兼領自是四司合為一矣厥後間或並置若從軍或將命於外則假以為寵職方掌天下地圗以周知方域之廣及城隍堡塞烽候蕃夷歸朝內附之事駕部掌輦輅車乘廄牧雜畜乘具傳驛之政令辨其出入之數庫部掌軍器儀仗鹵簿法式隨軍防城什物及凡供帳之事宋史職官志兵部掌兵衛儀仗鹵簿武舉民兵廂軍土軍蕃軍四夷官封承襲之事輿馬器械之政天下地土之圗凡儀衛鹵簿皆掌其數及行列先後之儀為圖以授有司凡武選之制倣貢舉之法先聨其什伍而教之以戰為民兵材不中禁衛而足以執役為廂軍就其鄉井募以禦盜為土軍以老疾而裁其功力之半為剩員團結以禦戎為洞丁為義軍弩手屬羌分𨽻邉將為蕃兵籍其名數而頒其禁令凡招置廂禁軍及州郡屯營三衙遷補守戍軍吏轉補文武官白直宣借皆掌之其屬三曰職方曰駕部曰庫部舊判部事一人以兩制充元豐設官十尚書侍郎各一四司郎中員外郎各一元祐初省駕部郎中一員以職方兼庫部紹興改元詔職方庫部互置郎官一員兼尚書掌兵衛武選車輦甲械廄牧之政令以天下郡縣之圖而周知其地域凡陳鹵簿設仗衛飭官吏整肅蕃夷除授奉行其制命凡軍兵以名籍統𨽻者閲習按試選募遷補及武舉校試之事皆總之侍郎為之二郎中員外郎𠫭掌之分案九置吏四十有七建炎三年分案十曰賞功曰民兵衛曰廂兵曰人從看詳曰帳籍告身曰武舉曰蕃官曰開拆曰知雜曰檢法乾道裁減吏額共置三十人職方郎中員外郎掌天下圗籍以周知方域之廣袤及郡邑鎮寨道里之逺近凡土地所産風俗所尚具古今興廢之因州為之籍遇閏嵗造圗以進分案三置吏五舊判司事一人以無職事朝官充紹熙三年職方駕部吏額通入兵部庫部併作四十二人駕部郎中員外郎掌輿輦車馬驛置廄牧之事大禮戒有司具五輅凡奉使之官赴闕視其職治給馬如格官文書則量其遲速以附步馬急遞總內外監牧籍其租入多寡孳産登耗凡市馬於四夷者溢嵗額則賞之分案六置吏十有三庫部郎中員外郎掌鹵簿儀仗戎器供帳之事國之武庫𨽻焉凡內外甲仗械器造作繕修皆有法式若御大慶文德殿應用鹵簿名數前期以戒有司祭祀喪葬則給以等差總衛尉寺金吾仗司兵匠之數考其功罪嵗月而以法升降之分案四置吏九容齋隨筆元豐官制行一切更改凡選事無論文武悉以付吏部案蘇頌行狀云唐制文選吏部掌之武選兵部掌之神宗謂自三代至漢未嘗有文武之别頌請一歸吏部上從之蘇東坡當元祐中拜兵書謝表云恭惟先帝復六卿之名本欲後人識三代之舊古今殊制間劇異宜武選𨽻於天官兵政總於樞府故司馬之職獨省文書蓋紀其實也今本曹所掌惟諸州廂軍名籍及每大禮則書寫蕃官加恩告雖有所轄司局如金吾街仗司騏驥車輅象院法物庫儀鸞司不過每季郎官一往耳名存實亡一至於是永樂大典宋百官題名記建炎中省冗職以兵部郎中并兼職方司山堂考索建炎三年以駕部兼庫部隆興改元復裁內外官於是駕部又當省而郎適贊讀王府有詔聽留需其遷勿補闕而兵部四曹止一員謹案宋以樞密院主兵政武選又并歸吏部於是兵部遂為冗員長二多不備官郎曹至以一人行四司之事宋代官制最為紊雜無緒此亦其名實乖互之一端也遼遼史百官志契丹北樞密院掌兵機武銓羣牧之政凡契丹軍馬皆屬焉以其牙帳居大內帳殿之北故名北院元好問所謂北衙不理民是也北院樞密使知北院樞密使事知北樞密院事北院樞密副使知北院樞密副使事同知北院樞密使事簽書北樞密院事北院都承旨北院副承旨北院林牙知北院貼黃給事北院知聖旨頭子事掌北院頭子北樞密院敞史北院郎君北樞密院通事北院掾史謹案遼北樞密院視兵部今繫之於表以存其制至南面官僚史志略而不詳惟興宗重熙中見兵部侍郎王觀又有庫部員外郎見於百官志序知其建置亦多仍唐舊也金金史百官志兵部尚書一員正三品侍郎一員正四品郎中一員從五品員外郎二員從六品掌兵籍軍器城隍鎮戍廄牧鋪驛車輅儀仗郡邑圗志險阻障塞逺方歸化之事主事二員從七品貞祐五年以承發司管勾兼漢人主事令史二十七人內女直十二人譯史二人通事二人四方館使正五品副使從六品掌提控諸路驛舍驛馬承發司管勾從七品同管勾從八品掌受發省部及外路文字右屬尚書兵部謹案驛站之設所以通達軍情傳宣號令關繫非輕溯其由來蓋自周之盛時已有其制考爾雅釋言云馹遽傳也郭璞注皆傳車驛馬之名春秋僖三十三年左傳云使遽告於鄭文十六年云楚子乘驛會師於臨品成五年云晉侯以傳召伯宗襄二十一年云祁奚乘馹而見宣子襄二十七年云子木使驛謁諸王襄二十八年云吾將使驛奔問諸晉昭二年云子産懼弗及乘遽而至昭五年云楚子以馹至於羅汭曰驛曰馹曰遽互見者不一杜預皆以為傳車而釋文則稱以車曰傳以馬曰遽顧炎武謂國語晉文公乘馹會秦伯呂氏春秋齊君乘馹追晏子皆事急不暇駕車而單乘驛馬據此是春秋時已兼有驛車驛馬特當日牧政天子十有二間邦國六間皆以供朝覲會同及軍事之用而戎馬之在邱甸者則民自備之其驛傳之馬未知從何供用疑即當在邱甸所出戎馬之數為鄉師所屬故未嘗别設官以治之也漢書髙祖本紀乘傳詣雒陽如淳曰律四馬髙足為置傳四馬中足為馳傳四馬下足為乘傳一馬二馬為軺傳急者乘一乘傳師古曰古者以車謂之傳車其後又單置馬謂之驛騎鄭當時傳常置驛馬長安諸郊王溫舒傳為河內太守令郡具私馬五十匹為驛自河內至長安此雖二人私置然可見漢代之驛亦車馬兼用故其時外臣入朝皆由驛谷永傳嵗竟乘傳奏事是也罪人發遣亦由驛淮南厲王傳載以輜車令縣次傳是也降人赴闕亦由驛汲黯傳丐奴畔其主降漢徐以縣次傳之是也獨百官公卿表內不見有主驛傳之官據賈山至言云省廄馬以賦縣傳昭帝本紀元鳯二年詔省乘輿馬及苑馬以補邊郡三輔傳馬則是漢代驛馬但屬之郡縣而不𨽻於京師自後史無明文北齊駕部雖有掌車輿牛馬廄牧之語亦不及驛傳至於唐世始以駕部郎中員外郎主郵驛之事在外則以都督刺史上佐內之兵曹𠫭軍掌之而縣令兼綜焉相沿至今而郵政遂為兵部之専司矣至驛之置於京師者在唐則為都亭驛長安志都亭驛在朱雀門外西街含光門北來第二坊通鑑王行瑜殺韋昭度李溪於都亭驛是也五季及宋並同胡三省通鑑注晉天福五年改東京上源驛為都亭驛契丹國志宋館遼使於都亭驛蓋如今兵部馬館而不聞有管驛之員疑其事即併領於駕部宋代雖有都亭驛監官而所司乃接待使人不關郵政今已别載入會同四譯館表內惟金之四方館使承發司管勾明之會同館大使𨽻屬兵部正當今馬館之職元代置通政院於大都上都以典驛站雖品秩較崇而所掌亦為相近謹於馬館監督表下列此三條以明沿革而前代則槩從其略云元元史百官志兵部尚書三員正三品侍郎二員正四品郎中二員從五品員外郎二員從六品掌天下郡邑郵驛屯牧之政令凡城池廢置之故山川險易之圗兵站屯田之籍逺方歸化之人官私芻牧之地駝馬牛羊鷹隼羽毛皮革之徵驛乘郵運祇應公廨皂𨽻之制悉以任之世祖中統元年以兵刑工為右三部置尚書二員侍郎二員郎中五員員外郎五員總領三部之事至元元年别置工部以兵刑自為一部尚書四員侍郎三員郎中如舊員外郎五員三年併為右三部五年復為兵刑部尚書三員省侍郎二員郎中如故員外郎一員七年始列六部尚書一員侍郎仍舊郎中一員員外郎仍一員明年又合為兵刑部十三年復柝兵部二十三年定尚書侍郎郎中員外郎以二員為額至治三年增尚書一員主事二員蒙古筆且齊解見吏部篇二人令史十四人回回令史一人克埒穆爾齊解見吏部篇一人知印二人奏差八人典吏三人謹案元史百官志有左三部照磨掌吏户禮三部錢榖計帳之事其職蓋如今之司務已别著之吏部篇而右三部無之疑史文脫漏也至宋金元左右司都事主事為今司務堂主事之職其屬左司者已入吏户禮三部表中今以屬右司者析入兵刑工三部謹發其凡於此而諸史原文則不復復載云事文類聚大元兵部令史分掌名頭儀仗為舊庫部緊慢置鋪驛走遞馬數承發司文字車輅合給牌劄廄牧為舊駕部元史百官志通政院秩從二品國初置驛以給使傳至元七年初立諸站都統領使司以總之設官六員十三年改通政院十四年分置大都上都兩院二十九年又置江南分院大德七年罷至大元年升正二品四年罷以其事歸兵部是年兩都仍置延祐七年復從二品大都院使四員同知二員副使二員僉院一員同僉一員院判一員經歷一員都事一員照磨兼管勾承發架閣一員上都院使同知副使僉院判官各一員經歷都事各一員明明史職官志兵部尚書一人正二品左右侍郎各一人正三品其屬司務廳司務二人從九品武選職方車駕武庫四清吏司各郎中一人正五品正統十年增設武選職方二司郎中各一人成化三年增設車駕司郎中一人萬厯九年並革員外郎一人從五品正統十年增設武選司員外郎一人𢎞治九年增設武庫司員外郎一人後俱革嘉靖十二年增設職方司員外郎一人主事二人正六品洪武宣德間增設武選司主事三人職方司主事四人正統十四年增設車駕武庫二司主事各一人後革萬厯十一年又增設車駕司主事一人所轄會同館大使一人正九品副使二人從九品大通關大使副使各一人俱未入流尚書掌天下武衛官軍選授簡練之政令侍郎佐之武選掌衛所土官選授升調襲替功賞之事嵗凡六選有世官有流官世官九等流官八等以世官升授或由武舉用之軍政五年一考選先期撫按官上功過狀覆核而去留之以貼黃徵圗狀以初績徵誥敕以效功課將領以比試練卒徒以優養恩故絶以褒恤勵死戰以寄祿馭恩幸以殺降失陷避敵激叛之法肅軍機以典刑敗倫行劫退陳之科斷世祿職方掌輿圗軍制城隍鎮戍簡練征討之事凡天下地里險易逺近邊腹疆界俱有圗本三嵗一報與官軍車騎之數偕上凡軍制內外相維武官不得輒下符徵發各統其官軍以聽征調守衛朝貢保塞之令以時修浚其城池而閲視之征討請命將出師懸賞罰調兵食紀功過以黜陟之以保塞障邊徼以烽火傳聲息以關津詰姦細以緝捕弭盜賊以快壯簡鄊民以勾解收充抽選併豁疏放存恤之法整軍伍車駕掌鹵簿儀仗禁衛驛傳廄牧之事凡鹵簿大駕丹陛駕武陳駕皆辨其物數以授所司凡侍衛御殿全直常朝畨直凡郵傳在京師曰會同館在外曰驛曰遞運所皆以符驗關券行之凡馬政其専理者太僕苑馬二寺稽其簿籍以時程其登耗惟內廄不會武庫掌戎器符勘尺籍武學薪𨽻之事凡內外官軍有征行移工部給器仗籍紀其數制敕下各邊徴發及使人出關必驗勘合軍伍缺下諸省府州縣勾之初洪武元年置兵部六年增尚書一人侍郎一人置總部駕部并職方三部設郎中員外郎主事如吏部之數十三年升部秩設尚書侍郎各一人又增置庫部為四屬部部設郎中員外郎主事各一人十五年增試侍郎一人二十二年改總部為司馬部二十九年定改四部為武選職方車駕武庫四清吏司惟職方仍舊名景泰中增設尚書一人協理部事天順初罷隆慶四年添注侍郎二人尋罷萬厯末年復置謹案明代設有協理京營戎政一人或兵部尚書或兵部侍郎或右都御史蓋時以武臣總督京營故以文臣為協理皆另給關防専理戎政不釐部務中間亦屢有裁革乃别為額闕非本部常置之正官今故不著於表又案明初兵制內領之五軍都督府外則統之都司而有事則别選侯伯為總兵官以主征伐原不専𨽻中樞自英憲以還承平日久軍伍廢弛而兵政遂盡歸之兵部每遇疆場有警則調兵撥餉及戰守機宜皆惟兵部是聽武臣自専閫以下均受節制黜陟進退罔不由之總兵官領敇至長跪部堂而辨帥奔走盡如鈴卒其權甚重故當時號為本兵而受任者多非其人甚或借以營私填窟諸邊將率多紈袴夤緣得官以巖疆重寄付之債帥之手至於冒占軍伍尺籍空虛一旦羽檄紛馳輒搶攘周章毫無調度即有一二果鋭敢戰者又為部符所格東西牽掣坐失事機遇敵即形挫衄明之諸帝既委其責於兵部一切仰成及敗事僨轅則又歸咎部臣重加刑戮如丁汝夔陳新甲等皆至伏誅西市死非其罪其他亦竄謫不絶良由措置乖方故兵威益以不振我朝武功赫濯軍令嚴明四征不庭無不恪承謨略初置議政大臣以𠫭承軍事籌畫自雍正初年以來復設辦理軍機事務處凡當命將出師征𠞰情形皆令以郵函直達聖神燭照洞悉機宜軍機大臣承旨書宣帥臣等仰慿授算所至悉迅奏膚功兵部之職不過稽核額籍考察辨員而已蓋惟聖武布昭樞鈐獨運故能指揮萬里如在户庭洵非臣下之所克禆贊萬一也欽定厯代職官表卷十二
