body:
  text: 户部倉場衙門表户部倉場衙門國朝官制總督倉場户部右侍郎滿洲漢人各一人掌總稽嵗漕之入以均廩祿以儲軍餉凡南北漕艘京通倉庾悉𨽻焉順治元年初設漢倉場侍郎一人九年設滿洲漢軍倉場侍郎各一人尋裁漢軍員額十五年定制滿洲漢人侍郎各一人駐劄通州新城總理糧務康熙八年復裁漢人員額止設滿洲侍郎一人十八年仍設漢人侍郎一人又有總理滿洲侍郎一人順治四年置與總漕同理漕務八年裁十二年復置十八年仍裁坐糧㕔滿洲漢人各一人以給事中御史各部郎中員外郎掄選簡充二年而代掌北河濬淺修築隄岸閘壩催䟎漕艘抵壩回空督令經紀車户轉運輸倉兼司通濟庫銀出納及抽收通州稅課之事所屬通濟庫大使一人通流慶豐閘官各一人順治元年通州坐糧㕔止差户部漢人司官一人康熙二年添差户部滿洲司官一人二十六年定制依各關差例以各部院官員通行差遣又初制有坐糧㕔筆帖式一人尋省大通橋監督滿洲漢人各一人以各倉監督掄選調充凡石壩運到漕白二糧抽驗斛面督催車户分運京倉及隨糧松板支收之事皆屬焉初差户部漢人司官一人康熙二年改設滿洲漢人監督各一人尋省四十七年以通州大通橋㑹清河相隔甚逺事難兼辦仍設滿洲漢人監督各一人管理京通各倉監督滿洲漢人各一人在京倉十有四城以內曰祿米倉南新倉舊太倉富新倉興平倉均在朝陽門內建國初因明舊制海運倉北新倉在東直門內亦國初建恩豐倉在東華門北乾隆二十八年建城以外曰太平倉在朝陽門外亦國初建本裕倉在德勝門外清河康熙四十五年建萬安倉在朝陽門外雍正元年建儲濟倉裕豐倉均在東便門外雍正六年建豐益倉在德勝門外安河橋雍正七年建凡八旗三營兵食官軍牧馬豆貯焉通州倉二曰西倉曰中倉均制國初因明建舊有南倉乾隆十八年省凡王公百官俸廪米貯焉惟豐益倉以供守衛官圓明園八旗軍俸餉恩豐倉以供廪內廷太監食俱由內務府遣官主之其十四倉監督以內閣中書部院寺監屬官掄選引見注其名於籍有闕員則户部掣籖以授三年而代掌漕白二糧交納上倉及收貯支放之事初制差户部滿洲漢人司官管理諸倉或一人或二人增損不一康熙五十年始定每倉置滿洲漢人監督二人五十七年令九卿各舉其屬以待簡用雍正元年選部曹之候補者充其任二年置副監督以預監督選者於應代先一年為之稱職則如期交替不及者罷免四年復以滿洲各部院筆帖式及漢人之候補道府同知知州者掄選充補勤職者擢用之尋改定如今制又各倉原設筆帖式一人後俱省倉場筆帖式滿洲四人順治元年置掌受遣文書之事謹案今定制稽察倉儲京倉以都統副都統通倉以通永道通州副將専司其事若倉有滲漏米有盜竊者移倉場治之滿漢御史則每倉嵗差一人通稽一嵗內收漕發米釐剔弊端以重天庾儲備蓋即唐監倉明巡倉之職而立法周詳視前代益昭嚴慎矣歷代建置三代周禮地官廪人下大夫二人上士四人中士八人下士十有六人府八人史十有六人胥三十人徒三百人掌九穀之數以待國之匪頒賙賜稍食以嵗之上下數邦用以知足否以詔穀用以治年之凶豐舍人上士二人中士四人府二人史四人胥四人徒四十人掌平宫中之政分其財守以法掌其出入掌米粟之出入辨其物鄭康成注政謂用穀之政也分其財守者計其用穀之數分送宮正內宰使守而頒之也而行出于廪人其在空缺則計之還入倉人中士四人下士八人府二人史四人胥四人徒四十人掌粟入之藏辨九穀之物以待邦用謹案管子稱黃帝使大常為廩者房元齡注云謂開廩以給人也氏族略稱庾氏為堯時掌庾大夫以官命氏是委積之政由來以古逮周禮設官分職立法尤詳觀廩人一官而徒至三百人則其出納之多亦概可見矣至鄭康成謂廪人舍人倉人司祿官之長者蓋成周鄉遂出軍兵農合一無後世饋餉之繁故所主惟百官之稍食為重耳秦册府元龜秦始皇并天下有治粟內史掌穀貨有兩丞宋書百官志太倉令秦官也漢漢書百官公卿表治粟內史有兩丞景帝後元年更名大農令武帝太初元年更名大司農屬官有太倉令丞又郡國諸倉農監都水六十五官長丞皆屬焉騪粟都尉服虔曰騪者搜索也武帝軍官不常置王應麟玉海桑宏羊趙過楊敵為之趙過奏平都令光為丞漢書食貨志元封元年桑宏羊為治粟都尉領大農謹案治粟都尉始見於史記淮隂侯傳蓋其官本漢初所置漢書功臣表又作粟客見司馬貞索隱今本作票客殆一官而兩名又宣帝本紀大司農中丞耿夀昌奏設常平倉以給北邊省轉漕云云是大司農丞又得稱中丞也漢書百官公卿表水衡都尉都水農倉長丞皆屬焉漢書張敞傳察廉為甘泉倉長食貨志太倉甘泉倉滿史記倉公列傳太倉公者齊太倉長漢書律厯志量者籥合升斛也職在太倉大司農掌之三輔黃圖太倉蕭何造在長安城外東南有百二十楹細栁倉在長安渭北石徼西有細栁倉東有嘉禾倉初建一百二十楹漢書宣帝本紀詔丞相以下至都官令丞入穀輸長安倉謹案西漢大司農綜治錢穀蓋如今之户部然其官本出於治粟內史故柏梁詩大司農所賡者但言陳粟萬石揚以箕周禮疏引史遊章云漢法穀入司農錢入少府而漢書朱邑為大司農張敞與邑書曰掌周稷之業顔師古謂司農主百榖趙充國傳亦言大司農所轉穀足支萬人一嵗食足知大農所領實以倉廪為重與今倉場職尤相近也至西漢諸倉史傳尚頗可考而倉長丞等職名員數則志未之詳惟甘泉倉長一見於張敞傳以志核之甘泉丞𨽻於水衡都尉則甘泉倉長殆亦水衡之所屬歟又朱博傳有護漕都尉官當即後世轉運之司今别入漕運總督篇內不列於此表後漢書百官志太倉令一人六百石主受郡國傳漕穀丞一人屬大司農滎陽敖倉官中興屬河南尹杜佑通典後漢河南尹屬官有滎陽穀倉長丞唐章懷太子後漢書注洛陽記曰建始殿東有太倉晉書食貨志漢顯宗永平五年作常滿倉謹案滎陽敖倉長丞通典及唐六典俱作穀倉疑字誤以西京之制準之當屬水衡都尉其改屬河南尹者以東漢省并水衡故也又常滿倉之類於例亦當俱有長丞而史不之及蓋祇就其可考者載之耳三國杜佑通典建安中為大農魏黃初元年又改為司農大司農桓範出奔謂曹爽曰大司農印在吾手所在得開倉而食唐六典魏大司農品第三司農丞太倉令品第七册府元龜大司農蜀吳多如舊制晉晉書職官志大司農哀帝省并都水孝武復置唐六典晉太康中置司農主簿二人晉書武帝紀咸寧二年九月丁未起太倉於城東酈道元水經注洛陽地紀曰大城東有太倉倉下運船常有千計王應麟玉海江左有龍首倉即石頭津倉臺城內倉南塘倉東西大倉東宫倉宋書百官志晉江左以來又有東倉石頭倉丞各一人謹案漢代諸農倉長丞不屬司農而𨽻於水衡都尉晉時都水使者亦職兼運部宋書載懷帝永嘉六年劉曜入洛陽都水使者爰濬先出督運得免是其明證哀帝時遂以司農并入都水蓋轉漕之事必資河渠故兩職相兼方禆挽運今河漕雖分二督而參掌運道其北河疏濬及閘壩事宜則倉場侍郎及坐糧㕔領之蓋即其制也至晉大司農屬有東西南北部護漕掾當如今押運府判之職又本紀太元中置督運御史官當如今巡漕御史之職今俱别附漕運總督篇內焉宋齊梁陳册府元龜宋有大司農一人丞一人掌九穀六畜之供膳羞者屬官有太倉令丞南齊大司農官屬並如晉制隋書百官志梁天監七年以大司農為司農卿位視散騎常侍主農功倉廩統太倉令又管左右中三倉丞茭庫荻庫箬庫丞陳承梁皆循其制謹案梁代置茭庫荻庫箬庫諸丞𨽻於司農者蓋其物皆倉廩貯穀所需故特設官以掌之唐六典載凡輸米粟二㪷課稿一圍三㪷撅一枚米二十斛蘧蒢一領粟四十斛箬一簍麥及雜種亦如之以充倉窖所用是即梁之遺法而其職則已併於太倉令今制每漕糧二石徵席一領二千石徵楞木一根松板九片每船帶大竹一根中竹三根皆隨運輸納於大通橋蓋亦本唐制而損益之而大通橋監督則又兼有梁茭箬諸庫丞之職矣唐六典司農主簿梁置一人在七班之中第三陳因之北魏册府元龜後魏初大司農第二品孝文太和二十年改為第三品少卿第三品亦改為正第四品上丞第五品中改為第七品下其主簿省之北齊隋書百官志司農寺掌倉市薪菜園池果實統太倉梁州水次倉石濟水次倉等署令丞册府元龜北齊司農寺置卿少卿各一人復置主簿後周通典後周有司農上士一人掌三農九穀稼穡之政令屬大司徒唐六典後周有司倉下大夫隋隋書百官志司農寺置卿少卿各一人丞五人主簿二人録事四人統太倉等署置令二人太倉又有米廪督二人穀倉督四人鹽倉督二人唐六典隋初漕關東之粟以實京邑衛州黎陽倉滎陽洛口倉洛州河陽倉陕州常平倉潼關渭南亦皆有倉以轉運之各有監官通典司農寺隋初與北齊同煬帝置少卿二人潁川太守趙元淑入朝㑹司農不時納諸郡租穀元淑奏之煬帝曰如卿意者幾時當了元淑曰不過十日即日拜元淑為司農卿納天下租如言而畢唐鄭樵通志唐龍朔二年改司農為司稼咸亨初復舊唐六典司農寺卿一人從三品少卿二人從四品上丞六人從六品上主簿二人從七品上録事二人從九品上府三十八人史七十六人計史三人亭長九人掌固七人司農卿之職掌邦國倉儲委積之政令謹其出納而修其職務少卿為之二凡京都百司官吏祿廩皆仰給焉丞掌判寺事凡天下租稅及折造轉運於京師皆閲而納之每嵗自東都轉米一百萬石以祿百官及供諸司若駕行幸東都則減或罷之凡受租皆於輸場對倉官租綱吏人執籌數函其函大五斛次三斛小一斛凡朝㑹祭祀米物薪芻皆應時而給主簿掌省署抄目勾檢稽失凡署木契二十隻應須出納與署合之録事掌受事發辰太倉署令三人從七品下東都則曰含嘉倉丞六人從八品下監事十人從九品下府十人史二十人典事二十四人掌固八人令掌九穀廪藏之事丞為之二凡鑿窖置屋皆銘甎為庾斛之數與其年月日受領粟官吏姓名又立牌如其銘焉凡粟支九年米及雜種三年凡京官之祿發京倉以給給公糧者皆承尚書省符太原永豐倉監一人正七品下丞二人從八品上録事一人府三人史六人典事八人掌固六人龍門等諸倉每倉監一人丞二人録事一人府二人史四人典事六人掌固四人諸倉監各掌其倉窖儲積之事丞為之二凡粟出給者每一屋一窖盡賸者附計缺者隨事科徵非理缺損者坐其所由令徵陪之凡出納帳嵗終上於寺焉謹案魏晉以後錢帛領之度支司農遂専司倉廪其職事略見於諸史志而唐六典所載尤詳核其司存正與今倉場衙門無異以官制準之司農卿當如倉場侍郎之職太倉令當如坐糧㕔之職諸倉監則各倉監督之職也唐㑹要太倉出納貞元五年俾司農少卿一人専領少卿李堅立太倉石柱記册府元龜貞元十九年太倉奏請依六典置太倉令二員丞六員監事十員支計官驅使官三人典事六人府史六人元和三年八月司農少卿崔酆奏停倉丞一員監事二員玉海楊慎矜弟慎名元宗擢為含嘉倉出納使慎餘主長安倉新唐書地理志河南府鞏有洛口倉河清有柏崖倉陕西三門西有鹽倉東有集津倉陕有太原倉孟州河隂有河隂倉華州華隂有永豐倉臨渭倉河中府龍門有龍門倉開元二年置謹案據册府元龜太倉令於貞元中復設則前此嘗省其官而史不載疑或劉晏領轉運時嘗以便宜廢置也至六典所載諸倉監惟太原永豐二倉吏額獨多蓋唐時江淮漕米於河南運至太原倉又遞運至永豐倉及京太倉此二倉當轉輸要地積貯最繁故視他倉為較劇耳新唐書食貨志文宗召監倉御史問太倉粟數崔虞對粟二百五十萬石新唐書百官志殿中侍御史一人監太倉出納開元十九年以監察御史蒞太倉其後以殿中侍御史上一人為監太倉使謹案唐之監太倉使蓋即今稽查諸倉御史之職也五季册府元龜後唐天成二年九月修魏門倉一百間充貯轉運斛㪷十一月三司使張延朗奏於洛中預備一二年軍糧帝然之四年二月三司使奏水運自洛口至京至倉門稍逺欲於洛河北岸别鑿一灣引船直至倉門下缷從之謹案五季倉儲之制史乘闕略據册府元龜所載則積貯出納皆三司使為政其時九寺三監雖沿唐舊司農卿蓋特具員而已宋李燾續資治通鑑長編太祖建隆元年五月乙巳上以畿甸委輸京師多旁緣為姦民或咨怨命殿中侍御史王伸監察御史王祐户部郎中沈義倫等分領在京諸倉謹案自漢以後太倉令及諸倉監皆設有専官宋太祖始命廷臣以他官分領京倉今之部院寺監官員選充諸倉監督其制蓋自此始也宋史職官志司農寺舊置判寺事二人以兩制朝官以上充主簿一人以選人充掌供藉田九種大小中祀供豕與平糶利農之事元豐官制行始正職掌置卿少卿丞主簿各一人卿掌倉儲委積之政令而謹其出納少卿為之二丞參領之凡京都官吏祿廪辨其精粗而為之等諸路嵗運至京師遣官閲其名色而分納於倉庾嵗具封樁月具見存之數奏聞給兵食則進呈糧樣有負缺者計其虧數上於倉部凡諸疏奏雨雪之闕與過多者皆籍之分案六置吏十有八初熙寧立常平斂散法以付司農而農田水利免役保甲等法悉自司農講行官制行寺監不治外事司農舊職悉歸户部右曹元祐三年詔司農寺置長二五年以本寺主簿兼檢法八年復置提轄修倉所紹聖四年罷主簿添丞一員所𨽻官屬五十倉二十有五掌九穀廩藏之事以給官吏軍兵祿食之用凡綱運受納及封樁支用月具數以報司農排岸司四掌水運綱船輸納雇直之事下缷司掌受納綱運建炎三年罷司農寺以事務併𨽻倉部紹興三年復置丞二員凡有合行事務申户部施行四年復置寺仍置卿少十年復置簿隆興元年併省主簿一員明年詔如舊制分案五南北省倉𨽻焉監倉官分上中下界司其出納諸場皆置監官外有監門官交量則有檢察斛面官綱運下卸有排岸司官各分其事以佐本寺玉海京諸倉總二十三所凡受四河運至京師者謂之船般倉永豐通濟萬盈廣衍初通濟有四倉景德四年改第三第四曰萬盈廣衍延豐舊曰廣利景德中改祥符二年增第二順成舊曰常豐景德中改濟逺舊曰常盈景德中改富國太平興國中以迎春苑地為之十倉案倉名止八所其曰十倉者兼通濟延豐第二倉為數也受江淮所運東河永濟永富二倉受懷孟二州所運西河廣濟第一倉受潁夀諸州所運南河廣積廣儲二倉受曹濮諸州所運北河其受京畿之租者曰稅倉京東界則廣濟第二倉受之京北界則廣積第一倉騏驥院天駟監倉受之京西界則左天廏坊倉受之京南界則大盈右天廏倉受之其受商人入中謂之折中倉元豐元年七月提㸃在京倉場所言在京諸倉名宜改易其延豐永濟廣積廣濟第一倉依舊名欲以延豐第二為元豐倉永濟第二為永豐倉廣積南倉為大盈倉廣濟倉為廣阜倉從之馬端臨文獻通考宋諸倉監官每界二人以京朝官及三班使臣充元豐後屬司農中興後又有豐儲倉初紹興以上供米餘數樁管别廪以為水旱之助後益增廣收糴置監官二員監門官一員淳熙間命右司為之提領後以屬檢正非奉朝廷指揮不許支發謹案宋自元豐改制倉廩職掌始歸之司農獨省太倉令不置所屬惟諸倉監而已南渡後張維作司農寺壁記謂倉儲出納自昔太倉令主之蓋大司農之屬猶今之倉部也以列卿而行太倉令日惟倉部要束是聽位雖髙勢出倉部下至於軍餉支給罷於奔命世謂之走卿云云蓋當時司農官屬不備凡監支閲納之事舊屬太倉令者多以卿少兼任之故其職繁冗如此乃俞文豹吹劒録外集載有淳熙六年太倉令葉大廉乞內省取索給憑由下户部除破一事似宋時又曽置太倉令者未知其說何據疑文豹有誤也至宋之排岸下缷司掌受納綱運今大通橋監督督催車户分運京倉正其職矣富大用事文類聚宋仍舊制以三司大將軍為都糧料使開寶六年改用京官太平興國五年分諸司馬軍步軍為三院八年以馬軍步軍合為一院雍熙四年命供奉官陳處晦勾當諸司糧料供奉官曽祚勾當馬步軍糧料自後復分馬步軍為兩院或以諸司使副分主之端拱二年復以京朝官主之元豐末併馬步軍與諸司為二院𨽻太府寺掌以法式頒廪祿凡文武百官諸司諸軍奉料以劵準給謹案宋以糧料院為六院之一掌以法式批支諸軍諸司之廪祿猶今俸甲諸米户部繕册具數付倉場始得支放也自元時已廢其職併入户部為糧草科以其與司農職掌相關均有倉儲出納之責故附載備考而不列於表焉遼遼史百官志南面朝官寺官職名有司農寺謹案遼諸道俱置義倉東京沿邊諸州各有和糴倉又有鹽濼倉而五京諸倉獨不見於史司農職守志亦不詳惟考馬人望傳稱人望遷中京度支使半嵗積粟十五萬斛判南京三司使事錢粟出納弊甚人望皆使别籍黠吏莫能軒輊又稱驛遞馬牛𨽻倉司之役破産不給人望使官自募役人以為便據此是遼之倉司當屬於三司使也金金史百官志太倉使從六品掌九穀廪藏出納之事副使從七品屬太府監提舉倉場司貞祐五年置先吏部辟舉後省擬使從五品副使從六品掌出納公平及毋致虧敗監支納官八品十六員以年六十以下廉幹人充女直漢人各一廣盈倉豐盈倉永豐倉豐儲倉富國倉廣衍倉三登倉常盈倉西一場西二場西三場東一場東二場南一場北一場北二場通濟倉與在京倉置監支納使副各一員謹案金之勸農使司大司農司皆掌勸課農桑并採訪公事不司國儲之政其主倉廪者惟太倉使提舉倉場司二官考金史食貨志載金大定間嵗入粟九百萬石自經費七百萬石外加以水旱蠲免所餘才百萬石殆以出納務簡故設官亦從省併歟至倉場之名始見於宋之提㸃在京倉場所至金遂為置司設官而提㸃秩止五品則當如今之坐糧㕔尚非倉場侍郎之職也元元史百官志京畿都漕運使司秩正三品運使二員正三品同知二員正四品副使二員正五品判官二員正六品經歷一員正七品知事一員從八品提控案牘兼照磨二員掌凡漕運之事世祖中統二年初立軍儲所尋改漕運所至元五年改漕運司秩五品十二年改都漕運司秩五品十九年改京畿都漕運使司秩正三品二十四年內外分立兩運司而京畿都漕運司之額如舊止領在京諸倉出納糧斛及新運糧提舉司站車攢運公事省同知通判知事各一員延祐六年增同知副使運判各一員其後定置官員已上正官各二員首領官四員吏屬令史二十一人譯史二人回回令史一人通事一人知印二人奏差一十六人典吏二人其屬二十四新運糧提舉司秩正五品至元十六年置管站車二百五十輛𨽻兵部開設運糧壩河改𨽻户部置達嚕噶齊䝉古語頭目也原本作達魯花赤今改正一員都提舉一員同提舉二員副提舉一員吏目一員司吏八人奏差十二人京師二十二倉秩正七品萬斯北倉中統二年置萬斯南倉至元二十四年置千斯倉中統二年置永平倉至元十六年置永濟倉至元四年置維億倉既盈倉大有倉並皇慶元年置屢豐倉積貯倉並皇慶元年增置已上十倉每倉各置監支納一員正七品大使二員從七品副使二員正八品豐穰倉皇慶元年置廣濟倉皇慶元年置廣衍倉至元二十九年置大積倉至元二十八年置既積倉盈衍倉並至元二十六年置相因倉中統二年置順濟倉至元二十九年置已上八倉每倉各置監支納一員正七品大使一員從七品副使二員正八品通濟倉中統二年置慶貯倉至元四年置豐潤倉至元十六年置豐實倉案此下史文失載建置年月已上四倉每倉各置監支納一員正七品大使一員從七品副使一員正八品通惠河運糧千户所秩正五品掌漕運之事至元三十一年始置中千户一員中副千户二員都漕運使司秩正三品掌御河上下至直沽河西務李二寺通州等處儧運糧斛至元二十四年自京畿運司分立都漕運司於河西務置總司分司臨清運使二員正三品同知二員正四品副使二員正五品運判三員正六品經歷一員從七品知事一員從八品提控案牘二員內一員兼照磨司吏三十三人通事譯史各一人奏差一十六人典吏一人其屬七十有五河西務十四倉秩正七品永備南倉永備北倉廣盈南倉廣盈北倉充溢倉已上五倉各置監支納一員正七品大使二員從七品副使二員正八品崇墉倉大盈倉大京倉大稔倉足用倉豐儲倉豐積倉恆足倉既備倉已上九倉各置監支納一員正七品大使一員從七品副使一員正八品通州十三倉秩正七品有年倉富有倉廣儲倉盈止倉及秭倉乃積倉樂嵗倉慶豐倉延豐倉已上九倉各置監支納一員正七品大使二員從七品副使二員正八品足食倉富儲倉富衍倉及衍倉已上四倉各置監支納一員正七品大使二員從七品副使一員正八品河倉一十有七用從七品印館陶倉舊縣倉陵州倉傅家池倉已上各置監支納一員從七品大使一員從八品副使一員案此下史失載品數下條同秦家渡倉尖冢西倉尖冢東倉長蘆倉武强倉夾馬營倉上口倉唐宋倉唐村倉安陵倉四栁樹倉淇門倉伏恩倉已上各置監支納一員從八品大使一員從九品副使一員大都陸運提舉司秩從五品掌兩都陸運糧斛之事至元十六年始置運糧提舉司延祐四年改今名提舉二員從五品副提舉一員從七品吏目一員司吏六人差委一十人海王莊七里莊魏家莊臘八莊四所各設提領一人用從九品印案大都陸運提舉司屬中書兵部謹案唐宋糧儲領之司農寺故轉運使發運使為今漕運總督及督糧道之職至元之大司農司所掌惟農桑水利學校之事而在京諸倉出納乃屬之京畿都漕運司是都漕運使正如今之倉場侍郎而新運糧提舉司則如今之坐糧㕔大都陸運提舉司則如今之大通橋監督監支納大使副使則如今之各倉監督也若至元中所分內外兩運司其在河西務者主直沽以來催儧糧斛亦與今倉場侍郎職掌相合惟分司臨清運使在外調度則如今之漕督耳今以其本京畿分職故併載於此而仍互見於漕運諸官表內云明明史職官志總督倉場一人掌督在京及通州等處倉場糧儲洪武初置軍儲倉二十所各設官司其事永樂中遷都北京置京倉及通州諸倉以户部司員經理之宣德五年始命李昶為户部尚書専督其事遂為定制以後或尚書或侍郎俱不治部事嘉靖十五年又命兼督西苑農事隆慶初罷兼理萬厯九年裁革命本部侍郎分理之十一年復設孫承澤春明夢餘録總督倉場公署在城之東裱褙胡同設於正統三年糧儲抵通分貯京通二處在京者曰舊太倉曰百萬倉曰南新倉曰北新倉曰海運倉曰祿米倉曰新太倉曰廣備庫倉在通州者曰大運西倉大運南倉大運中倉大運東倉户部侍郎或尚書總督之元時有京畿都漕運使司所管倉有萬斯南倉萬斯北倉千斯倉相因倉豐潤倉通濟倉廣貯倉永平倉永濟倉維億倉盈衍倉大積倉豐實倉廣衍倉順濟倉今之倉多其地也明史食貨志明初京衛有軍儲倉永樂中置天津及通州左衛倉且設北京三十七衛倉既又設通州衛倉於張家灣宣德中增置北京及通州倉京倉以御史户部官錦衣千百户季更巡察各倉門以致仕武官二率老幼軍丁十人守之半年一更正統中增置京衛倉凡七自兊運法行諸倉支運者少而京通倉不能容乃毁臨清德州河西務倉三分之一改為京通倉景泰初移武清衛諸倉於通州凡京倉五十有六通倉十有六明成祖實録永樂十六年復設通州衛通濟倉謹案通濟倉之名始於金明代則置於張家灣正統元年管糧通政使李暹奏請移置通州既而不果見英宗實録今其倉已廢而坐糧㕔庫曰通濟庫蓋猶沿其舊名也春明夢餘録永樂中嵗凡三運其達京倉者二儲通倉者一宣德四年益增修京通等倉正統元年定所增通州大運曰中倉曰東倉曰南倉曰西倉時嵗運米五百萬京十之四通十之六其年復增造三百萬石倉於大運西倉之側四年增設左右金吾前三衛倉天順四年即通州西倉之南草場置大運南倉五年復增通州大運倉百間而南倉設北東二門餘倉皆三門設守衛軍一人辦事官一人軍一人然由是設總督太監監督內官漸多事矣隆慶初巡倉御史蔣機言漕儲通倉者三百三十餘萬而京倉僅二百餘萬石根本之地出多入少非所以備緩急請無拘三七四六之例凡兊運者悉入京倉改兊者入通倉詔可之邵寶容春堂集通州倉户部嵗委員外郎一人主事四人或七人或九人監出納之政謹案明諸倉不設監督惟户部遣司官經理之謂之監倉員外郎主事其監督倉糧乃內官職名正統中始設一員正德間增至十七八員言者屢陳其侵冒剝削之害而不能去至嘉靖十四年始盡行裁革明代冗食耗蠹職此之由洵一時之粃政也又今之坐糧㕔其職名不見明職官志考張輔之司空奏議有板片蘆席驗收者京糧㕔與坐厫㕔語則坐糧㕔當即沿明坐厫㕔之制而改其名者至京糧㕔亦載於春明夢餘録又稱為總㕔案本朝順治十二年嘗置京糧㕔以掌京倉出納十五年併歸坐糧㕔管理蓋亦沿明制而設意其時均出長官選委不由奏授故史志失載歟欽定厯代職官表卷八
