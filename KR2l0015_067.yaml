body:
  text: 鹽政表鹽政國朝官制鹽政長蘆兩淮各一人由奏差特㫖簡用或都察院各帶原銜品級福建甘肅四川兩廣以總督兼理兩浙雲南貴州均以巡撫管理河東以山西巡撫管理掌弊羣吏糾其徴收督催之不如法者以時審其價而酌劑之凡鹽賦之奏課與鹽法之冝更者以聞總督巡撫兼鹽政者亦如之國朝初承眀制各省置巡鹽御史後定為鹽政由特㫖簡充其由都察院奏差者亦以鹽政名之由內務府官員仍帶簡充者御史銜各省以督撫兼管者皆因地制冝永為恆式焉都轉運鹽使司運使長蘆山東河東兩淮兩廣各一人從三品鹽道兩浙福建陕西四川雲南各一人正四品其餘各直省行銷地官鹽法多由駐劄省城守巡道兼理掌督察場民之生計與商之行息而平其鹽價水陸挽運必計其道里時其往來平其貴賤俾商無滯引民免淡食以聽于鹽政及兼理鹽政之督撫焉國初定兩浙福建運使各一人康熙四十九年改兩浙運使為驛鹽道雍正四年改福建運使為鹽法道分司運同長蘆山東河東兩廣各一人從四品運副兩浙一人從五品運判長蘆二人山東兩浙各一人兩淮三人從六品運同運副運判掌分司産鹽之地而糾察之輔運使鹽道以分治其事長蘆分司天津運同薊永運判各治場四滄州運判治場二山東分司濵樂運同膠萊運判各治場五兩淮分司泰州運判治場十有一通州運判治場九海州運判治場三河東中分司運同治山西解州安邑縣鹽池一場三兩浙分司寧紹運副治場二十嘉松運判治場十有二廣東分司惠潮汀贑運同治場十有三國初定兩淮兩浙長蘆河東山東兩廣運同各一人副使一人兩淮運判四人兩浙長蘆山東河東運判各一人康熙十六年裁各鹽運同副使十七年復設長蘆山東兩浙鹽運同知各一人兩浙副使一人三十八年裁兩淮運判一人四十三年裁兩浙運同雍正三年增設河東兩廣運同各一人監掣同知兩淮二人正五品鹽課提舉司提舉雲南三人正五品監掣同知掌掣鹽之政令鹽課提舉司提舉分轄鹽井之政職掌與運司所屬分司同國初定雲南提舉司三人廣東提舉司一人雲南廣東吏目各一人康熙三十二年裁廣東提舉一人吏目並裁鹽課司大使正八品長蘆山東各十人河東三人兩淮二十三人兩浙三十二人陕西一人廣東十三人四川七人雲南九人正八品掌鹽場及池井之務凡直省有沿海及有池之地聽民闢地為場置竈開畦為鹽而授之商或官出帑收鹽授之商而行之以鹽課大使掌其池場之政令與場地之徴收其有井者分掌其政令皆治其交易審其權衡而平凖之日稽其所出之數以杜私販之源國初設大使之職酌場地池井之多寡而為之額嗣後因時分併增設如今額焉鹽引批驗所大使長蘆山東兩淮各二人兩浙四人兩廣一人正八品庫大使長蘆山東河東兩淮兩浙福建兩廣四川雲南各一人正八品經歷長蘆山東河東兩淮兩浙兩廣各一人從七品知事長蘆河東兩淮兩廣各一人從八品巡檢兩淮二人從九品批驗所大使掌批驗鹽引之出入庫倉大使掌鹽課之收納而監理其倉庫經歷知事掌稽核文書巡檢掌巡察鹽場員額康熙以來陸續定設因其事之繁簡而置員其缺者則以運副運判及課大使兼理其事焉歷代建置三代周禮天官鹽人掌鹽之政令以共百事之鹽賈公彥疏謂四方鹽來鹽有數種處置不同謹按周禮有鹽人掌鹽之致用與後世設官徴課者不同蓋周時所建山澤之官皆掌其政令之厲禁而非以征𣙜取財故鹽課之官為周時所未有然曰掌其政令以共百事則所以規度處置之者必有其法制焉而非僅若醯人醢人職司烹飪者比矣故附著之以眀鹽政設官之緣起管子海王之國謹正注稅也音征鹽策十口之家十人食鹽百口之家百人食鹽終月大男食鹽五升少半大女食鹽三升少半吾子食鹽二升少半注吾子謂少男少女也鹽百升而釡令鹽之重升加分强釡五十也注分强半强也今使鹽官稅其鹽之重每一斗加半合為强而取之則一釡之鹽得五十合而為之强升加一强釡百也升加二强釡二百也鍾二千十鍾二萬百鍾二十萬千鍾二百萬萬乘之國人數開口千萬也禺注禺對也策之商日二百萬又曰齊有渠展之鹽請伐菹薪煮水為鹽正而積之十月始征至于正月成二萬鍾春秋左氏傳晏子對叔向曰海之鹽蜃祈望守之謹按管仲用齊後山海之利始興鹽鐡之征觀其論鹽雖少男少女所食亦將計之而煮海出鹽實由之始其鹽官置稅則後世以鹽事設官者亦肇端于此而左氏所云祈望之官亦其一也謹附著之以眀相因所自云秦史記平凖書秦賦鹽鐡之利二十倍于古漢興循而未改謹按秦代鹽官無可考而利二十倍見于史文馬端臨云史言高祖省賦而復言鹽鐡之利仍秦者蓋當時封國至多山澤之利在諸侯王國者皆循秦法取之以自豐也漢史記武帝本紀元狩四年置鹽鐡官史記平凖書以東郭咸陽孔僅為大農丞領鹽鐡事孔僅咸陽言山海天地之藏也皆冝屬少府陛下不私以屬大農佐賦願募民自給費因官器作煮鹽官與牢盆敢私鑄鐡器煮鹽者釱左趾沒入其器物謹按漢初省賦弛山澤之禁不入于縣官經費故吳王濞得東煮海為鹽國以富益至武帝始置鹽鐡官領于大農官與牢盆私煮有禁于是鹽始為官物民不得私其利矣其時郡國有鹽官者凡二十四見漢書地里志至昭帝時郡國舉賢良文學皆願罷鹽鐡官與御史大夫反覆相難卒從而罷之其後旋罷旋復蓋不為定其經常之制則牢籠盡取其與廢弛不修弊正相等此武帝鹽鐡之官所以為後代常制也册府元龜元帝時嘗罷鹽鐡官三年而復之後漢書郡國志郡有鹽官鐡官者隨事廣狹置令長及丞本注曰凡郡縣出鹽多者置鹽官主鹽稅馬端臨文獻通考眀帝時官自鬻鹽時榖貴縣官用度不足尚書張林請官可自鬻鹽帝以林言為然册府元龜後漢光武初建武彭寵為漁陽太守有舊鹽鐡官永元十五年復置涿郡故鹽鐡官文獻通考獻帝建安初置使者監賣鹽時關中百姓流入荆州者十餘萬家企願思歸而無以自業衛覬議以為鹽者國家之大寶自喪亂以來故散冝依舊置使者監賣以其直益市犁牛百姓歸者以供給之魏武于是遣謁者僕射監鹽官謹按管仲興煮鹽之政其時已有鹽官武帝之置鹽鐡官特沿往制而漢書不詳其品秩至後漢郡有鹽官鐡官者隨事廣狹置令長及丞其秩皆如縣官則與隋志諸鹽池監品秩大略相當蓋如今鹽課大使之職也至建安初魏武遣謁者僕射監鹽官于是鹽官之上又設監以董之與巡鹽之職漸復相近然觀衛覬創議以為冝依舊置使是鹽官有監固不始于建安時考眀帝時有官自鬻鹽之令則鹽官置監意必昉于其時矣三國杜佑通典魏制九品第六品司鹽都尉第八品司鹽監丞册府元龜蜀先主㝎益州置鹽府校尉晉通典晉官制第六品司鹽都尉第八品司鹽監丞謹按司鹽之職魏始置之晉代循而不改其云都尉蓋近于今都轉運鹽使監丞則運同運判之類也考漢末魏武以謁者僕射為鹽官監而魏晉官秩謁者僕射品在第五意晉代亦必循之而不改歟宋齊梁陳文獻通考陳文帝天嘉二年太子中庶子虞荔御史中丞孔奐以國用不足奏立煮海鹽稅從之北魏魏書食貨志河東郡有鹽池嘗立官司以收稅既而罷之延興末復立鹽司孝昌三年長孫稚上表曰鹽池天資賄貨密邇京圻昔高祖升平之年無所乏少猶創置鹽官而加之典制非與物競利恐由利而亂俗也臣輒符司監將尉還率所部依常收稅更聽後敕北齊無考後周文獻通考後周文帝置掌鹽之政令一曰散鹽煮海以成之二曰監鹽引池以化之三曰形鹽掘地以出之四曰飴鹽于戎以取之凡監鹽每池為之禁百姓取之皆稅焉隋隋書百官志鹽池置總監副監丞等員管東西南北面等四監亦各置副監及丞鹽池總監視從六品鹽池總副監視從七品鹽池四面監視正八品鹽池四面副監鹽池總監丞視從八品鹽池四面監丞視從九品謹按隋始置鹽池監丞其制以四面監治鹽事而總監統領之蓋如鹽課大使之領于運同運判其制相為倣佛而監下有丞則亦知事巡檢之類也唐唐書百官志諸鹽池監監一人正七品下掌鹽功簿帳有録事一人史二人唐書食貨志乾元元年鹽鐡鑄錢使第五琦初變鹽法就山海井竈近利之地置監院鹽鐡使劉晏以鹽利多則州縣擾出鹽鄊因舊監置吏吳越揚椘鹽廪至數千積鹽二萬餘石有漣水湖州越州杭州四場嘉興海陵鹽城新亭臨平蘭亭永嘉大昌侯官富都十監自淮北置巡院十三曰揚州陳許汴州廬夀白沙淮西甬橋浙西宋州泗州嶺南兖鄆鄭滑宣宗乃擇嘗更兩畿輔望縣令者為監院官册府元龜肅宗乾元元年司金郎中第五琦按唐書云鹽鐡鑄錢使第五琦蓋以郎中為使正如今鹽政以京職差充也為河南等五道度支使創立鹽法就山海井竈收𣙜其鹽官置吏出糶其舊業户井浮户願為業者免其雜徭𨽻鹽鐡使元和三年七月復以度支安邑解縣兩池留後為𣙜鹽使先是兩池鹽務𨽻度支其職視諸道巡院貞元十六年史牟以金部郎中主池務遂奏置使額二十一年鹽鐡度支合為一使以杜佑兼領佑遂奏院屬度支亦有使名則鹽務不合有使號遂與東渭橋給納使同奏罷之至是判度支裴均以其事益繁遂奏置使焉謹按册府元龜載唐元宗開元元年十一月河中尹姜師度以安邑鹽池漸涸師度開拓疏决水道置為鹽池公私大收其利左拾遺劉彤請詔鹽官收其利遂令將作大匠姜師度户部侍郎强循俱攝御史中丞與諸道按察使檢校海內鹽鐡之課比令使人勾當蓋是時未立𣙜鹽之法亦未設鹽鐡使故姜師度等特與諸道按察使撿校鹽鐡也姜師度為將作大匠强循為户部侍郎其出而檢校鹽鐡則俱攝御史中丞眀代巡鹽以御史充蓋昉于此唐諸道有鹽鐡使起于第五琦設立鹽法之後至皇甫鏄又奏設安邑解縣兩池𣙜鹽使考鹽鐡使之職王播以刑部侍郎充裴休以户部侍即充令狐椘以左僕射充當時委任最重故户部侍郎判度支張平叔特請以廟內宰相充關內河東山劍等道鹽鐡使此與今之鹽政奉特㫖以部院及內務府官簡放而總其成于户部其制略相似也唐制雖以鹽鐡名使而所轄非止鹽鐡志載鹽鐡使裴立休立稅茶之法以及諸道鹽鐡有應管銀山二十五所是也又一使往往兼數使之職唐書食貨志謂天下財賦鑄錢常平轉運鹽鐡置二使東都畿內河南淮南江東西湖南荆南山南東道以轉運使劉晏領之京畿關內河南劍南山南西道以京兆尹判度支第五琦領之是也李巽王涯盧坦鄒公綽崔珙皆為鹽鐡轉運使則以鹽鐡而兼轉運包佶為汴東水陸運兩稅鹽鐡使則以鹽鐡而兼兩稅令狐椘以鹽鐡兼𣙜茶等使元琇以鹽鐡兼𣙜酒等使今運使不兼他官専主鹺務鹽道亦不以使名雖與鹽鐡使微異而實分鹽鐡使之職掌今之鹽政在眀為巡鹽御史職主巡察實董運使之成與唐之鹽鐡使職掌雖殊而體制同也唐志載所屬十監官及十三巡院官當與今十四分司相近唐志又載兩池𣙜鹽使以郎官為之専主河東池鹽度其職掌當為今之河東運使矣册府元龜開成四年黨羌叛擾饋運不通供軍使請𣙜市河東白池鹽供食其白池屬河東莭度使昭宗天復元年梁太祖兼領河中莭度使奏嵗貢課鹽三千車臣令代領池場請加二千車謹案唐鹽鐡使如今之鹽政而鹽鐡使之職或以朝臣充或兼領于莭鎮如河東河中莭度使之兼領池場是也國朝兩浙福建等省以督撫綜理鹽政蓋亦莭鎮領𣙜使之制也五季文獻通考後唐天成元年敕諸州府合散蠶鹽二月內一度俵散依夏稅限納錢晉天福七年敕諸道應有保屬州縣鹽務並令省司差人勾當册府元龜唐開成元年蘇州刺史盧商變鹽法獲利最多鹽鐡使以課績上聞周廣順三年張崇訓以解州刺史充兩池鹽𣙜使奏寬鹽禁謹按後漢時郡國有鹽者別立鹽官職如令丞至唐末及五季始有以刺史管鹽事者其時刺史即今之郡守國朝臺灣鹽場以知府管理職掌同鹽法道其制亦相倣也宋宋史職官志提舉茶鹽司掌摘山煮海之利以佐國用皆有鈔法視其嵗額之登損以詔賞罰凡給之不如期鬻之不如式與州縣之不加恤者皆劾以聞政和改元詔江淮荆浙六路共置一員既而諸路皆置中興後通置提舉常平茶鹽司紹興五年户部侍郎王鈇言常平之設科條實繁其利不一豈一主管官能勝其任乃詔諸路提舉茶鹽官改充提舉常平茶鹽公事如四川無茶鹽去處仍以提刑兼充茶鹽司置官提舉本以給賣鈔引通商阜財時詣所部州縣巡歷覺察禁止私販按劾不法其屬有幹辦官既與常平合一遂並行兩司之事焉提舉制置解鹽司掌鹽澤之禁令使民入粟塞下豫鈔給鹽以足民用而實邊偹凡鹽價高下及文鈔出納多寡之數皆掌之文獻通考政和改元詔江淮荆浙六路共置茶鹽提舉一員宣和三年詔河北京東路推行新法鈔鹽可添置提舉官一員此提舉茶鹽之所始也宋茶鹽事舊𨽻彂運司元豐間或以轉運常平官兼提舉或以提刑兼領知通提轄政和以後始専設官吏既而諸路皆置建炎四年詔逐路提刑司茶鹽司并依舊分東西路紹興二年詔荆湖北路復置提舉茶鹽司四年詔廣西茶鹽司官吏並罷其職事委漕臣五年詔諸路提舉常平併入茶鹽司仍以提舉常平茶鹽等公事為名九年置經制司東南以茶鹽司兼領謹按宋志謂發運使兼制茶鹽泉寶之政通考謂宋茶鹽事舊𨽻彂運司元豐間或以轉運使兼提舉或以提舉常平官兼領陳傅良亦謂國初鹽策只聽州縣給賣嵗以所入課利申省而轉運司􅋵其贏以佐一路之費至崇寧三年始別差官提舉茶鹽紹興八年以程邁充經制發運使邁上疏以租庸常平鹽鐡鼓鑄皆分于諸司而總于户部發運使無所用之是則宋代鹽法自設提舉茶鹽司之後其職即有専屬不復統于諸路監司矣至通考謂二廣之鹽皆屬于漕司紹興八年詔廣東兩漕司鬻鹽以其息什四為州用則漕司亦與茶鹽司並轄其政又通考載熙寧五年盧秉提㸃兩浙刑獄仍専提舉鹽事宋志載建炎四年淮南東路罷提刑令提舉茶鹽官兼領然則提刑與茶鹽提舉二職又往往相通蓋其時嚴捕盜販刑禁苛酷鹽官之職即刑官之職故𣙜鹽或以提刑掌之也總而論之宋代經制不定更改甚多一𣙜鹽之使或領于轉運或領于提刑或領于提舉常平又或罷漕憲提舉而以茶鹽司兼領之變遷紛出迄無常制以視我朝之設官綜理大小相維較然書一者相去蓋霄壤矣至宋之茶鹽提舉與今之鹽課提舉異鹽課提舉即運同運判之職而宋之茶鹽提舉則今運使鹽道之職也文獻通考元祐元年户部及陕西制置解鹽司議延慶渭原環鎮戎保安德順等八州皆禁𣙜官自鬻以萬五千五百席為額商旅入納于八州軍折博務算給交引一如范祥舊法其出賣到鹽錢以給轉運司糴賣從之謹按唐有諸道鹽鐡使惟于兩池則専設𣙜鹽使宋有諸道提舉鹽司惟于兩池則専設提舉解鹽司呂祖謙謂當時南方之鹽全在海北方全在解池南方之鹽管得其人則其害少惟北方解池之鹽有契丹西夏之鹽嘗相參錯奪解池之利又沈括筆談謂解州鹽澤方百二十里其北有堯捎水一謂之巫咸河大滷之水不得甘泉和之不能成鹽惟巫咸入水則鹽不復結故人謂之無鹽河為鹽澤之患築大堤以防之甚于偹冦盜據此諸說則解鹽較諸道利溥而弊多故條令極煩非専立鹽司不足以任其職也至祖謙謂解池之鹽朝廷専使以領之其實宋之解鹽司即本于唐之兩池𣙜鹽使均因地以立制爾我朝設河東鹽政其措置池鹽立法詳偹初不異于東南煮海之鹽蓋規制益為精詳矣遼遼史百官志五京諸使職名某京某使王崇重熙中為上京鹽鐡使王圻續文獻通考遼南面官上司有鹽鐡使司金金史百官志山東鹽使司與寶坻滄解遼東西京北京凡七司使一員正五品他司皆同副使二員正六品他司皆一員判官三員正七品泰和作四員寶坻解州設二員餘司皆一員掌幹鹽利以佐國用管勾二十二員正九品寶坻解西京則設六員北京遼滄州則設四員同管勾都同監皆省掌分管諸場發賣收納恢辦之事同管勾五員都監八員監同各七員知法一員司吏二十三人女直三人漢人十九人譯人一人抄事公使四十人他司皆同謹按唐之鹽鐡使宋之茶鹽司雖領鹺政而名兼茶冶與今運鹽使司所掌稍有異同至金立鹽使司則即今運鹽使司之職金制鹽使司有副使有判官則即今之運副運判矣管勾二十二員掌分管諸場發賣收納恢辦之事則即今之各場鹽課司大使而都監監同知法當即今之經歷知事矣元元史百官志兩淮都轉運鹽使司秩正三品國初兩淮內附以提舉専掌鹽課之事至元十四年始置司于揚州使二員正三品同知二員正四品副使一員正五品運判二員正六品經歷一員從七品知事一員從八品照磨一員從九品三十年悉罷所轄鹽司以其屬置場官大德四年復置批驗所于真州采石等處鹽場二十九所場司令一員從七品司丞一員從八品管勾一員從九品辦鹽各有差批驗所每所提領一員正七品大使一員正八品副使一員正九品掌批驗鹽引兩浙都轉運鹽使司秩正三品使二員同知二員運判二員經歷知事各一員照磨一員至元十四年置司杭州大德三年定其産鹽之地立場有差仍于杭州嘉興紹興溫台等處設檢校四所専驗鹽袋毋過常度鹽場三十四所每所司令一員從七品司丞一員從八品管勾一員從九品福建等處都轉運鹽使司秩正三品使二員同知二員通判二員經歷知事各一員照磨一員至元十四年始置市舶司領煎鹽徴課之事二十四年改立鹽運司二十九年罷立提舉司大德四年復為運司九年復罷併入元帥府兼掌之十年復立都提舉司至大四年復升運司徑𨽻行省凡置鹽場七所每所司令一員從七品司丞一員從八品管勾一員從九品廣東鹽課提舉司至元十三年始從廣州煎辦鹽課十六年𨽻江西鹽鐡茶都轉運司二十二年併入宣慰司二十三年置市舶提舉司大德三年改廣東鹽課提舉司提舉一員從五品同提舉一員從六品鹽提舉一員從七品鹽場十三所每所司令一員從七品司丞一員從八品管勾一員從九品四川茶鹽轉運司成都鹽井九十五處散在諸郡山中至元二年置興元四川轉運司専掌煎熬辦課之事八年罷之十六年復立轉運司十八年併入四川宣慰司十九年復立陕西四川轉運司統轄諸課程事二十二年置四川茶鹽運司秩從三品使一員同知副使運判各一員經歷知事照磨各一員鹽場一十二所每所司令一員從七品司丞一員從八品管勾一員從九品廣海鹽課提舉司至元三十一年置専職鹽課秩正四品都提舉二員從四品同提舉二員從五品副提舉二員正六品知事一員提控案牘一員續文獻通考大都河間等路山東東路都轉運鹽使司設官與兩淮等處同大都常以户部尚書充使山東以中書以左右部兼使俱頒分符印巡行郡邑以防私鹽之弊大都河間二十二所設官與前同山東東路鹽場一十九所設官與前同河東陕西等處鹽司所屬解鹽場管勾一員正九品同管勾一員從九品河東等處解鹽提領所正提領一員從八品副提領一員從九品安邑等處解鹽管民提領所正提領設官同前檢校批驗所至正二年中書省講䆒鹽法奏准于杭州嘉興紹興溫台四處各置檢校批驗所直𨽻運司専掌批驗鹽商引冒均平袋法稱盤等事每所置檢校批驗官一人相副官一人謹按元百官志載兩淮兩浙福建三都轉運鹽使司廣東鹽課提舉司四川茶鹽轉運司廣海鹽課提舉司凡六而元食貨志及續文獻通考又載大都河間山東陕西諸運司百官志乃不載不知罷于何年也又考金史百官志有運副運判而無運同知元百官志載同知二員為今運同之所昉也又考元食貨志載御史臺准陕西臺偹咨監察御史建言近䝉委巡歷奉元東道至元元年各州縣户口額辦鹽課又載福建山東俵賣食鹽病民為甚行省監察御史亷訪司與該有司冝同訓䆒又載御史臺准江南諸道行御史臺偹咨監察御史建言廣東道鹽額凡此皆以諸道行臺御史兼理鹽法與眀制巡鹽御史相近眀以御史巡鹽即元食貨志所云委巡也雖元之行臺統一道之事鹽法非其専掌而實為眀巡鹽御史所自始今各省鹽政多以部院官充或仍由都察院奏𣲖雖沿眀制實則開于元也至于金史運副運判之下即為管勾管勾之下又有同管勾都監等官管勾分司諸場則為今之鹽課大使可知元于各場司令之下又有司丞司丞之下乃為管勾則元之司令如今鹽課大使而管勾秩又較卑矣眀眀史職官志都轉運鹽使司都轉運使一人從三品同知一人從四品副使一人從五品判官無定員從六品其屬經歷一人從七品知事一人從八品庫大使副使各一人所轄各場鹽課司大使副使各鹽倉大使副使各批驗所大使副使並一人俱未入流都轉運使掌鹽盬之事同知副判分司之都轉運鹽使司凡六曰兩淮曰兩浙曰長蘆曰河東曰山東曰福建分司十四泰州淮安通州𨽻兩淮嘉興松江寧紹溫台𨽻兩浙滄州青州𨽻長蘆膠萊濵樂𨽻山東解鹽東場西場中場𨽻河東分副使若副判蒞之督各場倉鹽課司以總于都轉運使以奉巡鹽御史或鹽法道臣之政令福建山東無巡鹽御史鹽課提舉司提舉一人從五品同提舉一人從六品副提舉無㝎員從七品其屬吏目一人從九品庫大使副使並一人所轄各鹽倉大使副使各場各井鹽課司大使副使並一人提舉司凡七曰四川曰廣東海北亷州曰黑鹽井椘雄曰白鹽井姚安曰安寧曰五井大理曰察罕諾爾舊作腦兒今改又有遼東煎鹽提舉司提舉正七品同提舉正八品副提舉正九品其職掌皆如都轉運司眀初置都轉運司于兩淮吳元年置兩浙都轉運司于杭州定都轉運使秩正三品設同知正四品副使正五品運判正六品經歷正七品知事正八品照磨綱官正九品鹽場設司令從七品司丞從八品百夫長省注洪武二年置長蘆河東二都轉運司及廣東海北鹽課提舉司尋又置山東福建二都轉運司三年又于陕西察罕諾爾之地置鹽課提舉司後漸增置各處建文中改廣東提舉為都轉運司永樂初復故十四年初命御史巡鹽景泰三年罷長蘆兩淮巡鹽御史令撫按官兼理已復遣御史其無御史者分按察司理之又洪武中于四川置茶鹽都轉運司洪武五年置設官如都轉運鹽使司十年罷納奚白渡二鹽馬司洪武五年置以常選官為司令內史為司丞十三年罷尋復置十五年改設大使副使各一人後並革又有順龍鹽馬司亦革批驗所大使一人副使一人掌驗茶鹽引續文獻通考太祖丙午年初置都轉運鹽使司于兩淮吳元年置于兩浙洪武二年置于河東陕西河間長蘆福建五年置四川納奚白渡二鹽馬司及四川茶鹽都轉運司又眀年革茶鹽都轉運可十三年定都轉運使正四品後改從三品鹽課提舉司國初已漸增設建文中改廣東鹽課司為都轉運鹽使司又有煎鹽提舉司制如府謹按鹽盬之興乃天地自然之利而為民生日用所必需其經制而攝理之于以通商惠民而上供國家之課則在于立法用人之善自鹽絺致貢見于夏書成周有山澤之賦有商賈之阜貨通財雖不専為鹽設而鹽實在其中至漢興鹽鐡置官唐多設鹽鐡之使惟劉晏為最善其上鹽法輕重之冝立常平鹽法輕稅减價而鹽課遂以日增其立法差善宋代鹽官或以監司兼管或特設提舉而轉兼監司之事纍朝迭有更改而鹽法迄無㝎制眀始立都轉運使鹽道鹽提舉等官而以巡鹽御史統之其弊也委用不得其人重為稅額復加之以格外之徴求倚勢作威剝商病民窮村逺壤至有經月不得鹽食者私販之禁既重民或紏徒挺械冒禁取利盜劫縱橫肆無忌畏而官亦無以禁止之蓋至于商民俱困而國家亦不得收其利矣我朝正定鹽法建官綜理各場大使専掌政令分轄于運司運判總屬于運鹽使鹽法道而以鹽政受其成至鹽政之差不専出于御史或由特簡部院及內務府官員兼充或定制以督撫兼理因地制冝綱維整肅復以時㑹計其奏課酌劑其價值之重輕與夫鹽法之冝更革者奏聞裁定所以制海場池井之冝以資生計于編氓者規制靡不詳偹皇上愛民恤商同仁普利苟所司有朘商自肥者立繩之以法以故羣商鼓舞享豐盈優渥之澤于無窮蓋法意精良洵非前代所可幾及也欽定厯代職官表卷六十一
