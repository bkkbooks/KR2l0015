  text: 欽定四庫全書欽定厯代職官表卷十九
  hash: sha256:da0678c7c0880a0f71f0f37cfd1b0c66f5d72a96c160236a31e230950d8db8f3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2l0015_WYG_025-1a, image: WYG0601/WYG0601-0375a.png}
body:
  text: 都察院下厯代建置下六科給事中制國朝定制𨽻都察院已詳具上卷官內此卷専叙厯代沿革三代未置秦晉書職官志給事中秦官也謹案給事設官雖始於秦而考晏子外篇云偏柎寄於路寢得為地下之臣擁扎􅋵筆給事宫殿中右陛之下願以某日送未得君之意也則是給事宫殿擁札􅋵筆已肇後世給事之職矣漢漢書百官公卿表給事中亦加官所加或大夫博士議郎掌顧問應對位次中常侍漢官解詁云掌侍從左右無員常侍中冊府元龜漢儀注曰諸給事中日上朝謁平尚書奏事分為左右以有事殿中故曰給事中多名儒國親為之掌左右顧問杜佑通典給事中加官也秦置漢因之位次中常侍侍中黃門無員漢東京省謹案給事中在秦漢為加官初無員數漢書所載曽膺此職者如韋賢匡衡蕭望之劉向魏相孔霸平當張禹龔勝谷永金敞金欽梁邱賀杜延年終軍東方朔蔡義夏侯勝丙吉師丹辛慶忌張猛蔡千秋之類甚衆考其本職或以博士或以謁者或以諫大夫或以前將軍或以右將軍或以宗正或以大中大夫或以光祿大夫或以御史大夫或以關內侯蓋皆如今之內廷行走而非其官號故自兩府九卿中二千石一千石以至比六百石皆得為之與齊隋以降設為額闕者不同然所掌在平尚書奏事則後來封駮之任亦已權輿於此矣後漢書桓談列傳宋宏薦談拜議郎給事中後漢書鄭衆列傳永平中辟司空府以明經給事中再遷越騎司馬復留給事中謹案通典稱東京省給事中而列傳尚屢見其職疑其初亦嘗承長安舊制章帝以還始行省廢通典蓋據其後而言之耳三國通典魏代復置給事中或為加官或為正員謹案據杜佑所言則給事中在曹魏時已有正員然考三國志裴松之注所載如邯鄲淳蘇林俱以博士給事中虞松之以中書令給事中皆有本職是魏世亦當如漢制但為加官矣晉晉書百官志給事中魏世復置至晉不改在散騎常侍下給事黃門侍郎上無員唐六典晉氏無加官亦無常員𨽻散騎省位次散騎常侍晉令云品第五武冠絳朝服歐陽詢藝文類聚束晳集曰員外侍郎及給事冗從皆是帝室茂親或貴遊子弟謹案晉給事中設有定品冊府元龜載武帝授張建陳邵二詔俱不言以某官給事中可知並非加官是給事中之為正員實自晉始也至漢魏以後尚有給事黃門侍郎應劭所謂日暮入對青瑣門拜謂之夕郎者即指此官而言其位本在給事中之下至隋去給事之名但稱黃門侍郎其後遂為三省長官而給事中反在其下逮三省既罷其官已久廢不置今所存者獨給事中而已乃世俗相沿猶以夕郎為給事中故事殊考之未審矣宋齊梁陳唐六典給事中宋齊𨽻集書省位次諸散騎下奉朝請上梁陳秩六百石品第七通典宋齊給事中𨽻集書省梁陳亦掌獻納省諸聞奏宋書百官志給事中無員謹案南史王韶之傳稱韶之徴為祠部尚書加給事中是宋世亦以為加官也南齊書百官志給事中奉朝請皆集書省職置正書令史朝散用衣冠之餘人數猥積永明中奉朝請至六百餘人謹案漢時給事中已多用名儒國親為之如韋賢匡衡以經術劉向以宗室金敞金欽以勳戚皆由此入侍禁中然所擇尚能得人也至晉而専用貴遊漸失初意故冊府元龜所引束晳集又有若悉從髙品則非本意若精鄉議則必有損之語此四語藝文類聚未引餘俱相同其冗濫可以概見及南齊而人數更多殆由不置員額故除授者衆未為髙選歟隋書百官志梁集書省有給事中掌侍從左右獻納得失省諸奏聞文書意異者隨時為駮陳承梁皆循其制官謹案唐以後給事中杜佑謂用隋之職然觀隋志所載梁制則駮正違失其職掌亦不始于隋也北魏魏書官氏志給事中給事從第三品上中給事從第三品中太和二十三年改制中給事中從第五品給事中從第六品唐六典後魏史闕其員初從第三品上太和末從第六品上魏書楊播列傳父懿為選部給事中播為北部給事中魏書李世安列傳遷主客給事中魏書李沖列傳遷內祕書令南部給事中謹案北魏有中給事中給事中給事之名其品第亦分髙下正如眀制之有都左右也其時固已設為正闕而魏書鄭羲傳載羲為太常卿加給事中太和以後太常第三品而得下兼從第六品是魏世亦有加官矣至魏之給事中史不言𨽻何省而選部給事中北部給事中主客給事中南部給事中志亦均失載其名殆各以職事而為區别耳北齊通典北齊給事中亦𨽻集書省凡六十人唐六典北齊集書省署給事中六十員從第六品上隋書百官志後齊集書省掌諷議左右從容獻納給事中六人謹案自秦漢以後給事中並無員額其設為定闕實自北齊始然考唐六典通典皆作六十人獨隋志作六人多寡不同疑隋志傳刋脫誤也後周唐六典後周天官府置給事中士六十人掌理六經及諸文志給事于帝左右其後六官之外又别置給事中四人通典後周官品正二命天官給事中士隋隋書百官志髙祖受命置門下省有給事二十人掌部從朝直開皇六年吏部又别置給事郎散官畨直常出使監檢煬帝即位移吏部給事郎名為門下之職位次黃門下置員四人從五品省讀奏案唐六典隋初置給事中二十人煬帝名給事郎減置四人從第五品謹案給事中厯代多𨽻集書省至隋始定為門下之官而省讀奏案正與今抄發本章相近則六科職掌所沿亦本于隋代也唐舊唐書職官志給事中四員正五品上隋曰給事郎置四員位次黃門侍郎武德定令曰給事中龍朔改為東臺舍人咸亨復掌陪侍左右分判省事凡百司奏抄侍中審定則先讀而署之以駁正違失凡制勑宣行大事則稱揚德澤褒美功業覆奏而請施行小事則署而頒之凡國之大獄三司詳決若刑名不當輕重或失則援法例退而裁之凡發驛遣使則審其事宜與黃門侍郎給之其緩者給傳即不應給罷之凡文武六品以下授職官所司奏擬則校其仕厯淺深功狀殿最訪其德行量其才藝若官非其人理失其事則白侍中而退量焉若𢎞文館圖書之繕寫讎校亦課而察之凡天下寃滯未申及官吏刻害者必聽其訟與御史中書舍人同計其事宜而申理之録事四人從七品上主事四人從八品下令史十一人書令史二十二人甲庫令史七人傳制八人亭長六人掌固十人修補制勑匠五人趙璘因話録北省班諫議在給事中上中書舍人在給事中下程大昌雍録等之其為兩省焉髙下固有定序而立班之時諫議在給事上者有為為之也㑹昌二年牛僧孺等奏曰六典諫議在隋從五品下今正五品上自大厯間升門下中書侍郎為正三品兩省遂闕四品望升諫議為正四品以補其闕詔從其奏則是諫議班乎給事之上者偶因大厯間四品闕官而從五品越取諌議充入四品以補其闕也以品叙班故諫議越立給事之上也然而班雖暫上而其進遷之序猶仍舊不改于是方為諌議則班乎給事之上以其嘗從五品而升補四品故也及其進遷則諌議復在給事之下以其官品同在五品而位序在下故也此上坡下坡之詳也至周顯德五年敕諫議依舊正五品上班在給事下其說曰諌議雖升班給事之上及其遷拜官雖叙遷位則降等故改正焉通典唐改給事郎為給事中前代雖有給事中之名非今任也今之給事中蓋因秦之名用隋之職馬端臨文獻通考有侍中給事中之官而未嘗司宫禁之事是名內而實外也唐以來以侍中為三公唐以處勳臣又以給事中為封駁之官皆以外庭之臣為之並不預宫中之事白居易長慶集給事中之職凡制敕不便于時者得封奏之刑獄有未合于理者得駁正之天下寃滯無告者得與御史糾理之有司選補不當者得與侍中裁退之率是而行號為稱職新唐書百官志凡百司奏抄侍中既審則給事中駁正違失詔敕不便者塗竄而奏還謂之塗歸李藩列傳藩遷給事中制有不便就敕尾批却之吏驚請聫它紙藩曰聫紙是牒豈得云批勑耶田錫論軍國機要朝廷大體疏臣又讀唐書見給事中得以封駮詔書封謂封還詔書而不行駮謂駮正詔書之所失謝維新合璧事類晏公類要貞元中上命盧杞為饒州刺史給事郎袁髙宿直當草制遂執以謁宰相宰相不悅遂改命舍人草制按此則給事宿直亦草制耶當考謹案唐制凡詔㫖及百司奏疏由中書宣出者皆當經給事中書讀然後付外奉行今中外奏章既上㫖下內閣者日以給事中一人詣閣祇領備録其副以授所司即其例也惟草制乃中書舍人事不關給事中故袁髙不肯為盧杞作詔謝維新頗以為疑然考六典稱中書進畫事繁或以諸司官兼者謂之兼制誥通鑑載髙此事謂宰相改命它舍人為之既曰它舍人足知髙所行者實舍人之事其殆以給事中而兼司詔命者歟五季五代史張允列傳廢帝皇子重美為河南尹掌六軍以允剛介乃拜允給事中為六軍判官五代史賈緯列傳緯除知制誥纍遷中書舍人諫議大夫給事中復為修撰漢隱帝時詔與王伸竇儼等同修晋髙祖出帝漢髙祖實録謹案五季臺省雖沿舊制然多不舉其職據二傳所載給事中大扺皆兼他官非能専司封駮之任也宋宋書職官志給事中四人分治六房掌讀中外出納及判後省之事若政令有失當除授非其人則論奏而駮正之凡章奏日録目以進考其稽違而糾治之故事詔㫖皆付銀臺司封駮官制行給事中始正其職而封駮司歸門下元豐五年五月詔給事中許書畫黃不書草著為令六月給事中陸佃言三省密院文字已讀者尚令封駮慮失之重復詔罷封駮房六月詔駮正事赴執政禀議七年有㫖舉駮事依中書舍人封還詞頭例既而令禀議如初給事中韓忠彥言給舍職位頗均一則不禀白而聽封還一則許舉駮而先禀議於理未允且朝廷之事執政所行職當封駮則已與執政異自當求决于上尚何禀議之有詔從之紹聖四年葉祖洽言兩省置給舍使之互察今中書舍人兼權封駮則給事中之職遂廢詔特㫖書讀不回避餘互書判元符三年翰林學士曽肇言門下之職所以駮正中書違失近日給事封駮中書録黃乃令舍人書讀行下隳壞官制有損治體願正紀綱為天下後世法重和元年給事中張叔夜言凡命令之出中書宣奉門下審讀然後付尚書頒行而密院被㫖者亦録付門下此神宗官制也今急速文字不經三省而諸房以空黃先次書讀則審讀殆成虛設矣乞立法禁從之凡分案五曰上案主寶禮及朝㑹所行事曰下案主受發文書曰封駮案主封駮及試吏校其功過曰諌官案主關報文書曰記注案主録起居注其雜務則所分案掌焉紹興以後止除二人或一人合璧事類㑹要淳化四年以右諌議大夫魏庠知制誥柴成務同知給事中事凡制敕有所不便宜凖故事封駮九年詔停廢知給事封駮公事自是始以封駮司𨽻銀臺王栐燕翼貽謀録唐朝職掌因五季之亂遂至錯亂或廢不舉給事中掌封駮不可一日無皇朝淳化四年太宗皇帝推考廢職始于唐末乃命魏庠柴成務同知給事中未幾𨽻銀臺通進司為封駮司陳恕乞鑄印命取門下印用之因改其名為門下封駮司文獻通考元豐五年四月知諫院舒亶試給事中自是給事始除為職事官王應麟玉海元豐官制門下增設後省以左散騎常侍左諌議大夫左司諫左正言給事中為門下後省設案六建炎三年詔諌院别置局不𨽻兩省又因後制置門下後省以給事中為長官四員為額掌封駮書讀設案四謹案宋初給事中皆以他官兼之自元豐改制始有專職其後復置門下外省以給事中為長官則已别為一曹故其官不隨省俱廢又唐時中書舍人分署尚書六曹事宋則以給事中分治六房明之分給事中為六科其源蓋本於此也又案唐宋臺諫為兩官臺則侍御史殿中侍御史監察御史諫則諫議大夫左右拾遺補闕左右司諫正言諫議大夫秦漢以來皆有之屬門下省拾遺補闕唐垂拱中始置宋端拱初改為司諫正言俱分𨽻兩省掌侍從規諌宋世亦稱為諫院而臺官則專主糾劾官邪各分職守宋真宗詔亦有令諫官奏論憲臣彈舉之文洪邁容齊隨筆謂臺諫官例不往來相見蓋職事各殊故諌官御史得以互相糾駮也至給事中雖與諫議同居門下而其職但主封駮書讀亦與諫議不同自後世不置三省而諌議司諫正言之在門下者隨之俱廢諌院已久無其官明初立制復以其職併入於科道故邱濬有給事中實兼前代諫議補闕拾遺之語見大學衍義補而流俗相沿遂稱御史為臺諫給事中為給諫亦殊未考設官之本制矣葉夢得石林燕語舍人於中書事皆得於檢後通書押而給事中則但書録黃而已舒道信為給事中以為言王文恭為相時以白上神宗曰造令與行令職分宜别給事中不當書草遂著為令嶽珂愧郯録唐李藩在瑣闥以筆塗詔謂之塗歸國朝嚴重此制銀臺既設封駮亦許繳奏元豐改官名門下省則有給事中中書省則有中書舍人然中興以後三省合為一均為後省封還或同銜則曰未敢書讀書行否則析之其辭止此而已珂案典故元祐四年五月乙酉權給事中梁燾繳蒲宋孟知虢州及胡宗回范鍔孫升杜天經等放罪罰金指揮其駮文皆曰所有録黃謹具封還伏乞聖慈特付中書省别賜取㫖施行語意乃與今異以時考之蓋官制既行分省治事謹審覆揆議之訓故其制如此耳李心𫝊建炎以來朝野雜記紹興二年韓世忠賞功文字給事中賈安宅除工部侍郎門下後省闕官乃詔檢正李與權書讀此事亦前所未有遼遼史百官志給事中聖宗統和二年見給事中郭嘏王圻續文獻通考遼南面門下省有給事中次于散騎常侍金金史百官志給事中從五品屬宣徽院金史選舉志承安四年勑宰臣曰凡除授恐未盡當今無門下省雖有給事中而無封駮司若設之使于擬奏未授時詳審得當然後授之可也乃立審官院凡所送令詳審者以五日內奏或申省謹案金世立諫院置左右諫議大夫左右司諫左右補闕拾遺等官而無門下省以主封駮故給事中獨無所掌至别設審官院以代其職與厯代不同然門下省既廢仍置給事中一官其原實自金始也元元史百官志給事中秩正四品至元六年始置起居注左右補闕掌隨朝省臺院諸司凡奏聞之事悉記録之如古左右史十五年改升給事中兼修起居注左右補闕改為左右侍儀奉御兼修起居注皇慶元年升正三品延祐七年仍四品後定置給事中兼修起居注二員右侍儀奉御同修起居注一員左侍儀奉御同修起居注一員令史一人譯史四人通事兼知印一人謹案唐宋給事中與起居郎同為門下省官而宋給事中所掌五案其一曰記注案則主録起居注元以給事中兼修起居注蓋沿宋制也明凡日朝科員輪班一人立殿左右珥筆記㫖亦猶記注之任今制記注官以翰林充詳見起居注表凡御門聽政則記注官四人自西階升立御榻之右而給事中御史滿漢各二人以次侍立階下凡章疏之出科者鈔發既畢以所奉諭㫖及原疏别録二通敬謹校對鈐蓋印信一送內閣曰史書一貯科垣曰録書職掌所存視前代益為詳慎矣明明史職官志吏户禮兵刑工六科各都給事中一人正七品左右給事中各一人從七品給事中吏科四人户科八人禮科六人兵科十人刑科八人工科四人並從七品掌侍從規諫補闕拾遺稽察六部百司之事凡制勑宣行大事覆奏小事署而頒之有失封還執奏凡內外所上章疏下分類鈔出參署付部駁正其違誤吏科凡吏部引選則掌科同至御前請㫖外官領文憑皆先赴科畫字內外官考察自陳後則與各科具奏拾遺糾其不職者户科監光祿寺嵗入金榖甲字等十庫錢鈔雜物與各科兼蒞之皆三月而代內外有陳乞田土隱占侵奪者糾之禮科監訂禮部儀制凡大臣曽經糾劾削奪有玷士論者記録之以核贈諡之典兵部凡武臣貼黃詰勑本科一人監視其引選畫憑之制如吏科刑科每嵗二月下旬上前一年南北罪囚之數嵗終類上一嵗蔽獄之數閲十日一上實在罪囚之數皆憑法司移報而奏御焉工科閲試軍器局同御史巡視節慎庫與各科稽查寶源局而主德闕違朝政得失百官賢佞各科或單疏専逹或公疏聫署奏聞雖分𨽻六科其事屬重大者各科皆得通奏但事屬某科則列某科為首凡日朝六科輪一人立殿左右珥筆記㫖凡題奏目附科籍五日一送內閣備編纂其諸司奉㫖處分事目五日一注銷核稽緩內官傳㫖必覆奏復得㫖而後行鄉試充考試官㑹試充同考官殿試充受卷官冊封宗室諸藩或告諭外國充正副使朝參門籍六科流掌之遇决囚有投牒訟寃者則判停刑請㫖凡大事廷議大臣廷推大獄廷鞫六掌科皆預焉明初統設給事中正五品後數更其秩與起居注同洪武六年設給事中十二人秩正七品始分為六科每科二人鑄給事中印一推年長者一人掌之九年定給事中十人十年𨽻承勑監十二年改𨽻通政司十三年置諫院左右司諫各一人正七品左右正言各二人從七品十五年又置諫議大夫以兵部尚書唐鐸為之尋皆罷二十二年改給事中為源士增至八十一人初魏敏卓敬等凡八十一人為給事中上以其適符古元士之數改為元士至是又以六科為事之本源改為源士未幾復為給事中二十四年更定科員每科都給事中一人正八品左右給事中二人從八品給事中共四十人正九品各科分設員數如前所列建文中改都給事中正七品給事中從七品不置左右給事中增設拾遺補闕成祖初革拾遺補闕仍置左右給事中亦從七品尋改六科置於午門外直房蒞事六科衙門舊在磚門內尚寶司西永樂中災移午門外東西每夜一科直宿宣德八年增户科給事中専理黃冊孫承澤春明夢餘録洪武十七年九月給事中張文輔言自九年十四日至二十一日八日之間內外諸司奏劄凡一千六百六十計三千二百九十一事上諭廷臣曰朕日總萬幾豈能一一周遍苟政事有失宜豈惟一民之害將為天下之害卿等能各悉心封駮則庶事自無不當此六科稽查號件封駁章奏之例也夏言桂洲奏議六科額設都左右給事中給事共五十八員中間事有煩簡故員有增損然以司諌諍備獻納則六科之職均也祖宗以來額員俱備後來乃有不盡補者然遇都左右給事中缺五員以上則必奏請升補各科給事中缺十五六員以上則必奏請選補永著為例又凡給事中有缺止於進士年三十以上者考選奏補宏治間始以行人博士兼選正德間始以在外推官知縣照御史例選補正德末年大臣畏忌新進敢言乃始盡廢進士考選之例謹案給事中在秦漢本加官其後置為正員或屬集書省或屬門下省規制不一明初不設門下省嘗以給事中屬之通政司後遂自為一曺稱六科都給事中凡章疏案牘得與部院衙門平列逮其末季廷論紛囂科道雖並為言官實則黨援相持務彼此攻擊以求勝春明夢餘録載管志道疏謂拾遺一節六科拾御史之已升者一人則十三道亦拾給事中之已升者一人迹似調停實爭門户臺垣水火即此而大概可知特御史尚聽考察于堂官而給事中以無所𨽻屬益得恣情自肆如趙興邦在兵科至以紅旗督戰敢干預兵事機宜侵撓國政其流弊復何所底止我朝初設六科尚沿明志未遑釐正世宗憲皇帝特命改𨽻都察院整綱飭紀班序秩然體統益昭嚴肅洵當萬世恪遵之令典也欽定厯代職官表卷十九
