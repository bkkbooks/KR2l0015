品本把十人大定二年出身依不入寢殿小底例段匹庫都監正九品同監從九品本把十二人金銀庫都監正九品本把八人雜物庫都監正九品同監從九品本把八人每庫知書各二人宫闈局舊名宫闈司大定二年改為局舊設令丞改為使副提點正五品使從五品副使六品掌宫中閣門之禁率隨位都監同監及內直各給其事直長正八品內直一百七十人後作百七十九人王圻續文獻通考金內侍職見於衛尉司內內侍局中常侍見於宣徽使內其事多分領於宣徽使而內侍省不設謹案金內侍諸職多領於宣徽使而內侍省不設深得成周奄人領於冡宰漢代宦官屬於少府之遺意今考宣徽使尚衣尚食等局即殿中監之六尚也御藥內藏庫金銀庫即內侍省之御藥房內庫使也是宣徽一院合二省而兼理之與今日內務府之職掌最為吻合續文獻通考金太府監官屬典給署屬焉典給署本鈎盾署古屬司農寺金初曰鉤盾使明昌三年改掌宫中所用薪炭氷燭金史百官志少府監尚方織染文思裁造文繡等署𨽻焉泰和四年選能幹官兼儀鸞局近上官監正四品少監從五品丞二員從六品大定十一年省二十一年復置掌邦國百工營造之事尚方署令從六品丞從七品掌金銀器物亭帳車輿牀榻簾席鞍轡傘扇及裝釘之事大定二十年令不専除人令人兼直長正八品圖畫署明昌七年入祗應司令從六品丞從七品掌圖畫縷金匹直長正八品明昌三年罷裁造署令從六品丞從七品掌造龍鳯車具亭帳鋪陳諸物宫中隨位牀榻屏風簾額絛結等及陵廟諸物并省臺部內所用物泰和令有繪畫之事直長從八品明昌三年省裁造匠六人針工婦人三十七人文繡署令從六品丞從七品掌繡造御用并妃嬪等服飾及燭籠照道花卉貞祐二年止設官一員直長正八品繡工一人都繡頭一人副繡頭一人女四百九十六人內上等七十人次等四各二十六人文思署明昌七年省入祗應司令從六品丞從七品掌造內外局分印合傘浮圖金銀等尚輦儀鸞局車具亭帳之物并三國生日等禮物造織染文繡兩署金線直長正八品明昌三年省去元元史百官志宣徽院秩正三品掌供玉食凡稻粱牲牢酒醴蔬果庶品之物燕享宗戚賓客之事及諸王宿衛齊哩克蒙古語兵也原作怯憐今改正口糧食蒙古萬户千户合納差發係官抽分牧養孳畜嵗支芻草粟菽羊馬價直收受闌遺等事與尚食尚藥尚醖三局皆𨽻焉所轄內外司屬用人則自為選大都尚飲局秩從六品掌醖造上用細酒大都尚醖局秩從六品掌醖造諸王百官酒醴大都醴源倉秩從六品掌受香莎蘇門等酒材糯米鄉貢麴藥以供上醖及嵗賜諸王百官者尚珍署秩從五品掌收濟寧等處田土子粒以供酒材安豐懷逺等處稻田提領所秩從九品掌稻田布種嵗收子粒轉輸醴源倉諸物庫秩從七品掌出納闌遺監秩正四品掌不闌奚人口頭匹諸物尚食局秩從五品掌供御膳及出納油麵酥蜜諸物大都生料庫秩從五品大都上都柴炭局各一尚收局秩從五品沙糖局秩從五品掌沙糖蜂蜜煎造及方貢果木豐儲倉秩從九品大使一員掌出納車駕行幸支持膳羞謹案元宣徽院兼統光祿寺諸職與列代異而醴源倉之供上醖尚食局之供御膳則仍為古殿中監之職其柴炭沙糖諸局亦與都虞司茶膳房諸職相近故並録之又元太醫院屬官有御藥局使副亦即今內藥房之職併識於此元史百官志提舉右八作司秩正六品掌出納內府漆器紅甕梢隻等並在都局院造作等物提舉左八作司秩正六品掌出納內府氊貨桞器等物謹案左右八作提舉司為工部屬官以其職掌出納內府諸物故互見於此其職近廣儲營造二司之所掌也工部屬官又有晉寧路冀寧路南宫中山等路織染提舉司如今織造之比文繁不具載附識其大概于此元史百官志將作院秩正二品掌成造金玉珠翠犀象寶貝冠佩器皿織造刺繡段匹紗羅異樣百色造作至元三十年始置諸路金玉人匠總管府秩正三品掌造寶貝金玉冠帽繫腰束帶金銀器皿并總諸司局事異樣局總管府秩正三品異樣紋繡提舉司綾錦織染提舉司紗羅提舉司秩從五品紗金顔料總庫秩從九品續文獻通考江淮等處財賦都總管府杭州織染局大使副使相副官各一員黃池織染局大使副使相副官各一員建康織染局大使副使相副官各一員元史百官志太府監秩正三品領左右藏等庫掌錢帛出納之數中統四年置至元四年為宣徽太府監凡內府藏庫悉𨽻焉八年升正二品大德九年改為院秩從二品院判參用宦者至大四年復為監內藏庫提點秩從五品掌出納御用諸王段匹納竒實原作納失今改正紗羅絨錦南錦香貨諸物右藏提點四員掌收支金銀寶鈔濟遜蒙古語顔色也原作只孫今改正段匹水晶瑪瑙玉璞諸物至元十九年置左藏提點四員掌收支常課和買紗羅布絹絲綿絨錦木綿鋪陳衣服諸物至元十九年置大都留守司秩正二品掌守衛宫闕都城調度本路供億諸務兼理營繕內府諸邸都宫原廟尚方車服殿廡供帳內苑花木及行幸湯沐宴遊之所門禁關鑰啓閉之事至元十九年罷宫殿府行工部置大都留守司兼本路都總管府治民事并少府監歸留守司皇慶元年别置少府監延祐七年罷少府監復以留守兼監事其屬附見修內司秩從五品掌修建宫殿及大都造作等事祗應司秩從五品掌內府諸王邸第異巧工作修禳應辦寺觀營繕器物局秩從五品掌內府宫殿京城門户寺觀公廨營繕及御用各位下鞍轡瑚格原作忽哥今改正轎子帳房車輛金寶器物凡精巧之藝雜作匠户無不𨽻焉中統四年始立御用器物局受省劄至元七年改為器物局器備庫秩從五品掌殿閣金銀寶器二千餘事至元二十七年置甸皮局秩正七品嵗辦熟造紅甸羊皮二千有竒儀鸞局秩正五品掌殿庭燈燭張設之事及殿閣浴室門户鎖鑰苑中龍舟圈檻珍異禽獸給用內府諸宫太廟等處祭祀庭燎縫製簾帷灑掃掖庭和用監秩正三品掌出納皮貨衣物之事資用庫提點秩正五品至元二年置𨽻太府十年𨽻和用雜造雙線局秩從八品掌造內府皮貨鷹帽等物熟皮局掌每嵗熟造野獸皮貨等物軟皮局掌內府細色銀鼠野獸諸色皮貨斜皮局掌每嵗熟造內府各色野馬皮胯中尚監秩正三品掌領資成庫氊作供內府陳設帳房帟幕車輿羽衣之用資成庫秩從五品掌造氊貨至元二年置𨽻太府二十三年始歸於監章佩監秩正三品掌宦者都古爾齊蒙古語盈滿也原作迭古兒赤今改正所收御服寶帶御帶庫秩從五品掌繫腰偏束等帶併縧環諸物供奉御用以備賜豫異珍庫掌御用珍寶后妃公主首飾寶貝尚供總管府秩正三品掌守護東涼亭行宫及遊獵供需之事雲需總管府秩正三品掌守護察罕諾爾蒙古語察罕白也諾爾池也原作察哈腦兒今改正行宫及行營供辦之事謹案元廢少府監盡以其事歸大都留守與晉哀帝時罷少府歸併丹陽尹其制正同但留守司職辦工作其內府庫藏則皆領于太府監是亦與後魏北齊之罷少府而歸併太府者體製相似太府左右藏自古有之以供邦國之經費唯元則盡為供御之物與古又少異也元又有和用監中尚監章佩監領各局諸庫為自古所未有今廣儲六庫營造八作之所司差為相近尚供雲需兩總管府掌行宫及遊獵之事則今都虞司及行宫總管皆其職也元官隨處皆置提舉諸路打捕鷹房民匠皆有總管府以理之亦不盡為內務府之職故略而不載焉明續文獻通考明初設文思院等衙門掌造作諸事後裁革以其事歸工部凡少府將作等監皆不設明史職官志宦官十二監司禮監內官監御用監司設監御馬監神宫監尚膳監尚寶監印綬監直殿監尚衣監都知監四司惜薪司鐘鼓司寶鈔司混堂司八局兵仗局銀作局浣衣局巾帽局針工局內織染局酒醋麵局司苑局所謂二十四衙門也其外有內府供用庫司鑰庫內承運庫十庫甲字乙字丙字丁字戊字承運廣盈廣惠贓罰御酒房御藥房御茶房牲口房刻漏房更鼓房甜食房彈子房靈臺縧作盔甲厰安民厰提督東厰提督西厰織造市舶監督倉場不可勝紀謹案明代初設少府後以其事歸工部而少府不設初工部屬官有將作監後改為營繕所又有提督易州山厰掌督御用薪炭之事是工部屬中實有內務府都虞營造二司之職明初設宣徽院後改為光祿寺以尚食尚醖二局𨽻之又移太常之供需庫𨽻之光祿又有孳牧所後改司牧司又增設司圃所孳牲所諸職是光祿所𨽻又兼有內務府掌儀慶豐二司之任然司供御者實不屬於部寺而歸之宦官蓋前代少府殿中宣徽諸職至明代始盡去之所立十二監四司八局庫房厰使紛紜不一各有提督太監掌印太監等員內而服食起居庫藏賞賚外而軍營厰獄礦關採辦無一不以宦官領之借端恣橫更迭盤踞久之而與恭機密撓亂國是卒至太阿倒握威福下移宫闈之法度大紊而國事遂不可為自古供御之弊政未有甚于前明者也我朝設綱定紀盡革前弊創立內務府為萬世經常之法既分置各司以董厥職並特簡總管大臣綜理其事其諸衙門各有分守職任之重者皆命大臣監理之小大綱維悉與周官職制相凖彼漢唐以來少府殿中參差更革散寄而無所統一者洵不足以比量萬一矣國朝太監職制附總管太監四品亦有以七品執守侍充者銜二曰宫殿監督領侍曰宫殿監正侍副總管六品銜曰宫殿監副侍亦有係執守侍銜者首領太監御二曰執守侍七品曰侍監八品副首領八品侍監亦有無品級者筆帖式八品侍監惟敬事房有之太監無品級總管首領初定品級皆有正從雍正八年更定品級不分正從乾隆七年定宫內等處太監官職以四品為定永不加至三品以上頒定則例七條宫殿監處分例十一條又凡例四條各處首領太監處分例十六條永遠遵守錢糧俱按現行則例內額數不許增添其錢糧之額以銀五錢米半斛為等銀自每月八兩至二兩凡十三等米自每月八斛至一斛半凡十四等其人之數總管十四人副總管八人首領一百八十九人副首領四十三人筆帖式四人太監無定額順治年定制不過千餘人其職掌惟敬事房辦理宫內一切事務禮儀及承行內務府文移并收納外庫錢糧其餘専掌隨侍守護承應灑掃坐更等事謹案周禮閽者守中門之禁寺人掌女宫之戒設官分職咸備其數其以奄序官者惟內小臣為上士注謂奄上士奄之賢者但言奄則府史之類然則成周之制于內臣未嘗不班之以爵也苐限以上士不使踰越而所供惟飲食門闥之事斯百代之良規矣漢唐以降人主因其職在禁近漸加委任遂干政事履霜堅氷淪胥莫救數或逾萬爵至開府逮於前明其弊尤甚洪武中嘗禁內臣不得干預政事敕諸司毋與內官往來乃未幾命聶慶童往河州敕諭茶馬而中官奉使始此矣永樂中亦嘗諭一軍一民中官不得調發有私役工匠者立命逮治乃元年李興等齎敕勞暹羅國王而奉使外國始此矣三年命鄭和等率兵二萬行賞西洋古里滿剌加諸國而將兵始此矣八年敕王安等監都督談青等軍馬靖巡視甘肅而監軍巡視又始此矣及洪熙元年以鄭和領下畨官軍守備南京遂相沿不改敕王安鎮守甘肅而各省鎮皆設鎮守矣宣德四年特設文書房命大學士陳山授小內使書而太祖不許識字讀書之制廢矣賜王瑾金英印記而與諸輔弼大臣同矣賜金英范宏等免死詔則又無異勛臣之鐵劵也英之王振憲之汪直武之劉瑾熹之魏忠賢薰天灼手流毒無已神宗礦稅之使無一方不罹厥害其他怙勢竊權不可勝紀而蔭弟蔭姪封伯爵公則尤撓官制之大者愍帝初翦大憝中外頌聖既而鎮守出征督餉坐營等事無一不命中官為之而明亦遂亡矣我國家內治修明宫政嚴肅世祖章皇帝鑒古垂訓設立鐵牌裁定內官員數列聖相承無不防微杜漸訓誡周詳凡諸內臣恪恭職守無稍踰越我皇上鑒於成憲親定規條所掌有常事所司有常地授爵以四品為限而統以內務府大臣正與周禮之領於天官者若合符節此聖人治內之法所為度越前代豈獨前明之秕政蕩滌無餘也哉欽定厯代職官表卷三十八
