  - {type: page-break, offset: 0, content: '', id: KR2l0015_WYG_044-1a, image: WYG0601/WYG0601-0729a.png}
body:
  text: 內務府下厯代建置唐唐書百官志殿中省監一人從三品少監二人從四品上丞二人從五品上監掌天子服御之事其屬有六局曰尚食尚藥尚衣尚乘尚舍尚輦少監為之二武德元年改殿內監曰殿中省龍朔二年曰中御府監曰大監丞曰大夫有令史四人書令史十二人左右仗千牛各十人掌固亭長各八人舊有天藏府開元二十二年省尚食局奉御二人正五品下直長五人正七品上諸奉御直長品皆如之食醫八人正九品下奉御掌儲供直長為之二進御必辨時禁先嘗之饗百官賔客則與光祿視品秩而供凡諸陵月享視膳乃獻龍朔二年改尚食局口奉膳局諸局奉御皆曰大夫有書令史二人書吏五人主食十六人主膳八百四十人掌固八人尚藥局奉御二人直長二人掌和御藥診視凡藥供御中書門下長官及諸衛上將軍各一人與監奉御涖之藥成醫佐以上先嘗疏本方具嵗月日涖者署奏餌日奉御先嘗殿中監次之皇太子又次之然後進御太常每季閲送上藥而還其朽腐者左右羽林軍給藥飛騎萬騎病者頒焉龍朔二年改尚藥局曰奉醫局有按摩師四人呪禁師四人書令史二人書吏四人直官十人主藥十二人藥童三十人合口脂匠二人掌固四人尚衣局奉御二人直長四人掌供冕服几案祭祀則奉鎮圭於監而進于天子大朝會設案龍朔二年改尚衣局曰奉冕局有書令史三人書吏四人主衣十六人掌固四人尚舍局奉御二人直長六人掌殿庭祭祀張設湯沐燈燭灑掃之事間廏使以殿中監承恩遇者為之押五坊以供時狩一曰雕坊二曰鶻坊三曰鷂坊四曰鷹坊五曰狗坊侍御尚醫二人正六品上主事二人從九品上謹案唐殿中監領六局其四局為今內務府諸司之職其尚乘尚輦二局分著於鑾儀衛太僕寺篇中兹不具列殿中監又有間廏使與上駟院之職相近惟所領五坊以供時狩者為今養鷹狗處之制故附著於此唐書百官志內侍省監二人少監二人監掌內侍奉宣制令其屬六局曰掖庭宫闈奚官內僕內府內坊少監內侍為之二皇后親蠶則升壇執儀大駕出入為夾引武德四年改長秋監曰內侍監內承奉曰內常侍內承直曰內給事龍朔二年改監為省武后垂拱元年曰司宫臺天寶十三年置內侍監改內侍曰少監尋更置內侍內謁者監十人掌儀法宣奏承勑令掖庭局令二人丞三人掌宫人簿帳女工宫闈局令二人丞二人掌侍宫闈出入管籥奚官局令二人掌奚𨽻工役宫官之品內僕局令二人丞二人掌中宫車乘內府局令二人丞二人掌中藏寶貸給納之數及供燈燭湯沐張設謹案內侍省之名昉於隋代其職則自秦漢以來即有長秋之制惟漢法參用士人至後代則専用奄宦寖失古意考唐內侍省六局所掌皆今內務府廣儲掌儀諸司及內管領之職聖朝慎重職司一不以奄豎參預其事洵超軼前古之制非隋唐所可幾及矣兹以內侍省官制中頗有近於內務府者並採附篇內以著前代之得失其列代宦官不盡著焉唐書百官志少府監一人從三品少監二人從四品下掌百工技巧之政總中尚左尚右尚織染掌冶五署及諸冶鑄錢互市等監供天子器御后妃服飾及郊廟圭玉百官儀物凡武庫袍襦皆識其輕重乃藏之冬至元日以給衛士諸州市牛皮角以供用牧畜角筋腦革悉輸焉細縷之工教以四年車路樂器之工三年平漫刀矟之工二年矢鏃竹漆屈桞之工半焉冠冕辨幘之工九月教作者傳家技四季以令丞試之嵗終以監試之皆物勒工名丞六人從六品下掌判監事給五署所須金石齒革羽毛竹木所入之物各以名數州土為籍工役衆寡難易有等差而均其勞逸主簿二人從七品下録事二人從九品上武德初廢監以諸署𨽻大府寺貞觀元年復置龍朔二年改曰內府監武后垂拱元年曰尚方監有府二十七人史十七人計史三人亭長八人掌固六人短蕃匠五千二十九人綾錦坊巧兒三百六十五人內作使綾匠八十三人掖庭綾匠百五十人內作巧兒四十二人配京都諸司諸使雜匠百二十五人中尚署令一人從七品下丞二人從八品下掌供郊祀圭璧及天子器玩后妃服飾雕文錯綵之制凡金木齒革羽毛任土以時而供嵗二月獻牙尺寒食獻毬五月獻綬帶夏至獻雷車七月獻鈿針臘日獻口脂唯筆琴瑟絃月獻金銀暨紙非旨不獻製魚袋以給百官蕃客賜寶鈿帶魚袋則授鴻臚寺丞主簿監作四人從九品下凡監作皆同品有府九人史十八人典事四人掌固四人唐改內尚方署曰中尚方署武后改少府監曰尚方監而中左右尚方織染方掌冶方五署皆去方以避監自是不改矣有金銀作坊院掌冶署令一人正八品上丞二人正九品上掌范鎔金銀銅鐵及塗飾琉璃玉作銅鐵人得採而官收以稅唯鑞官市邉州不置鐵冶器用所須皆官供凡諸冶成器上數於少府監然後給之監作二人有府六人史十二人典事二十三人掌固四人册府元龜哀帝天祐三年勑牛羊司收管御厨羊并乳牛等御厨物料並送河南府收管其牛羊司官使並宜停廢謹案唐少府官制詳於工作而略於儲藏蓋既有太府之左右藏以為外府復有內侍省之內藏主以中人則貨賄已有分掌之司無須歸於少府也天寶後設百寶大盈庫皆以中官主之謂之內庫其後又有瓊林大盈延資庫等名焉五季舊五代史梁太祖本紀開平元年改御合使為司膳使五代會要晉開運三年二月詔少府監今後凡修制親王婚禮法物並册文出降公主九樹花叉箱盝宜令不得用龍鳯紅絛帕册府元龜後唐莊宗同光初諸寺監各只置大卿其餘官屬並權停玉海後唐聶元祚為少府監册府元龜後唐杜紹光為少府少監天成二年上言當司掌朝服儀仗祭器服兵戈已來散失向盡往例有丞主簿五署令共一十六員自偽梁廢省乞下中書量置丞簿署令分主當局公事杜憬為殿中丞天成四年上言以本司法物寄於寺觀請量修公署玉海晉李鍇少帝時為少府監册府元龜後唐莊宗即位以李紹宏為宣徽南院使兼掌內勾天下財穀皆委裁遣孟漢瓊明宗時為宣徽北院使晉漢以來宣徽院有內班之名周循其舊而史闕官號謹案五季官制缺略無足採證今考諸書所載少府令丞主簿廢於梁時諸卿少卿停於唐代乃至儀仗散失法物或寄於寺觀其草略可見後唐以宦者為宣徽使主天下財榖蓋亦循唐時內庫之制而宣徽之名實首見於此也宋宋史職官志宣徽南院使北院使掌總領內諸司及三班內侍之籍郊祀朝會宴饗供帳之儀應內外進奉悉檢視其名物舊制以檢校為使或領節度及兩使留後闕則樞密副使一人兼領二使亦有兼樞密副使簽書樞密院者南院資望比北院頗優然皆通掌止用南院印二使共院而各設廳事其吏史則有都勾押官各一人前行三人後行十二人分掌四案一曰兵案二曰騎案三曰倉案四曰胄案故事與參知政事樞密副使同知樞密院事以先後入敘位熙寧四年詔位參政樞副同知下著為令九年詔今後遇以職事侍殿上或中書樞密院合班問聖體及非次慶賀並特序二府班官制行罷宣徽院以職事分𨽻省寺而使號猶存謹案宋代樞密宣徽三司使謂之內職而宣徽掌總領內諸司及三班內侍之職是南北院使正如今內務府總管之任故録著於篇中宋史職官志殿中省監少監監丞各一人監掌供奉天子玉食醫藥服御幄帟輿輦舍次之政令少監為之二丞參領之凡總六局曰尚食掌膳羞之事曰尚藥掌和劑診候之事曰尚醖掌酒醴之事曰尚衣掌衣服冠冕之事曰尚舍掌次舍幄帟之事曰尚輦掌輿輦之事六尚各有典御二人奉御六人或四人監門二人或一人又尚食有膳工尚藥有醫師尚醖有酒工尚衣有衣徒尚舍冇幕士尚輦有正供等皆分𨽻其局又置提舉六尚局及管幹官一員舊殿中省判省事一人以無職事朝官充雖有六尚局名别有事存凡官隨局而移不領于本省所掌唯郊祀元日冬至天子御殿及禘祫后廟神主赴太廟供具繖扇而殿中監祕書監為寄祿官而已元豐中神宗欲復建此官而度禁中未有其地但詔御輦院不𨽻省寺令専達焉初權太府卿林顔因按內藏庫見乘輿服御雜貯百物中乃乞復殿中省六尚以嚴奉至尊於是徽宗乃出先朝所度殿中省圖命三省行之御藥院勾當官無常員以入內內侍充掌按驗祕方以時劑和藥品以進御及供奉禁中之用典八人藥童十一人匠七人崇寧二年併入殿中省尚衣庫使副使舊曰尚衣庫大中祥符三年改監官二人以內侍三班充掌駕頭服御繖扇之名物凡御殿大禮前一日請乘輿衮冕鎮圭袍服於禁中以待進御事已復還內庫典一人匠四人掌庫十人內衣物庫在文德殿後太平興國二年置受納匹段庫受納綾錦西州鹿胎綾羅絹匹段大中祥符元年併入監官二人以京朝官并內侍充舊三人以諸司使副及三班內侍充掌受納錦綺綾羅色帛銀器腰束帶料造年支凖備衣服以待頒賜諸王宗室文武近臣禁軍將校時服并給宰臣親王皇親使相生日器幣兩府臣僚百官皇親轉官中謝朝辭特賜及大遼諸外國人使辭見銀器射弓衣帶典八人掌庫二十一人親衣庫在太平坊監官二人以諸司使副三班及內侍充掌受錦綺雜帛衣服之物以備給賜及邦國儀注之用并受納衣服以賜諸司丁匠諸軍監門二人以三班使臣充典十人掌庫五十五人朝服法物庫太平興國二年置後分三庫一在天安殿後一在右掖門內北廊一在正陽門外監官二人以諸司使副及三班內侍充掌百官朝服諸司儀仗之名物典三人掌庫三十人已上崇寧二年併入殿中省舊有裁造院針線院雜賣場後省併之馬端臨文獻通考太府寺卿掌財貨出納貿易之事凡貢賦之輸於京師者至則别而受之供君之用及待邉費則歸於內藏供國之用及待經費則歸於左藏所𨽻官司二十有五內藏庫掌受嵗計之餘積以待邦國非常之用奉宸庫掌供內庭凡金玉珠寶良貨賄藏焉祗候庫掌受錢帛器皿衣服以備傳詔頒給及殿庭賜豫審計司掌審受給數驅磨當否商稅務收京城商稅店宅務掌管官邸店謹案唐太府唯掌左右藏以待經費內藏供奉之職不與焉至宋則分受供君供國之用而設官尤廣故內藏奉宸祗候皆如今廣儲司之掌審計則如會計司而商稅務店宅務亦如今崇文門監督官房租庫之總領於內務府也石林燕語內香藥庫在謻門外凡二十八庫真宗賜御製七言二韻詩一首為庫額曰每嵗沉檀來逺裔纍朝珠玉實皇居今辰內府初開處充牣尤宜史筆書謹案真宗詩所云內府當即宋志內藏庫內香藥庫近於今之御藥房矣玉海少府監掌造門戟旌節祭玉法物及供祭器鑄印以朝官判元豐四年十一月五日詔鑄省臺等監印記凡六十三官制行總局四掌百工技巧乘輿服御之物祭祀朝會禮樂之器服皆有法式册寶符節度量權衡之制亦如之文獻通考宋少府監判監事一人以朝官充凡天子器玩后妃服飾雕文錯彩工巧之事分𨽻於文思院後苑造作所本監但掌造門戟神衣旌節郊廟諸壇祭玉法物鑄牌印朱記百官拜表案褥之事元豐正官制置監少監丞主簿各一人所𨽻官屬五文思院掌造金銀犀玉工巧之物金采繪素裝鈿之飾以供輿輦册寶法物及凡器服之用監官文臣一員武臣二員綾錦院掌織絍錦繡以供乘輿及凡服飾之用監官三人以京朝官諸司使副及內侍充裁造院掌裁製服飾監官二人文繡院掌纂繡以供乘輿服御及賓客祭祀之用建炎初以將作少府監併歸工部紹興三年復置將作監少府事統焉入內內侍省內侍省其屬有御藥院勾當官四人掌按驗方書修合藥劑以待進御及供奉禁中之用內東門司勾當官