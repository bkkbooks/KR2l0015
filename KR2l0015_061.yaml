  text: 各省駐防將軍等官表各省駐防將軍等官國朝官制直𨽻保定府城守尉一人防禦四人驍騎校四人滄州城守尉一人防禦四人驍騎校四人寳坻縣防守尉一人防禦二人驍騎校一人東安縣防守尉一人防禦二人驍騎校一人采育防守尉一人防禦二人驍騎校一人霸州防守尉一人防禦二人驍騎校一人固安縣防守尉一人防禦二人驍騎校一人雄縣防守尉一人防禦二人驍騎校一人良鄉縣防守尉一人防禦二人驍騎校一人謹案以上俱稽察九處駐防旗務大臣所屬故列於熱河宻雲山海闗三處副都統之前熱河副都統一人協領兼佐領五人佐領十五人防禦二十人驍騎校二十人宻雲縣副都統一人協領四人佐領十六人防禦十六人驍騎校十六人分駐古北口防守尉一人防禦二人驍騎校四人昌平州防守尉一人防禦二人驍騎校一人山海闗副都統一人協領兼佐領二人佐領六人防禦八人驍騎校八人分駐喜峯口防守尉一人防禦二人驍騎校四人冷口防守尉一人防禦二人驍騎校三人玉田縣防守尉一人防禦二人驍騎校二人三河縣防守尉一人防禦二人驍騎校二人順義縣防守尉一人防禦二人驍騎校一人永平府防守尉一人防禦二人驍騎校二人羅文峪防禦一人驍騎校二人謹案以上三處副都統皆自率所屬専鎮一方别無將軍都統以節制之其張家口都統惟轄察哈爾八旗别見各處辦事大臣表中兹不復載陜西西安將軍一人副都統二人協領兼佐領八人佐領三十二人防禦四十人驍騎校四十人甘肅寜夏將軍一人副都統一人協領兼佐領五人佐領十九人防禦二十四人步營防禦二人驍騎校二十四人凉州副都統一人協領兼佐領二人佐領六人防禦八人驍騎校八人莊浪城守尉一人佐領四人防禦四人驍騎校四人謹案各省副都統皆統於將軍惟凉州副都統不屬寜夏將軍節制江蘇江寜將軍一人副都統一人協領兼佐領八人佐領三十二人防禦四十人驍騎校四十人分駐京口副都統一人協領兼佐領二人佐領十四人防禦十六人驍騎校十六人浙江杭州將軍一人副都統一人協領兼佐領九人佐領二十三人防禦二十人驍騎校三十二人分駐乍浦副都統一人協領兼佐領五人佐領十一人防禦八人驍騎校十六人湖北荆州將軍一人副都統二人協領兼佐領十人佐領四十六人防禦五十六人驍騎校五十六人廣東廣州將軍一人副都統二人協領兼佐領八人佐領八人防禦三十二人驍騎校三十二人水師營協領一人佐領二人防禦二人驍騎校六人福建福州將軍一人副都統一人協領兼佐領八人佐領八人防禦八人驍騎校十六人水師營協領一人佐領二人防禦二人驍騎校六人四川成都將軍一人副都統一人協領兼佐領五人佐領十九人防禦二十四人驍騎校二十四人山東青州副都統一人協領兼佐領四人佐領十二人防禦十六人驍騎校十六人兼轄分駐徳州城守尉一人防禦四人驍騎校四人謹案山東駐防未設將軍惟以副都統管領與熱河宻雲山海闗諸處同例山西太原城守尉一人防禦四人驍騎校四人謹案山西城守尉乾隆二十五年定歸巡撫節制河南河南城守尉一人佐領十人防禦十人驍騎校十人謹案河南城守尉乾隆二十五年亦定歸巡撫節制厯代建置謹案戍防險要三代已然然因事而行及期而代特以為征調之役不以為設官之制也秦漢以後兵制逓更或隨時以制宜或應機而馭變經畫措置靡所不周而求如國朝駐防之法者則史籍所傳未之前睹夫緑旗之兵名為統於標營實則㪚在塘汛每猝不易集有勁旅為之坐鎮而後遇有調發乃可以振䇿即行緑營之兵騎射不能盡嫻戰鬭亦不能盡勇多相沿積習有八旗為之矜式而後耳濡目染乃可以相觀漸化祖宗定鼎之初必以羽林七萃棊布星羅於天下用意至為深遠且即三代盛時出車還率雨雪楊桞有道途之感𤓰苦栗薪有家室之情故征調可暫不可常惟駐防之制挈孥以徃世其廪禄則居處安而人心固又主客異形山川殊勢地非素習未習長驅惟駐防之制世居是土明其道路之夷險識其攻守之緩急則遇事駕輕就熟雖戍兵而無異土人葢一舉而數善備焉此誠非自古以來籌兵者之所意及故博稽史籍亦無舊典之可徴然蕭統有言椎輪為大輅之始層氷為積水所成古來用武之朝善謀之將亦有窺見此意之一二者謹摭其近似具列於左用備叅考焉三代未置謹案周禮夏官曰司險掌九州之圖以周知山林川澤之阻皆有守禁鄭康成註曰國曰固野曰險夏官有掌固掌在國城郭則司險掌畿外阻固也葢名山大澤不以封凡險奥之區皆𨽻王室有王官以司其禁戒是亦駐防之意然有司之守非軍旅之鎮也又易祓周禮總義曰詩溥彼韓城燕師所完傳以為燕安也言王師久屯於外皆安集也則周時王國六師固有分屯調守之事考小雅有遣戍勞還之詩多述其載離寒暑則當時鄉遂六師不過有事征遣無事歸耕與駐防之永鎮一方者亦有異今不敢附㑹古義强相牽合用以見國朝兵制之善為三代之所未及也秦未置謹案漢書嚴安列傳稱秦使䝉恬將兵戍於北河又使尉佗將卒戍越然皆非久駐之師其統兵之官亦未嘗有特設之制也漢司馬貞史記索隠孔文祥云邊境有屯兵後因置將屯將軍謹案章如愚山堂考索曰漢高祖之世南北二軍不出而民兵㪚在郡國有事以羽檄召材官騎士以備軍旅文帝始以銅虎符代檄當時各因其地以中都官號將軍將之如魏遫為北地將軍周竈為隴西將軍事已而罷是將軍之因地為名實昉於此然事已而罷則與今駐防將軍逈異至漢書武帝本紀稱元光元年衛尉李廣為驍騎將軍屯雲中其事亦與秦戍北河等惟司馬貞史記索隠所稱將屯將軍以屯駐邊疆特設此制所將雖亦郡國之兵而坐鎮一方與今駐防將軍尚髣髴相似也後漢後漢書和帝本紀永元十一年復置右校尉官李賢注東觀記曰置在西河鵠澤縣謹案漢之五校本衛宿禁旅然每遠出屯戍如鄧鴻以將軍長史率五營士屯雁門朱寵以北軍中侯將五營士屯孟津是也班雄以屯騎將五營兵屯長安三輔征西馬賢將左右羽林五校士屯漢陽西河鵠澤亦置右校尉均以禁近親兵分布於巖疆重地與今駐防將軍之制相近洪适𨽻釋張公神碑監黎陽營謁者豫章南昌李丞釋曰漢志註云世祖以幽冀并州兵騎定天下特於黎陽立營以謁者監之謹案漢官儀中興以幽冀并州兵克定天下故于黎陽立營以謁者監之考光武以幽冀并兵制勝與唐高祖太原兵同皆所謂自將親兵也謁者以内臣典天子親兵置營黎陽與今之駐防各官相近後漢書馬武竇固陳訢以黎陽營兵破西羌鄧訓以黎陽營兵防烏丸竇憲以黎陽營兵破匈奴劉尚以黎陽營兵破迷唐度尚以黎陽營兵救零陵然則黎陽營在後漢當與五校並重故必以中謁者典之於外重兵重鎮委任必由禁近也又考玉海載北邊有變則置度遼官南蠻或叛則置象林兵羌犯三輔則置長安雍二尉鮮卑入寇則置漁陽營永建元年縁邊增步兵陽嘉元年縁海各屯兵而扶風漢陽三百塢魏郡恒山六百一十六塢凡此皆以重兵分屯但主之者未必皆由内臣也而因事設屯興廢無常與今各省駐防當有間也三國未置晉未置謹案晉書温嶠列傳稱先朝使五校出田令四軍五校有兵者及䕶軍所統外可分遣二軍出并屯要害處是亦駐防之意然嶠之所請當時未見舉行時虚有是議而已宋齊梁陳未置北魏周書鄭偉列傳魏恭帝二年進位大將軍除江陵防主都督十五州諸軍事専戮副防主杞賓王坐除名謹案北魏六鎮皆在代京之北以屏蔽平城故都各鎮鎮將實近今盛京各處駐防副都統之職故不列于此表惟江陵防主副防主之類則近于今之各省駐防將軍及副都統矣北齊未置後周未置隋隋書文帝本紀開皇十年五月乙未詔曰魏末役車嵗動未遑休息權置防府南征北伐居處無定朕甚愍之凡軍人可悉属州縣墾田籍帳一與民同軍府統領宜依舊式罷山東河南及北方極邊之地新置新府馬端臨文獻通考隋兵制大約仍周府兵之舊而加潤色諸府之兵有郎將副將防主團主以相統治其外又有驃騎車騎二府皆有將軍後更驃騎曰鷹揚郎將車騎曰副郎將别置折衝果毅此府兵之大畧也謹案周剏府兵之制然地狹民寡征調頻仍未得盡行其法及隋既平陳始置郎將副將防主團主諸職駐防之制始于是稍詳矣其防主一官為郎將副將之屬與北魏防主名同實異猶宋之巡檢専制諸州今巡檢則為雜流末秩也唐新唐書兵志高祖初起開大將軍府發自太原有兵三萬人及諸起義以相屬得兵二十萬武徳初始置軍府以驃騎車騎兩將軍府領之析闗中為十二道曰萬年道長安道富平道醴泉道同州道華州道寜州道岐州道豳州道西麟州道涇州道宜州道皆置府三年更以萬年道為恭旗軍長安道為鼓旗軍富平道為元戈軍醴泉道為井鉞軍同州道為羽林軍華州道為騎官軍寜州道為揚威軍岐州道為平道軍豳州道為招揺軍西麟州道為苑游軍涇州道為天紀軍宜州道為天節軍軍置將副各一人以督耕戰以車騎府統之六年廢十二軍改驃騎曰統軍車騎曰副將居嵗餘後十二軍軍置將軍一人軍有防置主一人以檢察户口勸課農桑太宗貞觀十年更號統軍為折衝都尉副將為果毅都尉諸府總曰折衝府凡天下十道置府六百三十四皆有名號而闗内二百六十有一皆以𨽻諸衛凡府三等兵千二百人為上千人為中八百人為下置折衝都尉一人左右果毅都尉各一人長史兵曹副將各一人校尉六人士以三百人為團團有校尉五十人為隊隊有正十人為火火有長杜牧原十六衛外開折衝果毅府五百七十四上府不越一千二百人五百七十四府凡有四十萬人陸贄奏議太宗列置府兵八百所而闗中五百舉天下不敵闗中則居重馭輕之意也唐㑹要武徳三年七月十一日下詔曰周置六軍每習蒐狩漢增八校畢選驍勇今伊洛猶蕪江湖尚梗各因部校序其統屬改換鉦鐸創造徽章取象天官作其名號于是置十二衛將軍取威名素重者為之分闗内諸府𨽻焉闗内置府二百六十一精兵士二十六萬舉闗中之衆以臨四方又置折衝府二百八十通給舊府六百三十三河東道府額亞于闗中河北之地人多壯勇故不置府其諸道亦置季本禮疑圖今按唐之諸衛環衛京師以𨽻外府之兵而十道諸州則分列州鎮謂之折衝章氏所謂府兵雖散在諸道然折衝都尉並遥𨽻于諸衛是也折衝府雖各在外治兵而官實内任故百官志係于諸衛之後不列于外官之中欲使聫属于内焉葢其職與漢都尉同但不似都尉之為外任官耳上府千二百人中府千人下府八百人葢所選材力之士而以折衝府統之使得専𨽻如漢之材官騎士統於都尉而課都試也季冬率屬敎戰正指都試非謂練卒嵗止一次而已如此則兵皆常練無不可用之人矣故二十為兵六十而免中間四十年既𨽻戎籍所業在兵時或㪚罷就田可以不廢生理故志謂府兵之置居無事時耕于野得寓兵於農之大意焉折衝府數㑹要與陸贄杜牧之説多寡不同意者各據一時所見或所傳聞異詞耳今姑以唐志為正凡十道置府六百三十四而闗内六百二十一皆以𨽻諸衛也其𨽻諸衛也左右衛皆領六十府諸衛領五十至四十餘則𨽻東宫六率李泌以為東宫六率領六至三葢十二衛者天子之宿衛也東宫有左右率府擬左右衛司禦率府擬左右領軍衛左右清道率府擬左右金吾衛則太子之宿衛也以此分配則盡六百三十四府而分𨽻於十二衛與東宫六率矣太子六衛理不可虚以兵分衛則可以府分𨽻則不可故章氏曰太子管軍非古制也然太子所𨽻之兵亦必止於其所當畨上之府耳其餘固皆𨽻于十二衛也章氏以為唐置十六衛外統闗内天下諸府畨上宿衛者是不知監門千牛四衛不與于領畨上之兵也考之六典十二衛與六率分𨽻之兵共𨽻三百一十九府而左右衛止共領五十府領軍衛六十府其餘或五十府四十九府六率不過五府三府此與唐志李泌所傳之數雖有不同而大畧不甚相遠矣然府各有名著為定額似以二千里上下之府嵗立常畨而十道之中如劔南嶺南所極之地不止二千里外者亦當在畨上之列矣雖畨分十二十二月之内始一月上勢必有所不及此不過寓控制遠方之術而已于政未為盡便也又十道總立六百三十四府而闗内一道獨得二百六十一府其餘九道僅總得三百七十三府要之近地府宻遠地府踈詳内畧外亦恐地遠則勢有所難行歟然而地近則役煩亦可想見矣天下之府凡六百三十四李泌以為通計六十八萬人而以約畨上十二衛及東宫六率如前六典所分三百一十九府約得三十一萬九千人則宿衛之兵當天下府兵之半分為數畨每月更上以後日張説募兵之數約之則京師常有十二萬人足備天子六軍正副之數而畨下者亦足以為州府居守之資此居重馭輕亦治兵之善術也至其有事調發雖當遠府而所𨽻之衛皆得與聞焉否則何取于以府𨽻衛哉故典要云折衝府毎嵗十一月以衛士帳上于兵部以俟征發天下衛士六十餘萬六十餘萬云者其即李泌六十八萬之數歟以六十餘萬之衆而通謂之衛士可見其皆𨽻於十二衛矣然兵部者本兵之任也故徴發之數給畨之差總制焉又以見十二衛之有所統矣其應畨之府而兵先調發則必有代之給畨者且二千里内外有衆六十餘萬更畨之兵不患其寡餘兵𨽻在折衝緩急自能相應故雖遠在邉陲兵威亦足遥制觀李泌曰府兵分𨽻京師諸衛有冦則以符契發付邊將無冦分畨宿衛葢言邊地在京西而當二千里内外者所發之兵固亦應畨宿衛之士然亦可見府兵初行但有征調而無久戍矣因調兵而成久戍之例因久戍而淹更畨之期府兵之困葢由於此其法安得而不壊哉謹案唐之折衝府㪚在諸道而内領于十六衛闗内諸府既如今八旗勁旅栱䕶京師則諸道折衝府實與今各省駐防相近然考資治通鑑稱徳宗貞元二年上與李泌議復府兵泌因為上厯叙府兵自西魏以來興廢之由且言府兵平日皆安居田畆每府有折衝領之折衝以農隙敎習戰陣國家有事徴發則以符契下其州及府胡三省注府者折衝果毅府恭騐發之至所期處將帥按閲有敎習不精者罪其折衝甚者罪及刺史軍還則賜勛加賞便道罷之行者近不踰時遠不經嵗高宗以劉仁軌為洮河鎮守使以圖吐蕃於是始有久戍之役云云是仍然征調徃來不及我朝駐防之制可經諸久遠也又舊唐書職官志稱至徳後大郡要害之地置防禦使以治軍事其名與今防禦同然唐之防禦使實如今之兵備道職掌迴不相侔故不列於表五季未置宋李燾續通鑑長編凡禁軍之最親近者執㦸殿陛宿衛宫省扈從乘輿號諸班直非諸班直於御前忠佐軍頭司皇城司騏驥院餘軍皆以守京師備征戍而出戍邊或諸州更戍者謂之屯駐非戍諸州而𨽻於總管者謂之駐泊非屯駐駐泊而以糴賤留便廪給謂之就糧武經縂要定州路置本路駐泊馬步軍都部署以下兵官所統定保深祁廣信安肅順安永寜八州軍順安軍今置真定府路駐泊馬步軍都部署以下兵官統真定府磁相邢趙洺六州文獻通考自唐中葉後營兵在諸鎮每防秋征行大則節將自徃小則列校董之禁衛雖設而皆非精練然屯營之處頗雜耕戰五代以來亦有近藩之地更迭戍守者太祖太宗懲累朝藩鎮跋扈盡収兵於京師其邊防外藩須兵屯守者自京而遣故有駐防屯泊之名其京畿諸州便運路者則有就糧兵焉許挈家屬以往及本州兵皆更迭屯駐代還始復舊所柯維騏宋史新編職官志總管鈐轄司掌總治軍旅屯戍營防守禦之政令都總管以節度使充副總管以觀察以下充舊相重臣亦為都總管有禁兵駐泊其地者以駐泊冠之若鈐轄舊以朝官及諸司使以上充官卑資淺則去都字宋史職官志路分都監掌本路禁旅屯戍邊防訓練之政令以肅清所部州府以上都監皆掌其本城屯駐兵甲訓練差使之事資淺者為監押王安石馬正恵公神道碑移鄜延路駐泊兵馬都總管兼知延州蜀人於公去皆環以泣公至延州羌方以兵覷邊㑹上元開門張燈視以無為而羌不能為冦禮疑圖駐泊屯駐皆自禁軍而遣然禁軍之中惟上軍為重故其賜犒特厚軍頭司所掌者駐泊則駐泊重於屯駐而應駐泊者大抵皆上軍也故軍頭司引對焉就糧而代戍者亦禁軍也則與中下軍皆在屯駐之列而不必軍頭司引對矣然太祖時就糧亦有駐泊者豈預於駐泊者即得為上軍乎廂軍而屯者常在本州亦謂之屯駐禁軍廂軍皆有指揮其在屯所則總管鈐轄都監監押各隨所部而統之兵志載熙寜三年詔所謂上畨軍或就糧軍為戍當遣者並𨽻總管司即其制也謹案陳傅良謂宋初天下元無禁兵所謂禁兵者皆三司之卒分屯而更戍是以有屯駐駐泊之名而鈐轄都監監押之官所部領者也其三邊之兵間因事宜升為禁軍則所謂四十四處禁軍是已自元昊叛而西北有保毅王倫叛而東南有宣毅於是列郡稍置禁軍嘉祐中詔東南帥司各置威果凡二十五指揮熙寕按天下廂軍之籍而立敎閲之法其後以廂軍團併為額則兩浙崇節福建保節之類是也敎閲之兵因别為額而𨽻之將下則兩浙雄節福建廣節之類是也元豐兵令悉以雄節之屬升同禁軍而禁軍始徧天下然則鈐轄總管當如今駐防將軍之比都監監押當如今城守尉防守尉之比以其為統領禁軍而設故已見提督總兵表内而仍互見於此宋史職官志諸軍都統制副都統制統制統領建炎初置御營司擢王淵為都統制紹興十一年三大將兵罷諸軍皆冠以御前二字擢其偏禆為御前統領官以統制御前軍馬入銜秩高者為御前諸軍都統制且令仍舊駐劄以屯駐州名冠軍額之上其後興元江陵建康鎮江府興金鄂江池州及平江許浦水軍皆除都統制官卑者稱副都統制又有統制同統制副統制統領同統領副統領王應麟玉海建炎元年五月以河北兵為御營五軍三年四月又更置御前五軍而劉光世所領西兵則謂之巡衛軍在五軍之外是嵗又改為神武軍紹興元年十二月又改為行營四䕶軍十一年四月三宣撫司罷乙未乃改其部曲稱某州駐劄御前諸軍謹案宋所設都統制皆一時權宜不為經常之制然其結銜帯御前之名而仍以屯駐州名冠軍額之上則與今之八旗駐防都統頗亦相近故已見提督等篇而亦互見於此遼遼史兵衛志衆部族軍衆部族分𨽻南北府守衛四邉各有司存具如左北府凡二十九部侍從宫帳奚王府部鎮南境五院部六院部東北路招討司烏威䝉古語樹林也原作烏隗今改部東北路統軍司約囉滿洲語响箭也原作遥里今改正部伯特滿洲語無能也原作伯徳今改部敖拉䝉古語山也原作與里今改部南冠部北冠部圖嚕滿洲語腰刀繫也原作圖盧今改部珠展䝉古語厚也原作朱者今改達嚕噶觧見户部篇部河西部西北路招討司圖魯卜䝉古語模様也原作突里不今改部阿雅索倫語好也改原作奥今女直部室韋部西南路招討司納喇人名係蒙古語日也原作湼剌今從八旗姓氏通譜改正部烏庫哩人名係索倫語牛也原作烏古剌今從八旗姓氏通譜改正部納喇永安滿洲語沙子也原作越兀今改部黙古斯䝉古語寡少之寡也原作梅古悉今改部吉達滿洲語鎗也原作頡的今改部鼐竒特原作匿訖今從八旗姓氏通譜改正唐古部哈喇蒙古語黒色也原作鶴剌今改唐古部黄龍府都署司烏延滿洲語柔軟也原作隗衍今改突厥部奥衍突厥部北唐古部五國部烏爾古䝉古語孽生也原作烏古今改迪里索倫語頭也原作敵烈今改統軍司達魯䝉古語琵琶骨也原作迭魯今改迪里部威烏爾唐古特語中氣也原作隗烏古今改部北敵烈部南府凡一十六部鎮駐西南境伊實解見八旗都統篇部西南路招討司丕勒解見八旗都統篇部達勒達滿洲語遮蔽也原作迭達今改達喇解見軍盛京將等官篇部丕勒解見八旗部統篇達嚕噶觧見户部篇部伊勒敦滿洲語順便也原作乙典今改女直部西北路招討司卓特觧見八旗都統篇部東北路統軍司塔瑪布古徳原作鼻古徳今改部東北路女直兵馬司伊實阿爾威䝉古語阿爾花紋也威樹林也原作奥隗今改部東京都部署司卓特阿爾威部揚珠唐古特語儀表也原作窈𤓰今改部刷觧見八旗都統篇部哈凖滿洲語犁刀也原作曷术今改部戍倒塌嶺鄂博庫滿洲語沭盆也原作訛俟括今改部屯駐术胡薩拉噶䝉古語樹枝也原作撤里葛今改部南唐古部色克圖滿洲語小兒聰慧也今從八旗姓氏通譜人名改正部遼史百官志北面軍官遼官帳部族京州屬國各自為軍體統相承分數迭然考其可知者如左大將軍府各統所治軍之政令大將軍上將軍將軍小將軍諸路兵馬統署司諸路兵馬都統署諸路兵馬副統署謹案遼宫帳部族兵分部𠫭列各以其地為部名亦今直省駐防之所由昉其將有大將軍都統署以下諸官稱號均復相近唯遼分置于北面而未嘗遍於南面諸州為少異耳金金史兵志金興用兵如神無敵當世俗本鷙勁人多沈雄兄弟子姓才皆良將部落保伍技皆鋭兵及其得志中國乃以明安穆昆觧見八旗都統篇恭居漢地迨國勢浸盛罷遼東渤海漢人之襲明安穆昆者漸以兵柄歸其内族然樞府簽軍兼采漢制伐宋之役叅用漢軍及諸部族而統以國人謹案金始制以三百户為穆昆穆昆十為明安繼而諸部來降率用明安穆昆之名以授其首領而部伍其人至海陵天徳二年省并中京東京等路諸節鎮及明安穆昆貞元遷都復徙上京路諸明安處之中都及山東北京河間大定間又遷山東東路八穆昆處之河間又多易置河北山東所屯之舊皆授田給牛使之耕食以蕃衛京國乃大重其權授諸王以明安之號葢諸明安統率所部㪚處各路與今各省駐防之制頗為相近而其以契丹漢人及渤海軍奚軍俱設明安亦有似今䝉古漢軍並列八旗之制也至諸明安穆昆其品秩職掌已詳八旗都統篇此不複舉元元史兵志世祖混一海内命宗王將兵鎮邊徼襟喉之地而河洛山東據天下腹心則以䝉古特黙齊觧見八旗都統篇軍列大府以屯之淮江以南地盡南海則名藩列郡又各以漢軍及親附等戍焉謹案元於各路立萬户府各縣立千户所各道以宣慰司元帥總之其所統䝉古軍皆國人而特黙齊軍則諸部族也其後各處鎮守頗多移徙而所謂䝉古軍特黙齊軍者亦無一定之籍矣明明史兵志太祖為吳王罷元帥總管萬户諸官號而覈其所部兵五千人為指揮千人為千户百人為百户三十人為總旗十人為小旗天下既定度要害地係一郡者設所連郡者設衛大率五千六百人為衛千一百二十人為千户所百十有二人為百户所所設總旗二小旗十大小聮比以成軍十三年改大都督府為五分統諸軍司衛所二十六年定天下都司衛所共計都司十有七留守司一内外衛三百二十九守禦千户所六十五及成祖在位二十餘年多所増改其後措置不一謹案明各衛所之兵有從征有歸附有謫發其從征者係諸將所部兵既定其地因以留戍頗與今駐防之制相近而諸軍司衛所統於五軍都督府征調則統於諸將事平則㪚歸各衛亦猶存唐府兵遺意然各都指揮使多由世襲無所别擇軍職冒濫為世所輕其後五軍府如贅疣弁帥如走卒衛所軍士隠名虚冒至舉天下之兵不足以任戰守明政不綱莫此為甚迨我國家立駐防之制内承天府之營衛外鞏列服之藩維生養訓練屹如金湯始一變明季諸衛之陋習洵足以昭一統之業而奠億載之基者矣欽定厯代職官表卷五十五
