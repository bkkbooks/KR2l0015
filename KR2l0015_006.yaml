body:
  text: 可以知朝政之盛衰也我國家稽古建官循名核實因革損益時措咸宜我皇上朗照無私權衡獨秉舉直錯枉宫府肅清尤從來史册所未有復念厯朝官制典籍俱存宜備溯源流明其利弊庶前規可鑑法戒益昭乃特命四庫全書館總纂官內閣學士今升兵部右侍郎臣紀昀光祿寺卿今升大理寺卿臣陸錫熊翰林院編修今升山東布政使臣孫士毅總校官詹事府少詹事今升內閣學士臣陸費墀等考證排次輯綴是編分目悉凖今制凡長二僚屬具列焉明綱紀也其兼官無正員而所掌綦重如軍機處之類亦别有専表崇職守也八旗及新疆爵秩前所未有者並詳加臚考著聖代之創建逺邁邃古也或古有而今無或先置而後廢並為採掇别附于篇備參訂也每門各冠以表表後詳敘建置首列國朝略如唐六典之例次以厯代則節引諸書各附案語以疏證其異同上下數千年分職率屬之制元元本本罔弗具焉考將相及百官公卿之有表始自班馬二史後如唐書之宰相表宋史之宰輔表明史之內閣七卿表具沿其例然所紀僅拜罷年月與官制無關且斷代為書不相通貫尋檢頗難至抄撮故實如孫逢吉職官分紀之類又但供詞藻於實政無禆是書發凡起例悉稟睿裁色括古今貫串始末旁行斜上援古證今經緯分明參稽詳密不獨昭垂奕􅑤為董正之鴻模即百爾臣工各明厥職用以顧名而思義亦益當知所警朂矣乾隆五十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
