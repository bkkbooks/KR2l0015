body:
  text: 漕運各官表漕運各官國朝官制總督漕運一人正二品兼尚書銜從一品掌督理漕挽以足國儲凡收糧起運過淮抵通皆以時稽核催儧而總其政令駐劄淮安康熙二十二年定制糧艘過淮後總漕隨運北上率所屬官辨相視運道險易調度全漕察不用命者俾舳艫相接畢渡天津入覲述職以重官守巡視漕務四人掌稽察所巡之地挑淺疏滯趲程糾弊以肅漕政以給事中御史掄選簡充一年而代順治初沿明制遣御史巡漕七年裁巡漕御史以糧道逐程分押雍正七年以糧船過淮抵通多有陋規分遣御史二人往淮安稽察二人往通州稽察乾隆二年定制巡漕御史四人一駐淮安巡察江南江口至山東界一駐濟寧巡察山東臺莊至直𨽻界一駐天津巡察至山東界一駐通州巡察至天津督糧道江南二人山東河南江西浙江湖南湖北各一人正四品掌監察兊糧督押運艘而治其政令江南江安糧道駐江寧蘇松糧道駐常熟山東糧道駐德州河南以開歸道兼理及江西浙江湖北湖南糧道並駐省城每年糧船起幫督押過淮盤驗畢回任料理新糧山東河南糧道每年押運抵通雍正四年令總漕於江蘇二糧道內每年委一人親押過山東入閘俟江南糧船盡數過淮即回本任乾隆四十八年定各省糧道俱押本省糧船抵臨清盤驗方回本任惟山東糧道上下儧運俟總漕押送尾幫抵臨清然後回任謹案明時十三省各以布政司參議督糧國朝亦沿明制各省並設督糧道以司倉儲江南山東河南江西浙江兩湖而外若福建陜西廣東雲南貴州皆有糧道甘肅有巴里坤糧道然皆非總漕所轄其職掌皆入司道表中於漕事無與也管糧同知六人正五品通判三十三人正六品掌監兊漕糧凡米色之美惡兊運之遲延及運軍橫肆苛求衙役需索姦蠧包攬攙和等弊皆司其禁戢之政初漕糧以府推官監兊康熙六年各府推官既裁改委同知通判山東以武定府同知濟南兖州東昌泰安曹州五府通判河南以歸德衛輝懷慶三府通判江南以江寧蘇州松江鳳陽四府管糧同知蘇州安慶寧國池州太平廬州揚州七府管糧通判松江鎮江徐州三府糧捕通判淮安府軍捕通判浙江以湖州府同知杭州嘉興二府通判江西以南昌吉安臨江三府通判湖北以武昌漢陽黃州安陸德安荆州六府通判湖南以長沙衡州嶽州三府通判押運同知通判十六人正六品掌督押糧艘管束運軍禁沿途遲延侵盜攙和之弊山東一人河南一人江南七人舊制五人乾隆元年增二人浙江三人江西二人舊制一人乾隆元年增一人湖北一人舊制四人乾隆元年裁三人湖南一人總漕會同督撫于各省同知通判內選委抵通日倉場侍郎送部引見部給限單管押回空到淮總漕察核逾限者參處漕標副將一人從二品遊擊一人從三品都司二人正四品守備二人正五品管理塘務一人千總四人從六品把總十人掌催護糧艘漕標副將一人所屬中營都司一人守備二人左營都司一人右營遊擊一人管理塘務一人左右哨千總四人把總十人領運守備五人衛守備九人正五品守禦所千總十三人從五品千總一百八十六人從六品隨幫效力武舉每幫一人漕糧領運直𨽻通州左所右所天津左所右所領運千總各一人均領河南運山東濟寧衛守備一人前後及前左後右漕船四幫任城一幫每幫領運千總二人德州衛德州左衛東平守禦所東昌衛濮州所平山前幫後幫領運千總各二人臨清衛山東前幫後幫領本省運河南前幫後幫領河南運薊糧幫運送直𨽻薊州每幫領運千總二人江南江安糧道所屬興武江淮二衛守備各一人漕船各九幫淮安衛守備一人漕船四幫大河衛守備一人漕船三幫揚州衛守備一人漕船三幫儀徵一幫徐州衛守備一人本衛漕船一幫河南前後二幫領河南運安慶新安宣州建陽廬州滁州泗州七衛漕船各一幫鳳陽衛守備一人本衛漕船常州一幫原鳳中常州三幫長淮衛守備一人本衛漕船四幫宿州衛二幫每幫領運千總二人浙江杭州衛漕船四幫嘉興湖州嚴州二所各一幫台州溫州二衛各二幫每幫領運千總二人紹興處州二衛漕船前幫領運守備各一人千總各一人後幫領運千總各二人海寧衛金衢所領運守禦千總各一人衛千總各一人江西南昌衛漕船前幫領運守備一人千總一人後幫領運千總二人袁州贑州二衛漕船各一幫領運守備各一人千總各一人九江衛漕船二幫領運千總各二人吉安安福永新撫州建昌廣信鉛山饒州八所漕船各一幫領運守禦千總各一人衛千總各一人湖北武昌衛武昌左衛蘄州黃州襄陽沔陽嶽州五衛荆州衛荆州左衛右衛湖南三幫領運千總各一人以上各省各幫每幫隨幫效力武舉一人白糧領運江蘇蘇州府太倉州運白糧船共一幫松江常州二府各一幫浙江嘉興湖州二府各一幫領運千總每幫各二人隨幫效力武舉各一人歷代建置謹案三代無漕運之事秦漢變封建為郡縣始漕郡國之粟以給京師然漢時漕事皆郡縣自辦朝廷未嘗設官以領之西漢末嘗置都尉以司其防護至東漢初又罷晉初始以大司農部護漕掾其後又以都水使者督運然司農本掌倉儲都水官職司水利皆非専掌漕事者自是以後至唐開元以前公私漕運皆以都水官兼掌而已自唐先天置發運使開元又置轉運使于是領漕始有専職宋遼金沿唐制置發運轉運漕運等使至明置漕運總督而今因之此實漕運一官之沿革也然唐開元以前之大司農都水官雖非専司漕事而其時别無統領漕運之官職掌所及未可概略大司農已見倉場侍郎表都水官已并入工部都水司職中又見河道表今互見其略于此表焉又案漕運有資以給京師者有資以給邊境及軍旅者通典漕運一門二者並載但總漕一官専主於京師之挽運而軍興與邊塞所需皆不與焉通典中所載如秦之轉輸北河隋之運糧涿郡鄧艾之開渠陳項刁雍之造舟沃野雖並關于足食實無與于上供今並不録云三代未置謹案三代之時王畿千里之外皆為侯國其於天子惟有服食器用之貢而無粟米之輸將至畿內之地禹貢所謂總秸粟米則又皆民間自為運致而已故其時無司轉運之官若春秋時秦輸晉粟自雍及絳吳城𨝍溝以通運道則以恤鄰國之災患與自給其師旅之費既非所以供天子之都而亦不以為經常之法也秦新唐書食貨志杜佑言秦漢運路出浚儀十里入琵琶溝絶蔡河至陳州而合秦漢時故漕興成堰東達永豐倉謹案漕運實始于秦主父偃言秦飛芻挽粟起于黃腄琅邪負海之郡轉輸北河此以海運給邊塞唐志言秦時運道如此此以河運給京師然掌運之官尚未見於史也漢漢書卜式列傳為成臯令將漕最朱博列傳為護漕都尉後漢書光武帝本紀建武七年二月罷護漕都尉官謹案漢初漕關東粟以給中都官歲不過數十萬石至武帝時河東守番係言漕從山東西歲百餘萬石至宣帝時大司農耿夀昌言故事歲漕關東穀四百萬斛以給京師蓋其為數之多如此賈誼新書云今漢越兩諸侯之中分而乃以廬江為之奉地雖秦之逺邊過此不逺是江淮之粟當時已至京師蓋其為塗之逺又如此然漢書百官表後漢百官志皆不見有専司轉運之官惟護漕都尉之官見於朱博傳未知其所由起然第主其防護而已亦非總領漕運之事蓋漢時關東榖給中都官者皆郡國自遣人輸送太倉令居京師以受之而己意秦制亦必如此蓋漕畿外之粟以供天庾始於秦漢而掌運尚未有専官也三國酈道元水經注魏景初二年二月帝遣都督沙丘部監運諫議大夫寇兹平河岨謹案魏時漕事蓋亦郡國自遣官輸送而朝廷遣大夫監之此即後世巡漕御史之任也晉晉書職官志大司農統襄國都水長東西南北部護漕掾宋書百官志晉武帝置都水使者懷帝永嘉六年劉聰入洛陽都水使者爰濬先出督運得免然則武帝置職使掌運矣謹案秦有治粟內史掌榖貨漢改為大司農其屬有太倉令受郡國傳漕穀蓋若今倉場侍郎受漕粟而轉運則非其所掌也晉初大司農統護漕掾始以受粟之官兼職運粟之事矣漢置都水使者以主水利至晉時以都水使者督運則又以河渠之官兼司轉漕之務矣哀帝以司農并入都水後雖復置司農而不復領漕務第以都水官兼掌自此以後宋之都水使者兼掌舟航及運部梁之大舟卿兼主舟航河隄隋唐之都水監兼領舟楫河梁二署皆與晉時職掌無異至唐先天時置發運使開元時置轉運使于是舟楫署廢而都水監始於漕務無與矣水經注晉泰始三年五月武帝遣監運太中大夫趙國都匠中郎將河東樂世修治河灘晉書孝武帝本紀太元六年置督運御史官謹案魏時有監運諫議大夫晉泰始時有監運太中大夫是魏晉時常以大夫監運孝武置督運御史即監運大夫之職後世以御史巡漕實昉於此宋齊梁陳宋書百官志都水使者一人掌舟航及運部謹案宋以都水使者掌運部齊梁以後及北朝皆因之其職蓋兼有今河道漕運二總督之任表亦互見焉北魏杜佑通典魏三門都將薛欽上言計京西水次汾華二州恆農河北河東平陽等郡年常綿絹及資麻皆折公物雇牛車送京道險人弊費公損私略計華州一車官酬絹八匹三丈九尺别有私人雇價布八十匹河東一車官酬絹五匹二丈别有私人雇價絹五十匹自餘州郡雖未練多少推之逺近應不減此今求車取雇絹三匹市材造船不勞採斫計船一艘舉十三車車取三匹合有三十九匹雇作手併匠及船上雜具食直足以成船計一船賸絹七十八匹布七百八十匹又租車一乘官格二十斛成載私人雇價逺者五斗布一匹近者一石布一匹準其私費一車有布逺者八十匹近者四十匹造船一艘計舉七百石準其雇價應有千四百匹今取布三百匹造船一艘并船上覆理雜事計一船有賸布千一百匹又其造船之處皆須鋸材人功併削船茹依功多少即給當州郡兵不假更召汾州有租傭調之處去汾不過百里華州去河不滿六十并令計程依舊酬價車送船所船之所運惟達雷陂其陸路從雷陂至倉門調一軍雇絹一匹租一車布五匹則于公私為便尚書度支郎中朱元旭計稱今較薛欽之説驗迹未彰而指况甚善所云以船代車是䇿之長者若以門兵造車便為闕彼防城無容全依宜令取雇車之物市材就作及倉庫所須悉以營辦七月之始十月初旬令州郡綱典各受租調于所在然後付之十車之牛留車士四人佐其守護粟帛上船之日隨運至京將共監慎如有耗損同其陪徵河中缺失専歸運司輸京之時令其即納不得雜合違失常體必使量上數下謹其受入自餘一如其例計砥柱之艱號為天險迅驚千里未易其功然既陳便利無容輒抑若效充其説則附例酬庸如其不驗徵填所損今始開創不可懸生減折且依請營立一年之後須知贏費歲遣御史校其虛實脫有乖越别更量裁尚書崔林按欽所列實允事宜郎中之計備盡公理但舟楫所通逺近必至茍利公私不宜只在前件昔人乃逺通褒斜利關中之漕南達交廣以增京洛之饒况乃漳洹夷路河濟平流而不均彼省煩同兹巨益請諸通水之處皆宜率同此式縱復五百三百里車運水次計較利饒猶為不少其欽所列州郡如請興造東路諸州皆先通水運今年租調悉用舟楫若船有所缺且賃假充事比之僦車交代息耗其先未通流宜遣檢行間月修葺使理有可通必無壅滯如此則發召匪多為益實廣一爾暫勞久安永逸詔從之而未能盡行也北齊隋書食貨志齊租入臺者五百里內輸粟五百里外輸米後周唐六典周司水中大夫一人謹案後周之司水即魏齊之都水使者也後魏齊周掌運之官皆不見子史然前此則晉以都水使者督運同時南朝則宋之都水使者掌舟航運部當時官制相沿其職掌諒當不異又北史魏刁雍為薄骨律鎮將于河水之次造舟水運更以魏薛欽朱元旭之所言者觀之是當時租調有鎮將之處則鎮將主其輸將無鎮將之處則州郡職其綱運而都水官居京師以領之也隋通典隋開皇二年廢都水臺入司農十三年復置仁夀元年改臺為監更名使者亦為監煬帝又改為使者尋又為監加置少監又改監及少監為令領舟楫河渠二署謹案隋都水監所領之舟楫署即主水運之官也晉嘗并司農入都水隋初又嘗并都水入司農蓋倉儲與漕挽之事本相關通故或以漕挽之職兼倉儲或以倉儲之官兼漕挽也唐六典隋潼關渭南皆有倉以轉運之各有監官謹案隋黎陽洛口諸倉監官如今倉監督已見倉場侍郎表惟潼關渭南監官兼司轉運則如今之押運官也唐舊唐書職官志都水監總河渠舟楫二署之官屬舟楫署令一人丞二人掌公私漕運之事新唐書百官志都水監舟楫署有令一人掌舟楫運漕漕正二人府三人史六人監漕一人漕史二人典事六人掌固八人上元二年署丞二人掌漕運隱失開元二十六年署廢舊唐書食貨志開元二十二年以裴耀卿為黃門侍郎同中書門下平章事充江淮河南都轉運使以鄭州刺史崔希逸河南少尹蕭炅為副天寶三載楊釗以殿中侍御史為水陸運使肅宗初第五琦請以江淮分置租庸使市輕貨以救軍食遂拜監察御史為之使乾元元年加度支郎中尋兼中丞為鹽鐵使寶應元年以侍御史穆寧為河南道轉運租庸鹽鐡使尋加户部員外遷鄂州刺史以總東南貢賦是時朝議以寇盜未戢關東漕運宜有倚辦遂以通州刺史劉晏為户部侍郎京兆尹度支鹽鐡轉運使鹽鐡兼轉運自晏始也晏始以鹽利為漕傭自江淮至渭橋率十萬斛傭七千緡補綱吏督之不發丁男不勞郡縣蓋自古未之有也自此嵗運米數千萬石自淮北列置巡院搜擇能吏以主之廣德二年復以第五琦専判度支鑄錢鹽鐡事而晏以檢校户部尚書為河南尹及江淮已來轉運使永泰二年晏為東道轉運常平鑄錢鹽鐡使琦為關內河東劍南三川轉運常平鑄錢鹽鐵使貞元元年元琇以御史大夫為鹽鐡水陸運使八年詔東南兩稅財賦自河南江淮嶺南東道至于渭橋以户部侍郎張滂主之河東劍南山南西道以户部尚書度支使班宏主之順宗即位以杜佑判鹽鐡轉運使理於揚州大中五年二月以户部侍郎裴休為鹽鐡轉運使明年八月以本官平章事依前判使始者漕米歲四十萬斛其能至渭倉者十不三四漕吏狡蠧敗溺百端官舟之沈多者嵗至七十餘隻緣河姦犯大紊晏法休使寮屬按之委河次縣令董之自江津達渭以四十萬斛之傭計緡二十八萬悉使歸諸漕吏巡院胥吏無得侵牟由是三嵗漕米至渭濱積一百二十萬斛無升合沈棄焉新唐書李傑列傳先天中進陜州刺史水陸發運使置使自傑始韋堅列傳擢為陜郡太守水陸運使新唐書食貨志開元初河南尹李傑為水陸運使運米嵗二百五十萬石二十五年崔希逸為河南陜運使嵗運百八十萬石二十九年陜郡太守李齊物鑿砥柱為門以通漕舊唐書德宗本紀大厯十四年以杜亞為陜州長史充轉運使建中二年以姚明敡為陜州長史本州防禦陸運使貞元元年以李泌為陜州長史陜虢都防禦觀察陸運使十四年以崔宗為陜州大都督府長史陜虢觀察水陸轉運使十六年以河南少尹張式為河南尹水陸轉運使謹案唐初以都水監領舟楫署主公私漕運至先天中置水陸發運使開元中置都轉運使于是舟楫署廢而都水官始不領漕事矣水陸發運使後又曰水陸運使又曰水陸轉運使或但曰陸運使蓋唐時江淮民送租庸者皆輸於東都由東都陸運至陜又由陜水運至京師所謂水陸運使者掌自東都至京師水陸之轉運也其但曰陸運使則以水運之事併於諸道轉運使而此但掌其陸運也至元和六年而陜州刺史不帶運使則又以水陸運事並歸於諸道轉運使也故宣宗時韓休為轉運使以平河縣令董漕事自江達渭則河渭漕事皆轉運使主之矣大約唐之發運使轉運使皆為今總漕之職然發運使専司東都至京師轉運之事都轉運使則總司諸道而又兼掌鹽鐡及貨財出入之柄又兼今鹽漕察院倉場侍郎之職也舊唐書敬宗本紀長慶四年五月東都江陵監大轉運留後並改為知院官從其使王涯請也司馬光資治通鑑廣明元年二月髙駢奏改揚子院為發運使胡三省注宋朝江淮發運使本此謹案唐自開元以後以轉運使總各道租庸鹽鐡之轉輸以巡院留後分司之即今各省糧道之職任也廣明時髙駢奏改揚子院為發運使至五代及宋鹽鐵轉運使變而為三司使而江淮六路之財賦但以發運使専主之矣新唐書食貨志故事州縣官充綱送輕貨四萬書上考開成初為長定綱州擇清強官送兩稅至十萬遷一官往來十年者授縣令江淮錢積河隂轉輸嵗費十七萬餘緡行綱多以盜抵死判度支王彥威置縣遞羣畜萬三千三百乘使路傍民養以取傭日役一驛省費甚博而宰相亦以長定綱命官不以材江淮大州歲授官者十餘人乃罷長定綱送五萬者書上考七萬者減一選五十萬減三選而已及户部侍即裴休為使以河瀕縣令董漕事自江達渭運米四十萬石居三嵗米至渭橋百二十萬石謹案唐兩稅皆民自輸送而州縣遣官督之通鑑所載盧承慶為司列太常伯考一督運官遭風失米者是也貞元時轉運鹽鐡使嘗奏諸院自差綱般運然其後又以州縣官充綱如故開元初州縣官充綱送兩稅往來十年者授縣令則綱運官皆以簿尉充之與五季五代史張延朗列傳梁興置租庸使領天下錢穀廢户部度支鹽鐡之官莊宗滅梁因而不改明宗入立廢其使以大臣一人判户部度支鹽鐡號曰判三司詔以延朗充三司使謹案唐時鹽鐡轉運使司鹽鐡租庸之轉輸而兼掌財貨出納之柄梁改置租庸使後唐又置三司使而猶仍唐制以鹽鐡轉運合為一司則尚領漕務也至宋而三司使鹽鐡一司不帶轉運但以糧料案兼掌御河漕運發運案兼掌汴河廣濟蔡河漕運則於邦計詳而於漕務略矣宋宋史職官志發運使副判官掌漕淮浙江湖六路儲廩以輸中都紹興二年用臣僚言省罷以其職事分委漕臣八年再置經制發運使以徽猷閣待制程邁充邁上疏以租庸常平鹽鐡鼓鑄各分於諸司而總於户部發運使無所用之固辭不行九年遂廢發運使以户部侍郎梁汝嘉為經制使檢察中外失陷錢物與催未到綱運為職未幾復以臣僚言分其責于諸路監司乾道六年復置以户部侍郎史正志為兩浙京湖淮廣福建等路都大發運使是冬以奏課誕謾貶併廢其職都轉運使轉運使副使判官掌經度一路財賦而察其登耗有無以足上供及郡縣之費熙寧初詔河東河北陜西三路漕臣許乘傳赴闕留毋過浹日既又詔三路漕臣自辟屬各二員以京朝官曽厯知縣者為之元祐初司馬光請漕臣除三路外毋得過二員其屬官溢員亦省之紹聖中詔淮浙江湖六路上供米計其近逺分三限自季冬至明年八月以次輸足大觀中陜西漕臣以四員為額政和中又詔陜西以三員熙泰兩路各二員宣和初又詔陜西以都漕兩員總治于長安而漕臣三員分領六路中興後置官掌一路財賦之入或别置隨軍轉運使一員或諸路事體當合一則置都轉運使以總之江東西路分置三帥置都轉運使一員張公濟為兩浙荆湖廣南福建都運趙開為四川都運隨軍及都運廢置不常而正使不廢若副使若判官皆隨資之淺深稱焉食貨志太平興國八年擇強幹之臣在京分掌水陸發運使雍熙四年并水陸路發運為一司端拱元年罷京師水陸發運使以其事分𨽻排岸司及下缷司大中祥符初江南淮南兩浙荆湖路租糴于真揚楚泗州置倉受納分調舟船泝流入汴以逹京師置發運使領之陜西諸州菽粟自黃河三門沿流入汴以達京師亦置發運使領之粟帛自廣濟河而至京師者京東之十七州由石塘惠民河而至京師者陳潁許蔡光夀六州皆有京朝官廷臣督之河北衛州東北有御河達乾寧軍其運物亦廷臣主之馬端臨文獻通考東萊吕氏曰國初未嘗有監司之目其始除轉運使只因軍興専主糧餉班師即停罷太祖開寶五年命二參政事薛居正吕餘慶兼領提舉諸州水陸轉運使明年薛居正沈義倫拜相復以二相兼提舉水陸漕運事纍朝以武臣為帥守而兼漕事或以文臣任帥守兼漕謹案宋於各路置轉運使以司一路之賦入而江南淮南兩浙荆湖六路又置發運使以總領其事蓋本唐時之揚子院留後以鹽鐵轉運副使充之廣明時髙駢奏改為發運使至宋而鹽鐵轉運使變置三司使而江淮沿唐制置發運使以總鹽漕茶務實即唐時轉運之職也然宋之轉運使其初置本専以督糧餉而其後于一路之事無所不統邊防盜賊刑獄按亷之任皆總之蓋其稱雖曰漕帥而實則為今日藩司之任矣其職掌已詳司道表中今仍互見於此焉宋史食貨志初荆湖江浙淮南諸州擇部民髙資者部送上供物舟人侵盜官物民破産不能償乃詔牙吏部送勿復擾民熙寧七年十二月詔濬廣濟河增置漕舟其後河成歲漕京東榖六十萬石東南諸路上供雜物舊陸運者增舟水運押汴河江南荆湖綱運七分差三班使臣三分軍大將殿侍政和七年立東南六路州軍知州通判裝發上供量斛任滿賞格自一萬石至四十萬石升名減年有差宣和二年詔六路米麥綱運依法募官先募未到部小使臣及非泛補授挍尉以上未許參部人并進納人管押淮南以五運兩淮及江東二千里內以四運江東二千里外及江西三運湖南北二運各欠不及五釐依格推賞外仍許在外指射合入差遣一次召募土人並罷遼遼史百官志轉運司職名總目某轉運使某轉運副使同知某轉運使某轉運判官山西路轉運使司轉運判官司楊晳興宗重熙二十年為山西轉運使奉聖州轉運使司聖宗開泰三年置蔚州轉運使司應州轉運使司朔州轉運使司保州轉運使司並開泰三年置西山轉運使聖宗太平三年見西山轉運使郎元化金金史百官志都轉運司使正三品掌稅賦錢穀倉庫出納權衡度量之制同知從四品副使正五品都勾判官從六品紀綱衆物分判勾案惟南京勾判兼上林署丞户籍判官二員從六品舊止一員承安四年增置一員不許别差専管拘收徵尅等事支度判官三員從六品掌勾判分判支度案事鹽鐵判官一員從六品都孔目官二員勾稽文牘知法二員從八品都勾案户籍案鹽鐵案支度案開折案司吏女直八人漢人九十人抄事一人譯史三人通事一人押遞五十人監運諸物公使八十人惟中都路置都轉運司餘置轉運司省户度判官各一員南京西京北京遼東山東西路河北東路則置女直知法漢知法各一員山東東路河東南路北路河北西路陜西東路西路則置漢知法一員餘官皆同中都置女直司司吏遼東路十人西京北京山東西路各五人餘路皆四人譯史遼東路三人餘各二人通事各一人漢人司司吏課額一百八十萬貫以上者五十人百五十萬貫以上四十五人百二十萬貫以上四十人九十萬貫以上三十五人六十萬貫以上三十人三十萬貫以上二十五人不及三十萬貫二十人公使人各七十人押遞南京山東東西路河東南路河北西路各五十人西京河東北路河北東路各四十人餘路各三十人泰和八年十一月省議以轉運使權輕州縣不畏不能規措錢榖遂詔中都都轉運依舊専管錢穀事自餘諸路按察使並兼轉運使副使兼同知簽按察並兼轉運副添按察判官一員為從六品中都西京路按察司官止兼西京路轉運司事遼東轉運使兼按察副使同知轉運使兼簽按察司使轉運副使兼按察判官謹案金於諸路設轉運使而於京師設都轉運使以總之都轉運使又主倉庫之出納及支度鹽鐵之政實即唐鹽鐵轉運使之職但唐時皆以宰相或他官充使而金則别置一官耳金史百官志漕運司提舉一員正五品景州刺史兼領掌河倉漕運之事同提舉一員正六品勾當官從八品掌催督起運綱船司吏六人分掌課使起運兩科各設孔目官前後行各一人公使八十一人押綱官七十六人景州依此置肇州以提舉兼本州同知同提舉兼州判謹案金都於燕京師有都轉運使又於景州置漕運司提舉猶唐置諸道轉運使而又於陜虢置發運使也金漕運司提舉秩正五品然於都轉運使各為一司不相統轄至元而提舉司為都漕之屬矣金史河渠志泰和元年尚書省以景州漕運司所管六河倉歲稅不下六萬餘石其科州縣近者不下二百里官吏取賄延阻人不勝苦雖近官監之亦然遂命監察御史二員往來糾察之元元史百官志京畿都漕運使司秩正三品運使二員正三品同知二員正四品副使二員正五品判官二員正六品經歷一員正七品知事一員從八品提控案牘兼照磨二員掌凡漕運之事世祖中統二年立漕運所至元五年改漕運司秩五品十二年改都漕運司秩四品十九年改京畿都漕運使司秩正三品二十四年內外分立兩運司而京畿都漕運司之額如舊止領在京諸倉出納糧斛及新運糧提舉司站車儧運公事省同知通判知事各一員而押綱官𨽻焉延祐六年增同知副使運判各一員其後定置官員已上正官各二員首領官四員吏屬令吏二十一人譯史二人回回令史二人通事一人知印二人奏差一十六人典吏二人新運糧提舉司秩正五品管站車二百五十輛都提舉一員同提舉二員副提舉一員吏目一人司吏八人奏差十二人通惠河運糧千户所秩正五品掌漕運之事中千户一員中副千户二員都漕運使司秩正三品掌御河上下至直沽河西務李二寺通州等處儧運糧斛至元二十四年自京畿運司分立都漕運司于河西務置總司分司臨清運使二員正三品同知二員正四品副使二員正五品運判三員正六品經厯一員從七品知事一員從八品提控案牘二員內一員兼照磨司吏三十三人通事譯史各一人奏差一十六人典吏一人滎陽等綱凡三十綱設押綱官二員計六十員秩正八品每編船三十隻為一綱船九百餘隻運糧三百餘萬石船户八千餘戶綱官以常選正八品為之兩都陸運提舉司秩正五品掌兩都陸運糧斛之事至元之十六年始置運糧提舉司延祐四年改今名提舉二員從五品副提舉一員從七品吏目一員司吏六人委差一十人海王莊七里莊魏家莊臘八莊四所各設提領一人用從九品印海道糧運萬戶府至元二十年置秩正二品掌每嵗海道運糧供給大都達嚕噶齊一員萬戶一員並正三品副萬户四員從三品經厯一員從七品知事一員從八品照磨一員從九品鎮撫二員正五品海運千戶所秩正五品達嚕噶齊一員千户二員並正五品副千户三員從五品若溫台若慶元紹興若杭州嘉興若崑山崇明常熟江隂等處凡五所漕運司至元二年五月京畿都漕運司添設提調官運副運判各一員九年添設海道巡防官給降正七品印信掌統領軍人水手防護糧船巡防官二員相副官二員防禦海道運糧萬户府至正十五年七月升台州海道巡防千户所為防禦海道運糧萬户府九月置分司于平江元史羅璧傳至元十二年始運江南糧而河運弗便十九年因丞相巴延滿州語富也原作伯顔今改正言初通海道漕運立運糧萬户三而以璧與朱清張瑄為之薛應旗續資治通鑑元糧運仰給江南者或自浙西涉入江淮由黃河逆至中灤陸運至淇門入御河以至京師又或自利津河或開膠萊入海勞費無成巴延平宋時遣朱清張瑄等載宋庫藏諸物從海道入京師二人遂言海運可通乃命總管羅璧暨瑄等造船六十艘運糧四萬六千餘石由海道入京然創行海洋亦逾年始至朝廷未知其利仍通舊運尋復因孟古岱蒙古語有銀也原作忙兀䚟今改正言海運為便遂立萬户府四總其事又併四府為都漕運萬户府一止令清瑄二人掌之元史食貨志至元二十五年內外分置漕運司二其在外者於河西務置司領接運海道糧事至大四年遣官至江浙議海運事時江東寧國池饒建康等處運糧率令海船從揚子江逆流而上江水湍急又多石磯走沙漲淺糧船俱壞歲歲有之又湖廣江西之糧運至真州始入海船船大底小亦非江中所宜於是以嘉興松江入糧並江淮江浙財賦府歲糧辦充海運海運之利至是博矣元史世祖本紀至元十九年十月由大都至中灤中灤至瓜州設南北兩漕運司命遊顯専領江浙行省漕運二十年八月濟州新開河成立都漕運司二十二年二月增濟州漕舟三十艘役夫萬二千人初江淮嵗漕米百萬石於京師海運十萬石膠萊六十萬石而濟之所運三十萬石水淺舟大恆不能達更以百石之舟舟用四人故夫數增多二十五年二月改濟州漕運司為都漕運司併領濟之南北漕京畿都漕運司惟治京畿二十六年正月海船萬户府言山東宣慰司樂實所運江南米陸負至淮安易閘者七然後入海歲止二十萬石若由江隂入江至直沽倉民無陸負之苦且米石省運估八貫有竒乞罷膠萊道運糧萬户府而以漕事責臣當歲運三十萬石詔許之二十八年正月罷江淮漕運司併于海船萬户府由海道漕運謹案元都于燕資海運以給京師然世祖平宋之初江淮之運尚未専由海道有中灤運道有新開河運道有膠萊運道其司漕務者有江淮都漕運使濟州都漕運使膠萊萬戶府其後海運通利而江淮濟州漕運司及膠萊萬户府皆罷其京畿都漕運使則掌自通州運至京師又分置都漕運司于河西務及臨清接領海運自直沽運至通州而河南山東之漕不由于海道者亦掌焉都漕運使海運萬户並為今總漕之任而京畿河西務兩都漕掌諸倉以收納漕糧又兼今倉場侍郎之職也至兩都陸運提舉司掌自大都運米至上都𨽻于兵部本非都漕之屬以其職掌運粟故因類而附録之焉明明史食貨志明初命武臣督海運嘗建漕運使尋罷成祖以後用御史又用侍郎都御史催督郎中員外分理主事督兊其制不一景泰二年始設漕運總督於淮安與總兵參將同理漕事漕司領十二總十二萬軍與京操十二營軍相準初宣宗令運糧總兵官巡撫侍郎歲八月赴京會議明年漕運事宜及設漕運總督則併令總督赴京至萬厯十八年後始免凡歲正月總漕巡揚州經理瓜淮過閘總兵駐徐邳督過洪入閘同理漕參政管押赴京攢運則有御史郎中押運則有參政監兊理刑管洪管厰管閘管泉監倉則有主事清江衛河有提舉兊畢過淮過洪巡撫漕司河道各以職掌奏報職官志總督漕運兼提督軍務巡撫鳳陽等處兼管河道一員太祖時嘗置京畿都漕運司設漕運使永樂間設漕運總兵官以平江伯陳瑄治漕宣德中又遣侍郎都御史少卿等官督運至景泰二年因漕運不繼始命副都御史王竑總督因兼巡撫淮揚廬鳳四府徐和滁三州治淮安成化八年分設巡撫總漕各一員九年復舊正德十三年又分設十六年又復舊嘉靖三十六年以倭警添設提督軍務巡撫鳳陽都御史四十年歸併改總督漕運兼提督軍督務明會典督運官員總督都御史一員總兵官一員謹案明永樂時設漕運總兵官蓋倣元時海運萬户府之制以武臣總漕務宣德時或遣侍郎都御史等官督運而不常置漕務實總于總兵景泰中始設漕運總督於是總漕與總兵同司漕務而總漕之權重則總兵之任輕矣漕運總督並兼巡撫淮揚雖成化正德嘉靖間皆嘗分置巡撫然自嘉靖四十年歸併之後至崇禎時不改故朱大典史可法皆以總督漕運兼巡撫廬鳳淮揚等郡又明自𢎞治時置總河侍郎與總漕分理河漕其後二職亦分合不常明史職官志沿明會典之文故總漕以兼管河道著銜蓋明會典成于萬厯十五年其時河漕并為一職至萬厯十六年河漕又分理而職官志未之及也其詳見于河道表中明史職官志十三道監察御史在外巡漕儧運明會典儧運御史一員舊用户部郎中一員三月奏差後改差御史謹案明會典永樂十六年令沿河壩閘每三處差御史一員儧運十七年令侍郎都御史並武職大臣各一員催督糧務宣德二年差侍郎五員都御史一員催督浙直府軍民糧運四年差侍郎都御史少卿郎中等官儧運𢎞治二年議準每嵗于户部郎中員外郎主事內推選一員領敇催儧運船隆慶六年題準給儧運郎中關防蓋明時儧運或遣卿二或遣部曺或遣御史至萬厯時始定差御史而今因之明史百官志督糧道十三布政司各一員俱駐省城明會典天順元年令各處監兊民糧司府州每歲承委後先行本部知會徑赴總督漕運官處比較成化二十一年令每年户部差官一員於山東河南南京户部差官四員于浙江江西湖廣南直𨽻地方督同各司府州縣正官并管糧官徵兊𢎞治三年取回各處監兊主事官止令各該管糧官監兊七年令兩京户部差主事等官于湖廣江西浙江山東河南及南直𨽻等府催督監兊民糧正德七年題準改委戶部屬官四員分往南直𨽻浙江江西湖廣地方監兊嘉靖四十四年題準南直𨽻浙江江西湖廣等處監兊官各給關防一顆謹案明時以各司府州正官及管糧官徵兊漕糧又遣主事五員分督之見於明會典者如此國初以府推官監兊乃沿明末之制蓋明之監兊主事萬厯十六年以後嘗罷遣而専以府佐監兊也明會典押運參政一員明史百官志漕運總兵官永樂二年設總兵副總兵統領官軍海運海運罷専督漕運天順元年又令兼理河道協同督運參將一人天順元年設把總十二人南京二江南直𨽻二江北直隸二中都一浙江二山東一湖廣一江西一明會典運糧官軍南京把總二各領衛十三錦衣衛廣洋衛江隂衛龍虎衛鎮南衛神䇿衛府軍衛府軍右衛豹韜左衛龍江右衛金吾後衛虎賁左衛留守左衛以上把總一員領旗手衛府軍左衛金吾前衛府軍後衛興武衛瀋陽右衛應天衛橫海衛水軍左衛水軍右衛龍虎左衛龍江左衛羽林左衛以上把總一員領江南直𨽻把總二領衛所十九建陽衛新安衛安慶衛九江衛宣州衛鷹揚衛豹韜衛武德衛留守右衛虎賁右衛以上上江把總領鎮江衛太倉衛蘇州衛鎮海衛留守中衛驍騎右衛羽林右衛嘉興守禦千戶所松江守禦千戶所以上下江把總領江北直𨽻把總二領衛所十五淮安衛大河衛泗州衛邳州衛夀州衛以上把總一員領揚州衛髙郵衛儀真衛廬州衛六安衛滁州衛通州守禦千戶所泰州守禦千戶所鹽城守禦千戶所興化守禦千户所以上把總一員領中都把總一領衛所十一留守左衛留守中衛鳳陽衛鳳陽右衛鳳陽中衛懷逺衛長淮衛宿州衛武平衛潁州衛洪塘湖屯田千户所浙江把總二領衛所十三抗州前衛杭州右衛紹興衛海寧衛海寧守禦千户所湖州守禦千户所嚴州守禦千户所以上浙西把總領寧波衛台州衛溫州衛處州衛衢州守禦千戶所金華守禦千户所以上浙東把總領山東把總一領衛所十九臨清衛平山衛東昌衛濟寧衛兖州護衛東守禦千户所濮州守禦千户所以上係本總原領徐州衛徐州左衛歸德衛德州衛德州左衛天津衛天津左衛天津右衛通州左衛通州右衛定邊衛神武中衛以上係裁革遮洋併入本總數湖廣把總一領衛所十舊有荆州左衛嘉靖間改顯陵衛舊有安陸衛改承天衛俱免運武昌衛武昌左衛蘄州衛黃州衛荆州衛荆州右衛嶽州衛襄陽衛沔陽衛德安守禦千户所江西把總一領衛所十一南昌衛袁州衛贑州衛吉安守禦千戶所安福守禦千户所永新守禦千户所撫州守禦千户所建昌守禦千户所鉛山守禦千户所廣信守禦千户所饒州守禦千户所宣德三年奏準各都司衛所選委指揮等官専一運糧不許别項差操五年令巡按御史布按二司及漕運都指揮選舉管糧官員軍多衛指揮二員少者一員十年令都督運糧都指揮等官許乘糧船一隻量帶官糧凡有漕運地方成化十六年添設佐二都指揮一員専掌漕運不與軍政謹案前明漕運設旗甲以挽運之設運總以統領之設漕道糧道以督押之設總漕巡漕以提衡巡察之逮於國朝循用不改然自宋以前皆用民運至元設萬户府始以軍運明初行支運之法軍民並任其事其後變為兊運又變為長運民雖免於輸將失業而軍民交兑不免需索之弊國初改為官收官兑酌定贈貼官為支給軍民兩便實為良法列聖軫念民食湛恩時霈民間荒歉則有改折之條運軍挂欠則有寬免之令燭吏胥之刁難以清弊竇禁商船之起撥以惠行旅深仁厚澤有加無已皇上恩及運丁曲加體恤天庾豐盈於上而軍忘挽運之勞民有倉箱之積洵前古所未有也欽定厯代職官表卷六十
