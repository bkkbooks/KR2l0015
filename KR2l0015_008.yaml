body:
  text: 內閣表謹案內閣職司票擬其官創自眀初原不過如知制誥之翰林並非古宰相之職而由眀以溯厯代其所謂秉鈞大臣者官號升降亦復代不相沿蓋嘗綜而論之自舜納大麓禹宅百揆見于尚書亦越成周有三公論道經邦之文尚無所謂相即說命左傳所載傅說爰立作相齊慶封為左相之類亦僅取其佐相之義而非實有是官號也自秦置丞相相國以助理萬幾漢代因之始稱為宰相之職逮東漢安帝時衆務悉由尚書魏文帝又置中書監今自是事歸臺閣厯南北兩朝皆以中書監侍中尚書令僕射諸官參掌機密並無常職其事雖宰相之事其官已非宰相之官矣唐則中書令侍中尚書令僅存虛名而以他官之同中書門下平章事者為丞弼之任宋以後或稱僕射或稱丞相而所謂丞相者或繫中書省或繫尚書省更革不一中間雖偶襲相名而要其實亦祗三省長官迥非秦漢之丞相可比特其職既綜理省務則六尚書悉為其統轄百司庶府之事皆當聽中書門下之裁决而後上聞故自唐以來僉壬在位者猶得以竊政而蠧國也眀初尚沿舊制置中書左右丞相自胡惟庸謀逆事覺始革中書省其政於六部厯代所謂宰相之官由此遂廢不設雖嘗仿唐宋集賢資政之制置大學士亦僅備顧問並不與知國政至成祖肇置內閣始以翰林入直洊升大學士然秩止五品而已仁宣以後大學士往往晉階保傅品位尊崇閣權漸重用非其人間有倒持太阿授之柄者而核其司存所在不特非秦漢丞相之官亦并非漢唐以來三省之職任矣至漢制以御史大夫遞遷丞相故謂之副相實則専掌舉劾不司鈞軸宋代始置參知政事下宰相一等為今協辦大學士權輿所自然宋之參政乃政府正員而今協辦職本尚書誠如聖訓不過御史裏行學士裏行之類與宋制亦殊有差别總之鈞衡近地職參密勿其事權之屬與不屬原不係乎宰相之名而惟視乎人主之威柄以為操縱伏讀御製書程頥論經筵劄子後有云夫用宰相者非人君其誰為之使為人君者但深居髙處自修其德惟以天下之治亂付之宰相已不過問幸而所用若韓范猶不免有上殿之相爭設不幸而所用若王吕天下豈有不亂者此不可也且使為宰相者居然以天下之治亂為己任而目無其君此尤大不可也大哉王言垂訓深切蓋惟萬機親理則雖丞相亦克效寅恭若魁柄下移則即大學士亦可潜操威福厯朝置相互有重輕其得失咸準諸此我國家宫府肅清乾綱獨攬敻軼萬世班朝蒞政無不欽承宸斷凡備員綸閣者惟知恪奉官常董正鴻規永昭典則而追尋往制端緒棼繁治忽所關鑒誡斯在謹先闡繹聖訓撮叙大凡以眀綱領至厯代沿革之由則仍詳考於各本條下焉內閣上國朝官制大學士滿洲漢人各二人初定滿洲一品漢人二品順治十五年改俱為正二品雍正八年俱升為正一品大學士均由特簡贊理機務表率百僚補授後請㫖兼殿閣及六部尚書銜殿閣名凡六曰保和殿文華殿武英殿體仁閣文淵閣東閣舊制殿名四閣名二乾隆十三年省各中和殿銜增入體仁閣銜為殿閣名三國初置文館天聰十年改為內三院曰內國史院曰內祕書院曰內𢎞文院各設大學士一人分其事為職掌內國史院掌記注內祕詔令編纂史書及撰擬諸表章之屬書院掌撰外國往來書狀及善惡敕諭祭文之屬內𢎞文院掌注釋厯代行事勸講御前侍講皇子並教諸親王及德行制度之屬順治元年增設學士二年定為正二品衙門以翰林院官分𨽻內三院稱內翰林國史院內翰林祕書院內翰林𢎞文院增設侍讀學士侍讀等官九年設典籍十五年改內三院為內閣其大學士俱改殿閣銜仍分設翰林院十六年裁學士侍讀等官十八年復改內閣為內國史院內祕書院內𢎞文院裁翰林院康熙九年仍改為內閣另設翰林院如舊制十年仍補學士以下等官滿漢大學士順治元年設六員不備官康熙間率用四員雍正年多用至六員乾隆十三年定制滿漢各二員尚書協辦大學士滿洲漢人各一人俱從尚書本銜為從一品以六部尚書簡充自雍正年以來初置與大學士同釐閣務學士兼禮部侍郎銜滿洲六人漢人四人初定滿洲漢軍二品漢人三品順治十五年改俱為正五品尋以兼禮部侍郎銜改為正三品雍正八年升為從二品掌敷奏本章傳宣綸綍初制置滿洲學士三員漢軍三員自順治元年以後增減不一康熙九年定滿洲學士二員十年增四員又定漢軍二員漢人二員十二年以漢軍併於漢缺共四員俱兼禮部侍郎銜侍讀學士滿洲四人䝉古二人漢人二人初制三品後改為從五品雍正三年定為從四品掌收發本章總稽翻譯順治二年置初兼太常寺卿銜後停兼銜八年設滿洲侍讀學士三員漢軍侍讀學士三員十八年增滿洲侍讀學士三員䝉古侍讀學士三員康熙九年定制滿洲侍讀學士滿文二員漢文二員共四員䝉古侍讀學士二員漢軍侍讀學士二員乾隆十四年改定漢軍侍讀學士缺出以漢軍漢人通行銓補侍讀滿洲十人䝉古漢軍漢人各二人初制四品後改為正六品掌勘對本章檢校籖票順治二年置初兼太常寺少卿光祿寺少卿銜尋停兼銜滿洲侍讀初設滿文五員滿漢文六員共十一員康熙三十八年省滿文一員滿漢文二員共八員旋復增二員為十員雍正四年置漢侍讀二員典籍滿洲漢軍漢人各二人正七品掌收貯圖籍出納文移內閣為典掌絲綸之地自大學士以下皆不置印惟典籍給印以鈐往來文牒順治九年置初各設三員康熙九年定各設二員俱以中書舍人掌理中書滿洲七十人䝉古十有六人漢軍八人漢人三十人貼寫中書滿洲四十人䝉古六人從七品掌撰擬紀載翻譯繕書之事順治十六年置滿洲中書初設滿文撰文二十員辦事二十員滿漢文撰文十七員辦事十八員共七十五員康熙三十八年省清文撰文辦事各一員清漢文撰文一員辦事二員共七十員䝉古中書初設撰文九員辦事十員共十九員康熙三十八年省撰文一員辦事二員共十六員漢軍中書初設撰文五員辦事八員共十三員康熙三十八年省撰文一員辦事四員共八員漢人中書初設撰文六員辦事三十員共三十六員康熙三十八年省四員乾隆十三年又省二員共三十員中書科中書舍人滿洲二人漢人四人從七品掌書誥敕初設滿洲中書舍人一員漢人中書舍人八員乾隆十三年省漢人中書舍人四員十四年增滿洲中書舍人一員謹案內閣自侍讀學士以下辦理本章分為五所曰滿本房專司繕寫清字校正清文曰漢本房專司翻譯清漢文曰䝉古本房專司翻譯外藩章奏及繕寫頒行西番屬國詔敕曰滿票籖處曰漢票籖處專司繕寫清漢票籖記載諭㫖及撰文之事又有稽察房稽察各部院遲延事件月終彚奏大學士酌委侍讀學士侍讀中書兼司之又稽察欽奉上諭事件處雍正八年置以滿洲漢人大學士各部院堂官兼領其文移鈐以典籍印以上各處雖非設有專官而職守所存均關綸扉典則謹識於此厯代建置上三代至後周三代晉書職官志成湯居亳初置二相以伊尹仲虺為之伊尹號為阿衡仲虺臣名為湯左相謹案管子稱黃帝得六相而天地治神明至謂蚩尤大常奢龍祝融大封后土也路史稱舜得十六相而天地治謂八元八凱也其說皆出自子家附㑹不足憑信今並不取至成湯二相亦不過取輔相之義而非其官號然前代所置左右相實據此立名今故仍托始於殷代焉尚書說命爰立作相王置諸其左右孔安國傳於是禮命立以為相使在左右蔡沈書集傳置諸左右蓋以冡宰兼師保也尚書序召公為保周公為師相成王為左右蘇軾書傳三公論道左右相任事周召以師保為左右相謹按三代置相雖本左右輔相之義非設有是官然惟王朝得稱之至秦置丞相亦天子之制若春秋侯國準周制僅當置三卿乃左傳稱齊慶封為左相史記齊世家崔杼為右相以上卿執國柄者亦稱為相凌越殊甚逮漢世而諸侯王皆得置相名實尤為乖舛蓋自周衰禮廢僣濫相仍殊不足為典則也秦史記秦本紀武王二年初置丞相樗里疾甘茂為左右丞相應劭曰丞者承也相者助也杜佑通典始皇尊立吕不韋為相國則相國丞相皆秦官也又漢官儀云皆六國時官金印紫綬掌丞天子助理萬幾秦初有左右荀悅曰秦本次國命卿二人是以置左右丞相無三公官至二世復有中丞相漢漢書百官公卿表相國丞相皆秦官金印紫綬掌丞天子助理萬幾秦有左右髙帝即位置一丞相杜佑曰髙帝元年拜曹參為假左丞相即漢初丞相當有左右今言一丞相或漢書之誤十一年更名相國緑綬孝惠髙后置左右丞相文帝二年復置一丞相有兩長史秩千石張湯傳殺臣者三長史也顔師古注兼有守者非正員故耳哀帝元壽二年更名大司徒武帝元狩二年初置司直比二千石掌佐丞相舉不法謹案丞相之名始於秦而始皇尊吕不韋為特置相國則相國在丞相之上蓋猶後世之平章軍國重事也漢初丞相與相國迭為廢置則不過一官異名與秦制少異逮魏既置丞相而司馬師兄弟復為相國則仍尊於丞相矣又漢自文帝時周勃罷免陳平獨相遂專置一相武帝征和二年雖以劉屈氂為左丞相分丞相長史為兩府以待天下逺方之選然右相實未嘗授也章如愚羣書考索漢初或因軍功而加丞相者樊噲酈商或假丞相之名王應麟曰髙帝三年以韓信為左丞相曹參樊噲左酈商右皆借此名以出軍又尹恢以左丞相守淮陽又漢制常以列侯為相自公孫宏以布衣數年登相位而後封平津侯謹案樊噲酈商等假相名以出軍此即後世使相之始通典成帝綏和元年御史大夫何武建言古者民謹事約國之輔佐必得賢聖然後則天三光備三公官三光日月星各有分職今末俗之弊政事煩多宰相之才不能及古而今丞相獨兼三公之事所以大化久未洽也宜建三公官定卿大夫之任分職授政以考功效於是上拜曲陽侯王根為大司馬而何武自御史大夫改為大司空皆金印紫綬比丞相則三公俱為宰相唐六典秦置丞相省司徒漢因之至哀帝元壽二年更名大司徒與大司馬大司空為三公王應麟曰漢人見牧誓司馬司徒司空亞旅以為古三公不知此乃為諸侯時制漢書哀帝紀元壽二年五月正三公官分職董賢為大司馬孔光為大司徒彭宣為大司空太平御覽漢官典職曰司徒本丞相官哀帝改為大司徒主司徒衆馴五品府與蒼龍闕對厭於尊者不敢稱府也謹案漢自霍光以大司馬大將軍平尚書事遂秉國政則未建三公以前丞相已屬具官特其虛名尚存故霍光𫝊奏事內丞相臣敞仍列於大司馬大將軍臣光之前也至元壽中正三公官於是大司馬徑居大司徒之上矣又案御史大夫漢時稱為副相故杜佑以為若同平章事參知機務之類然其所掌乃外督部刺史內受公卿奏事舉劾案章並非鈞衡之任今故仍入都察院表內不列於此焉通典後漢廢丞相及御史大夫而以三公綜理衆務則三公復為宰相後漢書百官志太尉公一人本注曰掌四方兵事功課嵗盡即奏其殿最而行賞罰凡郊祀之事掌亞獻凡國有大造大疑則與司徒司空通而論之國有過事則與二公通諫爭之世祖即位為大司馬建武二十三年改為太尉長史一人千石本注曰署諸曹事掾史屬二十四人本注曰漢舊注束西曹掾比四百石餘掾比三百石屬比二百石故曰公府掾比古元士三命者也或曰漢初掾史辟皆上言之故有秩比命士其所不言則為百石屬其後皆自辟除故通為百石云西曹主府史署用東曹主二千石長吏遷除及軍吏户曹主民尸祠祀農桑奏曹主奏議事辭曹主辭訟事法曹主郵驛科程事尉曹主卒徒轉運事賊曹主盜賊事決曹主罪法事兵曹主兵事金曹主貨幣鹽鐵事倉曹主倉榖事黃閣主簿録省衆事令史及御屬二十三人本注曰漢舊注公令史百石自中興以後注不說石數御屬主為公御閣下令史主閣下威儀事記室令史主上章表報書記門令史主府門其餘令史各典曹文書司徒公一人本注曰掌人民事凡教民孝悌遜順謙儉養生送死之事則議其制建其度凡四方民事功課嵗盡則奏其殿最而行賞罰凡郊祀之事掌省牲視濯凡國有大疑大事與太尉同世祖即位為大司徒建武二十七年去大長史一人千石掾屬三十一人令史及御屬三十六人司空公一人本注曰掌水土事凡營城起邑浚溝洫修墳防之事則議其利建其功凡四方水土功課嵗盡則奏其殿最而行賞罰凡郊祀之事掌掃除樂器凡國有大造大疑諫爭與太尉同世祖即位為大司空建武二十七年去大屬長史一人千石掾屬三十一人令史及御屬四十二人後漢書獻帝紀建安十三年罷三公官置丞相御史大夫曹操自為丞相杜佑曰後漢又有相國謹案楊秉稱漢世故事三公之職無所不統語見後漢書列傳第四十四故其曹屬甚多自兵刑錢榖以及長吏遷除皆歸三府之綜核後代宰相職任雖遞有更移而唐尚書都省之左右司宋中書門下之八房五房亦莫不總轄庶務蓋自漢以來六曹皆宰相之統屬也自明革中書省析其事權歸之六部始得專達於天子而內閣惟司票擬之職與古制迥異矣今略採後漢志所載以見其凡而唐宋以後都省屬官則仍詳列於六部表內不復系之內閣云後漢書仲長統傳光武矯枉過直政不任下雖置三公事歸臺閣章懷太子注臺閣謂尚書也自此以來三公之官備員而已永樂大典續事始曰光武即位政事不任三公而盡歸臺閣三公皆擁虛器凡天下之事盡入尚書嘗見後漢羣臣章奏首云臣某奏疏尚書猶今言殿下陛下之類雖是不敢指斥而言亦足見其居要地而秉重權矣當時事無巨細皆是尚書行下三公或不經由三公徑下九卿故在東漢時不惟尚書之權重九卿之權亦重者此也原注按光武不任三公事歸臺閣者蓋當時謂六尚書臺猶今言尚書省也後漢書百官志尚書令一人千石本注曰承秦所置掌凡選署及奏下尚書曹文書衆事尚書僕射一人六百石本注曰署尚書事令不在則奏下衆事劉昭注曰獻帝分置左右僕射左右丞各一人四百石本注曰掌録文書期㑹左丞主吏民章服及騶伯史右丞假署印綬及紙筆墨諸財用庫藏太平御覽漢官儀曰尚書令主贊奏總典綱紀無所不統秩千石故為之者朝㑹不陛奏事增秩二千石天子所服五時衣賜尚書令其三公列卿將大夫五營校尉行復道中遇尚書令僕左右丞皆回車預避衛士傳不得忤臺官臺官過乃得去歐陽詢藝文類聚百官表曰尚書令銅印墨綬總攝諸曹出納王命敷奏萬幾永樂大典漢制叢録曰尚書蓋少府之屬本因秦制置之有令僕有丞郎西京之世為尚書者權任猶輕自入東漢天下之政總歸尚書而三公具位則權任之重大異西京雖然章帝世韋彪上疏言天下樞要皆在尚書尚書之選豈可不重而間者多從郎官超升此位雖曉文法善於應對然察察小慧頗無大能宜簡嘗厯州宰素有名者觀此則知東漢尚書持權甚重而選任猶輕非良典也謹案後漢以尚書為機衡之任故雖為三公者亦必録尚書事然後得知國政如趙熹年融鄧彪徐防張禹李固之徒皆是然其時三公尚存輔弼虛名而為尚書令者不過銅印墨綬未可遽指為宰相亦類明初大學士官止五品也逮至唐宋而令僕及左右丞遂為宰執正官今故並列諸表若夫尚書及尚書郎之分掌曹務者則仍入六部表內兹不具載云三國三國蜀志先主章武元年以諸葛亮為丞相許靖為司徒後主建興十二年以蔣琬為尚書令總統國事蔣琬本傳俄遷大將軍録尚書事謹案蜀漢既有丞相又有司徒兩官並置與東西京稍異至蔣琬以尚書令知國政則猶沿東漢舊制以尚書為機衡之任也通典魏黃初元年改丞相為司徒而文帝復置中書監令並掌機密自是中書多為樞機之任其後定制置大丞相第一品後又有相國齊王以司馬師為之髙貴鄉公以司馬昭為之晉書職官志魏武帝為魏王置祕書令典尚書奏事文帝黃初初改為中書置監令以祕書左丞劉放為中書監右丞孫資為中書令監令蓋自此始也又置通事郎次黃門郎羣書考索魏文帝時置中書監令並掌機密自是中書多為樞機之任其後或置丞相或相國或司徒而中書監令常掌機密多為宰相之任於是權在中書謹案中書之名肇於漢徐堅引謝靈運晉志稱以總掌禁中書記謂之中書者是也自魏設中書監令後世遂與尚書門下並稱三省均為宰相之職然以今制考之尚書省職掌已分入六部門下省亦僅存給事中一官其內閣規制所承惟中書一省而已今故以尚書門下官制參載入六部六科表內而中書省官制則專列內閣一門謹發其凡於此焉通典注吳有左右丞相晉晉書職官志丞相相國並秦官也晉受魏禪並不置自惠帝之後省置無恆為之者趙王倫梁王彤成都王頴南陽王保王敦王導之徒皆非復尋常人臣之職通興晉惠帝永寧元年罷丞相復置司徒永昌元年罷司徒并丞相則與司徒不並置矣丞相興司徒廢置非一其後或有相國或有丞相省置無恆而中書監令常管機要多為宰相之任元帝渡江以王敦為丞相轉司徒荀組為太尉以司徒官屬并丞相為留府敦不受成帝以王導為丞相罷司徒府以為丞相府導薨罷丞相復為司徒府相國丞相皆衮冕緑盩綬盩音史謹案晉初未設丞相武帝即位以安平王孚為太宰鄭沖為太傅王祥為太保義陽王望為太尉何曽為司徒荀顗為司空石苞為大司馬陳騫為大將軍八公並置蓋皆台司之職然特假以名號不必盡知國政今故不列於表嗣是以迄梁陳太宰太尉司空大司馬諸官廢置無常其為之者亦必録尚書事及兼中書監令者始能參預機密已非宰相之任今亦槩從略焉晉書職官志中書監及令並置一人魏置通事郎黃門郎黃門郎已署事過通事乃署名已署奏以入為帝省讀書可晉改曰中書侍郎員四人中書舍人晉初置江左謂之通事舍人掌呈奏案後省而以中書侍郎一人直西省又掌詔命杜佑曰魏晉以來中書監令地在樞近多承寵任是以人固其位謂之鳯凰池焉徐堅初學記中書令魏晉以來皆置一人品第三妙選文學通識之士為之掌王言江左更重其任多以諸公兼之古者宰相本是三公至魏晉中書令掌王言才望既重多以諸公兼之近世以來若三公無其人則闕而中書令當宰輔之任通典注張華為中書令侍中劉卞謂華曰公居阿衡之地庾亮庾冰相次為中書監冰經綸時務升擢後進朝野注心咸曰賢相謹案杜佑此注蓋以證晉代中書監令為宰相之職然考張華本傳華被害時張林稱詔詰之曰卿為宰相云云則史文已明言宰相矣佑失於徴引未免稍疏宋齊梁陳宋書百官志相國一人宋順帝時齊王為相國丞相一人宋世祖初以南郡王義宣為丞相而司徒府如故南齊書百官志國相齊不用人以為贈不列官隋書百官志梁武受命有丞相太宰太傅太保大將軍大司馬太尉司徒司空等官陳承梁皆循其制而又置相國位列丞相上并丞相太宰太傅太保大司馬大將軍並以為贈官通典自魏晉以來宰相但以他官參掌機密或委知政事者則是矣無有常官其相國丞相或為贈官或則不置自為尊崇之位多非尋常人臣之職其真為宰相者不必居此官宋文帝初徐羡之為司空録尚書事後以江湛王僧綽俱為侍中任以機密後又以殷景仁為侍中左衛將軍與侍中右衛將軍王華侍中左衛將軍王曇首侍中劉湛四人俱居門下皆以風力局幹冠冕一時初王宏為江州刺史加侍中後徴輔政以為侍中録尚書事而宏弟曇首為文帝所任與華相埒華常謂已力用不盡每歎息曰宰相頓有數人天下何由得理湛毋憂去職後徴為太子詹事知給事中與殷景仁並被任遇湛常曰今代宰相何難此正可當我南陽郡漢代功曹耳沈演之為侍中衛將軍文帝謂之曰侍中領衛俱為優重此蓋宰相便坐卿其勉之齊王儉為侍中尚書令嘗謂人曰江左風流宰相惟有謝安蓋自況也明帝顧命江祏兄弟及始安王遙光尚書令徐孝嗣領軍蕭坦之更日帖敕時呼為六貴皆宰相也梁何敬容為侍中時徐勉為僕射參掌機事以疾陳解因舉敬容自代故敬容遷為僕射侍中如故此並為宰相後敬容屢轉他官參掌如故又王訓為侍中武帝問敬容曰禇彥回年幾為宰相對曰少遇三十帝曰今之王訓無謝彥回彥回宋明帝時為侍中又周捨卒後朱异為散騎常侍代掌機密按此則或掌機密或録尚書或綜機權或管朝政或單侍中或給事中或受顧命皆宰相也然侍中職任機密之司不必他名亦多為宰相宋書百官志録尚書職無不總王肅注尚書納於大麓曰堯納舜於尊顯之官大録萬幾之政也凡重號將軍刺史皆得命曹授用惟不得施除及加節宋世祖孝建中不欲威權外假省録大明末復置此後或置或省尚書令任總機衡僕射尚書分領諸曹五尚書二僕射一令謂之八座南齊書百官志録尚書尚書令總領尚書臺二十曹為內臺主無令左僕射為臺主與令同隋書百官志梁尚書省置令左右僕射各一人令總統之僕射副令又與尚書分領諸曹左右丞各一人佐令僕射知省事陳並遵梁制初學記侍中漢以為加官無常員晉宋齊梁陳置四人齊職儀及五代史志云晉宋齊梁陳侍中並與三公參國政直侍左右應對獻替法駕出則正直一人負璽唐六典注門下省侍中南齊以功髙者一人為祭酒掌詔令機密鄭樵通志中書令宋與晉同梁中書監令清貴華重大臣多領之其令舊遷吏部尚書才地俱美者為之陳因梁制中書侍郎宋用散騎常侍為之齊梁皆四人梁以功髙者一人主省內事陳因之宋初置通事舍人四員入直閣內出宣詔命凡有陳奏皆舍人持入參決於中自是則中書侍郎之任輕矣齊永平初中書通事舍人四員各住一省時謂之四户權傾天下與給事中為一流梁用人殊重簡以才能不限資地多以他官兼領後除通事字直曰中書舍人專掌詔誥兼呈奏之事魏晉以來詔誥皆中書令及侍郎掌之至是始專於舍人陳置五人隋書百官志陳國之政事並由中書省有中書舍人五人領主事十人書吏二百人書吏不足并取助書分掌二十一局事各當尚書諸曹並為上司總國內機要而尚書惟聽受而已謹案宋齊而降相國丞相既不常置三公官亦僅擁虛名惟尚書任總機衡為宰相之職故當時稱尚書令僕曰朝端南齊書王晏傳既居朝端事多專決又曰端右宋書王僧達傳上初踐阼即居端右胡三省通鑑注謂位居朝臣之右是也又侍中參掌機密亦為相職故王華官侍中稱宰相頓有數人而南齊竟陵王子良以司徒兼侍中親為衆僧賦食行水世以為失宰相體是也至中書之職至梁陳而彌重故大臣之預國論者必兼中書監令尤為政本之地唐宋以三省長官為宰相其規模已肇於此謹具列諸表用徴源委若其時以他官參領政事見於史者如領軍將軍衛將軍右將軍衛尉給事中之類皆得稱為宰相然特出人主一時委任而並非正官今故不列於表馬端臨文獻通考按自後漢時雖置三公而事歸臺閣尚書始為機衡之任然當時尚書不過預聞國政未嘗盡奪三公之權也至魏晉以來中書尚書之官始真為宰相而三公遂為具員其故何也蓋漢之典事尚書中書者號為天子之私人及叔季之世則奸雄之謀篡奪者亦以其私人居是官而所謂三公者古有其官雖鼎命將遷之時大權一出於私門然三公未容遽廢也故必擇其老病不任事依違不侵權者居之東漢之末曹公為丞相而三公則楊彪趙溫尚書令中書監則二荀華歆劉放孫資之徒也魏之末司馬師昭為丞相而三公則王祥鄭沖尚書令中書監則賈充荀朂鍾㑹之徒也蓋是時凡任中書者皆運籌帷幄佐命移祚之人凡任三公者皆備員髙位畏權逺勢之人而三公之失權任中書之秉機要自此判矣至丞相一官西漢廢於哀帝之時東漢本不置丞相建安特置之以處曹操魏本不置丞相正始特置之以處司馬師昭及晉則不置正苻堅所謂朕以龍驤建業之說也然東晉以至宋齊梁陳隋皆有之夫中書監既為宰相之任則升其品秩可也丞相既不為宰相之任而常為嬗代之階則廢其名字可也今觀魏以後之官品中書監僅為三品而黃鉞大將軍大丞相諸大將軍則為一品二品然此數官者未嘗以授人特宋齊梁陳隋將受禪則居之此外則王敦桓溫侯景亦嘗為之夫髙官極品不以處輔佐之臣而又存其名字使亂臣賊子遞相承襲以為竊大物之漸非所以昭德塞違明示百官也謹案馬端臨所論蓋以譏魏晉以來官品之失序唐宋侍中僕射為二三品而中書門下侍郎之同平章事者僅四品明代尚書正二品而大學士之參預閣務者僅五品等級錯貿亦同前代之失至本朝升大學士正一品尚書從一品體統相維名實允稱法制洵昭盡善矣後魏魏書官氏志神瑞元年置八大人官總理萬幾世號八公真君五年正月侍中中書監宜都王穆壽司徒東郡公崔浩侍中廣平公張黎輔政置通事四人通典後魏舊制有大將軍不置太尉有丞相不置司徒自正光以後始俱置之然而尤重門下官多以侍中輔政則侍中為樞密之任侍中後魏置六人加官在其數王應麟玉海政歸尚書漢事也歸中書魏事也元魏時歸門下世謂侍中黃門為小宰相通典後魏天興元年置八部大人於皇城四方四維面置一人以擬八座謂之八國各有屬官分尚書三十六曹及諸外置令大夫主之四年又復尚書三十六曹天賜元年復罷尚書三十六曹别置武歸修勤二職分主省務至神䴥元年始置僕射左右丞及諸曹尚書十餘人各居别寺謹案後魏雖有丞相司徒等官而門下省獨膺鈞衡之寄故侍中稱為宰相然考魏書任城王澄奏以為尚書政本而王肅官尚書令為澄所禁止咸陽王禧奏澄擅禁宰輔免官則尚書令亦宰相也初學記後魏置中書監位在令上中書舍人掌制誥又别置通事舍人掌宣奏富大用事文類聚魏置中書監令各一人監為正一品令為正二品謹案後魏中書之職其清要不及南朝然如髙允崔光等為之皆得參預密議當時又號為西臺大臣蓋其所掌亦宰相之事也謝維新合璧事類摘竒曰後魏古弼為尚書令參知政事謹案唐之參知政事為真宰相宋之參知政事降宰相一等據合璧事類所載則後魏時已有此名矣以文義推之蓋謂其以尚書令輔政猶明代拜大學士者必曰入閣參預機務之類非實有是官號也北齊隋書百官志後齊置官多循後魏乾明中又置丞相河清中分為左右亦各置府僚通典北齊置丞相分為左右然而為宰相秉朝政者亦多為侍中趙彥琛元文遙和士開同為宰相皆兼侍中初學記五代史百官志隋志兼梁陳齊周為五代北齊侍中六人掌獻納諫正及進御之職參與諸公論國政也通典北齊尚書省亦有録令僕射總理六尚書事謂之都省亦謂之北省後濟北王以太子監國立大都督府與尚書省分理衆事仍開府置佐隋書百官志後齊中書省管司王言及司進御之音樂監令各一人侍郎四人又領舍人省掌署敕行下宣㫖勞問中書舍人主書各十人謹案北齊侍中最稱近密故杜佑以為秉政之官然考北齊書祖珽傳珽欲求宰相乃疏趙彥琛元文遙和士開罪狀令劉逖入奏蓋思取其位而代之時彥琛為尚書令士開為中書監則尚書中書實相職矣又北齊時中書省兼掌音樂凡西凉清商諸部伶官皆中書侍郎之屬職守猥雜殊乖政典今併附見於此以著其失焉後周隋書百官志周太祖初據關內官名未改魏號及方隅初定改創章程命尚書令盧辨逺師周之建職置三公三孤以為論道之官太平御覽後周書曰文帝依周禮建六官遂置天官大冡宰卿一人掌邦理以建六典佐皇帝理邦國孫逢吉職官分紀靜帝二年置左右大丞相八月去左右號以隋公楊堅為大丞相通典後周初有御伯中大夫掌出入侍從屬天官府保定四年改御伯為納言斯侍中之職也宣帝末又别置侍中為加官中書監令北齊因魏制後周置內史中大夫二人掌王言亦其任也謹案後周仿周禮設官故以大冡宰為丞相之任而納言內史亦即門下中書職掌惟是既仿六官其勢必不能統於一省所以獨無尚書官屬與厯代不同耳欽定厯代職官表卷二
