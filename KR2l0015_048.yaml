body:
  text: 鑾儀衛國朝官制鑾儀衛掌衛事大臣一人正一品無專員以王公滿洲䝉古文武大臣管理鑾儀使三人正二品内二人以滿洲䝉古兼授一人以漢人漢軍兼授掌供奉乗輿秩序鹵簿辨其名數與其班列凡祭祀朝㑹時巡大閲則帥所司而敬供之既事復進而藏之所屬有左右中前後五所分鑾輿馴馬擎葢弓矢旌節旛幢扇手斧鉞戈㦸班劍十司馴象一所分東西二司旗手一衛分左右二司初順治元年置錦衣衛指揮使等官二年改為鑾儀衛四年罷指揮使置鑾儀使及副使等官五年罷鑾儀副使定鑾儀使滿洲漢人員額各二九年始以内大臣掌衛事康熈三十年省漢人鑾儀使一人所𨽻有軍尉旗尉民尉凡陳設鹵簿儀刀弓矢殳㦸用親軍豹尾槍仗馬用䕶軍䝉古畫角用䝉古畫角軍奉請乗輿用旗尉擎執各項儀仗用民尉由内府選充者為旗尉五城選充者為民尉奉輦旗尉百六十八人民尉六十人各執事旗尉二百四十六人民尉一千八百五十六人皆分𨽻各所乾隆四十四年定凡民尉籍𨽻大興宛平者有闕仍以兩縣人充補其籍𨽻外州縣者有缺則以包衣閑㪚人等改補三旗䝉古布勒器三十人漢軍更夫四十人左所掌所印冠軍使滿洲一人正三品凡滿洲員額皆以䝉古兼授各所衛同掌鑾輿司馴馬司司印雲麾使滿洲二人間㪚雲麾使滿洲一人雲麾使漢軍二人俱正四品各所衛同治儀正滿洲四人漢軍五人俱正五品各所衛同整儀尉滿洲二人漢軍八人俱正六品各所衛同掌輿乗輦輅之事凡各所衛官制員額皆順治十一年定右所掌所印冠軍使滿洲一人掌擎葢司弓矢司司印雲麾使滿洲二人閒㪚雲麾使滿洲一人雲麾使漢軍一人治儀正滿洲三人漢軍二人整儀尉滿洲三人掌繖葢儀刀弓矢槍㦸之事中所掌所印冠軍使滿洲一人掌旌節司旛幢司司印雲麾使滿洲二人間㪚雲麾使滿洲一人雲麾使漢軍一人治儀正滿洲三人漢軍二人整儀尉滿洲二人漢軍一人掌麾氅旛幢纛幟節鉞仗馬之事前所掌所印冠軍使滿洲一人掌扇手司斧鉞司司印雲麾使滿洲二人閒㪚雲麾使滿洲一人雲麾使漢軍一人治儀正滿洲三人漢軍三人整儀尉滿洲二人漢軍二人掌扇罏瓶盂杌椅星拂御仗㯶薦静鞭及品級山之事後所掌所印冠軍使滿洲一人掌班劍司戈㦸司司印雲麾使滿洲二人閒㪚雲麾使滿洲一人雲麾使漢軍一人治儀正滿洲三人漢軍三人整儀尉滿洲二人掌旗幟立瓜卧瓜吾仗之事馴象所掌所印冠軍使滿洲一人掌東司西司印雲麾使滿洲二人閒㪚雲麾使滿洲一人雲麾使漢軍一人治儀正滿洲二人漢軍二人整儀尉滿洲二人掌儀象騎駕鹵簿鐃歌前部大樂旗手衛掌衛所冠軍使滿洲一人掌衛事冠軍使漢軍一人掌左司右司印雲麾使滿洲二人治儀正滿洲二人漢軍二人整儀尉滿洲三人掌金鉦鼓角鐃歌大樂及午門司鐘神武門鐘鼓樓直更之事乾隆七年以鼓手旂尉八十人並頭尉八人𨽻樂部改名署史學習音律又民尉六十人舊以内府匠役閒㪚人借補者亦改用旗人並𨽻樂部焉陪祀冠軍使漢軍二人駕儀管理雲麾使漢軍一人治儀正漢軍三人駕庫管理整儀尉漢軍二人各以其事𨽻屬於衛無專領職掌品秩與各所衛同謹案以上八員雖定置額缺而與七所之各有司存者不同今據現在員數另為一條次於各所衛之後主事滿洲一人經厯漢人一人正七品掌章奉文移員額俱康熈十六年定筆帖式滿洲七人漢軍三人員額康熈十六年定職事具史部篇鳴賛官四人掌賛鳴鞭初制以本衛官八人兼之乾隆三十七年改定於太常寺鴻臚寺賛禮郎鳴賛官内送衛選擇補用漢人侍衛無定員乾隆十三年定制毎科以武進士簡拔侍衛者派撥數員在衛行走以偹差委不為額缺其陞轉仍依侍衛之例厯代建置三代春秋左氏傳薛之皇祖奚仲居薛為夏車正杜預注奚仲為夏禹掌車服大夫荀子奚仲作車正楊倞注夏禹時車正後漢書輿服志奚仲為夏車正建其斿旐尊卑上下各有等級竹書紀年殷太戊三十一年命費侯中衍為車正謹案管子奚仲之車也方圓曲直皆中規矩鈎䋲吕氏春秋寒哀作御奚仲作車淮南子胡曹為衣奚仲為車山海經畨禺生奚仲奚仲生吉光始以木為車郭璞曰世本奚仲造車此言吉光明其父子共創意凡此皆謂造車始於奚仲惟宋志謂包羲畫八卦而為大輿奚仲乃夏之車正安得始造荀子解蔽篇註黄帝已有車服奚仲亦改制耳則是奚仲造車之説或以其為車正而附㑹之奚仲為夏車正中衍為殷車正葢即今鑾儀衛事所自昉也周禮春官巾車下大夫二人上士四人中士八人下士十有六人府四人史八人工百人胥五人徒五十人掌公車之政令辦其用與其旂物而等叙之以治其出入鄭康成注巾車車官之長典路中士二人下士四人府二人史二人胥二人徒二十人掌王及后之五路辨其名物與其用説鄭康成注路王之所乗車司常中士二人下士四人府二人史二人胥四人徒四十人鄭康成注司常主王旌旂掌九旂之物名各有屬以待國事日月為常交龍為旂通帛為旜雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌大戴禮記上車以和鸞為節下車以佩玉為度行以采茨趨以肆夏步還中規折還中矩進則揖之退則揚之然後玉鏘鳴也古之為路車也葢圓以象天二十八橑以象列星軫方以象地三十輻以象月故仰則觀天文俯則察地理前視則睹和鸞之聲側聽則觀四時之運此巾車教之道也穆天子傳天子主車造父為御周禮夏官司戈盾下士二人府一人史二人徒四人掌戈盾之物而頒之祭祀授旅賁殳故士戈盾授舞者兵亦如之軍旅㑹同授貳車戈盾建乗車之戈盾授旅賁及虎士戈盾太僕下大夫二人王出入則自在馭而前驅鄭康成注前驅如今道引也道而居左自馭不參乗辟王也戎右中大夫二人上士二人㑹同充革車鄭康成注充之者謂居左也齊右下大夫二人掌祭祀會同賔客前齊車王乗則持馬行則陪乗道右上士二人掌前道車王出入則持馬陪乗如齊車之儀自車上諭命於從車詔王之車儀王式則下前馬王下則以葢從大馭中大夫二人掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之凡馭路行以肆夏趨以采薺凡馭路儀以鸞和為節戎僕中大夫二人掌馭戎車鄭康成注戎車革路也掌王倅車之政凡巡狩及兵車之㑹亦如之齊僕下大夫二人掌馭金路以賔朝覲宗遇饗食皆乗金路其法儀各以其等為車送逆之節道僕上士十有二人掌馭象路以朝夕燕出入其法儀如齊車田僕上士十有二人掌馭田路以田以鄙掌佐軍之政設驅逆之車馭夫中士二十人下士四十人掌馭貳車從車使車周禮秋官條狼氏下士六人胥六人徒六十人掌執鞭以趨辟王應麟玉海鳴鞭唐有之周條狼氏之遺法也周禮夏官服不氏下士一人徒四人掌養猛獸而教擾之鄭康成注教習使之馴服王者之教無不服節服氏下士八人徒四人掌六人維王之太常鄭康成注維維之以縷王旌十二旒兩兩以縷綴連旁三人持之禮天子旌曵地周禮地官鼓人中士六人府二人史二人徒二十人掌教六鼓四金之音聲以節聲樂謹案車路之等旌旂之飾至周而文物始盛後世衛儀大抵本周制而損益之故其設官亦最為詳備以今制相凖巾車掌公車政令當即如今鑾儀使之職典路道僕田僕馭夫分掌車路當如今左所之職司常掌九旂當如今中所之職司戈盾掌授戈盾節服氏維王之太掌而道右兼以葢從又當如今右所之職條狼氏為鳴鞭所自始當如今前所之職服不氏掌養猛獸當如今馴象所之職而又與旂手衛同掌鐃歌大樂則又並有地官鼓人之職為後世鼓吹令所因今故互見於樂部表以明源流所自至周之太僕一官主左馭前驅又兼有今鑾儀使之職故自秦漢以後太僕並主乗輿鹵簿不獨典司牧政至元明而始專為養馬之官今並互見此表以著其實云秦唐六典秦有六尚尚乗局自秦漢以下其職皆在太僕杜佑通典秦有車府令史記秦始皇本紀中車府令趙髙裴駰集解主乗輿路車謹案宋宋綬作景祐鹵簿圖記稱秦兼屬車九九之數沈約謂古者諸侯貳車九乗秦滅九國兼其車服故八十一乗則儀物之容至秦而益加詳備故特仿周制置太僕以掌之當如今之鑾儀衛而中車府令主乗輿路車則亦近今左所之職也漢漢書百官公卿表奉車都尉掌御乗輿車駙馬都尉掌駙馬顔師古注駙副馬非正駕皆車皆為駙馬一日駙近也武帝初置秩比二千石謹案魯峻石壁殘畫象載南郊大駕出時有云小史持騎幢有云持駙馬有云駙馬上下文殘缺不可讀考百官公卿表駙馬都尉掌駙馬顔註以駙馬為副馬魯峻石壁所謂持駙馬葢維持此駙駕之馬則正駙馬都尉之職爾其云大駕出時即大駕鹵簿其云小史持騎幢即輿服志所云尚書主者即令史副御史蘭䑓令史副皆執注以督整車騎是也漢書霍光列傳光為奉車都尉光禄大夫出則奉車入侍左右漢書百官公卿表太僕掌輿馬屬官有車府路軨令丞武帝太初元年初置路軨顔師古注伏儼曰主乗輿路車又主凡小車軨今之小馬車曲輿也軨音零漢書梁邱賀列傳先驅旄頭應劭注旄頭以羽林為之髪正上向而長衣繡衣在乗輿車前宋書禮志晉武帝問侍臣旄頭何義彭推對曰秦國有竒怪觸山截木惟畏旄頭故虎士服之則秦制也張華曰有是言而事不經臣謂壮士之怒髮踊衝冠義取於此徐爰曰彭張各言意義無所承據案天文畢昴之中謂之天街故車駕以罼罕前引畢方昴圓因其象星經昴一名旄頭故使執之者冠皮毛之冠也漢書東方朔列傳宋萬為式道候顔師古注式表也表道之候若今之武候引駕蔡邕獨㫁天子出車駕次第謂之鹵簿有大駕有小駕有法駕大駕則公卿奉引大將軍參乗太僕御屬車八十一乗備千乗萬騎在長安時出祠天於甘泉備之百官有其儀注名曰甘泉鹵簿中興以來希用之先帝時時備大駕上原陵他不常用法駕公卿不在鹵簿中唯河南尹執金吾洛陽令奉引侍中參乗奉車郎御屬車三十六乗北郊明堂則省諸副車小駕祠宗廟用之每出太僕奉駕上鹵簿於尚書侍中中常侍侍御史主者郎令史皆執注以督整諸軍車騎春秋上陵又省於小駕直事尚書一人從令以下皆先行法駕上所乗曰金根車駕六馬有五色安車五色立車各一皆駕四馬是謂五時副車俗人名之曰五帝車非也西京雜記漢朝輿駕祠甘泉汾隂備千乗萬騎太僕執輿大將軍陪乗名為大駕車有司馬辟惡記里静室象車武剛九斿雲罕皮軒闟㦸鸞旌建華相風烏金根之名儀衛有騎隊鼓吹黄麾騎罼罕節御馬華葢棡鼓之制或分八校或分十六校式道有侯䕶駕有官漢書文帝本紀奉天子法駕迎代邸如淳注法駕侍中驂乗奉車郎御屬車三十六奉漢書劉向列傳任為輦郎顔師古注如今引御輦郎也謹案鹵簿之名始見於西漢李善文選注引胡廣漢官制度曰天子出車駕次第謂之鹵簿唐人謂鹵櫓也甲盾之别名兵衛以甲盾居外為前導皆著之簿故曰鹵簿王應麟引五禮精義謂鹵大盾也以大盾領一部之人故言鹵簿其為説稍殊而其釋鹵為盾則無異葢亦本武衛之義以立此名在漢時屬太僕所掌觀夏侯嬰傳嬰事髙祖為太僕常奉車後事惠帝髙后皆為太僕至文帝入立嬰復以太僕具法駕奉迎終身未嘗遷官葢亦以典司輿輦為近御之官故特隆其任寄與今鑾儀衛之職實為相合所屬若車府路軨諸令丞及式道候奉車郎輦郎則皆今各所所有事而西京雜記稱儀衛分八校或十六校則以事區分職掌亦謂今之有左右中前後五所也又旄頭郎以羽林為之而所掌為乗輿前驅則其職當亦𨽻於太僕漢書外戚傳上官桀為羽林期門郎從武帝上甘泉天大風車不得行解葢授桀桀奉葢雖風常屬車雨下葢輙御上竒其材力是漢時華葢本在車上因風而使桀解下奉持正如周官道右之王下則以葢從可知期門羽林固得並兼奉車之事耳又漢初以奉車駙馬二都尉供奉乗輿最稱親近故霍光任此者㡬二十年至三國時乃多以戚畹勲舊為之迨東晉而後惟尚主者始授此職他人皆不得與嗣是遂為主壻之㝎名而不知其初實主侍從車駕即如管鑾儀衛大臣之職今故並著於表以從其朔焉後漢書百官志太僕卿一人中二千石掌輿馬天子毎出奏駕上鹵簿用大駕則執御車府令一人六百石主乗輿諸車未央廐令一人六百石主乗輿宋書禮志漢制每出警蹕清道建五旗太僕奉駕條上鹵簿後漢書禮儀志車府令設鹵簿駕後漢書輿服志東都大駕太僕校駕法駕黄門令校駕乗輿法駕公卿不在鹵簿中河南尹執金吾雒陽令奉引奉車郎御侍中參乗屬車四十六乗前驅有九斿雲罕鳳凰闟㦸皮軒鸞旂皆大夫載鸞旂者編羽旄列繫幢旁民或謂之雞翹非也後有金鼓黄鉞黄門鼓車大車屬車八十一乗法駕半之屬車皆皁葢赤裡木轓戈矛弩箙尚書御史所載最後一車懸豹尾豹尾以前比省中行祠天郊以法駕祠地明堂省什三祠宗廟尤省謂之小駕每出太僕奉駕上鹵簿中常侍小黄門副尚書主者郎令史副侍御史蘭䑓令史副皆執注以督整車騎謂之䕶駕春秋上陵尤省於小駕直事尚書一人從其餘令以下皆先行後罷謹案續漢書輿服志云注駕屬車四十六乗蔡邕獨㫁云三十六乗三輔黄圖則從獨㫁或續漢書四字為三字之誤張衡東京賦及將祀天郊報地功乃整法服正冕帯珩紞紘綖玉䈂綦㑹火龍黼黻藻繂盤厲結飛雲之祫輅植翠羽之髙葢建辰旒之太常紛颷悠而容裔六元虬之奕奕齊騰驤而沛艾龍輈華轙金鑁鏤錫方釳左纛鉤膺玉瓖鸞聲噦噦和鈴鉠鉠重輪貳轄䟽轂飛軨羽葢葳㽔葩瑵音爪曲莖順時服而設副咸龍旂而繁纓農輿木輅屬車九九乗軒並轂􅕈弩重旃朱旄青屋奉引既畢先輅乃發鸞旗皮軒通帛舊斾雲罕九斿鈒㦸轇轕髶髦被繡虎夫載鶡駙承華之蒲梢飛流蘇之騷殺總輕武於後陳奏嚴鼓之嘈囐戎士介而揚揮戴金鉦而建黄鉞清道按列天行星陳謹案東京賦云奉引既畢先輅乃發即輿服志所云河南尹執金吾洛陽令奉引是也又云鸞旗皮軒即輿服志所云皮軒鸞旂皆大夫載是也云屬車九九即輿服志所云屬車八十一乗也云雲罕九斿即輿服志所云前驅有九斿雲罕是也云鈒㦸轇轕即輿服志所云鳳凰闟㦸是也云奏嚴鼓之嘈囐即輿服志所云黄門鼓車是也云戴金鉦而建黄鉞即輿服志所云後有金鉦黄鉞是也漢賦之有關於典制如此李善文選注漢官儀曰大駕鹵簿五營校尉在前者名曰填衛謹案後漢天子毎出皆太僕條上鹵簿與今鑾儀衛之制尤為相合至漢有充庭之制凡臨軒大㑹陳乗輿車輦旌鼓於殿庭張衡東京賦所云龍路充庭鸞旗拂者是也今制朝㑹御殿陳設鹵簿實權輿於此其在漢世當亦屬太僕所條上歟唐六典後漢少府屬官有承華令典黄門鼓吹一百三十五人百戲師二十七人謹案後漢之承華令至晉以後改為鼓吹令今馴象所旗手衛所典鐃歌前部樂實即其職故既繫之樂部表而仍互見於此焉孫逢吉職官分紀漢鹵簿之制衛尉駕四馬主簿前車八乗後漢書百官志奉車都尉比二千石無員駙馬都尉比二千石無員劉昭補注漢官曰奉車都尉三人駙馬都尉五人三國三國魏志后妃列傳卞蘭為奉車都尉郭詳遷為駙馬都尉三國蜀志諸葛亮列傳亮兄子喬拜為駙馬都尉通典後漢太僕奏駕上鹵簿魏因之後漢太僕有未央廐令魏改為乗黄廐乗黄古之神馬因以為名厯代皆有悉掌乗輿車府署令魏屬太僕謹案曹魏太僕之制同於東漢當亦有今鑾儀衛之一職其乗黄令雖以馬為名而所掌實乗輿車輅當如今左所之職也至太僕一官魏志所載諸臣自潘尼以外罕有居此職者惟齊王紀引魏書載羣臣奏事有太僕臣嶷列於太常衛尉之後廷尉太鴻臚之前則其位任亦不為輕矣晉晉書職官志武帝以宗室外戚為奉車駙馬都尉而奉朝請焉元帝為晉王以參軍為奉車都尉掾屬為駙馬都尉皆奉朝請後罷奉車都尉惟留駙馬都尉奉朝請諸尚公主者劉惔桓温皆為之謹案自此以後駙馬都尉遂為主壻加官無復供奉乗輿之事矣王應麟玉海晉中朝大駕鹵簿静室令中道式道候分左右次洛陽尉令亭長河南掾尹簿記次司𨽻廷尉太常光禄衛尉太尉司徒司空或駕一或駕三或駕駟次中䕶軍步兵長水射聲翊軍越屯騎校尉驍騎游擊左右前後領軍將軍並鹵簿左右二行鼓吹一部次領䕶驍騎游軍校尉繖扇幢麾各一騎鼓吹一部七騎領䕶加大車斧終於金顔督將此百官之儀也晉書職官志太僕統車府乗黄等令馬端臨文獻通考尚輦車府令掌之東晉省太僕遂𨽻尚書駕部通典晉置鼓吹令丞屬太常謹案晉鹵簿之制以太僕卿與大將軍驂乗則晉之太僕亦兼有今鑾儀衛之職然考晉書又稱陳勰為典兵中郎將武帝每出入持白獸旛在乗輿左右鹵簿陳列齊肅輿服志載鹵簿儀式以有典兵中郎中道督攝之文典兵中郎將為今領侍衛之職而得兼司鹵簿則正如今管衛事之大臣也宋齊梁陳宋書百官志周官巾車尚車太僕兼其任宋以來不置郊祀則權置太僕執轡事畢即省乗黄令一人掌乗輿車屬太常車府令一人𨽻尚書駕部南齊書百官志太僕掌郊禮執轡有事權置兼官畢乃省乗黄令一人掌五路安車隋書百官志梁太常統鼓吹乗黄等令丞陳依梁制冊府元龜梁乗黄令品第七秩四百石銅印墨綬進賢一梁冠絳朝服玉海梁乗輿行則有大駕法駕小駕行幸則槊仗近燕則隊仗三駕法天二仗法地大同五年賀琛奏南北二郊耤田御輦不復乗路以侍中陪乗停大將軍及太僕謹案南朝鹵簿之法具載史志而當時不置太僕其司存所在葢當分屬於太常及駕部也又考南史齊武陵昭王曄傳稱牛嬴不能取路上勅車府給副御牛一頭云云據此則是乗黄令所掌者為車輅輿輦以備郊廟儀物而車府所掌乃主供奉御前之用其職又稍不同耳隋書百官志梁奉車都尉無員北魏魏書官氏志太和中定百官奉乗郎從第五品中翼馭郎從第五品下二十三年復次職令奉車都尉從第五品正始四年詔曰奉車都尉禁侍美官顯加通貴世移時變遂為冗職既典名猶昔宜有定員可二十人魏書禮志太祖天興二年命禮官据採古事制三駕鹵簿一曰大駕設五輅建太常屬車八十一乗平城令代尹司𨽻校尉丞相奉引太尉陪乗太僕御二曰法駕屬車三十六乗平城今代尹太尉奉引侍中陪乗奉車都尉御三曰小駕屬車十二乗平城令太僕奉引當侍陪乗奉車郎御冊府元龜後魏殿中監有乗黄車府令後又省乗黄令謹案北魏車府乗黄二令俱改屬於殿中監又與魏晉之制有殊至官氏志之奉乗郎翼馭郎禮志之奉車郎皆主供奉輿輦則今左所之冠軍雲麾諸使當即其職也北齊隋書百官志後齊衛尉寺統武庫署令掌甲兵及儀仗太僕寺統乗黄車府等署令丞乗黄掌諸輦輅車府掌諸雜車太常領鼓吹署令丞掌鼓吹樂人等事左右衛府奉車都尉十人謹案厯代執仗兵士皆即以衛卒充之北齊儀仗掌諸衛尉其由來當本於此然自是而鑾儀衛之職遂分為兩官葢武庫署如今之右中前後四所而乗黄署則如今之左所也後周通典後周官品正五命夏官大馭司右中大夫五命奉車都尉奉騎都尉正四品春官司車路夏官小馭戎馭齊馭小司右戎右齊右等下大夫正三命春官小司車路夏官道馭田馭小司右賔右道右田右司仗等上士正二命春官典路司車司常司鼓司吹夏官司仗司刀盾等中士正一命春官典路司車司常司鼓司吹夏官司刀盾等下士隋書禮儀志周氏設六官置司路之職以掌公車之政辨其名品與其物色謹案隋書禮儀志又稱後周置左右武伯掌内外衛之禁令皇帝臨軒則偹三仗於庭葢當時用衛士立仗故即以左右武伯專司其事實兼有今鑾儀衛之職正如今掌衛事之大臣也隋隋書百官志髙祖置衛尉寺統武庫令丞太僕寺統乗黄車府署各置令丞焬帝加置主乗官唐六典焬帝置尚輦局奉御正五品隋書百官志奉車都尉六人掌馭副車隋書閻毗列傳帝曰開皇之日屬車十二乗今八十一乗欲减之毗曰八十一乗起於秦遂為後式次及法駕三十六乗三十六乗此漢制也晉遷江左唯設五乗宋時設十二乗開皇平陳因以為法今憲章往古大駕依秦法駕依漢小駕依宋以為差等帝曰大駕宜三十六法駕宜十二小駕除之通典隋有鼓吹令丞謹案隋書稱陳承梁末王琳縱火延燒車府因重造五輅及副車是南朝輦輅皆藏於車府也又稱周大象初遣鄭譯閲視武庫得魏舊物有乾象輦大樓輦象輦等皆魏天興中所置宣帝咸服御之則是魏周及隋輦輅皆藏於武庫與南朝制異故武庫令兼掌儀仗正如今之有鑾駕庫也唐唐六典殿中省尚輦局奉御二人從五品上直長四人正七品下掌輦二人正九品下主輦四十二人奉轝十五人掌輿輦繖扇之事分其次序而辨其名數直長為之貳凡大朝㑹則陳於庭大祭祀則陳於朝凡繖扇大朝㑹則繖二扇一陳之於庭若常聽朝皆去扇左右各留其三以備常儀衛尉寺卿一人從三品少卿二人從四品上掌邦國器械文物之政令凡大祭祀大朝㑹則供其羽儀節鉞金鼓帷帟茵席之屬武庫令兩京各一人從六品下掌蔵兵仗器械武器署令一人正八品下丞二人從九品下掌在外戎器辦其名物㑹其出入凡大祭祀大朝㑹大駕巡幸則納於武庫供其鹵簿太僕卿之職凡國有大禮大駕行幸則供其五輅屬車之屬乗黄署令一人從七品下丞一人從八品下掌天下車輅辨其名數與馴馭之法丞為之貳凡乗輿五輅皆有副車又有指南車記里鼓車白鷺車鸞旗車辟惡車皮軒車耕根車安車四望車羊車黄鉞車豹尾車屬車一十有二大駕則用之車府署令一人正八品下丞一人正九品下掌王公以下車輅新唐書百官志少府監左尚署令一人從七品下丞五人從六品下掌供翟扇葢繖五路五副七輦十二車唐六典尚輦局置掌扇直長掌執扇供奉之事新唐書百官志鼓吹署令二人從七品下丞二人從八品下樂正四人從九品下掌鼓吹之節以備鹵簿之儀通典天寳以前選奉車都尉五員掌馭副車不常置若大備陳設則以餘官攝行屬左右衛新唐書儀衛志朝㑹之仗分為五仗號衙内五衛一曰供奉仗以左右衛為之二曰親仗以親衛為之三曰勲仗以勲衛為之四曰翊仗以翊衛為之五曰㪚手仗以親衛翊衛為之謹案唐六典駕部郎中員外郎掌邦國之輿輦車乗庫部郎中員外郎掌邦國之戎器儀仗及冬至元旦之陳設是唐代鹵簿之制實領其成於兵部而以衛尉之武庫武器二署太僕之乗黄車府二署殿中之尚乗局少府之左尚署分司厥事並不專屬於一官也至唐時鹵簿皆用五衛之士分隊前後領以折衝都尉其左右廂儀仗内鍪鎧弓箭刀楯􅗋麾之類左右衛以黄左右武衛以白左右威衛以黒左右領軍衛以青各有定色御仗之物二百一十有九羽儀之物三百自千牛以下各分而典掌之則其時鹵簿陳設之事又領於十六衛将軍亦猶今之以大臣管衛事矣五季職官分紀梁開平初置儀鸞司玉海後唐明宗時始有鹵簿使兵部侍郎為之謹案宋五朝志稱五代漢乾祐中始置主輦十六人掌扇四人則當時儀衛簡畧可以槩見故其設官亦多不備然儀鸞司之名實剏見於此至鹵簿使雖兼攝之官而職在排列督整則亦如今之管鑾儀衛大臣也宋政和五禮新儀建隆初選從臣嫻習禮儀者為鹵簿使宋綬天聖鹵簿記序曰黄帝創軒冕之容列營衛之警輿駕儀物葢本於此唐堯彤車有虞鸞和夏后之綏商人之路周官有司常巾車之職虎賁旅賁之從三五之際所由來尚矣秦并六國兼屬車九九之數漢上甘泉備千乗萬騎之衆自時厥後損益可知藝祖始議郊饗即諏典文扞衛既崇羽儀兼備初吏士所服皆用畫帛乃命易以厚繪加之文繡采綷相錯煥乎一時至道中詔翰林承㫖宋白與内侍畫郊邱仗衛緘在袐府景徳中資政殿學士欽若上鹵簿記三卷敇付太史皇上紹庭正統粤再郊之明年命華光侍臣圖冩大簿臣充儀仗使督攝容衛又以太僕奉車承顧問乃與侍讀馮元侍講孫奭議曰前二圖書冩形紀事不相參㑹盍象設而又文陳乎繇是著為圖記十篇嵗在戊寅燔祀有期敇重飾帝車爰及法物並加釐正謹案宋綬充儀仗使又兼太僕奉車之職故作鹵簿圖記即今鑾儀衛使掌秩序鹵簿也李燾續資治通鑑長編真宗大中祥符元年命馮拯為儀仗使陳堯叟為鹵簿使謹案儀仗鹵簿二使宋亦以他官兼攝當時故事中丞領儀仗使天聖二年用中丞薛奎領鹵簿而翰林學士領儀仗治平二年詔中丞賈黯為儀仗使翰林學士范鎮鹵簿使是其事也周必大繡衣鹵簿記藝祖皇帝受天眷命用肇造區夏武功既成文治斯廣躬郊禋正㑹朝祲威盛容以次畢行惟是承五季搶攘之後鹵簿雖設踳駮為甚易而新之兹惟其時於是制誥范質張昭等正其繆盭參定典式已而禮儀使陶轂奏言金吾諸衛将軍暨押仗導駕等官服皆以紫於禮未稱請按開元禮咸用繡袍至若執仗之士舊服五色畫衣先後靡倫無所准式請以黒為先而青赤黄白以次分列用協五行相生之序逮有司以儀注上帝御便殿陳而閲之凡馬步儀仗總萬有一千二百二十有二人悉以綜絲袘繡文代彩畫之服揚輝絢采丕釐舊弊亹亹三代兩漢之盛矣稽諸㑹要始造於乾徳之四年而告備於開寳之三年越明年謁欵圜邱實始用之想夫䂍稍前驅五輅増副里以鼓記車以南指鷄翹豹尾夭矯婀娜公卿執事前導後陪細仗大角壮其容幰葢繖扇備其飾耋老㓜稚族觀聚歎向也目熟乎兵革今乃窺文物旗常之美向也耳厭乎金鼓今乃聞錫鸞和鈴之音皇哉治世之鉅典華夏之偉觀也切讀三聖寳訓而知藝祖恭儉之徳出於天資衣用澣濯器御質素齊官無三服之獻織室罷纂組之工顧於羽衛乃顯設藩飾如此得無意乎葢恭儉者帝王之盛徳也備羽衞者國家之上儀也在漢孝文殿設書囊之帷身以敦樸為先及其詔令則曰鸞旗在前屬車在後儀物明盛猶可想於千載之下然則聖人所以奉已與華國者固自殊轍也耶是以知藝祖之意有在也列聖繼承制作益詳曰大駕曰法駕曰鸞駕曰黄麾仗或施之躬郊或用之封祀或設之朝覲其多寡有差其先後有序揆厥所元皆自繡衣啟之貽謀垂裕永永無極肆皇帝陛曰紹復祖宗之大業迺紹興十有三年築壇而郊共祀天地鹵簿之制實纂乾徳至於嵗用癸亥視建隆初郊之嵗若合符節夐觀簡冊未之攸聞葢莫為於前無以彰異時創業之功莫繼於後無以知中興之治是不可以不特書也玉海宋大駕鹵簿自開寳定通禮之後彌有増益鹵簿使専掌定字圖排列儀仗使糾督之凡車路大僕寺主之輦輿繖扇御馬殿中省主之皂纛䂍矟十六騎引駕細仗牙門金吾主之槍仗六軍主之六引諸隊大角五牛旗兵部主之寳案門下省掌之鐘漏司天䑓掌之鼓吹太常鼓吹局掌之旗器名物衣冠寳葢錦繡等飾朝服法物庫出焉箙弩弓矢戎装雜仗軍器庫内弓箭庫出焉總大駕鹵簿二萬六十一人法駕三分減一鸞駕又減半兵部麾仗又減於鸞駕謹案政和新儀兵部言國初大駕儀仗總一萬一千二百二十二人今已有黄麾半仗三千四百八十三人玉輅腰小輿大輦平逍遥輦下一千九人外其金象革木輅芳亭鳳輦屬車寳輿一千二百七十三人天武捧日奉宸隊六千四百五十七人仗内六引鼓吹前後部一千五百人法物儀仗望下有司製造詔令文繡並代以纈命兵部錢時敏戎監劉才邵等參訂兵部掌貳提舉然則鹵簿雖設諸官分掌而制度創造則仍兵部統主之葢猶沿唐氏之制玉海謂兵部主六引特舉其職之分見者耳宋史職官志殿中省尚輦局掌輿輦之事有典御一人奉御六人又置提舉及管幹官一員尚衣庫使副使二人以内侍三班充掌駕頭服御繖扇之名物朝服法物庫監官二人以諸司使副及三班内侍充掌諸司儀仗之名物衛尉寺内弓箭庫掌藏兵仗器械儀鸞司掌供幕帟供帳六軍儀仗以肅禁衞凡儀物以時修飭選募人兵而校其遷補之事太僕寺車輅院掌乗輿法物凡大駕法駕小駕供輦輅及奉引屬車辨其名數與陳列先後之序養象所掌調御馴象陳世崇隨隐漫録孟享駕出則軍器庫御酒庫御厨祗候庫儀鸞司御藥院從物前導騏驥院馬引從舍人内外諸司庫務官繼之謹案儀鸞司即今鑾儀使之職漫錄云從物前導即宋職官志所云儀鸞司掌供幕帟供帳之類是也章如愚山堂考索鼓吹局令一人丞一人職官分紀慶厯四年鼓吹局移就武成王廟宋史職官志殿前司騎軍有金鎗班東西班諸軍指揮步軍有御龍直骨朶子直弓箭直弩直諸軍指揮謹案宋鹵簿有排列字圖掌於兵部而以鹵簿儀仗二使總其成葢即今管鑾儀衛大臣之比其車輅院尚輦局則如今之左所尚衣庫朝服法物庫内弓箭庫則分𨽻今之右中前後四所養象所如今之馴象所鼓吹局如今之旗手衛而六軍儀仗司主選募人兵校其遷補則如今鑾儀衞之有旗尉民尉也遼遼史百官志北面官有車輿局車輿郎君南面官殿中司有尚乗局奉御尚輦局奉御太常寺有鼓吹署令丞文獻通考契丹有諢子部毎謁拜木葉山唱歌前導金金史百官志尚輦局使從五品副使從六品掌承奉輿輦等直長正八品典輿都轄從九品武器署提㸃從五品令從六品丞從七品掌祭祀朝㑹巡幸鹵簿儀仗旗鼓笛角之事直長正八品頓舍官二員正八品右屬殿前都㸃檢司宣徽院左宣徽使右宣徽使掌殿庭禮儀所𨽻弩手傘子二百三十九人控鶴二百人拱衞直使司都指揮使從四品副都指揮使從五品掌總統本直謹嚴儀衛鈴轄正六品都轄從九品侍衛司舊名擎執局大定元年改為侍衛局大定五年陞局為司令從六品掌侍奉朝儀率捧案擎葢奉輦各給其事直長正七品右屬宣徽院大樂署兼鼓吹署令一人從六品丞從七品掌施用之法樂右屬太常寺謹案金史凡儀衛執仗之士其名有六曰䕶衞曰親軍曰弩手曰控鶴曰傘子曰長行分𨽻於殿前司及宣徽院葢如今鹵簿之制以親軍䕶軍及各校尉分司執事也元元史百官志拱衛直都指揮使從四品掌控鶴六百餘户及儀衞之事至元三年始置都指揮使一員副使一員鈴轄一員提控案牘一員十六年陞正三品𨽻宣徽院二十年復為從四品二十五年改𨽻禮部元貞元年陞正三品皇慶元年置經厯一員二年改鈴轄為僉事至順二年定置逹嚕噶齊解見户部篇一員正四品都指揮使四員正三品副指揮使二員從三品僉事二員正四品經厯一員從七品知事一員從八品令史八人譯史一人其屬控鶴百户所從七品總十三所儀從庫掌収儀衛器仗大使一員從七品副使一員從八品謹案元有儀仗軍据元史所載武宗至大二年十二月行朝賀禮樞宻院調軍一千人􅊀儀仗英宗至治元年十一月命有司選控鶴衞士及色目漢軍以備鹵簿儀仗文宗天厯元年十一月親祭太廟用儀仗併五色甲馬軍一千六百五十名仍命洪副使攝折衝都尉提調之是當時亦多出臨事調撥並無定額不必盡取於拱衞直都指揮所屬之六百户也明明史職官志錦衣衞恒以勲戚都督領之凡朝㑹巡幸則具鹵簿儀仗率大漢将軍共一千五百七員等侍從扈行統中左右前後五所分鑾輿擎葢扇手旌節旛幢班劍斧鉞戈㦸弓矢馴馬十司各領將軍校尉以備法駕馴象所領象奴養象以供朝㑹陳列駕輦䭾寳之事明㑹典呉元年置拱衛司秩正七品後改拱衞指揮使秩正三品尋又改為都尉司洪武三年改為親軍都尉府管左右中前後五衞軍士而設儀鸞司𨽻焉四年定儀鸞司為正五品設大使一人副使二人十五年罷儀鸞使改置錦衣衞秩從三品其屬有御椅等七員皆正六品設經厯掌文移出入孫承澤春明夢餘録錦衣所掌者乃鹵簿儀仗之事旗手所司者乃旗纛金鼓之物諸衞皆統軍卒而錦衣獨領校尉力士諸衛正倅一惟其世獨錦衣之任則不必世而以能葢御座則夾陞而立御輦則扶轅以行出警而入蹕承㫖而傳宣皆在所司而治獄所寄則又重矣明史職官志旗手衞本旗手千户所洪武十八年改置掌大駕金鼔旗纛帥力士隨駕宿衞謹案古者文謂之儀武謂之衞天子車駕次第謂之鹵簿歐陽修謂儀衛鹵簿之設所以尊君而肅臣故宋綬稱唐堯彤車有虞鸞和夏后之綏商人之路輦駕法物其權輿已肇於此至周而巾車司常之屬職掌始著嗣是代有損益大約漢以後之太僕北齊以後之衞尉俱兼司其任至唐宋而儀文更臻詳備然考之於史唐宋法駕鹵簿執掌兵士至用二萬二千二百二十一人南宋省約過半猶用六千六百八十九人冗役太多故當時郊祀賞賫靡濫最甚以致惜費憚行相沿成習殊為繁縟無當明初詔鹵簿彌文務從省節其數視唐宋為差少而錦衣掌衞者不惟供清道奉引之職乃復令兼司治獄事得專逹中葉以後權勢大張擅竊國威恣行凌虐其權任逺出法司之上流弊至不可勝言而為之長者反得以恩倖受賞往往加至保傳公侯其權貴子弟冒衛錦衣者至有二三千人嵗耗度支無算名器冗䙝至是為已極矣我朝鑾儀衞即明代錦衣之職而官守嚴肅度數精詳翊奉禮儀無不各共其事凡鹵簿儀仗之制皆經睿裁考定凖今酌古條理得中超三代之隆文昭一王之盛軌列史儀衞志所載固未有如今日之整齊典重者洵足永垂法則焉欽定厯代職官表卷四十二
