body:
  text: 禮部表謹案禮部建置本於虞廷秩宗在周為春官宗伯自周室班爵之制周末既去其籍秦漢分設九寺大卿以統轄庶務而春官之事遂歸於太常其後雖間置儀曹祠部亦僅尚書省所屬之一職太常尚為専司禮樂之官後魏太常卿劉芳奏所稱臣忝官宗伯者是也逮隋唐仿周制分建六曹設禮部以主朝廷典禮於是宗伯乃復舉其職而太常並置不廢相承至今故準以春官所屬如鬱人等職之敬禮神祇大司樂等職之均諧律吕其典司仍在於太常歷代以來禮部惟綜其大綱而已我國家稽古建官正名核實創設樂部管神樂和聲諸署領治樂政而以禮部滿洲尚書兼樂部太常寺鴻臚寺事務永為恆式容臺之長始盡兼秩宗典樂之任上與周制相符誠三代以後所莫能及也謹詳考禮部沿革著之於表而以樂部次之至㑹同四譯館本出於周官象胥掌客之職今制統𨽻禮部而前代或屬鴻臚或歸客省或立専署建置不一謹並加詮叙别附於篇禮部國朝官制禮部尚書滿洲漢人各一人從一品尚書以下品級升降原委俱詳見吏部篇掌吉嘉軍賔凶之秩序學校貢舉之法以贊邦禮所屬有儀制祠祭主客精膳四清吏司國初禮部設滿洲承政一員䝉古承政一員漢人承政一員參政八員啓心郎一員崇德三年更定禮部設滿洲承政一員左參政二員右參政三員增啓心郎為三員順治五年定設滿漢尚書各一員雍正元年以親王郡王大學士兼理部務後隨時簡任不恆置乾隆十四年定禮部滿洲尚書以兼管樂部太常寺鴻臚寺入銜永為令式左右侍郎滿洲漢人各一人正二品順治元年定掌祇若彛典以二尚書漢人左右侍郎初制俱兼翰林院學士銜其非翰林出身者不兼尋罷兼銜儀制清吏司郎中滿洲二人漢人一人正五品員外郎滿洲三人漢人一人從五品主事滿洲漢人各一人正六品掌嘉禮軍禮凡朝廷典禮具上其儀而辨其名數以頒式於諸司三嵗大比天下士則掌其名籍焉禮部初設理事官四人副理事官七人順治七年改設滿洲郎中四人員外郎六人主事四人䝉古章京四人漢軍郎中八人員外郎五人十二年增設滿洲員外郎四人十八年增設滿洲郎中二人康熙九年裁䝉古章京二人以一人改為郎中一人改為員外郎又裁漢軍郎中七人三十八年裁䝉古郎中員外郎漢軍員外郎各二人五十七年復設䝉古郎中一人員外郎一人增設䝉古主事一人雍正五年漢軍郎中員外郎額闕俱行裁省漢人司官順治元年定設郎中員外郎主事每司各一人二年省主客精膳二司員外郎各一人今凡漢人郎中四人員外郎三人主事四人皆以由甲科出身者注授祠祭清吏司郎中滿洲二人漢人一人正五品員外郎滿洲三人䝉古漢人各一人從五品主事滿洲漢人各一人正六品掌吉禮凶禮凡大祀中祀羣祀以嵗時辨其序事與其用等以詔執事者而揚其職喪祭之式救恤之禮皆眂其數而為之制天下術數醫卜僧道則司其禁令焉主客清吏司郎中滿洲一人䝉古一人漢人一人正五品員外郎滿洲二人從五品主事滿洲漢人各一人正六品掌賔禮凡四夷朝貢之儀館餼賜豫之數髙下之等封冊之命悉𨽻焉精膳清吏司郎中滿洲漢人各一人正五品員外郎滿洲二人從五品主事滿洲一人䝉古一人漢人一人正六品掌五禮燕饗之儀與其牲牷鑄印局員外郎漢人一人從五品筆帖式署主事滿洲一人大使漢人一人未入流掌鑄造金寶金印及內外百司之印信順治元年設鑄印局滿洲員外郎一人尋省雍正十一年定於禮部司屬內遴選一人以司局事一年而代乾隆二年復設漢員外郎一人以滿洲筆帖式行主事事二年稱職者擢之大使由本部期滿儒士選充五年稱職以應升官用堂主事滿洲三人漢軍一人正六品分掌章奏文案順治元年定額司務㕔司務滿洲漢人各一人正八品順治元年定額職事具吏部篇筆帖式滿洲三十四人䝉古二人漢軍四人自七品至九品以出身為差詳見吏部篇滿洲漢軍員數順治元年定䝉古員數雍正十二年增定分𨽻各司視事之繁簡以為額職事具吏部篇謹案禮部初設馬館二於宣武廣渠門儲峙牧芻以待外藩朝覲置正監督一人以本部司官充副監督一人以理藩院司官充均一年更代乾隆二十七年省監督官以馬館歸理藩院經理又禮部初設滿宣表官四人後裁二人今亦省併太常寺謹附識於此歷代建置三代尚書舜典帝曰咨四嶽有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗夙夜惟寅直哉惟清孔安國傳秩序宗尊也主郊廟之官謹案禮官制度本於秩宗謹録舜典經文冠諸三代之首以眀源委所自禮記曲禮天子建天官先六太曰太宗鄭康成注此蓋殷時制也周則太宗曰宗伯尚書周官宗伯掌邦禮治神人和上下周禮春官禮官之屬大宗伯卿一人小宗伯中大夫二人肆師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人典祀中士二人下士四人府二人史二人大宗伯之職掌建邦之天神人鬼地示之禮以佐王建保邦國以九儀之命正邦國之位以禮樂合天地之化百物之産詔相王之大禮小宗伯掌建國之神位掌五禮之禁令與其用等辨廟祧之昭穆掌三族之别以辨親疏毛六牲辨其名物而頒之於五官使共奉之辨六齍六彛六尊之名物以待祭祀賔客掌衣服車旗宫室之賞賜掌四時祭祀之序事與其禮詔相祭祀之小禮凡大禮佐大宗伯肆師之職掌立國祀之禮以佐大宗伯以嵗時序其祭祀及其祈珥大賔客蒞筵凡大朝覲佐儐凡國之大事治其禮儀以佐宗伯凡國之小事治其禮儀而掌其事如宗伯之禮典祀掌外祀之兆守皆有域掌其禁令若以時祭祀則帥其屬而修除尚書顧命太保太史太宗皆麻冕彤裳上宗奉同瑁由阼階隮孔安國傳太宗上宗即宗伯也逸周書嘗麥解命太宗序天時少宗祠風雨百享國語楚語使名姓之後能知四時之生犧牲之物玉帛之類采服之宜彛器之量次主之度屏攝之位壇場之所上下之神祇姓氏之所出而率舊典者為之宗周禮鄭康成注鄭司農云宗伯主禮之官故書舜典曰帝曰咨四嶽有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗宗官又主鬼神春秋禘於太廟躋僖公而傳曰夏父弗忌為宗人又曰使宗人釁夏獻其禮禮特牲曰宗人升自西階視壺濯及豆籩然則唐虞歷三代以宗官典國之禮與其祭祀賈公彥疏宗尊也伯長也春者出生萬物天子立宗伯使掌邦禮典禮以事神為上亦所以使天下報本返始不言司者鬼神示人之所尊不敢主之故也謹案宗之訓為尊故事神治禮之官皆以宗為名唐虞曰秩宗殷曰太宗周曰宗伯曰上宗亦曰太宗少宗又有稱宗官者國語伶州鳩曰聲不和平非宗官之所司韋昭注宗官宗伯是也又有稱宗人者文王世子宗人授事以爵以官鄭康成注宗人掌禮及宗廟是也又有稱陽官者周語史帥陽官以命司事韋昭以為即春官是也至春秋傳所載夏父弗忌釁夏為宗人則又諸侯掌禮之官非王朝之典制矣周禮春官膳夫上士二人中士四人下士八人掌王之食飲膳羞王燕飲酒則為獻主謹案杜佑稱膳部於周官即膳夫凌人二職今考精膳司掌朝㑹燕饗外藩廪餼之事與光祿寺大官署均當出於膳夫之職謹互著於表至唐代膳部職主納氷故杜佑又以凌人當之今則藏氷之事屬於工部不𨽻禮曹與唐制不同故凌人之職亦别繫諸工部都水司表內云周禮地官掌節上士二人中士四人府二人史四人掌守邦節而辨其用鄭康成注凡節有法式藏於掌節周禮春官典瑞中士二人府二人史二人掌玉瑞玉器之藏辨其名物與其用事鄭康成注瑞節信也若今符璽郎謹案掌節言貨賄用璽節鄭康成謂如今之印章後世百官給印其權輿蓋本於此至典瑞掌玉瑞以為符信鄭康成舉漢之符璽郎當之考符璽郎一官始於秦之符節令丞自漢而降歷代相沿有符節御史主璽令史符璽郎中符寶郎諸職屬於少府及門下省至元則為典瑞監眀則為尚寶司設卿少司丞等官以處恩廕寄祿之員本朝順治十五年以尚寶司事簡官冗特詔裁省其職事已併於內閣內務府諸衙門惟禮部鑄印局掌造金寶印章而辨其法式雖職專範冶乃漢晉印曹御史唐宋鑄印官之比與前代符璽郎典守出納者不同而稽核源流實亦本於掌節典瑞之二職今故特著於表以存其朔而尚寶司沿革則不復具載焉唐六典禮部尚書周之春官卿也侍郎周之春官小宗伯中大夫也周官大宗伯屬官有下大夫蓋郎中之任有上士蓋員外郎之任漢後漢書百官志成帝初置客曹尚書主外國夷狄事世祖又分客曹為南主客曹北主客曹劉昭後漢書志注蔡質漢儀曰吏曹尚書典選舉齊祀屬三公曹唐六典漢客曹主外國夷狄吏曹主選舉齊祀皆今禮部之職漢舊儀云尚書郎四人其一主胸奴單于營部蓋主客之任也馬端臨文獻通考二漢侍御史凡有五曹二曰印曹掌刻印謹案自秦漢盡改周制其宗伯之職遂移於太常鴻臚太史諸官惟前漢客曹屬於尚書為今禮部之權輿而印曹御史亦今鑄印局之所自出謹並著之於表後漢吏曹雖主祠祀而其名究為吏部所由承今别繫之吏部表內至漢書所載又有禮官之稱武帝紀元朔元年詔中二千石禮官博士議不舉孝亷者罪五年詔令禮官勸學儒林傳魯徐生以頌為禮官大夫而百官公卿表不詳其職考史記禮書有余至大行禮官觀三代損益語是禮官當屬於大行令大行令即大鴻臚蓋主儐相贊導故徐生以善為容貌威儀而得之今别載入鴻臚寺篇不列於此云三國晉書職官志魏有客曹尚書有殿中南主客祠部儀曹郎杜佑通典魏尚書有祠部曹有儀曹郎掌吉凶禮制有祠部郎主禮制唐六典殿中掌表疏儀曹掌吉凶禮制皆禮部之職晉晉書職官志渡江有祠部尚書常與右僕射通職不恆置以右僕射攝之若右僕射闕則以祠部尚書攝知右事尚書郎武帝置殿中祠部儀曹左右主客左右士北主客南主客曹郎江左無左右士但有殿中祠部儀曹主客後又省主客云通典晉江左有祠部尚書掌廟祧之禮嵇含臺中宴㑹詩其祠部曰仰承宗廟懷祇䖍宋書百官志晉西朝有印曹御史謹案禮部沿革至魏晉而官制始略備如儀曹為今儀制司之職祠部為今祠祭司之職左右南北主客為今主客司之職惟左士右士二郎史文不詳所掌至北齊而改為膳部推其原始蓋即今精膳司之所自出也宋齊梁陳文獻通考宋祠部尚書領祠部儀曹二曹齊梁陳皆有祠部尚書通典東晉有殿中祠部儀曹宋武帝加置主客曹齊依元嘉制南齊書百官志左僕射領殿中主客二曹事祠部尚書左僕射通職不俱置謹案南齊志稱尚書臺二十曹而詳核所載止十八曹獨無祠部儀曹二郎以宋制準之當為祠部尚書所領蓋史文脫漏或傳刻佚之也隋書百官志梁武受命置祠部尚書祠部儀曹主客殿中等郎陳遵梁制鄭樵通志尚書都令史梁武帝詔視奉朝請以太學博士劉訥兼殿中都北魏冊府元龜後魏有儀曹尚書唐六典後魏有殿中郎儀曹郎祠部郎太和中改定百官都官尚書管左士郎通典後魏吏部管南主客祠部管左主客魏書列傳孝文駕征馬圈留宋辨以本官兼祠部尚書攝七兵事及行執其手曰國之大事在祀與戎故令卿綰攝二曹辨頓首辭謝謹案魏書官氏志最為闕漏唐六典通典冊府元龜所載禮部沿革於後魏但有儀曹尚書一官今以宋辨傳考之則魏尚有祠部尚書而並不之及意其亦如晉制以他官兼攝不常置故諸書從略歟北齊隋書百官志後齊尚書省置殿中祠部等尚書分統列曹殿中統儀曹掌吉凶禮制事祠部統祠部掌祠祀醫藥死喪贈賻等事主客掌諸蕃雜客事祠部無尚書則右僕射攝都官統膳部掌侍官有司禮食肴饌等事郎中並一人儀曹量事置掌固主事員謹案北齊改南主客為主爵左主客為主客百官志稱主爵掌封爵等事是南主客職掌已併入左主客故主爵専司封爵並非賔客之禮今析入吏部驗封司條下至歷代主客曹南北左右各有分署故不統於一尚書齊始合為一曹領之祠部則後代主客司之専屬禮部實自北齊始也後周富大用事文類聚後周依周官置春官大宗伯卿周書列傳太祖建六官春官府領宗伯等職冊府元龜後周依周禮建宗伯小宗伯屬官有典祀中大夫小典祀下大夫又有禮部後改為司宗又春官之屬有典命後改為大司禮俄改大司禮復為禮部大夫周書本紀武帝保定四年五月丁亥改禮部為司宗大司禮為禮部通典後周官品正七命大宗伯正六命小宗伯正五命天官主膳中大夫春官禮部典祀等中大夫正四命天官小膳部下大夫春官小典祀典命等下大夫正三命天官小膳部上士春官禮部小典祀小典命等上士秋官東掌客南掌客西掌客北掌客等上士正二命春官禮部典瑞等中士秋官東掌客南掌客西掌客北掌客等中士正一命春官禮部旅下士典瑞等下士謹案後周改禮部為司宗典命為禮部故有司宗中大夫見於周書蕭世怡傳而通典所載官品乃有禮部典命而無司宗又武帝本紀資治通鑑俱有小禮部辛彥之使齊事胡三省以為即禮部上士而通典所載又無小字均與史參錯不合疑杜佑所據乃其初頒之制後經改易故頗有異同也至秋官有賔部大夫胡三省以為即周行人之職又有蕃部大夫蓋亦如鴻臚典客之類當為今㑹同四譯館之職惟東西南北四掌客乃沿晉宋以來南北左右主客之制而稍變其名於今主客司沿革為近故併列諸表內云隋隋書百官志髙祖受命置尚書省禮部尚書統禮部祠部侍郎各一人主客膳部侍郎各二人六年各置員外郎一人煬帝即位三年增置侍郎一人以二尚書之職諸曹侍郎並改為郎又改禮部為儀曹郎以異侍郎之名諸司主事並去令史之名後又改主客為司蕃郎置承務郎同員外之職通典隋置禮部尚書統禮部祠部主客膳部四曹蓋因後周禮部之名兼前代祠部儀曹之職謹案禮部之名起自後周然猶僅春官所屬之一職其以禮部當宗伯之任則始於隋代隋所定六曹二十四司他曹至後代亦間有異同惟儀祠主膳四司其名皆今所承用也唐舊唐書職官志禮部尚書一員正三品隋龍朔中改為司禮太常伯光宅改為春官尚書神龍復故侍郎一員正四品下名並隋曹改易也尚書侍郎之職掌天下禮儀祭享貢舉之政令其屬有四一曰禮部二曰祠部三曰膳部四曰主客總其職務而行其制命凡中外百司之事由於所屬皆質正焉郎中一員從五品上員外郎一員從六品上隋曰儀曹郎武德改禮部郎中員外龍朔為司禮大夫司禮員外咸亨復主事二人從八品上令史五人書令史十一人亭長六人掌固八人郎中員外郎之職掌二尚書侍郎舉其儀制而辨其名數凡五禮之儀一百五十有二一曰吉禮二曰賔禮三曰軍禮四曰嘉禮五曰凶禮凡元日大陳設於含元殿凡冬至大陳設如元正之儀凡千秋節御樓設九部之樂凡京司文武職事九品已上每朔望朝參五品以上及供奉官員外郎監察御史太常博士每日參凡祥瑞皆辨其名物有大瑞上瑞中瑞皆有等差凡樂有五聲八音六律六吕陳四懸之度分二舞之節以和人倫以調節氣以享鬼神以序賔客凡太廟太社及諸宫殿門東宫及一品已下諸門施㦸有差凡內外百官皆給銅印有魚符之制凡服飾尚黃旗幟尚赤凡百寮冠笏繖幰珂珮各有差常服亦如之凡職事官薨卒有賻贈栁翣碑碣各有制度祠部郎中一員從五品上龍朔為司禋大夫咸亨復員外郎一員從六品上主事二人從九品上令史五人書令史十一人亭長六人掌固八人郎中員外郎之職掌祠祀享祭天文漏刻國忌廟諱卜筮醫藥僧尼之事凡祭祀之名有四一曰祀天神二曰祭地祇三曰享人鬼四曰釋奠于先聖先師其差有三若昊天上帝皇地祇神州宗廟為大祀日月星辰社稷先代帝王嶽鎮海瀆帝社先蠶孔宣父齊太公諸太子廟為中祀司中司命風師雨師衆星山林川澤五龍祠等及州縣社稷釋奠為小祀凡官爵二品已上祠四廟五品已上祠三廟六品已下達於庶人祭祖禰而已凡天下寺有定數每寺立三綱以行業髙者充凡僧簿籍三年一造膳部郎中一員從五品上龍朔為司膳大夫咸亨復員外郎一員從六品上主事二人從九品上令史四人書令史九人掌固四人郎中員外郎之職掌邦之祭器牲豆酒膳辨其品數及藏氷食料之事主客郎中一員從五品上隋曰司蕃郎武德改主客郎中龍朔為司蕃大夫咸亨復員外郎一員從六品上主事二人從九品上令史四人書令史九人掌固四人郎中員外郎之職掌二王後及諸蕃朝聘之事唐㑹要開元二十四年三月以考功員外郎李昻為舉人所訟乃下詔曰每嵗舉人頃年以來惟考功所職位輕務重名實不倫欲盡委長官又銓選委積但六官之列體國是同況宗伯主禮宜主賔薦自今以後每年諸色舉及齊郎等簡試並於禮部集仍委侍郎専知謹案周官宗伯雖掌邦禮而教官實司徒之職故賔興之法仍屬之地官宗伯所主者鬼神祠祀燕享朝㑹之節而已自唐開元中以貢舉𨽻於禮部歷代沿為定式於是禮部遂領邦教之任蓋兼有古司徒之職事矣宋敏求春眀退朝録唐舊說禮部郎中掌省中文翰謂之南宫舍人百日內須知制誥謹案唐宋禮部郎中員外郎掌考論典制撰述表章故每選名儒之淹通者為之以次遷知制誥曽肇曲阜集行禮部郎中制詞所謂俎豆之議著為典常箋奏之文傳為口實秩清任重時儒所貴者是也宋時至以禮部郎中為名表郎官别有印曰名表郎印其遷轉亦多得館職眀代以禮部尚書侍郎専掌誥敕及兼翰林院學士讀講學士銜蓋猶唐宋之遺意矣唐㑹要延載元年五月敕天下僧尼道士𨽻祠部不須屬司省開元二十五年以道士女道士割𨽻宗正寺僧尼令祠部檢校謹案釋道二教前代未嘗領之於官自北齊置昭元寺以掌諸佛教又鴻臚寺屬有僧祇部丞一人太常寺屬有崇虛局丞掌諸道士簿帳於是始見於官司之職守後周有司寂上士中士掌沙門之政司元中士掌道門之政皆屬春官宗伯釋道之𨽻禮部又由此昉也唐初遂沿其制後雖析道士女冠改𨽻宗正寺說詳宗人府篇而僧尼仍屬祠部又屬主客及兩街功德使宋時僧道俱𨽻祠部金元眀因之至今以為恆式以其本祠祭司所掌之一事並非専官故昭元崇虛司寂司元諸職不列於表而附識其緣起於此焉王應麟玉海蜀鑄印官祝溫柔言其祖思言唐禮部鑄印官世習繆篆漢藝文志所謂屈曲纒繞以摹印章者也謹案自晉宋以前每除一官即改鑄新印給之不相傳授宋書孔琳之傳謂惟尉一職獨用一印內外羣官每遷悉改終年刻鑄喪功消實金銀銅炭之費不可稱言者是也故當時有印曹御史専司篆刻之事嗣後此制既改鑄印之職遂不見於史唐百官銅印法式掌之禮部而宋敏求春眀退朝録載唐禮部員外郎㕔有大石諸州府納廢印皆於石上碎之故令狐楚有移石幾回敲廢印之句是銷印刻印亦皆在禮部可知而六典及新舊兩志俱未及鑄印之職詳考玉海所載則唐代禮部實有是官未審何以脫漏殆以其出於天寶以後所置故六典無之史志皆承用六典舊文因亦略而不載耳五季冊府元龜唐禮部總判祠禮膳部及主客事五代因之無所改作謹案自唐代别置禮儀使始於天寶九載韋述又有太常寺禮院置修撰檢討官各一員以討論典制議禮之職遂移之他官宋亦有禮儀院太常禮院諸名不専以禮部主判五季之世其制並同而據冊府元龜所載凡當時大典禮令百官集議尚書省者仍皆以禮部尚書主之如同光二年議撤北京宗廟則禮部尚書王正言等上奏天成元年議祧遷議立親廟則皆禮部尚書蕭頃等上奏蓋如今禮部主稿之例也宋宋史職官志禮部掌國之禮樂祭祀朝㑹宴饗學校貢舉之政令祭之名有三天神曰祀地祇曰祭宗廟曰饗又有大祀中祀小祀之别幣玉牲牢器服各從其等凡禮樂制度有所損益小事則同太常寺大事則集侍從官祕書省長二或百官議定以聞凡天下選士俱注於籍三嵗貢舉與夫學校試補三舍生舊屬禮儀院判院一人以樞密院使參知政事充知院以諸司三品以上充主吏無定數擇三司京朝百司胥吏充禮部止設判部一人元豐官制行悉歸禮部其屬三曰祠部曰主客曰膳部設官十尚書侍郎各一人郎中員外郎四司各一人元祐初省祠部郎官一員以主客兼膳部紹聖改元主客膳部互置郎官兼領建炎以後並同尚書掌禮樂祭祀朝㑹宴饗學校貢舉之政令侍郎為之二郎中員外郎參領之凡講議制度損益儀物則審覆有司所定之式以次咨決而質於尚書省大祭祀則省牲省鼎鑊視滌濯薦腥則奉籩豆簠簋及飲福徹之祼則奉瓉臨鬯凡天地宗廟陵園之祀后妃親王將相封冊之命皇子加封公主降嫁稽其彛章以詔上下而舉之朝廷慶㑹宴樂宗室冠婚喪祭蕃使去來宴賜與夫經筵史館賜書修書之禮例皆同奉常講求參酌而定其儀節三嵗貢舉學校試補諸生皆總其政旌節章服之頒祥瑞表奏之進凡關於禮樂者皆掌之建炎三年詔鴻臚光祿寺併歸於禮部太常國子監亦𨽻焉分案五曰禮樂曰貢舉曰宗正奉使帳曰封冊表奏曰檢法各隨其名而治其事侍郎奏中嚴外辨同省牲及視饌腥熟之節祼受瓉奉槃大朝㑹則尚書奏藩國貢物凡慶賀若謝則郎中員外郎分撰表文祠事與太常少卿祠部官迭為終獻或亞獻分案十置吏三十有五南渡諸曹長二互置紹興七年禮部置侍郎二員隆興元年詔除尚書不常置外禮部侍郎置一員郎中員外郎參領禮樂祭祀朝㑹宴饗學校貢舉之事有所損益則審訂以次咨決凡慶㑹若謝掌撰表文與祠部主客膳部並列為四建炎三年併省郎曹禮部領主客祠部領膳部隆興元年復詔禮部祠部一員兼領自是併行四司之事矣通置吏五十四人祠部郎中員外郎掌天下祀典道釋祠廟醫藥之政令月奏祠祭國忌休假之日若神祠封進爵號則覆太常所定以上尚書省凡宫觀寺院道釋籍其名額應給度牒若空名者毋越常數初補醫生令有司試藝業嵗終校全失而賞罰之分案五置吏二十有一主客郎中員外郎掌以賔禮待四夷之朝貢凡郊勞授館宴設賜豫辨其等而以式頒之至則圖其衣冠書山川風俗有封爵禮命則承詔頒付掌嵩慶懿陵祭享崇義公承襲之事分案四置吏七膳部郎中員外郎掌牲牢酒醴膳羞之事凡所用物前期計度以關度支若祭祀朝㑹宴饗則同光祿寺官視其善否酒成則嘗而後進季冬命藏氷春分啓之以待供賜分案七置吏九事文類聚宋元豐正名以梁燾為禮部尚書謝景溫為禮部侍郎自此始正除尚書闕謹案禮部専司典禮無勾稽錢榖綜核法令之職故自唐世即號為優閒當時呼祠部為氷去聲㕔又有後行祠屯不博前行都門之語俱見於趙璘因話録至宋南渡而彌甚洪邁在紹興中作禮部郎官㕔壁記謂以主客合於禮部號為兩曹而所掌猶不過箋削印瑞郊廟禮文與士子科舉事日所程判其多不能以百至無毫毛可用以為勤以白長官者蓋是時疆場多事無暇討論典章故其清省至於如此至孝宗時而禮部一曹遂兼行四司之事殆亦以其務簡而併之歟宋史職官志少府監掌鑄牌印朱記之事置鑄印篆文官二員謹案宋鑄印官屬於少府監與唐制稍異遼遼史百官志北面官多囉倫穆騰滿洲語多囉倫禮也穆騰能也原作敵烈麻都今改正司掌禮儀多囉倫穆騰總知朝廷禮儀總禮儀事南面官僚其始中書省兼禮部中葉彌文於劉涇為禮部尚書知有尚書省矣郎中劉輝道宗大安末為禮部郎中員外郎開泰五年見禮部員外郎王景運金金史百官志禮部尚書一員正三品侍郎一員正四品郎中一員從五品員外郎一員從六品掌凡禮樂祭祀燕饗學校貢舉儀式制度符印表疏圖書冊命祥瑞天文漏刻國忌廟諱醫卜釋道四方使客諸國進貢犒勞張設之事主事二員從七品令史十五人內女直五人譯史二人通事一人元元史百官志禮部尚書三員正三品侍郎二員正四品郎中二員從五品員外郎二員從六品掌天下禮樂祭祀朝㑹燕饗貢舉之政令凡儀制損益之文符印簡冊之信神人封諡之法忠孝貞義之褒送迎聘好之節文學僧道之事婚姻繼續之辨音藝膳供之物悉以任之世祖中統元年以吏户禮為左三部置尚書二員侍郎二員郎中四員員外郎六員總領三部之事至元元年分立為吏禮部尚書三員侍郎仍二員郎中仍四員員外郎四員七年别立禮部尚書三員侍郎一員郎中二員員外郎如舊眀年又合為吏禮部十三年又别為禮部二十三年六部尚書侍郎郎中員外郎定以二員為額成宗元貞元年復增尚書一員領㑹同館事主事二員䝉古筆且齊解見吏部篇二人令史一十九人回回令史二人克哷穆爾齊解見吏部篇一人知印二人奏差十二人典吏三人鑄印局秩正八品掌凡刻印銷印之事大使一員副使一員直長一員至元五年始置事文類聚禮部大元無専曹祠祭燕享山陵致祭司天醫卜釋道度牒忌辰廟諱旌表四方使客以令史分名頭掌之謹案元禮部所屬有侍儀司掌朝㑹禮儀當為今鴻臚寺之職有拱衛直都指揮使司掌儀衛器仗當為今鑾儀衛之職今各析出别著於表又有白紙坊大使副使掌薪司司令司丞等官白紙坊在今宣武門外乃當時承造紙劄之地故設官董之今已久廢掌薪司以備芻秼蓋如舊置馬館監督之比今其職亦已裁省故並附見於此焉眀眀史職官志禮部尚書一人正二品左右侍郎各一人正三品其屬司務㕔司務二人從九品儀制祠祭主客精膳四清吏司各郎中一人正五品員外郎一人從五品主事一人正六品正統六年增設儀制祠祭二司主事各一人又增設儀制司主事一人教習駙馬所轄鑄印局大使一人副使二人萬厯九年革一人尚書掌天下禮儀祭祀宴饗貢舉之政令侍郎佐之儀制分掌諸禮文宗封貢舉學校之事天子即位天子冠大婚冊立皇太子妃嬪太子妃上慈宫徽號朝賀朝見大饗宴饗大射宴射則舉諸儀注條上之若經筵日講耕藉視學策士傳臚巡狩親征進厯進春獻俘奏捷若皇太子出閣監國親王讀書之藩皇子女誕生命名以及百官命婦朝賀皇太子后妃之禮與諸王國之禮皆頒儀式於諸司凡傳制誥開讀詔敕表箋及上下百官往來移文皆授以程式焉凡嵗請封宗室王郡王將軍中尉妃主君各以其親疏為等凡諸司之印信領其制度凡祥瑞辨其名物以學校之政育士類以貢舉之法羅賢才以鄉飲酒禮教齒讓以養老尊髙年以制度定等威以恤貧廣仁政以旌表示勸勵以建言㑹議悉利病以禁自宫遏奸民祠祭分掌諸祀典及天文國恤廟諱之事凡祭有三曰天神地祇人鬼辨其大祀中祀小祀而敬供之飭其壇壝祠廟陵寢而數省閲之蠲其牢醴玉帛粢羮水陸瘞燎之品第配侑從食功德之上下而秩舉之天下神祇在祀典者則稽諸令甲播之有司以時謹其祀事凡喪葬祭祀貴賤有等皆定其程則而頒行之凡天文地理醫藥卜筮師巫音樂僧道人並籍領之主客分掌諸蕃朝貢接待給賜之事辨其貢道貢使貢物逺近多寡豐約之數以定王若使迎送宴勞廬帳食料之等賞賚之差若蕃國請嗣封則遣頒冊於其國凡審言語譯文字送迎館伴考稽四夷館譯字生通事之能否而禁飭其交通漏泄凡朝廷賜賚之典各省土物之貢咸掌之精膳分掌宴饗牲豆酒膳之事凡御賜百官禮食曰宴曰酒飯為上中下三等視其品秩蕃使土官有宴有下程皆辨其等親王之藩王公將軍來朝及其使人亦如之凡膳羞酒醴品料光祿是供㑹其數而程其出納焉凡嵗藏氷出氷移所司謹潔之初洪武元年置禮部六年設尚書二人侍郎二人案尚書原三品侍郎原四品分四屬部總部祠部膳部主客部每設郎中員外郎各一人主事各三人十三年升部秩設尚書侍郎各一人每屬部設郎中員外郎主事各一人尋復增置侍郎一人二十二年改總部為儀部二十九年改儀部祠部膳部為儀制祠祭精膳惟主客仍舊俱稱為清吏司成𢎞以後率以翰林儒臣為之其由此登公孤任輔導者蓋冠於諸部焉眀㑹典萬歷九年裁革儀制祠祭主客三司主事一員十一年復設眀史職官志自成化時周洪謨以後禮部尚書侍郎必由翰林尚書則兼學士侍郎則兼侍讀侍講學士謹案眀禮部兼銜之制具載於史然考之眀實録如馬愈王一寧薛瑄陳文劉定之劉吉劉健等皆以左右侍郎徑兼翰林院學士不必定兼讀講學士故國初漢侍郎亦並兼學士銜蓋尚沿其例也至如靳貴以禮部尚書程敏政以禮部侍郎皆専掌內閣誥敕而萬歷以後教習庶吉士亦定以吏禮二部侍郎各一人掌之其所綰皆文翰之職蓋當時春官長二必以翰林居之中葉以後遂為入閣之階梯故眀代禮部遷轉視他曹為尤重云欽定歷代職官表卷九
