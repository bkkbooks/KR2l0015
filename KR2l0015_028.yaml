body:
  text: 大理寺表大理寺國朝官制大理寺卿滿洲漢人各一人滿洲初係二品順治十六年改為三品康熙六年復為二品九年定滿洲漢人俱為正三品少卿滿洲漢人各一人滿洲初係三品順治十六年改為四品康熙六年復為三品九年定滿洲漢人俱為正四品掌平反重辟以二邦刑與刑部都察院為三法司凡直省案件寺受其牘下左右寺官凖律定讞卿受其中俟刑部簡正既孚致辭於寺乃參核焉議合者弊之不合者反之凡刑部重辟囚以左右寺司讞者暨御史㑹刑司察其辭辨其死刑之罪而要之致辭於卿乃詣刑部暨都御史㑹聽之各麗其法以議獄議合者弊之不合者覆之必盡合乃㑹疏以上異則另為一議具奏凡有應議大政大獄與六部都察院通政使司稱九卿㑹議焉卿順治元年置額少卿初置滿洲一人漢人二人乾隆十三年省漢人少卿一人左寺丞滿洲漢軍漢人各一人滿洲漢軍初係四品順治十六年改為六品康熙六年改為五品九年定滿洲漢軍漢人俱為正六品左評事漢人一人正七品右寺丞滿洲漢軍漢人各一人右評事漢人一人堂評事滿洲一人分掌京師五城順天府屬直省府州縣衛死罪之刑國初置左右寺正左右寺副左右評事等員後改左右寺正為左右寺丞康熙三十八年省左寺副尋並省右寺副又有漢軍堂評事一人亦康熙三十八年省司務㕔司務滿洲漢人各一人掌收發文移承受案牘順治元年置額筆帖式滿洲四人漢軍二人俱順治元年定額康熙中增置滿洲筆帖式二人尋又省職事見吏部篇厯代建置三代禮記月令命理瞻傷察創視折審斷决獄訟必端平鄭康成注理治獄官也有虞氏曰士夏曰大理周曰大司寇謹按康成月令注云有虞氏曰士夏曰大理故尚書臯陶作士孔傳以為理官蔡雍獨斷唐虞曰士官齊職儀大理古官也唐虞以臯陶作士後漢崔駰大理針云邈矣臯陶翊唐作士是唐虞以前名士也但考春秋元命包曰堯為天子得臯陶為大理淮南子主術訓文子原道篇並云臯陶喑而為大理史記皋陶為大理平民各伏得其實北史序傳庭堅為大理唐宗室表皋陶為堯大理然則有虞以前似已有大理之名不始於夏矣豈諸書皆以後代之名名唐虞官乎古者刑獄之職通稱為理故國語晉語云生子輿為理韓詩外傳晉文公使李離為理說苑楚令尹子文之族干法廷理拘之新序石奢為理吕氏春秋齊宏章為大理管子五行篇后土辨乎北方故使為李注云李獄官李理通又韓子外儲說管子曰夷吾不如弦商請立以為大理是唐虞三代為刑官者雖有士及司寇之異名要皆可以理概之也逮秦漢之世猶然故皆以廷尉大理當周司冦之職自隋唐凖六典定制秋官所掌始全歸之刑部而大理仍並建不廢與御史臺稱為三司於是官號乃各有定名判而為二矣今以周官司寇之屬及厯代尚書諸曺繫諸刑部篇內其理官沿革則具載於此庶源委可以考見云禮記王制成獄辭史以獄成告於正正聼之鄭康康注正如周鄉師之屬今漢有正平丞秦所置孔頴逹疏此王制多是殷法秦則放殷制之謹案漢志無廷尉丞康成王制注謂漢廷尉有丞與漢志不合考玉海卷百二十三引王制此注丞作承則承字屬下謂亦承秦之制耳秦冊府元龜秦置廷尉掌刑辟秩二千石顔師古前漢書注應劭曰聽訟必質諸朝廷與衆共之兵獄同制故曰尉師古曰廷平也治獄貴平故以為號太平御覽韋昭辨釋名曰凡掌賊及司察之官皆曰尉尉罰也言以罪罰姦非也杜佑通典秦置廷尉正廷尉監漢漢書百官公卿表廷尉秦官掌刑辟有正左右監秩皆千石景帝中六年更名大理武帝建元四年復為廷尉宣帝地節三年初置左右平秩皆六百石哀帝元夀二年復為大理漢書刑法志宣帝即位詔曰吏用法巧文寖深决獄不當使有罪興邪不辜受戮朕甚傷之今遣廷史與郡鞫獄任輕祿薄其置廷平秩六百石員四人務平之以稱朕意漢紀宣帝紀初置廷尉平四人秩六百石諌議大夫鄭昌上疏言今明主躬垂明聽雖不置廷尉平獄將自正若開後嗣不若刪定律令律令一定愚民知其所避畏姦吏無所弄權柄今不正其本而齊其末世衰毁則廷尉平持權而為亂首矣漢書黃霸列傳帝聞霸持法平召以為廷尉正後漢書何敞列傳敞六世祖比干武帝時為廷尉正與張湯同時謹按太平御覽引三輔决録注謂何比干當武帝時公孫宏舉為廷尉右平不知廷平宣帝始置武帝時尚無此官其誤顯然張湯傳上意所便引正監掾史賢者議張湯但言正監則其時無平可知又杜佑通典引何比干事誤以比干為何敞之字遂稱敞與張湯爭治獄尤為紕繆也漢書丙吉列傳吉為魯獄史積功勞稍遷至廷尉右監章懷太子李賢後漢書注漢官曰廷尉員吏百四十人其十一人四科十二人二百石廷尉文學十六人百石十三人獄吏二十七人佐二十六人騎史三十人假佐一人官醫漢書兒寬列傳寬補廷尉文學卒史時張湯為廷尉廷尉府盡用文史法律之吏寬以儒生在其間見謂不習事不署曺除為從史㑹廷尉時有疑奏已再見郤使寬為奏即時得可湯以寬為奏讞掾以古法義决疑獄漢書張湯列傳湯决大獄欲傅古義乃請博士弟子治尚書春秋補廷尉史平亭疑法奏讞疑漢書路溫舒列傳廷尉光請溫舒署奏曺掾守廷尉史楊雄廷尉針天降五刑惟夏之績亂兹平人不回不僻昔在蚩尤爰作淫刑延於苗民夏氏不寧穆王耄荒甫侯伊謀厥後陵遲上帝不孤周輕其制秦繁其辜五刑紛紛靡遏靡止寇賊滿山刑者半市昔在唐虞象刑天民是全紂作炮烙墜人于淵故有國者無云何謂是刖是劓無云何害惟虐惟殺人其莫泰殷以刑顛秦以酷敗獄臣司理敢告執謁謹按廷尉在西漢亦稱大理故百官表二名互見又號為理官禮志謂叔孫通所撰禮儀與律令同録藏於理官是也當日尚書雖有三公曺主斷獄而廷尉専掌邦刑實即司寇之任然考之於史則御史中丞司𨽻校尉亦各有治獄奏讞之責不盡在廷尉如薛宣傳宣子况遮斫由咸中丞奏當棄市廷尉以為當完為城旦公卿皆是廷尉此則廷尉與中丞兩議以上也蓋寬饒傳寬饒為司𨽻校尉劾奏衆多廷尉處其法半用半不用此則司𨽻所奏由廷尉覆治也陳湯傳丞相御史奏湯惑衆不道廷尉增夀議湯不可謂惑衆非所宜言大不敬制曰廷尉當是此則兩府所治廷尉亦得駁奏也蓋廷尉與中丞司𨽻頗似今之三法司而丞相御史奏當者則如今之大學士九卿㑹議耳後漢書百官志廷尉卿一人中二千石掌平獄奏當所應凡郡國讞疑罪皆取當以報正左監各一人左平一人六百石掌平决詔獄崔駰大理針邈矣皋陶翊唐作士設為犴狴九州允理如石之平如淵之清三槐九棘以賢以德罪人斯殛凶族斯迸熙又帝載旁施作明昔在仲尼哀矜聖人子罕理刑衛人釋艱釋之其忠勳亮孝文于公哀寡定國廣門敻哉邈矣舊訓不遵主慢臣驕虐用其民賞以崇欲刑以歸忿紂作炮烙周人滅殷商用淫刑湯誓其軍衛鞅酷烈卒殞於秦不疑何害禍不及身嗟兹大理慎于爾官賞不可不思斷不可不䖍或有忠而被害或有孝而見殘吳沉伍胥殷剖比干莫遂爾情是截是刑無遂爾志以速以亟天鑒在顔無細不録福善禍惡其效甚速理臣司律敢告執獄通典後漢光武省右平惟置左平省右監惟有左監一人馬端臨文獻通考後漢廷尉皆以世家為之而郭氏尤盛郭躬為廷尉躬家世掌法務在寬平建安中復為大理謹按建安復改廷尉為大理而後漢志不載者蓋其時曺操已為魏王擅自更革本非漢廷之意也又考後漢書張晧傳稱晧拜廷尉留心刑斷數與尚書辨正疑獄多以詳當見從當時尚書未建六曺而議獄之事已多歸之臺閣是後世刑部與大理分職其原已肇於東漢矣三國冊府元龜魏初改廷尉為大理黃初元年復以大理為廷尉三國魏志司馬芝列傳芝遷大理正芝子岐從河南丞轉廷尉正遷陳留相遂超為廷尉三國魏志鮑勛列傳勛收付廷尉廷尉法議正刑五嵗三官駮依律罰金二斤帝大怒收三官以下付刺姦孫逢吉職官分紀魏廷尉三官通視蘭臺治書舊為尚書郎下遷謹案自漢而後以正監平為廷尉三官而如鮑勛傳所言則廷尉所處當者三官又得為駮議是三官雖屬廷尉實各舉其職不必盡相咨禀矣宋書百官志廷尉律博士一人魏武初建魏國置三國吳志顧雍列傳雍纍遷大理奉常三國吳志三嗣主傳孫亮太平二年㑹稽南郡反廷尉丁密討之三國吳志胡綜列傳青州人隱蕃歸吳用為廷尉監廷尉郝普尤與之親善謹按吳志大理廷尉其文互見考經傳多有官同而名異者非必由于前後易名也如昭十四年傳士景伯如楚叔魚攝理杜預注士景伯晉理官晉語云士景伯如楚叔魚為贊理孔朝云景伯晉理官是同一官既以士名又以理名也又韓詩外傳晉文公使李離為大理過聽殺人自拘于廷尉是廷尉大理一事互見其不由於前後更易明矣季漢以後大理一官稱名錯出即此類也晉晉書職官志廷尉主刑法獄訟屬官有正監平并有律博士員謹按華陽國志晉何攀除滎陽令進廷尉評有盜開城門下關者法據大辟攀駁之曰上關執信之主下關儲偹之物設有開上關何以加刑遂减死多所議讞然則廷評主平反之職自漢以後為尤重唐六典大理寺晉置丞主簿明法掾通典晉武咸寧中曺志上表請廷尉置丞謹案晉置丞為廷尉屬厯代並同至明始以大理寺丞升居卿少之次國初尚沿其制設寺丞漢人一人秩正五品為堂上官康熙三十八年省其後改左右寺正為寺丞秩正六品於是復為屬官矣宋齊梁陳宋書百官志廷尉一人丞一人掌刑辟廷尉正一人廷尉監一人廷尉評一人廷尉律博士一人南齊書百官志廷尉府置丞一人正一人監一人評一人律博士一人孔稚圭上新定法律表臣以疏短謬司大理陛下發自聖衷憂矜刑網御筵奉訓逺照民瘼臣謹仰述天官伏奏雲陛所奏繆允者宜寫律上國學置律助教依五經例國子生有欲讀者䇿試上過髙第即便擢用使處法職以勸士流冊府元龜梁初曰大理天監元年復為廷尉廷尉視祕書監丞視皇子行佐正視正王佐正監平三人比舊選少重服獬豸冠絳幘皂衣銅印墨綬又置建康縣獄三官視給事中以尚書郎為之冠服同廷尉三官元㑹廷尉三官與建康三官皆法服皂衣朝服以監東西中華門手執方木長三尺方一寸謂之執方器又置律博士視員外郎徐堅初學記梁加卿字曰廷尉卿後並因之唐六典宋齊皆為廷尉梁為秋卿班第十三陳因之鄭樵通志丞梁陳置一人謹案南史裴子野傳子野兼廷尉正時三官通署獄子野嘗不在同僚輒署其名奏有不允子野從坐免職是梁陳以前治獄者皆得各自下議至梁而始令通署即今聨銜書稿之制所自昉也北魏冊府元龜後魏孝文帝太和中廷尉卿品第二上少卿品第三上正監評丞品第五二十三年復次職令廷尉品第三少卿品第四正監評品第六丞品第七永安二年復置司直十人視五品上不署曺事覆治御史檢劾事唐六典永安二年御史中尉髙穆奏置司直十人𨽻廷尉位在正監上職官分紀後魏職令廷尉少卿第四品上第二清用思理平斷明刑識法者謹案魏書韋閬傳稱天水姜儉父昭自平憲司直出為兖州安東長史官氏志無平憲司直之名其為廷尉屬官與否已不可考謹附識於此北齊隋書百官志後齊大理寺掌决正刑獄正監評各一人律博士四人明法掾二十四人檻車督二人掾十人司直明法各十人文獻通考北齊曰大理寺置卿少卿各一人通典晉荀朂曰九寺可併於尚書後魏亦有三府九寺則九卿稱九寺久矣然通異名不連官號官寺連稱自北齊始也謹案秦漢凡府庭所在皆謂之寺說文曰寺廷也有法度者也風俗通曰寺者嗣也理事之吏嗣續於其中也唐書楊收傳漢制總羣官而聽曰省分務而専治曰寺其解不一然要為官舍之通稱故漢時雖有九寺九卿之目而所謂寺者實不止九卿諸官府皆得稱之如後漢書安帝紀皇太后幸雒陽寺此雒陽縣治所也漢書何並傳並為長陵令侍中王林卿令騎奴至寺門剝其建鼓此長陵縣治所也後漢書張湛傳告歸平陵望寺門而步此平陵縣治所也又元帝紀初元二年地震敗豲道縣城郭官寺馬援傳歸守寺舍此類甚多蓋猶今之言衙署耳自北齊以官寺連稱遂與省臺府衛等俱為分職之名至今沿為永制焉後周謹案杜佑通典以後周刑部中大夫入之大理卿沿革蓋因周世未有六曺定制故仍以當古理官然刑部稱名所自實原於此未可相混今故繫諸刑部篇不列於此表焉隋隋書百官志髙祖受命置大理寺卿少卿各一人不統署又有正監評各一人司直十人律博士八人明法二十人開皇三年罷大理寺監評及律博士員加置正為四人煬帝即位大理寺丞改為勾檢官增正員為六人分判獄事置司直十六人降為從六品後加至二十人又置評事四十八人掌頗同司直隋書盧思道列傳思道為散騎侍郎於時議置六卿將除大理思道上奏曰省有駕部寺留太僕省有刑部寺除大理斯則重畜産而賤刑名誠為未可上嘉納之通典隋初與北齊同至煬帝加置少卿二人謹案自隋定六部之制始設刑部以擬秋官而大理以盧思道言並建不廢厯代因之其與都察院為三法司則又沿唐之制也說詳刑部篇至廷尉在漢即為刑獄總滙然當時守令權重得自論决如王尊行美陽令事取不孝子縣磔著樹使騎吏張弓射殺之嚴延年為涿郡太守遣掾趙繡按髙氏繡心懼為兩劾延年即收送獄夜入晨將至市論殺之張敞為京兆尹以掾絮舜不肯為敞竟事收繫獄冬月未盡數日案事吏晝夜驗治舜竟致其死事弃舜市事皆見各本傳皆以頃刻定獄並不上請待報逮後漢而請讞之制稍嚴然觀襄楷傳稱永平舊典諸當重論皆須冬獄先請後刑頃數十嵗以來州郡玩習又欲避請讞之煩輒托疾病多死牢獄云云則亦不必盡上於廷尉自隋文帝開皇十二年制天下死罪諸州不得便决皆令大理覆治見隋書本紀嗣後刑辟奏當乃無有不由省寺核覆者矣唐唐六典大理寺卿一人從三品少卿二人從四品上大理卿之職掌邦國折獄詳刑之事以五聽察其情以三慮盡其理少卿為之二凡諸司百官所送犯徒刑以上九品以上犯除免官當庶人犯流死以上者詳而質之以上刑部仍於中書門下詳覆其杖刑以下則决之若禁囚有推决未盡留繫未結者五日一慮若淹延久繫不被推詰或其狀可知而推證未盡或訟一人數事及被訟人有數事重事實而輕事未决者咸慮而决之凡中外官吏有犯經斷奏訖而猶稱寃者則審詳其狀凡吏曺補署法官則與刑部尚書侍郎議其人可否然後注擬新唐書百官志大理正二人從五品下掌議獄正科條凡丞斷罪不當則以法正之五品以上論者蒞决巡幸則留總持寺事丞六人從六品上掌分判寺事正刑之輕重徒以上囚則呼與家屬告罪問其服否主簿二人從七品上掌印省署鈔目句檢稽失司直六人從六品上評事八人從八品下掌出使推按録事二人史五十六人司直史十二人評事史二十四人李涪刋誤近代唯大理得言棘卿下寺則否九卿皆樹棘木大理則於棘下訊鞫其罪所謂大司寇聽刑於棘木之下通典龍朔二年改大理為詳刑咸亨元年復舊光宅元年改為司刑神龍元年復舊唐㑹要大理少卿本一員永徽六年加一員丞本八員天冊三年省兩員評事貞觀十二年置十員掌出使推事元和十五年减二員謹案唐制有大獄則以刑部御史臺大理寺長官為三司使其以御史刑部郎大理司直評事等官任之者謂之小三司使即今三法司之權輿玉泉子李克勤為大理卿昭宗在華州時鄭縣令崔鑾有民告舉放絁絹價刺史韓建令計以為贓奏下三司定罪御史臺刑部奏罪當絞大理寺數月不奏此大三司使相持之證也東觀奏記大理寺直王景初與刑部郎中唐技議讞不平景初坐貶潭州司户參軍制下景初撾登聞鼓稱寃再貶昭州司户制曰不遵嚴譴輒冒登聞以懲不恭此小三司使相持之證也然考冊府元龜載文宗時治宇文鼎獄以大理少卿裴充刑部郎中張諷侍御史盧宏正同推鞫又治楊憑獄以大理少卿胡珦左司員外郎胡證侍御史韋顗同推鞫是大理寺卿可充三小司使而左司員外亦非刑曹本職殆以擇人而任故不同常制歟五季太平御覽後唐書曰長興二年八月敕令後大理寺官員宜同臺省官例外進其法直官比禮直官任使職官分紀五代職官志後唐同光元年諸寺各置大卿一員宋宋史職官志大理寺舊置判事一人兼少卿事一人凡獄訟之人隨官司决劾本寺不復聽訊但掌斷天下奏獄送審刑部詳訖同署以上于朝詳斷官八人以京官充國初大理正丞評事皆有定員分掌斷獄其後擇他官明法令者若常參官則兼正未常參則兼丞謂之詳斷官舊六人後加至十一人又去兼正丞之名咸平二年始定置法直官二人以幕府州縣官充改京官則為檢法官元豐官制行置卿一人少卿二人正二人推丞四人斷丞六人司直六人評事十有二人主簿二人卿掌折獄詳刑鞫讞之事凡職務分左右天下奏劾命官將校及大辟囚以下以疑請讞者𨽻左斷刑則司直評事詳斷丞議之正審之若在京百司事當推治或特㫖委勘及係官之物應追究者𨽻右治獄則丞専推鞫蓋少卿分領其事而卿總焉凡刑獄應審議者上刑部被㫖推鞫及情犯重者卿同所𨽻官請對奏裁若獄空或斷絶則御史核實以聞分案十有一置吏六十有九文獻通考宋大理寺以朝官一員或二員判寺事一員兼少卿事建隆二年以工部尚書竇儀判寺事熙寧九年神宗謂國初廢大理獄非是以問孫洙洙對合㫖於是下詔以京師官寺凡有獄皆繫開封府司録司及左右軍巡三院囚逮猥多難於隔訊又暑多瘐死因緣留滯動涉嵗時稽參故事冝屬理官可復置大理獄天下奏案同刑部審刑院詳斷置卿一少卿二丞四始命崔台符知卿事蹇周輔楊汲為少卿各舉丞及檢法官凡官屬依御史臺例謁有禁官制刑左斷刑右治獄凡五案元祐間因鮮于侁所請廢大理獄後復建炎三年併省寺監而大理如故省卿而斷刑治獄少卿各一員寺正神宗復置大理獄後置寺正寺丞國初為寄祿官視後來宣教郎神宗正官名置獄丞四員命卿少舉官元豐五年命莫君陳等九人為大理寺丞始自朝廷差官也舊制斷刑寺丞六員建炎三年减三員治獄寺丞减二員司直元豐時命程嗣先等四人為之建炎元年詔斷刑司直兼治獄司直其治獄司直罷評事國初為京官寄祿視後來承事郎元豐正官名命張仲頴等十二人為評事隆興二年詔評事以八員為額以雷霆號令星斗文章為號王巖叟請罷試中斷案人入寺疏臣伏覩祖宗時審刑大理長官及其僚屬皆擇天下君子長者道物情知義理者以為之後専尚刑名法術之學而慘刻之吏多在此選也試以斷案巧則巧矣然不足以得正人而足以得狡吏委理卿獨舉専則専矣然不足以任至公而足以得偏見臣愚伏乞檢㑹舊大理舉官法及祖宗置審刑院大理相持並行之初意今後罷試斷案人則釋之之徒將自為陛下用稍復刑措之治天下幸甚章俊卿山堂考索大理左右各五案左㕔斷刑曰詳刑詳讞宣黃分薄奏表右㕔治獄曰左推右推寺案知雜檢法謝維新合璧事類元豐五年刑部奏乞分評事司直與正為斷司丞長二為議司凡斷案先上正看詳當否論難改正然後過議司覆議謹案今大理之分左右寺其制始於宋時然宋以左寺斷刑右寺治獄今則推鞫悉主之刑部大理不司治獄故左右寺官分署京城及各省大辟奏案皆斷刑之事也至唐代刑名皆經大理審斷自杖以下得専决其徒刑以上則送刑部而質正焉故唐時刑部奏獄多有據大理寺申云云之文是其法先寺而後部明代三法司㑹審初審刑部都察院為主覆審大理寺為主則其法又先部而後寺各有不同惟宋世大理斷天下奏獄送審刑院詳訖同署以上於朝則今三法司㑹題之例所由昉矣遼遼史百官志大理寺有提㸃大理寺有大理正聖宗統和十二年置遼史劉伸列傳伸登進士第厯大理正因奏獄上適與近臣語不顧伸登曰臣聞自古帝王必重民命願陛下省臣之奏上大驚遷大理少卿人以不寃升大理卿改西京副留守加諌議大夫提㸃大理寺遼史耶律儼列傳大康初改少府少監知大理正賜紫六年遷大理少卿奏讞詳平明年升大理卿大安二年同知宣徽院事提㸃大理寺謹案遼代以伊勒希巴解見刑部篇主刑法而大理之職亦獨重其選故劉伸耶律儼等皆以平允見稱其提㸃大理寺則如今之大臣兼管部務也金金史百官志大理寺天德二年置自少卿至評事漢人通設六員女直契丹各四員卿正四品少卿從五品寺正六品丞從六品掌審斷天下奏案詳讞疑獄司直四員正七品掌參議疑獄披詳法狀舊有契丹司直一員明昌二年罷評事三員正八品掌同司直明昌二年省契丹評事二員大安二年省漢人一員知法十一員從八品女直司五員漢人司六員掌檢斷刑名事明法二員從八品興定二年置同流外四年罷之元元史百官志都護府秩正二品掌領舊州城及輝和爾部名也原作畏吾兒今改正之居漢地者有詞訟則聽之大都護四員同知二員副都護二員至元二十年改大理寺二十二年復為大都護謹案元代惟刑部不置三法司故無大理寺官其都護府乃主輝和爾與漢人交涉詞訟正如今理事同知所掌蓋偶襲大理以為名非古來廷平之職也明明史職官志大理寺卿一人正三品左右少卿各一人正四品左右寺丞各一人正五品其屬司務㕔司務二人從九品左右二寺各寺正一人正六品寺副二人從六品後革右寺副一人評事四人正七品初係右評事八人後革四人卿掌審讞平反刑獄之政令少卿寺丞贊之左右寺分理京畿十三布政司刑名之事凡刑部都察院五軍斷事官所推問獄訟皆移案牘引囚徒詣寺詳讞左右寺寺正各隨其所轄而覆審之初吳元年置大理司卿秩正三品洪武元年革三年置磨勘司凡諸司刑名錢糧有寃濫隱匿者稽其功過以聞尋亦革洪武三年置磨勘司設司令司丞七年增設司令一人司丞五人首領官五人分為四科十年革十四年復置磨勘司設司令一人左右司丞各一人左右司副各一人二十年復罷十四年復置大理寺改卿秩正五品左右少卿從五品左右寺丞正六品其屬左右寺正各一人寺副各二人左評事四人右評事八人又置審刑司共平庶獄凡大理寺所理之刑審刑司復詳議之審刑司設左右審刑各一人正六品詳議各三人正七品十七年改建刑部都察院大理寺審刑司五軍斷事官署於太平門外名其所曰貫城十九年罷審刑司二十二年復卿秩正三品少卿二人正四品丞三人正五品其右右寺官如故二十九年又罷盡移案牘於後湖建文初復置改左右寺為司寺正為都評事司務為都典簿司務洪武二十六年置成祖初仍置大理寺其左右寺設官復如洪武時又因左右二寺評事多寡不等所治事亦繁簡不均以二寺評寺均分左右各六人如刑部都察院十二司道各帶管直𨽻地方審録永樂二年仍復舊後定都北京又改分寺屬𢎞治元年裁減右評事四人萬厯九年更定左右寺分理天下刑獄浙江福建山東廣東四川貴州六司道左寺理之江西陜西河南山西湖廣廣西雲南七司道右寺理之以能按律出入罪者為稱職司務典出納文移謹案明代定三法司之制以刑部受天下刑名都察院糾察大理寺駁正凡刑部重囚皆送大理寺覆訊大理擬覆平允而後定案故當時特重其選每以他官領之如楊守隨以工部尚書掌大理寺是也見明史本傳自孝宗以後大理乃止閲案卷囚徒俱不到寺而每嵗審録猶於大理寺行之然刑名之柄實為厰衛侵奪法司不能持平甚者為之扶同傅㑹而內官得與大審至踞坐大理寺中堂奔走列卿出入髙下聽其意指刑罰之失中至明季而其弊尤甚我朝慎重邦刑凡大辟案皆令三法司同署直省請讞奉㫖下法司核擬者刑部具牘送都察院大理寺於十日內審允還部㑹疏奏聞其刑部繫囚則必三法司㑹審明確而後蔽罪具奏既有刑部閲其實又有都察院大理寺簡其孚而大聖人欽恤深仁猶必反覆研求折衷指示務使庶獄咸歸平允好生之德洽於民心洵逺軼虞廷盛軌矣欽定厯代職官表卷二十二
