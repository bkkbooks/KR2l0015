body:
  text: 鴻臚寺表鴻臚寺國朝官制鴻臚寺卿滿洲漢人各一人初制滿洲三品順治十六年定與漢人俱為正四品少卿滿洲漢人各一人從五品掌朝㑹賔客祭祀燕饗之儀詔之著位而贊其升降拜跪之節有失朝及不如儀者糾之初順治元年置鴻臚寺設滿洲漢人卿各一人滿洲少卿一人漢人左右少卿各一人左右寺丞各一人十五年省漢人少卿一人寺丞一人康熙五十二年罷寺丞官不設乾隆十四年定以禮部滿洲尚書兼管鴻臚寺事永為常式焉鳴贊滿洲十有四人漢人二人從九品掌儐導及行禮唱贊之事滿洲鳴贊順治初置十六人乾隆三十七年以一人改屬鑾儀衛司贊鳴鞭其留寺者實十有四人漢人鳴贊初置八人自順治二年至十三年先後省四人乾隆七年又省二人序班漢人四人從九品掌序百官之班位初置二十二人順治十五年省十人康熙三十八年省六人乾隆七年省二人又有學習序班以直𨽻山東山西河南儒學生內考取初置十有二人乾隆十七年改定専用直𨽻諸生以八人為額序班缺以學習者選授鳴贊缺以序班遞升咨送吏部題補主簿㕔主簿滿洲漢人各一人從八品掌行遣文移繕寫章牘順治元年置額初又設有各館主簿後俱省筆帖式滿洲四人筆帖式滿洲初置十人後省六人又有漢軍二人後俱省職事具吏部篇歷代建置三代周禮秋官大行人中大夫二人小行人下大夫四人司儀上士八人中士十有六人大行人掌大賔之禮及大客之儀小行人掌邦國賔客之禮籍司儀掌九儀之賔客擯相之禮以詔儀容辭令揖讓之節謹案鴻臚一官自唐六典通典初學記諸書皆以為出於周禮之大行人然古今立制各殊詳考其實漢魏以後之鴻臚與周大行人之職已有不同而今之鴻臚則與漢魏以後之鴻臚尤逈不相合何也大行人掌侯國朝覲聘問及王朝撫諸侯之禮籍於中庸九經之內實兼柔逺人懷諸侯二者而有之秦漢以降罷侯置守無復邦交之事即分建諸侯王亦不過封拜時令大鴻臚擯贊而已㑹同聘俯久廢不行鴻臚所主者惟蠻夷朝貢獻見之禮猶大行人職守之一端其他固已不能一一吻合然當時鴻臚既領蕃國則一切致飱授館封冊弔慰尚其専司而殿庭禮儀則别有謁者及通事宣贊舍人等官以襄其贊導並不屬於鴻臚由唐迄宋相承未改自金元二代不置鴻臚明初復設是官始取侍儀傳贊之事悉以歸之而外藩館餼則改𨽻諸禮部其職乃與古大異矣今因歷代相沿皆以大行人為原起故仍繫之於表而復互載於理藩院及㑹同四譯館篇以著其實云說詳名本篇秦冊府元龜秦置典客章懷太子李賢後漢書注謁者秦官也員七十人謹案秦典客掌歸義蠻夷其職已分著於理藩院及㑹同四譯館二表今以其為鴻臚沿革所自故仍互見於此至謁者之官亦始於秦史記范睢列傳載謁者王稽使魏還見穰侯穰侯稱之為謁君者是也其官主儐贊禮儀正如今鴻臚之職故並繫於此表焉漢冊府元龜漢景帝中六年更名典客為大行令武帝太初元年大行更名大鴻臚鴻臚之名自此始也屬官行人令又更名為大行令漢書景帝本紀顔師古注大鴻臚本名典客後改曰大鴻臚大行令者本名行人即典客之屬官也後改曰大行令據此紀文則景帝已改典客為大鴻臚行人為大行令矣而百官公卿表乃云景帝中六年更名典客為大行令武帝太初元年更名大行令為大鴻臚更名行人為大行令當是表誤漢書刋誤劉攽曰史記文景事最略漢書則頗有所録蓋班氏博採他書成之故於景帝世謂典客為大鴻臚行人為大行由他書即武帝時官紀景帝世事班氏失於改革耳然則改諸官名在武帝世無疑非表誤也劉敞曰案景十三王傳河間獻王薨猶云大行令奏諡則非表誤也但官名改易未定史於此追舉最後官名也武帝初大行王恢李息即大行令也漢書百官公卿表應劭注大鴻臚者郊廟行禮讃九賔鴻聲臚傳之也後漢書百官志大鴻臚卿一人中二千石郊廟行禮贊導請行事既可以命羣司諸王入朝當郊迎典其禮儀皇子拜王贊授印綬丞一人比千石大行令一人六百石丞一人治禮郎四十七人劉昭後漢書志注漢官曰治禮郎其四人四科五人二百石文學五人百石九人斗食六人佐六人學事十二人守學事東觀書曰主齊祠儐贊九賔盧植禮注曰大行郎亦如謁者兼舉形貌漢書平當列傳少為大行治禮丞功次補大鴻臚文學蕭望之列傳察亷為大行治禮丞王莽列傳校尉東海公賔就故大行治禮謹案漢之大鴻臚所領為諸侯王列侯及歸義蠻夷之事與今鴻臚不同然觀後漢志及應劭注所言則郊廟行禮及延見九賔鴻臚皆有贊導之職漢書蕭由𫝊徴為大鴻臚㑹病不及賔贊還歸故官顔師古注謂贊導九賔之事是也蓋鴻臚既主蕃國凡初封及入朝禮應贊拜而郊廟侍祠亦有諸侯王在列故併以其事屬之今鴻臚之司贊唱其由來固亦有所自耳至治禮郎専主儐贊則當如今鳴贊之職矣漢書百官公卿表謁者掌賔讚受事員七十人秩比六百石有僕射秩比千石後漢書百官志謁者僕射一人比千石為謁者臺率主常侍謁者五人比六百石主殿上時節威儀謁者三十人其給事謁者四百石其灌謁者郎中比三百石掌賔贊受事及上章報問員七十人中興但三十人初為灌謁者滿嵗為給事謁者章懷太子李賢後漢書注十三州志曰謁者皆選孝亷年未五十曉解儐贊者劉昭後漢書志注荀綽晉百官表注曰漢謁者用孝亷威容嚴恪能擯者為之明帝詔曰謁者乃堯之尊官所以試舜賔于四門四門穆穆者也後漢書梁慬列傳何熙永元中為謁者身長八尺五寸善為威容贊拜殿中音動左右杜佑通典謁者缺選郎中美鬚睂大音者以補之功次當遷欲留增秩者許之謹案漢謁者主受事及上章報問當如今之奏事處官員而擯導威儀亦其所掌故有缺選補皆以大音者充之與今鴻臚之職尤為相合謹並著之於表又考史記有大謁者張釋卿漢書有大謁者劉襄而百官表不見此名疑即謁者僕射之别稱蓋其職如今之鴻臚卿而給事謁者則如今之鳴贊灌謁者則如今之序班也三國三國蜀志楊戲傳何彥英名宗先主即尊號遷為大鴻臚鄭樵通志鴻臚卿魏及晉初皆有之三國吳志三嗣主傳寶鼎元年正月遣大鴻臚張儼弔祭晉文帝馬端臨文獻通考魏置謁者僕射掌大拜授及百官班次統謁者十人晉冊府元龜晉大鴻臚為列卿置丞功曹主簿五官等員江左有事則權置事畢則省晉書職官志武帝省謁者僕射以謁者并蘭臺江左復置僕射後又省宋齊梁陳通典大鴻臚宋齊有事則權置兼官畢則省隋書百官志梁天監七年以大鴻臚為鴻臚卿置丞及功曹主簿鴻臚卿位視尚書左丞掌導護贊拜陳承梁皆循其制官文獻通考職官録曰鴻臚卿舊視散騎常侍天監中視中丞吏部唐六典齊職儀云東宫殿中將軍屬官有導客局置典儀録事一人掌朝㑹之事史闕其品秩梁有典儀之職未詳何曹之官掌唱警唱奏之事朱服武冠陳亦有之謹案漢魏大鴻臚至梁始除大字改曰鴻臚卿専掌導護贊拜今鴻臚之制其權輿實本於此又考通鑑載侯景破臺城入見梁武帝於太極東堂稽顙殿下典儀引就三公榻據此是齊梁典儀之官並主引百僚以就位次蓋如今之鴻臚寺序班也宋書百官志謁者僕射一人掌大拜授及百官班次領謁者十人謁者掌小拜授及報章晉省僕射宋世祖大明中復置秩比千石南齊書百官志謁者臺掌朝覲賔饗謁者僕射一人謁者十人隋書百官志梁謁者臺僕射一人掌朝覲賔饗之事屬官謁者一人掌朝㑹擯贊髙功者一人為假史掌差次謁者通典謁者臺陳亦有之謹案南朝謁者臺在宋世兼主報章猶沿漢制至蕭齊以後専主朝覲賔饗之儀節則已全有今鴻臚寺之職掌矣北魏冊府元龜後魏鴻臚卿第二品上後降為第三品少卿一人第三品上後為正四品上丞從五品中後降為第七品通典後魏曰大鴻臚魏書官氏志太和十五年七月置司儀官髙祖詔羣臣議定百官謁者僕射從第四品上典儀監從第五品上謁者從第五品中治禮郎從第六品下太和二十三年復次職令謁者僕射第六品謁者第九品文獻通考後魏謁者臺掌導相禮儀僕射二人謁者三十人北齊隋書百官志後齊鴻臚寺置卿少卿丞各一人有功曹五官主簿録事等員掌蕃客朝㑹吉凶弔祭統司儀署令丞司儀署又有奉禮郎三十人謁者臺掌凡諸吉凶公事導相禮儀事僕射二人謁者三十人録事一人謹案西漢封拜諸侯王以大鴻臚行事至後漢而禮儀志所載則皆謁者引贊後漢書禮儀志拜諸侯王公儀謁者引當拜前伏殿下光祿勳讀䇿書畢謁者稱臣某再拜侍御史授印綬贊謁者曰某王某公臣某初謝是其職已移之謁者臺惟喪儀內有鴻臚傳哭之文蓋所司多在凶事故北齊鴻臚之職但稱掌吉凶弔祭而導相禮儀則専屬之謁者至唐而司儀令丞専掌凶禮儀式職制相沿其變遷固有漸也後周通典後周官品正三命秋官司儀上士正二命秋官司儀中士謹案杜佑馬端臨等皆以後周蕃部賔部中大夫列入鴻臚沿革然其職皆主藩屬朝貢之禮與今鴻臚不同已分繫諸理藩院及㑹同四譯館表內惟司儀一官掌殿庭禮儀實今鴻臚之職故著之於此篇隋隋書百官志髙祖置鴻臚寺卿少卿各一人丞二人主簿二人録事二人統司儀署令二人掌儀二十人開皇三年廢鴻臚入太常十三年復置煬帝加置少卿二人文獻通考隋謁者臺大夫一人掌受詔勞問出使慰撫持節䇿授及受寃枉而申奏之駕出對御史引駕初魏置中書通事舍人官其後歷代皆有然非今任隋初罷謁者仍置通事舍人十六員承㫖宣𫝊開皇三年又增為二十四員及煬帝置謁者臺乃改通事舍人為謁者臺職謂之通事謁者置二十人新唐書百官志隋謁者臺有典儀唐六典隋鴻臚寺有贊者十二人謹案魏晉以後中書省置通事舍人本掌詔誥蓋如今內閣學士之職至隋而以代謁者之任則又主傳宣贊引當如今鴻臚寺之職矣至謁者大夫為謁者臺長官駕出則掌引駕今定制凡常朝御殿以鴻臚卿二人請駕導駕蓋即其例則謁者大夫實兼有今鴻臚卿職事矣又典儀隋書失載而唐志有之亦屬於謁者臺當如今之序班而鴻臚寺有贊者則如今之鳴贊也唐唐六典鴻臚寺卿一人少卿二人丞一人主簿一人録事一人龍朔二年改為同文正卿咸亨元年復曰鴻臚光宅元年改為司賔寺卿神龍元年復舊掌賔客及凶儀之事領司儀署令一人丞一人掌凶禮之儀式及供喪葬之具舊唐書職官志門下省典儀二員贊者十二人掌殿上贊唱之節及殿廷版位之次凡國有大禮侍中行事及進中嚴外辦之版皆贊相焉唐六典唐朝置典儀二人𨽻門下省初用人皆輕至貞觀初李義府為之是後常用士人領贊者以知贊唱之節贊者掌贊唱為行事之節分番上下亦謂之番官謹案唐鴻臚所掌自蕃客以外惟主凶儀而殿廷贊唱之事則别以典儀及贊者司之是今鴻臚之職在唐世又屬門下省矣至典儀掌版位次序如今序班而當時又兼贊唱以士人為之故其職在贊者之上亦視今制頗有不同云新唐書百官志通事舍人十六人從六品上掌朝見引納殿廷通奏凡近臣入侍文武就列則導其進退而贊其拜起出入之節武德四年廢謁者臺改通事謁者為通事舍人謹案唐通事舍人即隋通事謁者而改𨽻於中書省職在贊導羣臣拜起出入儀節正如今之鴻臚寺與典儀所司大略相似而互屬兩省史志並不詳其分職之由以開元禮考之如蕃國來朝儀則典儀位於宫縣之東北贊者二人在南差退舍人引蕃主入門典儀贊拜禮畢舍人與蕃主俱退又元旦冬至朝賀儀百官入舍人引就朝堂前位皇帝升座百官以次入就北面位典儀曰再拜贊者承傳在位皆再拜稱賀禮畢典儀曰再拜通事舍人以次引北面位者出又元旦冬至大㑹儀典儀一人升就東階上通事舍人引王公以下入就位侍中稱制延王公等升殿典儀承傳階下贊者又承傳在位者皆再拜應升殿者諸東西階升羣臣上壽典儀曰再拜階下贊者承傳在位者皆再拜其進酒進食並同據此是典儀位在殿上當如今大朝日立於太和殿東西檐第二柱下之鳴贊官其贊者位在階下當如今承傳行禮之鳴贊官而通事舍人引王公等出入當如今引王公百官入午門左右門及左右掖門之鴻臚寺官也當時殆以通事舍人有傳宣詔命之事故屬之中書省而今則以其職俱併入鴻臚耳五季冊府元龜後唐莊宗詔諸寺監各只置大卿官屬並權停五代史王景崇傳明宗即位拜通事舍人歷引進閣門使謹案五季官制最為闕略當時寺監皆依唐制則鴻臚亦必備官特其文不見於史耳至通事舍人在唐本以文臣補授後唐明宗以王景崇為之則改用武人逮宋而閣門諸官皆為右職矣宋文獻通考宋鴻臚寺判寺事一人以朝官以上充元豐官制行置卿少卿丞主簿各一人卿掌四夷朝貢宴勞給賜送迎之事及國之凶儀中都祠廟道釋帳籍除附之禁令少卿為之二丞參領之建炎後廢鴻臚併入禮部謹案唐宋鴻臚皆主蕃國及凶儀與今鴻臚職掌全不相合以官制沿革所自未可盡略故仍繫之於此表焉章俊卿山堂考索宋朝東上閣門使西上閣門使凡取禀㫖命供奉乘輿朝㑹游宴及贊導三公羣臣蕃國朝見辭謝糾彈失儀之事使副専之舍人以下但道班贊唱而已政和官制橫班使副之名既改為大夫而其職任則命內外官知焉其後所除總名知閣門事仍兼客省四方館之職同知閣門事乃昔時之所謂副使也故事閣門無通事舍人而通事舍人沿夫唐制自𨽻中書省如抽赴閣門並稱閣門祇侯其後直授閣門通事舍人非舊制也天禧中去閣門二字政和六年改為宣贊舍人舊以閣門通事舍人閣門祇侯二等比館班清流為進取之基非熟於朝儀不在此選又熙寧四年閣門請擇武臣子弟六人前後殿祇應以閣門看班祇候為名候五年熟識儀數乃除閣門祇候宋史職官志東上閣門西上閣門使各三人副使各二人宣贊舍人十人祇侯十有二人掌朝㑹宴饗供奉贊相禮儀之事使副承㫖禀命舍人傳宣贊謁祇侯分佐舍人凡文武官自宰臣宗室自親王外國自契丹使以下朝見辭謝皆掌之視其品秩以為引班叙班之次贊其拜舞之節而糾其違失若慶禮奉表則東上閣門掌之慰禮進名則西上閣門掌之月進班簿嵗終一易分東西班揭帖以進政和六年詔宣贊播告直誦其辭李心傳建炎以來朝野雜記閣門右列清選也舊有知閣門事同知閣門事多以外戚勳貴為之其下有閣門宣贊舍人掌唱贊書命閣門祇侯掌侍衛班列乾道間孝宗始仿儒臣館閣之制增置閣門舍人以待武舉之入官者先召試而後命供職滿二年與邊郡遂為戎帥部刺史之選云李燾續資治通鑑長編天禧四年三月右司諫直集賢院祖士衡言常朝起居日長春崇德殿假日後殿中書樞密文武合班而閣門祇侯一員在前隨班再拜側立贊謁以臣愚見未協軌儀欲請自今令通班閣門祇侯在前殿則與內殿供奉官以下同起居後殿則與軍頭司官司起居然後立殿庭贊謁從之謹案宋閣門本武職進身之階稱為右列清選然當時鴻臚既不司贊引凡殿廷禮儀皆閣門主之通鑑長編載天禧三年十一月閣門與太常禮院上大祀稱慶合班圖即如今之行禮儀注景祐四年九月詔閣門於紫宸殿垂拱殿刋石為百官表位即如今太和殿前之品級山是閣門所掌實即今鴻臚職事雖文武制異而官守固無殊也至祖士衡所云令閣門祇侯先起居而後贊謁者蓋以閣門祇侯既當側立贊謁自不可更隨班拜跪故令其先在內起居畢後再立殿庭今三大節大朝之禮鴻臚寺職事各官先赴中和殿前行禮畢趨出各就班位候駕升殿傳贊行禮正其例耳遼遼史百官志南面官諸寺職名有鴻臚寺通事舍人院通事舍人統和七年見通事舍人李琬東上閣門司太宗㑹同元年置東上閣門使韓延徽傳見東上閣門使鄭延豐東上閣門副使西上閣門司西上閣門使統和二十一年見西上閣門使丁振西上閣門副使謹案遼鴻臚官制舊史已闕職掌亦未之詳以遼史禮志考之當時殿廷行禮凡引羣臣合班北向起居引宋使入門及通名祇侯贊謝宣諭皆通事舍人之職祭祀讀祝贊帝后詣拜位受宋使國書奏榜子引髙麗使至殿下引新進士至丹墀皆閣門使之職而贊拜一節則舍人與閣門使通掌之是今鴻臚職事在進時亦専屬此二官也惟是拜起之節祇應以一人傳唱而遼史載宋使見皇太后皇帝諸儀有契丹舍人漢人閣使齊贊拜之文未喻其故殆以宋之使臣不諳國語故别令漢人贊唱與他禮不同耳金金史百官志閣門明昌五年閣門官以次排轉除授東上閣門使二員正五品明昌六年省一員作從五品西同副使二員正六品明昌六年省一員西同簽事一員從六品掌簽判閣門事西同明昌六年以減副使置西上閣門使二員正五品副使二員正六品簽事一員從六品掌贊導殿庭禮儀西閣門餘副二同閣門祇侯二十五人正大間三十二人閣門通事舍人二員從七品掌通班贊唱承奉勞問之事承奉班都知正七品掌總率本班承奉之事舊置判官後罷內承奉班押班正七品掌總率本班承奉之事御院通進四員從七品掌諸進獻禮物及薦享編次位序右屬宣徽院謹案金代不置鴻臚寺其以閣門掌殿庭禮儀蓋亦沿宋遼之制也元元史百官志侍儀司秩正四品掌凡朝㑹即位冊后建儲奉上尊號及外國朝覲之禮至元八年始置左右侍儀奉御二員禮部侍郎知侍儀事一員引進使知侍儀事一員左右侍儀使二員左右直侍儀使二員左右侍儀副使二員左右侍儀僉事二員引進副使侍儀令承奉班都知尚衣局大使各一員十六年省左右侍儀奉御通曰左右侍儀省引進副使及侍儀令尚衣使等員改置通事舍人十四員三十年減通事舍人七員為侍儀舍人大德十一年升秩正三品至大二年置典簿一員延祐七年定置侍儀使四員至治元年增置通事舍人六員侍儀舍人四員其後定置侍儀使四員正三品引進使知侍儀事二員正四品首領官典簿一員從七品屬官承奉班都知一員正七品通事舍人一十六員從七品侍儀舍人十四員從九品吏屬令史二人譯史一人通事一人知印一人右屬中書禮部謹案元承金制亦不設鴻臚寺官而以侍儀司掌贊導行禮之事準諸今制蓋侍儀使如鴻臚卿引進使知侍儀事如鴻臚少卿通事舍人如鳴贊侍儀舍人如序班也明明史職官志鴻臚寺卿一人正四品左右少卿各一人從五品左右寺丞各一人從六品其屬主簿㕔主簿一人從八品司儀司賔二署各署丞一人正九品鳴贊四人從九品後增設五人序班五十人從九品嘉靖三十六年革八人萬厯十一年復設六人鴻臚掌朝㑹賔客吉凶儀禮之事凡國家大典禮郊廟祭祀朝㑹宴饗經筵冊封進歷進春傳制奏捷各供其事外吏朝覲諸蕃入貢與夫百官使臣之復命謝恩若見若辭者並鴻臚引奏嵗正旦上元重午重九長至賜緞賜宴四月賜字扇夀縷十一月賜戴暖耳陪侍畢頒胙賜皆贊百官行禮司儀典陳設引奏外吏來朝必先演儀於寺司賔典外國朝貢之使辨其等而教其拜跪儀節鳴贊典贊儀禮凡內贊通贊對贊接贊傳贊咸職之序班典侍班齊班糾儀及傳贊初吳元年置侍儀司秩從五品洪武四年定侍儀使從七品引進使正八品奉班都知正九品通贊通事舍人從九品俱為七品以下官九年改為殿庭儀禮司設使一人正七品副三人正八品承奉一人從八品鳴贊二人正九品序班十六人從九品九關通事使一人正八品副六人從八品十三年改使為司正分左右司副各一人增序班至四十四人革承奉增設司儀四人二十二年增設左右司丞四人正九品三十年始改為鴻臚寺升秩正四品設官六十二員卿以下員數品級如前所列又設外夷通事𨽻焉建文中升少卿以下品秩少卿升正五品寺丞升正六品又改其首領官職名與鳴贊序班皆升品級罷司儀司賔二署而以行人𨽻鴻臚寺成祖初悉復舊制孫承澤春明夢餘録宣德元年四月建鴻臚寺公署於京師謹案鴻臚本出周官大行人主領蕃國封貢自明代始専掌殿庭禮儀之事遂與歷代建置不同名雖相襲實則漢以後謁者臺唐以後通事舍人閣門使之任也其職在導引儐贊故漢世謁者皆於三署郎內選大音者為之而贊拜殿中音動左右史家至以為美談逮宋世閣門多用勳戚子弟不立員額於是遂為恩幸進身之途宦寺交通營求干謁富商豪子往往得之宣和中宣贊舍人至一百八員閣門祇侯至七十六員每以過濫為臺官論奏明代亦有鴻臚寺官生支糧肄業世相承襲冗食者多而於贊唱轉不能精練我朝鳴贊序班設有定額皆選國語純熟聲音洪亮者俾充其選其有熟習傳贊者即經遷擢以後亦仍令兼攝以襄大禮與應劭所謂鴻聲臚傳之義實為相協朝儀整肅視前代益加明備矣欽定厯代職官表卷三十三
