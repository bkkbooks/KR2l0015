一人左右副長官二人曰石阡曰新西堡曰康佐副長官各一人思南府隨府屬辦事長官一人厯代建置謹案三代之時嶺嶠未開而禹貢梁州之域逺界黑水周師伐商庸蜀八國與環甲胄但設官之法其詳已不可聞漢時開蠻夷置官吏而王侯君長率因其故號授之則後世土官昉此矣晉宋梁陳北魏往往有蠻夷刺史唐時羈縻州有都督府有州有縣宋亦有羈縻州縣自都督以下官皆即以畨夷酋長為之元時蠻夷之地有宣慰司都元帥府有宣慰司軍民萬户府有宣慰司兼管軍萬户府有宣撫司有安撫司有招討司有軍民總管府有軍民府有散府有州有縣有長官司萬户府千户所百户所自宣慰司都元帥府宣慰使以下雖亦參用流官然以畨夷酋長為之者實多明因元制而捐益之於是有土官之稱我朝幅員無外聲教遐訖往昔蠻荒之地莫不𨽻版籍於司徒輸琛賮於外府國初因前代舊制設立土官蓋以諸夷土俗不同而土官世為之長習於其風土人情此先王修其教不變其俗齊其政不易其宜之意也其後諸夷向化日多增置益廣其或土官以貪暴禠秩以跳梁干誅亦或有願為王民納土辭職因而改設流官者亦復不少蓋我朝土官之設雖沿明制然明時綱紀不振諸土官或魚肉苗民或辨髦王法朝廷姑息成風多置之度外與唐宋羈縻之州無異今各土官畏威懷德奉法維謹自金川蕩平以來安屯置戍永為樂土又定諸土司輪年入覲之制而優其章服以示懷來此豈前代所可及哉三代胡渭禹貢錐指武王伐紂誓于牧野諸侯會師者稱之曰友邦冡君而庸蜀羌髳微盧彭濮八國則稱之曰人不以諸侯待之傳曰八國蠻夷戎狄屬文王者正義曰此皆西南夷也通典曰梁州當夏殷之間為蠻夷之國所謂巴賨彭濮之人由是觀之殷周之世禹貢梁州之山川無一入職方者大抵如唐宋之羈縻州元明以來之土司簡其政令寬其賦斂以馴擾之使為不侵不叛之人而已故終殷周之世梁州不復置也秦樊綽蠻書秦惠王并巴蜀以巴夷為蠻夷君尚女漢後漢書南蠻列傳長沙武陵蠻秦昭王使白起伐楚略取蠻夷始置黔中郡漢興改為武陵嵗令大人輸布一匹小口二丈是為賨布巴郡南郡蠻秦惠王并巴中以巴氏為蠻夷君長世尚秦女其民爵比不更劉攽曰巴氏之君可有爵耳民何故輒有之明衍民字有罪得以爵除其君長嵗出賦二千一十六錢三嵗一出義賦八百錢其民户出幏布八丈二尺雞羽三十鏃漢興南郡太守靳疆請一依秦故事板楯蠻夷高祖為漢王發夷人還伐三秦秦地既定乃遣還巴中復其渠帥羅朴督鄂度夕龔七姓不輸租賦餘户乃嵗入賨錢口四十漢書西南夷列傳建元六年使畨陽令唐蒙風曉南粵蒙上書説上通夜郎道為置吏上許之乃拜蒙以中郎將將千人食重萬餘人從巴莋關入見夜郎侯多同諭以威德約為置吏使其子為令夜郎旁小邑皆貪漢繒帛聽蒙約還報乃以為犍為郡發巴蜀卒治道自𤏡道指牂柯江蜀人司馬相如亦言西夷卭莋可置郡使相如以中郎將往諭皆如南夷為置一郡尉十餘縣屬蜀平南夷為牂柯郡冉驪皆震恐請臣置吏以卭都為越巂郡莋都為沈黎郡冉駹為文山郡廣漢西白馬為武都郡滇舉國降請置吏入朝於是以為益州郡後漢書百官志四夷國王率衆王歸義侯邑君邑長皆有丞比郡縣後漢書南蠻西南夷列傳哀牢夷建武二十七年王賢栗等詣越巂太守鄭鴻降請內屬光武以賢栗等為君長自是嵗來朝平都夷王莽時郡守枚根調卭人長貴為軍候建武十四年長貴遣使上三年計天子即授越巂太守印綬永初二年青衣道夷邑長令田與徼外三種夷舉土內屬安帝增令田爵號為奉邑君魏書氐列傳氐者西夷之别種號曰白馬漢武帝遣中郎將郭昌衛廣滅之以其地為武都郡謹案秦漢時開蠻夷皆因其君長以治之而漢為置太守都尉以統領之徴其賦稅平其爭亂此即後世土司之所自起也青衣道屬蜀郡而别有夷邑長此即後世流官土官參治之法也徴賨布出義錢此即後世土司納貢之法也漢高帝用板楯蠻平三夷後漢熹平時發板楯蠻擊平西南諸夷此即後世調土兵征討之法也長貴為越巂太守此即後世土府土州之制也三國三國蜀志馬良列傳先主東征遣良入武陵招納五溪蠻夷蠻夷渠帥皆受印號咸如意指三國蜀志諸葛亮列傳注漢晉春秋曰亮至南中所在戰捷孟獲者為夷漢所服募生致之既得縱使更戰七縱七擒而亮猶遣獲獲止不去曰公天威也南人不復反矣遂至滇池南中平皆即其渠帥而用之常璩華陽國志移南中徑卒青羌萬餘家於蜀為五部所當無前號為飛軍分其羸弱配大姓焦雍爨孟量毛李為部曲置五部都尉號五子故南人言四姓五子也以夷多剛狼不賓大姓富豪乃勸令出金帛聘策惡夷為家部曲得多者奕世襲官于是夷人貪貨物以漸服于漢成夷漢部曲亮收其俊傑建寧㸑習朱提孟琰及獲為官屬習官至領軍琰輔漢將軍獲御史中丞謹案蜀漢時諸葛亮平南中皆即其渠帥而用之又先主時五陵蠻夷受印號正今土司頒給敕印號紙所自始也晉四川通志晉用興古㸑深作本郡太守華陽國志武都氐王楊茂搜奉貢稱臣宋書氐胡列傳略陽清水氐楊毅稱藩于晉以毅為征南將軍三年毅族兄初襲殺毅並有其衆穆帝以初為使持節征南將軍雍州刺史平羌校尉仇池公初子國為鎮東將軍武都太守謹案晉武帝置南蠻校尉於襄陽西戎校尉於雍州南夷校尉於寧州江左改置南蠻校尉於江陵及安帝又置寧蠻校尉於襄陽皆所以統領羌蠻晉初氐叟有侯王見於李特載記雖永嘉後氐羌少與王會然略陽楊氐恆受封爵蜀自永康後為李氏割據而寧州尚為晉土蜀亦至永和復平西南夷君長必多有授王官者而史文不著至南蠻寧蠻二校尉所領為荆湘雍郢司諸州之蠻自晉以後南朝宋齊及梁北朝魏周諸蠻酋往往授刺史太守云宋齊梁陳南史夷貊列傳武興國本仇池楊難當自立為秦王宋文帝遣裴方明討之難當奔魏其兄子文德又聚衆葭蘆宋因授以爵位齊永明中魏南涼州刺史仇池公楊靈珍歸齊齊武帝以為北梁州刺史仇池公荆雍州蠻盤瓠之後也種落布在諸郡宋時因晉於荆州置南蠻雍州置寧蠻校尉以領之孝武初罷南蠻併大府而寧蠻如故蠻之附順者一户輸榖數斛其餘無雜調豫州蠻廪君後也明帝初即位四方反判及南賊敗于鵲尾西陽蠻田益之田義之田光興等起義攻郢州克之以益之為輔國將軍都統四山軍事又以蠻户立宋安光城二郡以義之為宋安太守光興為光城太守南齊書蠻列傳蠻種類繁多言語不一咸依山谷布荆湘雍郢司五州界宋世封西陽蠻梅蟲生為高山侯田治生為威山侯梅加羊為扞山侯太祖即位有司奏蠻封應在解例詔特留以治生為輔國將軍虎賁中郎轉建寧郡太守將軍侯如故永明六年除督護北遂安左郡太守田駟路為試守北遂安左郡太守前寧朔將軍田驢王為試守新平左郡太守皆郢州蠻也唐書南蠻列傳南平獠有寧氏世為南平渠師陳末以其帥猛力為寧趙太守册府元龜宋高祖永初三年封仇池公楊威為武都王文帝元嘉二年十一月以武都王世子楊元為秦州刺史襲封武都王七年以仇池氐冠軍將軍楊難當為北秦州刺史封武都王明帝泰始四年五月以仇池氐寧朔將軍武都王楊文度為北秦州刺史順帝升明元年十二月寧朔將軍北秦州刺史武都王楊文度進號征西將軍二年六月以輔國將軍楊文宏為北秦州刺史封武都王南齊太祖建元二年以氐楊後起為秦州刺史武帝永平元年又進秦州刺史楊後起號冠軍將軍四年楊後起卒詔以輔國將軍北秦州刺史武都王楊集始為持節輔國將軍北秦州刺史平羌校尉武都王明帝建武二年七月以氐楊馥之為北秦州刺史仇池公謹案南史載南蠻事於宋齊以後不詳以北史及魏書考之齊有直閣將軍田益宗梁有沔東太守田清喜永寧太守文雲生龍驤將軍樊石亷義州刺史文僧明鐵騎將軍邊城太守田官德定州刺史田超秀若西南夷則惟陳時猛力為寧趙太守見於唐書而他亦無聞焉蓋由紀載之略耳北魏魏書蠻列傳泰常八年蠻王梅安率渠帥數千朝京師求留質子以表忠欵始光中拜安侍子豹為安逺將軍江州刺史興光中蠻王文武龍請降詔拜南雍州刺史延興中大陽蠻酋桓誕遣使內屬高祖嘉之拜誕征南將軍東荆州刺史聽自選郡縣獠列傳宣武後朝廷以梁益二州控攝險逺乃立巴州以統諸獠後以巴酋嚴始欣為刺史又立隆城鎮所綰獠二十萬户彼謂北獠嵗輸租布又與外人交通貿易巴州生獠並皆不順其諸頭王每於時節謁見刺史而已册府元龜西魏恭帝二年蠻酋宜人王母田興彥欵附以為開府儀同三司北齊未置後周周書異域列傳大統五年蔡陽蠻王魯超明內屬以為南雍州刺史仍世襲焉十一年蠻酋梅勒特來貢其方物其後蠻帥杜清和自稱巴州刺史以州入附朝廷因其所稱而受之氐列傳楊法深與其種人楊崇集楊陳侳各擁其衆遞相攻討趙昶時督成武沙三州諸軍事成州刺史遣使和解之法深等從命乃分其部落更置他郡以處之馬端臨文獻通考黔州古蠻夷之國通謂之五溪後周武帝時蠻帥以其地歸附遂置奉州後改為黔州隋隋書史萬嵗列傳南寧夷㸑玩來降拜昆州刺史唐書南蠻列傳西㸑白蠻隋開皇中遣使朝貢命韋世沖以兵戍之置恭州協州昆州南平渠帥猛力死子長真襲刺史隋討林邑長真出兵攻其後又率部落數千從征遼東煬帝召為鴻臚卿授安撫大使遣還又以其族人寧宣為合浦太守册府元龜隋開皇五年黨項拓拔寧叢等各率所部詣旭川內附授大將軍其部下各有差唐新唐書西域列傳黨項漢西羌别種其地古析支也拓跋赤辭內附以其地為懿嵯麟可三十二州以松州為都督府擢赤辭西戎州都督貢職遂不絶又有白蘭羌吐蕃謂之丁零武德六年使者入朝明年以其地為維恭二州永徽時特浪生羌卜樓大首領凍就率衆來屬以其地為劒州白蘭舂桑及白狗羌天授中內附以其地為朝吳浮歸十州上元二年歸順乾封歸義順化和寧和義保善寧定羅定朝鳯凡十州部落納欵丐節印詔可唐書南蠻列傳兩爨蠻貞觀二十三年內屬以其地為傍望覽邱求五州貞元中置都督府領羈縻州十八咸亨三年昆明十四姓率户二萬內附析其地為殷州總州放州以安輯之其後又置盤麻等四十一州皆以首領為刺史西爨之南有東謝蠻貞觀二年其酋元深入朝以地為應州即拜元深刺史又有南謝首領謝疆亦來朝以其地為莊州授疆刺史東謝西有西趙蠻貞觀中首領趙酋摩率所部萬餘户來附以其地為明州授酋摩刺史松外蠻尚數十百部凡數十姓貞觀中松外蠻叛左武候將軍梁建方進討諭降者七十餘部户十萬九千署首領蒙和為縣令二十二年西洱河大首領楊同外東洱河大首領楊斂松外首領蒙羽皆入朝受官秩黎州領羈縻奉上等州二十六開元十七年又領羈縻夏梁卜貴等州三十一雅州西有通吐蕃道三曰夏陽曰夔松曰始陽皆諸蠻錯居凡部落四十六皆羈縻州也以首領襲刺史蠻書浪穹詔主豐時卒子羅鐸立羅鐸卒子鐸羅望立為浪穹州刺史蒙舍詔主邏盛炎開元初卒其子盛邏皮立朝廷授特進臺登郡王知沙壺州刺史長男閣羅鳯授持進兼揚瓜州刺史次男成節度蒙舍州刺史次男崇江東刺史次男成進雙祝州刺史初炎閣未有子養閣羅鳯為子閣羅鳯復歸蒙咩故名承炎閣後亦不改天寶四載閣羅鳯長男鳯伽異入朝宿衛授鴻臚少卿七載蒙歸義卒案唐書蒙歸義即皮羅閣乃唐所賜名也閣羅鳯立朝廷册襲雲南王矣伽異大卿兼揚瓜州刺史初爨歸王為南寧州都督理石城歸王兄子崇道隂害歸王雲南王歸義抗疏奏聞其子守偶遂代歸王為南寧州都督獨錦蠻烏蠻苗裔也在秦藏南去安寧兩日程天寶中為蹄州刺史弄棟蠻則白蠻苗裔也本姚州弄棟縣部落其地舊為褒州嘗有部落首領為刺史武經總要保州雪山郡本維州定亷縣南至吐蕃為夷落之極塞唐開元以來董氏世襲刺史霸州靜戎郡唐天寶中招慰生羌置郡亦許世襲烏蠻姚州戎瀘州界唐武德後開拓山洞置四十八州安輯夷獠迄今許世襲羈縻州西南漢牂柯郡地唐置費玪莊琰播郎牂夷等諸州今謂之黔內者六羈縻者十皆以黔州控扼之其領郡者或以土豪或補以牙職而一方恬然此本朝規制之得也樂史太平寰宇記黨項唐貞觀五年詔遣使開其河曲地為六十州內附者三十萬口有羌酋拓拔亦詞者世為渾主伏乞所昵與之結婚屢抗官軍后與其從孫子頭並率服與諸首領歸欵列其地為懿嵯麟可等三十二州以松州為都督府羈縻存撫之拜亦詞為西戎州都督又有白狗舂桑白蘭等諸羌自龍朔以後並為吐蕃所破而服屬焉在西北邊者天授三年內附凡二十萬口分其地置朝吳浮歸等一十一州仍散拘靈下界內自至德以後常為吐蕃所誘密以官誥授之以為之偵導故時或侵叛尋亦底定寧至寶應初其首領來助國共靈州軍食優詔奬美其在涇龍州者後上元元年率其衆十餘萬人詣鳯翔節度使崔光逺乞降寶應元年十二月歸順州部落乾封州部落歸義州部落順化州部落和寧州部落和義州部落保善州部落寧定州部落羅雲州部落朝鳯州部落並詣山南西道都防禦使梁州刺史臧希讓請州印希讓奏聞制旨允許之文獻通考松州廣德元年沒吐蕃其後松當悉靜柘恭保具霸乾翼維等為行州以部落首領世為刺史司馬謹案唐開羌蠻置羈縻州縣即授其酋長為刺史縣令即今土司之職也五季宋史外國列傳吐蕃唐末衰弱部族分散天成中權知西涼府留後孫超遣大將拓跋承誨來貢即授超涼州刺史充河西軍節度留後乾祐初超卒州人推其土人折逋嘉施權知留後遣使來貢即以嘉施代超為留後蠻夷列傳唐天成二年牂牁清州刺史宋朝化等一百五十人來朝宋宋史外國列傳黨項五代嘗入貢建隆三年代州刺史析也埋來朝雍熙二年七月賜宥州界咩兀十族首領都指揮使遇乜布等九人敕書以安撫之淳化五年兀泥族首領黃羅內附以為懷化將軍昭州刺史至道元年四月勒浪大首領馬尾等內附以為歸德大將軍領息州刺史首領沒崖為安化郎將副首領兀遇為保順郎將咸平二年五月以咩通族開道使泥埋領費州刺史以勒浪族大首領馬泥領本州團練使五年咩逋族泥埋遣子城逋入貢上嘉泥埋數與繼遷戰鬭有勞授錦州團練使以其族弟屈子為懷化將軍充本族指揮使城逋為歸德將軍充本族都巡檢使餘首領署軍主以下名職者凡十數人六年三月環州酋長蘇尚娘擊賊有勞以為臨州刺史七年涇原鈐轄曹瑋請署熟羌百帳以上大首領為大族軍主次指揮使又次副指揮使百帳而下為本族指揮使從之吐蕃咸平元年河西軍左廂副使歸德將軍折逋遊龍鉢來朝獻馬二千匹詔以龍鉢為安逺大將軍二年以儀州延蒙八部都首領渴哥領化州刺史四年知鎮戎事李繼和言西涼州六合都首領潘羅支願戮力討繼遷請授以刺史為鹽州防禦使兼靈州四面都巡檢使又以龍鉢領宥州刺史六族首領禇下箕等三人為懷化郎將唃厮囉大中祥符九年數使人至秦州求內屬明道初即授厮囉寧逺大將軍受州團練使宋史蠻夷列傳西南諸蠻夷重山復嶺雜厠荆楚巴黔巫中隋置辰州唐置錦州奬州溪州巫州敘州皆其地也唐季之亂蠻酋分據其地自署為刺史馬希範據有湖南蠻猺保聚依山阻江殆十餘萬太祖既下荆湖建隆四年知溪州彭元林前溪州刺史田洪贇等列狀歸順詔以元林為溪州刺史洪贇為萬州刺史乾德三年七月珍州刺史田景千內附十二月詔溪州宜充五溪團練使刻印以賜之北江蠻酋最大者曰彭氏有二十州皆置刺史而以下溪州刺史兼都誓主十九州皆𨽻焉謂之誓下州州將承襲都誓主率羣酋合議子孫若弟姪親黨之當立者具州名移辰州為保證申鈐轄司以聞乃賜敕告印符熙寧中南江之舒氏北江之彭氏梅山之蘇氏誠州之楊氏相繼納土創立城寨使之比內地為王民南江諸蠻自辰州逹于長沙邵陽各有溪洞曰敘曰峽曰中勝曰元則舒氏居之曰樊曰錦曰懿曰晃則田氏居之曰富曰鶴曰保順曰天賜曰古則向氏居之皆受朝命梅山洞蠻舊不與中國通其地東接潭南接邵其西則辰其北則鼎澧熙寧五年詔招納之大田諸蠻納欵于是遂檄輸開梅山蠻猺爭闢道路以待得其地置新化縣并二州𨽻邵州誠徽州唐溪洞州宋初楊氏居之號十洞首領以其族姓散掌州洞太平興國四年首領楊蘊始來內附八年楊通寶始入貢命為誠州刺史南丹州蠻亦溪洞之種開寶七年奉表求內附九年復來貢求賜牌印詔刻以給之紹興二十四年廣西經略安撫使吕願中諭降諸蠻三十一種得地二十七縣一百三十五寨四十洞一百七十九及一鎮二十二團皆為羈縻州縣撫水州在宜州南有縣四曰撫水曰京水曰多建曰古勞唐𨽻黔南其酋長皆蒙姓大中祥符九年曹克明為宜融等州都巡檢安撫使擊破之詔以撫水州為安化州撫水縣為歸仁縣京水縣為長寧縣自是間歲朝貢不復為邊患環州蠻區氏州𨽻宜州羈縻領思恩都亳二縣鎮寧州亦𨽻宜氏西南諸夷漢牂柯郡地宋初以來有龍蕃方蕃張蕃石蕃羅蕃者號五姓蕃皆常奉職貢受爵命南廣蠻在敘州慶符縣以西為州十有四大觀三年有夷酋羅永順楊光榮李世恭等各以其地內屬詔建滋純祥三州後皆廢威州保霸蠻者唐保霸二州也政和中開拓置官吏以保州地為祺州霸州地為亨州後皆為寨茂州諸部落蠻自推一人為州將治其衆而常詣茂州受約束政和五年以其地內屬詔建夀寧建寧軍未幾皆廢渝州蠻者唐南平獠也大觀二年內屬詔建榛潘二州後皆廢清水蠻者羈縻五十州岡蠻也雜種夷獠散居溪谷中慶厯初烏蠻王子得蓋居其地願得州名以長夷落詔建姚州以得蓋為刺史鑄印賜之武經總要烏蠻本朝慶厯中烏蠻王得蓋自言十年彈壓人不入漢界為過因乞州名符印即詔名姚州即雲南國之地也咸平中轉運使丁謂招撫蠻人每有城諭並令歃血為盟置鐵柱以志其事條制甚多蠻酋三十人悉補寨將西高州舊名珍州蠻酋田氏世襲乾德中改今名富州蠻酋向氏世襲刺史天禧初向通漢來朝官至五溪十洞都防禦使王稱東都事略咸平四年西涼府六谷都首領潘羅支願戮力討繼遷張齊賢請封羅支為六谷王兼招討使真宗曰羅支已為酋帥欲授以刺史則太輕况未領節制加以王爵非順也又招討使號不可假外夷乃以為鹽州防禁使兼靈州西面都巡檢唃厮羅三子皆被恩命曰瞎氊曰磨氊曰董氊為唃厮囉嗣瞎氊子瞎欺丁木征為瞎藥雞羅所誘據近塞青唐族立文法朝廷以為河州刺史熙寧中王韶經營熙河木征降賜姓名曰趙思忠授榮州團練使遷合州防禁使董氊遣使來以為河州刺史明年拜河西軍節度使封武威郡王以其養子阿里骨為肅州團練使董氊卒阿里骨為河西軍節度使西畨邈川首領阿里骨卒子瞎征承襲國人迎董氊姪溪巴溫欲復其國姓巴溪溫之子隴拶稱王子朝廷以重兵臨之隴拶出降徽宗即位以隴拶為河西軍節度使知府州折氏世襲鄯州瞎征授懷逺軍節度使賜隴拶姓名曰趙懷德建中靖國元年以懷德知湟州自鄯湟棄羌人迎隴拶之弟溪賒羅撒復國授西平軍節度使西畨邈川首領沈括夢溪筆談唃厮囉死子董氊立朝廷復授以爵命王圻續文獻通考初西畨既衰其苗裔曰董氊其子曰巴氊角始附宋賜姓趙改名忠順子永吉永吉子昌皆受宋官為左武大夫遙領來州防禦使襲把羊族長文獻通考楊正巖以十洞稱誠徽二州宋熙寧九年十洞酋長楊通蕰送欵內附楊通寶來貢朝廷以通寶為誠州刺史其子復為誠州刺史思州宋初為羈縻州大觀元年蕃部長田祐恭願為王民始建州徽宗時大駱解上下族帥駱世華駱文貴獻其地立珍州播州宋大觀二年南平夷人楊有貴等獻其地建為州夷州宋為羈縻州大觀三年酋長獻其地建為承州范成大桂海虞衡志儂智高反朝廷討平之因其疆域參唐制分析其種落大者為州小者為縣又小者為洞凡五十餘所推其長雄者首領有知州權州監州知縣知洞皆命于安撫若監司給文帖朱記其次有同發遣權發遣之屬謂之官典各命於其州每州團又推一人為長謂之主户餘民皆稱提陀猶言百姓也謹案宋史所載蠻夷有黎洞有黎州諸蠻黎洞為今廣東瓊州之地現無土司而黎州諸蠻十二種在宋時或本未受朝命或但因其至中國朝貢而爵之未嘗設有定職亦與今土司不同今並不載云遼未置金未置元元史百官志宣慰司掌軍民之務分道以總郡縣行省有政令則布于下郡縣有請則逹於省有邊郵軍旅之事則兼都元帥府其次則止為元帥府其在逺服則又有招討安撫宣撫等使司秩如下州逹嚕噶齊長官副長官參用其土人為之元史世祖本紀至元十四年閏月羅氏鬼國王阿榨西南蕃王韋昌盛並內附詔阿榨昌盛各為其地安撫使佩虎符二十七年九月金竹府知府掃閭貢馬及雨氊具言金竹府雖內附蠻民多未服近與趙堅招降三十餘寨乞立縣設長官總把參用土人從之二十九年以行播州軍民宣撫使楊漢英為紹慶珍州南平等處沿邊宣慰使行播州軍民宣撫使播州等處管軍萬户府仍佩虎符成宗本紀元貞二年十一月以蠻洞將領彭安國父子討田知州有功賜安國金符子為蠻夷官大德元年六月平伐九寨來降立長官司武宗本紀至大三年四川行省紹慶路所𨽻蠻田墨施什用來降立黃沙寨以田墨施什用為千户雲南威楚路之蒲蠻猛吾來朝貢願入銀為歲賦詔為置散府一及土司三十三所皆賜金銀符順帝本紀元紀二年四川大盤洞蠻謀谷什用遣其男謀者什用來貢方物即其地立盤順府命謀谷什用為知府謹案明時土官曰宣慰司曰宣撫司曰安撫司曰招討司曰長官司皆沿元時之制也然元時宣慰使內地邊地皆設之其設于邊陲者則曰宣慰司都元帥府或曰宣慰司兼管軍萬户府與宣撫安撫招討使長官皆參用流官土官而百官志無明文今兼採元史本紀中設立土官之事可與志相證者以見一代之制焉明明史職官志土官宣慰司宣慰使一人從三品同知一人正四品副使一人從四品僉事一人正五品經厯司經厯一人從七品都事一人正八品宣撫司宣撫使一人從四品同知一人正五品副使一人從五品僉事一人正六品經厯司經厯一人從八品知事一人正九品安撫司安撫使一人從五品同知一人正六品副使一人從六品僉事一人正七品其屬吏目一人從九品招討司招討使一人從五品副招討一人正六品其屬吏目一人從九品長官司長官一人正六品副長官一人從七品其屬吏目一人未入流蠻夷長官司長官副長官各一人品同上又有蠻夷官苗民官及千夫長等官軍民府土州土縣設官如府州縣洪武七年西南諸蠻夷朝貢多因元官授之稍與約束定征徭之法漸為宣慰司者十一為招討司者一為宣撫司者十為安撫司者十九為長官司者百七十有三其府州縣正二屬官或土或流大率宣慰等管經厯皆流官府州縣佐二多流官皆因其俗使其附輯諸夷謹守疆土修職貢供征調無相攜二有相讐者流上聽命于天子又有畨夷都指揮使司三衛指揮使司三百八十五宣慰司三招討司六萬户府四千户所四十一站七地面七寨一並以附地寨畨夷官其地焉明會典四川等處承宣布政使司軍民府四宣撫司一宣慰司一安撫司三長官司十六廣西等處承宣布政使司土官知府二土官知州三十六土官知縣六軍民府一長官司四雲南等處承宣布政使司土府知府七土州知州九土縣知縣一軍民府土官知府二宣慰司七宣撫司三長官司二十七貴州等處承宣布政使司宣慰司一安撫司二長官司七十五謹案明代土官設有定職與兩漢蠻夷君長唐宋羈縻州縣微有不同而亦參用流官今以會典所載參考明史及各省通志四川軍民府四皆土官世襲也廣西土府二土州三十六雲南土官知府七土官知州九土縣一軍民府土知府二惟貴州府州縣皆流官而同知通判州判縣丞之類多以土官為之也明史西域列傳西畨即西羌元封駙馬章庫滿洲語長把刀也原作章古今改正為寧濮郡王鎮西寧於河州設吐畨宣慰司以洮岷黎雅諸州𨽻之統治蕃衆洪武二年太祖定陜西即遣官齎詔招諭明年五月吐蕃宣慰使司索諾木諾爾布唐古特語索諾木福也諾爾布財也原作鎖南普今改正等以元所授金銀牌印宣敕來上會鄧愈克河州遂詣軍前降其鎮西武靖王布逹拉蒙古語普陀山也原作卜納剌今改正亦以吐蕃諸部來納欵冬索諾木諾爾布等入朝四年正月設河州衛命為指揮同知豫世襲知院多爾濟唐古特語金剛也原作朵兒只今改正汪家努原作汪家奴今據字面改正並為指揮僉事設千户所八百户所七皆命其酋長為之布逹拉亦至京師為靖南衛指揮同知其儕桑節唐古特語佛也原作桑加今改正多爾濟為高昌衛謹案地理志及會典並無高昌衛疑係永昌衛之誤指揮同知皆帶刀侍衛自是畨酋日至尋以降人馬梅汪威喇蒙古語威喇近也原作瓦兒今改正並為河州衛指揮僉事又遣西寧州同知李南格原作喃哥今據字面改正等招撫其酋長至者亦悉授官乃改西寧州為衛以南格為指揮謹案明史以諸蠻夷屬于布政司都指揮者為土司傳而西畨諸衛及四川徼外自長河西魚通寧逺以西訖於朵甘西藏則列為西域傳蓋以其雖受朝命僅豫羈縻不可悉以內地郡縣之法治之也然西畨諸衛如河州衛則屬於陜西都司永昌衛西寧衛則屬于陜西行都司是亦與內地各衛無異而西畨之烏思藏朵甘董卜韓胡之屬則别自為司非各省都司行都司所領是其地固有逺近之殊而其治之亦有詳略之異矣今則甘肅土官指揮使以下暨青海西藏之千户百户百長統於甘省董卜韓胡明正各土司統于川省內外綱維遐爾一體蓋德威所播無逺弗屆往古羈縻之地受爵納賦無異甸服洵萬世隆平之極軌矣欽定厯代職官表卷七十二
