body:
  text: 領侍衛內大臣表領侍衛內大臣國朝官制三旗領侍衛內大臣六人正一品鑲黃正黃正白三旗每旗各二人內大臣六人正一品散秩大臣無定員一品班次從二品銜三品俸領侍衛內大臣掌統領侍衛親軍與內大臣散秩大臣俱先後宸御左右翊衛出入扈從國初以八旗將士平定海內鑲黃正黃正白三旗皆天子所自將爰掄其子弟命曰侍衛用備隨侍宿直統以勳戚大臣而宗室之秀外藩之侍子亦咸得以選預環列焉凡輪直殿庭以領侍衛內大臣等總統之若祭祀朝㑹燕饗時巡大閲則率其屬以執事領侍衛內大臣皆由特簡內大臣亦如之散秩大臣由特恩簡授無定額其勳舊後裔世襲者以次承襲御前侍衛乾清門侍衛俱無定員於三旗侍衛內擢用一等侍衛三旗六十人宗室九人正三品二等侍衛三旗一百五十人宗室十八人正四品三等侍衛三旗二百七十人宗室六十三人正五品藍翎侍衛三旗九十人正六品漢人侍衛無定員分一二三等及藍翎侍衛品秩俱同掌宿衛扈從更畨輪直凡六班班分兩翼宿衛乾清門內右門神武門寧夀門為內班宿衛太和門為外班行幸駐蹕宿衛如宫禁之制扈從前導領侍衛內大臣侍衛班領𢃄領執豹尾鎗侍衛佩長把刀侍衛扈從隨行侍衛班領委署侍衛班領侍衛按隊扈從隨行其散秩大臣侍衛什長帶領執纛親軍扈從隨行大閲則按隊環衛各共其事其分司執守者有粘杆處侍衛三十四人上駟院侍衛二十四人飬鷹狗處侍衛九人善撲處武備院及諳達侍衛無定員皆統於三旗員額順治初以漢䕃生簡選侍衛尋罷康熙二十九年以武進士之嫻騎射者擢置侍衛附于三旗三十七年設宗室侍衛雍正三年于藍翎侍衛中選其材技為四等侍衛後仍為藍翎侍衛五年定制武進士一甲一名授一等侍衛二名三名授二等侍衛在二甲者得選三等侍衛三甲者選藍翎侍衛七年以宗室侍衛併入三旗舊設三旗印務班領十二人班領十二人乾隆三十六年改印務班領為一等侍衛班領為二等侍衛凡侍衛十人則設之長三旗侍衛什長六十人宗室侍衛什長九人親軍校鑲黃旗二十五人正黃旗二十六人正白旗二十五人正六品掌率其屬隨侍衛以執事所轄藍翎長三旗各八人親軍鑲黃旗二百七十七人正黃旗二百九十五人正白旗二百八十七人舊設親軍校四十五人後增置乾隆四十年增委署親軍校七十七人鑲黃旗二十五人正黃旗正白旗各二十六人主事一人署主事二人於筆帖式內題署筆帖式三旗各四人貼寫筆帖式三旗各九人掌章奏案牘翻繹文移歷代建置三代周禮天官宫正上士二人中士二人下士八人府二人史四人胥四人徒四十人掌王宫之戒令糾禁以時比宫中之官府次舍之衆寡賈公彥疏以時校比官府在宫中者及宿衛者宫伯中士二人下士二人府一人胥二人徒十人掌王宫之士庶子凡在版者授八次八舍之職事鄭康成注伯長也衛王宫者必居四角四中于徼候便也鄭司農云庶子衛王宫在內為次在外為舍鄭康成周禮藁人注卿大夫士之子弟宿衛王宫王應麟玉海魯公之子伯禽衛康叔之子牟齊太公之子伋俱事成王伯禽牟伋蓋宿衛國子也毛應龍周官集傳陳傅良曰環衛有二其一是公卿大夫之子弟分置八隅宫伯領之一是凡宫中官府之徒役錯置於士庶子八次八舍之間宫正領之皆屬冡宰宫伯所掌在漢時為郎衛屬郎中領宫正所掌在漢為兵衛屬衛尉葉時禮經㑹元宫正宫伯所掌皆郎衛也官府次舍在宫中有故而令宿者宫正掌之卿大夫之嫡子庶子入衛王宫者宫伯掌之眂朝則司士正其儀大事則諸子掌其政此入直環列之衛也虎士八百人先後王而趨以卒伍居則守王宫舍則守王間眂朝則在路門之右虎賁氏掌之而旅賁氏屬焉此奔趨擁護之衛也謹案周制以宫正為王宫宿衛官之長而宫伯掌宿衛士庶子以環侍周廬大抵非王族即功臣之後俾親勳世胄執戈㦸以宿直王宫無腹心之虞而有承弼之益於法制最稱詳審秦漢以後此制既廢環衛官多失其職我朝以上三旗子弟充選侍衛而領以勳戚重臣規則昭垂蓋鑒周典而益加精密矣今以侍衛官制凖之周禮宫正當如今之領侍衛內大臣宫伯當如今之內大臣而宫伯所領衛士在王宫之四角四中分置八隅則又兼近今護軍統領之職蓋當時宿衛者皆統於一官無所區别也尚書小序武王戎車三百輛虎賁三百人戰于牧野孔安國傳勇士稱也若虎賁言其猛也孟子武王之伐殷也革車三百輛虎賁三千人趙岐注虎賁武士黃震日鈔三千人書序作三百傳聞異辭周書立政王左右常伯常任凖人綴衣虎賁孔安國傳虎賁以勇力事王皆左右近臣宜得其人周禮夏官虎賁氏下大夫二人中士十有二人府二人史二人胥八十人虎士八百人掌先後王而趨以卒伍軍旅㑹同亦如之舍則守王間王在國則守王宫賈公彥疏在外守王間則為周衛在國亦為周衛也旅賁氏中士二人下士十有六人史二人徒二人掌執戈盾夾王車而趨左八人右八人車止則持輪凡祭祀㑹同賓客則服而趨鄭康成注夾王車者其下士也下士十有六人中士為之帥焉王與之周禮訂義胡安國曰康王初立太保俾齊侯吕伋以虎賁百逆于南門外伋太公望子以勳德世臣總司禁旅虎賁勇士宿衛王宫其為國家計深逺矣國語魯語天子有虎賁習武訓也韋昭注訓教也虎賁掌先後王而趨舍則守王間在國則守宫門所以習武教也謹案周之虎賁旅賁有下大夫中士下士之别與今侍衛分頭二三等及藍翎者最為吻合又夏官司士云虎士在路門之右司戈盾云授旅賁及虎士戈盾亦與今侍衛職掌相同至齊侯吕伋以王室懿親爵列公侯入典禁旅則正今領侍衛內大臣之職所由昉也韓非子說疑凡術也者主之所執也法也者官之所師也然使郎中日聞道於郎門之外以至於境內日見法又非其難者也外儲說郎中皆曰兵秋起攻韓犀首為將於是日也郎中盡知之於是日也境內盡知之謹案秦王與犀首計攻韓樗里疾道穴聽之則其地亦甚密矣而郎中皆知之則秦之郎中侍左右可知漢三署郎職掌蓋倣乎此又考韓非子內儲說齊中大夫有夷射者御飲於王醉甚而出倚於郎門門者刖跪進曰足下無意賜之餘瀝乎夷射曰叱去刑餘之人何事乃敢乞飲長者刖跪走退及夷射去刖跪因捐水郎門霤下類溺者之狀外儲說晉文公曰吾民之有喪資者寡人親使郎中視事有罪者赦之貧窮不足者與之戰國策趙策趙王有此尺帛何不令前郎中以為冠王郎中不知為冠補注曰郎中官不獨秦淮南子人間訓楚令尹子國伏郎尹而笞之三百注郎尹主郎官之尹也據此則春秋戰國時齊楚晉趙諸國皆有郎署官眀矣其以郎中為近侍之臣則又秦制之所自昉也秦顔師古急就篇注郎中令掌宫殿門户及從官秦所置謹案郎中令之官始于秦時而秦始皇本紀又有近官三郎之稱司馬貞索隱云三郎謂中郎外郎議郎是秦亦有三署郎與漢制相仿特史文不備耳漢漢書文帝本紀皇帝即日夕入未央宫夜拜宋昌為衛將軍領南北軍張武為郎中令行殿中漢書張安世列傳更為衛將軍兩宫衛尉城門北軍兵屬焉史記周勃世家拜勃為虎賁令班固西都賦虎賁綴衣閹尹閽寺陛㦸百重各有典司李善注尚書周公曰綴衣虎賁漢書曰太后盛服坐武帳武士陛㦸陳列殿下也漢書百官公卿表郎中令秦官臣瓚注主郎內諸官故曰郎中令掌宫殿掖門户有丞武帝太初元年更名光祿勳胡廣曰勳之言閽也閽者古主門官也光祿主宫門屬官有大夫郎又期門羽林皆屬焉大夫掌議論有太中大夫中大夫皆無員多至數十人太初元年更名中大夫為光祿大夫秩比二千石太中大夫秩比千石如故郎掌守門户出充車騎有中郎侍郎郎中皆無員多至數千人中郎秩比六百石郎中比三百石中郎有五官左右三將秩皆比二千石郎中有車户騎三將秩皆比千石期門掌執兵送從武帝建元三年初置比郎無員多至千人有僕射秩比千石平帝元始元年更名虎賁郎置中郎將秩比二千石羽林掌送從次期門武帝太初元年初置名曰建章營騎後更名羽林騎又取從軍死事之子孫養羽林官教以五兵號曰羽林孤兒羽林有令丞宣帝令中郎將騎都尉監羽林秩比二千石漢紀惠帝紀郎中令掌宫殿門户宿衛屬官武帝更名光祿勳程大昌雍録張安世持槖簮筆事孝武皇帝十數年此即今世侍從之事也蓋安世嘗為光祿勳揚雄光祿勳針經兆宫室畫為中外廊殿門闥限以禁衛國有固衛人有藩籬各有攸保守以不岐昔在夏殷桀紂淫湎持午之飲門户荒彌郎雖執㦸謁者參差殿中成市或室內鼓鼙忘其廊廟而聚失逋逃四方多罪載號載呶內不可不省外不可不清德人立朝義士充庭祿臣司光敢告執經惠士竒禮說周之內宰猶漢之內卿內卿光祿也漢初為郎中令後轉為光祿勳其府在宫中故曰內卿胡廣曰勳之言閽也閽者古主門官光祿主宫門故曰勳然則古勳閽通矣易艮卦九三厲熏心虞翻云古閽字作熏艮為閽坎盜動門故厲閽心書曰斀黥詩云昏椓椓與斀通去隂之刑也故箋云昏官名椓奄人韓詩曰若無此罪勳胥以痡勳猶昏也言夭昏札瘥相瀸汗而病漢書贊云嗚呼史遷熏胥以刑蓋謂腐刑即詩所謂昏椓也爾雅昏為強力勳為功勞故勳昏通周之閽人屬內宰司昏守夜給使省闥亦不全用宦者而漢光祿勳掌期門羽林即內宰之人民也期門掌執兵送從羽林次之又取死事之孤飬之羽林名曰孤兒如周之死政之孤司門以其財飬之者飬孤而兼及其老則周之忠厚踰於漢矣雍録漢世之謂侍從者以其職掌近君也行幸則隨從在宫則陪侍故總撮凡最而以侍從名之也武帝之詔嚴助曰君厭直承眀之廬勞侍從之事助時為中大夫是之謂中朝臣中朝臣者唐以來名內諸司也謂其職任得在內朝故皆冠以中字也謹案中大夫屬于光祿勳者也以其近侍左右故謂之中朝臣考管子山權數賜若服中大夫注若汝也中大夫齊爵也韓非子外儲說王登為中牟令上言於襄王曰中牟有士曰中章胥已者其身甚修其學甚博君何不舉之主曰子見之我將為中大夫相室諫曰中大夫晉重列也今無功而受非晉臣之意漢世中大夫之名蓋昉於此宋書百官志中散大夫平帝時置漢書如淳注郎中令主郎中左右車將主左右車郎左右户將主左右户郎漢書蓋寬饒列傳遷諫大夫行郎中户將事顔師古注郎中令屬官有郎中户將主户衛也漢書楊惲列傳補常侍騎顔師古注為騎郎而常侍故謂之常侍騎也遷中郎將郎官故事令郎出錢市財用給文書乃得出名曰山郎移病盡一日輒償一沐或至嵗餘不得沐其豪富即日出游戲或行錢得善部貨賂流行轉相倣效惲為中郎將罷山郎移長度大司農以給財用其疾病休謁洗沐皆以法令從事郎官莫不自厲絶請謁貨賂之端宫殿之內翕然同聲由是擢為諸吏光祿勳親近用事漢書王嘉列傳以眀經為郎坐户殿門失闌免光祿勳于永除為掾漢書蕭由列傳為衛將軍掾漢書東方朔列傳武帝微行常用飲酎已八九月中與侍中常侍武騎及待詔隴西北地良家子能騎射者期諸殿門故有期門之號錢文子補漢兵志期門至千人或曰三百人羽林七百人或曰羽林郎百一十八人左右騎各八九百人皆以三輔六郡良家子補期門羽林漢書地理志武帝選天水隴西安定北地上郡西河凡六郡補羽林以材力為官名將多出焉陳元粹補漢兵志注漢舊儀羽林從官百人取三輔良家子自給鞍馬按漢用六郡良家補羽林期門蓋三輔園陵賴為藩蔽趙充國傳以六郡良家子善騎射補羽林甘延夀傳少以良家子善騎射為羽林漢書霍光列傳羽林監任勝謹案漢京師有南北軍之屯南軍衛尉主之掌宫殿門衛屯兵當如今之護軍統領北軍中尉主之掌巡徼京城當如今之提督九門步軍巡捕五營統領而光祿勳統三署諸郎専司殿內門舍則正如今之領侍衛內大臣故易祓謂光祿勳乃親近天子之官别為一府非即南軍而漢書儒林傳稱光祿勳王龔以外屬內卿如淳注謂光祿勳治宫中故稱為內卿者是也其所謂三署諸郎乃五官中郎將左中郎將右中郎將所屬而别有郎中車户騎三將亦率車郎户郎騎郎以𨽻于光祿勳皆即今之侍衛漢書趙廣漢傳富人蘇回為郎二人劫之廣漢曉賊曰此宿衛之臣也是其眀證而又有光祿大夫太中大夫中散大夫等皆無員額惟入直禁廷以聽任使則頗近今之散秩大臣當時選郎皆以眀經孝亷賢良方正及衣冠子弟充之故劉向揚雄皆嘗執㦸宿衛說者謂其猶有三代遺制惟武帝以後增置羽林期門始以六郡良家材力勇健者充其選觀霍光傳載太后坐武帳中期門武士陛㦸陳列殿下則其職亦最為親近故一時名將多出其中蓋頗近今之御前侍衛乾清門侍衛矣後漢書百官志光祿勳卿一人中二千石掌宿衛宫殿門户丞一人比千石五官中郎將一人比二千石主五官郎五官中郎比六百石五官侍郎比四百石五官郎中比三百石皆無員凡郎官皆主更直執㦸宿衛諸殿門出充車騎左中郎將比二千石主左署郎中郎侍郎郎中皆無員右中郎將比二千石主右署郎中郎侍郎郎中皆無員虎賁中郎將比二千石主虎賁宿衛左右僕射左右陛長各一人比六百石僕射主虎賁郎習射陛長主直虎賁朝㑹在殿中虎賁中郎比六百石虎賁侍郎比四百石虎賁郎中比三百石節從虎賁比二百石皆無員掌宿衛侍從羽林中郎將比二千石主羽林郎羽林郎比三百石無員掌宿衛侍從常選漢陽隴西安定北地上郡西河凡六郡良家補本武帝以便馬從獵還宿殿陛巖下室中故號巖郎羽林左監一人六百石主羽林左騎丞一人羽林右監一人六百石主羽林右騎丞一人光祿大夫比二千石太中大夫千石中散大夫六百石無員凡大夫皆掌顧問應對無常事唯詔命所使凡諸國嗣之喪則光祿大夫掌吊後漢紀光武紀李通為光祿勳洪適𨽻續司徒掾梁休碑仕郡厯五官下闕遂察孝亷除郎中光祿主闕辟司徒府光祿雖有主簿而戴就傳云舉孝亷光祿主事注引風俗通云光祿奉肸上就為主事此碑光祿主之下未可斷以為簿也王楙野客業書陳蕃為光祿勳范滂為主事以公儀詣蕃執版入閣至坐蕃下奪滂版滂投版振衣而起郭泰責蕃曰以級階言之滂宜有敬以類數推之至閣宜省敬止在門漢世三公之禮與百僚絶席如此之異至入坐之禮則殺矣此有以見其大略沈約宋書亦嘗引以為言謹案光祿勳主事主簿之名可以補後漢志之闕錢文子補漢兵志中興以五官左右虎賁郎將併將中郎侍郎郎中而廢車户騎三將杜佑通典虎賁中郎將主虎賁宿衛冠插兩鶡尾紗縠單衣虎文錦袴有虎賁中郎虎賁侍衛虎賁郎中節從虎賁皆父死子繼若死王事亦如之後漢書隂興列傳興為黃門侍郎守期門僕射將武騎從征伐平定郡國興每從出入常操持小蓋障翳風雨躬履塗泥率先期門張衡東京賦郎將司階虎㦸交鎩李善注言虎賁中郎將主夾階而立虎賁或執㦸或持鎩而相對也交鎩謂交加而設兵器也謹案後漢光祿勳所屬惟省車户騎三將其三署郎及虎賁羽林之制一如西京後漢書禮儀志載國有大事虎賁羽林郎中署皆嚴宿衛五官左右虎賁羽林五將各將所部執虎賁㦸屯殿端門陛左右廂又章懷太子注引蔡質漢儀天子幸德陽殿臨軒虎賁羽林弧弓撮矢陛左右戎頭逼脛陪前向後左右中郎將住東西羽林虎賁將住南北五官將住中央据此則五官左右虎賁羽林五將皆有今侍衛之職而馬第伯封禪儀記云車駕宿奉髙遣虎賁郎將先上山案行國家升山在臺上北面虎賁陛㦸臺下則又如今之前導後扈也又考後漢郎將多典兵漢紀靈帝紀中郎將盧植左中郎將皇甫嵩右中郎將朱㒞各持節征黃巾獻帝紀東中郎將董越屯澠池中郎將牛輔屯安邑其餘中郎校尉布在諸縣不可勝紀而當時又有使胸奴中郎將鮮卑中郎將則中郎將又多用以典邊兵蓋禁衛近臣奪武於外可備腹心之寄也三國三國蜀志先主列傳光祿勳黃權常璩華陽國志光祿大夫義陽來敏三國蜀志杜微列傳遷諫議大夫五官中郎將三國蜀志秦宓列傳尋拜左中郎將三國蜀志董允列傳允遷為侍中領虎賁中郎將統宿衛親兵謹案建安二十六年蜀黃龍甘露碑載五官中郎將一人碑隂載中郎將十三人考續漢百官志五官中郎將一人左中郎將右中郎將虎賁中郎將皆不著員數是碑建于建安二十六年而同時稱中郎將臣者十三人以無常員故也至稱五官中郎將者止一人與漢志所云卿一人者合故知蜀承漢制也華陽國志常朂州命辟從事入為光祿郎中主事何隨郡辟功曹州辟從事光祿郎中主事除安漢令蜀亡去官董允嘗與典軍義陽胡濟大將軍禕共期遊宴命駕將出郎中襄陽董恢造允修敬自以官卑年少求去三國蜀志向朗傳朗兄子寵為中部督典宿衛兵三國蜀志後主列傳殿中督張通謹案蜀漢宿衛之官其制皆沿漢舊惟中部督殿中督諸名漢制未見為蜀所創設蓋亦宿衛之長也三國魏志許禇列傳禇遷武衛中郎將武衛之號自此始也文帝踐祚遷武衛將軍都督中軍宿衛禁兵甚親近焉通典建安末改光祿勳為郎中令魏黃初元年復為光祿勳洪適𨽻釋魏公卿上尊號奏有郎中令臣洽彭城之內有漢司徒袁安魏中郎徐庶等數碑三國魏志張遼列傳黃初三年遼朝洛陽以遼所從破吳軍應募步卒皆為虎賁曹植謝賜奈表中虎賁傳詔賜臣等冬奈一奩宋書百官志冗從僕射魏世置謹案曹魏始置武衛將軍以統宿衛禁兵蓋即今領侍衛內大臣之職其冗從僕射當如今散秩大臣之職至光祿勳雖尚沿舊制而其職既分事權不屬僅存虛名宜至晉而宫門屯衛遂専屬之左右衛矣三國吳志三嗣主列傳永安元年武衛將軍恩為御史大夫三國吳志孫綝列傳使光祿勳孟宗告廟三國吳志三嗣主列傳太平元年五官中郎將刁元告亂于蜀三國吳志樓元列傳孫皓用元為宫下鎮禁中候主殿中事元從九卿持刀侍衛正身率衆奉法而行謹案武衛將軍魏所創置而吳亦有之蓋即襲用魏制至宫下鎮禁中候其官前未經見當亦創設于吳觀樓元持刀侍衛則職甚親近疑即漢之虎賁羽林郎將也晉胡三省資治通鑑注晉武帝受禪置中軍將軍統宿衛七軍尋罷已而復置晉書職官志中領軍將軍魏官也文帝始置武帝初省使中軍將軍羊祜統二衛前後左右驍衛等營即領軍之任也懷帝永嘉中改中軍曰中領軍江左以來領軍不復别領營總統二衛騎驍材官諸營資重者為領軍資輕者為中領軍屬官有長史司馬功曹主簿五官左右衛將軍文帝初置中衛及武帝受命分為左右衛以羊琇為左趙序為右並置長史司馬功曹主簿員江左罷長史通典魏末晉文王置中衛將軍武帝受禪分中衛為左右衛將軍並置佐史皆掌宿衛營兵銀章青綬武冠綘朝服佩水蒼玉宋書百官志殿中將軍殿中司馬督晉武帝時殿內宿衛號曰三部司馬置此二官分𨽻左右二衛江左初員十人朝㑹宴饗則將軍戎服直侍左右夜關城諸門則執白虎幡監之晉書職官志陳協為殿中典兵中郎將遷將軍晉書王遜列傳轉殿中將軍晉書職官志光祿勳統虎賁中郎將羽林郎將哀帝興平二年省孝武寧康元年復置冊府元龜光祿勳晉後不復居禁中又無三署郎唯外官朝㑹則名列焉爾後雖取漢代舊名其職則别矣謹案晉以領護左右衛驍騎游擊為六軍而領軍及左右衛専司宿衛禁兵實即今領侍衛內大臣之職其殿中將軍殿中典兵中郎將殿中司馬督則即今之侍衛也至光祿勳雖沿故號而不復居于禁中已非漢制之舊至北齊而遂為典膳之官今並别載入光祿寺篇不著于此表以符其實云宋齊梁陳宋書百官志領軍將軍一人掌內軍左衛將軍一人右衛將軍一人掌宿衛營兵左中郎將右中郎將虎賁中郎將冗從僕射羽林監先各置一人宋太宗太始以來多以軍功得此官今無復員殿中將軍殿中司馬督江左初員十人宋髙祖增為二十人其後過員者謂之殿中員外將軍司馬督其後並無復員武衛將軍無員宋世祖大眀中復置代殿中將軍之任宋書文帝本紀元嘉元年南蠻校尉到彥之為中領軍胡三省資治通鑑注江左以直閣將軍出入省閣總領宿衛又宿衛之官有細鎧主細鎧將細仗主等又隊有隊主副仗有仗主副南史王敬則列傳補刀㦸左右宋前廢帝使敬則跳刀撫髀拍張甚為儇捷補俠轂隊主領細鎧左右眀帝以為直閣將軍司馬光資治通鑑宋文帝元嘉二十八年殿上將軍黃延年胡三省注殿上將軍當是宋所置元嘉三十年齊帥張超之胡三省注齊帥主齊內仗衛武帝大眀二年虎賁主龎孟蚪胡三省注虎賁主主虎賁士南齊書百官志領軍將軍中領軍為中小輕同一官也置長史司馬五官功曹主簿左右二衛將軍置司馬次官功曹主簿以下左右二中郎將虎賁中郎將冗從僕射羽林監殿中將軍員外殿中將軍殿中司馬督武衛將軍自二衛以下謂之西省南史茹法亮列傳直後徐僧亮南齊書茹法珍列傳徐世檦自殿內主帥為直閣將軍隋書百官志梁武受命官班多同宋齊之舊領軍左右衛將軍左右中郎將虎賁冗從羽林三將軍殿中將軍武騎之職皆以分司丹禁侍衛左右天監六年置左右驍騎左右游擊將軍位視二率又置朱衣直閣將軍以經為方牧者為之其以左右驍游帶領者量給儀從陳承梁皆循其制官資治通鑑梁承聖元年以兄子頊為領直胡三省注梁宿衛之官有四廂領直蓋領直衛之士因以名官隋書韋載列傳永定元年遷騎驍將軍領朱衣直閣驍騎之職舊領營兵兼統宿衛自梁代以來其任逾重出則羽儀清道入則與二衛通直臨軒則升殿俠侍時人榮之號曰俠御將軍謹案江左諸朝皆以領軍中領軍及左右二衛統領宿衛禁兵而梁陳以後令驍騎游擊將軍兼朱衣直閣與二衛通直則亦今內大臣之任至南史載宋蕭嶷以侍中總宫內直衛王敬則以輔國將軍領臨淮太守知殿內宿衛兵事皆以他官兼領則事出一時非常制也又直閣將軍殿上將軍鎧主隊主仗主虎賁主殿內主帥齊帥四廂領直直後等官皆不見于史志蓋俱侍衛之職特因所掌而異其名耳北魏魏書官氏志驃騎將軍車騎將軍衛將軍第一品下左衛將軍從二品上武衛將軍右衛將軍從第二品下羽林中郎將第三品下羽林中郎羽林郎將從第四品上㦸楯虎賁將軍募員虎賁將軍從第四品下虎賁司馬虎賁郎將宿衛將軍從第五品上羽林郎從第五品下㦸楯虎賁司馬募員虎賁司馬髙車虎賁司馬㦸楯虎賁將募員虎賁將髙車虎賁將髙車羽林郎從第五品下二衛主簿宿衛統虎賁郎從第六品上㦸楯虎賁募員虎賁髙車虎賁從第六品下宿衛幢將從第七品上宿衛軍司馬宿衛軍吏第九品上虎賁軍書令史第九品下楊衒之洛陽伽藍記御道東有左衛府御道西有右衛府冊府元龜魏以驃騎車騎武衛為三將軍分掌禁旅當爪牙禦侮之寄魏書于烈列傳除領軍將軍咸陽王禧求羽林虎賁執仗烈曰領軍但知典掌宿衛理無私給洛陽伽藍記景仁㑹稽山隂人也正光年初從蕭保夤歸化拜羽林監資治通鑑宋元嘉三年魏內三郎豆代田胡三省注魏宿衛之官也三郎將領之又按魏道武帝天興初置幢主幢將主內三郎內三郎衛士也元嘉七年魏加豆代田散騎常侍右衛將軍領內都幢將胡三省注百人為幢幢有帥柔然之法也魏幢將主三郎衛士直宿禁中者自侍中已下中散已上皆統之元嘉十一年魏入內行長代人陳建胡三省注入內行長魏官也蓋選勇力之士入直禁中行長則其部帥也元嘉二十七年魏擒王羅漢使三郎將守之胡三省注三郎將蓋主內三郎元嘉二十九年魏羽林郎中代人劉尼殿中尚書源賀俱典兵宿衛胡三省注羽林郎自漢以來有之漢羽林郎秩比三百石郎中可以概推矣魏以劉尼為羽林郎中與殿中尚書俱典兵宿衛則其位任蓋重於漢朝也梁普通二年魏以奚難當為千牛備身胡三省注御左右有千牛刀謂之防身刀千牛備身執千牛刀以侍左右者也魏直後元思輔胡三省注直後官直閣之屬也魏書爾朱榮列傳以榮為領左右胡三省通鑑注領左右千牛備身也魏書爾朱世隆列傳肅宗末為直齊轉直寢後兼直閣加前將軍魏書崔孝直列傳為宣威將軍仍以本官入領直後謹案冊府元龜稱魏驃騎車騎武衛為三將軍分掌禁旅然考之于史魏世専司宿衛者仍屬領軍左衛右衛三官通鑑載魏廣平王懷至太極西廡呼侍中領軍黃門二衛胡三省謂此二衛即左右衛將軍而魏書載于烈于忠父子世為領軍將軍總率禁衛者是也其驃騎車騎雖嘗為領軍加官而實非宿衛之本職冊府元龜蓋考之未審矣至領左右一官史志失載而爾朱榮髙歡等皆嘗以宰輔兼之則其職較重當亦如今之領侍衛大臣也洛陽伽藍記唯有中大夫楊元慎給事中大夫王㫬是中原士族謹案北魏猶存中大夫之名其云給事中大夫則猶給事中禁也與漢光祿勳所屬者職掌尚同北齊隋書百官志後齊領軍府將軍一人掌禁衛宫掖朱華閣外凡守衛官皆主之中領軍亦同有長史司馬功曹五官主簿録事釐其府事又領左右衛領左右等府左右衛府將軍各一人掌左右廂所主朱華閣以外各武衛將軍二人二之直閣屬官有朱衣直閣直閣將軍直寢直齊直後之屬又有武騎雲騎將軍各一人驍騎游擊前後左右等四軍將軍左右中郎將各五人武賁中郎將羽林監各十五人冗從僕射三十人騎都尉六十人積弩積射強弩等將軍及武騎常侍各二十五人殿中將軍五十人員外將軍一百人殿中司馬督十五人員外司馬督一百人領左右府有領左右將軍領千牛備身又有左右備身正副都督左右備身五職左右備身員又有刀劍備身正副都督刀劍備身五職刀劍備身員又有備身正副督備身五職員北齊書髙歸彥列傳除領軍大將軍領軍加大自歸彥始也乾眀初拜司徒仍總知禁衛謹案北齊以領軍府總左右衛及領左右二府之事是領軍獨専宿衛之司其職甚重故當時如平秦王歸彥琅邪王儼等皆以懿親為之蓋領軍如今領侍衛大臣而左右衛將軍領左右將軍則其副也至領軍因平秦王歸彥始加大字而琅邪王儼傳又有右衛大將軍趙元侃其人則是左右衛後亦並加大字蓋其委寄亦不亞於領軍矣後周周書趙貴獨孤信列傳初魏拜爾朱榮柱國大將軍魏文帝復以太祖為之自大統十六年以前任者八人太祖位總百揆廣陵王欣從容禁闥此外六人各督二大將軍分掌禁旅胡三省資治通鑑注周置左右宫伯掌侍衛之禁各更直于內小宫伯二之臨朝在前侍之首行則夾路車左右通典後周官品正五命天官左右宫伯中大夫正四命天官小左宫伯下大夫虎賁給事正三命天官小右宫伯夏官右虎賁率右旅賁率右驍騎率右羽林率等上士正二命夏官右虎賁率右旅賁率右驍騎率右羽林率倅長等中士謹案後周以左右宫伯掌侍衛之禁令蓋仿周官而設當如今之內大臣而柱國大將軍専總禁旅則如今之領侍衛內大臣也隋隋書百官志左右衛大將軍一人將軍二人有長史司馬録事功倉兵騎等曹參軍法曹鎧曹行參軍各一人行參軍六人掌宫掖禁禦督攝仗衛又有直閣將軍六人直寢十二人直齊直後各十五人並掌宿衛侍從武騎常侍十人殿內將軍十五人員外將軍三十人殿內司馬督二十人員外司馬督四十人並以參軍府朝出使勞問左右領左右府各大將軍一人將軍二人掌侍衛左右供御兵仗領千牛備身十二人掌執千牛刀備身左右十二人掌供御弓箭備身六十人掌宿衛侍從左右領軍府各掌十二軍籍帳差科辭訟之事不置將軍唯有長史司馬掾屬煬帝改左右衛為左右翊衛領軍為左右屯衛領左右府為左右備身府謹案隋置十二衛十六府以分司禁旅蓋即唐十六衛之權輿然其職事各有攸分故以今制相凖如左右武候近今前鋒營左右監門近今護軍營今已各著于表惟左右衛領左右府専司宿衛侍從正今領侍衛之職而領軍府長史司馬掾屬亦如今侍衛處之有主事筆帖式也唐新唐書百官志左右衛上將軍各一人從二品大將軍各一人正三品將軍各三人從三品掌宫禁宿衛凡五府及外府皆總制焉凡五府三衛及折衝府驍騎畨上者受其名簿而配以職皇帝御正殿則守諸門及內廂宿衛仗非上日亦將軍一人押仗將軍缺以中郎將代將軍掌二上將軍之事孫逢吉職官分紀左右衛長史各一人從六品上掌制諸曹五府外府禀祿主伍軍團之名數器械車馬之多少小事則専達録事參軍各二人正八品上掌受諸曹及五府之外事句稽抄目印結紙筆舊唐書職官志親衛之府一曰親府勳衛之府二曰勳一府曰勳二府翊衛之府二曰翊一府曰翊二府凡五府三衛總四千九百六十三人每府中郎將左右郎將各一人兵曹參軍各一人校尉各五人每校尉有旅帥二人每旅帥各有隊正副隊正各二十人五府中郎將掌領校尉旅帥親衛勳衛之屬宿衛者總其府事左右郎將二焉畨上者以名簿上于大將軍而配以職武德貞觀世重資䕃二品三品子視親衛二品曾孫三品孫四品子職事官五品子若孫勳官三品以上有封及國公子補勳衛及率府親衛四品孫五品及上柱國子補翊衛及率府勳衛勳官二品及縣男以上子若孫補諸衛及率府翊衛每月畨上者數千人宿衛內廡及城門給廪食執扇三衛三百人殿中省肄習唐六典左右衛親勳翊及左右率府親勳及諸衛之翊衛通謂之三衛擇其資䕃凡左右衛之三衛分為五仗曰親仗供奉仗勳仗翊仗散手仗章如愚山堂考索左右驍衛左右武衛左右威衛左右領軍衛左右千牛衛上將軍各一人大將軍各一人將軍各二人掌同左右衛玉海左右衛以下皆有長史録事倉曹兵曹騎曹胄曹司階中候司戈執㦸長上唐六典凡兵士𨽻衛各有其名左右衛兵曰驍騎威衛兵曰羽林驍衛兵曰豹騎武衛兵曰熊渠領軍衛兵曰射聲新唐書百官志左右羽林軍大將軍各一人將軍各三人掌統北衙禁兵督攝左右廂飛騎儀仗左右龍武軍大將軍各一人統軍各一人將軍三人掌同羽林謹案唐之十六衛左右衛左右驍衛左右武衛左右威衛左右領軍衛左右金吾衛左右監門衛左右千牛衛是也五府三衛者親衛一府勳衛翊衛各二府是也皆所稱環衛之官以今制凖之惟左右衛掌宫禁宿衛千牛衛掌侍衛及供御兵仗最與今領侍衛相合他若騎驍武衛威衛領軍衛雖云掌同左右衛而兼知皇城四面助鋪則已並有今護軍之職特其官皆以內廂宿衛為主故仍係之此表至金吾衛掌巡警監門衛掌諸門禁衛則職守攸殊今已别繫之步軍護軍各統領表內又羽林龍武諸軍統北衙禁軍當時號為天子親兵其領是軍者類多近信之臣正今領侍衛大臣之比今亦並著於是篇焉五季五代㑹要顯德元年十月上謂侍臣曰侍衛兵士纍朝以來老少相伴強懦不分蓋狥人情不能進練今春髙平與劉崇及蕃軍相遇臨敵有指使不前者茍非朕親當堅陳幾至喪敗况百户農夫未能贍一甲士且兵在精不在衆宜令一一㸃選精鋭者升在上軍懦怯者任從安便度期可用又不虛費冊府元龜五代有侍衛親軍指揮使及殿前都㸃檢殿前都指揮之職葉夢得石林燕語侍衛親軍自梁起宣武軍乃以鎮兵因舊號置在京馬步都指揮使至後唐眀宗遂改為侍衛親軍五代㑹要周廣順四年四月改侍衛馬軍曰龍捷左右軍步軍曰虎捷左右軍殿前始于周世宗顯德元年歐陽修五代史論侍衛親軍此五代之遺制然原其始微矣當唐之末方鎮之兵多矣凡一軍有指揮使一人而合一州之諸軍又有馬步軍都指揮使一人蓋其卒伍之長也自梁以宣武軍建國因其舊制有在京馬步軍都指揮使後唐因之至眀宗時始更為侍衛親軍馬步軍都指揮使當是時天子自有六軍諸衛之職六軍有統軍諸衛有將軍而又以大臣宗室一人判六軍諸衛事此朝廷大將天子國兵之舊制也而侍衛親軍者天子自將之私兵也推其名號可知矣天子自為將則都指揮乃其卒伍之都長耳然自漢周以來其職益重漢有侍衛司獄凡朝廷大事皆决侍衛獄是時史宏肇為都指揮使與宰相樞密使並執國政而史宏肇尤専任以至于亡親軍之號始于眀宗其後又有殿前都指揮使亦親軍也五代史景延廣列傳髙祖以為侍衛步軍都指揮使又為馬步軍都虞候遷馬步軍都指揮使五代史劉贇列傳侍衛馬軍指揮使郭崇五代史孫晟列傳侍衛軍虞候韓通五代史王章列傳漢髙祖典禁兵補章都孔目官五代史史宏肇列傳侍衛孔目官解暉謹案五季始改唐制其専司宿衛者以侍衛馬步軍都指揮使侍衛軍都虞候及殿前都指揮使殿前都檢㸃為之長其下又有指揮使虞候及都孔目等官蓋亦如今領侍衛之職也至十六衛將軍雖有其名但以為外官加銜蓋名存而實已亡矣宋宋史職官志殿前司都指揮使副都指揮使都虞候各一人掌殿前諸班直及步騎諸指揮之名籍凡統制訓練畨衛戍守遷補賞罰皆總其政令而有都檢㸃副都檢㸃在都指揮之上後不復置入則侍衛殿陛出則扈從乘輿大禮則提㸃編排整肅禁衛鹵簿儀仗掌宿衛之事侍衛親軍馬軍都指揮使副都指揮使都虞候各一人掌馬軍諸指揮之名籍凡侍衛扈從大禮宿衛所掌如殿前司官侍衛親軍步軍都指揮使副都指揮使都虞候各一人掌步軍諸指揮之名籍侍衛扈從如殿前司殿前司有捧日天武左右四廂馬軍有龍衛左右四廂步軍有神衛左右四廂各有都指揮使都虞候指揮使副指揮使都頭副都頭十將將虞候承勾押官歐陽修歸田録舊制侍衛親軍與殿前分為兩司自侍衛不置馬步軍都指揮使止置馬軍指揮使步軍指揮使以來侍衛一司自分為二故與殿前司列為三衙也五代軍制已無典法而今又非其舊制者多矣唐制三衛官有司階司戈執㦸謂之四色官今三衛廢無官屬惟金吾有一人每日於正衙放朝唱不坐直謂之四色官尤可笑也謹案唐㑹要載司階中候司戈執㦸並天授二年四月五日置蓋即所謂四色官也唐諸衛皆有之歸田録謂當時惟有金吾一人謂之四色官考唐六典金吾衛本有此四色官宋時于正衙放朝時猶以金吾一人當之則告朔之羊也石林燕語殿前司與侍衛司馬軍步軍為三衛其實兩司而侍衛司都指揮外又置馬步軍都指揮使耳殿前司亦參馬步軍而總于都指揮使馬端臨文獻通考宋承前代之制有左右金吾衛左右衛上將軍左右驍騎屯衛領軍衛監門衛千牛衛上將軍諸衛大將軍諸衛將軍並為環衛官無定員皆命宗室為之亦為武臣之贈典大將軍以下又為武臣責降散官張邦基墨莊漫録國朝宗室例除環衛裕陵始以非袒免補外官謹案墨莊漫録謂國朝宗室例除環衛宋文粹載皇兄皇弟皇侄授環衛官諸誥可以考見宋制玉海載元豐二年十六衛大將軍二百九十四員將軍一百六十二員並宗室蓋猶沿祖宗之制玉海又載太平興國二年安逺節度使向拱換左衛上將軍張永德等皆罷節制歸環衛則以勳臣及戚屬為之矣隆興復祖宗環衛官蓋本此制玉海隆興二年五月八日壬辰進呈洪適周操討論環衛官故事湯思退奏環衛唐時有職事本朝無職事祖宗舊制自方鎮罷皆歸環衛先是上欲復祖宗環衛官四月二十六日命學士院討論至是下詔曰祖宗選用將帥以崇武節外建方鎮內則環尹品式備具近來久不除授非所以儲才而均任也其依舊制應以材略聞者令兼領如節度使則領左右金吾衛上將軍承宣使領左右衛上將軍之類既而閣門條具儀制詔以十員為額朝參侍殿依御𢃄例宗室不在此制仍不差戚里及非戰功人著為令二十五日詔臨安府建第舍以待環衛淳熙四年二月二十三日立環衛官格其法正任除上將軍遙郡除大將軍正使除將軍副使除中郎將使臣已下左右郎將是時李顯忠首除右金吾衛上將軍上曰在內則兼在外則否此正如文臣館閣庶可見人才謹案宋以殿前司與侍衛馬步司専司宿衛謂之三衙當時稱殿前都指揮使為殿帥亦曰殿巖蓋本漢代巖郎為名實即今領侍衛大臣之職特宋制凡內外屯戍之兵皆號禁軍悉以屬之殿前侍衛二司管轄於是遂獨専兵柄則厯代所未有也至環衛諸官僅有其名並無職守已全非隋唐之舊今故不著於表玉海崇寧四年二月十日己酉置三衛郎中郎博士二十六日詔三衛郎為侍郎親衛勳衛翊衛皆有郎中郎謹案玉海載崇寧四年所置三衛郎中郎博士蓋仿漢三署郎之遺制然徒有虛名不久旋廢故今亦不著於表沈括夢溪筆談車駕行幸前驅謂之隊則古之清道也其次衛仗衛仗者視闌入宫門法則古之外仗也其中謂之禁圍如殿中仗天官掌舍無官則供人門今謂之殿門文武官極天下長人之選八人上御前殿則執鉞立于紫宸門下行幸則為禁圍門於行仗馬之前又有衡門十人隊長一人選諸武力絶倫者為之上御後殿則執撾東西對立于殿前亦古之虎賁人門之類也遼遼史百官志北面御帳官侍衛司掌御帳親衛之事侍衛太師侍衛太保侍衛司徒侍衛司空侍衛宿衛司専掌宿衛之事總宿衛事亦曰典宿衛事總知宿衛事同掌宿衛事宿衛官禁衛局總禁衛事禁衛長宿直司掌輪直官員宿直之事宿直詳衮宿直都監宿直將軍宿直小將軍宿直官宿直護衛南面軍官殿前都㸃檢司殿前都㸃檢副㸃檢同知都㸃檢侍衛親軍馬步軍都指揮使司侍衛親軍馬軍都指揮使司侍衛親軍步軍都指揮使司侍衛控鶴兵馬都指揮使司侍衛漢軍兵馬都指揮使司謹案遼御帳諸官以貴戚為侍衛武臣為宿衛親軍為禁衛百官畨宿為宿直各有司存皆如今領侍衛之職至南面官之殿前侍衛兩司與宋制正同疑所領皆漢兵故與御帳别為一職也金金史百官志殿前都㸃檢司掌親軍總領左右衛將軍宿直將軍諸局署𨽻焉殿前都㸃檢正三品兼侍衛將軍都指揮使掌從行宿衛關防門禁督攝隊仗總判司事殿前左副都㸃檢從三品兼侍衛將軍副都指揮使殿前右副都㸃檢從三品兼侍衛將軍副都指揮使掌宫掖及行從殿前都㸃檢判官從六品知事一員從七品殿前左衛將軍殿前右衛將軍殿前左衛副將軍殿前右衛副將軍掌宫禁及行從警嚴仍總領護衛左右宿直將軍從五品掌總領親軍凡宫城諸門衛禁並行從宿衛之事金史兵志禁軍之制本于哈濟滿洲語親也原作合扎今改正眀安哈濟者言親軍也以近親所領故以名焉貞元遷都更以太祖遼王宗幹秦王宗翰軍為哈濟明安謂之侍衛親軍故立侍衛親軍司以統之正隆五年罷親軍司置左右驍騎所謂從駕軍也置都副指揮使𨽻㸃檢司步軍都副指揮使𨽻宣徽院謹案金改侍衛親軍為殿前都㸃檢司蓋已合宋之三衙為一官而宿衛以外兼防門禁則又並有今護軍之職矣至拱衛直之𨽻宣徽院者掌陳設儀仗則又近今之鑾儀衛故不著於此表元元史兵志太祖功臣博勒呼䝉古語可也原作博爾忽今改正博爾濟䝉古語兩代奴也原作博爾术今改正穆呼里䝉古語純也原作木華黎今改正齊拉衮䝉古語石也原作赤老溫今改正太祖命其世領集賽䝉古語班也原作怯薛今改正之長畨直宿衛凡宿衛每三日而一更申酉戌日博勒呼領之為第一集賽即伊克䝉古語大也原作也可今改正集賽博勒呼早絶太祖命以布色䝉古語帶也原作别速今改正部代之而非功臣之類故太祖以自名領之其名伊克者言天子自領之故也亥子丑日博爾濟領之為第二集賽寅卯辰日穆呼里領之為第三集賽已午未日齊拉衮領之為第四集賽齊拉衮後絶其後集賽常以右丞相領之凡集賽長之子孫或由天子所親信或由宰相所薦舉或以其次序所當為即襲其職以掌環衛雖其官卑勿論也及牛勞既久則遂擢為一品官而四集賽之長天子或又命大臣以總之然不常設也其他預集賽之職而居禁近者分冠服弓矢食飲文史車馬廬帳府庫醫藥卜祝之事悉世守之雖以才能受任使服官政貴盛之極然一日歸至內廷則執其事如故至于子孫無改非甚親信不得預也若夫宿衛之士則謂之集賽否原作怯薛歹又作怯薛丹今並改正亦以三日分畨入衛其初名數甚簡後纍增為萬四千人揆之古制猶天子之禁軍是故無事則各執其事以備宿衛禁廷有事則惟天子之所指使比之樞密各衛諸軍於是為尤親信者也元史百官志右衛左衛中衛秩正三品中統三年初置武衛至元元年改為侍衛八年改為左右中三衛掌宿衛扈從置都指揮使二員副都指揮使二員僉事三員經厯二員知事二員照磨一員令史七人譯史通事知印各一人前衛後衛秩正三品至元十六年以侍衛親軍創置前後二衛掌宿衛扈從置都指揮使三員副都指揮使二員僉事二員經厯二員知事二員照磨一員令史七人通事譯史知印各一人後衛譯史通事各二人謹案元之四集賽以功臣之後世領宿衛與今侍衛官員定為上三旗額缺者其制頗屬相近至侍衛親軍世祖設五衛以象五方各置都指揮使以領之而别無總統之官以百官志考之蓋亦𨽻于樞密院也眀眀史職官志京衛指揮使司指揮使一人正三品指揮同知二人從三品指揮僉事四人正四品鎮撫司鎮撫一人從五品其屬經厯司經厯從七品知事正八品吏目從九品倉大使副使各一人京衛各有掌印有僉書其以恩䕃寄祿無定員凡上直衛親軍指揮使司二十有六曰錦衣衛曰旗手衛曰金吾前衛曰金吾後衛曰羽林左衛曰羽林右衛曰府軍衛曰府軍左衛曰府軍右衛曰府軍前衛曰府軍後衛曰虎賁左衛是為十二衛洪武中置曰金吾左衛曰金吾右衛曰羽林前衛曰燕山左衛曰燕山右衛曰燕山前衛曰大興左衛曰濟陽衛曰濟州衛曰通州衛是為上十衛永樂中置曰騰驤左衛曰騰驤右衛曰武驤左衛曰武驤右衛宣德八年置畨上宿衛名親軍以護宫禁不𨽻五都督府眀㑹典掌領侍衛侯伯駙馬等官六員二員管錦衣衛府軍前衛四員管三千圍營眀史兵志侍衛上直軍洪武置錦衣衛所𨽻有將軍力士校尉掌直駕侍衛已又擇公侯伯都督指揮之嫡次子置勳衛散騎舍人而府軍前衛及旗手等十二衛各有帶刀官錦衣所𨽻將軍後改稱大漢將軍凡千五百人設千百户總旗七員永樂中置五軍三千營增紅盔眀甲二將軍及義刀圍子手之屬備宿衛領以勳戚官官凡六管大漢將軍及散騎舍人府軍前衛𢃄刀官者一管五軍營義刀圍子手者一管神樞營紅盔將軍者四居常當直將軍朝夕分候午門外夜則司更共百人而五軍義刀官軍悉于皇城直宿掌侍衛官輪直日一員惟掌錦衣衛將軍及義刀手者每日侍共計錦衣衛大漢將軍一千五百七人府軍前衛帶刀官四十神樞營紅盔將軍二千五百把總指揮十六眀甲將軍五百二把總指揮二大漢將軍八五軍營義刀圍子手三千把總指揮八勳衛散騎舍人無定員旗手等衛帶刀官一百八十此侍衛親軍大較也謹案自古周廬千列設㦸百重環衛之官其職綦重周禮宫正宫伯實後世郎衛所由始其時皆以勳親入侍休戚一心法制盡善漢代三署郎多選經眀行修者充之猶為不失遺意其後漸有改更如南北朝之領軍左右衛唐之十六衛宋之殿前侍衛司皆為宿衛之長而或權移宦竪或委寄非人代多流弊惟元之四集賽以功臣親信子弟世守其官最為近古眀代以二十六衛為天子親軍統以指揮使領以公侯伯駙馬等官立法非不詳備然自永樂以後京營悉有監視太監憲宗又命汪直提督團營禁旅由是始専掌于中官嗣後神機三千四衛等營城門諸局無一不以中官監之宿衛諸軍盡歸掌握甚至領兵出征大帥悉受節制侵尅軍資冒功掩敗百弊叢生至皇城門禁多屬錦衣衛軍其東厰太監緝事官校亦皆從錦衣撥給由是衛帥每出內侍私人表裏為奸擅作威福而於禁門守衛一切置之不問衛軍役於中官常至空伍賃市兒行丐以應㸃閲坐更將軍皆納月鏹于所轄經時不至直廬當時人主晏處深宫不接見廷臣出入起居惟有羣閹在側倒持阿柄聽其所為浸釀厲階致傾宗社禍患所中正不獨禁衛之積弛已也我朝侍衛之職選上三旗中材武出衆之子弟及各執事效力人等之可任者為之其優者擢為御前侍衛乾清門侍衛而統以三旗領侍衛內大臣凡熊羆之士不二心之臣無不培養生成敬共將事而諸藩之世為臣僕者亦得以子弟入侍趨走禁闈畨直有期訓習有道稽核有法選擢有方分職設官練材于素出則當折衝之任入則備翊衛之班所以上應勾陳環拱宸極者其規模實為閎逺矣欽定厯代職官表卷四十三
