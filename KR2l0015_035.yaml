body:
  text: 欽定四庫全書欽定厯代職官表卷二十九陵寢各官國朝官制永陵掌關防官一人正四品各同陵寢副關防官兼內管領一人副關防官兼尚茶正尚膳正二人正五品各同陵寢筆帖式四人永陵總管一人正三品各同陵寢翼領二人正四品各同陵寢防禦十有六人正五品各同陵寢福陵掌關防官一人副關防官二人尚茶正尚膳正各一人俱正四品各同陵寢內管領一人正五品各同陵寢筆帖式四人福陵總管一人翼領二人防禦十有六人世襲騎都尉一人雲騎尉品級官七人六品官一人七品官五人八品官四人昭陵掌關防官一人副關防官二人尚茶正尚膳正各一人內管領一人筆帖式四人昭陵總管一人翼領二人世襲一等侍衛兼二等輕車都尉一人防禦十有六人世襲雲騎尉四人雲騎尉品級二人世襲六品官七人右俱滿洲貟額掌守衛三陵凡班直之令饗獻之禮灑掃之節咸以時分司其事焉永陵總管等員康熙九年置掌關防等員康熙十一年置福陵昭陵掌關防總管等員俱順治十三年置又永陵有副總領司香尚膳及國戚章京等員福陵有副茶領副膳領尚茶尚膳司香管千丁佐領等員又國戚章京六十五員昭陵有副總領尚茶尚膳司香管千丁佐領等員又恩賜國戚防禦品級三貟國戚章京二十貟俱順治初年以來先後增置東陵泰陵管理承辦事務衙門宗室貝勒貝子公均無常貟東陵泰陵內務府總管名一人正二品掌帥其屬而嚴衛護時薦享以祗奉陵寢初康熙二年始除內大臣侍衛等守護孝陵康熙六十一年十二月建景陵特命以王公守護别置大學士尚書侍郎領侍衛內大臣內務府總管副都統散秩大臣乾清門侍衛御前侍衛侍衛等貟皆有闕不除乾隆二年定守護泰陵人貟貝勒二人公一人大臣官員十人待衛十人皆奉㫖除往尋設東陵泰陵承辦事務衙門各鑄給印章以守陵之貝勒貝子公內務府總管等同領其政令焉守陵寢總兵官馬蘭鎮泰寧鎮各一人掌督帥官兵巡防游徼以翼衛陵寢其內務府總管奉命兼攝者皆由特簡不為例所轄將辨職制詳具武職篇昭西陵奉祀禮部郎中一人員外郎二人讀祝官二人贊禮郎四人筆帖式二人孝陵奉祀禮部掌關防郎中一人兼管陵事務孝東員外郎二人讀祝官二人贊禮郎四人筆帖式二人孝東陵奉祀禮部員外郎二人讀祝官二人贊禮郎四人筆帖式二人景陵奉祀禮部郎中一人員外郎二人讀祝官二人贊禮郎四人筆帖式二人景陵皇貴妃園寢讀祝官二人贊禮郎三人景陵妃園寢讀祝官二人贊禮郎三人泰陵奉祀禮部郎中一人兼管陵事務泰東員外郎二人讀祝官二人贊禮郎四人筆帖式四人泰東陵奉祀禮部員外郎二人讀祝官二人贊禮郎四人筆帖式四人泰陵妃園寢主事一人讀祝官二人贊禮郎三人孝賢皇后陵寢奉祀禮部郎中一人員外二人讀祝官二人贊禮郎四人筆帖式二人純惠皇貴妃園寢讀祝官二人贊禮郎三人端慧皇太子園寢讀祝官二人贊禮郎三人東陵承辦事務衙門主事二人筆帖式二人西陵承辦事務衙門主事一人委署主事一人筆帖式四人右泰東陵宗室郎中一員外郎一主事一陵宗室員外郎一主事一餘俱滿洲員額郎中員外郎主事掌判署文案監視禮儀嵗供其品物以序祀事讀祝官掌讀祝辭奉制帛贊禮郎掌讃唱導引以詔行禮之節筆帖式掌繕録文移員額自康熙二年以來先後置乾隆二年定以孝陵奉祀禮部郎中為掌關防郎中凡各陵事務皆令㑹同辦理有闕則掄選引見請㫖簡補四十六年改置宗室郎中員外郎主事共五人東陵工部郎中一人員外郎四人筆帖式四人泰陵工部郎中一人員外郎一人筆帖式四人泰東陵工部員外郎一人泰陵妃園寢工部主事一人掌嵗時修葺繕治之事祭祀則供其楮幣官府所須咸給其器具焉員額自康熙二年以來先後置昭西陵內務府郎中一人員外郎一人主事一人尚茶正尚膳正各一人俱正四品內管領一人正五品筆帖式二人孝陵內務府郎中一人員外郎一人主事一人尚茶正尚膳正各一人內管領一人內副管領一人正六品筆帖式二人孝東陵內務府郎中一人員外郎一人主事一人尚茶正尚膳正各一人內管領一人筆帖式二人景陵內務府員外郎一人主事一人尚茶正一人尚膳正二人內管領一人內副管領一人筆帖式二人景陵皇貴妃園寢內務府員外郎一人尚茶副尚膳副各一人委署內副管領一人俱用九品冠帶泰陵內務府員外郎一人主事一人尚茶正一人尚膳正二人內管領一人內副管領一人筆帖式二人泰東陵內務府郎中一人員外郎一人主事一人尚茶正尚膳正各一人內管領一人筆帖式二人泰陵妃園寢內務府主事一人內副管領一人孝賢皇后陵寢內務府郎中一人員外郎一人主事一人尚茶正尚膳正各一人內管領一人內副管領一人筆帖式二人純惠皇貴妃園寢尚茶副尚膳副各一人委署內副管領一人端慧皇太子園寢內副管領一人尚茶副尚膳副各一人右俱內務府員額郎中員外郎主事掌奉祭祀奠享之禮掃除開闔之節藝林木剃草萊皆因時經理之尚茶尚膳正副掌熟俎之具蔬茹之品酏漿之用咸潔治而敬共之內管領副管領掌餅餌飴蜜之物以時薦之筆帖式分掌文案員額自康熙二年以來先後置昭西陵防禦十有六人驍騎校二人從六品筆帖式二人孝陵總管一人翼領二人俱兼管孝東陵昭西陵事務防禦十有六人輕車都尉一人雲騎尉二人驍騎校二人筆帖式二人孝東陵防禦十有六人驍騎校二人筆帖式二人景陵總管一人翼領二人防禦十有六人驍騎校二人筆帖式二人景陵皇貴妃園寢防禦四人驍騎校一人景陵妃園寢防禦八人驍騎校一人泰陵泰東陵總管一人翼領二人防禦四十人驍騎校五人筆帖式二人孝賢皇后陵寢總管一人翼領二人防禦十有六人驍騎校二人妃園寢防禦八人驍騎校一人端慧皇太子園寢防禦委署翼領一人防禦七人委署驍騎校一人右俱滿洲員額總管翼領掌帥八旗官兵巡視守護防禦驍騎校掌守衛門户庫藏祭祀則共其几筵筆帖式分掌文案員額自康熙二年以來先後置厯代建置三代周禮春官冢人下大夫二人中士四人府二人史四人胥十有二人徒百有二十人掌公墓之地辨其兆域而為之圖先王之葬居中以昭穆為左右凡諸侯居左右以前卿大夫居後各以其族以爵為丘封之度與其樹數正墓位蹕墓域守墓禁凡諸侯及諸臣葬于墓者授之兆為之蹕均其禁鄭康成注冢封土為邱壟象冢而為之公君也賈公彥疏公則諸侯之通稱言君則上通天子墓大夫下大夫二人中士二人府二人史四人胥十二人徒二人掌凡邦墓之地域為之圖令國民族葬而掌其禁令正其位掌其度數使皆有私地域帥其屬而巡墓厲居其中之室以守之鄭康成注墓冢塋之地孝子所思慕也太平御覽齊職儀曰周有墓大夫冢人之職掌先王之墓謹案古者皆以族葬雖公墓亦然冢人所掌先王之冢居中子孫皆就而葬之以昭穆為左右劉向諫營昌陵疏謂文武周公葬于畢魏了翁古今考以為文王居中武王為昭居左成王為穆居右者是也至冢墓之稱亦通乎貴賤左傳稱殽有二陵其南陵夏后臯之墓書傳稱桐宫湯墓水經注有顓頊冢皇覽有黃帝冢並言冢言墓而不言陵顧炎武謂春秋以降乃有稱邱者楚昭王墓謂之昭邱趙武靈王墓謂之靈邱而吳王闔閭之墓亦名虎邱史記趙世家肅侯十五年起夀陵秦本紀惠文王葬公陵悼武王葬永陵孝文王葬夀陵始有稱陵者三秦記稱秦謂天子墳曰山漢云陵亦通言山陵言髙大如山陵據此是陵名當始自戰國以後世之稱堯陵舜陵者乃從今制追名之耳然觀周禮冢人掌公墓墓大夫掌邦墓則所司固有差别而蹕墓域守墓禁其嚴立條法亦為公墓而設後代置官吏以守護山陵其源實肇於此矣秦宋書禮志漢氏諸陵皆有園寢者承秦所為也顧炎武日知録秦宗廟之禮無聞而特起寢殿於墓側謹案古來言葬薶之侈者莫如秦之驪山役徒至七十餘萬人而史獨不言有設官守衛之事劉向謂驪山之作未成而周章百萬之師已至其下疑二世被弒時距始皇之葬未久屬四方兵起故不暇有所建置也漢馬端臨文獻通考諸陵園寢官漢置屬太常衛宏漢舊儀漢興立都長安徙齊田楚昭屈景及諸功臣家於長陵後世世徙吏二千石髙資富人及豪傑兼併之家於諸陵長陵邑萬戶奉常屬官有寢園令長丞東園匠令丞主作陵內器物又有園郎寢郎故事近臣皆隨陵為園郎園中各有寢便殿日祭於寢月祭於廟時祭於便殿寢日四上食丞相以四時行園荗陵平陵杜陵皆取二千石將相守陵故三陵多貴皆三萬户至五萬户三輔黃圖長陵城周七里百八十步因為殿垣門四出及便殿掖庭諸官寺皆在中雍録文帝即霸上立陵以為霸陵陵後又置縣漢書景帝本紀五年春正月作陽陵邑張晏注帝作夀陵起邑武帝本紀建元二年夏四月初置茂陵邑元帝本紀永光四年以渭城夀陵亭部原上為初陵詔勿置縣邑李吉甫元和郡縣志茂陵守陵溉樹掃除凡五千人漢書昭帝本紀三輔太常郡如淳注太常主諸陵别治其縣爵秩如三輔郡元帝永光五年令各屬所在郡也漢書髙后本紀六年秩長陵令二千石應劭注長陵髙祖陵尊之故增其令秩漢書魏相列傳相舉賢良以對䇿髙第為茂陵令漢書朱博列傅以太常掾察廉補安陵丞漢書司馬相如列傳相如拜為孝文園令漢書馮參列傳竟寧中出補渭陵食官令如淳曰給陵上祭祀之事以數病徙為寢中郎師古曰亦渭陵之寢郎也漢書叙傳班稚遷廣平相上書陳恩願歸相印入備延陵園郎太后許焉漢書平帝本紀元始元年義陵寢神衣在外牀上寢令以急變聞漢書外戚列傳衛皇后宣帝追諡思后置園邑三百家長丞周衛奉守焉漢書武五子傳孝宣帝即位悼皇悼后園置奉邑三百家故皇太子置奉邑二百家史良娣置守冢三十家園置長丞周衛奉守如法謹案自漢髙祖葬太上皇於櫟陽置萬年縣為奉陵邑徙天下民資三百萬以上與田宅守陵見漢舊儀嗣後髙帝長陵惠帝安陵文帝霸陵景帝陽陵武帝茂陵昭帝平陵宣帝杜陵皆置陵縣屬於太常故漢世太常得治獄漢書功臣侯表新畤侯趙弟為太常坐鞫獄不實免捕盜漢書功臣侯表建平侯杜緩為太常坐盜賊多免起徒役漢書昭帝紀有三輔太常徒舉賢良漢書昭帝紀始元五年令太常舉賢良二人宣帝紀本始四年令太常舉賢良方正如列郡太守之職至元帝始罷其制蓋當時陵邑皆徙郡國民以實之五方雜處户口繁殖漢時三輔豪猾犯法者衆號稱難治其故亦由於此而所謂陵令者實治民之長吏固不僅在奉衛山陵也惟寢園令長丞諸職乃専為守陵而設特漢書百官志紀載簡略不能得其立制之詳今以諸傳參互考之有孝文園令又有義陵寢令則園令寢令實為兩官蓋園令掌奉園陵禮儀當如今陵寢禮部之職寢令掌寢廟服物當如今陵寢內務府之職百官志渾舉連稱未加分晰故讀者或誤合為一耳至食官令當如今尚茶尚膳之職園郎寢郎専司直衛當如今總管防禦之職而東園匠令丞主作陵內器物則又如今陵寢工部之職矣後漢書百官志先帝陵每陵園令各一人六百石掌守陵園案行掃除丞及校長各一人校長主兵戎盜賊事應劭漢官名秩日丞皆選孝廉郎年少者選補府長史都官令侯司馬先帝陵每陵食官令各一人六百石掌望晦時節祭祀漢官曰每陵食監一人秩六百石監丞一人三百石黃門八人從官二人案食監即是食官令號後漢書祭祀志建武以來關西諸陵但四時特牲祠帝每幸長安謁諸陵乃太牢祠雒陽諸陵皆以晦望二十四氣伏臘及四時祠廟日上飯太官送用物園令食監典省其親陵所宫人隨鼓漏理被枕具盥水陳妝具後漢書段熲列傳舉孝廉為憲陵園丞陽陵令後漢書章帝八王傳安帝尊父清河孝王曰孝德皇陵曰甘陵置令丞設兵車周衛桓帝尊河間孝王陵曰樂成陵蠡吾侯陵曰博陵靈帝尊祖陵曰敦陵考陵曰慎陵皆置令丞謹案陵園規制至西漢而特為隆備但尚未有天子親祭之文至後漢明帝永光元年正月帝率公卿已下朝於原陵如元㑹儀上陵之禮實始於此至雒陽每陵置園令丞及食官監等官大抵亦沿西京之制惟其時長安諸陵世次已逺陵官並置與否史無明文案百官志謂三輔陵廟所在不改其號而地理志長陵縣下劉昭注引蔡雍頌云長陵前漢户五萬口十七萬至光和户不盈四千園陵藩衛粢盛之供百役出焉民用匱乏不堪其事云云疑其事已併於諸陵邑令而以京兆尹總其成未必盡如雒陽之備官矣三國薛收元經傳漢故事陵上立祭殿至魏制以為謂古不墓祭自有廟設於是園邑寢殿遂廢謹案三國陵官之制不著於史無可考見然如曹魏不置園邑寢殿則陵上便無祭祀之禮疑令丞之職亦當隨之俱廢不獨史文之闕漏也晉晉書職官志太常有陵令唐六典晉太常統陵令丞主簿録事户曹史禁備史各一人史四人卒一人宋齊梁陳宋書百官志陵令每陵一人漢舊官也屬太常南齊書百官志諸陵令永明末置用二品三品勳置主簿户曹各一人太平御覽齊職儀曰每陵令一人品第七秩四百石銅印墨綬進賢一梁冠絳朝服唐六典齊陵令舊用三品勳位孝建三年改為二品隋書百官志梁太常統陵監天監七年詔以為陵監之名不出前誥且宗廟憲章既備典禮園寢職司理不容異諸正陵先立監者改為令於是陵置令矣富大用事文類聚梁改為監後復為令班第二品第九杜佑通典陵令梁以下皆有之唐六典陳承梁制陵令秩六百石北魏謹案北魏自昭成帝至獻文帝或葬盛樂或葬雲中皆名金陵自孝文帝以後始葬雒都其謁陵之禮書於本紀者先後不一而足獨守陵官吏闕焉無述建置不得而詳考之禮志及后妃諸傳則當時諸陵制度大抵視前代為簡朴如永固陵起墳才六十步孝文帝夀宫去永固陵僅里餘又昭后遷祔於長陵兆西北相去亦止六十步其局隘可以想見又諸陵多近在都城之外如孝文帝謁永固陵皆即日還宫嵗時巡省亦便殆即以太常兼之未嘗備置官司也北齊隋書百官志後齊太常寺統諸陵署令丞掌守衛山陵等事後周通典後周官品正三命春官守陵上士正二命春官守陵掌墓等中士正一命春官掌墓下士唐六典後周守陵每陵上士一人隋隋書百官志隋太常寺統諸陵署各置令丞一人唐六典隋每陵令一人丞一人有主衣主輦主藥等貟唐新唐書百官志諸陵臺令各一人從五品上丞各一人從七品下建初啓運興寧永康陵令各一人從七品下丞各一人從八品下掌守衛山陵凡陪葬以文武分左右子孫從父祖者亦如之宫人陪葬則陵户成墳諸陵四至有封禁民葬惟故墳不毁開元二十五年以陵寢隸宗正天寶二載又以諸陵署隸太常十載改獻昭乾定橋五陵陵署為臺升令品永康興寧二陵稱署如故至德二年復隸宗正永泰元年太常卿姜慶初復奏隸太常大歷二年復舊陵臺有録事各一人府各二人史各四人主衣主輦主藥各四人典事各三人掌固各二人陵户各三百人昭陵乾陵橋陵增百人諸陵有録事各一人府各一人史各一人典事各二人掌固各二人陵户各百人諸太子陵令各一人從八品下丞各一人從九品下録事各一人府各一人史各二人典事各二人掌固各一人陵户各三十人唐開元禮皇帝拜五陵陵令以玉冊進御署訖詣陵拜還至寢宫進省服玩拂拭牀帳入奠酒訖皇帝出中門其守宫使內侍官引內官帥寢宫內人謁見唐㑹要開元二十八年制建初起運二陵仍準興寧陵例置署官及陵户自今以後每嵗至春秋仲月分命公卿巡謁其建初起運興寧永康四陵年别四時及八節委所由州縣數與陵署相知造食進獻貞元四年太常寺酌修公卿拜陵儀注其奉禮郎典謁等應須權攝請準天寶六載敕所管縣及陵官博士助教等充徐乾學讀禮通考昭陵因九嵕層峯鑿山東西深七十五尺為元宫山旁巖架梁為棧道懸絶百仞繞山二百七十步始達元宫門頂上亦起逰殿有五重石門其門外於雙棧道上山起舍宫人供養如平常及太宗山陵畢宫人亦依故事留棧道準舊栁宗元河東集陳京行狀昭陵山峻而髙寢宫在其上內宫懲其上下之勤挽汲之艱也謁於上請更之上下其議京奏不可上從之文獻通考貞元十四年命有司修葺陵寢獻昭乾定泰五陵各造屋三百七十八間橋陵一百四十間元陵五十間建陵不復創造但修葺而已日知録唐時陵寢常有鷹犬之奉元宗開元二年四月辛未詔曰園陵之地衣冠所遊凡厥有司罔不祗事頃者别致鷹狗供奉山陵至於料度極多費損有乖儀式無益崇嚴諸陵所有供奉鷹狗等並宜即停謹案自漢以後惟唐代山陵之制最為崇重其於陵上各起寢宫具衣冠嬪御之制亦即漢諸陵各有寢便殿之遺意守宫使一官唐志不載獨見於開元禮然觀其帥內官宫人以奉神御其職視陵令實較親近蓋如今之陵寢內務府總管也至奉禮郎典謁等官惟天子上陵始以正貟引讃平日則皆陵令等兼攝之故别無額缺今制各陵皆設讀祝官贊禮郎専司其事視唐代益加嚴肅矣五季謹案五季陵寢之禮多沿唐舊然考宋志稱五代諸陵逺者令本州長吏朝拜近者遣太常宗正卿或因行過親謁而不言有陵臺守衛之制疑其時建置草略未必備官也宋文獻通考宋以宗正寺知丞事掌奉宗廟諸陵薦享之事政和五禮新儀春秋二仲薦獻諸陵前一日都監率其屬詣陵闢宫殿門升殿掃除陳香案及供奉之物薦獻日獻官行事諸陵有司以元日中元冬至日節進獻上宫以元日冬至寒食節第二第三日上元等節前後各一日中元節前一日立春二月二日春社上已重午初伏七夕秋社中秋望日重陽下元節臘朔望各一日進獻下宫進獻日行事設都監位於庭北向香火內侍位其後都監香火內侍升自阼階詣神御室恭奠再拜以出惟永定陵都監先詣真宗皇帝下宫行禮畢帥其屬詣章惠皇后陵行禮永裕陵都監詣神宗皇帝下宫行禮畢帥其屬詣惠恭皇后位行禮並如上儀事文類聚宋元祐令陵臺令從六品宋史禮志皇祐三年安陵永昌永熙三陵皆置卒五百人惟定陵以章獻太后故别置一指揮昭陵使甘昭吉引定陵例請置守陵奉先兩指揮京西轉運使請減定陵卒半以奉昭陵詔選募一指揮額五百人紹興二十七年詔永祐陵及昭慈聖獻皇后櫕宫檢察承受以檢察宫陵所為名三十年吏部言紹興府㑹稽知縣依倣陵臺令典故於階銜內帶主管櫕宫事務量加優異李心𫝊建炎以來朝野雜記昭慈櫕宫置都監巡檢各一員衛卒百人宋史職官志諸陵祠墳所掌先世后妃之墳園而以時獻享謹案宋之陵官雖不載於職官志以諸書參互考之其制度亦可概見蓋諸陵皆置使一人都監一人香火內侍一人其置卒守衛則又設指揮巡檢等員以領之南渡以後别有檢宫官陵所主管櫕宫諸職名準諸今制陵使總轄其事當如陵寢內務府大臣都監典掌禮儀當如奉祀禮部而指揮巡檢専司率卒巡護則當如陵寢八旗之總管防禦也遼遼史太祖本紀天顯二年葬太祖於祖陵置祖州天成軍節度使以奉陵寢遼史地理志懷州奉陵軍節度大同元年世宗置以奉太宗懷陵慶州元寧軍節度聖宗葬此建永慶陵置蕃漢守陵三千户並隸大內都總管司顯州奉先軍節度世宗置以奉顯陵顯陵者東丹人皇王墓也乾州廣德軍節度聖宗統和三年置以奉景宗乾陵謹案遼代諸陵亦各有寢殿如懷陵有鳳凰殿慶陵有望仙殿御容殿乾陵有凝神殿皆著於史而奉祀之官紀志不詳獨無可考見惟每陵各置節度使以重守衛為遼之創制蓋如今之設陵寢總兵官也金金史百官志諸陵署大安四年同隨朝提㸃山陵正五品涿州刺史兼令從六品丞一員從七品掌守山陵直長正八品園陵署令宛平縣丞兼貞祐二年以園遷大興縣境遂以大興縣令丞兼謹案金初諸帝本葬上京海陵煬王正隆元年遷始祖以下十帝改葬於大房山故以涿州刺史兼提㸃山陵之職而令丞以下皆特置其園陵之在大興宛平者乃后妃所葬禮視帝陵為簡故但以縣令丞兼之也元元史本紀世祖成宗仁宗武宗葬起輦谷從諸帝陵英宗從葬諸帝陵泰定帝明宗文宗寧宗葬起輦谷從諸陵元史祭祀志凡陵地開穴所起之土成塊依次排列之既下復以次掩覆之其有剩土則逺置他所送葬官三貟居五里外日一次燒飯致祭三年然後返事文類聚大元置諸陵署隸太常有令丞直長等官又置提㸃山陵使及副使謹案元諸帝皆葬起輦谷最為質朴潘塤楮記室謂葬後用萬馬蹴平俟革青方解嚴則已漫同平坡無復考志遺蹟是當時並無下宫皇堂之制是以不上陵名不起享殿不植列樹官司守衛自無所用宜百官志不見有諸陵署之名乃事文類聚又載元代實有此職疑其未可慿據然富大用以元人紀元制又不應舛錯至此姑附存之以備考核焉明明㑹典熙祖曰祖陵在泗州設祠祭署置奉祀一員陵户二百九十三户仁祖曰皇陵在鳳陽府設皇陵衛並祠祭署奉祀一員祀丞三貟置陵户三千三百四十二户太祖孝陵設神宫監孝陵衛及祠祭署天夀山諸陵各設神宫監并衛及祠祭署睿宗顯陵在承天府設神宫監顯陵衛祠祭署置奉祀一貟以戚屬為之嘉靖十八年升戚署為都督僉事給欽差純德山掌祀關防職専守護始於太常寺選補奉祀及增祀丞一貟如七陵之制明史職官志各陵俱設神宫監太監守陵天夀山守備太監一貟轄各陵守陵太監職司護衛明官制孝陵衛經歷司鎮撫司左右中前後千户所牧馬千户所長陵衛經歷司鎮撫司左右中前後中左中右千户所獻陵等衛經歷司鎮撫司左右中前後千户所各衛指揮使指揮同知指揮僉事各所正千户副千户百户謹案三代禮經本無墓祭之文自秦漢崇建陵園始於墓側起廟四時祭祀事之如生雖典屬創設而緣情定制要為不失禮意及漢世専務侈張浸成敝習遂至大陳車馬廣置嬪御與宫廷無異漢書貢禹奏言武帝取好女數千人填後宫及昭帝幼弱霍光専事不知禮正皆以後宫女置於園陵今杜陵有宫人數百又外戚傳有杜陵梁美人又成帝班倢妤充奉園陵又後漢諸陵以宫人理被枕具盥水陳妝具迄唐世而此風未革其為媟瀆實甚宋金稍除其弊而各陵設香火內侍與守陵都監分司薦獻之禮升階行禮儼為儕列亦失體制至明代而守陵之事遂悉領之神宫監太監又置守備太監以總統之凡諸陵巡防護視咸歸經理春秋時祀亦皆神宫監太監承祭朝廷並不遣官以守衛陵園重務委之一二刑餘使其専奉明禋褻禮慢神尤乖典則我朝鞏建珠邱神皋永奠因山禮制準古加隆凡守護事宜持遣宗室貝勒貝子公及總管內務府大臣典領以昭崇重而禮部工部太常寺內務府官屬分曹定職各有攸司所設內監人員不過供香燈灑掃之役仍歸內務府大臣管轄制度釐然規條詳肅洵乎超越列代足垂奕祀之法守矣欽定歷代職官表卷二十九
