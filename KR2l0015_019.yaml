body:
  text: 刑部表刑部國朝官制刑部尚書滿洲漢人各一人掌折獄審刑簡核法律受天下奏讞咸閲實而上其辭以肅邦憲所屬有直𨽻奉天江蘇安徽江西福建浙江湖廣河南山東山西陜西四川廣東廣西雲南貴州督捕十有八司國初刑部設滿洲承政二員䝉古承政一員漢人承政二員參政八員啓心郎一員崇德三年改設承政一員左參政二員右參政三員順治初定設滿洲漢人尚書各一員七年增置滿洲尚書一員十年仍省雍正十二年以來親王郡王及大學士奉命管理部務皆由特簡無常員左右侍郎滿洲漢人各一人掌迪播祥刑以二尚書順治元年定額直𨽻清吏司郎中滿洲漢人各一人員外郎滿洲一人䝉古一人漢人二人主事滿洲漢人各一人掌順天直𨽻及八旗遊牧察哈爾左翼正黃東半旗鑲黃正白鑲白正藍四旗所屬刑名初為右現審司乾隆二年改置直𨽻司設官如今額謹案初制刑部設江南等十四司康熙三十八年增置督捕前後司為十六司雍正元年增置左右二現審司凡囚繫之待讞者則主其訊鞫之事十一年析江南司為江蘇安徽二司併督捕前後司為一乾隆二年改右現審司為直𨽻司七年復改左現審司為奉天司始定為十八司司屬初置理事官六員副理事官八員順治元年改定滿中郎中六人員外郎八人主事十有四人漢軍郎中四人員外郎十有二人漢人郎中員外郎主事每司一人五年增置滿洲郎中八人員外郎十人十五年省漢人員外郎主事各四人十八年增置䝉古員外郎八人康熙元年仍省五十七年增置䝉古郎中員外郎主事各一人雍正三年復置漢人員外郎主事各四人五年罷漢軍員額增漢人郎中三人員外郎一人其續置各司員額亦俱隨時增設凡額官闕則總其數三分計之以其二牒吏郎除授而留其一由堂官遴選奏請擢補焉奉天清吏司郎中䝉古一人漢人一人員外郎滿洲漢人各一人主事滿洲漢人各一人掌盛京黑龍江吉林將軍及奉天府所屬刑名兼宗人府理藩院文移關白之事初為左現審司乾隆七年改置奉天司設官如今額江蘇清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌江蘇所屬刑名凡奉德音肆眚則審定其條格而頒之於四方初為江南司雍正十二年析置江蘇及安徽二司設官如今額安徽清吏司郎中滿洲漢人各一人員外郎滿洲漢人各一人主事滿洲漢人各一人掌安徽所屬刑名兼鑲紅旗文移關白之事雍正十二年以江南司析置設官如今額江西清吏司郎中滿洲漢人各一人員外郎滿洲漢人各一人主事滿洲漢人各一人掌江西所屬刑名兼正黃旗中城御史文移關白之事福建清吏司郎中滿洲漢人各一人員外郎滿洲漢人各一人主事滿洲漢人各一人掌福建所屬刑名兼户部户科倉場衙門左右兩翼鑲藍旗文移關白之事浙江清吏司郎中滿洲漢人各一人員外郎滿洲一人漢人二人主事滿洲漢人各一人掌浙江所屬刑名及都察院刑科南城御史文移關白之事兼司本部條奏彚題及各司爰書駮正者㑹其成比年一奏湖廣清吏司郎中滿洲一人漢人二人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌湖北湖南所屬刑名河南清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌河南所屬刑名兼禮部禮科太常寺光祿寺鴻臚寺國子監欽天監太醫院東城御史正紅旗文移關白之事凡夏令熱審則布告各司頒行天下欽恤如制山東清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌山東所屬刑名兼兵部兵科太僕寺文移關白之事凡步軍營捕獲盜窩嵗登其數請叙山西清吏司郎中滿洲漢人各一人員外郎滿洲漢人各一人主事䝉古一人漢人一人掌山西及八旗遊牧察哈爾右翼正黃西半旗正紅鑲紅鑲藍三旗定邉左副將軍綏逺城將軍歸化城副都統科布多大臣庫倫大臣所屬刑名兼軍機處內閣翰林院詹事府起居注館內務府上駟院武偹院鑲白旗北城御史文移關白之事陜西清吏司郎中滿洲一人漢人二人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌陜西甘肅及伊犁烏魯木齊塔爾巴哈台葉爾羌哈什噶爾烏什阿爾蘇庫車土爾畨哈爾沙爾和闐哈密所屬刑名兼大理寺西城御史文移關白之事並稽覆囚糧出納俾無侵冒四川清吏司郎中滿洲漢人各一人員外郎滿洲漢人各一人主事滿洲漢人各一人掌四川所屬刑名兼工部工科文移關白之事秋審則㑹九卿詹事科道於朝房以定爰書廣東清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌廣東所屬刑名兼鑾儀衛正白旗文移關白之事廣西清吏司郎中滿洲漢人各一人員外郎滿洲漢人各一人主事滿洲漢人各一人掌廣西所屬刑名兼通政使司文移關白之事及以時散給囚衣朝審則㑹九卿詹事科道於朝房以定爰書雲南清吏司郎中滿洲漢人各一人員外郎滿洲漢人各一人主事滿洲漢人各一人掌雲南所屬刑名兼廂黃旗文移關白之事貴州清吏司郎中滿洲漢人各一人員外郎滿洲漢人各一人主事滿洲漢人各一人掌貴州所屬刑名兼吏部吏科正藍旗文移關白之事督捕清吏司郎中滿洲漢人各一人員外郎滿洲一人主事滿洲漢人各一人掌八旗及各省駐防逃人之事初𨽻兵部督捕衙門康熙三十八年始以督捕前後司及督捕廳改𨽻刑部雍正十二年罷督捕前司及督捕􅈦併其事於後司仍省後字但曰督捕司堂主事滿洲五人漢軍一人掌文案者滿洲二人掌章奏者滿洲三人漢軍一人俱順治元年定額司務􅈦司務滿洲漢人各一人順治元年定額掌巡察出入約束胥𨽻凡直省解囚投文登其數給以批回訟者收其狀呈堂分司聽之筆帖式滿洲百有五人䝉古四人漢軍十有五人滿洲筆帖式初置九十六人後增置九人䝉古筆帖式乾隆二年置漢軍筆帖式初置十有九人後省四人俱分𨽻各司視事之繁簡以為額職事見吏部篇提牢主事滿洲漢人各一人北所司獄滿洲二人漢軍漢人各一人南所司獄滿洲二人漢軍漢人各一人從九品主事掌稽核罪囚於額外及試俸主事內掄選引見補充嵗周更代咨吏部議叙司獄分掌南北監禁督禁卒更夫書夜巡警凌虐需索者問如法順治元年置漢軍漢人司獄四人康熙五十一年增置滿洲司獄四人三年而代咨吏部叙升如例又置官醫二人分𨽻南北所以療囚之疾病贓罰庫司庫滿洲一人庫使滿洲二人掌收見審贓罰銀錢㑹其數以送户部順治元年置額律例館總裁無定員提調官一人纂修官四人收掌官四人翻譯官四人謄録官六人掌修明法令刋定條式隨時審訂以詔有司設館西長安門外總裁以本部尚書侍郎兼之提調纂修官以本部司員充收掌翻譯謄録官以本部筆帖式充凡嵗五周則彚輯而排次之謂之小修比十年乃重編新格增損刪定勒為憲典頒行天下謂之大修皆月給餐錢期年而畢初順治二年特置律例館敕修律官撰定律書四年書成名曰大清律集解附例其後次第刋修皆特簡王大臣為總裁以各部院通習法律者為提調纂修等官凡額設十有八人乾隆七年始以其館併𨽻刑部復改定員額如今制焉謹案定制録直省獄囚曰秋審録刑部獄囚曰朝審嵗以八月刑部㑹九卿詹事科道於天安門外金水橋西公閲其爰書而核定之初以四川廣西兩司分掌案牘雍正十二年始别選司屬滿洲漢人各二員主其事曰總辦秋審處尋佐以協辨者四員嵗滿則交替乾隆十九年以後凡核直省審冊辨實緩矜疑之當否以白於長官皆以總辦司員任之先後增至十六人學習者無定員其職雖出堂官掄𣲖而専司秋讞所繫綦重謹識於此厯代建置三代尚書舜典帝曰臯陶蠻夷猾夏冦賊姦宄汝作士五刑有服五服三就五流有宅五宅三居惟明克允謹案虞廷以皋陶為士孔𨽻達謂即周禮之士師鄭康成云士察也主察獄訟之事三代刑名其源蓋本於此然考漢書胡建傳引黃帝李法蘇林曰獄官名也顔師古曰李者法官之號總主征代刑獄之事是其官已起於黃帝時故孔安國傳以士為理官鄭康成禮記月今注則云有虞氏曰士夏曰大理周曰大司冦雖稱名不同其實一也自周官既廢秦漢乃専置廷尉大理以主刑獄至隋唐復設刑部以當周司冦之職而大理仍並置不廢其職名遂分為二矣今以周秋官之屬及厯代尚書諸曹繫諸刑部表內而理官沿革則别載入大理寺篇名實相承庶有條而不紊焉孔𨽻違禮記疏鄭注大傳夏書所謂六卿有作士謹案尚書言汝作士者乃指臯陶為士師之官與上文伯禹作司空汝作司徒同義並非以作士兩字為官名王莽妄引經義改大理曰作士水衡都尉曰朕虞殆於不識句讀康成乃以亡新官號傅㑹夏官此漢人說經之陋不足據也尚書洪範三八政六曰司冦禮記曲禮天子之五官曰司冦鄭康成注此殷時制也謹案箕子陳禹九疇而稱司冦之官此可考見夏殷之制實有此職曲禮鄭注所云並非鑿空矣尚書周官司冦掌邦禁詰姦慝刑暴亂春秋左氏傳昔周克商使諸侯撫封蘇忿生以溫為司寇春秋左氏傳康叔為司冦孔安國書傳司冦第五衛侯為之尚書序吕命穆王訓夏贖刑作吕刑孔安國傳吕侯見命為天子司寇後為甫侯故稱甫刑謹案司冦本李官管子五行篇昔者黃帝得六相而天地治又云春者土師也夏者司徒也秋者司馬也冬者李也蓋李即周之司冦春秋襄三年左氏傳魏絳曰請歸死於司冦荀子曰防淫除邪戮之以五刑使暴悍以變姦邪不作司冦之事也此雖春秋戰國猶存周禮舊名顧其時稱名亦多錯雜吕氏春秋管子復於桓公曰平原廣城車不結軌士不旋踵鼓之三軍之士視死如歸臣不若王子城父請置以為大司馬决獄折中不殺不辜不誣無罪臣不若弦章請置以為大李注大李治獄官以大李對大司馬則大李之為大司冦明矣淮南子天文訓何謂五官東方為由南方為司馬西方為理北方為司空中央為都南方既為司馬北方既為司空則西方之理即為司冦明矣其以理為司冦與吕覽同皆舉三代以前之官名周官也至商子慎法篇天子置三法官殿中置一法官御史置一法官及吏丞相置一法官所謂殿中置一法官不知何官其云殿中則又與司冦職掌不合至司冦於周為秋官而管子五行篇以司馬為秋官李為冬官均異周制百家殊說不合經典姑識於此以偹𠫭考焉周禮秋官刑官之屬大司冦卿一人小司冦中大夫二人士師下大夫四人鄉士上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人遂士中士十有二人府六人史十有二人胥十有二人徒百有二十人縣士中士三十有二人府八人史十有六人胥十有六人徒百有六十人方士中士十有六人府八人史有十六人胥十有六人徒百有六十人訝士中士八人府四人史八人胥八人徒八十人司刑中士二人府一人史二人胥二人徒二十人司刺下士二人府一人史二人徒四人司厲下士二人史一人徒十有二人司圜中士六人下士十有二人府三人史六人胥十有六人徒百有六十人掌囚下士十有二人府六人史十有二人徒百有二十人掌戮下士二人史一人徒十有二人司𨽻中士二人下士十有二人府五人史十人胥二十人徒二百人大司寇之職掌建邦之三典以佐王刑邦國詰四方以五刑糾萬民凡諸侯之獄訟以邦典定之凡卿大夫之獄訟以邦法斷之凡庶民之獄訟以邦成弊之小司冦之職以五刑聽萬民之獄訟附於刑用情訊之至於旬乃弊之以八辟麗邦法附刑罰以三刺斷庶民獄訟之中士師之職掌國之五禁之法以左右刑罰察獄訟之辭以詔司冦斷獄弊訟致邦令掌士之八成鄉士掌國中各掌其鄉之民數而糾戒之聽其獄訟察其辭辨其獄訟異其死刑之罪而要之旬而職聽於朝司冦聽之斷其獄弊其訟於朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日刑殺肆之三日若欲免之則王㑹其期遂士掌四郊聽其獄訟二旬而職聽於朝縣士掌野聽其獄訟三旬而職聽於朝方士掌都家聽其獄訟之辭三月而上獄訟於國訝士掌四方之獄訟諭罪刑於邦國四方有亂獄則往而成之司刑掌五刑之法以麗萬民之罪司刺掌三刺三宥三赦之法以贊司冦聽獄訟司厲掌盜賊之任器貨賄辨其物皆有數量賈而楬之入於司兵其奴男子入於罪𨽻女子入於舂槀司圜掌收教罷民掌囚掌收盜賊掌戮掌斬殺賊諜而搏之凡殺其親者焚之殺王之親者辜之凡殺人者踣諸市肆之三日刑盜於市凡罪之麗於法者亦如之司𨽻掌五𨽻之法辨其物而掌其政令謹案周禮諸官列職紛繁以今六部之制相凖不能一一吻合惟秋官専掌獄訟自士師以迄司𨽻皆理刑之官故與今刑部職掌相符者為最多如士師為士官之長而其下有鄉士以主六鄉之獄有遂士以主六遂之獄有縣士以掌外野之獄有方士以掌都家之獄有訝士以掌四方諸侯之獄皆隨地設官以治之今之按省分司以治庶獄者正同此意至司刑司刺掌五刑三刺之法以詔司寇則如今之律例館秋審處司圜掌囚掌戮則如今之提牢廳司獄司而司𨽻掌五𨽻司厲掌罪𨽻即唐宋都官郎中員外郎所自出雖其職已散入各司然亦刑部所有事也惟唐宋司門郎中員外専掌門關往來之籍賦唐六典以地官司門之職當之自明以來其職事併入户兵二部久不𨽻於刑部今仍載司門一曹以存沿革而不復逺溯周制用符其實云唐六典刑部尚書周之秋官卿也侍郎周之秋官小司冦中大夫也周禮大司冦屬官有士師下大夫蓋郎中之任也有司厲下士蓋郎官員外郎之任也漢杜佑通典漢成帝時尚書初置二千石曹主郡國二千石又置三公曹主斷獄後漢光武改三公曹主嵗盡考課諸州郡政二千石曹掌中都官水火盜賊詞訟罪法亦謂之賊曹重於諸曹華談集尚書二曹論曰劉道貞謂漢氏重賊曹為是吳晉重吏部為非薛君曰君何是古而非今劉難曰賊曹職典刑獄刑獄難精是以欲重之答曰今之賊曹不能聽聲觀色以别真僞縣不能斷讞之尚書也夫在獄者率小人在朝者率君子小人易檢君子難精俱不得已吏部冝重賊曹宜輕也冊府元龜漢有大獄則令雜治如王嘉致都船詔獄使將軍以下與二千石雜治之類也其次即令就問如廷尉請捕衡山王遣中尉大行即問之類也其當罪又令雜議如淮南王所犯不軌承相御史宗正廷尉雜奏又詔列侯吏二千石議是也漢書百官公卿表宗正有都司空令丞如淳曰主罪人少府有若盧令丞如淳曰漢儀注有若盧獄令中尉有都船令丞如淳曰漢儀注有都船獄令後漢書和帝本紀永元九年復置若盧獄官謹案漢書宣帝紀遣使者分條中都官獄師古曰中都官凡京師諸官府也後漢志稱孝武帝以下置中都官獄二十六所各令長名今以紀傳􅜊之其可考見者如宗正所屬有都司空獄竇嬰傳劾繫都司空伍被傳僞為左右都司空詔獄書內官獄東方朔傳獄繫內官少府所屬有導官獄張湯傳其弟繫導官師古曰或權寄在此非本獄所若盧獄李賢後漢書注若盧獄主鞫將相大臣考工獄劉輔傳繫共工獄蘇林曰考工也居室獄灌夫傅繫居室後故保宫李陵母繫保宫是也掖庭獄師古曰漢舊儀掖庭詔獄令丞宦者為之暴室獄師古曰暴室職務既多因為置獄主治罪人故往往云暴室獄然非獄名中尉所屬有都船獄說見後鴻臚所屬有别火獄如淳曰漢儀注有别火獄今郡邸獄師古曰漢舊儀郡邸獄治天下郡國上計者屬大鴻臚當時皆謂之詔獄各置令丞等官其罪人就繫者則謂之中都官囚徒劉屈氂𫝊發長安中都官囚徒而廷尉専掌刑法獨不聞有獄官考王嘉傳嘉得罪有詔假謁者節召丞相詣廷尉詔獄嘉隨使者詣廷尉廷尉收嘉丞相新甫侯印綬縛嘉載盡都船詔獄是嘉當下廷尉詔獄而廷尉乃縛送都船足知當日中都官諸獄皆以繫廷尉罪人故本署轉無専獄薛宣傳載宣為廷尉書佐都船獄吏亦可見諸獄皆屬廷尉故吏職得互相遷補也後漢惟廷尉及雒陽有獄而和帝復置若盧獄官不言所屬考安帝紀永初二年皇太后幸雒陽寺及若盧獄録囚徒賜河南尹廷尉卿及官屬有差雒陽屬河南則若盧亦當屬廷尉矣今廷尉沿革雖己别載大理寺表而獄制専𨽻刑部故取都司空若盧都船三令丞繫之於此以著提牢司獄設官之權輿又二千石曹初主郡國二千石三公曹後故主考課今據其職掌亦互見吏部表內云三國鄭樵通志魏青龍二年置都官郎掌刑法獄訟之事冊府元龜魏置定科郎主定法令法官郎主軍事刑獄定科又作定課太平御覽何貞奏許都賦明帝竒之擢為都官郎中晉書職官志魏尚書有二千石郎孫逢吉職官分紀魏尚書郎有比部謹案前代法令之書在漢以後有二曰律令諸家漢書注所引有漢律又有令甲令乙令丙杜周傳云前主所是著為律後主所是疏為令是也在唐有四曰律令格式新唐書刑法志謂令者尊卑貴賤之等數國家之制度格者百官有司所常行之事式者具所常守之法凡邦國之政必從事於此三者其有所違及人之為惡而入於罪戾者一斷以律是也在宋亦有四曰敕令格式乃沿唐之舊而自律以外又增敕為四也𠫭稽厥制律為律之正文而敕令格式則如今各部院衙門之則例厯代統其事於刑曹凡罪人之麗辟及職官之案劾者皆據此平决蓋今刑部之議罪與吏兵二部之議處其職掌本同在法官晉書刑法志載裴頠奏有尚書免皆在法外刑書之文有限舛違之故無方故有臨時議處今案牘承用之議處二字其源實始於此之文誠不能皆得循常云云此罰至罷免亦由刑官議處之明證隋唐始於吏部置考功一曹而所司惟考績黜陟之令其他論劾仍不與焉唐六典稱九品已上犯除免官者大理詳而質之以上刑部是其事尚在法官至明以內外彈章付之考功定擬武官功過亦歸武選於是官司過失至革職以下者其核議之事乃悉屬吏兵二部而不在法司矣今以定科刪定兩郎専掌修定法令隋志載陳沈洙以議獄不同請牒送刪定曹詳改前制即如今之纂入則例實兼有今刑部律例館吏兵二部則例館之任故既載入吏部篇而仍互見於此至比部郎起自曹魏而唐以後則専司勾覆倉庫出納百官俸料乃如今户科給事中及江南道御史之磨勘注銷並不預刑名之事其職久與刑部無涉顧炎武日知録云周禮小司冦三年大比則受邦國之比要注大比謂使天下更簡閲民數及其財物也唐時刑部有刑比都官司門四曹唐書職官志比部掌周知內外之經費而總勾之楊炎傳天下財賦皆納左藏庫尚書比部履其出入宋史職官志比部掌勾覆中外帳籍考其陷失而理其侵負山堂考索㑹計逋缺每三月一比謂之比部故昔人有刑罰與賦斂相為表裏之說今四曹改為十三司而財計之不關刑部久矣乃猶稱郎官為比部何耶炎武之說誠為詳核然考宋隋二志皆稱比部主法制則比字當亦取律例相比况之義如漢志所云决事比者蓋自唐以後始失其職耳今以厯代皆屬刑部故仍繫之於表而具論其職掌之不同者如右晉通典晉復置三公尚書掌刑獄唐六典晉太康中省三公尚書以吏部尚書兼掌刑獄晉書職官志晉受命置三公比部都官二千石曹郎宋書百官志晉西朝則有三公比部都官曹郎謝維新合璧事類魏有定科郎晉賈充定律令以裴楷為之謹案晉書職官志稱武帝罷定課郎即定科郎而謝維新乃謂晉時裴楷為之頗不相合今考楷本傳其為定科郎尚在魏世至晉初定律令時則楷已為散騎侍郎維新誤以為晉事蓋失於詳檢也唐六典晉令有獄左右丞各一人宋宋書百官志宋髙祖初增都官尚書太祖元嘉十八年增刪定曹郎蓋魏世之定科郎也吏部尚書領刪定三公比部曹都官尚書領都官曹比部主法制都官主軍事刑獄通典宋三公比部皆主法制南齊書百官志吏部尚書領刪定三公比部曹都官尚書領都官曹隋書百官志梁尚書省置都官尚書刪定三公比部都官等郎陳承梁皆循其制官唐六典宋齊並以三公郎曹掌刑獄置郎中一人梁陳因為侍郎梁陳又置獄丞二人第七品謹案三公曹後漢雖改主考課而自晉以迄南北朝則仍為主刑獄之官其屬之吏部者蓋以太康省三公尚書以吏部尚書兼掌刑法故三公曹郎亦歸其統轄也至二千石郎晉南渡後已罷不置史亦不詳其職掌而當時去漢未逺建置當必相同今並繫之於表云北魏通典後魏亦有都官尚書唐六典獄丞後魏亦二人魏書官氏志獄掾從第七品下謹案後漢惟和帝置有若盧獄官而廷尉雒陽縣獄官皆不見於史唐六典始載晉置獄丞梁陳因之魏書亦載魏置獄掾為從七品其後厯代多設是官屬於廷尉蓋當時六曹未有定制廷尉尚當秋官之職故也今大理寺已不置獄前代所為廷尉獄官其職久已歸入刑部故析繫於此以偹提牢司獄之沿革焉北齊隋書百官志後齊置都官尚書統都官掌畿內非違得失事二千石掌畿外得失等事比部掌詔書律令勾檢等事曹都官二千石比部各量事置掌故主事員唐六典三公郎曹掌刑獄北齊置郎中二人通志北齊有三公曹掌諸曹囚帳斷罪赦日建金雞等事屬殿中尚書冊府元龜北齊獄丞掾各二人後周通典後周官品正七命大司冦正六命小司冦上大夫正五命秋官刑部中大夫正四命秋官小刑部司𨽻等下大夫正三命秋官小刑部司刺鄉法遂法稍法縣法畿法小司𨽻等上士正二命秋官司刺鄉法逐法稍法縣法畿法掌囚司厲掌罪𨽻掌夷𨽻掌蠻𨽻掌戎𨽻掌狄𨽻掌徒等中士正一命秋官小刑部掌囚司厲掌夷𨽻掌蠻𨽻掌戎𨽻掌狄𨽻掌徒等下士冊府元龜後周刑部中大夫掌五刑之法附萬民之罪馬端臨文獻通考後周有司𨽻下大夫掌五𨽻及徒者捕盜賊囚執之事謹案周官司𨽻掌五𨽻之法本主罪人自漢武帝襲其名置司𨽻校尉使持節從中都官徒千二百人捕巫蠱督大姦猾後又令察三輔三河𢎞農乃全與周制不合今按其職掌已别繫之步軍統領衙門表內惟後周所置依仿周官復掌罪徒與漢魏以下司𨽻之職又殊故仍載入刑部沿革焉隋隋書百官志髙祖受命置都官尚書統都官侍郎二人刑部比部侍郎各一人司門侍郎一人尋改都官尚書為刑部尚書煬帝即位六曹各置侍郎一人以二尚書之職諸曹侍郎並改為郎又改刑部為憲部郎以異侍郎之名通典隋初有都官尚書開皇三年改都官為刑部亦因後周之名唐六典隋置獄掾八人謹案今刑部之名肇於後周定於隋世厯代相沿未之有改溯其本始即南北朝之都官尚書也但考列史所載都官一曹自魏晉以後皆掌京師及畿外得失非違等事頗似漢之司𨽻而並無斷獄議罪之責故六典以為非唐時都官之任推原其故蓋由魏晉諸朝尚書各曹尚不依六官分職故刑名政令自大理以外八座則以三公吏部尚書主之郎官則以三公郎中主之而或領於吏部或領於殿中𨽻屬𠫭差本無定制隋文帝改都官尚書為刑部而省三公郎不設於是三公舊職遂悉歸於刑部曹又以都官郎改掌簿録配沒官私奴婢并良賤訴競俘囚之事弼教之任自是始専之刑部矣今以刑部出自都官建置相因源流有在故仍繫之於表而附著其異同於此唐新唐書百官志刑部尚書一人正三品侍郎一人正四品下掌律令刑法徒𨽻按覆讞禁之政其屬有四一曰刑部二曰都官三曰比部四曰司門刑部郎中員外郎掌律法按覆大理及天下奏讞為尚書侍郎之二凡刑法之書有四一曰律二曰令三曰格四曰式凡鞫大獄以尚書與御史中丞大理卿為三司使凡國有大赦集囚徒於闕下以聽都官郎中員外郎掌俘𨽻簿録給衣糧醫藥而理其訴免比部郎中員外郎掌勾㑹內外賦斂經費俸祿公廨勳賜贓贖徒役課程逋缺之物及軍資械器和糴屯收所入京師倉庫三月一比諸司諸使京都四時勾㑹於尚書省以後季勾前季諸州則嵗終總勾焉司門郎中員外郎掌門關出入之籍及闌遺之物謹案今制以刑部都察院大理寺為三法司其名始自明代而實昉於唐之三司使其時有大獄則以刑部御史臺大理寺為三司使以鞫之謂之大三司使見合璧事類若三司所按非其長官則侍御史與刑部郎中員外郎大理司直評事往訊之謂之小三司使見唐職林今凡刑部重辟囚先以御史大理左右寺官㑹刑曹察其辭辨其死刑之罪而要之曰㑹小三法司及致辭於長官都御史大理卿乃詣刑部與尚書侍郎㑹聽之各麗其法以議獄曰㑹大三法司蓋即其遺意也唐自中葉以後史傳所紀獄事多云三司按鞫皆指臺省寺三官而言唐六典又云三司謂御史大夫中書門下與史不符此殆開元以前之初制新唐書刑法志肅宗時陳希烈等獄以三司使劾治而通鑑所載乃御史大夫崔器禮部尚書李峴兵部侍郎吕諲為之亦不及刑部大理則以峴等本出西臺遷官以後仍令領三司之事耳又案魏文帝黃初六年收鮑勛付廷尉廷尉法議正刑五嵗三官駮依律罰金胡三省通鑑注三官廷尉正監平也冊府元龜梁置建康縣獄三官以尚書郎為之冠服同廷尉三官元㑹廷尉三官與建康三官皆法冠皂衣朝服以監東西中華門據此則執法之官以三為數其來已久又不僅始自唐時矣舊唐書職官志龍朔二年改刑部為司刑都官為司僕比部為司計尚書為太常伯侍郎為少常伯郎中為大夫咸亨元年依舊光宅元年改刑部為秋官垂拱三年加秋官侍郎一員神龍元年詔官名並依永淳以前故事天寶十一載改刑部為憲部比部為司計至德二載仍舊謹案天寶中改刑部為憲部凡行內諸司之稱部者並改之以避六部之名舊唐志所載甚詳新唐志乃謂改刑部為司憲是誤以龍朔所改御史大夫之名屬之刑部非也唐六典刑部主事四人令史十九人書令史三十八人亭長六人掌固十人都官主事二人令史九人書令史十二人掌固四人比部主事四人令史十四人書令史二十七人計史一人掌固四人司門主事二人令史六人書令史十三人掌固四人獄丞四人從九品下以流外入仕者為之舊唐書嚴郢列傳郢兼御史中丞御史臺奏天下斷獄自徒以下結竟者並徙置邉州郢駮奏請下刪定使詳覆然後施行從之謹案刪定使之名職官志不載僅見於此蓋因纂集律令隨時所置之官猶今之律例館總裁也五季五代㑹要後唐長興二年八月二十九日敕刑部大理寺冝各置法直官兩人仍召曉法令者充晉天福三年三月詳定院奏前守晉州洪洞縣主簿盧粲進䇿伏以刑獄至重朝廷所難尚書省分職六司天下謂之㑹府諸道决疑若關人命即刑部不合不知欲請諸州府凡斷大辟罪人訖逐季將有無申報刑部仍具録案欵事節并本判官馬步都虞候司法𠫭軍法直官馬步使判官名銜申聞或有案內情由不圓刑部請行勘覆從之謹案盧粲進䇿請諸州府斷大辟罪人申報刑部仍具録案欵事節然則前此諸道州府大辟案欵未嘗申報刑部矣唐刑部郎中員外郎掌集天下奏讞而五代時州府大辟案欵至不申刑部於此見五代之廢弛也冊府元龜後唐同光二年刑部尚書盧質長興二年刑部郎中周知微四年刑部侍郎任贊晉天福元年刑部郎中鄭觀六年刑部員外郎李象周廣順元年刑部員外郎曹匪躬謹案五季官制史志不詳今據冊府元龜所載略採一二以見刑曹建置亦多仍唐舊也冊府元龜又載後唐同光元年御史臺奏當司刑部大理寺本朝法書自朱溫刪改今見在三司收貯刑書並是僞廷之制云云周顯德五年中書門下奏三司臨時條法望令刪集送中書門下詳議聞奏云云是五季亦以刑部御史臺大理寺為三司並同唐制矣宋宋史職官志刑部掌刑法獄訟奏讞赦宥叙復之事凡斷獄本於律律所不該以敕令格式定之禁於未然之謂令施於已然之謂敕設於此而使彼至之之謂格設於此而使彼效之之謂式皆閲其案狀傅例擬進其屬三曰都官曰比部曰司門設官十有一尚書一人侍郎二人郎中員外郎刑部各二人都官比部司門各一人國初以刑部覆大辟案淳化二年增置審刑院知院事一人以郎官以上至兩省充詳議官以京朝官充掌詳讞大理所斷案牘而奏之大中祥符二年置糾察刑獄司糾察官二人以兩制以上充凡在京刑禁徒以上即時以報若理有未盡或置淹恤追覆其案詳正而駮奏之凡大辟皆録問元豐三年八月詔省審刑院歸刑部以知院官判刑部掌詳議詳覆司事刑部主判官為同判刑部掌詳斷司事審刑議官為刑部詳議官官制行悉罷歸刑部元祐元年省比部郎官一員以都官兼司門五月三省言舊制糾察在京刑獄以察違慢自罷歸刑部無復申明糾舉之制請以御史臺刑察兼領其御史臺刑獄今尚書省右司糾察從之紹聖元年詔都官司門互置郎官一員崇寧二年十二月詔刑部尚書通治左右曹侍郎一治左曹一治右曹如獨員即通治尚書掌天下刑獄之政令凡麗于法者審其輕重平其枉直而侍郎為之二應定奪審覆除雪叙復移放則尚書専領之制勘體量奏讞糾察録問則長二治之而郎中員外郎分掌其事有司更定條法則覆議其當否凡聼訟獄或輕重失中有能駮正詔其賞罰若頒赦宥則糾官吏之稽違者分案十二置吏五十有二紹興後分案十二裁减吏額置三十五人侍郎南渡長二互置隆興常置一員淳熙十六年依崇寧専法奏獄及法令事請大理寺官赴部共議之用侍郎吳博古之說也郎中員外郎分左右􅈦掌詳覆叙雪之事建炎三年刑部郎中以二員為額關掌職事初無分異紹興二十六年詔依元豐舊法分􅈦治事先是右司汪應辰言刑部郎官分為左右左以詳覆右以叙雪同僚異事祖宗有深意倘初無分異則有不當於理者孰為追改乞遵用舊制要使官各有守人各有見參而用之以稱欽恤之意從之仍令今後倣此都官郎中員外郎掌徒流配𨽻凡天下役人與在京百司吏職皆有籍以考其役放及增損廢置之數分案四置吏十有八建炎三年詔比部兼司門隆興元年詔都官比部共置一員自此都官兼比部司門之事分案五裁减吏額置十二人淳熙十三年减三人比部郎中員外郎掌勾覆中外帳籍凡場務倉庫出納在官之物皆月計季考嵗㑹從所𨽻監司檢察以上比部至則審覆其多寡登耗之數有陷失則理納鈎考百司經費有隱昧則㑹問同否而理其侵負舊帳案𨽻三司熙寧五年置提舉帳司選人吏二百人驅磨天下帳籍并選官吏審覆七年二月詔帳司每嵗具天下財用日出入數以聞元豐初年詔諸路財賦出入自今三年一供著為令官制行釐其事歸比部元祐元年七月用司馬光奏悉總於户部三年釐正倉部勾覆理缺憑由案及印發鈔引事歸比部分案五置吏百有一建炎以後或都官兼比部司門之事司門郎中員外郎掌門關津梁道路之禁令及其廢置移復之事應官吏軍民商販譏察其冒僞違縱者凡諸門啓閉之節及關梁餘禁以時舉行分案二置吏五謹案宋制獄囚皆繫開封府司録司及左右軍巡三院蓋如今之順天府及五城司坊官法司僅平其讞牘未嘗置獄至熙寧九年神宗始命置大理獄而史志並無管獄之官疑即以司直主簿兼其任也至比部自唐宋而後専掌勾稽中外帳籍如令注銷錢糧職之並不關涉刑名說己具前然考李心傳建炎以來朝野雜記謂官禁嵗取金銀錢帛率以百萬計雖有嵗終比部驅磨之令然郎官第赴內東門司終日危坐而數璫自為㑹計郎官不得預畢事乃卷牘尾示之俾書名而已據此則比部未嘗能舉其職亦可以見當時冗濫之弊矣章俊卿山堂考索敕令所宋差牢臣提舉詳定官以侍從之通法令者充刪定官於職事官內差兼王闢之澠水燕談録祥符二年以京獄訟之繁懼有寃滯始置糾察在京刑獄司以省寃濫命知制詰周起侍御史趙湘為之凡在京師刑獄御史開封府皆得糾之起慮抑屈者不能盡知乞許今糾察陳狀從之但不鞫獄太宗慎刑罰淳化二年始置審刑院以覆大理奏案以近臣一人知院事設詳議六人擇京朝曉律常任法寺官者為之每奏一人從知院上殿得得賜緋故士大夫以審刑為朝官染院江休復鄰幾雜志審刑奏案貼黃上更加撮白撮白上復有貼黃謹案百官志元豐官制行審刑詳議糾察悉罷歸刑部即所謂刑部郎中員外分左右廳左主詳覆右主叙雪之職也遼遼史百官志伊勒希巴滿洲語伊勒希副也巴處所也原作夷離畢今改正院掌刑獄伊勒希巴左伊勒希巴右伊勒希巴知左伊勒希巴事知右伊勒希巴事敞吏選底掌獄謹案遼世刑獄主之伊勒希巴考遼史刑法志載道宗清寧四年詔左伊勒希巴曰外路死刑雖己欵伏仍令附近官司覆問有寃者即具以聞可見諸路獄訟皆歸决遣其職實如今之刑部至其時南面官僚內尚書六部多依唐典建置刑部長二亦必偹官然以史證之惟大理寺所掌較重故大理卿少如耶律儼劉伸之屬史皆稱其治獄詳允而刑部除授紀傳多未之及殆以其僅存空名故略而不載歟金金史百官志刑部尚書一員正三品侍郎一員正四品郎中一員從五品員外郎二員從六品一員掌律令格式審定刑名關津譏察赦詔勘鞫追徴給沒等事一員掌監户官户配𨽻訴良賤城門啓閉官吏改正功賞捕亡等事主事二員從七品令史五十一人內女直二十二人譯史五人通事二人架閣庫管勾一員正八品掌刑工兩部架閣大安二年以主事各兼同管勾一員從八品獄丞一員從九品屬御史臺元元史百官志刑部尚書三員正三品侍郎二員正四品郎中二員從五品員外郎二員從六品掌天下刑名法律之政令凡大辟之案覆繫囚之詳讞拏收産沒之籍捕獲功賞之式寃訟疑罪之辨獄具之制度律令之擬議悉以任之世祖中統元年以兵刑工為右三部置尚書二員侍郎二員郎中五員員外郎五員以郎中員外郎各二員專署刑部至元元年析置工部而兵刑仍為一部尚書四員侍郎仍一員郎中四員員外郎置五員三年復為右三部七年始别置刑部尚書一員侍郎一員郎中一員員外郎二員八年改為兵刑部十三年又為刑部二十三年六部尚書侍郎郎中員外郎定以二員為額大德四年尚書增置一員其首領官則主事三員吏屬則䝉古筆且齊解見吏部篇四人令史三十人回回令史二人克埒穆爾齊解見吏部篇一人知印二人奏差十人書寫三人典吏七人司獄司司獄一員正八品獄丞一員正九品獄典一人初以右三部照磨兼刑部繫獄之任大德七年始置専官部醫一人掌調視病囚司籍所提領一員同提領一員至元二十年改大都等路斷沒提領所為司籍所𨽻刑部謹案周禮秋官職金掌受士之金罰貨罰孔頴逹疏謂斷獄訟者有疑即使出贖既言金罰又曰貨罰者出罰之家或時無金即出貨以當直也蓋職金主受贖鍰故屬於司冦當為今刑部贓罰庫所自出特其職於金玉錫石丹青之政令本無所不掌非特罰贖一事與今顔料庫尤為相合今己専繫之户部三庫篇內不復列於此表至自漢以後贖金所入未見専司唐六典載侍御史之職有六其五曰贓贖李林甫注謂以年深之次者一人知西推贓贖事則以憲官兼之宋志載大理寺右治獄分四案其一曰左右寺案掌斷訖公事案後收理追贓等則又為吏人所掌初無定式惟元代司籍所雖主斷沒之籍不止贓贖而𨽻屬刑部猶得秋官職金遺意視今制之贓罰庫差為近之云富大用事文類聚大元刑部掌律令格式審定刑名奴婢配𨽻關津譏察城門啓閉之事置令史分掌名頭無専曹官明明史職官志刑部尚書一人正二品左右侍郎各一人正三品其屬司務廳司務二人從九品浙江江西湖廣陜西廣東山東福建河南山西四川貴州雲南十三清吏司各郎中一人正五品員外郎一人從五品主事二人正六品正統六年十三司俱增設主事一人成化元年增設四川廣西二司主事各一人後革萬厯中又革湖廣陜西山東福建四司主事各一人照磨所照磨正八品檢校正九品各一人司獄司司獄六人從九品尚書掌天下刑名及徒𨽻勾覆關禁之政令侍郎佐之十三司各掌其分職及兼領所分京府直𨽻之刑名照磨檢校照刷文卷計録贓贖司獄率獄吏典囚徒凡軍民官吏及宗室勳戚𨽻於法者詰其辭察其情僞傅律例而比議其罪之輕重以請詔獄必據爰書不得逢迎上意凡有殊㫖别敕詔例榜例非經請議著為令甲者不得引比凡死刑即决及秋後決竝三覆奏兩京十三布政司死罪囚嵗讞平之五嵗請敕遣官審録寃滯霜降録重囚㑹五府九卿科道官共録之矜疑者戍邉有詞者調所司再問比律者監候夏月熱審免笞刑減徒流出輕繫遇嵗旱特㫖録囚亦如之凡大祭止刑凡贖罪視罪輕重斬絞雜犯徒未減者聽收贖詞訴必自下而上有事重而迫者許擊登聞鼓四方有大獄則受命往鞫之四方决囚遣司官二人往涖凡斷獄嵗疏其名數以聞曰嵗報月上其拘釋存亡之數曰月報獄成移大理寺覆審必期平允凡提牢月更主事一人修葺囹圄嚴固扄鑰省其酷濫給其衣糧囚病許家人入視脫械鎖醫藥之簿録俘囚配沒官私奴婢咸籍知之官吏有過並紀録之嵗終請湔滌之以名例攝科條以八字括辭議以准皆各其及即若以五服參情法以墨涅識盜賊籍産不入塋墓籍財不入支度宗人不即市宫人不即獄悼耄疲癃不即訊洪武元年置刑部六年增尚書侍郎各一人設總部比部都官部司門部部設郎中員外郎各二人惟都官各一人總部比部主事各六人都官司門主事各四人八年以部事浩繁增設四科科設尚書侍郎郎中各一人員外郎二人主事五人十三年設尚書一人侍郎一人仍分四屬部部設郎中員外郎各一人總部比部主事各四人都官司門主事各二人尋增侍郎一人始分左右侍郎二十二年改總部為憲部二十三年分四部為河南北平山東山西陜西浙江江西湖廣廣東廣西四川福建十二部浙江部兼領雲南部各設官如户部之制二十九年改為十二清吏司永樂九年以北平為北京十九年革北京司增置雲南貴州交址三司宣德十年革交址司遂定為十三清吏司謹案明制凡五嵗請敕遣官出京府兩京十三省審録謂之恤刑嵗盡遣主事往關內江南江北涖殺謂之審决國朝順治初尚沿其制􅍲遣三法司堂上官至直𨽻審决十四年改遣司屬康熙五年停止而恤刑郎中員外郎各差亦於康熙初裁省焉又按明一代弊政莫甚於厰衛詔獄以刑名重任寄之武夫宦寺肆情生殺屠僇忠良其惡殆過漢之黃門北寺而履霜有自實起於令內監審獄獄囚俾得以擅作威福史稱成化以後凡大審録太監齎敕張黃蓋於大理寺為三尺壇中坐三法司左右坐御史郎中以下捧牘立唯諾趨走惟謹三法司視成案有所出入輕重俱視中官意不敢少忤以刑餘小豎輒敢凌鑠卿二指揮郎吏竟無一人能與抗爭不獨䙝侮班聯而刑獄之失中其流弊更難究誥我國家明罰敕法慎重邦刑凡秋録大典㑹讞上聞皆親覽要辭宣召大臣再三審核然後麗之於辟權衡至正明允咸孚固非中官所得𠫭决而內監等之給事禁掖者自灑掃使令以外其他亦從未能干預絲毫宫府肅清厯代積弊至今日而祛除實盡矣欽定厯代職官表卷十三
