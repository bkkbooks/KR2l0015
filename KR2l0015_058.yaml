body:
  text: 司道表司道國朝官制承宣布政使司布政司從二品直𨽻山東山西河南江寧蘇州安徽江西福建浙江湖北湖南陜西甘肅四川廣東廣西雲南貴州各一人布政使掌一省之政司錢榖之出納朝廷有德澤禁令承流宣布以達于有司闔省僚屬以時頒其祿俸滿秩廉其稱職不稱職報督撫以達于吏部十年會户版均稅役登民數田數以達于户部凡有大興革及諸政務會議經畫定報于督撫而行之國初每省設承宣布政使司置左右布政使各一人順治十八年分江南布政使司為江蘇安徽各二人康熙二年分陜西布政使司為陕西甘肅各二人三年分湖廣布政使司為湖北湖南各二人六年去左右繫銜每省止設布政使一人初以直𨽻近在畿甸不設藩司以口北守道兼山西布政司銜康熙八年增設直𨽻守道一人總司錢榖雍正二年改為布政使乾隆二十五年分江蘇布政使為江寧蘇州各一人布政使司經厯從六品直𨽻山東山西河南江蘇安徽江西福建浙江湖北陜西四川廣東廣西雲南貴州各一人理問從六品直𨽻江寧蘇州江西浙江湖南陜西雲南各一人都事從七品江南福建各一人照磨從入品山西福建浙江湖北甘肅四川廣東各一人庫大使正八品直𨽻山東山西河南江寧蘇州安徽江西福建浙江湖北湖南陜西甘肅四川廣東廣西雲南貴州各一人倉大使從九品安徽一人經厯掌出納文書理問掌勘核刑名都事掌受發文移照磨掌照刷卷宗庫大使掌司庫藏之出入倉大使掌檢稽倉庾經厯等官員額俱康熙六年定直𨽻員額雍正二年定理問初各布政使俱設惟貴州不置康熙三十八年省福建廣東廣西四川各一人雍正二年又省山東山西河南安徽湖北甘肅各一人乾隆二十五年增設江寧一人都事初置福建河南江西山西布政司各一人康熙三十八年省江西山西二人照磨初各布政司俱置康熙三十八年省山東河南廣西雲南江蘇安徽江西陜西湖南貴州各一人庫大使初置山西三人江南湖廣各二人浙江江西福建山東河南陜西廣東雲南貴州各一人後西山省二人乾隆元年又增置直𨽻甘肅四川各一人二十五年增設江寧一人又初置有各布政司檢校庫副使寶源局大使副使等官後俱省提刑按察使司按察使正三品直𨽻山東山西河南江蘇安徽江西福建浙江湖北湖南陜西甘肅四川廣東廣西雲南貴州各一人按察使掌全省刑名按劾之事振掦風紀澄清吏治大者與藩司會議以聼于部院理合省之驛傳三年大比為監試官大計為考察官秋審為主稿官與布政使稱兩司員額順治間定河南陜西湖廣分省添設與布政使同初直𨽻不設臬司以大名巡道兼河南按察使銜通永天津道俱兼山東按察使銜霸昌井陘道俱兼山西按察使銜康熙八年增設直𨽻巡道一人總理刑名三十八年省井陘道雍正二年改直𨽻巡道為按察使按察使司經厯正七品直𨽻山東山西河南江蘇江西福建浙江湖北陜西四川廣東廣西雲南各一人知事正八品江西一人照磨正九品安徽福建浙江湖南甘肅廣東貴州各一人司獄從九品直𨽻山東山西河南江蘇安徽江西福建浙江湖北湖南陜西四川廣東廣西雲南貴州各一人經厯照磨掌職與布政司屬同知事掌勘察刑名司獄掌管理繫囚經厯等官員額俱康熙六年定直𨽻員額雍正二年定知事初設江西福建山西廣東廣西各一人康熙三十八年裁福建山西廣東廣西各一人照磨初每省一人康熙三十八年裁山東河南江西廣西雲南江蘇陜西山西湖北四川各一人又初置有各省檢校後俱省各道初制參政道從三品副使道正四品參議道從四品僉事道正五品乾隆十八年省去兼銜俱改為正四品直𨽻口北道霸昌道通永道天津道清河道大名道熱河道各一人山東督糧道濟東泰武臨道登萊青道兖沂漕道各一人山西冀寧道河東道雁平道歸綏道各一人河南開歸陳許道糧鹽道南汝光道河北道河陜汝道各一人江南江安糧儲道蘇松糧儲道常鎮通道松太道鹽巡道鳳廬道寧池太廣道各一人浙江督糧道鹽法道寧紹台道溫處道杭嘉湖道金衢嚴道各一人江西督糧道鹽法道廣饒九南道吉南贛寧道各一人福建督糧道鹽法道興泉永道延建邵道汀漳龍道臺灣道各一人湖北督糧道鹽法道荆宜施道安襄鄖道武漢黃德道各一人湖南糧儲道鹽法長寶道衡永郴桂道嶽常澧道辰永沅靖道各一人陜西督糧道鹽法道潼商道漢興道延榆綏道各一人甘肅甘涼道平慶道鞏秦階道蘭州道寧夏道西寧道安肅道鎮迪道各一人四川鹽茶馬道松茂道川東道建昌道永寧道川北道各一人廣東督糧道惠潮嘉道肇羅道雷瓊道南韶連道高亷道各一人廣西蒼梧道左江道右江道各一人雲南糧儲道鹽法道迤西道迤東道迤南道各一人貴州督糧道貴西道古州道各一人分守分巡及糧儲鹽法各道或兼兵備或兼河務或兼水利或兼學政或兼茶馬屯田或以糧鹽兼分巡之事皆掌佐藩臬核官吏課農桑興賢能礪風俗簡軍實固封守以倡所屬而亷察其政治國初設布政司左右參政參議曰守道設按察使副使僉事曰巡道有通轄全省者有分轄三四府州者各以職事設立於要地後因時裁設銜額無定均視其升補之本職為差如由京堂等官補授者為參政道由掌印給事中知府補授者為副使道由科道補授者為參議道由郎中員外主事同知補授者為僉事道守巡皆同乾隆十八年省去參政參議副使僉事等銜定為守巡各道職秩彌昭畫一焉各道庫大使從九品直𨽻山東江西福建浙江湖北湖南雲南各一人江蘇二人倉大使未入流陜西廣東各一人庫倉大使掌各道之庫藏倉庾皆因所掌之事先後設定員額厯代建置謹案監司分職實為方靣之重任劉昭續漢書注引晉太康詔曰二千石専治民之重監司清峻於上吳曾能改齋漫録引晉徐邈與范寧書曰擇公方之人以為監司謂監司之名始此蓋皆指當時刺史言之至于藩臬分職考之于古惟唐轉運觀察諸使為之權輿至宋之轉運使掌經度一路財賦吏蠧民瘼悉條以上達為今布政使之所由始提點刑獄掌察所部獄訟平其曲直及専舉刺官吏之事為今按察司之所由始溯而上之漢代専重郡守其臨郡國之上者惟十三部刺史蓋郡守地大而權重有事得以専達秩至二千石如今之二三品治效著聞則璽書勉勵增秩賜金其高第即入為卿相故朝廷不復多設官以臨制之惟刺史以下大夫而臨二千石職専舉刺八月行部録囚徒考殿最嵗盡入奏所薦得為九卿所劾輒從黜罷是刺史一官固兼有今日司道之任也魏晉以後刺史益重其兼都督帶持節者已如今日之督撫即單車刺史専制一方亦别無大府以臨其上然綜理郡縣而受其成為守令風教之所自出則其司存有由來也隋始罷州惟立總管唐則有採訪按察觀察處置之名轉運租庸度支營田之職兩司分理實啓其概而諸道分巡防禦團練又為守巡兵備之所托始蓋監司之設至是漸廣宋裁藩鎮之權而帥漕憲倉之職始重元立行省藩司之職實寓於參知政事復設肅政亷訪以重提刑之寄明初亦設行省旋改參知政事為承宣布政使其提刑按察使則即宋提點元廉訪之舊職而參政參議副使僉事諸職備焉惟是兩司上氶督撫而復參之以巡按雖倣漢氏刺史之遺意而統蒞為太煩下轄諸道而均繫以藩臬之銜亦未足以専其表率也我朝監古定制兩司諸道各専其職以倡率府縣而歸其成于督撫綱紀肅清酌繁簡而立其中有非前古所可企及者今厯考前史自唐之轉運使觀察使始列於表其前此者如成周之方伯秦之監御史漢以後之刺史職掌相近而品秩較異則並隨條疏證於後以明其同異分合之故而不復列於表焉三代周禮春官大宗伯注鄭司農云長諸侯為方伯謹案布政使稱曰藩司亦稱方伯考周申侯為宣王方伯式是南邦而藩宣咏於周雅蕃即藩也藩司肇名蓋由於此其以承宣繫銜亦本於此惟古之方伯實長諸侯之國即以侯伯之賢者為之非今藩司所可比擬而統臨諸國督率全省與今藩司之表率各府州縣約略相等故敘列其概以稽稱名之故也尚書康誥外事汝陳時臬司師兹殷罰有倫謹案按察使稱為臬司臬法也其語始見於康誥考吕祖謙尚書精義云外事衛國之事康叔為周司冦王朝之官職任內事故以衛國為外事又考孔頴達尚書疏云孟侯五侯之長謂方伯康侯為之即州牧也是康叔以列侯為方伯而康誥一篇於明罰敕法三致意焉蓋實今日方面提刑之所托始而臬司所由稱也厥後吕刑之詰四方一則曰四方司政典獄非爾惟作天牧一則曰官伯族姓其訓戒于四方牧伯尤為惓惓知成周之制九州牧長皆重訓刑之職矣禮記王制天子使其大夫為三監監於方伯之國國三人孔頴達疏謂使在朝之大夫往監於方伯每一州輒三人崔氏云此謂殷之方伯皆有三人以輔之佐其伯謂監所領之諸侯也周則於牧下置二伯謹案今各道為藩臬之佐亦稱監司考王制所稱以大夫而監方伯之國以一國而監者三人其官品尊卑官數多少與今道員約略相合崔氏言三人輔佐方伯以監所領之諸侯明非監方伯也亦與今日各道輔佐藩臬監所領之府州規制相同惟古時未詳分職今則以事區别所掌體制稍殊然國必三人固知各有所司之事特世逺莫詳耳三監之使實為漢唐以來分部分道命始巡察之始而道員為諸侯之副佐是大夫為監者固諸道之權輿也秦漢書百官公卿表監御史秦官掌監郡杜佑通典秦以御史監郡謂之監御史謹案秦罷侯置守並方伯連帥而悉去之惟以御史監郡而不言職掌蓋猶周代大夫監之遺意耳秦制簡略無可附麗今故録其監郡御史之制而不列于表漢漢書百官公卿表武帝元封五年初置部刺史掌奉詔條察州顔師古注漢官典職儀云刺史班宣周行郡國省察治狀黜陟能否斷治寃獄以六條問事非條所問即不省一條強宗豪右田宅踰制以強凌弱以衆暴寡二條二千石不奉詔書遵承典制倍公向私旁詔守利侵漁百姓聚斂為姦三條二千石不恤疑獄風厲殺人怒則任刑喜則浮賞煩擾劾暴剝截黎元為百姓所疾山崩石裂訞祥訛言四條二千石選署不平苟阿所愛蔽賢寵頑五條二千石子弟恃怙榮勢請記所監六條二千石違公下比阿附豪強通行貨賂割損正令也成帝綏和元年更名牧哀帝建平二年復為刺史元夀二年復為牧王應麟玉海黃泰交州記曰刺者言其刺舉不法史者使也言為天子之所使也漢書何武列傳刺史古之方伯上所委任一州表率也謹案漢初易秦監御史為刺州而御史不設然考刺史行部御史為駕又六條所察有二千石子弟請託所監之文是監御史亦未盡省也刺史之職有可考者六條之中一條以察民五條以察吏如所云田宅踰制云不奉詔書云選署不平則如今布政使之所治也云不恤疑獄云二千石違公下比阿附豪強則如今按察使之所糾也其治有常所乘傳行部則今守巡諸道職亦兼之惟是任重秩輕名實不副後遂以州牧遞易紛紜不定且前漢之州牧雖與刺史異秩而職事亦無大殊蓋漢時吏治専責成于郡守而刺史之所以設者亦止以督察二千石朱博稱刺史不察黃綬明不使之盡與郡國之事也其與今之兩司綜理全省體分隆而委任専者規制固有不同特其職掌所在郡國分而理之刺史總而臨之其統轄諸事有相近者故約舉於篇以溯司道諸職之所緣起而不列于表俾毋與督撫沿革相溷焉後漢書百官志外有十二州每州刺史一人六百石本注曰武帝初置刺史十三人十二人各主一州其一州屬司𨽻校尉諸州常以八月巡行所部郡國録囚徒考殿最初嵗書詣京都奏事中興但因計吏皆有從事史假佐通典漢置刺史乘傳周行郡國無適所治中興所治有定處按漢舊儀云刺史有常治所與此異或謂州府為外臺靈帝中平五年改刺史唯置牧是時天下方亂豪傑各欲據有州郡而劉焉劉虞並自九卿出領州牧州牧之任自此重矣舊制州牧奏二千石長吏不任位者事皆先下三公三公遣掾史按驗然後黜退光武即位用法明察不復委三府故權歸舉刺之吏謹案後漢刺史與前漢同而職任漸重黜陟官吏不經三府按驗厥後羣牧專制中原擾攘蓋已首啓其端矣三國三國魏志賈逵列傳逵為豫州刺史時天下初復州郡多不攝逵曰州本以御史出監諸郡以六條詔書察長吏二千石已下故其狀皆言嚴能鷹揚有督察之才不言安靜寬仁有愷悌之德也于是阿縱不如法者皆奏免之帝曰逵真御史矣布告天下當以豫州為法通典自魏以來庶姓為州而無將軍者謂之單車刺史劉昭後漢書志注晉太康初詔曰漢末四海分裂吳蜀自擅刺史內親民事外領兵馬此一時之宜爾謹案三國刺史承後漢之積重其流遂分為二使持節都督持節刺史起于魏時權如今之督撫太康詔所云者是也單車刺史職如今之司道賈逵所職者是也當時以嚴能督察為真刺史蓋偏近于按察使之任實因秦漢之舊制而其任則加重也晉晉書職官志州置刺史别駕治中從事諸曹從事等員所領中郡以上及江揚朱提郡郡各置部從事一人小郡亦置一人又有主簿門亭長録事記室書佐諸曹佐守從事武猛從事等凡吏四十一人卒二十人諸州邉逺或有山險濵近冦賊羌夷者又置弓馬從事五十餘人徐州又置淮海涼州置河津諸州置都水從事各一人涼益置吏八十五人卒二十人荆州又置佃佃督一人玉海王隱晉書曰太康三年罷刺史將軍官刺史依漢制三年一入奏事通典晉制刺史三年一入奏甲午詔書曰刺史銜命國之外臺其非所部而在境者刺史并糾之謹案晉置刺史如漢制三年入奏在境并糾蓋斟酌漢制而變通之者其佐吏有武猛從事弓馬從事淮海河津都水從事監佃督諸員略如今之巡海水利屯田諸職惟今日則以方面大員兼理諸政非僚佐之可得比擬故比録史文以見其概而不列于表焉宋齊梁陳宋書百官志刺史每州各一人刺之為言猶參覘也寫書亦為之刺漢書不得刺尚書事是也刺史班行六條詔書有别駕從事史治中從事史主簿西曹書佐祭酒從事史議曹從事史部郡從事史自主簿以下置人多少各隨州舊無定制通典宋刺史與魏同南齊書百官志州牧刺史州朝置别駕治中議曹文學祭酒諸曹部從事史隋書百官志梁制州刺史二千石州置别駕治中從事各一人主簿西曹議曹從事祭酒從事部傳從事文學從事各因其州之大小而置員定為十八班以班多者為貴其州二十三並列其高下選擬略視內職陳承梁皆循其制官其庶姓為州若無將軍者謂之單車揚州刺史南徐東揚州刺史品並第三荆江南兖郢襄雍等州刺史品並第四豫益廣衡等州青州領冀州北兖州北徐等州梁州領南泰州司南梁交越桂霍寧等十五州刺史揚州别駕中從事品並第六庶姓南徐荆江南兖郢襄雍等州别駕中從事品並第八庶姓豫益廣衡青冀北兖北徐梁秦司南徐等州别駕中從事揚州主簿西曹及祭酒議曹二從事南徐州主簿西曹祭酒議曹二從事品並第九謹案宋齊梁陳刺史之制與魏晉同其時州之分置者漸多而刺史亦以漸衆惟其以州統郡兼理兵民不僅専舉察之事又因其州之上下定為上中下三等州地雖分析而日小而監司之權要與後漢無異也北魏魏書官氏志天賜二年制諸州置三刺史刺史用品第六者宗室一人異姓二人比古之上中下三大夫也刺史令長各之州縣自前功臣為州者還京師司州牧從第二品上州刺史第三品中州刺史從第三品下州刺史第四品司州别駕從事史司州治中從事史從第四品司州主簿從第七品司州西曹書佐祭酒從事史第八品司州議曹從事史司州文學從第八品謹案魏書有三刺史而不列刺史之佐以司州諸佐考之則每州皆有别駕治中主簿等員可以類推亦猶漢晉之制也北齊隋書百官志後齊制官多從後魏州刺史屬官有别駕從事史治中從事史州都光迎主簿主簿西曹書佐市令及史祭酒從事史部郡從事皂服從事典籖及史門下督省事都録事及史箱録事及史朝直刺姦記室掾曹田曹金曹租曹兵曹左户等掾史等員上上州屬官佐史合三百九十三人上中州減上上州十人上下州減上中州十人中上州減上下州五十一人中中州減中上州十人中下州減中中州十人下上州減中下州五十人下中州減下上州十人下下州減下中州十人通典北齊制州為上中下三等每等又有上中下之差自上上州至下下州凡九等謹案刺史之職所以統率屬郡魏既分為三等北齊又分為九等則稱名繁碎而體制亦以漸替矣此隋代改州為郡之漸也後周周書盧辨傳戶三萬以上州刺史正八命戶二萬以上州刺史八命戶一萬以上刺史正七命戶五千以上刺史七命正八命州長史司馬司録六命八命州長史司馬司録五命正七命州長州史司馬司録八命州呼藥五命七命州長史司馬司録正八命州别駕八命州呼藥正四品正六命州長史司馬司録正七命州别駕正八命州治中正七命州呼藥四命正八命州列曹參軍正六命州别駕正七命州治中七命州呼藥正三品八命州列曹參軍正六命州治中正六命州呼藥三命正七命州列曹恭軍正二命七命州列曹參軍二命正六命州列參曹軍正一命謹案後周官制史文不詳兹托録盧辨傳所載命數以存其大概其刺史按户之多寡分為四等蓋循後魏上中下之制而稍變通之其與北齊之三刺史又分為三等者規制不同考七命之户五千以上之刺史在户一萬五千郡守之上可知以州統郡刺史雖自有屬户而列郡大小仍在統轄之中亦如唐宋監司既自治民并監郡縣也其屬官各員遞為等差與漢晉以來大同而小異焉隋隋書百官志上上州置刺史長史司馬録事參軍事功曹户兵等曹參軍事法曹士曹等行參軍典籖州都光迎主簿郡正主簿西曹書佐祭酒從事部郡從事倉督市令丞等員并佐史合三百二十三人上中州減上州吏屬十二人上下州減上中州十六人中上州減上下州二十九人中中州減中上州二十人中下州減中中州二十人下上州減中下州三十二人下中州減下上州十五人下下州減下中州十二人通典隋雍州置牧餘州並置刺史亦同北齊九等之制總管刺史加使持節至開皇三年罷郡以州統縣自是刺史之名存而職廢後雖有刺史皆太守之互名理一郡而已非舊刺史之職按魏置使持節寵奉使官之任隋氏廢郡而後刺史牧人既非使官則合罷持節之稱其時制置不以名實相副為意仍舊存之後改為太守亦復不省所以使持節之名及于邉逺小郡乃不徴典故之失煬帝大業初為司𨽻臺大夫一人巡察畿內其刺史十四人巡察畿外諸郡亦有六條之制與漢六條不同從事四十人副刺史巡察每年二月乘軺巡郡縣十月入奏謹案杜佑言刺史察舉州郡至隋治人後雖有刺史皆太守之互名蓋刺史之制至隋始變然考煬帝初尚有刺史十四人巡察畿外諸郡蓋開皇變制而大業尋復其止理一郡者乃唐代之制非隋世盡然也考厯代刺史遞重遞輕之故皆由積漸而成漢初監郡察郡秩止六百石自後更為州牧後漢不入奏事不𨽻三公至劉焉請重州牧之任魏晉因之有使持節都督持節督之名此其漸而重也至隋之總管都督唐之都督節度使為重之極焉晉武帝詔革漢季之制刺史治民悉如漢初故事自後非要州則為單車刺史沿至魏齊有下州刺史下下州刺史此其漸而輕也至隋始罷郡以州統縣刺史為太守互名自後遂以為知州之稱并在郡守之下為輕之極焉蓋極重則權同督撫而單車刺史舉司道之職未嘗不存極輕則下並府州而採訪按察轉運提刑諸使由是興焉此列代沿革之大概故自隋以前之刺史雖其體制不盡如今之藩臬而要有藩臬之職自唐以後之刺史則竟同今之知府及直𨽻州矣今厯敘前代刺史至隋而止并考證其沿革之大概至唐以後則見於府州篇中不具列焉唐通典開元二十五年刋定職次著為格令設官以經之置使以緯之按察採訪等使以理州縣節度團練等使以督府軍事租庸轉運鹽鐵青苗營田等使以育財貨其餘細務因事置使者不可悉數其轉運以下諸使無適所治廢置不常新唐書百官志觀察使副使支使判官掌書記推官巡官衙推隨軍要籍進奏官各一人團練使副使判官推官巡官衙推各一人防禦使副使判官推官巡官各一人觀察處置使掌察所部善惡舉大綱凡奏請皆屬於州貞觀初遣大使十三人巡省天下有巡察安撫存撫之名神龍二年以五品以上二十人為十道巡察使按舉州縣冉周而代景雲二年置十道按察使道各一人開元二年改曰十道按察採訪處置使至四年罷八年復置十道按察使秋冬巡視州縣十年又罷十七年復置十道京都兩畿按察使二十年改採訪處置使分十五道杜佑通典云治于所部之大郡天寶末又兼黜陟使乾元元年改曰觀察處置使通典唐無州府之名而有採訪使採訪使有判官二人分判尚書六行事及州郡簿書支使二人分使出入職如節度使之隨軍推官一人推獄訟至德之後改採訪使為觀察皆并領都團練使其僚屬隨時增置分天下為四十餘道大者十餘州小者二三州各因其山川區域為制諸道增減不恆使名沿革不一舉其職例則皆古之刺史云舊唐書職官志防禦團練使至德後置防禦使以治軍事刺史兼之不賜旌節上元後改防禦使為團練守捉使義與團練兼置防禦使名前使各有副使判官皆天寶後置未見品秩馬端臨文獻通考唐肅宗乾元初置團練使守捉使大領十州小者三五州代宗時元載當國令刺史悉帶團練大率團練皆𨽻所治州嵗以八月考其高下新唐書百官志觀察使以豐稔為上考省刑為中考辦稅為下考團練使以安民為上考懲姦為中考得情為下考防禦使以無虞為上考清苦為中考政成為下考文獻通考唐先天二年李傑始名務先始為水陸發運使蓋始名之起開元二十一年裴耀卿以侍中充江南淮南轉運使而崔希逸蕭旻為副蓋副使始此天寶以韋堅充勾當轉運使第五琦充諸色轉運使劉晏充諸路轉運使其後韓滉杜悰杜讓能崔昭緯皆以宰相充使而諸道分置巡院皆統於此開元十年敕度支營田若一使專知宜同為一額共置判官二人開元十一年宇文融除勾當租庸地稅使至德元載第五琦充江淮租庸使永泰元年租庸使一切並停唯差判官一人巡官二人催遣建中二年初分置汴東西水陸運兩稅使開元十二年宇文融充諸色安輯户口使謹案唐代以刺史為郡守而諸道置使昉于貞觀之遣使十三人巡省天下其後為巡察為按察為採訪為觀察使名不同其職一也觀地理志言採訪使如漢刺史六典言漢刺史如今之十道使通典言觀察團練皆古之刺史則諸使職掌實上承漢代刺史而與今之司道相等惟節度使秉節専制如今之督撫耳其道為十道為十五道十八道為四十餘道以漸而分亦後日分道之所托始也謹以今制考之轉運租庸兩稅户口諸使如今之布政司其副使如今之督糧道採訪觀察如今之按察使其副使亦如巡道團練營田如今之兵備屯田諸道也又唐代雖以刺史為郡守而職掌視今郡守為較重舊唐書所載刺史嵗巡屬縣觀風俗察官吏善惡殊尤隨即奏聞所部有更改得以便宜從事是州郡而寓諸使之職也至如防禦團練未嘗别置各以治軍刺史兼領之是州郡而兼各道之權也蓋唐諸使之設隨時遷革不為常制又多為節度使之兼官故不得不寄其權于郡守是亦一代制度之大略也五季文獻通考唐置諸道巡院五代罷巡院始置轉運使謹案五代官制史䇿不詳考其大略諸州皆統兵事其諸使亦兼總於節度使馬端臨稱五代罷巡院可類推也宋宋史職官志都轉運使轉運使副使判官掌經度一路財賦嵗行所部檢察儲積稽考帳籍卂吏蠧民瘼悉條以上達及専舉刺官吏之事有軍旅之事則供餽錢糧或諸路事體當合一則置都轉運使以總之若副使若判官皆隨資之淺深稱焉其屬有主管文字幹辦官各一員文臣凖備差遣武臣凖備差使員多寡不一文獻通考藝祖懲五季之亂藩臣擅有財賦不歸王府乾德以後置諸道轉運使以總利權開寶六年廣南平除徐澤為判官蓋轉運判官始此兩省以上則為都轉運司又置副使與諸路判官又置同勾當轉運使至道中詔曰天下物宜民間利病惟轉運使得以周知令更互赴闕廷見詢問慶厯中皆帶按察之任六年罷之熙寧二年詔轉運使用本資序人即充資序下一等為權二等為權發遣中興以來逐路都轉運使除授不常惟使副判官常置謹案轉運使掌一路財賦並舉察官吏實與今之布政使職分相埒轉運之名雖肇于唐時然不過以為一時之制宋則職専任重稱為漕司終代不易名雖因而實則創也其同勾當轉運事及副使如糧儲各道主管文字如經厯照磨幹辦官則如理問都事諸職也宋史職官志提點刑獄公事掌察所部之獄訟而平其曲直所至審問囚徒詳覆案牘凡禁繫淹延而不決盜賊逋竄而不獲皆劾以聞及舉刺官吏之事舊制參用武臣熙寧初罷之紹聖初以提刑兼坑冶事紹興初兩浙路以封疆濶逺差提刑二員淮南東路罷提刑令提舉茶鹽官兼領蓋因事之繁簡而損益焉乾道八年用臣僚言諸路經總制錢并委提點刑獄官督責嘉定十五年廣西提刑分上下半年就鬱林州與靜江府兩處置司其屬有檢法官幹辦官文獻通考宋太祖淳化二年以司門員外郎董循等一十一人分充諸路轉運司提獄刑獄四年省真宗景德四年謂先帝常選朝臣諸路提點刑獄遂復置之不𨽻轉運别為一司稍重其權矣當時約束曰所至専察囚禁詳審牘州縣不得迎送聚會所部每旬具繫囚犯由訊鞫次第申報當檢舉催督在繫淹久者即馳往案問出入人罪者移牒勘覆劾官吏以聞諸色詞狀逐州斷遣不當已經轉運官披斷未允者並收接施行官吏貪濁弛慢者具名以聞敢有庇匿並當加罪仍借緋紫以三年為任增給緡錢如轉運使之數天禧四年加勸農使俄改提點刑獄勸農使十年復置提點京畿刑獄掌察所部疑留獄訟勸課農桑而按其官吏之不法别其廉吏以達於朝元豐因之玉海慶厯三年詔轉運使皆領按察使提刑不帶使名亦凖此嵗具官吏能否以聞轉運使副即漢刺史唐觀察使之職謹案宋監司以轉運及提刑為最重提刑實為今按察使之職即所謂憲司也其始由轉運使兼管後遂専遣朝臣充之其逐州斷遣經轉運披斷未允者並收接施行亦可見其權之重矣既而以提刑兼勸農並督責諸路總制錢及兼提舉諸事蓋所職以刑獄為主而地方重務例得兼掌亦如今藩臬各司財賦刑名之事而地方重事會議舉行二司實相為聨係也提刑無副官其檢法官幹辦官如今知事及司獄之類宋史職官志提舉常平司掌常平義倉免役市易坊場河渡水利之法視嵗之豐歉而為之斂散以惠農民仍専舉刺官吏之事熙寧初先遣官提舉河北陜西路常平未幾諸路悉置提舉官元祐初罷之併其職于提點刑獄司紹聖初復置元符以後因之文獻通考提舉即漢耿夀昌常平之任也自李悝制平糴之法漢人因之則謂之常平焉然漢人特置倉而猶領之於大司農也宋朝淳化中建常平倉景祐元年令轉運司舉所部官專領之然猶𨽻漕臣熙寧遣使提領此蓋提舉常平之所始也九年府界畿內亦専置提舉常平倉一員不令司農丞兼領提舉常平司操常平斂散之法申嚴免役之政令治荒修廢賑民艱厄則𨽻提舉司嵗察所部廉能而保任之若疲軟或犯法則隨其職事劾奏提舉茶鹽司掌摘山煮海之利以佐國用都大提舉茶馬司掌榷茶之利以佐邦用凡市馬於四夷率以茶易之提舉三白渠公事掌瀦泄三白渠以給關中灌溉之利謹案宋職官之近于布政使者轉運而外有提舉諸官如常平倉庫固今藩司之専掌也常平提舉其始𨽻于漕臣其後亦或兼於憲臣領倉而兼以察吏且并掌役市坊場水利之法他如茶馬三白渠諸提舉與今日道員之佐司分職者實為相當云宋史職官志承宣使觀察使無定員政和中詔承宣觀察使仍不帶持節等防禦使團練使無定員文獻通考宋朝沿唐制置諸州觀察使凡諸衛將軍及使遙領者其資品並止本官敘防禦團練使刺使亦同祥符中詔觀察使並帶刺史翰林學士陳彭年檢討唐以來故事觀察使並合帶刺史詔自今除觀察使可兼領之謹案馬端臨云觀察團練使在唐為監司至宋則監司自有以名其官謂轉運提刑而觀察諸使皆無職任蓋止為武臣及刺史所帶之官名而非唐之舊矣兹故録沿襲之概而不著于表宋史職官志幕職官簽書判官廳公事兩使防團軍事推判官觀察支使掌禆贊郡政總理諸案文移諸曹官舊制録事參軍掌州院庶務糾諸曹稽違户曹參軍掌户籍賦稅倉庫受納司法參軍掌議法斷刑司理參軍掌訟獄勘鞫之事文獻通考宋朝沿五代之制兩司置判官推官各一人餘州置判官各一人政和初自判官至諸曹改為士戶儀兵刑工曹掾建炎復舊制焉謹案宋代轉運使提點刑獄皆以朝臣充無定品秩其觀察諸使則有定秩而實無専官即佐屬之判官推官皆係郡職而空帶諸使之銜未免名實不相符也今以非轉運提刑所屬不列于表遼遼史百官志南面官僚節度觀察防禦團練刺史咸在方州如唐制也觀察使職名總目某州軍觀察使某州軍觀察副使某州軍觀察判官王鼎清寧五年為易州觀察判官團練使司職名總目某州團練使某州團練副使某州團練判官南面分司官平理庶務採托民隱漢唐以來賢主以為恤民之令典官不常設有詔則選才望官為之分決諸道滯獄使聖宗統和九年命邢抱朴等五員又命馬守瑛等三員分決諸道滯獄按察諸道刑獄使開泰五年遣劉涇等分路按察刑獄採訪使太宗會同三年命珠格楞蒙古語軟也原作于骨鄰今改正為採訪使南面財賦官諸錢帛司職名總目某州錢帛都點檢大公鼎為長春州錢帛都提點轉運使職名總目某轉運使某轉運副使同知某轉運使某轉運判官王圻續文獻通考遼南面有山西路都轉運使司有奉聖州蔚州應州朔州保州西山各處轉運使司官有轉運使轉運副使同知轉運使等員遼南面觀察使司中京道上京道東京道皆設觀察使司遼南面有按察諸道刑獄使有分決諸道滯獄使官不常設有詔則選才望官以充之謹案遼南面監司與宋制相近錢帛轉運為財賦官分決滯獄按察刑獄為刑名官其大較也然按察諸使因事出差不常設蓋如漢繡衣使者之比而觀察使常設則今日之按察使實其職也王應麟玉海云宋提刑即唐觀察之職王圻續通考亦云明設按察即觀察使之職參互以觀則臬司之源流略可睹矣金金史百官志都轉運使司正三品掌稅賦錢榖倉庫出納權衡度量之制同知從四品副使正五品都勾判官從六品紀綱衆務分判勾案户籍判官二員從六品專管拘收徴尅等事度支判官二員從六品掌勾判分判度支案事鹽鐵判官二員從六品都孔目官二員勾稽文牘知法二員從八品續文獻通考金初設轉運司後詔中外惟都轉運依舊専管錢榖自餘諸路轉運皆兼於按察其都轉運司有正使副使等員金史百官志按察使本提刑司承安三年以上京東京等提刑司併為一提刑司兼宣撫使勸農採訪事為官稱副使判官以兼宣撫副使判官為名承安四年改按察使正三品掌審察刑獄照刷案牘糾察汙官汙吏豪滑之人兼勸農桑與副使簽事更出巡案副使正四品兼勸農事簽按察司事正五品判官二員從六品知事正八品泰和八年以轉運司權輕州縣不畏不能規措錢榖遂詔中都都轉運依舊專管錢榖事自餘諸路按察使並兼轉運使副使兼同知簽按察並兼轉運副添按察判官一員為從六品添知事一員知法二員從八品續文獻通考金觀察使兼於節度使團練使金不置謹按金按察初名提刑實兼宣撫勸農之職其後又兼轉運使其佐屬亦兼轉運副使是按察之權在轉運之上此制之小異于宋代者也唐有按察使偶置而旋罷之今按察之名實自金始云元元史百官志行中書省每省參知政事二員從二品宣尉司掌軍民之務分道以總郡縣行省有政令則布于下郡縣有請則為達于省其在逺服又有招討安撫宣撫等使品秩員數各有差等宣慰使司秩從二品每司宣慰使三員從二品同知一員從三品副使一員正四品經厯一員從六品都事一員從七品照磨兼架閣管勾一員正九品凡六道團練安撫勸農使司至正十八年九月置奉元延安等處團練安撫勸農使司于耀州鞏昌等處團練安撫勸農使司于邠州各設參謀一人每道置使二人同知副使各一人檢督六人經厯知事照磨各一人屯田使司至正十五年十二月置軍民屯田使司于沛縣正三品謹案元立行中書省其官自丞相平章左右丞而下有參知政事二員明初亦設之後罷行省改參知政事為左右承宣布政使司是參知政事實布政使之所自來也至宣慰司之職布行省之政令於下而達郡縣之請於上亦如今兩司上承督撫下達府縣故並列焉團練安撫勸農以三使而併為一官如今各道之兼兵備屯田之制也至如招討宣撫設于邉郡與藩職少異元史又有奉使宣撫詢民疾苦體察官吏而黜陟之則偶一遣使非設官常制故不著於篇轉運使司元代専以理鹺政與宋制異已别見鹽政篇兹不復録元史百官志肅政廉訪使國初立提刑按察使至元六年兼勸農事二十八年改按察使為肅政亷訪使其後遂定為二十二道每道廉訪使二員正三品副使二員正四品僉事四員兩廣海南止二員正五品經厯一員從七品知事一員正八品照磨兼管勾一員正九品內道八𨽻御史臺山東東西道濟南路置司河東山西道兾寧路置司燕南河北道真定路置司江北河南道汴梁路置司山南江北道中興路置使淮西江北道廬州路置司江北淮東道揚州路置使山北遼東道大寧路置使江南十道𨽻江南行臺江東建康道寧國路置司江西湖東道龍興路置司江南浙西道杭州路置使浙東海右道婺州路置司江南湖北道武昌路置司嶺北湖南道天臨路置司嶺南廣西道靜江府置司海北廣東道廣州路置司海北海南道雷州路置司福建閩海道福州路置司陜西四道𨽻陜西行臺陜西漢中道鳳翔府置司河西隴北道甘州路置司西蜀四川道成都路置司雲南諸路道中慶路置司謹案王圻續通考曰廉訪之職與臺察相表裏按治帥府漕司軍民司屬照刷諸司文卷責違慢官吏此殆如漢制之司𨽻校尉無所不糾其職重矣蓋金元之制提刑皆在布政之上兩史所載班班可考史又言按察使巡行郡縣除使二員留司副使以下每嵗二月分按十月還司則視今之巡道其立法之意正復同焉明明史職官志承宣布政使司左右布政使各一人從二品左右參