肘道員則尤多兼領職業不専縱弛之習日甚而吏治不可復問矣我朝初循舊制嗣改左右布政使為一人以専其責任直𨽻則創設藩臬江南湖廣陜西分建二省而江寧蘇州又各設布政使一員以著因地制宜之法優道員之品秩均不帶藩臬銜而督學有别置河道有専司皇上慎簡人在俾膺重任兩司有闕俱奉特旨除授地方利弊均許専摺陳奏督撫有措置未協者或責以隨時匡正道員則由科道及各部院司員之膺上考及知府中報政優最者記名補放又於入謝時親加誡勵無不仰承聖訓感奮自效所以綱立紀陳旬宣奏績統屬正而展布優吏治之蒸蒸日盛洵非前代所可比倫矣欽定厯代職官表卷五十二
