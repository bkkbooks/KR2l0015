body:
  text: 提督表提督國朝官制提督軍務總兵官從一品直隸一人山東一人以巡撫兼山西一人以巡撫兼河南一人以巡撫兼江南一人江西一人以巡撫兼福建二人浙江一人湖廣一人四川一人陜西一人甘肅二人廣東一人廣西一人雲南一人貴州一人掌統轄本標官兵及分防營汛節制各鎮閲軍實修武備課其殿最以聴于總督直𨽻提督駐古北口節制馬蘭泰寧宣化天津正定五鎮本標四營山東提督駐濟南府節制兖州登州二鎮本標二營山西提督駐太原府節制太原大同二鎮本標二營河南提督駐開封府節制河北南陽二鎮本標二營江南水陸提督駐松江府節制崇明狼山夀春三鎮本標五營江西提督駐南昌府節制南昌贑州二鎮本標二營福建水師提督駐厦門節制金門海壇南澳臺灣四鎮本標五營陸路提督駐泉州府節制福寧汀州建寧漳州四鎮本標五營浙江水師提督駐寧波府節制黄巖定海温州處州衢州五鎮本標五營湖廣水陸提督駐常徳府節制襄陽宜昌鎮筸永州四鎮本標四營四川提督駐成都府節制川北重慶建昌松潘四鎮本標五營陜西提督駐固原州節制延綏興漢河州三鎮本標五營甘肅甘州提督駐甘州府節制西寧寧夏凉州肅州四鎮本標五營安西提督駐烏魯木齊廸化城本標五營廣東提督駐惠州府節制左翼右翼碣石潮州高州瓊州南澳七鎮本標五營廣西提督駐栁州府節制左江右江二鎮本標五營雲南提督駐大理府節制臨元開化騰越鶴麗昭通普洱六鎮本標五營貴州提督駐安順府節制安籠古州鎮逺威寧四鎮本標四營初提督帶左都督右都督銜者正一品帶都督同知銜者從一品帶都督僉事署都督事者正二品乾隆十八年省都督等銜定為從一品厯代建置謹案提督之官自有明始然不為一定之官稱且不設員額亦不常置蓋古者天子寄軍政于六鄉居則以田警則以戰所謂入使治之出使長之素信者與衆相得也周之六鄉在國以比長閭胥族師黨正鄉大夫為稱其在軍也則以五長兩司馬卒長旅帥師帥軍將為號為兵者皆平居之民為將者皆平居之吏故曰邊境一有事左右之官皆將帥也漢承秦制以郡都尉専司兵事而兵始有常將然都尉亦以文臣為之則兵民之事雖分而主兵者固不分文武魏晉以降督軍州者多加將軍郎將之號而當時中朝清望官亦頗以加軍號為重知將軍等號元非専為統兵而設嗣是總管節度殊名同實唐末之節度使多用武人至宋而總管鈐轄或領以文臣而武臣實司其事葢自有長募屯駐之兵而始有營伍之制既有營伍即不得不置將帥以専領之然其初偏禆以下雖漸漸専用武臣而大帥則仍多以地方官兼之自宋都副總管文武並置元置元帥萬戸等府則守臣不復得與兵事而文與武始截然為二矣夫司馬世官亦以命氏後世兵皆常聚師多世守文武之途既分而緩帶輕裘者或不􅈺行陣即如宋崇寧中以湯景仁等提舉各路弓箭手後仍改用武臣則以前所置文臣不能親詣邊塞衝冒寒暑之故則省㑹内地邊陲要區屯兵以衛民生立將以統營伍實亦因時之政矣第明制提督既不常設而自總兵以下凡統兵之官亦俱無品級無定員且多充以勛戚都督等官大率童騃驕恣軍政紊如我朝奄有區宇詰戎飭伍各省特設水師陸路提督以統緑旗兵旅自畿輔海甸達于雪山炎徼星羅碁置腹地則兼以巡撫承以總兵副將參將㳺擊都司守備千總把總之屬各有員額品秩而總督實節制之文武相維分標協理我皇上制治保邦動闗宸慮邉防屯戍往往增設兵伍又以武臣俱有分猷宣力之責特命倣文臣之例量職定制各給養㢘以優贍其身家規畫尤為盡善兹故撮論其概而總兵以下其説亦畧具于此云三代周禮夏官凢制軍萬有二千五百人為軍軍將皆命卿杜佑通典三代之制天子六軍其将皆命卿諸侯之制大國三軍次國二軍小國一軍其將亦命卿也謹案軍將命卿知軍帥不特選置于六官凡六鄉之吏自卿以下徳任者使兼之矣孔頴達云古者用兵天子先用六鄉六鄊不足取六遂六遂不足取公卿采邑及諸侯邦國而章如愚曰古者畿内之兵不出卒有四方之役即用諸侯人耳或遣上公率王賦亦不過元戎十乗以先啟行而已葢盛王之制天下大則有方伯小則有連帥其待卒應變如身之使臂各適其事之逺近茍方伯連帥所不能克然後鄉遂之士應之周官之象胥曰王之大事諸侯推此而出軍之法可知也然則諸侯之軍将其于王朝亦有似今之各省設有提督者故著此以見權輿之有自焉國語齊語制國五家為軌十軌為里四里為連十連為鄉五鄉一帥故萬人為一軍五鄉之帥帥之三軍故有中軍之皷有國子之皷有高子之皷謹案齊作内政以寓軍令三分其國以為三軍公將其一髙國將其二將兵者已似有専官然仍皆命卿為之則固用周制也春秋時列國之命將惟齊魯晉楚畧可考見魯之戰于鞌也四卿並出迨作三軍而三桓各將其一舍中軍而季氏専將一軍仲叔各専一軍之半猶是軍將皆卿也晉始作二軍上軍公自將下軍太子將之閔二年伐東山臯落氏則太子將上軍罕夷將下軍僖十五年韓之戰亦是公將上軍韓簡為下軍將據此則僖八年里克帥師其御右同韓簡當亦是下軍将知晉初上下二軍無㝎将矣楚亦為三軍其軍将出扵臨時擇人城濮之役子玉以令尹將中軍子西以司馬將左邲之役沈尹將中軍而令尹孫叔敖不為軍帥鄢陵之役則子反以司馬將中軍子重以令尹將左軍皆無一定之制其後齊景公召司馬穰苴以為將軍將兵扞燕而將兵者始有特設之官然事已則罷不為定制逮乎戰國趙李牧為北邊良將常居代雁門以備北冦此當為後世大將備邊之所自始爾春秋左氏傳吴徐承等率舟師自海入齊謹案江漢湯湯武夫洸洸此水戰之始嗣後吳楚交戰率用舟師越亦有習流之士越王句踐嘗命范蠡舌庸率師沿海泝淮以絶吳路而徐承之率舟師入海當亦為今水師提督所自昉歟秦漢書百官公卿表郡尉秦官掌佐守典武職甲卒謹案唐李賢云秦每郡有尉一人今以漢書地里志考之殆未必然樊噲傳噲攻圉都尉劉攽曰圉縣名有尉無都尉又郡都尉至景帝方加葢衍一都字然沛公為漢王酈商以將軍為隴西都尉高后功臣表有醴陵侯越為河内都尉豈秦固已有都尉而史不具歟又馬端臨曰秦并天下列為三十六郡郡置材官葢刑法志云漢興踵秦而置材官于郡國則郡置材官固秦法也且不惟材官而已秦騎士李必駱甲見漢書灌嬰傳則秦亦有騎士漢嚴安曰秦使尉屠將樓船之士攻越則秦又有樓船漢材官騎士樓船屬郡都尉即秦郡尉之所職可知矣漢漢書百官公卿表諸侯王國中尉掌武職如郡都尉郡尉秩比二千石有丞秩六百石景帝中二年更名都尉後漢書百官志武帝又置三輔都尉各一人譏出入邊郡謹案漢郡國凡百有三置郡尉者九十山西自三輔而外郡纔十有三而置都尉三十其餘郡國乃八十有七置都尉者止六十其不置者葢四十有三也尉與守皆二千石其尊與守等酷吏傳言周陽由為守視都尉如今為都尉陵太守奪之治武帝欲以甯成為郡守公孫宏言成為濟南都尉其治如狼牧羊不可令治民明守與尉之各有分治矣然王應麟引漢儀注云邉郡置都尉不治民然則都尉非邊郡當亦治民至若吾邱夀王為東郡都尉帝以夀王故不復置太守其賜之璽書所謂連十餘城之守任四千石之重者以兼守尉之任也又翟義為南陽都尉行太守事行縣至宛以事按宛令威震南陽知漢時都尉葢不特典軍而亦有兼行太守之事者夫漢之太守専制方面幾與今之巡撫等則其兼守尉之任者乃正如今以巡撫兼提督之比也錢文子補漢兵志材官騎士屬郡都尉以嵗八月太守都尉令長丞為㑹都試水處為樓船令丞尉亦各統其縣守尉不得専也大抵金城天水隴西安定北地河東上黨上郡多騎士三河潁川沛郡淮陽汝南巴蜀多材官江淮以南多樓船士謹案漢刑法志曰武帝平百粤内增七校外有樓船皆嵗時講肄其實高祖已有樓船之制漢官儀云髙祖命天下郡國選能引鬬蹶張材力武猛者以為輕車騎士材官樓船常以立秋後講肄課試各有員數平地用車騎山阻用材官水泉用樓船此皆調民為兵非有常置之額而嵗時講肄及有事調發則皆都尉主之他如惠帝七年發車騎材官詣滎陽太尉灌嬰將文帝三年發中尉材官屬衛將軍軍長安景帝中元三年秋中尉不害將車騎材官士屯代高栁武帝元光二年太中大夫李息為材官將軍將三十萬衆屯馬邑谷中六年韓安國為材官將軍屯軍扵漁陽此則徵京輔郡國之兵而特遣大臣以為軍將故領材官士者則曰材官將軍領車士騎士者曰車騎將軍領樓船士者曰樓船將軍又有領步士則為步兵將軍皆事已即罷其與今之提督職分殊矣後漢書百官志中興建武六年省諸郡都尉并職太守無都試之役惟邊郡往往置都尉及屬國都尉稍有分縣治民比郡王國中尉一人比二千石職如郡都尉主盜賊謹案漢列郡有都尉其在王國則中尉比都尉光武所省特郡都尉而紀乃云罷郡國都尉官明衍一國字也宋書百官志光武省都尉後又往往置東部西部都尉謹案後漢省都尉後每有劇職郡臨時置都尉事訖罷之然終建武之世已不能守前法罷尉省校輙復臨時補置如七年罷長水射聲二校十五年復更增屯騎校九年省闗都尉十九年復置函谷闗都尉而天下亦往往復置都尉其見于紀者和帝永元十六年復置遼東西部都尉官安帝永初四年初置長安雍二營都尉官順帝陽嘉二年復置隴西南部都尉官桓帝永夀元年初置泰山琅邪都尉官而金城西部都尉隴西南部都尉各有戍守分地益州西部都尉及各屬國都尉俱或領城如太守則視前漢之以都尉行太守事者復加優矣馬端臨文獻通考光武以幽冀并州兵定天下始於黎陽立營領兵騎千人以謁者監之號為黎陽兵其後又以扶風都尉部在雍縣以凉州近羌數犯三輔將兵衛䕶園陵故俗稱雍營謹案司馬貞曰邊郡有屯兵後因置將屯將軍如傅寛之以代相國將屯是也若郡國之騎士材官樓船雖各有員數然俱散在民伍迨光武于黎陽立營則郡國兵之各立營伍實始諸此其後明帝置度遼營其将軍遂為常守和帝置象林兵安帝置長安雍二營及漁陽營順帝時縁海又稍稍增兵而魏郡趙國河南等塢多置軍屯已略似今制之分標營者則其總帥當亦如今之提督也三國三國蜀志魏延列傳先主為漢中王遷治成都當得重將以鎮漢川乃拔延為督漢中鎮逺將軍領漢中太守謹案魏延以漢中督領太守亦猶魏之以都督領刺史也宋書百官志魏黄初二年始置都督軍州事或領刺史南齊書百官志魏晉世州牧隆重刺史任重者為使持節都督輕者為持節督謹案後漢建武初征伐四方始權置督軍御史事竟而罷建安中魏武為相始遣大將軍督之袁紹分沮授所統諸軍為三都督魏武征孫權還又使夏侯惇督二十六軍則都督之號始此而國朝初制提督兼都督銜者其名亦昉乎此也魏初置都督類皆與州相近如揚州刺史治夀春都督揚州諸軍事亦治夀春之類其後都督或領刺史亦正沿漢以都尉行太守事之例與今巡撫兼提督銜者亦略相似故與督撫表互見焉文獻通考黄初中復令州郡典兵州置都督尋加四征四鎮將軍之號謹案漢之雜號將軍皆主征伐事訖皆罷若四征興于漢代四安起于魏初四鎮通于柔逺鎮東西南並後漢置鎮北魏置四平止於撫輯魏置其將軍各一人已似為額設之官且都督或以兼治民事而四征四鎮將軍但為典兵之號疑都督者略如今之總督而征鎮將軍或如今之提督然如石苞當魏世拜鎮東將軍旋代王基都督揚州諸軍事後進征東大將軍俄遷驃騎將軍陳騫拜使持節都督淮北諸軍事安東將軍轉都督豫州諸軍事持節將軍如故又轉都督江南諸軍事徙都督荆州諸軍征南大將軍事晉武受禪進車騎將軍則諸将軍亦苐為方面寵號循資遞進而非專設以為統兵之定職矣三國吳志蔣欽列傳欽與吕䝉持諸軍節度權襲荆州欽督水軍入沔謹案欽節度諸軍而復自督水軍則有似今之水師提督者考吳統軍之帥類稱為督故有水軍督營都督京下督江夏督諸號葢吳之邊境有督有監監者監諸軍事之職而督者即督諸軍之職也晉晉書職官志都督諸軍為上監諸軍次之督諸軍為下使持節為上持節次之假節為下武帝置四中郎將東南西北或領刺史或持節為之謹案晉初制都督知軍事刺史治民各舉其職則猶仍漢制至惠帝末而督軍者皆兼刺史葢如今督撫之任並無専典兵事為武職之員但當時諸州都督類加將軍或中郎將之號則凡持節都督亦有近今之提督者矣晉書謝元列傳拜建武將軍兖州刺史領廣陵相監江北諸軍事劉牢之列傳謝元鎮廣陵多募勁勇號為北府兵謹案督諸軍者類兼制數州而兖州别領北府兵又似今提督節制各鎮外之有本標營兵也宋齊梁陳通典宋有都督諸州諸軍事舊曰監某州諸軍事文帝即位改監為都督謹案魏晉以來有督諸軍者有監諸軍者即如宋文帝在晉朝以冠軍將軍加授使持節監徐兖青冀四州諸軍徐州刺史闗中既平又授監司州豫州之淮西兖州之陳留諸軍事前將軍司州刺史仍改授都督荆益寧雍梁秦六州豫州之河南廣平揚州之義成松滋四郡諸軍事西中郎將荆州刺史持節如故永熙元年進督北秦并前七州進鎮西將軍又加進督湘州俱為統兵之任其遷進之序亦大略可見則杜氏所為舊曰監而文帝改為都督非也凢齊梁及陳皆仍宋制兹不備著大抵晉宋以後督諸州者統治兵民為今督撫之任而與提督亦復相近故既入督撫表内而仍互見于此云北魏魏書樂安王範列傳拜都督五州諸軍事衛大将軍長安鎮都大將子良襲王拜長安鎮都大将雍州刺史和跋列傳跋子歸拜使持節冠軍將軍雍城鎮都大將陸俟列傳拜龍驤將軍都督洛豫二州諸軍事虎牢鎮大将轉平西将軍安定鎮大將徴還出為平東將軍懐荒鎮大將又以俟都督秦雍二州諸軍事平西將軍長安鎮大将周書閻慶列傳慶祖提使持節車騎將軍燉煌鎮都大将謹案魏之鎮大將在諸鎮將之上太和十九年之詔鎮大將與州刺史及品登王公者並列當如今之提督而鎮都大將又在鎮大將之上又北齊書王懐當魏世為大都督鎮下館堯傑以車騎將軍出為磨城鎮大都督葢亦鎮都大将之比其亦如國朝初制提督之由都督僉事而遞進為左右都督者歟又周賀拔岳當魏季以假節衛將軍左大都督與右都督侯莫陳悦並為使持節督諸軍事爾朱天光之副則天光之職正如今總督而岳之左大都督正如今提督也北齊書斛律金傳金除大司馬高祖出軍襲山後部落以金為南道軍司任延敬列傳天平初拜侍中盧仲延叛以延敬為大都督東道軍司率都督元整叱列陁等討之高昻列傳拜司徒公為軍司大都督統七十六都督治兵于武牢謹案杜佑曰漢魏有軍師之官晉避景帝諱改為軍司凡諸軍皆置之以為常員即監軍之職通鑑晉康帝紀殷浩除安西軍司穆帝紀劉惔勸㑹稽王昱出鎮以已為軍司胡三省注俱謂軍司即軍司馬考晉書庾翼傳殷浩徴命無所就而翼請為司馬及軍司並不赴則軍司與司馬當各為一官胡説誤也北魏羊祉以左軍將軍持節為梁州軍司與都督西征諸軍事行梁州刺史楊椿討叛氏薛懐吉試守恒農郡以本任為安東將軍邢巒軍司後又以益州刺史為征東將軍中山王英軍司後又為鎮東將軍盧昶軍司畢聞慰以平東將軍為都督安樂王鑒軍司慕容紹宗為西南道軍司討李延孫其討蕭淵明也杜弼為軍司而弼傳又有軍司崔鍾似為行軍而設非有常員然亦祇監軍之任若斛律金任延敬高昻則専制一道自為統兵之官此正如吳全琮遷右大司馬左軍司之比而非如吳範所謂臣乃陛下之軍師者然金以大司馬為軍司延敬以侍中為軍司昻以司徒公為軍司則正如隋唐以重臣充行軍總管之比其與今之提督又稍不同也此齊書所列然事皆在魏世故仍繫之北魏條下北齊北齊書暴顯列傳以顯為水軍大都督謹案北朝之都督隨事立名自大都督外有京畿大都督京畿南面大都督防城大都督鎮城大都督諸號其崇庫亦復不一而水軍大都督則如今之水師提督也後周通典後周改都督諸軍事為總管則總管為都督之任周書代王逹列傳建徳初出為荆淮等十四州十防諸軍事荆州刺史杞王康列傳建徳三年出為總管利始等五州大小劍二防諸軍事利州刺史尉遲綱列傳武成元年除涇州總管五州十一防諸軍事涇州刺史保定二年為陜州總管七州十三防諸軍事陜州刺史韋祐列傳子初位至開府儀同大將軍閻韓防主魏元列傳除白超防主轉和州刺史伏流防主謹案北朝之制有防主有防城大都督則總管州防軍事當即所謂防主而在防城大都督之上者矣若司馬消難入陳陳宣帝以為都督安趙九州八鎮車騎將軍此則倣北朝置之不為定例也隋隋書百官志州置總管者列為上中下三等總管刺史加使持節謹案隋之總管刺史亦沿前代督軍州之舊其後罷郡為州又罷州置郡并罷諸總管而有兵處别置都尉領兵與郡不相知其與漢制之守尉分治而以時都試者異矣唐新唐書百官志大都督府都督一人從二品中都督府都督一人正三品下都督府都督一人從三品掌督諸州兵馬甲械城隍鎮戊糧禀總判府事謹案唐初縁邊鎮守及襟帶之地沿隋舊制置總管府以統軍戎至徳七年改總管府為都督府其總十州者為大都督亦兼刺史而不檢校州事盖専以典軍為職正如今之提督也舊唐書地理志安西節度使撫寧西域統龜兹焉耆于闐疏勒四國北庭節度使防制突騎施堅昆部管瀚海天山伊吾三軍河西節度使隔斷𦍑戎統赤水大斗建康寧冦玉門黒離豆盧新泉等八軍張掖交城白亭三守捉朔方節度使捍禦北狄統經畧豐安定逺西受降城東受降城安北都䕶振武等七軍府河東節度使掎角朔方統天兵大同横野岢嵐等四軍忻代嵐三州雲中守捉范陽節度使臨制奚契丹統經畧威武清夷静塞恒陽北平高陽唐興横海等九軍平盧軍節度使鎮撫室韋靺鞨統平盧盧龍二軍榆闗守捉安東都䕶府隴右節度使以備羌戎統臨洮河源白水及安人振威威戎莫門寧塞積石鎮西等九軍綏和合川平夷三守捉劍南節度使西抗吐蕃南撫蠻獠統團結營及松維蓬恭雅黎姚悉等八州兵馬天寶平戎昆明寧逺澄川南江等六軍鎮嶺南五府經略使綏静夷獠統經畧清海二軍桂管容管安南邕管四經略使長樂經畧使東萊守捉東牟守捉謹案唐分天下州縣制為諸道每道置使其邊方有冦戎之地則加以旌節謂之節度使葢即古之持節都督至徳以後諸道皆聚兵中原刺史每受節度之號節度又兼領觀察諸使分理郡縣為今督撫之任而節度之號則固専為統兵設也故亦互見于此五季新五代史張敬逹列傳清泰二年河東節度使石敬瑭兼大同彰國振武威塞等軍蕃漢馬步軍都總管屯於忻州以敬達為北面副總管以分其兵明年徙敬瑭鎮天平遂以達為大同彰國及振武威塞等軍蕃漢馬步軍都部署謹案後唐蕃漢都總管權寄隆重盖前代都督中外諸軍事之比其下有副都總管明宗嘗為之俱非復尋常之任而北面副總管則有似今之提督若都部署初第名為部署同光元年始以元行欽為之本在招討使之下其後有都部署乃為行軍主帥之任事已輒罷非定制也宋柯維騏宋史新編總管鈐轄司掌總治軍旅屯戍及營防守禦之政令或一州或一路有兼兩路三路者舊制都總管以節度使充副總管以觀察以下充或文臣知州則管勾軍馬事舊相重臣亦為都總管有禁兵駐泊其地者以駐泊冠之初名部署慶厯八年改為總管若鈐轄舊以朝官及諸司使以上充官卑資淺則去都字崇寧中置京畿四輔郡以知州為都總管仍兼副總管鈐轄靖康中詔四道副總管並通差文武臣建炎分置帥府以諸路帥臣帶都督總管要郡守臣帶兵馬鈐轄要郡帶兵馬都監並以武臣為副稱副總管副鈐轄副都監許便宜行軍馬事辟置僚屬依帥臣法遇起兵則副總管為帥副鈐轄都監各以兵從聴節制謹案宋初懲五季之弊召諸鎮節度使留之京師分命朝臣出守列郡號權知軍州事軍謂兵事州謂民事也其後文武官參為知州軍事故諸知府州軍監有兼留守司公事者有兼經畧安撫使馬步軍都總管者有兼安撫使馬步軍都總管者有兼安撫使兵馬鈐轄者有兼安撫使兵馬巡檢者其餘大藩府或沿邊州郡及當一道衝要者並兼兵馬鈐轄巡檢或帶沿邊安撫提轄兵甲沿邉溪峒都巡檢葢亦猶前代督軍州之例則都總管者正如今巡撫兼提督之比而副總管亦如今提督之比也王應麟玉海都統駐劄之地沔州興元金州江陵鄂州池州江州鎮江建康平江許浦水軍又利州有副都統制謹案都統二字始見晉書庾亮傳而都統之官始於苻秦之少年都統唐之都統或總五道或總三道又有行營都統副都統一時兵興稱謂不一宋初有馬步軍副總管遇出師征討則加以都統制軍馬之名以總統諸將然不為官稱建炎置御營司擢王淵為都統制名官自此始紹興十一年罷諸將兵乃收其所部為御前諸軍而統制皆以屯駐州名冠軍額之上自是天下有十都統恩數略視三衙權任在帥臣之右初以秩卑者稱副都統制乾道中増制副都統制一人兼領軍事其後都副觧並除者則凡屯劄之都統制副都統制亦正如今提督之比也又平江許浦水軍本明州定海水軍舊𨽻沿海制置使防捍海道乾道八年併歸許浦鎮置副都統制統之則其副都統制固如今之水師提督矣遼遼史百官志南而軍官諸軍兵馬都總管府某兵馬都總管聖宗太平四年見兵馬都總管兵馬都總管府歸聖軍兵馬都總管府南面邉防官五州都總管府耶律蘇色滿洲語撩草也原作速撒今改穆宗應厯初為義霸祥順聖五州都總管山後五州都管司聖宗統和四年見普弩寧原作滿奴寧从字面改正為山後五州都管謹案遼都總官之職北面有東路兵馬都總管府其官曰東路兵馬都總管南面五京各有都總管府官曰某京都總管知某府事又有南京兵馬都總管府其諸府都總管葢皆如今提督之任也金金史百官志諸總管府謂府尹兼領者都總管一員正三品掌統諸城隍兵馬甲仗總判府事同知都總管一員從四品掌通判府事惟博索滿洲語山隂也原作婆速今改路同知都總管兼來逺軍事兵馬副都總管一員正五品所掌與同知同統軍司河南山東陜西益都使一員正三品督領軍馬鎮攝封陲副統軍一員正四品判官一員從五品知事一員從七品知法二員從八品謹案金天㑹六年伐宋畢詔遣西南西北二帥以鎮方面而諸路各設兵馬都總管府天徳二年改諸京兵馬都部署司為本路總管府又以博索路統軍司為總管府若正隆六年置三十二總管則如前代行軍總管之比而非諸都總管之例也元元史百官志宣慰使司都元帥府秩從二品使三員同知二員副使二員經厯二員知事二員都元帥府都元帥二員副元帥二員經厯知事各一員元帥府秩正三品達嚕噶齊解見户部篇一員元帥一員經厯知事各一員謹案元初於北庭察遜塔拉䝉古語察遜雪也塔拉曠野也原作曲先塔林今改䝉古軍征東等四處立都元帥府置都元帥副元帥副元帥之下又有同知副元帥其宣慰司有邊陲軍旅之事則兼都元帥若世祖至元二十九年以汪惟和為鞏昌二十四處都總帥亦元帥之職也元又立諸路萬户府管軍七千以上為上萬户府達嚕噶齊一員萬户一員俱正三品副萬户一員從三品管軍五千以上為中萬户府達嚕噶齊萬户各一員俱從三品副萬户一員正四品管軍三千以上為下萬户府達嚕噶齊萬户各一員俱從三品以上中遞降例之疑當為正四品副萬户一員從四品其官皆世襲有功則陞之與元帥府官又復不同也明明史百官志都指揮使司都指揮使一人正二品又都指揮同知二人從二品都指揮僉事四人正三品其屬經厯司經厯正六品都事正七品斷事司斷事正六品副斷事正七品吏目各一人司獄司司獄從九品倉庫草場大使副使各一人行都指揮使司設官與都指揮使司同都司掌一方之軍政各率其衛所以𨽻于五府而聴于兵部凡都司並流官或得世官都指揮使及同知僉事常以一人統司事曰掌印一人練兵一人屯田曰僉書巡補軍器漕運京操備禦諸雜務並選充之否則曰帶俸明初置各行省行都督府設官如都督府又置各都衛指揮使司洪武四年置各都衛斷事司以理軍官軍人詞訟又以都衛節制方面職係甚重從朝廷選擇陞調不許世襲八年詔各都衛並改為都指揮使司凡改設都司十有三燕山都衛為北平都司西安都衛為陜西都司太原都衛為山西都司杭州都衛為浙江都司江西都衛為江西都司青州都衛為山東都司成都司衛為四川都司福州都衛為福建都司武昌都衛為湖廣都司廣東都衛為廣東都司廣西都尉為廣西都司定遼都衛為遼東都司河南都衛為河南都司行都司三西安行都衛為陕西行都司大同都衛為山西行都司建寧都衛為福建行都司十五年増置貴州雲南二都司後以北平都司為北平行都司永樂元年改為大寧都司宣徳中増置萬全都司計天下都司凡十有六又于建昌置四川行都司於勛陽置湖廣行都司計天下行都司凡五謹案明自罷中書行省設都布按三司分治兵刑錢榖都司序銜在布按二司上則都司實為一方武職重臣正如今提督之比又明初於各行省置都鎮撫司設官有都鎮撫副鎮撫知事之屬洪武六年罷附著於此明史李如松列傳萬厯十二年為提督陜西軍務總兵官武臣有提督自如松始也已命盡統遼東宣府大同諸道援軍如松以權任既重不欲受總督制事輒専行兵科許宏綱等以為非制尚書石星亦言如松勅書受督臣節制不得自専乃下詔申飭麻貴列傳起貴備倭總兵官已加提督盡統南北諸軍謹案明京營設有提督自内臣外並用文臣武臣南京有提督操江多領以勛戚若各處巡撫多兼提督軍務則以文臣為之其總兵間有稱提督者如鎮守昌平舊有提督武臣嘉靖三十八年改為鎮守總兵聴總督節制鎮守貴州總兵嘉靖三十二年加提督麻陽等處地方職銜又嘉靖三十七年添設提督狼山鎮副總兵究其職守則仍與諸鎮守總兵副總兵同至李如松為提督而提督始為専設之官然而事權既重不循體制見督師不肯甲胄庭謁用監司謁督撫儀至其弟如楨出鎮遼東遂欲與總督講鈞禮明代重文輕武而其末流至於如此則其紀綱不立亦可概見也我朝定制大小相維提督一官既以節制諸鎮而仍受節制于總督其簡用多拔尤于各鎮之中課功稽績量材掄擇所以表率營伍鞏䕶疆陲非往代所可幾及也欽定厯代職官表卷五十六
