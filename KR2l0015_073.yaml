body:
  text: 師傅保加銜表師傅保加銜國朝官制太師太傅太保正一品少師少傅少保從一品太子太師太子太傅太子太保從一品太子少師太子少傅太子少保正二品以上皆虛銜無職掌亦無員額凡大臣宣力中外勞績懋著者則奉特㫖加銜或為贈典以示優寵焉厯代建置謹案太師太傅太保古謂之三公其二稱三孤必得其人而後授之無其人則寧闕故曰官不必備惟其人也後漢每一帝即位必置太傅録尚書事參預政柄非古義矣其餘各代皆以師傳稱上公位三公上多以他官兼領或不備置三少則或不置元魏始稱三師其實一也若東宮師傅代各殊制亦多以他官兼領者唐天寶以前凡三師官雖有其位而無其人其後多以畀藩鎮得之者或不以為榮宋政和新制改三師為三公與三孤多為階官而東宮六傅領以宰執大臣然三公之濫授莫甚於宣和之際其名尤多不正如鄆王楷以唱名第一超拜太傅景王杞濟王栩並以國公進太傅是以子為師傅也內侍童貫拜太𫝊進太師是以厮役為師𫝊也嗣是而緇衣黃冠亦間崇以師傅之號而典章掃地盡矣明制三公三孤俱為勳戚文武大臣加官贈官而東宮師𫝊亦無定員無専授然明世文臣多不敢居三公之位而東宮師傅類以纍考或恩澤得之亦非慎重名器之意今詳考厯代之得失並著於篇然後知我國家參取古制用為加銜無敷權干政之虞無循資濫授之弊立法之善為前代所不及也三代禮記文王世子記曰虞夏商周有師保鄭康成注記所云謂天子也謹案韓詩外傳三公者何曰司空司徒司馬司馬主天司空主地司徒主人今尚書歐陽夏侯說天子三公一曰司徒二曰司馬三曰司空文子堯之治天下也舜為司徒契為司馬禹為司空注三公之官淮南子說苑並同尚書刑德考曰益為司馬卨為司徒禹為司空三公象三台月令疏云書傳有司馬司徒司空公領三卿此夏制也是虞夏以前以司徒司馬司空為三公矣古周禮說天子立三公曰太師太保太傅五經異義云周公為傅召公為保太公為師周公太公無為司徒司空之文知師保傅三公官名也五帝三王不同物此周之制也然則許慎謂五帝三王惟周以師保傅為三公周以前則有異今據文王世子虞夏商周有師保則五帝三王並知古周禮說不特周有師保也又考路史後紀黃帝紀乃立四輔三公六卿三少二十有四官案靈樞經有黃帝問少師之文與羅泌之說合是書雖出僞托然實采掇諸書而成亦必依附古義知舊籍所載黃帝嘗有是官也又云陶唐氏立三公六卿百揆暨百執事然則虞夏商周之前已有師保明矣非至虞夏商周始創此官也杜佑通典殷太甲時伊尹為太保謹案環濟要略曰三公太師太傅太保也殷時有阿衡伊摯佐之太甲改為保衡皆三公官也又詩長發篇鄭康成箋曰阿衡湯所依倚而取平也故以為官名太甲時曰保衡書君奭篇孔安國傳曰伊尹為保衡言天下所取安所取平均與杜佑以保衡為太保立義各異以今考之古人所稱有官有號伊尹之稱阿衡當由湯倚任至重加以殊名如周之有師尚父非商設有此官以伊尹充之也洎乎太甲之世則以伊尹為太保遂兼其官而稱之謂之保衡亦如唐宋宰相出鎮稱使相宰相封公稱公相兼二名而言之非至太甲之世又改名保衡也故書稱罔俾阿衡専美有商詩稱實維阿衡實左右商王皆不出伊尹之名姓而後人知為伊尹以為伊尹之専號故也使阿衡為商代之官名豈有専歸一人以為稱謂者哉今從禮記杜佑之說定商惟有太保而阿衡之名表中亦刪不録焉尚書盤庚邦伯師長孔安國傳衆長公卿也孔潁逹正義衆官之長故為三公六卿也尚書說命樹后王君公孔潁逹正義三公則君公之內包之尚書微子父師少師孔安國傳父師太師三公少師孤卿謹案漢官儀殷伊尹為太保胥餘為太師故文王世子注謂殷亦兼有師保墨子武丁得傅說舉以為三公然則殷具三公明矣史記殷有太師疪少師疆抱其樂器以適周漢書古今人表亦同蓋皆樂官之長如論語之太師摰少師陽其官名與公孤偶同實非公孤之職謹附識於此尚書周官立太師太傅太保兹惟三公論道經邦燮理隂陽孔安國傳師天子所師法傅相天子保保安天子於德義者此惟三公之任佐王論道以經緯國事和理陰陽言有德者乃堪之官不必備惟其人孔安國傳三公之官不備員惟其人冇德乃處之少師少傅少保曰三孤孔安國傳此三官名曰三孤孤特也言卑於公尊于卿特置此三者二公宏化寅亮天地弼豫一人孔安國傳副二三公宏大化敬信天地之教以輔我一人之治謹案逸周書武寤解尹氏八士太師三公咸作有續神無不饗别太師於三公之外與周官之制異未足據也尚書金縢二公曰我其為王穆卜孔頴逹正義武王時三公惟周召與太公耳知二公是召公太公也周禮地官二鄉則公一人鄭康成注老尊稱也王置六卿則公有三人也三公者內與王論道中參六官之事外與六卿之教其要為民是以屬之卿焉謹案康成大𫝊注一公兼二卿舉下以為稱太宰司徒同職則稱司徒公宗伯司馬同職則稱司馬公司冦司空同職則稱司空公考王置六卿六卿各領一鄉大𫝊注謂公領二卿則一公領二鄉明矣與鄉老文可以互證春秋傳宋立四鄉二師掌之二師猶天子三公也二師掌四鄉則是一公領二鄉也尚襲周官鄉老之制而孔安國書傳謂一公止領一卿豈一公止領一鄉乎未足為據也國語太保六之太師七之韋昭注太保太師天子三公佐王論汜監衆官不得掌事故次之謹案國語此文但及太保太師不及太傅或徇農之事太𫝊不與非無其職也太保太師次司徒蓋亦次徇農之先後非序官也春秋公羊傳諸公者何天子三公天子三公者何天子之相也天子之相何以三自陜而東者周公主之自陕而西者召公主之一相處乎內是言三公為二伯也漢書百官公卿表周官太師太傅太保是為三公蓋參天子坐而議政無不總統故不以一職為官名又立三少為之副少師少傅少保是為孤卿記曰三公無官言有其人然後充之舜之於堯伊尹于湯周公召公於周是也通典武王時太公成王時周公畢公為太師成王時畢公為太傅召公為太保謹案蔡氏沈謂周公方條治事之官未及師保之職所謂未及者鄭重而未及言之也然考詩大明維師尚父毛傳云師太師史記齊世家書太誓注並稱文王立太公望為太師周公為太傅又謂周武王時太公為太師成王時周公為太傅召公為太保儀禮逸禮太公為太師周公為太傅召公為太保史記周本紀成王即位周公畢公並為太傅書顧命孔傳云太保畢毛稱公則三公矣冡宰第一召公領之司馬第四畢公領之司空第六毛公領之則是閲文武成康之世三公不特具其職且并未嘗闕其人周公作周禮時似不應不及三公也然而周官載公孤於六卿之前周禮則不之及者周官叙官之書故必首三公也周禮列六官之職三公無専職故不能不闕如也詩長發降于卿士實維阿衡正義云三公兼卿士詩常武太師皇父正義云三公兼卿士之官竹書紀年殷王即居亳其卿士伊尹然則三公類兼六卿六卿之職何莫非三公之職耶六卿之職具而三公之職亦具矣大司徒叙官曰鄉老二鄉則公一人此三公之兼職也職無可名故公孤不列於六卿之前職有可名故三公並繫於司徒之屬此周公著作之體也禮記文王世子凡三王教世子必以禮樂立太傅少傅以養之欲其知父子君臣之道也太傅審父子君臣之道以示之少傅奉世子以觀太傅之德行而審諭之太傅在前少傅在後入則有保出則有師漢書賈誼列傳成王幼召公為太保周公為太傅太公為太師保保其身體傅傅之德義師道之教訓此三公之職也於是為置三少皆上大夫也曰少師少傅少保是與太子晏者也謹案文王世子所引記曰虞夏商周有師保有疑丞設四輔說者曰天子必有四鄰作記者取以成世子之記考尚書大𫝊曰天子必有四鄰前曰疑後曰丞左曰輔右曰弼大戴禮曰應而不窮者謂之道輔善而相義者謂之充潔亷而切直者謂之弼𫝊問強計者謂之丞注道或謂之疑充或謂之輔是所謂四輔也然賈誼所稱三公三少即今周官所載非别為東宮官屬故後漢翟酺𫝊亦云昔成王之政周公在前召公在後畢公在左史佚在右四子挾而維之目見正容耳聞正言一日即位天下曠然言其法度素定也蓋王之師保疑丞即世子之師保疑丞而非别設其官以教之也若大戴所記謂周公在前太公在左召公在右史佚在後而翟酺云云語各不同則𫝊聞各異耳周禮地官師氏中大夫一人上士二人掌以媺詔王以三德教國子鄭康成注國子公卿大臣之子弟師氏教之而世子亦齒焉保氏下大夫一人中士二人注書序曰周公為師召公為保相成王為左右聖賢兼此官也掌養國子以道乃教之六藝謹案文王世子所載以太傅少傅為重而師保則附言賈誼所述直以太保太傅太師屬之召公周公太公而以為太保太傅太師為三公以三少為上大夫皆與此文逈異蓋周禮至漢武帝時始出文王世子及賈誼疏皆在其前故傳聞異詞核實而論師氏似専掌教授如今之讀內廷教保氏似兼掌調護如今之諳逹太保太傳太師少保少傅少師則統領其事如今之總師傅其官有尊卑任有専司兼攝而所職則大略相同互相出入故諸儒所記各舉其一端似相忤而實相足康成保氏注引書序周公為師召公為保相成王為左右聖賢兼此官昔人謂太師太保康成誤以師氏保氏當之今考經典釋文君奭序保太保也師太師也馬云保氏師氏皆大夫官則康成保氏注乃本馬融君奭注也師氏保氏不得當太保太師故書牧誓亞旅師氏次在司徒司馬司空之後孔安國傳云師氏大夫官顧命師氏虎臣次在太保奭芮伯彤伯畢公衛侯毛公之後孔安國亦云大夫官是也中大夫之與三公康成何至混而為一蓋康成原不以師氏為太師保氏為太保特謂周公為太師亦兼師氏之職召公為太保亦兼保氏之職以相成王也成王冲齡踐䟭尚不得闕國子之教故三公復充師氏保氏之任保氏注明云兼此官既云兼此官則非即此官明矣鄭注未嘗合而為一也秦章如愚山堂考索秦制闕三師之位通典太子師保二傅殷周已有逮乎列國秦亦有之謹案秦之太子師傅見於史記商君列傳然秦使太子扶蘇北監䝉恬兵於上郡而以趙髙傅公子胡亥教之決獄然則所謂太子師傅者其失職也久矣又孔叢子載陳勝以孔鮒為太師蓋沿用古制偶立斯名非秦有是官故不著焉漢漢書百官公卿表太傅髙后元年初置金印紫綬後省八年復置後省元夀二年復置位在三公上太師太保皆元始元年置金印紫綬太師位在太傅上太保次太傅謹案漢志太傅位在三公上考漢紀永光三年太傅韋元成為御史大夫御史大夫位在太傅下以太傅為御史大夫在當時並非左遷豈以太傅位雖尊而御史大夫職特重歟又漢紀武帝紀載元狩五年太子太傅嚴青翟為丞相太傅止為御史大夫而太子太傅乃為丞相然則當時雖設師𫝊而遷除他官不甚拘拘于太少之秩次也漢紀平帝紀大司徒孔光為太傅左將軍甄豐為少傅元始元年太傅孔光為太師車騎將軍王舜為太保大司空左將軍甄豐為少傅宋書百官志太師漢初不置平帝始復置太師官而孔光居焉東京又廢獻帝初復置後又廢太傅漢髙后元年初用王陵太保平常元始元年始用王舜後漢不置謹案荀悅漢紀髙祖紀有太保叔孫通固諫之文然則髙祖時已有太保而漢書百官公卿表謂元始元年始置宋書百官志謂平帝元始元年始用王舜與漢紀異漢書孔光列傳為帝太傅位四輔馬公列傳四輔為國維綱謹案漢又置少傅甄豐為少傅與太師太傅太保並為四輔然百官表不載蓋王莽更制所立非定制也漢書百官公卿表太子太傅少傅皆秩二千石謹案漢太子二傅屬官有太子門大夫庶子洗馬舍人今析入詹事府表內此不具載後漢書百官志太傅上公一人掌以善導無常職世祖以卓茂為太傅後省其後每帝初即位輒置太傅録尚書事謹案續漢書稱每帝即位輒置太傅一人録尚書事今考袁宏後漢紀光武中元二年明帝即位以鄧禹為太傅明帝紀永平十八年章帝即位以趙熹為太傅章帝紀章和元年和帝即位以鄧彪為太傅和帝紀元興元年殤帝即位張禹為太傅安帝紀建光四年北鄉侯即位以馮石為太傅順帝紀永建元年以桓焉為太傅靈帝紀建寧元年以陳蕃為太傅又以胡廣為太傅中平六年獻帝即位以袁隗為太傅其中惟質帝紀桓帝紀未見立太傅之文而靈帝紀則兩立太傅與司馬彪所云微有不同考魯相史晨祠孔廟奏銘云時副言太傅太尉司徒司空大司農府治所部從事列太傅於太尉之上後漢書樊凖傅永和初上書五府調省中都官吏注云太傅太尉司徒司空大將軍虞翊傅詡曰宜令四府九卿三公也注云太傅太尉司徒司空凡稱五府四府皆首列太傅於此見漢之太傅重於三公也通典後漢惟有太傅一人而無太保董卓自為太師非漢本制謹案後漢書趙典傅曰公卿表典篤學博聞宜備國師說者以為國師即太師然則後漢之不置太師亦無其人則闕之意也後漢書百官志太子太傅一人中二千石職掌輔導太子禮如師不領官屬太子少傅二千石亦以輔導為職悉主太子官屬劉昭注漢官曰員吏十三人謹案後漢紀光武紀建武二十八年上問羣臣誰可傅太子者皆曰執金吾隂識可也博士張佚正色曰今陛下立太子為隂氏乎即為隂氏則隂侯可為天下則固用天下之賢上曰善欲置傅者以輔太子今博士不難正朕况太子乎即拜佚為太子太傅而以桓榮為太傅然則後漢命太𫝊始于卓茂命太子太傅始于張佚桓榮也又考後漢不置詹事以少傅領東宮官屬與西京異其官屬自太子率更以下别詳詹事府篇三國三國蜀志後主列傳冊曰今以禪為皇太子使使持節丞相亮授印綬敬聼師傅行一物而三善皆得焉可不勉與謹案華陽國志獻帝建安二十四年先主以許靖為太傅章武元年先主即帝位許靖為司徒無代為太傅者蓋建安二十四年尚襲後漢之制故設太傅至蜀改元或省其職華陽國志謂蜀初闕三司之位以待天下晉志三司即太尉司徒司空亦曰三公太傅在三司上蜀且闕三司之職則太傅不常設可知矣又考華陽國志延熙元年立子璿為皇太子瑶為安定王以典學從事巴西譙周為太子家令梓橦李撰為僕射皆名儒也則後主時惟立宮官未見設太子太傅少傅惟魏略曰禪立為太子諸葛亮為太子太傅然考諸書及諸葛亮集亮不為太子太傅故裴松之以為此魚絭妄說則冊文云敬聽師傅者當别有其人或先主時亦曽設此官耳宋書百官志太師魏世不置晉書職官志魏初惟置太傅以鐘繇為之後又置太保以鄭冲為之三國魏志三少帝本紀昔周成建保𫝊之官近漢顯宗崇寵鄧禹所以優崇雋乂必有尊也其以太尉為太傅謹案司馬懿以太尉進太傅且靳大司馬不與托以朝議避忌見晉帝宣帝紀此由曹爽等陽以名號尊之而隂奪其權如漢初安國侯以右丞相遷帝太𫝊耳其後太傅置左右長史掾屬舍人各十人加以典兵則又篡奪隂謀自生亂制非太傅職司所本有亦非魏代之常經故不具録焉通典魏官九品第三品太子保傅王應麟玉海漢魏故事太子於二傅執弟子禮通典太子於二傅皆為書不曰令少傅稱臣而太傅不臣文帝為太子凉茂為太傅何䕫為少傅謂之二傅謹案魏世無東宮文帝為太子乃魏國太子也自後二傅之官遂闕不著三國吳志諸葛恪列傳恪以大將軍領太子太傅中書令孫宏領少傅恪更拜太傅謹案吳之太傅自諸葛恪外見於書紀者惟陸機著論云張昭為師傅而已若東宮二傅多以他官兼領如闞澤拜太子太傅領中書如故薛綜為太子少傅領選職薛瑩以選曹尚書領太子少傅之類是也惟張溫吾粲官太子太傅少傅程秉以交址長史徴拜太子太傅當為専任耳晉晉書職官志太宰太傅太保周之三公官也晉以景帝諱故採周官之名置太宰以代太師之任秩增三司與太傅太保皆為上公論道經邦燮理隂陽無其人則闕以平安獻王孚居之自渡江以後其名不替而居之者甚寡太宰太傅太保為文官公冠進賢三梁黑介幘謹案晉以景帝之諱改太師之官名晉書職官志既云改太宰又云改太保已自相違異通典則云改太師更屬參差然晉志明云採周官之名周官無太帥之文則杜佑所說為無據至太保雖見於周官而古文尚書晉初未出所謂周官當即周禮周禮有冡宰無太保保氏又下大夫秩不相當則其為太宰更無疑義况宋齊相沿並稱太宰尤證據昭然蓋作保者史之誤字惠帝紀稱齊王同為太師者亦史之駁文或其初避諱作帥字後乃定為宰歟晉荀朂薦三公保傅保三公保傅宜得其人若使楊珧參輔東宮必當仰稱聖意晉書職官志太子太傅少傅泰始三年始各置一人尚未置詹事官事無大小皆由二傅並有功曹主簿五官太傅中二千石少傅二千石其訓導者太傅在前少傅在後皇太子先拜諸傅然後答之後以儲副體尊遂命諸公居之以本位重故或行或領時侍中任愷武帝所親敬復使領之蓋一時之制也咸寧元年以給事黃門侍郎楊珧為詹事掌宫事二𫝊不復領官屬及楊珧為衛將軍領少傅省詹事遂崇廣傅訓命太尉賈充領太保司空齊王攸領太傅所置吏屬復如舊二傅進賢兩梁冠黑介幘五時朝服佩水蒼玉其後太尉汝南王亮車騎將軍楊駿司空衛瓘石鑒皆領傅保猶不置詹事惠帝元康元年復置詹事二傅置丞一人秩千石主簿五官掾功曹史主記門下史録事戶曹法曹倉曹賊曹功曹書佐門下亭長門下書佐省事各一人給赤印安車一乘及廣陵建宮乃置六傅三太三少以景帝諱師故改太師為太保晉原别有太保此太保據前文當為太宰之誤通省尚書事詹事文書關由六傅自元康之後諸傅或二或三通典無此二字疑此衍或四或六渡江之後有太傅少傅不立師保通典晉太子六傅各有丞一人司馬光資治通鑑元熙元年立廣陵王遹為皇太子以中書監何劭為太子太師衛尉裴楷為少師吏部尚書王戎為太傅前太常張華為少傅衛將軍楊濟為太保尚書和嶠為少保胡三省注晉東宮六傅惟此時具官謹案晉潘尼集有皇太子釋奠頌云元康三年春閏月越二十四日既齊輿駕於太學太傅在前少傅在後恂恂乎宏保訓之道考通鑑永熙元年東宮六傅已全具而潘尼于元康三年作頒仍止稱太傅少傅者蓋晉泰始初猶有太子太傅少傅故當時訓導之職二傅領之皇太子釋奠其前後特于六傅內舉其最重者耳宋齊梁陳宋書百官志太宰一人太傅一人太保一人是為三公無其人則闕謹案宋太宰惟孝武帝時以江夏王義恭為之以後無人宋書百官志太子太傅一人丞一人少傅一人丞一人並有功曹主簿五官太傅中二千石少傅二千石南齊書百官志齊惟置太傅謹案齊亦有太宰太保然惟以為贈無生得之者故志以為惟置太傅南齊書百官志太子太傅少傅府置丞功曹五官主簿南齊書王儉列傳儉領太子少傅舊太子敬二傅同至是朝議接少傅以賓友之禮隋書百官志梁有太宰太傅太保太子太傅一人位視尚書令少傅一人位視左僕射置丞功曹主簿五官謹案職官要録曰三少舊視左僕射冠服同三太也隋書百官志陳制官品秩太宰太傅太保秩萬石品並第一太子二傅中二千石品並第二通典太子六傅自宋以下惟有傅而無師保北魏通典後魏以太師太傅太保謂之三師上公也謹桉溫子升集有為上黨王穆讓太宰表考晉宋以後江左皆名太師為太宰而北魏官氏志及唐六典通典載魏官制仍稱太師不稱太宰子升表稱太宰或當時熟習舊名相襲未改歟唐六典三師訓導之官也其名即周之三公漢始尊師傅之位在三公上謂之上公無所統職後魏特稱三師以正其名然非道德崇重則不居其位無其人則闕之謹案魏淮陽王欣大統中為太傅文帝曰王三為太傅再為太師自古人臣未聞此例可知三師之官在魏固甚重也通典後魏太子太師太傅太保謂之東宮三師少師少傅少保謂之東宮三少孝明在東宫宣武皇帝欲以崔光為太子師傅光固辭帝令太子南面再拜宮臣皆從太子拜光北面立不敢答拜惟西向拜謝而出乃授光太子太傅北齊隋書百官志後齊循後魏置太師太傅太保是為三師擬古上公非勛德崇者不居太子太師太傅太保是為三師掌師範訓導輔翊皇太子少師少傅少保是為三少各一人掌奉皇太子以觀三師之德出則三師在前三少在後謹案魏收𫝊文宣除收為太子少傅仍兼太子詹事考隋百官志北齊設太子三師三少又别設詹事各為専職收以太子少傅兼詹事蓋一時之制也又收未嘗為少傅而溫特進集有冬夜酬魏少傅直史館詩魏收傳收為太子少傅直館則太子少傅當時亦通稱少傅也後周隋書百官志周太祖師周之建職置三公三孤以為論道之官周書蕭圓肅列傳建德三年授太子少傅圓肅以任當師傅調護是職乃作少傅針謹案成周立三公三孤王之師保即世子之師保後周建官多倣成周故杜佑謂東宮三師三少後周不置然蕭圓肅之授太子少傅明著於史當是為圓肅而特設者歟隋隋書百官志三師不主事不置府僚蓋與天子坐而論道者也謹案師傅保北魏尊為三師北齊因之後周依周禮又以為三公隋初又為三師煬帝廢之三師自漢魏以來皆開府置僚屬至隋因後周不置僚屬蓋又省三少不置也隋書百官志太子置太師太傅太保少師少傅少保唐舊唐書百官志太師太傅太保各一員謂之三師並正一品訓導之官大抵無所統職無其人則闕之通典天寶以前凡三師官雖有其位而無其人唐六典三師或親王拜者但存其名耳資治通鑑貞觀六年上以新令無三師官二月丙戍詔特置之謹案此本舊唐書太宗紀而新書百官志則云隋廢三師貞觀十一年復置疑誤新唐書百官志太子太師太傅太保各一人從一品掌輔導皇太子每見迎拜殿門三師合拜每門必讓三師坐太子乃坐與三師書前名惶恐後名惶恐再拜太子出則乘路備鹵簿以從少師少傅少保各一人從二品掌曉三師德行以諭皇太子奉太子以觀三師之道德自太師以下惟其人不必備謹案唐貞觀以還太子師傅皆宰相兼領如魏徴長孫無忌房元齡蕭瑀髙士亷岑文本于志寧等皆領師傅之職而房元齡蕭瑀髙季輔等又下兼三少乃其後非疾廢眊瞶不任事者即休戎罷帥不知書者處之而又疏棄斥逐之越月踰時不得召見甚至縉紳多恥為之然則與是列者非所以示尊寵其與設官之初意大不侔矣五季資治通鑑安審琦曰皇甫太師寂無音問胡三省注皇甫遇未必加官至太師也而安審琦以太師稱之蓋五季之世官賞無章當時相稱謂不復論其品秩就人臣極品而稱之玉海舊制太師太傅太保為三師太尉司徒司空為三公並為宰相親王使相加官五代之制司徒遷太保太保遷太傅太傅遷太尉太尉遷太師檢校者亦如之謹案洪邁云唐節度使𢃄檢校其初只左右散騎常侍如李訴在唐鄧時所稱者也後乃轉尚書及僕射司空司徒能至此者蓋少僖昭以降藩鎮盛強武夫得志才建節其資級已髙於是復升太保太傅太尉其上惟有太師故將帥悉稱太尉今觀胡氏所云則五季時并簿太尉而徑稱太師故遼人多呼節度使為太師見金史世紀相沿固有所自矣此本無預於官制而史文有此稱號恐滋考證者之疑故存而訂正之焉五代㑹要長興四年四月以祕書監劉贊為秦王傅時言事者請為秦王置師傅上顧問近臣皆以秦王名勢隆盛不敢置議請自選擇乃降是命謹案五季凡師傅官見于新五代史各傅如馮道為太師趙光逢為太保安童誨為太子太師季鏻為太子太傅等大約一準唐制然僭濫相仍槩不足述姑著此以見一時之事云宋宋史職官志宋承唐制以太師太傅太保為三師為宰相親王使相加官凡除授則自司徒遷太保自太𫝊遷太尉檢校亦如之若宰臣官至僕射致仕者以在位久近或已任司空司徒則拜太尉太傅等官若太師則為異數自趙普以開國元勳文彥博以纍朝耆德方特拜焉政和二年九月詔以太師太傅太保古三公之官今為三師古無此稱合依三代為三公為真相之任仍考周制立三孤少師少傅少保亦稱三少為次相之任柯維騏宋史新編職官志宣和七年詔復三公不領三省事治平著令親王不兼三師至徽宗朝皇子有真授者歐陽修歸田録皇子皓封東陽郡王除婺州節度使檢校太傅翰林賈學士黯上言太𫝊天子師臣也子為父師於體不順中書檢勘自唐以來親王無兼師傅官者蓋自國朝命官祗以差遣為職事自三師三公以降皆是虛名故失於因循耳議者皆以賈言為當也葉夢得避暑漫録本朝宰相以三師致仕者元豐以前惟三人趙韓王太師張鄧公太傅王魏公太保元豐文潞公始以太師繼之陸游老學菴茟記史魏公自少保六轉而至太師文潞公自司空四轉蔡太師自司空三轉秦太師自少保兩轉而已王闢之澠水燕談録國朝享國百三十餘年人臣為太師者惟趙忠獻文潞公二人者耳謹案宋三公自太祖以來未嘗備官獨宣和末三公至十八人蓋太師三人太傅四人太保十一人三少不計也又宋太師未嘗並除紹聖初始有文彥博吳王皓宣和中蔡京童貫鄭紳靖康初燕王俁越王偲紹興初秦檜張俊紹熙末史浩嗣秀王伯圭建隆至紹熙宰臣生拜太師者五趙晉文彥博蔡京秦檜史浩惟蔡秦二人以相臣特拜其他皆還政加恩也親王生拜太師者五人楚王元佐燕王元儼吳王皓燕王俁趙王偲皆以父兄行得之嗣秀王伯圭以宗室特拜太師蓋王于光宗為親伯父用優禮也又政和之制除三公三孤者必須建節加檢校太子少保少師之類然後除開府儀同三司既除開府然後除三孤三公南渡後如張韓劉嶽諸武臣猶是如此其後一得建節即徑除開府至三孤三公益非舊制矣宋史職官志東宮官太子太師太傅太保太子少師少傅少保馬端臨文獻通考宋師傅不常設仁宗升儲置三少各一人李昉以恭知政事兼掌賓客及升左相遂進兼少傅此宰相兼宮僚之始也丁謂兼少師馮拯兼少傅曹利用兼少保是時實為東宮官餘多以前宰執為致仕官亦隨本官髙下除授太子少師少傅少保以待前執政其少師亦不輕除若因遷轉則遞進一官至太師即遷司空矣天禧末皇太子同聽政乃以首相兼少師自後神宗欽宗孝宗光宗在東宮皆不置宋史新編職官志其後錢象祖兼少傅史彌逺賈似道兼少師皆宰相兼宮僚也石林燕語國朝宰相執政未有兼東宮職事者天禧未仁宗初立為皇太子因命宰相丁謂馮拯兼少師少傅樞密使曹利用兼少保而任中正王曾為恭知政事錢惟演為樞密副使皆兼賓客前此所無也謂等因請師傅十日一赴資善賓客以下隻日互陪侍講從之謹案宋制以宰相兼宮僚至天禧末乃以首相兼太子少師故宮僚特重然宋初竇儀左右僕射東宮三師為表首議云東宮三師為表首討論故實全無證據其左右僕射援引制勑合為表首者其事有六云云大㫖謂上臺君父之官東宮臣子之官不得以東宫三師一品為尊然則宮僚雖以宰相充而百官表次仍當在僕射後特史彌逺賈似道之流為首輔而兼充少師則東宫三師望愈重矣遼遼史百官志南面朝官三師府太師穆宗應厯三年見太師唐古特西畨也原作唐骨德今改太傅太宗㑹同元年命馮道守太傅太保㑹同元年劉昫守太保少師耶律資忠傳見少師蕭巴格原作把哥今改正少傅少保掌印耶律伊遜䝉古語九數也原作乙辛今改重熙中掌太保印謹案北魏始改三公為三師宋政和中始復周官公孤之名遼則太尉司徒司空自為三公而師傅稱三師蓋恭取北魏以來之舊制也遼史百官志南面東宮三師府太子太師太宗大同元年見太子太師李嵩太子太傅世宗天祿五年見太子太𫝊趙瑩太子太保大同元年見太子太保趙瑩太子少師聖宗太平十一年見太子少師簫從順太子少傅耶律哈里滿洲語有水寬甸處也原作合里今改正重熙中為太子少傅太子少保大同元年見太子少保馮玉金金史百官志三師太師太傅太保各一員皆正一品師範一人儀刑四海東宮官宮師府太子太師太子太傅太子太保正二品太子少師太子少傅太子少保正三品掌保護東宮導以德義海陵天德四年始定制宫師府三師三少詹事院詹事三寺十率府皆𨽻焉元元史百官志三公太師太傅太保各一員正一品銀印以道夑隂陽經邦國有元襲其名號特示尊崇太祖十二年以國王置太師一員太宗即位建三公其拜罷嵗月皆不可考世祖之世其職常缺而僅置太保一員至成宗武宗而後三公並建無虛位而東宮常置三師三少蓋亦不恆有也謹案元視宋制故師傅亦稱三公而又有所謂大司徒司空太尉之屬或置或不置則亦一時之制也王圻續文獻通考元成宗大德十一年六月時武宗已即位置宮師府立太子太師少師太傅少傅太保少保等官明明史職官志太師太傅太保為三公正一品少師少傅少保為三孤從一品掌佐天子理隂陽經邦宏化其職至重無定員無専授洪武三年授李善長太師徐逹太傅先是常遇春已贈太保三孤無兼領者建文永樂間罷公孤官仁宗復設永樂二十二年八月復置三公三少宣德三年勑太師英國公張輔少師吏部尚書蹇義少傅兵部尚書華蓋殿大學士楊士竒少保兼太子少傅戶部尚書夏原吉各輟所領侍左右咨訪政事公孤之官幾於敷授逮義原吉老士竒還領閣務自此以後公孤皆虛銜為勳戚文武大臣加官贈官而文臣無生皆三公者嘉靖二年加楊廷和太傅辭不受其後文臣得加三公惟張居正萬厯九年加太傅十年加太師續文獻通考明初設三公府正一品府罷而李善長徐逹以丞相兼太師太傅謹案明文臣自張居正外多不敢居三公之位故孫承宗傅云加太傅力辭不受先以册立東宫加太保及神宗實録成加官亦如之並辭免復以考滿詔加太傅復辭不受而勳臣得之者前後凡十五人內太師六人太傅四人太保五人亦制之失中者也明史職官志太子太師太子太傅太子太保並從一品掌以道德輔導太子而謹護翼之太子少師太子少傅太子少保並正二品掌奉太子以觀三公之道德而教諭焉太少賓客正三品掌侍太子贊相禮儀規誨過失皆東宮大臣無定員無専授洪武元年太祖有事親征慮太子監國别設宮僚或生嫌隙乃以朝臣兼官職李善長兼太子少師徐逹兼太子少傅常遇春兼太子少保治書侍御史夏原吉范顯祖兼太子賓客三年禮部尚書陶凱請選人専任東宮官罷兼領庶於輔導有所責成帝諭以江充之事可為明鑑立法兼領非無謂也由是東宮師傅止為兼官加官及贈官惟永樂間成祖幸北京以姚廣孝専為太子少師留輔太子自是以後終明世皆為虛銜於太子輔導之職無與也謹案太子賓客唐官也始於漢四皓之時從太子至武帝為太子立博望苑使通賓客晉惠帝令衛庭王略楊苾裴憲華恆備太子賓友其時雖非官而謂之東宮賓客唐顯慶元年始以太子太傅兼侍中韓瑗中書令來濟禮部尚書許敬宗左僕射兼太子少師于志寧並為皇太子賓客遂為官額定置四人掌調護侍從規諫凡太子有賓客之事則為上齒資位間重其流不雜宋置二人或以宰執兼之太子事以師傅禮其後相仍不替明洪武初徴儒士王本杜斆趙民望吳源為四輔官兼太子賓客位尚書上蓋亦宮師之亞也國朝不設斯官故附著於此欽定厯代職官表卷六十七
