body:
  text: 內務府武備院表內務府武備院國朝官制武備院兼管事務大臣無定員卿二人正三品由侍衛補授一人由內務府司官補授一人掌總理陳設御用武備修造器械及賞賜支放之事初名鞍樓以侍衛三人員外郎等官掌理順治十一年改為兵仗局十八年改為武備院康熙五年隸內務府十五年分為鞍庫甲庫氊庫共三庫三十七年分鞍庫為北鞍庫南鞍庫雍正三年侍衛三人定為正三品卿職乾隆十四年定為卿二人郎中一人主事二人委署主事一人筆帖式二十八人內四庫各三人沙河氊作二人掌本院題奏事件核銷錢糧總理四庫收發文移之事郎中康熙二十一年設主事康熙十六年設委署主事六十一年設後省乾隆二十二年復設北鞍庫員外郎二人庫掌二人署庫掌一人傘房掌蓋三人初為正六品乾隆四十四年定為戴藍翎署掌蓋三人正八品班領三人署庫掌一人帳房處司幄三人三等侍衛銜食六品俸署司幄三人六品職銜食七品俸鞍板司匠一人北鞍庫掌供奉上用鞍轡繖蓋幄幕之事傘房帳房處鞍板作皆屬焉南鞍庫員外郎二人庫掌二人署庫掌一人熟皮作司匠一人南鞍庫掌官用鞍轡各項皮張雨緓縧帶之事熟皮作屬焉康熙十五年設鞍庫員外郎等官三十七年分為北南二庫四十三年添設員外郎二人初設掌傘帳房頭目匠役催領等員乾隆二十四年改為掌蓋司幄司匠員額均先後增定甲庫員外郎二人庫掌二人署庫掌一人􅛸作司匠三人甲庫掌盔甲刀仗旗纛器械之事􅛸作屬焉員額康熙十五年以復兵續增定氊庫員外郎二人庫掌二人署庫掌一人司匠一人司弓三人六品職銜食七品俸署司弓三人食八品俸司矢三人同司弓署司矢三人同署司弓骲頭作司匠一人靴皮作司匠一人氊庫掌弓箭靴鞋氊片之事骲頭作靴皮作屬焉康熙十五年設員外郎及弓匠協領備箭協領等員乾隆二十四年弓箭協領改為司弓備箭協領改為司矢厯代建置三代周禮天官幕人下士一人府二人史二人徒四十人掌帷幕幄帟綬之事掌次下士四人府四人史二人徒二十人掌王次之法以待張事周禮夏官司甲下大夫二人中士八人府四人史八人胥八人徒八十人司兵中士四人府二人史四人胥二人徒二十人掌五兵五盾各辨其物與其等以待軍事司戈盾下士二人府一人史四人胥二人徒二十人掌戈盾之物而班之授旅賁及虎士戈盾及舍設藩盾行則斂之司弓矢下大夫二人中士八人府四人史八人胥八人徒八十人掌六弓六弩八矢之法辨其名物而掌其守藏與其出入天子之弓合九而成規凡師旅會同頒弓弩各以其物從授兵甲之儀繕人上士二人下士四人府一人史二人胥二人徒二十人掌王之用弓弩矢箙矰弋決拾掌詔王射贊王弓矢之事藁人中士四人府二人史四人胥二人徒二十人掌受財于職金以齎其工弓六物為三等弩四物亦如之矢八物皆二等箙亦如之周禮考工記冶氏為殺矢桃氏為劍函人為甲矢人為矢梓人為侯廬人為廬器弓人為弓為天子之弓合九而成規杜祐通典武庫令丞於周官司甲司弓矢等下大夫司戈盾等中士下士蓋其任也謹案成周有司甲司兵司弓矢司戈盾等官杜佑以為漢武庫令之比至王之用弓弩矢箙掌于繕人受財齎工掌于藁人亦皆為夏官之屬唯幕人掌次屬于天官與今北鞍庫所屬之掌蓋司幄為職相近其甲兵戈盾則似今之甲庫司弓矢亦與今氊庫之司弓司矢同而考工記所載諸工即今四庫所隸之各司匠也周天官玉府掌王之玩好兵器凡獻兵器受而藏之內府云凡齒革兵器皆入焉秋官職金云入其金錫於為兵器之府凡此諸職皆與軍器相聨而玉府內府已為內務府廣儲之職職金所掌亦不止武備之事其所云為兵器之府者即在夏官司甲司兵等屬中兹故不具載焉商子來民篇湯武既破桀紂海內無害天下大定築五庫藏五兵謹案周禮雖無武庫之名而商子稱湯武築五庫藏五兵則當時儲兵之府亦以庫名即後世武庫所自昉也故淮南子原道訓云葉公入乃廢太府之貨以豫衆出高庫之兵以賦民高庫即五庫之類也管子小匡制重罪入以兵甲犀脅二戟輕罪入以蘭盾鞈革二戟小罪入以全鉤分宥簿罪入以半鉤無坐抑而訟獄者正三禁之而不直則入一束矢以罰之美金以鑄戈劍矛戟試諸狗馬惡金以鑄斧鉏夷鋸钃試諸土木其云入兵甲犀脅二戟又云入蘭盾鞈革二戟又云入鈎金束矢皆當入五兵之庫矣其云美金以鑄戈劍矛戟則當如漢考工若盧之主作兵器也又考司馬法定爵篇云右兵弓矢禦殳矛守戈戟助凡五兵五當長以衛短短以衛長注云五兵弓矢殳矛戈戟也蓋兵器衆多而以五兵為最要故五兵各設一庫商子所謂五兵五庫蓋謂此也周禮夏官司兵掌五兵五盾各辨其物與其等以待軍事然則五庫長吏當即司兵之屬矣秦戰國策天下之強弓徑弩皆自韓出溪子少府時力距來皆射六百步之外注韓有溪子弩又有少府所造二種之弩謹案戰國䇿注謂二種之弩造自少府則秦之少府當如漢之考工尚方矣漢少府屬官有考工尚方猶其遺制漢漢書百官公卿表少府屬官有若盧如淳曰若盧官名也藏兵器品令曰若盧郎中二十人主弩射漢儀注有若盧獄令主治庫兵將相大臣考工室臣瓚曰名官為考工主作器械也尚方漢官儀尚方令掌工作刀劍諸物及刻玉為器等令丞中尉屬官有武庫令丞謹案漢書如淳注謂若盧藏兵器臣瓚注謂考工主作器械則是考工主作而若盧主藏也然後漢百官志注及玉海謂考工令主作兵器弓弩刀鎧之屬器成則傳金吾入武庫是考工兵器既藏若盧又藏武庫也考漢書左將軍請召王商詣若盧詔獄孟康曰黃門北寺也黃門在禁中則若盧亦當在禁中武庫既屬中尉或與若盧有內外逺近之殊歟又考若盧有獄考工亦有獄漢書劉輔傳共工獄蘇林曰考工也然則考工亦有獄矣考工若盧皆主兵械易匿不詭法令尤密故置獄歟又考工主作兵器尚方亦主作兵器故漢書劉更生典尚方鑄作事韓延夀鑄刀劍鈎鐔放效尚方六典注蔡倫和帝時為尚方令作祕劍皆其事也然尚方又兼作禁器故古今注尚方故事有司南記里鼓漢書哀帝罷尚方御府技巧靡麗之物吕強上疏亦謂中上方斂諸郡之寶故漢官儀以尚方掌作刀劍諸物及刻玉為器而崔實尚方令針比諸古之玉府也蓋較諸考工所造彌巧而所聚百珍尤非外府可擬矣今之養心殿造辦處職近于是故與內務府表互載焉史記平凖書武帝時邊兵不足乃發武庫上官兵器以贍之通典武庫署令兩漢曰武庫令屬執金吾謹案漢杜欽為大將軍武庫令田千秋子為洛陽武庫令武庫令屬之洛陽與若盧之屬禁中顯異若大將軍武庫令則又武庫之屬于大將軍者蓋其職不常置故表志不載爾漢書髙帝本紀七年蕭何治未央立武庫太倉王應麟玉海漢武庫屬中尉執金吾有令丞専主兵器而天子又自有若盧以藏兵器考工室以主作器械考工令主作兵器弩弓鎧之屬器成則傳金吾入武庫文選西京賦武庫禁兵設在蘭錡三輔黃圖高祖斬白蛇劍藏於寶庫惠帝即位以此庫貯禁兵名曰靈金內府謹案漢制少府若盧考工室尚方之官主藏兵器作器械考若盧兼治詔獄故與內務府之慎刑司篇互見尚方令亦兼掌刻玉為器之事故與廣儲司屬亦互見而武庫令設于高帝之初後屬執金吾所轄繕治造作皆度大司農錢與少府所屬似不相同故田蚡傳稱蚡嘗請考工地蓋宅上怒曰君何不遂取武庫明武庫與考工不同掌也然考史記稱邊兵不足乃發武庫工官兵器以贍之則是武庫為天子御用之兵器初不以給行軍之用惟因外兵不足故權發以濟事而所謂工官者意即考工尚方之類故張衡西京賦亦有武庫禁兵之稱是又典主禁兵之明證也又考工令作兵弩刀鎧成則傳執金吾入武庫是武庫中固自有御用軍器之藏蓋一官而兩司其事矣兹故詳考職掌並採録於篇中後漢書百官志太僕卿官屬考工令一人六百石本注曰主作兵器弓弩刀鎧之屬成則傳執金吾入武庫及主織綬諸雜工左右丞各一人執金吾官屬武庫令一人六百石本注曰主兵器丞一人通典後漢有考工令丞置太僕主造兵器成材武庫令唐六典注蔡倫和帝時為尚方令作祕劍皆有龍泉太阿之目倫器械精密為後世法謹案後漢以考工令丞成造兵器蓋即西漢考工室之職其屬之太僕者以太僕掌御仗儀衛故併隸之輿服志稱矛戟幢麾弩服藏在武庫即其職也漢又有洛陽武庫自西漢時已有之則分主軍國之用而不與御器相關矣三國通典漢武庫令屬執金吾考工令屬太僕魏因之漢末分尚方為中左右三尚方魏因之謹案三國官制多承後漢如尚方令主作兵器屬少府武庫令屬中尉執金吾魏改執金吾仍為中尉而武庫隸之蓋猶前代之制也晉晉書百官志衛尉統武庫等令丞左右省少府統中左右三尚方等令丞唐六典漢武庫令六百石晉因之通典漢末分左右中尚方晉因之自過江惟置一尚方哀帝以隸丹陽尹謹案晉武庫尚方與漢魏同唯過江省三尚方為一後復隸丹陽尹為少異考中左右三尚方史不言其所掌以隋唐之制例考之中署掌供內營造諸職蓋如今之營造司故不列于表惟左署掌造弓箭弩戟器仗等則如今武備院氊庫之屬右署掌造甲胄裝刀斧鉞等則如今甲庫之屬而東晉併三為一則又合其事于一官也宋齊梁陳唐六典宋尚書庫部屬官有武庫令掌軍器齊因之梁衛尉寺統武庫署令丞掌甲兵及吉凶儀仗通典宋齊武庫令丞屬尚書庫部梁陳屬衛尉卿梁官三品曹位北武庫丞南武庫丞宋書百官志宋武帝踐阼以相府部配臺謂之左尚方而本署謂之右尚方並掌造軍器又以相府細作配臺即其名置令一人隸門下孝武改曰御府後廢帝初省御府置中署隸右尚方則漢之考工令如今之尚方令尚方令如今中署矣通志齊置左右尚方令各一人隋書百官志梁少府卿置中左右尚方等令丞衛尉卿統武庫令陳承梁並因其制官謹案宋齊以武庫屬尚書之庫部蓋已非僅供御器械之職梁陳屬衛尉掌甲兵及吉凶儀仗是又兼主儀衛亦以其職守所在固自相通也唯少府左右尚方皆主造軍器而左尚方之職為尤近蓋右尚方嘗改名中署由細作配臺而設近于魏晉之中尚方宋書雖言漢考工令如宋之尚方漢尚方令如宋之中署其實漢自有御府一官與中署相同而尚方令則仍在御府及宋中署之外也至梁陳之三尚方則一如魏晉之制矣北魏北魏書奚康生列傳康生彎弓十石梁聞康生能引強弓特作大弓兩張長八尺把中圍尺一寸箭粗殆如今之長笛送康生康生平射猶有餘力即表送置之武庫謹案後魏官氏志有衛尉少府而無武庫尚方諸官唯諸署令有三品列于從第八品第九品從第九品蓋武庫署諸職皆在其內史苐統言之而未為詳列故無可考證也北齊隋書百官志衛尉掌禁衛甲兵領武庫掌甲兵及吉凶儀仗等庫署令武庫又有修故局丞掌領匠修故甲等事太府寺統中左右三尚方等署令丞謹案北齊武庫掌甲兵而兼儀仗蓋如今鑾儀右所掌繖蓋儀刀弓矢槍殳戟之事但武庫職制厯代相承凡御用軍器並歸掌理故與鑾儀衛篇互見以著其實三尚方皆領别局而左尚所領之器作蓋于軍器為近也後周通典後周官正五命夏官武藏中大夫正四命夏官小武藏下大夫正三命冬官鍛工函工等上士正二命夏官司弓矢司甲司矟等中士冬官鍛工函工鞄工韋工等中士正一命夏官司弓矢司矟司甲司刀盾等下士冬官弓工箭工鍛工函工鞄工等下士册府元龜後周武帝四年置軍器監軍器有監自此始也玉海後周武帝建德四年正月戊辰初置營軍器監謹案後周制官如成周武備職在夏官冬官中至軍器監之設實自後周始蓋本漢考工尚方諸職而改置之者抑以其時戰爭方亟廣造軍器而别為立監亦不専為御府器械而設也隋隋書百官志衛尉寺統武庫等署令丞太府寺統左尚方內尚方右尚方等署令丞少府監焬帝置統左尚右尚內尚鎧甲弓弩等一署令丞後廢鎧甲弓弩二署唐六典開皇中三尚方俱屬太府寺煬帝始改隸少府左尚方掌造車輦繖扇矟眊弓箭弩戟器仗刀鏃等事右尚方掌造甲胄具裝刀斧鉞及皮毛雜作等事隋少府有甲鎧署弓弩署謹案隋武庫掌於衛尉與前代同三尚方初隸太府後改隸少府并增設甲鎧弓弩二署今考左尚方掌造弓箭與弓弩署均為今氊庫之屬右尚方掌造甲胄與甲鎧署均為今甲庫之屬既有左右二尚故甲鎧弓弩二署不久而旋廢也左尚兼掌造車輦繖蓋為今鑾儀衛右所之職故並從互見焉唐唐書百官志少府監官屬右尚方令一人從七品下丞四人從八品下掌供十二間馬之轡每歲取於京兆河南府加飾乃進凡五品三部之帳刀劍斧鉞甲胄紙筆茵席履舄皆擬其用皮毛之工亦領焉監作六人有府七人史二十人典事十三人掌固十人唐六典衛尉寺武庫令掌職天下之兵仗器械辨其名數以備國用丞為之二唐書劉黑闥列傳初秦王建天䇿府其弧矢制倍于常逐黑闥時為突厥所窘自以大箭射却之突厥得箭傳觀以為神後餘大弓一長矢五藏之武庫世世寶之唐書百官志軍器監監一人正四品上丞一人正七品上掌繕甲弩以時輸武庫總署二一曰弩坊二曰甲坊主簿一人正八品下録事一人從九品下武德初有武器監一人正八品下掌兵仗廄牧少監一人丞二人主簿一人七年廢軍器監八年復置九年又廢貞觀六年廢武器監開元以前軍器皆出右尚署三年置軍器監十一年復廢為甲弩坊隸少府十六年復為監有府八人史十二人亭長二人掌固四人弩坊署令一人正八品下丞一人正九品下掌出納矛矟弓矢排弩刀鏃雜作及工匠監作二人有府二人史五人典事二人貞觀六年改弓弩署為弩坊署甲鎧署為甲坊署甲坊署令一人正八品下丞一人正九品下掌出納甲胄綅繩筋角雜作及工匠監作一人有府二人史五人典事一人唐六典北都軍器監開元初屬少府監十六年移向北都掌營造甲弩之屬辨其名物審其制度以時納于武庫少監為之二焉丞掌判監事凡材革出納之數工徒衆寡之役皆督課焉主簿掌印及勾檢稽失録事掌受事發辰甲坊署令丞監作隋少府有甲鎧署唐改焉弩坊署令丞監作隋有弓弩署唐改焉各掌其所修之物督其繕造辨其粗良丞為之二凡財物之出納庫藏之儲備必謹而守之唐六典乾元元年軍器監改為軍器使以內官為之貞元四年自武德東門築垣約左藏庫之北屬宫城東垣於是武庫遂廢其軍戎器械隸軍器使謹案唐少府之左尚署掌供翟扇繖蓋五輅七輦而無復隋時兼造弓箭弩戟之職蓋自開元以後分立軍器監有甲坊弩坊二署以専司其事故左尚不復主之其自開元以前軍器皆出左尚署則尚與隋同兹從其改制之後以為定故以左尚次於鑾儀衛篇而不列於此表至右尚掌十有二間之鞍轡與今北鞍庫同職而刀劍甲胄則又有甲庫兼職至甲坊弩坊與今甲庫氊庫又適相合矣武庫令掌天下之兵仗器械不専為御用之職惟以軍器監所繕造皆以時受而入之則其所儲藏者首以供御為重亦可考見也五季宋宋史職官志衛尉寺掌儀衛兵械甲胄之政令舊制凡武庫武器歸內庫守宫歸儀鸞寺本寺無所掌元豐制行始歸本寺其屬有內弓箭庫南外庫軍器弓鎗庫軍器弩劍箭庫掌藏兵仗器械甲胄以備軍國之用儀鸞司掌供幕帟供張之事軍器什物庫宣德樓什物庫掌收貯什物給用則按籍而頒之中興後衛尉併入工部軍器監國初戎器之職領于三司胄曹案官無専職熙寧六年廢胄案乃按唐令置監以從官總判元豐正名始置監各一人丞二人主簿一人監掌監督繕治兵器什物以給軍國之用少監為之二丞參領之凡利器以法式授工徒其弓矢干戈甲胄劍戟戰守之具因其能而分任之墨用給材旬會其數以考程課而輸于武庫委遣官詣所隸檢察凡用膠漆筋革財物必以時課百工造作勞逸必均歲終閲其良否多寡之數以詔賞罰器成則進呈便殿俟閲試而頒其樣製于諸道即要會州建都作院分造器械從本監比較而進退其官吏焉元祐三年省丞一員紹聖中復置政和三年應御前軍器監所頒降軍器樣製非長二當職官不得省閲及傳寫漏泄論以違製分案五置吏十有三所隸官屬四東西作坊掌造兵器旗幟戎帳什物辨其名色謹其繕作以輸于受藏之府兵校工匠其役有程視精粗利鈍以為之賞罰作坊物料庫掌收鐵錫羽箭油漆之屬皮角場掌收皮革筋角以供作坊之用南渡置御前軍器所建炎三年詔軍器監併歸工部東西作坊都作院併入軍器所紹興三年復置丞一員令工部相度合管職事歸之十一年詔復置長二員一員十四年以朝奉大夫趙子厚守軍器監宗室為寺監長二自此始隆興初年置造軍器已有軍器所隸工部本部惟置丞一員乾道五年復置少監及簿六年以少監韓玉往建康點檢物馬以奉使軍器少監為名是年復置監一員淳熙初元詔戎器非進入毋輒出所由是呈驗寖省二年錢良臣以少監總領淮東財賦八年沈揆復以監長行諸監長二自是始許總餉外帶然二人實初兼版曹職事嘉定十四年嶽珂獨以軍器監總餉淮東是後戎所作坊已備官于下宥府起部並提綱于上監居其間事務稍簡特為儲才之所焉軍器所隸工部提點官二員紹興三十二年詔于邊臣內差提轄監造官各二員幹辨受給監門官各一員掌鳩工聚材製造戎器之政令舊就軍器監制别差提舉官以內侍領之紹興中改隸工部罷提舉官曰輪工部郎官軍器監官前去本所點檢省視後復以中人典領工部侍郎黃中以為言請復隸屬從之孝宗即位有旨增置提點官以內省都知李綽為之改稱提舉免隸工部後以御史張震力爭復隸工部後改隸步軍司尋復舊紹興元年減省員額如上制玉海熙寧元年十二月二十二日以內臣張若水閣門使李評提舉編擇增修弓弩若水造神臂弓六年六月二十七日己亥初置軍器監以三司胄案為監命吕惠卿曽孝寬判之制度皆著為式凡一百十卷雜材一軍器七十四件物二十一雜物四添修及製造弓弩式十卷七月甲寅置內弓箭南庫儲御前所製七年正月十二日庚戌惠卿等上裁定中外所獻槍刀樣又上編成弓式初京師及諸路戎器雜惡河朔尤甚至是所製兵械皆精利其後詔以新造軍器付諸路為式遣官分諭之宋軍器五庫在崇政殿東橫門外掌禁兵器衣甲槍弩箭各為一庫又有什物庫在清平坊淳化二年置㨂選衣甲器械庫熙寧六年置內弓箭南庫儲御前所製軍器命官提舉建炎七年以軍器衣甲內弓箭南內外七庫併為一名曰內軍器庫紹興二年什物庫亦併入七年正月置軍器局于建康十一月罷乾道五年重修內軍器南庫謹案宋軍器之職始領于三司胄案其後乃置軍器監以統領之衛尉寺之內弓箭軍器弓鎗等庫定于元豐之改制遂合唐代之舊職至南渡後立御前軍器所而以軍器監及內弓箭等庫並隸工部未幾旋置提舉遂以內侍領其職則失慎重戎器之道矣自是或隸工部或差內侍變更不一皆不得為定制也軍器監有衣甲槍弩箭五庫頗似今四庫之制而宋時諸庫置在禁近實兼為兵戎之用而設與今武備院規制亦略有不同遼遼史百官志諸坊職名總目某坊使某坊副使某坊詳衮使某坊詳衮某坊都監八坊內有軍器坊謹案遼北面之軍器坊使蓋承唐甲坊弩坊之官屬于軍器監者而設至南面官悉如唐制則衛尉之武庫少府之尚方亦必與唐代不殊今以史文不詳並從缺焉金金史百官志殿前都點檢司屬官器物局提點正五品使從五品副使從六品掌進御器械鞍轡諸物直長正八品都監正九品明昌三年省罷同監從九品泰和四年設武庫署令從六品丞從七品掌收貯諸路常課甲仗以曉軍器女直人充武器署提點從五品令從六品丞從七品掌祭祀朝會巡幸及公卿婚葬鹵簿儀仗旗鼓笛角之事直長正八品或二員頓舍官二員泰和令總格作四員正八品直長見士民須知泰和令無少府監屬官尚方令一人丞一人軍器監承安二年設泰和四年罷復并甲坊利器兩署為軍器署置令丞直長直隸兵部至寧元年復為軍器監軍器庫利器署隸焉舊轄甲坊利器兩署監從五品少監從六品丞從七品掌修治邦國戎器之事直長正八品泰和令無總格有八作左右院使一人副使一人掌收軍須軍器謹案金以武庫武器二署屬之殿前都點檢而器物局提點専掌進御器械鞍轡等物置使副使以重其職猶今武備院卿之所掌也軍器監始隸兵部後復别設八作左右院亦似宋之將作監屬官改而别置皆掌軍須軍器蓋進御器械固非専職而成造監製恆必由之器物局但掌儲藏供進而已故並列於篇中元元史百官志大都留守司屬官器物局秩從五品掌內府宫殿及御用各位下鞍轡瑚格原作忽哥今改正轎子帳房凡精巧之藝大使一員從五品副使一員正七品直長二員正八品吏目一員司吏二人中統四年始立御用器物局受劄至元七年改為器物局其屬成鞍局提領三員掌造御用鞍轡象轎中統四年置羊山鞍局提領一員掌造常課鞍轡諸物至元十八年置刀子局提控二員掌造御用及諸宫邸寶貝佩刀之工中統四年置轎子局提領一員掌造御用異樣木植鞍子諸物中統四年置謹案元制御府器備盡領于大都留守司其設官最為詳備如器物局大使統掌都用及各位下鞍轡蓋如今武備院卿之職其成鞍局提領専掌御用鞍轡如今北鞍庫羊山鞍局提領掌常課鞍轡如今南鞍庫刀子局提控如甲庫之司轎子局提領亦北鞍庫之所理也元史百官志武備寺從三品掌繕治戎器兼典受給卿四員正三品同判六員從三品少卿四員從四品丞四員從五品經厯知事各一員照磨兼提控案牘一員承發架閣庫管勾一員辨驗弓官二員辨驗筋角翎毛等官二員今史十有三人至元王年始立庫器監秩四品十九年升正三品二十年立衛尉院改軍器監為武備監秩四品隸衛尉院二十一年改監為寺與衛尉並立大德十一年升為院至大四年復為寺所轄屬官則自為選擇其匠户之能者任之謹案元武備寺承唐宋之軍器監而設其所掌並兼各路軍器與今院職不同今因其時以武備名官其屬官皆寺所自選足為武備院考證故並採録于篇中元史百官志尚乘寺從三品掌上御鞍轡及領隨路局院鞍轡等造作收支行省歲造鞍轡等事卿四員正三品少卿二員從四品丞二員從五品經厯知事照磨管勾各二員至元二十四年罷衛尉始設尚乘寺領資乘庫謹案元尚乘寺事務其初為太僕及衛尉所掌後廢衛尉特設寺官所掌有上用鞍轡及隨器鞍轡則亦今北鞍南鞍二庫之所掌也明明史職官志工部所轄皮作局鞍轡局軍器局大使一人副使一人凡軍裝器械下所司造牌符火器鑄於內府禁其以法式泄于外王圻續文獻通考皮作局掌硝熟皮張成造靴鞋鞍轡兵仗局掌造各項軍器每局設大使一人正九品副使一人從九品皆于流官內選用隸工部明史職官志宦官兵仗局掌印太監一員提督軍器庫太監一員管理僉書掌司寫字監工無定員掌製造軍器火藥司屬之盔甲厰即舊鞍轡局掌造軍器謹案明代不設軍器監而以皮作鞍轡軍器諸局隸之工部至於上用兵仗則以宦官之兵仗局盔甲厰理之戎器之政視前代尤為疏略矣考天文奎十六星著於垣象為天之武庫聖王象之重戎兵之制故成周夏官冬官各有戈盾弓矢之職而職金玉府所藏以良兵器與祕器圖球並重漢自蕭和營未央宫輒首及武庫之建而考工尚方隸于少府其職亦非輕也晉宋以後遞有變易而大概不殊自後始立軍器監而唐因之甲坊弩坊専掌繕造史稱秦王大弓長矢藏之武庫蓋帝王威御之器厯世寶藏與漢武庫藏高祖斷蛇劍者同意至宋而弓箭弩劍等庫初隸衛尉後入工部南渡置御前軍器所每用內侍為提舉廷臣力爭始隸工部此所以戎兵不飭而國勢日弱也金元設官進御器械鞍轡諸物與御仗鸞儀恆相兼攝而元之器物局尚乘寺尤臻詳備迄於明室自工部所隸而外一委之宦者之手而宦官所掌自司禮御用寶鈔銀作等司局統轄甚為詳密惟至進御器械則止有兵仗盔甲二職亦未嘗視之為重務是其玩褻戎兵聲靈靡振古聖王張皇六師作弧矢以威天下之制蕩然盡失即漢唐慎重戎器之意亦無復存矣我朝自列祖列宗神武開國初設鞍樓肅掌武器自後改為武備院隸內務府典之以三品卿職復特簡大臣管理事務以重其職守皇上天授聖武自行圍進哨閲武校射咸躬御甲胄弓矢命將出師則頒發甲仗弓矢以震憺天威武備院卿敬供厥事每修繕器械必進呈睿覽文覃武爍赫業肅莊洵非厯代飭戎之政所得比隆於萬一者矣欽定厯代職官表卷四十一
