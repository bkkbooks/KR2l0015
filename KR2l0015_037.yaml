body:
  text: 太僕寺國朝官制太僕寺卿滿洲漢人各一人從三品少卿滿洲漢人各一人正四品掌兩翼牧馬場之政令凡遇車駕行幸以卿少卿一人隨蹕司幔城網城馱載槖駝每嵗夏季則以卿少卿一人率屬赴牧場稽其孳生斃損之數分注於册三年乃均齊之以定賞罰焉國初置太僕寺附于兵部武庫司設卿滿洲漢人各一人少卿滿洲二人漢人一人寺丞滿洲漢人各一人順治元年十二月省太僕寺九年復置十五年省寺丞員額十六年復置康熙二年仍省雍正三年始建衙署于正陽門之東乾隆十三年省滿洲少卿一人近嵗以來以大臣兼管寺事皆由特簡無常員左司員外郎滿洲蒙古各一人主事滿洲蒙古各一人掌馱載幔城網城之駝隻以備巡幸之用初制不分司設滿洲員外郎八人雍正三年省二人改設蒙古員外郎二人乾隆六年始置左右二司各分職掌給以印信十三年定原設員外郎八人改為滿洲員外郎二人蒙古員外郎二人滿洲主事二人蒙古主事二人右司員外郎滿洲蒙古各一人主事滿洲蒙古各一人掌察驗牧場馬匹盈虧以時印烙主簿滿洲一人正七品掌章奏文移初置漢人主簿一人康熙二年省雍正二年復置滿洲主簿一人筆帖式滿洲八人蒙古八人初制滿洲筆帖式十有一人蒙古四人漢軍二人康熙二年省滿洲筆帖式三人雍正三年省漢軍員額乾隆三年增置蒙古筆帖式四人職事具吏部篇謹按太僕寺初置常盈庫以直𨽻山東河南額徵馬價銀六十餘萬解寺貯庫嵗終核銷設漢大使一人掌之尋以馬價銀歸併户部省常盈庫大使員額謹識于此統轄兩翼牧場總管一人以察哈爾副都統兼管兩翼總管各一人正四品翼長各一人正五品護軍校各四人初制八品後升為正七品以上皆蒙古員額駐劄張家口辦理牧場事務主事一人筆帖式一人牧場置于張家口外左翼四旗在哈喇尼墩井東西百五十里南北百三十里右翼四旗在齊齊爾漢河東西百五十里南北三十二里馬羣百九十二每羣牧長牧副各一人牝馬羣百六十每羣牧丁八人牡馬羣三十二每羣牧丁十有四人護軍三百十有四人總管翼長居適中之地綜治牧政護軍校協領等各巡牧所禁盜馬及墾耕者統轄總管乾隆十三年置以察哈爾副都統兼理總管康熙四十四年置護軍校等員雍正元年置又原置有副管二人防禦二人翼領四人驍騎校三人今俱省凡總管員闕於察哈爾佐領世爵及牧場翼長等官內選用翼長以下員闕於護軍校等官次第選用皆由寺引見除授張家口辦理牧場事務官於本寺主事筆帖式內各㨂選一員五年輪請更換厯代建置三代春秋左氏傳少康為仍牧正杜預注牧官之長竹書紀年周公季厯伐余無之戎克之命為牧師詩大雅出車篇我出我車于彼牧矣毛亨傳出車就馬于牧地鄭康成箋西伯以天子命出車牧地詩無羊宣王考牧也鄭康成箋厲王之時牧人之職廢宣王始興而復之謹按劉向列仙傳稱馬師皇為黃帝馬師其説無據而夏之牧正殷之牧師皆見于經傳則典牧之官其由來固已久矣列子黃帝篇周宣王之牧正有役人梁鴛者能養禽獸尚書小序穆王命伯冏為周太僕正作冏命孔安國傳太僕長太御中大夫孔頴達疏正訓長也周禮太御中大夫太僕下大夫孔以此言太僕正則官髙於太僕故以為周禮太御周禮夏官太僕下大夫二人掌正王之服位出入王之大命王出入則自左馭而前驅淮南子時則訓命太僕及七騶咸駕戴荏授車以級齊職儀太僕周官也尚書稱穆王命伯冏為太僕正是也盍為衆僕之長謹案今太僕寺之官雖沿周太僕舊名然其職掌實迥不相合蓋僕本侍御於尊者之名其下有祭僕御僕𨽻僕諸官而以太僕為之長故稱太僕所司在正服位詔法儀常居於大寢之門內以左右王當如今之領侍衛內大臣及御前大臣其出入大命掌諸侯之復逆則又如今之奏事處及通政使司其左馭前驅則又如今之鑾儀衛而馬政别掌于校人諸職不關太僕今據其官守所在已分繫之領侍衛內大臣等篇特以稱名所承沿襲有自故亦並載于此表而附識古今異同之故以著其實云周禮夏官校人中大夫二人上士四人下士十有六人府四人史八人胥八人徒八十人掌王馬之政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物凡頒良馬而養乘之乘馬一師四圉三乘為皂皂一趣馬三皂為繫繫一馭夫六繫為廏廏一僕夫六廏成校校有左右駑馬三良馬之數麗馬一圉八麗一師八師一趣馬八趣馬一馭夫天子十有二間馬六種邦國六間馬四種家四間馬二種凡馬特居四之一春祭馬祖執駒夏祭先牧頒馬攻特秋祭馬社臧僕冬祭馬步獻馬講馭夫凡大祭祀朝覲會同毛馬而頒之軍事物馬而頒之鄭康成注校者校也主馬者必仍校視之校人馬官之長趣馬下士皂一人徒四人掌贊正良馬而齊其飲食簡其六節鄭康成注趣馬趣養馬者也鄭司農云詩蹶惟趣馬巫馬下士二人醫四人府一人史二人賈二人徒二十人掌養馬疾而乘治之鄭康成注巫馬知馬祖先牧馬社馬步之神者馬病若有犯焉則知之是以使與醫同職賈公彥疏巫知馬祟醫知馬病有賈者治馬死生須知馬價也牧師下士四人胥四人徒四十人掌牧地皆有厲禁而頒之孟春焚牧中春通淫掌其政令凡田事贊焚萊鄭康成注牧師主牧放馬而養之庾人下士間二人史二人徒二十人掌十有二間之政教以阜馬佚特教駣攻駒及祭馬祖祭間之先牧及執駒散馬耳圉馬正校人員選鄭康成注庾之言數校人謂師圉也正員選者選擇可備員者平之賈公彥疏凡言正者以尊正卑自趣馬已上並上官非庾人所正故知所正者師圉圉師乘一人徒二人掌教圉人養馬春除蓐釁廏始牧夏庌馬冬獻馬圉人良馬匹一人駑馬麗一人掌養馬芻牧之事以役圉師馬質中士二人府一人史二人賈四人徒八人掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈網惡馬鄭康成注質平也主買馬平其大小之賈直謹按今太僕之職本出于周官之校人而所掌馬政則古今異宜有未可以概論者蓋成周之世軍賦出于邱甸一邱出戎馬一匹一甸出戎馬四匹畿內提封萬井出戎馬四萬匹皆民養之于平日有軍旅則賦之其畜牧之事並不領于有司若校人良馬五物惟以駕王之乘車二車從車駑馬一物則以供畿內小吏單騎及役車之用而兵革不與焉國語所謂國馬足以行軍公馬足以供賦者國馬即民馬蓋指邱甸所出之馬而公馬即校人之王馬乃天子所駕用者也此據國語韋昭注一説以國馬即王馬與此不同後世田井既廢四邱出甲之法久已不行戎馬官自畜養由漢以來內外廏及諸牧苑悉以屬之太僕國馬王馬遂併𨽻一官下逮唐宋復以中廏所畜者别主之殿中監尚乘局御馬院等官殿中監尚乘局皆唐置御馬院宋置説詳上駟院篇而太僕惟掌國馬于是校人所司王馬之政又不盡在冏卿矣本朝定制自口外諸牧場及八旗直省營馬並分職經理各有司存其天間供御之乘則掌之上駟院太僕所管惟左右翼牧厰為國馬之一周禮校人之職其實當在上駟院而馬官沿革所自通典諸書悉以繫之太僕寺故仍互見于此表以明緣起焉秦册府元龜周穆王置太僕正掌輿馬秦因之唐六典太僕秦官爾雅釋畜注秦有騉蹄苑謹案秦時有騉蹄苑則必有苑官可知漢牧苑之制已始于此漢漢書百官公卿表太僕掌輿馬有兩丞屬官有太廏未央家馬三令各五丞一尉又車府路軨騎馬駿馬四令丞又龍馬間駒槖泉騊駼乘華五監長丞又邊郡六牧師苑令各三丞又牧槖昆蹄令丞皆屬焉謹案太僕掌校人之職當始於秦漢之間考成六年傳韓獻子將新中軍且為僕大夫公揖而入獻子從公立於寢庭杜謂獻子兼太僕蓋公自路門外揖而入于路寢庭而獻子從公以其為太僕掌正服位故出入必從也然則春秋時太僕本職猶與周禮相合襄九年傳使皇父命校正出馬正義校正主馬于周禮為校人成十八年傳辨糾御戎校正屬焉注校正主馬官正義校正當周禮校人哀三年傳校人乘馬注云校人掌馬然則春秋時主馬政者仍是周禮校人未見其掌于太僕册府元龜謂周穆王時太僕掌輿馬以太僕本為王馭故云掌輿馬未必若漢時之主五監六廏也其合太僕校人為一職則自漢書百官公卿表始也荀悅漢紀太僕掌輿馬屬官杜佑通典太僕漢初夏侯嬰常為之漢書曰夏侯嬰為沛公太僕常奉車自髙帝至文帝常為太僕又石慶為太僕御出上問車中幾馬慶以䇿數馬畢曰六馬領五監六廏各有令謹案漢紀韓信事項羽為郎中羽不能用而去歸于漢坐事當斬已伏鑕仰視乃見夏侯嬰曰王不欲取天下也而斬壯士太僕嬰言於王赦之不誅蓋太僕主出入王之大命夏侯嬰時為太僕故得言之于王也漢制近古此為一端漢書本紀如淳注漢儀注太僕牧師諸苑三十六所分布北邊西邊以郎為苑監官奴婢三萬人養馬三十萬匹顔師古曰養鳥獸者通名為苑故謂牧馬處為苑三輔黃圖太僕御屬車八十一乘揚雄太僕針肅肅太僕車馬是供鏘鏘和鸞駕彼時龍王用三驅前禽是射僕夫執鞗載騂載駰我輿云安我馬惟間雖馳雖驅匪逸匪愆昔有淫羿馳騁忘歸景公千駟而淫于齊牧于坰野詩人興魯僕臣司駕敢告執皂漢書地理志北地郡靈川縣有河竒苑號非苑歸德縣有堵苑白馬苑郁郅縣有牧師苑官遼東郡襄平縣有牧師官西河郡鴻門縣有天封苑後漢書百官志太僕卿一人中二千石掌車馬天子每出奏駕上鹵簿用大駕則執馭丞一人比千石未央廏令一人六百石主乘輿及廏中諸馬長樂廏丞一人舊有六廏皆六百石令中興省約但置一廏後置左駿令廏别主乘輿御馬後或并省又有牧師苑皆令官主養馬分在河西六郡界中中興皆省惟漢陽有流馬苑但以羽林郎監領謹案前漢紀景帝紀太僕周舍為御史大夫宣帝紀太僕陳萬年為御史大夫成帝紀太僕王音為御史大夫蓋御史大夫為丞相之副太僕為漢九卿之一秩二千石故太僕得擢御史大夫也又由太僕竟為丞相者太僕公孫賀為丞相是也可以證太僕一官在漢九卿為尤顯後漢紀太僕張純為大司空太僕鄧盛為太尉則由太僕而為三公蓋襲前漢之制劉昭後漢書志注太僕員吏七十人其七人四科一人二百石文學八人百石六人升食七人佐六人騎吏三人假佐三十一人學事一人官醫歐陽詢藝文類聚續漢書曰趙岐獻帝以為太僕謹案秦漢以太僕主輿馬杜佑謂其兼有周官校人掌馬巾車掌車之任故當時太僕卿執馭奉車及奏鹵簿其職實如今之鑾儀衛固不獨典司牧事也即以牧事而論所轄五監六廏及牧師諸苑亦兼國馬王馬之政而統治之三國志載魏王朗稱西京中廏則騑騄駙馬六萬餘匹外牧則扈養三萬而馬十之蓋皆𨽻之于太僕今制內廏馬匹悉屬上駟院太僕止管左右翼二牧厰是所掌但有外牧而乘輿御馬不預焉故以漢制準之惟諸牧苑令丞主邊郡養馬當如今右司之職牧槖令丞主牧養槖駝當如今左司之職苑監官當如今牧場總管之職若太廏未央等令丞則專司天子中廏之畜當為今上駟院之職已非太僕所自承特以前代職制不同未可盡略故仍互見于此而其詳則著于上駟院篇內云三國三國蜀志後主傳太僕蔣顯通典後漢太僕亦掌車馬魏因之三國魏志潘尼列傳尼為太僕造乘輿針魏文帝追諡杜畿詔昔冥勤其官而水死稷勤百榖而山死故尚書僕射杜畿于孟津試船遂至覆沒忠之至也朕甚愍焉追贈太僕諡曰戴侯謹案後漢志尚書僕射秩六百石太僕秩二千石魏制當與後漢同以六百石擢二千石蓋追贈特優其典也洪適𨽻釋魏公卿上尊號奏太僕臣唐六典魏置牧官都尉謹案漢牧師苑令其所治雖在邊郡而實為太僕屬官當如明行太僕寺之比至魏之牧官都尉則又别置職名為後來監牧所自出當如今之牧場總管也晉晉書職官志太僕統左右中典牧都尉車府典牧乘黃廏驊騮廏龍馬廏等令自元帝渡江之後或省或置太僕省故驊騮為門下之職藝文類聚晉諸公贊曰郭展為太僕留心於養生是以廏馬充牣其後征吳得以濟事唐六典晉太僕過江省其後又置成帝永和七年省併宗正蓋有事則權置無事則省謹案自晉以迄唐代皆沿漢制太僕兼管輿馬故所屬如車府令為今鑾儀衛之職乘黃驊騮龍馬諸廏令為今上駟院之職俱已分别析載惟典牧令專司牧政正與今太僕寺右司職掌相合故獨繫之於此表後皆仿此宋齊梁陳通典太僕宋以來不常置郊祀則權置太僕執轡事畢則省齊亦然謹案宋齊二代不置太僕而别有乘黃令屬太常驊騮丞屬侍中以掌乘輿廏馬又御史臺有庫曹以主廏牧是國馬王馬其職固各有所分屬也梁簡文帝馬寶頌五月丁酉朔詔以馬寶示羣臣太僕效官趣馬掌贊八麗四圉給役相趨暉煜金鐮陸離寶勒鸞眄善鳴龍儀美稱總轡崑岑周非吾馭張樂大野夏有慙德乾道應坤馬來度玉關升玉臺千夫駟百龍媒永伏皂掃騊駼秣瑤粟委芳芻九夷欵四表清氓胥樂輿頌興隋書百官志梁置太僕卿為夏卿統南馬牧左右牧龍廏內外廏丞通典梁太僕卿位視黃門侍郎陳因之徐堅初學記太僕梁又置之加卿字曰太僕卿後皆因之謹案梁代雖置太僕而乘黃署仍屬太常故太僕惟司牧政不典車輅簡文帝馬寶頌稱太僕效官亦以其典龍廏也近世冏寺專為馬官其權輿已見于此矣北魏魏書官氏志太僕第二品上太和中又置少卿改太僕卿正三品少卿正四品楊衒之洛陽伽藍記劉騰宅東有太僕寺唐六典後魏太僕卿第二品上又置少卿太和二十二年九卿並第三品魏書官氏志延興四年二月置外牧官太和十五年十二月置都牧官太和八年令典牧都尉從第五品中司馬光資治通鑑魏蕭寶寅死于駝牛署胡三省注後魏有駝牛都尉署者其寺舍也五代史志太僕寺之屬有駝牛署王應麟玉海魏太武太延二年冬于雲中置野馬苑平朔方隴右以河西水草善以為牧地馬三百餘萬匹槖駝半之孝文後以河陽為牧場戎馬十萬匹嵗自河西徙牧并州漸南欲其習水土馬之盛無如後魏謹案後魏太僕職掌不見于史據魏書髙祖本紀有太和十一年詔太僕乘具出其大半班賚百官之文則亦兼掌車馬也至外牧都牧二官其所司亦未詳考魏世雲中河西河陽并州皆有牧地外牧當專司畜養蓋即典牧都尉之職如今之牧場總管其都牧官當在京師以司羣牧賞罰之令故髙祖本紀又有罷都牧雜制之文見太和十四年其職蓋如今太僕寺之右司至駝牛都尉專主駝隻則又如今之左司矣北齊隋書百官志後齊太僕寺置卿少卿丞各一人有功曹五官主簿録事等員掌諸車輦馬牛畜産之屬統驊騮左右龍左右牝駝牛司羊乘黃車府等署令丞左龍署有左龍局右龍署有右龍局左牝署有左牝局右牝署有右牝局駝牛署有典駝局諸局並有都尉謹案周官校人特居四之一説者謂一特三牝故衛風稱騋牝三千月令季春乃合纍牛騰馬遊牝于牡三代馬政所以順生息之理而滋其蕃庶也北齊置左右牝署令丞後周置典牝上士中士其義蓋本諸此今太僕寺左右兩翼牧場設牝馬一百六十羣每羣二百四十六匹至一百三十二匹有差扇馬三十二羣每羣二百有五匹至五十九匹有差與三牝一特之制洵為相合矣至北齊太僕寺復仿漢晉之制置驊騮乘黃車府等署隋唐因之今並析繫于鑾儀衛上駟院表內云後周通典後周官品正三命夏官典牝典牡等上士正二命夏官典牝典牡典駝等中士正一命夏官典駝下士隋隋書百官志太儀寺置卿少卿各一人尋加少卿一人丞三人主簿二人録事二人又有獸醫博士員一百二十人統驊騮乘黃龍廏車府典牧等署各置令二人丞二人典牧丞三人隴右牧置總監副監丞以統諸牧其驊騮牧及二十四軍馬牧每牧置儀同及尉大都督帥都督等員原州駝牛牧置尉苑川十二馬牧每牧置大都督及尉各一人帥都督二人煬帝即位多所改革太僕減驊騮署入殿內尚乘局改龍廏曰典廏署有左右駁皂二廏加置主乘司庫司廪官隴右諸牧置左右牧監各一人以司統之謹案新唐書屈突通傳稱通在隋為虎賁郎將隋文帝命覆隴西牧簿得隱馬二萬匹帝怒收太僕卿慕容奚達監牧官吏千五百人將悉殊死通固爭得以減論據此是隋之諸牧監悉統轄於太僕寺蓋典牧署實主其事如今右司之職也唐新唐書百官志太僕寺卿一人少卿二人丞四人主簿二人録事二人掌廏牧輿輦之政總乘黃典廏典牧車府四署及諸監牧凡監牧籍帳嵗受而會之上駕部以議考課諸牧監上牧監監各一人副監各二人丞各二人主簿各一人中牧監副監丞減上牧監一員案史文不言下牧監當與中牧監同南使西使丞各三人録事各一人北使鹽州使丞各一人掌羣牧孳課凡馬五千為上監三千為中監不及為下監馬牛之羣有牧長有尉馬之駑良皆著籍良馬稱左駑馬稱右每嵗孟秋羣牧使以諸監之籍合為一以仲秋上於寺孳生過分有賞死耗亦以率除之嵗終監牧使巡按以功過相除為考課初學記龍朔二年改太僕為司馭寺咸亨中復舊光宅元年改為司僕寺神龍元年復故唐六典秦漢太僕屬官有牧師苑令魏晉以下皆監牧之職隋太僕寺統典牧署令丞唐朝因之置典牧署令三人丞四人監事八人新唐書兵志監牧所以畜馬也其制始于近世唐之初起得突厥馬二千匹又得隋馬三千於赤澤岸徙之隴右監牧之制始于此其官領以太僕其屬有牧監副監監有丞有主簿直司團官牧尉排馬牧長羣頭有正有副嵗課功進排馬初用太僕少卿張萬嵗領羣牧自貞觀至麟德四十年間馬七十萬六千置八坊岐豳涇寧間地廣千里為四十八監馬多地狹不能容又析八監列布河西豐曠之野後以太僕少卿鮮于匡裕檢校隴西監牧儀鳯中以太僕少卿李思文檢校隴西諸牧監使監牧有使自此始又有羣牧都使間廏使使皆置副又立四使其後益置八監于鹽州三監于嵐州李吉甫元和郡縣志貞觀中自京師東赤澤岸移馬牧于秦渭二州之北會州之南蘭州狄道縣之西置監牧使以掌其事仍以原州刺史為都監牧使以管四使南使在原州西使在臨洮軍北使東宫使寄治原州天寶中諸使共有五十監南使管十八監西使管十六監北使管七監東宫使管九監謹案唐置殿中監及尚乘局以主內廏太僕專司羣牧與今制差為相近惟乘輿輦輅猶屬之太僕寺故别有乘黃車府等署蓋兼有今鑾儀衛職掌也至監牧使領之于太僕少卿疑諸監嵗時閲視皆以少卿往蒞其事故獨專使名正如今太僕寺堂官每嵗赴牧場稽察之職其以原州刺史為都監牧使則又如今以察哈爾副都統為統轄兩翼牧場總管耳張説羣牧頌大唐接周隋亂離之後承天下戰陳之弊鳩括殘燼僅得牝牡三千從赤澤岸徙之隴右始命太僕張萬嵗葺其政焉而奕世載德纂修其緒肇自貞觀成於麟德四十年間馬至七十萬六千匹置八使以董之設四十八監以掌之跨隴西金城平涼天水四郡之地幅員千里猶為隘狹更析八監布於河西豐曠之野乃能容之於斯之時天下以一縑易一馬秦漢之盛未始聞也張氏中廢馬官亂職開元皇帝既登大寶水瑞感而河龍出星精應而天駟下二年春乃更以王毛仲主之謹案張説時為隴右羣牧使故作是篇郤昻岐邠涇寧四州八坊碑頌序云張萬嵗傍隴右字之四十年間成七十萬六千匹開元初唯得二十四萬匹至十九年復成四十四萬匹上耕籍之明年命邠公典馬政公召入咨元祐作小司空兼牧圉匪燒匪剔斯馬斯才先是國家以岐山近甸豳土晚寒寧州壤甘涇水流惡澤茂豐草地平鮮原當古公走馬之郊接非子大邱之野度其四境分署八坊其五在岐餘在三郡保樂第一甘露第二保樂者隋石門馬坊也甘露先置在九成苑外有詔令新保樂徙甘露唐會要貞觀十五年尚乘奉御張萬嵗為太僕少卿領羣牧不入銜麟德三年正月少卿鮮于匡裕檢校隴右羣牧雖入銜未置使儀鳳三年十月少卿李思文檢校隴右諸牧監使始有使號其後蘇幹等二十九人為之元和十二年十月間廏使張茂宗奏取麟遊岐陽牧地三百四十七頃盡歸國家侍御使范傳式覆實謹案唐會要貞元十三年福建觀察使栁冕奏置萬安牧監於泉州索部內馬五千七百匹以為監牧之資人大擾二十一年四月丙寅罷之元和十四年五月己亥淮南置臨海監節度使兼之太和十月廢蓋牧馬宜于秦隴萬安臨海設監非其所也故設監之始亦第以節度觀察兼攝其事而不置使以其旋設旋廢制有未定不及置使也五季五代史周本紀廣順二年太僕少卿王演使于髙麗五代史何澤列傳澤以太僕少卿致仕謹案五季諸寺監皆依唐制備官太僕少卿屢見于歐史紀傳而不及太僕卿蓋史文偶略也宋宋史職官志太僕寺卿少卿丞主簿各一人掌車輅廏牧之令少卿為之二丞參領之總國之馬政籍京都坊監畿甸牧地畜馬之數謹其飼養察其治療考蕃息損耗之實而定其賞罰馬死則斂其騣尾筋革入于官府凡閲馬差次其髙下應給賜則如格嵗終鈎覆帳籍以上駕部舊制判寺事一人以朝官以上充凡邦國廏牧車輿之政令分𨽻羣牧司騏驥院諸坊監本寺但掌天子五輅屬車后妃王公車輅給大中小祀羊元豐官制行始歸本寺分案五置吏十有八元祐二年詔外監事令本寺依羣牧司舊法施行應內外馬軍專𨽻太僕直達樞密院更不經尚書省及駕部三年詔省主簿一員崇寧二年詔太僕寺依舊制不治外事歸尚書駕部應馬事上樞密院馬端臨文獻通考宋太僕寺所𨽻官司十車輅院騏驥院左右天駟監鞍轡庫養象所駝坊車營致逺務上下監中興後廢太僕併入兵部謹案宋太僕寺所屬如車輅院養象所為今鑾儀衛之職騏騮院天駟監為今上駟院之職鞍轡庫為今武備院之職俱已分析别著于表惟駝坊監官專主駝隻則正與今左司職事相合故仍繫之于此篇宋史職官志羣牧司制置使一人景德四年置以樞密使副為之至道二年罷而復置使一人咸平三年置以兩省以上官充副使一人以閣門以上及內侍都知充都監二人以諸司使以上充判官二人以京朝官充掌內外廏牧之事周知國馬之政而察其登耗焉其副使都監多不備置判官都監每嵗更出諸州巡坊監點印國馬之蕃息者玉海太平興國五年改河南飛龍院大名養馬務洺州養馬務衛州二監管城馬務同州馬務相州馬坊澶州馬務白馬龍馬監並為牧龍坊景德二年七月羣牧使趙安仁言按唐六典凡馬有左右監以土地為名欲改牧龍坊為監仍鑄印給之于是河南為洛陽監天雄軍為大名監洺州為廣平監衛州為淇水監鄭州為廣武監同州為沙苑監相州為安陽監澶州曰鎮寧滑州舊龍馬監曰靈昌熙寧元年詔河南北分置監牧使都監各一員命劉航為河南監牧使崔台符為河北監牧使諸馬監分屬兩使久任以責成效八年罷河南北監牧惟存沙苑一監𨽻羣牧司謹案宋代內外馬政初皆掌於羣牧司元豐始歸其事太僕旋亦省廢是宋之羣牧司即今太僕寺之職蓋使副如今之卿少卿判官如今之右司員外郎而河南北諸馬監分置監牧使都監等官則如今之牧場各總管也遼王圻續文獻通考遼南面有太僕寺及諸牧監遼史百官志羣牧職名總目某路羣牧使司某羣太保某羣侍中某羣敞史總典羣牧使司總典羣牧部籍使羣牧都林牙某羣牧司羣牧使羣牧副使西路羣牧使司倒塌嶺西路羣牧使司渾河北馬羣司漠南馬羣司漠北滑水馬羣司已上羣牧官金續文獻通考金不置太僕寺而尚廏局屬殿前都提點司明昌四年置諸羣牧所金史兵志金初因遼諸茂滿洲語樹木也原作抹今改正而置羣牧天德間置德肯鄂爾多滿洲語德肯微髙也鄂爾多亭也原作迪河斡孕今改正阿爾本蒙古語十數也原作斡里保今改正富僧額滿洲語孳生也原作蒲速斡今改正雅蘇蒙古語骨也原作燕思今改正烏哲蒙古語看也原作兀者今改正五羣牧所皆仍遼舊名各設官以治之又于諸色人內選家富丁多及品官家子明安穆昆解見理藩院篇佛寧軍滿洲語佛寧羣也原作蒲輦今改正與司吏家餘丁及奴使之司牧謂之羣子分牧馬駝牛羊為之立蕃息衰耗之刑賞後稍增其數為九契丹之亂亡其五世宗置所七大定二十年更定羣牧官詳衮托迪蒙古語鸚鵡也原作脫朵今改正知把羣牧人滋息損耗賞罰格金史百官志諸羣牧所又國言謂烏哷濟庫蒙古語滋生也原作烏魯古今改正提控諸烏哷濟庫二員正四品明昌四年置是年以安逺大將軍尚廏局使舒穆嚕貞兼慶州刺史為之設女直司吏三人譯一人通事一人舒穆嚕原作石抹今依八旗姓譜改正使一員從六品國言作烏哷濟庫使副使一員從六品掌檢校羣牧畜養蕃息之事判官一員正八品掌簽判本所事知法一員從八品惟班第音蒙古語小僧也原作板底因今改正烏濟滿洲語養也原作烏解今改正騰滿洲語極也原作忒恩今改正羣牧依此置謹案遼金皆有尚廏司掌王馬之政故遼太僕惟典羣牧金則并省其官而以提控諸烏哷濟庫當太僕之職遼之總典羣牧部籍使其所掌亦近今之太僕寺至羣牧使副及馬羣太保侍中之類則在外専司蕃息乃唐宋牧監之比正如今之牧場總管等官也元元史百官志太僕寺秩從二品掌阿克塔斯馬匹蒙古語阿克塔斯衆騸馬也原作阿塔斯今改正受給造作鞍轡之事中統四年設羣牧所至元十六年改尚牧監十九年又改太僕院二十年改衛尉院二十四年罷院立太僕寺又别置尚乘寺以管鞍轡而本寺止管阿克塔斯馬匹二十五年𨽻中書置提調官二員大德十一年復改太僕院至大四年仍為寺卿二員從二品少卿二員從四品丞二員從五品經厯知事照磨管勾各一員令史七人譯史知印通事各二人奏差四人回回令使一人典吏二人蘇天爵元文類經世大典序録今牧馬之地東越耽羅北踰和琳圖們蒙古語二十萬數也原作火里秃麻今改正西至甘肅南暨雲南凡二十四所又大都上都以及鄂尼巴雅爾蒙古語長喜也原作玉你伯牙今改正濟蘭格爾蒙古語六十間房也原作折連怯呆兒今改正周回萬里莫非監牧之野在朝置太僕典御馬左股烙官印號火印之馬太廟祀事及諸寺影堂用乳酪則供牝馬駕仗及宫人出入則供上乘馬供上及諸王百官挏乳取黑馬乳以奉玉食謂之細乳諸王百官者謂之粗乳又自世祖皇帝而下山陵各有鄂瑪堆唐古特語鄂瑪奶漿也堆收也原作醖都今改正取乳以供祀事號金陵擠馬元政典牧地馬羣或千百或三五十牧人曰哈噶齊哈喇齊蒙古語哈噶齊圍繞也哈喇齊瞭望也原作哈赤哈剌赤今改正有千戶百戶父子相承任事自夏及冬隨地之宜行逐水草十月各至本地朝廷以九月十月遣守官馳驛閲視較其多寡有所産駒即烙印取勘收除見在數目造蒙古回回漢字文册以聞幸上都太僕卿以下皆從先驅馬出健德門外取其肥可取乳者以行汰其羸瘦不堪者還于羣車駕還京師太僕卿先期遣使徵馬五十鄂瑪堆來京師鄂瑪堆者承乳車之名也既至俾哈噶齊哈喇齊之在朝為卿大夫者秣飼之寺官亦以旬詣間廏閲肥瘠凡卿位下正宫位下隨朝諸色目人及甘肅土番等處草地內及江南腹地諸處應有係官孳生馬牛牧地各置千戶百戶等各目謹案元太僕寺供御馬蓋猶兼有今上駟院之職而輿輅車輦已别領之尚乘寺則又與唐宋之制不同至明代而太僕惟司牧政當亦沿元之舊也明明史職官志太僕寺卿一人少卿二人寺丞四人其屬主簿􅈦主簿一人常盈庫大使一人所轄各牧監監正一人監副一人録事一人各羣羣長一人卿掌牧馬之政令以聽于兵部少卿一人佐寺事一人督營馬一人督畿馬寺丞分理京衛畿內及山東河南六郡孳牧寄牧馬匹凡軍民孳牧視其丁産授之種馬牡十之二牝十之八為一羣嵗徵其駒曰備用馬齊其力以給將士將士足則寄牧于畿內府州縣肥瘠登耗籍其毛齒而時閲之三嵗偕御史一人印烙選其良健而汰其羸劣其草場已墾成田者嵗斂其租金災祲則出之以佐市馬其賠價折納則征馬金輸兵部主簿典勾省文移大使典貯庫馬金初洪武六年置羣牧監于滁州旋改為太僕寺秩從三品設卿少卿寺丞又設首領官知事主簿各一人七年增設牧監羣官七十七處𨽻太僕寺尋定羣牧監品秩十年增置滁陽等各牧監及所屬各羣改牧監令丞為監正監副二十二年定滁陽等十二牧監每監設監正一人監副二人録事一人來安等一百二十七羣每羣設羣長一人二十三年增置江東當塗二牧監及所屬各羣又罷烏衣等五十四羣改置永安等七羣定為牧監十四羣九十有七二十八年悉罷羣牧監以其馬𨽻有司牧養三十年置行太僕寺于北平秩如太僕寺建文中升寺丞品秩又改其首領官職名增設録事及典廏典牧二署驌騻等十六羣滁陽等八牧監龍山等九十二羣成祖復舊制永樂元年改北平行太僕寺為北京行太僕寺十八年定都北京遂以行太僕寺為太僕寺洪熙元年復稱北京行太僕寺正統六年定為太僕寺其舊在滁州者改為南京太僕寺歸有光馬政志太僕寺統羣牧監令民養馬而太僕專領之內廏自有御馬監惟或乏馬于太僕取之而鹵簿儀仗陳設大駕駕部與環衛司之皆不復關于太僕南京太僕寺故留京若行太僕寺苑馬寺亦并建無所統一遼東山西陜西有行太僕遼東陜西又有苑馬甘肅有行太僕而舊亦有苑馬苑馬之設遼東則有永寧監清河苑深河苑陜西則有長樂監開盛安定廣寧苑靈武清河萬安苑皆前代善水草之地苑馬之設最盛惟不領于太僕與古異明會典馬政有太僕苑馬寺專理而統于兵部几太僕寺南京太僕寺行太僕寺各以地方分屬而少卿之巡視提督寺丞之分管亦各有分地凡各屬皆有管馬官府以通判州以判官縣以丞簿衛以指揮所以千百戶𢎞治十八年令各州縣馬不及五百匹者罷管馬官以掌印官帶管此馬政之大槩也若內廏馬匹則領于御馬監部寺不得與云謹案自邱甸出車之制既廢秦漢以後戎馬皆養于官而以太僕專司其事漢之牧師諸苑唐之四十八監宋之十四監明之遼東陜西諸監苑其制相沿利害得失之由具詳史册説者謂唐代牧馬蕃息稱為極盛然觀史載唐馬七十萬匹而杜甫天育驃騎歌僅云四十萬則史家誇飾亦難盡信兼之河西牧地旋陷吐蕃馬皆市之回紇史稱四十縑始易一馬率駑瘠無用而縑帛皆取諸民江淮織輸人以為纍其立法之敝尢可槩見宋初亦用監牧其後盡廢之而以官馬責民守養于是戶馬保甲馬社馬之法興科條峻急賠償不訾重為民病馬益耗而民益困明代復踵其失悉牧之民間嵗令納駒民苦養馬孳生輒害之則又改徵價銀有本色折色之例其草場牧地則勒馬戶佃種徵其子粒軍民貽纍無窮重以官吏侵漁有名無實終未嘗收一騎之用自古馬政未有壞于明代者我朝考牧精詳斯臧志慶即口外草肥土衍之地分置牧厰自太僕寺左右翼暨上都達布遜諾爾達里岡愛烏梁海大凌河以及各蒙古部落孳牧者共馬二十萬二千八百餘匹內地初無養馬之煩而雲錦成羣逺軼前世其滿漢各營及各省驛遞塘站馬共二十二萬五千二百餘匹皆月給馬乾銀按地分飼條格周備咸資實用近者西土砥平遐方慕化哈薩克拔達克山等部競以所産上貢天間每嵗復許令以馬市易所司差良駑定直不及內地三之一所用絲縑皆各織造平售織送公私利便仍于烏魯木齊及伊犁廣設牧羣以為新疆駐守各兵之用其羸則撥補內地各標營額缺蓋惟經理得宜故不動聲色而間廏充盈永久無弊牧政之善古今莫及彼騋牝坰野播咏歌詩固無能比擬于萬一也欽定厯代職官表卷三十一
