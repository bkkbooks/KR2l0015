body:
  text: 欽定四庫全書欽定歷代職官表卷二十八壇壇廟各官國朝官制天壇尉滿洲八人五品一人六品七人地壇尉滿洲八人五品一人六品七人太廟尉滿洲十人四品二人五品八人社稷壇尉滿洲五人五品一人六品四人右俱𨽻太常寺堂子尉滿洲八人七品二人八品六人右隸禮部掌管鑰守衛直宿之事朔望則奉薌以行禮凡祀日則守門以司其開闔出入之節焉員額順治元年定凡四品尉闕員以五品尉序升五品尉闕員以六品尉序升惟太廟五品尉闕則以各壇六品尉及各部院休致郎中員外郎間次選授六品等尉闕吏部牒八旗掄送除授天壇祠祭署奉祀漢人一人從七品祀丞漢人一人從八品地壇祠祭署奉祀漢人一人祀丞漢人一人朝日壇祠祭署奉祀漢人一人夕月壇祠祭署奉祀漢人一人先農壇祠祭署奉祀漢人一人祀丞漢人一人帝王廟祠祭署無専員以漢人贊禮郎司樂內一人委理右俱𨽻樂部掌典守神庫以時巡視而督其灑掃之役若葺治牆宇樹藝林木咸白於長官而敬供其事焉順治初置奉祀五人祀丞五人尋省祀丞二人凡奉祀員闕以祀丞序升祀丞員闕以祝版生掄選除授謹案順治初設太廟首領內監一人內監二十九人今省內監九人社稷壇首領內監一人內監九人今省內監五人又康熙二十五年傳心殿告成設首領內監二人內監八人今省首領一人內監四人又順治初各壇設壇戶各廟設廟戶以給掃除乾隆六年以原額過冗量加裁省今定設壇户天地壇各十八人社稷壇十五人朝日夕月壇各十二人先農壇二十人廟户帝王廟十二人關帝廟五人都城隍廟六人又雍正間設昭忠祠賢良祠祠户各二十人今各省十人謹識于此厯代建置三代周禮春官典祀中士二人下士四人府二人史二人胥四人徒四十人掌外祀之兆守皆有域掌其禁令若以時祭祀則帥其屬而修除徵役于司隸而役之及祭帥其屬而守其厲禁而蹕之守祧奄八人女祧每廟二人奚四人掌守先王先公之廟祧其遺衣服藏焉若將祭祀則各以其服授尸其廟則有司修除之其祧則守祧黝堊之既祭則藏其隋與服鄭康成注隋尸所祭肺脊黍稷之屬藏之以依神謹案典祀掌外祀之兆守鄭康成謂所祀於四郊者賈公彥謂兆五帝於四郊已下皆是今之各壇尉其源蓋本於此至守祧當如今之太廟尉而周制實用奄人蓋因先后之朝衣服及遺器並藏於廟故以奄人及女奚掌之今太廟之設內監亦其例也秦史記封禪書秦并天下令祠官所常奉天地名山大川鬼神可得而序也自殽以東名山五大川祠二自華以西名山七名川四而四大冡鴻岐吳嶽皆有常禾陳寶節來祠灞滻長水灃潦涇渭皆非大川以近咸陽盡得比山川祠汧洛二淵鳴澤蒲山嶽􅬂山之屬為小山川亦皆嵗禱賽泮涸祠而雍有日月參辰南北斗熒惑太白歲星填星二十八宿風伯雨師四海九臣十四臣諸布諸嚴諸逑之屬百有餘廟西亦有數十祠於湖有周天子祠于下邽有天神灃滈有昭明天子辟池於社亳有三社主之祠壽星祠而雍菅廟亦有社主其在秦中最小之神者各以歲時奉祠唯雍四畤上帝為尊常以十月上宿郊見諸此祠皆太祝常主以歲時奉祠之謹案嬴秦蔑古棄禮故所祠諸神自雍四畤而下其載在祀典者凡數十處最為煩瀆史稱諸祠皆太祝奉祠蓋以祝官分主之亦如今奉祀祀丞之比即所謂祠官者是也唐六典以秦漢祝官分繫之太祝及郊社署令丞條下蓋本於此今用其例既入讀祝官沿革仍互見此表云漢漢書百官公卿表奉常有諸廟令長丞又雍太宰太祝令丞五畤各一尉如淳注五畤在雍故特置太宰以下諸官漢書車千秋列傳千秋為髙寢郎顔師古注髙廟衛寢之郎漢書韋元成傳元成兄髙寢令方山漢書昭帝本紀元鳯四年孝文廟正殿火廟令丞郎吏皆劾大不敬漢書郊祀志漢二年冬髙帝召故秦祠官復置太祝太宰如故儀後四歲天下已定詔御史令豐治枌榆社令祝立蚩尤祠於長安長安置祠祝官女巫其梁巫祠天地天社天水房中堂上之屬晉巫祠五帝東君雲中君巫社巫祠族人炊之屬秦巫祠社主巫保族纍之屬荆巫祠堂下巫先司命施糜之屬九天巫祠九天皆以歲時祠宫中其河巫祠河於臨晉而南山巫祠南山秦中各有時日文帝怠於鬼神之事渭陽長門五帝使祠官領以時致禮孝景即位十六年祠官各以歲時祠如故武帝初即位尤敬鬼神之祀人有言古天子常以春解祠祠黃帝令祠官領之如其方祠官寬舒議后土壇具太一祠壇立泰畤壇禮登中嶽令祠官加增太室祠至東泰山令祠官禮之而不封諸所興如薄忌泰一及三一冥羊馬行赤星五寬舒之祠官以歲時致禮凡六祠皆太祝領之至如八神諸明年凡山他名祠行過則祠行去則已方士所興祠各自主其人終則已祠官不主它祠皆如故哀帝時祠官九百餘所一歲三萬七千祠云謹案漢表有諸廟令長丞不言員數考之紀傳髙帝廟有髙寢令髙寢郎孝文廟有令丞郎吏是每廟各置令丞及郎隨時建設本無定額故但以諸廟槩之也至鬼神祠祀漢世多未合禮武帝溺信方士之說所增尤屬不經郊祀志載哀帝時一歲三萬七千祠實為淫瀆已甚當時皆以祠官典領而五畤之在雍者既有太宰太祝令丞復各為設尉殆以其為天子郊見上帝之地故特崇其禮歟宋書百官志明堂丞二人漢東京初置後漢書百官志髙廟令一人六百石守廟掌案行掃除無丞世祖廟令一人六百石如髙廟屬太常祠祀令一人六百石典中諸小祠祀丞一人屬少府劉昭後漢書志注東觀書曰章帝又置祀令丞延光元年省應劭漢官儀髙廟令員吏四人衛士一十五人世祖廟令員吏六人衛士二十人祠祀令從官吏八人騶僕射一人家巫八人後漢書殤帝本紀延平元年詔罷祀官不在祀典者謹案後漢禮儀志正月上丁祠南郊禮畢次北郊明堂髙廟世祖廟謂之五供是當時並重其禮乃廟有令而二郊不置官守者疑即以太常所屬之太祝太宰二令兼其事也至明堂丞本屬太史令疑為天文占候而設而宋書又與太廟令連職則亦當兼掌祠祀故既載入欽天監仍互見於此表又案西漢諸廟皆有令丞而東漢惟置髙光二廟令者蓋西漢諸帝皆别起寢廟東漢自明帝詔無起寢廟藏主於光烈皇后更衣别室四時合祭於世祖廟嗣後厯代不敢違皆藏主於世祖廟是東漢惟有世祖一廟故設官亦止於此又祠祀令掌禁中諸小祠祀故屬於少府不關太常殆即殤帝紀所稱祀官者歟三國唐六典魏有太廟令丞晉晉書職官志太常有太廟令宋齊梁陳宋書百官志太廟令一人丞一人領齊郎二十四人明堂令一人宋世祖大明中置丞一人唐六典宋明堂令丞掌宗祀五帝之事南齊書百官志太廟令一人丞一人明堂令一人丞一人皆有職史隋書職官志梁品秩定為十八班明堂二廟令為二班又太社令為三品蘊位唐六典梁太常統明堂太社等令丞胡三省通鑑注梁立太廟祀太祖以上又有小廟太祖太夫人廟也有二廟令掌廟事隋書百官志陳明堂太廟等令六百石品第五謹案二廟為梁之創制故陳仍改為太廟令其後陳文帝又即梁之小廟祀其父始興昭烈王改曰國廟則其禮少損故未嘗設官典守也至太社令陳制未見當已裁併矣北魏魏書律厯志太廟令龎靈扶魏書禮志太宗嘗於白登廟有神異焉太廟博士許鍾上言宜告天下唐六典後魏祀官齊郎九品中謹案魏書官氏志不載有郊廟典守之官而太廟令太廟博士别著於律厯志及禮志則亦與前代制度略同也至六典所謂祀官齊郎即官氏志之太常齊郎其名始見於宋書百官志至魏而遂有品秩隋唐以後亦相因不改今太常寺額設有執事生九十人以供各壇廟及凡中祀羣祀典守金玉香帛與司尊司爵司爐之事是即齊郎之比矣北齊隋書百官志後齊太常統太廟署令丞掌郊廟社稷等事太廟兼領郊祠崇虛二局丞郊祠掌五郊羣神事崇虛掌五嶽四瀆神祀在京及諸州道士簿帳等事謹案北齊不置明堂太社等令而以太廟令兼掌郊社名實乖互於禮制殊為未協後周杜佑通典後周官品正五命春官守廟典祀等中夫夫正四命春官小守廟小典祀等下大夫正三命春官小守廟小典祀司郊等上士正二命春官司郊司社等中士正一命春官小守廟奄司郊司社等下士謹案後周典祀即本周官舊名其守廟亦仍守祧所置而司郊司社則又後世明堂太社二令之職蓋亦雜採古今之制而為之者也隋隋書百官志太常統郊社太廟等署各置令一人丞人人郊社則丞至二人煬帝即位太廟署又置陰室丞守視陰室唐六典隋郊社署又置門僕齊郎唐新唐書百官志兩京郊社署令各一人從七品下丞各一人從八品下令掌五郊社稷明堂之位與奉禮郎設樽罍篚羃而太官令實之立燎壇積柴合朔有變則巡察四門以俟變過時則罷有府二人史四人典事五人掌固五人門僕八人齊郎一百二十人齊郎掌供郊廟之役太廟九室室有長三人以主樽罍篚羃鎖鑰又有罍洗二人郊壇有掌座二十四人以主神御之物皆禮部奏補凡室長十年掌座十二年皆授官祭饗而員少兼取三館學生皆綘衣綘幘更一畨者户部下蠲符歲一申考諸署所擇者太常以十月申解於禮部如貢舉法帖論語及一大經中第者録奏吏部注冬集散官否者畨上如初六試而絀授散官汾祠署令一人從七品下丞一人從八品上掌享祭灑掃之制有府二人史四人廟幹二人開元二十一年置署三皇五帝以前帝王三皇五帝周文王武王漢髙祖兩京武成王廟令一人從六品下丞一人正八品下掌開闔灑掃釋奠之禮有録事一人府二人史四人廟幹二人掌固四人門僕八人神龍二年兩京置齊太公廟署其後廢開元十九年復置天寶三載初置周文王廟署六載置三皇五帝廟署七載置三皇五帝以前帝王廟署九載置周武王漢髙祖廟署上元元年改齊太公廟署為武成王廟署諸太子廟令各一人從八品上丞各一人正九品下録事各一人掌灑掃開闔之節四時享祭焉有府各一人史各二人典事各二人掌固各一人謹案唐六典無太廟署令丞其太廟齊郎兩京各一百三十人太廟門僕兩京各三十二人皆領屬於太常卿據冊府元龜開元二十四年以宗廟所奉不可名以署太常少卿韋縚奏廢太廟署以少卿一人知太廟事則是唐初本有太廟署至開元而始廢也其後濮陽王徹為宗正卿復建議以宗正司屬籍請以宗廟隸宗正自是遂不屬太常故歐陽修新唐書志已移載入宗正寺條下惟唐六典尚繫之太常蓋以成書在前未及修改之故乃舊唐書志亦襲用六典舊文不加刋正疏舛甚矣五季未置宋章俊卿山堂考索宋初置郊社令命石祖元為之熙寧元年郊社局令張伯世言局有郊社名而不主四郊之事案唐六典兩京郊社局令各一人掌五郊社稷明堂之位然則郊社通掌五郊之事乞自今兼令勾當四郊壇壝之事使得巡視提舉所貴官正其名郊兆常潔從之於是始主四郊壇壝掌凡掃除之事祭祀則省牲渡江初闕紹興十九年始除韓彥直為太社令請給並依五監主簿例富大用事文類聚郊社令嘉祐元年置元祐職令正九品馬端臨文獻通考宋宗廟室長齊郎無常數廟直官一人太廟后廟宫闈令三人以入內內侍充元豐後太廟令屬宗正寺掌宗廟薦新七祀及功臣從享之禮品秩與太社令同宋史職官志宫闈令率其屬以泛灑廟廷凡修治潔除之事宋史禮志元豐元年詳定郊廟禮文所請如唐置太廟局令以宗正丞充罷攝知廟少卿而宫闈令不預祠事從之謹案宋太廟令本內侍兼職自元豐定制以宗正丞充之始改用朝官洵為合禮其宫闈令在唐屬內侍省本掌侍奉宫闈之事以遇太廟大享時當帥其屬出皇后神主於室遂令得預祠事逮元豐裁改後當亦通用士流矣至太廟后廟各置一令蓋因宋世皇后之未升祔者皆祭於别廟故特設官以典其祀事南渡以後此職未見殆已併于太廟令歟遼未置金金史百官志太廟署皇統八年太廟成設署置令丞仍兼提舉慶元明德永祚三宫令一員從六品掌太廟衍慶坤寧宫殿神御諸物及提控諸門關鍵掃除守衛兼廩犧令事丞一員從七品兼廩犧署丞直長明昌三年罷郊社署承安三年設祝史齊郎百六十人大安元年奏兼武成王廟署令一員從六品丞一員從七品掌社稷祠祀祈禱并㕔舍祭器等物直長明昌三年廢武成王廟署大安元年置令從六品丞從七品掌春秋祀享以郊社令丞兼金史禮志太廟門翼兩廡各二十有五楹為齊郎執事之次西南垣外則廟署也謹案金以燕京原廟為衍慶宫昭德皇后影廟為坤儀廟故太廟令兼司其宫殿神御之事百官志以坤儀為坤寧蓋傳刻之誤也又金史禮志朝享太廟儀有太祝宫闈令升殿開祏室出帝后神主設于座之文考之百官志惟宣徽院有宫闈局主閣門禁令並非奉祀之員蓋亦沿唐制令之臨時權攝行事與宋之特置以汛灑廟廷者又有異矣元元史百官志太廟署秩從六品掌宗廟行禮兼廩犧署事至元三年始置令一員從六品丞一員從六品郊祀署秩從六品大德九年始置掌郊祀行禮兼廩犧署事令二員從六品丞二員從七品社稷署秩從六品大德元年始置令二員從六品丞一員從七品元史祭祀志太廟儀鸞庫在宫城之東北南向都監局在其東少南西向謹案元太廟有都監局則必嘗置都監一官以守衛廟廷蓋如今太廟尉之比其後或以他官兼之故不見于百官志也又宋代始置祖宗神御殿以擬漢之原廟元因其制於各僧寺設立影堂所奉御容皆紋綺局織錦為之世祖裕宗在大聖夀萬安寺順宗仁宗在大普慶寺成宗在大天夀萬寧寺武宗在大崇恩福元寺顯宗明宗在大天源延聖寺英宗在大永福寺設太禧宗禋院以司其享祀禮典凡錢糧之出入營繕之作輟悉統之置院使同知等官所屬有隆禧總管府㑹福總管府崇祥總管府隆祥使司夀福總管府各置達嚕噶齊總管副達嚕噶齊等員又立司禋監奉太祖太宗睿宗三朝御容于石佛寺揆之禮制未免䙝瀆今故不著於表而附識其略于此明明史職官志天壇地壇朝日壇夕月壇先農壇帝王廟祈穀殿各祠祭署俱奉祀一人從七品祀丞二人從八品洪武初置各祠祭署設署令署丞二十四年改各署令為奉祀署丞為祀丞建文中更天壇祠祭署為南郊祠祭署成祖初惟易天壇為天地壇餘悉復洪武間制建文時南郊祠祭署為郊壇祠祭署已又改為天地壇祠祭署世宗釐祀典分天地壇為天壇地壇山川壇藉田祠祭署為神祇壇大祀殿為祈穀殿增置朝日夕月二壇各設祠祭署萬厯四年改神祇壇為先農壇謹案三代以宗官事神其職最重自漢以後亦多用士人如車千秋以髙寢郎至擢為丞相封侯是也自北齊太廟令兼領崇虛局主道士籍帳於是明禋大禮遂得以黃冠錯雜其間逮明代而郊壇執事率用道流凡神樂觀樂官及奉祀祀丞之屬皆由此選充甚者如嘉靖間之邵世恩至為太常卿陶啓南龔可佩至為太常少卿其他官至寺丞博士者甚多雖由世業相承而稽諸禮制實乖典則本朝初沿明舊乾隆七年特奉詔禁止凡充太常樂員者毋得仍習道教如有不願改業者削其籍聽為道士祀事祇承於是益加嚴潔矣欽定厯代職官表卷二十八
