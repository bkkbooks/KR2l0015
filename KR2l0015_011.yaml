body:
  text: 吏部表謹案六官分職始自成周而今之六部其原實起於漢魏以下之尚書諸曹前漢尚書分四曹後漢六曹魏五尚書二十三曹西晉六尚書三十六曹東晉五尚書十五曹宋齊六尚書二十曹梁六尚書二十三曹陳六尚書二十一曹北魏五尚書三十六曹後增置不一西魏十二部北齊六尚書二十八曹隋始置六部尚書分二十四司唐宋迄元則為尚書六部隸於尚書都省以尚書令左右僕射總統六部之事左丞及左司郎中員外郎分轄吏戶禮三部右丞及右司郎中員外郎分轄兵刑工三部其都省之制以令僕所居為都堂當省之中左為吏戶禮部分三行每行四司右為兵刑工部分三行每行四司皆東西相向見於通典及葉夢得石林燕語者甚詳元代廢尚書省移入中書六部亦隨之改隸元人析津志載六部俱列中書外垣則其制亦與唐宋無異故當時六部署銜皆曰尚書某部中書某部以其統屬於都省故也自明太祖罷丞相革中書省仿古六卿之制析其職歸之六部以尚書分掌庶政侍郎佐之於是六部始各為分署事皆専達而都省之制遂廢本朝因之臣等纂次六部各表悉依今制分列而以前代尚書諸曹職掌相承者繫之於下至都省制度難於析載謹附識於吏部表末以存舊式其尚書侍郎郎中等官建置所自亦各於吏部篇內分條偹考以著源委焉吏部國朝官制吏部尚書滿洲漢人各一人初定滿洲一品漢人二品順治十六年俱改為二品康熙六年復改滿洲為一品九年定俱為正二品雍正八年升為從一品各部院同掌中外文職銓敘勳階黜陟之政釐飭官常以贊邦治其屬有文選考功稽勳驗封四清吏司國朝自天聰五年始設六部每部一貝勒主之吏部置滿洲承政一員蒙古承政一員漢人承政一員參政八員啓心郎一員崇德三年更定吏部設滿洲承政一員左參政二員右參政三員滿洲啓心郎一員漢人啓心郎二員順治元年停貝勒總理例改承政為尚書參政為侍郎各部同五年定滿漢尚書各一人七年增設滿洲尚書一人八年仍令親王郡王兼攝部務九年停各部同十年復裁滿洲尚書一人十五年裁啓心郎雍正元年以來常以大學士兼理部務與尚書率其屬以敘正羣吏焉左右侍郎滿洲漢人各一人初定滿洲漢軍二品漢人三品順治十六年俱改為三品康熙六年復改滿洲為二品九年定俱為正三品雍正八年升為從二品乾隆十四年復升為正二品各部院同順治十五年定額掌佐理銓衡以二尚書漢右侍郎初制兼翰林院學士銜其非翰林出身者不兼尋罷兼銜文選清吏司郎中滿洲三人蒙古漢人各一人初制滿洲郎中三品順治十六年改為五品十八年改為四品康熙六年復為三品九年定與蒙古漢軍漢人俱為正五品各部院同員外郎滿洲漢人各二人初制滿洲員外郎四品順治十六年改為五品康熙六年復為四品九年定與蒙古漢軍漢人俱為從五品各部院同主事滿洲一人漢人二人初制滿洲主事四品順治十六年改為六品康熙六年改為五品九年定與蒙古漢軍漢人俱為正六品各部院同掌班秩遷除均平銓法崇德三年吏部設理事官四員副理事官六員順治元年改理事官為郎中副理事官為員外郎各部同設滿洲郎中四人漢軍郎中二人滿洲蒙古員外郎八人漢軍員外郎六人主事四人十二年增滿洲郎中四人員外郎停兼用蒙古十八年復設蒙古員外郎一人康熙元年仍省三十八年裁漢軍員外郎四人五十七年增設蒙古郎中一人主事一人復設蒙古員外郎一人雍正五年裁漢軍郎中員外郎初制滿洲蒙古漢軍司官皆統為員額不分専曹悉聽堂官調撥後始分司定缺各部同其漢人司官則順治元年即隨曹置額文選司初設漢郎中一人員外郎一人主事二人雍正五年增設漢員外郎一人凡漢缺郎中員外郎主事皆以由甲科出身者注授各司同考功清吏司郎中滿洲三人漢人一人員外郎滿洲二人蒙古漢人各一人主事滿洲一人漢人二人掌論劾考察旌别功過順治元年設漢郎中員外郎主事各一人雍正五年增設漢主事一人稽勳清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲漢人各一人掌更名改籍終養服制兼稽在京文員俸廪漢司官員額順治元年定驗封清吏司郎中滿洲漢人各一人員外郎滿洲二人漢人一人主事滿洲蒙古漢人各一人掌封贈襲廕土司嗣職漢司官員額亦順治元年定堂主事滿洲四人漢軍一人掌文案者滿洲二人掌章奏者滿洲二人漢軍一人順治元年定額司務廳司務滿洲漢人各一人初制從九品乾隆三十六年升為正八品各部寺同掌出納文書稽察胥吏各部同順治元年止設漢人司務二人四年裁一人十一年定設滿洲漢人各一人筆帖式滿洲五十七人蒙古四人漢軍十二人由舉人恩拔嵗副貢生考取者七品由生員監生考取者八品由官學義學生等考取者九品各部院同掌翻譯清漢章奏文籍各部同天聰五年始令六部辦事筆帖式各酌量補授吏部筆帖式滿洲初設六十五員後省八員蒙古初設二員後增二員漢軍初設十六員後省四員分隸各司視事之繁簡以為額歷代建置三代禮記曲禮天子建天官先六大曰大宰鄭康成注此蓋殷時制也尚書周官冡宰掌邦治統百官均四海謹案舜典納于百揆蔡氏沈以為猶周之冢宰而當時未有官號今故仍托始於殷周焉周禮天官治官之屬大宰卿一人小宰中大夫二人宰夫下大夫四人上士八人中士十有六人旅下士三十有二人大宰之職掌建邦之六典以佐王治邦國小宰之職掌邦之六典八法八則之二以逆邦國都鄙官府之治宰夫之職掌治法以考百官府羣都縣鄙之治鄭康成注六官皆總屬於冢宰冢宰于百官無所不主變冢言大進退異名也百官總焉則謂之冢列職於王則稱大冡大之上也唐六典吏部尚書周之天官卿也侍郎周之天官小宰中大夫也太宰屬官有下大夫蓋吏部郎中之任也有上士蓋今員外郎之任也周禮夏官司士下大夫二人中士六人下士十有二人府二人史四人胥四人徒四十人掌羣臣之版以治其政令嵗登下其損益之數辨其年嵗與其貴賤周知邦國都家縣鄙之數卿大夫庶子之數以詔王治杜佑通典參詳古今徵考職任天官太宰當為尚書令非吏部之任今吏部宜出於夏官之司士春秋左氏傳晉侯作執秩以正其官杜預曰主爵秩之官周禮夏官司勳上士二人下士四人府二人史四人胥二人徒二十人掌六鄉賞地之法以等其功王功曰勳國功曰功民功曰庸事功曰勞治功曰力戰功曰多謹案後世以六部分配六官吏部實準周禮天官之職然考大宰總百官以掌邦治與後世専司銓選者不同故杜佑以為吏部之任出於夏官之司士其説最允至執秩為今驗封之職司勳為今稽勳之職沿襲所自尚有可徵今並著之於表又考春官內史掌王之八枋之法以詔王治一曰爵二曰祿三曰廢四曰置五曰殺六曰生七曰豫八曰奪凡命諸侯及孤卿大夫則策命之鄭康成注云大宰既以詔王內史又居中二之是今吏部文選考功驗封三司之事其源又當出於內史又案晏子春秋齊景公燕賞於國內萬鍾者三千鍾者五令三出而職計莫之從公怒令免職計令三出而士師莫之從是後世考功之法亦春秋時士師所兼掌矣謹附著於此秦通典秦尚書四人不分曹名謹案秦代雖未有曹名然尚書官號實肇始於此故特著之吏部條下以明權輿所自至尚書尚字陸德明經典釋文讀作常音而嶽珂愧郯録則云秦世少府遣吏四人在殿中主發書故謂之尚書尚猶主也漢初有尚冠尚衣尚食尚浴尚席尚書謂之六尚戰國時已有尚衣尚冠之屬然則尚書之稱尚書從去聲而非平聲今案藝文類聚引韋昭辨釋名曰尚猶奉也百官言事當省案平處奉之故曰尚尚食尚方亦然如淳注漢書亦云主天子文書曰尚書如主壻曰尚主據此則尚字之當讀去聲似為有本然自六朝以後文人詞賦無不用作辰羊切者則其讀平聲亦已久矣漢後漢書百官志尚書六百石常侍曹尚書主公卿事二千石曹尚書主郡國二千石事侍郎四百石主作文書起草令史二百石晉書職官志漢成帝建始四年置尚書四曹各有其任其一曰常侍曹主丞相御史公卿事其二曰二千石曹主刺史郡國事後又置三公曹為五曹後漢光武以三公曹主嵗盡考課諸州郡事改常侍曹為吏部曹主選舉祠祀事尚書雖有曹名不以為號靈帝以侍中梁鵠為選部尚書於此始見曹名後漢書馮勤列傳勤為郎中給事尚書使與諸侯封事劉昭後漢志注蔡質漢儀曰三公曹典天下嵗盡集課事三公尚書二人典三公文書尚書郎初從三署詣臺試初上臺稱守尚書郎中嵗滿稱尚書郎三年稱侍郎漢書百官公卿表郎掌守門戶出充車騎有議郎中郎侍郎郎中皆無員徐堅初學記秦初置郎中令其屬官有三署五官中郎將左中郎將右中郎將凡三署也署中有郎中侍郎無員多至千人郎中秩比三百石侍郎比四百石以其為郎居中故曰郎中以其為郎內侍故曰侍郎尚書郎初從三署郎選詣尚書臺試故郎中侍郎之名猶因三署本號也西漢言郎者多非尚書郎惟田蚡少為諸曹郎是也其馮唐為郎中顔駟為郎揚雄為侍郎及諸言以資為郎父任為郎皆三署郎至東漢猶難分有尚書及曹名冠首者即尚書郎直言為郎亦三署郎魏以後即無三署郎自漢以來諸曹郎中侍郎或不兩置或惟置郎中或惟置侍郎然二者亦通為尚書郎漢世兩置有郎中侍郎通典後漢尚書令史皆選於蘭臺符節簡練有吏能者為之尚書郎與令史皆主文簿謹案今六部之名始於隋代由漢以迄南北朝則統為尚書諸曹其名增損不一大抵隨宜設官不必依六典以為區别故以令制配隸不盡相準今苐取職掌可考者分繫各部之下以明沿革如常侍二千石三公考功定課諸曹則繫之吏部三公本主斷獄又别繫之刑部金部度支農部倉曹民曹則繫之户部至侍郎郎中官名本出秦漢三署因以為尚書郎之通稱原無差别故杜佑謂漢魏以來尚書屬或有侍郎或有郎中或曰尚書郎或曰某曹郎或則兼置或為互名雖稱號不同其職一也自隋煬帝置六侍郎增品第四以二尚書之職改諸司侍郎但曰郎於是侍郎始為六部長官唐初又於郎下復加中字而郎中亦遂沿為曹屬定名然則隋以前侍郎乃即今各部郎中之職其郎中與侍郎並置者郎中乃今員外郎之職而今各部堂官之侍郎則前代所無隋以後始置名雖同而實則異矣三國通典魏改選部為吏部主選事陳羣始建九品官人法拜吏部尚書吳暨豔為選曹尚書初學記吏部自漢及魏授此職者或云吏部尚書若授諸曹尚書直云尚書漢魏晉世若授吏部者即云以某為吏部尚書若授他曹云某為尚書至晉宋齊以後始云某授工部刑部五兵度支等尚書耳故歷代職官之書皆别紀吏部尚書不與諸曹同晉書百官志魏尚書郎有吏部二千石考功定課案定課宋書百官志作定科通典魏自黃初改祕書為中書置通事郎掌詔草而尚書郎非復漢時職任謹案漢之尚書郎下筆為詔策出言為詔命其所掌蓋即今內閣之任自魏文帝改其職入中書而尚書郎惟理庶務乃與今六部司員無異世俗相沿以明光起草含香奏事用為部曹典故不知此乃漢尚書郎職儀其實與後世曹郎並無涉也晉宋書百官志晉有吏部尚書晉書職官志晉受命武帝罷定課置吏部二千石曹郎康穆以後又無二千石郎但有吏部唐六典晉尚書郎曹有考功郎中一人通典晉有尚書都令史秩二百石與左右丞總知都臺事又賈充置省事吏品職與諸曹令史同宋齊梁陳鄭樵通志宋時吏部尚書領吏部刪定三公比部四曹孝武不欲威權在下大明二年分吏部尚書置二人以輕其任而省五兵後還置一吏部尚書宋書百官志太祖元嘉十八年增刪定曹郎次在左民曹上蓋魏世之定科即定課郎也三十年又置功論郎次都官之下在刪定之上南齊書百官志吏部尚書領吏部刪定三公比部四曹謹案宋齊以比部主法制故領於吏部尚書而隋以後則皆屬刑部又功論郎所掌本考功法而南齊志所載乃領於都官尚書不𨽻吏部蓋時未有六部定制故隨宜統攝不相畫一也今悉以現行職掌所承為定以功論郎繫之吏部而比部郎則仍列入刑部表內他並仿此隋書百官志梁置吏部尚書吏部刪定三公比部等郎天監三年置侍郎其郎中在職勤能滿二載者轉之陳承梁皆循其制吏部尚書中二千石品第三尚書吏部侍郎郎中六百石品第四通典尚書都令史宋齊八人梁五人謂之五都令史舊用人常輕武帝詔用士人乃以司空法曹參軍劉顯兼吏部都晉宋蘭臺寺正書令史雖行文書皆有品秩朱衣執板給書僮梁陳同北魏魏書官氏志吏部尚書第三品尚書吏部侍郎第四品尚書郎中第六品尚書都令史主事令史從第八品皇始四年復尚書三十六曹置代人令史一人譯令史一人書令史一人謹案主事之名本起於漢之光祿勳後漢書范滂傳滂遷光祿勳主事時陳蕃為光祿勳滂執公儀詣蕃蕃不止之滂投版棄官去自魏於尚書諸司各置主事令史隋代又去令史字遂為今各部主事之權輿然唐宋多用流外其品猶卑金始用士人大定中并用進士而所掌不過吏職故明初尚為首領官至洪武中改主事為司官乃與郎中員外郎並稱清選矣後周後周書蘇綽列傳太祖依周禮建六官天官府管冡宰等衆職馬端臨文獻通考後周有吏部中大夫一人掌羣臣及諸子之簿辨其貴賤與其年嵗嵗登下其損益之數依六勳之賞頒祿之差小吏部下大夫一人掌二吏部之事領司勳上士等官屬大司馬隋隋書百官志高祖置吏部尚書統吏部侍郎二人主爵侍郎一人司勳侍郎二人考功侍郎一人尚書省二十四司各置員外郎一人以司其曹之籍帳侍郎闕則釐其曹事煬帝定尚書六曹各侍郎一人以二尚書之職諸曹侍郎並改為郎又改吏部為選部郎諸部别見後以異六侍郎之名廢諸司員外郎而每增置一曹郎各為二員尋又每減一郎置承務郎一人同員外之職通典開皇三年置員外郎今尚書員外郎自此始以前歷代謂之尚書郎或謂之侍郎皆無員外郎之號前代史傳及職官要録或有言員外郎者蓋謂員外散騎侍郎耳非尚書之職通志尚書都令史隋改都事煬帝分𨽻六尚書置六人領六曹事主事令史煬帝去令史之名但曰主事隨曹間劇每十令史置一主事不滿十者亦一人雜用士人令史後魏謂之流外勳品北齊尚書郎判事正令史側坐書令史過事自隋以來漸為卑冗煬帝以四省三臺皆曰令史九寺五監諸府衛皆曰府史謹案前代尚書曹名增減不一自隋文帝置吏部禮部兵部都官度支工部六曹旋復改度支為民部都官為刑部於是六部之名至今沿為定式其侍郎員外郎主事諸官亦皆定於隋代漢魏以來尚書規制至此而斟酌漸密故後來多本之焉唐舊唐書百官志吏部尚書一員正三品龍朔二年改為司列太常伯光宅元年改為天官尚書神龍復為吏部尚書侍郎二員正四品上龍朔改為司列少常伯咸亨復總章元年吏部兵部各增置侍郎一員掌天下官吏選授勳封考課之政令其屬有四一曰吏部二曰司封三曰司勳四曰考功總其職務而行其制命尚書侍郎分為三銓尚書為尚書銓侍郎二人分為中銓東銓擇人以四才校功以三實據其官資量其注擬以定九流之品格郎中二員並從五品上龍朔為司列大夫咸亨光宅並隨曹改員外郎二員並從六品上郎中一人掌考天下文吏之班秩階品郎中一人掌小銓以其在九流之外謂之流外銓亦謂之小選小銓舊委郎中専知開元二十五年又敕銓試訖留放皆尚書侍郎定之也員外郎一人掌判南曹曹在選曹之南故謂之南曹員外郎一人掌判曹務司封郎中一員從五品上隋曰主爵郎武德因之龍朔改為司封大夫光宅改司封郎中司封員外郎一員從六品上掌國之封爵司勳郎中一員從五品上隋曰司勳郎武德初乃加中字龍朔改為司勳大夫咸亨復司勳員外郎二員從六品上掌邦國官人之勳級考功郎中一員從五品上龍朔二年改為司績大夫咸亨初乃復考功員外郎一員從六品上掌內外文武官吏之考課司馬光資治通鑑天寶十一載三月乙巳改吏部為文部至德二載復舊唐六典尚書左右司各掌付十有二司之事以舉正稽違省署符目都事監而受焉左右司都事從七品上主事從九品上謹案唐宋以來尚書左右司本都省僚屬説已具前自明代分建六部革都省之制左右司郎中員外郎俱已久廢惟今各部堂主事司務所掌如受遣文書考察掾史諸務尚即前代左右司都事主事之舊職謹以𨽻左司者著之吏部表內他部仿此新唐書百官志吏部主事四人司封主事二人司勳主事四人考功主事三人胡三省通鑑注唐主事並用流外入流者補之吏部令史三十人書令史六十人制書令史十四人甲庫令史十三人亭長八人掌固十二人司封令史四人書令史九人掌固四人司勳令史三十三人書令史六十七人掌固四人考功令史十五人書令史三十人掌固四人謹案唐承隋制尚書六部部各四曹凡二十四曹其每部首曹即以本部為曹名佐其長而行政令謂之本曹如吏部即為尚書吏部郎中員外郎户部即為尚書户部郎中員外郎其餘三曹各以職掌分列而署銜則不冠以本部名謂之子司如司封則但曰尚書司封郎中員外郎司勳則但曰尚書司勳郎中員外郎並不冠以吏部宋制因之所謂吏勳封考户度金倉禮祠主膳兵職駕庫刑都比門工屯虞水者是也金元六部皆無分曹明初復仍唐制部設四曹而首曹之以本部為名者則改稱總部尋又改吏禮兵工四總部為文選儀制武選營繕四清吏司至此始别置曹名後遂沿為定制然溯其源流則固唐宋之本曹也至考自唐迄明皆為吏部第四曹本朝始改列文選之次蓋一司銓政一司考課相輔而行于體制斯為允稱矣唐會要唐因隋制吏部尚書掌銓六品七品選侍郎掌銓八品九品選至景雲九年宋璟為吏部尚書始相通與侍郎分知因為故事通典自開元以來宰相員少資地崇高又以兵吏尚書權位尤美而宰臣多兼領之但從容衡軸不自銓綜其選試之任皆侍郎専之尚書通署而已遂為故事或分領其事則列為三銓四年六月敕員外郎御史并餘供奉官直進名敕授自此不在吏部尚書掌其一侍郎掌其二顧炎武日知録唐貞觀元年京師榖貴始分人於雒州置選至開耀元年以河雒天下之中詔東西二曹兩都分簡謂之東選是東都一掌選也黔中嶺南閩中官不由吏部委都督選擇土人補授上元三年敕每年遣五品已上官充南選使仍令御史同往注擬大厯十四年詔専委南選使停遣御史是黔中嶺南閩下各一掌選也李峴傳曰代宗徵峴為荆南節度知江淮選補使又曰罷相為吏部尚書知江淮選舉置銓於洪州劉滋傳曰興元元年改吏部侍郎往洪州知選事是江南又一掌選也李肇國史補郎官故事吏部郎中二廳先小銓次格式員外郎二廳先南曹次廢置其制尚矣王定保唐托言俊秀等科比皆考功主之開元二十四年廷議以省郎位輕不足以臨多士乃詔禮部侍郎専之謹案考功本掌貢舉及議諡之事其後貢舉雖歸之禮部而議諡之職至宋猶然明初始以屬之內閣云錦繡萬花谷無撰人名尚書郎自兩漢後妙選其人唐貞觀以來尤重其職吏部前行最為要劇自後行改入皆為美遷案唐制尚書六曹以吏部兵部為前行戶部刑部為中行禮部工部為後行考功員外郎専掌貢舉員外郎之最望者也五季五代史本紀吏部侍郎于兢為中書侍郎五代史列傳李琪遷吏部尚書謹案五代新史闕職官志舊史雖有之而簡陋殊甚故官制無可考見以紀傳核之六曹官名大約多仍唐舊今略採二條以見其槩又豆盧革傳載唐梁之際吏部銓文書不完因緣為姦利郭崇韜請論以法選人吳延皓改告身事發尚書左丞判吏部銓崔沂等皆貶據此則後唐吏部銓又嘗以他官掌之亦不盡用三銓之法也宋文獻通考宋朝典選之職自分為四文選二曰審官東院淳化二年置磨勘京朝官院又以差遣院并入號磨勘差遣院亦名考課院淳化四年以考課京朝官院為審官院熙寧間置審官西院以主武選於是改審官院為審官東院焉曰流內銓武選二曰審官西院曰三班院元豐定制以審官東院為尚書左選審官西院為尚書右選流內銓為侍郎左選三班院為侍郎右選掌文武官選授勳封考課之政令文臣寄祿官自朝議大夫職事官自大理正以下歸尚書左選武臣升朝官自皇城使職事官自金吾衛仗司以下歸尚書右選自初仕至州縣幕職官歸侍郎左選自借差監當至供奉官軍使歸侍郎右選凡分職為三封爵贈官之事司封主之賜功定省之事司勳主之官資課最名諡之事考功主之宋史職官志吏部尚書掌文武二選之法所隸官分掌其事兼總於尚書驗實而後判成置吏曰主事令史曰書令史曰守當官二十四司亦如之南渡初諸曹長二互置惟吏部偹官紹興八年置權尚書以處未應資格之人侍郎分左右選建炎四年置權侍郎滿二年為真舊制吏部除侍郎二員分典左右選總稱吏部侍郎間命官兼攝惟稱左選侍郎或右選而已紹興三年始有侍左侍郎侍右侍郎之稱既而徑入除目相承不改郎中員外郎舊主判二人以朝官充元豐官制行置吏部郎中主管尚書左右選及侍郎左右選各一員參掌選事而分治之凡郎官並用知府資序以上人充未及者為員外郎紹興八年吕希常兼權侍右郎官紹興三十一年李端明除尚右郎官既而何俌揚倓費行之除吏部郎官皆有侍左侍右尚左尚右之稱自此相承不改司封郎中員外郎掌官封敘贈承襲之事司勳郎中員外郎掌勳賞之事考功郎中員外郎掌文武選敘磨勘資任考課之政令尚書左右司分房十置都事三人主事六人謹案唐以吏部主文選兵部主武選宋則文武二選悉歸之吏部且有由中書樞密除授併不經吏部二選者宋六曹悉仍唐制惟選法視唐為較異云李心傳建炎以來朝野雜記六部監門官紹興二年初置秩比寺監丞郎官有缺得兼之內選則為寺監丞或權郎外除至有為諸路總領者六部架閣官崇寧間始置迄宣和再置再省紹興三年立六部架閣庫十五年復置官四人謹案宋六部同建於尚書都省故監門官得統司六部之事以其職考之似即今之司務也至宋制六部成案留部二年然後藏之架閣庫又八年則委之金耀門文書庫故特設官以掌之今之六部文案各留本司諸曹皆自為典守是以前代架閣掌固之官悉罷之而不設焉遼遼史百官志契丹南樞密院掌文銓部族丁賦之政凡契丹人民皆屬焉以其牙帳居大內之南故名南院南院樞密使知南院樞密使事知南院樞密事南院樞密副使知南院樞密副使事同知南院樞密使事簽書南樞密院事南院都承旨南院副承旨南院林牙知南院帖黃給事南院知聖旨頭子事掌南院頭子南樞密院敞史南院郎君南樞密院通事南院掾史謹案遼代北面官僚不設六部遼史百官志謂南樞密院視吏部今特著之於表以存一代之沿革其南北二王等官之視各部者均仿此分繫至南面漢官多依唐制而百官志亦不能具詳惟吏部尚書劉績見於聖宗本紀開泰元年今並著於表以見其概焉金金史百官志吏部尚書一員正三品侍郎一員正四品郎中二員從五品員外郎從六品掌文武選授勳封考課出給制誥之政以才行勞效比仕者之賢否以行止文册貼黃簿制各闕之機要正七品以上以名上省聽制授從七品以下每至季月則循資格而擬注自八品以上則奏以下則否侍郎以下皆為尚書之二郎中掌文武選流外遷用官吏差使行止名簿封爵制誥一員掌勳級酬賞承襲用廕循遷致仕考課議諡之事員外郎分判曹務及參議事所掌與郎中同主事四員從七品掌知管差除校勘行止分掌封勳資考之事惟選事則通署及掌受事付事檢勾稽失省署文牘兼知本部宿直檢校架閣餘部主事自受事付事以下所掌並同此皇統四年六部主事始用漢士人大定三年用進士非特旨不得擬吏人令史六十九人內女直二十九人譯史五人通事二人架閣庫管勾正八品同管勾一員尚書左右都事正七品掌檢勾稽失省署文牘謹案金代六部統為一署不設書屬而以郎中員外郎分判諸務元制亦同俱視唐宋為稍異惟吏部兼文武兩銓則猶沿宋之舊也元元史百官志吏部尚書三員正三品侍郎二員正四品郎中二員從五品員外郎二員從六品掌天下官吏選授之政令凡職官銓綜之典吏員調補之格封勳爵邑之制考課殿最之法悉以任之主事三員蒙古筆且齊蒙古語寫字人也原作必闍赤今改正三人令史二十五人回回令史二人克哷穆爾齊蒙古語通事也原作怯里馬赤今改正一人知印二人奏差六人銓寫五人典吏一十九人左三部照磨所秩正八品照磨一員掌吏戶禮三部錢穀計帳之事典吏八人富大用事文類聚元左右司各置都事吏部掌天下文武官吏選授勳封考察亷能出給制誥等事司封司勳考功無専曹有封誥科勳封科考選科以令史分頭掌之謹案元中統初以吏户禮為左三部兵刑工為右三部至元中又以吏禮為一部兵刑為一部户工各為一部其後始分列尚書六部逮尚書省廢後以其職併入中書六部遂改統於中書省故元代文移皆稱中書某部云明鄧球泳化類編洪武戊申始設六部官職以分理天下庶務仍統於中書省庚申春革中書省罷丞相永不許設遂定六部尚書正二品左右侍郎正三品郎中正五品員外郎從五品主事從六品及都察院通政司大理寺為正九卿衙門自是中書之政分於六部明史職官志吏部尚書一人左右侍郎各一人其屬司務廳司務二人文選驗封稽勳考功四清吏司各郎中一人員外郎一人主事一人尚書掌天下官吏選授封勳考課之政令以甄别人才贊天子治視五部為特重侍郎為之二司務掌催督稽緩勾銷簿書明初設主事司務各四人為首領官有主事印洪武二十九年改主事為司官裁司務二人各部並同文選掌官吏班秩遷升改調之事驗封掌封爵襲廕褒贈吏算之事稽勳掌勳級名籍喪養之事考功掌官吏考課黜陟之事明初設四部於中書省分掌錢榖禮儀刑名營造之務洪武元年始置六部吏部設總部司勳考功三屬部十三年罷中書省倣周官六卿之制升六部秩每部分四屬部吏部屬部加司封二十二年改總部為選部二十九年定為文選驗封稽勳考功四司並五部屬皆稱清吏司景泰中吏部嘗設二尚書天順初復罷其一吏部尚書表率百僚進退庶官銓衡重地其禮數殊異無與並者永樂初選翰林官入直內閣其後大學士楊士竒等加至三孤兼尚書銜然品敘列尚書蹇義夏原吉下景泰中左都御史王文升吏部尚書兼學士入內閣其班位猶以原銜為序次自𢎞治六年二月內宴大學士邱濬遂以太子太保禮部尚書居太子太保吏部尚書王恕之上其後由侍郎詹事入閣者班皆列六部上矣永樂大典吏部原設總部司封司勳考功銅印各一顆各設郎中員外郎首領官主事銅印各一顆洪武二十二年二月將總部改為選部二十九年八月將選部等部改為文選等清吏司郎中員外郎主事連銜書卷主事印革去謹案歷代省署以令史掌文書其官起於前漢史記酷吏傳趙禹補中都官用亷為令史是也東漢尚書令史秩二百石華嶠後漢書稱郎主文案與令史不殊應劭漢官儀亦云尚書令史滿嵗為尚書郎出亦與郎同宰百里郎與令史分職受事蓋其遷除之重如此三國魏令史第八品晉亦二百石宋齊梁陳品並第八朱衣執板進賢一梁冠梁武帝至擇朝臣才地並美者以充其選北魏有譯史令書令史亦皆八品隋初著令以為流外勳品唐代限考始入流於是遂為吏途宋亦案考出職至諸州上佐金尚書省有契丹令史女直令史譯史等職選用之途有四曰文資曰女直進士曰右職曰宰執子其遷轉視唐宋較優元虞集經世大典敘録稱元入官之制自吏業進者為多卿相守令於此焉出故補吏法最為詳密六部令史以諸路儒學歲貢人充之其譯史蒙古筆且齊諸職亦多以從七品流官補用綜其資格雖代有升降而周禮所謂掌官書以贊治者固八職之一也本朝諸司衙門各置滿洲蒙古漢軍筆帖式以翻譯清漢章奏文牘蓋即金元女直令史譯史蒙古筆且齊之職而其原實沿歷代令史遺制特是唐宋用人頗輕而今筆帖式為八旗子弟進身之階自舉人貢監任子以逮官學義學生皆得預選集試而後命之引見而後官之為內外升轉之法以激勵之掄核維精人材奮起蓋登用之廣視金制而詳慎彌加遷擢之優視漢制而考核尤備洵非前代僅稱雜流者所可比擬矣謹略採沿革著之於表而復論次大槩附識於吏部篇末云又按明代銓政主於文選一司自部院屬官府縣正佐皆聼吏部擇人注授初無成法而大僚則由廷議會推是以用舍大權悉歸臣下掌握然究其所推者又不必盡孚輿論大扺仍視大臣居首者意指所向而羣相附和之其闕門聚議不過沿習具文並無一人能主持公道是即所推者果克當其任而恩怨所在其不預推者勢不能不生觖望營求傾軋將從此起又况所推不出於至公而徒以朝廷爵祿榮途為諸臣網利徇私之具其弊又何可勝道我朝慎重名器董正治官首罷廷推之制凡內外大員皆由特簡即一命以上由部按例注闕者亦必經引見而後給憑赴職用人行政事事悉仰承睿斷乾綱獨攬柄不下移信億萬祀所當永為法守也欽定厯代職官表卷五
