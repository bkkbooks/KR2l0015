body:
  text: 王府各官表王府各官國朝官制親王府世子郡王府長子長史各一人正三品貝勒司儀長一人正四品掌總府中之政令率僚屬以各共府事員額並順治八年定乾隆十八年秦准諸王長史貝勒司儀係首領官若僅於所屬官内簡補恐有遷就嗣後員缺於下五旗前鋒䕶軍驍騎各恭領及世職官與所屬應陞人員簡擬正陪送部引見補授凡王府以下各官自五品以上出缺引見補授六品以下咨送兵部補授散騎郎親王府四人世子郡王府三人長子二人掌佐長史理府事皆以世職領之初制每旗各設散騎郎無定員雍正四年定制各王屬下散騎郎仍舊選充貝勒貝子等散騎郎俱停止䕶衛親王府二十人一等六人從三品二等六人從四品三等八人從五品世子十七人一等六人二等五人三等六人郡王府十五人一等六人二等四人三等五人長子十二人一等二人二等四人三等六人貝勒十人二等六人三等四人貝子六人公四人俱三等䕶衛掌隨䕶宿衛王府䕶衛自二等以下均帶藍翎初制為正品乾隆十九年䕶衛典儀俱改為從品典儀親王府六人從四品二人從五品二人從六品二人世子五人從四品一人從五品從六品各二人郡王府四人從五品從六品各二人長子三人從五品二人從六品一人貝勒二人從五品一人從六品二人貝子三人從六品一人從七品二人公三人從七品一人從八品二人掌儀節導引五旗王公府屬叅領旗各五人從三品佐領旗各七人從四品驍騎校毎佐領下二人從六品掌王府所屬旗籍之政令凡田賦户口出納盈縮之數綜其實而稽之管領親王府四人郡王府三人正六品掌王府文移及遣委之事典膳親王府一人郡王府一人從六品掌王府之膳羞司庫親王府二人郡王府二人從七品掌會計王府之庫藏司匠親王府四人郡王府四人從八品掌王府繕造修葺之事牧長親王府四人郡王府三人從八品掌王府之牧事親王府馬羣牧長二人牛羣羊羣牧長各一人郡王府馬羣牛羣羊羣牧長各一人歴代建置謹案三代時封建諸侯列國皆設官分職以治其民其法制備見於經傳兩漢晉宋諸侯王之官亦皆國官也宋齊梁陳以至隋唐諸王有府官有國官然兩漢以降王公率無分土所謂國官者乃虚名耳至宋置府官而國官不設亦變通之道宜然也我朝所設王府各官因事制宜劑繁簡而恊於中其官名職掌有在昔本為府官者有在昔為國官而今王府亦設之者亦莫非斟酌損益以適乎古今之宜也三代周禮天官太宰乃施典于邦國設其恭傅其伍陳其殷置其輔鄭康成注參謂卿三人伍謂大夫五人殷衆也謂衆士也王制諸侯上士二十七人其中士下士各居其上之三分輔府史庶人在官者也謹按太宰職設其参置其伍参謂参卿伍謂伍大夫是侯國無論同異姓皆得設三卿五大夫然周初封同姓諸侯其設官之盛如左傳定四年祝佗曰分唐叔懐姓九宗職官五正註云五正五官之長疏云殷時為五行官長襄二十五年傳自六正五史三十帥注云六正三軍之六卿蓋晉初封國已立五正故其後增至六正也是周初建同姓之國其設正或不止參卿矣明堂位虞氏官五十夏后氏官百商二百周三百凡四代之官魯兼用之然則魯建官職且得同於王朝漢同姓諸侯王設官之盛蓋本周制也然當時諸侯君國子民卿大夫以下皆以分理一國之事其規制與今日王府官本自不同今第錄周禮太宰職以誌縁起而並不以著於表云秦未置漢漢書百官公卿表諸侯王國有太傅輔王内史治國民中尉掌武職丞相統衆官羣卿大夫都官如漢朝景帝中五年令諸侯王不得復治國天子為置吏改丞相曰相省御史大夫廷尉少府宗正博士官大夫謁者郎諸官長丞皆損其員謹按百官公卿表謂天子為置吏改丞相曰相即後漢志云國家惟為置丞相御史大夫以下皆自置之是也漢紀宣帝詔膠東相王成治有異等其秩二千石𨽻釋三公山碑頌云願明公垂恩罔極保我國君洪氏謂以明公稱山之神國相為國君東海廟碑有東海相南陽桓君山陽滿君蓋漢自令諸侯王不得治國國相實專司國政其職與太守無異故國除為郡則以國相為太守郡建為國則以太守為國相並非兩官漢稱太守為府君故碑有國君之稱耳又百官公卿表載中尉掌武職漢舊儀載中尉與王相争權常不和考荀悦前漢紀載梁王以公孫詭羊勝為中尉號將軍蓋中尉掌武職故得將軍之名蓋將相權相抗也又百官公卿表謂内史治國民成帝時省内史更令相治民漢紀載元鳯元年戴王薨後宫有遺腹相内史不以奏本始元年廣川王去有罪内史相劾收責之以此知相與内史凡事皆相濟故相可以兼内史之職也後漢書百官志皇子封王其郡為國每置傅一人相一人皆二千石本注曰傅主導王以善禮如師不臣也相如太守有長史如郡丞中尉一人比二千石本注曰職如郡都尉主盗賊郎中令一人僕一人皆千石本注曰郎中令掌王大夫郎中宿衛官如光祿勲自省少府職皆併焉僕主車及馭如太僕本注曰太僕比二千石武帝改但曰僕又皆減其秩治書比六百石本注曰治書本尚書史名大夫比六百石本注曰無員掌奉王使至京師奉璧賀正月及使諸國本皆持節後去節謁者比四百石本注曰掌冠長冠本員十六人後減禮樂長本注曰主樂人衛士長本注曰主衛士醫工長本注曰主醫藥永巷長本注曰宦者主宫中婢使祠祀長本注曰主祠祀皆比四百石郎中二百石本注曰無員侯國毎國置相一人其秩各如本縣本注曰主治民如令長不臣也但納租於侯以户數為限其家臣置家丞庶子各一人本注曰主侍侯使理家事列侯舊有行人洗馬門大夫凡五官中興以來食邑千户以上置家丞庶子各一人不滿千户不置家丞又悉省行人洗馬門大夫漢紀孝恵紀改諸侯王相國為丞相景帝紀初諸侯得自除吏御史大夫以下官屬擬于天子國家惟置丞相黄金印自呉楚反之後奪諸侯權為置二千石去丞相曰相銀印其後惟得衣食租税而已貧或乗牛車時欒布有功封歙侯為燕相有治迹民為之立生祠中元三年罷諸侯御史大夫官元帝紀令諸侯相位在郡守下洪适𨽻釋司𨽻從事郭究碑竹邑者侯國屬沛尚和者鉅鹿之邑漢列侯大者食縣置相一人其秩各如本縣主治民如令長爾髙陽令楊著碑漢之王國相則秩二千石侯國相纔與令長等耳思善者汝南之小國碑首題以髙陽者蕞爾國不若壯哉縣也王應麟玉海漢諸侯王官有廐長私府長中御府長食官長常侍長史治書謹按漢諸侯王國設官為備有表志所不載而散見於紀𫝊者如路温舒為廣陽私府長龔舍為楚王常侍馬宫為楚王長史又廐長見王尊𫝊食官長見梁王襄𫝊尚食監見馮唐𫝊又史記淳于意為齊太倉長而齊有中御府長信亦見意𫝊又宋書百官志云前漢王國已置文學亦兩漢表志之所未載也漢初參用封建之法諸侯王地大人衆備設衆官以治國事與三代時列國無異其後諸侯王不得治民王國之官員數品秩並加減損又皆朝廷為置不得自置晉宋以降所置王國官大率沿漢制而增損之今國官既廢而府官之䕶衛典儀典膳實即漢時王國郎中令衛士長僕及食官長之職也又漢時王國有長史與今王府長史名同然漢王國置相職與郡太守同其長史即郡丞之職今王府長史乃沿宋齊以後府官之名與漢之王國長史名同而實異矣玉海為太傅者韋孟唐生於楚賈誼於梁夏侯始昌於昌邑轅固於清河師丹彭宜慶普於東平韓嬰於常山伏理於髙宻戴徳於信都丁姓於中山鄧彭祖於真定衛綰於河間杜林於東海疆封東海王重選官屬以林為傅時諸王傅或多交㳺惟林有召必至何敞於濟南為相者曹參石慶於齊董仲舒於江都膠西張敞於膠東王尊於東平褚太於梁孔霸於髙宻内史則梁之韓安國楚之何武中尉則昌邑之王吉淮陽之韋元成王式為昌邑王師以三百五篇諫呉王濞𫝊有太子師𫝊河間獻王立毛氏詩左氏春秋博士髙帝時諸侯得除内史以下漢獨為置丞相梁孝王以至親故得自置相二千石傅寛為齊右丞相或者侯國亦有兩相乎漢興諸王侯皆自治民聘賢楚三聘龔舍為常侍東平憲王辟林撫為西曹掾尋以為師友三國杜佑通典魏定制凡國王公侯伯子男六等有保傅相常侍侍郎郎中令中尉大農文學友謁者大夫雜署令丞晉晉書職官志王置師友文學各一人景帝諱故改師為傅友者因文王仲尼四友之名號改太守為内史省相及僕有郎中令中尉大農為三卿大國置左右常侍各一人省郎中置侍郎二人典書典祠典衛學官令典書丞各一人治書四人中尉司馬世子庶子陵廟牧長各一人謁者四人中大夫六人舍人十人典府各一人謹案晉潘尼贈陸機出為呉王郎中令詩云帝曰爾諧為王卿士俯僂從命奚恤奚喜晉職官志以郎中為王國三卿之一故陸機為呉王郎中令而潘尼詩有卿士之稱又晉傅咸集載理李含表云臣州秦國郎中令始平李含忠公清正才經世務實有史魚秉直之風蓋晉世郎中令位列三卿首故特重其選也宋齊梁陳宋書百官志宋氏以來一用晉制雖大小國皆有三軍晉制典書令在常侍下侍郎上江左則侍郎次常侍而典書令居三軍下矣江左以來公國則無中尉常侍三軍侯國又無大農侍郎伯子男惟典書以下又無學官令矣吏職皆以次損省焉宋太宗以來皇子皇弟雖非都督亦置記室𠫭軍南齊書百官志諸王師友文學各一人國官郎中令中尉大農為三卿左右常侍侍郎上軍中軍下軍三軍典書典祠學官典衛四令食官廏牧長謁者以下公侯置郎中令一卿通典齊王國諮議文學等官公侯置郎中令一人唐六典注宋齊諸王令藩鎮者有長史一人梁陳公府並有一人隋書百官志梁皇弟皇子府置師長史司馬從事中郎諮議𠫭軍及掾屬中録事中記室中直兵等𠫭軍功曹史錄事記室中兵等𠫭軍文學主簿正𠫭軍行𠫭軍長兼行𠫭軍等員嗣王府則減皇弟皇子府師友文學長兼行𠫭軍藩王府則又減嗣王從事中郎諮議𠫭軍掾屬錄事記室中兵𠫭軍等員王國置郎中令將軍常侍官又置典祠令廟長陵令典醫丞典府丞典書令學官令食官長中尉侍郎執事中尉司馬謁者典衛令舍人中大夫大農等官嗣王國則惟置郎中令中尉常侍大農等官藩王則無常侍通典梁王國置𫝊相公以下則臺閣為選置之皆掌之百姓事郎中令將軍常侍典書令典衛長伯子無典衛典祠以下自選備上諸官多同前代若王加將軍開府則置長史司馬及記室掾屬祭酒主簿錄事等官屬嗣王則惟置郎中令中尉常侍大農藩王則無常侍制與後漢同陳親王起家則為侍中若將軍方得有佐吏無將軍則無府止有國官皇弟皇子府置師長史司馬從事中郎諮議𠫭軍友掾屬記室等官其嗣王藩王府則逓減之王國置郎中令將軍常侍典祠令舍人等官其嗣王藩王則逓減其員玉海齊竟陵王子良開西邸招文學梁武帝與沈約謝朓王融蕭琛范雲任昉陸倕等並㳺焉號曰八友梁皇弟皇子友各一人謹案魏晉以降王國之官大率依仿漢制宋皇子皇弟雖非都督亦置記室𠫭軍自此以降諸王既置國官又别置府官後世王府官實始於此北魏魏書官氏志諸王師第三品上諸王友從第四品下王家尉第七品中王家史從第九品下太和二十三年髙祖復次職令諸王師第三品皇子長史皇子司馬從第三品始蕃王長史始蕃王司馬第四品皇子諮議㕘軍事皇子友二蕃王長史二蕃王司馬從第四品皇子之開府從事中郎始蕃王諮議𠫭軍事三蕃王長史二蕃王諮議𠫭軍事三蕃王司馬第五品皇子之開