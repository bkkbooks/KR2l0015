國官然自明皇以後諸王多不出閣意國官亦已漸廢矣至宋而諸王惟置府官不置國官可謂得損益之𠂻故其後因之而不變焉遼遼史百官志王傅府王傅蕭惟信重熙十五年為燕趙王傅親王内史府内史道宗太康三年見内史呉家弩原作呉家奴今據字面改正長史參軍諸王文學館諸王教授姚景行重熙中為燕趙國王教授諸王伴讀聖宗太平八年長沙郡王宗允等奏選諸王伴讀金金史百官志親王府屬官傅正四品掌師範輔導恭議可否若親王在外亦兼本京節鎮同知府尉從四品本府長史從五品明昌三年改掌警嚴侍從兼總統本府之事司馬從六品同檢校門禁總統府事文學二人從七品掌贊導禮義資廣學問記室恭軍正八品掌表牋書啟之事大定七年八月始置二十年不専除令文學兼之元元史百官志内史府秩正二品内史九員正二品中尉六員正三品司馬四員正四品諮議二員從五品記室二員從六品照磨兼管勾承發架閣庫從八品掾史八人譯史四人知印通事各二人宣使五人典吏二人至元二十九年封晉王於太祖四鄂爾多䝉古語宫殿也原作幹耳朶今改正之地改王傅為内史秩從二品置官十四員延祐五年陞正二品給印分司京師並分置官屬延慶司秩正三品掌王府祈禳之事使三員正三品同知二員正四品典簿一員從七品令史二人譯史知印通事各一人奏差二人至元二十七年置斷事官秩正三品理王府詞訟之事斷事官一十六員正三品經歴知事各一人令史三人典軍司秩從七品掌控鶴百二十有六人典軍二員副使二員天徳四年置諸王傅官庫春布哈䝉古語庫春力也布哈牤牛也原作寛徹不花今改正太子至齊王位下凡四十五王毎位下各設王傅傅尉司馬三員傅尉惟軍惟布哈額布根䝉古語老人也原作也不干今改正鄂爾昆地名原作幹羅温今改正三王有之自此以下皆稱府尉列於王傅之下司馬之上而三員並設又多寡不同或少至一員或多至三員者齊王則又獨置王傅一員明明史百官志王府長史司左右長史各一人正五品其屬典簿一人正九品所轄審理所審理正一人正六品副一人正七品典膳所典膳正一人正八品副一人從八品奉祠所奉祠正一人正八品副一人從八品典樂一人正九品典寳所典寳正一人正八品副一人從八品紀善所紀善二人正八品良醫所良醫正一人正八品副一人從八品典儀所典儀正一人正九品副一人從九品工正所工正一人正八品副一人從八品以上各所副官嘉靖四十四年並革伴讀四人從九品後止設一人教授無定員從九品引禮舍人二人後革二人倉大使副使各一人庫大使副使各一人倉庫副使後俱革郡王府教授一人從九品典膳一人正八品鎮國將軍教授一人從九品長史掌王府之政令輔相規諷以匡王失率府僚各供乃事而總其庶務焉凡請名請封請婚請恩澤及陳謝進獻表啟書疏長史為王奏上若王有過則詰長史曾經過犯之人毋得選用是職審理掌推按刑獄禁詰横暴無干國紀典膳掌祭祀賓客王若妃之膳羞奉祠掌祭祀樂舞典寳掌王寳符牌紀善掌諷導禮法開諭古誼及國家恩義大節以詔王善良醫掌醫典儀掌陳儀設工正掌繕造修葺宫邸廨舍伴讀掌侍從起居陳設經史教授掌以徳義廸王校勘經籍凡宗室年十嵗以上入宗學教授與紀善為之師引禮掌接對賔客贊相威儀洪武三年置王相府左右相各一人正二品左右傅各一人從二品恭軍府恭軍一人正五品録事二人正七品紀善一人正七品各以其品秩列朝官之次又置典籖司諮議官尋以王府武相皆勲臣令居文相上王相府官屬仍與朝官更互除授是年置王教授四年更定官制左右相正二品文武傅從二品恭軍從正品錄事正七品審理正正六品副正七品紀善正七品各署典祠正典寳正典儀正典膳正典服正工正醫正並正七品副並從七品牧正正八品副從八品引禮舍人省注九年改恭軍為長史罷王傅府及典籖司諮議官增設伴讀四人選老成明經慎行之士任之侍讀四人收掌文籍少則缺之尋改王相府所屬奉祠典寳典膳良醫工正各所正並紀善俱正八品副從八品十三年并罷王相府陞長史司為正五品置左右長史各一人典簿一人定王府孳牲所倉庫等官俱為雜職二十八年置靖江王府諮議所諮議記室教授各一人建文中增置親王賓輔二人伴讀伴講伴書各一人長史三人郡王賓友二人教授一人記室二人直史一人左右直史各一人吏目一人典印典祠典禮典饌典藥五署官各一人典儀二人引禮舍人二人儀仗司吏目一人其賓輔三伴賔友教授進見時侍坐稱名而不稱臣禮如賓師成祖初復舊制改靖江王府諮議所為長史司萬厯間周府設宗正一人後各府亦漸置郡王府增設教授一人王府䕶衛指揮使司設官如京衛玉府儀衛司儀衛正一人正五品儀衛副二人從五品典仗六人正六品儀衛掌侍衛儀仗䕶衛掌防禦非常䕶衛王邸有征調則聽命於朝明初諸王府置䕶軍府洪武三年置儀衛司司設正副各一人秩比正副千户司仗六人秩比百户四年改司仗為典仗五年置親王䕶衛指揮使司毎王府設三䕶衛衛設前後左右中五所所千户三人百户十人又設圍子手二所每所千户一人九年罷䕶衛府建文中改儀衛司為儀仗司增置吏目一人成祖初復舊制謹按元明諸王就封於外皆承宋制但置府官而明時諸王府官實㕘用唐以前府官國官之制如長史在前代本為府官而典膳奉祠典儀舍人之屬則皆前代國官之職也至䕶衛之設則又酌唐時親事帳内二府之制而用之明初王府長史多選耆舊為之有入為王朝官者其後長史諸官無復遷擢而王府體制漸替士大夫多不願為王府官惟世宗以興邸入承大統府寮多獲顯用第明之於藩王處之既非其道所置王官雖曰翊獲實資鈐束形格勢禁法立而弊生焉我朝展親之誼超軼曩代分封諸王列邸京師盛置官屬體制崇備而諸皇子皇孫出府者於府官外特命内務府大臣總其府事而所設官府又皆由部引見簡授職雖係於藩邸爵實列於皇朝無樹私植黨之嫌其頒祿之制自漢以來或領於司農或取諸王國而總以今制為善蓋漢時諸侯王世有國土其所食邑皆各為私奉養不領於天下之經費甚至鑄山煮海富埒天家則其僚屬之俸給自不復頒自朝廷逮後累代宗藩有爵號而無分土通典所載諸王府屬並給士力白直防閣庶僕俸料則悉由朝給矣沿及前明載於㑹典户部條下者有王府文武官吏俸祿按月支給之文則以明之諸王雖就藩於國不得收其賦税嵗給祿米各於所封國内府分放支而本色折色折鈔之法紛然日出所司因以為姦其弊殆不可勝詰我朝定制凡王府官屬各按品食俸於户部支領銀米兩給所以優其身家而䇿其宣力者法良意美為萬􅑤常昭之令典矣公主府官附國朝官制固倫公主府長史一人三品頭等䕶衞一人二等䕶衞二人三等䕶衞二人典儀二人六品和碩公主府長史一人四品二等䕶衞二人三等䕶衞一人典儀二人六品一人七品一人長史掌府中之政令䕶衞典儀各庀其政以聴于長史舊例由内務府于閑散内奏𣲖補授乾隆五十一年定制凡府員不必拘定陪嫁人户聴公主于該府家人随便補放以告内務府而註冊焉厯代建置三代經籍未見謹案帝乙歸妹見於易象王姬下嫁載在風詩而其時館甥之選多在侯國故設官之制典籍無聞也秦未置漢漢書百官公卿表公主所食曰邑後漢書皇后紀漢制皇女皆封縣公主其尊崇者加號長公主諸王女皆封鄉亭公主李賢注續漢志曰諸公主家令一人六百石丞一人三百石其餘属吏増減無常漢官儀曰長公主傅一人私府長一人食官一人永巷長一人家令一人秩皆六百石各有員吏而鄉公主傅一人秩六百石僕一人六百石家令一人三百石也謹案漢公主属官其禄秩視後代最優至其設𫝊一人則亦倣太子及諸王而立制者也三國杜佑通典魏公主有家令僕丞行夜督郵魏官第七品公主及諸國丞萬户以上典書令及家令第八品公主家令第九品公主家僕晉通典晉官第八品公主家令第九品公主家丞宋齊梁陳通典宋公主有傅令傅令不得朱服齊與晉宋同陳置九等公主有家令之制北魏通典後魏官第九品公主家令謹案北魏公主皆嫁于賔附之國朝臣子弟雖名族英彦不得尚焉然考太常博士常景奏云婦人無専國之理婦人為君男子為臣古禮所不載則當時公主下嫁亦必有置邸設官之事而所謂公主家令亦仍列於朝臣也北齊隋書百官志後齊諸公主置家令丞主簿録事等員通典北齊正九品公主家令後周未置隋隋書百官志大長公主長公主公主並置家令丞各一人主簿謁者舍人各二人郡王惟減主簿員公主家令視正九品唐新唐書百官志公主邑司令一人從七品下丞一人従八品下掌公主財貨廩積田園主簿一人正九品下録事一人從九品下督封租主家財貨出入有史八人謁者二人舍人二人家史二人謹案唐神龍二年閏正月敕公主府設官属或儀比親王或惟不置長史而餘並同親王若公主非皇后生官員減半其出䧏外藩者或特置司馬至景龍中始依舊為邑司家令丞録事各一人出䧏者不置葢唐時公主官屬較多而神龍之制則又加隆者也新書主簿一人而舊書職官志作二人又舊志作家吏二人而新志作家史當有一訛也五代未置宋宋史職官志公主邑令丞邑司録事皆存其名而罕除遼未置金未置元未置明明史職官志洪武七年公主府設家令一人正七品司丞一人正八品録事一人正九品二十三年改家令司為中使司以内使為之謹案公主官属自宋存其名而不除明初亦備官而其後改用奄寺若遼金元則并其名不著然固倫公主和碩公主均為皇女體敵藩封一切統制宜從周渥我朝定制酌古凖今不襲漢唐之繁冗亦不同宋元以來之缺略其取人即求諸本府俾人副其事事充其材真不易之良法矣置員既少證古亦多缺故不别著為表而依前史志例類叙于王府各官之後以昭國家敦睦之所推暨云爾欽定厯代職官表卷六十九
