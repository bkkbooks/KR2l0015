body:
  text: 五城表五城國朝官制巡視五城科道滿洲漢人各一人掌彈壓地方釐剔姦弊凡中東南西北五城分蒞而治之中城轄中西中東二坊東城轄崇南朝陽二坊南城轄東南正東二坊西城轄宣南關外二坊北城轄日南靈中二坊皆布其禁令而聽其獄訟大事奏聞小事則牒刑部結正而月具事目上都察院堂官考核焉有闕則以六科給事中十五道御史引見簡用二年而代初制以新資御史巡城後改用滿洲漢軍漢人御史每城各一人雍正元年改定每城二人初以漢軍歸併漢人班內後復改定漢軍御史及漢人籍𨽻大興宛平者俱不開列巡城又初置有五城筆帖式後省五城兵馬司指揮漢人各一人正六品副指揮漢人各一人正七品吏目漢人各一人未入流掌緝捕逃盜糾逖姦匪初制指揮専掌人命檢驗之事而以副指揮吏目分治各坊乾隆三十一年移東南西北四城副指揮於朝陽永定阜成德勝諸門外鈐轄關廂而城內事宜則以吏目専治各鑄關防條記以授之惟中城如舊副指揮每城初設二員順治十五年各省一員初俱由吏部揀補乾隆二十七年御史戈濤奏准以西北二城事務繁劇遇有缺出於中東南三城調補二十八年副都御史張映辰以調補乏人奏請仍復舊制厯代建置三代周禮地官司暴十肆則一人司稽五肆則一人司暴掌憲市之禁令禁其鬭囂者與其暴亂者出入相陵犯者以屬遊飲食於市者若不可禁則摶而戮之司稽常巡市而察其犯禁者與其不物者而摶之掌執市之盜賊以徇且刑之謹案地官司市掌辨物平價之政令今已别繫之順天府表內至司暴司稽雖出司市所辟除而鄭康成為司暴掌禁暴亂司稽察留連不時去者其職在除姦止慝與今坊官為近又其員數以十肆五肆為率分地而治亦頗同今五城之制故特托始於二職焉秦無考漢杜佑通典漢長安有四尉分為左右部後漢洛陽有四尉東南西北四部主盜賊案察姦宄馬端臨文獻通考長安四尉城東南置廣部尉是為左部城西北置明部尉是為右部並四百石黃綬大冠主追捕盜賊伺察姦匪後漢書百官志注漢官曰雒陽孝亷左尉四百石孝亷右尉四百石後漢書橋元列傳元舉孝亷補洛陽左部尉三國魏志太祖本紀舉孝亷為郎除洛陽北部尉裴松之注太祖初入尉廨繕治四門造五色棒縣門左右有犯禁者皆棒殺之京師斂迹莫敢犯者謹案王圻作續文獻通考以司𨽻校尉為五城所自出蓋因其督察姦宄事頗相近然司𨽻官本列卿統轄郡縣紏察百官其位任隆重實當如今步軍統領之職非五城之但蒞治都邑者可比考之史傳漢時輦轂政禁實以長安雒陽二縣主之如董宣為雒陽令擒湖陽公主奴即如今五城之捕治匪棍也祝良為雒陽令案太尉龎參夫人殺子事即如今五城之究驗命案也橋元少子被劫雒陽令圍守其家即如今五城之承捕盜賊也孫程等徙封逺縣敕雒陽令促期發遣即如今五城之遞送罪人也而長安雒陽四尉分左右部治事則尤與今司坊官規制相合蓋兩漢都城皆専統於京兆河南尹而今則五城與大興宛平二縣畫界分治五城以京營所轄為界兩縣以在外營汛所轄為界故五城専治京師即漢長安雒陽之職守源委實屬相承今以畿令為京縣正官未可析載仍入順天府表內而五城兵馬司則以左右部尉當之庶於官制為適凖焉漢書趙廣漢列傳廣漢為京兆尹奏請令長安游徼獄吏秩百石其後百石吏皆差自重不敢枉法妄繫留人漢書尹賞列傳賞守長安令部户曹掾史與鄉吏亭長里正父老伍人雜舉長安中輕薄少年惡子悉籍記之分行收捕後漢書周䊸列傳䊸徴拜雒陽令京師肅清黃門郎竇篤從宫中歸夜至止姦亭亭長霍延遮止篤篤蒼頭與爭延遂拔劍擬篤肆詈恣口篤以表聞詔收䊸送廷尉數日貰出李固傳固暴尸城北弟子郭亮守喪不去夏門亭長呵之李賢注夏門洛陽北面西頭門也謹案漢自縣尉以下各置小吏謂之鄉官五家為伍十家為什百家為里里有魁以相簡察十里為亭亭有長以求捕盜賊十亭為鄉鄉有游徼掌徼巡禁司姦盜見後漢書百官志長安洛陽二縣雖在京師而其制並同故史有長安游徼及亭長里正之名其後北魏置里宰里尉里正隋置里司官以典領都城諸坊蓋即沿襲此制而設是長安游徼正如今之兵馬司吏目而亭長里正則如今之五城總甲也北魏隋里正里司有秩如今吏目說詳後漢書百官公卿表京兆尹屬官有長安市兩令丞又左馮翊長安四市長丞皆屬焉後漢書百官志雒陽市長漢官曰市長一人秩四百石丞一人二百石明法補中興屬河南尹謹案漢之長安雒陽市令丞市長丞實本於周官司市當主辨物平價而參考諸史則其職亦得司捕治如後漢書張酺傳竇景家人擊傷市卒吏捕得之景怒遣緹騎侯海等五百人毆傷市丞又周榮傳注引蔡質漢儀京師游俠發順帝陵賣御物於市市長追捕不得是皆有摶執姦盜之責案三輔黃圖長安市有九各方二百六十六步六市在道西三市在道東凡四里為一市市樓皆重屋又長安間里一百六十重居櫛比門巷修直蓋市各有地為市令所専治故所犯在市者市令丞主之若所犯在閭里者則四尉及游徼亭長主之也今並互著於此三國文獻通考後漢洛陽有四尉魏因之三國吳志孫皓列傳皓愛妾或使人至市劫奪百姓財物司市中郎將陳聲繩之以法謹案吳志潘璋傳稱璋為吳大市刺姦盜賊斷絶則吳時市長亦有捕盜之職如漢東京舊制故攘奪財物者司市中郎將得以法繩治也晉晉書職官志洛陽縣置六部尉江左以後建康亦置六部尉晉書地理志洛陽置尉五部謹案晉職官志稱洛陽六尉而地理志又作五尉殆本先後增置故其數互見作史者各據其所本書之以致參差不合也宋齊梁陳通典晉建康六部尉宋齊梁陳皆因之謹案江左稱建康尉為尉司南史齊豫章王嶷傳嶷為揚州刺史上嘗出新林苑同輦夜歸至宫門辭出帝曰今夜行無使為尉司所呵也嶷對曰京輦之內皆屬臣州願陛下不垂過慮據此則當時六部尉司實分掌徼巡詰禁之事正如今之五城兵馬司也北魏魏書甄琛列傳琛遷河南尹表曰京邑是四方之本不可不治國家居代患多盜竊世祖太武皇帝親自發憤廣置主司里宰皆以令長及五等散男有經略者乃得為之又多置吏士為其羽翼崇而重之始得禁止今遷都以來天下轉廣四逺赴㑹事過代都五方雜㳫難可偹簡寇盜公行劫害不絶此由諸坊混雜釐比不精主司暗弱不堪檢察故也凡攻堅木者必為擇良器河南郡是陛下天山堅木盤根錯節亂植其中六部里尉即攻堅之利器非貞剛精鋭無以治之今里正乃流外四品職輕任碎多是下才人懷苟且不能督察故使盜得容姦百賦失理邊外小縣所領不過百户而令長皆以將軍居之京邑諸坊大者或千戶五百户其中或王公卿尹貴勢姻戚豪猾僕隸蔭飬姦徒髙門邃宇不可干問又有州郡俠客蔭結貴游附黨連羣陰為市劫比之邊縣難易不同今難彼易此實為未愜王者立法隨時從宜請取武官中八品將軍以下幹用貞濟者以本官俸恤領里尉之任各食其祿髙者領六部尉中者領經途尉下者領里正不爾請少髙里尉之品選下品中應選者進而為之則督責有所輦轂可清詔曰里正可進至勳品經途從九品六部尉正九品諸職中簡取何必須武人也謹案據甄琛傳所言則北魏亦仍晉制洛陽置六部尉惟經途尉前代未見為當時所創置而里正在漢本鄉吏魏於諸職中簡取則亦改為選人矣以今制凖之六部尉當為正指揮之職經途尉當為副指揮之職里正當為吏目之職至琛表請以八品將軍以下為里尉者蓋魏世以雜號將軍為散秩於百官之外别為班品故得試領他官也北齊隋書百官志後齊清都郡鄴領右部南部西部三尉又領十二行經途尉凡一百三十五里里置正臨漳領左部東部二尉左部管九行經途尉凡一百一十四里里置正成安領後部北部二尉後部管十一行經途尉凡七十四里里置正謹案北齊都郡鄴臨漳成安三縣俱治京城故分置七尉亦沿晉魏舊制也後周無考隋隋書百官志隋每坊置坊主一人佐二人煬帝三年京都諸坊改為里皆省除里司官以主其事謹案北魏京城里巷始以坊名至隋而坊主坊佐里司官遂以入銜實為今司坊官所自昉也唐舊唐書職官志殿中侍御史凡兩京城內則分知左右巡各察其所巡之內有不法之事新唐書百官志監察御史分左右巡紏察違失左巡知京城內右巡知京城外盡雍洛二州之境月一代將晦則巡刑部大理寺東西徒坊金吾縣獄搜狩則監圍察斷絶失禽者其後以殿中掌左右巡通典監察御史分左右巡紏察違失以承天朱雀街為界每月一代開元中革以殿中掌左右巡監察或權掌之非本任也唐㑹要貞元十年敕准六典殿中侍御史兩京城分知左右巡察其不法之事謂左降流移停匿不去及妖訛宿宵蒱博盜竊獄訟寃濫賦斂違法如此之類方合奏聞比者因循務求細事既甚煩碎頗失大猷宜令自今以後據六典合舉之事所司有隱蔽者即具奏聞其餘常務不須處問舊唐書代宗本紀大厯八年九月晉州男子郇模哭於東市請進三十字上召見館之禁中貶左巡使殿中侍御史楊護以其抑郇模而不上聞也趙璘因話録權實子範為殿中侍御史知巡有小吏從市求取者事發笞臀十數他日復有如此者白於臺長杖背十五同列疑其罪同罰異權對曰前吏所取者名屬左軍臺之威令不振久矣百司尚有不禀奉者况慿禁軍之勢耶彼受賄於此輩且是知抑豪强可以末减後吏則挾臺之威恐嚇百姓杖背全命猶為至輕胡三省資治通鑑注程大昌雍録曰長安四郭之內縱橫皆十坊大率當為百坊亦有一面不啻十坊者故六典曰一百一十坊也坊皆有垣有門隨晝夜鼓聲以行啓閉巡使掌左右街百坊之內謹啓閉徼巡者也宋白曰廣德二年九月命御史中丞魚户部侍郎王延昌充左巡使御史中丞源休充右巡使辛亥源休充都左右巡使元和八年薛存誠奏得兩巡御史狀以承平舊例兩街本屬臺司其所由每月衙集動靜申報如所報差繆舉勘悉在臺中通典赤縣尉置六員因話録萬年縣捕賊官李鎔冊府元龜萬年長安兩縣捕賊官領其徒受羅立言指使謹案唐以御史知左右巡即今巡城御史所自始據因話録載栁公權為京兆尹於街中杖殺神䇿軍小將憲宗詰其何不奏公權曰臣合决不合奏上曰合何人奏對曰在街中本街使金吾將軍奏若在坊內左右巡使奏云云是當時都城各分地界以兩街屬金吾街使而左右巡使但主諸坊之內然考胡三省通鑑注所云則兩街亦臺司所並屬矣至唐以殿中監察知左右巡廣德中至以中丞為之則其職益重而所轄官吏不見於史又案唐萬年長安二尉稱為捕賊官各領邏卒即如今兵馬司之捕役疑亦當統屬於兩巡使也五季無考宋宋史職官志咸平四年以御史二人充左右巡使分紏不如法者文官右巡主之武官左巡主之分其職掌紏其違失開封府左右軍巡使判官各二人分掌京城爭鬭及推鞫之事左右廂公事幹當官四人掌檢覆推問凡鬬訟事輕者聽論决臨安府城外內分南北左右廂各置廂官以聽民之訟訴許奏辟京朝官親民資序人充後以臣僚言罷城內兩廂官惟城外置焉又分使臣十一員以緝捕在城盜賊謹案宋志軍巡判官分掌京城爭鬭及推鞫之事據魏泰東軒筆録載有孫良孺為軍巡判官押辟囚棄市一事則軍巡判官又有監刑之事與今大决之日五城司坊官畢至例同李燾續資治通鑑長編大中祥符元年置京新城外八廂真宗以都門之外居民頗多舊例惟赤縣尉主其事至是特置廂吏命京府統之天禧五年增置九廂熙寧三年五月詔以京朝官曽厯通判知縣者四人分治京城四廂凡民有鬭訟事輕者得以决遣文獻通考熙寧三年以京朝官分治開封府四廂其先差使臣並罷九月詔許留後使臣一員分左右廂管勾十一月臣僚言逐廂一月之內斷决事件不多欲止令京朝官二員分領二廂决斷所舊來四廂使仍舊存留以偹諸般差使元祐四年知開封謝景溫請於新城內外左右置二廂通為四廂四年罷紹聖元年復置紹興中臨安府先依開封例於城外南北廂置主管公事近又於城內左右廂添置官二員分减在城詞訟其後以臣僚言將在城左右廂廢罷其廂官二員移往城南北廂謹案宋真宗以赤縣尉不足彈壓始特置廂吏是宋之四廂使即前代六部尉之職正如今之五城兵馬司也遼遼史百官志五京警巡院職名某京警巡使某京警巡副使王圻續文獻通考遼五京各置警巡院官曰警巡使東京别置軍巡院官曰東京軍巡使中京别置巡邏司官曰中京巡邏使興宗重熙十三年又置契丹警巡院謹案遼於京城置警巡院軍巡院蓋本沿唐宋節鎮牙職之稱而所掌實即唐左右巡之事厯代職名沿革至此而漸變其舊矣金金史百官志諸京警巡院使一員正六品掌平理獄訟警察别部總判院事副一員從七品掌警巡之事判官二員正九品掌檢稽失簽判院事武衛軍都指揮使司都指揮使從三品大定十九年以武衛軍六十人兵馬一員副都二員其職低故設使品正四承安三年升副都指揮使二員副都一員判官二員掌防衛都城警捕盜賊謹案金之警巡使副悉循遼制當如今之五城而武衛軍則本𨽻兵部當如今巡捕五營之比然其官初設有兵馬一員則兵馬司之名實自此始今故並著於表焉元好問中州集張德直召補省椽選授右警巡使李天翼遷右警巡使李獻甫兼右警巡使謹案金史百官志警巡使無左右之名惟使副各一員而張德直李天翼等皆嘗為右警巡使疑即警巡院副之别名也元元史百官志大都路兵馬都指揮使司凡二掌京城盜賊姦僞鞫捕之事都指揮使二員副指揮使五員知事一員提控案牘一員吏十四人至元九年改千户所為兵馬司𨽻大都路凡刑名則𨽻宗正且為宗正之屬二十九年置都指揮使等官其後因之一置司於北城一置司於南城司獄司凡三司獄一員獄丞一員一置大都路一置北城兵馬司皇慶元年分置一司於南城左右警巡二院逹嚕噶齊解見吏部篇各一員使各一員副使判官各三員典史各三人司吏各二十五人至元六年置領民事及供需大都警巡院品職分置如左右院逹嚕噶齊一員使一員副使判官二員典史二員司吏二十人大德九年置以治都城之南上都兵馬司指揮使三員副指揮使二員知事一員提控案牘一員司吏八人至元二十九年置警巡院逹嚕噶齊一員警巡使一員副使二員判官二員司吏八人謹案元仍金制分警巡院為三兵馬司為二以參掌都城民事及姦盜鞫捕其兵馬司本屬右選當如今之巡捕營而南城北城之名實肇昉於此時洎明初裁省警巡院併入兵馬司又增置東中西三城而指揮副指揮遂為文職之定名矣明明史百官志監察御史巡視皇城五城王圻續文獻通考明警巡改置中東西南北城兵馬指揮司初設兵馬指揮司指揮使副指揮知事城門設兵馬洪武十年改為指揮副指揮革知事二十三年定為兵馬指揮司增設吏目建文中又改指揮副指揮為兵馬副兵馬靖難後復故本司各指揮一人副指揮五人指揮掌巡捕盜賊街道溝渠囚犯火禁之事副指揮為之二明㑹典正統十三年令五城巡視御史凡事有姦弊聽其依法受理送問成化四年令錦衣衛五城兵馬司禁約賭博緝捕盜賊巡城御史通行提調凡九門守門官軍及九門鈔法俱巡視北城御史帶管提督整理清到軍士北城御史同給事中兵部委官存恤盔甲厰東城御史同給事中巡視欽定厯代職官表卷二十
