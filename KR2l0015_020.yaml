body:
  text: 工部表工部上國朝官制工部尚書滿洲漢人各一人掌天下工虞器用辨物庀材以飭邦事所屬有營繕虞衡都水屯田四清吏司國初設工部滿洲承政二員蒙古承政一員漢人承政一員滿洲恭政八員啓心郎一員尋又增設漢人恭政二員蒙古恭政二員漢人啓心郎二員崇德三年改設承政一員左恭政二員右恭政三員順治元年改承政為尚書無定員五年定設滿洲漢人尚書各一人雍正元年以來以親王郡王大學士兼理部務皆由特簡不恆置左右侍郎滿洲漢人各一人掌綜事訓工以二尚書順治元年定額滿漢右侍郎兼管理錢法堂事務詳見户工二部錢局篇營繕清吏司郎中滿洲四人蒙古一人漢人一人員外郎滿洲五人漢人一人主事滿洲二人蒙古一人漢人二人掌繕治壇廟宫府城垣倉庫廨宇營房辨飭物材而司其禁令凡工作之籍以時會而上之國初置工部理事官九員副理事官十二員額者庫二員順治元年改設滿洲郎中八人蒙古郎中一人滿洲員外郎九人蒙古員外郎三人滿洲主事四人漢軍郎中二人員外郎六人十二年增設滿洲郎中九人員外郎十人康熙二十二年增設滿洲主事每旗各一人三十八年省蒙古郎中員外郎額闕又省漢軍員外郎四人五十七年復設蒙古郎中一人員外郎一人增設蒙古主事一人雍正五年省漢軍郎中員外郎額闕滿洲司屬初不分曹聼委於其長後始定額如今制漢人司屬則自順治元年即隨曹置額初設營繕司郎中二人員外郎二人主事六人虞衡司郎中一人員外郎二人主事三人都水司郎中一人員外郎二人主事十有一人屯田司郎中一人員外郎一人主事三人十四年增營繕司主事三人十五年省營繕司郎中一人營繕都水虞衡三司員外郎各一人都水司主事一人十六年省營繕司主事二人十八年復設營繕司郎中一人康熙元年仍省又省營繕司主事一人六年營繕虞衡屯田三司又各省主事一人都水司四人十一年增都水司員外郎二人尋省十二年又省都水司主事四人虞衡清吏司郎中滿洲四人漢人一人員外郎滿洲四人蒙古一人漢人一人主事滿洲三人漢人一人掌山澤採捕及陶冶器用修造權衡武備之事若葦席竿繩之屬則儲以待用應時而給之都水清吏司郎中滿洲五人漢人一人員外郎漢洲五人漢人一人主事滿洲四人漢人二人掌河防海塘及直省河湖淀泊川澤陂池水利之政令凡道路之平治橋梁之營葺舟楫之制度咸總而舉之嵗十有二月則藏氷夏而出之以供祭祀宫府之用焉屯田清吏司郎中滿洲四人漢人一人員外郎滿洲五人漢人一人主事滿洲三人漢人二人掌修陵寢大工及王公百官墳塋之制凡大祭祀則供其薪炭百司嵗給亦如之工匠之餼於官及以時和顧者皆量其功役而為之程度焉節慎庫郎中員外郎滿洲各一人司庫滿洲二人庫使滿洲十有一人掌出納金錢月要嵗會以上其數郎中員外郎俱於各司屬中簡調一年而代初設有漢人大使一人順治十五年省製造庫郎中滿洲二人漢人一人司匠滿洲二人初制七品康熙九年定為從九品司庫滿洲二人庫使滿洲二十有二人掌攻治金革所領銀工之屬十有二鍛工之屬九皮工之屬十有三繡工之屬五甲工之屬八凡車輅儀仗之制展采備物皆辨其名數而供之初置滿洲郎中一人員外郎二人後省員外郎而增置滿洲郎中一人漢人郎中初以虞衡司員額管製造庫事乾隆十九年改為製造庫郎中皆於本部司官內遴選補授料估所司員滿洲漢人各三人掌審曲面藝量丈尺權物價計庸直以授成於督工之官工竣則覆核之皆於本部司員內簡委一年而代琉璃窑監督滿洲漢人各一人掌陶琉璃器具按其模式辨其等差以供大工之用順治初專差漢人司官康熙元年改差滿洲漢人司官各一人一年而代木倉監督滿洲漢人各一人木倉在天安門右千步廊外凡各省嵗輸木材自張家灣運京者謹其儲偫以待各工順治初專委滿洲司官一人康熙六十年改定以滿漢司官各一人管理二年而代皇木厰監督滿洲一人木厰初設於通州及張家灣各遣筆帖式二人驗收運京木材康熙二十六年停遣筆帖式通州厰以通惠河分司主之尋改歸通永道張家灣厰本部遴滿洲司官一人管理凡運木至水次部委官驗視如式則令監督受之核其數以運入木倉一年而代管理街道廳御史一人本部司員一人步軍統領衙門司員一人掌平易道塗清理溝洫嵗時相度疏濬滌泥泄潦以利車馬初委本部司官滿洲漢人各一人乾隆三十一年定制令都察院掄選御史二人工部步軍統領衙門各掄選司屬二人引見簡派以專責成一年而代堂主事滿洲三人漢軍一人掌章奏者滿洲一人漢軍一人掌案牘者滿州二人俱順治元年定額司務廳司務滿洲漢人各一人順治元年定額職事見吏部篇筆帖式滿洲九十三人蒙古二人漢軍十有二人滿洲筆帖式初置九十人後增設三人蒙古筆帖式雍正十二年置額漢軍筆帖式初置十四人後省二人俱分𨽻各司視事之繁簡以為額職事見吏部篇謹案工部舊設營繕所所正一員所副一員俱順治十五年省所丞二員順治十四年置以一員管清江甎厰一員管臨清甎厰尋省臨清厰一員清江厰一員中罷復置雍正四年俱省又舊沿明制有文思院廣積庫柴炭司通州抽分竹木局大使各一員後俱省又初設有柴薪正副監督各一人以本部司官充煤炭監督二人一以本部司官兼攝一以內務府司官兼攝掌預時給直採取薪炭以儲內庭之用乾隆四十六年以其事併歸內務府經理焉歷代建置上三代尚書舜典舜曰咨四嶽有能奮庸熙帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉帝曰疇若豫工僉曰垂哉帝曰俞咨垂汝共工垂拜稽首讓於殳斨暨伯與帝曰俞往哉汝諧帝曰疇若豫上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞益拜稽首讓於朱虎熊羆帝曰俞往哉汝諧謹案司空為冬官之任肇自虞廷然以今工部所掌按之則實即垂所為之共工一官而不盡出於司空之職鄭康成注考工記謂司空掌營城郭建都邑立社稷宗廟造宫室車服器械監百工者唐虞以上曰共工據此事司空即共工之官而改其名者賈公彥疏申鄭之義謂堯初各官為共工舜舉禹治水改命司空以官異之禹登百揆後復為共工其説甚鑿然不見於他書未足依據嘗考司空命名之義孔安國謂主國空土以居民見尚書傳顔師古謂空穴也古人穴居主穿土為穴以居人見漢書百官公卿表注白虎通則云司空主土不言土言空者空尚主之何况於實見白虎通封公侯篇諸書所釋雖互有異同要其職皆在於平治水土度地居民而並不及乎辨器飭材之事故尚書大傳謂溝瀆過水為害田廣不墾則責之司空而家語亦謂孔子為司空别五土之性而物其所生之宜是知司空所主者在乎辨方正位體國經野之大猷而百工之事乃特其兼屬而初非本職此司空與共工虞廷所以分為兩官也周禮冬官既闕其制不詳漢世司空但主四方水土功課而繕修攻錯之工則分屬之將作少府尚為不失遺意唐宋以後工部專司工作而共工始合於司空又以虞曹𨽻屬工部而山澤之掌亦歸其統轄虞廷九官遂合伯禹及垂益所掌而一之工部四司實兼有司空共工虞官之職事矣今以舜典經文録冠三代之首用明緣起而歷代建置分合之故則隨條附考如左杜佑通典卨元孫之子曰冥為夏司空禮記孔頴達疏鄭注大傳夏書所謂六卿有共工謹案尚書胤征工執藝事以諫當即指共工之官蓋百工各執其藝而共工為之長也又儀禮覲禮云嗇夫承命告於天子鄭康成注嗇夫司空之屬考周禮無此官惟胤征有嗇夫馳之文則亦當出於夏制然孔安國傳以為主幣之官與覲禮所言又頗不相合案左傳稱司空以時平易道路國語稱司空視塗嗇夫為田畯之官見詩甫田篇鄭箋若漢之鄉嗇夫職聼訟收賦稅與三代不同其職本在郊畿以外疑諸侯入覲時嗇夫實有除道之責如野廬環人者比故屬于司空孔傳主幣之説特以意揣測而言之耳夏小正十有二月虞人入梁傳虞人官也梁者主設􅘩罟者也謹案此即伯益所掌之虞官至夏世而其職較輕者蓋益當洪水之後山林川澤皆未能得所故以益平治之與禹平水土殆相為表裏三代以降則不過掌其禁令以與民共之而已禮記曲禮天子之五官曰司空鄭康成注此亦殷時制也天子之六工曰土工金工石工木工獸工草工典制六材鄭康成注此亦殷時制也周則皆屬司空土工陶旊也金工築冶鳬栗段桃也石工玉人磬人也木工輪輿弓廬匠車梓也獸工函鮑韗韋裘也惟草工職亡蓋謂作萑葺之器尚書洪範三八政四曰司空孔頴達疏司空掌居民之官尚書序咎單作明居孔穎達疏馬融曰咎單為湯司空禮記王制司空執度度地居民山川沮澤時四方量地逺近興事任力詩大雅乃召司空朱子集傳司空掌營國邑尚書立政司徒司馬司空亞旅孔安國傳此有三卿是文武未伐紂舉文武之初以為法則尚書周官司空掌邦土居四民時地利尚書孔安國傳司空第六毛公領之春秋定公四年左傳聃季為司空周禮地官鄉師執纛以與匠師治役鄭康成注匠師事官之屬其於司空若鄉師之於司徒也鄉師主役匠師主衆匠賈公彥疏地官之考稱鄉師春官之考稱肆師秋官之考稱士師此經鄉師是司徒考明匠師亦是司空考故云其於司空若鄉師之於司徒天官大宰設其考鄭注云考成也佐成事者謂宰夫鄉師肆師軍司馬士師也司空亡未聞其考賈疏云匠師司空之考而云未聞者以義約之無正文故也儀禮大射儀工人士與梓人度尺而午鄭康成注工人士梓人皆司空之屬王應麟曰工人士能正方圜者謹案周禮事官之屬已亡其職制不可復見惟太宰謂建其正立其二設其考者五官之數並同則冬官當亦無異以例推之知為大司空卿一人小司空中大夫二人匠師下大夫四人上士八人中士十六人旅下士三十二人若府史胥徒則五官已有參差未可臆定矣至儀禮之梓人已見考工記而工人士能正方圜即所謂審曲面藝之事今工部之料估所蓋其職也周禮考工記輪人為輪為蓋輿人為車輈人為輈築氏為削冶氏為殺矢桃氏為劍鳬氏為鐘栗氏為量段氏為鏄函人為甲鮑人韗人為臯鼓韋氏裘氏畫繢之事筐人㡆氏玉人楖人雕人磬氏為磬矢人為矢陶人為甗旊人為簋梓人為筍虡為飲器為侯廬人為廬器匠人建國營國為溝洫車人為耒為車弓人為弓鄭成康注事官之屬六十此職其五材之十工略記其事耳其曰某人者以其事名官也其曰其氏者官有世功若族有世業以氏名官者也謹案司空之職在居四民時地利故凡田萊溝洫都邑塗巷市井室廬以至桑麻穀粟之所出山澤林麓之所生其法式皆當屬之事官太宰六典小宰六職其于事典事職皆曰以富邦國而鄭康成亦謂司空掌邦事所以富充國家使民無空土與之周禮訂義亦云如衛文公務材訓農通商惠工馴致殷富蓋得事典遺意冬官職守昭然可見若考工記所載止百工之事雖本司空一屬而不可遂以補冬官之闕且諸工尚當各有官以統之亦不可謂工即為官今故但節敘大略於此不復著之於表禮記月令命工師令百官審五庫之量鄭成康注工師司空之屬官也孔頴達疏周禮無工師知是司空屬官者以司空掌工巧此稱工巧師長故知司空之屬謹案匠師工師鄭康成皆以為司空之屬而職掌則未之詳以義推之匠師即後世大匠之職蓋掌營建國邑宗廟者魯匠師慶諫丹楹刻桷此即其證當如今之營繕司工師主工巧則掌造作器物者故月令又有命工師效功按度程必功致為上之文當如今之製造庫也春秋襄公二十五年左傳昔虞閼父為周陶正杜預注當周之興閼父為武王陶正謹案列仙傳稱寧封子為黃帝陶正其説荒誕不足信然亦可見摶埴之工其來已久蓋即考工記之陶人如今之琉璃窰監督也周禮秋官條狼氏下士六人胥六人徒六十人鄭康成注杜子春云條當為滌器之滌除也狼狼扈道上賈公彥疏狼扈道上者謂不蠲之物在道猶今言狼藉也謹案周禮野廬氏達國道路至于四畿而遂師巡其道修候人掌其道治皆在野外至國中之道路則條狼氏専司焉滌除狼扈而使之潔清正如今街道廳之職也周禮地官山虞每大山中士四人下士八人府二人史四人胥八人徒八十人中山下士六人史二人胥六人徒六十人小山下士二人史一人徒二十人掌山林之政令物為之厲而為之守禁鄭康成注虞度也度知山之大小及所生者林衡每大林麓下士十有二人史四人胥十有一人徒百有二十人中林麓如中山之虞小林麓如小山之虞掌巡林麓之禁令而平其守若斬木材則受法於山虞而掌其政令鄭康成注衡平也平林麓之大小及所生者川衡每大川下士十有二人史四人胥十有二人徒百有二十人中川下士六人史二人胥六人徒六十人小川下士二人史一人徒二十人掌巡川澤之禁令而平其守澤虞每大澤大藪中士四人下士八人府二人史四人胥八人徒八十人中澤中藪如中川之衡小澤小藪如小川之衡掌國澤之政令為之厲禁謹案國語齊語山立三虞澤立三衡三虞者大山大林麓中山中林麓小山小林麓三衡者大川大澤藪中川中澤藪小川小澤藪當時候國之制並同蓋皆以官分地而巡守之故非一職正如漢之郡國都水官後世於尚書立虞部明改曰虞衡其名雖沿周官之舊而實則稍殊然掌山澤採捕之禁令則固未之有改也今以山虞以下四職著之於表以明權輿所自至虞人又為田獵之官周禮所謂山虞萊山田之野澤虞萊澤野以致禽而珥者其職正與今圍場總管相近今亦並從互見焉周禮夏官司險中士二人下士四人史二人徒四十人設國之五溝五塗而樹之林以為阻固皆有守禁而達其道路周禮天官凌人下士二人府二人史二人胥八人徒八十人掌氷正嵗十有二月令斬氷三其凌春始治鑑夏頒氷掌事秋刷謹案司險掌設五溝五塗杜佑以為即後世氷部之職所自出今並繫之於表至納氷之制唐宋掌之禮部今則改屬工曹故凌人一官亦著之都水司沿革云唐六典工部尚書周之冬官卿侍郎周之小司空中大夫也大司空屬官有下大夫蓋郎中之任地官有山虞澤虞蓋虞部之職也秦杜佑通典秦有將作少府掌治宫室謹案自六官之制既廢秦漢始設九寺大卿以統庶事逮隋唐復建六部而寺監之官仍相沿並置故有户部復有司農寺有禮部復有太常寺有兵部復有太僕寺有刑部復有大理寺是皆周司徒宗伯司馬司冦之職事而分析别領於他官者也惟工官之任歷代雖有將作都水二監而明代即併入工部至今仍之别無分署故今之營繕都水二清吏司實兼有此二監之職謹並繫之工部沿革以明官制分合之由至大匠少匠大監少監諸官其品位不參八座未可以當冬官卿二故不列於表而左右校甄官署諸令丞則仍按曹司分屬説具於後漢章俊卿山堂考索漢成帝綏和元年御史大夫改為大司空後漢以司空為三公後漢書百官志司空公一人掌水土事凡營起城邑浚溝洫修墳坊之事則議其利建其功凡四方水土功課則奏其殿最而行賞罰謹案漢司空所掌雖亦本三代事官舊典然當時備位三公乃宰相之職與後世工部之列六尚書者不同今故繫之內閣表內其魏晉以後司空之官俱視此例别詳內閣篇云鄭樵通志漢成帝置尚書郎四人其一人主户口墾田蓋尚書屯田之始也通典成帝初置尚書有民曹後漢光武改主繕修功作鹽池園苑漢書百官公卿表將作少府有兩丞左右中候景帝中六年更名將作大匠屬官有石庫東園主章左右前後中校七令丞如淳曰章謂大材也舊章作大匠主材吏名章曹掾師古曰東園主章掌大材以供東園大匠也又主章長丞師古曰掌凡大木也武帝太初元年更為東園主章為木工成帝陽朔三年省中候及左右前後中校五丞後漢書百官志將作大匠一人二千石掌修作宗廟路寢宫室陵園木土之功并樹桐梓之類列於道側丞一人六百石左校令一人六百石掌左工徒丞一人右校令一人六百石掌右工徒丞一人太平御覽將作大匠世祖以謁者領其官章帝建初元年乃置其位次河南尹謹案將作大匠即唐虞共工之官正當今工部營繕司之職其所屬東園主章令丞主章長丞専掌木材則如今之木倉及皇木厰監督至左右校専主工役則亦如今營繕司及後漢書蘇不韋傳載李皓為大司農右校芻廥在寺北垣下不韋潛入廥中云云則又如今之有柴薪厰也漢書百官公卿表大常屬官有都水長丞如淳曰律都水治渠堤水門三輔黃圖云三輔皆有都水也水衡都尉都水長丞屬焉後漢書百官志郡有都水官隨事廣狹置令長及丞唐六典漢成帝以都水官多置左右使者各一人劉向護左都水使者是也至哀帝罷之後漢省都水以屬郡國而置河隄謁者五人通典漢有都水長丞主陂池灌溉保守河渠自太常少府及三輔等皆有其官謹案都水之官實昉於漢而命名之義則史未之詳考尚書禹貢大野既豬彭蠡既豬滎波既豬史記夏本紀皆作既都被孟豬則作被明都注引鄭康成云南方謂都為豬孔安國曰水所停曰豬字彚補曰都水所聚也是都豬二字相通蓋都水之職在固隄防障陂澤故取周官稻人以豬蓄水之義以為名也其事關邦土正司空所掌之一端而漢代都水屬水衡太常晉以後别為都水臺及都水監俱各置官僚宋世雖併入工部旋又復置至明始罷其職今取歷代建置本末具載於篇以明都水司職守所自至漢水衡都尉雖以衡官為名而所司乃林苑池籞當如今奉宸苑之職今故别繫諸內務府表內焉漢書百官公卿表少府有考工室東園匠令丞武帝太初元年更考工室為考工臣瓉曰冬官為考工主作器械也後漢書百官志考工令一人六百石主兵器及織綬諸雜工左右丞各一人屬太僕謹案漢之考工令丞及東園匠令丞主作器具雜物蓋如今製造庫之職也周禮鄭康成注比校治道者名若今次金敘大功賈公彥疏漢時主役之官官名次金敘主以丈尺賦功謹案次金敘不見于漢書其職主以丈尺賦功則當如今工部之料估所矣唐六典注後漢將作大匠屬官有前後中甄官令丞謹案後漢百官志無甄官令丞唐六典未知何據然考三國吳志孫堅傳稱堅軍城南甄官井上旦有五色氣堅令人入井探得傳國璽則後漢實有是官蓋如今之琉璃窰監督也三國通典漢民曹主繕修功作魏置左民尚書亦領其職謹案漢民曹尚書魏左民尚書雖主繕修工役之事而其名實為民部所承非工曹沿革今俱繫諸户部表內不列於此宋書百官志魏世有虞曹水部郎册府元龜魏九卿與漢同惟并將作之左校於材官又以水衡都尉主天下水軍舟船器械唐六典後漢有材官校尉魏辨左校于材官署謹案魏晉以後之材官校尉材官將軍其職專掌營繕故取材木之義以為名非若漢書所謂材官騎士也漢書高祖紀巴蜀材官張宴注材官有材力者與此不同又通典稱魏并左校右校入材官而唐六典册府元龜但言并左校是魏世尚有右校令矣通典殆誤衍一右字歟晉馬端臨文獻通考晉始有屯田尚書及太康中謂之田曹後復為屯田晉書百官志晉受命武帝置虞曹屯田起部水部曹郎及江左無屯田郎康穆以後又無虞曹郎但有起部水部曹郎後又省光祿勳統東園匠令唐六典晉將作大匠置功曹主簿五官等員掌土木之役過江後不常置少府屬官有左校無右校其職蓋并于左校又改材官校尉為將軍後復罷左校令又少府領甄官署令掌磚瓦之任又有甄官丞晉書百官志都水使者漢水衡之職也漢有都水長丞屬太常東京省都水置河隄謁者魏因之及武帝省水衡置都水使者一人以河隄謁者為都水官屬及江左省河隄謁者置謁者六人通典晉省水衡置都水臺掌舟航及運部元康中復有水衡都尉元康百官名及晉起居注曰陳慎戴熊都以都水使者領水衡都尉謹案自魏以水衡主舟船器械晉則都水使者兼領之亦主舟航運部正如今工部虞衡都水二司之職與漢制不同故並附著于此宋齊梁陳通典晉宋以來有起部尚書不常置每營宗廟宫室則權置之事畢則省以其事分屬都官左民尚書孫逄吉職官分紀宋高祖始置水部起部曹郎南齊書百官志度支尚書領起部曹都官尚書領水部曹起部尚書興立宗廟權置事畢省唐六典宋齊左民郎中兼知屯田事梁陳並為侍郎隋書百官志梁尚書省置虞曹起部屯田水部等郎陳承梁皆循其制官宋書百官志將作大匠一人丞一人有事則置無則省材官將軍一人司馬一人主工匠土木之事漢左右校令其任也魏右校又置材官校尉主天下材木事晉江左改材官校尉曰材官將軍又罷左校令今材官𨽻尚書起部及領軍南齊書百官志將作大匠不常置掌宫廟土木材官將軍一人司馬一人屬起部亦屬領軍隋書百官志梁天監七年以將作大匠為大匠卿掌土木之工統左右校諸署陳大匠卿品第三册府元龜梁大匠卿班第十又置丞一人班第三又置將作營作又别立長史司馬主簿各一員唐六典宋齊梁陳有左校令丞别置材官將軍司馬右校令丞宋齊梁陳皆無謹案唐六典稱齊宋梁陳無右校杜氏通典亦同而隋書百官志乃謂梁大匠卿統左右校與六典不合疑隋書誤也又案南齊書王敬則傳高帝將受禪材官薦易太極殿柱王延之傳宋明帝即敕材官為起三間齋屋梁書謝朏傳朏到亰師敕材官起府於舊宅良吏沈瑀傳宋明帝使瑀築赤山塘所費減材官所量數十萬是當時興築修濬之役多以屬之材官實兼有今營繕都水二司之職事矣王應麟玉海宋齊有陶官唐六典宋齊有東西陶官瓦署督各一人隋書百官志梁少府置甄官署令丞又細作令作堂金銀局丞木局丞湖西磚屯丞湖東磚屯丞為三品藴位謹案江左諸朝惟梁官制稍備其甄官令本承漢晉之舊而磚屯丞並掌摶埴亦當如今琉璃窰監督至木局丞當如今之木倉監督細作令作堂金銀局丞則當如今之製造庫矣通典宋孝武帝初省都水臺罷都水使者置水衡令孝建元年復置册府元龜齊復置都水臺使者一人梁改都水使者為大舟卿又置丞主簿陳如梁制隋書百官志梁大舟卿主舟航隄渠北魏魏書官氏志太和十五年置司空虞曹官唐六典後魏有起部郎中屯田郎中虞曹郎中水部郎中册府元龜魏將作大匠從第二品後降為第三品其丞第五品後降為從五品下分建都水使者正第四品中水衡都尉從五品中後改都水使者從五品而省水衡又有都水參軍六人謹案魏書李靈傳靈孫道官尚書度支郎遷洛為營搆將又韋閬傳天水薑昭為營搆都將又李彪傳李忠為永寧寺典作副將其名俱不見於史志疑因工作暫置之官正如今之管理工程大臣及監督也又高道悅傳稱洛亰廟庫未搆高祖將水路幸鄴詔都水回營搆之材以造舟楫是魏世都水使者亦主舟航蓋尚沿晉制矣北齊隋書百官志後齊尚書省祠部統虞曹掌地圖山川逺近園囿田獵殽膳雜味等事屯田掌藉田諸州屯田等事起部掌諸興造工匠等事都官統水部掌舟船津梁公私水事郎中並一人虞曹量事置掌故主事員都水臺管諸津橋使者二人參事十人又領都尉合昌坊城等三局尉皆分司諸津橋太府寺統細作左校甄官等署令甄官署又别領石窟丞將作寺掌諸營建大匠一人丞四人亦有功曹主簿録事員若有營作則立將副將長史司馬主簿録事等各一人謹案北齊都水臺但管津橋是歷代所為舟航堤渠之職掌已漸移於水部矣後周太平御覽後周書曰冬官謂之大司空掌邦事以五材九範之法佐皇帝富邦國文獻通考後周有工部中大夫二人承司空之事掌百工之籍而理其禁令通典後周官品正七命大司空正六命小司空上大夫正五命冬官工部匠師司木司土司金司水等中大夫正四命地官虞部下大夫冬官小匠師小司木小司土小司金小司水司玉司皮司色司織司卉等下大夫正三命地官小虞部上士冬官工部小匠師內匠外匠掌材小司木小司土小司金煆工函工小司水典壅小司玉小司皮小司色小司織小司卉等上士正二命地官山虞澤虞林衡川衡等中士冬官工部內匠外匠司量司凖司度掌材車工角工彛工器工弓工箭工盧工復工陶工塗工典草冶工鑄工煆工函工雕工典壅掌津舟工典魚典彘工磬工石工裘工履工鞄工韗工韋工織絲織綵織枲織組竹工籍工罟工紙工等中士正一命地官山虞澤虞林衡川衡等下士冬官工部旅司量司凖司度掌材車工角工彛工器工弓工箭工盧工復工陶工塗工典草冶工鑄工煆工函工雕工典壅掌津舟工典魚典彘工磬工石工裘工履工鞄工韗工韋工膠工毳工繢工漆工油工辨工織絲織綵織枲織組竹工籍工罟工紙工等下士謹案後周仿周禮設官其冬官之屬最為繁冗以今制凖之約略可見者如營繕司本同司空之考而在唐宋為頭司當有匠師工部之職虞衡司本出虞部而今制兼掌鼓鑄兵器造車及作度量權衡之事則又當有煆工函工冶工鑄工車工司量司凖司度之職都水司蓋即司水而兼主船政織造則又當有掌津舟工司織司卉之職屯田司今主匠役則當有內匠外匠之職至司木掌材如木倉監督陶工如琉璃窰監督而今之製造庫所掌工作較多則凡司玉司皮司色雕工韋工膠工毳工繢工之屬皆其職矣隋隋書百官志髙祖受命置尚書省工部尚書統工部屯田侍郎各二人虞部水部侍郎各一人都水臺使者及丞各二人參軍三十人河堤謁者六十人録事二人領掌船局都水尉二人又領諸津上津每尉一人丞二人中津每尉丞各一人下津每典作一人津長四人太府寺統甄官署令二人丞四人將作寺大匠一人丞主簿録事各二人統左右校署令各二人丞左校四人右校三人各有監作左校十二人右校八人開皇三年廢都水臺入司農十三年復置都水臺二十年改將作寺為監以大匠為大監初加置副監煬帝即位尚書六曹各置侍郎一人以二尚書之職諸曹侍郎並改為郎又改工部為起部郎以異六侍郎之名將作監改大監少監為大匠少匠統左右校及甄官署又改大匠為大監少匠為少監又改監少監為令少令都水監改為使者統舟楫河渠二署又改使者為監加置少監又改監少監為令少令通典至隋乃有工部尚書蓋因後周工部之名兼前代起部之職謹案工部自隋代始列六曹而其時營建工作尚多領之少府將作少府如今內務府將作則今營繕司故以巧藝著名如宇文愷劉龍閻毗何稠雲定興等皆嘗官將作監而宇文愷傳又稱其為營宗廟副監營新都副監營東都副監則皆因事特置如今之欽定管理工程大臣非常制也又何稠傳稱髙祖為丞相以稠掌細作署蓋即梁齊之細作令而隋志無其官殆後徑裁併歟欽定歷代職官表卷十四
