body:
  text: 光禄寺國朝官制光禄寺卿滿洲漢人各一人從三品少卿滿洲漢人各一人滿洲漢軍初係四品順治十六年定與漢人俱為正五品掌大内膳羞及祭祀朝㑹燕饗酒醴饔餼之需辨其物品釐其法式以待供饋凡大祀則視刲牲祭之日以卿二人進福酒福胙而頒其膰肉於百執事之人凡蕃國貢使廩於館者則序其等而為之庀具焉所屬有大官珍羞良醖掌醢四署初順治元年置卿滿洲漢人各一人少卿滿洲一人漢人二人寺丞漢人一人康熙三十八年省寺丞員額少卿亦省漢人一人乾隆十三年以來以大臣總理寺事皆由特簡無常員大官署署正滿洲漢人各一人初制四品順治十六年改為六品康熙六年改為五品九年定為從六品署丞滿洲二人初制六品康熙九年定為從七品掌肉脩蔬茹之屬辨其物而共之祭祀燕饗則陳其几席焉初順治元年定四署置署正滿洲漢人各一人署丞各滿洲二人漢人一人又漢人監事各一人十三年省漢人監事員額十五年又省漢人署丞四人珍羞署署正滿洲漢人各一人署丞滿洲二人掌及時獻其禽鱻以薦新於廟祭祀則共兔醢若燕饗之品物各凖其度數以差次之良醖署署正滿洲漢人各一人署丞滿洲二人掌共祭祀燕饗之酒醴設酒庫於西安門内授之灋式而頒其政令焉掌醢署署正滿洲漢人各一人署丞滿洲二人掌共百事之鹽及果實飴蜜醯醬之屬咸以時按式而告備焉典簿㕔典簿滿洲漢人各一人從七品掌章疏文移順治元年又置司牲漢大使一人十五年省司庫滿洲二人庫使滿洲八人掌庫帑出納筆帖式滿洲十有八人順治元年置滿洲筆帖式二十有一人漢軍二人康熙三十八年省漢軍員額復省滿洲筆帖式三人職事具吏部篇厯代建置三代春秋左氏傳少康逃奔有虞為之庖正以除其害杜預註庖正掌膳羞之官孔穎達疏庖正當周禮之庖人謂之為正當是食官之長謹案崔寔政論謂太昊之世設九庖之官是主膳羞者在上古已有其職而虞之庖正為周庖人之權輿三代立制相承有自今故托始於此禮記月令乃命大酋秫稻必齊麴蘖必時湛熾必絜水泉必香陶器必良火齊必得兼用六物大酋監之毋有差貸鄭康成注酒孰曰酋大酋者酒官之長也於周則酒人謹案月令官名多不合周灋故大酋亦不見於周禮盖吕不韋等雜採古書而成疑或是夏殷之制也周禮天官膳夫上士二人中士四人下士八人府二人史四人胥十有二人徒百有二十人掌王之食飲膳羞以養王及后世子凡王之饋食用六穀膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十罋王燕食則奉膳贊祭凡王祭祀賓客食則徹王之胙俎凡王之稍事設薦脯醢王燕飲酒則為獻主掌后及世子之膳羞凡肉脩之頒賜皆掌之凡祭祀之致福者受而膳之鄭康成注膳夫食官之長也鄭司農以詩說之曰仲允膳夫庖人中士四人下士八人府二人史四人賈八人胥四人徒四十人掌共六畜六獸六禽辨其名物凡其死生鱻薧之物以共王之膳與其薦羞之物及后世子之膳羞共祭祀之好羞鄭康成注謂四時所為膳食内饔中士四人下士六人府二人史四人胥十人徒百人掌王及后世子膳羞之割烹煎和之事辨體名肉物辨百品味之物凡宗廟之祭祀掌割亨之事凡燕飲食亦如之鄭康成注内饔所主在内者賈公彦疏以其掌王及后世子及宗廟皆是在内之事外饔中士四人下士八人府二人史四人胥十人徒百人掌外祭祀之割亨共其脯脩刑膴陳其鼎俎實之牲體魚腊凡賓客之飱饔饗食之事亦如之鄭康成注外饔所主任外酒正中士四人下士八人府二人史八人胥八人徒八十人掌酒之政令以式灋授酒材凡為公酒者亦如之辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊辨三酒之物一曰事酒二曰昔酒三曰清酒辨四飲之物一曰清二曰醫三曰醬四曰酏掌其厚薄之齊以共王之四飲三酒之饌及后世子之飲與其酒凡祭祀以灋共五齊三酒以實八尊大祭三貳中祭再貳小祭壹貳皆有酌數唯齊酒不貳皆有器量共賓客之禮酒籩人奄一人女籩十人奚二十人掌四籩之實朝事之籩其實䵄蕡白黑形鹽膴鮑魚鱐饋食之籩其實棗㮚桃乾䕩榛實加籩之實蔆芡㮚脯蔆芡㮚脯羞籩之實糗餌粉餈凡祭祀共其籩薦羞之實為王后及世子共其内羞凡籩事掌之醢人奄一人女醢二十人奚四十人掌四豆之實朝事之豆其實韭菹醓醢昌本麋臡菁菹鹿臡茒菹麇臡饋食之豆其實葵菹蠃醢脾析蠯醢蜃蚳醢豚拍魚醢加豆之實芹菹兔醢深蒲醓醢箈菹雁醢筍菹魚醢羞豆之實酏食糝食凡祭祀共薦羞之豆實為王及后世子共其内羞謹案今之光禄寺於周為太宰之屬唐六典以大官署當周庖人外饔珍羞署當周籩人良醖署當周酒正酒人掌醢署當周醢人盖皆據其職事所承為凖而膳夫為食官之長則當如今之光禄卿矣秦杜佑通典秦大官令丞屬少府冊府元龜秦少府屬官有大官湯官令丞胞人長丞皆主貨食之事謹案古字胞與庖同禮記祭統有煇胞翟閽莊子庚桑楚湯以胞人籠伊尹皆即周官之庖人秦漢少府所屬盖亦沿其制也漢漢書百官公卿表少府屬官有大官湯官令丞又胞人長丞顔師古注大官主膳食湯官主餅餌胞人主掌宰割者也漢書陳湯列傳西至長安求官得大官獻食丞蘇林注主貢獻物漢書平帝本紀元始元年置少府果丞一人顔師古注掌諸果實漢書宣帝本紀本始四年詔令大官損膳省宰顔師古注漢儀注大官令屠者七十二人宰二百人謹案漢大官令以主御膳而考漢書列傳所載如詔賜從官肉大官丞日晏不來東方朔㧞劒割肉大官奏之霍去病從軍上為遣大官賫數十乗貢禹為諫大夫廩食大官鮑宣為諫大夫美食大官李尋待詔黄門食大官衣御府張禹為太傅朝夕進食成帝遣大官致餐事俱見各本傳是燕饗好賜之事亦皆由大官供具今光禄寺承備大小筵宴及一切饋餼廩饌即其例也又栢梁聫句詩大官令所咏為枇杷橘栗桃李梅是果丞未設以前凡果實之供亦掌諸大官令矣又按史記馮唐傳載文帝言居代時尚食監高袪為言趙將李齊之賢漢世諸侯王國其官制多仿漢廷是當時别有尚食監為省中五尚之一五尚者尚冠尚帳尚衣尚席尚食也見應劭漢書注而霍光傳又稱昌邑王詔大官趣上乗輿食如故食監奏未釋服未可御故食復詔大官趣具無闗食監據此則大官令與尚食監為兩職盖大官令如今之光禄寺而尚食監則如今之内膳房也後漢書百官志大官令一人六百石本注曰掌御飲食劉昭注漢官曰員吏六十九人衛士三十八人荀綽晉百官表注曰漢制大官令秩千石丞四人秩四百石不與志同左丞甘丞湯官丞果丞各一人本注曰左丞主飲食甘丞主膳具湯官丞主酒果丞主果劉昭注荀綽曰甘丞掌諸甘肥果丞别在外掌諸果菜茹後漢書殤帝本紀延平元年詔減大官諸珍膳劉昭注大官令周官也秩千石典天子厨膳後漢書桓帝本紀永夀二年十一月置大官右監丞官延熹五年正月省大官右監丞劉昭注漢官儀曰大官右監丞秩比六百石王應麟玉海世祖省湯官令置丞唐六典桓帝時大官置四丞又有左右丞通典桓帝延熹元年使大官令得補二千石劉昭後漢書志注荀綽晉百官表注曰建光中尚書陳忠以為令史質堪上言大官宜著兩梁尚書孟希奏大官職在鼎俎不列陛位不宜許臣伏惟大官令職在典掌王饔統六清之飲列八珍之饌正百品之羞納四方之貢所奉尤重用思又勤明詔慎口實之御防有敗之姦増崇其選以供養言之為最親近以職事言之為最煩多今又高選如堪言合典可施行即聴用之謹案今光禄寺其名本出於漢之光禄勲自唐六典杜佑通典諸書皆以光禄勲載入光禄寺沿革然考光禄勲乃郎中令改名所掌為宿衛宫殿門户及典三署郎故栢梁聫句詩有總領從官之語其職當如今之領侍衛内大臣與光禄寺並不相同自蕭梁除去勲字謂之光禄卿北齊又改稱光禄寺掌諸膳食肴藏於是遂為今光禄所自始名雖相襲而職務固已逈判矣今以秦漢以後大官令繫諸光禄寺表而光禄勲一官則别載入領侍衛内大臣篇庶職掌相符不致循名而爽實焉三國冊府元龜魏光禄置大官令丞裴松之三國志注王朗上主簿張登詔以登為大官令時苖為夀春令遷大官令謹案據册府元龜所載魏初更易卿監屬官大官令始改𨽻光禄後世因専以光禄為典膳之職通典謂魏大官令亦屬少府盖但據漢制以例之未加詳考耳三國呉志孫權傳嘉禾五年禁進獻御減大官膳謹案據此條則呉亦有大官令特史文不詳或仍隸少府或别隸他官今已不可考矣晉晉書職官志光禄勲統大官等令冊府元龜大官令之屬有厨史餳官吏果官監釀吏酒丞等員鄭樵通志大官令有餳官果吏各二人酒丞一人宋齊梁陳宋書百官志大官令一人丞一人隸侍中南齊書百官志大官令一人丞一人屬起部亦屬領軍謹案南齊書髙宗本紀大官進御食有裹蒸又蕭胄傳上欲鑄壊大官元日上夀銀酒鎗是宋齊之世大官主御膳及燕饗之事並如漢制其屬之侍中及領軍者當以其時光禄勲不復居禁中而侍中領軍實掌宿衛故又改隸以便於統轄耳至杜佑以為宋齊大官令俱屬侍中則未考南齊志而致誤也通志齊食官局有酒吏梁曰酒庫丞南史張融傳融攝祠部曹兼掌正厨見宰殺囘車徑去自表解官馬端臨文獻通考齊諸公府有釀食典軍二人隋書百官志梁定九品十八班大官令為一班又大官市署丞正厨丞酒庫丞為三品藴位大官四丞庫丞為三品勲位冊府元龜梁大官丞門下省領之又有市買正厨酒庫等丞陳如梁制謹案張融以祠部曹掌正厨專司宰割蓋如今光禄寺署官監視刲牲之職也至隋志梁有大官市署丞而冊府元龜又作市買丞考宋書有張竒兼市買丞事見顏師伯傳則冊府元龜所載為核隋志署字蓋傳刻之訛耳北魏冊府元龜魏分大官令尚食中尚食掌知御膳尚食門下省領之中尚食集書省領之大官掌知百官饌光禄領之有丞一人謹案北魏分食官為兩職其尚食中尚食則如今之内膳房而大官令别領於光禄専主百官饌正如今光禄寺之職也盖制度變更已開其漸特光禄卿之親典膳食則自齊始著於職掌耳又案魏書官氏志有太宰令為從第五品當亦主飲食之官而史失其詳今並附見於此北齊通典北齊曰光禄寺置卿少卿兼掌諸膳食帳幕冊府元龜北齊光禄寺丞一人從六品下又有功曹五官主簿等又有大官丞一人肴藏令及丞二人又有清漳令丞主造酒隋書百官志北齊光禄寺統大官掌食膳事肴藏掌器物鮭菜等事清漳主酒嵗二萬石春秋中半等署各有令丞謹案兩漢光禄勲至北齊而始為掌膳之職然考其所屬尚有守宫宫門供府華林等署兼司宫殿門戸則是漢制所沿猶未盡革也後周通典後周官品正五命天官主膳中大夫正四命天官小膳部下大夫正三命天官小膳部内膳外膳等上士正二命天官内膳外膳典庖典饎酒正餚藏掌醢司鼎俎等中士正一命天官外膳典庖典饎酒正餚藏掌醢司鼎俎等下士唐六典後周有典庖中士一人肴藏中士一人下士一人酒正中士二人下士四人掌醢中士一人下士十二人内膳有主食十二人隋隋書百官志光禄寺置卿少卿各一人丞三人主簿二人録事三人統大官肴藏良醖掌醢等署各置令大官三人肴藏良醖各二人掌醢一人丞大官八人肴藏掌醢各二人良醢四人大官又有監膳十二人良醖有掌醖五十人掌醢有掌醢十人冊府元龜開皇三年廢光禄入司農十三年復置又加置丞三人煬帝加置少卿二人又有主簿録事並流外為之謹案隋光禄寺始専主肴膳無復掌宫殿門戸之事漢光禄勲職守至此遂盡改其舊今光禄寺規制實猶沿隋所定也唐舊唐書職官志光禄寺卿一人從三品少卿一人從四品丞二人從六品主簿二人從七品掌邦國酒醴膳饈之事總大官珍饈良醖掌醢四署之官屬修其儲備謹其出納少卿為之貳新唐書百官志光禄寺卿凡祭祀省牲鑊濯溉三公攝祭則為終獻朝㑹燕享則節其等差録事二人唐六典龍朔二年光禄寺改司宰寺咸亨初復舊武后光宅元年改司膳寺神龍初復舊孫逢吉職官分紀寺有府十一人史二十一人亭長六人掌固六人新唐書百官志大官署令二人從七品下丞四人從八品下掌供祠宴朝會膳食祭日令白卿詣厨省牲鑊取明水明火帥宰人割牲取毛血實豆遂烹又實簠簋設于饌幕之内珍羞署令一人正八品下丞二人正九品下掌供祭祀朝㑹賓客之庶羞榛栗脯脩魚鹽菱芡之名數良醖署令一人正八品下丞二人正九品下掌供五齊三酒享大廟以供鬱鬯以實六彛進御則供春暴秋清酴釄桑落之酒掌醢署令一人正八品下丞二人正九品下掌供醢醯之物一曰鹿醢二曰兔醢三曰羊醢四曰魚醢宗廟用葅以實豆賓客百官用醢醬以和羮唐六典武后垂拱元年肴藏署改珍羞署神龍元年復舊開元元年仍改珍羞署職官分紀大官署有府四人史八人監膳史十五人供膳二千四百人掌固四人珍羞署有府三人史六人典書八人掌固四人良醖署有府三人史六人監事二人掌醖二十人酒匠十三人奉觶百二十人掌固四人掌醢署有府二人史二人主醢十人醬匠二十三人酢匠十二人豉匠十二人葅醢匠八人掌固八人謹案通鑑李宻降唐後為光禄卿嘗遇大朝㑹宻當進食深以為恥云云是唐之朝㑹以光禄卿進食而六典不載其儀疑或是唐初未定之制也至周官膳夫徒止百二十人漢大官令宰士亦止二百人而唐之共膳乃多至二千四百人供億繁費實為汰侈無藝今制光禄寺承辨筵品凡茶役厨役及各項匠役均計工給直平時並無冗食法度益昭節慎矣五季薛居正舊五代史梁開平元年改御食使為司膳使五代史梁本紀乾化二年光禄卿盧玭使於蜀冊府元龜後唐莊宗同光中光禄諸寺監各只置大卿監其餘官屬並權停謹案梁之司膳使以他官兼之猶今總理寺務大臣也宋宋史職官志光禄寺卿少卿丞主簿各一人卿掌祭祀朝㑹宴饗酒醴膳羞之事修其儲備而謹其出納之政少卿為之貳丞參領之凡祭祀共五齊三酒牲牢鬱鬯及尊彛籩豆簠簋鼎俎鉶登之實前期飭有司辦具牲鑊視滌濯奉牲則告充告備共其明水火焉禮畢進胙於天子而頒於百執事之人分案五置吏十文獻通考宋光禄判寺事以朝官以上充卿少卿丞為寄禄官卿後來為中奉大夫少卿朝議大夫丞宣義郎元豐官制行置卿少卿丞主簿各一人元祐三年詔長貳互置政和六年監察御史王桓等言祭祀牲牢之具掌于光禄而寺官未嘗臨視請大祀以長貳朔祭及中祀以丞簿監視宰割禮畢頒胙有故及小祀聴以其屬攝從之章如愚山堂考索建炎以來光禄併歸禮部玉海紹興二十三年二月丙子復光禄置丞一員謹案宋史及文獻通考並言南渡後廢光禄併入禮部而如玉海所載紹興中已復置矣盖當時但設丞以司其事而卿貳均未備員其職仍隸屬於禮部故史文未之及也宋史職官志大官令掌膳羞割烹之事凡供進膳羞則辨其名物而視食之宜謹其水火之齊祭祀共明水明火割牲取毛血牲體以為鼎俎之實朝會宴享則供其酒膳凡給賜視其品秩而為之等文獻通考大官署宋朝隸御厨以朝官并諸司使副内侍都知押班充元祐初罷大官令二年復置崇寧二年置尚食局大局唯掌祠事宋珍饈署隸御厨有供備庫太平興國二年改為内物料庫有使及副使掌供尚食及内外膳饈米麪飴蜜棗豆百品之料監官二人以三班充外物料庫掌給皇城外諸宮院油鹽米麪之品監官二人以三班内侍充宋良醖署屬御厨有内酒坊使掌造法糯酒常料之三等酒以供邦國之用監官二人監門二人以三班内侍充都麯院掌造麯以給内酒坊之用及出鬻而收其直監官二人以京朝官及諸司使副内侍充法酒庫掌造供御及祠祭凡祭祀共五齊三酒以實尊罍以三班使臣内侍充掌醢署宋屬御厨有油醋庫監官一人以京朝官充掌造油醯胾以供邦國膳饈内外之用謹案宋之勾當御厨司即如今内膳房之職當時光禄四署俱隸屬焉膳卿所掌盖僅存虛名而已今案其職守又互詳内務府表内謹識於此遼遼史百官志南面官崇禄寺本光禄寺太宗諱改王圻續文獻通考崇禄寺官曰崇禄寺卿曰崇禄寺少卿曰崇禄寺丞曰崇禄寺主簿謹案遼史百官志最為闕畧崇禄寺亦未載有屬官今承徳府地方有遼白川州石幢尚存其左方列銜載有麴務都監同監麴務麴院判官諸名皆史志所未及盖本宋之麴院監官即隋唐良醖署之職其金之尚醖署酒坊使當亦沿此制而設者也謹並繫之於表以補史闕焉金金史百官志宣徽院左宣徽使正三品宣徽使正三品同知宣徽院事正四品同簽宣徽院事正五品宣徽判官從六品掌朝㑹燕享及監知御膳尚食局提㸃正五品使從五品副使從六品掌總知御膳進食先嘗兼管從官食直長一員正八品都監三員正九品生料庫都監同監各一員掌給受生料物色收支庫都監同監各一員掌給受金銀裹諸色器皿果子都監同監各一員掌給受進御果子尚醖署令從六品丞從七品掌進御酒醴直長正八品二員酒坊使從八品副使正九品掌醖造御酒及支用諸色酒醴謹案金代不置光禄鴻臚二寺悉總其事於宣徽院而宫掖政務亦兼領焉其職實如今之内務府今故别著於表而取其典司相近者析載於此以備一代之制云元元史百官志光禄寺隸宣徽院秩正三品掌起運米麯諸事領尚飲尚醖局至元十五年罷都提舉置寺設卿一員少卿三員主事一員照磨一員管勾一員二十年改尚醖署正四品二十三年復為光禄寺卿二員少卿丞各一員二十四年増少卿一員二十五年撥隸省部三十一年復隸宣徽延祐七年降從三品後復正三品定置卿四員正三品少卿二員從四品丞二員從五品主事二員從七品令史八人譯史知印各二人通事二人奏差二十四人典吏三人䝉古書冩一人珍羞署至元十三年始立尚珍署後罷入有司二十五年復置掌收濟寧等處田土籽粒以供酒材設達嚕噶齊解見户部三庫篇一員令一員並從五品丞一員正七品吏目一人尚食局掌供御膳及出納油麪酥蜜諸物至元二年置提㸃二十年省併尚葯局為尚食局置提㸃一員從五品大使一員正六品副使一員正七品直長一員正八品尚飲局中統四年置設大使副使各一人俱帶金符掌醖造上用細酒後定置提㸃一員從五品大使一員正六品副使一員正七品良醖署中統四年立御酒庫設金符宣差至元十一年始設提㸃十六年改尚醖局掌醖造諸王百官酒醴提㸃一人從五品大使一人正六品副使一人正七品直長一人正八品謹案元宣徽院亦如今内務府之職光禄寺僅為其所屬之一署雖沿襲舊名其實不盡同古制王惲秋澗集稱當時曽有㫖講究光禄寺職掌疑亦有意改革而未行也明明史職官志光禄寺卿一人從二品少卿一人正五品寺丞一人從六品其屬典簿㕔典簿二人從七品録事一人從八品大官珍羞良醖掌醢四署各署正一人從六品署丞四人從七品監事四人從八品司牲司大使一人從九品副使一人後革司牲局大使一人從九品嘉靖七年革銀庫大使一人卿掌祭享宴勞酒醴膳羞之事率少卿寺丞官屬辨其名數㑹其出入以聴於禮部大官供祭品宫膳節令筵席蕃使宴犒之事珍羞供宫膳肴核之事良醖供酒醴之事掌醢供餳油醢醬梅醬之事司牲視其肥瘠而蠲滌之司牧亦如之鄧球泳化類編洪武乙夘冬十月定光禄官品級先是置宣徽院尋改光禄寺設尚食尚醴二局供需法酒二庫以院使同知院判典簿等掌之至是改寺為司正卿一人從三品少卿二人正五品寺丞六人從六品其屬典簿二人從七品録事一人從八品大官署珍羞署良醖署掌醢署各署正一人俱從六品署丞四人俱從七品副使未入流洪武三十年復為寺建文元年改光禄寺卿為光禄卿少卿寺丞分左右而陞少卿從四品省署丞二人増監事二人永樂初盡復洪武之制謹案周禮膳夫有惟王不㑹之文說經者或以為疑不知當時九式掌於冡宰人主自不得恣其費用所以用皆合式不必以有司之法㑹之並非蕩然無節也三代以後侈汰漸萌如漢世屢詔減大官珍膳而後漢書載大官湯官經用每嵗尚至二萬萬即鄧太后勅止省珍費所裁亦不過數千萬其靡費可以槩見厯代相仍此風未革李燾通鑑長編及江休復雜志載宋嘉祐中御厨日宰二百八十羊日支麪萬斤勾當御厨駕部員外郎李象中等皆以自盜御食得罪編管是侵漁破冐有益以滋甚者明代各省額解光禄寺銀米皆直送本寺不由户部清釐無法又令中官提督寺事每以片紙傳取錢糧寺官即如數供億莫知真偽嘉隆間嵗用逾四十萬厨役多至四千一百餘名明史所載如寺丞胡膏偽增物直為給事中楊允繩所糾提督中官杜泰乾没嵗鉅萬為少卿馬從謙所發奸蠧叢生實為弊藪我朝自康熙初定制錢糧皆歸户部光禄以時支取儲用厯加撙節嵗祗支銀二萬兩月要其數以奏務使品式有定出入有經冗費盡除成規共守信足永昭儉徳矣欽定歴代職官表卷三十
