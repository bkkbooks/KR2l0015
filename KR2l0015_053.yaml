body:
  text: 火器健鋭虎鎗各營表火器健鋭虎鎗各營國朝官制火器營總統六人以王公或領侍衛內大臣都統前鋒統領護軍統領兼任掌教演火器之政令初康熙三十年始置火器營設鳥鎗護軍每人各給鳥鎗一八旗各給子母炮五專司練習火器以王公大臣兼領初無定員雍正年間始定置六人乾隆十年以朝陽門內隆福寺前官房一所為火器營公署三十八年移住一半於廣仁宫後之御河旁别為一營以去城市逺俾得専心訓練焉火器營左右翼翼長各一人正三品八旗掌關防營總每旗各一人正三品委署翼長二人在內鳥鎗護軍參領每旗各一人正三品副鳥鎗護軍參領每旗各二人正四品兼管炮位每旗各一人委署鳥鎗護軍參領每旗各四人又五品頂帶花翎委署鳥鎗參領十人於鳥鎗護軍校內選用仍食原餉鳥鎗護軍校每旗二十八人筆帖式每旗各二人於護軍內選用仍食原餉掌訓練火器較試以時每嵗秋後於蘆溝橋演放子母炮咸率其屬以從事焉其所移住御河旁一營兼在昆明湖教習水戰營總乾隆二十九年置鳥鎗護軍參領初設十六人均以旗員兼任雍正三年省察哈爾八旗護軍參領改入火器營定為專設之缺乾隆二十九年省八人又初制有鳥鎗驍騎參領二十四人鳥鎗驍騎校一百十二人乾隆三十五年省驍騎參領以驍騎校額併入護軍校內即以副護軍參領兼管炮位及委署護軍參領皆如今額又有鳥鎗藍翎長每旗二十八人八旗滿洲蒙古每佐領下鳥鎗護軍六人炮驍騎一人健鋭營總統無定員以王公大臣兼任掌健鋭營之政令督率所屬以時訓練乾隆十四年於八旗前鋒護軍內簡雲梯精卒千人從征金川會其酋讋威請命經略大學士忠勇公傅恆承詔受降功成凱旋因命以其衆特立為健鋭雲梯營於香山實勝寺傍建屋以居之其官屬皆設為定額而以王公大臣兼理營務有缺則請旨特簡焉健鋭營左右翼翼長各一人正三品八旗前鋒參領每旗各一人正三品副前鋒參領每旗各一人正四品委署前鋒參領每旗各二人即於前鋒校內選委前鋒校共五十人正六品副前鋒校共四十人即於前鋒內選用筆帖式四人即於前鋒內選用仍食原餉前鋒軍演習水師教習漢人侍衛十人把總十人掌帥領營卒習雲梯馬步射鳥鎗馳馬躍馬舞鞭舞刀之技每遇巡幸則分其軍十之二以共隨扈之事又於昆明湖置趕繒船八艘以教水戰駕船駛風咸精於其藝焉翼領等官俱乾隆十四年置委署前鋒參領副前鋒校水師教習侍衛俱乾隆十八年增置水師把總由天津及福建水師營選送天津四人福建八人又藍翎長共五十人前鋒千人委署前鋒千人養育兵百人水手七十二人三旗虎鎗營總統一人以公侯領侍衛內大臣簡任三旗總領各二人以內大臣都統前鋒統領護軍統領副都統侍衛簡用虎鎗長每旗各七人虎鎗副長每旗各七人均於虎鎗人內選用筆帖式六人內三人以七品虛銜仍食原餉委署三人無頂帶掌以虎鎗翊從凡遇車駕搜狩虎鎗總統總領日以十人佩虎鎗於前導侍衛前行安營後偵虎豹出入備伏弩箭犁刀行田遇大獸則列鎗從之奉旨殪虎或追蹤或尋山得則具奏以獻將首先刺虎一二人名奏聞初康熙二十三年黑龍江將軍進精騎射善殺虎新滿洲四十人至京分𨽻上三旗始置虎鎗營設官以領之三旗虎鎗人共六百人於侍衛參領親軍校親軍前鋒校前鋒護軍校護軍驍騎校驍騎領催及間散人內選用初制設三百六十人雍正元年增置每旗各八十人內虎鎗人四百八十人學習虎鎗人一百二十人虎鎗總統總領馬褂以黃色鎗長以紅色虎鎗人以白色襟均鑲以青乾隆三年始鑄給關防焉厯代建置謹案荀子稱齊之技擊不可以遇魏之武卒魏之武卒不可以直秦之鋭士自古有國家者於兵制常額之外必有選鋒之軍訓練之衆教養於平時而收其效於一旦以資臂指而壯聲靈所關至巨我朝法制周密軍威宣鬯康熙中特置火器營以練習鎗炮虎鎗營以格殪猛獸政一令專技精藝熟為前代所未有我皇上聖武維揚萬方震疊自嵗己巳始以雲梯勝兵創置健鋭營於香山徑旅如雲無不一當千百復以嵗時親臨簡閲號令嚴明節制有方屹為干城腹心之選嗣是王師撻伐所至蕩平搗穴擒渠多恃是軍之宣勞著績仰見睿謨廣運條畫精詳儲材豫而收效逺實為超軼前代謹以列史所載詳加考核如漢之八校尉唐之神䇿軍宋之四上軍遼之皮室舒新軍雖其勇練皆不足以當今之萬一而特選精卒别設營制其用意尚有略相仿佛者至火器之制自古所無凡史所謂炮者皆以機發石而已元初得西域炮攻金蔡州城始用火然其造法不傳後亦罕用至明成祖平交址得神機鎗炮法因置神機營以肄習之行軍之用火器實權輿於此故求之前代尤無足以相擬惟當時或以善射或以習弩亦為之别置一軍則一技專長未嘗不可援為比附用是取其近似徵托大略著之於篇庶俾列代得失之由藉以考見一二其實國家制度之盡善教訓之有方亘古無倫初非秦漢以降武備弛缺者所得相提而並論也三代李善文選注周有七萃之士萃聚也亦猶傳有七輿大夫聚集有智力者為王之爪牙謹案周制有六軍三軍之名雖未嘗别立一軍如我朝之健鋭營然考六韜練士篇太公曰軍中有大勇力敢死樂傷者聚為一卒名曰冒刃之士有鋭氣壯勇強暴者聚為一卒名曰陷陳之士有竒兵長劍接武齊列者聚為一卒名曰勇鋭之士有披距伸鈎強力多力潰破金鼓絶滅旌旗者聚為一卒名曰勇力之士有踰高絶逺輕卒善走者聚為一卒名曰冦兵之士其曰聚為一卒則七萃之義也蓋萃亦聚也吳子圖國篇云民有膽勇氣力聚為一卒樂以進戰效力以顯其忠勇者聚為一卒能踰高超逺輕足善走者聚為一卒亦與太公六韜同皆沿七萃之制則略如今之健鋭營矣圖國篇又云一軍之中必有虎賁之士力輕扛鼎足輕戎馬搴旗取將必有能者若此之等選而别之愛而貴之是謂軍命亦如今之健鋭營甲于諸營也凡此雖未獨立軍名而義可互證故附識于此穆天子傳天子西遊射於中口命虞人掠林有虎在於葭中天子將至七萃之士髙奔戎生捕虎而獻之天子命為柙畜之東虞是曰虎牢謹案周書世俘第四十武王狩禽虎二十有二貓二麋五千二百三十五犀十有二氂七百二十有一熊百五十有一羆一百一十有八豕三百五十有二貉十有八麈十有六麝五十麋三十鹿三千五百有八當時擒虎之多至二十有二他猛獸無論雖事見逸書未能一一徵信要可與今虎鎗營職掌互證焉酈道元水經注顔師古漢書注皆引七萃之士生捕虎之文王融曲水詩序稱七萃連鑣虞羲詩亦云雲屯七萃士蓋周制於虎賁之外别有此七萃之士其勇力足以捕猛獸正如今之有虎鎗營也惟是虎雖可以力斃而難以生擒伏讀御製叢薄行云叢薄之中聞有虎三子逐逐隨其母鎗斃於菟及一子其子曵尾藏深莾惡獸應弗留餘孽是非所云不探卵叶因命生擒觀壯材羽林徼􅓈皆暴怒兩人搏一何足云一人獨攫誠堪詡其名乃曰見多爾索倫侍衛中英楚手尾挈領安且詳須臾虎兕入柙虜被斑褲白涉鋪張豈似今朝萬目覩喜亦詎為萬目覩適有新歸化布魯天藻煌煌賦事徵實蓋負嵎巨虎非用虎鎗及虎神鎗利器難以就殱惟小虎乃可生捕耳穆天子傳生捕虎之文究屬夸飾無關典要也秦無可考漢漢書百官公卿表中壘校尉掌北軍壘門內外掌西域屯騎校尉掌騎士步兵校尉掌上林苑門屯兵越騎校尉掌越騎長水校尉掌長水宣曲胡騎又有胡騎校尉掌池陽胡騎不常置射聲校尉掌待詔射聲士虎賁校尉掌輕車皆武帝初置有丞司馬漢書刑法志武帝平百粵內增七校外有樓船皆嵗時講肄修武備晉灼注百官表中壘屯騎步兵越騎長水胡騎射聲虎賁凡八校尉胡騎不常置故此言七校程大昌雍録其八屯校尉惟中壘射聲虎賁屯騎當在城中而四屯悉在城外故步兵校尉掌上林苑門之兵越騎校尉掌越人內附之騎長水校尉則掌胡騎之在長水宣曲者也胡騎校尉則掌胡騎之在池陽者也總都城而言所屯則上林在城西南長水宣曲在城東南胡騎在城北渭水之外宣曲固在城東而城西昆明池旁亦有宣曲然而長水校尉所掌必在城東為其與長水相附並也馬端臨文獻通考山齋易氏曰案劉屈氂傳太子使如侯持節發長水及宣曲胡騎皆已裝令侍郎莾通使長安追捕如侯告胡人曰節有詐勿聼也遂斬如侯引騎入長安蓋中壘在北軍而步兵在上林苑門長水兼掌長水及宣曲胡騎則在長水及宣曲皆在長安城外顔師古以長水在今鄠縣東長水鄉是知八校分屯不專在一所雖同名北軍而各以校尉領之不屬中尉之北軍此八校尉所以自列於城門校尉之後而中壘校尉亦别掌北軍壘門內外不屬金吾也蓋金吾秩中二千石而八校尉皆秩二千石其位亦重矣季本禮疑圖案八校尉之置所以分中尉之權也八校尉之軍舊皆三輔畨上為中尉之所專統特以中壘令丞設軍壘别置精兵以備警急耳今中壘升為校尉專掌壘門屯兵不屬中尉蓋八校尉之所掌者取選募之精兵分屯城內但其所領事有時在外如長水池陽之類故其分屯不常專在一所而實則猶存城內北軍之名也惟中壘猶與中尉相關而中尉之所掌已分執金吾之職尚不廢徼循京師與戍中都官之舊耳此武帝慮患防姦之術也但章氏謂武帝既增校尉恐中壘之權太重則明指中壘統七校尉如光武之以北軍中候監五營校尉也殊不知中壘與七校本皆秩二千石不相統屬自足相制烏得云中壘之權太重耶又三輔黃圖謂中壘屯騎虎賁步兵越騎長水胡騎射聲八營宿衛王宫亦非矣蓋此八營即八軍也豈以光武時并為五營校尉皆掌宿衛兵而遂謂八校尉亦同其制歟大抵章氏之説本於補兵志多雜後來改更之制不若易氏考究之精詳也謹案漢制以南軍掌宿衛如今之前鋒護軍營北軍掌徼循京師如今之步軍營與火器健鋭諸營職掌均不相合惟刑法志謂武帝內增七校外有樓船皆嵗時講肄修武備是武帝於北軍之外募增七校以為徑兵專備征伐無宿衛徼循之事其材力超越特出諸軍之上頗近今之火器健鋭諸營考之於史李陵傳漢遣二師代大宛使陵將五校兵隨後案後漢始并八校為五營此云五校蓋用八校之五耳非後漢之五校也霍光傳發材官輕車北軍五校士趙充國傳有詔將八校尉與驍騎都尉金城太守合疏捕山間虜元帝本紀永光二年西羌反以太常任千秋為奮威將軍别將五校並進是當時出兵征討皆藉八校之力可知其勇鋭實甲於諸軍也今核其職掌長水校尉屯長水宣曲胡騎校尉屯池陽與今健鋭營别駐香山者其制正同越騎校尉如淳謂越人歸附以為騎也山堂考索及文獻通考謂募知越人事者為越騎越人習水戰故用之亦與今健鋭營掌練習水師者相合而步兵校尉掌上林苑門屯兵則今健鋭營倣效圓明園護軍營該班值宿之制每日以參領一人前鋒校前鋒十名守衛靜宜園宫門亦其遺意至射聲校尉掌待詔射聲士服虔曰射聲工射者也案服虔釋射聲二字謂冥冥中聞聲則射之於義未安應劭謂詔所命為射故曰侍詔射然則射字屬上讀非射聲也當時以射聲名官義雖難解而如服氏所云涉于荒渺未足為據是獨以一技名官與今火器之設為專營者亦差相仿佛矣漢書宣帝本紀應募佽飛射士注服虔曰周時度江越人在船下負船將覆之佽飛入水殺之漢因以材力名官如淳曰吕氏春秋荆有兹飛得寶劔於干將渡江中流兩蛟繞舟茲飛拔劔赴江刺兩蛟殺之荆王聞之仕以執圭後世以為勇力之官兹佽音相近臣瓚曰本秦左弋官也武帝太初元年改曰佽飛官有一令九丞在上林苑中結矰繳弋鳬雁嵗萬頭以供祀宗廟師古曰取古勇人以名官熊渠之類是也亦因取其便利輕疾若飛故號佽飛謹案佽飛亦漢之精兵有一令九丞以領之别屯上林苑中考漢書載趙充國將兵伐先零宣帝遣其子右曺中郎將卭將期門佽飛為支兵馮奉世為右將軍伐西羌亦將越騎佽飛以往是當時調發多及此兵蓋亦取其驍捷可用正如今之健鋭營也漢書百官公卿表水衡都尉有輯濯令丞注如淳曰輯濯官船也師古曰輯讀與楫同音集濯音直孝反皆所以行船也漢書劉屈氂列傳發輯濯士以豫大鴻臚商邱成顔師古注輯濯主用輯及濯行船者也短曰輯長曰濯漢書枚乘列傳遣羽林黃頭循江而下注蘇林曰羽林黃頭郎習水戰者也師古曰鄧通以棹船為黃頭郎應劭漢官儀髙祖命天下選能引關蹶張材力武猛者以為材官樓船常以秋後講肄各有員數謹案漢初即置樓船士故楊僕嘗為樓船將軍而地理志廬江郡亦有樓船官蓋主以水軍習戰者然此皆郡國所置不必盡在都城惟輯濯令丞所領有輯濯士劉屈氂發之以與衛太子戰而黃頭郎又屬之羽林此則舟師之在長安者正如今健鋭營有演習水師之比矣王應麟玉海漢初軍制弩則有弩將射則有樓煩將長鉟都尉以長鉟為職顔師古曰長鉟長刃兵也為刀而劔形謹案弩將樓煩將長鉟都尉皆各以其技自成一隊亦頗近今之火器營也後漢書百官志屯騎校尉一人司馬一人越騎校尉一人司馬一人步兵校尉一人司馬一人長水校尉一人司馬胡騎司馬各一人射聲校尉一人司馬一人不屬北軍中候後漢書何進列傳是時置西園八校尉以小黃門蹇碩為上軍校尉虎賁中郎將袁紹為中軍校尉屯騎校尉鮑鴻為下軍校尉議郎曺操為典軍校尉趙融為助軍校尉淳于瓊為佐軍校尉又有左右校尉謹案東漢省八校為五校領屬於北軍中候則已同為宿衛之兵與西京之各置别營者有别然考後漢紀傳所載如耿秉副竇憲發北軍五校擊胸奴行車騎將軍鄧鴻將北軍五校士討叛胡劉尚發北軍五營征羌鄧隲將北軍五校擊涼郡叛羌車騎何熙將五校營士擊烏桓羌入河東使北軍中候朱寵將五營士屯孟津屯騎班雄將五營兵屯長安三輔征西馬賢將五校士屯漢陽執金吾張喬以五校士屯三輔竇武張奐何進皆以五營士屯都亭是當時摧鋒陷陳亦仍以五校為勝兵則與西京之制固不甚相逺也至西園八校尉則皆特置之軍雖以宦官統領貽譏史册而推其本意蓋亦仿西京八校而設所以練習武備耳三國三國蜀志秦宓列傳拜左中郎將長水校尉董和列傳胡博厯長水校尉廖立列傳後主襲位徙長水校尉三國蜀志張裔列傳裔以射聲校尉領留府長史三國蜀志向朗列傳後主踐阼為步兵校尉三國蜀志楊洪列傳為越騎校尉三國吳志三嗣主列傳太平二年步兵校尉鄭胄謹案據三國志所載則蜀漢孫吳各有五校略如東漢之制至曹魏雖置有此職然考裴松之注引魏氏春秋稱阮籍聞步兵校尉闕厨多美酒營人善釀酒求為校尉遂縱酒昏酣遺落世事則是魏世五校已為冗職無復兩漢之任至晉而遂從省併宋代雖復置亦僅存虛名故並略而不著云晉晉書職官志二衛始制前驅由基強弩為三部司馬各置督史又置武賁羽林上騎異力四部并命中為五督宋書百官志晉太康十年立射營弩營置積射強弩將軍主之謹案晉之由基司馬異力督蓋特選精鋭者為一部當如今之健鋭營而射營弩營則如今之有火器營也宋齊梁陳謹案自南北朝以後五校尉及積弩積射強弩等將軍皆為虛名以授軍功得官之人並無職掌今不復採列謹識於此北魏未置北齊未置後周未置隋未置唐新唐書兵志至德二載置衙前射生手千人亦曰供奉射生官又曰殿前射生手分左右廂總號曰左右英武軍上元中以北衙軍使衛伯玉為神䇿軍節度使鎮陜州中使魚朝恩為觀軍容使監其軍初哥舒翰破吐蕃臨洮西之磨環川即其地置神䇿軍以盛如璆為軍使及安祿山反如璆以伯玉將兵千人赴難伯玉與朝恩皆屯於陜時邊土陷蹙神䇿故地淪沒即詔伯玉所部兵號神䇿軍以伯玉為節度使與陜州節度使郭英乂皆鎮陜其後伯玉罷以英乂兼神䇿軍節度代宗即位以射生軍入禁中清難皆賜名寶應功臣故射生軍又號寶應軍廣德元年代宗避吐蕃幸陜朝恩舉在陜兵與神䇿軍迎扈悉號神䇿軍天子幸其營及京師平朝恩遂以軍歸禁中自將之然尚未與北軍齒也永泰元年吐蕃復入寇朝恩又以神䇿軍屯苑中自是寖盛分為左右廂勢居北軍右遂為天子禁軍非它軍比德宗即位神䇿兵雖處內而多以禆將將兵征伐往往有功貞元二年改神䇿左右廂為左右神䇿軍特置監句當左右神䇿軍以寵中官而益置大將軍以下又改殿前射生左右廂曰殿前左右射生軍亦置大將軍以下俄改殿前左右射生軍曰左右神威軍置監左右神威軍使左右神威軍皆加將軍二員自肅宗以後北軍增置威武長興等軍名數頗多而廢置不一惟神䇿神威最盛其後京畿之西多以神䇿軍鎮之皆有屯營十四年又詔左右神䇿置統軍以崇親衛如六軍時邊兵衣餉多不贍而戍卒屯防藥茗蔬醬之給最厚諸將務為詭辭請遙𨽻神䇿軍稟賜遂贏舊三倍繇是塞上往往稱神䇿行營皆內統於中人其軍乃至十五萬元和三年廢左右神威軍合為一曰天威軍八年廢天威軍以其兵騎分𨽻左右神䇿軍及僖宗幸蜀田令孜募神䇿新軍為五十四都離為十軍令孜自為左右神䇿十軍兼十二衛觀軍容使以左右神䇿大將軍為左右神䇿諸都指揮使諸都又領以都將亦曰都頭新唐書百官志左右神䇿大將軍各一人正二品統軍各二人正三品將軍各四人從三品掌衛兵及內外八鎮兵護軍中尉各一人中護軍各一人判官各三人都句判官二人句覆官各一人表奏官各一人支計官各一人孔目官各二人驅使官各二人唐會要光啓元年四月以田令孜為左右神䇿十軍使令孜募新軍五十四都每都千人左右神䇿各二十七都分為五軍令孜總之謹案唐以十六衛為南衙乃宿衛之兵又有北衙禁軍皆開元以後所置而神䇿為北衙兵之一其初本以邊兵入衛後遂漸增其額分屯近畿凡征伐四方多用之以取勝唐代京城諸軍神䇿為最故唐書以為勢居北軍右非他軍比者是也唐文粹載李庾西都賦稱親兵百萬制以神䇿紫身豹首金腰火額獵霞張斾剝犀綴革奮目如虎眥振髯而蝟磔柔六鈞貫七札别有陳旌賜鉞閫外四十依榆關而作鎮拒桞營而開壁其形容甚至則是軍之精徑可知當時如劉沔郝廷玉范希朝李晟等本出神䇿軍皆為名將其制蓋頗近今之健鋭營而射生軍則頗近今之虎鎗營特唐代以中官主之浸至尾大不掉驕橫日甚逮昭宗既誅宦者遂廢神䇿以𨽻六軍而唐亦益弱終至滅亡總由其措置失宜無以激士氣而固根本耳五季未置宋玉海宋殿前司有捧日天武左右四廂馬軍司有龍衛左右廂步軍司有神衛左右廂各有都指揮使每軍有都指揮使都虞候每指揮有都副指揮每都有軍使副兵馬使宋史職官志捧日四廂管舊城左廂及殿前司馬軍天武四廂管舊城右廂及殿前司步軍龍衛四廂管新城左廂及馬軍司馬軍神衛四廂管新城右廂及步軍司步軍謂之上四軍各有左右廂廂各三軍禮疑圖宋殿前侍衛兩司即唐禁內六軍之制而捧日天武龍衛神衛之名則又因諸軍之散而收神䇿為殿後四軍之遺也玉海乾德三年詔郡國選兵之驍勇者部送闕下太祖親閲之中選者萬餘人以騎軍為驍雄步軍為雄武並𨽻侍衛親軍謹案宋殿前司以捧日天武為上軍侍衛司以龍衛神衛為上軍通考載建隆元年詔殿前侍衛二司各閲所掌兵練其驍勇升為上軍則上軍皆以簡閲而升與今健鋭營之選前鋒護軍徑卒别置一營者其制頗為相近至驍雄雄武二軍雖由郡國部送而别選驍勇立為軍額亦即四上軍之比故並載於此篇玉海建隆二年幸飛山營閲炮軍開寶九年幸西教埸觀飛山兵按炮咸平五年置廣捷兵五指揮先是帝聞南方以標槍旁牌為兵器命有司製之令內侍蕭延皓取廣德軍教習至是試於便殿悉呈其技頗精練帝以為可用特立為是軍祥符六年詔在京諸軍內選江淮習水卒於金明池試戰棹立為虎翼軍置營於池側七年詔諸州簡兵有善水者以補神衛水軍仁宗即位十有二年幸安肅教場觀飛山雄武發炮紹興未置御前萬弩營乾道五年復置名曰神徑軍葉夢得石林燕語瓊林苑金明池宜春苑玉津園謂之四園瓊林苑乾德中置太平興國中復鑿金明池於苑北導金水河水注之以教神衛虎翼水軍習舟楫因為水嬉宋實録建隆四年四月庚寅內出緍錢募諸軍子弟數千人鑿池於朱明門外令右神武上將軍陳承昭護其役將習水戰也李心傳建炎以來朝野雜記平江許浦水軍本明定州海水軍舊𨽻沿海制置司乾道中改𨽻殿前司以三千人為額五年冬又改為御前水軍八年春併歸許浦淳熙四年冬以七千為額江隂水軍舊自泉州調發乾道三年以其勞費奏留屯二千人於江隂軍而沿海制置司又别屯千人淳熙末增置四千此外左翼軍亦有水軍三千摧鋒軍二千福州延祥寨千人鎮江建康池江鄂州御前諸帥亦各有水軍其後殿司又有澉浦水軍而淮隂靖安唐灣采石諸水軍則皆冠以御前水軍之號謹案宋飛山營專領炮兵正似今之火器營而廣捷軍習標鎗神徑軍習弩各名一藝亦屬相近至虎翼軍領水卒而神衛廂兼有水軍則又近今健鋭營之教習水師矣遼遼史兵衛志皇后述律氏居守之際摘蕃漢精鋭為舒新滿洲語鑿也原作屬珊今改正軍太宗益選天下精甲置諸爪牙為皮室軍合騎五十萬國威壯矣遼史百官志左皮室詳衮司右皮室詳衮司北皮室詳衮司南皮室詳衮司太宗選天下精甲三萬為皮室軍初太祖以行營為宫選諸部豪健千餘人置為腹心部耶律隆科滿洲語銅鍋也原作老古今改正以功為右皮室詳衮司則皮室軍自太祖時已有即腹心部是也太宗增多至三十萬耳舒新軍詳衮司應天皇太后置軍二十萬選蕃漢精兵炮首軍詳衮司掌飛炮之事弩手軍詳衮司掌強弩之事謹案遼代選精甲為皮室舒新二軍亦如今健鋭營之比而炮首弩手二詳衮司則如今之有火器營也金金史兵志舊常選諸軍之材武者為護駕軍海陵又名上京龍翔軍為神勇軍正隆二年將南伐乃罷歸使就僉調後於侍衛親軍四明安內選三十以下千六百人騎兵曰龍翔步兵曰虎步金史百官志威捷軍承安二年簽弩手千人泰和四年以之備邊事鈐轄正六品都轄從九品謹案金之龍翔虎步軍大定間改為拱衛司以謹嚴儀衛已别繫之鑾儀衛篇然其初實於親軍內特選精甲以充之則與今健鋭營之制亦頗有相近者故仍互見於此至威捷軍專司弩手則亦今火器營之比也元元史百官志回回炮手軍匠上萬户府秩正三品至元十一年置炮手總管府十八年始立為都元帥府二十二年改為萬户府後定置達嚕噶齊解見户部篇萬户一員副萬户一員經厯知事提控案牘各一員令史四人譯史一人鎮撫二員千户所三翼達嚕噶齊三員千户三員副千户三員百户三十二員彈壓六員謹案元代樞密院大都督府所領諸衛以備宿衛征討其職掌約略相同並無選擇驍勇别為一營之事惟回回炮手軍匠上萬户府則即所謂西域火然炮法元初嘗以之攻蔡州城者實今火器營所由昉也明明史兵志成祖平交址得神機鎗炮法特置神機營肄習製用生熟赤銅相間其用鐡者建鐡柔為最西鐡次之大小不等大者發用車次及小者用架用椿用托大利於守小利於戰隨宜而用為行軍要器至嘉靖八年從右都御史汪鋐言造佛郎機炮謂之大將軍發諸邊鎮佛郎機者國名也正德末其國舶至廣東白沙巡檢何儒得其制以銅為之長五六尺大者重千餘斤小者百五十斤巨腹長頸腹有修孔以子銃五枚貯藥置腹中發及百餘丈最利水戰駕以蜈蚣船所擊輒糜碎其後大西洋船至復得巨炮曰紅夷長二丈餘重者至三千斤能洞裂石城震數十里天啓中錫以大將軍號遣官祀之明置兵仗軍器二局分造火器凡數十種正德嘉靖間造最多明史職官志神機營設中軍左右哨左右掖選勳臣二人提督之其管哨掖官曰坐營坐司亦率以勳臣為之又設把總把司把牌等官嘉靖二十九年設副參遊佐坐營號頭中軍千把總等官神機營戰兵一營左副將一戰兵二營練勇參將一車兵三營遊擊將軍一車兵四營佐擊將軍一城守五營佐擊將軍一戰兵六營右副將一車兵七營練勇參將一城守八營佐擊將軍一城守九營佐擊將軍一城守十營佐擊將軍一備兵坐營官一大號頭官一謹案明置神機營以肄習鎗炮又置兵仗軍器二局以分司製造而火器之制始備然此即京軍三大營之一明代自諸衛上直軍外戰守武備惟恃三營而中葉以後兵柄主之宦官將領盡出紈袴非但不知訓練甚至買間占役尺籍空虛成化中雖嘗分其等次以一等者為選鋒操練次等者為老家供役而富軍憚營操征調率賄將辨置老家數中貧者雖老疲轉入一等操練而缺伍名額又每為權貴所隱占支糧則有調遣則無是以軍數雖多衰耗實甚非但不可以言精鋭即求其能執兵應操者亦十無一二厯代以來軍政之壞蓋未有如明之甚者矣欽定厯代職官表卷四十七
