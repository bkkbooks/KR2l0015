body:
  text: 辦理厯代職官表諸臣職名正總裁皇六子多羅質郡王臣永瑢皇八子多羅儀郡王臣永璇皇十一子臣永瑆字位過密無法顯示臣阿桂字位過密無法顯示臣英亷經筵日講起居注官太子太保院文淵閣大學士兼吏部臣尚書文淵閣領閣事翰林掌院學士敕習庶吉士嵇璜字位過密無法顯示臣和珅字位過密無法顯示臣福隆安副總裁經筵講官太子少傅東閣大學士兼户部尚書臣梁國治經筵講官戶部侍郎今任戶部尚書兼管順天府府尹臣曹文埴經筵講官吏部侍郎今任禮部尚書臣彭元瑞經筵講官吏部侍郎今任兵部尚書臣王杰户部侍郎今任工部尚書總管內務府大臣臣金簡經筵講官户部侍郎臣董誥字位過密無法顯示臣陸費墀兵部侍郎今任江蘇學政臣沈初續纂文淵閣直閣事兵部侍郎今任都察院左都御史臣紀昀文淵閣直閣事大理寺卿今任光祿寺卿福建學政臣陸錫熊太常寺少卿今任兩廣總督臣孫士毅總校字位過密無法顯示臣陸費墀提調字位過密無法顯示臣德昌文淵閣校理翰林院編修今任京畿道監察御史臣百齡軍機處行走刑部郎中臣范鏊原任軍機處行走工部郎中臣蔣謝庭纂修翰林院庶吉士今任翰林院編修臣馮集梧內閣中書今任宗人府主事臣鮑之鍾內閣中書臣顧宗泰臣沈叔埏臣周有聲進士今任內閣中書臣柴模臣吳樹萱進士今候補內閣中書臣張經田進士今候選知縣臣范澐收掌原任翰林院筆帖式臣約宗武翰林院筆帖式臣兆顯臣赫倫泰臣朝樂
