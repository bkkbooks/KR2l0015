body:
  text: 詹事府國朝官制詹事府詹事滿洲漢人各一人正三品漢人詹事兼翰林院侍讀學士銜少詹事滿洲漢人各一人正四品漢人少詹事兼翰林院侍講學士銜掌經史文章之事凡充日講官纂修書籍典試提學皆與翰林官同凡遇秋審朝審及奉㫖下九卿翰詹科道㑹議之事咸入班預議焉順治元年初設少詹事一人掌府事其年十一月省歸內三院九年置漢人詹事一人少詹事二人以內三院官兼之専設滿洲詹事一人以掌府印十五年復省康熙十四年奉詔復設詹事府置滿洲漢人詹事各一人少詹事各二人三十七年省滿洲少詹事一人乾隆十三年省漢人少詹事一人左春坊左庶子滿洲漢人各一人正五品滿洲庶子以四品冠帶食五品俸右春坊同漢人左庶子兼翰林院侍讀銜左中允滿洲漢人各一人正六品滿洲中允以五品冠帶食六品俸漢人中允兼翰林院編修銜右春坊同左贊善滿洲漢人各一人從六品漢人贊善兼翰林院檢封銜右春坊同右春坊右庶子滿洲漢人各一人漢人右庶子兼翰林院侍讀銜右中允滿洲漢人各一人右贊善滿洲漢人各一人掌記注纂修之事所職與翰林院講讀編檢同國初設左右春坊各庶子一人諭德一人中允二人贊善二人皆漢人員額以內三院官兼攝順治十五年省康熙十四年復置左右春坊官皆滿洲漢人兼設庶子各一人諭德各二人中允贊善各四人三十七年省滿洲右諭德左右中允左右贊善各一人三十八年省漢人右中允右贊善各一人五十二年省漢人右諭德左中允左贊善各一人乾隆十三年省滿洲漢人左諭德各一人司經局洗馬滿洲漢人各一人從五品漢人洗馬兼翰林院修撰銜掌經籍圖書之事初置漢人一人康熙十四年置滿洲漢人各一人又所屬有正字初置滿洲漢人各二人康熙三十七年省滿洲二人三十八年又省漢人一人所存一缺例以應選內閣中書者除授遂為中書兼銜乾隆三十六年亦從部議裁省焉主簿滿洲漢人各一人從七品掌文移案牘員額康熙十四年定又初置有録事滿洲二人漢人三人康熙三十七年以後次第裁省筆帖式滿洲六人康熙十四年初置十人三十八年省四人職事具吏部篇厯代建置謹案詹事之名始於秦漢應劭謂詹者省也給也蓋其職在於供給宫中之事故自太后皇后太子皆有之掌太后宫者曰長信詹事掌皇后太子宫者則曰皇后詹事太子詹事漢景帝始改長信詹事為長信少府成帝又併皇后詹事於大長秋而獨存太子詹事以主太子家事自是遂為宫官之定名厯代每建儲宫即置此職唐宋始以儒臣兼領明則由翰林官升轉其制稍殊而其為東宫官屬則固未嘗有異也我國家萬年垂統睿慮深長家法相承不事建儲册立皇上凖今酌古備覽前代覆轍灼知建儲一事之斷不可行宸諭屢頒著明深切伏讀御製聨句詩注自古書生拘迂之見動以建儲為國本其實皆自為日後身家之計無禆國是誠以立儲之後宵小乘間伺釁釀為亂階其弊有不可勝言者朕於此往復熟籌知之甚審我子孫當敬凛此訓奉為萬年法守典謨垂示昭揭日星實億萬祀所當謹凛遵循詹事府各員特姑留以備詞臣遷轉之階與翰林官無異視厯代之為東宫僚佐者逈不相同今以設官所自雖實殊而名則相沿故仍以厯代宫官建置採托大略具列於左亦俾論古者考見本末咸曉然於前事之當懲益以知聖朝良法昭垂洵足超軼百世也三代禮記燕義古者周天子之官有庶子官庶子官職諸侯卿大夫士之庶子之卒掌其戒令與其教治别其等正其位國有太事則率國子而致于太子惟所用之若有甲兵之事則授之以車甲合其卒伍置其有司以軍法治之司馬弗正凡國之政事國子存游卒使之修德學道春合諸學秋合諸射以考其藝而進退之鄭康成注庶子猶諸子也周禮諸子之官司馬之屬也卒皆讀為倅諸子副代父者也周禮夏官諸子下大夫二人中士四人府二人史二人胥二人徒二十人掌國子之倅國有大事則帥國子而致于太子惟所用之儀禮燕禮獻庶子于阼階上鄭康成注世子之官也謹案大戴禮保傅篇所載三王教世子者有三公三少及道充弼右之名蓋即後世宫銜所自始然皆以重臣兼其任故周禮並無此官今以别著於加銜表內至燕義庶子即周禮諸子之職賈公彥疏所謂諸庶通名俱訓為衆者是也玉海引環濟要略謂庶子主宫中八次八舍并諸吏之適子及支庶版籍是其職亦在於辨論官材並非世子之私屬特以後世庶子官號實本於此故仍繫之此表焉秦杜佑通典秦始置詹事中庶子官鄭樵通志洗馬秦官謹案史記秦有中庶子䝉而扁鵲傳又載虢太子有中庶子鵲當晉昭公時則庶子之為太子官春秋末已有其制秦特沿而不改也漢漢書百官公卿表太子太傅少傅古官屬官有太子門大夫庶子洗馬舍人詹事秦官掌皇后太子家有丞顔師古注皇后太子各置詹事隨其所在名官屬官有太子率更家令丞僕中盾衛率厨廄長丞顔師古注自此以上太子之官也漢書臣瓚注茂陵書詹事秩真二千石家令秩八百石應劭注太子門大夫員五人秩六百石庶子員五人秩六百石中盾主周廬徼道秩四百石衛率主門衛秩千石張晏注洗馬員十六人秩比謁者謹案西漢皇后太子皆有詹事顔師古謂隨其所在以名官而考之史文則多單稱詹事不加分别如宣帝紀本始元年賜詹事畸師古曰宋畸也爵關內侯竇嬰傳孝景即位為詹事韓安國傳壼遂官至詹事鄭當時傳貶秩為詹事韋賢傳進授昭帝詩稍遷詹事孔霸傳宣帝時授皇太子經遷詹事馬宫傳徴為詹事核其時代壼遂鄭當時孔霸馬宫所任自屬太子詹事若景宣二帝初立及昭帝之世俱未有太子宋畸竇嬰韋賢皆當為皇后詹事而史不系以皇后太子字者從省文也至百官表列詹事在大長秋上史記稱壼遂為上大夫則其位當亞于九卿劉敞以百官表不著其秩故作漢官班序圖遂以為無秩惟臣瓚注稱為真二千石荀悅漢紀又以為比二千石說者莫能折衷然考百官表於祿秩之等其例皆總題于後原不分著本條故中尉條後有云自太常至執金吾皆中二千石丞皆千石此為中二千石之總題主爵中尉條後有云自太子太傅至右扶風皆秩二千石丞六百石此為二千石之總題百官表本文甚明詹事自在二千石之列說者不知詳考前後轉致紛紛聚訟耳又兩漢有太子中盾無中允而應劭漢官儀則又稱太子中允據漢書所載哀帝為太子數遣中盾請問近臣顔師古注盾讀曰允是中盾即中允也通典後漢省詹事而太子官悉屬少傅後漢書百官志太子率更令一人千石主庶子舍人更置職似光祿太子庶子四百石無員如三署中郎太子舍人二百石無員更直宿衛如三署郎中太子家令一人千石主倉榖飲食職似司農少府太子倉令一人六百石主倉榖太子食官令一人六百石主飲食太子僕一人千石主車馬職如太僕太子廄長一人四百石主車馬太子門大夫六百石職比郎將舊有左右户將别主左右户直郎建武以來省之太子中庶子六百石員五人職如侍中太子洗馬比六百石員十六人職如謁者太子出則當直者在前導威儀太子中盾一人四百石主周衛徼循太子衛率一人四百石主門衛士右屬太子少傅凡初即位未有太子官屬皆罷惟舍人不省領屬少府謹案後漢始省太子詹事以少傅領東宫官屬而唐六典乃謂成帝已省詹事後漢因之蓋以百官表但言鴻嘉三年省詹事官而不系之於皇后因此致誤然表文明言并屬大長秋長秋為皇后官屬則非太子詹事可知自當以後漢書及通典為據也三國册府元龜蜀後主為太子以譙周為太子家令董允為太子舍人後主立太子璿霍弋為中庶子李撰為庶子三國蜀志張裔傳裔子郁太子中庶子來敏傳先主立太子以為家令譙周傳後主立太子以周為僕轉家令周少子同除東宫官洗馬召不就謹案册府元龜譙周作家令在後主為太子時據三國志則後主立太子始以周為家令冊府元龜蓋以立字訛作為字遂致全爽事實謹附訂於此通志魏復置詹事領東宫衆務唐六典魏置詹事品第三孫逢吉職官分紀魏略張茂上便宜擢太子舍人通志太子庶子在吳為親近之官三國吳志張昭傳昭少子休為太子登僚友從中庶子轉為右弼都尉顧雍傳雍孫談為太子四友從中庶子轉輔正都尉鍾離牧傳拜太子輔義都尉諸葛恪傳侍太子登為賓友從中庶子轉為左輔都尉謹案三國蜀魏所置東宮官太抵皆沿兩漢之舊惟吳志所載有左輔都尉右弼都尉輔正都尉輔義都尉諸官乃吳所創置也晉晉書職官志武帝始建東宫尚未置詹事官事無大小皆由二傅咸寧元年以給事黃門侍郎楊珧為詹事掌宫事及珧為衛將軍省詹事惠帝元康元年復置詹事置丞一人秩千石主簿五官椽功曹史主記門下史録事户曹法曹倉曹賊曹功曹書佐門下亭長門下書佐省事各一人中庶子四人職如侍中中舍人四人咸寧四年置與中庶子共掌文翰職如黃門侍郎在中庶子下洗馬上食官令一人職如太官令庶子四人職比散騎常侍中書監令舍人十六人職比散騎中書等侍郎洗馬八人職如謁者祕書掌圖籍釋奠講經則掌其事出則直者前驅導威儀率更令主宫殿門户及賞罰事職如光祿勳衛尉家令主刑獄貨榖飲食職比司農少府僕主車馬親秩職如太僕宗正在右衛率初曰中衛率泰始五年分為左右各領一軍惠帝時又加前後二率職官分紀晉起居注武帝太康八年詔太子率更僕東宫之達官也其進品第五秩與中庶子左右衛率同職通志主簿一人晉始置厯代皆有掌府事及三寺十率府之隱漏程限稽失者謹案魏晉以後東宫官屬漸備其家令率更僕號為太子三卿不數中庶子太子中舍人洗馬等官者蓋其所司在侍奉左右為太子從官故不以吏事拘之後世家令率更等官既廢而獨置庶子洗馬蓋亦以其為東宫近職而存之也宋齊梁陳宋書百官志太子詹事一人丞一人職比臺尚書令領軍將軍家令一人丞一人職比廷尉司農少府率更令一人職如光録勳衛尉僕一人門大夫二人中庶子四人職如侍中中舍人四人職如黃門侍郎食官令一人職如太官令庶子四人職比散騎常侍中書監令舍人十六人職如散騎中書侍郎洗馬八人職如謁者太子左衛率七人太子右衛率二人太子屯騎校尉太子步兵校尉太子翊軍校尉三校尉各七人太子冗從僕射七人太子旅賁中郎將十人職如虎賁中郎將太子左積弩將軍十人太子右積弩將軍二人馬端臨文獻通考宋元嘉初詔二率中庶子隨太子入直上宫南齊書百官志太子詹事置丞一人太子率更令太子家令置丞太子僕太子門大夫太子中庶子太子中舍人太子洗馬太子舍人太子左右衛率各一太子翊軍步兵屯騎三校尉太子旅賁中郎將一人太子左右積弩將軍太子殿中將軍員外殿中將軍太子倉官令太子常從虎賁督職官分紀齊職儀詹事品第三通志中允後漢太子官屬有之職在中庶子下洗馬上漢制五日一朝其非朝日即使僕及中允朝請問起居其後無聞宋齊有中舍人是其職也謹案晉元康中已置中舍人鄭樵以為始于宋齊者誤也至唐世復改舍人為中允屬之左春坊而仍置中舍人屬之右春坊於是中允舍人遂分為二職矣隋書百官志梁詹事位視中護軍任總宫朝置丞功曹主簿五官家令率更令僕各一人家令率更僕皆置丞左右衛率各一人位視御史中丞各有丞二率各置殿中將軍十人員外將軍十人正員司馬四人又有員外司馬督官其屯騎步兵翊軍三校尉各一人謂之三校旅賁中郎將冗