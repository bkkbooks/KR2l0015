之學朝夕納誨而已問安視膳之外太子絶無所預固無庸别置官僚以供使令而備宿衛也秦漢始為太子置詹事多設僚屬嗣後厯代增加三寺十率員額浸廣而人數既衆賢否龎雜往往預為富貴之地逞其逢迎傾軋簧鼓多端以致貽害無窮禍延宗社故宫僚之設實非國家美事我朝鑒古立制諸皇子皆在尚書房讀書各選翰林官分侍講讀日有程課而擇大臣二三人為總師傅以綜領其事凡詹事坊局之舊稱宫僚者則但以備翰林叙進之階法度周祥實為超軼萬古矣欽定厯代職官表卷二十六
