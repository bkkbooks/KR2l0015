body:
  text: 文武官階表文武官階國朝官制光祿大夫正一品榮祿大夫從一品資政大夫正二品通奉大夫從二品通議大夫正三品中議大夫從三品中憲大夫正四品朝議大夫從四品奉政大夫正五品奉直大夫從五品承德郎正六品儒林郎從六品文林郎正七品徵仕郎從七品修職郎正八品修職佐郎從八品登仕郎正九品登仕佐郎從九品以上文官階若吏員出身者其從六品正七品俱為宣德郎不及九品者為未入流初制一品正從俱光祿大夫後從一品改榮祿大夫凡官階五品以上為誥授六品以下為敇授武官亦如之建威將軍正一品振威將軍從一品武顯將軍正二品武功將軍從二品武義都尉正三品武翼都尉從三品昭武都尉正四品宣武都尉從四品武德騎尉正五品武德佐騎尉從五品武略騎尉正六品武略佐騎尉從六品武信騎尉正七品武信佐騎尉從七品奮武校尉正八品奮武佐校尉從八品修武校尉正九品修武佐校尉從九品以上武官階初提督總兵官或加都督及都督同知僉事等銜其左右都督俱為正一品後裁去加銜定提督為從一品故武階至從一品而止又正一品從一品初俱為榮祿大夫正二品為驃騎將軍從二品為驍騎將軍正三品為昭勇將軍從三品為懷逺將軍正四品為明威將軍從四品為宣武將軍正五品為武德將軍從五品為武略將軍正六品為昭信校尉從六品為忠顯校尉正七品為奮力校尉其旗員武職初有封承德郎文林郎者亦改照漢人之例其旗員之八九品武職仍依舊為修職郎登仕郎後又改從一品為振威大夫正二品為武顯大夫從二品為武功大夫正三品為武義大夫從三品為武翼大夫正四品為昭武大夫從四品為宣武大夫正五品為武德郎從五品為武略郎正六品為武信郎從六品為武信佐郎正七品為奮武郎乾隆五十一年欽奉諭旨武職階級自應與文臣相埒今文職則係正一品起而武職則係從一品起顯然少豫一階且文職自正一品至從九品共十八階武職自從一品至七品止十一階多寡顯有懸殊所有武職人員現在所缺正一品之階應照朕前次欽定領侍衛內大臣將軍為正一品之例增入一階其自正一品以下較文職所少之五階亦應於內外武職衙門微末員辨內按其職守酌定正從照文職一體釐正以昭畫一再舊例武官正從一品俱封榮祿大夫正二品至從五品俱封將軍既未為允當嗣更定新例則皆稱大夫因思將軍為専閫主帥大夫係文臣之稱乃舊例則封將軍而今又更封大夫名義殊覺紊淆嗣後武職正一品至從二品俱應封為將軍正三品至從九品應分别酌與都尉騎尉校尉等字樣遞為差等以示區别著軍機大臣會同大學士吏兵二部詳晰定議具奏遵旨奏準武職自正一品領侍衛內大臣起至從八品止共十六階又自從一品提督起至正七品共十一階較之文職自大學士起至從九品止共十八階似覺參差惟查文職之十八階乃合內外統計始有此數武職合內外統計止有十六階較之文職少正九從九二階應遵旨增設所增官階查八旗有藍翎長太僕寺委署固山逹向無品級今應將藍翎長作為正九品太僕寺固山逹作為從九品又緑營七品以下未經設有官階查有經制外委千總外委把總及額外外委亦向無品級今應將經制外委千總作為正八品經制外委把總作為正九品額外外委作為從九品增入官階內外合計以作十八階之數與文職相埒至封典名號謹遵諭旨一二品俱封為將軍三四品封為都尉五六七品俱封為騎尉八九品俱封為校尉仰見我皇上綜理萬機闡宏六典念文武有兼資之職守斯官階有並重之章程令甲昭埀百代不易仗考官之有階古名散官武散官階唐列四十有五宋列三十有一金列四十有二元列三十有四明列三十然散冗失制如唐制同一從四品而分上下上曰宣威將軍下曰明威將軍又曰歸德中郎將推之五品以下皆然義例不明繁簡寡當金制自從二品以上仍襲文階名號正三品以下乃列將軍校尉副尉之名則文武之資相混淆也元列階至八品而止明列階至六品而止則較文資過為簡略豈如我皇上設官分職陳殷置輔無不甄核名實審挈重輕武階之數既並埒乎文資而千城之寄其稱名亦與文資逈異定階爵節級之顯秩寓酬庸勵武之微權貔虎桓桓有不果敢奮職者歟厯代建置謹案周以九命正邦國之位而國語曰內官不過九御外官不過九品則九品之名其來舊矣曹魏始定九品之制至梁分為十八班而九品不廢北魏以九品分正從隋唐以來因之然品既分正從而正從之中又有上階下階之分與夫升授加授之别或析而四或析而六名稱叢互遷改靡定而等列反因之滋晦散官之號肇見于隋隋開皇之制以居曹有職務者為職事官其無職務者為散官故有特進左右光祿大夫金紫光祿大夫銀青光祿大夫朝議大夫朝散大夫等號並為散官然漢制光祿大夫大夫議郎中郎侍郎郎中皆無員多至數十人而特進奉朝請亦皆無職守優遊祿秩即如成都侯王商以特進領城門兵置幕府得舉吏亦正是加官攝官之例而非以為正職則官之有散自漢已有之魏晉以後或置左右光祿金紫光祿太中中散等大夫並無員以優耆宿北魏又嘗置散官五等其品第五至第九百官有闕則取其中以補之蓋當時之仕于朝者不任以事則置之散官此正如後世宫觀設官之比而亦以儲才需用且得與諸執事官均其勞佚也逮唐因隋制乃雜採以為階秩之目凡入仕者皆帶散位謂之本品又參取前代之散號將軍益以校尉以為武散官其武騎屯騎等尉在隋比曹郎者則一歸之於勛官而散官始定為虛號矣若夫勛號出於周齊交戰之際本以酬戰士其後漸及朝流階爵之外自為節級周置上開府儀同三司等十一號隋有上柱國以下總十一等以賞勛勞其後屢有增改唐永徽以後以國初勛號與散官頗多同名者年月既久漸相錯亂于咸亨五年三月更下詔申明各以類相比所謂武德初光祿大夫比今日上柱國者卒之名目猥多無禆政體相沿至明則柱國以下文武各為勛號而制又一變夫勛自為勛本不與階為附麗故唐時有功者或敘階或賜勛尚能隨事分授以寓夫一時之微權而初無層積坐進之故自宋以降則每遇郊賞若考滿者其酬勛若干級進階若干等即並舉而豫之故明人有言有階特進而勛止柱國者未有左柱國而不帶特進者然則既無相濟之用亦正無取此相混之名矣我國家稽古建官循名責實文官之階定為九品品有正從凡十八等武階自從一品至正七品凡十二等嗣復欽遵諭旨定為十八等文以大夫郎為稱武以將軍都尉騎尉校尉為稱而盡革漢唐以來散號勛號雜號之制洵所謂為法則精而密而施于事則簡而易知者矣兹表文武官階故先撮論其概而以厯代沿革之故條具于後至前代文武階不分分之自唐始故武階之表亦自唐始而隋以上不復贅列云三代禮記王制王者之制爵祿公侯伯子男凡五等諸侯之上大夫卿下大夫上士中士下士凡五等鄭康成注爵秩次也上大夫曰卿孔頴達疏此大都總記三王制度謹案公侯伯子男至中士下士爵也古無爵與階之分爵即階也故諸侯之卿大夫士與諸侯並列為爵秦漢以降爵為酬庸之號而百職事之在列者各循資以進階始與爵分矣故録此以著緣起而表則託始于周焉國語外官不過九品周禮春官大宗伯以九儀之命正邦國之位一命受職鄭康成注始見命為正吏謂列國之士于子男為大夫王之下士亦一命再命受服注鄭司農云為上士康成謂列國之大夫再命于子男為卿王之中士亦再命三命受位注鄭司農云受下大夫之位康成謂此列國之卿王之上士亦三命四命受器注鄭司農云為上大夫康成謂此命公之孤也王之下大夫亦四五命賜則注鄭司農云出為子男康成謂王之下大夫四命出封加一等五命六命賜官注鄭司農云子男入為卿康成謂此王六命之卿七命賜國注王之卿六命出封加一等者八命作牧注鄭司農云一州之牧王之三公亦八命九命作伯注上公有㓛德加命為方伯鄭司農云長諸侯為方伯典命掌諸侯之五儀諸臣之五等之命上公九命為伯侯伯七命子男五命王之三公八命其卿六命其大夫四命及其出封皆加一等公之孤四命其卿三命其大夫再命其士一命侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命謹案王之下士一命于周禮無正文後鄭以序官有上士中士下士之名又典命大夫四命之下空文宜有三命二命一命故云王之下士一命若先鄭以再命為上士則王之中士下士以為同一命可知也九命上公得置孤卿一人周制二王之後稱公春秋有虞公虢公州公均不見有孤惟晉有太傅陽子與太師賈他蓋晉為方伯立孤容與公同然有孤二人僭也王制云小國之卿與下大夫一命與此卿命異者王制多據夏殷故容有不同也秦漢書百官公卿表爵一級曰公士二上造三簮裊四不更五大夫六官大夫七公大夫八公乘九五大夫顔師古注五大夫大夫之尊也十左庶長十一右庶長十二左更十三中更十四右更十五少上造十六大上造十七駟車庶長十八大庶長十九關內侯二十徹侯皆秦制謹案劉劭曰春秋傳有庶長鮑商君為政備其法品為十八級合關內侯列侯凡二十等其制因古義古者天子寄軍政於六鄉啓戰于甘乃召六卿大夫之在軍為將者也周之六鄉亦以居軍在國則以比長閭胥族師黨正州長鄉大夫為稱其在軍則以卒伍司馬將軍為號所以異在國之名也秦依古制其在軍賜爵為等級其師人皆更卒也有功賜爵則在軍吏之例自一爵以上至不更四等皆士也大夫以上至五大夫五等比大夫也九等依九命之義也自左庶長以上至大庶長九卿之義也馬端臨曰秦爵二十等其十八等自大庶長以下又似官也考春秋時秦已有庶長不更之號至孝公以衛鞅為左庶長惠文王以樗里疾為庶長昭襄王以白起王齕為左庶長又商鞅為大良造司馬貞曰即大上造也白起犀首皆為大良造白起樗里疾亦為左右更王陵司馬喜皆為五大夫然則似惟二等之侯為特賜之號而大庶長以下之十八級者皆有位于朝循級遞進而非専在軍吏之列者矣故著此以存一代之制而表則不具云漢章如愚山堂考索漢世公有三等太師太傅太保為上公丞相太尉御史大夫為三公大將軍驃騎車騎將軍為比公卿有三等前後左右將軍為上卿太常至少府皆稱正卿執金吾太子太傳將作少府詹事大長秋水衡都尉京兆馮翊扶風為陪卿大夫有三等二千石為上大夫千石為中大夫六百石為下大夫大夫之下復有士謹案杜佑曰漢以太常光祿勛衛尉太僕廷尉大鴻臚宗正大司農少府謂之九寺大卿其所列本於後漢百官志然漢書公卿表又載有執金吾京兆尹左馮翊右扶風及水衡都尉不在此九卿之數考史載汲黯朱買臣為主爵都尉後為右扶風列於九卿鄭當時至九卿為內史後為京兆尹寧成為中尉後為執金吾徙內史亦稱九卿石建傳稱左內史後為左馮翊減宣為九卿張敞為京兆尹上書言臣前備位列卿王尊為京兆尹御史奏尊不宜備位九卿毋將隆為執金吾詔稱隆位九卿惟水衡都尉則壟遂傳云上以遂年老不任公卿拜為水衡都尉而于定國傳亦云遷水衡都尉超為廷尉似水衡都尉在列卿之中又特為冗散者然公卿表亦列之則名曰九卿實則十四卿也又古者天子諸侯皆名執政大臣曰正卿見徐堅初學記其下為大夫士自周以來始有三公九卿之號漢世九卿無卿字而九卿大率多秦漢官也故存其概於此其後亦不具云杜佑通典漢官秩差次中二千石二千石比二千石比千石八百石比八百石六百石比六百石五百石四百石自四百石至二百石為長吏比四百石三百石比三百石二百石百石自百石以下有斗食佐史之秩為少吏謹案漢官之制定名以祿百石而上差等十六此為後世品秩所自始若丞相太尉司徒司空不在此目蓋漢制三公號稱萬石其秩崇矣又王莽改中二千石曰卿二千石為上大夫比二千石為中大夫千石為下大夫六百石為元士五百石為命士四百石為中士三百石為下士百石秩曰庶士事無足録然與古相準故附著於此通典後漢官秩差次中二千石二千石比二千石千石比千石六百石比六百石四百石比四百石三百石比三百石二百石比二百石百石斗食佐史謹案後漢官秩之次大率多仍舊制惟無八百石比八百石五百石而增比二百石耳三國通典魏官置九品第一品第二品第三品第四品第五品第六品第七品第八品第九品謹案魏官品之制即周之所謂九命漢之所謂祿石皆所以辨髙卑之等級其制始定于魏後世雖互有沿革而卒莫能易而或者謂魏延康元年二月尚書陳羣以天朝選用不盡人才始立九品官人之法是時魏末受禪蓋亦漢法也擇以州郡之賢有識鑒者區别人物第其髙下而通典所載魏官自黃鉞大將軍至諸州郡防門明列品第或當時循陳羣之法謂某品人則可登某品所謂品者逆設以待其人益逺益訛遂為官秩之定論此其説非也夫通典所謂九品者官品也以别官之崇􅋻陳羣所謂九品者人品也以定人之優劣二者皆出于曹魏之初皆名以九品然人品自為人品官品自為官品即劉毅衛瓘論中正九品之敝所云上品無寒門下品無勢族及云計資定品使天下觀望惟以居位為貴人者蓋如後世權貴之人挾勢博科第干薦舉之類而非謂中正者逆設此官之品目以待所品之人也三國吳志三嗣主列傳永安二年三月備九卿官謹案三國鼎峙之際運祚日淺稽古之事宜多未備觀吳至此始備九卿而蜀又不設史官則其官品之濶略可知也晉通典魏置九品晉因之謹案晉書李重列傳重上書曰建樹官司功在簡久階級少則人心定久其事則政化成而能否著然晉官亦為九品其祿秩差次大約亦如漢制而李重以為階級宜少者疑當時人多幸進遷轉紛繁故請為之裁制非晉于九品之外又有所增設也宋齊梁陳隋書百官志職官之制魏晉繼及大抵略同爰及宋齊亦無改作梁武受命之初官班多同宋齊之舊天監初命尚書刪定郎濟陽蔡法度定令為九品秩定帝于品下注一品秩為萬石第二第三為中二千石第四第五為二千石至七年革選徐勉為吏部尚書定為十八班以班多者為貴同班者則以居下者為劣又詔以將軍之名髙卑舛雜命更加釐定於是有司奏置一百二十五號將軍凡十品二十四班亦以班多為貴其制品十取其盈數班二十四以法氣序制簿悉以大號居後以為選法自小遷大也其不登二品應須軍號者凡十四號别為八班以象八風所施甚輕又有一百九號將軍亦為十品二十四班正施于外國選序依此承用轉則進一班黜則退一班班即階也班以優劣為前後謹案梁定班法與品互用其十八班官有清濁自十二班以上並詔授表啓不稱姓從十一班至九班禮數復為一等又流外有七班寒微士人為之從此班者方得進登第一班夫梁承齊後者也品秩之定久矣而蔡法度之所定其所以寓禮數者不附于品而列之以班意自齊而上未有班次則禮數亦附于品梁既立班以為禮文之節即品非所専用而易以為班若謂班専為選事而設則丞相太宰太傅等官為第十八班初不關選法或謂品制不廢班與品疑相須而成然將軍之號二百四十八為班凡五十六班制之多乃如此亦乂何假于品也要之梁制品尚寡故自九而一乃極于丞相班尚繁故自一而十八亦極于丞相班多者品貴品少者班尊二者相為用而貴賤等差於此參見而互明耳隋書百官志陳遵梁制為十八班而官有清濁又有戎號擬官自一品至于九品凡二百三十七諸將起自第六品以下板則無秩其雖除不領兵領兵不滿百人并除此官而為州郡縣者皆依本條減秩石二千石減為千石千石降為六百石自四百石降而無秩其州郡縣自各以本秩論凡板將軍皆降除一品諸依此減降品秩謹案陳制相國丞相等官品為第一其秩萬石中二千石有差自此以下明列為九其秩自中二千石至二百石有差亦為十八班其官惟論清濁從濁得官微清則勝于轉大抵並遵梁制也北魏魏書官氏志皇始元年始建曹省備置百官天興元年十一月詔吏部郎鄧淵典官制立爵品太和中髙祖詔羣寮議定百官著于令二十三年髙祖復次職令世宗初頒行之以為永制前世職次皆無從品魏氏始置之亦一代之别制也謹案魏氏之初法制簡略設官分職罕依故實既列九品又有從品而每品又有上中下三等之差蓋一品之間析而為六此太和十八年之制也至二十三年髙祖復次職令三師二太乃不入品其四品以下每品及從品又各分為上下階則一品之中猶析而四誠一代之别制矣北齊隋書百官志後齊制官多循後魏謹案齊遵魏制九品各有從其三師三大亦入第一品則猶是魏太和之初制也又有流內比視官十三等自視從第三品起至視從第九品止惟此與魏異耳後周隋書百官志周太祖命尚書盧辨逺師周之建職其所制班序三公九卿三孤八命六卿七命上大夫六命中大夫五命下大夫四命上士三命中士再命下士一命諸公九命諸侯八命諸伯七命諸子六命諸男五命諸公之孤卿四命侯之孤卿公之大夫三命子男之孤卿侯伯之大夫公之上士再命子男之大夫公之中士侯伯之上士一命公之下士侯伯之中