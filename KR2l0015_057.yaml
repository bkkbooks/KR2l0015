body:
  text: 學政表學政國朝官制提督學政順天山東山西河南江蘇安徽江西福建浙江湖北湖南四川廣東廣西雲南貴州各一人陜西甘肅一人以侍郎京堂翰林科道部屬等官由進士出身者充各帯原銜品級奉天府一人以奉天府府丞充福建臺灣府一人以臺灣道充掌直省學校生徒考課黜陟之事以歳科二試廵厯所屬府州進諸生而掄文藝程品行升其賢者能者斥其不率教者凡興革事宜皆㑹督撫以行之三年而代國初各省並設督學道帶按察司僉事銜以各部郎中由進士出身者循資擢用康熙二十三年御史張集疏請慎學政之選詔下九卿詹事科道㑹議停論俸補授之例凡順天學政缺以侍讀侍講諭徳洗馬等官簡用江南浙江學政以侍讀侍講諭徳洗馬中允贊善等官簡用其餘各省學道將應陞之五部郎中及参議道知府等官選擇開列請用嗣後不拘省分凡由翰林科道出者即為學院由部屬等官者則為學道雍正四年定制各省督學皆改為學院其以部屬簡任者依出身甲第各加翰林院編修檢討銜各府㕔等儒學教授正七品直𨽻十人山東十人山西十人河南九人江蘇八人安徽八人江西十有三人福建十人浙江十有一人湖北九人湖南九人陜甘十有六人四川十有二人廣東十人廣西十有一人雲南十有五人貴州十有三人各州儒學學正正八品直𨽻二十有二人山東十有一人山西十有六人河南十人江蘇六人安徽九人江西二人福建二人浙江一人湖北七人湖南七人陜甘二十有三人四川十有八人廣東十人廣西十有六人雲南三十人貴州十有四人各㕔縣儒學教諭正八品直𨽻一百十有五人山東九十有一人山西六十有一人河南九十有八人江蘇四十有六人安徽四十有八人江西七十有五人福建五十有八人浙江七十有六人湖北五十有四人湖南五十有七人陜甘六十有四人四川八十有六人廣東七十有三人廣西四十有二人雲南三十有二人貴州三十有三人各府㕔州縣等儒學訓導從八品直𨽻一百四十人山東一百十人山西九十有五人河南一百五人江蘇五十有九人安徽六十有四人江西九十有一人福建七十有二人浙江八十有八人湖北七十人湖南七十有七人陜甘一百三十有四人四川一百二十人廣東九十有四人廣西六十有三人雲南七十有三人貴州六十人各掌其學校生徒訓廸之事凡儒學官除江蘇安徽両省通用外其餘例用本省人惟同府州者避不用初康熙三年裁各府州訓導又大縣裁訓導小縣裁教諭十五年均復設其後縣有析置者則訓導每移置所析縣而裁省之縣亦間存鄉學教諭或訓導焉厯代建置三代禮記王制天子命之教然後為學小學在公宫南之左大學在郊詩小序泮水頌僖公能修泮宫也謹案自契為司徒則教民始有專官周以司徒掌邦教而其制益詳其時鄉大夫受教法于司徒頒之鄉吏使各以教其所治而諸侯之國亦講學行禮以歳貢其太學之秀者天子試之射宫視其賢否以行慶譲之法然則古者長民之官即教民之官而無俟别設其職兹故畧著周時諸侯之學以志縁起而厯代之沿革則自漢以下乃始得而備論之云秦未置漢漢書平帝本紀元始三年立學官郡國曰學縣道邑侯國曰校校學置經師一人鄉曰庠聚曰序庠序置孝經師一人謹案漢循吏傳謂文翁修起學官于成都市中招下縣子弟以為學官弟子至武帝時乃令天下郡國皆立學校官實自文翁始董仲舒傳亦云復興學校之官自仲舒發之然則郡縣學校設官自武帝始矣元始中于校學置經師于庠序置孝經師云經師則統諸經為名云孝經師乃止業一經者葢郡國設太學故置經師一人鄉聚小學故僅置孝經師考𨽻釋載學師宋恩等題名有孝掾與易掾尚書掾詩掾春秋掾並列則孝掾乃孝經掾也其設官差等當為今府州縣學諸職所托始矣漢書韓延夀列傳令文學校官諸生皮弁執俎豆王尊列傳尊師郡文學官顔師古注郡有文學官而尊事之以為師也謹案漢梅福雋不疑蓋寛饒諸葛豐張禹列傳皆云為郡文學而匡衡以太常掌故調補平原文學後漢鄧禹亦云臣少嘗學問可郡文學蓋當時太常以博學名官郡學則以文學名官𨽻釋載劉熊碑隂題名有故郡文學李義亦其證也漢書儒林列傳元帝好儒郡國置五經百石卒史謹案郡國學官有掾有史即五經百石卒史也鄭崇為郡文學史後漢楊倫為郡文學掾皆即其職張納碑隂題名文學主事掾史各一人文學掾二人史一人後漢書言百石皆由長自除不得比于下士然五經百石史各典一經與經師相羽翼視他曹小吏有别文翁選郡縣小吏開敏有材者張叔等十餘人遣詣京師受業博士知學官之中雖小吏可與博士之業然則郡國之五經百石史當近于是漢郡縣學校官吏不詳于史而金石遺文尚可補史志之闕故畧著之後漢書劉寛列傳典厯三郡每行縣輒引學官祭酒及處士諸生執經對講謹案𨽻釋載文翁學生題名碑有文學祭酒此學官祭酒其即文學祭酒歟中部碑又有校官祭酒任延為武威太守造立校官校官即學官則校官祭酒當亦即文學祭酒矣常璩華陽國志文翁立文學精舍永初後太守陳留髙䀢更増造二石室州奪郡文學為州學郡更起文學謹案漢以州統郡州有文學而郡又别設之則今制府各有儒學而附府縣亦有儒學者實昉諸此也三國三國蜀志尹黙列傳先主定益州領牧以為勸學從事譙周列傳丞相亮領益州牧命周為勸學從事大將軍蔣琬領刺史徒為典學從事總州之學者謹案文翁學生題名碑有典學從事蜀設典學從事固漢法也勸學從事當在典學從事之下亦如今學政之下有教授學正等官也三國魏志髙柔列傳太祖撥亂之際並使郡縣立教學之官管輅列傳清河太守華表召為文學掾冀州刺史裴徽辟為文學從事王應麟玉海魏樂祥為河東文學祭酒謹案管輅以文學掾辟為文學從事則文學從事當即勸學從事之類也三國呉志孫瑜列傳領丹陽太守立學官臨饗講肄晉晉書熊逺列傳郡辟為文學掾孟嘉列傳庾亮領江州辟部廬陵從事轉勸學從事宋書禮志晉征西將軍庾亮在武昌開置學官教曰今王道隆盛便處分安學校處所籌量起立講舍参佐大將子弟悉令入學吾家子弟亦令受業四府博學識義通渉文學經綸者建儒林祭酒使班同三署皆妙選邦彦以充此舉近臨川臨賀一郡並求修復學校可下聼之謹案儒林祭酒當即漢之所謂文學祭酒學官祭酒校官祭酒也庾亮欲敦明庠序旋即廢罷其後尚書謝石又請班下州郡普修學校亦未見施行則所謂久廢之典卒難興復者江左之所以不振也宋齊梁陳杜佑通典宋職掌人孝經師謹案宋有孝經師蓋仍襲漢制然不在九品之數而與門亭長等並稱職掌人則其官微矣南齊書豫章王嶷列傳為南蠻校尉荆湘二州刺史于南蠻園東南開館立學置儒林参軍一人文學祭酒一人勸學從事二人王秀之列傳豫章王于荆州立學以秀之領儒林祭酒謹案儒林参軍在文學祭酒之上疑如前代典學從事之比也玉海梁元帝為荆州起州學置儒林参軍勸學從事謹案梁天監四年分遣博士祭酒到州郡立學而官品十八班内有揚南徐州文學從事南兖州文學從事荆河司益廣青五州文學從事北徐北兖梁交南梁五州文學從事越桂寧霍四州文學從事此皆文學之設于州者以漢制凖之則州之文學當如郡之文學其名以從事或亦即勸學從事之類歟北魏魏書髙允列傳請制大郡立博士二人助教四人學生一百人次郡立博士二人助教二人學生八十人中郡立博士一人助教二人學生六十人下郡立博士一人助教一人學生四十人謹案魏天安初詔立鄉學郡置博士二人助教二人其復從髙允所請乃更其制又魏官品從八品有司州文學据諸郡皆設博士助教而于司州仍襲漢文學之名則司州文學當如今京府教授也北齊北齊書儒林列傳齊制諸郡並立學置博士助教隋書房暉逺列傳齊南陽王綽為定州刺史詔為博士後周周書薛慎列傳太祖于行臺省置學取丞郎及府佐徳行明敏者充生以慎為學師以知諸生課業謹案周于行臺省置學其學生以丞郎及府佐充與厯代州郡立學之制不同然亦一時之别制也附著于此隋隋書桞昻列傳隋文帝受禪昻見天下無事請勸學行禮自是天下州縣皆置博士習禮焉謹案隋髙祖仁夀元年廢天下學迨煬帝復開庠序而郡縣之學盛于開皇初其時之為學官者如孔頴逹為河南郡博士潘徽為揚州博士劉焯為冀州博士皆其可紀者也唐唐六典京兆河南太原府經學博士一人從八品上助教二人學生八十人大都督府經學博士一人從八品上助教二人學生六十人中都督府經學博士一人從八品下助教二人學生六十人下都督府經學博士一人從八品下助教一人學生五十人上州經學博士一人從八品下助教二人學生六十人中州經學博士一人正九品上助教一人學生五十人下州經學博士一人正九品下助教一人學生四十人萬年長安河南洛陽奉先太原晉陽博士一人助教一人學生五十人京兆河南太原諸縣諸州上縣博士一人助教一人學生四十人諸州中縣博士一人助教一人學生二十五人諸州中下縣諸州下縣博士一人助教一人學生二十人博士專以經術教授諸生新唐書百官志西都東都北都鳳翔成都河中江陵興元興徳府文學一人從八品上掌以五經授諸生縣則州補州則授于吏部武徳初置經學博士助教學生徳宗即位改博士曰文學元和六年廢中州下州文學京兆等三府助教二人學生八十人大都督上州各助教一人中都督府學生五十人下府下州各四十人謹案漢郡國有文學北魏以下則為博士助教之官唐徳宗改博士曰文學蓋復其舊號故新志與六典所稱各異新唐書百官志大都督府文學一人正八品下中都督府文學一人從八品上下都督府文學一人從八品下上州文學一人從八品下凡縣皆有經學博士助教各一人京縣學生五十人畿縣四十人中縣以下各二十五人謹案唐制凡學生隨府州之上中下為多少而文學官品亦異蓋學生多則訓教廣少則殺焉故文學官亦因之為髙下也新唐書選舉志縣學生州縣長官補長史主焉每歳仲冬州縣館監舉其成者送至尚書省謹案唐州縣學生以長史主之蓋長史為都督刺史之佐實領州縣之事故州縣學生並屬焉其不言諸文學者文學惟司訓教不闗選補也然則唐之府州長史有如明提學副使僉事之比而亦今京府府丞充提督學政之比也五季馬端臨文獻通考後唐天成三年宰臣兼判國子祭酒崔協奏請頒下諸道州府各置官學宋宋史職官志提舉學事司掌一路州縣學政歳廵所部以察師儒之優劣生員之勤惰而專刺舉之事崇寜二年置宣和三年罷謹案自漢武帝時天下郡國皆立學校官嗣後頗相沿襲然多于郡邑設之未嘗于一路統設監司總郡邑諸學也唐李栖筠等之議請于十道大郡置太學館遣博士出外兼領郡官以教生徒與明制各省之設提學副使僉事者意已相近然其議不行宋元符二年初令諸州行三舍法諸路選監司一員提舉學校守貳董幹其事則提舉學事司之所自始矣宋選舉志謂貢士至太學試中上等或預升舍人多其本貫監司太守推賞有差所謂監司即提舉學校官太守即董幹其事者也文獻通考載崇寧五年貢士至辟雝不如令者凡三十有八人皆遣歸而提學官皆罰金蓋當時以貢士優劣定提學賞罰之格如令則賞不如令則罰也選舉志謂諸路選監司提舉學校在元符二年而職官志乃謂崇寧二年置提舉學事司或元符二年始以監司提舉至崇寧二年乃專設提舉學事司歟又考紹興十八年國子監参酌諸州軍如未差教授處即令本路提舉司于本州有出身官選差一員兼領二十一年大理寺主簿丁仲京奏贍學田多為勢家侵佃望令提舉學官覺察既而戸部請令提舉司置籍勾管慶元二年吏部尚書葉翥請令太學及州軍學各以月試合格前三名程文上御史臺考察其有舊習不改則坐學官提學司之罪然則提舉學事司雖罷于宣和三年而其後仍復設之今制于各省設提督學政蓋昉乎此矣王明清揮麈前録政和中詔天下州縣官皆帶提舉管勾學事時姚麟以節度使守蔡州建言乞免繫階朝廷許之靖康初除去紹興中復増但改庶官為主管尋降㫖武臣帥守並免入銜謹案州縣官皆帶提舉管勾學事蓋即所謂守貳董幹其事者也其後諸縣學委知通于令佐内選有出身官一員兼領教導職事若州縣官俱無出身只令本學長諭專主教導却令知州縣令覺察㸃檢此武臣帥守所由俱免以提舉管勾學事繫銜歟宋史職官志教授景祐四年詔藩鎮始立學他州勿聼慶厯四年詔諸路州軍監各令立學學者二百人以上許更置縣學自是州郡無不有學始置教授以經術行義訓導諸生掌其課試之事而糾正不如規者委運司及長史于幕職州縣内薦或本處舉人有徳藝者充熙寧六年詔諸路學官委中書門下選差至是始命于朝廷元豐元年州府學官共五十三員諸路惟大郡有之軍監未盡置元祐元年詔齊廬宿常等州各置教授一員自是列郡各置教官建炎三年教授並罷紹興三年復置四十二州十二年詔無教授官州軍令吏部申尚書省選差二十六年詔並不許兼他職令提舉司常切遵守若試教官則始于元豐添差教授則始于政和謹案宋設教授為今之教授所自始其以本處舉人充亦為今學官皆用本省人所自始宋初有石鼓廬阜嶽麓睢陽四書院又有嵩陽書院茅山書院各有師徒錫之經傳然未建州學乾興元年兖州守臣孫奭私建學舍聚生徒乞請太學助教楊光輔充本州講書從之此為州鎮立學之始其後令州若縣皆立學本道使者選部屬官為教授員不足取于鄉里宿學有道業者神宗初令中書採訪逐路有經術行誼者權教授並選薦京朝官蓋學官選薦之重如此其後又詔諸州學官赴學士院試而後選又有侍從臺諌國子長貳歳舉之制則今制學官由吏部銓選由廵撫考試與舉而兼試之制略同李燾國史長編崇寧二年五月詔廣州漳州各添置教授一員六月詔縣學生不及二十人處許依州學例并附近大縣一處教養給諸州州學印三年六月江東路提舉學事司言諸州皆已置學惟廣徳軍附宣州今學者漸多乞自置學從之仍詔諸路州軍未曽置學處並置學謹案宋元豐初大興學校而天下之教授止五十三員至崇寧中而天下無不置學之州軍今之各府州縣盡設學官昉乎此也若縣學生不及二十人處許附大縣一處教養則正如今之衛學鄉學繫于附近縣學爾玉海大中祥符元年十一月幸曲阜縣謁文宣廟二年二月詔就廟立學舍謹案魏黄初二年令魯郡修孔子廟又于其外廣為室屋以居學者此為就廟立學之始而教職官舍今亦即附至聖廟蓋即以所業之地視其居也又宋慶厯二年詔兩制舉官為武學教授三年置武學于武成王廟以太常丞阮逸為教授慶元五年詔諸州學置武士齋宫按武藝今制學政歳試校士兼及文武生員童生而習武之生童未嘗别立武教職以統之則文武並轄勝于一切紛紛之制矣遼王圻續文獻通考遼南面黄龍府學官曰博士曰助教興中府學設官同縣亦設學有博士助教遼史大公鼎列傳改良鄉令建孔子廟學部民服化謹案遼以兵經畧方内禮文之事視古多闕故畧摭見于傳者以存其概金金史百官志諸府教授一員諸節鎮教授一員諸防禦州教授一員謹案金于大興府及東京北京上京河東東西路山東東西路等處並設女直教授一員其所職當與諸府教授不同附著于此金史選舉志府學大定十六年置凡十七處共千人以嘗與廷試及宗室皇家袒免以上親并得解舉人為之後増州學遂加以五品以上官曽任隨朝六品官之兄弟子孫餘官之兄弟子孫經府薦者同境内舉人試補三之一凡試補學生以提舉學校學官主之謹案宋制學生以州縣官選補長史主之而金則以提舉學校及學官主之蓋既設提舉學校專官同于監司之任自不得僅以州縣選補又别以長史主之也今制學政歳科二試取士此正如所云補試學生以提舉學校官主之者然其試也必由縣府若州試乃與院試則亦兼参宋代州縣選補之法焉元元史百官志儒學提舉司秩從五品各處行省所署之地皆置一司統諸路府州縣學校祭祀教養錢糧之事及考校進呈著述文字每司提舉一員從五品副提舉一員從七品吏目一員司吏二人謹案元于江浙湖廣江西三行省置䝉古提舉學校官提舉一員從五品同提舉一員從七品蓋亦猶金大興府等處之設女直教授也元史選舉志至元二十八年令江南諸路學及各縣學内設立小學選老成之士教之其他先儒過化之地名賢經行之所與好事之家出錢粟贍學者並立為書院凡師儒之命于朝廷者曰教授路府上中州置之命于禮部及行省及宣慰司者曰學正山長學録教諭路州縣及書院置之路設教授學正學録各一員散府上中州設教授一員下州設學正一員縣設教諭一員書院設山長一員凡路府州書院設直學以掌錢糓謹案宋于州縣學官俱設教授至元又増設學正教諭則今制于府設教授州設學正縣設教諭實始諸此第宋元以前州有上中下之分元于下州設學正而上州中州則設教授以進擬于府與今制稍異也陶宗儀輟耕録凡學宫朔望講説所屬上司官或省憲官至自教授學官暨學賓齋諭等皆講説一書錢伯全作訓導時行刑官至講欽哉欽哉惟刑之恤哉講畢稱賞不已謹案漢何武為刺史行部必先即學官見諸生試其誦論問以得失如今制凡學政及各上司官蒞學則學官弟子每講説一書其制實昉乎此且據輟耕録所載則元之學官已有所謂訓導者而元史百官志無其文疎漏甚矣明明史職官志都察院十三道監察御史提督學校兩京各一人萬厯末南京増設一人按察司副使僉事提督學道十三布政司各一員惟湖廣二員謹案明制兩京督學以御史蓋兩京不設按察司故以御史督學兼重其選所以尊京畿則今制各省學政多以京官簡充實本諸此明史職官志儒學府教授一人從九品訓導四人州學正一人訓導三人縣教諭一人訓導二人教授學正教諭掌教誨所屬生員訓導佐之凡生員廪膳増廣府學四十人州學三十人縣學二十人附學生無定數儒學官月課士子之藝業而奬勵之凡學政遵卧碑咸聼于提學憲臣提調府聼于府州聼于州縣聼于縣其殿最視鄉舉之有無多寡明初置儒學提舉司洪武二年詔天下府州縣皆立學十三年改各州學正為未入流先是從九品二十四年定儒學訓導位雜職上三十一年詔天下學官改授旁郡州縣正統元年始設提督學校官又有都司儒學行都司儒學衛儒學以教武臣子弟俱設教授一人訓導二人河東又設都轉運司儒學制如府其後宣慰安撫等土官俱設儒學謹案明制生員入學初由廵按御史布按両司及府州縣官正統元年始特設提學官景㤗元年罷天順六年復設各賜勅諭十六條俾奉行之直省既設提學有所轄太廣及地最僻逺歳行廵所不能及者乃酌其宜口外及各都司衛所土官以屬分廵道員直𨽻廬鳳淮陽滁徐和以屬江北廵按湖廣衡永郴以屬湖南道辰靖以屬辰沅道廣東瓊州以屬海南道甘肅衛所以屬廵按御史亦皆專敕行事萬厯四十一年南直𨽻分上下江湖廣分南北始各増提學一員提學之職專督學校不理刑名所受詞訟重者送按察司輕者發有司直𨽻則轉送廵按御史督撫廵按及布按二司亦不許侵提學職事也又明初優禮師儒教官或擢給事御史然鉗束亦甚謹初教官考滿兼覈其歳貢生員之數後以歳貢為學校常例乃定學官考課法專以科舉為殿最九年任滿核其中式舉人府九人州六人縣三人者為最其教官又考通經即與陞遷舉人少者為平等即考通經亦不遷舉人至少及全無者為殿又考不通經則黜降生員之數初定府學四十人州縣以次减其十未㡬即命増廣不拘額數宣徳中定増廣之額土官子弟許入附近儒學無定額諸生上者中式次者廪生年久充貢或選拔為貢生提舉官歳試校文之外令教官舉諸生行優劣者一二人賞黜之以為勸懲此其大較也然明之提學官既帶按察司銜即不得不少屈于督撫徃徃阿附遷就不能自舉其職而為學官者又多取諸歳貢之士大率闒冗疲老無以為諸生表率以致鼓篋之徒把持上官侵噬百姓聚黨成羣投牒呼譟論者徒歸咎于養士之不精而不原于制法之未善則亦非為通論也我朝右文重道超軼前古各省學政俱以京官簡任我皇上復加意整飭凡學政受事必訓諭諄至期以端士習而正文體至若銓授教職必令督撫親加考騐列等第以别用舍而學政廵厯所至又考其文藝師範黜其不稱職者記曰師道立而善人多又非獨文治光昌而已也欽定厯代職官表卷五十一
