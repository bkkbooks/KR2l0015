body:
  text: 户部三庫表户部三庫國朝官制管理三庫大臣無定員於大臣内簡用掌綜理三庫之政令稽其財用出入之數月有要嵗有㑹皆覈實以聞雍正元年始置特鑄管理三庫銀印以授之銀庫郎中一人員外郎二人司庫一人大使二人皆滿洲員額掌銀貨觧納收支之政令凡直省田賦及闗市鹽茶諸税課咸入焉嵗有常數部覈數無闕廼移庫凖部定權衡受之如啟櫝騐封有作弊及數不實者論初順治元年止設後庫置滿洲郎中四人員外郎二人司庫六人十三年分建三庫置理事官二人以總其事増司庫二人康熈三十五年定制三庫各置郎中一人員外郎一人司庫二人雍正二年三庫各増員外郎一人置大使各一員省銀庫司庫一人乾隆三年増銀庫大使一人凡郎中員外郎闕各部院於所屬諸司遴選賢能者送部引見補用閲三年更選以代司庫大使亦如之叚疋庫郎中一人員外郎二人司庫二人大使一人皆滿洲員額掌幣物觧納收支之政令凡嵗用縑帛紗縠咸入焉由織造官市絲民間織染輸部部移庫受之所需財用皆給公帑具冊逹部以待稽覈有造作不如法者論顔料庫郎中一人員外郎二人司庫二人大使一人皆滿洲員額掌雜物觧納收支之政令凡器用所需百物之良若銅錫鉛鐡丹青赭緑香楮茶蠟之屬咸入焉直省有司各以其土産嵗支正賦市自民間大者疏聞下部小者以冊逹部覈其數移庫受之擇採不精良者論三庫堂主事一人滿洲員額掌三庫文案凡財賄之受蔵於庫及取用於庫者皆書其數嵗終廼執其總會三庫羣吏之籍而㕘考之以待奏銷雍正二年置三庫筆帖式十有五人庫使二十有六人皆滿洲員額分𨽻三庫各佐其長以行遣文書稽考出納筆帖式初置十人順治十二年増置二人康熈二十五年定置二十四人雍正二年省九人庫使初置三十二人雍正二年増顔料庫一人省銀庫六人叚疋庫一人歴代建置三代禮記曲禮六府曰司土司木司水司草司器司貨典司六職鄭康成註此葢殷時制主蔵六物之税周皆屬司徒周禮天官太府下大夫二人上士四人下士八人府四人史八人掌九貢九賦九功之貳以受其貨賄之入頒其貨于受蔵之府頒其賄于受用之府凡官府都鄙之吏及執事者受財用焉嵗終則以貨賄之入出㑹之鄭康成註太府為王治藏之長外府中士二人府一人史二人掌邦布之入出以供百物而待邦之用凡有灋者嵗終則㑹唯王及后之服不㑹鄭康成註外府主泉蔵在外者司書上士二人中士四人府二人史四人掌邦之六典八灋八則九職九正九事邦中之版土地之圖以周知入出百物以叙其財受其幣使入於職幣鄭康成註司書主計㑹之簿書職幣上士二人中士四人府二人史四人掌式灋以歛官府都鄙與凡用邦財者之幣振掌事者之餘財皆辨其物而奠其禄以書楬之以詔上之小用賜予嵗終則㑹其出周禮秋官職金上士二人下士四人府二人史四人掌凡金玉錫石丹青之戒令受其入征者辨其物之􅍇惡與其數量楬而壐之入其金錫于為兵器之府入其玉石丹青于守蔵之府入其要謹案太府乃守蔵之官即今三庫所自出若銀庫當為外府職幣之職顔料庫當為職金之職三庫當主事専主鈎考文案則又近於司書之職也至玉府内府職内諸官掌良貨賄之蔵在内者秦漢少府即其職掌今故析繫諸内務府表内云王應麟玉海魯有府人鄭有府人庫人漢漢書食貨志初大農斡鹽鐡官布多置水衡欲以主鹽鐡及楊可告緡上林財物衆廼今水衡主上林上林既充滿益廣謹案唐六典謂太府之職秦漢分在司農少府顔師古漢書註謂大司農供軍國之用少府以飬天子是此二官者雖皆領財計而職掌有殊至如食貨志所載則水衡上林亦主泉蔵應劭註宣帝本紀稱縣官公作仰給司農少府水衡為天子内蔵其説與師古合然則漢之司農當如今户部三庫而少府水衡則當如今之内務府也但自漢以迄梁陳俱不置太府故府蔵官獨𨽻於少府其司存無可區别今析少府沿革繫之内務府篇而府蔵諸令丞則仍互見於此焉後漢書百官志守宫令一人六百石主尚書財用諸物丞一人漢官曰員吏六十九人中蔵府令一人六百石掌中幣金銀諸貨物丞一人漢官曰員吏十三人吏從官六人屬少府後漢書桓帝本紀建和元年芝草生中黄蔵府章懐太子李賢註漢官儀曰中黄蔵府掌中幣帛金銀諸貨物劉昭後漢書志註古今注曰建初七年七月為大司農置丞一人秩千石别主帑蔵謹案杜佑通典於左右蔵沿革惟載後漢之中蔵府令丞而不及守宫令然考守宫主尚書財用則府庫出納亦其専司也至本紀所載之中黄蔵府疑即百官志之中蔵府觀文選注引曹植令曰皇帝損乗輿之副竭中黄之府云云則當時實有中黄之號其稱中蔵者殆從省文耳又司農丞别主司農帑蔵與少府分治財賦是即顔師古所云大農供軍國之用者葢猶沿前漢之制矣三國唐六典後漢少府屬官有中蔵府令丞魏氏因之蕭統文選左思魏都賦白蔵之蔵富有無隄同振大内控引世資張載註白蔵庫在西城下有屋一百七十四間秋為白蔵因以為名大内京邑都内寳蔵也晋晋書職官志少府統中黄左右蔵等令中黄左右蔵等丞馬端臨文獻通考晋江東置御史掌庫曹後分庫曹曰外左庫内左庫宋齊梁陳宋書百官志宋太祖元嘉中省外左庫而内左庫直云左庫世祖大明中復置廢帝景和元年又省杜佑通典齊曰右蔵謹案自東晋以御史掌庫曹宋沿其制故宋書百官志少府所屬無蔵令丞之職南齊書百官志雖未見明文而侍御史有十人與宋制正同則右蔵庫當亦御史所掌也隋書百官志梁天監七年加置太府卿為夏卿位視宗正掌金帛府帑統左右蔵令上庫丞唐六典梁始置太府班第十三梁陳有右蔵庫無左蔵謹案自梁仿周禮置太府卿於是府庫之闗國用者始改𨽻太府而少府遂為專供服御之官至唐六典謂梁陳有右蔵庫無左蔵而今本隋書百官志所載又作左右蔵與六典不合然考冊府元龜所引史文實止右蔵並無左字疑今本傳刻誤衍左字也隋書百官志陳太府卿中二千石品第三北魏魏書百官志太府卿品第三太府少卿品第四通典後魏太和中又改少府為太府卿兼有少卿掌財物庫蔵王顯謂楊固曰吾作太府卿庫蔵充實北齊隋書百官志太府寺掌金帛府庫統左蔵黄蔵右蔵等署令丞後周冊府元龜後周太府有中大夫掌貢賦貨賄以供國用屬大冡宰唐六典後周有外府上士中士二人掌絹帛絲麻錢物皮角筋骨之蔵隋隋書百官志高祖受命置太府寺統左蔵右蔵黄蔵等署各置令二人黄蔵惟置一人丞四人黄蔵則一人煬帝即位分太府寺為少府監太府但管左右藏等八署改諸令為監謹案隋制以左藏為上署令秩正八品右藏黄藏為中署令秩從八品蓋當時正供財賦悉送左藏故獨優其等秩也至黄藏一署剏於北齊而隋因之其職掌不概見疑亦沿漢中黄藏府之名而省其中字者耳唐唐六典太府寺卿一人從三品龍朔二年改為外府正卿咸亨元年復故光宅元年改為司府寺卿神龍初復舊少卿二人從四品上貞觀中置二人龍朔咸亨光宅神龍並隨寺改復太府卿之職掌邦國貨財之政令舉其綱目修其職務少卿為之貳以二法平物一曰度量二曰權衡金銀之屬謂之寳錢帛之屬謂之貨絹曰匹布曰端綿曰屯絲曰絇麻曰綟金銀曰鋌錢曰貫凡四方之貢賦百官之俸秩謹其出納而為之節制焉諸州庸調及折租等物應送京者並貯左蔵其雜物並貯右藏庸調初至京日録状奏聞每旬一奏納數丞四人從六品下掌判寺事凡左右藏庫帳禁人之有見者若請受輸納人物名數皆著於簿書每月以大摹印紙四張為之簿而以衆官同署月終留一本於署每季錄奏兼申所司主簿二人從七品上掌印省署抄目勾檢稽失太府寺管木契七十隻十隻與左藏東庫合十隻與左藏西庫合十隻與右藏内庫合十隻與右藏外庫合又十隻與東都左藏庫合十隻與東都右藏庫合各九雄一雌九雄太府寺主簿掌一雌庫官掌又五隻與左藏朝堂庫合五隻與東都左藏朝堂庫合各四雄一雌其契以次行用録事二人從九品上掌受事發辰府二十五人史五十人計史四人亭長七人掌固七人左藏署令三人從七品下丞五人從八品下府九人史十八人監事八人從九品下典事十二人掌固八人令掌邦國庫藏之事丞為之貳凡天下賦調先於輸塲簡其合尺度斤兩者卿及御史監閲然後納于庫藏皆題以州縣年月所以别麤良辨新舊也凡出給先勘木契然後録其名數及諸人姓名署印送監門乃聴出若外給者以墨印印之凡藏院之内禁人然火及無故而入者院内常四靣持仗為之防守夜則擊柝分更以廵警焉左藏有東庫西庫朝堂庫又有東都朝堂庫各掌木雌契一與太府主簿合之右藏署令二人正六品上丞三人正九品上府五人史十三人監事四人從九品下典事七人掌固十人令掌邦國寳貨之事丞為之貳雜物州土安西于闐之玉饒道宣永安南邕等州之銀揚廣等州之蘇木象牙永州之零陵香廣府之沈香霍香薫陸雞舌等香京兆之艾納香紫草宣簡潤桞鄂衡等州之石緑辰溪州之硃砂相州之白粉巖州之雌雄黄絳易等州之墨金州之梔子黄蘗西州之高昌􅈨石益州之大小黄白麻紙弓弩弦麻杭婺衢越等州之上細黄状紙均州之大模紙宣衢等州之案紙次紙蒲州之百曰油細薄白紙河南府許衛懷汝澤潞等州之兎皮鄜寧同華虢晋蒲絳汾等州之狸皮越州之竹管涇寧邠龍蓬等州之蠟蒲綘鄭貝等州之氊河南府同鄧許等州之膠蒲同虢等州之席涇丹鄜坊等州之麻京兆岐華等州之木燭凡四方所獻金玉珠貝玩好之物皆藏之出納禁令如左藏之職右藏有内庫外庫東都庫各木雌契一隻與太府主簿合之新唐書列傳唐舊制財賦皆納左藏庫而太府四時以數聞曽肇曲阜集財賦總於地官而太府司其出納謹案今三庫之制凡朝廷經費官司庶物之待給者所司籍其數移部部稽其籍相符乃牒諸三庫主事主事受其牒而書之頒之承用之府覈實而發之每月則執其總以奏焉出入勾稽至為詳慎考陸贄翰苑集奏裴延齡姦蠧書有云總制邦用度支是司出納貨財太府攸職凡事太府出納皆禀度支文符太府依符以奉行度支憑案以勘覆互相闗鍵用絶姦欺其出納之數則每旬申聞其見在之數則每月計奏皆經度支勾覆又有御史監臨旬旬相丞月月相繼據贄所言是唐代度支之於太府與今戸部之於三庫其立法正同三庫即太府寺職掌此尤其明證也至左右藏始自北齊隋唐以後並仍厥制稽其所貯左藏為絲絹布帛之屬如今之縀疋庫右藏為香楮茶蠟之屬如今之顔料庫而獨無銀庫惟於諸州雜物内一見之即通典所載嵗貢之數貢銀者三十一州亦止五百餘兩而已推原其故蓋自秦并天下制幣為二等而銀錫之屬祗為器餙寳藏不為幣見於漢書食貨志其後歴代皆然民間交易惟榖帛與錢無用銀之例唐時租出榖庸出絹調出繒布兩税法行則又令出錢而未嘗以銀充國賦宋代諸州嵗輸緡錢故至今猶相沿謂之錢糧而洪邁容齊三筆載宋府庫毎嵗賦入大數自錢榖以外為絹綢絲布茶蠟並無徴銀之目惟閩廣諸州因其土俗間許以銀易緡錢故左藏庫亦貯有金銀而不為常額蘓轍元祐㑹計録載嵗入銀數止五萬餘兩至金章宗時因錢鈔法弊乃權以銀貨繼復罷錢而専用銀鈔鑄銀名承安寳貨每兩折錢二貫公私同見錢用當時俸給軍須皆銀鈔相兼逮哀宗至大間鈔竟不行民間一以銀交易是為今上下用銀之始然元代貢賦仍徴榖帛成宗本紀所載嵗入銀數不過六萬兩明初惟以銀充坑冶之課其天下田賦亦未用銀民間交易者仍有厲禁自洪武至宣徳實録所紀每嵗入數至多者為銀三十二萬餘兩自英宗正統初從尚書黄福副都御史周銓等之請令南畿浙江江西湖廣福建廣東廣西應輸米麥折銀送京謂之金花銀其後概行於天下諸方賦入悉折銀遂以銀為惟正之供太倉銀庫之名實起於明之中葉一切中外公私咸取給焉葢古今異宜其勢有不得不然者矣胡三省通鑑註宋白曰天寳二年始命張瑄充太府出納使冊府元龜天寳初以侍御史楊慎矜充太府出納使四載又以殿中侍御史楊釗充司農出納錢物使乾元元年度支郎中第五琦充兩京司農太府出納使洪邁容齋隨筆楊國忠拜相前銜有兩京太府出納使司馬光資治通鑑天寳十一載左藏出納判官魏仲犀胡三省注左藏舊有令丞而已出納判官盖帝置也楊國忠方承恩遇領使最多葢兼左藏出納使而以魏仲犀為判官謹案唐之太府左藏既有卿少令丞而又别置使以司其出納今之管理三庫大臣其職制葢本於此新唐書食貨志㑹昌末置備邊庫收度支户部鹽鐡錢物宣宗更號延資庫初以度支郎中判之至是大中四年八月以屬宰相其任益重户部嵗送錢帛二十萬度支鹽鐡送者三十萬諸道進奉助軍錢皆輸焉新唐書百官志宰相則為延資庫使謹案唐以宰相為延資庫使葢亦如今管理三庫之職冊府元龜唐貨財之任多專置使以主之不獨歸於臺閣睿宗景雲二年以蒲州刺史充鹽池使鹽鐡有使自此始也明皇開元二十二年蕭景除太府少卿知度支事二十三年以太府少卿李元祐知度支事天寳七載以給事中楊釗兼御史中丞專判度支肅宗乾元元年以度支郎中第五琦充河南五道度支使兼諸道鹽鐡使胡三省曰度支使始此二年以兵部侍郎同中書門下平帝事充勾當度支使劉晏又充勾當鹽鐡等使代宗廣徳二年第五琦充諸道鹽鐡使専判度支徳宗建中元年罷劉晏為右僕射天下錢榖皆歸金倉兩部委中書門下簡兩司郎官准格式條理時本司職事乆廢無復綱紀徒收其名莫總其任國用出入無所統之是年三月以户部侍郎韓洄判度支五年以中書侍郎同中書門下平章事竇參充鹽鐡度支使八年户部尚書班宏加専判度支諸道鹽鐡使其年七月司農少卿裴延齡加權判度支自後度支與鹽鐡益殊塗而治十三年户部尚書裴延齡判度支又以倉部郎中判度支案蘇弁除度支郎中兼御史中丞副知度支事立位於正郎之首副知之號自弁始見唐㑹要度支自貞元以前他官來判者甚衆自後多以尚書侍郎主之别官兼者稀矣故事度支案郎中判入員外判出侍郎總統押案而已官銜不言専判度支開元以後時事多故遂有他官來判者或尚書侍郎専判乃曰度支使或曰判度支或曰知度支事或曰勾當度支使雖名稱不同其事一也資治通鑑元和六年李絳為户部侍郎判本司胡三省註判本司者判户部職事唐自中世以後户部侍郎或判度支故以判户部為判本司容齋續筆唐自貞觀定制以省臺寺監理天下之務官修其方未之或改明皇時宇文融韋堅楊慎矜王鉷皆以聚歛進然其職不出戸部也楊國忠得志乃以御史大夫判度支權知太府卿及兩京司農太府出納是時猶未立判使之名也肅宗以後兵興費廣第五琦劉晏始以户部侍郎判諸使因以拜相於是鹽鐡有使度支有判元琇班宏裴延齡李巽之徒踵相躡遂浸浸以他官主之權任益重憲宗季年皇甫鎛由判度支程异由衛尉卿鹽鐡使並命為相逮於宣宗率由此塗大用馬植裴休夏候孜以鹽鐡盧商崔元式周墀崔龜從蕭鄴劉瑑以度支魏扶魏謩蔣慎由蔣伸以户部自是計相不可勝書矣謹案唐自中葉以後財賦之柄不歸版曹而别有使以領之曰鹽鐡使曰判度支曰判户部謂之三司其職雖主出納錢物而簿書文案悉由裁遣遂盡分戸部之權致金倉二屬轉為閒員與今三庫大臣専掌收支勾核者情形較有差别然其制皆特遣重臣為之至以宰相兼領大要在於均節出入以供軍國故唐書元和十三年中書門下奏三司錢物至年終各具所入所用數分為兩状以二月聞奏即如今三庫奏銷之例參考沿革葢三庫之職事如太府而其設官則又近於度支户郎諸判使之制其以户部侍郎判本司者則如今之以户部堂官管理三庫也謹詳稽本末並系諸三庫表内至鹽鐡一使専司鹺務則又别詳於鹽政篇焉五季舊五代史職官志梁開平元年四月置建昌院以太祖在藩時四鎮所管兵車賦税諸色課利按舊簿籍而主之其年五月中書門下奏請為建昌宫使三年九月以門下侍郎平章事薛貽矩兼延資庫使判建昌宫乾化二年六月廢建昌宫以河南尹魏王張宗奭為國計使凡天下金榖舊𨽻建昌宫者悉主之至後唐同光四年二月以吏部尚書李琪為國計使自後廢其名額不置資治通鑑長興元年八月以前忠武節度使張延朗行工部尚書充三司使三司使之名自此始舊五代史職官志後唐同光二年正月敕鹽鐡度支户部三司錢物並委租庸使管轄踵梁之舊制也天成元年四月詔廢租庸院依舊為鹽鐡户部度支三司唐朝以來户部度支掌泉貨鹽鐡時置使名户部度支則尚書省本司郎中侍郎判其事天寳中楊慎務王鉷楊國忠繼以聚貨之術媚上受寵然皆守户部度支本官别帶使額亦無所改作下及劉晏第五琦亦如舊制自後亦以宰臣各判一司不置使額乾符後天下兵興隨處置租庸使以主調發兵罷則停梁時乃置租庸使専天下泉貨荘宗中興秉政者不閑典故踵梁朝故事復置租庸使明宗嗣位乃詔削除使名但命重臣一人判其事曰判三司至是延朗自許州入再掌國計白於樞宻使請置三司名宣下中書議其事宰臣以舊制覆奏授延朗特進行工部尚書充諸道鹽鐡轉運等使兼判户部度支事從舊制也明宗不從竟以三司使為名焉謹案唐之三司以大臣分判而後唐置三司使則張延朗一人總之其任為更重矣至建昌宫使國計使專典府藏則猶唐出納使之職也宋玉海宋初沿後唐制併度支鹽鐡户部為三司使太平興國元年始置副使八年分三司各置使淳化四年五月又併為一使十月置二使分領左右計閏十月置總計使判左右計事左右計使分判十道事分天下為十道曰河南河北河東闗西劍南淮南江南東西兩浙廣南在京東為左計京西為右計各置判官領之五年十二月三司復各置使罷十道左右計復歸三部三使各領一司局分相違簿書交錯綱條失序言論盈庭咸平六年復合為一使熈寧七年詔三司置㑹計司以宰臣韓絳提舉元豐五年改官制四月以三司使安燾為户部尚書宋史職官志三司使一人以兩省五品以上及知制誥雜學士學士充總鹽鐡度支户部之事以經天下財賦而均其出入副使以員外郎以上歴三路轉運及六路發運使充判官以朝官以上歴諸路轉運使提㸃刑獄充三部勾院判官各一人以朝官充掌勾稽天下所申三部金榖百物出納帳籍以察其差殊而闗防之都磨勘司判司官一人以朝官充掌覆勾三部帳籍以騐出入之數都主轄支收司判官以判磨勘司官兼掌官物已支未除之數候至所受之處附籍報所由司而對除之天下上供物至京即日奏之納畢取其鈔以還本州都憑由司掌在京官物支破之事凡部支官物皆覆視無虚謬則印署而還之支訖復據數送勾而銷破之富大用事文類聚鄭湜太府寺㕔壁記宋初財賄出納之政顓領於三司謹案宋初邦計獨掌之三司户部太府寺雖存虚名而職事悉入三司諸案故當時三司使副實兼有今户部堂官三庫大臣之任但其所領以貢賦出納為主且屬吏内如磨勘支收諸司皆專掌勾稽考核與今三庫堂主事正同非户度金倉分曹領務者可比今並繫之三庫篇内以見元豐以前府藏職掌之所在焉宋史職官志太府寺舊置判寺事一人同判寺一人凡廪藏貿易四方貢賦百官俸給時皆𨽻三司本寺但掌供祠祭香幣及校造斗升衡尺而已元豐官制行始正職掌置卿少卿各一人丞主簿各二人卿掌邦國財貨之政及庫藏出納之事少卿為之貳丞參領之凡四方貢賦之輸於京師者辨其名物視其多寡别而受之儲於内藏者以待非常之用頒於左藏者以供經常之費凡官吏軍兵俸禄賜予以法式頒之先給歴從有司檢察書其名數鈎覆而後給焉供奉之物則承㫖以進審奏得畫乃聼除之分案九置吏六十有五所𨽻官司有左藏東西庫掌受四方財賦之入以待邦國之經費給官吏軍兵俸禄賜予西京南京北京各置左藏庫元豐庫掌受諸路積剰及常平錢物凡封樁者皆入焉徽宗朝又有崇寧庫大觀庫布庫掌受諸道輸納之布辨其名物以待給用茶庫掌受江浙荆湖建劍茶茗以給翰林諸司及賞賚出鬻雜物庫掌受内外雜輸之物以偹支用建炎以後所𨽻惟左藏東西庫如前制所置左藏南庫以侍從官提領又置提轄檢察官一員玉海宋初止為左藏一庫太平興國二年正月分為絲綿金銀疋帛三庫置合同憑由印淳化三年分置左右藏各二庫右藏受之左藏給之俟右藏既盈即復以給凡六庫迭為受給四年廢右并之於左分為四庫曰錢金銀曰絲綿曰生帛疋帛曰雜色疋帛祥符二年併錢金銀絲綿為一庫七年又併生帛雜色二庫為生熟疋縀庫又以祗候庫宣索之物件併入以京朝官諸司使副三班内侍監庫舊兩庫三人後减四人通掌别以三班二人監門政和六年建新庫以東西庫為名文獻通考紹興二十七年詔户部於轄下丞簿内選一員兼充左藏庫提轄官此提轄官所由始也孝宗即位詔將御前樁管激賞庫撥歸左藏庫以左藏南庫為名専一樁管應副軍期支遣於是有東西南三庫尋罷南庫遼遼史食貨志五京及長春遼西平州置鹽鐡轉運度支錢帛諸司以掌出納其制數差等雖不可悉而大要㪚見舊史遼史百官志五京諸使職名上京鹽鐡使司王棠重熈中為上京鹽鐡使東京戸部使司張孝傑清寧間知户部使事聖宗太平九年見戸部使判官中京度支使司道宗太康三年托卜嘉同知度支使事托卜嘉原作撻不也今改正南京三司使司劉伸重熈中三司副使南靣財賦官諸錢帛司名長春路錢帛司興宗重熙二十二年置大公鼎為長春州錢帛都提㸃遼西路錢帛司平州路錢帛司謹案遼太府監官制無可考見惟三司諸使頗沿唐制食貨志載劉伸為户部使嵗入羡餘錢三十萬繦擢南院樞宻知府藏之積是其専掌今繫之三庫表内至錢帛司雖分置於諸路然皆主財賄出納之官亦如今三庫郎中員外郎之職故並附於表焉金金史百官志太府監正四品少監從五品丞二員從六品掌出納邦國財用錢榖之事左藏庫使從六品副使從七品興定三年増一員掌金銀珠玉寳貨錢幣右藏庫使從六品副使從七品興定三年添一員掌錦帛絲綿毛褐諸道常課諸色雜物謹案金泰和八年嘗省户部官員置三司使副兼勸農鹽鐡度支户部三科有簽三司事同簽三司事判官㕘議規措審計官諸員貞祐中即罷而不設葢一時權宜之制其職掌亦闕而未詳今故附著於此不列諸表元元史百官志都提舉萬億寳源庫掌寳鈔玉器至元二十五年始置都提舉一員正四品提舉一員正五品同提舉一員從五品副提舉一員從六品知事一員從八品提控案牘一員司吏二十三人譯史二人司庫四十六人内以色目二人㕘之都提舉萬億廣源庫掌香藥紙劄諸物設置同上提控案牘二員司吏一十二人譯史一人司庫一十三人都提舉萬億綺源庫掌諸色叚疋設置並同上而副提舉則増一員提控案牘設三員後省二員司吏二十二人譯史一人司庫二十六人内㕘用色目二人都提舉萬億賦源庫掌絲綿布帛諸物設置並同上提控案牘二員其後省一員司吏一十七人譯史一人司庫一十五人内㕘用色目二人四庫照磨兼架閣庫管勾一員從九品世祖至元二十八年以四庫錢帛事繁始置一員仍給印提舉富寧庫至元二十七年始創提舉一員從五品同提舉一員從六品副提舉一員從七品分掌萬億寳源庫出納金銀之事吏目一人其後司吏増至六人譯史一人司庫八人右以上屬户部其萬億四庫國初以太府掌内帑之出納既設左藏等庫而國計之領在戸部仍置萬億等庫為收藏之府中統元年置庫官六員而未有品秩俸給至元十六年始為提舉萬億庫秩正五品二十四年改陞都提舉萬億庫秩正四品二十五年分立四庫以分掌出納至二十七年又别立富寧庫焉富大用事文類聚大元改太府為監置監少監丞掌出納邦國財用錢榖之事元史百官志太府監領左右藏等庫掌錢帛出納之數太卿六員正三品太監六員從三品少監五員從四品丞三員正五品經歴知事照磨各一員令史八人譯史三人通事知印各一人奏差四人中統四年置至元四年為宣徽太府監凡内府藏庫悉𨽻焉八年陞正二品大徳九年改為院秩從二品院判簽用宧者至大四年復為監定置如上右藏提㸃四員大使二員副使二員掌收支金銀寳鈔積蘇原作只孫今改正叚疋水晶瑪瑙玉璞諸物至元十九年置左藏提㸃四員大使二員副使二員掌收支常課和買紗羅布絹絲綿絨錦木綿鋪陳衣服諸物至元十九年置謹案宋元二代内藏庫舉左右藏均𨽻於太府其實左右藏為國家正帑而内藏庫則如漢魏之御府唐之中藏當出於周官玉府内府之職今並析繫内務府篇内云明明史職官志廣積庫大使一人副使一人典史一人贓罸庫大使一人副使二人甲字乙字丙字丁字戊字庫大使五人副使六人廣盈庫大使一人副使二人外承運庫大使二人副使二人承運庫大使一人副使一人行用庫大使副使各一人太倉銀庫大使副使各一人明史食貨志兩京庫藏先後建設其制大畧相同内府凡十庫承運庫貯縀疋金銀寳玉齒角羽毛而金花銀最大廣積庫貯硫黄硝石甲字庫貯布匹顔料乙字庫貯胖襖戰鞋軍士裘㡌丙字庫貯棉花絲纊丁字庫貯銅鐡獸皮蘇木戊字庫貯甲仗贓罸庫貯沒官物廣貯庫貯錢鈔廣盈庫貯紵絲紗羅綾錦紬絹六庫皆屬户部惟乙字庫屬兵部戊字廣積廣盈庫屬工部通謂之内庫英宗時始設太倉庫初嵗賦不徴金銀惟坑冶税有金銀入内承運庫其税賦偶折金銀者俱送南京供武臣禄而各邊有緩急亦取其其中正統元年改折漕糧嵗以百萬為額盡觧内承運庫不復送南京自給武臣禄十餘萬兩外皆為御用所謂金花銀也七年乃設户部太倉庫各直省派剰麥米十庫中綿絲絹布及馬草鹽課關税凡折銀者皆入太倉庫籍沒家財變賣田産追收店錢援例上納者亦皆入焉專以貯銀故又謂之銀庫初太倉中庫積銀八百餘萬兩續收者貯之兩廡以便支發而中庫不動遂以中庫為老庫兩廡為外庫凡甲字諸庫主事偕科道廵視太倉庫員外郎主事領之而以給事中廵視嘉靖中始兩月一報出納之數孫承澤春明夢餘錄太倉銀庫在倉塲總督公署之左中為銀窖老庫明史職官志萬歴二年另撥户部主事一人陪庫每日偕管庫主事收放銀兩季終更替謹案明之内府十庫雖稱𨽻於有司其實皆以中官司其出納盖即如前代之内藏庫而太倉銀庫主之户部則如前代之左右藏庫也但太倉祗貯銀両而縀疋在承運庫顔料在甲字庫仍與右藏之專受縑帛雜物者其制相等本朝順治初祗設後庫十二年分為三庫銀庫在部署内即後庫故地叚疋庫在東華門外即舊裏新庫顔料庫在西安門内即舊甲字庫而承運庫分貯紙張乙字庫分貯布蔴諸物以及供用庫之承造香蠟者並屬焉其餘明代諸庫俱已乆廢不設但規制雖異而職掌相承故仍詳繫於此用明源委云欽定厯代職官表卷七
