  - {type: page-break, offset: 0, content: '', id: KR2l0015_WYG_071-1a, image: WYG0602/WYG0602-0442a.png}
body:
  text: 世爵世職表表之下其不以侯稱者無所附麗則不入表漢魏之關內侯亭侯及縣鄉等侯名為侯而位在子男下則改從附列唯晉以後之縣侯在伯子男上故别著之唐勳官在輕車都尉上者有上柱國柱國上護軍護軍在騎都尉下者有驍騎尉飛騎尉在雲騎尉下者有武騎尉皆今制所無故不著恩騎尉為聖朝特設列古所未著謹缺其沿革而仍繫於表以志令典焉世爵世職國朝定制世爵世職之等有九曰公曰侯曰伯曰子視一品曰男視二品曰輕車都尉視三品曰騎都尉視四品曰雲騎尉視五品曰恩騎尉視七品自公至輕車都尉又各有三等授爵自雲騎尉始雲騎尉襲一次加一雲騎尉則合為騎都尉襲二次再加為騎都尉兼一雲騎尉襲三次再加為三等輕車都尉襲四次二等輕車都尉襲五次一等輕車都尉襲六次一等輕車都尉兼一雲騎尉襲七次三等男襲八次二等男襲九次一等男襲十次一等男兼一雲騎尉襲十一次三等子襲十二次二等子襲十三次一等子襲十四次一等子兼一雲騎尉襲十五次三等伯襲十六次二等伯襲十七次一等伯襲十八次一等伯兼一雲騎尉襲十九次三等侯襲二十次二等侯襲二十一次一等侯襲二十二次一等侯兼一雲騎尉襲二十三次三等公襲二十四次二等公襲二十五次一等公襲二十六次內有因陳亡給與者襲次已完仍授恩騎尉令其世襲公侯伯子男輕車都尉騎都尉雲騎尉恩騎尉之爵以褒敘勳績酬庸懋賞次第其功績之大小而錫以世襲之等國初定世爵自公至拖沙喇哈番共八等凡授爵自拖沙喇哈番始如拖沙喇哈番加一拖沙喇哈番則合為一拜他喇布勒哈番再加則為拜他喇布勒哈番兼一拖沙喇哈番再加為三等阿達哈哈番遞加至一等阿達哈哈番如再加一拖沙喇哈番則為一等阿達哈哈番兼一拖沙喇哈番再加則為三等阿思哈尼哈番積拖沙喇哈番二十有六則為一等公開創功臣䇿勳錫爵與河山共永封爵在順治七年九年恩詔以前者世襲罔替或論功在詔後立功在詔前者亦世襲罔替其給豫敕書注明世次者仍按次承襲自後凡有忠誠宣力懋建軍功膺授功爵者除奉特旨世襲罔替外其餘自拖沙喇哈番襲一次遞加至一等公襲二十六次至一等公以上爵無可加令以適子襲一等公以别子襲其餘爵康熙元年定凡世爵合并至公侯伯者其子弟承襲時照原繫幾人之爵仍與幾人分襲雍正元年定一二三等公各錫以美名如褒績公忠達公等其外戚則做古恩澤侯義命為承恩公乾隆元年總理王大臣奏定精竒尼哈番以下世爵清文並改用漢文精竒尼哈番為一二三等子阿思哈尼哈番為一二三等男阿達哈哈番為一二三等輕車都尉拜他喇布勤哈番為騎都尉拖沙喇哈番為雲騎尉其清文從舊十四年定一二三等侯伯亦各錫以美名如奉義侯敦惠伯等自後膺封爵者凡勳猷殊等皆奉特旨定錫嘉號十五年定自一等公襲二十六次至雲騎尉襲一次均按所開襲次載入誥敕又定陳亡人等子孫襲次已完者賞七品京官令其世襲罔替十六年世襲七品官定為恩騎尉與國初所定共為世爵九等歷代建置謹案公侯伯子男之爵昉於唐虞仍於三代其間惟殷爵三等餘皆五等並分土建國傳之久逺封建一定世次不復差别其外則周有司勳賞地之法蓋如畿內卿大夫世食采邑之比大小各有差等而世次逺近亦無定制也秦去五等制爵二十級以賞戰功以徹侯擬公侯以關內侯擬圻內子男其餘以擬卿大夫士蓋髣佛其意云爾漢仍而用之制爵大者王小者侯侯即秦之徹侯也二十級終漢代不廢復有武功爵之十一級則武帝一時之制也魏别置名號侯以下諸級復置國王公侯伯子男鄉亭關內侯諸列蓋五等之目至是復存晉宋以後有開國爵散爵之分有封郡封縣之别因時殊制以迄於元明行之不改然其言九等十二等者皆以親王郡王及諸爵並列而數之考王爵為寵錫親王之巨典與酬賞功勳之制不同雖漢初功臣亦有分王唐代卿士功高者得以至於郡王要不得以為常制故篇中備採舊史原文而王爵則概不列之於表至輕車都尉以下古所未見唐置勳官始改隋之開府儀同三司為上下輕車都尉儀同三司為騎都尉帥都督為雲騎尉次列於勳官十二轉之中是為酬勳之始而宋以後因之其在古者雖漢有輕車將軍騎都尉之職隋有八尉之目祇可溯其稱名之始而非以為沿革也恩騎尉則我皇上創制殊典以優恤功臣尤為前古勳官所未備焉考自古勳爵判為兩途不相連屬爵有世襲而勳無世襲爵之世襲者並無世次之殊其有功臣受功而兼得他勳者亦不過虛崇美號而已夫爵所以酬勳也勳官亦所以酬勳也何容歧視而别置之且周家五等而下卿大夫士皆謂之爵其次等皆由遞積而上可詳考也惟我聖朝恩施優渥品秩章明授爵自雲騎尉始積二十六等而為一等公其一等侯伯子男輕車都尉之兼一雲騎尉者襲次亦因以遞加勳爵既合為一世襲之逺近一視其功績之大小其陳亡授爵襲次已完者復制恩騎尉以優恤於無窮茂典隆恩均非前代所可企及兹以厯代規制不同之故撮敘大端於此以便考證並以見我朝世爵定制實為超軼於千古焉三代杜佑通典昔黃帝旁行天下分建萬國至於唐虞别為五等曰公侯伯子男則虞書所謂輯五瑞備五玉是其制也夏與唐虞同殷制公侯百里伯七十里子男五十里禮記王制王者之制祿爵公侯伯子男凡五等鄭康成注按元命苞云公者為言平也公平正直侯者候也候王順逆伯之為言白也明白於德也子者奉恩宣德男者任功立業此五等者為虞夏及周制殷則三等公侯伯也公侯田方百里伯七十里子男五十里鄭康成注此地殷所因夏爵三等之制也武王初定天下更立五等之爵增以子男而猶因殷之地周公攝政斥大九州之界公侯大者地方五百里其次侯四百里伯三百里子二百里男百里孔頴達疏案尚書武成云列爵維五分土維三既云列爵維五故知增以子男也謹案鄭注孔疏皆以殷爵三等至周而仍為五等惟杜佑以殷制地三等其爵亦有五等為説少異當以注疏為正秦通典秦制爵二十等以賞功勞二十徹侯十九關內侯十八大世長十七駟車庶長十六大上造十五少上造十四右更十三中更十二左更十一右庶長十左庶長九五大夫八公乘七公大夫六官大夫五大夫四不更三簪裊二上造一公士後漢書百官志劉昭注劉劭爵制曰商君為政備其法品為十八級合關內侯列侯凡二十等關內侯者依古圻內子男之義也秦都山西以關內為王畿故曰關內侯也列侯者依古列國諸侯之義也謹案鄭樵通志曰秦爵二十等最髙徹侯乃得食縣其次關內侯食租稅于關內餘十八等大庶長以下則如吏職馬端臨文獻通考説亦相同大旨悉本之劉劭蓋其時爵與階不分故共為二十等今則徹侯關內侯當屬於爵而十八級當屬于階以其文不可割裂分屬且十八級者本以賞戰功亦今輕車都尉等官所緣起故與文武官階篇並録斯文俾互見焉漢史記漢興以來諸侯年表漢興序二等裴駰集解劉昭曰漢封功臣大者王小者侯也司馬貞索隱應劭曰雖名為王其實如古之諸侯髙祖末年非劉氏而王者若無功上所不置而侯者天下共誅之前漢書百官公卿表爵一級曰公士二上造三簪裊四不更五大夫六官大夫七公大夫八公乘九五大夫十左庶長十一右庶長十二左更十三中更十四右更十五少上造十六大上造十七駟車庶長十八大庶長十九關內侯二十徹侯皆秦制以賞功勞徹侯金印紫綬避武帝諱改曰通侯或曰列侯謹案漢爵皆沿秦制故此文與秦互見而文武官階篇中互見亦同通志漢有國王國侯亭侯三等王皆裂地侯以户數為差分民自此始漢初論功封侯者凡百四十三人食邑者除租每户一嵗更輸錢二百史記平準書請置賞官命曰武功爵裴駰集解瓉曰茂陵中書有武功爵一級曰造士二級曰間輿衛三級曰良士四級曰元戎士五級曰官首六級曰秉鐸七級曰千夫八級曰樂卿九級曰執戎十級曰左庶長十一級曰軍衛此武帝所制以寵軍功焉諸買武功爵官首者試補吏先除千夫如五大夫其有罪又減二等爵得至樂卿以顯軍功軍功多用越等大者封侯卿大夫小者郎吏吏道雜而多端則官職耗廢謹案漢興不設五等其封爵以王侯概之復仍秦二十等之制以賞功勞鄭樵所謂三等之亭侯蓋即列侯中之小者耳其實仍二等也初制分土廣大旋以致亂其後稍復易置諸侯王得推恩分封其子弟衆建少力而國勢以安亦可知立制之未善矣至武帝立武功爵以寵軍功而買爵得至樂卿尤為一時權設之計宜其行之未久而即罷也漢又有國大夫列大夫上聞爵見史記樊噲列傳如淳注以為國大夫即官大夫列大夫即公大夫上聞爵則始於魏文侯勝齊天子賞文侯以上聞又有執帛執圭之爵見曹參灌嬰列傳注以為孤卿執帛侯伯執圭以朝位比之吕氏春秋有得伍員位執圭之文蓋皆雜採古制而用之者以其非常制故不盡著而附識於此後漢書百官志列侯所食縣為侯國本注曰承秦爵二十等為徹侯金印紫綬以賞有功功大者食縣小者食鄉亭得臣其所食吏民後避武帝諱為列侯武帝元朔二年令諸王得推恩分衆子土國家為封亦為列侯舊列侯奉朝請在長安者位次三公中興以來唯以功德賜位特進者次車騎將軍賜位朝廷侯次五校尉賜位侍祠侯次大夫關內侯承秦賜爵十九等為關內侯無土寄食所在縣民租多少各有户數為限通志後漢爵亦三等皇子封王其郡為國其列侯雖鄧冦元勳不過四縣三國三國魏志武帝紀建安二十年始置名號侯至五大夫與舊列侯關內侯凡六等以賞軍功裴松之注魏書曰置名號侯爵十八級關中侯爵十七級皆金印紫綬又置關內外侯十六級銅印龜鈕墨綬五大夫十五級銅印環鈕亦墨綬皆不食租與舊列侯關內侯凡六等臣松之以為今之虛封蓋自此始通典魏黃初三年初制封王之庶子為鄉公嗣王庶子為鄉侯公之庶子為亭伯其後定制凡國王公侯伯子男六等次縣侯次鄉侯次亭侯次關內侯又置名號侯爵十八級關中侯爵十七級關外侯爵十六級五大夫十五級自關內侯皆不食租虛封自魏始謹案五等之制漢代不備至三國而復立而縣鄉亭侯關內侯復多為之等以變通之蓋因漢大小列侯而漸分其制也裴松之謂虛封自魏始蓋指名號侯至五大夫諸爵而言杜佑則以關內侯以下皆不食租考名號侯以下有關中侯關內外侯之稱與關內侯相近其所以别為新置者正以關內侯食封其餘不食封以是為殊耳是杜佑之言為未核也自秦置爵二十級而漢因之兩漢書所記之賜爵皆秦舊制也魏則别置諸爵合而稽之多至六十餘級故魏制所載每有行賞則必賜爵始之以為賞功終之以為賜與誠未合於慎重之義矣晉晉書職官志武帝咸寧三年有司奏從諸王公更制户邑皆中尉領兵大國次國小國皆制所近縣益滿萬户又為郡公制度如小國王亦中尉領兵郡侯如不滿五千户王置一軍一千一百人亦中尉領之南宫王承隨五萬各於泰始中封為縣王邑千户至是改正縣王增户為三千户制度如郡侯亦置一軍自此非皇子不得為王而諸王之支庶皆皇家之近屬至親亦各以上推恩受封其大國次國始封王之支子為公承封王之支子為侯繼承封王之支子為伯小國五千户以上始封王之支子為子不滿五千户始封王之支子及始封公侯之支子皆為男非此皆不得封通志晉有王公侯伯子男又有開國郡公縣公郡縣侯伯子男及鄉亭關