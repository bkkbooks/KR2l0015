尉從四品曰上騎都尉正五品曰騎都尉從五品曰驍騎尉正六品曰飛騎尉從六品曰雲騎尉正七品曰武騎尉從七品率三嵗一遷必因其除授以加之凡賞有格若事應賞從其所𨽻之司考實以報則必審核其狀以格覆之謂之有法酬賞非格所載參酌輕重擬定以上尚書省謂之無法酬賞若功賞未酬而賞格改易者輕從舊格重從新格文獻通考政和中罷勳官淳熙末朝議欲復之以旌有功如貼職之比後亦不果行惟安南闍婆占城三國王始封加上柱國南丹州刺史加武騎尉焉文獻通考宋又採秦制賜民爵曰公士端拱元年賜諸州高年一百二十七人爵公士景德中福建民有擒獲強盜者當授鎮將以逺俗非所樂並賜公士自後率為例嶽珂愧郯録階散勳官前世合於一至唐則析而為二階勳功臣檢校唐析於四而宋則合於一隋置上柱國至都督總十一等以酬勤勞置六品以下散官八郎為正階八尉為從階柱國等號本以酬勞武騎諸稱並同郎位至唐一歸之於勳官則階散也勳官也唐雖因隋而所用未嘗因隋是謂前世合於一而唐則析為二唐之有功者或敘階或賜勳或加以檢校或寵以名號而又申之以封爵重之以實封宋制每一遇郊官至某則加功臣若千字酬勳若干級進階若干等徹國若干户並舉而與之故世但以為煩而不見其用是謂唐析於四而宋則合於一所以神宗獨斷而盡去之也謹案勳官與授爵本不相同唯其分職遞轉為制有相近者故著其稱名之始唐代設此蓋袛以為階散之互用至宋而遇郊錫賫進級紛紜不以為酬功之等而以為濫賞之資其為失又殊甚矣嶽珂所載頗盡階勳分合之曲折而宋代濫賞之失亦可概見故節録其文於此以資考證焉遼王世貞藝苑巵言遼之封爵惟有國王郡王國公三等郡名率以漆水栁城混作蘭陵亦如宋高密建安之類國名則屢進屢改有加至二國者其初宗室與勳戚無異道宗太康五年詔惟王子封一字王餘並削降遼之外戚多以功封非盡由恩澤也王圻續文獻通考勳級遼無考金金史百官志封爵正從一品曰郡王曰國公正從二品曰郡公正從三品曰郡侯正從四品曰郡伯舊曰縣伯成安二年更正五品曰縣子從五品曰縣男凡勳級正二品曰上柱國從二品曰柱國正三品曰上護軍從三品曰護軍正四品曰上輕車都尉從四品曰輕車都尉正五品曰上騎都尉從五品曰騎都尉正六品曰驍騎尉從六品曰飛騎尉正七品曰雲騎尉從七品曰武騎尉元續文獻通考元制王正一品郡王從一品國公正二品郡公從二品國侯正三品郡侯從三品國伯正四品郡伯從四品縣子正五品縣男從五品上柱國正一品柱國從一品上護軍正二品護軍從二品上輕車都尉正三品輕車都尉從三品上騎都尉正四品騎都尉從四品驍騎尉正五品飛騎尉從五品雲騎尉正六品武騎尉從六品明明史職官志凡爵非社稷軍功不得封封號非特旨不得與或世或不世皆給誥劵續文獻通考太祖下江左因勝國之舊為五等爵以贈勳臣及文武之死綏者其後有王公侯伯之典而罷子男洪武十七年奏定有封爵者給誥皆如一品之制惟公侯用玉軸伯子男犀軸明史職官志稽勳掌勳級凡文勳十正一品左右柱國從一品柱國正二品正治上卿從二品正治卿正三品資治尹從三品資治少尹正四品贊治尹從四品贊治少尹正五品修正庶尹從五品協正庶尹自五品以上歷再考乃授勳武選掌功賞之事凡武官六品其勳十有二正一品左右柱國從一品柱國正二品上護軍從二品護軍正三品上輕車都尉從三品輕車都尉正四品上騎都尉從四品騎都尉正五品驍騎尉從五品飛騎尉正六品雲騎尉從六品武騎尉謹案明初為五等之爵後有王公侯伯而無子男既而仍設五等皆給誥劵世襲凡襲封則徴其誥劵稽其功過核其宗支以第其世流降除之等吏部驗封司掌之此明代五等之制也至勳級則有文勳武勳之别考武勳盡從前代而文勳則别為柱國卿尹之號核其要歸亦猶文散武散之義而已兹以列代沿襲之故並列於篇以考見異同之制焉謹案世爵之制莫大于定功閥之大小以為世襲之久近前代惟五等則有承襲其以軍功賜爵者類不及其子孫甚至唐封功臣爵至郡王亦皆及身而止其子孫無聞焉至如列代之開國公侯亦祇美其名稱功非佐命亦從給子非實如周禮之分王功曰勳國功曰功也漢家賜爵紛紜東西京無代無之有普天下均賜一級者其間復令民得買爵而軍功之賞大者公侯卿大夫小者郎吏吏道雜而官職耗廢宋每遇郊祀錫賞勳爵無數以酬功之巨典而僣濫用之殊不甚惜其敝甚矣其端皆由於爵制未定或多為之節級以備賞賜或虛設其勳階以示褒寵而總無與于循名核實之義也我朝自開國功臣世襲罔替其後有忠勤著績軍功異等者咸授以二十六等之爵列爵之等級即為世襲之等級無有及身授爵而子若孫不得襲封者至於敘次軍功則以現任官職之大小計其立功之參等而分别除授戰功則有功牌之五等攻城則有難易之六等水戰則有奪舟之三等陳亡授爵則自雲騎尉至輕車都尉兼一雲騎尉有差皆計功核實澤及子孫無或有虛錫之爵公侯伯既褒以美名其有勳績懋著復特承諭旨既俾得世襲罔替其已得世襲之爵又以軍功得封合為一爵者一等男以下按次承襲至一等男以上則均為世襲罔替皇上復優念陳亡之後襲次已畢復錫恩騎尉以傳之永久班爵既定較如畫一而隆恩所逮有加無已以視前代襲爵不分大小勳官徒為虛設者品制之詳明德澤之宏逺誠不可以道里計矣欽定厯代職官表卷六十五
