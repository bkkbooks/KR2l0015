body:
  text: 内務府上駟院表内務府上駟院國朝官制上駟院兼管事務大臣無定員卿二人正三品由侍衛補授一人由内務府司官補授一人掌總理御廄事務供直扈從應用諸馬政皆總司之及廄屬官員選除賞罰之事初名御馬監順治十八年改為阿敦衙門以大臣侍衛等守管理無定員康熈十六年改為上駟院三十三年額設堂官一人雍正六年定為三品卿職乾隆十四年定為卿二人所主有上乗御馬一廄皇子乗馬一廄南苑御馬六廄御騾二廐小馬一廄駑馬六廄儀仗馬一廄又有大淩河牧羣上都達布遜諾爾達里岡崖牧羣各設有總管翼領牧長牧副等員皆歸上駟院統轄堂郎中一人主事二人委署主事一人左司右司員外郎各二人主事各一人委署主事各一人筆帖式二十二人堂郎中主事掌辦理揀選補放及稽查馬匹錢糧文移檔案等事左司員外郎主事掌内外羣廄游牧處馬駝數目及定議賞罰之事右司員外郎主事掌員役俸廩馬駝草豆稽核奏銷之事康熈十六年設員外郎四人主事一人二十四年設郎中一人増設員外郎二人三十三年分為左右二司増設主事三人三十八年裁員外郎二人五十九年設委署主事三人雍正元年増一人尋省乾隆二十二年仍設委署主事三人筆帖式康熈十六年以来陸續増置上駟侍衛二十一人司鞍長三人六品職衘廄長十七人牧長五人副牧長五人牧廄副四十五人䝉古醫生頭目三人六品職衘上駟侍衛掌演習御馬廄長等官掌時其芻牧謹其出入以聴堂司之政令康熙三十三年設辦理堂務上駟侍衛四人辦理二司事務各二人後増設七人乾隆二年増設六人廄長牧長以下康熙十六年以来陸續増置厯代建置三代周禮夏官校人中大夫二人上士四人下士十有六人府四人史八人胥二人徒八十人掌王馬之政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物凡頒良馬而養乗之乗馬一師四圉二乗為皁皁一趣馬三皁為􅌛􅌛一馭夫六􅌛為廄廄一僕夫六廄成校校有左右駑馬三良馬之數麗馬一圉八麗一師八師一趣馬八趣馬一馭夫天子十有二閑馬六種趣馬下士皁一人徒四人掌賛正良馬而齊其飲食簡其六節牧師下士四人胥四人徒四十人掌牧地皆有厲禁而頒之廋人下士閑二人史二人徒二十人掌十有二閑之政教以阜馬佚特教駣攻駒圉師乗一人徒二人掌教圉人牧馬圉人良馬匹一人駑馬麗一人掌養馬芻牧之事馬質中士二人府一人史二人賈四人徒八人掌質馬巫馬下士二人醫四人府一人史二人賈二人徒二十人掌養疾馬而乗治之相醫而藥攻馬疾受財于校人馭夫中士二十人下士四十人掌分公馬而駕治之注乗調六種之馬春秋左氏傳馬有圉牛有牧鄭康成周禮注趣馬下士馭夫中士則僕人上士也賈公彦疏序官無僕夫士數之文以此文官尊者馭卑者馭夫既中士則僕夫上士可知謹案成周馬政掌於夏官司馬自校人以下各司厥職曰掌王馬之政曰掌十有二閑之政教葢惟天子供御之馬以校人諸官掌之故鄭注以王路駕種馬戎路駕戎馬金路駕齊馬象路駕道馬田路駕田馬駑馬給宫中之役六馬之屬皆以天閑所牧養者為職其他行軍田役所需之馬則有邱甸出車之法掌自司徒而不為校人以下之所𨽻屬是校人諸官正今上駟院之職掌也通典諸書序馬官沿革校人諸職繫之太僕寺則以漢唐太僕皆兼主御馬因聫而及之今故以校人之職與太僕寺篇互見而證明其為天閑之職掌者如此至馭夫長馭應入鑾儀衛篇以其兼掌乗調六馬實與今之上駟侍衛相近而校人職中亦有􅌛一馭夫之文是又為馬政之屬官故亦從附見焉秦謹案通典稱秦官有太僕正太僕丞而後世之尚乗局自秦以来其職皆在太僕是御馬之職秦時必以太僕主之但其先汧渭牧馬見於史記駟驖騏馵詠于風詩而一代官制則史傳闕如畧無可考故僅能指溯其大概而不可復詳焉漢漢書百官公卿表太僕屬官有大廄未央家馬三令各五丞一尉師古曰家馬者主供天子私用非大祀戎事軍國所須故謂之家馬也又龍馬閑駒槖泉騊駼丞華五監長丞如淳曰槖泉廄在槖泉宫下中太僕掌皇太后輿馬不常置也武帝太初元年更名家馬為挏馬應劭曰主乳馬取其汁挏治之味酢可飲因以名官也漢書傅介子列傳介子以駿馬監求使大宛王應麟玉海武帝以嚴安為騎馬令主天子之騎馬傅介子為駿馬監金日磾拜為監三輔黄圖路軨廄在未央宫掌宫中輿馬亦曰未央廄漢書曰武帝時期門郎上官桀遷為未央廄令謹案漢舊儀未央與路軨為天子六廄之二則路軨廄非即未央廄可知三輔黄圖謂路軨廄亦曰未央廄似合而為一豈因路軨廄在未央宫遂得通名歟三輔黄圖未央大廄在長安故城中漢官儀曰未央宫六廄長樂承華等廄令皆秩六百石翠華廄大輅廄果馬廄騎馬廄大宛廄軏梁廄胡河廄騊駼廄皆在長安城外霸昌觀馬廄在長安城外都廄天子車馬所在中廄皇后車馬所在謹案漢舊儀天子六廄未央承華騊駼騎馬路軨大廄百官公卿表有家馬龍馬閑駒槖泉等名而三輔黄圖又載有翠華廄大輅廄果馬廄大宛廄軏梁廄胡河廄霸昌觀馬廄為漢儀漢表所不及載可以補漢制之闕玉海中廄令祕彭祖為之漢書百官公卿表水衡都尉屬官有技巧六廄令丞成帝建始二年省技巧六廄官顔師古漢書注漢舊儀云天子六廄未央承華騊駼騎馬路軨大廄也馬皆萬匹據此表太僕屬官已有大廄未央路軨騎馬騊駼承華而水衡又云六廄技巧官是則技巧之徒供六廄者其官别屬水衡劉攽漢書刋誤表叙水衡九屬官技巧六廄各一物也後省技巧六廄顔遂謂此都是一官非矣葢上林自有六廄一令丞主之後六廄等各别有官非此六廄也謹案漢御馬掌于太僕其屬官如諸牧苑令丞牧槖令丞等分主國馬别見于太僕寺表至如大廄未央騎馬閑駒等令丞則皆以御馬為職是正今日上駟院之比而駿馬監騎馬令中太僕等官皆親近宫禁之職掌也惟史言六廄馬皆萬匹武帝承文景蓄積海内殷富廄馬有四十萬匹因發數十萬騎追擊匈奴則六廄之馬亦並以供行軍之用葢其時國馬御馬總掌其成于太僕為職不分故聫而及之也槖泉廄之在槖泉宫下大廄未央等六廄之主于水衡葢各以其廄地牧地之所在屬之而其制又可考見矣顔師古以水衡之技巧六廄為一官謂以技巧供六廄則如後世象馬舞馬之比劉攽以水衡别有六廄令丞非即太僕之六廄則技巧與廄令兩不相屬視顔義尤為諦審焉後漢書百官志未央廄令一人六百石本注曰主乗輿及廄中諸馬漢官曰員吏七十人卒騶二十人長樂廄丞一人漢官曰員吏十五人卒騶二十人苜蓿苑官田所一人守之舊有六廄皆六百石令中興省約但置一廄後置左駿廄别主乗輿御馬後或併省袁宏後漢紀靈帝初置騄驥廄丞領受郡國調馬而豪右辜擢馬一匹至二百萬謹案後漢百官志但載未央長樂二廄名而騄驥廄之置丞獨見于此古今注漢安元年七月置承華廄令秩六百石玉海引此今本古今注無之謹案順帝紀漢安元年置承華廄東觀記曰時以逺近獻馬衆多圉廄充滿始置承華廄東京賦云駙承華之蒲捎注廄名即謂此也但攷張衡傳衡卒于永和四年下距漢安元年凡四年衡東京賦内已有承華之名則承華廄之設當在漢安元年之前矣順帝紀謂漢安元年始置承華廄豈舊有此廄至漢安元年始更新之而因以置令乎杜佑通典東京有未央廄令掌乗輿及宫中之馬謹案東漢裁六廄止存未央長樂一令一丞而左駿廄令或置或併葢自光武却駿馬以駕鼓車而廄置日省故主乗輿御馬之職其可考見者止此其𨽻于太僕則與西漢並同至通典言未央廄令并主宫中之馬則中廄太僕亦其所兼掌矣三國魏都賦冀馬填廄而駔駿注鄴城西下有乗黄廄通典魏官第九品總章戯馬監唐六典漢未央令魏改為乗黄廄乗黄古之神馬因以為名通典漢有未央廄令魏改為驊騮廄謹案魏改東漢之未央廄令為乗黄署為驊騮廄乗黄以神馬為名實兼主乗輿車輅故互見于鑾儀衛篇驊騮廄為後代龍廄内廄之所自始而晉宋以後遂分屬門下省則正上駟院之職也總章戯馬監不詳職掌要為親近供御之馬矣晉晉書職官志太僕統乗黄廄驊騮廄龍馬廄等令自元帝渡江之後或省或置太僕省故驊騮為門下之職謹案晉制以太僕兼掌御馬與漢魏同其龍馬廄承漢制而乗黄驊騮則承魏制也通典言宋以後驊騮為門下之職今考晉書所載自渡江省太僕而驊騮改𨽻是分屬門下固始于東晉時矣宋齊梁陳宋書百官志驊騮廄丞一人通典自宋以後分驊騮署為門下齊職儀乗黄獸名也龍翼馬身黄帝乗之而仙因以名廄乗黄令品第七秩四百石唐六典齊門下領内外驊騮廄隨書百官志梁制門下省掌驊騮廄丞通典梁太僕統龍廄内外廄陳因之謹案江左以驊騮廄𨽻門下而梁陳仍有龍廄内外廄屬於太僕葢晉宋省太僕而梁仍置為卿于是御馬之職分屬於門下與太僕也北魏洛陽伽藍記劉騰寺東有太僕寺寺東有乗黄署冊府元龜魏太僕有驊騮廄令通典魏官從八品驊騮左右龍諸署令冊府元龜後魏獻文帝時吕文祖以勲臣子補龍牧曹奏事中㪚謹案史稱魏置野馬苑于雲中置牧地于河西馬三百餘萬匹牧馬之盛無如後魏至御馬之職則仍以太僕之驊騮龍署主之葢承西晉之制而所云龍牧曹殆即龍署令之職與北齊隋書百官志後齊制太僕寺統驊騮左右龍等署掌御馬及諸鞍乗令丞驊騮署又有奉承直長二人左龍署有左龍局右龍署有右龍局並有都尉通典北齊有驊騮左右龍等署驊騮署有奉御十人管十二閑馬謹案齊與魏同制其左右龍葢如今之左司右司驊騮署之奉御則如今之上駟侍衛也後周通典後周官正三命夏官左廄右廄上士正二命夏官左廄右廄中士正一命夏官左廄右廄閑長下士唐六典典牧署後周有左廄右廄上士謹案後周官制皆取法于成周其典廄之屬于夏官者有士三等而校人中大夫則未有其職意者史文脱畧遂不可考歟左廄右廄之所典葢兼王馬與國馬故今與太僕寺篇並見焉隋隋書百官志太僕寺統驊騮龍廄等署各署令二人丞二人驊騮牧置儀同及尉大都督帥都督等官煬帝減驊騮署入殿内尚乗局改龍署曰典廄署尚乗局奉御二人正五品置左右六閑有直長十四人通典驊騮左右龍等署隋如北齊大業三年分門下太僕二司取殿内監名以為殿内省領尚乗等局領左右六閑及諸閑毎局置奉御二人以總之置直長以貳之謹案隋初以驊騮署𨽻太僕後改為尚乗局入殿内而𨽻于門下省其所掌為左右六閑正為供御之職而又併入于諸閑則所𨽻又廣矣通典言隋太僕制如北齊則史所謂龍署者固亦有左右龍之分掌也至驊騮牧置儀同都督等官則與今上駟院之設為卿職者亦髣髴相近故並著焉唐舊唐書職官志殿中監尚乗局奉御二人從五品上直長一人正七品下奉乗十八人正九品下司庫一人正九品下司廩二人正九品下書令史一人書吏十四人奉御掌内外閑廄之馬辨其麤良而率其習馭直長為之貳一曰左右飛黄閑二曰左右吉良閑三曰左右龍媒閑四曰左右駒駼閑五曰左右駃騠閑六曰左右天苑閑開元時仗内六閑曰飛龍祥麟鳯苑鵷鶵吉良六羣等號六廄馬凡秣馬給料以時為差凡外牧進良馬印以三花飛風之字而為志奉乗掌槀秸出納獸醫掌療馬病初尚乗局掌六閑馬後置内外閑廄使専掌御馬開元初以尚乗局𨽻閑廄使乃省尚乗其左右六閑及局官並𨽻閑廄使領之也進馬舊儀毎日尚乗以廄馬八匹分為左右廂立于正殿側宫門外候仗下即㪚若大陳設即馬在樂懸之北與大象相次進馬二人戎服執鞭侍立于馬之左隨馬進退雖名管殿中其實武職用資䕃簡擇如千牛備身天寳八載李林甫用事罷立仗馬亦省進馬官十二載楊國忠當政復立仗馬及進馬官乾元復省上元復置也通典隋置尚乗局唐因之増置奉御四人龍朔二年改為奉駕大夫咸亨元年復舊掌六閑馬開元中減二人先是别置廄使因𨽻焉猶屬殿中武后萬嵗通天二年五月置仗内閑廄令殿中丞袁懷哲檢校至聖厯二年改為少監閑廄使自後他官相循為之直長隋置十四人唐減四人雍録飛龍廄後苑有驥徳院所在韋后入飛龍廄葢自元武門出宫入廄也玉海貞觀十三年三月吉良廄産白馬朱騣謹案山海經犬戎之國有文馬縞身朱鬛目若黄金名曰吉彊彊或作良乗之夀千嵗唐有左右吉良閑義昉于此冊府元龜肅宗至徳二年詔園苑内有閑廄使總監各據所管地界耕種收草粟以備國馬代宗大厯十四年復置廄馬隨仗於月華門文宗開成元年以飛龍使馬二百匹賜京兆府充給諸驛四年飛龍進請監牧馬一嵗馬二千七百匹謹案自秦漢以来馬政皆主于太僕惟東晉宋齊或省太僕則以𨽻于門下至梁陳仍以太僕卿主之其驊騮廄之改𨽻殿内省自隋始而唐則仍之但隋改驊騮為尚御尚由殿内以𨽻于門下省唐則殿中自為立省不𨽻門下于是御馬之制既不復繫屬於太僕門下而専為殿中省之専司與今日上駟院之専𨽻于内務府者法意較為相近唐又嘗置閑廄使屬殿中而以尚乗奉御𨽻之又嘗罷尙乗而以内外閑廄使専主其事總之皆為殿中之屬稍有變更而其制不大相殊也至其後領閑廄者多為左右親暱之人不必盡以殿中掌領于是有控鶴監有控鶴左右監後改為天驥府又改為奉宸大夫見通典則非經常之制不足備列至文宗時又有飛龍廄使不言所𨽻何省葢亦専司御馬之職也五季冊府元龜後唐明宗即位以康福為飛龍使長興元年分飛龍廄為左右以小馬坊為右飛龍院後周顯徳二年詔飛龍院馬有病患老弱可送同州沙苑監衛州牧馬監以盡其飲齕之性謹案五季廢省諸卿殿中奉御之職皆所不設惟飛龍使仍唐之舊為御馬之職冊府元龜又載天成二年宰臣任圜奏藩牧臣寮毎正至慶賀例皆進馬備乗奉于帝車資駔駿於天廄道途之役䕶養為難請改貢綾絹金銀隨土産折進馬之直兼請别選孳生馬分置監牧敕從之是天成以後供奉之馬亦並㪚𨽻於諸監牧中矣宋馬端臨文獻通考宋太僕寺邦國廄牧之政令分𨽻羣牧司騏驥院本寺但掌天子五輅元豐改官制置卿少卿丞主簿掌車輅廄牧馬政之令所𨽻官司騏驥院左右天駟監掌養國馬鞍轡庫掌御馬鞍轡及給賜臣下上下監掌治療馬病元祐初置左右天廄坊紹聖初置孳生監中興後廢太僕併入兵部宋有羣牧司制置使以樞宻使副為之掌内外廄牧之事周知國馬之政而察其登耗左右騏驥院勾當官各三人以諸司使副及内侍充掌牧養國馬以供乗輿及頒賜王公羣臣蕃夷之用天駟左右四監監官各一人左右天廄坊監官各一人牧養上下監官各一人並以三班使臣充兵部駕部建炎三年併太僕寺𨽻馬太僕有騏驥車輅二院左右騏驥院監官二員以武臣充掌司國馬總教駿四指揮之衆以養餵諸馬宋制殿中省尚乗歸騏驥院内鞍轡庫宋㑹要左右飛龍院興國五年改名天廄院雍熈二年十月丙辰改為左右騏驥院左右各領天駟二監天廄一坊舊制國馬之政皆騏驥二院監官専之謹案宋御馬之掌始終更易凡三其初為羣牧司制置使所轄有左右騏驥院天駟左右四監左右天廄坊等官則並掌於樞宻院副使元豐定官制以後始改𨽻于太僕寺卿官屬有十而騏驥等院𨽻焉中興以後又廢太僕改𨽻于兵部之駕部有騏驥車輅二院然職司雖存月遣司官一至而已是始終三變而其職益輕也其他則有河南飛龍院大名養馬務諸職葢皆羣牧司之所掌至于殿中省六尚之局獨裁去尚乗而以其事歸騏驥院此與前代互異之大槩也遼遼史百官志遼北面著帳官承應小底局習馬小底諸廄官尙廄使尙廄副使飛龍院飛龍使飛龍副使總領内外廄馬局總領内外廄馬南面官殿中司尚乗局奉御謹案遼有諸路羣牧使司職主馬政為今太僕寺之掌其北面官之尚廄飛龍等使自為御馬之職而總領内外廄則又總其事而兼轄之者也南面又有太僕寺官但既有殿中司之尚乗局則太僕寺所掌自不與御馬相闗故不復載焉金金史百官志殿前都㸃檢司尚廄局提㸃正五品副使從六品掌御馬調習牧養以奉其事大定二十九年添副使一員管小馬羣直長一員司馬牛羣掌廄都轄正九品不限員副轄從九品不限員數資考謹案金代馬政皆轄于羣牧司唯尚廄局提㸃屬于殿前都㸃檢猶前代殿中奉御之職葢用遼制而名之曰尚廄也其所掌為御馬之調習牧養而併供其事是正今日上駟院之職也元元史百官志太僕寺秩從二品中統四年設羣牧所至元十六年改尚牧監十九年又改太僕院二十年改衛尉院二十四年罷院立太僕寺又别置尚乗寺以管鞍轡而本寺止管阿都齊滿洲語牧馬人也原作阿塔思今改正馬虞集經世大典序録太僕典御馬太廟祀事及諸寺影堂用乳酪則供牝馬駕仗及宫人出入則供上乗馬供上及諸王百官挏乳取黒馬乳以奉王食謂之細乳諸王百官者謂之麤乳謹案元史所載馬政官制頗為簡畧其太僕寺由羣牧所改設而兼典御馬是今太僕上駟二職在元皆為太僕寺之掌今故與太僕寺篇互見至尚乗寺特設為卿而専管鞍轡近於今鑾儀衛武偹院之職兹故不復載焉明明史職官志宦官十二監御馬監掌印監督提督太監各一員騰驤四衛營各設監官掌司典簿寫字駑馬等員象房有掌司等員明㑹典馬政有太僕苑馬寺専理而統於兵部若内廄馬匹則領於御馬監部寺不得與云王圻續文獻通考呉元年設御馬司司正正五品副從五品洪武二年置御馬司正一人副二人十七年御馬監設令一人正七品丞一人從七品司牧局設大使一人正九品皆於内官内選用二十八年御馬監設太監一人正四品左右少監各一人從四品左右監丞各一人正五品典簿一人正六品又設長隨奉御正六品謹案列代御馬之名其沿革皆可詳考自成周時王馬掌於校人十有二閑上應天駟其職重矣秦漢以後皆立太僕以専其政則王馬國馬咸並掌之而漢之槖泉未央及水衡之六廄孳收漸廣當時任其職者皆以士大夫親近用事者為之與衛尉少府並重後漢省六廄惟置未央一廄又兼主乗輿車輅其馬政視前漢為較省自魏有驊騮廄而晉以下因之其後遂為門下之職與太僕之龍廄并列至隋而始立尚乗奉御専屬于門下之殿内省至唐而殿中監尚乗局并為特設又不與門下相屬而太僕遂不復主御馬之政宋之騏驥天駟院由羣牧司而改𨽻太僕由太僕而改𨽻兵部而羣牧司之勾當官已有以内侍充其職者矣遼金尚廄諸使或領于北面著帳官或領于殿前都㸃檢司而元則仍歸其職于太僕此列代建置之大槩也迨至明代兵部太僕寺苑馬寺皆有牧塲孳育而御用之馬則别設内監専以宦官主之凡諸調習供奉士大夫不得與聞其事葢自明初定制已然其於成周綴衣虎賁休兹知恤侍御僕從罔非正人之義渺無復存視列代之列於卿監掌於朝官者法制皆為不逮矣我朝初改御馬監為阿敦衙門後易為上駟院定為三品卿職設郎中員外主事等官以分司其職而仍統之以大臣所以慎重閑駟訓養而服習之法制至為詳備云欽定厯代職官表卷三十九
