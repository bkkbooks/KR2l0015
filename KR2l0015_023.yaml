body:
  text: 理藩院表理藩院國朝官制理藩院尚書一人左右侍郎各一人均以滿洲䝉古補授額外侍郎一人特簡䝉古貝勒貝子之賢能者任之掌內外藩䝉古回部及諸畨部封授朝覲疆索貢獻黜陟徴發之政令控馭撫綏以固邦翰所屬有旗籍王㑹典屬柔逺徠逺理刑六司國初設䝉古衙門有承政參政等官崇德三年六月定䝉古衙門為理藩院七月定置承政一員左右參政各一員順治元年改承政為尚書左右參政為侍郎十五年以禮部尚書銜掌理藩院事以禮部侍郎銜協理理藩院事十八年仍為理藩院尚書侍郎又初置有滿洲啓心郎一人漢軍啓心郎一人順治十五年省雍正元年以來以王公大學士兼理院事皆由特簡無常員旗籍清吏司郎中滿洲二人䝉古一人員外郎滿洲三人䝉古二人主事滿洲一人掌漠南諸藩科爾沁札賴特杜爾伯特郭爾羅斯敖漢奈曼翁牛特巴林札魯特喀爾喀左翼阿魯科爾沁克什克騰土默特喀喇沁烏朱穆沁阿巴垓浩齊特蘇尼特阿巴哈納爾四子部落喀爾喀右翼烏喇特茂明安鄂爾多斯歸化城土默特二十五部落五十一旗之禮籍疇其封爵正其等次辨其世糸三嵗㑹盟則遣大臣奉敕往蒞之以同好惡而頒禁令焉凡歸化城土默特索倫除授官校則條其令格敘而正之若諸䝉古嵗有不登則辨其輕重而賙恤之初順治十八年理藩院設四清吏司曰録勳賓客柔逺理刑置滿洲蒙古郎中十有一人員外郎二十七人滿洲主事四人漢人主事四人其後增損不一康熙三十八年省漢人主事員額後又析柔逺司為二曰前司後司乾隆二十二年改録勳司為典屬賓客司為王㑹柔逺後司為旗籍柔逺前司仍為柔逺二十六年併旗籍柔逺為一司增設徠逺司二十七年旗籍柔逺仍分為二司二十九年復改典屬司為旗籍司其舊旗籍司即改為典屬司以各符職掌焉王㑹清吏司郎中滿洲一人䝉古二人員外郎滿洲二人䝉古三人主事䝉古二人掌科爾沁等諸部落每嵗朝覲之儀貢獻之式燕饗賜豫舍館饔餼皆視其等次以禮之典屬清吏司郎中滿洲䝉古各一人員外郎滿洲五人䝉古四人主事滿洲䝉古各一人掌䝉古北部喀爾喀後路土謝圖汗喀爾喀東路轍臣汗喀爾喀西路札薩克圖汗喀爾喀賽因諾顔札薩克親王等列爵之位盟㑹之制其青海四部落賀蘭山厄魯特烏蘭烏蘇厄魯特推河厄魯特額濟勒土爾扈特都爾伯特土爾扈特等部胙封錫命亦如之諸喇嘛畨僧之受號者則辨其名數授以印劄有差凡烏魯木齊伊犁防守屯田之政庫倫恰克圖互市之事咸綜其法式以頒布焉柔逺清吏司郎中滿洲一人員外郎滿洲三人䝉古三人主事䝉古一人掌喀爾喀等部落及喇嘛畨僧朝貢祿錫之事徠逺清吏司郎中滿洲一人員外郎滿洲三人䝉古二人主事滿洲䝉古各一人掌嘉峪關以西回部回城及四川諸土司之政令凡諸回舊部若哈密闢展吐魯畨則爵其長而領以札薩克如䝉古之制新疆若哈拉沙拉庫車沙雅爾賽里木拜阿克蘇烏什喀什噶爾葉爾羌和闐諸城則因俗設官皆辨其等秩而祿命之田賦征𣙜則凖式定制而頒布焉四川諸土司奉嵗事以入覲於廷釐其班位而詔之儀節凡哈薩克左右部布魯特東西部安集延瑪爾噶郎霍罕那木干四城塔什罕拔達克山博羅爾愛烏罕啓齊玉蘇烏爾根齊諸部汗長以時重譯朝貢者各以其國之籍禮之理刑清吏司郎中滿洲䝉古各一人員外郎滿洲二人䝉古三人主事滿洲一人掌䝉古及畨回刑罰之事堂主事滿洲二人䝉古三人漢軍一人校正漢文官二人掌校繕章疏順治元年置額其校正漢文官二人於內閣翰林院侍讀學士侍讀等官內奏委三嵗而代司務㕔司務滿洲䝉古各一人掌收發文移順治元年置司務二人為滿洲䝉古員額院判一人知事一人副使一人為滿人員額康熙三十八年俱省雍正十年復設滿洲司務一人䝉古司務一人題署主事滿洲三人䝉古五人乾隆三十六年置由筆帖式內掄選題補筆帖式滿洲三十六人䝉古五十五人漢軍六人初順治元年置滿洲筆帖式十有一人䝉古筆帖式四十一人漢軍筆帖式二人康熙二十八年增設漢文筆帖式每旗各一人漢軍筆帖式每翼各增二人雍正十一年復增滿洲筆帖式十七人䝉古筆帖式十四人分𨽻各司視事之繁簡以為額職事具吏部篇銀庫郎中員外郎各一人於本院司官內奏委司庫滿洲一人筆帖式滿洲二人庫使滿洲二人掌帑金出納初制䝉古王台吉等入朝由戶工二部及光祿寺庀器用具廩餼康熙四十六年始創立銀庫設官如今額計賓館所需按直給資以惠逺人惟庫使初置四人雍正元年省二人䝉古翻譯房員外郎主事各一人掌翻譯章奏文書於本院司屬內掄選簡委唐古忒學司業助教各一人筆帖式䝉古四人掌教習唐古忒字以譯西藏章疏文移順治十四年初立唐古忒學給教習人六品俸後改為司業其助教本以他官兼乾隆五年始定為額設之官稽察內館外館監督二人掌致館于賔繕完滌除以待行李由科道及各部司官內掄選奏委烏蘭哈達三座塔駐劄司官各一人八溝駐劄司官一人分駐塔子溝筆帖式一人分掌諸䝉古部落與民人交涉之事以聽其訟而平之嵗則遍巡所屬以周知其風俗兼掌𣙜百物之稅以待䝉古贍恤嵗周而代察哈爾游牧處理事員外郎䝉古十有六人掌治游牧察哈爾獄訟之事以在京䝉古各旗與察哈爾各旗官員內掄選由院引見除授自護軍校驍騎校選用者即授員外郎自中書筆帖式選用者先授主事三年稱職乃授員外郎又雍正七年置巡察游牧御史或部院司官一人每嵗更替今改定五年掄遣一次張家口喜峯口獨石口殺虎口古北口管理驛站員外郎各一人掌䝉古各處郵驛之政令以宣傳命令通達文移凡百里為一傳自喜峯口至札賴特置郵十有六自古北口至烏朱穆沁置郵九自獨石口至浩齊特置郵六自張家口至四子部落置郵五自殺虎口至烏喇特置郵九又自歸化城至鄂爾多斯置郵八仍為殺虎口路均於水泉形勢之地安設五路各設員外郎一人由本部司官內奏委司其事筆帖式一人佐之三嵗而代圍場總管一人初制四品乾隆十八年升為三品左右翼長各一人秩四品章京八人初制六品乾隆十八年升為五品驍騎校八人秩六品木蘭圍場在䝉古各部落中周一千四百餘里國語謂哨鹿為木蘭故以得名康熙間聖祖仁皇帝因喀喇沁敖漢翁牛特等諸部所獻牧地置嵗行秋獮之禮四十五年設圍場總管一員六品官八員率官兵駐守以司譏察巡防之禁令皇上式遵前制每以八月行圍肄武凡內扎薩克䝉古王公台吉及喀爾喀青海厄魯特並輪年入覲之都爾伯特土爾扈特回部伯克等咸㑹朝行在所櫜鞬執役歲以為常乾隆十四年始以圍場總管屬理藩院統轄十八年升總管等品秩增設翼長二人驍騎校每旗各一人謹案我朝威德廣被其內扎薩克諸䝉古久受疆索比於內臣而聖武所昭無思不服北踰瀚海西越流沙亦莫不碁布星羅咸歸版籍設官置吏多因其俗以治之臂指相維不殊郡縣如䝉古諸旗之扎薩克官及新疆回城之伯克等官皆領屬於理藩院今以其本由各部落選置與內地注授者不同故别繫諸藩屬諸官表內謹識於此厯代建置謹案周禮大行人以賓禮親諸侯凡㑹同朝覲之事牢禮爵位之數皆其所掌典式綦備後世封建既廢惟蕃國猶各以其籍貢獻而秦漢以來德不及逺大抵羈縻姑息叛服不常甚至屈體和親禮釣鄰敵其約束期㑹非中朝所得而主故從未有設官以治之者我國家義正仁育中外一家䝉古諸部落或誼聯戚畹或著有勳勞帶礪之封爰及苖裔土田戶版盡𨽻職方至於月􅙡砥平畫疆置吏羌髳順化迾戍開屯亦皆述職來朝嵗奉王事特設理藩院以司其政令為本朝創建之職謹以古制約略凖擬惟周官大行人所掌全相吻合而懷方合方訓方形方諸氏亦可以類相比次則漢之典屬國差為近之其秦漢而後之大鴻臚典領藩國諸侯王頗有與今理藩院職守相似者雖規模之廣狹有殊而所掌尚屬賓客禮儀之事故並互見於此表今鴻臚寺所掌者惟儐贊及朝儀其賓客之事則分屬理藩院及禮部㑹同四譯館說詳鴻臚寺篇至宋明諸代懷柔無䇿建置未遑者則亦並從闕略以著其實仰見聖朝長撫逺馭文軌大同凡世胙藩封者無不朝春秋而備宿衛實與三代諸侯無異故理藩院之輯寧衆部即大行人之信睦羣邦震叠威靈邁於周典近代義乖懷畏不獨閉關自守者無足語於服逺之宏模即或睎古建官亦不過略存規制從未有遐荒絶漠悉統治於王官道一風同咸為臣僕如今日之盛者也三代尚書舜典賓于四門四門穆穆孔頴達疏以諸侯為賓舜主其禮迎而待之史記裴駰集解馬融曰四門四方之門諸侯朝者舜賓迎之謹案尚書賓于四門孔安國作賓客之賓鄭康成則讀為儐字音義各異而以為迎待諸侯則其說並同周大行人所謂大賓之禮大客之儀其規制實本於此今故引冠理藩院沿革之始以著原起云周禮秋官大行人中大夫二人小行人下大夫四人環人中士四人大行人掌大賓之禮及大客之儀以親諸侯春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮時㑹以發四方之禁殷同以施天下之政時聘以結諸侯之好殷俯以除邦國之慝閒問以諭諸侯之志歸脈以交諸侯之福賀慶以贊諸侯之喜致禬以補諸侯之烖以九儀辨諸侯之命等諸臣之爵以同邦國之禮而待其賓客上公之禮執桓圭九寸繅藉九寸冕服九章建常九斿樊纓九就二車九乘介九人禮九牢其朝位賓主之間九十步立當車軹擯者五人廟中將幣三享王禮再祼而酢饗禮九獻食禮九舉出入五積三問三勞諸侯之禮執信圭七寸繅藉七寸冕服七章建常七斿樊纓七就二車七乘介七人禮七牢朝位賓主之間七十步立當前疾擯者四人廟中將幣三享王禮一祼而酢饗禮七獻食禮七舉出入四積再問再勞諸伯執躬圭其他皆如諸侯之禮諸子執榖璧五寸繅藉五寸冕服五章建常五斿樊纓五就二車五乘介五人禮五牢朝位賓主之間五十步立當車衡擯者三人廟中將幣三享王禮一祼不酢饗禮五獻食禮五舉出入三積一問一勞諸男執蒲璧其他皆如諸子之儀凡大國之孤執皮帛以繼小國之君出入三積不問一勞朝位當車前不交擯廟中無相以酒禮之其他皆視小國之君凡諸侯之卿其禮各下其君二等以下及其大夫士皆如之邦畿方千里其外方五百里謂之侯服嵗一見其貢祀物又其外方五百里謂之甸服二嵗一見其貢嬪物又其外方五百里謂之男服三嵗一見其貢器物又其外方五百里謂之采服四嵗一見其貢服物又其外方五百里謂之衛服五歲一見其貢材物又其外方五百里謂之要服六嵗一見其貢貨物九州之外謂之蕃國世一見各以其所貴寶為摯王之所以撫邦國諸侯者嵗遍存三嵗遍俯五嵗遍省七歲屬象胥諭言語協辭命九嵗屬瞽史諭書名聽聲音十有一嵗建瑞節同度量成牢禮同數器修法則十有二嵗王巡守殷國凡諸侯之王事辨其位正其等協其禮賓而見之小行人掌邦國賓客之禮籍以待四方之使者令諸侯春入貢秋獻功王親受之各以其國之籍禮之凡諸侯入王則逆勞于畿及郊勞視館將幣為承而擯凡四方之使者大客則擯小客則受其幣而聽其辭使適四方協九儀賓客之禮朝覲宗遇㑹同君之禮也存俯省聘問臣之禮也成六瑞王用瑱圭公用桓圭侯用信圭伯用躬圭子用榖璧男用蒲璧合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好故若國札喪則令賻補之若國凶荒則令賙委之若國師役則令槁禬之若國有福事則令慶賀之若國有禍烖則令哀弔之凡此五物者治其事故及其萬民之利害為一書其禮俗政事教治刑禁之逆順為一書其悖逆暴亂作慝猶犯令者為一書其札喪凶荒厄貧為一書其康樂和親安平為一書凡此五物者每國辨異之以反命於王以周知天下之故環人舍則授館有任器則令環之管子五行篇天子出令命行人內御注行人行使之官也韓非子外儲說衛君入朝於周周行人問其號對曰諸侯辟疆周行人却之曰諸侯不得與天子同號謹案周制賔客有大小之分鄭康成周禮注大賔要服以內諸侯大客謂其孤卿賈公彥疏云言要服以內諸侯者對要服以外為小賔蕃國世一見是也大客謂大賔下孤卿對行人所云小客大夫士皆得為客此但舉尊者而言據此是六服諸侯皆大賓而九州外之蕃國則小賓也自封建變為郡縣而厯代朝貢者獨有蕃國故賓禮所治與周制多不相凖惟今札薩克諸䝉古咸以勳存王室世守藩封子弟入侍於闕廷丁口悉登於戶版其慶讓黜陟之典實無殊於六服諸侯故理藩院一官所司典制儀式皆即周大小行人之職如諸藩封爵凡親王郡王貝勒貝子公分為五等台吉分為三等皆由院奏請繼襲此即如以九儀辨諸侯之命而等其爵也凡朝期或分三班或分四班皆周而復始嵗十二月咸集以奉元㑹其不分班者則閲年奏請得㫖來覲此即如六服諸侯各以其方嵗見四載而遍也其來朝就館賞賚俸幣之制牧芻廩給之數皆視等級以為差此即如牢禮饗食之有多寡也㑹盟之期漠南諸部則三年遣大臣奉敕以往喀爾喀等部則各副將軍嵗於所部舉行間嵗則以軍營參贊大臣二人分蒞之此即如嵗遍存三嵗遍俯五歲遍省也各部落偶遇嵗荒札薩克設法養贍不足告盟長協濟再不足㑹報到院奏請發帑以濟其乏此即如賙委槁禬以治其事故也蓋惟懷柔化洽所為習禮考義正刑一德者無不同符周典備極精詳是以鱗集仰流比於戶闥同風郅治嫓三代而獨隆矣周禮夏官懷方氏中士八人掌來逺方之民致方貢致逺物而送逆之達之以節治其委積館舍飲食鄭康成注懷來也主來四方之民及其物合方氏中士八人掌達天下之道路通其財利同其數器一其度量除其怨惡同其好善鄭康成注主合同四方之事訓方氏中士四人掌道四方之政事與其上下之志誦四方之傳道正嵗則布而訓四方以觀新物鄭康成注訓道也主教道四方之民志淫行辟則當以政教化正之形方氏中士四人掌制邦國之地域而正其封疆無有華離之地鄭康成注主制四方邦國之形體華讀為􅏠哨之􅏠正之使不􅏠邪離絶謹案懷方氏以下四官皆主和輯四方諸侯亦今理藩院所有事以規制考之合方氏形方氏通財利同好善正封疆當如今旗籍典屬徠逺諸司之職懷方氏治委積館舍而送逆之當如今王㑹柔逺諸司之職訓方氏以教化正淫辟則如今理刑司之職也周禮秋官司盟下士二人掌盟載之法謹案春秋左氏僖五年傳勳在王室藏於盟府杜預注司盟之官孔頴達疏曰諸侯初封必有盟誓之言漢封爵之誓即盟之類僖二十六年傳載在盟府太師職之杜預注太公為太師兼主司盟之官襄十一年傳藏在盟府杜預注司盟之府有賞功之制孔頴達疏曰司盟之府掌藏功勳典䇿故有賞功之制是周之司盟專主諸侯功績至以太師兼掌之其職甚重今䝉古諸部落世次譜系及錫封根源備載於册藏諸內府十年一修近又奉詔纂輯䝉古王公表傳録功旌伐傳示無窮蓋即功勳典䇿藏於盟府之制是今之理藩院亦兼有周司盟之職也逸周書王㑹解成周之㑹相者太史魚大行人皆朝服有繁露郭叔掌為天子菉幣焉孔朝注魚太史名及大行人皆贊相賓客禮儀菉録諸侯之幣也尚書立政夷微盧蒸三亳版尹孔安國傳蠻夷微盧之衆師及亳人之歸文王者三所為之立監及阪地之尹長皆用賢謹案蔡沈書傳謂此即王官之監於諸侯四夷者以尹與監為一官而孔安國則以為微盧亳有監而阪地有尹區之為二疑地當險要及人户繁庶者則立監以治之其職較尊當如今之新疆各路駐劄大臣其地近而事簡者所任略輕則為之設尹如今䝉古地方駐劄司官及察哈爾游牧理事官之類也周禮秋官象胥每翟上士二人中士二人下士八人掌蠻夷閩貊戎狄之國使掌傳王之言而諭說焉以和親之若以時入賓則協其禮與其辭言傳之謹案大行人職稱七嵗屬象胥諭言語協辭命九嵗屬瞽史諭書名聽聲音鄭康成注通言語之官為象胥瞽樂師也史大史小史也書名書文字也古曰名七嵗省而名其象胥九歲省而名其瞽史皆聚於天子之宫教習之也易祓周禮總義謂諭言語則通五方之言語乃象胥之職諭書名則達六書之文乃瞽史之職據此則凡語言文字之不相通者皆當以象胥大史小史教習之而後使命往來咸得以達其辭而諭其志今之䝉古翻譯房唐古忒學蓋即其制特三代以語音與字書分兩職今則本方語以翻譯成文審音辨字相為條貫並不必分曹肄習故仍以象胥互著於此又别見㑹同四譯館篇而大史小史則别繫諸翰林院及欽天監篇內焉說各詳本篇周禮地官山虞每大山中士四人下士八人中山下士六人小山下士二人若大田獵則萊山田之野及弊田植虞旗於中致禽而珥焉賈公彥疏大田獵謂王親行田在山則山虞於可陳之處芟除草木澤虞每大澤大藪中士四人下士八人中如中川之衡下士六人小如小川之衡下士二人若大田獵則萊澤野及弊田植虞旗以屬禽迹人中士四人下士八人掌邦田之地政為之厲禁而守之凡田獵者受令焉鄭康成注田之地若今苑也賈公彥疏迹人主迹知禽獸之處有禽獸之處則為苑囿以林木為藩籬使其地之民遮厲守之謹案三代天子搜狩之地必有廣阜大藪以陳六軍詩所謂東有甫草駕言行狩是也今木蘭之地泉甘壤沃靈囿天開茇舍治兵適符古制圍場總管主成梁除道其職近於山澤之虞而禁令所頒與迹人之掌邦田地政者尤為相合以其為理藩院統轄故沿革併附著於此表云秦册府元龜秦置典客掌諸侯及歸義蠻夷又有典屬國掌蠻夷降者謹案册府元龜謂秦置典客掌諸侯及歸義蠻夷考戰國䇿秦王見燕使者咸陽宫乃朝服設九賔注禮大小行人以九儀掌賔客之禮吳師道授正曰大事記相如奉璧入秦秦王齊五日後乃設九賔禮於庭注引正義韋昭云九賔則周禮九儀也劉伯莊云九賓者周王之備禮天子臨軒九服同㑹秦趙安得九賓但亦陳設車輅文物爾不得以周禮九賓儀為釋愚按前漢書大行設九賓恐即秦儀也據師道此說則秦人典客亦猶掌大行人之遺法叔孫通傳所謂大行設九賓臚句傳乃秦法之沿于漢初者也漢荀悅漢紀高后紀吕祿遂解印屬典客而以兵授勃七年典客馮叔為御史大夫惠帝紀典客掌諸侯歸義蠻夷景帝更名大行武帝更名大鴻臚武帝紀單于背約冦邊無已於是上議伐之大行王恢曰胸奴和親率不過數嵗請擊之漢書百官公卿表典客掌諸歸義蠻夷景帝中六年更名大行令武帝太初元年更名大鴻臚屬官有行人譯官令丞武帝太初元年更名行人為大行令謹案漢書百官公卿表典客掌諸歸義蠻夷景帝中六年更名大行令武帝大初元年更名大鴻臚是武帝時始有大鴻臚考荀悅漢紀景帝紀中元年春令諸侯王薨及列侯初封及之國大鴻臚奏諡誄䇿列侯薨及諸侯王太𫝊初除之官大行奏諡誄䇿王薨遣光祿大夫弔襚祠賵視喪事因立嗣列侯薨遣太中大夫弔祠視喪事立祠據此則景帝中元年已有大鴻臚不自武帝始且奏諡誄䇿或用大鴻臚或用大行令似大鴻臚與大行令各為一官大行令非大鴻臚之更名矣均與漢表不同漢書應劭注皇帝延諸侯王賓王諸侯皆屬大鴻臚太平御覽韋昭辨釋名曰腹前肥者臚言以京師為腹心王侯外國為四體以養之也辨云鴻臚本故典客掌賓禮鴻大也臚陳序也欲以陳序賓客也程大昌雍録藁街在朱雀街西與鴻臚寺近漢書臣瓚注大行是官名掌九儀之制以賓諸侯荀悅漢紀武帝紀後元二年濟北王寬坐悖人倫祝詛有司請誅上遣大鴻臚利召王哀帝紀建平元年太后素怒中山遣御史按驗考訊卒無所得更使中謁者令史陳立與丞相長史大鴻臚丞親治其事揚雄大鴻臚針蕩蕩唐虞經通垓極陶陶百王天工人力畫為上下羅條百職人有才能寮有級差遷能於官各有攸宜主以不廢官以不隳昔在三代二季不蠲穢德慢道署非其人人失其材職反其官寀寮荒耄國政如漫文不可武武不可文大小上下不可奪倫鴻臣司爵敢告在鄰謹案楊雄針謂鴻臣司爵柏梁詩云郡國吏能差次之則漢之鴻臚又掌官秩蓋鴻臚典九儀之制以賓諸侯則貴賤秩次因兼掌焉律志云權衡規矩凖繩職在大行漢紀權衡銖兩斤鈞石職在鴻臚亦以鴻臚主陳序不凌亂也袁宏後漢紀明帝紀楚王英徙丹陽涇縣遣大鴻臚持節護送英丹陽章帝紀東平王蒼與諸王俱至滎陽使大鴻臚持節郊迎嵗餘大鴻臚奏遣諸王歸國東平王蒼薨乃遣大鴻臚持節護喪順帝紀漢安元年以胸奴主義王兜樓儲為南單于立於京師使大鴻臚授印綬引上殿殤帝紀鄧隲征羌還京師詔大鴻臚親迎洪適𨽻續劉寬碑陰門生大尚書書洪氏云碑中有大尚書張祗祝睦碑亦云拜大尚書考東京官制建武中三公皆去大惟鴻臚司農長秋有大字後漢書百官志大鴻臚卿一人中二千石掌諸侯及四方歸義蠻夷諸王入朝當郊迎典其禮儀皇子拜王贊授印綬及拜諸侯諸侯嗣子及四方夷狄封者臺下鴻臚召拜之王薨則使弔之及拜王嗣謹案秦典客漢大鴻臚大行令職司賓禮本出周大小行人之職故諸侯王列侯及蕃國之歸義者皆其所屬考之於史凡諸侯王封拜繼襲削奪訊治弔祭誄諡之典皆以鴻臚主之今宗藩政令已聽治於宗人府而䝉古王公撫封世及無殊漢之異姓諸侯王則理藩院實兼有大鴻臚之一職至當時接待蕃國史未詳其儀制據漢書西域傳載大鴻臚議募囚徒送胸奴使者又鴻臚領郡國邸而胸奴傳言單于來朝就邸其為鴻臚所主可知是胸奴諸國館餼送迎之事亦當𨽻於鴻臚也漢書百官公卿表典屬國掌蠻夷降者武帝元狩三年昆邪王降復增屬國置都尉丞候千人屬官九譯令成帝河平元年省併大鴻臚漢書武帝本紀胸奴昆邪王降置五屬國以處之顔師古注凡言屬國者存其國號而屬漢朝故曰屬國漢書霍去病傳因其故俗為屬國顔師古注不改其本國之俗而屬於漢故號屬國王應麟玉海典屬國卿也所以統邊郡屬國都尉等官也漢書昭帝本紀蘇武奉使全節以為典屬國如淳曰以武久在外國知邊事故令典主諸屬國常惠列傳代蘇武為典屬國明習外國事勤勞數有功為右將軍典屬國如故馮奉世列傳常惠薨奉世代為右將軍典屬國謹案漢以蠻夷降者置屬國處之沿邊諸郡皆仍其故名而設都尉治之據兩漢地里志所載安定上郡天水五原張掖西河北地屬國以處胸奴降人金城屬國以處降羌廣漢蜀郡犍為屬國以處西南夷降人其中酋長有仍其位號者胸奴傳屬國千長義渠王胡三省通鑑注屬國義渠之君長是也有授以漢官者景武昭宣元成功臣表輝渠侯雷電故胸奴歸義以五原屬國都尉與二師將軍擊胸奴是也有以部落之長率兵從征者功臣表昆侯渠復參以屬國大首擊胸奴侯是也蓋以屬國都尉分治而典屬國居中統總之今自西南諸部落皆因其本俗設官駐劄控置撫綏與漢之屬國僅列置邊郡者其幅員之廣狹不同而規制則差可相擬是今之理藩院正漢典屬國卿之職也宋書百官志漢儀尚書郎一人主胸奴單于營部一人主羌夷吏民胸奴單于宣帝之世保塞內附成帝世單于還北庭矣一郎主胸奴單于營部則置郎疑是光武時所主胸奴是南單于也謹案漢以尚書郎主胸奴單于營部正如今理藩院司員之職蓋是時呼韓單于留居光祿塞下南單于亦入居雲中後徙西河美稷授地給食同於藩臣故特設官以領其事也後漢書胸奴列傳南單于詣闕奉藩求使者監護始置使胸奴中郎將衛護之中郎將置安集掾將弛刑五千人隨單于嵗盡輒遣奉奏送侍子入朝中郎將從事一人將領詣闕後漢書百官志使胸奴中郎將一人比二千石主護南單于置從事二人有事隨事增之掾隨事為員護烏桓校尉一人比二千石主烏桓應劭漢官曰擁節長史一人司馬二人皆百石後漢書烏桓列傳烏桓願留宿衛於是封其渠率為侯王君長者八十一人布於緣邊諸郡始復置校尉并領鮮卑賞賜質子嵗時互市焉謹案漢自胸奴烏桓並塞稱藩始置中郎將校尉諸官以衛護之秩皆比二千石蓋如今各處駐劄大臣之比至安集掾及長史司馬其秩較卑而職在和輯藩部則今烏蘭哈達等處司官及察哈爾游牧理事官頗為近之云三國三國魏志崔林列傳林遷大鴻臚龜兹王遣侍子來朝褒賞甚厚餘國各遣子來朝間使連屬林乃移書燉煌喻指并録前世待遇諸國豐約故事使有恆常玉海大鴻臚魏韓宣崔林謹案魏志諸王傳載中山王衮薨大鴻臚持節典護喪事楚王彪有罪大鴻臚持節賜書切責又陳思王植傳稱諸奏植罪狀在大鴻臚者皆削除之是魏世鴻臚所掌諸侯王封拜慶讓之典一如漢制而如崔林傳所載則接待外藩亦其專司蓋猶未失大小行人之舊職也晉晉書職官志大鴻臚統大行等令及江左有事則權置無事則省周禮象胥晉干寶注曰今鴻臚謹案晉初鴻臚尚沿漢魏之制自渡江以後諸侯王既不分封外藩亦無復朝覲聘問之禮故遂罷而不設偏安之世僻處一隅宜規模之益以狹隘也宋齊梁陳謹案江左諸朝鴻臚惟掌導護贊拜不復主賓客之禮故專繫諸鴻臚寺篇不列於此表北魏杜佑通典後魏大鴻臚第三品大鴻臚少卿第四品楊衒之洛陽伽藍記永橋以南圜邱以北伊洛之間夾御道有四夷館道東有四館一名金陵二名燕然三名扶桑四名崦嵫道西有四里一曰歸正二曰歸德三曰慕化四曰慕義吳人投國者處金陵館三年已後賜宅歸正里北夷來附者處燕然館三年已後賜宅歸德里正光元年蠕蠕主郁久閭阿那肱來朝執事者莫知所處中書舍人常景議云咸寧中單于來朝晉世處之王公特進之下可班那肱蕃王儀同之間朝廷從其議北夷酋長遣子入侍者常秋來春去避中國之熱時人謂之雁臣東夷來附者處扶桑館賜宅慕化里西夷來附者處崦嵫館賜宅慕義里自葱嶺已西莫不歡附商胡販客日奔塞下樂中國土風因而宅者不可勝數附化之民萬有餘家門巷修整閶闔填列謹案北魏於外藩入朝者皆有館以處之魏書蠕蠕傳云蠕蠕投化在京館者任其去留又云蠕蠕可汗婆羅門入朝死於洛南之館是也洛陽伽藍記所載最詳其間疑不無夸飾然規制自可考見特不言以何官掌之據魏書高句麗傳又稱高祖使大鴻臚拜高雲為高句麗王是魏世鴻臚實主藩國一切館餼朝謁當為其專職蓋如今之理藩院矣册府元龜延和二年九月詔兼大鴻臚卿崔頤持節拜征虜將軍楊難當為征南大將軍儀同三司封南秦王太和二年三月遣鴻臚卿劉歸謁者張察拜河南公梁彌機為征南大將軍西戎校尉梁益二州牧河南公岩昌王謹案初學記鴻臚五代史百官志云至梁加卿字曰鴻臚卿除大字後魏又加大字考册府元龜於魏延和二年稱大鴻臚卿崔頤于魏太和二年稱鴻臚卿劉歸同為魏制而一加大字一去大字與初學記不合魏書崔挺列傳遷典屬國下大夫魏書盧淵列傳淵拜典屬國謹案北魏復置典屬國官而官氏志不載今据列傳採入其所掌已不可詳當亦即大鴻臚之分職也北齊隋書百官志後齊鴻臚寺置卿少卿丞各一人掌蕃客朝㑹吉凶弔祭統典客典寺等署令丞典寺署有僧祗部丞一人昭元寺掌諸佛教置大統一人統一人都維那一人謹案葉夢得石林燕語東漢以來九卿官府皆名曰寺鴻臚其一也本以待四夷賓客故摩騰竺法蘭自西域以佛經至舍於鴻臚今洛中白馬寺即漢鴻臚舊地僧居槩稱寺蓋本諸此云云據此是僧徒初入中國原待以蕃客之禮故舍之鴻臚寺至北魏而西域沙門來者益衆因立監福曹又改為昭元備置官屬以斷僧務見魏書釋老志北齊設典寺署令丞僧祗部丞仍𨽻於鴻臚俾主其事蓋猶本東漢之遺制今喇嘛畨僧品秩承襲朝貢之禮悉統領於理藩院亦即其例至昭元寺專以僧徒總領其制大統統都維那諸名則猶今之扎薩克大喇嘛以下各分等級也後周通典後周官品正五命秋官賓部中大夫正四命秋官小賓部下大夫正三命秋官小賓部上士掌大賓客之儀隋書韋師列傳師在周為賓曹參軍雅知諸蕃風俗及山川險易其有朝貢必接對論其國俗如視諸掌夷人驚服無敢隱情徙為賓部大夫謹案後周秋官有蕃部賓部俱出周行人之職今蕃部别繫諸禮部㑹同四譯館篇而賓部則專司賓禮當時出使專對皆以此職充之周書武帝紀天和三年小賓部元暉使於齊建德元年小賓部賀遂禮使於齊韋師傳所載可以相證與前代之大鴻臚掌蕃國朝㑹者尤為吻合今故著之於此表隋隋書百官志鴻臚寺置卿少卿各一人統典客崇元署各置令典客二人崇元一人煬帝改典客署為典蕃署隋書蘇䕫列傳時蠻夷朝貢前後相屬帝嘗從容謂宇文述虞世基等曰四夷率服觀禮華夏鴻臚之職須歸令望寧有可以接對賓客者為之乎咸以蘷對即日拜鴻臚少卿謹案隋代鴻臚尚沿舊制掌賓客之禮隋書刑法志載楊素與鴻臚少卿陳延不平經蕃客館庭中有馬屎旋以白帝帝大怒搒捶陳延幾斃又突厥傳處羅可汗母向氏入朝留京師每舍之鴻臚寺可知外藩朝覲者其館舍廪賜皆屬之鴻臚猶與今理藩院職掌為近也唐舊唐書職官志鴻臚寺龍朔改為同文寺光宅曰司賓寺神龍復卿一人少卿二人丞二人主簿一人録事二人掌賓客之事凡四方夷狄君長朝見者辨其等位以賓待之凡夷狄君長之子襲官爵者皆辨其嫡庶詳其可否若諸蕃人酋渠有封禮命皆受册而往其國凡天下寺觀三綱及京都大德皆取其道德高妙為衆所推者俱申尚書祠部典客署令一人丞一人掌四夷歸化在蕃者之名數凡朝貢宴享送迎皆預焉凡酋渠首領朝見者皆館供之唐㑹要天寶十三年三月二十七日禮賓院令鴻臚寺掌管謹案自東晉迄於唐諸侯王皆僅存空名無分藩之制故封授削奪之政令俱改歸宗正不屬鴻臚所存者惟蕃國朝覲之禮猶大行人之一職觀唐書回紇傳乾元後回紇使者相望留舍鴻臚又回紇武義可汗來逆公主其下七百人皆聽入朝舍鴻臚新羅傳鴻臚寺籍質子及學生嵗滿者皆還之資治通鑑代宗永泰七年正月回紇使者擅出鴻臚寺掠人子女所司禁之毆擊所司七月回紇又擅出鴻臚寺逐長安令卲說奪其馬是當時屬國之朝見館餼皆在鴻臚又諸藩册立㑹盟弔祭亦多以鴻臚充使唐書突厥傳鴻臚卿劉善册思摩可汗西突厥傳鴻臚少卿劉善册咄陸可汗吐蕃傳崔漢衡為鴻臚卿與吐蕃㑹盟境上回紇傳回紇懷信可汗死鴻臚少卿孫杲臨弔黠戛斯傳鴻臚卿李業持節册黠戛斯為英武誠明可汗即或以他官充使亦必兼鴻臚之職册府元龜開元二十五年新羅王金興光卒其子承慶嗣位命贊善大夫邢璹攝鴻臚少卿往其國行弔祭册立之禮是也雖唐代吐蕃回紇諸部皆强盛跋扈終未得其要領難語于威德綏懷而考其規制亦今理藩院之比也司馬光資治通鑑㑹昌五年大秦穆護祅僧皆勒歸俗胡三省注大秦穆護又釋氏之外教如回鶻摩尼之類唐制祠部嵗再祀磧西諸州火祅而禁民祈祭官品今有祅正蓋主祅僧也姚寬西溪叢語唐貞觀五年有傳法穆護何祿將祅教詣闕敕長安崇教坊立祅寺號大秦寺又名波斯寺祅之有正想在唐世唐書回鶻列傳詔回鶻營功德使在二京者悉冠帶之謹案唐之祅僧出自西域為釋氏外教蓋如今之紅教喇嘛其祅正當以僧徒充之如今陜甘洮岷諸寺畨僧設都綱僧綱僧正之例故不見於百官志摩尼之教本出回鶻即今回教所自始當時回鶻以摩尼入朝留居京師故兩京各置回鶻營功德使以統之疑亦𨽻於鴻臚寺也唐書西域列傳箇失蜜王遣使者物理多來丐王册鴻臚譯以聞唐書回鶻列傳回鶻可汗遣其妹逆主且納聘帝饗回紇公主入銀臺門譯史傳導入拜謁已又譯史傳問乃至宴所謹案唐鴻臚寺譯史主譯西域諸國文字蓋如今之有唐古忒學也五季未置宋未置謹案宋代北有遼金西有夏國疆土最為狹隘兼之兵力孱弱不能服逺並無外藩朝覲之事故鴻臚但存空名其偶一通貢者惟有高麗安南諸國以同文館及都亭懷逺諸驛分主之而已今已别著於禮部四譯館篇不復載之此表遼遼史百官志北面部族官五院部有知五院事在朝曰北大王院六院部有知六院事在朝曰南大王院伊實部帳名原作乙室今改正部在朝曰伊實王府有伊實府都古稜䝉古語盈滿也原作迪骨里今改正節度使司奚六部在朝曰奚王府有二詳衮原作常衮今依字面改正有二宰相又有圖哩滿洲語黑豆也原作吐里今改正太尉有奚六部漢軍詳衮原作詳穩今依字面改正有奚伊喇滿洲語糜也原作拽剌今改正詳衮有錫林塔拉官滿洲語錫林精鋭也塔拉野外也原作先離撻覽今改正謹案遼之諸部族太祖二十部聖宗三十四部又附庸十部各有分壤地廣族繁遼史營衛志謂古者巡守於方嶽五服之君各述其職遼之部族似之與今䝉古諸部落規制差可相擬特當時皆分𨽻於諸路詳衮統軍招討司不别設官以總領之惟五院六院伊實奚為四大部族故在朝各置大王府以治其事謂之四大王府蓋即如今理藩院職掌也南北二王院又互見户部篇遼史百官志北面坊場等官圍場都太師圍場都管圍場使圍場副使已上場官謹案遼史穆宗紀載有虞人掌鹿鹿人獐人彘人狼人鷹人豕人鶻人喚鹿人諸官而他紀傳不槩見疑亦各因其所掌以立名並非定職惟圍場都太師以下專設以供獮狩之事即今圍場總管所由昉也金金史兵志太祖始以三百户為穆昆滿洲語族也蓋族長之轉原作謀克今改正穆昆十為明安滿洲語千也蓋千夫長之稱原作猛安今改正繼而諸部來降率用明安穆昆之名以授其首領而部伍其人時東北路部族乣軍二部五乣户五千五百八十五其他部族數皆稱是西北西南二路之乣軍十其諸路皆在上京之鄙或置總管府或置節度使謹案金諸部族皆分置明安穆昆而各統以節度使詳衮額爾奇木解見內閣篇之職百官志有諸部族節度使各一員統制各部諸乣詳袞各一員守戍邊堡諸額爾奇木司額爾奇木各一員分掌部族村寨事蓋亦猶今䝉古諸藩分旗編戶之制特其政令惟掌於西北西南東北三路招討司而在京並無綜轄之官以兵志考之疑當兼𨽻於尚書省及樞密院也金史伊喇道列傳道改西北路招討使初諸部有獄訟招討司例遣胥吏按問往往為姦利道請專設一官上嘉納之招討司設勘事官自此始謹案金置勘事官以平諸部獄訟蓋即如今察哈爾游牧處之理事官也元元史百官志宣政院秩從一品掌釋教僧徒及吐蕃之境而𨽻治之其用人則自為選其為選則軍民通攝僧俗並用至元初立總制院而領以國師二十五年因唐制吐蕃來朝見於宣政殿之前更名宣政院置院使二員同知二員副使二員參議二員經厯二員都事四員管勾一員照磨一員二十六年置斷事官四員二十八年增僉院同僉各一員元貞元年增院判一員大德四年罷斷事官至大初省院使一員至治三年置院使六員天厯二年罷功德使司歸宣政定置院使十一員從一品同知二員正上品副使二員從二品僉院二員正三品同僉三員正四品院判三員正五品參議二員正五品經厯二員從五品都事三員從七品照磨一員管勾一員並正八品掾史十五人䝉古筆且齊解見吏部篇二人回回掾史二人克埒穆爾齊解見吏部篇四人知印二人宣使十五人典吏有差斷事官四員從三品經厯知事各一員至元二十五年始置大都提舉資善庫秩從五品達嚕噶齊解見戶部篇一員提舉一員同提舉一員副提舉一員掌錢帛之事至元二十六年置以上屬宣政院通政院秩從二品國初置驛以給使傳設托克托和斯䝉古語托克托定也和斯雙也原作脫脫禾孫今改正以辨奸僞至元七年初立諸站都統領使司以總之設官六員十三年改通政院至大四年罷是年仍置止管達勒達滿洲語遮蔽處也原作達達今改正站齊原作站赤今依字面改正延祐七年仍領漢人站齊謹案元初以兵威剪滅西北各部即分封諸王於其地故親藩錫土多在邊陲元史稱國初親王分封有其地極逺去京師數萬里驛騎急行二百餘日方達京師者今䝉古部落大扺皆元諸王分地如敖漢扎賴持杜爾伯持郭爾羅斯為遼王分地喀喇沁土默特為惠寧王分地故當時諸王駙馬投下䝉古色目人一切公事皆𨽻屬於大宗正府詳見宗人府篇其應給嵗賜諸物或别置總管府以治之惟宣政院專領西僧及吐蕃境內諸事正今理藩院之一職其所屬有斷事官蓋即如今理事官資善庫則如今之銀庫也至通政院所管達勒達站齊即如今䝉古驛站而托克托和斯於各站專主郵政元志載吐蕃等處宣慰司都元帥屬若寧河積石烏思藏諸地皆有其官可見使命往來典司有在今以通政院設署京師故分列兵部馬館條下而托克托和斯則專繫於此以著䝉古驛站設官之沿革焉元史百官志宣徽院秩正三品掌宴享宗戚賓客之事及諸王宿衛齊哩克昆䝉古語齊哩克兵也昆人也原作怯憐今改正口糧食所屬內外司屬用人則人自為選置院使六員同知一員副使二員僉院二員同僉二員院判二員經厯二員都事三員照磨一員謹案元宣徽院主供玉食之需當為今內務府職守而賓客之事亦兼主之元史顯宗傳稱晉王在藩邸元貞元年塔塔爾部原作塔塔兒部今依八旗姓氏通譜改正年穀不熟檄宣徽院賑之則䝉古諸部灾歉宣徽院實司其賑恤正與理藩院旗籍司所掌相近今故互見於此明未置謹案明自成祖措置失宜棄大寧以與三衛自是邊牆之外皆為甌脫內地戍邏僅及關門而止元之子孫於漠北相繼稱汗至我朝破察哈爾林丹汗而始滅終明之世雖使命往來有同敵國未嘗臣服其别部若額森䝉古語平安也原改也先今改正諳達滿洲語夥伴也原作俺答今改正皆雄視一方屢以徑兵入塞至於英宗被執京城受圍明人聚訟盈庭終不能得其要領至西域境壤則第畫嘉峪關而守之雖以哈密近邊之地亦為土魯畨所據棄同異域諸蕃朝貢之禮不修官司亦闕而未置誠由威令不行無以控馭之故也國家聲教四訖奔走偕徠置戍建官盡歸疆索綏懷盛軌固已逺軼漢唐若明之柔懦無策者更為不足比算矣欽定歷代職官表卷十七
