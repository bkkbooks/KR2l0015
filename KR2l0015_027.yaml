  - {type: page-break, offset: 0, content: '', id: KR2l0015_WYG_027-1a, image: WYG0601/WYG0601-0400a.png}
body:
  text: 通政使司表通政使司國朝官制通政使司通政使滿洲漢人各一人滿洲初係二品順治十五年改為三品康熙六年復為二品九年定滿洲漢人俱為正三品副使滿洲漢人各一人滿洲初係三品順治十六年改為四品康熙六年復為三品九年定滿洲漢人俱為正四品參議滿洲漢人各一人滿洲初係品品順治十六年定滿洲漢人俱為正五品掌受天下章奏校閲送閣稽其程限而按其違失有不如式者劾論之順治元年初設通政使滿洲漢人各一人左通政滿洲漢人各一人右通政漢人二人左參議滿洲漢人各二人右參議漢人二人康熙三十八年省漢人右參議一人五十二年省漢人左參議一人乾隆十年省漢人右通政一人十三年省右通政員額改左通政為通政副使又省參議滿洲漢人各一人並去左右銜經厯滿洲漢人各一人正七品知事滿洲漢人各一人初制四品後定為正七品掌出納文移承受案牘經厯初稱司務後改為經厯知事初置滿洲二人漢軍一人後省漢軍員缺乾隆十七年改滿洲知事二人為滿洲漢人各一人筆帖式滿洲六人漢軍二人初制滿洲八人漢軍二人後省滿洲二人職事具吏部篇登聞鼓廳筆帖式滿洲漢軍各一人凡軍民實有寃抑所司不受理擊登聞鼓陳訴者由司核實奏聞下所司昭雪誣控越訴者論如法初順治元年設登聞鼓於都察院門日以御史一人監之十三年移置長安右門外以給事中或御史一人更替管理康熙六十一年始以其事併入通政使司置筆帖式以掌之厯代建置三代周禮夏官大僕下大夫二人掌諸侯之復逆鄭司農云復謂奏事也逆謂受下奏小臣上士四人掌三公及孤卿之復逆賈公彥曰諸侯是賓客其復逆太僕尊官掌之三公孤卿是臣在朝廷故小臣掌之也御僕下士十有二人掌羣吏之逆及庶民之復鄭康成曰羣吏府史以下謹案周官復逆大僕與小臣御僕實分之周太僕與今太僕寺之職不同説詳太僕寺篇蓋以僕臣之朝夕王所者使之出入傳達以防壅蔽與今中外臣僚劄子由奏事處呈遞者其制實相吻合然當時入告之體尚無所區分則大僕掌諸侯之復逆與今通政司受督撫章疏者職掌亦為相近今故著之於表至唐虞納言出入王命為後世尚書之職當如今之內閣及軍機處舊説以通政使司當之非也秦宋書百官志秦冇公車司馬令史記秦始皇本紀制曰可裴駰集解羣臣有所奏請尚書令奏之下有司曰制謹案秦代上書之制史文不詳裴駰此解特據漢法以證之然尚書令實自秦始置以宦者為之始皇本紀又稱百官奏事如故宦者輒從車中可其奏云云當即尚書令主章報之職蓋在廷諸臣有所奏請得由尚書通進也至公車司馬令漢志不詳惟見於沈約宋書考資治通鑑載二世三年章邯使長史司馬欣請事至咸陽留司馬門三日趙髙不見云云是當時郡縣及軍中言事者皆當詣司馬門而公車司馬令主受天下章奏並如漢制矣漢漢書百官公卿表衛尉屬官有公車司馬令丞顔師古注漢官儀曰公車司馬掌殿司馬門天下上事及闕下凡所徴召皆總領之令秩六百石三輔黃圖漢未央長樂甘泉宫四面皆有公車主受章疏之處司馬門凡言司馬者宫垣之內兵衛所在司馬主武事故謂宫之外門為司馬門按漢官衛令諸出入殿門公車司馬門者皆下不如令罰金四兩王莾改公車司馬門曰王路四門分命諫大夫四人受章疏以通下情百官表衛尉屬官有公車司馬令丞漢官儀云公車司馬掌殿司馬門夜檄宫史天下上事及闕下凡所徴召皆總領之令秩六百石程大昌雍録師古曰未央殿雖南嚮而上書奏事謁見之徒皆詣北闕公車司馬亦在此焉是似以北闕為正門矣而又有東闕至於西南兩面無門闕矣關中記曰未央東有蒼龍北有元武闕元武闕即北闕已又有閶闔門止車門有門無闕也至廟記則曰未央有白虎闕屬車闕按漢書蒼龍元武既為東北闕名則夫白虎也者當為西闕矣不知所記孰真也禁中省中漢書章邯使長史請事留司馬門三日師古曰凡言司馬門者宫垣之內兵衛所在四面皆有司馬司馬主武事故總謂宫之外門為司馬門又初元五年令從官給事宫司馬中者得為大父母父母兄弟通籍應劭曰司馬中者宫內門也司馬主武兵禁之意也師古曰司馬門者宫之外門也衛尉有八屯衛候司馬主衛士徼巡宿衛每面各二司馬故謂宫之外門為司馬門每面二司馬是四面八司馬也又張釋之為公車令大子與梁王共車入朝不下司馬門釋之追上劾奏之如淳曰宫衛令諸衛出入殿門公車司馬門者皆下不如令罰金四兩成帝永始四年未央宫東司馬門災案此即是宫門四面皆有司馬門自司馬門內則為禁中孝元之后父名禁避諱改禁中為省中禁者有所禁止也省者察也漢制官於禁中者皆有二尺竹籍記人之年名字物色垂之宫門案省相應乃得入也初元之制凡從官給事官司馬門中得為親屬通籍則夫禁中之門立籍以行案省者正以防禁省察為義也漢書東方朔傳待詔公車顔師古注公車令上書者所詣也司馬光資治通鑑有男子自謂衛太子公車以聞胡三省注公車主受章奏後漢書百官志公車司馬令一人六百石掌宫南闕門凡吏民上章四方貢獻及徴詣公車者丞尉各一人蔡雍獨斷凡羣臣上書於天子有四名一曰章二曰奏三曰表四曰駮議章者稱稽首上書謝恩陳事詣闕通者也奏者京師官但言稽首下言稽首以聞其中所請若罪法案劾公府送御史臺公卿校尉送謁者臺也表者上言臣某言下言臣某誠惶誠恐頓首頓首死罪死罪文多用編兩行文少以五行詣尚書通者也凡章表皆啓封其言密事得皂囊盛其有疑事公卿百官會議其獨執異意者曰駮議謹案漢代上書之制據獨斷所言惟章以詣闕通進當為公車令所受而奏以上御史謁者二臺表以上尚書皆徑送臺省似通達奏牘本非一處然參考史傳及兩漢所遺金石刻文則當時上事實無不由尚書者史記三王世家大司馬臣去病昧死再拜上疏皇帝陛下御史臣光守尚書令奏未央宫制曰下御史六年三月己亥御史臣光守尚書令丞非索隱曰奏狀冇尚書令官位而史闕其名丞非者或尚書左右丞非其名也下御史書到又洪適𨽻釋載後漢史晨祠孔廟碑前云建寧二年三月己酉魯相臣辰長史臣謙頓首死罪上尚書末云臣晨誠惶誠恐頓首頓首死罪死罪上尚書副言太傅太尉司徒司空大司農府樊毅復華下民租碑與此同又無極山碑前云光和四年某月壬子太常臣耽丞敏頓首上尚書末云臣耽愚戇頓首頓首上尚書制曰可太常承書從事十七日丁丑尚書令忠奏雒陽宫光和四年八月辛酉朔十七日丁丑尚書令忠下云云二書所載皆當日文疏格式可知內外章奏每事必經尚書傳逹御史雖稱受公卿奏事而三王世家所列乃與尚書令聯銜則亦仍以尚書為主其謁者奏事惟見於漢書魏相傳所引明堂月令之文相奏明堂月令曰大謁者臣章受詔長樂宫曰令羣臣議天子所服相國臣何御史大夫臣昌謹與將軍臣陵等議云云大謁者臣章奏制曰可疑本漢初舊制其後謁者職司儐贊則所受者但當為公卿朝賀請謝之事而它無預焉故漢之尚書奏下衆事其職實如今之內閣及奏事處也惟是尚書地居禁近非外僚所得出入而公車令總領天下上事當必先受之以送尚書如今本章送閣之比則公車令正如今之通政使司而所謂副言三公府者乃如今之揭帖耳又案漢章奏之式有二其一不加函封如今之中外題本後漢書李雲傳露布上書章懷太子李賢注露布謂不封之即獨斷所謂章表皆啓封者是也其一實封進御如今之摺子蓋始自宣帝令吏民得奏封事其後相承言密事者皆得封上蔡雍傳以皂囊封上竇武傳武奏收曹節長樂五官史朱瑀盜發武奏是也又邉郡兵事警急則有奔命書由驛馳送如今之軍報考丙吉傳稱馭吏嘗出適見驛騎持赤白囊邊郡發奔命書馳來至馭吏因隨驛騎至公車刺取知胸奴入雲中代郡云云是驛上之書亦由公車進納足知公車司馬令實上書者之總滙矣三國三國魏志管寧列傳元年十一月被公車司馬令所下州郡八月甲申詔書徴臣謹案曹魏亦承漢制章奏由尚書通進曹爽傳稱爽白天子轉宣王為太傅欲令尚書奏事先來由已得制其輕重又稱爽得宣王奏事不宣迫窘不知所為侍中許允説爽早自歸罪乃通宣王奏事是其明證也至公車令惟見於管寧傳當亦在司馬門主受章奏之官而徴召詔書並由其行下則又兼司出納之事矣晉晉書職官志衛尉統公車令晉書齊王冏列傳冏率衆入洛頓軍通章署謹案晉制初以通事舍人掌呈奏案而南史王韶之傳稱晉帝自孝武以來常居內殿武官主書於中通呈則後又改用武人然此皆居中呈進之職其在外受章奏者史不詳為何官以厯代通制考之當亦屬之公車令也至齊王冏傳所云通章署疑即通章表之地故有此名而規制已不可考今附見於此以偹參核焉宋齊梁陳宋書百官志公車令一人掌受章奏𨽻侍中本秦漢公車司馬令晉江左以來直言公車令南齊書百官志公車令一人屬起部亦屬領軍隋書百官志梁衛尉卿統公車司馬令陳承梁皆循其制官南史顔師伯列傳師伯子舉周旋寒人張竒為公車令上以竒資品不當使兼市買丞以蔡道惠代之謹案劉宋公車令𨽻侍中後世以通進銀臺司屬門下省者權輿蓋本於此至宋孝武以公車令資品失序至親為擇人除授當亦因其有通呈章奏之責故特重其選耳北魏魏書楊津列傳轉振威將軍領監曹奏事令魏書崔挺列傳挺為中書侍郎轉登聞令謹案魏世奏事令登聞令二職俱不載於官氏志僅列傳中一見之循名核實奏事令當主受章奏蓋即前代公車令之職登聞令當掌達寃訴則如今之登聞鼓廳也北齊隋書百官志後齊衛尉寺領公車署令掌尚書所不理有枉屈經判奏聞謹案北齊公車令專令奏聞枉屈則所司僅如後世之監登聞鼓院逮隋而益為冗職無復秦漢受納章疏之任矣後周無考隋隋書百官志煬帝置謁者臺大夫一人通事謁者二十人尋詔門下內史御史司𨽻謁者五司監受表以為恆式不復專謁者矣謹案南北朝中外章疏居中通呈者大抵屬之中書門下省而在外受事之職則其制不詳至隋而以門下內史御史司𨽻謁者五官同主受表則所掌益紛意當時必各有應行承受之事分析立制觀隋書紀傳所載有於朝堂上表者陸知命傳詣朝堂上表請使髙麗有於建國門上表者煬帝紀奉信郎崔民象於建國門上表諫並非一地殆亦以所主者之不同耳至張虔威傳稱虔威為謁者大夫淮南太守楊綝與十餘人同見帝問虔威首立者為誰虔威下殿審視而答帝曰卿為謁者不識參見人何也對曰臣非不識但慮不審所以不敢輕對據此則凡朝參引對皆謁者司之正如今之奏事處又不但傳達章奏已也唐唐六典唐朝廢謁者臺改謁者謂通事舍人𨽻四方館屬中書省掌朝見引納凡四方通表皆受而進之謹案唐通事舍人據六典掌朝見引納則兼今奏事處之職凡近臣入侍文武就列則引以進退而告其拜起出入之節則兼今鴻臚寺之職華夷納貢受而進之則兼今四譯館之職惟四方通表受而進之則今通政使之職也晏殊類要舊儀四方館於通事舍人中以宿長一人總知館事謂之館主凡四方貢納及章表皆受而進之唐自中世以後始以他官判四方館事胡三省資治通鑑注唐制凡四方章表皆閣門受而進之資治通鑑唐懿宗咸通十三年五月國子司業韋殷裕詣閣門告郭淑妃弟敬述隂事上大怒杖殺殷裕閣門使田獻銛奪紫改橋陵使以其受殷裕狀故也謹案唐代四方館及閣門俱得受四方章表而不詳其異同之制考唐自中世以後京僚上奏大抵在閣門投進如韓愈集沂國公先廟碑稱詣東上閣門拜疏辭謝元微之集論西川討賊等表吕溫集進農書表文苑英華載于邵論潘炎表俱云詣東上閣門拜表以聞其閣門使則以宦者為之當屬內諸司使之一蓋唐諸帝常御大明宫而東上閣門西上閣門在宣政殿左右次西曰延英門宣政之北曰紫宸門其右光順門其內紫宸殿殿東曰左銀臺門西曰右銀臺門當時奏事自閣門以外亦有詣延英門者舊唐書代宗紀廣德二年自三月一日廢朝至於晦曰百竂詣延英門通名起居亦有詣光順門者韓愈論權停選舉狀詣光順門奉狀以聞而右銀臺門亦有客省以處上書言事者見舊唐書德宗紀據通鑑于頔上表請罪閣門以無印引不受是必諸司門籍內引各有定所故分地承受而以閣門總領之蓋如今之奏事處至四方館所受章表則惟主在外之節鎮州郡以至藩國朝貢而京官不與焉蓋如今之通政使司也又案裴庭裕東觀奏記載李珏左遷下邳令丁母憂免喪諸侯羔鴈四府齊至門皆不就牛僧孺為武昌節度使奏章先達銀臺授殿中侍御史掌書記而劉肅大唐新語亦稱李輔國栖止帷幄宣傳詔命常於銀臺門決事蓋唐之銀臺門在紫宸殿左右迫近元武門密邇內禁門外又有客省以處上書言事之人疑閣門所受章奏由此通進者為多故文人紀事每舉此以為詞而宋遂採其名以為官號也唐六典知匭使掌申天下之寃滯以達萬人之情狀立匭之制一房四面各以方色東曰延恩懷材抱器希於聞達者投之南曰招諫匡正補過禆於政理者投之西曰申寃懷寃負屈無辜受刑者投之北曰通元獻賦作頌諭以大道及涉於元象者投之初置有四門其制稍大難於往來後遂小其制度同為一匭依方色辨之其匭出以辰前入以未後舊唐書職官志知匭使天后置匭以達寃滯其制一房四面各以方色東曰延恩西曰申寃南曰招諫北曰通元所以申天下之寃滯達萬人之情狀蓋古進善旌誹謗木之意也天寶九年改匭為獻納乾元元年復名曰匭垂拱已來常以諫議大夫及補闕拾遺一人充使受納訴狀每日暮進內而晨出之也新唐書百官志武后垂拱四年鑄銅匭四塗以方色列於朝堂青匭曰延恩在東告養人勸農之事者投之丹匭曰招諫在南論時政得失者投之白匭曰伸寃在西陳抑屈者投之黑匭曰通元在北告天文祕謀者投之以諫議大夫補闕拾遺一人充使知匭事御史中丞侍御史一人為理匭使其後同為一匭天寶九載元宗以匭聲近鬼改理匭使為獻納使乾元元年復舊寶應元年命中書門下擇正直清白一人知匭以給事中中書舍人為理匭使建中二年以御史中丞為理匭使諫議大夫一人為知匭使投匭者使先驗副本開成三年知匭使李中敏以為非所以廣聰明而慮幽枉也乃奏罷驗副封謹案唐創置匭函列於朝堂設官掌之以達寃滯蓋即今登聞鼓廳所自始然考文苑英華載李雍妻溫氏為夫請罪表有云匭使朝堂潛皆守捉號天訴地誰肯為聞則是當時雖有此制抱寃者仍多為權勢遏抑不能自通而新唐書宦官傳載李涉投匭言吐突承璀等寃狀致為知匭使孔戣詰責不受則宵人反得借此以行私於立法之意殊為乖剌至册府元龜載河南參軍鄭銑朱陽丞郭仙舟投匭獻詩而揚談進孝烏頌杜甫進西嶽賦亦嘗投延恩匭則其後并為文人媒衒之地益非達情納諫之本指矣劉肅大唐新語大理寺直王景初與刑部郎中唐枝議讞不平景初坐貶潭州司户參軍制下景初撾登聞鼓稱寃再貶昭州司户制曰不遵嚴譴輒冒登聞以懲不恭也雍録登聞鼓肺石唐六典大明宫有含元殿有兩閣左曰翔鸞右曰棲鳯兩閣下皆為朝堂東朝堂置肺石西朝堂置登聞鼓太極宫之太極殿其朝堂亦皆夾殿而左右對出故鼓石皆在殿旁朝堂之內也即六典所敘謂大明悉同承天之制者也沈括筆談曰唐長安故宫闕前有唐肺石尚在其制如佛寺所擊響石甚大可長八九尺形如垂肺即秋官大司冦以肺石達窮民者也原其義乃伸寃者擊之如今撾登聞鼓也括之此言必有所本然朝堂不在殿門之外此石何由外出豈其唐亡宫殿已廢或欲移而它之緣重而棄乃在闕外耶因其言而知肺石形象亦略有補然恐沈未得確也唐之有登聞鼓自髙宗始會要曰時有抱屈人賫鼓於朝堂訴事乃命東西廊朝堂皆置鼓則不獨太極大明兩宫有之雖東洛朝堂亦有也按通典刑法門載隋文帝制曰四方寃訟州縣及省不為治者聽撾登聞鼓有司録狀以聞然則晉隋問已嘗置鼓矣會要謂抱屈人賫鼓詣堂當是唐人知隋世已自有鼓許之訴事故賫鼓自詣也然則朝堂置鼓已在唐前矣沈獨以鼓例石是但知登聞院有鼓而不知西洛朝堂已自有石也六典於刑部又曰寃滯不達聽撾登聞鼓又惸獨老幼不能自伸者乃立肺石之下立石者左監門衛奏聞撾鼓者右監門衛奏聞然則鼓可撾矣而肺不可擊也但見人立石旁即知其有寃欲直也垂拱元年敕朝堂登聞鼓及肺石不須防守其有撾鼓立石者令御史受狀為奏則與沈語又復乖異也沈以意料而六典會要自載其時制法其可疑可信固有間矣五季馬端臨文獻通考石晉有為卿監專掌判四方館者謹案五季制度草略而判四方館一官尚沿唐舊當亦兼掌四方章表及外藩朝貢之事今故互見於此别詳禮部會同四譯館篇五代史蕭希甫列傳明宗召希甫為諫議大夫復置匭函以希甫為使希甫建言自兵亂相乘侵凌欺奪何可勝紀匭函一出投訴必多乃自天成元年四月以前大辟已上皆赦除之然後出匭函以示衆宋宋史職官志通進司𨽻給事中掌受三省樞密院六曹寺監百司奏牘文武近臣表疏及章奏房所領天下章奏案牘具事目進呈而頒布於中外進奏院𨽻給事中掌受詔敕及三省樞密院宣劄六曹寺監百司符牒頒於諸路凡章奏至則具事目上門下省若案牘及申稟文書則分納諸官司凡奏牘違戾法式者貼説以進熙寧四年詔應朝廷擢用材能賞功罰罪事可懲勸者中書檢正樞密院檢詳官月以事狀録付院謄報天下元祐初罷之紹聖元年詔如熙寧舊條靖康元年詔諸道監司帥守文字應邊防機密急切事許進奏院直赴通進司投進舊制通進銀臺司知司官二人兩制以上充永樂大典宋會要通進司在垂拱殿門內堂受銀臺司所領天下章奏案牘閣門京百司文武近臣表疏進御復頒布之內侍二人領之又有樞密院令史四人銀臺司掌受天下奏狀案牘抄寫條目進御發付糾其違失樞密院知事二人書令史八人貼房十一人掌之太宗淳化四年八月二十一日詔銀臺司承受奏狀批鑿事宜發付中書樞密院三司外仍逐日具所承領奏都數一本進內所發逐處奏狀係急速事限五日常事限半月仍令逐處行遣訖旋具事宜關報銀臺司點檢勾鑿有稽滯者依條舉奏其年閏十月詔中書樞密院三司各置急慢公事板簿急事限次月六日慢事限次月十六日送銀臺司重行點檢自是止令據板簿檢勘更不關報江少虞事實類苑銀臺司兼門下封駮乃給事中之職當𨽻門下省故事乃𨽻樞密院下寺監皆用劄子寺監具申雖三司亦言上銀臺主判不以官品初冬獨賜翠毛錦袍學士以上自從本品行案用樞密院雜司人吏主判食樞密厨蓋樞密院子司也文獻通考唐藩鎮皆置邸京師以大將主之謂之上都留後大厯十二年改為上都知進奏院官宋緣舊制皆本州鎮補人為進奏官逐州就京師各置進奏院太平興國六年簡知後官得李楚等百五十人並充進奏官命供奉官張文璨提轄諸道進奏院監官以京朝官及三班使臣充掌受詔敕及諸司符牒辨其州府軍監以頒下之并受天下章奏案牘狀牒以奏御及分授諸司中興以來𨽻門下後省給事中點檢訖乾道九年依舊𨽻後省合傳報事今後省録付報行王闢之澠水燕談録國初州郡自置邸吏散在都下外州將吏不樂久居京師又符移行下率多稽遲或漏下機事太平興國初起居郎何保樞奏置鈐轄諸道都進奏院以革其弊人給銅朱印一紐魏泰東軒筆録慶厯中蘇舜欽提舉進奏院至秋賽承例賣拆封紙以充謹案宋初置通進銀臺司以兩制以上二人充其任於是承受章疏始有専曹今通政司之稱銀臺其源蓋本於此然當時令其檢察稽滯則兼有今內閣稽察房六科注銷事件之職不獨通呈奏牘也至進奏院本出於漢之郡國置邸京師朱買臣傳買臣常從會稽守邸者寄居飯食則已設官主之蓋即所謂邸吏在唐為進奏院主諸道邸務各領以大將亦稱邸官而唐季藩鎮跋扈邸官皆得入見天子新唐書宦官傳左右軍及十道邸官俞談等詣思元門請對至五季而進奏官恣橫益甚五代史盧文紀傳文紀為御史中丞初上事百官臺參吏白諸道進奏官賀文紀問當如何吏曰朝廷在長安時進奏官見大夫中丞如胥史自唐衰天子微弱諸侯強盛貢奉不至朝廷姑息方鎮假借邸吏大夫中丞上事進奏官至客次通名勞以茶酒而不相見相傳為故事文紀曰吾雖德薄敢隳舊制進奏官不得已入見文紀據床端笏臺吏通名贊拜既出恚怒不自勝相率詣閣門以狀訴明宗問宰相趙鳯進奏吏比外何官鳯曰州縣發遞知後之流也明宗怒曰乃吏卒爾安得慢吾法官皆杖而遣之宋太宗始以京朝官充監官為六院官之一國朝定制各省設在京提塘官𨽻於兵部以本省武進士及候補侯選守備為之由督撫遴選送部充補三年而代凡疏章郵遞至者提塘官恭送通政司通政使副使參議校閲封送內閣五日後以隨疏齎到之牒應致各部院者授提塘官分投若有賜於其省之大吏亦提塘官受而齎致之諭旨及奏疏下閣者許提塘官謄録事目傳示四方謂之邸抄蓋即如唐宋之進奏院而法制詳慎其奉職倍為謹凛矣宋史職官志登聞檢院𨽻諫議大夫登聞鼓院𨽻司諫正言掌受文武官及士民章奏表疏凡言朝政得失公私利害軍期機密陳乞恩賞理雪寃濫及竒方異術改換文資改正過名無例通進者先經鼓院進狀或為所抑則詣檢院並置局於闕門之前王栐燕翼貽謀録唐有理匭使五代以來無聞太宗皇帝淳化三年五月辛亥詔置理檢使以錢若水領之其後改曰登聞院又置鼓於禁門外以達下情名曰鼓司真宗景德四年三月戊申詔改鼓司為登聞鼓院登聞院為檢院應上書人並詣鼓院如本院不行則詣檢院以朝官判之判院之名始於此謹案宋祁集張詠行狀稱詠於景德三年已判登聞檢院與此嵗月差互未詳孰是謝維新合璧事類登聞鼓院國朝曰鼓司以內臣掌之鼓在宣德門南街北廊至道三年命太子中舍王清勾當鼓司用朝臣勾當自此始景德四年詔改為登聞鼓院建炎三年𨽻檢院登聞檢院雍熙七年改匭為檢景德四年改為登聞檢院命樞密直學士張詠判仍差內品監門不得關預公事掌文武官及士民章奏表疏皆受以通達凡進狀者先鼓院若為所抑則詣檢院外有理檢使今不置始於淳化三年置理檢使於朝元門之西北廊以知制誥錢若水領之復唐制也至道三年廢天聖七年上因請唐史見匭函達下民寃枉之事乃謂左右曰天下九州之大豈無寃枉之人若至京師檢院鼓院理雪者必是州縣吏提點刑獄轉運使不能理雪又若不為申理則赤子無告矣乃置匭函仍専命御史中丞為理檢使謹案宋世臣僚閣門封奏由通進司納入者例有定格其不能在閣門上章者則别置登聞鼓院登聞檢院以受之非若前世之袛達寃訴也至內官轉對及外官過闕入對者亦得面進奏疏對御宣讀又不在通進登聞所受之數李燾長編載仁宗天聖七年六月命資政殿學士晏殊等看詳轉對章疏及登聞檢院所上封事類次其可行者以聞據此則其所陳必關係時政得失若諸司公事取旨則固專在閣門矣遼遼史百官志門下省通進司有左通進右通進登聞鼓院有登聞鼓使匭院有知匭使金金史百官志登聞鼓院知登聞鼓院從五品同知登聞鼓院事正六品掌奏進告御史臺登聞檢院理斷不當事承安二年以諫官兼知法二員從八品女直漢人各一員登聞檢院知登聞檢院從五品同知登聞檢院正六品掌奏御進告尚書省御史臺理斷不當事知法從八品女直漢人各一員元謹案金元二代通章奏者史無其官惟元之中書省置有直省舍人三十三員史稱其掌奏事給使差遣之役似當主呈奏之職然其官僅中書掾屬則所奏者乃中書衆事未必中外章疏悉由之以通達也今故不著於表明明史百官志通政使司通政使一人正三品左右通政各一人謄黃右通政一人正四品左右參議各一入正五品其屬經厯司經厯一人正七品知事一人正八品通政使掌受內外章奏敷奏封駁之事凡四方陳情建言申訴寃滯或告不法等事於底簿內謄寫訴告緣由齎狀奏聞凡天下臣民實封入遞即於公廳啓視節寫副本然後奏聞即五軍六部都察院等衙門有事關機密重大者其入奏仍用本司印信凡諸司公文勘合辨驗允當編號注寫公文用日照之記勘合用驗正之記關防之凡在外之題本奏本在京之奏本並受之於早朝彚而進之有徑自封進者則參駁午朝則引奏臣民之言事者有機密則不時入奏有違誤則籍而彚請凡抄發照駁諸司公移及勘合訟牒勾提件數給繇人員月終類奏嵗終通奏凡議大政大獄及會推文武大臣必參預初洪武三年置察言司設司令二人掌受四方章奏尋罷十年置通政使司以曽秉正為通政使劉仁為左通政諭之曰政猶水也欲其常通故以通政名官卿其審命令以正百司達幽隱以通庶務當執奏者勿忌避當駁正者勿阿隨當敷陳者勿隱蔽當引見者勿留難十二年撥承敕監給事中殿廷儀禮司九關通事使𨽻焉建文中改司為寺通政使為通政卿通政參議為少卿寺丞增置左右補闕左右拾遺各一人成祖復舊制成化二年置提督謄黃右通政不理司事録武官黃衛所襲替之故以徴選事萬厯九年革陸容菽園雜記通政司所以出納王命為朝廷之喉舌宣達下情廣朝廷之聰明於政體關繫甚重也洪武永樂間實封皆自御前開拆故姦臣有事即露無幸免者自天順間有投匿名書言朝廷事者於是始有關防然其時但拘留進本人在官候旨旨出即縱之未嘗窺見其所奏事也後不知始於何年乃有拆封類進及副本備照之説一有訐奏左右內臣及勳戚大臣者本未進而機已泄被奏者往往經營幸免原奏者多以虛言受禍祖宗關防姦黨通逹下情之意至是無復存矣孫承澤春明夢餘録登聞鼓院在西長安門小廳三間東向傍一小樓懸鼓俾寃民擊之每日科道官各一員錦衣衛官一員輪司其事民有寃抑有司不為審理具狀通政司又不為轉奏審實列其狀以聞謹案周官復逆之職以大僕小臣御僕三官分任厥事誠以職親地近凡事皆可旋至立達故姦蔽無自而生秦漢始置公車司馬令主受章表而奏事乃悉由尚書漢書魏相傳稱故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屏去不奏故霍山等得籍以行其私意自宣帝從相所白令羣臣得奏封事不關尚書而權姦始克敗露蓋職太専而權太重其流弊有已見於漢時者明太祖創置通政使司以承受本章列於九卿職守較前代為益隆然委寄過重凡四方章疏必先由司啓視而後奏聞甚至事關機密重大亦必用本司印記乃得入奏若徑自封奏則參駮隨之是以通政一官竟為朝廷喉舌之總滙其後紀綱廢弛為通政者多出政府親昵往往視其意指為之遏抑讜言其或白簡所彈則隂泄事機俾得營求茍免遲速髙下百弊叢生眀史姦臣傳稱嚴嵩念已過惡多得私人在通政劾疏至可預為計故以趙文華任之即其顯證營私蠧政實有視漢之副封而尤甚者我國家達聰明目規制周詳凡臣工封事皆許詣宫門由奏事處恭遞直達御前其向來題本奏本槩併為題本在內各部院則徑送內閣在外督撫等則通政使司校閲送閣條格益昭簡備皇上躬親批答聽覽曰勤銀臺閣門無不凛遵定制恪守官常諸弊肅清洵為超軼萬古矣欽定厯代職官表卷二十一
