body:
  text: 闗税各差表闗税各差國朝官制闗税各監督京師崇文門正監督一人以大臣簡充副監督一人由總管内務府大臣選奏充左翼右翼各一人以大臣簡充直𨽻天津闗一人以長蘆鹽政兼管通州二人以滿漢坐糧㕔兼管山海闗一人以四五品滿京堂及各部院内務府司員差充張家口殺虎口各一人以部院司員差充潘桃口一人以多倫諾爾同知管理龍泉紫荆竒峯五虎固闗白石倒馬茨溝挿箭嶺馬水口各一人以提督兼管委㕘將都司守備把總監收三座塔八溝烏蘭哈達各一人以理藩院司員差充奉天牛馬税一人以部院司員差充中江一人以及盛京將軍衙門章京五部司員差充山西武元城一人以巡撫兼管委交城縣知縣監收歸化城一人亦以巡撫兼管委道員監收山東臨清闗一人以山東巡撫兼管委臨清州知州監收江南海闗一人以江蘇巡撫兼管委松太道監收滸墅闗一人以蘇州織造兼管淮安宿遷闗一人以内務府官員簡充揚闗一人以江蘇廵撫兼管委常鎮揚通道監收龍江西新闗一人以江寧織造兼管鳳陽闗一人以廬鳳道管理蕪湖闗一人以安徽廵撫兼管委安徽寧池太道監收江西九江闗一人以廣饒南九道管理贛闗一人以江西廵撫兼管委吉南贛道監收福建海闗一人以福州將軍兼管閩安闗一人以巡撫兼管委福州府同知監收浙江海闗一人以巡撫兼管委寧紹台道監收南北新闗一人以杭州纎造兼管湖北武昌厰一人荆闗一人以廵撫兼管委員監收湖南辰闗一人以巡撫兼管委辰州府知府監收四川䕫闗一人以總督兼管委䕫州府知府監收打箭鑪一人同知兼管廣東海闗一人以内務府官員簡充太平闗一人以巡撫兼管委南韶連道兼收廣西梧厰潯厰各一人以巡撫兼管委梧州潯州各知府監收掌於水陸衝會之地設官置吏頒其治禁以安行旅以通財賄爰繫之税以便詗幾以佐國家經費凡𣙜百貨者為户部分司𣙜竹木及船鈔者為工部分司必行商大賈挾貲貨殖以牟利者乃譏而徵之物有精麤直有貴賤利有厚薄各按其時地以定應徵之數遵部頒科條刋示木榜俾商賈咸知而吏不能欺其有藏匿姦匪私冒越渡及漏應税之物者俱論如法監督以一嵗報滿則條析經徵之數具疏專達其𨽻督撫總理者嵗周疏報亦如之皆以冊達部部受其要而會之定其殿最以聞初制闗税各差皆以户工二部司員充之尋改差六部司員又改歸地方官管理嗣後隨時斟酌改定或特簡京員或由部院司員掄選引見除授或歸督撫總理或以將軍織造鹽政兼理京差由部疏請或更代或留任候㫖遵行由督撫等兼管者期滿奏明接管皆因地制宜永為恒式焉厯代建置三代周禮天官大宰以九賦斂財賄七曰闗市之賦賈公彦疏謂闗上以貨出入有税物市若泉府㕓布總布之等亦有税物周禮地官司闗上士二人中士四人府二人史四人胥八人徒八十人每闗下士一人府一人史二人徒四人掌國貨之節以聨門市司貨賄之出入者掌其治禁與其征㕓凡貨不出于闗者舉其貨罰其人凡所達貨賄者則以節傳之鄭康成注傳如今移過所文書國凶札則無闗門之征猶幾凡四方之賓客敂闗則為之告有外内之送令則以節傳出之國語周語周之秩官有曰敵國賓至闗尹以告謹案賈公彦周禮疏以闗尹即司闗然司闗掌國貨之節而闗尹祗主賓客則其職有繁簡之殊顔師古漢書注以闗尹即闗吏蓋毎闗有下士闗尹乃下士之職也周禮地官司市下大夫二人上士四人中士八人下士十有六人府四人史八人胥十有二人徒百有二十人掌市之治教政刑量度禁令凡治市之貨賄六畜珍異亡者使有利者使阜害者使亡靡者使微鄭康成注司市市官之長㕓人中士二人下士四人府二人史四人胥二人徒二十人掌斂布絘布總布質布罰布㕓布而入于泉府謹案門闗之制首見於周禮司闗國貨有節出入有司治禁有掌不出于闗者有罰正與今日闗税之政相仿其屬之于地官則如今各直省監督之受成于户部矣至于九賦斂財賄七曰闗市之賦實以大宰掌之則如今崇文門正監督之必以大臣簡充誠慎重其職掌也直省各闗治闗而不治市其市賈牙税皆以守土之官領之唯京師左右翼監督則八旗田房騐契鈐印及牲畜之陳于衢市者皆要其成焉其制亦以大臣簡充是兼有周家司市㕓人之職于大宰闗市之賦尤相合也考厯代司市市令之制官秩本微如今順天府通判之專管牙税頗為近之故既著于順天府篇而監督職掌所係亦復相似因並係之于表且互證其説焉江永周禮疑義舉要㕓人所掌質布蓋償質劑之布也古未有紙大劵小劵當以帛為之交易以給買者而賣者亦藏其半質劑蓋官作之其上當有符印是以量取賣買之泉以償其費猶後世契紙有錢也恵士竒禮説司闗掌國貨之節以聨門市其法管子行之于齊征于闗者勿征于市征于市者勿征于闗此司闗聨門市之法也自外入者征于闗闗移之門門移之市所謂征于闗者勿征于市也自内出者征于市市移之門門移之闗所謂征于市者勿征于闗也若自内而不由于市自外而不出于闗然後舉而罰之謹案兩翼監督有田房契尾之税今考江永周禮説則契尾之税亦本于㕓人之質布蓋質劑之交易不可不領之于官與夫司市法六畜則正衢路牲畜有税之類皆因事制宜昭信定業而惠商裕民之意寓其中矣又考周禮地官丱人掌金玉錫石之地而為之厲禁以守之後世金官鐵官坑冶諸使並沿其制我朝礦課領于有司以時開閉不設專官亦不列于闗税之課蓋物土宜而寛民力逈非前代所能及矣秦漢書百官公卿表闗都尉秦官漢漢書武帝紀太初四年徙𢎞農都尉治武闗税出入者以給闗吏卒食史記義縱傳寗成家居上拜成為闗都尉漢書張敞傳出為函谷闗都尉漢書百官公卿表京兆尹屬官有長安市令丞後漢書光武紀建武九年省闗都尉十九年復置函谷闗都尉後漢書陰識傳封陰鄉侯以為闗都尉鎮函谷劉昭後漢書志注漢官曰市長一人秩四百石丞一人二百石謹案前漢都長安所置闗津以函谷闗為重地太初始設闗税以後尤重都尉之選自張敞而外見于漢書者霍光以丞相田千秋弟為闗都尉黄霸子賞嗣侯爵為闗都尉與夫何恢翟宣並係世臣子弟後漢陰識以勲戚通侯出典斯職厥制尤重今崇文門監督特簡大臣典司其事實與古制相符至洛陽市令雖品秩卑小不與今之左右翼相近而職事相同故節取而列于篇中至漢初令賈人不得乘車衣絲重租税以困辱之誠所以敦本抑末勸民為農也其後至武帝元光六年初筭商賈則商賈車船有税矣元符四年初筭緡錢則凡有緡錢者皆税矣至于告緡徧天下以上皆見史記雖不為商賈者胥被其害而闗税之重取横斂有不待言者此漢代之粃政非復立闗置𣙜之本意也三國唐六典注後漢河南尹屬官有洛陽市長丞魏因之晉晉書職官志侍御史有十三曺江左置庫曺掌厩牧牛馬市租謹案晉以侍御史掌襍税後世設巡闗御史實昉于此蓋以御史職司風憲可以譏察非常平均出入故慎重其選也然京員奉使𣙜闗誠得恪守恒制委任得人則裕商便民之政足與守土之規相㕘並舉而如期更代較若畫一亦于考成之法有禆豈必專使御史崇其虚名哉明代專重御史尚空言而不求實效寖成黨援即出使一端可見乃晉氏已肇其端㕘考古今知未足為常制也鄭樵通志諸市署東晉則丹陽尹管之馬端臨文獻通考税契始于東晉宋齊梁陳宋書百官志庫曺掌廐牧牛馬市租唐六典注宋齊諸市署𨽻丹陽尹梁始𨽻大府陳因之杜佑通典自東晉至陳西有石頭津東有方山津各置津主一人賦曺一人直水一人以檢察禁物及亡叛者荻炭魚薪之類出津者並十分税一以入官淮水北有大市自餘小市十餘所備置官司文獻通考晉自過江至於梁陳凡貨賣奴婢馬牛田宅有文劵率錢一萬輸估四百入官賣者三百買者一百無文劵者隨物所堪亦百分收四名為散估厯宋齊梁陳如此以為常以人競商販不為田業故使均輸欲為懲勵雖以此為詞其實利在侵削謹案商税之設於稽查征𣙜之中寓崇本抑末之意不使田作之民專輸賦税誠所以劑食貨之平也然必行商大賈挾重資以牟利者始在税征之列至于尋常貨賣民生日用之資乃無論其文劵之有無而概從而征之此江左茍且一切之弊政宜其見譏于前志也北魏魏書官氏志京邑市令從五品中文獻通考後魏明帝孝昌二年税市入者人一錢其店舍又為五等收税有差北齊通典北齊黄門侍郎顔之推奏請立闗市邸店之務開府鄧長顒贊成之冊府元龜北齊司州牧領東西市署令丞後周唐六典後周司市下大夫一人文獻通考後周閔帝初除市門税及宣帝即位復興入市之税每人一錢隋隋書百官志闗置令丞官屬立三等之差唐六典煬帝二年改市令𨽻太府寺京師東市曰都會西市曰利人東都東市曰豐都南市曰大同北市曰通逺隋書百官志司農寺屬官京市有肆長四十人唐唐六典闗令一人從八品上丞二人從九品上録事一人府二人史四人典事六人津吏八人中闗令一人正九品下丞一人從九品下録事一人府一人史二人典事四人津吏六人下闗令一人從九品下府一人史二人典事二人津吏四人兩京諸市署各令一人從六品上掌百族交易之事丞為之貳新唐書百官志市署有録事一人府三人史七人典事三人掌固三人新唐書食貨志徳宗時趙贊請諸道津會置吏閱商賈錢毎緡税二十竹木茶漆税十之一以贍常平本錢帝納其䇿文獻通考文宗太和七年御史臺奏太和三年赦文天下除兩税外不得妄有科配其擅加襍𣙜率一切宜停令御史臺嚴加察訪者伏見嶺南道擅置竹綀場税法至重害人頗深自太和三年赦文旬月之内或以督察不嚴或以長吏更改依前却置重困齊人伏望今後科配襍𣙜等有出使郎官御史令嚴加訪察茍有此色本判官重加懲責從之開成二年武寧軍節度使薛元賞奏泗口税場應是經過衣冠商客金銀羊馬斛斗見錢茶鹽綾絹等一物已上並税今請停絶勅㫖從之謹案唐代襍税繁多諸使並出如租庸兩税户口鹽鐵𣙜酤諸名史不絶書而闗津之税則唯有闗令津吏諸末職分𨽻于各州縣而無專使之官然觀趙贊請于津會置吏税緡錢及竹木茶漆以贍常平本錢則未免苛碎煩擾甚至赦文停止而諸道轉設為至重之税法若泗口税埸則金銀見錢有税一物以上有税蓋由法制不定責成不專故官吏得以乘間妄取而實無補于軍國之費也文獻通考唐有市舶使代宗廣徳元年有廣州市舶使謹案市舶使徴稽蕃貨為海闗徵税之所自始五季孫逢吉職官分紀梁開平元年以潼闗𨽻陜州乃置潼闗軍使又改虎牢闗為軍仍置使五代會要周顯徳五年敕諸道州府應有商賈與販牛畜者不計黄牛水牛凡經過處並不得抽税如是貨賣處祇仰據賣價毎一千抽税錢三十不得别有邀難宋宋史職官志鹽鐵使掌天下山澤之貨賄闗市河渠軍器之事以資邦國之用分掌七案三曰商税案王應麟玉海乾徳三年八月辛酉置𣙜貨務京師及建安漢陽蘄口並置職官分紀國朝舊有𣙜易庫因置使宋史職官志監當官掌茶鹽酒税埸務征輸諸州軍隨事置官文獻通考開寳四年平廣南以同知廣州潘美尹宗珂並兼市舶使咸平二年令杭州明州各置市舶聴蕃官從便市舶使多州郡兼領元豐中始令轉運使兼提舉而州郡不復預後專置提舉而轉運使亦不復預矣宋史職官志提舉市舶司掌蕃貨海舶征𣙜貿易之事以来逺人以通逺物謹案宋闗市之税内則掌于鹽鐵使外則領于各州郡而屬于轉運使其後亦復專設提舉之官其京師𣙜貨務自開寶時始設而州軍隨事立監當官蓋闗税之職至宋始備與今制亦大畧相脗合云文獻通考太祖建隆元年詔所在不得苛留行旅齎裝非有貨幣當算者無得發篋搜索又詔榜商税則例于務門無得擅改更增損及創收李燾續資治通鑑長編淳化二年詔除商旅貨幣外其販夫販婦細碎交易不得收其算常税名物令有司條析揭榜頒行天下謹案今各闗務刋刻木榜掲應税物值之數而省其竒零使商民周知而吏不得為奸蓋實昉于宋制也文獻通考李重進平以宣徽北院使知揚州樞宻直學士杜韡監州税止齋陳氏曰以朝臣監州税始於此然未以此置官也諸州監當分差使臣自太宗始雍熙三年始著於令監當使臣京朝官並三年替仍委知州通判提舉之遂為定員玉海仁宗時詔埸務嵗課倍增者乃增使臣一員監臨又詔取一嵗中數為額後雖羨益弗增陳傅良止齋集藝祖開基首定商税則例自後累朝守為家法凡州縣小可商税不敢專擅創取動輙奏稟三司取㫖行下至淳化三年令諸州縣有税以端拱元年至淳化元年收到課利最多錢數立為租額比校科罰蓋商税額比校自此始熙寧三年中書奏自来埸務課利增虧並自本州保明三司立定新額始牒轉運司令本處趂辦往復動經年嵗虚有留滯莫若令本州自此立定祖額比較有㫖從之本州比校自此始商税輕重皆出官吏之意有增而無減矣政和間漕臣申奏於則例外增收一分税錢而一分增收税錢窠名自此始紹興二年令諸路轉運使量度收税𦂳慢增添税額三分或五分而三五分增收税錢窠名自此始謹案遣朝臣監督各路闗税始於宋初削平藩鎮之日蓋自唐以来諸藩鎮專有一方重斂侵掠無復經常之制故以朝臣往監經紀其事其後遂為定制而三年則有更替增課則更添置使臣嗣後始一歸于轉運使而以州縣官監當提舉蓋猶今直省各闗或專遣司員或由督撫將軍織造鹽政總理而委道府各屬官監收之制也商税之有額昉于淳化間三司取定之租額至熙寧間則令本州各自為額而税以漸增自後有添取一分至三五分窠名而征𣙜繁重是雖有定額之名而加征不啻倍蓰以視我朝各闗征税設為一定之額永垂恒制不得擅有增益者相去蓋霄壤矣文獻通考熙寧七年詔減國門税數十種錢不滿三十者蠲之其先外城二十門皆責以課息近止令隨其閑要分等以撿捕獲失之數元祐元年户部請在京商税院酌取元豐八年錢數以為新額自明年始謹案宋時國門征税屬于在京商税院而統于户部故額設之増減由户部奏定其制與今稍異也遼遼史食貨志征商之法自太祖置羊城于炭山北起𣙜務以通諸道市易太宗得燕置南京城北有市百物山峙命有司治其征餘四京及它州縣貨産懋遷之地置亦如之雄州高昌渤海亦立互市以通南宋西北諸部高麗之貨聖宗乾亨間燕京留守司請弛居庸闗税以通山西糴易二十三年振武軍及保州並置𣙜埸遼史百官志南面財賦官有某州錢帛都㸃檢金金史百官志𣙜貨務使從六品副使從七品掌發賣給隨路香茶鹽鈔引提舉南京𣙜貨司貞祐四年置提舉從五品同提舉從六品勾當官三員正九品提舉南京路𣙜貨事從六品中都都商税務司使一員正八品副使一員正九品掌從實辦課以佐國用都監一員從九品掌簽署文簿巡察匿税潼闗二使兼譏察官正七品掌闗禁譏察奸偽管鑰啟閉副譏察正九品掌任使之事居庸闗紫荆闗通㑹闗㑹安闗及他闗皆設使從七品金史食貨志明昌元年正月制尚書省定院務課商税額泰和七年制院務課令運使差官監𣙜謹案金制税務之官較為詳備如居庸紫荆諸闗皆為今日經制實由金昉也其時商税有成額由尚書省審定蓋𨽻于户部而行于提舉各官大定明昌之間俗臻富庶亦其規制商民均有得宜者耳院務課令運司差官監𣙜正與今之督撫委員監收闗税者相似蓋與宋制相仿彿也元元史百官志大都宣課提舉司掌諸色課程併領京城各市提舉二員從五品同提舉一員從六品副提舉一員從七品提控案牘一員司吏六人世祖至元十九年併大都舊城兩税務為大都稅課提舉司至武宗至大元年改宣課提舉司屬户部抽分埸提領所凡十處曰紫虚車西口曰海州新壩曰北沙大倉曰安河桃源曰太湖東西口曰時堡興化曰高郵保應曰汶湖等處曰雲山白水曰安東州每所各設提領一員同提領一員副提領一員常湖等處茶園都提舉司秩正四品達魯噶齊解見理藩院篇一員提舉一員俱從五品同提舉一員從六品副提舉一員從七品提控案牘一員都目一員提領所毎所各設正同副提領各一員俱受宣徽院劄付明明史食貨志闗市之征官司有都税有宣課有司有局有分司有抽分司埸司抽分在南京者曰龍江大勝港在北京者曰通州白河盧溝通積廣積在外者曰真定杭州荆州太平蘭州廣寧河北止鹽山縣宣徳四年委御史户部錦衣衞兵馬司官各一於城門察收舟船納鈔鈔闗之設自此始于是有漷縣濟寧徐州淮安揚州上新河滸墅九江金沙洲臨清北新諸鈔闗量舟大小修廣而差其額謂之船料不税其貨惟臨清北新則兼收貨税各差御史及户部主事監收正統九年復設甘省税課司成化七年增置蕪湖荆州杭州三處工部官初抽分竹木止取鈔其後易以銀尋遣御史𣙜税隆慶二年始給鈔闗主事闗防敕書明史職官志監察御史巡闗宣徳四年設立鈔闗御史至正統十年始遣主事王圻續文獻通考工部通州白河抽分竹木局大使各一人副使一人盧溝橋抽分竹木局大使一人副三人大通闗提舉一人凡抽分征諸商率三十分取十五取六取五取四取三取二取一凡七等明史職官志市舶司提舉一人從五品副提舉二人從六品其屬吏目一人從九品掌海外諸蕃朝貢市易之事禁通蕃征私貨平交易洪武七年罷福建廣東浙江三提舉司永樂元年復置尋命内臣提督之嘉靖元年罷福建浙江二司惟存廣東市舶司税課司大使一人從九品典税事明初改在京官店為宣課司府州縣官店為通課司後通課司為税課司謹案明代置鈔闗御史專税諸闗船料其兼税貨物則以御史及户部主事兼理之而竹木税務則屬于工部主事其他税課河泊之領于州縣者與今制畧同惟御史巡闗我朝始從裁去蓋各省闗𣙜既由督撫委員監收報其成于部院而户工兩部及内務府司員分任要地責成嚴重至崇文門兩翼監督毎嵗奏請並以大臣特㫖簡放所以慎重闗政者甚至誠無待于别差御史徒滋紛擾也考厯代闗制至宋始詳而其為弊亦復不一文獻通考稱其貪吏苛取私立税埸其弊已有不勝言者至于明代中葉以後各闗津多設無名税課其尤弊者凡諸市舶店税及門闗税務多遣中官主之侵漁百計凌轢官吏剥削商民至于採辦開礦之使紛紜四出則宇内胥被其毒姦民望風希幸納賄中官輙授以指揮劄記任為爪牙窮鄉僻壌皆私立土商名目米鹽雞犬箆取無遺甚至數激民變亦復庇而不問其所得財賄盡以飽權閹之溪壑而昔人通商裕國之經制蕩焉無存矣我朝釐正闗𣙜寛政頻施前代無名之繁賦芟除殆盡其治於有司者既定經常之額嵗終會計與田賦彚疏以聞而門闗重地督以重臣涖以封疆大吏闗津則有親填循環稽考之簿海舶則有貿易外洋之照内江内河之經厯遼逺者皆給之照以辨姦良所以體恤商賈杜絶姦欺者規制至為詳悉蓋利用通財盡革往代無藝之征而垂億萬年永乆之制洵非成周以後所得而比隆者矣欽定厯代職官表卷六十二
