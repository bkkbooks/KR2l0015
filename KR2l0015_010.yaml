  - {type: page-break, offset: 0, content: '', id: KR2l0015_WYG_010-1a, image: WYG0601/WYG0601-0076c.png}
body:
  text: 內閣下厯代建置下遼至明遼遼史百官志遼國官制分北南院北靣治宫帳部族屬國之政南靣治漢人州縣稅賦軍馬之事北宰相府掌佐理軍國之大政皇族四帳世預其選北府左宰相北府右宰相總知軍國事知國事南宰相府掌佐理軍國之大政國舅五帳世預其選南府左宰相南府右宰相總知軍國事知國事初太祖分達喇額爾竒木違喇原作迭剌額爾竒木原作夷離堇今並改正為北南二大王宰相樞密宣徽林牙下至郎君護衛皆分北南其實所治皆北靣之事語遼官制者不可不辨凡遼朝官北樞密視兵部南樞密視吏部北南二王視户部伊勒希巴原作夷離畢今改正視刑部宣徽視工部多囉倫穆騰原作敵烈麻都今改正視禮部北南府宰相總之謹案遼北南府宰相於事無所不統蓋亦如尚書令之總領六部也遼史世宗本紀天祿四年春二月建政事省興宗本紀重熙十二年十二月戊申改政事省為中書省謹案遼本紀重熙十二年改中書省而志作重熙十三年蓋傳寫之訛當以本紀為正遼史聖宗本紀統和元年十二月下詔諭三京左右相左右平章事當執公方毋得阿順謹案據本紀此文則遼東京中京南京亦曾置宰相及平章之官疑即如元代之行中書省並非正員今故不著於表遼史百官志南面朝官中書省中書令左丞相右丞相知中書省事中書侍郎同中書門下平章事參知政事中書舍人堂後官主事守當官令史門下省侍中門下侍郎尚書省尚書令左僕射右僕射左丞右丞謹案遼志尚載有大丞相一官今考資治通鑑遼太宗在汴京時命為趙延夀遷官翰林學士承㫖張礪進擬中京留守大丞相録尚書事都督中外諸軍事太宗以筆塗録尚書事都督中外諸軍事而行之則大丞相之名乃張礪所特擬以寵顯趙延夀者非常置之職今故不入於表葉隆禮契丹國志中書省謂之南面以其在牙帳之南謹案遼以北面官治宫帳部族南面官治漢人州縣蓋以所掌事宜為區别並非指省署建置之地而言葉隆禮所云乃臆測之詞不足據也金金史百官志太宗天㑹四年建尚書省遂有三省之制至熙宗頒新官制大率皆循遼宋之舊海陵正隆元年罷中書門下省止置尚書省於金之世守而不變焉金史海陵本紀正隆元年正月罷中書門下省以太師領三省事溫屯思忠溫屯原作溫都今改正為尚書令平章政事蕭玉為右丞相不置平章政事官金史百官志尚書省尚書令一員正一品總領紀綱儀刑端揆左丞相右丞相各一員從一品平章政事二員從一品為宰相掌丞天子平章萬幾左丞右丞各一員正二品參知政事二員從二品為執政官為宰相之二佐治省事左司都事二員右司都事二員正七品掌本司受事付事檢勾稽失省署文牘兼知省內宿直檢校架閣等事架閣庫管勾一員正八品同管勾一員從八品總掌察左右司大程官追付文牘并提控小都監給受紙筆宇文懋昭大金國志天㑹十三年置尚書省置令一人次左右丞相皆平章事左右丞皆參知政事侍中中書令皆居丞相之下為兼職謹案金史百官志但載尚書省官制以尚書令左右丞相平章政事為宰相左右丞參知政事為執政官蓋以正隆定制後惟存尚書一省故也然以紀傳參考之左右丞相本亦為左右僕射見太宗紀天㑹八年韓企先為尚書左僕射至十三年熙宗即位後即書以完顔希尹為尚書左丞相無復僕射之稱是改名當在十三年以前按洪皓松漠記聞載金天眷二年請定官制劄子有太宗皇帝嗣位之十二載始下明詔建官正名之語疑即是時所改李心傳朝野雜記載宋乾道中議改僕射為丞相時虞允文言金人詳定官制已改左右僕射為尚書左右丞相云云可以互證金志不載其事未免失考又考本紀自天㑹十四年太保宗翰太師宗磐太傅宗幹並領三省事厥後以三師三公官領三省事者甚多蓋猶録尚書事之類逮正隆元年領三省事溫屯思忠為尚書令其後遂不復見於史則尚書令當即領三省事之職以中書門下二省既廢故改為尚書令耳金志但及尚書令而不及領三省事亦為脫漏又考金自兩省未罷以前如完顔希尹完顔朂完顔亮完顔秉德張浩皆以左丞相兼侍中完顔宗固完顔宗賢唐古辨唐古原作唐括今改正蕭裕布薩師恭布薩原作僕散今改正皆以右丞相兼中書令是兩省長官亦俱相職而金志均未之詳又海陵紀正隆初已罷平章政事官而志仍有之不言其廢置重設之由考世宗紀大定二年二月御史大夫伊喇元宜伊喇原作移剌今改正為平章政事當即以此時復設志無明文允為闕略今並詳加參核著之於表至宇文懋昭大金國志所載以丞相為即平章事以左右丞為即參知政事乖謬殊甚謹採其文而糾正其誤於此焉元元史百官志中書令一員典領百官㑹决庶務太宗以相臣為之世祖以皇太子兼之至元十年立皇太子行中書令大德十一年以皇太子領中書令延祐三年復以皇太子行中書令置屬監印二人右丞相左丞相各一員正一品統六官率百司居令之次令闕則總省事佐天子理萬幾國初職名未創太宗始置右丞相一員左丞相一員世祖中統元年置丞相一員二年復置右丞相二員左丞相一員至元二年增置丞相五員七年立尚書省置丞相三員八年罷尚書省乃置丞相二員二十四年復立尚書省其中書省丞相二員如故二十九年以尚書再罷専任一相武宗至大二年復置尚書省丞相二員中書丞相二員四年尚書省仍歸中書丞相凡二員自後因之不易文宗至順元年専任右相其一或置或不置平章政事四員從一品掌機務二丞相凡軍國重事無不由之世祖中統元年置平章二員二年置平章四員至元七年置尚書省設尚書平章二員八年尚書併入中書平章復設三員二十三年詔清冗職平章汰為二員二十四年復尚書省中書尚書兩省平章各二員二十九年罷尚書省增中書平章為五員而一員為商議省事三十年又增平章為六員成宗元貞元年改商議省事為平章軍國重事武宗至大二年再立尚書省平章三員中書五員四年罷尚書省歸中書平章仍五員文宗至順元年定置四員自後因之右丞一員正二品左丞一員正二品副宰相裁成庶務號左右轄世祖中統二年置左右丞各一員三年增為四員至元七年立尚書省中書右丞左丞仍四員八年尚書併入中書省右左丞各一員二十三年汰冗職右左丞如故二十四年復立尚書省右左丞各一而中書省缺員二十八年復罷尚書省三十年設右丞二員而一員為商議省事成宗元貞元年右丞商議省事者又以昭文大學士與中書省事武宗至太二年復立尚書省右左丞二員中書右左丞五員四年罷尚書右左丞中書右左丞止設四員文宗至順元年定置右丞一員左丞一員由是不復增損參政二員從二品副宰相以參大政而其職亞於右左丞世祖中統元年始置參政一員二年增為二員至元七年立尚書省參政三員八年尚書併入中書參政二員二十三年汰冗職參政二員如故二十四年復立尚書省參政二員中書參政二員二十八年罷尚書省參政武宗至大二年復置尚書省參政二員中書參政二員四年併尚書省入中書參政三員文宗至順元年定參政為二員自後因之參議中書省事秩正四品典左右司文牘為六曹之管轄軍國重事咸預决焉中統元年始置一員至元二十二年纍增至六員大德元年止置四員後遂為定額其治曰參議府令史二人斷事官秩三品掌刑政之屬皆御位下及中宫東宫諸王各投下集賽台原作怯薛丹今改正人為之至元十七年分立兩省隨省並置二十八年併入中書後定置四十一員檢校官一員正七品掌檢校公事程期文牘稽失之事照磨一員正八品掌磨勘錢榖出納營繕科例管勾一員正八品掌出納四方文移緘縢啓拆之事架閣庫管勾二員正八品掌庋藏省府籍帳案牘凡備稽考之文即掌故之任元史世祖本紀至元四年安圖原作安童今改正言比者省官員數平章左丞各一員今丞相五人素無此例臣等議擬設二丞相臣等䝉古人三員惟陛下所命詔以安圖為長史天澤次之其餘䝉古漢人參用勿令員數過多又詔宜用老成人如姚樞等一二員同議省事元史百官志元統三年七月中書省奏請自今不置左右丞十月命布延原作伯顔今改正獨長台司詔天下至元五年十月加布延為大丞相六年十月命托克托原作脫脫今改正為右丞相復置左丞相至元七年置議事平章四人十二年以賈魯為添設左丞以烏蘭哈達原作悟良哈台今改正為添設參知政事十三年命皇太子領中書令如舊制二十七年樞密知院曼濟原作蠻子今改正為添設第三平章太尉特哩特穆爾原作帖里帖木兒今改正為添設左丞相謹案厯代宰相雖綜理三省而中書省宣命令尚書省承之以行政事其職仍分不相紊也元代三置尚書省卒廢之而歸其職於中書於是尚書左右兩司曹屬變為中書省官其制視前代為特異至其以丞相平章為宰相左右丞參政為執政則猶沿宋金之舊也又世祖至元四年有同議省事順帝後至元五年有大丞相此二官皆隨時建置與額設者有異今俱不入於表云葉士竒草木子世祖立中書省以總庶務立樞密院以掌兵要立御史臺以糾彈百司嘗言中書朕左手樞密朕右手御史臺是朕醫兩手的厯世遵其道不變王惲中堂事記中統二年五月十九日以世臣巴哈原作不花今改正經略史天澤為右丞相和拉巴哈原作忽魯不花今改正耶律鑄為左丞相塔齊爾原作塔察兒今改正廉右丞平章政事張參政為右丞宣撫楊果宣撫商挺參知政事餘如故命承㫖王鶚定撰諸相制詞二十二日堂議定省規一十條二十五日授麻制於都堂二十七日定議公府署押字事右丞相史公與丞相和拉巴哈五日輪番秉筆長官從上押右者處外邊一左一右以次而下圓坐亦然所謂廟堂廟畫也謹案自明以來大學士有中堂之稱相傳謂大學士初授之時例於翰林院大堂設座禮上故稱中堂今考王惲官中書省都事以所作直省日録名之曰中堂事記則所謂中堂者乃中書都省之堂蓋自元時已有此稱矣永樂大典析津志至元四年四月築燕京內皇城置公署定方隅始於新都鳳池坊北立中書省以新都位置居都堂於紫微垣至元二十四年以僧格原作桑竒今改正為尚書左丞相時五雲坊東為尚書省二十九年尚書併入中書僧格移中書於尚書省乃有北省南省之分後至順二年中書省奏奉旨翰林國史院文書依舊北省安置由是北省既為翰林院尚書省遂為中書都堂其方位制度視北省有間陶宗儀輟耕録國朝故事正六品以下官中書奉敕署牒以命之牒具中書官位最尊者令也署牒者自丞相以下而不敢以煩令惟皇太子立必帶中書令樞密使皇太子既受冊即中書上日獨署一牒明日省臣以其名聞天子即超授五品官其人非素有譽望不得也胡粹中元史續編中書政本元既有中書令矣復立左右丞相則丞相特中書令之佐二耳既以令為虛設左右丞相為正宰相而復設平章政事則又以平章為宰相二矣然平章政事非宰相而何名之不正莫此為甚至其末流丞相而遙授焉則冗濫極矣謹案元自中書令至參知政事其設官全仿金制惟金屬尚書省而元則改歸中書省耳胡粹中以為元制殊失詳考元史百官志內八府宰相掌諸王朝覲儐介之事遇有詔令則與䝉古翰林院官同譯寫而潤色之謂之宰相云者其貴似侍中其近似門下故特寵之以是名雖有是名而無授受宣命品秩則視二品焉輟耕録內八府宰相八員視二品秩而不授宣命特中書照㑹之任而已寄位於翰林之繅琳原作掃鄰今改正繅琳宫門外院官㑹集處也所職視草制若詔赦之文則非其掌也至於院之公事亦不得與焉例以國戚與勳貴之子弟充之謹案內八府宰相雖以相名官實非相職今故附見其制不列於表又王惲中堂事記載元初中書省官有掌故詳官講習太常禮樂官肄業拱街事官省理問官掌記檢法應辦供頓官諸名今考掌故即架閣管勾之職其餘皆不見于百官志蓋後來已有所更革謹附識於此明明史職官志內閣中極殿大學士舊名華蓋殿建極殿大學士舊名謹身殿文華殿大學士武英殿大學士文淵閣大學士東閣大學士並正五品掌獻替可否奉陳規誨㸃檢題奏票擬批答以平允庶政凡上之逹下曰詔曰誥曰制曰冊文曰諭曰書曰符曰令曰檄皆起草進畫以下之諸司下之達上曰題曰奏曰表曰講章曰書狀曰文冊曰揭帖曰制對曰露布曰譯皆審署申覆而修畫焉平允乃行之凡車駕郊祀巡幸則扈從御經筵則知經筵或同知經筵事東宫出閣講讀則領其事敘其官而授之職業冠婚則充賔贊及納徵等使修實録史志諸書則充總裁官春秋上丁釋奠先師則攝行祭事㑹試充考試官殿試充讀卷官進士題名則大學士一人撰文立石於太學大典禮大政事九卿科道官㑹議已定則按典制相機宜裁量其可否斟酌入告領詔則捧授禮部㑹敕則稽其由狀以請宗室請名請封諸臣請諡並擬上以其授餐大內常侍天子殿閣之下避宰相之名又名內閣明太祖實録甲辰春正月即吳王位置中書省右左相國為正一品平章政事從一品左右丞正二品參知政事從二品左右司郎中正五品員外郎正六品都事檢校正七品照磨管勾從七品參議正三品參軍斷事官從五品斷事經厯正七品知事正八品都鎮撫司都鎮撫正五品考功所考功郎正七品十月以都鎮撫司隸大都督府吳元年六月革參議府十月命百官禮儀俱尚左改右相國為左相國左相國為右相國洪武元年正月以李善長徐逹為左右丞相十月革考功所二年六月革照磨檢校所斷事官九年閏九月詔定中書省左右丞相為正一品左右丞為正二品汰平章參知政事惟李伯升王溥等以平章政事奉朝請者仍其舊黃元升昭代典則洪武十二年春正月己亥左丞相胡惟庸等既伏誅上諭文武百官曰朕圖任大臣期於輔佐以臻至治故立中書省以總天下之文治都督府以總天下之兵政御史臺以振朝廷之紀綱豈意奸臣竊持國柄操不軌之心肆奸欺之蔽蠧害政治謀危社稷賴神發其奸皆就殄滅朕今革去中書省升六部仿古六卿之制俾之各司所事更置五軍都督府以分領軍衛如此則權不専於一司事不留於壅蔽卿等以為何如監察御史許士亷等對曰厯朝制度皆取時宜况創制立法天子之事既出聖裁實為典要癸卯詔罷中書省升六部改大都督府為五軍都督府布告天下明史太祖本紀洪武十三年九月丙午置四輔官告於太廟以儒士王本杜佑龔斆杜斆趙民望吳源為春夏官明太祖實録洪武十四年十二月命翰林院編修檢討典籍左春坊左司直郎正字贊善考駁諸司奏啓以聞如平允則署其銜曰翰林院兼平駁諸司文章事某官某列名書之明史職官志洪武十五年仿宋制置華蓋殿武英殿文淵閣東閣諸大學士禮部尚書卲質為華蓋檢討吳伯宗為武英翰林學士宋訥為文淵典籍吳沈為東閣又置文華殿大學士徵耆儒鮑恂余詮張長年等為之以輔導太子秩皆正五品二十八年敕諭羣臣國家罷丞相設府部院寺以分理庶務立法至為詳善以後嗣君其毋得議置丞相臣下有奏請設立者論以極刑當是時以翰林春坊詳看諸司奏啓兼司平駁大學士特侍左右備顧問而已建文中悉罷諸大學士各設學士一人又改謹身殿為正心殿設正心殿學士謹案明文淵閣本在南京成祖遷都後設官雖沿舊名實無其地即以午門內大學士直廬謂之文淵閣其實終明之世未嘗建閣也我朝右文隆軌超邁往牒特命於文華殿後鼎建文淵閣以藏四庫全書輪奐聿新規模大備而閣臣之帶文淵閣銜者其稱名亦更為核實矣至新設領閣事直閣事諸官則詳具於閣職表中兹不備及云鄧球泳化類編洪武壬午時成祖初即位仍稱洪武三十五年秋七月始開內閣於東角門即文淵閣命翰林院文學行誼才識之士入直贊襄時得待詔解縉修撰胡廣編修楊榮吳府審理副楊士竒侍書黃淮給事中金幼孜桐城知縣胡儼入居閣中諭以委任心腹至意専典機密雖學士王景輩不得與焉內閣自此始矣是冬升縉為翰林侍讀學士胡廣黃淮胡儼皆侍讀楊榮楊士竒金幼孜皆侍講明史職官志成祖特簡講讀編檢等官參預機務簡用無定員謂之內閣然解縉胡廣等既直文淵閣猶相繼署院事至洪熙以後楊士竒等加至師保禮絶百僚始不復署正統七年翰林院落成學士錢習禮不設楊士竒楊榮座曰此非三公府也二楊以聞乃命工部具椅案禮部定位次以內閣固翰林職也嘉隆以前文移關白猶稱翰林院以後則竟稱內閣矣王瓊雙溪雜記永樂初始建內閣於東角門內命解縉等七人在閣辦事仁宗正位東宫皆轉春坊官凡草制纂修等事惟翰林掌之無內閣掌管之說也永樂間胡廣所兼不過春坊大學士則是時殿閣大學士不設已久矣今尚書在內閣辦事六部請敕書手本只云合手本前去翰林院寫敕施行則舊意猶存可考也終永樂之世二楊官止五品蓋為衙門所拘初未有衙門小官大之例也仁宗登極始以東宫舊臣升士竒為禮部侍郎尋升少保兼華蓋殿大學士楊榮為太常卿進太子少傅兼謹身殿大學士又升工部尚書在內閣辦事楊溥永樂繫獄十年至是釋出擢翰林院學士尋升太常卿兼學士內閣辦事此三人皆以龍飛超升委任不可以例論也後楊溥丁憂起復不入閣宣德間因九年三品考滿方升禮部尚書學士如故英宗即位復命入內閣正統四年修宣廟實録成溥進少保士竒榮進少師號三楊由是內閣之權漸重無異宰相之設六部之權漸經凡事皆多禀受內閣風旨而後行日久因襲遂不可改矣黃瑜雙槐嵗抄文淵閣為天子講讀之所非政府也故列凳側坐而虛其中以俟臨視洪武中代言修書授諸王經者皆在而戶曹張賞賜次於旁用備賚豫永樂初命解縉等七人入掌密勿凡行移稱翰林院內閣官傳㫖條㫖則與尚書蹇義夏原吉同事而學士王景輩不與焉縉等遷至大學士惟胡儼尋擢祭酒庚寅二月儼兼侍講再入閣有詩云承乏詞林愧不才重承恩詔直藝臺蓋詞臣入直之常耳洪熙初閣老皆躋保傅參預機務惟在北京宣德時臨視至再始設庖㕑不復退食於外而出掌部者不再入正統初開經筵於文華殿聖駕自是罕至傳㫖則中官専之惟條旨墨書小票司禮監用硃批出間有依違而他官不與逮徐武功李文達掌文淵閣事始以政府視之人亦稱為宰相矣鄭曉今言先朝內閣亦調外任宣德中陳山張瑛以干請諸司出山教小內使出瑛為南京禮部尚書景泰中亦出江淵為禮部尚書不獨解與胡也孤卿入內閣自王文始先朝重冡宰雖內閣元輔厯二三十年亦不得領吏部尚書內閣之領吏部尚書也亦自文始也孫承澤春明夢餘録文淵閣未有言掌者徐有貞以武功伯領之遂改為掌文淵閣王世貞譏之以謂文淵不可掌也吏部左侍郎李賢為本部尚書兼翰林院學士掌文淵閣事則又不止武功也又考解縉入閣居七人之首其繫銜亦曰掌文淵閣事則又不始于武功也李日華官制備考嘉靖中又名奉天殿為皇極華蓋殿為中極謹身殿為建極而大學士名官如其初明史職官志嘉靖以後朝位班次俱列六部之上萬斯同宰輔彚考成祖始設內閣其秩甚卑朝班各依其品逺在尚書侍郎下厥後解縉出為參政胡儼改為祭酒胡廣積資十五年楊榮金幼孜積資十九年始得列銜文華獨五品也至仁宗踐阼楊士竒始授華蓋黃淮始授武英與榮幼孜並加至侍郎尚書且漸膺東宫保傅而士竒至為三孤自是內閣位尊權重出尚書右矣然正統末商輅彭時以修撰入天順初嶽正以贊善入猶小臣也班亦各依其品其以侍郎入自宣德張瑛始以左都御史入自景泰王文始以禮部尚書入則自𢎞治邱濬始自時厥後悉用翰林大僚然以侍郎詹事少詹事入者止兼翰林學士不遽授大學士也嘉靖時翟鑾李本猶然至隆慶初張居正以侍郎入遽列銜東閣自是初拜者無不即授大學士矣逮崇禎末魏藻德以修撰改少詹事即授東閣則是閣體已尊不得不然也明史職官志序明自洪武十三年罷丞相不設析中書省之政歸六部以尚書任天下事侍郎二之而殿閣大學士祗備顧問帝方自操威柄學士鮮所參决外設都布按三司分隸兵刑錢榖其考核則聼於府部是時吏戶兵三部之權為重逮仁宣朝大學士以太子經師恩纍加至三孤望益尊而宣宗內柄無大小悉下大學士楊士竒等參可否雖吏部蹇義戶部夏原吉時召見得預各部事然希濶不敵士竒等親自是內閣權日重即有一二吏兵之長與執持是非輒以敗至世宗中葉夏言嚴嵩迭用事遂赫然為真宰相壓制六卿矣然內閣之擬票不得不决於內監之批紅而相權轉歸之寺人於是朝廷之紀綱賢士大夫之進退悉顛倒於其手伴食者承意㫖之不睱間有賢輔卒蒿目而不能救迹其興亡治亂之由豈不在用人之得失哉謹案自漢魏事歸臺閣厯代以中書秉政統轄六曹三省長官久為宰相之職明太祖懲胡惟庸之擅權始廢丞相不設専任六部分相職於各尚書於是唐宋以來三省之制至洪武而一變其時威柄在上事皆親决雖嘗設殿閣大學士祗備顧問並不以為與聞國論之官至成祖始簡儒臣直文淵閣令其參預機務於是有內閣之名洪武之制至永樂而又一變然當時所謂入內閣者不過如內直之翰林故不置官屬其官銜但曰入閣辦事入閣預機務而已必洊加方得至大學士班秩俱五品而止未嘗得制六卿也自仁宗而後諸大學士厯晉尚書保傅品位漸崇専任票擬事權益重遂以大學士為定名班次在六部之上而尤重首揆至詔㫖章奏皆以首輔目之蓋永樂之制至中葉以後而又一變矣惟是大學士委寄雖隆而終明世秩止正五品故其官仍以尚書為重其署銜必曰某部尚書兼某殿閣大學士本銜在下而兼銜反在上此則其沿襲之失而名實不能相副者也其間因革變改之由隨時重輕皆可以考鑑得失謹據明史明實録參以他書所載臚具於右至於票擬揭帖推用班序規制儀式之詳見於諸書者尚多皆有閣於明代內閣典故今並節採附之於後云廖道南殿閣詞林記洪武中革去中書省分任九卿衙門中外章奏皆上徹御覽每斷大事决大疑臣下惟面奏取旨有所可否則命翰林儒臣折衷古今而後行之故洪武時批答皆御前傳旨當筆永樂洪熙二朝每召內閣造膝密議人不得與聞雖倚毗之意甚専然批答出自御筆未嘗委之他人也至宣德時始令內閣楊士竒輩及尚書兼詹事蹇義夏原吉於中外章奏許用小票墨書貼各疏面以進謂之條㫖中易紅書批出及遇大事猶命大臣面議議既定傳旨處分不待批答自後始専命內閣條旨然中每依違或徑由中出及天順復辟每事與內閣面議然後批行𢎞治末年總攬乾綱內閣條旨多孝廟御書涉重大至厪宣問幾復國初之舊今之建議者徒知批答當依內閣所條而不知有面議傳㫖故事或誤以條為調謂調和之義者非也王世貞筆記內閣臣職在司內外制而已未有所謂調㫖也自宣德中大學士二楊公與尚書蹇夏始有調旨之說而二楊復以位尊惡煩特奏以少詹事兼講讀學士王直王英専知誥敕然內閣實總之後直英出理部事以侍講學士陳循馬愈侍講曹鼐代之尋革併入內閣𢎞治甲寅復奏以學士李東陽兼禮部右侍郎掌誥敕說者謂為李公入閣地也李入閣太常卿程敏政代沿至吏部侍郎溫仁和以憂歸而大學士張桂等密疏不宜設自是遂罷謹案王直等以少詹事兼講讀學士知誥敕李東陽以學士兼禮部侍郎掌誥敕皆専司制誥而不預票擬蓋即今內閣學士之職也雙溪雜記英宗九嵗登極有詔凡事白於張太后然後行太后令付內閣議决每數日必遣中官入閣問連日曾有何事來商榷具帖開報驗看不付閣議者即召司禮監責之內閣票旨始此春明夢餘録舊制紅本到閣首輔票擬餘唯諾而已崇禎中御史倪元珙請分票其後本下即令中書分之首輔之權雖稍分然水火之端啓而中書之弊種種矣宋端儀立齊録初朝廷㫖意多出內閣臣調進旨稿留閣中號絲綸簿其後宦寺専恣收簿祕內徐有貞既得權寵乃告上如故事還簿閣中謹案明制以司禮監批紅故宦監得以竊弄魁柄實一代之粃政國朝定制凡內外本章閣臣票㫖進呈恭請裁定後即付批本處批清字於翌日下閣付內閣學士批漢字六科給事中受而行之制度最為慎重焉陳繼儒見聞録纍朝以來閣中凡有密奏及奉諭登答者皆稱為揭帖其制視諸司題式差狹而短字如指大以文淵閣印緘封進御左右近侍莫能窺也然揭亦不敢數數輕進每進揭主上輒動色謂左右云閣下揭帖至矣其重如此自江陵之後建言者多朝廷厭其激聒時處一二人而閣臣務欲暴白心迹不論是非輒上揭申救而主上亦以為套不復省矣謹案以上六條俱明代內閣票擬揭帖之制春明夢餘録閣員初無定額洪武初吳伯宗以武英殿大學士復為翰林院檢討永樂初王文忠以庶吉士入翰林未幾召同王直入內閣書機宜奏疏五年升修撰十四年進侍講入閣在先授官在後嗣後始以翰林院銜直文淵閣然惟胡文穆靖彭文憲時商文毅輅修撰楊文敏榮編修其他黃文簡淮以中書舍人楊文貞士竒以吳王府審理副陳汝靜敬宗張子玉瑛以鄉舉金文靖幼孜以給事中胡若思儼以桐城知縣俞綱以審理權謹以光祿署丞徐武功有貞以都御史李文達賢以主事王毅愍文薛文清瑄以御史髙文毅榖以中書舍人劉宇曹元以知縣袁榮襄宇皋以長史楊文襄一清以總督張文忠孚敬方獻夫桂萼二文襄霍文敏韜以主事席文襄書以户侍許文簡讚以吏書夏文愍言以給事皆不由館選自兹㑹推內閣冡宰掌院必列名至崇禎朝遂定為故事每次枚卜必內外兼推初設內閣楊文貞士竒厯二十三年官止五品後加至少師止兼兵部尚書華蓋殿三官時蹇忠定義以少師為冡宰朝廷不欲文貞班居其上以存冡宰之體也陳芳洲循雖兼五官亦止戶部尚書後李文達賢彭文憲時商文毅輅相繼領吏部尚書自後遂為首輔故事其以他官兼大學士者如楊士竒以禮侍兼華蓋金幼孜以戶侍兼武英陳山以户侍兼謹身張瑛以禮侍兼華蓋黃淮以通政使兼武英楊榮以太常兼文淵徐有貞以武功伯兼華蓋殿閣大學士自相兼者如陳循以華蓋兼文淵髙榖王文以謹身兼東閣胡廣楊榮金幼孜以文淵兼翰林院學士其內閣諸殿次第自正統間始定其兼銜次第自天順間始定然或以所兼保傅為等級或以部分為先後如楊榮以太子少傅謹身位少保黃淮武英下陳山無兼官以謹身位少保黃淮太子少保金幼孜武英下少保黃淮太子少保金幼孜以戶部尚書位少傅兵部楊士竒下楊溥無兼官以禮部位工部楊榮下王文以少保吏部位戶部陳循工部髙榖少保太子太傅下皆取所兼保傅為次序也張瑛以禮部華蓋殿位戶部謹身陳山下此則以部分為次序也謹案以上二條皆明代內閣推用班序之制王鏊震澤長語文淵閣在奉天殿東廡之東文華殿之前前對皇城深嚴禁密百官莫敢望焉吏人無敢至其地閣中趨侍使令惟厨役耳防漏泄也禁密文書一小匣在几上鑰之而不合大學士暮出而鑰其門匙懸門上恐禁中不時有宣索也故事禁中不得舉火雖閣老亦退食於外相傳宣宗一日過城上令內監瞰閣老何為曰方退食於外曰曷不就內食曰禁中不得舉火上指庭中隙地曰是中獨不可置庖乎今烹膳處是也自是得㑹食中堂又傳一日過城上瞰閣老何為曰方對奕曰何不聞落子聲曰棊以紙上笑曰何陋也明日賜象牙棊一副至今藏閣中又內閣庭中花臺上有芍藥三本相傳亦宣廟時植至今盛開泳化類編文淵閣在午門內學士每入以東西兩凳相對坐向無公座李賢自吏部入欲設公座如部堂之制彭時不可曰宣宗駕常幸此中坐故至今不敢南面賢意猶未釋已而英宗遣太監傅恭送銅範飾金孔子并四配像一龕置閣中賢乃止自是閣老每晨入對像一揖遇朔望率翰林官行四拜禮乃東西對坐謹案以上二條皆明代內閣規制儀式明史職官志中書科中書舍人二十人從七品直文華殿東房中書舍人直武英殿西房中書舍人內閣誥敕房中書舍人制敕房中書舍人並從七品無定員中書科舍人掌書寫誥敕制詔銀冊鐵劵等事員無正二印用年深者掌之文華殿舍人職掌奉旨書寫書籍武英殿舍人職掌奉旨篆寫冊寶圖書冊頁內閣誥敕房舍人掌書辦文官誥敕翻譯敕書并外國文書揭帖兵部紀功勘合底簿制敕房舍人掌書辦制敕詔書誥命冊表寶文玉牒講章碑額題奏揭帖一應機密文書各王府敕符底簿明太祖實録洪武七年二月上命省臣選儀貌端莊善應對知時務者以備任使於是中書省考唐制通事舍人掌通奏引納辭見承旨宣勞皆以善於辭命者為之元制中書省設直省舍人三十二人皆以公卿子弟為之執掌傳布王命宣行制誥及國有重事悉得差遣今議中書省宜設直省舍人十人秩從八品從之泳化類編洪武丙辰改直省舍人為中書舍人建文中改侍書入文翰館靖難後復故此官典司天子辭命職掌至重日給大官酒饌與翰林宫坊尚寶司六科同為侍從之臣諸司無相並者其選用自進士外舉人與纂修書成被恩典者乃得之監生生儒惟有勳勞大臣暨宫僚講官子孫宜承廕敘奉特旨者乃得之用之亦非輕矣明史職官志宣德間內閣置誥敕制敕兩房皆設中書舍人嘉靖二十年選各部主事大理寺評事帶原銜直誥敕制敕兩房四十四年兩房員缺令吏部考選舉人為中書舍人隆慶元年今兩房辦事官不得升列九卿按洪武間置承敕監司文監考功監參掌給授誥敕之事永樂初命內閣典機務詔冊制誥皆屬之而謄副繕正皆中書舍人入辦事竣輒出宣德初始選能書者處於閣之西小房謂之西制敕房而諸學士掌誥敕者居閣東具稿付中書繕進謂之東誥敕房此係辦事若知制誥銜惟大學士與諸學士可帶正統後學士不能視誥敕內閣悉委於中書序班譯字等官於是內閣又有東誥敕房因劉鉉不與輔臣㑹食始嘉靖末復以翰林史官掌外制而武臣誥敕仍自其屬為之若詔赦勒革之類必由閣臣翰林諸臣不得預其直文華武英兩殿供御筆札者初為內官職繼以中書分直後亦専舉能書者大約舍人有兩途由進士部選者得遷科道部屬其直兩殿兩房舍人不必由部選自甲科監生生儒布衣能書者俱可為之不由科甲者初授序班及試中書舍人不得遷科道部屬後雖加銜九列仍帶銜辦事楷書出身者或加太常卿銜沈度沈粲潘辰等有加至翰林學士禮部尚書者徐學謨世廟識餘録兩房中書遷轉至嘉靖初年始由閣下題請中書周令者溫州人嘗言成化年間授職彼時中書與閣下如同僚然投刺如平交蓋宣德以前本一堂相處今云西房即文淵閣也閣臣居中中書居東西兩房各辦其事已撤內庫十間以西五間居閣下謂之文淵閣以東五間藏書籍而東房中書亦遷居之故今以閣下稱中堂而東西非房矣猶稱兩房者沿舊名也凡閣下到任尚之兩房答揖若六部之於各司無是體矣梁清逺雕邱雜記明朝中書有四一為中書科中書舍人在中書科掌書寫誥敕三甲進士選授大臣子孫廕授而舉人有軍功者亦間授焉一為內閣中書則在內閣制敕誥敕兩房辦事其監生譯字生考授者職書寫誥敕及謄擬旨加銜可至大卿而外升者少舉人考授者則代閣臣撰擬三年滿升各部主事一為文華殿中書則専職書寫匾額對聨之類納粟者多而考授者少一為武英殿中書則専職圖繪內臣得而統屬之納粟者愈多而考授者愈少矣此二者名為兩殿中書俱可加銜至卿寺謹案唐宋中書舍人典司制命為中書省正官蓋如今之內閣學士至明代中書舍人所掌僅書寫繕録之事不得行詞非唐宋中書舍人之職當洪武初置時雖稱仿唐代通事舍人而設不知通事舍人乃如今之奏事處官中書亦非其制以職事論之實當為唐宋之中書省掾屬特其時如主書録事諸官皆以雜流為之而明之中書科及兩房舍人則多用士人且地居中禁凡朝廷大典禮皆得襄事其間視外諸司尤稱近密故當時以為清職本朝中書科中書以廕生貢監及知縣之應升者補授不盡用甲科而內閣中書則自康熙初定制専以進士舉人注授間以散館庶吉士及進士朝考入選者為之我皇上鑾輅時巡諸生有獻賦行在者每召而試之拔其尤以充是職登用之途視前代益為華選矣欽定厯代職官表卷四
