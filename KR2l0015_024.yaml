body:
  text: 都察院表都察院上國朝官制都察院左都御史滿洲漢人各一人初制滿洲一品漢人二品順治十六年改俱為二品康熙六年復改滿洲為一品九年俱定為正二品雍正八年俱升為從一品左副都御史滿洲漢人各二人正三品掌察核官常整飭綱紀國初都察院置承政一員左右參政各二員順治元年改承政為左都御史參政為左副都御史員數增减不一三年定設左副都御史滿洲漢人各二人五年定設左都御史滿洲漢人各一人舊有滿洲啓心郎一員漢軍啓心郎二員順治十五年省又有漢人左僉都御史一員乾隆十年省其右都御史為總督坐銜右副都御史為巡撫坐銜俱無京員故都察院長官皆以左繫銜焉吏科户科禮科兵科刑科工科掌印給事中滿洲漢人各一人給事中滿洲漢人各一人掌印給事中初制滿洲四品康熙二年改為七品六年復為四品九年定俱為正七品雍正七年升為正五品給事中初制從七品雍正七年均升為正五品掌傳逹綸音稽考庶政吏科分稽銓衡注銷吏部順天府文卷户科分稽財賦注銷户部文卷禮科分稽典禮注銷禮部宗人府理藩院太常寺光祿寺鴻臚寺國子監欽天監文卷兵科分稽戎政注銷兵部太僕寺鑾儀衛文卷刑科分稽刑名注銷刑部通政使司大理寺文卷工科分稽工程注銷工部文卷國初沿明制六科自為一署順治十八年設滿洲漢人都給事中各一員滿洲漢人左右給事中各一員漢人給事中二員康熙四年六科止留滿洲漢人給事中各一員餘俱省五年復增設掌印給事中滿洲漢人各一員雍正元年始奉詔以六科𨽻都察院聼都御史考核焉京畿河南江南浙江山西山東陜西湖廣江西福建四川廣東廣西雲南貴州十五道掌印監察御史滿洲漢人各一人江南道監察御史滿洲漢人各三人山東道監察御史滿洲漢人各二人京畿河南浙江山西陜西湖廣江西福建道監察御史滿洲漢人各一人初制滿洲漢軍三品順治十六年改為七品康熙六年改為四品九年復為正七品雍正七年定以滿洲由員外郎漢軍由郎中升授漢人由內閣侍讀編修檢討郎中員外郎補授者為正七品由中行評博行取知縣補授者為正六品乾隆十七年俱改為從五品掌糾劾官邪條陳治道京畿道分理院事及直𨽻盛京刑名稽察內閣順天府大興宛平縣河南道分理河南刑名照刷部院諸司卷宗稽察吏部詹事府步軍統領五城江南道分理江南刑名稽察户部寶泉局左右翼監督在京十有二倉總督漕運磨勘三庫月終奏銷之籍浙江道分理浙江刑名稽察禮部都察院山西道分理山西刑名稽察兵部翰林院六科中書科總督倉場坐糧㕔大通橋監督通州二倉山東道分理山東刑名稽察刑部太醫院總督河道催比五城命盜案牘緝捕之事陜西道分理陜西刑名稽察工部寶源局核勘在京工程湖廣道分理湖廣刑名稽察通政司國子監江西道分理江西刑名稽察光祿寺福建道分理福建刑名稽察太常寺四川道分理四川刑名稽察鑾儀衛廣東道分理廣東刑名稽察大理寺廣西道分理廣西刑名稽察太僕寺雲南道分理雲南刑名稽察理藩院欽天監貴州道分理貴州刑名稽察鴻臚寺又八旗事務每嵗以滿洲科道四員專司稽察一年又宗人府事務以宗室御史稽察內務府事務初設御史四員稽察後省今以協理陜西道掌貴州道滿洲御史二員兼管皆不為専闕焉國初設滿洲御史二員順治五年增置十七員康熙二十八年又增一員雍正五年始置宗室御史二員䝉古初置章京二員康熙元年省五十七年增置䝉古御史二員漢軍御史初置八員康熙三十九年省三員雍正初俱省統歸漢人額缺內補用漢人御史順治初置六十九員旋省二十九員康熙初又省十六員雍正四年增置八員乾隆十三年又省九員十四年定設滿洲漢人員額如今制宗室䝉古御史俱統於滿洲員額之數四十六年復增置宗室御史二人而省滿洲員額二人謹案舊制御史分設十四道而以河南江南浙江山西山東陜西為六掌道分稽在京諸司及各直省刑名河南道仍參治院事京畿道惟司照刷卷宗六掌道各以二員或一員協理依次遞遷其他則謂之坐道皆不理本道之事惟存空銜而已乾隆十四年特詔釐正按道定額各給印信而以職事分𨽻之名實相符規制始為允稱二十年復命以京畿道改列河南道之前俾互易所掌而官署亦從對換焉於是次序秩然益昭整肅矣至京畿河南二道員闕皆長官掄選疏請簡調各道掌印則以資深者遞轉其四川廣西廣東雲南貴州五道滿漢員額本各一人初制新授者即補掌印今改定亦由江南等八道遞轉焉經厯滿洲漢人各一人正六品都事滿洲漢人各一人正六品經厯掌董察吏胥都事掌繕寫章疏而行遣文書之事則兩㕔分理之經厯初稱司務後改為經厯員額順治元年定都事初置滿洲二人漢軍一人康熙三十九年省漢軍員額乾隆十七年省滿洲都事一人改為滿洲漢人各一人筆帖式滿洲三十五人䝉古二人漢軍五人六科筆帖式滿洲八十人職事見吏部篇都察院筆帖式初置滿洲五十一人漢軍七人康熙三十八年省滿洲十有六人漢軍二人䝉古筆帖式雍正十二年置額六科筆帖式初置一百有七人乾隆二年省二十七員其分𨽻之制堂筆帖式十人京畿道江南道各三人河南浙江山西山東陜西湖廣江西福建四川廣東廣西雲南貴州道各二人吏科户科兵科刑科各十有五人禮科工科各十人巡察京通各倉科道十有四人掌稽察在京祿米等十有二倉通州中西二倉核其出納而禁其盜竊以釐剔弊端嵗以十月引見𣲖往一年而代巡視淮安漕務科道一人舊駐淮安今移瓜儀巡視濟寧漕務科道一人駐濟寧巡視天津漕務科道一人舊駐天津今移楊村巡視通州漕務科道一人駐通州掌催督糧運凡官吏須索稽留及旗丁私挾禁物者咸糾治之濟寧巡漕兼掌運河水道董察有司以時其疏濬焉每嵗十月奏請簡𣲖給欽差官員關防以行事竣而納之巡察盛京科道滿洲一人巡察吉林黑龍江科道滿洲二人巡察臺灣科道滿洲漢人各一人掌巡省風俗釐察奸弊核考稽違凡地方興革事宜及吏治民情皆以實採訪而入告焉盛京巡察雍正三年置吉林黑龍江巡察雍正元年置初制每嵗更代後改定俱五年掄遣一次臺灣巡察康熙六十一年置初制亦每嵗更代雍正五年以漢人巡察兼理臺灣學政乾隆十七年改定三年掄遣一次三十年復命届期奏請應否派往均侯㫖以行謹案各省巡按御史國初承明舊制置自郎中以下各官皆得選任兼憲銜以行順治十八年定議永行停止又有巡江御史巡視屯田御史俱順治初停止督理茶馬御史康熙初停止又雍正三年設各省巡察以督捕盜賊由科道及小京堂部屬各官掄遣江寧安徽共一人湖北湖南共一人山東河南共一人四年設直𨽻巡查御史順天及永平宣化二人保定正定河間二人順德廣平大名二人又有巡視山東河湖工務御史一員雍正元年置直𨽻巡農御史一員雍正七年置嗣俱先後停止謹附識於此厯代建置上此卷專叙都御史御史等官沿革三代周禮天官小宰之職掌建邦之宫刑以治王宮之政令凡宫之糾禁鄭康成注若今御史中丞謹案漢御史中丞執法殿中與周官小宰掌宫刑以憲禁於王宮者相近故鄭氏援以為比謹著之於此以明法官源流所自而其職本天官之二故仍繫諸吏部表內焉周禮春官御史中士八人下士十有六人其史百有二十人府四人胥四人徒四十人掌邦國都鄙及萬民之治令以贊冡宰凡治者受法令焉掌贊書凡數從政者鄭康成注御猶侍也進也謹案周官御史次於內史外史之後蓋本史官之屬故杜佑以為非今御史之任然考其所掌如贊冡宰以出治令則凡政令之偏私闕失皆得而補察之故外內百官悉當受成法於御史實後世司憲之職所由出今仍繫之於表吕祖謙大事記御史之名見於周官以中下士為之特小臣耳至於戰國其職益親故獻書多云獻書於大王御史秦趙澠池之㑹命御史書事淳于髠亦曰御史在後執法在傍是又掌記事糾察之任也秦荀朂辭尚書令表昔六官所掌冡宰為首秦公卿贊以丞相御史為冠杜佑通典御史大夫秦官侍御史之率故稱大夫章俊卿山堂考索秦置御史大夫以二於相晉書百官志御史中丞本秦官也史記張蒼列傳秦時為御史主柱下方書索隱曰周秦皆有柱下史謂御史也恆在殿柱之下鄭樵通志法冠者秦始皇滅楚以其君冠賜御史亦名獬豸冠謹案秦漢御史大夫史稱其掌副丞相故漢時名為兩府薛宣傳簡在兩府師古曰丞相御史府也凡丞相有闕則御史大夫以次序遷乃三公之任與今都御史之職不同自東漢省御史大夫而以中丞為臺率始專糾察之任其後歷代或復置大夫或但設中丞規制各殊要皆中丞之互名蓋即今都察院堂官之職事矣然秦漢大夫雖未可當今都御史而其官實御史之長故中丞稱御史大夫丞見漢書張湯傳御史亦稱御史大夫史見漢儀注且所掌在承風化典法度薛宣傳御史大夫內承本朝之風化外佐丞相統理天下朱博傳御史大夫典正法度總領百官上下相監臨本兼執憲之司又不可以擬今之協辦大學士職名所承權輿有在故仍繫之都察院表內焉通典秦以御史監理諸郡謂之監察使案御史奉使巡察實昉于秦之監郡而戰國策稱安邑之御史則是六國時已有其制矣漢漢書百官公卿表御史大夫位上卿銀印青綬掌副丞相有兩丞秩千石一曰中丞在殿中蘭臺掌圖籍祕書外督部刺史內領侍御史十五人受公卿奏事舉劾案章成帝綏和元年更名大司空金印紫綬祿比丞相置長史如中丞官職如故哀帝建平二年復為御史大夫元夀二年復為大司空御史中丞更名御史長史通典漢時選郡守相髙第為御史大夫任職者為丞相李華御史大夫㕔壁記秦官有御史夫夫在漢為三公職副丞相丞相闕則大夫遷或名司空或名舊號史足徴也議大政必下丞相御史其廷署古曰府近曰臺王楙野客叢書鼂錯更令諸侯歡譁錯父從頴川來謂錯曰上初即位公為政用事云云如淳曰錯為御史大夫位三公也如淳意其父稱子為公蓋以此爾太平御覽漢舊儀曰御史大夫寺在司馬門內門無孰門署用梓板題曰御史大夫寺謝維新合璧事類漢謂之御史臺亦謂之蘭臺寺通典御史大夫有兩丞一曰御史丞一曰中丞亦謂中丞為御史中執法中丞居殿中察舉非法及御史大夫轉為大司空而中丞出外為御史臺率即今之御史大夫任也李華御史中丞㕔壁記御史亞長曰中丞二大夫以領其屬漢儀大夫副丞相以備其闕參雜國綱鮮臨府事故中丞専焉程大昌雍録漢百官表御史中丞在殿中蘭臺西京賦曰蘭臺金馬遞宿迭居按此蘭臺正在殿中石渠天祿皆在殿北漢則直在殿中中丞皆以未有外臺時為凖而名官以中也御史臺常與祕書為鄰唐世藏書皆具數申御史臺蓋故則也吳仁傑兩漢刋誤補遺百官表御史大夫更名大司空置長史如中丞官職如故刋誤曰多一如字仁傑曰此言是也表稱御史大夫有兩丞一曰中丞在殿中蘭臺掌圖籍祕書外督部刺史內領侍御史十五人受公卿奏事舉劾按章案鼂錯為御史大夫謂丞史云云如淳曰丞史丞及史也表載丞不載史漢紀始有之一曰中丞外督部刺史一曰內史掌祕書受公卿奏事舉劾按章然則表有缺文者矣督部刺史下當云一曰內史內領侍御史今缺四字置長史下當云省內史中丞官職如故今缺三字衍一字不然有兩丞而止著其一兩丞之外復置長史非缺則贅其義安在謹案前漢御史大夫非今都御史說已具前至御史中丞雖掌糾察而所居在殿中蘭臺為宮掖近臣亦與今副都御史有異至成帝以後中丞出居外臺其職始視今之都察院矣又百官表稱漢御史有兩丞而所載僅止中丞沈約宋書始以御史丞當其一然考之漢書多稱中丞間有單稱御史丞者如班書嚴延年傳事下御史丞按驗范書黃琬傳事下御史丞王暢以事核之皆即中丞之省文减宣傳上言稍遷御史及丞下言為御史及中丞二十載此即其證蓋行文者詳略互見並非别為一官且考薛宣傳稱宣為御史中丞執法殿中外總部刺史陳咸傳稱咸為御史中丞總領州郡奏事課第諸刺史內執法殿中所掌皆在督察州郡刺史而並不言其受公卿奏事故史記三王世家所載大司馬上疏其受以奏未央宫者有御史臣光之名而不及中丞說詳通政司篇吳仁傑據漢紀以為當作內史其說似不為無所本也應劭風俗通御史中丞舊治書侍御史也冊府元龜孝宣感路溫舒言秋季後請讞時帝幸宣室齊居而决事令侍御史二人治書治書御史起於此後因别置與符節郎共平廷尉奏罪當其輕重太平御覽漢官儀曰侍御史周官也為柱下史冠一名曰柱後以鐵為之言其審固不撓也或說古有獬豸獸主觸邪佞故執憲者以其角形為冠耳通典漢舊儀曰漢御史員四十五人皆六百石其十五人給事殿中為侍御史宿廬在石渠門外二人尚璽四人持書給事二人侍前中丞一人領録三十人留寺理百官事漢書蕭望之傳注如淳曰漢儀注御史大夫史員四十五人皆六百石其十五人給事殿中其餘三十人留寺治百官事皆冠法冠謹案漢自成帝以後中丞為御史臺率其職實如今之都御史而治書侍御史二人掌以法律當天下奏讞定其是非參主臺事猶其初之有兩丞則亦當如今副都御史之職也至御史在漢雖有殿中及留寺之分然皆歸大夫及中丞統屬故尹齊傳稱齊為御史事張湯董賢傳稱孔光為御史大夫時賢父恭為御史事光蕭望之至使守史護視家事而鮑宣傳稱宣摧辱丞相事下御史中丞侍御史至司𨽻官欲捕從事云云蓋亦因中丞承詔治宣獄故使侍御史往捕則侍御史之得聽中丞差委亦槩可見矣通典漢有御史主簿漢書孫實傳張忠為御史大夫署寶為主簿漢書武帝本紀御史乘屬在廟旁如淳注漢儀注御史亦有屬漢書嚴延年列傳以選補御史掾舉侍御史漢書蕭望之列傳少史冠法冠蘇林注少史曺史之下者也謹案漢御史臺主簿及椽當如今之經歷都事等官而御史屬獨不詳其秩位考胸奴傳載祁連欲引兵還御史屬公孫益壽諫以為不可擢益壽侍御史是其職亦當與椽相近蓋是時田廣明以御史大夫為祁連將軍故得以其屬行其言御史屬者乃御史大夫之屬非侍御史也漢書所云丞相御史及制詔御史者皆指御史大夫史家省文往往如是耳漢書百官公卿表侍御史有繡衣直指出討姦猾治大獄武帝所制不常置漢書王欣列傳繡衣御史暴勝之持斧逐捕盜賊元后列傳王賀為武帝繡衣御史逐捕魏郡羣盜唐六典惠帝三年相國奏御史監三輔不法事凡九條馬端臨文獻通考漢惠帝初置御史監三輔其後又置監御史漢官儀曰侍御史出督州郡賦稅運漕軍糧漢書胡建列傳監軍御史與護軍諸校列坐堂皇上謹案御史出使至西漢而漸多如繡衣直指監郡督運監軍之類皆以事專行正如今巡漕巡察諸差之比其他隨時奉遣者尚屢見於史如食貨志載分遣御史即治郡國緡錢宣帝紀載黃龍元年詔御史察計簿霍光傳載侍御史五人持節護喪事皆非常例而收縛罪人亦多以侍御史為之劉輔傳上使侍御史收繫輔谷永傳上使侍御史收永朱雲傳御史將雲下殿蓋因其給事殿中職居親近故事之重且急者往往使之銜命耳又叔孫通傳載長樂宮置酒御史執法舉不如儀者輒引去無敢歡譁失禮者則又今糾儀之職所自始矣通典後漢初廢御史大夫至建安十三年罷三公官始復置之以郗慮居焉不領中丞置長史一人後漢書百官志御史中丞一人千石本注曰御史大夫之丞也舊别監御史在殿中密舉非法及御史大夫轉為司空因别留中為御史臺率後又屬少府治書侍御史二人六百石本注曰選明法律者為之凡天下諸讞疑事掌以法律當其是非侍御史十五人六百石本注曰掌察舉非法受公卿羣吏奏事有違失舉劾之凡郊廟之祠及大朝㑹大封拜則二人監威儀有違失則劾奏蘭臺令史六百石本注曰掌奏及印工文書洪適𨽻釋巴郡太守張納碑五府表君中丞督缺二字武汾沄所向禽殪日不移晷收功獻捷車騎將軍馮緄碑御史中丞督使揚徐二州討賊范朱生徐鳯馬勉張嬰等幽州刺史朱龜碑於時益州蠻夷侵寇邊郡陸梁山野為害日甚朝廷以君能缺二字武缺二字御史中丞討彼亂略君統整羣帥方謀並設威神霆電燭於上下至缺二字郡缺四字授首後漢書宣秉列傳光武特詔御史中丞與司𨽻校尉尚書令㑹同並專席而坐故京師號曰三獨坐謹案後漢書馬援傳稱馬嚴拜侍御史中丞當以其為侍御史之長故又有此稱也至中丞督兵討捕盜賊已見於前漢成帝時逮東京而其事尤多范史所載如馮緄以御史中丞將兵督揚州九江諸郡軍事盛修以御史中丞募兵討長沙零陵賊不一而足今督撫之兼都御史副都御史銜其制蓋權輿於此矣通典治書御史選御史髙第者補之自桓帝之後無所平理充位而已侍御史以公府掾屬髙第補之或以故牧守議郎郎中為之順帝後絶他選專用宰士有三缺三府各一冊府元龜侍御史二漢所掌凡五曹一曰令曺掌律令二曰印曹掌刻印三曰供曹掌齊祀四曰馬曹掌廏馬五曰乘曹掌護駕謹案前漢御史多以刀筆吏積勞得之後漢始以公府掾屬選補蓋即如今由部屬保舉之例而後漢書載司徒劉愷辟韋豹謂之曰今嵗垂盡當選御史意在相薦子其宿留則選舉之期又當在每嵗冬月矣至後漢侍御史有出使安集州縣者杜詩傳為侍御史安集洛陽是也有主從駕行幸平治道路者章帝紀帝東巡狩敕侍御史方春母得有所伐殺虞延傳駕經封邱城門門小不容羽蓋帝怒使撻侍御史蓋即所謂乘曹之職是也有出督軍旅者髙彪傳第五永為督軍御史使督幽州桓典傳典為侍御史奉使督軍破賊是也有慰撫屬國者李恂傳拜侍御史持節使幽州宣布恩澤慰撫北狄是也有監護東宮者种皓傳順帝時為侍御史監護太子是也有使典喪事者楊賜傳賜卒使侍御史持節送喪蘭臺令史十人發羽林騎輕車介士是也而郭憲傳又稱執法奏為不敬章懷太子注執法糾劾之官是御史亦可稱執法殆如中丞之為中執法歟伏湛傳注王莽改御史曰執法其名蓋起於此通典後漢譙元為繡衣御史持節分行天下沈約云繡衣御史光武省順帝復置謹案譙元本傳元以中散大夫為繡衣使者並非御史且其事在平帝元始四年亦非後漢也杜佑此條徴引殊誤三國三國蜀志向朗列傳郎子條景耀中為御史中丞雍録魚豢魏略載薛夏之言曰蘭臺為外臺祕書為內閣此時御史所掌祕籍已不在禁中矣故命為外臺冊府元龜魏文帝黃初二年又以御史大夫為司空改中丞為宮正後皆復舊名侍御史八人又置治書執法掌奏劾治書侍御史但掌律令宋書百官志魏置御史八人有治書曹掌度支運課第曹掌考課不知其餘曹也通典魏蘭臺遣二御史居殿中察非法即殿中侍御史之始也三國魏志杜襲列傳文帝踐阼襲為督軍糧御史更為督軍糧執法三國魏志明帝本紀黃初七年遣治書侍御史荀禹慰勞邊方景初元年冀兖徐豫四州民遇水遣侍御史循行沒溺開倉賑救之冊府元龜吳亦有御史夫夫孫休永安元年命大將軍孫綝領之後又置左右御史大夫五年以廷尉丁密光祿勳孟宗分為之三國吳志是儀列傳拜侍中中執法平諸官事三國吳志薛綜列傳綜子瑩孫皓初為左執法胡綜傳拜偏將軍兼左執法三國吳志陸凱列傳凱弟允始為御史三國吳志樓元列傳孫休時為監農御史謹案蜀吳官制史志有闕今採列傳所載以補其略至吳之中執法左執法其職較崇當亦即中丞之改名也晉冊府元龜晉初罷大夫因漢制以中丞為臺主李華御史中丞㕔壁記晉宋元魏以還無御史大夫由是中丞威望愈尊禮有加等通典晉亦因漢以中丞為臺主與司𨽻分督百僚自皇太子以下無所不糾初不得糾尚書後亦糾之晉傅成奏云司𨽻中丞得糾太子而不得糾尚書臣所末譬朝廷無以易之中丞專糾行馬內司𨽻專糾行馬外雖制如是然亦更奏衆官實無其限晉書職官志晉置治書侍御史四人泰始四年又置黃沙獄治書侍御史一人秩與中丞同掌詔獄及廷尉不當者皆治之後并江南遂省黃沙治書侍御史及太康中又省治書侍御史二員侍御史員九人品同治書而有十三曹吏曹課第曹直事曹印曹中都督曹外都督曹媒曹符節曹水曹中壘曹營軍曹法曹算曹及江左初省課第曹置庫曹後分置外左庫內左庫云殿中侍御史晉置四人江左置二人又案魏晉官品令又有禁防御史第七品孝武太元中有檢校御史吳琨則此二職亦蘭臺之職也葉夢得石林燕語自晉魏以來凡入殿奏事官以御史二人管殿門外搜索而後許入謂之監搜御史立藥樹下至唐猶然太和中始罷之趙彥衛雲麓漫鈔東晉時有檢校御史專掌行馬外事以吳琨為之晉書孝武帝本紀太元六年正月初置督運御史官宋齊梁陳宋書百官志御史中丞掌奏劾不法秩千石治書侍御史掌舉劾官品第六已上分掌侍御史所掌諸曹若尚書二丞侍御史掌察舉非法受公卿奏事有違失者舉劾之太祖元嘉中省外左庫世祖大明中復置順帝初省營軍併水曹省算曹併法曹吏曹不置御史凡十御史焉南齊書百官志御史中丞一人治書侍御史二人侍御史十人隋書百官志御史臺梁國初建置大夫天監元年復曰中丞置一人掌督司百寮治書侍御史二人分統侍御史侍御史九人居曹掌知其事糾察不法殿中御史四人掌殿中禁衛陳承梁皆循其制官謹案治書侍御史自應劭已比之中丞魏晉以後分統侍御史沈約謂若尚書二丞則其職事更崇今故繫之副都御史表內至治書或作持書或作侍書考太平御覽引風俗通有舊注國諱改焉後厯代皆同九字當係唐人原本所題蓋唐避髙宗諱改治為持又訛作侍也今並從漢書本文作治字焉又案江左諸朝中丞獨專論劾之責羣臣得罪多有以失糾免官者南史蔡廓傳謝靈運殺人御史中丞王淮之坐不糾免官故每不能久于其位劉休傳載休為中丞啓言宋世載記六十歷斯任者五十有三校其年月不過盈嵗是也又當時條制亦往往與前代較異如王僧䖍傳稱甲族由來不居憲臺殆恐其有所瞻徇而然又到洽傳稱舊制中丞不得入尚書下舍洽兄溉為左户尚書至刺省詳决始許入省則不知其何故矣北魏楊衒之洛陽伽藍記永寧寺北鄰御史臺魏書官氏志御史中尉第三品上治書侍御史第五品上侍御史殿中御史從第五品中又高祖復次職令御史中尉從第三品治書侍御史第六品侍御史第八品殿中侍御史從第八品檢校御史第九品謹案魏李彪為御史中尉而洛陽伽藍記又載高祖舉酒曰三三橫兩兩縱誰能辨之賜金鍾御史中丞李彪曰沽酒老嫗甕注𤬪屠兒割肉與稱同然則當時雖改中丞為中尉而中尉仍通稱中丞也徐堅初學記侍御史後魏八人殿中侍御史後魏置十四人檢校御史後魏置十二人魏書官氏志天興四年九月罷外蘭臺御史總屬內省通典後魏御史甚重必以對䇿髙第者補之侍御史與殿中侍御史晝在外臺受事夜則番直內臺御史舊式不隨臺主簡代延昌中王顯有寵於宣武為御史中尉始請革選此後踵其事每一中尉則更簡代御史魏書韋纘列傳遷侍御史中散髙道悅列傳少為中書學生侍御主文中散謹案治書侍御史宋齊其任稍輕至梁復重其選通典謂後魏掌糾禁內朝㑹失時服章違錯饗宴㑹見悉所監之則其職亦次於中尉故魏書李彪傳載李冲劾彪表稱輒集治書侍御史臣酈道元等以彪所犯罪狀訊其虛實云云蓋時彪方為中尉彪既被罪故臺官即以道元為首也至侍御中散主文中散二官不見於官氏志而由此可轉御史殆亦掾史之屬如今之經歷都事歟又案北魏亦有監軍御史畢祖彥傳以侍御史為元法宣監軍及出使徴兵髙道悅傳車駕南征徵兵秦雍期秋季閲集洛陽使者治書御史薛聰等稽遲期會與典治喪事者王肅傳遣侍御史一人監護喪事大抵多沿前代之制至巡察州郡雖無專職而髙聰傳稱聰為并州刺史再為御史舉奏張纂傳稱纂為樂陵太守多所受納聞御史至棄郡逃走則是乘傳糾察者亦時有其事矣北齊隋書百官志後齊御史臺掌糾察彈劾中丞一人治書侍御史二人侍御史八人殿中侍御史檢校御史各十二人録事四人謝維新合璧事類御史臺自齊梁皆謂之南司梁及後魏北齊或謂之南臺謹案南臺之名不始於梁據南史王曇首傳載宋元嘉四年車駕出北堂使三更開廣莫門南臺不肯開左丞羊元保奏免中丞傅隆又袁凱傳有南臺御史王道隆沈文季傳有南臺御史賀咸則自宋齊已有此稱矣後周冊府元龜後周六官之建改中丞為司憲中大夫御史臺為司憲屬秋官府置司憲上士二人中士人數闕旅下士八人通典後周有司憲中大夫掌司寇之法辨國之五禁隋隋書百官志髙祖受命置御史臺大夫二人治書侍御史二人侍御史八人殿內侍御史監察御史各十二人録事二人御史始自吏部選用仍依舊入直禁中煬帝即位多所改革御史臺增治書侍御史為正五品省殿內御史員增監察御史員十六人加階為從七品開皇中御史直宿禁中至是罷其制又置主簿録事員各二人侍御史惟掌侍從糾察其臺中簿領皆治書侍御史主之通典隋以國諱改中丞為大夫初學記隋室諱中省中丞增治書御史之品以代之謹案隋以中丞為大夫而治書侍御史専主簿領以為之二至唐復改治書為中丞自是而後大夫即漢魏中丞之職中丞即漢魏治書御史之職名雖遞易而實則無殊也至漢御史給事禁中號稱近職故後漢書載侍御史何敞上疏至有臣謬預機密之語見郅夀傳嗣後雖代有變更而蘭臺猶屬內省自隋煬帝罷直宿之制於是御史始専𨽻外臺矣通志隋大業三年始置主簿二人兼置録事一人案通志作録事二人與隋書異疑有悮唐唐六典御史大夫一人從三品中丞二人正五品掌邦國刑憲典章之政令以肅正朝列侍御史四人從六品下令史十五人書令史二十五人掌糾舉百僚推鞫獄訟主簿一人從七品下録事二人從九品下掌印及受事發辰勾檢稽失殿中侍御史六人從七品上令史八人書令史十人掌殿廷供奉之儀式監察御史十人正八品上令史三十四人掌分察百僚巡按郡縣糾視刑獄肅整朝議李華御史大夫㕔壁記距義寧至先天登宰相者十二人以本官參政者十三人故相任者四人藉威聲以稜檄外按戎律者八人官或改稱大司憲臺或分為左右肅政罷置不恆從其宜也開元天寶中刑措不用元元休息由是務簡益重地清彌尊在難其人多舉勳德至宰輔者四人宰輔兼者一人故相任者一人兼節度者九人異姓封王者二人新唐書百官志髙宗改治書侍御史為中丞以避帝名龍朔二年改御史臺曰憲臺大夫曰大司憲中丞曰司憲大夫武后文明元年改御史臺曰肅政臺唐會要光宅二年改為左肅政臺専管在京百司及監軍旅更置右肅政臺其職員一准左臺令按察京城外文武僚神龍元年改為左右御史臺景雲三年廢右臺先天二年又置右臺尋又廢趙璘因話録髙宗朝改門下省為東臺中書省為西臺尚書省為文昌臺故御史臺呼為南臺南朝同也武后朝御史臺有左右肅政之號當時亦謂之左臺右臺則憲府未曾有東西臺之稱惟俗間呼在京為西臺東都為東臺李栖筠為御史大夫後人不名者呼為西臺又不知出何故事豈以其名上栖字遂呼之耶舊唐書職官志㑹昌二年十二月敕大夫掌邦國刑憲肅政朝廷其任既重品秩宜峻准六尚書例升為正三品中丞為憲臺長升為正四品下與丞郎出入迭用著之於令顔真卿與右僕射定襄郡王郭英乂書宰相御史大夫兩省五品供奉官自為一行劉肅大唐新語李承嘉為御史大夫謂諸御史曰公等奏事須報承嘉知不然無妄聞也諸御史悉不禀之承嘉厲而復言監察蕭至忠徐進曰御史人君耳目俱握雄權豈有奏事先咨大夫臺無此例設彈中丞大夫豈得復咨耶承嘉無以對通典中丞二人亦時有內供奉本有一人聖歷中加一人尋省先天中復置職副大夫通判臺事謹案唐代節鎮多加御史大夫銜其入為本官則謂之知臺事代宗紀以浙西觀察使蘇州刺史御史大夫李涵知臺事是也其大夫闕官而中丞攝事者則謂之知大夫事資治通鑑御史中丞知大夫事李嗣真是也至唐世以中丞為次對官胡三省通鑑注宰相對延英既退常參官得引對者以次宰相之後故曰次對今制三品以上惟副都御史奏事宫門得以緑頭牌簽名進呈與尚書都御史侍郎同蓋猶其舊制矣大唐新語宋璟則天朝以頻論得失內不能容而憚其公正乃敕璟往揚州推按奏曰臣以不才叨居憲府按州縣乃監察御史事耳今非意差臣不識其所由請不奉制無何復令按幽州都督屈突仲翔璟復奏曰御史中丞非軍國大事不當出使且仲翔所犯贓汚耳今髙品有侍御史卑品有監察御史今敕臣恐非陛下之意當有危臣請不奉制月餘優詔令副李嶠使蜀嶠喜召璟曰叨奉渥恩與公同謝璟曰恩制示禮數不以禮遣璟璟不當行謹不謝乃上言曰臣以憲司位居獨坐今隴蜀無變不測聖意令臣副嶠何也恐乖朝廷故事請不奉制唐會要開元二十二年置京畿採訪處置使以中丞為之栁宗元河東集中丞壁記今之制受命臨戎無所統屬者謂之使開元以來其制愈重故取御史之名而加焉至于今若干年其兼中丞者若干人皆得以壯其威張其聲其用逺矣謹案唐自開元置採訪使始以中丞兼之其後為節度觀察刺史者多兼大夫中丞之號以至幕府參佐僚屬皆以御史為之謂之外臺此即後世行臺之制所自昉也舒元輿御史臺新造中書院記若御史臺每朝㑹其長總領屬官謁於天子道路誰何之聲逹于禁扉至含元殿西廡使朱衣從官傳呼促百官就班遲曉文武臣僚列于兩觀之下使監察御史二人立於東西朝堂甎道以監之雞人報㸃監者押百官由通乾象入宣政門及班于殿庭則左右巡使二人分押于鐘鼓樓下若兩班就食於廊下則又分殿中侍御史一人為之使以蒞之內謁者承㫖喚仗入東西閣門峨冠曵組者皆趨而進分監察御史二人立于紫宸屏下以監其出入爐烟起天子負斧扆聼政自螭首龍池南屬于文武班則侍御史一人盡得専彈舉不如法者因話録御史臺三院一曰臺院其僚曰侍御史衆呼為端公見宰相及臺長則曰某姓侍御知雜事謂之雜端見臺長則曰知雜侍御雖他官高秩兼之其侍御號不改見宰相則曰知雜某姓某官臺院非知雜者乃俗號散端二曰殿院其僚曰殿中侍御史衆呼為侍御見宰相及臺長雜端則曰某姓殿中最新入知右巡已次知左巡號兩巡使所主繁劇及遷向上則又入推益為勞屑惟其中間則入清間故臺中諺曰免巡未推只得自如言其暢適也㕔有壁畫小山水甚工云是吳道元真跡三曰察院其僚曰監察御史衆呼亦曰侍御見宰相及臺長雜端則曰某姓監察若三院同見臺長則通曰三院御史而主簿紀其所行之事每公堂食會雜事不至則無所檢轄惟相揖而已雜事至則盡用憲府之禮雜端在南揖主簿在北揖兩院則分坐雖舉匕筯皆絶談笑食畢則主簿持黃卷揖曰請舉事于是臺院白雜端曰舉事欲上堂三院長各于㑹堂南廊下先白雜端云合舉事則舉曰某姓侍御更有姓同者則以第行别之有某過謀准條主簿書之其兩院皆如此若舉時差錯則最小殿中舉院長最小侍御史舉殿院長又錯則向上人乃舉若雜端失笑則三院皆笑謂之烘堂悉免罰矣凡見黃卷罰直遇赦悉罰臺長到諸院凡官吏所罰亦悉免御史虛三院雖至美而月滿殿中推鞫之勞憚于轉兩院以向下侍御史便領推也多不願為以此臺中以殿中轉兩院為戲謔之辭每出入行步待御史在柱裏殿察兩院在柱外有時殿中入柱裏則共咍之曰著去也三院御史主簿有事白端公就其㕔若有中路白事謂之參端參端有罰殿中已免巡過正知巡者假故則向上人又權知謂之蘸巡臺官有親愛除拜喜慶之事則謁院長雜端臺長謂之取賀凡此皆用胥徒走卒之言遂成故事院長每上堂了各報諸御史皆立于南廊便服靸鞋以俟院長立定院長方出相揖而序行至殿院門揖殿中又序行至食堂門揖侍御史凡入門至食凡數揖大抵揖者古之肅拜也臺中無不揖其酒無起謝之禮但云揖酒而已酒最合敬以恐煩却損往往自臺拜他官執事亦誤作臺揖人皆笑之每赴朝序行至待漏院偃息則有卧揖上門有馬揖凡院長在㕔院內御史欲往他院必先白决罰又必先白察院有都㕔院長在本㕔諸人皆㑹話于都㕔亦白御史初上後遇雜端上堂則舉三愆九失儀意緣是新入欲併罰出未遇雜端上堂其犯舊條并不罰察院南院㑹昌初監察御史鄭路所葺禮祭㕔謂之松㕔南有古松也刑察㕔謂之魘㕔寢于此多魘兵察常主院中茶茶必市蜀之佳者貯于陶器以防暑濕御史躬親緘啓故謂之茶瓶㕔吏察主院中入朝人次第名籍謂之朝簿㕔吏察之上則館驛使館驛使之上則監察使監察使同僚之冠也謂之院長臺中敬長三院皆有長察院風彩尤峻凡三院御史初拜未朝謝先謁院長院長辭疾不見則不得及上矣趙彥衛雲麓漫鈔唐有三院御史侍御史謂之臺院殿中侍御史謂之殿院監察御史謂之監院趙石墨鐫華唐御史臺碑隂題名碑隂題侍御史并內供奉侍御史并內供奉監察御史共六百餘人通典侍御史之職有四謂推推者掌推鞫也彈掌彈舉公廨知公廨事雜事臺事悉總判之定殿中監察以下職事及進名改轉臺內之事悉主之號為臺端知雜者謂之雜端最為雄劇殿中侍御史遷轉及職事與侍御史相亞自開元以來權歸侍御史而遷轉猶同號為副端監察御史職知朝堂正門無籍非因奏事不得入至殿庭在西鳳闕南侍至開元七年敕始並令隨仗入閣新唐書百官志又置御史裏行使侍御史裏行使殿中裏行使監察裏行使以未為正官無員數大唐新語初馬周以布衣直門下省太宗就命監察裏行俄拜監察御史裏行之名自周始也通典侍御史內供奉與殿中御史內供奉監察御史裏行其制並同皆無職田庶僕謹案唐宋三院御史今惟存監察一名其侍御及殿中職事均已歸併察院掌轄以唐制凖之雜端獨主臺務正如今京畿道代堂辦事之比副端則當如今之河南道至御史裏行諸官不為正員則又如國朝初制之有試御史也李嶠請每十州分置御史巡按疏陛下創置右臺分巡天下自非分州統理無由濟其繁務請大小相兼率州置御史一人以周年為限使其親至屬縣或入閭里督察姦訛觀採風俗然後可以求其實效課其成功王應麟玉海唐監察御史十道巡按以判官二人為佐務繁則有支使開元中兼巡傳驛大歷十四年號館驛使監察御史分察尚書省六司由下第一人為始出使亦然興元元年以第一人察吏部禮部兼監察使第二人察兵部工部兼館驛使第三人察户部刑部嵗終議殿最元和中以新人不出使無以觀能否乃命顓察尚書省號六察官開元十九年以監察御史二人蒞太倉左藏庫其後以殿中侍御史上一人為監太倉使第二人為監左藏庫使唐會要武后時初置兩臺每年春秋發使春曰風俗秋曰亷察令地官尚書韋方質為條例刪定為四十八條以察州縣自載初以後奉敕乃巡不每年出使謹案唐之監太倉使乃今巡倉御史之職館驛使乃今巡察御史兼查驛站之職分察尚書省乃今御史稽查各部院衙門之職而十道巡按則今巡察御史亦尚其遺意也大唐新語唐九徴為御史監靈武軍時吐蕃入冦蜀漢九徴出永昌郡千餘里討之纍戰皆捷加朝散大夫侍御史通志隋末亦遣御史監軍唐垂拱三年十二月鳳閣侍御韋方質奏言舊制有御史監軍武太后曰將出師君授之斧鉞閫外之事皆使裁之比來御史監軍乃有控制軍中大小之事皆須承禀非所以委専征也謹案漢時朱龜馮緄之流皆以御史中丞出軍然非監軍也止胡建傳有監軍御史之名隋唐蓋沿其制通志主簿唐武德末杜淹為御史大夫以吏部主事林懷信為之貞觀中自張宏濟為此官後遂為美職五季五代史梁本紀乾元三年御史大夫姚洎李琪列傳唐明宗即位以琪為御史中丞五代會要御史大夫後唐天成元年六月以李琪為特進行御史大夫自後不除晉天福五年二月以御史中丞為清望正四品五代史盧導列傳事梁為侍御史知雜事和凝列傳唐天成中為殿中侍御史李懌列傳事梁為監察御史裴羽列傳事梁為御史臺主簿五代㑹要晉開運二年八月敕御史臺准前朝故事以郎中員外一員兼侍御史知雜事近年停罷獨委年深御史知雜振舉之司紀綱未峻宜遵故事庶協通規宜于郎署中選清慎强者兼御史知雜事五代會要御史臺六員監察謂之分察使謹案五季臺官亦依三院舊制謹略採五代史紀傳及王漙㑹要以補志文之闕五代會要一臺司除御史中丞隨行印及左右巡使監察使並出使印等外其御史臺印一面先准合式即是主簿監臨近年以來緣無主簿遂至內彈御史權時主持又常隨本官出入不定伏緣臺中公事不同諸司動繫重難常虞留滯當申奏申堂之際及牒州府之時事無輕重並使此印今准令式逐日有御史一員臺直承受制敕公文其御史臺印今後欲勒留臺中不令在外選差令史一人帖司一人同知此印凡有諸色大案印發之時准指揮諸司各置印歷宋宋史職官志御史臺掌糾察官邪肅正綱紀大事則廷辨小事則奏彈中丞一人為臺長侍御史一人掌二臺政殿中侍御史二人掌以儀法糾百官之失監察御史六人掌分察六曹及百官之事檢法一人掌檢詳法律主簿一人掌受事發辰勾稽簿書文獻通考宋承唐制有三院大夫無正員止為兼官中丞除正員外或帶他官者尚書則曰某官兼御史中丞丞郎則曰御史中丞兼某官給事中諫議則曰某官權御史中丞事次有知雜御史一員副中丞判臺事李燾續資治通鑑長編御史臺自薛奎後中丞缺人不補侍御史知雜事韓億獨掌臺務者踰年天聖四年始命王臻權御史中丞石介徂徠集御史府不與他府並舊有大夫則中丞亞大夫而領其屬今大夫闕則中丞其長也故中丞之任特重中丞之責尤重焉陸游老學菴筆記故事臺官無侍經筵者賈文元公為中丞仁祖以其精於經術特召侍講延英自此遂為故事葉夢得石林燕語元豐既新官制職事官未有不經除者惟御史大夫未嘗除人蓋臺諫之長非宰相所利故無有啓之者崇寧中朱聖豫嘗請除竟不行合璧事類舊制三院多出外任風憲之職用他官領之太平興國三年以張巽為監察御史正名舉職自此始也唐制御史不専言職至天禧中始置言事御史唐朝有御史裏行至景祐中始置以處御史之官卑者唐臺案有六監司元豐三年李定請復六察於是以御史専領六察元豐三年御史臺言請以吏部及審官東西院三班院𨽻吏察戶部三司及司農寺𨽻戶察刑部大理寺審刑院𨽻刑察兵部武學𨽻兵察禮祠部太常寺𨽻禮察少府將作等𨽻工察從之其後大正官名不除大夫檢校官帶憲銜者亦除去自國初至元豐中檢校官多帶憲銜有檢校御史大夫者至是亦罷以中丞為長知雜御史為侍御史言事官為殿中侍御史六察官為監察御史舊以中丞兼理檢使殿中侍御史兼左右巡使監察御史兼監察使至是使名悉罷玉海開寶四年邉光範兼判御史臺公事興國四年侯隲權中丞雍熙三年趙昌言以知制誥正為中丞端拱二年右諫議王化基權中丞始定班制正衙常參立中丞轉位內殿起居立本班咸平五年五月溫仲舒以禮書為中丞天禧元年右丞趙安仁兼安仁請給御寶印歷書三院糾彈事祥符七年九月知雜王隨請兩制撰重修御史臺記國朝大夫止為兼官中丞除正官外帶他官次有知雜侍御史又有左右巡使分糾違失監察使掌祠祭廊下使掌入閣食監香使掌行香謂之五使有四推臺殿開寶六年九月馮炳為侍御史知雜判臺事十月雷德驤分判三院初三院多出外任興國三年命張巽為監察始正名舉職天禧元年二月八日丁丑始置言事御史侍御史以下六員不兼領職務其後久不除慶歷五年正月乙亥以殿中梅摯監察李京並為言事御史令中丞㕔之南有諫官御史㕔蓋御史得兼諫職也唐制御史不専言職景祐元年四月二十四日置御史裏行舉三丞歷知縣者為之從中丞韓億之言也元豐二年李定請復六察十二月丙午從之以御史専領二年四月二十七日詔六察官以所糾多寡為殿最中書置簿以時書之五月二日增置臺主簿一員十一月六日詔御史六員三分察三言事六年正月二十四日都司置御史房六月乙巳朔詔六察各置一御史九月二十四日置檢法官八年十月丁丑詔監察兼言事殿中兼察事用吕公著劉摯之言也元豐正名不除大夫檢校官亦除去以中丞為長知雜為侍御史言事為殿中侍御史六察為監察御史使名悉罷二年十二月六日詔御史臺重修一司敕五年六月十四日詔尚書省得彈奏六察失職紹興元年九月侍御史沈與求請舉元豐六察舊法乾道二年三月十五日詔非歷兩任縣令不除監察非任守臣不除郎官著為令文獻通考御史臺置推直官四人専治獄事元豐時悉罷謹案宋初以知雜御史副中丞判臺事及元豐改制遂以侍御史為中丞之二當時雖名三院其實侍御史班位特崇蓋近今副都御史之職任也至六察之制則今御史之稽查各衙門者實為監察舊職其來久矣石林燕語故事臺官皆御史中丞知雜與翰林學士互舉其資任須中行員外郎以下太常博士以上曾任通判人未歷通判非特㫖不薦仍為裏行此唐馬周故事也議者頗病太拘難以應格熙寧初司馬君實為中司已請稍變舊制及吕晦叔繼為中司遂薦張戩王子韶二人皆京官也既而王荆公驟用李資深以秀州軍事判官特除太子中允權監察御史裏行命下宋次道當制封還詞頭已而次命李才元蘇子容皆不奉詔蓋謂旋除中允而命猶自選人而除也三人皆謫卒用資深近嵗有差遣合用京官特改官而除者自資深始也王栐燕翼貽謀録仁宗重臺諫之選景祐元年四月癸丑詔御史臺置殿中侍御史監察御史裏行又詔舉三丞以上嘗歷知縣人除御史裏行二年除御史又二年除三司開封判官自清要而歷繁劇選任既重一時號稱得人宋史職官志乾道二年詔自今非曾經兩任縣令不得除監察御史謹案宋以縣令選授御史明代行取之制蓋本於此歐陽修歸田録御史臺故事三院御史言事必先白中丞自劉子儀為中丞始榜臺中今後御史有言不須先白中丞文獻通考天禧中兩省置諫官六員御史臺置御史六員並不兼領職務其或詔令乖當官曹涉私措置失宜刑賞踰制并令諫官奏論憲臣彈舉每月須一員奏事或有急務亦許非時入對方勺泊宅編虞經臣䇿元祐五年作監察御史是時察官亦許言事尋擢侍御史不歷殿院至紹聖改元移起居郎明年遂為給事中謹案泊宅編謂虞䇿由監察御史擢侍御史不歷殿院則當時監察御史擢侍御史必由殿院明矣大唐新語載宋璟之言曰高品有侍御史卑品有監察御史然則監察御史擢侍御史以最卑擢最髙中間必由殿院唐宋制同也朱翌猗覺寮雜記外臺見唐髙元裕傳故事三司監院官帶御史者號外臺得察風俗舉不法監院屬三司如楊子院是也皆財貨轉易之地故今監司亦號外臺皆以察風俗舉不法劉夢得和南海馬大夫云漢家旌斾付雄才百粵南溟統外臺以馬總帶御史大夫也謹案歷代本别有諌議大夫屬門下省以主諫諍而御史則専以糾察非違為職自宋真宗置言事御史許之論列時政而臺諫始合為一然元豐初制以殿中為言事官監察為六察官猶各有司存其後復令其互兼御史遂盡得建言不専彈劾逮金元以後而諫議之官遂廢亦臺臣積重之勢然也遼王圻續文獻通考遼南面官有御史臺太宗㑹同元年置其官曰御史大夫曰御史中丞曰侍御史謹案遼制有侍御史而無殿中監察蓋三院職事併于一也金金史百官志御史臺御史大夫從二品掌糾察朝儀彈劾官邪勘鞫官府公事御史中丞從三品二大夫侍御史二員從五品掌奏事判臺事治書侍御史二員從六品掌同侍御史殿中侍御史二員正七品每遇朝對立於龍墀之下専劾朝者儀矩監察御史十二員正七品掌糾察內外非違刷磨諸司察帳并監祭禮及出使之事參注諸色人大定二年八員承安四年十員承安五年兩司各添十二員典事二員從七品架閣庫管勾一員從八品檢法四員從八品金史選舉志宣宗南遷嘗以御史巡察興定元年以縣官或非材監察御史一過不能備知遂令每嵗兩遣監察御史巡察仍别選官巡訪以行黜陟之政元好問中州集史肅入為監察御史遷治書楊慥拜監察御史遷侍御史謹案金時臺殿二院多由察院遷轉中州集傳可證與唐宋之制略同元元史百官志御史臺大夫二員從一品中丞二員正二品侍御史二員從二品治書侍御史二員從二品掌糾察百官善惡政治得失至元五年始立臺設官七員大夫中丞侍御史治書侍御史典事檢法獄丞七年改典事為都事十九年罷檢法獄丞二十七年始置經歷一員皇慶元年增中丞為三員二年減一員至治二年大夫一員後定置御史大夫二員中丞二員侍御史二員治書侍御史二員經歷一員從五品都事二員正七品照磨一員正八品承發管勾兼獄丞一員正八品架閣庫管勾兼承發一員正九品掾史一十五人譯史四人知印二人通事二人宣使十人臺醫二人䝉古書寫二人典吏六人庫子六人其屬有二殿中司殿中侍御史二員正四品至元五年始置秩正七品後升正四品凡天朝㑹百官班序其失儀失列則糾罰之知班四人通事譯史各一人察院秩正七品監察御史三十二員司耳目之寄任刺舉之事至元五年始置御史十一員悉以漢人為之八年增置六員十九年增置一十六員始參用䝉古人為之至元二十二年參用南儒二人書吏三十二人江南諸道行御史臺統江東江西浙東浙西湖南湖北廣東廣西福建海南十道陜西諸道行御史臺統漢中隴北四川雲南四道設官品秩同內臺馬燧察院題名記世祖皇帝至元五年立御史臺設監察御史振肅庶官糾劾貪邪謹案御史臺自唐置三院侍御史即稱臺院在殿中監察之上宋則以侍御史二臺政次於中丞而三院名目猶存金沿其制復以侍御史治書御史同判臺事元時增秩至二品于是遂為堂上官而臺屬僅存殿中察院殿中又止有二員明初因省其官以糾儀之事併入察院而别置副都僉都以當中丞侍御治書之職歷代規制至此一變其由來蓋亦有漸也至江南陜西行御史臺顧炎武謂即明在內道長在外按臺之法然其職在統制各道憲司與內臺究有差别今故别詳於督撫表內焉明明史百官志初吳元年置御史臺設左右御史大夫從一品御史中丞正二品侍御史從二品治書侍御史正三品殿中侍御史正五品察院監察御史正七品經歷從五品都事正七品照磨管勾正八品以鄧愈湯和為御史大夫劉基章溢為御史中丞洪武九年汰侍御史及治書殿中侍御史十年七月詔遣監察御史巡按州縣十三年専設左右中丞正二品左右侍御史正四品尋罷御史臺十五年更置都察院設監察都御史八人秩正七品分監察御史為浙江河南山東北平山西陜西湖廣福建江西廣東廣西四川十二道各道置御史或五人或三四人秩正九品每道鑄印二一畀御史久次者掌之一藏內府有事受印以出既事納之文曰繩愆糾繆以秀才李原明詹徽等為都御史吳荃等為試監察御史試御史一年後實授又有理刑進士理刑知縣理都察院刑獄半年實授正德中革十六年升都察院為正三品設左右都御史各一人正三品左右副都御史各一人正四品左右僉都御史各二人正五品經歷一人正七品知事一人正八品十七年升都御史正二品副都御史正三品僉都御史正四品十二道監察御史正七品建文元年改設都御史一人革僉都御史二年改為御史府設御史大夫改十二道為左右兩院止設御史二十八員成祖復舊制永樂元年改北平道為北京道十九年罷北京道增設雲南貴州交址三道洪熙元年稱行在都察院同六部又定巡按以八月出巡宣德十年罷交址道始定為十三道正統中去行在字嘉靖中以清屯增副都御史三人尋罷隆慶中以提督京營增右都御史三人尋亦罷其屬經歷司經歷一人正六品都事一人正七品司務㕔司務二人從九品初設四人後革二人照磨所照磨正八品檢校正九品司獄司司獄從九品初設六人後革五人各一人十三道監察御史一百十人正七品浙江江西河南山東各十人福建廣東廣西四川貴州各七人陜西湖廣山西各八人雲南十一人其在外加都御史或副僉都御史銜者有總督有提督有巡撫有總督兼巡撫提督兼巡撫及經略總理贊理巡視撫治等員王圻續文獻通考明改前代御史大夫中丞為都御史臺為都察院是以察而統為公署之號也以監察御史分設十三道革去侍御史殿中侍御諸名銜而糾劾巡按照刷問擬之任一切責之監察是以察而統為憲臣之號也邱濬大學衍義補今六部官屬皆書其部如吏部屬則曰吏部文選清吏司兵部屬則曰兵部武選清吏司之類是也唯監察御史則書其道而不繫於都察院焉明史百官志十三道監察御史巡視倉場在外巡按巡漕各以其事専監察而巡按則代天子巡狩所按藩服大臣府州縣官諸考察舉劾尤専大事奏裁小事立斷按臨所至表揚善類剪除豪蠧以正風俗振綱紀明會要宣德九年差御史一員巡視在京倉一員巡視通州倉嘉靖八年題准每年差御史一員請敕提督京通二倉收放糧斛兼理通惠河事務隆慶元年差御史一員前往浙江及南直𨽻蘇松常鎮四府監兌糧米催儧運船兼理濟寧迤南一帶河道三年停差五年復差御史一員同戶部郎中一員催䟎萬歷六年革催䟎郎中専差御史謹案自明太祖改御史臺為都察院併唐宋三院御史為一廣置言官原欲責其隨時獻替乃仁宣以後臺綱日弛往往借端聚訟逞臆沽名而一二大臣又或援引私人藉為牙瓜朋黨之漸已開及神宗失德怠荒令諸臣得以直言自衒至於絞訐摩上儕偶難堪神宗厭其譁囂一切留中不下諸臣明知封章之不復進御更肆譸張遇事生風競以把持朝局為得計其始則爭並封爭挺擊舉國若狂猶曰托詞忠愛繼而爭京察爭考選則全主于引同惡而排異己於是有齊楚浙黨三方鼎峙之目相與齮齕正人挾制閣部愛憎噂㳫日起戈矛神宗既黑白不分惟臺章所攻其人即自引去諸臣益得恣行己意吏部亦畏其恐喝悉視指撝盤踞日深黨禍日熾馴至魏閹擅政其中宵人敗類方且列名彪虎助之搏擊清流剝傷元氣不旋踵而明社已墟口舌之痾實其亡徴之先見者也我國家肅清綱紀百度惟貞臺臣咸知凛守官針恪共奉法我皇上屢頒訓諭諄復告誡於明季臺諫惡習詳悉剖示尤為深切著明仰誦綸言無不益加警惕矣欽定歷代職官表卷十八
