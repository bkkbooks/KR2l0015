body:
  text: 欽天監表欽天監國朝官制欽天監監正滿洲一人西洋一人初制滿洲四品康熙六年改為三品九年定俱為正五品監副滿洲漢人各一人左右監副各西洋一人初制滿洲五品康熙六年改為四品九年定俱為正六品掌測候推步之法觀察星辰稽定節序占天象以授人時所屬有時憲天文漏刻三科初順治元年設欽天監監正等官皆以漢人除授康熙四年定置滿洲漢人監正各一員滿洲漢人左右監副各二員八年以西洋人充漢監正員額尋又增置西洋監副一員雍正三年以西洋人實授監正乾隆十八年省監副滿洲漢人員額各一增置西洋左右監副為二員其總理監務王大臣自乾隆十年以來始置皆由特簡無定員時憲科五官正滿洲二人䝉古二人春夏中秋冬五官正漢人各一人秋官正漢軍一人俱從六品五官司書漢人一人正九品博士滿洲一人漢軍二人䝉古二人漢人十有六人從九品掌推天行之度驗嵗差以均節氣凡時憲書之以國書䝉古文譯布者滿洲䝉古五官正司之推算日月交食七政相距衝退留伏交宫同度等事漢人五官正司之推驗日月五星相距等事漢軍秋官正司之校刋時憲書以頒四方五官司書司之博士嵗以漢人二人直譙樓視更鼓之節餘各從其長以分典厥事五官正滿洲䝉古漢人員額俱康熙四年定又初沿明制設有回回科順治初裁革以其職改𨽻漢軍秋官正五官司書初置二人康熙十四年省一人博士初置滿洲䝉古共六人不分員額除授又漢軍三人漢人三十六人康熙四年省漢人博士十有四人五年復增設漢人博士二人乾隆四十七年定置滿洲博士四人䝉古博士二人皆分𨽻三科焉天文科五官靈臺郎滿洲二人䝉古一人漢軍一人漢人四人從七品五官監候漢人一人正九品博士滿洲三人漢人二人掌眂天象之垂書雲物以協嵗占每日以滿洲漢人官各一人率天文生十有五人登觀象臺考儀器以窺乾象每時以四人分觀四方晝夜輪直凡八節風占及雲氣流星諸象當奏者送監密題以聞五官靈臺郎初置滿洲䝉古共三人不分員額除授乾隆四十七年定置滿洲二人䝉古一人漢軍漢人靈臺郎及五官監候各員額俱康熙四年定又原設漢人五官保章正二人康熙十四年省漏刻科五官挈壺正滿洲䝉古各一人漢人二人從八品五官司晨漢軍一人從九品博士漢人六人掌調壺漏測中星審緯度相隂陽以諏時日而卜營建焉五官挈壺正初置滿洲䝉古共二人不分員額除授乾隆四十七年定置滿洲一人䝉古一人漢人挈壺正員額康熙四年定五官司晨初置漢軍漢人各一人康熙十四年省漢人員額主簿㕔主簿滿洲漢人各一人正八品掌章奏文移簿籍員額康熙四年定食俸天文生滿洲䝉古十有六人漢軍八人漢人二十四人食糧天文生漢人五十六人食糧隂陽生漢人十人滿洲䝉古漢軍天文生俱以算學生選充視筆帖式食俸漢人天文生隂陽生以算學生暨肄業生選充食俸者視從九品食糧者亦以九品頂帶給之均與世業子弟分班補用天文生分𨽻三科各司推算觀候之事隂陽生𨽻漏刻科主譙樓直更監官以時考其術業而進退之筆帖式滿洲十有一人䝉古四人漢軍二人筆帖式員額俱康熙四年定職事見吏部篇歷代建置三代春秋左氏傳郯子曰我髙祖少皥摰之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏歷正也元鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也杜預注鳯鳥知天時故以名官元鳥燕也伯趙伯勞也青鳥鶬鴳也丹鳥鷩雉也上四鳥皆歷正之屬官國語楚語少昊氏之衰九黎亂德人神雜擾顓頊受之乃命南正重司天以屬神火正黎司地以屬民使復舊章無相侵瀆其後堯復育重黎之後不忘舊者使復典之以至于夏商尚書堯典乃命羲和欽若昊天歷象日月星辰敬授人時孔安國傳重黎之後羲氏和氏世掌天地四時之官孔頴逹疏少昊五鳩氏即周世卿官别有鳯鳥氏為歷正班在五鳩之上是上代以來皆重歷數故知堯於卿官之外别命羲和掌天地於時羲和似尊於諸卿後世以來稍益卑賤周禮太史即古羲和之任也謹案史記封禪書稱黃帝迎日推䇿而左傳所紀少昊時有司分至啓閉之官嗣後顓頊命重黎帝堯命羲和說者謂羲即重之後和即黎之後世掌天地蓋古聖人奉若天道大戴禮記所謂慎守日月之數以察星辰之行序四時之順逆者其事甚巨故特重其官皆以上卿掌之良以撫辰凝績人道正而萬事成實王政之最大者自後世算家但工術數司馬遷至謂文史星歷近乎卜祝之間而其職乃視上古較輕矣今採掇唐虞以前經傳所徴信者録冠三代之首以明敬天授時其所從來者逺也尚書𦙍征羲和廢厥職酒荒于厥邑孔安國傳羲氏和氏自唐虞至三代世職不絶吕氏春秋夏太史令終古出其圖法如商禮記曲禮天子建天官先六大曰太史鄭康成注此蓋殷時制也淮南子泛論訓殷太史令向藝先歸文王周禮春官太史下大夫二人上士四人府四人史八人胥四人徒四十人掌建邦之六典正嵗年以序事頒之于官府及都鄙頒告朔于邦國太史抱天時與大師同車鄭康成注大史日官也馮相氏中士二人下士四人府二人史四人徒八人掌十有二嵗十有二月十有二辰十日二十有八星之位辨其叙事以㑹天位冬夏致日春秋致月以辨四時之叙鄭康成注馮乘也相視也世登髙臺以視天文之次序保章氏中士二人下士四人府二人史四人徒八人掌天星以志星辰日月之變動以觀天下之遷辨其吉凶以星土辨九州之地所封封域皆有分星以觀妖祥以十有二嵗之相觀天下之妖祥以五雲之物辨吉凶水旱降豐荒之祲象以十有二風察天地之和命乖别之妖祥凡此五物者以詔救政訪序事鄭康成注保守也世守天文之度周禮夏官挈壺氏下士六人掌挈壺鄭康成注縣壺以為漏禮記月令乃命太史守典奉法司天日月星辰之行宿離不貸鄭康成注太史禮官之屬離讀如儷偶之儷宿儷謂其屬馮相氏保章氏掌天文者相與宿偶當審候伺不得過差也謹案周太史為史官及日官之長故後世典祕書及天文者皆以為出於太史之職然記言記動有內史外史以分任之而太史明於天道所掌在建典辨法竝不司典籍䇿書實與今翰林不同惟其正嵗年頒告朔正如今之造時憲書以頒行四方故與欽天監職掌較為相合漢魏以來置太史曹監局以掌天時星算其源流蓋出於此至魯語稱太史司載糾䖍天刑韋昭注云載天文也司天文謂馮相保章氏蓋此二官皆太史之屬分治術數太史不過總攬綱維而已孔頴達月令正義謂馮相氏主日月五星年氣節候推步遲疾審知所在之處若今之司歷主其算術保章守天之文章謂度數失常次妖孽吉凶所在若今天文家惟主變異其言最為明晰以今制相凖馮相氏當如今之時憲科而保章氏則如今之天文科也周禮春官大卜下大夫二人掌三兆之法三易之法三夢之法以邦事作龜之八命卜師上士四人卜人中士八人下士十有六人掌開龜之四兆占人下士八人掌占龜以八簭占八頌簭人中士二人掌三易以辨九簭之名謹案周以前重卜筮國有大事所以决疑求正故特設官以掌之而以太卜為之長秦漢以降亦有太卜令𨽻屬太常但後世龜䇿既廢改用占式官民通用由來已久周禮太史抱天時與太師同車鄭司農云抱式以知天時是即三式之法所自始太乙六壬遁甲謂之三式雖為術各别而審隂陽生剋以定吉凶則初無二義今凡一切禮儀營建之事皆由欽天監漏刻科選擇日時審度嚮背蓋亦猶周太卜之職也春秋左氏傳天子有日官諸侯有日御日官居卿以底日禮也日御不失日以授百官於朝服䖍注日官日御典歷數者也居卿者使卿居其官以主之重歷數也李華云天子日官則史佚史扁是也諸侯日御則禆竈子韋是也春秋左氏傳十一月乙亥朔日有食之辰在申司歷過也再失閏矣孔頴達疏魯之司歷漸失其閏謹案日官日御皆司天之職故鄭康成以為即周禮之太史後漢書張衡傳衡復為太史令曰曩滯日官今又原之其義與鄭氏相同史記有日者列傳當亦因日官主日故善卜者因以為名也至古之典天文算數者皆世業相傳重黎羲和歷代備職周官馮相保章賈公彥亦謂世守其法故名官曰氏史記則謂之疇人蓋即管子所謂人與人相疇家與家相疇乃習為常業之意周末喪亂其子弟雖分散四方而史記封禪書載有周太史儋見秦獻公論周秦離合之事則其職亦未為盡失矣秦杜佑通典秦為太史令胡母敬之為太史令作博學七篇漢漢書百官公卿表太常屬官有太史令丞漢書司馬遷傳父談為太史公注如淳曰漢儀注太史公武帝置位在丞相上天下計書先上太史公副上丞相遷死後宣帝以其官為令行太史公文書而已師古曰談為太史令遷尊其父故謂之公如說非也晉灼曰百官表無太史公在丞相上又衛宏所說多不實未可以為正史記太史公自序談卒三嵗而遷為太史令司馬貞索隱博物志太史令茂陵顯武里大夫司馬年二十八三年六月乙卯除六百石也王應麟玉海茂陵中書談以太史丞為太史令漢書律歷志武帝詔典星射姓師古曰姓射名姓也等造漢歷姓奏不能為算乃選治歷鄧平及長樂司馬可酒泉侯宜君等凡二十餘人都分天部遂用鄧平歷以平為太史丞後太史令張夀王上言宜更厯詔下主歷使者鮮于妄人詰問夀王不服妄人請與治歷大司農中丞麻光等雜候鉤校奏可劉知幾史通自古太史之職雖有述著為宗而兼掌歷象日月隂陽氣數司馬遷既沒後之續史記者禇先生劉向馮商揚雄之徒並以别職來知史務於是太史之署非復記言之司故張衡單揚王立髙堂隆等其當官見稱惟知占候而已謹案漢書百官表不載太史令祿數而博物志稱司馬遷為令六百石漢書律歷志載丞相御史劾太史令張夀王吏八百石古之大夫是昭宣以後已漸增其秩然皆未及千石亦足見漢儀注所言位在丞相上者為不可信矣至典星治歷乃漢官儀所謂待詔皆屬於太史令漢書天文志元光中天星搖問候星者西域傳武帝詔太史治星望氣皆以為吉蓋即其職而主歷使者治歷大司農中丞等官則以他官兼領此事正如今總理監務之大臣也後漢書百官志太史令一人六百石掌天時星歷凡嵗將終奏新年歷凡國祭祀喪娶之事掌奏良日及時節禁忌凡國有瑞應災異掌記之丞一人明堂及靈臺丞一人二百石二丞掌守明堂靈臺靈臺掌候日月星氣皆屬太史劉昭後漢書志注漢官儀曰太史待詔三十七人其六人治歷三人龜卜三人廬宅四人日時三人易筮二人典禳籍氏許氏典昌氏各三人嘉法請雨解事各二人醫一人靈臺待詔四十二人其十四人候星二人候日三人候風十二人候氣三人候晷景七人候鍾律一人舍人玉海漢太史有望郎三十人掌故二十人後漢書律歷志元和元年待詔候鍾律殷彤元和二年治厯編欣李梵永平九年太史待詔董萌張隆永元中典星待詔姚崇并畢等熹平中治歷郎梁國宗整太史治歷郎中郭香劉固舍人馮恂等通典秦漢以來太史之任蓋併周之太史馮相保章三職謹案後漢太史丞始分太史靈臺為二職今時憲天文各為一科蓋本于此至待詔職員甚多如典星治歷候鍾律望氣舍人之類皆見于前後漢書其或稱治厯郎及治厯郎中乃是為郎而待詔者耳並非别有是官後漢書注引袁山松書劉洪以校尉應太史徴拜郎中所云太史徴者即謂徴至太史為待詔蓋當時司天之職多由辟舉故待詔之善於其術者亦得轉為令丞如鄧平以治歷待詔為太史丞是也漢書百官公卿表太常有太卜令丞武帝太初元年初置唐六典漢武置太卜博士後漢書百官志太常有太卜令六百石後省并太史史記龜䇿列傳髙祖時因秦太卜雖父子疇官世世相傳其精微深妙多所遺失至今上謂武帝也即位博開藝能之路數年之間太卜大集史記日者列傳禇先生曰臣為郎時與太卜待詔為郎者同舍言曰孝武時聚㑹占家有五行堪輿建除叢辰歷天人太乙家制曰以五行為主謹案秦漢因周制别置太卜官至後漢而省并太史故後漢志載太史職守有祭祀喪娶之事掌奏良日一節而漢官儀所記太史待詔亦有龜卜廬宅時日諸科蓋即太卜所司併入太史者今欽天監兼主選擇是其例也三國三國蜀志後主傳景耀元年史官言景星見謹案陳夀作後主傳評稱國不置史注記無官而傳中又有史官言景星見事蓋當時所闕者載筆之職而太史令之主天文者則依舊備官晉書律歷志稱劉氏在蜀仍漢四分歷亦可知日官推步之法固未嘗廢矣晉書律歷志魏文帝黃初中太史令髙堂隆太史丞韓翊晉書天文志明帝太和初太史令許芝裴松之三國志注太史上漢厯不及天時更為太和歷詔髙堂隆與尚書郎楊偉太史待詔駱祿參共推校唐六典魏太史令吏員有望候郎二十人候部郎十五人掌候天文有靈臺丞主候望頒歷三國魏志周宣傳宣占夢十中八九文帝以為中郎屬太史謹案魏太史有令丞及待詔大扺皆與漢制相同其周宣以中郎屬太史亦即待詔之職也三國吳志吳範傳權以範為騎都尉領太史令三國吳志韋曜傳孫亮即位曜為太史令三國吳志劉惇傳太史丞公孫滕隋書天文志三國時吳太史令陳卓始列甘氏石氏巫咸三家星官著於圖録謹案吳因漢制有太史令丞而吳範以騎都尉領太史令則當如今之兼管監事又裴松之三國志注載孫權呼知星者問分野星氣孫皓時望氣者云荆州有王氣是吳靈臺所屬尚當有候星候氣諸待詔蓋猶沿漢之舊也晉晉書百官志太常統太史令太史又别置靈臺丞唐六典晉太史令品第七秩六百石銅印墨綬進賢一梁冠絳朝服丞一人秩二百石太史吏員有典厯四人望候郎二十人候部吏十五人江左髙瑩以侍中陳卓以義熙守吳道欣以殿中侍御史兼領太史謹案自漢末以天文為祕學専門授受具有源流故雖十六國瓜分雲擾之時而為日官者尚多能工其術史傳所載如漢有太史令宣于修之康相辨廣明臺産趙有太史令趙攬前秦有太史令康權前燕有太史令黃泓南燕有太史令成公綏北燕有太史令閔盛前凉有太史令賈曜郭黁後凉有太史令劉梁張衍皆以占候著名亦其一時風尚所在也宋齊梁陳宋書百官志太史令一人丞一人掌三辰時日祥瑞妖災嵗終則奏新歷南齊書百官志太史令一人丞一人隋書百官志梁太常統太史令丞太史别有靈臺丞通典太史宋齊並屬太常梁陳亦同唐六典梁陳太史丞三品勳位宋齊梁陳皆有靈臺丞典歷史闕其員品宋書律歷志元嘉二十年何承天奏漏刻改用二十五箭請臺勒漏郎將考驗施用謹案漏郎將沈約百官志無此官蓋郎將之司漏刻者如今挈壺正之職也北魏魏書術藝傳魏太祖太宗時太史令王亮蘇坦髙祖時太史令趙樊生並知天文後太史趙勝趙翼趙洪慶胡世榮胡法通等二族世掌天官冊府元龜後魏太史丞史失其品魏書官氏志太史博士太卜博士大常日者從第七品下太史助教第九品中魏書禮志太祖天賜三年占授著作郎王宜弟造兵法唐六典後魏有典厯史闕其員品謹案魏書官氏志不言太史所𨽻而冊府元龜則繫之祕書監下今考魏祕書有鍾律占授諸郎皆與太史職事相連故律歷志載上谷張明豫以鍾律郎擢為太史令疑當時太史已屬祕書省冊府元龜或當有所據也北齊隋書百官志後齊太常統太史署令丞掌天文地動風雲氣色律歷卜筮等事太史兼領靈臺太卜二局丞靈臺掌天文觀候太卜掌諸卜筮唐六典北齊有典歷史闕其員品謹案隋志稱後齊武平中有廣平人劉孝孫張孟賓二人同知歷事並無官號蓋猶漢之以知星人待詔太史者也後周通典後周官品正五命春官太史中大夫正四命春官太卜下大夫正三命春官馮相保章小卜等上士正二命春官馮相保章等中士唐六典後周春官府置太史中大夫一人掌歷家之法謹案隋書庾季才傳季才在周武帝時以車騎大將軍儀同三司遷為太史其職甚重蓋當時六官並建故太史為中大夫次於六卿非前代之𨽻屬太常者比也至隋書律歷志有周太史上士馬顯保章上士任恱在隋初議歷事而通典載周官品獨不及太史上士之職殊為闕略又隋書來和傳稱和在周為少卜上士而通典作小卜亦微有不同隋隋書百官志髙祖置祕書省領太史曹置令丞各二人司歷二人監候二人其歷天文漏刻視祲各有博士及生員太史令從七品太史丞正九品太史監候太史司厯從九品左右武候府置司辰師四人漏刻生一百一十人司辰師正九品煬帝三年改太史局為監進令階為正五品又减丞為一人置司辰師八人增置監候十人其後又改監少監為令少令唐六典隋改典厯為司歷取左傳司厯為名天文博士掌教習天文氣色天生觀生掌晝夜在靈臺伺候天文氣色漏刻博士掌教漏刻生漏刻生掌習漏刻之節以時唱漏謹案隋以太史屬祕書蓋本周禮史官日官同職之意其司辰監候諸職亦皆昉於隋而至今沿之至隋書所載如庾季才以通直散騎常侍領太史令張胄元以員外散騎侍郎領太史令蓋皆如今之加銜留任而胄元初以雲騎尉直太史參議律歷事則如漢之待詔唐初以李淳風直太史尚循其例又律歷志有歷助教傅俊成珍等而百官志無此職殆暫置即罷故史文從略歟唐舊唐書百官志司天臺舊太史局𨽻祕書監龍朔二年改為祕閣局久視元年改為渾儀監景雲元年改為太史監復為太史局𨽻祕書乾元元年三月十九日敕改太史監為司天臺改置官屬舊置於子城內祕書省西今在永寧坊東南角也通典大唐初改監為局置令龍朔二年改太史局為祕書閣改令為郎中丞為祕書閣郎咸亨初復舊久視元年改為渾天監不𨽻麟臺改令為監置一人其年又改為渾儀監長安二年復為太史局又𨽻麟臺其監復為太史局令置二人景龍二年復改局為監而令名不易不𨽻祕書開元二年復改令為監改一員為少監十四年復為太史局置令二人復𨽻祕書後又改局為監乾元元年又改其局為司天臺掌天文歷數風雲氣色有異則密封以奏舊唐書肅宗本紀乾元元年三月太史監為司天臺取永寧坊張守圭宅置仍補官員六十人新唐書百官志司天臺監一人正三品少監二人正四品上丞一人正六品上主簿二人正七品上主事一人正八品下監掌察天文稽歷數凡日月星辰風雲氣色之異率其屬而占有通元院以藝學召至京師者居之凡天文圖書器物非其任不得與焉每季録祥眚送門下中書省紀于起居注嵗終上送史館嵗頒歷于天下春官夏官秋官冬官中官正各一人正五品上副正各一人正六品上掌司四時各司其方之變異冠加一星珠以應五緯衣從其方色元日冬至朔望朝㑹及大禮各奏方事而服以朝見五官保章正二人從七品上五官監候三人正八品下五官司歷二人從八品上掌歷法及測景分至表凖五官靈臺郎各一人正七品下掌候天文之變五官挈壺正二人正八品上五官司辰八人正九品上漏刻博士六人從九品下掌知漏刻凡孔壺為漏浮箭為刻以考中星昏明更以擊鼓為節㸃以擊鐘為節唐六典隋置司辰師唐朝因之貞觀元年除師字長安四年始置挈壺正省歷博士置保章正以當之省天文博士置靈臺郎以當之舊唐書職官志太卜署令一人從八品下丞一人正九品卜正二人從九品下卜博士二人從九品下掌卜筮之法辨其象數通其消息以定吉凶謹案唐司天官屬唐六典及舊唐書職官志新唐書百官志員名多寡互有不同蓋六典所載乃開元中舊制故尚稱太史局未有司天臺之名舊志所載則乾元新改之制故其官額尚多至六十人惟新志所載自監以下諸官共三十七人乃後來增損定式宜據以為凖今故著之於篇而六典舊志則僅節取其沿革大略而已至太史局本屬祕書省自改司天臺以後已别為一署無所𨽻屬與唐初之制殊矣五季五代史馬重績傳晉有天下拜重績太子右贊善大夫遷司天監天福三年重績創新法以唐天寶十四載乙未為上元雨水正月中氣為氣首詔下司天監趙仁琦張文皓等考覆得失乃下詔班行之五代史趙延義傳延義事周為太府卿判司天監謹案五季制度率陋惟司天監所掌算數猶未失其官故馬重績等皆以術顯觀重績上新法而趙仁琦等為之考覆其職皆司天監則當時所設殆不止一員特史文不備無由知其詳耳又晉髙祖本紀載天福三年九月己未歸司天雞呌學生殷暉於契丹其名亦未經見考唐六典挈壺正下有漏刻典事十六人漏刻生三百六十人典鍾二百八十人典鼓一百六十人則雞呌學生當即漏刻生之掌報昏曉者也宋宋史職官志太史局掌測驗天文考定歷法凡日月星辰風雲氣候祥眚之事日具所占以聞嵗頒厯于天下則預造進呈祭祀冠昏及大典禮則選所用日其官有令有正有春官夏官中官秋官冬官正有丞有直長有靈臺郎有保章正其判局及同判則選五官正以上業優考深者充保章五年直長至令十年一遷惟靈臺郎試中乃遷而挈壺正無遷法其别局有天文院測驗渾儀刻漏所掌渾儀臺晝夜測驗辰象鐘鼓院掌文德殿鐘鼓樓刻漏進牌之事印厯所掌雕印歷書南渡後並同𨽻祕書省長二丞郎輪季㸃檢章俊卿山堂考索宋初置司天監以他官兼判又有同判之名以朝官充元豐官制行置太史令總一局之事而正與丞為之二宋史律歷志熙寧間司馬光沈括皆嘗提舉司天監李心傳建炎以來朝野雜記提舉太史局者舊率以近臣兼之熙豐間司馬公王和甫繼居是任後不復置紹興五年十月復置以命薛象先明年何自然以非舊典為言遂罷去太史局日官舊止於五官正孝宗時始增春夏秋冬中五官大夫沈括夢溪筆談國朝置天文院於禁中設漏刻觀天臺銅渾儀皆如司天監與司天監互相檢察每夜天文院具有無諦見雲物禨祥及當夜星次須令於皇城門未發前到禁中門發後司天占狀方到以兩司奏狀對勘以防虛僞近嵗皆是隂相計㑹符同寫奏習以為常其來已久中外具知之不以為怪其日月五星行次皆只據小歷所算躔度謄奏不曽占候有司但偹員安祿而已熙寧中豫領太史嘗按發其欺免官者六人未幾其弊復如故謹案宋志載英宗時有司天監生石道陳遘南渡後有太史局生阮興祖蓋即如今之天文生也遼遼史百官志司天監有太史令有司歷靈臺郎挈壺正五官正丞主簿保章正監候司辰刻漏博士典鐘典鼓謹案遼史百官志所載南面朝官大都皆以唐制凖之非必盡有實證惟司天一監穆宗紀應歷十一年有司天王白李正等進歷事景宗紀保寧九年有司天奏日當食不虧事其職掌皆可考見可知靈臺官守猶未失也金金史百官志司天臺提㸃正五品監從五品掌天文歷數風雲氣色密以奏聞少監從六品判官從八品教授舊設二員正大初省一員係籍學生七十六人漢人五十人女直二十六人試補長行司天管勾從九品不限資考員數隨科十人設一員以藝業尢精者充長行人五十人未授職事者試補管勾天文科女直漢人各六人算歷科八人三式科四人測驗科八人漏刻科二十五人銅儀法物舊在法物庫貞元二年始付本臺右屬祕書監元元史百官志太史院秩正三品掌天文歷數之事至元十五年始立院置太史令等官一員至大元年升從二品設官十員延祐三年升正二品設官十五員後定置院使五員正二品同知二員正三品僉院二員從三品同僉二員正四品院判二員正五品經歷一員從五品都事一員從七品管勾一員從九品令史三人譯史一人知印二人通事一人宣使二人典吏二人春官正兼夏官正一員正五品秋官正兼冬官正中官正一員正五品保章正五員正七品保章副五員正八品掌歷二員正八品腹裏印歷管勾一員從九品各省司厯十二員正九品印歷管勾二員從九品靈臺郎一員正七品監候六員從八品副監候六員正九品星歷生四十四員挈壺正一員從八品司辰郎二員正九品燈漏直長一人教授一員從八品學正一員從九品校事郎二員正八品司天監秩正四品掌凡歷象之事提㸃一員正四品司天監三員正四品少監五員正五品丞四員正六品知事一員令史二人譯史一人通事兼知印一人屬官提學二員教授二員並從九品學正二員天文科管勾二員算歷科管勾二員三式科管勾二員測驗科管勾二員漏刻科管勾二員並從九品隂陽管勾一員押宿官二員司辰官八員天文生七十五人中統元年因金人舊制立司天臺設官屬至元八年以上都承應闕官增置行司天監十五年别置太史院與臺並立頒歷之政歸院學校之設𨽻臺二十三年置行監二十七年又立行少監皇慶元年升正四品延祐元年特升正三品七年仍正四品回回司天監秩正四品掌觀象衍歷提㸃一員司天監三員少監二員監丞二員品秩同上知事一員令史二員通事兼知印一人奏差一人屬官教授一員天文科管勾一員算歷科管勾一員三式科管勾一員測驗科管勾一員漏刻科管勾一員隂陽生一十八人世祖在潛邸時有㫖徴回回為星學者扎瑪里鼎原作扎馬剌丁令依字面改正等以其藝進未有官署至元八年始置司天臺秩從五品十七年置行監皇慶元年改為監秩正四品延祐元年升正三品置司天監二年命祕書卿提調監事四年復正四品元史郭守敬傳守敬拜昭文館大學士知太史院事大德七年詔內外官年及七十並聽致仕獨守敬不許其請自是翰林太史司天官不致仕定著為令謹案元代太史院與司天監並立然推步測算之事皆歸太史院司天監特偹官而已至回回星學始見於唐之九執歷元則有扎瑪里鼎作萬年歷遂特設回回司天監以傳衍其術明亦别置回回科與大統參用逮本朝順治二年以西洋監正湯若望奏請裁撤回回科今漢軍秋官正專司日月五星相距等事蓋猶其舊職也明明史職官志欽天監監正一人正五品監副二人正六品其屬主簿㕔主簿一人正八品春夏中秋冬官正各一人正六品五官靈臺郎八人從七品後革四人五官保章正二人正八品後革一人五官挈壺正二人從八品後革一人五官監候三人正九品後革一人五官司厯二人正九品五官司晨八人從九品後革六人漏刻博士六人從九品後革五人監正副掌察天文定歷數占候推步之事凡日月星辰風雲氣色率其屬而測候焉有變異密疏以聞凡習業分四科曰天文曰漏刻曰回回曰歷自五官正下至天文生隂陽生各分科肄業每嵗冬至日呈奏明嵗大統歷成化十五年改頒明嵗歷於十月朔日送禮部頒行其御覽月令歷七政躔度歷六壬遁甲歷四季天象録並先期進呈凡歷注御歷注三十事如祭祀頒詔行幸等類民歷三十二事壬遁歷七十二事凡祭日前一年㑹選以進移知太常凡營建征討冠婚山陵之事則選地而擇日立春則預候氣於東郊大朝賀於文樓設定時鼓漏刻報時司晨雞唱各供其事日月交食先時算其分秒時刻起復方位以聞下禮部移內外諸司救之仍按占書條奏若食不及一分與回回歷雖食一分以上則奏而不救監官毋得改他官子孫毋得徙他業乏人則移禮部訪取而試用焉五官正推歷法定四時司歷監候佐之靈臺郎辨日月星辰之躔次分野以占候天文之變觀象臺四面面四天文生輪司測候保章正專志天文之變定其吉凶之占挈壺正知刻漏孔壺為漏浮箭為刻以考中星昏旦之次漏刻博士定時以漏換時以牌報更以鼓警晨昏以鐘鼓司晨佐之明初即置太史監設太史令通判太史監事僉判太史監事校事郎五官正靈臺郎保章正副挈壺正掌歷管勾等官以劉基為太史令吳元年改監為院秩正三品院使正三品同知正四品院判正五品五官正正六品典簿雨𤾉司時叙郎紀候郎正七品靈臺郎保章正正八品副從八品掌歷管勾從九品洪武元年徴元太史張祐張沂等十四人改太史院為司天監設監令一人正三品少監二人正四品監丞一人正六品主簿一人正七品主事一人正八品五官正五人正五品五官副五人正六品靈臺郎二人正七品保章正二人從七品監候三人正八品司辰八人正九品漏刻博士六人從九品又置回回司天監設監令一人正四品少監二人正五品監丞二人正六品徴元回回司天監鄭阿里滿洲語承受也今仍原文等議歷二年改司天監為欽天監四年詔監官職專司天非特㫖不得升調又定監官散官監令正儀大夫少監分朔大夫五官正司元大夫監丞靈臺郎五官保章正平秩郎五官靈臺郎司正郎五官挈壺正挈壺郎十四年改欽天監為正五品設令一人丞一人屬官五官正以下員數如前所列俱從品級授以文職散官二十二年改令為監正丞為監副三十一年罷回回欽天監以其歷法𨽻本監明初又置稽疑司以掌卜筮未幾罷洪武十七年置稽疑司設司令一人正六品左右丞各一人從六品屬官司筮正九品無定員尋罷謹案自堯命羲和舜察璣衡觀象授時為王政之首務然上古日官雖立而測驗尚疏觀禮記曽子問所稱朝聘祭祀已入廟內而不得成禮者日食居其一與雨霑服失容一例是待其既食而後知非預為推算也春秋時史官失職置閏無法食或違朔兩紀日南至先天者二三日說者謂梓慎禆竈史墨之徒長于禨祥短於推算漢初猶踵行之東漢末迄隋唐漸有改更而交食往往不驗至明代而承用元之授時法者二百七十餘年氣朔漸差獻議者紛紛請改而臺官拘泥舊聞當事憚于改作其時甌羅巴法已入中土徐光啓等講求雖切終未施行國家法天齊政首定時憲書頒行寓內聖祖仁皇帝生知天縱逹象緯之本原探河洛之妙奧考定成法勒為謨典御製歷象考成律吕正義數理精藴諸書無不包括㑹通發千古未發之祕鑰分毫不爽密合天行皇上復命諸臣續加討論欽定律吕正義歷象考成後編及天文正義協紀辨方儀象考成諸書博大精深推闡愈密洵足正百代之舊章貽萬世之成憲唐虞以來蓋至今日而範圍莫越矣欽定歷代職官表卷三十五
