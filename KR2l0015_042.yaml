body:
  text: 太醫院表太醫院國朝官制太醫院院使漢人一人正五品左右院判漢人各一人正六品掌醫之政令率其屬以供醫事員額順治元年定御醫十有五人初定正八品雍正七年升為七品用六品冠帶吏目三十人八品十五人九品十五人醫士四十人用從九品冠帶醫員三十人以上俱漢人員額掌九科之法以治疾曰大方脈小方脉傷寒科婦人科瘡瘍科針灸科眼科口齒科正骨科自院使至醫士皆以所業專科分班侍直給事宫中者曰宫直給事外廷者曰六直宫直於各宫外班房六直於東藥房各以其次更代供使令焉順治元年初設御醫十人吏目三十人豫授吏目十人醫士二十人十八年省吏目二十人並省豫授吏目員額康熙九年復置吏目豫授吏目各十人十四年省吏目十人三十一年又省豫授吏目六十一年增置醫士二十人雍正元年復增置吏目十人改豫授吏目為吏目七年增御醫五人八年吏目改為八品九品者各十五人增置食糧醫員三十人又有效力醫生無定員掌灸製之法以治藥院使考其術而進退之又設教習㕔簡御醫吏目之能者二人為教習以課醫人習醫焉歷代建置三代周禮天官醫師上士二人下士四人府二人史二人徒二十人掌醫之政令聚毒藥以供醫事凡邦之有疾病者有庀瘍者造焉則使醫分而治之嵗終則稽其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下鄭康成注醫師衆醫之長食醫中士二人掌和王之六食六飲六膳百羞百漿八珍之齊凡食齊視春時羮齊視夏時漿齊視秋時飲齊視冬時凡和春多酸夏多苦秋多辛冬多鹹調以滑甘凡會膳食之宜牛宜稌羊宜黍豕宜稷犬宜粱雁宜麥魚宜苽凡君子之食恆放焉疾醫中士八人掌飬萬民之疾病四時皆有癘疾春時有痟首疾夏時有癢疥疾秋時有瘧寒疾冬時有嗽上氣疾以五味五榖五藥養其病以五氣五聲五色視其死生兩之以九竅之變參之以九藏之動凡民之有疾病者分而治之死終則各書其所以而入於醫師瘍醫下士八人掌腫瘍潰瘍金瘍折瘍之祝藥劀殺之齊凡療瘍以五毒攻之以五氣養之以五藥療之以五味節之凡藥以酸養骨以辛養筋以鹹養脉以苦養氣以甘養肉以滑養竅凡有瘍者受其藥焉獸醫下士四人掌療獸病療獸瘍凡療獸病灌而行之以節之以動其氣觀其所發而養之凡療獸瘍灌而劀之以發其惡然後藥之養之食之凡獸之有病者有瘍者使療之死則計其數以進退之漢書藝文志方技者皆生生之具王官之一守也太古有岐伯俞拊中世有扁鵲秦和蓋論病以及國原診以知政謹按漢書司馬相如傳詔岐伯使尚方注引張揖曰岐伯者黃帝太醫屬使主方藥也徐堅初學記引郭璞巫咸山賦序曰巫咸以鴻術為帝堯之醫是太醫之職由來已久故班固以為王官之一守特至周而其制始偹耳又周禮所載王與卿大夫則醫師治之而疾醫但稱掌養萬民之疾病其職似亦有差等然疾醫僅中士八人必不能遍治萬民之疾當必大且危者然後醫士治焉其餘則受方于醫師而未列職者皆使分治殆如今民間之醫聽其自行治療而不必盡官領之歟秦杜佑通典秦有太醫令丞主醫藥史記扁鵲列傳秦太醫令李諡史記刺客列傳侍醫夏無且謹案左傳載春秋時良醫如和緩之類皆出於秦是秦人多工醫術故其設官亦偹據刺客傳所記是令丞以外尚有侍醫主提藥囊在殿上侍立蓋即如今之御醫也漢漢書百官公卿表奉常屬官有太醫令丞應劭漢官儀太醫令周官也秩千石丞三百石後漢書桓談傳董賢風太醫令真欽使求傅氏罪過漢書王嘉傳侍醫伍宏等內侍案脉漢書貢禹傳侍醫臨治顔師古注侍醫天子之醫也漢書藝文志侍醫李柱國校方技漢書百官公卿表少府屬官有太醫令丞太平御覽少府太醫令丞無員多至數千人王應麟玉海少府有太醫令太常復有令丞蓋禮官之太醫司存之所少府之太醫通乎王內漢書外戚傳上官桀妻父所幸充國為太醫監謹案西漢太醫令丞有二一屬太常一屬少府史不言其分置之由以王應麟所言核之其屬太常者蓋如今太醫院之職其屬少府者則如今藥房官之𨽻於內務府也至侍醫乃承秦舊稱當即今之御醫而王嘉傳之侍醫伍宏董賢傳又稱為醫侍詔疑為一官而兩名又李柱國亦侍醫而隋書載其官又作太醫監疑亦以侍醫遷為此職如今御醫升補院判之比又外戚傳有女醫淳于衍得入宫侍皇后疾因搗附子合太醫大丸以飲皇后霍光傳則稱為乳醫淳于衍師古曰視産乳之疾者殆漢時又有此等女醫同𨽻于太醫令以偹諸科之一特史未詳其制耳後漢書百官志太醫令一人六百石掌諸醫藥丞方丞各一人藥丞主藥方丞主方右屬少府劉昭後漢志注漢官曰員醫二百九十三人員吏十九人通典漢有醫丞有醫工長徐堅初學記司馬彪續漢書曰東平王蒼到國病詔遣太醫丞將髙手醫視病後漢書方術傳郭玉和帝時為太醫丞裴松之三國志注魚豢魏略曰脂習除太醫令與孔融親善太平御覽典論曰中常侍張讓子奉為太醫令後漢書蓋勳傳京兆髙望為尚藥監謹案東漢太常屬官無太醫令惟少府有之蓋視西京舊制已有減省而尚藥監一官百官志亦不載當即西漢之太醫監也史記倉公列傳齊太醫先診病謹案倉公傳有齊太醫又有齊王侍醫蓋漢世諸侯王國其設官多凖天朝今並附識於此又據劉昭補志注引漢官所載當時百官府皆有官醫員額疑其人雖分𨽻諸司而考選補用當亦由太醫主之自唐以後其法久廢惟今刑部設醫士二人由院簡送六歲一更更之日稽其醫事之優劣優者升吏目劣者斥之似與漢制頗為相近云三國通典漢太醫令丞屬少府魏因之晉晉書職官志宗正統太醫令史及渡江哀帝省并太常太醫以給門下省通典太醫令晉銅印墨綬進賢一梁冠絳朝服而屬宗正謹案晉書太醫令史疑當作令丞蓋傳刻有訛據愍懷太子傳有太醫令丞據是晉制實沿漢魏之舊不應僅設令史也宗齊梁陳宋書百官志太醫令一人丞一人𨽻侍中南齊書百官志太醫令一人丞一人屬起部亦屬領軍司馬光資治通鑑齊明帝建武元年海陵恭王有疾遣御師瞻視胡三省注御師醫師也以其供御故謂之御師謹案南齊太醫屬起部及領軍與宋制不同杜佑以為宋齊俱𨽻侍中者誤至御師之稱百官志不載蓋即太醫令所屬諸醫當如今之御醫也隋書百官志梁門下省置太醫令又太醫二丞中藥藏丞為三品勳位冊府元龜尚藥自梁以降皆太醫兼其職陳如梁制北史姚僧垣傳僧垣仕梁為太醫正謹案梁之太醫正不見于百官志當是太醫令屬官殆天監以後始置史所載皆其初定之制故未之及耳其後隋大業中於太醫署置正十人蓋亦承梁制而設也北魏魏書官氏志太醫博士從第七品下太醫助教從第九品中魏書藝術傳周淡善醫藥為太醫令李修為前軍將軍領太醫令魏書徐謇傳轉右軍將軍侍御師魏書王顯傳顯以醫術自通召補侍御師纍遷廷尉少卿仍在侍御營進御藥胡三省通鑑注醫師侍御左右因以名官後魏之制太醫令屬太常掌醫藥而門下省别有尚藥局侍御師蓋今之御醫也謹案北魏太醫令復𨽻太常而門下省又有尚藥局與漢之少府屬官别置太醫令者其制相合嗣後歷代多因之今太醫院専掌醫事而內務府亦有內藥房主事庫掌等員同司治藥亦即此例但醫官通乎王內其職守本屬相資並無區别今故併繫於此而仍互見於內務府篇云北齊册府元龜北齊門下省統尚藥局有典御二人侍御師四人尚藥監四人總御藥之事隋書百官志後齊尚藥局丞二人中侍中省有中尚藥典御及丞各二人鄭樵通志北齊曰太醫令丞隋書百官志後齊太常屬官有太醫令丞北史藝術傳齊大寧二年徐之才弟之範為尚藥典御又有尚藥典御鄧宣文後周通典後周官品正四命天官太醫小醫等下大夫正三命天官小醫醫正瘍醫等上士正二命天官醫正瘍醫等中士正一命天官主藥醫正瘍醫等下士孫逢吉職官分紀後周有主藥六人隋書姚僧垣傳周大象二年除太醫下大夫隋隋書百官志髙祖受命置門下省統尚藥局典御二人侍御醫直長各四人醫師四十人太常統太醫署令二人丞一人太醫署有主藥二人醫師二百人藥園師二人醫博士二人助教二人按摩博士二人咒禁博士二人煬帝分門下為殿內省統尚藥局置奉御二人正五品直長二之正七品又有食醫員尚藥直長四人又有侍御醫司醫醫佐員太醫又置醫監五人正十人陳振孫書録解題巢元方隋太醫博士唐舊唐書職官志殿中省有尚藥局奉御二人正五品下直長四人正七品上書吏四人侍御醫四人從六品上主藥十二人藥童三十人司醫四人正八品上醫佐八人正八品下按摩師四人咒禁師四人唐六典龍朔二年改奉御為奉醫大夫咸亨元年復故職官分紀奉御掌合和御藥及診候之事直長為之二凡藥有上中下之三品凡和藥宜用一君三臣九佐方家之大經也必辨其五味三性七情為和劑之節其用又有四焉曰湯丸酒散視其病之深淺所在而服之凡合和御藥與殿中監視其分劑藥成先嘗而後進唐六典侍御醫掌診候調和司醫醫佐掌分療衆疾主藥藥童掌刮削搗篩按摩師咒禁師所掌如太醫之職新唐書百官志太醫署令二人從七品下丞二人醫監四人並從八品下醫正八人從九品下舊唐書職官志太醫令掌醫療之法丞為之二其屬有四曰醫師針師按摩師禁咒師皆有博士以教之其考試登用如國子之法凡醫師醫工醫正療人疾病以其痊多少而書之以為考課藥園師以時種蒔收採諸藥唐六典太醫署有府二人史四人主藥八人藥童二十四人藥園師二人藥圃生八人掌固四人醫師二十人醫工百人醫生四十人典藥一人針工二十人針生二十人按摩工五十六人按摩生十五人咒禁師二人咒禁工八人咒禁生十人新唐書百官志醫博士一人正八品上助教一人從九品上掌教授諸生以本草甲乙脉經分而為業一曰體療二曰瘡腫三曰少小四曰耳目口齒五曰角法針博士一人從八品上助教一人針師十人並從九品下掌教針生以經脉乳穴教如醫生按摩博士一人按摩師四人並從九品下掌教導引之法以除疾損傷折跌者正之咒禁博士一人從九品下掌教咒禁祓除為厲者齊戒以受焉謹按唐沿隋制於京師置藥園一所擇良田三頃取庶人子年十六以上二十以下充藥園生業成補藥師令其種蒔諸藥蓋因方劑中有應取鮮植者故别種以儲用其他則仍從所出州土採辦貯之右藏庫如今直省嵗解藥材之比非盡取給於藥園也又史載尚藥奉御二人而新唐書藝文志顯慶四年奉敕編類本草者有尚藥奉御許孝崇胡子家蔣季璋三人殆亦隨時增减不盡拘定額歟五季馬端臨文獻通考五代時有翰林醫官使謹案五季寺監諸屬官多所裁併而薜居正舊五代史陳元傳載元以善醫擢用又歐陽修新五代史扈載傳亦有遣太醫視疾之文是當時太醫之職猶存特不𨽻于太常與古制不同耳宋宋史職官志殿中省總六局掌藥局掌和劑疹候之事有典御有奉御有醫師文獻通考宋制翰林醫官院使副各二人並領院事以尚藥奉御充或有加諸司使者直院四人尚藥奉御六人醫官醫學祇候無定員舊制翰林醫官使四人副使二人直院七人尚藥奉御七人醫官三十人醫學四十人祗候醫人十二人其貟猥多寶元二年始立使副直院尚藥奉御定員醫官醫學無班位以服色為差加同正官至尚藥奉御者或加檢校官其直院則奉御及同正官皆為之多自醫官特奬而授掌供奉醫藥及承詔視療衆疾之事江少虞宋朝事實類苑賈黃中中風眩卒太宗切責諸醫大搜京城醫工凡通神農本草黃帝難經素問及善針炙藥餌者校其能否以補翰林醫學及醫院祇候宋史職官志太常寺太醫局有丞有教授有九科醫生額三百人嵗終則會其全失而定其賞罰太醫局熙寧九年置以知制誥熊本提舉大理寺丞單驤管幹後詔勿𨽻太常寺置提舉一判局二判局選知醫事者為之科置教授一選翰林醫官以下與上等學生及在官良醫為之孝宗隆興元年省併醫官而罷局生續以虞允文請依舊存留醫學科不置局權令太常寺掌行紹熙二年復置太醫局局生以百員為額餘依未罷局前體例仍𨽻太常寺宋史選舉志醫學初𨽻太常寺神宗時始置提舉判局官及教授一人學生三百人設三科以教之曰方脉科針科瘍科常以春試三學生願與者聽崇寧間改𨽻國子監紹興中復置醫學以醫師主之乾道二年罷局而存御醫諸科紹熙二年復置局文獻通考崇寧元年詔醫官有勞轉皇城使實及五年方許除遙郡刺史又七年除遙郡團練又十年以上方許除遙郡防禦使醫官有和安成和成安成全大夫保和大夫保安大夫翰林良醫和安成和成安成全郎保和郎保安郎翰林醫正翰林醫官翰林醫效翰林醫痊翰林醫愈翰林醫證翰林醫診翰林醫候翰林醫學舊諸司使副有醫官使及副使蓋自太醫丞直院轉醫官副使叙遷年格一同武官但為東班使額耳政和初既易武階而醫官之名亦遂易焉凡十有九階立和安大夫視𣙜易使以上翰林良醫視醫官使其和安郎以下視東副使若醫官副使則以醫正易之舊額和安大夫至良醫二十員紹興二年五員和安郎至醫官元額三十員紹興二年四員醫效元額七員紹興二員醫痊元額十員今一員醫愈至祇候大方脉元額百五十員紹興十五員而已洪邁容齊三筆神宗立醫官額止於四員及宣和中自和安大夫至翰林醫官凡一百十七人直局至祇候凡九百七十九人冗濫如此三年五月始詔大夫以二十員郎以三十員醫效至祇候以三百人為額而額外人免改正但不許作官户見帶遙郡人並依元豐舊制然竟不能循守也乾道三年三月隨龍醫官平和大夫階州團練使潘攸差判太醫局請給依能誠例支破邁時在西掖取會能誠全支本色因依誠係和安大夫潭州觀察使月請米麥百餘石錢數百千春冬綿絹之屬比他人十倍因上章極論之乞將攸合得請給令户部照條支破孝宗諭云豈惟潘攸不合得并能誠亦合住了即日御筆批依仍改正能誠已得真俸之㫖旋又罷醫官局李燾續資治通鑑長編御藥院掌按驗祕方和劑藥品以進御及供奉禁中之用至道三年始置以入內供奉官三人掌之或參用士人謹案宋太常寺雖有太醫局但主以醫學教授生徒其掌醫之政令者實在醫官院故設有使副等官正如今之太醫院也至御藥院掌以方藥供御當如今之內藥房而中葉以後多以宦官領之考之朝野雜記隨隱漫録諸書所司又在應奉禮儀不専主方藥之事故有詔命則監學士院草麻駕出則夾輦左右乃內臣近御者之職蓋名雖存而實已非矣遼遼史百官志北面局官職名有太醫局都林牙局使局副使南面官翰林醫院有翰林醫官金金史百官志太醫院提㸃正五品使從五品副使從六品判官從八品掌諸醫藥總判院事𬋩勾從九品隨科至十人設一員以術精者充如不至十人併至十人置不限資考正奉上太醫一百二十月升除副奉上太醫不算月日長行太醫不算月日十科額五十人御藥院提㸃從五品直長正八品掌御湯藥明昌五年設都監正九品不限員同監從九品不常除謹案太醫院之名始自金代而當時領於宣徽院不為分署蓋猶沿前代太醫𨽻屬太常之遺制也又有尚藥局亦宣徽屬官即前代殿中監所統六局之一而所司在茶果湯藥不専醫事今故不列于此表焉元元史百官志太醫院秩正二品掌醫事製奉御藥物領各屬醫職中統元年置宣差提㸃太醫院事二十年改為尚醫監秩正四品二十二年復為太醫院置提㸃四員院使副使判官各二員大德五年升正三品設官十六員十一年增院使二員皇慶元年增院使二員二年增院使一員至治二年定置院使十二員正二品同知二員正三品簽院二員從三品同簽二員正四品院判二員正五品經歷二員從七品都事二員從七品照磨兼承發架閣庫一員正八品令史八人譯史二人知印二人通事二人宣史七人御藥院秩從五品掌受各路鄉貢諸蕃進獻珍貴藥品修造湯煎至元六年始置達嚕噶齊解見戶部篇一員從五品大使一員從六品副使三員正七品直長一員都監一員御藥監秩從五品掌兩都行篋藥餌至元十年始置大德九年分立行御藥局掌行篋藥物本局但掌上都藥倉之事定置逹嚕噶齊一員從五品局使二員從五品副使二員正七品行御藥局秩從五品逹嚕噶齊一員大使二員副使三員品秩同上掌行篋藥餌大德九年始置元史武宗本紀至大二年三月升掌醫署為典醫監仁宗本紀延祐四年四月罷典醫監謹案太醫一官歷代皆分𨽻于門下殿中諸省及太常寺宣徽院其獨為一署無所𨽻屬實自元始又别置御藥院則當如今之內藥房而御藥典醫諸監復多所創建旋置旋廢殊為冗贅又武宗紀載至大中中書省臣言太醫院遣使取藥材于陕西四川雲南費公帑勞驛𫝊乞禁止從之是當時立法未善使院官得借以勞擾州郡今制凡直省嵗解藥材由户部收貯附庫以時支用其內藥房所需藥材均按例給價令藥商赴部領銀採辦以生藥交進院官詳驗擇其佳者送藥房貯偹洵為經久無弊矣明明史職官志太醫院院使一人正五品院判二人正六品其屬御醫四人正八品後增至十八人隆慶五年定設十人吏目一人從九品隆慶五年定設十人生藥庫惠民藥局各大使一人副使一人太醫院掌醫療之法凡醫術各十三科醫官醫生專科肄業曰大方脉曰小方脉曰婦人曰瘡瘍曰針灸曰眼曰口齒曰接骨曰傷寒曰咽喉曰金鏃曰按摩曰祝由凡醫家子弟擇師而教之三年五年一試再試三試乃黜陟之凡藥辨其土宜擇其良楛慎其條製而用之太祖初置醫藥提舉司設提舉從五品同提舉從六品副提舉從七品醫學教授正九品學正官醫提領從九品尋改為太醫監設少監正四品監丞正六品吳元年改監為院設院使秩正三品同知正四品院判正五品典簿正七品洪武六年置御藥局于內府始設御醫十四年改太醫院為正五品設令一人丞一人吏目一人屬官御醫四人俱如文職授散官二十二年復改令為院使丞為院判明㑹典御藥房嘉靖十五年改為聖濟殿擇術業精通者供事明史方技𫝊許紳初供事御藥房嘉靖改元授御醫屢遷太醫院使受知于世宗連加通政使禮部侍郎工部尚書並領院事謹案周禮醫師以上士為衆醫之長而疾醫瘍醫等以中下士佐之蓋醫之政令聼於冢宰醫師等皆以其職屬焉故祿秩至三命而止西漢太醫令千石𨽻太常少府而統于丞相御史葉時禮經會元謂其猶有周官遺意北魏及周齊徐之才周淡王顯姚僧垣等咸以醫著至位歷僕射爵為公侯頗見䙝濫然之才等本由儒吏見用與專以一技登進者有殊自宋之末季廣置醫官名目繁冗其久次者至寵以州郡防禦團練之職而周密癸辛雜識有御診王承宣則又可加至承宣使甚者如嶽柯程史所載醫師王繼先積官留後與秦檜表裏勢熖大張諸子至列延閣金紫盈門紀綱凌替至此已極元代太醫院雖獨為一署而據宦官列傳李邦寧以禮部尚書提㸃太醫院尋又加大司徒領太醫院事是則又以閹豎典司公然位列公台尤為乖謬明則若許紳以供奉之勞至加以尚書職銜亦同此弊國家董正治官太醫諸員各執藝入直恪共厥事院使院判間有䝉特㫖加銜者不過至三四品而內藥房以內務府大臣管理程式有定視周典更為詳慎矣欽定厯代職官表卷三十六
