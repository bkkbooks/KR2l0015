body:
  text: 順天府表順天府國朝官制順天府尹漢人一人正三品丞漢人一人正四品尹掌京畿治理凡田賦出納之政以時勾稽㑹直𨽻總督而上其要於户部凡師行則主和雇民車嵗以立春前一日率僚屬迎春東郊遂進春於宫門退而頒春於民間以勸東作耕藉則具耒耜絲鞭實青箱以穜稑奉之以從鄉試則充監臨凡考試咸司其供具焉丞掌學校之政令鄉試則充提調官以佐尹而經理之員額俱順治元年定雍正元年以來以部院大臣兼管府事皆由特簡無定員治中漢人一人正五品通判漢人一人正六品治中掌供文武鄉㑹試之饔餼製卷以授諸生通判掌京城各市牙儈之籍而𣙜其常稅鄉㑹試則治其名簿焉國初設治中一人通判三人推官一人順治六年省通判二人康熙六年省推官員額經厯司經厯漢人一人從七品照磨漢人一人從九品司獄司司獄漢人一人從九品崇文門副使漢人一人未入流經厯掌出納文書照磨掌鄉試繕冊彌封之事司獄掌刑部所送軍流徒罪人收繫而發遣之副使掌守崇文門庫藏員額俱順治元年定舊設有知事一人檢校一人康熙六年省庫大使一人康熙三十九年省崇文門大使一人康熙四十年省大興縣知縣一人正六品宛平縣同縣丞一人正七品典史一人未入流巡檢三人從九品閘官一人未入流宛平縣知縣一人縣丞二人主簿一人正九品典史一人巡檢四人閘官一人大興宛平知縣各掌其縣之政令與五城兵馬司分壤而治撫和兆人緝禁姦匪頒布教條品秩服章視外縣加一等縣丞以下咸佐知縣以分掌其事焉又初設有廣源閘閘官一人順治十年省張家灣宣課大使一人康熙四十年省遞運所大使一人康熙三十八年省儒學教授滿洲漢人各一人正七品訓導滿洲一人正七品漢人一人從七品掌八旗及京師黌序訓課之政國初設府學漢人教授一人訓導六人京衛武學漢人教授一人訓導二人順治二年省武學訓導員額三年省府學訓導四人康熙四年又省二人十五年復設府學訓導武學訓導各一人雍正三年改京衛武學為順天府武學四年罷武學之制增置儒學滿洲教授訓導各一人謹案順天府初止轄大興宛平二縣康熙十五年始以昌平良鄉等州縣併𨽻順天府今所屬自大興宛平以外凡州縣二十有五設東西南北四路同知以分領之皆兼統於直𨽻總督其職制員數已别載入州縣篇故不具於此表歷代建置三代尚書君陳命汝尹兹東郊孔安國傳命君陳正東郊成周之邑里官司謹案尹之訓為正洪範師尹惟日孔安國傳云衆正官之吏孔頴達疏謂正官大夫與其同類之官為長則尹乃官僚居首者之號故春秋列國以尹名官者如楚有工尹連尹莠尹針尹環列之尹宫廏尹中廏尹寢尹監馬尹左尹右尹宋有大尹門尹之類屢見於左氏傳今京府稱尹昉於漢代則又取君陳尹兹東郊之文以為義謹首著於此周禮地官鄉師下大夫四人各掌其所治鄉之教而聽其治以國比之法以時稽其夫家衆寡辨其老幼貴賤廢疾馬牛之物辨其可任者與其施舍者掌其戒令糾禁聽其獄訟大役則帥民徒而至治其政令大軍旅㑹同正治其徒役與其輂輦嵗終則考六鄉之治以詔廢置正嵗稽其鄉器若國大比則考教察辭稽器展事以詔誅賞謹案周時分建六官未有守令之職故後世京師諸官府多與周制相承而京尹獨無可比附自來考職官者皆以京尹為起於秦之內史而不復推及於周然以王城之地京大師衆民物繁阜不容無人焉以治之謹嘗參稽經義尋繹原委而知地官之鄉師實與今京尹職守有相合者何以言之周法以六鄉為首善之區故司徒所主民事於六鄉為尤詳鄭司農謂百里以內為六鄉外為六遂四面而環王城鄉師四人以兩人共主三鄉其王城以內亦當在六鄉之數故小司徒稽國中及四郊都鄙之夫家九比之數鄉師以時巡國及野而賙萬民之囏厄鄉大夫登夫家之衆寡國中自七尺以及六十野自六尺以及六十有五悉以國中與郊野對舉知所謂國中者即如今之京城郊野即如今順天府所轄州縣之地而皆屬鄉師又小司徒大比六鄉四郊之吏平教治正政事鄭康成謂吏在四郊之內主民事者而以六鄉統之亦如今順天府屬州縣官之比故鄉師之職所謂掌其戒令糾禁聽其獄訟治其徒役與其輂輦者無一非今順天府所有事特周鄉師四人而後世但臨以一尹則古今之各有異宜也至秦漢官名之同於周舊者如太僕司𨽻之屬於取義尚不甚相逺而獨內史之主京師則按之周官全不得其命名之故惟考鄉大夫獻賢能之書於王有內史二之之文意者周秦之間鄉遂之制既廢而三年大比之式尚存於內史因姑取其名以代鄉師之官因襲變遷其由來固當有所自耳周禮地官司市下大夫二人上士四人中士八人下士十有六人府四人史八人胥十有二人徒百有二十人掌市之治教政刑度量禁令廛人中士二人下士四人府二人史四人胥二十人徒二十人掌斂市絘布總布質布罰布廛布而入于泉府鄭康成注絘布列肆之稅廛布貨賄諸物邸舍之稅謹案日中為市欺詐易生故周禮特設司市以董治之而質人以質其成廛人以斂其布皆所以平爭而禁僞兩漢而後設市令丞於都城以主百族交易其立制蓋本於此今市政之在各州縣者已併𨽻於地方長吏惟順天府通判主徵牙稅正與斂絘布廛布者其事相合蓋猶兼有周司市及廛人遺意故並系之於表而歷代市令長丞之職亦以類附及焉秦杜佑通典周官有內史秦因之掌治京師三輔黃圖秦并天下置內史以領關中史記秦始皇本紀咸陽令閻樂漢漢書百官公卿表內史掌治京師景帝二年分置左內史右內史右內史武帝太初元年更名京兆尹屬官有長安市㕑兩令丞左內史更名左馮翊長安四市長丞屬焉主爵中尉更名右扶風治內史右地與左馮翊京兆尹是為三輔皆有兩丞秩二千石丞六百石三輔黃圖漢髙祖定三秦更為渭南郡九年復為內史始都之景帝分置左右內史此為右內史武帝太初元年改內史為京兆尹與左馮翊右扶風謂之三輔其治俱在長安城中顔師古漢書注京兆在尚冠前街東入故中尉府馮翊在太上皇廟西入右扶風在夕隂街北入故主爵府長安以東為京兆長陵以北為左馮翊渭城以西為右扶風漢書趙廣漢傳廣漢遷京輔都尉守京兆尹漢書王尊傳尊為諌大夫守京輔都尉行京兆尹事漢書酷吏傳義縱遷長安令直法行治不避貴戚尹賞以三輔髙第選守長安命得一切便宜從事漢書趙廣漢傳使長安丞龔奢叩堂户漢書張敞傳敞守京兆尹賊捕掾絮舜下獄敞使主簿持教告舜漢書趙廣漢傳新豐杜建為京兆掾漢書游俠傳萭章為京兆尹門下督從至殿中謹案漢三輔雖並治長安然各有分壤其都城以內不屬馮翊扶風故張敞傳稱京兆典京師長安中浩穰於三輔尤劇而黃圖亦稱都城為右內史地是長安城內全𨽻於京兆可知考之於史如雋不疑為京兆尹京師吏民敬其威信趙廣漢為京兆尹發長安吏自將至博陸侯霍禹第廋索私屠酤又率長安丞捕賊而張敞為京兆尹長安市無偷盜長安官司吏卒皆統帥於京兆尹馮翊扶風所轄但在都城以外其於長安吏事固未嘗有所預也至如趙廣漢王尊之為京兆尹一以京輔都尉稱守一以諌大夫守京輔都尉稱行其他似此者尚多殆當時以此職最要不輕授人故俱先令攝署以觀其能否耳又京兆賊捕掾門下督諸職不見於百官表蓋京兆尹所自辟除如今照磨司獄之流歟又案歷代京牧俱稱劇任而西漢之京兆尹尤難稱職史所載能於其官者以韓張兩王為最著大抵皆以武健嚴酷為用而循吏如黃霸等一為京兆其聲望遂以頓减甚且獲罪罷官其難治至於如此推求其故則漢之都城其大患有二一曰豪猾一曰盜賊蓋漢初沿戰國之餘習其豪民爭以游俠相尚報仇怨結刺客者方羣聚於長安如王尊𫝊所稱宿豪大猾東市賈萭城西萭章箭張禁酒趙放之徒無不結黨犯法以撓吏權而諸陵既建陵邑盡徙天下豪家富族以實關中積為姦藪如原涉𫝊所稱長安五陵諸為氣節者實即一時亂政之尤又長安市偷盜盛行尹賞𫝊載城中薄暮塵起剽劫行者死傷橫道桴鼓不絶其事亦後世所罕有其他若發民治馳道發衛士詣北軍俱見黃霸傳為司𨽻校尉發吏捕人見王尊傳悉責辦於京兆諸務冗雜宜為守尹者芒刃稍頓即不能擊斷也然觀趙廣漢傳稱左馮翊右扶風皆治長安中犯法者從跡喜過京兆界廣漢嘆曰亂我治者常二輔也足知當時三輔並建東西藏匿易以潛奸故京兆更以掣肘為病亦由其立法之未為盡善矣後漢書百官志河南尹一人主京都二千石丞一人通典光武中興徙都洛陽改太守為尹章綬服秩與京兆同主京都特奉朝請後漢書董宣列傳特徵為洛陽令摶擊豪強莫不震栗周䊸列傳徵拜洛陽令貴戚踴蹐京師肅清王渙列傳遷為洛陽令以平居身得寬猛之宜後漢書魯恭傳仁恕掾肥親章懷太子李賢注仁恕掾主獄屬河南尹劉昭後漢書志注漢官曰河南尹員吏九百二十七人十二人百石諸縣有秩三十五人官屬掾史五人四部督郵史部掾二十六人案獄仁恕三人監津渠漕水掾二十五人百石卒史二百五十人文學守助掾六十人書佐五十人循行二百三十人幹小史三百三十一人洛陽令秩千石丞三人四百石員吏七百九十六人十三人四百石鄉有秩獄史五十六人佐史鄉佐七十七人斗食令史嗇夫假五十人掾史幹小史二百五十人書佐九十人循行二百六十人唐六典後漢河南尹屬官有洛陽市長丞謹案東漢京兆尹左馮翊右扶風以陵廟所在不改其號然品秩與諸郡太守同非京尹可比今故不列於表至河南尹職任繁劇而洛陽特置詔獄為刑名之總滙故洛陽令必以強幹者居之每詔三公特選視西漢之長安令其任為更重云三國裴松之三國志注傅子曰河南尹內掌帝都外統京畿兼古六鄉六遂之士其民異方雜居多豪門大族商賈胡貊天下四方㑹利之所聚而姦之所生前尹司馬芝舉其綱而太簡次尹劉靜綜其目而太密後尹李勝毁常法以收一時之聲嘏立司馬氏之綱統裁劉氏之綱目以經緯之李氏所毁以漸補之郡有七百吏半非舊也河南俗黨五官掾功曹典選職皆授其本國人無用異拜人者嘏各舉其良而對用之唐六典魏有治中謹案東漢河南尹員吏九百二十七人而曹魏時河南吏已减至七百人蓋其繁劇之形已較損於漢代矣晉晉書職官志郡皆置太守河南郡京師所在則曰尹又置主簿主記室門下賊曹議生門下史記室史録事史書佐循行幹小史五官掾功曹史功曹書佐循行小史五官掾等員太平御覽王隱晉書曰泰始六年詔曰河南大郡四方表則中書令庾純清粹中正才經治化其以純為河南尹晉書王衍列傳衍轉河南尹樂廣列傳纍遷侍中河南尹唐六典晉置别駕治中司馬光資治通鑑晉惠帝永平九年洛陽令曹攄謹案晉依漢魏之制置河南尹洛陽令於都城按之職制自當以郡統縣然觀資治通鑑載惠帝廢愍懷太子故臣冒禁拜辭司𨽻校尉滿奮收縳送獄河南尹樂廣即便解遣而繫洛陽獄者猶未釋都官從事孫琰說賈謐令釋之胡三省注曰付郡者河南尹得解遣之繫洛陽獄者尹不得與故未釋據此則河南洛陽各有獄其在洛陽者皆令自决遣並不關白於尹疑當時洛陽實主詔獄故其權獨重也唐六典歷代所都皆為尹晉江左為丹陽尹歐陽詢藝文類聚晉太興元年改丹陽內史為丹陽尹晉書王垣之列傳遷中書令領丹陽尹劉惔列𫝊惔纍遷丹陽尹為政清肅門無雜賔謹案晉南渡後以建康為都城丹陽既改為尹則建康令亦當與洛陽令相同特其明文不見於史耳唐六典市長丞東晉𨽻丹陽尹宋齊梁陳宋書州郡志丹陽尹治建業南齊書百官志丹陽尹位次九卿下謹案南朝諸代皆以揚州刺史為京輦重任以諸王領之丹陽尹職雖雄緊不免受制於揚州宋彭城王義康傅義康領揚州刺史欲以所親劉斌為丹陽尹此即揚州與丹陽互相表裏之一證宜前後任是官者多不能稱其職也梁書王志列傳天監元年遷冠軍將軍丹陽尹袁昻列傳普通三年為中書監丹陽尹梁書太祖五王列傳安成王機普通二年遷明威將軍丹陽尹衡山侯恭遷中書監丹陽尹恭世子靜厯東宮領直遷丹陽丞隋書百官志建康舊置獄丞一人天監元年詔依廷尉三官置正平監又令三官更直一日分受罪繫事無大小悉與令籌若有大事共詳三人具辨脫有同異各立議以聞資治通鑑梁太清二年建康令謝挺隋書百官志陳丹陽尹中二千石品第五郡丞六百石建康令千石品並第七謹案梁以建康令主獄事至别置建康三官與令籌决以重其職蓋亦沿漢晉洛陽令掌詔獄之例陳書載陸虞判廷尉建康二獄事則其制猶未改也北魏魏書官氏志延和元年三月改代尹為萬年尹代令為萬年令後復代尹第三品上京邑市令代尹丞從第五品中代郡通事第七品上髙祖復次職令河南尹第三品洛陽令第五品河南郡丞第六品司州文學從第八品通典後魏太和中遷都洛陽又置河南尹東魏曰魏尹南齊書封隆之列傳隆之父子繪仕魏為司徒左長史行魏尹事乾眀初轉大司農尋正除魏尹魏書世宗本紀正始元年八月詔洛陽令有大事聽面敷奏魏書髙謙之列傳謙為河隂令舊制二縣令得面陳得失時佞幸之徒惡其有所發聞遂共奏罷謙之上疏曰臣謬宰神邑實思奉法不撓臣父崇之為洛陽令常得入奏是非所以朝貴斂手乞更眀往制庶姦豪知禁謹案北魏初都平城孝文遷洛陽孝靜遷鄴故代河南魏三郡皆為京尹至漢晉治京城者惟洛陽一令而魏之河隂令亦得視洛陽稱為二縣則如今大興宛平之並為京縣也北齊隋書百官志後齊司州置牧屬官有别駕從事史治中從事史等員又領西東市署令丞及統清都郡諸畿郡清都郡置尹丞中正功曹主簿督郵五官門下督録事主記議生及功曹記室户田金租兵騎賊法等曹椽中部掾等員鄴臨彰成安三縣令各置丞中正功曹主簿門下督録事主記議及功曹記室户田金租兵騎賊法等曹椽員北齊書假榮列傳勑濬京城北隍司州治中崔龍子清都尹丞李道隆鄴縣令尉長卿臨彰令崔象成安令髙子徹等並典作謹案漢置司𨽻校尉督察京師魏晉以後以為司州乃部刺史之任而京尹則郡太守之任各有職事不相臨攝六朝改司州為揚州其權勢始見偏重而亦未有統屬北齊置清都尹始統之以司州牧與厯代稍有不同然考之列傳如范陽王紹義等皆以宗室為之則其職亦未嘗不重也後周唐六典後周復為京兆尹又置雍州牧通典後周司市下大夫正四命小司市上士正三命謹案唐六典稱後周置雍州牧又有京兆尹而當時依倣周制復設鄉伯中大夫小鄉伯下大夫上士中士等官其職掌所别不得而詳然稽之周書紀傳亦未見有曾為京兆尹者疑雖有其名實未嘗授人也隋隋書百官志雍州置牧屬官有别駕贊務等員京兆郡置尹丞正功曹主簿金户兵法士等曹佐等員并佐史二百四十四人大興長安縣置令丞正功曹主簿西曹金戶兵法士曹等員并佐史合一百四十七人雍州牧從二品京兆尹正三品雍州别駕贊務從四品大興長安令京兆郡丞從五品大興長安丞從七品開皇三年罷郡以州統縣改别駕贊務為長史司馬煬帝罷州置郡京兆河南則俱為尹並正三品罷長史司馬置贊務一人以二之京兆河南從四品上次置東西曹椽京兆河南從五品上大興長安河南洛陽四縣令並增為正五品其後諸郡各加置通守一人位次太守京兆河南則謂之內史又改贊務為丞位在通守下唐六典後周置雍州牧隋因之大業三年罷州置郡京兆河南皆為尹則兼牧之任矣隋書百官志司農寺市署令二人市有肆長四十人煬帝定令太府寺管京都五市署京師東市曰都㑹西市曰利人東都東市曰豐都南西市曰大同北市曰通逺謹案治中别駕贊務諸官厯代皆𨽻於司州至隋并州入郡始為京尹之佐其品秩視尹僅相去一偕蓋如今順天府丞之職而當時又别有京兆河南郡丞則秩止五品其班位在洛陽長安諸令之下乃京尹之屬僚非令府丞可比自隋煬帝復改贊務為丞而丞始定為尹二名實異同固有不必其相沿者矣至贊務即治中所改考之唐六典則當時實作贊治今隋書之稱贊務者蓋修史時避髙宗諱也唐唐六典京兆河南太原府牧各一人從二品尹一人從三品掌清肅邦畿考竅官吏宣布德化撫和齊人少尹二人從四品下掌二府事以紀綱衆務通判列曹司録參軍事二人正七品上録事四人從九品上掌省署抄目糾正非違監守符印功曹參軍事二人正七品下掌官吏考課之事倉曹參軍事二人正七品下掌公廨倉庫租賦之事戶曹參軍事二人正七品下掌戶籍計帳之事兵曹參軍事二人正七品下掌兵甲器仗之事法曹參軍事二人正七品下掌鞫獄定刑之事士曹參軍事二人正七品下掌百工衆藝之事參軍事六人正八品下掌出使檢討之事經學博士一人從八品上助教二人以五經教授諸生萬年長安河南洛陽奉先太原晉陽令一人正五品上丞二人從七品上令掌導揚風化撫字黎氓丞為之二主簿二人從七品上掌付事勾稽省署抄目糾正非違監印給紙筆雜用之事録事二人從九品下掌受事發辰檢勾稽失新唐書百官志武德元年雍州置牧一人以親王為之然常以别駕領州事永徽中改尹曰長史開元元年改京兆江南府長史復為尹舊唐書百官志開元初雍洛并改為府乃升長史為尹從二品専總府事魏晉有治中隋文改為司馬煬帝改為贊治又為丞武德改為治中永徽避髙宗名改為司馬開元初改為少尹通典大唐京兆府本為雍州置牧一人以親王為之太宗為秦王中宗為英王睿宗為相王時並居其任多以長史理人開元元年改雍州為京兆府置牧如故掌宣風導俗肅清所部或以親王居閣而遙領焉初雍州置别駕以二牧之事永徽中改别駕為長史開元初改雍州長史為京兆尹總理衆務謹案自兩漢以州領郡雖京師所治亦然其司𨽻校尉司州刺史司州牧雍州牧及江左所置揚州刺史皆州任也厯代所為京兆河南丹陽等尹者則郡任也隋文帝罷郡置州而尹之事全併於牧煬帝復罷州置郡而牧之事又全併於尹於是州郡之事始合為一牧尹之職亦混而無所區分唐初置牧以為京府正官設别駕長史以二之而所謂牧者乃以未出閣之皇子領其事於是使别駕長史専行郡事責重位輕殊非大小相維之義元宗改長史為尹始克以正官蒞職而領牧者仍並置不廢虛名無實終為枝冗失宜國朝定制以府尹事繁常命部院大臣一人兼司其事蓋亦領牧之遺意而事任益専綱條嚴肅於治理倍資整飭矣又案隋唐以前畫疆分治者有州有郡未有府名唐元宗開元元年十二月改雍州為京兆府洛陽為河南府於是兩都始建府治然特因京郡重地故隆以此名其他則仍稱某州某郡而已非得槩膺府號也自宋世以潛藩之地皆依京郡故事升之為府於是府名始多然非諸帝所嘗分封建節者仍不得預至元眀始以天下州郡槩改為府無復差别矣顧推求事始其府名實為京郡而設謹附考於此以明原委焉唐六典兩京諸市署令各一人從六品上丞各二人正八品上掌百族交易之事五季五代史梁本紀末帝貞明五年開封尹王瓉五代史唐本紀莊宗同光二年河南尹張全義家人𫝊唐秦王從榮拜河南尹唐廢帝子重美自左衛上將軍兼河南尹五代史王朴傳遷左諫議大夫知開封府事謹案五季梁都汴州置開封尹唐都洛陽為河南尹石晉復都於汴仍為開封尹宗史職官志謂五代俱置開封府尹者誤也宋宋史職官志開封府牧尹不常置權知府一人以待制以上充掌尹正畿甸之事以教法道民而勸課之中都之獄訟皆受而聽焉小事則専决大事則禀奏若承㫖已斷者刑部御史臺無輒紏察屏除冦盜有姦伏則戒所𨽻官捕治凡戶口賦役道釋之占京邑者頒其禁令㑹其帳籍大禮橋道頓遞則為之使仗內奉引則差官攝牧其屬有判官推官四人日事推鞫分事以治而佐其長領南司者一人督察使院非刑獄訟訴則主行之司録參軍一人折戶婚之訟而通書六曹之案牒功曹倉戶曹兵曹法士曹參軍各一人視其官曹分職蒞事分案六置吏六百開封典司轂下自建隆以來為要劇之任至熙寧間增給吏祿禁其受賕省衙前役以寬民力釐折獄訟歸於廂官而治事視前日損去十四元祐六年王巖叟言左右㕔推官公事詞狀初無通治眀文請事繫朝廷及奏請通治外餘並據號分治從之紹聖三年詔開封祥符知縣事自令選秩通判人充崇寧三年蔡京奏乞罷權知府置牧一員尹一員専總府事少尹二員分左右二府之政事牧以皇子領之尹以文臣充在六曹尚書之下侍郎之上少尹在左右司郎官之下列曹郎官之上以士戶儀兵刑工為六曹次序司録二員六曹各二員參軍事八員開封祥符兩縣置案倣此易胥吏之稱略依唐六典制度又請移開封府治所於舊尚書省從之五年詔開封尹屬官參軍等並依舊員額大觀元年李孝夀乞增置府學博士一員從之詔開封府六職間劇不同如士曹之官惟主到罷批書而刑戶事繁自今凡士之婚田鬪訟皆在士曹餘曹倣此二年詔皇子領牧祿令如執政官又詔天下州郡並依開封府分曹置掾政和二年復置開封府學錢糧官一員臨安府舊為杭州建炎三年詔改為臨安府紹興置知府一員通判二員簽書節度判官㕔公事節度推官觀察推官觀察判官録事參軍左司理參軍右司理參軍司户參軍司法參軍各一員本府掌畿甸之事籍其戶均其賦役頒其禁令置兩總轄承受御前朝㫖文字凡御寶御批實封所有取索則供進凡省臺寺監監司符牒及管下諸縣及倉場等申到公事則受而理之凡大禮及國信隨事應辦祠祭共其禮料㑹聚陳其幄帟人使往來辦其舟楫皆先期飭於有司領縣九分士戶儀兵刑工六案內戶案分上中下案外有免役案常平案上下開拆司財賦司大禮局國信司排辦司修造司各治其事置吏㸃檢文字都孔目官副孔目官節度孔目官觀察孔目官各一名磨勘司主押官正開拆副開拆官各一人下名開拆官二人押司官八人前後行守分二十一人貼司三十人乾道七年皇太子領尹事廢臨安府通判簽判置少尹一員日受民詞以白太子間日率僚屬詣宫禀事置判官二員推官三員有㫖少尹比倣知府判官比通判推官比幕職其統臨職分並照從來條例九年皇太子解尹事臨安府知通簽判推判官並依舊置馬端臨文獻通考四朝志尹以親王為之號判南衙凡命知府必帶權字以翰林為之翰林學士及雜學士若待制則權發遣而已顧炎武日知録宋初太宗真宗皆嘗為開封府尹後無繼者乃設權知府一人所以避京尹之名也李燾續資治通鑑長編英宗治平四年二月提㸃開封府界諸縣鎮公事祠部郎中陳汝羲判三司都磨勘司知開封縣都官員外郎羅愷提㸃府界諸縣鎮公事愷入見上問以開封事皆不能知上不悅又見汝羲問以府界事應答詳敏翌日謂執政曰愷不才宜復用汝羲代之仍與館職謹案宋之開封府事權最重刑獄皆自斷决不關刑部御史臺大理寺小者並不奏聞故居是職者大都以幹辦著名而亦不免専恣之弊真宗時以趙昌言奏始令其皆録欵聞奏付刑部詳核然定案猶在開封今制順天府屬刑名皆歸直𨽻按察司審轉由總督題奏其京城訟獄事關重大者則由府尹審録送刑部治之職事相維視宋制益為詳慎至宋崇寧中定開封府掾屬為士户儀兵刑工六曹開封祥符兩縣亦凖此式大觀初遂令天下州縣並依開封分曹置掾今各直省府州縣書史分六房以治案牘實始於此特宋猶以流外官為之眀初以來則但以庶人在官者充其任其選為益輕耳遼遼史職官志某京留守行府尹事聖宗統和元年見上京留守行臨潢尹事吳王某府少尹聖宗太平四年見臨潢少尹鄭宏節王圻續文獻通考遼南面五京尹為五京留守司俱兼府尹職謹案遼雖分建五京而每嵗四時巡幸春水秋山實無定所並不常在京師故五京皆置留守司令兼府尹之事軍民俱歸統轄蓋以駐蹕時少特重其權以資彈壓也金金史百官志大興府尹一員正三品掌宣風導俗肅清所部總判府事兼領本路兵馬都總管府事車駕巡幸則置留守同知少尹判官惟留判不别置以總判兼之同知一員從四品掌通判府事少尹一員正五品掌同同知總管判官一員從五品掌紀綱總府衆務分判兵案之事府判一員從五品掌咨議參佐糾正非違紀綱衆務分判吏禮工案事推官二員從六品掌同府判分判戶刑案事內戶推掌通檢推排簿籍舊一員大定五年增一員知事一員正八品掌付事勾稽省署文牘總録諸案之事都孔目官女直司一員漢人司一員職同知事掌監印監管案牘不常置省則吏目攝知法三員從八品女直一員漢人二員掌律令格式審斷刑名女直教授一員赤縣謂大興宛平縣令一員從六品掌飬百姓按察所部宣導風化勸課農桑平理獄訟捕除盜賊禁止游隋兼管常平倉及通檢推排簿籍總判縣事丞一員從八品掌二縣事主簿一員正九品掌同縣丞市令司惟中都置令一員正八品丞一員正九品謹案宋代始以府名加潛藩之地金則大郡亦多升為府金史地理志謂之散府元眀而後天下州郡悉改稱府其原實起於此時又散府守臣得並稱為尹其制亦與厯代為不同云元元史百官志大都路都總管府秩正三品逹嚕噶齊解見戶部篇二員都總管一員副逹嚕噶齊二員同知二員治中二員判官二員推官二員經厯二員知事二員提檢案牘四員照磨兼管勾一員令史九十有五人譯史二人回回令史一人通事知印各二人奉差二十一人國初為燕京路總管大興府中統五年稱中都路至元九年改號大都二十一年始専置大都路總管府秩從三品置都逹嚕噶齊都總管等官二十七年升為都總管府進秩正三品領府一州十有一凡本府官吏惟逹嚕噶齊一員及總管推官専治路政其餘皆分任供需之事故又號曰供需府焉大都路提舉學校所秩正六品提舉一員教授二員學正二員學録一員至元二十四年既立國學以故孔子廟為京學而提舉學事者仍以國子祭酒繫銜宛平縣秩正六品逹嚕噶齊一員尹一員丞三員主簿三員尉一員典史三員司吏二十六人至元十一年置治大都麗正門以西大興縣秩正六品逹嚕噶齊一員尹一員丞一員主簿二員尉一員典史三員司吏一十五人至元十一年置治大都麗正門以東謹案元於京都不稱府而稱路不置尹而置逹嚕噶齊總管等員與外諸路無異特加都字為稍有差别耳又考地理志中書省統山東西河北之地謂之腹裏為路二十九首即大都路則當時又屬於中書省也明明史職官志順天府府尹一人正三品府丞一人正四品治中一人正五品通判六人正六品嘉靖後革三人推官一人從六品儒學教授一人從九品訓導一人其屬經厯司經厯一人從七品知事一人從八品照磨所照磨一人從九品檢校一人所轄宛平大興二縣各知縣一人正六品縣丞二人正七品主簿無定員正八品典史一人司獄司司獄一人從九品都稅司大使一人從九品副使一人宣課司凡四正陽門外正陽門張家灣蘆溝橋稅課司凡二安定門外安定門各大使一人從九品稅課分司凡二崇文門德勝門各副使一人遞車所批驗所各大使一人府尹掌京府之政令宣化和人勸農問俗均貢賦節征徭謹祭祀閲實戶口糾治豪強隱恤窮困疏理獄訟務知百姓之疾苦嵗立春迎春進春祭先農之神日朔望早朝奏老人坊廂聽宣諭孟春孟冬率其僚屬行鄉飲酒禮凡勳戚家人文引每三月一奏市易平其物價遇內官監徴𣲖物料雖有印信揭貼必補牘面奏若天子耕藉行三推禮則奉青箱播種於後禮畢率庶人終畝府丞二京府兼領學校治中參理府事以佐尹丞通判分理糧儲馬政軍匠薪炭河渠堤涂之事推官理刑名察屬吏二縣職掌如外縣以近涖輦下故品秩特優順天府即舊北平府洪武二年置北平行省九年改為北平布政司皆以北平為㑹府永樂初改為順天府十年升為府尹秩正三品設官如應天府順天府通判舊六人一人管糧一人管馬一人清軍一人管匠一人管河一人管柴炭嘉靖八年革管河管柴炭二人萬厯九年革清軍管匠二人十一年復設一人兼管軍匠謹案京師為萬邦輻輳之區地大物博情僞易滋故兩漢以來皆設京尹以董正之然厯代時宜各異而規制亦有差殊大約漢之京兆尹主於博擊豪強而生殺得以自由其弊也失之於橫宋之開封尹主於綜核綱紀而凡事不由省部其弊也失之於専南宋之臨安尹元之大都路都總管府主於應辦宮府一切中外供需之事悉以委之其弊也失之於雜至明之順天府尹資望益輕中官及厰衛皆得而役使之其失職為尤甚矣國家化行首善畿甸肅清特簡大臣兼管府事以重其任而所屬各州縣則與直𨽻總督參司治理神皋赤縣綱舉目張洵所謂都邑翼翼四方之極者也欽定厯代職官表卷三十二
