body:
  text: 各處駐劄大臣表各處駐劄大臣國朝官制喀爾喀軍營定邊左副將軍一人烏里雅蘇台參贊大臣一人科布多參贊大臣一人掌喀爾喀四部之軍政凡四部㑹盟參贊大臣間嵗分往㑹核稽其邊防軍實之事統聽左副將軍裁決具疏以聞阿爾泰烏里洋海散秩大臣二人副都統一人總管四人佐領二十七人驍騎校二十七人庫倫辦事大臣一人司員一人掌鄂羅斯之往來明其禁令司員掌庫倫貿易諸務稽察奸宄平其爭訟謹案乾隆四十九年正月奉㫖增𣲖大臣二人同辦庫倫事務係出特簡不在定制之內故不列為額缺分駐恰克圖辦事司員一人掌鄂羅斯貿易諸務聽節制於庫倫大臣綏逺城將軍一人協領五人佐領二十人防禦二十人驍騎校二十人兼管歸化城土默特歸化城土默特副都統一人參領十人佐領四十九人掌歸化城土默特之軍政以時巡閲邊防編審户册右衛城守尉一人防禦四人驍騎校四人遊牧察哈爾都統一人副都統一人八旗遊牧滿洲理事官九人八旗䝉古理事官八人護理都統關防筆帖式二人護理軍站印務筆帖式一人八旗總管八人參領八人副參領八人佐領一百一十一人驍騎校一百一十七人護軍校一百一十七人捕盜六品官三人掌察哈爾之軍政東西各分四旗西四旗在山西多倫諾爾境東四旗則熱河道所屬境也西寧辦事大臣一人司員一人筆帖式三人掌西寧之軍政凡青海三十六旗之㑹盟一如喀爾喀四部之制間嵗舉行聽簡命大臣裁決具疏以聞西藏辦事大臣二人司員一人筆帖式一人掌西藏之政令凡噶卜倫代賁第巴堪布皆屬焉有事則與達賴喇嘛定其賞罰由特㫖簡派三年更代歷代建置謹案三代以上疆域止於九州荒服以外聽其去來聲教所及僅通朝貢而已三代以下漸事邊防其關塞重鎮多在西北然不過雲中朔方諸地列戍控扼即張家口歸化城外已為甌脫若喀爾喀青海西藏則皆視為絶域豈復能建官分職以鎮其土地馭其人民哉載稽前史漢武帝時始開河西四郡通道玉門于是置護羌校尉其幽并以外則不能踰越長城也光武而後始置護胸奴中郎將沿及魏晉仍而不改亦皆局促塞下未遑逺馭唐太宗平突厥西北諸蕃稍稍內屬即其部落别置州縣其大者為都督府以其首領為都督刺史皆得世襲所謂羈縻州也至宋而北阻于遼西阻于夏禹迹所經且多為異域長城以外更不待言矣唯元太祖起自和林盡取漠南山北諸地世祖又定吐蕃各置中書行省及宣慰等使比於諸路稱為極盛至明而北棄大寧西失河套雖僅僅較勝于宋而狹隘抑亦太甚焉我國朝聲教旁通無逺弗届蒙古北部喀爾喀三汗同時納貢厥後朔漠蕩平庇我宇下與漠南諸部相等承平以來懷柔益逺北踰瀚海西絶羌荒西藏青海諸地並入版圖諸部君長稽首偕來畫疆置吏有如內地於是統之以重臣監之以分司內外相維大小咸秩凡諸部族莫不自幸為躬游聖世循職典屬伏考喀爾喀諸部于漢為單于故壤於唐為突厥其後為回紇于元為漠北諸部西寧所屬即漢以來之西海渾羌諸地西藏即吐蕃地歸化城察哈爾即古雲中定襄以北地謹詳稽前代職官擇其稍近今制者條其梗概具列如左其互市諸司置於緣邊諸境與今庫倫恰克圖諸官所掌相類者並附著于篇三代未置秦未置漢後漢書百官志護羌校尉一人比二千石主西羌謹案漢武帝時將軍李息郎中令徐自為將兵十萬人擊平先零始置護羌校尉持節統領趙充國傳詔舉可護羌校尉者五府舉辛武賢小弟湯趙充國舉湯兄臨衆是也其屬有擁節長史一人司馬二人皆六百石先零諸羌在今為青海諸部地是護羌校尉固略如今西寧辦事大臣也漢書胸奴列傳漢遣長樂衛尉髙昌侯董忠車騎都尉韓昌將騎萬六千送單于出朔方雞鹿塞詔忠等留衛單于助誅不服謹案漢單于舊境自歸化城土默特張家口察哈爾至喀爾喀諸部皆在其內長樂衛尉車騎都尉雖皆典司中禁非邊外之職然留衛單于則實如今制之駐劄藩部仍帶京銜故其官雖不列于表而特録其事以著緣起焉後漢書百官志使胸奴中郎將一人比二千石主護南單于置從事二人有事隨事增之掾隨事為員後漢書南胸奴列傳建武二十六年遣中郎將段郴副校尉王郁使南單于南單于遣子入侍令中郎將置安集掾史將弛刑五千人持弓弩隨單于所處參詞訟察動靜冬復詔單于徙西河美稷因使中郎將段郴及副校尉王郁留西河擁護之為設官府從事掾史令西河長史嵗將騎二千弛刑五百人助中郎將護衛單于袁宏後漢紀順帝紀永建五年十一月遣胸奴中郎將討南胸奴漢安二年胸奴中郎將馬實有功于邊詔書褒奬賜錢十萬西羌之難王暢薦實于執事由是為胸奴中郎將桓帝紀元嘉九年鮮卑烏孫寇邊胸奴中郎將張奐擊降之靈帝紀建寧六年田晏為鮮卑中郎將與胸奴中郎將臧旻擊南單于三道並進武經總要皇甫規為中郎將持節監討零吾等羌㑹軍大疾死者十三四規親入菴廬巡視將士三軍感悅東羌遂使乞降謹案後漢以段郴王郁留西河擁護單于此亦沿董忠韓昌之故事然司馬彪列其職於百官志且載其屬吏蓋至是而制乃加詳矣至馬實張奐田晏等並以胸奴中郎將帥師征討是有事亦可用為將帥然皆以綏逺為職也後漢書西羌列傳建武九年司徒掾班彪上言舊制涼州部置護羌校尉持節領護理其怨結嵗時循行問所疾苦又數遣使譯通動靜使塞外羌夷為吏耳目州郡因此可得警備今宜復如舊以明威防光武從之後漢紀章帝紀元和三年十月西羌寇張掖隴西金城護羌校尉傅育擊走之順帝紀永建四年第五訪後為南陽太守護羌烏桓校尉桓帝紀元嘉二年西戎犯塞護羌校尉段熲討之三年羌寇張掖護羌校尉段熲討之酈道元水經注延熹二年西羌燒當犯塞護羌校尉段熲討之追出塞至積石山斬首而還永元五年貫友代聶尚為護羌校尉攻迷唐斬獲八百餘級湟水又東徑赤城北而東入經戎峽口右合羌水出西南山下徑護羌城東故護羌校尉治宋田錫論邊事疏光武時西戎犯塞班彪請置護羌校尉通其貨之有無治其人之寃枉塞垣遂安謹案建武以來燒當諸羌常居大小榆谷土地肥美又有西海魚鹽之利緣山濵水易以為非故安集諸羌最為慎重班彪所陳曲盡事理然所云譯通動靜為吏耳目可得警備則専以防察為職在當時羣羌叛服不常不得不爾以視聖朝疆理撫綏之制不可同年而語矣後漢書明帝本紀永平八年三月初置度遼將軍屯五原曼柏冬十月丙子詔三公募郡國中都官死臯繫囚減罪一等詣度遼將軍營屯朔方五原之邊縣耿國列傳胸奴奧鞬日逐王比自立為呼韓邪單于欵塞稱藩願扞北虜議者以為不可許國獨曰宜如孝宣故事受之帝從其議遂立為南單于又上言宜置度遼將軍左右校尉屯五原永平元年卒官顯宗追德國言遂置度遼將軍左右校尉謹案續漢百官志明帝初置度遼將軍以衛南單于衆新降有二心者後數不安遂為常守然則度遼將軍之衛南單于與胸奴中郎將之護南單于職略相近耿秉𫝊建初元年拜度遼將軍視事七年胸奴懷其恩信鮮卑𫝊元初六年秋鮮卑入馬城塞度遼將軍鄧訓發積射士三千人追擊大破之是度遼將軍兼主胸奴單于鮮卑諸部之事也與使胸奴中郎將職守全同又考皇甫規𫝊規拜度遼將軍至營數月薦張奐自代從之規為使胸奴中郎將張奐𫝊延熹九年夏拜護胸奴中郎將以九卿秩督幽并涼三州及度遼烏桓二營則是胸奴中郎將又得兼轄度遼營也蓋二職並重而胸奴中郎將秩似更優然考橋元𫝊元為度遼將軍假黃鉞則位亦特崇與今之駐劄大臣大略相合而寵榮稍踰分矣三國杜佑通典魏第四品諸胸奴護羌等校尉謹案唐六典魏黃初二年始置都督諸州軍事或領鎮戎總夷校尉則校尉乃都督兼銜非如前代之設為專官也又考魏志鄧艾領東羌校尉似于護羌校尉之外别為一官者華陽國志晉何攀轉東羌校尉蓋魏晉之間又有此名晉常璩華陽國志晉太康三年更以益梁州為輕車刺史乘𫝊奏事以蜀多羌夷置西夷府以平吳軍司馬張牧為校尉持節統兵州别立治西夷治蜀各置長史司馬李吉甫元和郡縣志晉惠帝永寧元年以張軌為刺史持節領護羌校尉晉書職官志護胸奴羌戎蠻夷越中郎將武帝置四中郎將或領刺史或持節為之宋齊梁陳宋書百官志西戎校尉南齊書百官志護西戎校尉護羌校尉隋書百官志梁制北涼南秦置西戎校尉南秦涼州置平戎校尉謹案宋齊及梁承魏晉之後官制無大改易其時土宇偏安逺略不及雖官名猶存皆因仍故事而無其實也如北涼南秦等皆係今之內地與今駐劄大臣其事迥異故節録史文而不列于表北魏北魏書官氏志護胸奴羌戎中郎將護羌戎校尉謹案北魏太和中詔羣僚議定百官以四夷中郎將為三品中四夷校尉為三品下至世宗朝皆改為從三品視宋齊之秩稍為優重如太武拜楊難當為護西羌校尉孝文拜伏連籌為西戎中郎將亦如今制或以藩部台吉領將軍大臣事也北齊未置後周未置隋隋書百官志緣邊交市監置監副監各一人謹案隋開皇中突厥請緣邊置市與中國貿易故置交市監𨽻諸州管轄考自漢時已與單于通市北魏又與庫莫奚貿易則設官當不自隋始隋志始著其職耳今庫倫恰克圖司官掌貿易之政與古之交易監略為相髣而幅􅊷所暨境地綿濶則迥非前代之所及矣鄭樵通志煬帝時遣侍御史韋節司𨽻從事杜行滿使於西國復令聞喜公裴矩于武威張掖間往來以引致之大業中相率來朝者四十餘國因置西戎校尉以應接之謹案此西戎校尉蓋為西域諸國而設然駐于邊境不至西域則略如今西寧大臣矣唐通典唐永徽中始于邊防置四大都護府後又加單于都護府府置大都護一人副一人副都護二人長史司馬各一人謹案唐㑹要安北單于為大都護北庭為中都護而新唐書地理志則皆為大都護開元四年除郯王為安北大都護十五年除忠王為單于大都護自後皆以親王遙領而副大都護則兼王府長史主都護之政蓋即今左副將軍及辦事大臣之職其屬自長史司馬而外又有録事參軍事一人功曹參軍事倉曹參軍事户曹參軍事兵曹參軍事法曹參軍事各一人參軍事三人俱見百官志新唐書地理志安北大都護府本燕然都護府龍朔三年曰瀚海都護府總章二年更名開元二年治中受降城十年徙治豐勝二州之境十二年徙治天德軍單于大都護府本雲中都護府龍朔三年置麟德元年更名車鼻可汗𫝊永徽元年九月八日庚子髙宗遣右騎衛中郎將髙侃伐車鼻可汗擒之獻于武德殿以其衆處鬱督軍山建新黎州使領其衆置狼山都督府以統之于是突厥盡為封疆臣矣始置單于瀚海二都護府單于領狼山雲中桑乾三都護蘇農等二十四州瀚海都護府領瀚海金微新黎等七都督仙萼賀蘭等八州即擢酋領為都督刺史龍朔三年二月改燕然為瀚海都護府領回紇徙故瀚海都護府于古雲中城號雲中都護府磧以北蕃州悉𨽻瀚海南𨽻雲中雲中者義成公主所居也頡利滅李靖徙突厥羸破三百帳居之以阿史德氏為之長衆稍盛麟德元年正月甲子即建言願以諸王為可汗遙領之帝曰今可汗古單于也乃更雲中府為單于大都護府以殷王為單于都護唐㑹要麟德元年正月十六日甲子勑改單于大都護府以殷王遙領垂拱二年改為鎮守使聖厯元年五月六日改為安北都護開元二年閏二月五日復置單于都護府移安北都護于中受降城天寶四載十月單于都護府置金河縣武經總要入三受降城路自州北九十里入朔州西界又三十里至朔州又三百四十里至單于都護府號振武軍又西北二十里至東受降城又西二百里安北都護府至中受降城謹案唐貞觀初鐵勒諸部內附置六都督七州各以其首領為都督刺史即故單于臺置燕然都護府統之其後改燕然都護府為瀚海移都護府于回紇部落其舊瀚海府移置雲中古城改名雲中都護府至總章初始改瀚海都護府為安北都護府如鴻臚少卿朔方軍副大總管王晙兼安北大都護府也以今考之瀚海燕然在今喀爾喀四部境內雲中所治即今歸化城及察哈爾諸境所云豐勝二州即今歸化六㕔兼有蒙古內札薩克諸旗之地也壤地相錯以今準古略有可溯故並著于篇新唐書百官志互市監每監監一人從六品下丞一人正八品下掌蕃國交易之事謹案隋以監𨽻四方館唐𨽻少府貞觀六年改交市曰互市監副監曰丞垂拱元年復改曰通市監蓋即因隋制而為之也五季未置宋未置馬端臨文獻通考北蕃在太祖時雖聽緣邊市易而未有官署太平興國二年始令鎮易雄霸滄州各置榷務命常參官與內侍同掌謹案宋以常參官理緣邊榷務即今司員之職疆域雖殊職掌頗合故因隋唐交市監而類及之至必令內侍同掌則其弊滋甚不足論矣遼遼史百官志西南面安撫使司西南面都招討司西南邊大詳衮解見新疆篇司西南面烏雅蒙古語白鯇魚也原作五押今從八旗姓氏通譜改正招討司西南路巡察司西南面巡檢司西南面伊喇滿洲語黍也原作拽剌今從八旗姓氏通譜改正司山北路都部署司金肅軍都部署司南王府北王府伊賞解見八旗都統篇王府山金司已上西京諸路控制西夏西南面節制司西南面都統軍司已上西南邊諸司山西兵馬都統軍司西路招討使司西邊大詳衮司四蕃都軍所夏州管內蕃落使倒塌嶺統軍司倒塌嶺節制使司塌西節度使司塌毋城節度使司已上西蕃諸司謹案遼史兵衛志遼屬國可紀者五十有九有事則遣使征兵不從者討之故北面邊防官最為詳備第名目猥多史臣不能盡悉今舉其可知者節度使司有使有副使同知司馬判官掌書記衙官都統軍司有使有副使都監都部署司有都部署有副部署都監判官都指揮司有使有副使都監招討使司有使有監軍詳衮司有詳衮有都監將軍小將軍巡檢司有巡檢同巡檢大抵如唐宋節度使及經略安撫使之制而所領諸地則兼有今朔漠西羌諸部與今駐劄大臣頗相類也金金史百官志諸部族節度使節度使一員從三品統制各部鎮撫諸軍餘同州節度副使一員從五品判官一員知法一員司吏四人女直漢人各半通事一人譯人一人塔馬解見八旗都統篇右博勒和滿洲語潔淨也原作部羅火今改部族特哩衮蒙古語頭也原作土魯渾今改部族並依此置謹案金制部長曰貝勒解見八旗都統篇統數部者曰呼嚕滿洲語手背也原作忽魯今改其後倣宋遼之制俱改曰節度使蓋以綜理藩屬非如唐代內地之節度使也地理志部族節度使有烏克蘇喇滿洲語支派中之一支也原作烏昆神魯今改有烏庫哩原作烏古里今從八旗姓氏通譜改正有實壘蒙古語土也原作石壘今改有珠嚕滿洲語雙也原作肋魯今改有伯特滿洲語才力不及之謂也原作孛特今改有奇嚕滿洲語小旗也原作計魯今改有唐古即博勒和也有德哷勒索倫語臉也原作迪烈今改正即特哩衮也明昌三年罷烏克蘇喇節度使以招討司兼領云金史百官志諸乣詳衮詳衮一員從五品掌守戍邊堡餘同穆昆解見理藩院篇皇統八年六月設本班左右詳衮定為從五品默濟格滿洲語信息也原作麼忽今改一員從八品掌二詳衮司吏三人實訥昆解見八旗都統篇掌本乣差役等事茂滿洲語樹也原作咩今改乣伊喇穆騰滿洲語才能也原作木典今改古勒敦滿洲語城門洞也原作骨典今改舒嚕滿洲語珊瑚也原作失魯今改乣並依此置惟舒嚕添設譯人一名諸額爾竒木蒙古語尊貴也原作移里堇今改司額爾奇木一員從八品分掌部族村寨事司吏女直一人漢人一人實訥昆掌本差役等事塔馬特哩衮部族南北額爾奇木司依此置博勒和部族左右額爾竒木司置女直司吏一人諸圖哩解見八旗都統篇圖哩一員從七品掌部落詞訟訪察違背等事女直司吏一人通事一人謹案金皇統中羣僚議定官制惟詳衮等官尚仍遼舊貞祐中改茂詳衮為明安解見理藩院篇穆騰古勒敦詳衮為穆衮餘如舊額蓋以詳衮比唐之司馬額爾竒木比唐之參軍圖哩比唐之録事也又地理志諸詳衮有呼敦滿洲語速也原作胡都今改哈瑪爾蒙古語行圍前引人也原作霞馬今改而無舒嚕與百官志異元元史百官志吐蕃等處宣慰使司都元帥府禮店文州蒙古漢軍西蕃軍民元帥府吐蕃等處招討使司朵甘思田地裏管軍民都元帥府喇嘛綱喇嘛畨僧也綢山岡也原作剌馬兒剛今改等處招討使司本布唐古特語道士也原作奔不今改招討使司六畨招討使司天全招討使司朵甘思招討使司烏思藏納喇蘇蒙古語松樹也原作納里速今改古嚕蘇蒙古語獸也原作魯孫今改等三路宣慰使司都元帥府謹案吐蕃等處宣慰使司有使有同知有副使都元帥府有都元帥副元帥元帥府有達嚕噶齊解見户部篇有元帥安撫司有達嚕噶齊有使有同知有副使有僉事其員數多寡不齊大率與諸路等元史釋老𫝊云元起朔方固已崇尚釋教及得西域世祖思因其俗而柔其人仍郡縣吐蕃之地設官分職而領之于帝師其自帥臣以下皆僧俗並用軍民統攝于是帝師之命與誥敕並行于西土今考吐蕃烏斯藏為今之西藏地朵甘思為今之青海地都元帥府則如今之辦事大臣也元史地理志和寧路始名和林太祖建都于此前後五朝都焉世祖中統元年遷都大興置和林宣慰司都元帥府大德十一年置和林總管府至大二年改為行尚書省皇慶元年改為和寧路總管府謹案一統志稱喀爾喀部即元和寧路元所從興也考和寧自中統遷都以後即立宣慰司其後總管之置行尚書省之設則皆以內地之職治之官制與今不同唯宣慰元帥與吐蕃朵甘思部相同則與今制有適相符合者矣明未置謹案明史西蕃列傳洪武四年遣西寧州同知李喃哥等招撫其酋長乃改西寧州為衛以喃哥為指揮帝以西蕃産馬與之互市馬至漸多而其所用之貨與中國異自後馬至者少患之八年命中官趙成齎羅綺綾絹并巴茶往河州市之馬稍集率厚其值以償成乂宣諭德意蕃人感悅十六年青海酋長史剌巴等七人來歸賜文綺時岷州亦設衛蕃人嵗以馬易茶馬日蕃息考西寧即古湟中其西四百里有青海又曰西海水革豐美蕃人環居之専務畜牧明太祖甫定關中即建重鎮于甘肅又設西寧等四衛土官與漢官參治令之世守且多置茶課司蕃人得以馬易茶而部族之長亦許其嵗時朝貢然無重臣以蒞治之故邊吏往往失防蕃人多被剽敓而中國市馬亦鮮至則特羈縻而已乂烏斯藏列傳洪武初太祖遣使招諭又遣陜西行省員外郎許允德使其地令舉元故官赴京授職二年上所舉故官六十人帝悉授以職亦未能治以王官也厥後青海為海寇所侵跳梁日甚西藏尤隔絶而不通益不足言矣至河套以外即為蒙古所據察哈爾喀爾喀諸地終明之世未能得其要領蓋武備不修邊防無術故逺者偃蹇不恭近者遂操戈而內向積弱之勢非一朝一夕之故矣統觀前代之失然後知聖朝規模鴻逺能使八荒以外如户庭之密邇萬里之遙如臂指之維繫德威逺播疆域敉寧為自有天地以來所未之見也欽定厯代職官表卷六十三
